 game_concept_tributary: "Данник"
 game_concept_tributary_desc: "Данником называется [Concept('ruler', 'правитель')|E], признавший другого правителя своим [Concept('suzerain', 'повелителем')|E].\n\nДанник регулярно отправляет своему повелителю дань, в зависимости от типа она может принимать форму [Concept('herd', 'стад')|E], [Concept('taxes', 'налогов')|E], [Concept('prestige', 'престижа')|E] или даже [Concept('piety', 'благочестия')|E]. Взамен $game_concept_suzerain$ гарантирует даннику [Concept('truce', 'перемирие')|E].\n\nДанники слабо связаны с державой-повелителем. Они могут освободиться, если не выполняются условия их покорности, и не могут присоединяться к [Concept('factions', 'фракциям')|E].\n\nЕсли повелитель не является [Concept('landed', 'землевладельцем')|E] и не [Concept('migrating', 'мигрирует')|E], то спустя некоторое время данники выйдут из-под его власти."
