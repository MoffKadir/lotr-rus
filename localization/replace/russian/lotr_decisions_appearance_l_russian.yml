l_russian:

 # Wear the Mask
 lotr_wear_the_mask_decision: "Надеть маску"
 lotr_wear_the_mask_decision_tooltip: "Прикрыть своё увечье маской, чтобы скрыть его от всего мира"
 lotr_wear_the_mask_decision_desc: "Я больше не могу видеть себя в таком отвратительном состоянии. Если мои придворные не могут смотреть на меня без отвращения, возможно, мне следует подумать о том, чтобы скрыть своё лицо."
 lotr_wear_the_mask_decision_confirm: "Принесите мне маску!"

 # Remove the Mask
 lotr_remove_the_mask_decision: "Снять маску"
 lotr_remove_the_mask_decision_tooltip: "Снять маску и показать миру своё увечье"
 lotr_remove_the_mask_decision_desc: "Я [Select_CString(ROOT.Char.IsFemale, 'устала', 'устал' )] прятаться за маской. Неужели мое лицо действительно настолько уродливо, что я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] скрывать его от всего мира?"
 lotr_remove_the_mask_decision_confirm: "Пусть они увидят меня."

 # Eye Patches
 lotr_change_eye_patch_decision: "Выбрать повязку на глаза"
 lotr_change_eye_patch_decision_tooltip: "Выбрать возможную повязку для вашего потерянного глаза"
 lotr_change_eye_patch_desc: "Я позову своего ремесленника, чтобы он представил мне подборку повязок для глаз на выбор. Если уж мне довелось остаться без глаза, я могу сделать это стильно."
 lotr_change_eye_patch_decision_confirm: "Принесите повязки на глаза!"