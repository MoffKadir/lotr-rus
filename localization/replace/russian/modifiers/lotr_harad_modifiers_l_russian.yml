 ################################
 ### Namâlo Synergy Modifiers ###
 ################################
 lotr_namalo_political_synergy: "Бюрократы намало"
 lotr_namalo_political_synergy_desc: "Этот персонаж недавно включил ряд [Concept('namalo', 'намало')|E] в управление своей державой."
 lotr_namalo_political_synergy_county: "Политическая синергия намало"
 lotr_namalo_political_synergy_county_desc: "Власти недавно предприняли шаги по интеграции большего числа [Concept('namalo', 'намало')|E] в местную администрацию и политические сети общин этого региона."
 lotr_namalo_commercial_synergy: "Дела намало"
 lotr_namalo_commercial_synergy_desc: "Этот персонаж недавно сотрудничал с [Concept('namalo', 'намало')|E], чтобы поощрить торговлю в свой державе."
 lotr_namalo_commercial_synergy_county: "Коммерческая синергия намало"
 lotr_namalo_commercial_synergy_county_desc: "Власти недавно предприняли шаги, чтобы помочь [Concept('namalo', 'намало')|E] расширить свои деловые операции и торговые сети в общинах этого региона."
 lotr_namalo_cultural_synergy: "Учёные намало"
 lotr_namalo_cultural_synergy_desc: "Этот персонаж недавно связался с [Concept('namalo', 'намало')|E], имеющим учёное образование в своей державе."
 lotr_namalo_cultural_synergy_county: "Культурная синергия намало"
 lotr_namalo_cultural_synergy_county_desc: "Власти недавно предприняли шаги по покровительству учёных [Concept('namalo', 'намало')|E], чтобы улучшить состояние образования, религии и искусства в общинах этого региона."


 ##############################
 ### Flavor Event Modifiers ###
 ##############################
 lodenuly_date_farms_modifier: "Финиковые фермы долины Лоденули"
 lodenuly_date_farms_modifier_desc: "Долина [GetTitleByKey('d_lodenuly').GetNameNoTier] служит финиковой житницей региона [GetGeographicalRegion('middleearth_harad_bayoformal_khy').GetName], производя щедрое количество сочных фиников. Говорят, что они самые сладкие в мире, и великие сорта фиников выращивались здесь на протяжении многих поколений, некоторые из них имеют родословные, сравнимые со знатными домами. Некоторые даже верят, что эти финики - ключ к вечной молодости, и этот миф активно поддерживается владельцами садов."
 lodenuly_date_longevity_modifier: "Лоденулийское долголетие"
 lodenuly_date_longevity_modifier_desc: "Этот персонаж стареет удивительно изящно. Ходят слухи, что это связано с употреблением ими сочных фиников из региона [GetTitleByKey('d_lodenuly').GetNameNoTier]. Существует распространенное народное поверье, что эти финики могут даровать вечную молодость, хотя это не подтверждено."
 lotr_antelope_gear_modifier: "Снаряжение из шкур антилоп"
 lotr_antelope_gear_modifier_desc: "Войска этого персонажа оснащены высококачественными щитами и доспехами из шкур антилоп."
 arani_outposts_modifier: "Аранийские аванпосты"
 arani_outposts_modifier_desc: "Здесь обосновалась небольшая община племени арани. Теперь они охраняют местные торговые пути от разбойников и сопровождают купеческие караваны."
 new_qanat_modifier: "Недавно построенный кяриз"
 local_qanat_repaired_modifier: "Отремонтированный местный кяриз"
 local_qanat_expanded_modifier: "Расширенный местный кяриз"
 repaired_qanat_character_modifier: "Выделенные средства на ремонт местного кяриза"
 expanded_qanat_character_modifier: "Выделенные средства на расширение местного кяриза"
 lotr_ksar_maintenance_issues: "Обветшалые ксары"
 lotr_ksar_maintenance_issues_desc: "Местные жители не имеют достаточно ресурсов и средств, чтобы содержать несколько #italic ксаров#! (укрепленных деревень) в этом регионе. В результате местные торговые пути становятся более уязвимыми для разбойников и налетчиков."
 maresh_canal_issues: "Проблемы с Мехором"
 maresh_canal_issues_desc: "В настоящее время местные жители не располагают достаточными ресурсами для надлежащего обслуживания Мехора, центрального канала Мареша, который необходим для обеспечения чистой водой и повышения плодородия земли."
 maresh_goldsmiths: "Златокузнецы недавно открыли лавку в Мареше"
 maresh_glazed_ceramics: "Высокий спрос на глазурованную керамику из Мареша"
 kjhana_oil_gift: "Кьяновое масло"
 kjhana_oil_gift_desc: "Этот персонаж имеет доступ к фляге с кьяновым маслом, мощным лекарственным веществом, изготовленным из плодов и сока редкого кьянового дерева. Кьяна растёт только в провинции [GetTitleByKey('d_naishan').GetNameNoTier], отдалённом регионе на севере Харшандата."
 lotr_new_mud_mason_contract: "Новый контракт глинобитщиков"
 lotr_extra_protection_mud_masons: "Дополнительная защита от ритуалов глинобитщиков"
 harad_merchant_tongue: "Знает купеческий жаргон"
 harad_merchant_tongue_desc: "Благодаря обширным контактам с [Concept('trans_haradric_merchants', 'харадскими купцами')|E], этот персонаж знаком с купеческим жаргоном [Concept('harad', 'Харада')|E].\n\nТорговля с [Concept('trans_haradric_merchants', 'харадскими купцами')|E] #P более эффективна#!."