 lotr_mud_masons_castle_modifier_jenne: "Наёмные глинобитщики Селены ($game_concept_castle_holdings$)"
 lotr_mud_masons_castle_modifier_jenne_desc: "Этот персонаж заключил контракт с прославленной гильдией [Concept('mud_masons', 'глинобитщиков')|E] древнего города Селена на проекты, связанные со строительством и обслуживанием различных [Concept('buildings', 'зданий')|E] в его [Concept('castle_holdings', 'замковых владениях')|E]."
