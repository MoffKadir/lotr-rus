 lotr_mud_masons_city_modifier_jenne_desc: "Этот персонаж заключил контракт с прославленной гильдией [Concept('mud_masons', 'глинобитщиков')|E] древнего города Селена на проекты, связанные со строительством и обслуживанием различных [Concept('buildings', 'зданий')|E] в его [Concept('city_holdings', 'городских владениях')|E]."
 lotr_mud_masons_church_modifier_jenne: "Наёмные глинобитщики Селены ($game_concept_church_holdings$)"
 lotr_mud_masons_church_modifier_jenne_desc: "Этот персонаж заключил контракт с прославленной гильдией [Concept('mud_masons', 'глинобитщиков')|E] древнего города Селена на проекты, связанные со строительством и обслуживанием различных [Concept('buildings', 'зданий')|E] в его [Concept('church_holdings', 'храмовых владениях')|E]."
