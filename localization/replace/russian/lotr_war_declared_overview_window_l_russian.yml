l_russian:
 lotr_war_declared_flavor.valinor_invasion: "Крики угнетённых достигли Бессмертных земель, и валар вновь обратили свои взоры к Средиземью. Я - Эонвэ, глашатай Старшего короля, и я веду Воинство Запада, чтобы низвергнуть вашу тень! Вашему правлению тьмы пришёл конец, ибо свет Валинора больше не потерпит дерзости!"
 lotr_war_declared_flavor.pharazon_invasion: "Неужели вы думали, что Золотой король - это просто воспоминание? Я вернулся из глубины веков, чтобы вернуть себе власть, которая принадлежит мне по праву! Ваш «мир» - всего лишь отсрочка исполнения приговора. Я воздвигну золотой трон на руинах ваших мягких законов и покажу этому миру, кто здесь истинный повелитель!"
 lotr_war_declared_flavor.amav_invasion: "Легенды не лгут, хотя вы были слишком глупы, чтобы прислушаться к ним. Я, Амав, вернулся, чтобы вновь пройти по этим землям! Меня не волнуют ни ваши ничтожные титулы, ни ваше «право» на власть. Я - гроза из мифов, обретшая плоть, и я пришёл забрать то, что принадлежит мне по древнему праву!"