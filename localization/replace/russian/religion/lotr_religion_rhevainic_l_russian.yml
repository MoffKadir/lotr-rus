l_russian:
 ################################
 ####### Rhevain Religion #######
 ################################
 rhevain_religion: "Ревайнск"
 rhevain_religion_adj: "Ревайнский обряд"
 rhevain_religion_desc: "Ревайны - [Concept('northmen', 'северяне')|E], которые не полностью впитали религиозные традиции и знания [Concept('dwarves', 'гномов')|E], [Concept('elves', 'эльфов')|E] или [Concept('faithful', 'Верных')|E]. Они остаются более суеверной и упрощённой культурой, часто верят в злых духов и с опаской относятся к эльфам, но при этом выносливы и верны."
 rhevain_religion_adherent: "Ревайнец"
 rhevain_religion_adherent_plural: "Ревайны"

 faith_northmen: "Фреаструанск"
 faith_northmen_adj: "Фреастру"
 faith_northmen_adherent: "Фреастрист"
 faith_northmen_adherent_plural: "Фреастристы"
 faith_northmen_old: "Старо-фреаструанск"
 faith_northmen_old_adj: "Старо-фреастру"
 faith_northmen_old_adherent: "Старо-фреастрист"
 faith_northmen_old_adherent_plural: "Старо-фреастристы"
 faith_northmen_desc: "[Concept('northmen', 'Северяне')|E] Рованиона с древних времён поклонялись пантеону духов, известному как [Glossary('фреас','freas_gloss')].\n\nСчитается, что эти древние духи старше самого мира, достигнув в нём духовного, но не физического совершенства. Будучи физическими существами, [Concept('men', 'люди')|E] были призваны фреас привнести совершенство духовного мира в физический посредством регулярных молитв и участия в священных деяниях, связанных с каждым фреа. Говорят, что когда люди умирают, они возвращаются в чертоги своих предков и вновь воссоединяются с ними."

 faith_red_sect: "Красно-сектск"
 faith_red_sect_adj: "Раударкин"
 faith_red_sect_adherent: "Ридкин"
 faith_red_sect_adherent_plural: "Ридкин"
 faith_red_sect_desc: "Раударкин («Красная секта») - апокалиптический рованийский культ, возникший после Войны гномов и драконов. После своего основания она быстро обрела небольшое, но радикальное число последователей среди выживших дэйлцев. Они придерживаются фаталистического взгляда на жизнь и верят, что однажды драконы снова проснутся и уничтожат мир людей. \n\nОни так и не превратились в значительную силу и остаются редким явлением, однако в тавернах и у костров рассказывают множество историй об этих культистах в красных одеждах и масках. Хотя в этих историях часто фигурирует зло, тёмная магия и ритуалы, раударкины в большинстве своём - пассивная группа, которая празднует свою любовь к жизни, пока может."

 faith_nefrea: "Нефрэанск"
 faith_nefrea_adj: "Присутствие Нефрэа"
 faith_nefrea_adherent: "Раб"
 faith_nefrea_adherent_plural: "Рабы"
 faith_nefrea_desc: "Жизнь на Севере суровая и холодная. Его жители долгое время страдали от притеснений орочьих владык из Гундабада, скудного урожая с твердой почвы и зловещего вездесущего холода. Несущий Смерть подстерегает каждый миг. Он непредсказуем, капризен и несправедлив, и самое большее, на что могут надеяться его рабы, - это то, что он пройдет мимо них в другой раз. Обряды и молитвы служат не для того, чтобы призвать защиту их божества, а для того, чтобы защитить их от его леденящего взгляда. \n\nПодавленные самой жизнью, рабы Нефрэа стали мрачными и пессимистичными, в них смешались древние воспоминания о Морготе и Мандосе, смерти и роке. У них мало друзей и, конечно, нет никакой охраняющей силы, иначе зачем бы Несущему Смерть так их преследовать?"

 faith_blue_sect: "Фискаркинск"
 faith_blue_sect_adj: "Фискаркин"
 faith_blue_sect_adherent: "Фискаркин"
 faith_blue_sect_adherent_plural: "Фискаркин"
 faith_blue_sect_desc: "Фискаркин, что на древнем языке [Concept('rhovanion', 'Рованиона')|E] означает «Рыбье племя», - морской культ, возникший, когда мореходы, рыбаки и купцы внутренного [Concept('seaofrhun', 'Моря Рун')|E] стали почитать его и [Concept('neorthcharacter', 'Неорта')|E], ставя их выше других [Concept('powersgods', 'Сил')|E].\n\nГлубоко под волнами Морской Владыка благословляет водных существ и посылает своих чешуйчатых слуг, чтобы они направляли и питали людей. Поэтому рыбу часто используют для гадания, а к мелким рыбьим божествам обращаются за помощью и советом.\n\nСреди прочих [Concept('northmen', 'северян')|E] они в основном известны своей суеверностью, поскольку тех, кто отправляется в плавание при неблагоприятном предзнаменовании, наверняка ожидает мрачная судьба."
 bluesect_religious_head_title: "Верховный призыватель моря"
 bluesect_religious_head_title_name: "Синий Совет"
 bluesect_priest: "Призыватель моря"
 bluesect_priest_plural: "Призыватели моря"

 faith_framling: "Лиффреанск"
 faith_framling_adj: "Лиффреанский обряд"
 faith_framling_adherent: "Последователь Бэмы"
 faith_framling_adherent_plural: "Последователи Бэмы"
 faith_framling_desc: "За время долгой изоляции те немногие из [eothed|El], что остались в верховьях [Concept('anduinvale', 'Долины Андуина')|E], из-за нужды превратились в закалённый народ. На суровом севере древняя ключевая фигура [Concept('bemacharacter', 'Бэмы')|E] вобрала в себя множество других традиционных богов [Concept('northmen', 'северян')|E] и представлений о [valargods|E], став если не единственным, то основным богом, к которому обращают молитвы.\n\nЛюбящий свой народ, суровый к тем, кто угрожает ему, Повелитель Коней бдителен и непоколебим как хранитель Севера."

 faith_woodmen: "Видуманнск"
 faith_woodmen_adj: "Видуманнас"
 faith_woodmen_adherent: "Видуманн"
 faith_woodmen_adherent_plural: "Видуманна"
 faith_woodmen_old: "Старо-видуманнск"
 faith_woodmen_old_adj: "Старо-видуманнас"
 faith_woodmen_old_adherent: "Старовидуманн"
 faith_woodmen_old_adherent_plural: "Старовидуманны"
 faith_woodmen_desc: "Видуманна исповедуют примитивную веру, уходящую корнями в лес, который обеспечивает их всех необходимым, в первую очередь почитая [Concept('bemacharacter', 'Бэму')|E] и взывая к нему в нужде.\n\nНаходясь под влиянием [Concept('lasgalendrimelves', 'ласгалендрим')|E], видуманна относятся к природе с большим почтением, стремясь защитить земли, на которых они живут, в [Concept('anduinvale', 'Долине Андуина')|E] и [Concept('greenwoodshort', 'Зеленолесье')|E], от сил [Concept('alignment_evil', 'зла')|E].\n\nС приходом [Concept('wizards', 'волшебников')|E] они стали рассматривать [Concept('radagastcharacter', 'Радагаста')|E] как своего духовного лидера из-за его сильной связи с природой, хотя он очень редко принимает участие в каких-либо церемониях."

 faith_fey_court: "Фей-дворск"
 faith_fey_court_adj: "Двор фей Фолдвин"
 faith_fey_court_adherent: "Последыш" #Corrupted idea from the elvish term
 faith_fey_court_adherent_plural: "Последыши"
 faith_fey_court_old: "Старо-фейск"
 faith_fey_court_old_adj: "Старый двор фей"
 faith_fey_court_old_adherent: "Старопоследыш"
 faith_fey_court_old_adherent_plural: "Старопоследыши"
 faith_fey_court_desc: "Обряды леофрингов вращаются вокруг короля и королевы фей, [Concept('bemacharacter', 'Бэмы')|E] и [foldewyncharacter|E]. Бэма всегда был другом человечества, научил леофрингов верховой езде и подарил им свои стада. Он добр и быстро прощает, хотя часто рассеян и отстранён. Пока Бэма странствует вдали, его жена Фолдвин, могущественная сама по себе, правит феями из своего двора звёздного света.\n\nЖивущие в туманных лесах леофринги считают, что Фолдвин переменчива, горда и не скоро прощает ошибки [Concept('conceptmankind', 'человечества')|E]. Её благосклонность опасна, хотя она и щедра при даровании; ведь немногие возвращаются из её леса прежними. Жрицы молятся перед феями за людей, надеясь заслужить её благосклонность, а не гнев. Говорят, что если она разгневается, люди уйдут в туман, заколдованные, и их больше никогда не увидят."

 faith_midde_court: "Срединно-дворск"
 faith_midde_court_adj: "Срединный Двор"
 faith_midde_court_adherent: "Среднеброды"
 faith_midde_court_adherent_plural: "Среднеброды"
 faith_midde_court_old: "Старо-дворск"
 faith_midde_court_old_adj: "Старый Срединный Двор"
 faith_midde_court_old_adherent: "Старосреднеброд"
 faith_midde_court_old_adherent_plural: "Старосреднеброды"
 faith_midde_court_desc: "Большинство верующих леофрингов посвящают свою духовную энергию исключительно возвеличиванию одного из двух дворов Фэй, но есть и те, кто отвергает эту дихотомию.\n\nВместо того чтобы рассматривать Благое и Неблагое как диаметральные противоположности, они считают их обоих неотъемлемым отражением человеческой природы, как тёмных, так и светлых, и одно не может существовать без присутствия другого.\n\nПриверженцы этого мировоззрения называют себя «Среднебродами» и стремятся найти путь к равновесию и компромиссу между враждующими племенами, надеясь однажды увидеть королеву Фэй и тёмных Фэй примирёнными и объединёнными в один «Срединный Двор»."

 faith_withered_court: "Увядше-дворск"
 faith_withered_court_adj: "Увядающий Двор"
 faith_withered_court_adherent: "Тень"
 faith_withered_court_adherent_plural: "Тени"
 faith_withered_court_old: "Староувядше-дворск"
 faith_withered_court_old_adj: "Старый Увядший Двор"
 faith_withered_court_old_adherent: "Старотень"
 faith_withered_court_old_adherent_plural: "Старотени"
 faith_withered_court_desc: "Когда-то король тёмных Фэй правил в сумерках, не уступая своему брату [Concept('bemacharacter', 'Бэме')|E]. Его правление было единоличным, но справедливым из чертогов под холмами. Но его сила была не такой, как у его брата, и он сам и его народ зачахли, а его чертоги, некогда прекрасные и зелёные, превратились в запустение. Тёмные Фэй снова встали в грозном облике, злобно глядя на живых, которые процветали, пока они увядали. \n\nТеперь тьма исходит от этого холма, удушающая злоба на всех, кто осмелится приблизиться к нему. Беспокойные Фэй подверглись порче и приняли искажённые формы. Костлявые руки тянутся вперёд, чтобы схватить живых и забрать их жизнь себе. Успокоить их можно только с помощью великих жертвоприношений, чтобы злость их ужасного короля не обрушилась на нас, и мы не погибли."