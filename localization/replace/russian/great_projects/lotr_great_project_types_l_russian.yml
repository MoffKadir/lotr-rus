 ### Great Citadel ###
 great_project_type_construct_great_citadel_01: "Воздвигнуть цитадель"
 great_project_type_construct_great_citadel_01_desc: "[Concept('men', 'Люди')|E] [Concept('numenor', 'Нуменора')|E] построили множество крепких башен и укреплений по всем своим землям. Чтобы обезопасить свой народ, я сделаю то же самое и воздвигну великую цитадель как символ надежды, который будет виден всем."

 great_project_type_construct_great_citadel_02: "Расширить цитадель"
 great_project_type_construct_great_citadel_02_desc: "Построив великолепную цитадель для защиты своих [Concept('domain', 'владений')|E], я понимаю, что цитадели есть куда расти. Что может быть лучшим признаком огромного богатства, чем расширение нашей цитадели?"
 
 great_project_type_construct_great_citadel_03: "Нуменорская башня"
 great_project_type_construct_great_citadel_03_desc: "Теперь, когда великая цитадель была расширена, она сияет как маяк развития в моих [Concept('domain', 'владениях')|E]. Пришло время превратить её в башню, достойную славы древнего [Concept('numenor', 'Нуменора')|E]."

