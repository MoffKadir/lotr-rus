 great_project_type_construct_osgiliath_04_contribution_granaries_desc: "Строительство зернохранилищ в рамках этого [Concept('great_project', 'грандиозного проекта')|E] упростило бы хранение продовольствия и урожая на зиму и длительные осады." # PLACEHOLDER
