 great_project_type_construct_osgiliath_05_contribution_materials_desc: "Ничего нельзя создать на пустом месте. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] всеми строительными материалами, необходимыми для завершения работы по восстановлению Великой цитадели." # PLACEHOLDER
 great_project_type_construct_osgiliath_05_contribution_workforce: "Рабочая сила"
 great_project_type_construct_osgiliath_05_contribution_workforce_desc: "Нужно построить цитадель! Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] рабочей силой, необходимой для выполнения этой грандиозной задачи." # PLACEHOLDER
 great_project_type_construct_osgiliath_05_contribution_statues: "Статуи королей"
 great_project_type_construct_osgiliath_05_contribution_statues_desc: "Включение изваяния статуй древних королей в план этого [Concept('great_project', 'грандиозного проекта')|E] стало бы великим памятником успеху восстановления Осгилиата." # PLACEHOLDER
 great_project_type_construct_osgiliath_05_contribution_banners: "Большие знамёна"
 great_project_type_construct_osgiliath_05_contribution_banners_desc: "Изготовление в рамках [Concept('great_project', 'грандиозного проекта')|E] знамён, связанных с различными важными моментами в истории Гондора, станет отличным памятником истории." # PLACEHOLDER
 great_project_type_construct_osgiliath_05_contribution_thrones: "Троны королей"
 great_project_type_construct_osgiliath_05_contribution_thrones_desc: "Создание в рамках [Concept('great_project', 'грандиозного проекта')|E] тронов наподобие тех, на которых восседали Исильдур и Анарион, станет великим памятником основателям Гондора." # PLACEHOLDER

 ### Arnorian Strongholds GP ###

 great_project_type_arnorian_stronghold_1: "Восстановить арнорскую твердыню"
 great_project_type_arnorian_stronghold_1_desc: "Великие города Арнора знавали лучшие времена. Мы должны восстановить их из руин."
 great_project_type_arnorian_stronghold_1_possessive: "$great_project_type_arnorian_stronghold_1$"
 lotr_great_project_type_arnorian_stronghold_has_t1_building: "В этой провинции #bold не#! расположена [Concept('great_building', 'грандиозная постройка')|E] арнорской твердыни первого уровня."
 great_project_type_arnorian_stronghold_construct_building.tt: "[Concept('great_building', 'Грандиозная постройка')|E] арнорской твердыни будет улучшена до следующего уровня"

 great_project_type_arnorian_stronghold_2: "Расширить арнорскую твердыню"
 great_project_type_arnorian_stronghold_2_desc: "Великие города Арнора восстановлены, но мы сделаем так, чтобы их красота сияла ещё ярче!"
 great_project_type_arnorian_stronghold_2_possessive: "$great_project_type_arnorian_stronghold_2$"
 lotr_great_project_type_arnorian_stronghold_has_t2_building: "В этой провинции #bold не#! расположена [Concept('great_building', 'грандиозная постройка')|E] улучшенной арнорской твердыни."

 great_project_type_arnorian_stronghold_1_contribution_sandstone: "Песчаник"
 great_project_type_arnorian_stronghold_1_contribution_sandstone_desc: "Стены города будут покрыты мрамором, но его фундамент будет сделан из простого песчаника. Обеспечение [Concept('great_project', 'грандиозного проекта')|E] необходимыми материалами - это один из величайших возможных вкладов."
 great_project_type_arnorian_stronghold_1_contribution_timber: "Древесина"
 great_project_type_arnorian_stronghold_1_contribution_timber_desc: "Мы используем всю древесину, которая нам понадобится для крепления конструкции с помощью балок, крыш, поворотных дверей, а также сделаем припуски на декоративную обшивку панелями."
 great_project_type_arnorian_stronghold_1_contribution_tiles: "Стопки плиток"
 great_project_type_arnorian_stronghold_1_contribution_tiles_desc: "Надёжная крыша - это черепичная крыша. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] нашей лучшей черепицей и защитим её от сырости!"
 great_project_type_arnorian_stronghold_1_contribution_white_marble: "Белый мрамор"
 great_project_type_arnorian_stronghold_1_contribution_white_marble_desc: "Для строительства города будет предложен самый лучший мрамор, чтобы его свет был виден на многие мили вокруг."
 great_project_type_arnorian_stronghold_1_contribution_work_force: "$great_project_type_dwarven_capital_02_contribution_work_force$"
 great_project_type_arnorian_stronghold_1_contribution_work_force_desc: "Для великих свершений нужен большой труд! Мы должны предоставить больше рабочей силы для [Concept('great_project', 'грандиозного проекта')|E], чтобы завершить реконструкцию этого города."
 great_project_type_arnorian_stronghold_1_contribution_gardens: "Сады"
 great_project_type_arnorian_stronghold_1_contribution_gardens_desc: "Великолепные сады в каменном городе, где царит тень и спокойствие."
 great_project_type_arnorian_stronghold_1_contribution_decorated_domes: "Украшенные купола"
 great_project_type_arnorian_stronghold_1_contribution_decorated_domes_desc: "Хороший купол - это круглый купол. Очень скоро они станут круглыми, с выступами и интересными мотивами."
 great_project_type_arnorian_stronghold_1_contribution_marble_statues: "Мраморные статуи"
 great_project_type_arnorian_stronghold_1_contribution_marble_statues_desc: "Фигуры наших предков: королей, художников, философов, полководцев. Чтобы помнить и вдохновлять. Для тех, кто придёт после."

 great_project_type_arnorian_stronghold_2_contribution_arched_gateways: "Арочные ворота"
 great_project_type_arnorian_stronghold_2_contribution_arched_gateways_desc: "По мере того, как мы расширяем город, нам нужны подходящие каркасы для строительства. Эти ворота помогут ориентироваться тем, кто будет бродить по улицам."
 great_project_type_arnorian_stronghold_2_contribution_numenorean_walls: "Нуменорские стены"
 great_project_type_arnorian_stronghold_2_contribution_numenorean_walls_desc: "Этот город станет крепостью, способной выдержать все грядущие бури. Враг, подобно волнам, будет разбиваться об эти стены, и мы выдержим их натиск."
 great_project_type_arnorian_stronghold_2_contribution_towering_keep: "Возвышающаяся крепость"
 great_project_type_arnorian_stronghold_2_contribution_towering_keep_desc: "Высокая и крепкая крепость, на вершине которой развеваются огромные знамена, чтобы наполнить радостью сердца её защитников."
 great_project_type_arnorian_stronghold_2_contribution_mosaics: "Мозаики"
 great_project_type_arnorian_stronghold_2_contribution_mosaics_desc: "Замысловатые мозаики будут изображать подвиги из легенд и сцены повседневной жизни в удивительных красках и деталях!"
 great_project_type_arnorian_stronghold_2_contribution_work_force: "$great_project_type_dwarven_capital_02_contribution_work_force$"
 great_project_type_arnorian_stronghold_2_contribution_work_force_desc: "$great_project_type_arnorian_stronghold_1_contribution_work_force_desc$"
 great_project_type_arnorian_stronghold_2_contribution_houses_of_healing: "Дома исцеления"
 great_project_type_arnorian_stronghold_2_contribution_houses_of_healing_desc: "По мере того как наш город становится всё более густонаселённым, нам понадобится место для отдыха и исцеления больных и раненых."
 great_project_type_arnorian_stronghold_2_contribution_sacred_hallow: "Священная роща"
 great_project_type_arnorian_stronghold_2_contribution_sacred_hallow_desc: "Священное место для спокойного созерцания и молитвы. Если уметь слушать, то можно почти услышать песню Единого."
 great_project_type_arnorian_stronghold_2_contribution_throne_room: "$great_project_type_dwarven_capital_02_contribution_throne_room$"
 great_project_type_arnorian_stronghold_2_contribution_throne_room_desc: "$great_project_type_dwarven_capital_02_contribution_throne_room_desc$"

 second_tier_arnorian_stronghold_building_ongoing: "Текущее восстановление арнорской твердыни"
 final_tier_arnorian_stronghold_building_ongoing: "Текущее расширение арнорской твердыни"

 ### Gaven ###
 great_project_type_construct_gaven_02: "Осушить Гэвен"
 great_project_type_construct_gaven_02_desc: "На протяжении бесчисленных столетий затерянный Гэвен покоился под тёмными водами, всеми забытый. Он всплывёт вновь."
 great_project_type_construct_gaven_02_county: "Это должен быть Гэвен"
 great_project_type_construct_gaven_02_contribution_materials: "Строительные материалы"
 great_project_type_construct_gaven_02_contribution_materials_desc: "Ничего нельзя создать на пустом месте. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] всеми строительными материалами, необходимыми для завершения работ по возведению дамб."
 great_project_type_construct_gaven_02_contribution_workforce: "Рабочая сила"
 great_project_type_construct_gaven_02_contribution_workforce_desc: "Канавы сами себя не выкопают! Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] рабочей силой, необходимой для выполнения этой грандиозной задачи."
 great_project_type_construct_gaven_02_contribution_engineers: "Инженеры"
 great_project_type_construct_gaven_02_contribution_engineers_desc: "Привлечение квалифицированных инженеров к этому [Concept('great_project', 'грандиозному проекту')|E] улучшило бы строительные возможности владения."
 great_project_type_construct_gaven_02_contribution_garrison: "Гарнизонные посты"
 great_project_type_construct_gaven_02_contribution_garrison_desc: "Защита [Concept('great_project', 'грандиозного проекта')|E] обеспечит безопасность наших рабочих во время их тяжёлого труда."
 great_project_type_construct_gaven_02_contribution_housing: "Хижины"
 great_project_type_construct_gaven_02_contribution_training_housing: "Строительство жилья для рабочих и новых поселенцев повысит благосостояние [Concept('great_project', 'грандиозного проекта')|E]."

 great_project_type_construct_gaven_03: "Отстроить Гэвен"
 great_project_type_construct_gaven_03_desc: "Теперь, когда болото побеждено, мы должны отстроить Гэвен заново."
 great_project_type_construct_gaven_03_county: "Это должен быть Гэвен"
 great_project_type_construct_gaven_03_contribution_materials: "Строительные материалы"
 great_project_type_construct_gaven_03_contribution_materials_desc: "Ничего нельзя создать на пустом месте. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] всеми строительными материалами, необходимыми для завершения работ по строительству новых зданий в Гэвене."
 great_project_type_construct_gaven_03_contribution_workforce: "Рабочая сила"
 great_project_type_construct_gaven_03_contribution_workforce_desc: "Города сами себя не построят! Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] рабочей силой, необходимой для выполнения этой грандиозной задачи."
 great_project_type_construct_gaven_03_contribution_merchant_quarter: "Купеческий квартал"
 great_project_type_construct_gaven_03_contribution_merchant_quarter_desc: "Построив особый купеческий квартал в рамках [Concept('great_project', 'грандиозного проекта')|E], мы увеличим доходы и поток торговли в Гэвене."
 great_project_type_construct_gaven_03_contribution_walls: "Великие стены"
 great_project_type_construct_gaven_03_contribution_walls_desc: "Этот город станет крепостью, способной выдержать все грядущие бури. Наши враги, подобно волнам, будут разбиваться об эти стены, и мы выдержим их натиск."
 great_project_type_construct_gaven_03_contribution_canals: "Каналы"
 great_project_type_construct_gaven_03_contribution_canals_desc: "Новые каналы облегчат передвижение по Гэвену и улучшат распределение товаров."

 great_project_type_construct_gaven_04: "Расширить Гэвен"
 great_project_type_construct_gaven_04_desc: "Восстановив центр города, мы теперь можем начать расширять его ещё больше, вглубь окружающих болот."
 great_project_type_construct_gaven_04_county: "Это должен быть Гэвен"
 great_project_type_construct_gaven_04_contribution_materials: "Строительные материалы"
 great_project_type_construct_gaven_04_contribution_materials_desc: "Ничего нельзя создать на пустом месте. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] всеми строительными материалами, необходимыми для расширения Гэвена."
 great_project_type_construct_gaven_04_contribution_workforce: "Рабочая сила"
 great_project_type_construct_gaven_04_contribution_workforce_desc: "Города сами себя не восстановят! Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] рабочей силой, необходимой для выполнения этой грандиозной задачи."
 great_project_type_construct_gaven_04_contribution_gardens: "Выделенные сады"
 great_project_type_construct_gaven_04_contribution_gardens_desc: "Среди городской суеты - маленькие природные уголки."
 great_project_type_construct_gaven_04_contribution_domes: "Выгравированные своды"
 great_project_type_construct_gaven_04_contribution_domes_desc: "Под великолепными сводчатыми куполами, произведениях высочайшего мастерства и красоты, разместятся оживлённые рынки."
 great_project_type_construct_gaven_04_contribution_statues: "Возвышающиеся статуи"
 great_project_type_construct_gaven_04_contribution_statues_desc: "Изображения предков и богов, наблюдающие за нашими победами."

 great_project_type_construct_gaven_05: "Возвеличить Гэвен"
 great_project_type_construct_gaven_05_desc: "Слава Гэвена разнесётся по всему [Concept('middleearth', 'Средиземью')|E]."
 great_project_type_construct_gaven_05_county: "Это должен быть Гэвен"
 great_project_type_construct_gaven_05_contribution_materials: "Строительные материалы"
 great_project_type_construct_gaven_05_contribution_materials_desc: "Ничего нельзя создать на пустом месте. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] всеми необходимыми строительными материалами."
 great_project_type_construct_gaven_05_contribution_workforce: "Рабочая сила"
 great_project_type_construct_gaven_05_contribution_workforce_desc: "Нужно построить цитадель! Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] рабочей силой, необходимой для выполнения этой грандиозной задачи."
 great_project_type_construct_gaven_05_contribution_mosaics: "Мозаики"
 great_project_type_construct_gaven_05_contribution_mosaics_desc: "Замысловатые мозаики будут изображать подвиги из легенд и сцены повседневной жизни в удивительных красках и деталях!"
 great_project_type_construct_gaven_05_contribution_spires: "Военные шпили"
 great_project_type_construct_gaven_05_contribution_spires_desc: "Элегантные и смертоносные военные шпили станут одновременно и бастионом, и дворцом."
 great_project_type_construct_gaven_05_contribution_floating_gardens: "Плавучие поля"
 great_project_type_construct_gaven_05_contribution_floating_gardens_desc: "Искусственные острова, превращённые в плодородные пахотные земли, принесут обильный урожай."

