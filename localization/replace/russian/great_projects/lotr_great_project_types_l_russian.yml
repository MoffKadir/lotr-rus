 ### Osgiliath ###
 great_project_type_construct_osgiliath_02: "Укрепить руины Осгилиата"
 great_project_type_construct_osgiliath_02_desc: "Мы должны укрепить руины Осгилиата, чтобы сделать его более защищённым от вражеских войск." # PLACEHOLDER
 great_project_type_construct_osgiliath_02_county: "Это должен быть Осгилиат"

 great_project_type_construct_osgiliath_02_contribution_materials: "Стройматериалы"
 great_project_type_construct_osgiliath_02_contribution_materials_desc: "Ничего нельзя создать на пустом месте. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] всеми строительными материалами, необходимыми для завершения работ по возведению укреплений." # PLACEHOLDER
 great_project_type_construct_osgiliath_02_contribution_workforce: "Рабочая сила"
 great_project_type_construct_osgiliath_02_contribution_workforce_desc: "Руины сами себя не укрепят! Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] рабочей силой, необходимой для выполнения этой великой задачи." # PLACEHOLDER 
 great_project_type_construct_osgiliath_02_contribution_blacksmiths: "Кузнецы"
 great_project_type_construct_osgiliath_02_contribution_blacksmiths_desc: "Опытные кузнецы, привлечённые к этому [Concept('great_project', 'грандиозному проекту')|E], облегчат гарнизону обслуживание своего оружия в течение более длительного времени." # PLACEHOLDER
 great_project_type_construct_osgiliath_02_contribution_barracks: "Казармы"
 great_project_type_construct_osgiliath_02_contribution_barracks_desc: "Добавив к [Concept('great_project', 'грандиозному проекту')|E] казармы и военный квартал, мы повысим моральный дух солдат и продолжительность их службы." # PLACEHOLDER 
 great_project_type_construct_osgiliath_02_contribution_training_grounds: "Тренировочные площадки"
 great_project_type_construct_osgiliath_02_contribution_training_grounds_desc: "Добавив к [Concept('great_project', 'грандиозному проекту')|E] специально отведённые тренировочные площадки, мы повысим боевые навыки солдат гарнизона." # PLACEHOLDER

 great_project_type_construct_osgiliath_03: "Реконструкция Осгилиата"
 great_project_type_construct_osgiliath_03_desc: "Мы должны начать восстановление инфраструктуры Осгилиата, поскольку есть много желающих переехать туда." # PLACEHOLDER
 great_project_type_construct_osgiliath_03_county: "Это должен быть Осгилиат"

 great_project_type_construct_osgiliath_03_contribution_materials: "Стройматериалы"
 great_project_type_construct_osgiliath_03_contribution_materials_desc: "Ничего нельзя создать на пустом месте. Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] всеми строительными материалами, необходимыми для завершения работ по строительству новых зданий в Осгилиате." # PLACEHOLDER
 great_project_type_construct_osgiliath_03_contribution_workforce: "Рабочая сила"
 great_project_type_construct_osgiliath_03_contribution_workforce_desc: "Города сами себя не отстраивают! Мы обеспечим [Concept('great_project', 'грандиозный проект')|E] рабочей силой, необходимой для выполнения этой грандиозной задачи." # PLACEHOLDER
 great_project_type_construct_osgiliath_03_contribution_housing: "Дома"
 great_project_type_construct_osgiliath_03_contribution_housing_desc: "Включив строительство новых жилищ в план этого [Concept('great_project', 'грандиозного проекта')|E], мы могли бы ускорить начало заселения Осгилиата." # PLACEHOLDER
 great_project_type_construct_osgiliath_03_contribution_guilds: "Возрождение гильдий"
 great_project_type_construct_osgiliath_03_contribution_guilds_desc: "Воссоздание гильдий в рамках этого [Concept('great_project', 'грандиозного проекта')|E] повысит скорость строительства зданий в Осгилиате." # PLACEHOLDER
 great_project_type_construct_osgiliath_03_contribution_bridges: "Восстановление мостов"
 great_project_type_construct_osgiliath_03_contribution_bridges_desc: "Восстановление мостов в рамках [Concept('great_project', 'грандиозного проекта')|E] облегчит передвижение по Осгилиату и поспособствует доставке товаров из Итилиэна в столицу." # PLACEHOLDER

