 great_project_type_rebuild_ost_in_edhil_01: "Excavate Ost-in-Edhil"
 great_project_type_rebuild_ost_in_edhil_01_desc: "The ruins of the great capital of Eregion have been silent for ages. Now is the time to clear the sediment and rubble to bring it to the light of day."
 great_project_type_rebuild_ost_in_edhil_01_possessive: "$great_project_type_dwarven_capital_01$'s"
 great_project_type_rebuild_ost_in_edhil_01_county: "Must be Ost-in-Edhil"
 
 great_project_type_rebuild_ost_in_edhil_01_contribution_mirdan_applicant: "Mírdan Applicant"
 great_project_type_rebuild_ost_in_edhil_01_contribution_mirdan_applicant_desc: "We shall seek to emulate the Mírdain of old, by emulating the simplest of their work."
 great_project_type_rebuild_ost_in_edhil_01_contribution_excavation: "Excavate"
 great_project_type_rebuild_ost_in_edhil_01_contribution_excavation_desc: "There is much age and the elements have piled on the ancient ruins, we shall remove it all before we rebuild."
 great_project_type_rebuild_ost_in_edhil_01_contribution_conservatory: "Conservatory"
 great_project_type_rebuild_ost_in_edhil_01_contribution_conservatory_desc: "The treasures of the past will be housed in a dedicated hall, for all to see and marvel at their beauty."
 great_project_type_rebuild_ost_in_edhil_01_contribution_work_force: "$great_project_type_dwarven_capital_02_contribution_work_force$"
 great_project_type_rebuild_ost_in_edhil_01_contribution_work_force_desc: "If there is one thing such a project can never have enough of, it's people with spades."
 great_project_type_rebuild_ost_in_edhil_01_contribution_shelters: "Shelters"
 great_project_type_rebuild_ost_in_edhil_01_contribution_shelters_desc: "Basic wooden shelters, to protect the workers from the worst of the weather."
 great_project_type_rebuild_ost_in_edhil_01_contribution_jeweller_workshop: "Jeweller's Workshop"
 great_project_type_rebuild_ost_in_edhil_01_contribution_jeweller_workshop_desc: "A modest jeweller's workshop, this will be the founding stone of the new Gwaith-i-Mírdain."
 
 great_project_type_rebuild_ost_in_edhil_02: "Refound Ost-in-Edhil"
 great_project_type_rebuild_ost_in_edhil_02_desc: "The foundations are sound, we can start to rebuild a modest settlement from them."
 great_project_type_rebuild_ost_in_edhil_02_possessive: "$great_project_type_dwarven_capital_02$'s"
 great_project_type_rebuild_ost_in_edhil_02_county: "Must be Ost-in-Edhil"
 
 great_project_type_rebuild_ost_in_edhil_02_contribution_mirdan_apprentice: "Mírdan Apprentice"
 great_project_type_rebuild_ost_in_edhil_02_contribution_mirdan_apprentice_desc: "Our first step towards rediscovering Ring-lore is to master the tools of the jeweller."
 great_project_type_rebuild_ost_in_edhil_02_contribution_slabs_of_sandstone: "$great_project_type_mandala_capital_01_contribution_slabs_of_sandstone$"
 great_project_type_rebuild_ost_in_edhil_02_contribution_slabs_of_sandstone_desc: "Cream-coloured sandstone slabs carved from the moutain side, to build the first real buildings of our new city."
 great_project_type_rebuild_ost_in_edhil_02_contribution_timber: "$great_project_type_arnorian_stronghold_1_contribution_timber$"
 great_project_type_rebuild_ost_in_edhil_02_contribution_timber_desc: "We thank Yavanna and we collect as few trees as necessary, to beam our roofs and carve our gates."
 great_project_type_rebuild_ost_in_edhil_02_contribution_forge: "Forge"
 great_project_type_rebuild_ost_in_edhil_02_contribution_forge_desc: "A simple practical forge, used both for the construction needs and to train our new smiths."
 great_project_type_rebuild_ost_in_edhil_02_contribution_work_force: "$great_project_type_dwarven_capital_02_contribution_work_force$"
 great_project_type_rebuild_ost_in_edhil_02_contribution_work_force_desc: "Roofers, stoneworkers, glassworkers, there's a job for everyone in the new building site."
 great_project_type_rebuild_ost_in_edhil_02_contribution_stables: "Stables"
 great_project_type_rebuild_ost_in_edhil_02_contribution_stables_desc: "Brand new stables, to house our friends who carry our knights and pull our carts."
 great_project_type_rebuild_ost_in_edhil_02_contribution_orchards: "Orchards"
 great_project_type_rebuild_ost_in_edhil_02_contribution_orchards_desc: "A small but bountiful orchard, providing fresh fruit to all denizens of the new city."

 great_project_type_rebuild_ost_in_edhil_03: "Rebuild Ost-in-Edhil"
 great_project_type_rebuild_ost_in_edhil_03_desc: "Now that the city is functional, we can start the work to make it truly great!"
