 ### Raiders of the Ship-lords ###
 lotr_travel_danger_events.0008.t: "$travel_danger_prefix$ Налётчики морских владык"
 lotr_travel_danger_events.0008.desc.pref: "Мы проходим через земли владения [location.GetName], влажные и потные, как стрелы в наших путешествиях. Внезапно на наш путь падают тени. Это свора [anbaluk_leader.GetCulture.GetCollectiveNounNoTooltip]их работорговцев!"
 lotr_travel_danger_events.0008.desc.adunaic: "\n\nЯ узнаю этих работорговцев, и они узнают меня, и в глазах их капитана появляется страх, когда [Select_CString(anbaluk_leader.IsFemale, 'она', 'он' )] приказывает им опустить оружие. Это [anbaluk_leader.GetName], [Select_CString(anbaluk_leader.IsFemale, 'воительница, пользующаяся', 'воин, пользующийся' )] славой среди [Concept('adunai', 'адунайцев')|E] - и всё же, в [Select_CString(anbaluk_leader.IsFemale, 'её', 'его' )] жилах течёт смешанная кровь, и [Select_CString(anbaluk_leader.IsFemale, 'она', 'он' )] занимает положение [Select_CString(anbaluk_leader.IsFemale, 'простой', 'простого' )] [Glossary('нарду','nardu_gloss')] - намного более низкое, чем моё."
 lotr_travel_danger_events.0008.desc.tulbel: "\n\nВнезапно до меня доходит, что я узнаю этих работорговцев, а они, в свою очередь, узнают меня. Их [Select_CString(anbaluk_leader.IsFemale, 'предводительница, подлая', 'предводитель, подлый' )] и печально [Select_CString(anbaluk_leader.IsFemale, 'известная', 'известный' )] [anbaluk_leader.GetName], рычит и скалится кошачьей улыбкой, и [Select_CString(anbaluk_leader.IsFemale, 'её', 'его' )] солдаты опускают оружие. «Я бы уже [Select_CString(anbaluk_leader.IsFemale, 'заковала', 'заковал' )] в кандалы таких ничтожеств, как ты, [ROOT.Char.GetTitledFirstName] - но сегодня я довольствуюсь монетами! Ха! Ха!»"
 lotr_travel_danger_events.0008.desc.normal: "\n\nОдин из воинов шепчет что-то [Select_CString(anbaluk_leader.IsFemale, 'своей предводительнице и та', 'своему предводителю и тот' )] со злобной ухмылкой опускает оружие. «Возможно, я [Select_CString(anbaluk_leader.IsFemale, 'знакома', 'знаком' )] вам как [anbaluk_leader.GetName], друзья, но сегодня вы также можете назвать меня [Select_CString(anbaluk_leader.IsFemale, 'великодушной', 'великодушным' )]! Я бы [Select_CString(anbaluk_leader.IsFemale, 'лишила', 'лишил' )] вас жизни или свободы, но сегодня мне хватит и монет!»"
 lotr_travel_danger_events.0008.desc.end: "\n\nМои солдаты ждут от меня указаний, и я обдумываю свои варианты. [Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] ли я броситься вперёд, и тогда я и [anbaluk_leader.GetNameNoTooltip] сразимся не на жизнь, а на смерть? Сможем ли мы одолеть их? Стоит ли нам просто заплатить? Есть много возможностей..."
 lotr_travel_danger_events.0008.a: "Падай, ты [anbaluk_leader.Custom2('InsultNoun', ROOT.Char)]!"
 lotr_travel_danger_events.0008.a.tt.duel_begins: "Вы вызовете персонажа [anbaluk_leader.GetNameNoTooltip] на поединок до смерти"
 lotr_travel_danger_events.0008.b: "Солдаты! Убейте [Select_CString(anbaluk_leader.IsFemale, 'её', 'его' )]!"
 lotr_travel_danger_events.0008.b.tt.crit_success.tt: "Мастерская победа"
 lotr_travel_danger_events.0008.b.tt.crit_success: "Вы заключили персонажа [anbaluk_leader.GetNameNoTooltip] и [Select_CString(anbaluk_leader.IsFemale, 'её', 'его' )] капитанов в темницу и захватили немного добычи"
 lotr_travel_danger_events.0008.b.tt.success.tt: "Победа"
 lotr_travel_danger_events.0008.b.tt.success: "Персонажа [anbaluk_leader.GetNameNoTooltip|U] и [Select_CString(anbaluk_leader.IsFemale, 'её', 'его' )] капитанов больше нет"
 lotr_travel_danger_events.0008.b.tt.failure.tt: "Поражение"
 lotr_travel_danger_events.0008.b.tt.failure: "[anbaluk_leader.GetNameNoTooltip|U] уходит с вашим золотом"
 lotr_travel_danger_events.0008.c: "Нам не нужно сражаться, [Glossary('нарду','nardu_gloss')] - мне нужны ваши мечи!"
 lotr_travel_danger_events.0008.c.tt.crit_success.tt: "Мастерская победа"
 lotr_travel_danger_events.0008.c.tt.crit_success: "[anbaluk_leader.GetNameNoTooltip|U] и [Select_CString(anbaluk_leader.IsFemale, 'её', 'его' )] капитаны поступают к вам на службу"
 lotr_travel_danger_events.0008.c.tt.success.tt: "Победа"
 lotr_travel_danger_events.0008.c.tt.success: "Один из капитанов персонажа [anbaluk_leader.GetNameNoTooltip|U] поступает к вам на службу"
 lotr_travel_danger_events.0008.c.tt.failure.tt: "Поражение"
 lotr_travel_danger_events.0008.c.tt.failure: "[anbaluk_leader.GetNameNoTooltip|U] уходит, не впечатлившись"
 lotr_travel_danger_events.0008.d: "Возьми это и оставь нас в покое, бродяга!"

 ### Random Orc Encounter ###
 lotr_travel_danger_events.0200.t: "$travel_danger_prefix$ Орочьи разбойники"
 lotr_travel_danger_events.0200.desc: "Когда моя странствующая свита пробирается через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName], мы обнаруживаем, что дорога перекрыта грозным отрядом [Concept('orcs', 'орков')|E]. Их [Select_CString(nemesis_orc.IsFemale, 'предводительница', 'предводитель' )] выходит вперёд, в то время как [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] последователи достают оружие.\n\n«Что это у нас тут? Путники, которые забыли, кому принадлежит эта дорога?», - рычит [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )]. «Что ж, позвольте мне напомнить вам! Я [nemesis_orc.GetName], и эта дорога принадлежит мне и моим парням! И тем, кто хочет проехать, придётся заплатить за проход...»\n\nЧлены моей свиты смотрят на меня, ожидая решения, как поступить в этой ситуации..."
 lotr_travel_danger_events.0200.a: "Думаю, мы заплатим за проход..."
 lotr_travel_danger_events.0200.b: "К оружию!"
 lotr_travel_danger_events.0200.b.success: "Вы сразили [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )] орков"
 lotr_travel_danger_events.0200.b.failure: "Вас победили и ограбили"
 lotr_travel_danger_events.0200.c: "Отступаем! Бегите, пока можете!"
 lotr_travel_danger_events.0200.d: "Ты #italic смеешь#! угрожать #italic мне#!?"
 lotr_travel_danger_events.0200.d.tt: "Вы напугали орков"
 lotr_travel_danger_events.0200.e: "Мне бы не помешал кто-то вроде вас..."
 lotr_travel_danger_events.0200.f: "[traveling_bodyguard.GetFirstName], убей [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )]!"

 ### Nemesis Orc - Ran away or paid him ###
 lotr_travel_danger_events.0201.t: "$travel_danger_prefix$ Знакомое лицо"
 lotr_travel_danger_events.0201.desc: "Я смотрю на дорогу, ведущую через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName] когда я понимаю, что проход впереди заблокирован. Это большой отряд [Concept('orcs', 'орков')|E], которые грубо завалили дорогу, и когда я замечаю их [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )], меня охватывает холодное осознание. Я [Select_CString(ROOT.Char.IsFemale, 'встречала', 'встречал' )] [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] раньше...\n\n«Что это ещё такое?», - ревёт [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )]. «Так, так, так... посмотрите, кто это! Это трусливые [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip|l]ие свиньи! Мы снова встречаемся... и все еще нужно заплатить за проход»."
 lotr_travel_danger_events.0201.desc.craven: "Я смотрю на дорогу, ведущую через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName] когда я понимаю, что проход впереди заблокирован. Это большой отряд [Concept('orcs', 'орков')|E], которые грубо завалили дорогу, и когда я замечаю их [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )], у меня по спине пробегает холодная дрожь. Этого не может быть... только не [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )]...\n\n[Select_CString(nemesis_orc.IsFemale, 'Орчиха', 'Орк' )] хитро смеется. «Должно быть, это судьба, которая снова сводит нас вместе, [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]ая падаль! Ну, ты знаешь, что будет дальше... плата сама себе не заплатит!»"
 lotr_travel_danger_events.0201.a: "Думаю, мы заплатим за проход..."
 lotr_travel_danger_events.0201.b: "К оружию!"
 lotr_travel_danger_events.0201.b.success: "Вы сразили [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )] орков"
 lotr_travel_danger_events.0201.b.failure: "Вас победили и ограбили!"
 lotr_travel_danger_events.0201.c: "Отступаем! Бегите, пока можете!"
 lotr_travel_danger_events.0201.d: "Ты #italic смеешь#! угрожать #italic мне#!?"
 lotr_travel_danger_events.0201.d.tt: "Вы напугали орков"
 lotr_travel_danger_events.0201.e: "Мне бы не помешал кто-то вроде вас..."

 ### Nemesis Orc - Cheated Death ###
 lotr_travel_danger_events.0202.t: "$travel_danger_prefix$ Месть из могилы"
 lotr_travel_danger_events.0202.desc: "Путь, который ведет через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName] продолжает петлять всё дальше и дальше, но внезапно наш караван останавливается. Пока я выясняю причину этого, я обнаруживаю, что дорога перекрыта угрожающим отрядом [Concept('orcs', 'орков')|E], которые повалили большое дерево прямо поперек дороги. Когда я замечаю [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )] орков, я с трудом верю своим глазам. Я же вроде... [Select_CString(ROOT.Char.IsFemale, 'убила', 'убил' )] [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )]?\n\n«ТЫ!» - кричит [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )]. «Ты [Select_CString(ROOT.Char.IsFemale, 'должна была', 'должен был' )] убедиться, что я [Select_CString(nemesis_orc.IsFemale, 'мертва', 'мёртв' )]... Но чтобы избавиться от меня, нужно нечто большее, чем какая-то паршивая работа ножом! Я здесь, и мне ещё нужно заплатить пошлину за проход...»"
 lotr_travel_danger_events.0202.desc.killed_again: "Путь, который ведет через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName] продолжает петлять всё дальше и дальше, но внезапно наш караван останавливается. Пока я выясняю причину этого, я обнаруживаю, что дорога перекрыта угрожающим отрядом [Concept('orcs', 'орков')|E], которые повалили большое дерево прямо поперек дороги. Когда я замечаю [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )] орков, меня охватывает недоверие. Этого не может быть. Это не может быть снова [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )]...\n\n«ТЫ [Select_CString(ROOT.Char.IsFemale, 'ОСТАВИЛА', 'ОСТАВИЛ' )] МЕНЯ УМИРАТЬ, ты, вонючая [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]ая свинья!» - ревёт [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )]. «Но это был не мой конец, НЕТ! Я [Select_CString(nemesis_orc.IsFemale, 'вернулась', 'вернулся' )] из могилы, чтобы забрать то, что принадлежит МНЕ!»\n\nЧлены моей свиты смотрят на меня, ожидая решения, как поступить в этой ситуации..."
 lotr_travel_danger_events.0202.desc.immortal: "Я еду впереди каравана, когда он проезжает через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName], когда я внезапно чувствую холод в воздухе. Впереди одинокая фигура преграждает мне путь. Подойдя ближе, я понимаю, что это [Concept('orc', 'орк')|E], [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] лицо представляет собой месиво, скреплённое винтами и гвоздями. Я замираю. Этого... этого не может быть... Сколько раз мне еще придется [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] убивать?\n\n«[Select_CString(ROOT.Char.IsFemale, 'Думала', 'Думал' )], на этот раз со мной покончено, на этот раз навсегда, да?» Я вижу, как [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )] улыбается сквозь сломанные зубы. Я не знаю, как [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )] это [Select_CString(nemesis_orc.IsFemale, 'выдержала', 'выдержал' )], но в [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] глазах горит нечестивый огонь. «Я никогда не перестану возвращаться. Я - [nemesis_orc.GetName]! Я [Select_CString(nemesis_orc.IsFemale, 'ВЕЧНА', 'ВЕЧЕН' )]!»"
 lotr_travel_danger_events.0202.a: "Думаю, мы заплатим за проход..."
 lotr_travel_danger_events.0202.b: "К оружию!"
 lotr_travel_danger_events.0202.b.success: "Вы сразили [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )] орков"
 lotr_travel_danger_events.0202.b.failure: "Вас победили и ограбили!"
 lotr_travel_danger_events.0202.c: "Отступаем! Бегите, пока можете!"
 lotr_travel_danger_events.0202.d: "Ты #italic смеешь#! угрожать #italic мне#!?"
 lotr_travel_danger_events.0202.d.tt: "Вы напугали орков"
 lotr_travel_danger_events.0202.e: "Мне бы не помешал кто-то вроде вас..."

 ### Nemesis Orc - Intimidated ###
 lotr_travel_danger_events.0203.t: "$travel_danger_prefix$ Знакомое лицо"
 lotr_travel_danger_events.0203.desc: "Я смотрю на дорогу, ведущую через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName], когда я понимаю, что проход впереди заблокирован. Это большая группа [Concept('orcs', 'орков')|E], которые грубо завалили дорогу, и когда я замечаю их [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )], я с удивлением узнаю [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )]. Я [Select_CString(ROOT.Char.IsFemale, 'прогнала', 'прогнал' )] [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] и [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] отряд во время нашей предыдущей стычки...\n\nЯ вижу в [Select_CString(nemesis_orc.IsFemale, 'её', 'его' )] глазах узнавание, страх и решимость. [Select_CString(nemesis_orc.IsFemale, 'Она', 'Он' )] хватает свое копье и кричит: «Не в этот раз! Нет! Ты заплатишь за проход, как и все остальные!»"
 lotr_travel_danger_events.0203.desc.lunatic: "Я смотрю на дорогу, ведущую через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName], когда я понимаю, что проход впереди заблокирован. Это большая группа [Concept('orcs', 'орков')|E], которые грубо завалили дорогу, и когда я замечаю их [Select_CString(nemesis_orc.IsFemale, 'предводительницу', 'предводителя' )], я недоверчиво качаю головой. Сколько раз мне придется преподавать [Select_CString(nemesis_orc.IsFemale, 'этой орчихе', 'этому орку' )] один и тот же урок снова и снова?\n\n[Select_CString(nemesis_orc.IsFemale, 'Она', 'Он' )] отшатывается при виде меня и кричит: «Это [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip|l]ая свинья! Гарн! Н-на этот раз все будет по-другому, ты меня слышишь? Больше никаких фокусов! Ты заплатишь, на этот раз ты заплатишь за проход!»"
