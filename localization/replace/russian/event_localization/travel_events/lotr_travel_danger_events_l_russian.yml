 #################################
 ### LOTR TRAVEL DANGER EVENTS  ##
 #################################

 ### Giant Scorpion Attack ###
 lotr_travel_danger_events.0001.t: "$travel_danger_prefix$ Атака гигантского скорпиона"
 lotr_travel_danger_events.0001.desc: "Когда мы пробираемся через кажущееся бесконечным Морем Дюн, наступает рассвет. Внезапно я замечаю, что пески начинают сдвигаться на небольшое расстояние слева от меня. Появляется гладкий чёрный панцирь, затем три пары горящих красных глаз. Две гигантские клешни и смертоносное жало, достаточно большое, чтобы проткнуть человека, вырываются из дюн.\n\nКак только я и мои товарищи отскакиваем, из своего укрытия вылезает гигантский скорпион, поднимая клешни и злобно стрекоча. Мои спутники в ужасе: почему мы выбрали этот путь!?"
 lotr_travel_danger_events.0001.desc.again: "Солнце всё ещё высоко в небе, пока мы продолжаем свой путь через кажущееся бесконечным Море Дюн. Внезапно я замечаю, что пески начинают сдвигаться на небольшое расстояние вправо от меня, с каким-то уже знакомым стрёкотом.\n\nНа этот раз из песка вырвались три гигантских скорпиона, лязгая гигантскими клешнями и смертоносными жалами, достаточно большими, чтобы пронзить человека. Должно быть, эти твари действительно затаили обиду!"
 lotr_travel_danger_events.0001.desc.victim: "\n\n#EMP «ОСТОРОЖНО!»#!, - кричит [beast_victim.GetFirstName], направляя копьё на чудовищного врага."
 lotr_travel_danger_events.0001.d: "Замрите! Они чувствуют движение песка."
 lotr_travel_danger_events.0001.d.tt: "Вы используете древние знания вашего народа о Море Дюн, чтобы уклониться от гигантского скорпиона."
 lotr_travel_danger_events.0001.sneak: "Вашему каравану удаётся уклониться от гигантского скорпиона"
 lotr_travel_danger_events.0001.a: "Попробуйте окружить его! Сегодня мы не пойдём ко дну!"
 lotr_travel_danger_events.0001.b: "[beast_victim.GetFirstName], отвлеки его!"
 lotr_travel_danger_events.0001.c: "БЕГИТЕ! БЕГИТЕ, ЕСЛИ ХОТИТЕ ВЫЖИТЬ!"
 lotr_travel_danger_events.0001.ran: "Вы успешно убегаете от гигантского скорпиона"
 lotr_travel_danger_events.0001.success: "[ROOT.Char.GetShortUINamePossessiveNoTooltipNoFormat] отражает угрозу своим клинком"
 lotr_travel_danger_events.0001.wound: "[ROOT.Char.GetShortUINameNoTooltipNoFormat] [Select_CString(ROOT.Char.IsFemale, 'ранена', 'ранен' )] гигантским скорпионом"
 lotr_travel_danger_events.0001.failure: "[ROOT.Char.GetShortUINameNoTooltipNoFormat] [Select_CString(ROOT.Char.IsFemale, 'раздавлена', 'раздавлен' )] гигантским скорпионом"

 ### Sandstorm! ###
 lotr_travel_danger_events.0002.t: "$travel_danger_prefix$ Песчаная буря!"
 lotr_travel_danger_events.0002.desc: "Пробираясь через бескрайний океан песка, который местные жители называют «Огненным зеркалом», мы видим на горизонте что-то странное: кажется, что огромная стена простирается через весь горизонт перед нами. Нет, не стена... буря!\n\nСреди моих людей вспыхивает паника, когда мы начинаем спешно разбивать лагерь - Море Дюн вызывает страх своими смертоносными пылевыми бурями, известных как «Дыхание Санбайза». Боюсь, я не доживу до следующего дня, если попытаюсь выжить только благодаря удаче."
 lotr_travel_danger_events.0002.a: "Наш проводник организует наш лагерь! Я буду в порядке."
 lotr_travel_danger_events.0002.b: "Я [ROOT.Char.GetNameRegnal]! Я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] обустрою лагерь!"
 lotr_travel_danger_events.0002.c: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] спасти себя! С дороги!"
 sandstorm_survived: "Вы пережили песчаную бурю"
 sandstorm_someone_dies: "Кто-то погибает от песчаной бури"
 sandstorm_many_die: "Многие члены свиты убиты песчаной бурей."
 sandstorm_you_die: "Вы погибаете от песчаной бури."

 ### Mount Doom's Breath
 lotr_travel_danger_events.0003.t: "$travel_danger_prefix$ Дыхание Роковой Горы"
 lotr_travel_danger_events.0003.desc: "Это воздух! Проклятый воздух [Concept( 'mordor', 'Мордора' )|E]. Громовое дыхание Роковой Горы неумолимо мчиться через [GetTerrain( 'volcanic_plains' ).GetName]. Оно обжигает горло изнутри, заставляет глаза слезиться, сушит губы и оглушает уши. Иногда кажется, что сама земля ненавидит меня."
 lotr_travel_danger_events.0003.a: "Мы должны идти вперёд!"
 lotr_travel_danger_events.0003.a.orc: "Шевелитесь, ничтожества!"
 scorched_throat_modifier: "Обожжённое горло"
 scorched_throat_modifier_desc: "Горло этого персонажа было повреждено ветрами скверны [Concept( 'mordor', 'Мордора' )|E]. Ему трудно дышать."

 ### Troll Attack! ###
 lotr_travel_danger_events.0004.t.intro: "$travel_danger_prefix$ Голодный "
 lotr_travel_danger_events.0004.t.black_troll: "олог"
 lotr_travel_danger_events.0004.t.cave_troll: "пещерный тролль"
 lotr_travel_danger_events.0004.t.sand_troll: "песчаный тролль"
 lotr_travel_danger_events.0004.t.snow_troll: "снежный тролль"
 lotr_travel_danger_events.0004.t.mountain_troll: "горный тролль"
 lotr_travel_danger_events.0004.t.hill_troll: "холмовой тролль"
 lotr_travel_danger_events.0004.desc.black_troll: "Когда моя свита путешествует по пустошам владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], из засады неожиданно выскакивает огромная тёмная фигура, в котором угадываются #L [troll.GetCulture.GetCollectiveNoun]ие#! очертания! Оно изрыгает проклятия на своём ужасном, гортанном языке, чёрном наречии, а затем обращается к нам:\n\n«Умбри анай задиаш! Твоя смеет нарушать границы моего поста? Твоя плати дань, азж Бурз-Дурбагу. Олог макха марна мат!»\n\nПонятно, что он голоден и намерен набить брюхо тем или иным способом. Моя свита явно напугана огромным зверем и обращается ко мне за указаниями."
 lotr_travel_danger_events.0004.desc.cave_troll: "Когда моя свита путешествует по глубинам владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], то, что мы приняли за обычный валун вдоль скалистой стены, внезапно встаёт, преграждая нам путь, - в нём угадываются #L [troll.GetCulture.GetCollectiveNoun]ие#! свойства! Оно ворчливо обращается к нам, его речь едва можно понять:\n\n«Что это? Мелкие вкусняшки? Моя - [troll.GetFirstName], и это мой туннель! Выглядай ужас как вкусна...»\n\nПонятно, что он голоден и намерен набить брюхо тем или иным способом. Моя свита явно напугана огромным зверем и обращается ко мне за указаниями."
 lotr_travel_danger_events.0004.desc.sand_troll: "Пока моя свита путешествует по владению [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], из песчаной ямы неподалёку неожиданно появляется нечто огромное, - в чём явно угадываются #L [troll.GetCulture.GetCollectiveNoun]ие#! черты! Оно ворчливо обращается к нам, его речь едва можно понять:\n\n«Вы... ваша шастать мой дюна. Мой! Плати дань, а?»\n\nПонятно, что он голоден и намерен набить брюхо тем или иным способом. Моя свита явно напугана огромным зверем и обращается ко мне за указаниями."
 lotr_travel_danger_events.0004.desc.snow_troll: "Когда моя свита путешествует по заснеженным пустошам владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], из большой снежной кучи неподалеку неожиданно появляется огромная бледная фигура, преграждающая нам путь, - в которой явно угадываются #L [troll.GetCulture.GetCollectiveNoun]ие#! черты! Оно обращается к нам с вздохами и жестами:\n\nСначала оно поднимает руки, указывая на замёрзший пейзаж вокруг. Затем оно подносит большой палец ко лбу и показывает на нас, а затем на своё брюхо. Это его территория, мы вторглись сюда и должны платить ему дань.\n\nПонятно, что он голоден и намерен набить брюхо тем или иным способом. Моя свита явно напугана огромным зверем и обращается ко мне за указаниями."
 lotr_travel_danger_events.0004.desc.mountain_troll: "Когда моя свита путешествует по глубинам владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], то, что мы приняли за обычный утёс, внезапно встаёт, преграждая нам путь, - в нём угадываются #L [troll.GetCulture.GetCollectiveNoun]ие#! свойства! Оно ворчливо обращается к нам, его речь едва можно понять:\n\n«Что это? Мелкие вкусняшки? Моя - [troll.GetFirstName], и это мой перевал! Выглядай ужас как вкусна...»\n\nПонятно, что он голоден и намерен набить брюхо тем или иным способом. Моя свита явно напугана огромным зверем и обращается ко мне за указаниями."
 lotr_travel_danger_events.0004.desc.hill_troll: "Когда моя свита путешествует по владению [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], то, что мы приняли за обычный валун вдоль скалистой стены, внезапно встаёт, преграждая нам путь, - в нём угадываются #L [troll.GetCulture.GetCollectiveNoun]ие#! свойства! Оно ворчливо обращается к нам, его речь едва можно понять:\n\n«Что это? Мелкие вкусняшки? Моя - [troll.GetFirstName], и это моя тропа! Выглядай ужас как вкусна...»\n\nПонятно, что он голоден и намерен набить брюхо тем или иным способом. Моя свита явно напугана огромным зверем и обращается ко мне за указаниями."
 lotr_travel_danger_events.0004.desc.outro: " [troll_fodder.GetFirstName] стоит особенно близко..."
 lotr_travel_danger_events.0004.success: "Вы убиваете тролля"
 lotr_travel_danger_events.0004.wound: "Тролль разоряет караван"
 lotr_travel_danger_events.0004.failure: "Тролль проглотил вас"
 lotr_travel_danger_events.0004.a: "Я лично убью тебя!"
 lotr_travel_danger_events.0004.a.tt: "Убить что-то настолько большое не так уж и сложно, верно?"
 lotr_travel_danger_events.0004.b: "Стража! К оружию!"
 lotr_travel_danger_events.0004.b.success.tt: "Ваши стражники отгоняют его"
 lotr_travel_danger_events.0004.b.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.b.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.c: "Отставить! Пусть он пройдёт через наши припасы."
 lotr_travel_danger_events.0004.d: "Одной лошади хватит."
 lotr_travel_danger_events.0004.e: "Отвлечь его загадкой."
 lotr_travel_danger_events.0004.e.success.tt: "Тролль отвлёкся"
 lotr_travel_danger_events.0004.e.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.e.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.riddle1: "...холм? Нет... Тыква!"
 lotr_travel_danger_events.0004.riddle2: "Что-то вроде... яйца?"
 lotr_travel_danger_events.0004.riddle3: "Дерево! Нет, оно не двигается..."
 lotr_travel_danger_events.0004.riddle4: "...может быть, какой-то камень?"
 # lotr_travel_danger_events.0004.riddle1: ""...Thirty white horses?""
 # lotr_travel_danger_events.0004.riddle2: ""...So empty it cant be filled?""
 # lotr_travel_danger_events.0004.riddle3: ""...A box without hinges?""
 # lotr_travel_danger_events.0004.riddle4: ""...Gnaws iron, bites steel?""
 lotr_travel_danger_events.0004.f: "[troll_fodder.GetFirstName] оставит ему пару конечностей."
 lotr_travel_danger_events.0004.g: "Присоединяйся к войску!"
 lotr_travel_danger_events.0004.g.success.tt: "Тролль убеждён"
 lotr_travel_danger_events.0004.g.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.g.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.h: "Бегите, глупцы!"
 lotr_travel_danger_events.0004.h.success.tt: "Вы убежали от тролля без вреда"
 lotr_travel_danger_events.0004.h.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.h.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.h.continue.tt: "Ваше путешествие продолжается"
 lotr_travel_danger_events.0004.j: "$lotr_travel_danger_events.0004.e$"

 ### Flies and Spiders ###
 lotr_travel_danger_events.0005.t: "$travel_event_prefix$ Мухи и пауки"
 lotr_travel_danger_events.0005.desc: "Раз уж мы решили пройти под могучими ветвями [Concept('mirkwood', 'Лихолесья')|E], перед нами предстаёт [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. Путешествие в основном неприятное, так как густой полог над нами, кажется, затмевает большинство источников света, будь то солнце или луна. \n\nМои спутники чувствуют себя неспокойно, и многие держат оружие наготове. «Во мраке за нами наблюдают глаза», - говорит мне тихим шёпотом [Select_CString(caravan_leader.IsFemale, 'караванщица', 'караванщик' )] [caravan_leader.GetFirstName], поворачивая голову с одной стороны тропы на другую.\n\nКак бы в подтверждение [caravan_leader.GetHerHis] слов, подлесок справа от нас на секунду раздвигается, обнажая пугающе большого паука..."
 lotr_travel_danger_events.0005.a: "Это существо может стать полезным союзником, если мы его захватим."
 lotr_travel_danger_events.0005.b: "Лучше постараться двигаться незаметно до конца нашего путешествия."
 lotr_travel_danger_events.0005.c: "Враги настигают нас! К оружию!"
 lotr_travel_danger_events.0005.d: "Не сходить с тропы! Что бы ни случилось, не сходить с тропы!"
 lotr_travel_danger_events.0005.e: "Мы... подождём здесь, пока оно не исчезнет..."
 lotr_travel_danger_events.0005.f: "Рубить лес, чтобы проложить новый путь вокруг него!"

 ### Shuddering Earth ###
 lotr_travel_danger_events.0006.t: "$travel_danger_prefix$ Дрожащая земля"
 lotr_travel_danger_events.0006.desc: "Пепельные равнины [Concept('mordor', 'Мордора')|E] простираются до самого горизонта, а его ямы извергают ядовитые испарения, заслоняющие унылый и темный горизонт. Однако по мере того, как мы путешествуем по владению [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], однообразие внезапно нарушается.\n\nЧёрная земля вздрагивает, сотрясаясь и отбрасывая нас назад. Мы едва успеваем встать на ноги, как земля яростно грохочет, а вокруг нас стремительно образуются новые ямы и пропасти, присоединяясь к уже существующим, которые теперь извергают ещё более мерзкие и гнилостные вещества высоко в воздух. У нас осталось совсем немного времени, чтобы действовать."
 lotr_travel_danger_events.0006.a: "Всем лечь на землю! Ухватитесь за что-нибудь!"
 lotr_travel_danger_events.0006.b: "Мы должны забраться повыше, на более твёрдую землю!"
 lotr_travel_danger_events.0006.b.success: "Вам удалось добраться до твёрдой земли"
 lotr_travel_danger_events.0006.b.success.tt: "Вы спаслись от натиска землетрясения"
 lotr_travel_danger_events.0006.b.failure: "Вам не удалось добраться до твёрдой земли"
 lotr_travel_danger_events.0006.b.failure.tt: "Вам не удалось избежать натиска землетрясения"
 lotr_travel_danger_events.0006.c: "О могущественный [darklord|E], я преклоняю колени перед тобой!"
 lotr_travel_danger_events.0006.c.tt: "Вы с позором бросаете часть своих вещей в яму, чтобы принести их в жертву [Concept('sauroncharacter', 'Саурону')|E], надеясь на спасение."
 lotr_travel_danger_events.0006.d: "О [ROOT.Char.GetFaith.HighGodName], прими моё почтение и жертву!"
 lotr_travel_danger_events.0006.d.tt: "Вы молитесь и бросаете в яму часть своих вещей в качестве жертвы, надеясь на спасение."

 ### Black Flags ###
 lotr_travel_danger_events.0007.t: "$travel_danger_prefix$ Чёрные флаги"
 lotr_travel_danger_events.0007.desc: "Когда я [Select_CString(ROOT.Char.IsFemale, 'путешествовала', 'путешествовал' )] со своей свитой вдоль побережья, самый зоркий из моей команды внезапно заметил мрачный корабль, плывущий к нам с поднятыми чёрными флагами. Когда они подошли ближе, стало ясно, что это банда пиратов! Пираты Белегаэра напали на нас, но пока я [Select_CString(ROOT.Char.IsFemale, 'собирала', 'собирал' )] все силы, что были со мной, капитан этого ужасного галеона [Select_CString(corsair_leader.IsFemale, 'крикнула', 'крикнул' )] с носа:\n\n«[Select_CString(corsair_leader.IsFemale, 'Рада', 'Рад' )] встрече, черви, набитые грошами! Отдавайте свою добычу, и [corsair_leader.GetName] с парнями сохранят вам головы!» [Select_CString(corsair_leader.IsFemale, 'Её', 'Его' )] команда хрипло смеется и начинает доставать оружие.\n\nЯ обдумываю варианты. [Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] ли я перепрыгнуть через борт, и тогда я и [corsair_leader.GetNameNoTooltip] сразимся не на жизнь, а на смерть? Сможем ли мы перехитрить [Select_CString(corsair_leader.IsFemale, 'её', 'его' )]? Возможно, мне даже удастся убедить [Select_CString(corsair_leader.IsFemale, 'её', 'его' )] присоединиться ко мне..."
 lotr_travel_danger_events.0007.a: "Получай, [corsair_leader.Custom2('InsultNoun', ROOT.Char)]!"
 lotr_travel_danger_events.0007.a.tt.duel_begins: "Вы вызовете персонажа [corsair_leader.GetNameNoTooltip] на поединок до смерти"
 lotr_travel_danger_events.0007.b: "Приготовьтесь к бою, вы, трюмные крысы! Схватить [Select_CString(corsair_leader.IsFemale, 'её', 'его' )]!"
 lotr_travel_danger_events.0007.b.tt.crit_success.tt: "Мастерская победа"
 lotr_travel_danger_events.0007.b.tt.crit_success: "Вы заключили персонажа [corsair_leader.GetNameNoTooltip] в темницу и захватили немного добычи"
 lotr_travel_danger_events.0007.b.tt.success.tt: "Победа"
