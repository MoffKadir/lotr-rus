 ### Nemesis Orc - Defeated ###
 lotr_travel_danger_events.0204.t: "$travel_danger_prefix$ Знакомое лицо"
 lotr_travel_danger_events.0204.desc: "Пока мой караван пробирается через [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] владения [ROOT.Char.GetCurrentLocation.GetName], я испытываю некое чувство страха, но не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], откуда оно взялось. Довольно скоро причина моего беспокойства обнаруживается, когда караван останавливается и отряд [Concept('orcs', 'орков')|E] преграждает путь. Их возглавляет [Select_CString(nemesis_orc.IsFemale, 'орчиха, которую', 'орк, которого' )] я узнаю почти сразу...\n\n«Ты! [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]ая мерзость!» - рычит [Select_CString(nemesis_orc.IsFemale, 'она', 'он' )], заметив меня. «[Select_CString(ROOT.Char.IsFemale, 'Вернулась', 'Вернулся' )], чтобы еще немного испытать боль? Я [Select_CString(nemesis_orc.IsFemale, 'рада', 'рад' )] помочь... если только на этот раз ты не предпочтешь заплатить пошлину, а не ввязываться в драку, в которой, как ты знаешь, вам не победить, да?»"
 lotr_travel_danger_events.0204.a: "Думаю, мы заплатим за проход..."
