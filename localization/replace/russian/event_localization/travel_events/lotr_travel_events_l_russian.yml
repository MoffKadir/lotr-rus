 #########################
 ### LOTR TRAVEL EVENTS ##
 #########################

 ### A Colossal Wreck ###
 lotr_travel_events.0001.t: "$travel_event_prefix$ Колоссальное крушение"
 lotr_travel_events.0001.desc: "Когда мы пробираемся через [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip|l] владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], я обнаруживаю, что отстаю от остальной группы. Через какое-то время я наконец-то натыкаюсь на колоссальные руины. Две огромные каменные ноги без тела стоят на пьедестале в пустыне.\nРядом с ними, наполовину погрузившийся в песок, лежит разбитый лик. На пьедестале высечены следующие слова:\n\n#V «Я АР-ЗИМАНДАС, ЦАРЬ ЦАРЕЙ: ВЗГЛЯНИТЕ НА МОИ ДЕЯНЬЯ И ДРОЖИТЕ!»#!\n\nРядом с этими колоссальными развалинами больше ничего не осталось. Одинокие и ровные пески простираются вдаль."
 lotr_travel_events.0001.a: "Мои тяготы пройдут с течением времени."
 lotr_travel_events.0001.b: "Возможно, упадок неизбежен."
 lotr_travel_events.0001.c: "Все мои великие деяния... неужели они тоже придут в упадок?"
 harad_0017_ozymandias_good_modifier: "Вдумчивое отражение"
 harad_0017_ozymandias_good_modifier_desc: "Ваши тяготы кажутся такими мелкими по сравнению с разрушительным действием времени."
 harad_0017_ozymandias_bad_modifier: "Неизбежный упадок"
 harad_0017_ozymandias_bad_modifier_desc: "Вы беспокоитесь, что всё, что вы создали, неизбежно придут в упадок."


 ### Encounter in Rhosgobel
 lotr_travel_events.0002.t: "$travel_event_prefix$ Леса Росгобеля"
 lotr_travel_events.0002.desc: "Сегодня моя свита пробирается через леса Росгобеля. Птицы щебечут, и мы довольно расслаблены.\n\nМожет быть, я могу немного отдохнуть в лесу в одиночестве? Они не кажутся особенно опасными, и это может быть хорошим моментом для размышлений."
 lotr_travel_events.0002.desc.sage: "Кто знает, может, я даже наткнусь на [Concept('sageofthewoods', 'Лесного мудреца')|E]!"
 lotr_travel_events.0002.a: "Нет времени! Мы идём дальше, друзья."
 lotr_travel_events.0002.b: "Время, проведённое в лесу, поможет мне очистить мой разум."
 lotr_travel_events.0002.btt: "Вы решаете провести некоторое время, прогуливаясь по лесам Росгобеля, и у вас есть шанс наткнуться на [Concept('sageofthewoods', 'Лесного мудреца')|E]."

 lotr_travel_events.0003.t: "$travel_event_prefix$ Ничего, кроме ежевики и коры"
 lotr_travel_events.0003.desc: "Вскоре я снова выхожу на дорогу, хотя эта дорога больше похожа на заросшую тропинку, и иду через Росгобель. Я провожу много часов в лесу, населённом необычайно большим количеством животных, и размышляю о своём правлении и жизни, которая осталась позади.\nВ конце концов я выхожу из леса и готовлюсь вернуться к своей свите."
 lotr_travel_events.0003.a: "По крайней мере, погода была хорошая."
 lotr_travel_events.0003.att: "Вы возвращаетесь к своим попутчикам"

 lotr_travel_events.0004.t: "$travel_event_prefix$ Встреча в Росгобеле"
 #lotr_travel_events.0004.desc.intro: "Вскоре я снова в пути и еду через Росгобель. Я провожу много часов в лесу, в котором, кажется, обитает необычно большое количество животных. Сегодня хороший день, хотя я едва различаю солнце сквозь кроны деревьев."
 lotr_travel_events.0004.desc.intro: "Я провожу много часов в лесу. Сегодня хороший день, хотя я едва различаю солнце сквозь кроны деревьев."
 lotr_travel_events.0004.desc.advice1: " Я ухожу всё глубже и глубже в лес и в конце концов понимаю, что [Select_CString(ROOT.Char.IsFemale, 'заблудилась', 'заблудился' )]. Через некоторое время я встречаю необычного странника, старика в бурой одежде и необычной шляпе. Кажется, он собирает грибы. Я приветствую его и почтительно спрашиваю, как выйти из леса. Он отвечает, хотя, кажется, не особо обращает на меня внимание:\n\n«Из леса? Очень просто, заберись на дерево и осмотрись! Ой, какой красавец...»\n\nЯ следую его совету и с вершины дерева вижу дорогу! Когда я спускаюсь, я понимаю, что он исчез, и до меня медленно доходит, что это мог быть сам [sageofthewoods|E]! Но имел ли его совет какой-то более глубокий смысл?"
 lotr_travel_events.0004.desc.advice2: " Пробираясь через густой кустарник, я вдруг замечаю странную фигуру, старика в бурой одежде и необычной шляпе, на некотором расстоянии. Кажется, он что-то бормочет кому-то другому, хотя я могу разобрать только несколько слов: \n\n«... ну-ну, хватит. Ха! Ты забавный. Да, возможно, они действительно являются вершиной творения!»\n\nПри ближайшем рассмотрении оказывается, что он кормит желудями большого оленя. Через несколько мгновений он, кажется, исчез между двумя деревьями. Постепенно до меня доходит, что это мог быть сам [sageofthewoods|E]! Но имеют ли его слова какой-то более глубокий смысл?"
 lotr_travel_events.0004.desc.advice3: " Наконец справа от меня из-за листвы появляется старик в бурой одежде и необычной шляпе, намереваясь перейти дорогу. Кажется, он расстроен. Когда мы пересекаемся, он бормочет что-то неопределенно направленное на меня:\n\n«Эй! Ты не видел мою шляпу? Хорошая шляпа, очень большая, но я её потерял!» Затем он издаёт долгий вздох. «Ну, это не может быть так далеко! В конце концов, она всегда появляется снова, так что, думаю, это не так уж плохо.»\n\nЯ слишком [Select_CString(ROOT.Char.IsFemale, 'озадачена', 'озадачен' )], чтобы ответить ему, и он быстро проходит мимо меня, уходя в глубь леса слева от меня. Постепенно до меня доходит, что это мог быть сам [sageofthewoods|E]! Но имеют ли его слова какой-то более глубокий смысл?"
 lotr_travel_events.0004.desc.advice4: " В конце концов я натыкаюсь на большой куст черники и решаю немного передохнуть. Пока я устраиваю импровизированное ягодное пиршество, мимо проходит своеобразный странник, старик в бурой одежде и необычной шляпе. Он тратит время на то, чтобы понюхать куст, затем срывает одну ягоду и кладёт её в рот.\n\n«Я люблю чернику, но она слаще, когда ешь её по одной!»\n\nПри этом, он продолжает пробираться через лес, вскоре исчезая между двумя деревьями. После того, как я [Select_CString(ROOT.Char.IsFemale, 'отдохнула', 'отдохнул' )], меня медленно осеняет, что это мог быть сам [sageofthewoods|E]! Но имеют ли его слова какой-то более глубокий смысл?"
 lotr_travel_events.0004.b: "Я слишком много в это вкладываю."
 lotr_travel_events.0004.a: "Но что это значит?"
 lotr_travel_events.0004.att: "Вы размышляете о более глубоком значении данного вам мудрого совета."
 lotr_travel_events.0004.a.success: "Вы успешно интерпретируете его мудрый совет"
 lotr_travel_events.0004.a.failure: "Вы не смогли интерпретировать его странные бредни"
 lotr_travel_events.0004.a.success.toast.t: "Вы успешно интерпретируете его мудрый совет"
 lotr_travel_events.0004.a.failure.toast.t: "Вы не можете интерпретировать его странные бредни"

 ### Travelling Past Fangorn ###
 lotr_travel_events.0005.t: "$travel_event_prefix$ Лес Фангорн"
 lotr_travel_events.0005.desc: "Когда моя свита проезжает мимо опушки глубокого и тёмного леса Фангорн, я не могу отделаться от чувства тревоги. Местные жители рассказали нам, что в этот лес никто не заходит, потому что там водятся привидения. Вдруг я вздрагиваю - что это был за шум? Неужели эти ветки шевелятся? Я замечаю, что мои придворные, похоже, тоже не на шутку встревожены и бросают испуганные взгляды."
 lotr_travel_events.0005.a: "Это просто лес! Возьмите себя в руки."
 lotr_travel_events.0005.a.tt: "Это всего лишь байки, несомненно."
 lotr_travel_events.0005.b: "Мы должны объехать..."
 lotr_travel_events.0005.b.tt: "Вы приказываете своей свите двигаться в обход, подальше от опушки леса."

 ### Endless Darkness ###
 lotr_travel_events.0006.t: "$travel_event_prefix$ Бесконечная тьма"
 lotr_travel_events.0006.desc.dwarfhold: "По большей части окутанные мраком, они не могут не восхищать нас произведениями гномьей каменной кладки, которые окружают нас, когда мы проходим через их залы."
 lotr_travel_events.0006.desc.caverns: "Лабиринтные пещеры кажутся бесконечными в темноте, ответвления и расщелины окружают нас со всех сторон."
 lotr_travel_events.0006.desc.outro: "\nКак долго мы путешествуем по этим туннелям? Прошло несколько дней? недель? месяцев? На такой глубине невозможно определить течение времени.\n\n[caravan_leader.GetFirstName] подходит ко мне: «Тьма кажется непроницаемой. Надеюсь, мы скоро выберемся из этой чёрной бездны».\n[caravan_leader.GetSheHe|U] безусловно, [Select_CString(caravan_leader.IsFemale, 'права', 'прав' )]. Недостаток солнечного света начинает действовать на меня, и я всё чаще замечаю, что мои мысли уходят в сторону. Мне нужно как-то отвлечься!"
 lotr_travel_events.0006.a: "Я нахожу темноту довольно успокаивающей."
 lotr_travel_events.0006.b: "[chasm_victim.GetFirstName] будет незаметно [Select_CString(chasm_victim.IsFemale, 'сброшена', 'сброшен' )] вами в пропасть."
 lotr_travel_events.0006.c: "По крайней мере, здесь есть интересные грибы!"
 lotr_travel_events.0006.d: "[Select_CString(beloved.IsFemale, 'Моя возлюбленная', 'Мой возлюбленный' )] [beloved.GetFirstName] согревает моё сердце в мыслях."
 lotr_travel_events.0006.d.tt: "То, что [beloved.GetName] обнимет вас, не даёт вам сойти с ума"
 lotr_travel_events.0006.e: "Давайте просто двигаться дальше..."

 ### Local Storyteller ###
 lotr_travel_events.0007.t: "[Select_CString(storyteller.IsFemale, 'Местная сказительница', 'Местный сказитель' )]: "
 lotr_travel_events.0007.desc.intro: "Путешествуя через владение [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], мы натыкаемся на то, как [storyteller.GetFirstNameNoTooltip], [Select_CString(storyteller.IsFemale, 'местная сказительница', 'местный сказитель' )] развлекает небольшую толпу:\n\n"

 lotr_travel_events.0007.tale_stout_men.t: "Стремительный народец и крепыши"
 lotr_travel_events.0007.tale_stout_men.desc: "#italic «В древние времена эти земли делили два народа. Равнины и леса населяли Стремительные люди, наши далёкие предки, которые могли бегать так же быстро, как осенние ветры. А в горах и на холмах жили Крепыши, которые были небольшого роста и сделаны из камня. Следствием их дружбы стало заключение договора из камня и бронзы, высеченный на великих воротах, разделяющих их родные земли.\n\nНо однажды появился глубокий, бесконечный туман, из которого вышли тёмные существа, чудовища и гоблины, стремящиеся уничтожить оба их королевства! Вместе два народа доблестно сражались, и после множества великих битв, которые не перечесть, они приблизились к тому, чтобы раз и навсегда победить своих врагов. Но в последний час перед победой чудовища разрушили врата договора.\n\nТеперь их узы были разорваны, Стремительные люди и Крепыши начали ссориться, и Крепыши зарылись глубоко в скалу, где стали размышлять вдали от солнца. Ужасы обрушились на Стремительных людей, те доблестно сражались, но в конце концов были вынуждены бежать в королевство Фэй, где король Весны и его жена, королева Осени, предоставили им убежище. Затем ужасы набросились на Крепышей, разрушая их оставшиеся жилища на вершинах гор и загоняя их всё глубже и глубже в землю, пока они не стали единым целым со скалой и не исчезли на многие века».#!"

 lotr_travel_events.0007.tale_woodmen_king.t: "Скорбь Фадерды"
 lotr_travel_events.0007.tale_woodmen_king.desc: "#italic «...это лишь одна из историй о том, как произошли [woodmen_scope.GetName|l]. Другая утверждает, что [tale_character_center.GetFirstNameNicknamedRegnal] [Select_CString(tale_character_center.IsFemale, 'была отдана', 'был отдан' )] своей матерью Лесному королю Фэй, который правил всеми деревьями в мире и сам был могучим дубом, размером с [mistymountains|E]! Мать отдала ему своего первенца на воспитание в обмен на богатство и множество лошадей, чтобы накормить своих голодающих детей. Тогда [tale_character_center.GetFirstNameNoTooltip] [Select_CString(tale_character_center.IsFemale, 'услышала', 'услышал' )] от короля Фэй следующие слова: «Ты будешь жить, как мы, твои волосы превратятся в листву, и ты никогда не умрёшь от старости, если будешь уважать лес и его деревья!»\n\nТак [Select_CString(tale_character_center.IsFemale, 'она выросла', 'он вырос' )] среди Фэй, питаясь их живицей. [Select_CString(tale_character_center.IsFemale, 'Она научилась', 'Он научился' )] говорить на языке ветров, создавать магические инструменты из мха и жить в лесу, как они. За двенадцать столетий у [Select_CString(tale_character_center.IsFemale, 'неё', 'него' )] родилось двенадцать сыновей и ещё больше, и [Select_CString(tale_character_center.IsFemale, 'она была коронована как королева', 'он был коронован как король' )] этого народа. Но когда [Select_CString(tale_character_center.IsFemale, 'её', 'его' )] дети выросли, они взяли свои топоры и начали рубить деревья, которые в страхе шептались и взывали к своему королю о помощи. Тогда король Фэй заговорил громовым голосом: «Ты [Select_CString(tale_character_center.IsFemale, 'нарушила', 'нарушил' )] наше доверие и [Select_CString(tale_character_center.IsFemale, 'срубила', 'срубил' )] своих старейшин! За это ты и твой род будут изгнаны к краю леса на двенадцать дюжин лун!»\n\n[tale_character_center.GetFirstNameNoTooltip] [Select_CString(tale_character_center.IsFemale, 'была подавлена, ибо понял, что не научила', 'был подавлен, ибо понял, что не научил' )] своих детей, как вести себя среди леса. [Select_CString(tale_character_center.IsFemale, 'Она и её', 'Он и его' )] сородичи переселились на опушку леса, где в течение двенадцати лун [Select_CString(tale_character_center.IsFemale, 'она заботилась', 'он заботился' )] об их воспитании. Но [Select_CString(tale_character_center.IsFemale, 'Она начала', 'Он начал' )] увядать, и [Select_CString(tale_character_center.IsFemale, 'её', 'его' )] листья стали оранжевыми и коричневыми. В конце концов [Select_CString(tale_character_center.IsFemale, 'она села', 'он сел' )] на холме на юге, откуда было видно сердце леса. [Select_CString(tale_character_center.IsFemale, 'Поражённая горем, она пустила корни и осталась', 'Поражённый горем, он пустил корни и остался' )] там, вечно нашёптывая ветрам свою печаль. Хотя [Select_CString(tale_character_center.IsFemale, 'она', 'он' )] никогда не узнает об этом, король Фэй давно простил [Select_CString(tale_character_center.IsFemale, 'её, ибо её', 'его, ибо его' )] дети были глубоко тронуты его учением и поклялись вечно защищать лес и его обитателей от вреда. [Select_CString(tale_character_center.IsFemale, 'Её', 'Его' )] потомки до сих пор живут там, теперь они известны нам как [woodmen_scope.GetName] [Concept('mirkwood', 'Лихолесья')|E]!»#!"

 lotr_travel_events.0007.tale_bridge_troll.t: "Тролль под Хрупким мостом"
 lotr_travel_events.0007.tale_bridge_troll.desc: "#italic «Послушайте классическую сказку о [Concept('troll', 'тролле')|E] под Хрупким мостом:\n\nУ моста жил-был тролль,\nВ пять раз больше нас, обычных людей!\nЭтого тролля звали Бак,\nИ хотя он жил в грязи,\nОн считал себя самым лучшим:\nИз всех троллей он был самым умным!\n\nОн придумал бы план, загадку, о горе,\nПароль, такой тайный, что даже он не знал!\nДнём и ночью он охранял старый мост,\nПотому что его хорошо знали от берега до берега.\nИ если кто-нибудь забредал в Кабаний хребет,\nОн вскакивал и хвастался:\n\n#V «Я могучий Бак, умнейший тролль!\nСейчас прозвучит моя загадка:\nЗнаете ли вы секретный пароль?\nЕсли нет, придётся заплатить троллий сбор!»#!\n\n#V «Да, знаю!»#!, - отвечал каждый прохожий,\nа затем отправлялся в свой весёлый путь.\nКаждый раз Бак\nОставался без сокровищ,\nозадаченный тем, что его загадка им известна!»#!"

 lotr_travel_events.0007.tale_captain_suramir.t: "Капитан Сурамир и затонувший народ"
 lotr_travel_events.0007.tale_captain_suramir.desc: "#italic «...во время своего девятого плавания капитан Сурамир попал в сильную бурю. Его занесло далеко от курса, ибо [storyteller.GetFaith.WaterGodName] затаил на него злобу за то, что он обесчестил его дочь, прекрасную нимфу Кирмаэль. Четыре его корабля были потоплены в ту ночь, но его флагман, «Ненадёжный», который он выкрал из Пепельной гавани нереид, выстоял. Его корпус от носа до кормы был окрашен жидким лунным светом, и поэтому он был непотопляем, ведь отражение луны никогда не может утонуть в волнах!\n\nЧерез семь дней и семь ночей он наткнулся на странную возвышающуюся фигуру, поднимающуюся из глубин. Это был давно выветрившийся от приливов и отливов царский лик, который возник рядом с его кораблём из глубоких, но прозрачных вод, а его высеченное из камня тело погрузилось ниже подбородка. Там, под волнами, он увидел великий город с большими куполообразными строениями, цитаделями великой красоты и высокими башнями, выходящими из глубины. Он наткнулся на великую затонувшую империю Ванва Аталантэ, где с давних пор в древнем великолепии обитали рыболюди.\n\nДавным-давно это было великое и могущественное владение людей, пока боги из зависти не пробудили великое морское чудовище, известное как Белраэг, которое разрушило великое королевство, а затем уснуло на его руинах, подняв воды и создав Белегаэр, как мы знаем его сегодня. Те немногие, кто выжил, стали известны как Аталантэатани, Затонувший народ, проклятый богами, чтобы стать существами глубин и никогда больше не дышать воздухом.\n\nКапитан Сурамир, конечно же, знал об этом, поскольку получил тайные знания прошлых веков от великого кракена Турмака во время его путешествия в океан под великими гротами Рорка. Вскоре его серебряный глаз заметил раздувшихся и чешуйчатых Затонувших людей, которые, как известно, топили моряков своими сетями, которые они забрасывали под волны. Он героически выхватил свою саблю и прыгнул за борт, с нетерпением вызывая их предводителя на дуэль умов...»#!"

 lotr_travel_events.0007.tale_weeping_pass.t: "Битва за Плачущий перевал"
 lotr_travel_events.0007.tale_weeping_pass.desc: "#italic «Позвольте мне рассказать о битве за Плачущий перевал. Говорят, в это время за [khand|E] сражались несколько военачальников, некоторые из которых заключили союз, который [Select_CString(tale_character_left.IsFemale, 'возглавила', 'возглавил' )] [tale_character_left.GetFirstNameNicknamed], объединив под своей властью большую часть державы [GetTitleByKey('k_upper_khand').GetNameNoTier]. Ему противостоял [tale_character_right.GetFirstNameNicknamed], заслуживший репутацию хитрого наёмника в бытность свою капитаном отряда, известного как Срединное воинство. Эти двое собрали свои войска возле провинции [GetTitleByKey('b_obamarl').GetNameNoTier]. [tale_character_left.GetFirstNameNoTooltip] заручился поддержкой такого правителя, как [tale_character_center.GetFirstNameNicknamed], а также нескольких мелких владык, двух отрядов наёмников, известных как «Бесшабашные сыновья» и «Воинство кровопийц», и значительное число вспомогательных войск из числа [igath_scope.GetCollectiveNoun]ого племён. [tale_character_right.GetFirstNameNoTooltip] уступал в численности три к одному, но его воины были гораздо опытнее, ведь большую часть своей жизни они провели в стычках с [chelkari_scope.GetCollectiveNoun]ими налётчиками. Говорили также, что они могут обогнать тяжёлого всадника в пешем строю.\n\nБитву начал [tale_character_left.GetFirstNameNoTooltip], приказавший своим воинам броситься на врага, надеясь задавить их числом. И тут же через брешь донёсся громоподобный звук тысяч воинов, рвущихся в бой. [tale_character_right.GetFirstNameNoTooltip], конечно, надеялся на это и за неделю до этого принёс в жертву Тумраки двадцать орлов, в надежде снискать его расположение. Земля стала мокрой и вязкой от прошедшего дождя, и с булькающим звуком, похожим на звук открывающейся раны, большая часть почвы начала отходить и сползать вниз, заставив нападающих отшатнуться, а людей - спотыкаться и падать. Затем [tale_character_right.GetFirstNameNoTooltip] рассеял строй, и его легкобронированные ветераны, некоторые верхом на лошадях, обрушились на врагов в кровавом танце смерти, сея смерть повсюду, куда бы они не пришли. Пока его командиры пытались восстановить порядок среди дрогнувших солдат, [tale_character_left.GetFirstNameNoTooltip] был вынужден заблаговременно ввести в бой резервные части, чтобы бойцы на передовой не сбежали с поля боя.\n\nОднако [tale_character_left.GetFirstNameNoTooltip] не ожидал, что среди них окажется враг. [tale_character_center.GetFirstNameNoTooltip], осознав, что битва проиграна, предал его с уцелевшими остатками Воинства кровопийц. Четыре часа спустя, [tale_character_left.GetFirstNameNoTooltip] был убит. [tale_character_right.GetFirstNameNoTooltip] получил его голову с хребтом в качестве дара, и договор был подписан. Восемнадцать тысяч воинов лежали мёртвыми в грязи, а пески Врат и поныне красны от их крови. Бывшие владения, которыми когда-то правил [tale_character_left.GetFirstNameNoTooltip] были разделены между его врагами, и [tale_character_center.GetFirstNameNoTooltip] поглотил оставшиеся кланы, включив их в состав своей державы. Так что, молодые воины, прислушайтесь к моему предупреждению: Благоприятная местность и преданность богам помогут вам добиться победы! [tale_character_right.GetFirstNameNoTooltip] и в последующие три десятилетия с честью правил в центральном Кханде, почти безраздельно властвуя, если не считать Войны Бродячих Кобыл - но это история для другого раза...»#!"

 lotr_travel_events.0007.tale_razarac.t: "Огненное Зеркало"
 lotr_travel_events.0007.tale_razarac.desc: "Давным-давно, в те времена, когда свет луны светил ярче, а ветры были слаще, под пышными землями древнего [Concept('harad', 'Харада')|E] пробудилось тёмное существо. Разарак, «Повелитель засухи», - так называли его старые племена. Ибо куда бы он ни приходил, он приносил боль и разрушение. Его дыхание вызывало засуху, а взгляд иссушал оазисы. Боги прокляли его за бесконечную жажду, которую никогда не утолить. Поэтому оно искало жизнь везде, где только могло, чтобы осушить источники и реки [Concept('harad', 'Харада')|E]. Много племен было уничтожено, пока Повелитель Ветров не услышал крики народов и не выбрал поборника, храброго и решительного, чтобы противостоять демону. Его звали Тарик, и он был легендарным мечником - в бою он владел тремя скимитарами, и ни один враг не ускользал от его клинка. Благословленный Повелителем Ветров, он отправился в путь, чтобы встретиться с тварью и уничтожить её, направляемый на своём пути великим орлом. После долгих дней пути он наконец нашёл Разарака в руинах великого города. Всего несколько дней назад это был шумный город, а теперь его разрушило зло.\n\n«Сразись со мной, Разрушитель!», - призвал Тарек, ибо он был человеком немногословным и владеющим многими клинками. Разарак смотрел на него с отвращением и молчал, ибо горло его давно пересохло и он был не в состоянии говорить. Завязалась великая битва, и Тарек стремительно вступил в бой со своим врагом, рассекая его быстрыми, как ветер, клинками. Они сражались ожесточённо, от рассвета до заката и от заката до рассвета. Демон наносил удары с силой земли и грома, его шкура была свирепой и грубой, как песок. Но удары Тарека были быстры, точны и, подобно ударам скорпиона, всегда находили слабое место. В конце концов он достаточно измотал Разарака, чтобы нанести завершающий удар. Он повалил его и пронзил его поганое сердце, уничтожив его смертную форму. Но тварь была хитра, и с последним хриплым вздохом она унесла свой дух в песчаные ветры, где, как он знал, ни один смертный не сможет причинить ей вреда.\n\nНо Повелитель Ветров предвидел это и велел своему орлу прошептать Тареку на ухо истинное имя ветров, чтобы тот мог преследовать демона. И вот, где бы ни отдыхал мерзкий дух Разарака, чтобы восстановить свои силы, Тарек обязательно вскоре последует за ним и снова вступит в бой в великом цикле. Их божественные поединки предстают перед нами как великие песчаные бури, несущие засуху и разрушения. Они наиболее ожесточённы в дюнах, где была повержена форма Разарака, на вечном поле битвы, известном теперь как Море Дюн, как Зеркало Огня."

 lotr_travel_events.0007.tale_kings_kettle.t: "Видящий котёл старого короля"
 lotr_travel_events.0007.tale_kings_kettle.desc: "To be told..." #Juke TBD
 
 lotr_travel_events.0007.tale_vision_iunast.t: "Видение Юнаста"
 lotr_travel_events.0007.tale_vision_iunast.desc: "#italic «Приступим к легенде #L [tale_character_center.GetFirstName]а#! с его скромного происхождения. Родившись в холмах у [GetTitleByKey('d_briy_miyesec').GetNameNoTier], он, как и некоторые из вас, был простым пастухом, обеспечивающим своё племя в те дни. На девятнадцатом году жизни, когда он спал под ярким небом и полной луной, ему приснился смутный странный сон: он увидел пламя, обжигающе горячее и одновременно горько-холодное, грозившее сжечь пальму.\n\nОн почти не думал об этом, пока спустя целый цикл ему не приснился тот же сон, но на этот раз более ясный, и он снова спал под звёздным лунным небом: он увидел огненную фигуру, немыслимо тёмную и в то же время ослепительно яркую, уничтожающую прекрасный сад.\n\nНаконец, по прошествии ещё одного цикла, он получил третье и последнее видение, и его цель стала ясна: он увидел бога солнца Ватру, немыслимо могущественного и в то же время на мгновение уязвимого, опустошающего своим присутствием земли [Concept('farharad', 'Дальнего Харада')|E]. Именно тогда ему открылась Ладнока, богиня луны, супруга Ватры и заботливая мать человечества: слова, которые она выбрала, известны только Юнасту, но её голос, как говорят, был так прекрасен, что, проснувшись, он обнаружил себя лежащим в цветущем поле. Его цель была ясна: он должен был отправиться в Страну солнца, где Ватра пытался направить свою ужасную силу в физическое воплощение. Пока он там формировался, он всё ещё был уязвим, и, возможно, его планам ещё можно было помешать.\n\nНа следующий день Юнаст рассказал своему племени о божественной миссии, которую он получил от богини. Гатара, который в те дни уже был известным провидцем и мистиком, быстро объявил, что будет сопровождать своего друга детства в его трудном путешествии на север. В общей сложности двенадцать человек из его племени, его самые близкие друзья, решили сопровождать его в путешествии. Но только один из них вернётся, чтобы рассказать об этом...»#!"
 
 lotr_travel_events.0007.tale_crag_king.t: "Юнаст и Скальный король Уза"
 lotr_travel_events.0007.tale_crag_king.desc: "#italic «Вырвавшись из когтей Хиз-Арель, ужасающей Владычицы пантер, [tale_character_center.GetFirstName] продолжил свой великий путь в Страну солнца. Через день пути дороги привели его в великие скалистые земли Уза. Со всех сторон землю пронзали коварные, зазубренные скальные шипы. В конце концов его отряд остановило огромное и могучее чудовище, грубо высеченное из самой скалы. «Стой!» - прорычал грубый воин своим ужасным голосов. «Я - [tale_character_right.GetFirstName], и я правлю этой землёй. Все, кто проходит через Уз, должны платить мне положенную дань, иначе их постигнет мой гнев!»\n\n«Давайте разберёмся с этим мерзким чудовищем, о избранник Лунной госпожи!» - в один голос изрекли спутники Юнаста - Хайрек и Пазык. Но Юнаст знал, что они свирепы и безрассудны, и попросил их подождать.\n\nСкальному королю герой предложил трёх коз из своего стада, которых тот быстро проглотил. «Ещё!» - воскликнул он, прекрасно понимая, что никогда не насытится, ведь он был сотворён по воле Ватры, чтобы помешь миссии Юнаста. Тогда герой предложил Скальному королю ещё трёх коз, которых тот так же быстро сожрал. «...Ещё!» - потребовал чудовищный король, раздувшийся и неповоротливый. Его спутники забеспокоились, но хитрый Юнаст лишь улыбнулся. В третий раз он подчинился, и ещё три козы были быстро съедены.\n\nКак раз в тот момент, когда раздувшийся и совершенно неподвижный Скальный король поднял голос, чтобы вновь потребовать дань, Юнаст поднял свою поклажу и обратился к своим спутникам. «Глядите, как жадность искалечила его! Теперь он не более чем камешек на краю дороги». Хайрек, Пазык и остальные спутники начали смеяться, продолжив свой путь. А чудовище, не в силах сдвинуться с места, лишь злобно смотрело на них. Говорят, что оно так раздулось, что вскоре снова превратилось в камень».#!"
 
 lotr_travel_events.0007.tale_merchant_prince.t: "Торговый принц из Дара"
 lotr_travel_events.0007.tale_merchant_prince.desc: "#italic «...Но наш отважный герой не дрогнул! В течение четырнадцати дней Тири принуждал, подкупал, перехитрил и соблазнял, проходя через дворы лордов, пока, наконец, окончательный проект торговой сделки не был согласован обеими сторонами. Сделка между начинающим торговым принцем Тири и инжирными владыками [GetTitleByKey('b_dezful').GetNameNoTier] поможет им обоим стабилизировать свои доли на северном маршруте и противостоять растущему влиянию Корлейской гильдии в продолжающемся торговом споре за оливки.\n\nНо инжирные владыки не понимали, что флот Тири на самом деле насчитывал сорок три корабля, на восемнадцать больше, чем он сообщил во время переговоров. Согласившись поделиться с Тири грузовым пространством своего большого флота на ближайшие три луны, они позволили ему освободить гораздо больше складских помещений, чем они предполагали, что позволило Тири ловко начать своё следующее предприятие по экспорту дешёвой расписной глиняной посуды из южного Тулванга (что было последней модой среди харадунай!) в [thanihazad|E], где подозрительно хорошо финансируемые недавние нападения пиратов в районе мыса Дрэл создали дефицит товаров, обычно импортируемых из портов крайнего Юга.\n\nБлагодаря этой хитрой стратегии торговый принц быстро окупил свои вложения, воодушевлённый отличным обменным курсом [Concept('bellakarean','беллакарского')|E] серебра, а также низким рыночным налогом во владении [GetTitleByKey('b_har_shulam').GetNameNoTier] в то время, всего около двух к тридцатой. Его вложения быстро утроились, и он также получил несколько даров от принцев [Concept('sevenlands','Семи земель')|E], в первую очередь стадо прекрасных летающих львов, которых он позже продал...»#!\n\nВы замираете от бесконечного лепета сказителя о купеческих делах. Неужели эти купцы не думают ни о чём другом?"
 
 lotr_travel_events.0007.tale_zildur_king.t: "Король Зильдур Эйлендильсон"
 lotr_travel_events.0007.tale_zildur_king.desc: "#italic «Слушайте! Люди Леса и Долины,\nСоберитесь все вместе,\nДабы услышать печальную и тоскливую историю\nО [Concept('isildur','короле Зильдуре')|E] [Concept('elendil','Эйлендильсоне')|E]\n\nЗильдур пришёл с [Concept('numenor','затонувшего острова')|E]\nС [Concept('palantir','семью камнями')|E], серебряным деревом,\nДабы основать [Concept('realm_in_exile','королевство в изгнании')|E]\nМежду горами и морем.\n\nНо [Concept('sauroncharacter','Тьма')|E] возвысилась в огненной земле\nИ поразила сына отца Зильдура.\nОсаждённый в землях у реки\nКороль Каменных земель, Эйнарион\n\nчерез горный перевал и речную долину\nС эльфийским королём, его ярким копьём,\nПришёл король Зильдур, с бледным знаменем.\nИх воинства собрались в полном могуществе.\n\nДесять долгих лет они вели свою борьбу,\nПока Тьма не оступилась и башня не пошатнулась.\nХотя [elf|El] и каменный король потеряли свою жизнь,\nКороль Зильдур, с захваченной вирой\n\nОтправился на север в спешке и гордыне,\nДабы найти могучий очаг и зал.\nОрда [Concept('goblin','гоблинов')|E] всё же сдерживала его шаг.\nТогда, увы, он встретил своё падение.\nХотя пришли лесовики, они явились слишком поздно,\nНо оттеснили гоблинов от грабежа.\nИ король Зильдур встретил свою судьбу,\nУтонул, как и его остров, что давно потерян. \n\nТак слушайте же, люди Леса и Долины,\nНе будьте слишком смелы, когда битва выиграна,\nДабы не разделить судьбу героя сей легенды,\nКороля Зильдура Эйлендильсона»."
 
 lotr_travel_events.0007.tale_sirayn_storm.t: "Когда разразилась буря" #by Juke
 lotr_travel_events.0007.tale_sirayn_storm.desc: "#italic «В давно минувшую эпоху шесть кланов населяли [GetGeographicalRegion('middleearth_harad_bayoformal_sirayn').GetName], все из одного гордого рода, слишком далёкого, чтобы о нём рассказывать. Земля была богатой и пышной, а приданое ещё не было получено. Каждый из этих кланов строил свои жилища из полученных даров: кости, золота, меди, драгоценностей, бронзы и пряностей.\n\nВсе было хорошо в течение двадцати и шести циклов, но в конце концов случилось несчастье. По Даре поползли слухи о великом наводнении далеко на западе, и Остров беспокойных ветров был поглощён стихией. Это было ужасно, ведь в те дни остров был известен как место обитания множества духов ветра, которые были ужасно расстроены. Духи ветра плыли по течениям на восток, пока не наткнулись на людей дождя - народ, обитавший у тех берегов, - и набросились на них. Некоторые даже бежали в залив, где нашли убежище и предупредили кланы о своих гневных сородичах на западе.\n\nЛюди дождя, гневливые и расстроенные, превратились в людей бури - недобрый народ со злобным нравом. Той весной они пронеслись через горы на восток, в Сирайн, где у кланов было мало времени на подготовку. Когда на них обрушилась буря, им оставалось только молиться богам и искать убежища в своих домах. В своей слепой ярости хищная буря обрушилась сначала на воинственных людей, разрушив их дома из кости. Затем были уничтожены гордецы, построившие свои дома из драгоценностей и драгоценных металлов, хотя они тоже храбро сражались. Наконец, буря обрушилась на последний клан - тех, кто построил свой дом из пряностей. Но когда она разнесла их жилище, готовясь поглотить и их, ветер подхватил их пряности, и они быстро распространились по всей территории бури. Люди бури, совершенно не готовые к этому, начали сильно чихать. Их штурм быстро рухнул, и воины, никогда не пробовавшие ничего столь крепкого, обратились в бегство.\n\nТеперь настала очередь бури. Клан отпраздновал это большим пиром, а затем решил действовать быстро - они отправились в путь большими караванами и разнесли свои дары всем народам мира. Куда бы они ни приходили, люди встречали их с радостью, ведь они тоже страдали от грома, ветра и молний. Через три цикла мир был освобожден, и боги были довольны. Однако теперь, когда они делились с миром своими пряностями, у них не осталось достаточно средств, чтобы построить себе дом. Тогда боги сжалились над ними и в качестве дара научили их [Concept('mud_masonry', 'глинобитной кладке')|E], чтобы они могли лепить из земли абстрактные формы».#!"

 lotr_travel_events.0007.tale_seafolks_folly.t: "Безрассудство народов моря" #by Juke
 lotr_travel_events.0007.tale_seafolks_folly.desc: "#italic «На заре времен боги создали [Concept('men', 'людей')|E] и решили разделить мир между ними. Некоторые люди увидели выбранные для них дикие земли и обрадовались, понимая, что трудности, которые им предстоит пережить, могут только усилить радости, которые они испытают. Но некоторые люди были разгневаны и потребовали от богов даровать им лучшие земли, более пышные и богатые драгоценностями и серебром. В своей мудрости боги решили исполнить их просьбу, желая научить их смирению. Нади-манье поручил Иранди, малому богу яркой звезды на небосводе, поднять из моря остров, более прекрасный и процветающий, чем любой другой. Его деревья были сделаны из мрамора, цветы расцвели драгоценными камнями, а в центре острова возвышалась гора, выше всех остальных, на которой восседал великий орёл Алруз, чтобы следить за ними. Этот остров боги даровали недовольным людям.\n\nНекоторое время оба народа жили в мире. Но вскоре народы Острова пришли в упадок и стали недовольны. Хотя они жили в большом избытке, им не нужно было трудиться для этого, и поэтому самые сладкие плоды для них были кислыми. Они обращали свои праздные руки друг против друга, вечно недовольные своим бесконечным изобилием. Так предвидели боги, верша суд через пассивность. Но в тени пробудился от дремоты древний зверь - золотой дракон Афараз. Он соблазнил большинство народов Острова, и в обмен на знания о создании кораблей, способных пересечь Великое море, они сделали его своим королём. Дыхание Афараза окутало остров густым туманом, и поэтому старый орёл Алруз не мог видеть, что замышляется внизу.\n\nДвижимые бесконечной завистью, [Concept('sea_peoples', 'народы моря')|E] обрушились на берега [Concept('middleearth', 'Средиземья')|E]. Они истребляли и обращали в рабство бежавших от берегов людей и уносили их богатства, чтобы ублажить своего вечно голодного короля в его золотой сокровищнице. Остров потяжелел от их запятнанных трофеев и обагрился кровью. В отчаянии угнетённые народы материка обратились с молитвой к Нади-манье, который послал сильный ветер. В тот же миг туман рассеялся, и Алруз с ужасом увидел, что творится под его присмотром. Он отправил свою стаю на материк вместе с немногими людьми, всё ещё верными богам. Затем Орёл и Дракон сразились, и в ярости их битвы остров, и без того трещавший под тяжестью сокровищ народов моря, наконец рухнул, утопив злых людей, погубивших его, в знак божественной кары».#!"

 lotr_travel_events.0007.t.fallback: "Неизвестная история"
 lotr_travel_events.0007.desc.fallback: "Рассказчик рассказывает непонятную сказку из местного фольклора, полную непонятных мне отсылок, а местный диалект довольно трудно расшифровать. Однако эмоции и жестикуляция рук просто завораживают!"

 lotr_travel_events.0007.a: "Давайте немного постоим и послушаем."
 lotr_travel_events.0007.b: "Вперёд, не будем терять времени!"


 # Wonders of a Mallorn Forest
 lotr_travel_events.0008.t: "$travel_event_prefix$ Чудеса леса мэллорнов"
 lotr_travel_events.0008.desc: "Многое было сказано о возвышающихся деревьях мэллорнов в [lothlorien|E]Лотлориэне, но только сегодня мы столкнулись с ними во владении [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. В полдень мы добрались до лесных опушек, и, кажется, целый час моя свита путешествовала без слов.\n\nВокруг нас возвышаются огромные серебристо-серые стволы, устремлённые к небу. Некоторые из них простираются даже за пределы видимости, на их ветвях и сучьях произрастают золотые листья, сквозь которые падают лучи сверкающего света.\n\nТишина прерывается, когда один из членов моей свиты восклицает, положив руку на ствол дерева.\n\n«Я чувствую, как в этом дереве протекает жизнь!», - говорит он взволнованно. «[Select_CString(ROOT.Char.IsFemale, 'Госпожа', 'Господин' )], позвольте нам устроить здесь привал на несколько минут, ведь я никогда не видел такой красоты в мои дни»."
 lotr_travel_events.0008.a: "Это, безусловно, чудесное зрелище."
 lotr_travel_events.0008.b: "Разобьём лагерь, чтобы в полной мере насладиться этим зрелищем."
 lotr_travel_events.0008.c: "Эти большие деревья не стоят того, чтобы с ними возиться."
 lothlorien_mallorn_modifier_positive: "Поражён лесом мэллорнов"
 lothlorien_mallorn_modifier_positive_desc: "Этот персонаж был поражён чудесами леса мэллорнов во время своих путешествий."
 lothlorien_mallorn_modifier_positive_2: "Потрясён лесом мэллорнов"
 lothlorien_mallorn_modifier_positive_2_desc: "Этот персонаж полностью потрясён чудесами и величием леса мэллорнов."
 lothlorien_mallorn_modifier_negative: "Безразличие к лесу мэллорнов"
 lothlorien_mallorn_modifier_negative_desc: "В отличие от многих других, этот персонаж не смог узреть красоту природы."

 ### Call of the Sea ###
 lotr_travel_events.0009.t: "$travel_event_prefix$ Зов моря"
 lotr_travel_events.0009.desc: "Когда мы приближаемся к побережью, мой взгляд обращается к морю. На него приятно смотреть. \n\n[Select_CString(caravan_leader.IsFemale, 'Моя караванщица', 'Мой караванщик' )], [caravan_leader.GetFirstName], подходит ко мне. «Неплохое зрелище, не правда ли?», - спрашивает [caravan_leader.GetSheHe]. \n\nЯ размышляю, что ответить."
 lotr_travel_events.0009.desc.solo: "Когда мы приближаемся к побережью, мой взгляд обращается к морю. Оно поражает воображение. Я думаю о том, сколько воды нужно, чтобы заполнить хотя бы малую часть моря, через которое сейчас проходит наш корабль. \n\n«Невероятное зрелище», - бормочу я про себя."
 lotr_travel_events.0009.a: "Как же я хочу снова командовать своим кораблём..."
 lotr_travel_events.0009.b: "Я... глубоко [Select_CString(ROOT.Char.IsFemale, 'тронута', 'тронут' )] зовом чаек..."
 lotr_travel_events.0009.c: "Это действительно прекрасное зрелище! Я хочу остаться здесь ещё на некоторое время."
 lotr_travel_events.0009.d: "Да, да. Но мы должны идти дальше."
 lotr_travel_events.0009.e: "Это... странным образом успокаивающее зрелище."

 ### Ruins of the North ###
 lotr_travel_events.0010.t: "$travel_event_prefix$ Руины севера"
 lotr_travel_events.0010.desc: "Пока мы пересекаем безлюдные [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], мы со свитой проходим мимо руин на соседнем холме и останавливаемся, чтобы немного передохнуть.\n\nИстрёпанные ветрами колонны стоят на возвышении, а остатки разрушающихся стен выглядывают наружу. В центре руин остались дороги и тропинки, а фасады башен и домов всё ещё стоят.\n\nЭто [Concept('arnorian', 'арнорские')|E] руины, разбитые и почерневшие от дождя, ветра и времени, одиноко стоящие в пустоте."
 lotr_travel_events.0010.a: "Пусть все жалкие дунэдайн канут в небытие!"
 lotr_travel_events.0010.b: "Я помню старые истории о королях, правивших этими землями."
 lotr_travel_events.0010.c: "Пусть я буду сражаться так же доблестно, как мои предки!"
 lotr_travel_events.0010.d: "Нам следует задержаться и изучить эти руины."
 lotr_travel_events.0010.e: "Кто знает, какие призраки ещё таятся здесь, - не будем медлить!"
 lotr_travel_events.0010.f: "Возможно, здесь до сих пор лежат забытые ценности!"

 ### Haunted Ruins in Eregion ###
 lotr_travel_events.0011.t: "$travel_event_prefix$ Руины с привидениями"
 lotr_travel_events.0011.desc: "Когда мы останавливаемся на привал, пересекая [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] владения [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], я замечаю, что [Select_CString(caravan_leader.IsFemale, 'караванщица', 'караванщик' )] [caravan_leader.GetFirstName] [Select_CString(caravan_leader.IsFemale, 'уставилась', 'уставился' )] на карту и обеспокоенно бормочет про себя.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetNameRegnal], я [Select_CString(caravan_leader.IsFemale, 'просматривала', 'просматривал' )] наш маршрут, когда [Select_CString(caravan_leader.IsFemale, 'поняла', 'понял' )], что наш лагерь сегодня будет разбит прямо у границ древнего [Concept('elven', 'эльфийского')|E] поселения, ныне лежащего в руинах», - говорит [caravan_leader.GetSheHe]. «Я [Select_CString(caravan_leader.IsFemale, 'слышала', 'слышал' )] много историй о древних призраках, которые до сих пор преследуют эти руины, охотясь на ничего не подозревающих путников!»\n\n[caravan_leader.GetSheHe] успокаивается, а затем продолжает. «Я [Select_CString(caravan_leader.IsFemale, 'нашла', 'нашёл' )] более длинный, альтернативный маршрут, который обходит руины стороной! Прошу вас, [Select_CString(ROOT.Char.IsFemale, 'госпожа', 'господин' )], не стоит беспокоить этих древних призраков»."
 lotr_travel_events.0011.a: "Вы правы, лучше не рисковать."
 lotr_travel_events.0011.b: "Такие трусы, как вы в моём окружении, будут жестоко наказаны."
 lotr_travel_events.0011.b.tt: "Вы отчитываете [Select_CString(caravan_leader.IsFemale, 'свою проводницу', 'своего проводника' )] за трусость и решаете разбить лагерь у руин"
 lotr_travel_events.0011.c: "Не глупите, это будет совершенно безопасно."
 lotr_travel_events.0011.c.neutral: "Вы хорошо выспались"
 lotr_travel_events.0011.c.failure: "Вы слышите жуткие звуки ночью"
 lotr_travel_events.0011.c.critical.failure: "В руинах до сих пор царит ужас"

 ### A Gruesome Cave ###
 lotr_travel_events.0012.t: "$travel_event_prefix$ Жуткая пещера"
 lotr_travel_events.0012.desc: "Путешествуя сквозь [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] провинции [ROOT.Char.GetCurrentLocation.GetTerrain.GetName], мы с моими спутниками наткнулись на мрачную картину. По залитой кровью земле разбросаны тела, а неподалеку, прямо у входа в темную пещеру, лежит труп большого медведя.\n\nКажется, ясно, что здесь произошло. Зверь расправился с этими невезучими душами, но не без смертельных ран, от которых он вскоре скончался. Когда я осматриваю мертвых путников, мой взгляд устремляется к пещере. Наверняка именно оттуда пришел этот страшный медведь?\n\n«Мы не можем оставить их вот так», - замечает один из моих спутников, возвращая мое внимание к телам убитых."
 lotr_travel_events.0012.a: "Думаю, нам пора идти. Еще один медведь может быть рядом."
 lotr_travel_events.0012.b: "Вы правы. Мы похороним мертвых."
 lotr_travel_events.0012.c: "Мы вычистим эти кости!"
 lotr_travel_events.0012.d: "Кажется, эту пещеру стоит исследовать..."
 lotr_travel_events.0012.d.tt: "Вы прерываете свое путешествие, чтобы исследовать темную пещеру"

 ### A Gruesome Cave - Follow-up ###
 lotr_travel_events.0013.t: "$travel_event_prefix$ Обитатель медвежьей пещеры"
 lotr_travel_events.0013.desc: "Исследование пещеры заняло больше времени, чем я [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )]. Пещера уходит все глубже в отвесную скалу, на каждом углу видны явные следы медвежьей деятельности. Повсюду валяются черепа, как людей, так и животных, а запах стоит невыносимый. Наконец мы достигаем последней камеры.\n\nЛуч света освещает пещеру, просачиваясь внутрь через большую трещину над нашими головами. Мы находим еще одного мертвого медведя, полуразложившегося, а рядом с ним... ребенка.\n\n[Select_CString(cavechild.IsFemale, 'Она', 'Он' )] выглядит [Select_CString(cavechild.IsFemale, 'дикой', 'диким' )], но не [Select_CString(cavechild.IsFemale, 'агрессивной', 'агрессивным' )]. Сделав несколько шагов ближе, я понимаю, что при желании смогу убедить ребенка пойти с нами."
 lotr_travel_events.0013.a: "Здесь нам нечего делать."
 lotr_travel_events.0013.b: "Идем, [Select_CString(cavechild.IsFemale, 'малышка', 'малыш' )]. Теперь ты в безопасности."

 ### The Tongue of Trade ###
 lotr_travel_events.0014.t: "$travel_event_prefix$ Язык торговли"
 lotr_travel_events.0014.desc: "На торговых путях Внутреннего [Concept('harad', 'Харада')|E] встречается множество людей, объединенных взаимным желанием торговать. Это даже привело к развитию жаргонных языков, используемых для облегчения обмена товарами, несмотря на разное происхождение [Concept('trans_haradric_merchants', 'купцов')|E]. Когда я отдыхаю в своей палатке, [Select_CString(ROOT.Char.IsFemale, 'утомлённая', 'утомлённый' )] долгим днем путешествия, а передо мной [ROOT.Char.Custom('GetExpensiveDessert')], [tongue_merchant.GetFirstName] делает мне интересное предложение:\n\n«Я могу научить вас языку соли, специй и золота, бесценному навыку в дороге. Вы сможете научиться говорить уклончиво, выдать корягу за слоновую кость и распознавать второй зов верблюда. Разумеется, в обмен на некоторую компенсацию»."
 lotr_travel_events.0014.a: "Я его знаю, но это было давно."
 lotr_travel_events.0014.b: "Научи меня, [tongue_merchant.GetFirstName]."
 lotr_travel_events.0014.c: "Меня больше интересует язык твоего народа."
 lotr_travel_events.0014.d: "Давай просто насладимся этой минутой передышки."

 ### Nothing Ever Happens ###
 lotr_travel_events.0015.t: "$travel_danger_prefix$ Никогда ничего не происходит"
 lotr_travel_events.0015.desc: "[Concept('thanihazad', 'Тани-Хазад')|E] существует так, словно его не тронуло время, он прочно вошёл в анналы истории, хотя в других местах мир вращается вокруг них, а великие принцы [Concept('balan_lai', 'Балан-лай')|E] играли в свои игры рукопожатий и ударов в спину дольше, чем кто-либо из памяти живущих.\n\nОднако, путешествуя по Семи землям, мы натыкаемся на [Select_CString(bored_peasant.IsFemale, 'одну', 'одного' )] из местных [Select_CString(bored_peasant.IsFemale, 'жительниц', 'жителей' )] - [bored_peasant.GetCulture.GetCollectiveNounNoTooltip|l][Select_CString(bored_peasant.IsFemale, 'ую женщину, которая', 'ого мужчину, который' )] лениво сидит на бревне, болтает ногами и смотрит в небо. Когда мы подходим к [Select_CString(bored_peasant.IsFemale, 'ней, она', 'нему, он' )] лениво машет нам, приглашая насладиться тишиной дня. «Вчера мне было скучно, сегодня мне скучно... Интересно, что принесёт завтрашний день?» Я размышляю над этими словами, пока мы проходим мимо."
 lotr_travel_events.0015.a: "В [Concept('thanihazad', 'Тани-Хазаде')|E] никогда ничего не происходит."
 lotr_travel_events.0015.b: "Я не вынесу эту праздность! Что-то #italic должно#! произойти!"

 ### Lover's Point - Belfalas ###
 lotr_travel_events.0100.t: "$travel_event_prefix$ Древнее пламя"
 lotr_travel_events.0100.desc: "Когда мы проходим вдоль побережья Бельфаласа, наш путь упирается в высокий утёс, белый и нетронутый. На краю возвышаются руины того, что когда-то было башней, теперь почерневшие и обгоревшие, но покрытые густым ковром маков и анемонов.\n\n«Да, это прекрасное место», - слышу я, как [storyteller.GetName] говорит остальным: «И всё же этих историй достаточно, чтобы потрясти самое крепкое сердце. Почти столетие назад на этом самом мысе под названием [Glossary('Рас-Мегор','ras_megor_gloss')] стоял маяк, обращённый к морским путям, ведущим в Умбар. Это было популярное место среди солдат, потому что город был недалеко, и многие женщины Дол Амрота пробирались по тропинкам ночью, чтобы навестить своих любимых, когда мужчины не могли покинуть свои посты, и за это они назвали это место [Glossary('Рас-Мелетир','ras_melethyr_gloss')]».\n\n«Но однажды ночью, по неизвестным причинам, маяк загорелся, и хотя большинство из них выбралось целыми и невредимыми, наблюдательный пункт на вершине был охвачен пламенем. В ту же ночь его невеста должна была навестить его, и когда она издалека увидела пламя, то со всех ног бросилась вверх по склону. Добравшись до всё ещё тлеющих руин, выжившие рассказали ей о его судьбе, и она была безутешна. В отчаянии она бросилась со скалы, чтобы воссоединиться со своей любовью в холодных объятиях смерти».\n\n«По крайней мере, так гласит история!», - заканчивает [Select_CString(storyteller.IsFemale, 'она', 'он' )], улыбаясь. «Правда это или нет, но в это, безусловно, верят, и немногие отваживаются подняться на этот обрыв. Ни один солдат не пойдёт туда, потому что говорят, что призраки двух влюблённых всё ещё наблюдают из разрушенной башни...»"
 lotr_travel_events.0100.a: "Путь настоящей любви никогда не был гладким..."
 lotr_travel_events.0100.b: "Призраки, здесь?!"
 lotr_travel_events.0100.c: "Такая бессмысленная потеря..."
 lotr_travel_events.0100.d: "По крайней мере, только двое умерли в ту ночь."
 lotr_travel_events.0100.e: "Эту трагедию можно было бы предотвратить."
 safety_precautions: "Меры предосторожности"
 safety_precautions_desc: "Этот персонаж усовершенствовал местные строительные нормы и правила, уделив особое внимание безопасности."

 ### Dwarven Toymaker ###
 lotr_travel_events.0200.t: "$travel_event_prefix$ Особенная игрушка"
 lotr_travel_events.0200.desc: "Когда мы проезжаем через владение [ROOT.Char.GetCurrentLocation.GetName], на горизонте появляется любопытная повозка. Когда я подхожу ближе, я узнаю в её владельце [Concept('dwarven', 'гномьего')|E] купца. После обмена обычными приветствиями [toymaker.GetSheHe] заползает в повозку, и мгновение спустя распахивает ставни, и в открывшейся витрине можно увидеть множество чудесно сделанных детских игрушек всех форм и размеров.\n\n«У меня есть то, что нужно именно вам, [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetLadyLord]! Взгляните на это:»\n\n[toymaker.GetFirstName] изготавливает "
 lotr_travel_events.0200.a: "Я хочу #bold именно#! это!"
 lotr_travel_events.0200.b: "[Select_CString(child_1.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_1'))] [child_1.GetFirstName] оценит это."
 lotr_travel_events.0200.c: "[Select_CString(child_2.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('child_2'))] [child_2.GetFirstName] [Select_CString(child_2.IsFemale, 'хотела', 'хотел' )] именно это."
 lotr_travel_events.0200.d: "Мне это ни к чему."
 lotr_toy_generic: "В этой деревянной шкатулке находится игрушка исключительного [Concept('dwarven', 'гномьего')|E] мастерства: Внутри находится "
 lotr_toy_troll.t: "Игрушечный тролль"
 lotr_toy_troll.desc: "раскрашенная фигурка тролля. У него есть подвижные руки и ноги, а также несколько видов оружия и инструментов, которые можно менять по желанию."
 lotr_toy_army.t: "Игрушечное войско"
 lotr_toy_army.desc: "большая коллекция маленьких оловянных солдатиков, сделанных с большой тщательностью и мастерством. Здесь есть копейщики, лучники, всадники и даже знаменосцы, размахивающие разноцветными тканевыми флагами, которые можно раскрасить по своему желанию."
 lotr_toy_miner.t: "Игрушечный шахтёр"
 lotr_toy_miner.desc: "большая латунная статуя гнома с киркой в руках. Его ноги отделены от туловища, и его можно завести с помощью пружины на спине, что позволяет ему передвигаться с чёткостью часового механизма."
 lotr_toy_spyglass.t: "Игрушечная подзорная труба"
 lotr_toy_spyglass.desc: "подзорная труба, изготовленная из дерева, кожи и латуни. Глядя в неё, можно видеть довольно далеко, а её две линзы можно регулировать, чтобы лучше видеть близкие объекты в мельчайших деталях."
 lotr_toy_pipe.t: "Игрушечная трубка"
 lotr_toy_pipe.desc: "деревянная трубка с замысловатой резьбой. На первый взгляд, она кажется совершенно обычной, но, если открыть крышку сбоку от вытяжного отверстия, можно увидеть отделение, в которое можно налить мыльную воду. При дуновении из камеры поднимаются пузырьки."
 lotr_toy_puzzle.t: "Игрушечная головоломка"
 lotr_toy_puzzle.desc: "металлическая коробка-головоломка с множеством защёлок, кнопок и потайных отделений. На внешней поверхности выгравированы сложные рисунки, и разгадать их может быть довольно сложно."
 lotr_toy_trebuchet.t: "Игрушечная катапульта"
 lotr_toy_trebuchet.desc: "деревянная катапульта, способная метать небольшие предметы на внушительное расстояние. Она имеет металлические крепления, украшенные гномьими рунами, и поставляется с небольшим руководством, содержащим инструкции."
 lotr_toy_ship.t: "Игрушечный кораблик"
 lotr_toy_ship.desc: "красивый деревянный кораблик с реалистичными парусами и такелажем. В комплект входит небольшой экипаж и маленький кракен."
 lotr_toy_whistle.t: "Игрушечный свисток"
 lotr_toy_whistle.desc: "коллекция глиняных свистулек в форме птиц, каждая из которых издаёт совершенно уникальный звук."
 dwarf_toy_template_tt: "Это могут экипировать только [Concept('minor', 'несовершеннолетние')|E] или #TOOLTIP:GAME_TRAIT,eccentric,GetNullCharacter #L эксцентричные#!#! персонажи"
 lotr_toy_outro: "\n\nИгрушку [Select_CString(toymaker.IsFemale, 'изготовила', 'изготовил' )] [toymaker.GetFirstNameNicknamedNoTooltip]."
 lotr_travel_events.0200.tt: "[educatee.GetShortUINamePossessive] продвинется в своём [Concept('education', 'обучении')|E]"
 lotr_travel_events.0201.opening: "[toy_sender.Custom2('AppropriateGreetingPositive', toy_receiver)]"
 lotr_travel_events.0201.desc: "Во время моего недавнего путешествия по владению [toy_duchy.GetNameNoTier] у меня была случайная встреча с бродячим гномом-изготовителем игрушек, и я [Select_CString(toy_sender.IsFemale, 'нашла', 'нашёл' )] то, что, как мне показалось, тебе понравится.\n\nВ приложении к этому письму ты найдёшь небольшой подарок от меня. Я надеюсь, что [toy_artifact.GetName] доставит тебе удовольствие!"
 lotr_travel_events.0201.a: "Это чудесно!"
 lotr_travel_events.0202.opening_papa: "[ROOT.Char.Custom('GetMamaPapa')|U],"
 lotr_travel_events.0202.opening: "[Select_CString(toy_sender.IsFemale, 'Дорогая', 'Дорогой' )] [toy_receiver.Custom2('RelationToMeShort', SCOPE.sC('toy_sender'))|U],"
 lotr_travel_events.0202.desc: "Большое тебе спасибо за столь замечательный подарок! Посылка прибыла в целости и сохранности и сейчас лежит рядом со мной. Я надеюсь, что оставшаяся часть твоего путешествия пройдёт благополучно."
 lotr_travel_events.0202.a: "Как заботливо."

 ###########################
 ### Elven Travel Events ###
 ###########################
 lotr_travel_events.0500.t: "$travel_event_prefix$ Заброшенная деревня"
 lotr_travel_events.0500.desc: "Наш путь лежит через [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] провинции [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], ведёт нас в сельские и отдалённые районы, и какое-то время даже мои эльфийские глаза не могли разглядеть признаков цивилизации. Но когда дорога поворачивает и поднимается на холм, мои спутники замечают впереди, на нашем пути, деревню. И всё же, кажется, здесь нет никаких признаков жизни.\n\nКогда мы подъезжаем ближе, этот факт становится очевидным, и я не могу не замедлить шаг, когда мы проезжаем мимо. Старые дома рушатся и покосились, плесень и гниль проникли сквозь деревянные решетки. На земле валяются сломанные карнизы, а на выщербленном, потрескавшемся глиняном растворе видны следы многих летних и зимних дождей. В центре города находится груда обломков камня, которые, как я полагаю, являются остатками колодца.\n\nЯ не могу предугадать судьбу этой деревни, будь то чума, война или голод, но это ещё одно напоминание о превратностях [Concept('middleearth', 'Средиземья')|E]."
 lotr_travel_events.0500.a: "Сколь большая часть Средиземья находится в таком состоянии?"

 lotr_travel_events.0501.t: "$travel_event_prefix$ Зов чаек"
 lotr_travel_events.0501.desc: "Наше путешествие ведёт нас в провинцию [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], к морю. Когда мы прибыли, ещё рано, и погода неоднозначна. Далеко на горизонте, обращённом к суше, клубятся чёрные грозовые тучи, извергая свои потоки, небо над головой серое и унылое, но время от времени сквозь него пробивается тонкий луч золотистого света.\n\nСеро-голубое море сверкает и переливается. Каждая огромная вздымающаяся волна завораживает меня, и я наблюдаю, как они исчезают в пене; и очень часто мой взгляд притягивают спокойные места, где не дует ветер, и я смотрю сквозь сапфир во мрак глубин. И тогда я слышу крики чаек. В моём сердце и душе вспыхивает образ Эльдамара, [Concept('uttermostwest', 'Заокраинного запада')|E] за морем, Эльфийского дома. Жемчужная башня Тириона вспыхивает подобно удару молнии, и видение заканчивается. Но тоска по морю, беспокойство [Concept('ulmocharacter', 'Улмо')|E] не исчезает. Запад зовёт меня."
 lotr_travel_events.0501.a: "Аман - наш дом и судьба."
 lotr_travel_events.0501.b: "Средиземье - мой дом!"

 lotr_travel_events.0502.t: "$travel_event_prefix$ Бедная деревня"
 lotr_travel_events.0502.desc: "Наш путь через [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] провинции [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] ведёт нас в сельскую местность, и на протяжении долгого времени мы не встречаем других мест. Нас сопровождают только птицы, которые летают над головой. Наконец, сразу после полудня, мы встречаем деревню, если её можно так назвать, на нашем пути.\n\nЭто печальное зрелище. Несколько покосившихся деревянных хижин беспорядочно окружают центральную дорогу и пруд, и во многих из их крыш зияют дыры, прикрытые в основном палками и листьями. Жители такие же оборванные, носят поношенную одежду и кажутся измождёнными и костлявыми, их кожа обгорела на солнце. Некоторые просят милостыню на улицах. Я слышу, как в переулке лает собака.\n\n«Дадим им хотя бы немного милостыни!» Я слышу, как один из моих спутников говорит: «Это наш долг как Перворождённых»."
 lotr_travel_events.0502.a: "Так уж устроен этот мир."
 lotr_travel_events.0502.b: "Именно маленькие добрые поступки сдерживают Тьму."

 lotr_travel_events.0503.t: "$travel_event_prefix$ Возвышающиеся вершины"
 lotr_travel_events.0503.desc: "В провинции [ROOT.Char.GetCurrentLocation.GetNameNoTooltip] наступает рассвет, и мир пробуждается ото сна. Мой отряд останавливается, чтобы дать лошадям попастись и напиться из ручья, а я жду. Вершины высоких гор отбрасывают длинные тени, и наконец-то видны первые лучи солнца.\n\nОни окрашивают горные вершины в красный цвет, а небо - в ярко-розовый, розовато-оранжевый, и утренние облака горят, как огни, нарисованные на небе. Теперь снег поблескивает в сумерках, а чёрные горы, кажется, поднимаются выше небес, и при виде этого я чувствую себя [Select_CString(ROOT.Char.IsFemale, 'маленькой и незначительной', 'маленьким и незначительным' )], как муравей. Разве я не муравей перед необъятностью [Concept('creation', 'творения')|E], Эа?"
 lotr_travel_events.0503.a: "При всех его недостатках, как я могу покинуть это Средиземье или презирать его?"
 lotr_travel_events.0503.b: "Я чувствую, как во мне бурлит вдохновение!"

 lotr_travel_events.0504.t: "$travel_event_prefix$ Великолепный сумрак"
 lotr_travel_events.0504.desc: "Вокруг нас [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] обширной провинции [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], и на протяжении лиг в любом направлении равнина. Уже смеркается, и скоро наступит ночь. На небе уже появилась луна и несколько звёзд. Тени удлиняются.\n\nОтряд внезапно останавливается, и я смотрю вперёд, чтобы понять, что произошло. Многие из моих спутников смотрят и указывают на запад, и я тоже поворачиваюсь. Небо горит ярко-оранжевым и золотым, и солнце начинает садиться, рассеиваясь огненной дымкой на горизонте. Действительно, это потрясающий вид, и такого заката я давно не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], но нам есть где побывать. Взгляды моих спутников прикованы к закату."
 lotr_travel_events.0504.a: "Мы бессмертны, зачем торопиться? Просто полюбуемся видом."
 lotr_travel_events.0504.b: "Солнце садится каждую ночь, пора двигаться!"

 lotr_travel_events.0505.t: "$travel_event_prefix$ Бродяга"
 lotr_travel_events.0505.desc: "Мы проезжаем по пустынной дороге через [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] провинции [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], и какое-то время мы не встречали попутчиков. И всё же, когда солнце достигло своего пика и стало жарко, один из моих спутников заметил далеко впереди измождённую фигуру, которая ковыляла вперёд. Как только [Select_CString(straggler.IsFemale, 'она заметила', 'он заметил' )] нас, [Select_CString(straggler.IsFemale, 'она бросилась', 'он бросился' )] вперёд, умоляя о помощи.\n\n«Прошу, помогите мне! Я [Select_CString(straggler.IsFemale, 'была', 'был' )] в караване, но некоторое время назад [Select_CString(straggler.IsFemale, 'заблудилась', 'заблудился' )], и вот уже несколько дней у меня есть только несколько кусочков еды и капель воды. Прошу, сжальтесь!» Прежде чем мы успеваем заговорить, [Select_CString(straggler.IsFemale, 'её', 'его' )] глаза расширяются от ужаса, и [Select_CString(straggler.IsFemale, 'она', 'он' )] падает на колени. «Вы [Concept('elves', 'эльфы')|E]! О нет, о нет, прошу, не накладывайте на меня проклятие! У меня есть семья!» [Select_CString(straggler.IsFemale, 'Она', 'Он' )], очевидно, раздумывает, не сбежать ли [Select_CString(straggler.IsFemale, 'ей', 'ему' )]."
 lotr_travel_events.0505.a: "Прочь с нашего пути."
 lotr_travel_events.0505.b: "Вот, возьми хотя бы немного еды и воды."
 lotr_travel_events.0505.c: "Присоединяйся к нам, и у тебя, по крайней мере, будут еда, вода и безопасность."

 lotr_travel_events.0506.t: "$travel_event_prefix$ Осознание"
 lotr_travel_events.0506.desc: "Это была долгая, изнурительная неделя путешествия, и с приближением сумерек я [Select_CString(ROOT.Char.IsFemale, 'остановилась', 'остановился' )] у полноводной реки в провинции [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], чтобы искупаться. Вода прохладная и освежающая, и я чувствую, как расслабляюсь, когда пыль смывается, и слышу мелодию журчания воды о камни и гальку. Я открываю глаза, и в мой разум приходит осознание.\n\nВесь этот тяжёлый труд и усталость сделали эти счастливые и мирные моменты ещё более приятными. Часто я думаю о том, чтобы покинуть [Concept('middleearth', 'Средиземье')|E], оставить все заботы и обиды и отдохнуть под светом [Concept('valargods', 'Валар')|E]. Каким сладким был бы этот напиток! Но что толку в сладком, если ты не можешь почувствовать кислинку? Что толку в покое, если ты не знаешь альтернативы? Как можно отдохнуть, не зная усталости?"
 lotr_travel_events.0506.a: "Единый вознаградит нас за старания, теперь я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )] в этом."