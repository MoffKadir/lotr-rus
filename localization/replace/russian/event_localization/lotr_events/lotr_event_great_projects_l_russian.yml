l_russian:


 lotr_great_project.1000.t.base: "Столица"
 lotr_great_project.1000.t.second: "$lotr_great_project.1000.t.base$: Расчистка руин во владении [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.t.third: "$lotr_great_project.1000.t.base$: Реконструкция владения [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.t.fourth: "$lotr_great_project.1000.t.base$: Восстановление владения [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.t.final: "$lotr_great_project.1000.t.base$: Слава владения [project_location.GetNameNoTooltip]"
 lotr_great_project.1000.desc.second: "Сдвинуты первые камни, и вековые завалы начинают разгребаться. Разрушенные залы расчищены, обломки камня убраны, и древние проходы вновь открыты впервые за многие поколения.\n\nШрамы от разрушений остаются повсюду, но под завалами сохранились останки великих чертогов. Снова зажжены жаровни, возведены строительные леса, и ровный ритм труда отражается эхом в камне. Это место больше не заброшено и возвращается к жизни."
 lotr_great_project.1000.desc.third: "Глубины пробуждаются к жизни. Перестроенные залы соединяют некогда изолированные помещения, а прочные фундаменты заменяют то, что было утрачено из-за времени и бедствий.\n\nПостепенно возводятся дома, мастерские и склады. По коридорам разносится стук молота о наковальню, и столица начинает казаться не столько рабочей площадкой, сколько снова городом."
 lotr_great_project.1000.desc.fourth: "В глубинах чертогов вновь воцаряется порядок. Величественные своды расширяются и укрепляются, свет и вода тщательно прокладываются по камню с помощью искусных мастеров.\n\nСтолица больше не просто функциональна. Орнамент и конструкция возвращаются, подчеркивая красоту и силу. Теперь, прогуливаясь по этим залам, можно ощутить их предназначение. Когда-то они были созданы не только для того, чтобы служить долго, но и для того, чтобы вдохновлять."
 lotr_great_project.1000.desc.final: "Завершены последние работы. Чертоги представляют собой триумф [Concept('dwarven', 'гномьего')|E] мастерства. Камень был тщательно обработан, коридоры укреплены, и каждый уголок служит своей цели и является предметом гордости.\n\nВ мастерских кипит работа, дома и склады переполнены, а оборона сильна. Торговцы, ремесленники и стражники - все они с чувством гордости и удивления проходят через глубины. Эта столица была полностью восстановлена, что свидетельствует о том, чего могут достичь гномы, объединив труд, опыт и решимость."
 lotr_great_project.1000.a.second: "Мы превратим эти руины в наш дом."
 lotr_great_project.1000.a.third: "Теперь мы кое-чего достигли..."
 lotr_great_project.1000.a.fourth: "Вот мое #EMP истинное#! предназначение."
 lotr_great_project.1000.a.final: "Это истинная дань уважения Махалу."

 lotr_great_project.1010.t: "Награды из столицы"
 lotr_great_project.1010.desc: "[Select_CString(envoy.IsFemale, 'Посланница, которую', 'Посланник, которого')] [Select_CString(overlord_scope.IsFemale, 'отправила моя', 'отправил мой')] [ROOT.Char.Custom2('RelationToMe', overlord_scope)], [overlord_scope.GetTitledFirstName|l], прибывает ко мне на заре: «[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Столица во владении [project_location.GetNameNoTooltip] наконец возведена!»\n\n «[Select_CString(overlord_scope.IsFemale, 'Наша милостивая', 'Наш милостивый')] [overlord_scope.GetTitleAsNameNoTooltip] [Select_CString(overlord_scope.IsFemale, 'отправила', 'отправил')] меня выразить вам признательность за ваш щедрый вклад в столь важное дело!» Со страстью в глазах [Select_CString(envoy.IsFemale, 'посланница', 'посланник')] красочно описывает замысловатые шпили, арки и водные пути, которые придают чертогу неземное великолепие.\n\nЯ одобрительно киваю, [Select_CString(ROOT.Char.IsFemale, 'довольная', 'довольный')] своим вкладом в благое дело."
 lotr_great_project.1010.a: "Передай мои наилучшие пожелания."


