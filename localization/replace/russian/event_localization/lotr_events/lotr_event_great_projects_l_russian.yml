 ### MODIFIERS ###

 dwarven_decorated_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_02_contribution_decorated_ceilings$"
 dwarven_decorated_ceilings_dynasty_modifier_desc: "Великолепное сочетание форм и элементов декора сводов этой династии вызывает у окружающих духовный отклик."

 dwarven_dynastic_statues_modifier: "$great_project_type_dwarven_capital_03_contribution_dynastic_statues$"
 dwarven_dynastic_statues_modifier_desc: "Образы гномьих королей, высеченные из живой скалы, вдохновляют горожан работать усерднее и эффективнее."
 dwarven_gilded_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_03_contribution_gilded_ceilings$"
 dwarven_gilded_ceilings_dynasty_modifier_desc: "Позолоченные своды, украшающие гномью столицу, являются одним из главных достижений этой династии."

 dwarven_great_mirrors_province_modifier: "$great_project_type_dwarven_capital_04_contribution_great_mirrors$"
 dwarven_great_mirrors_province_modifier_desc: "Огромные зеркала направляют свет как на плантации, так и на городские площади."
 dwarven_contributor_great_mirrors_reward_province_effect_tt: "Владение [province.GetName] получает модификатор «[GetModifier('dwarven_great_mirrors_province_modifier').GetNameWithTooltip]»"
 dwarven_contributor_great_mirrors_reward_effect_tt: "Владение [owner.GetCapitalLocation.GetName] получает модификатор «[GetModifier('dwarven_great_mirrors_province_modifier').GetNameWithTooltip]»"
 dwarven_carven_pillars_modifier: "$great_project_type_dwarven_capital_04_contribution_carven_pillars$"
 dwarven_carven_pillars_modifier_desc: "Эти резные колонны придают торжественность и красоту местной гномьей столице."
 dwarven_bejeweled_ceilings_dynasty_modifier: "$great_project_type_dwarven_capital_04_contribution_bejeweled_ceilings$"
 dwarven_bejeweled_ceilings_dynasty_modifier_desc: "Самоцветы, мерцающие в свете фонарей, озаряют небо подобно звёздам — очередное достижение этой династии."

 dwarven_waterways_defense_modifier: "$great_project_type_dwarven_capital_05_contribution_waterways$"
 dwarven_waterways_defense_modifier_desc: "Эти водные пути, помимо содействия торговле и строительным работам, также помогают сдерживать чужаков и им подобных."
 dwarven_pillar_forest_modifier: "$great_project_type_dwarven_capital_05_contribution_pillar_forest$"
 dwarven_pillar_forest_modifier_desc: "Этот впечатляющий лес колонн рассказывает историю знаменитой гномьей династии."
 dwarven_bejeweled_reliefs_modifier: "$great_project_type_mandala_capital_05_contribution_bejeweled_reliefs$"
 dwarven_bejeweled_reliefs_modifier_desc: "Самоцветы, вставленные в замысловатые рельефы, ярко сияют в свете ламп и производят неизгладимое впечатление как на придворных, так и на чужеземных дипломатов."

 lotr_great_project.2000.t.base: "Восстановление Арнора"
 lotr_great_project.2000.t.second: "$lotr_great_project.1000.t.base$: Слава владения [project_location.GetNameNoTooltip]"
 lotr_great_project.2000.desc.base: "Сдвинуты первые камни, и вековые завалы начинают расчищаться. Разрушенные залы расчищены, обломки камня вывезены, и древние дороги вновь открыты впервые за многие поколения.\n\nШрамы разрушения остаются повсюду, но под обломками выстояли своды арнорской архитектуры. Снова горят костры, возводятся строительные леса, и по улицам разносится размеренный ритм труда. Это место больше не заброшено и возвращается к жизни."
 lotr_great_project.2000.desc.second: "В городе кипит жизнь. В перестроенных залах звучат голоса поэтов, в тавернах и на рынках - тысячи голосов процветающих людей.\n\nКогда мой взгляд устремляется к небесам за сверкающими шпилями, я слышу смех детей, бегающих по садам и играющих с фонтанами и разноцветными птицами, которые их населяют."
 lotr_great_project.2000.a.first: "Мы превратим эти руины в наш дом."
 lotr_great_project.2000.a.second: "Это моё #EMP истинное#! предназначение."

 lotr_great_project.2010.t: "Награды из столицы"
 lotr_great_project.2010.desc: "[Select_CString(envoy.IsFemale, 'Посланница, которую', 'Посланник, которого')] [Select_CString(overlord_scope.IsFemale, 'отправила моя', 'отправил мой')] [ROOT.Char.Custom2('RelationToMe', overlord_scope)], [overlord_scope.GetTitledFirstName|l], прибывает ко мне на заре: «[ROOT.Char.Custom('FormOfAddressForLiege')|U]! Столица во владении [project_location.GetNameNoTooltip] наконец возведена!»\n\n«[Select_CString(overlord_scope.IsFemale, 'Наша милостивая', 'Наш милостивый')] [overlord_scope.GetTitleAsNameNoTooltip] [Select_CString(overlord_scope.IsFemale, 'отправила', 'отправил')] меня выразить вам признательность за ваш щедрый вклад в столь важное дело!» Со страстью в глазах [Select_CString(envoy.IsFemale, 'посланница', 'посланник')] красочно описывает замысловатые шпили, арки и водные пути, которые придают городу неземное великолепие.\n\nЯ одобрительно киваю, [Select_CString(ROOT.Char.IsFemale, 'довольная', 'довольный')] своим вкладом в благое дело."
 lotr_great_project.2010.a: "Передай мои наилучшие пожелания."

