 lotr_great_project.3000.t.base: "Rebuilding Ost-in-Edhil"
 lotr_great_project.3000.t.first: "$lotr_great_project.3000.t.base$: Clearing out the Ruins"
 lotr_great_project.3000.t.second: "$lotr_great_project.3000.t.base$: Laying New Foudations"
 lotr_great_project.3000.t.third:  "$lotr_great_project.3000.t.base$: City of Artists"
 lotr_great_project.3000.t.fourth: "$lotr_great_project.3000.t.base$: Bastion of Elvendom"
 lotr_great_project.3000.t.final:  "$lotr_great_project.3000.t.base$: Ancient Glory Renewed"
 lotr_great_project.3000.desc.first: "An age's worth of soil and sediment is being gradually removed, with the workers taking the greatest care to identify and preserve every ancient artifact buried in the ruins. Though so much was lost, still we find the occasional treasure, each the witness of a foregone past.\n\nIt is a bittersweet sight: so much joy and life can be guessed from the artifacts and traces of decoration brought to light, and yet the scars of battle and ruin remind us of its terrible end.\n\n. Fires are lit once more, scaffolds raised, and the steady rhythm of labour rises through the air. This place is no longer abandoned and is coming back to life."
 lotr_great_project.3000.desc.second: "Where old foundations stood strong, we have reinforced the work of Celebrimbor's masons. And where the hateful Orcs and the work of time have made them unstable, we have laid new ones.\n\nOn these stones the great city of Ost-in-Edhil will stand once more, though we still have much work ahead of us."
 lotr_great_project.3000.desc.third: "The songs of workers and artisans rises from every corner, and once more people flock the streets, the workshops and the markets of Ost-in-Edhil.\n\nPoets, painters, sculptors, architects have set up multiple workshops along the newly paved streets, and Elves and Elf-friends from distant lands come for inspiration in what is growing into the capital of the arts of the Westlands."
 lotr_great_project.3000.desc.fourth: "Towers and great workshops rise from every corner of our great city, and our Mírdain are rediscovering the lost arts of the old masters. Grand waterways criss-cross the streets, leading to lush gardens adorned with exquisite statues.\n\nAnd around all this beauty and music, mighty walls stand tall, patrolled by stern, ever-vigilant sentinels. We will not fall to the Shadow a second time."
 lotr_great_project.3000.desc.final: "The final works are complete. Ost-in-Edhil's once again shines bright on the banks of the Sirannon, an image of lost Gondolin of old, and of Tirion upon Túna. Its high walls will never again be brought low, and soon enough, we will equal the works of the greatest Jewel-Smiths of the past."
 lotr_great_project.3000.a.first: "So much that was lost was found again!"
 lotr_great_project.3000.a.second: "We shall make these ruins a home."
 lotr_great_project.3000.a.third:  "Now we are getting somewhere..."
 lotr_great_project.3000.a.fourth: "This is my #EMP true#! purpose."
 lotr_great_project.3000.a.final:  "This city is a shining jewel in Middle-Earth!"

 lotr_great_project.3010.t: "Capital Rewards"
 lotr_great_project.3010.desc: "The envoy of my [ROOT.Char.Custom2('RelationToMe', overlord_scope)], [overlord_scope.GetTitledFirstName], reaches me in the early morning: "[ROOT.Char.Custom('FormOfAddressForLiege')|U]! The work on Ost-in-Edhil has finally reached its conclusion!"\n\n"Our gracious [overlord_scope.GetTitleAsNameNoTooltip] has sent me here to show [overlord_scope.GetHerHis] appreciation for your generous contributions to this end!" The [envoy.GetWomanMan]'s eyes glow with a passionate fervor when [envoy.GetSheHe] retells the vision of the intricate spires, arches and waterways that award the city with an otherworldly splendour.\n\nI hum and nod, pleased with my contribution to the cause..."
 lotr_great_project.3010.a: "Send my regards."

