l_russian:

 #Disfigured
 lotr_health_events.3001.t: "Рана, которая никогда не заживёт"
 lotr_health_events.3001.desc_intro: "В ручном зеркальце я рассматриваю повязки, которые закрывали моё лицо на протяжении всего моего долгого выздоровления. Во время моего выздоровления мне было запрещено видеть то, что скрывалось под ними, как бы я ни [Select_CString(ROOT.Char.IsFemale, 'протестовала', 'протестовал' )]. Мне сказали, что у меня будет достаточно времени, чтобы увидеть своё новое лицо, как только процесс заживления завершится. Наконец я снимаю повязки и понимаю, что не узнаю [Select_CString(ROOT.Char.IsFemale, 'ту', 'того' )], кто смотрит на меня из зеркала."
 lotr_health_events.3001.desc_disfigurement_1: "\n\nРана повредила правую часть моего лица... челюсть и черты лица повреждены катастрофически... отражение, которое я [Select_CString(ROOT.Char.IsFemale, 'помнила', 'помнил' )], исчезло.\n\nТеперь я стою перед выбором — [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я носить маску и скрывать своё уродство от державы, или я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] позволить всем увидеть мой новый облик?"
 lotr_health_events.3001.desc_disfigurement_2: "\n\nРана изуродовала моё лицо... у меня нет носа, а правая сторона рта гротескно деформирована... отражение, которое я [Select_CString(ROOT.Char.IsFemale, 'помнила', 'помнил' )], исчезло.\n\nТеперь я стою перед выбором — [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я носить маску и скрывать своё уродство от державы, или я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] позволить всем увидеть мой новый облик?"
 lotr_health_events.3001.desc_disfigurement_3: "\n\nРана разрушила мой рот... повреждения моей кожи ужасны... отражение, которое я [Select_CString(ROOT.Char.IsFemale, 'помнила', 'помнил' )], исчезло.\n\nТеперь я стою перед выбором — [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я носить маску и скрывать своё уродство от державы, или я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] позволить всем увидеть мой новый облик?"
 lotr_health_events.3001.desc_disfigurement_4: "\n\nИз-за раны левая сторона моего лица была повреждена... отражение, которое я [Select_CString(ROOT.Char.IsFemale, 'помнила', 'помнил' )], исчезло.\n\nТеперь я стою перед выбором — [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я носить маску и скрывать своё уродство от державы, или я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] позволить всем увидеть мой новый облик?"
 lotr_health_events.3001.desc_disfigurement_5: "\n\nТравма изуродовала моё лицо... моего носа больше нет... отражение, которое я [Select_CString(ROOT.Char.IsFemale, 'помнила', 'помнил' )], исчезло.\n\nТеперь я стою перед выбором — [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я носить маску и скрывать своё уродство от державы, или я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] позволить всем увидеть мой новый облик?"
 lotr_health_events.3001.a: "Пусть они станут свидетелями этого ужаса."
 lotr_health_events.3001.b: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] носить маску, которая поможет мне в правлении."
 lotr_health_events.3001.c: "Я полностью скрою своё лицо от всего мира."

 lotr_health_events.3010.t: "Увечье: выбор увечья"
 lotr_health_events.3010.desc: "Используйте эту панель, чтобы выбрать увечье своего персонажа."
 lotr_health_events.3010.a: "Удалить текущее увечье."
 lotr_health_events.3010.b: "$debug_visible_disfigurement_1$"
 lotr_health_events.3010.c: "$debug_visible_disfigurement_2$"
 lotr_health_events.3010.d: "$debug_visible_disfigurement_3$"
 lotr_health_events.3010.e: "$debug_visible_disfigurement_4$"
 lotr_health_events.3010.f: "$debug_visible_disfigurement_5$"
 lotr_health_events.3010.g: "Готово."
 lotr_health_events.3010.h: "Я [Select_CString(ROOT.Char.IsFemale, 'передумала', 'передумал' )]."

 #One-Eyed
 lotr_health_events.4000.t: "Невосполнимая потеря"
 lotr_health_events.4000.desc: "Бинты наконец сняты, и правда становится очевидной. Там, где когда-то была боль, теперь ничего нет. Рана зажила, но моего глаза больше нет.\n\nПередо мной расстелено несколько повязок. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать, принять ли их или предстать перед миром [Select_CString(ROOT.Char.IsFemale, 'такой, какая', 'таким, какой' )] я есть."
 lotr_health_events.4000.a: "Достаточно будет простой тканевой ленты."
 lotr_health_events.4000.b: "Простая повязка на глаз - это практичный выбор."
 lotr_health_events.4000.c: "Треугольная повязка на глазу выделит меня среди окружающих."
 lotr_health_events.4000.d: "Подойдёт круглая повязка на глаз."
 lotr_health_events.4000.e: "Украшенная повязка, достойная моего положения."
 lotr_health_events.4000.f: "Хватит и чистой повязки."
 lotr_health_events.4000.g: "Я не буду ничего носить, и пусть все увидят правду."