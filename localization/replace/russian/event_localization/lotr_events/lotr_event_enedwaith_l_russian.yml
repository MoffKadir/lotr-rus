l_russian:

 ### Saralain ###

 enedwaith.0200.t: "Перерождённый Саралайн?"
 enedwaith.0200.desc: "[saralain_claimer.GetFirstNameNoTooltip] выдвигает свои претензии на титул «Короля Саралайна». И хотя королевство долго находилось в упадке и в конечном итоге было уничтожено, народ Саралайна уцелел. Похоже, что [saralain_claimer.GetFirstNameNoTooltip] надеется собрать их под своими знамёнами.\n\nКак один из предводителей кланов Саралайна, [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я признать авторитет претендента? Станет ли [saralain_claimer.GetFirstNameNoTooltip] правителем забытого королевства?"
 enedwaith.0200.a: "[saralain_claimer.GetFirstNameNoTooltip], мой [saralain_claimer.GetTitleAsNameNoTooltip], я присягаю на верность твоему знамени!"
 enedwaith.0200.b: "[saralain_claimer.GetFirstNameNoTooltip] всего лишь очередной претендент, которым не будет конца..."
 enedwaith.0200.c: "Пройдоха [saralain_claimer.GetFirstNameNoTooltip] не будет королём, этот титул по-праву мой!"

 enedwaith.0202.t: "Возрождённый Саралайн!"
 enedwaith.0202.desc: "Свершилось! Взойдя на трон Саралайна, я [Select_CString(ROOT.Char.IsFemale, 'объединила', 'объединил' )] кланы под своим знаменем и [Select_CString(ROOT.Char.IsFemale, 'принесла', 'принёс' )] мир, свободу, справедливость и безопасность в мою новую [Concept('realm', 'державу')|E]!\n\nТеперь мы посмотрим, как отреагируют кланы, которые всё ещё не определились с выбором. Встанут ли они под мои знамёна или останутся разобщёнными и слабыми? Только время покажет..."
 enedwaith.0202.a: "Я буду править с изяществом и силой."

 enedwaith.0300.t: "Клинок в ночи"
 enedwaith.0300.desc: "В залах тихо, и только тусклый свет свечей даёт мне реальное представление о том, как я продвигаюсь к своей опочивальне. Стражника, обычно стоящего перед моей дверью, нет, хотя это не редкость. Как раз в тот момент, когда я собираюсь лечь в постель, я замечаю тень, проникающую через окно. К тому времени, как он появился в комнате, я уже [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] встать и взять в руки меч. \n\nЧто за идиот набрался смелости прийти за мной? Я смотрю, как он достаёт нож и приближается ко мне. Он, наверное, думает, что я только лаю, но не кусаюсь. Он может подойти так близко, как захочет. Этот незваный гость на собственном опыте узнает, что бывает, если разозлить Бешеного Пса."
 enedwaith.0300.a: "Ты действительно думаешь, что сможешь убить МЕНЯ?"

 enedwaith.0301.t: "Впадая в ярость"
 enedwaith.0301.desc: "На моем лице кровь, но, к счастью, не моя собственная. Я наблюдаю, как вокруг тела потенциального убийцы, который думал, что сможет уложить Бешеного Пса, растекается лужа крови. Негодяй мёртв, но я чувствую, как в моей груди разгорается гнев. Кто-то послал этого человека за мной, и этот кто-то всё ещё на свободе. \n\nЯ чувствую, как бешено колотится сердце, а на лбу вот-вот лопнет вена. Кто-то пытался убить меня. \n\nЗначит мне придётся убить их [Select_CString(ROOT.Char.IsFemale, 'первой', 'первым' )]. \n\nБыло два очевидных подозреваемых. Мой брат Шамис, Змей, и Бердиг, Хорёк. Трусливые, нелояльные люди, они были совершенно не похожи на тех, кто пытался сделать что-то подобное. Это мог быть один из них, а могли быть и оба. Поэтому единственным способом выяснить это было убрать их обоих. "
 enedwaith.0301.a: "Когда я доберусь до этих коварных змей, они познают страдания!"
 enedwaith.0301.b: "Я могу быть [Select_CString(ROOT.Char.IsFemale, 'терпеливой', 'терпеливым' )] и нанести удар, когда буду [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )]"
 enedwaith.0301.c: "Бросить этих злодеев в темнейшие подземелья!"

 enedwaith.0302.t: "Предатель разоблачён"
 enedwaith.0302.desc: "Когда Хорёк и Змей оказались в моей темнице, я с нетерпением жду часов пыток над ними и их сообщниками. Однако через несколько дней крики надоедают, а признания я не получаю. Только постоянные причитания, что это были не они, а Колан. Если бы они выбрали любое другое имя, то, скорее всего, остались бы неуслышанными. Но они выбрали именно того человека, на которого можно свалить вину. \n\nЕсли это был не один из этих двоих, то это должен был быть он. Змей и Хорёк уже давно должны были сломаться, а значит, хоть раз в жизни они говорили мне правду. \n\nЯрость снова начинает нарастать в моей груди, когда я вспоминаю дни своей юности с этим человеком. Он был прав, когда бежал от меня на юг, я бы дал ему жить спокойно. Но он не мог оставить все как есть, не так ли? Если этот ублюдок ещё жив, он быстро поймет, что его дни сочтены. \n\nПока же другие кланы дрожат от страха перед тем, что я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )] с Хорьком и Змеем. Никогда не наступит лучшего времени, чтобы привлечь их в свои ряды."
 enedwaith.0302.a: "Я приду за тобой, Колан. Ты не сможешь от меня спрятаться!"
 enedwaith.0302.b: "Аргх, как же я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] бы добраться до этого ублюдка!"

 enedwaith.0303.t: "Бешеный Пес велит нам встать на колени"
 enedwaith.0303.desc: "Когда до меня дошли слухи о покушении на короля Мадога, я почти [Select_CString(ROOT.Char.IsFemale, 'пожалела', 'пожалел' )] бедные души, которые должны были стать мишенью для гнева Бешеного Пса. Но теперь я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что кланы, против которых он развязал войну, не только не виновны в преступлении, он требует, чтобы все кланы преклонили перед ним колено, чтобы они помогли ему в его стремлении отомстить истинному виновнику. \n\nЕсли бы я [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался' )], то, без сомнения, [Select_CString(ROOT.Char.IsFemale, 'навлекла', 'навлёк' )] бы на себя его гнев. Конечно, это было бы унизительно, но, возможно, в наше время нашему народу необходимо единство?"
 enedwaith.0303.a: "Мы подчинимся Бешеному Псу, чтобы он не обрушил на нас свою ярость"
 enedwaith.0303.b: "Мы никогда не встанем на колени перед Бешеным Псом"

 ### Migration event chain

 enedwaith.1000.t: "Подготовка к переселению"
 enedwaith.1000.desc: "Решено, мы покидаем Энедвайт! Глашатаи уже разослали другим вождям приглашение присоединиться к нам, разумеется, под нашим руководством. Теперь осталось только решить, сколько наших людей отправится с нами."
 enedwaith.1000.a: "Собрать небольшой отряд."
 enedwaith.1000.b: "Мы отправимся все."
 saralain_dev_pool_1: "1 ед. [Concept('development', 'развития')|E] будет добавлена в резерв"
 saralain_dev_pool_2: "Всё [Concept('development', 'развитие')|E] вашей державы будет добавлено в резерв"
 call_for_migration: "Разослать вестников ко всем правителям энедвайтрим, чтобы они присоединились к переселению"
 lotr_saralain_migration_event_widget_text: "#difficulty_easy Резерв развития: #! [GetGlobalVariable('saralain_dev_pool').GetValue|0|+]"
 event_window_widget_lotr_saralain_migration_tooltip_widget: "Резерв развития представляет собой [Concept('development', 'развитие')|E], которое было вложено в переселение. Он будет распределён по [Concept('counties', 'графствам')|E], которые вы решите заселить"

 enedwaith.1002.t: "Призыв к переселению"
 enedwaith.1002.desc: "Группа энедвайтримских вождей, которых возглавляет [migration_leader.GetName], объявили, что покидают Энедвайт и отправляются на поиски более подходящих земель для заселения. Ходят слухи, что они планируют двинуться либо на север, в [Concept('cardolan', 'Кардолан')|E], либо на юг, в [Concept('gondor', 'Гондор')|E]. Прибыли вестники от предводителей переселения и предложили нам место в их отряде."
 enedwaith.1002.a: "Можете на меня рассчитывать."
 enedwaith.1002.b: "Присоединиться с небольшим отрядом."
 enedwaith.1002.c: "Мы все отправимся в путь!"
 enedwaith.1002.d: "Больше земли для всех нас!"
 join_migration: "Присоединиться к переселению"
 migration_game_end_warning: "@warning_icon! #warning Игра будет завершена#!"

 enedwaith.1003.t: "[sender.GetFirstName] присоединяется к переселению"
 enedwaith.1003.desc: "Глашатаи, которых [Select_CString(sender.IsFemale, 'прислала', 'прислал' )] [sender.GetName], явились, чтобы вручить свои мечи за наше дело. Они присоединятся к нашему переселению и поселятся с нами, когда мы доберемся до нашего нового дома!"
 enedwaith.1003.a: "Отлично."

 enedwaith.1005.t: "Пора идти"
 enedwaith.1005.desc: "[migration_leader.GetName] [Select_CString(migration_leader.IsFemale, 'отправила', 'отправил' )] весть о том, что время, которого мы ждали, настало. Саралайнское переселение началось! Конечно, прошло время с тех пор, как мы взяли на себя обязательство присоединиться к переселению, и нам не обязательно уезжать, если мы этого не хотим..."
 enedwaith.1005.a: "Мы отправимся в путь!"
 enedwaith.1005.b: "Мы останемся!"

 enedwaith.1100.t: "Прибытие в Талион"
 enedwaith.1100.desc: "Со времён королей [Concept('arnor', 'Арнора')|E] в Талионе наступили трудные времена, и сейчас столица [Concept('cardolan', 'Кардолана')|E] представляет собой нечто большее, чем дворец в поле. Тем не менее, это всё ещё столица южного остатка, и его правитель по-прежнему тот человек, с которым нам нужно поговорить, чтобы обосноваться в [Concept('eriador', 'Эриадоре')|E]."
 enedwaith.1100.a: "Обратиться к принцу."

 enedwaith.1101.t: "Саралайнское переселение"
 enedwaith.1101.desc: "Сегодня в Талион прибыло множество энедвайтримских воинов и граждан, которые просят моего разрешения поселиться где-нибудь в [Concept('eriador', 'Эриадоре')|E]. В обмен на это они предлагают присягнуть на верность мне как своему повелителю и соблюдать наши законы. Конечно, приглашение такого множества варваров может иметь #warning последствия#!, но они вряд ли уйдут и могут оказаться полезными в борьбе с [Concept('witchking', 'Королём-чародеем')|E]."
 enedwaith.1101.a: "Предложить [GetTitleByKey('d_ethir_gwathlo').GetNameNoTier]."
 enedwaith.1101.b: "Предложить [GetTitleByKey('d_tyrn_gorthad').GetNameNoTier] и [GetTitleByKey('d_dyr_maenason').GetNameNoTier]."
 enedwaith.1101.c: "Предложить земли в #ONCLICK:TITLE,k_arthedain #TOOLTIP:LANDED_TITLE,k_arthedain #L Артедайне#!#!#!."
 enedwaith.1101.d: "Отослать их к королю."
 enedwaith.1101.e: "Отвергнуть их предложение."
 saralani_react_poorly: "@warning_icon! #warning Саралайнцы отреагируют плохо#!"

 enedwaith.1102.t: "Предложение земли"
 enedwaith.1102.desc: "Принц [Concept('cardolan', 'Кардолана')|E] предложил нам для заселения владение [target_duchy.GetNameNoTier]. Мы станем прямыми вассалами принца, и до тех пор, пока будем соблюдать его законы, нас практически не будут трогать."
 enedwaith.1102.a: "Мы согласны."
 enedwaith.1102.b: "Placeholder - No/invade"
 enedwaith.1102.c: "Мы можем получить земли получше..."
 sarlain_end_scripting: "#warning Конец сюжетной цепочки#!"

 enedwaith.1103.t: "Кардолан велит нам уйти"
 enedwaith.1103.desc: "Принц [Concept('cardolan', 'Кардолана')|E] веле нам покинуть его державу и искать земли в другом месте. Объявив нас варварами, он предупредил свои армии и будет сопротивляться любым попыткам поселиться на его землях. Что нам делать с этим оскорблением?.."
 enedwaith.1103.a: "Мы захватим эти земли силой!"
 enedwaith.1103.b: "Мы вернёмся..."

 enedwaith.1104.t: "Неожиданное предложение"
 enedwaith.1104.desc: "Принц #ONCLICK:TITLE,k_cardolan #TOOLTIP:LANDED_TITLE,k_cardolan #L Кардолана#!#!#! выдвинул неожиданное предложение. [Concept('cardolan', 'Кардолан')|E] долгое время был вторым по силе в [Concept('eriador', 'Эриадоре')|E], уступая #ONCLICK:TITLE,k_arthedain #TOOLTIP:LANDED_TITLE,k_arthedain #L Артедайну#!#!#! как в престиже, так и во власти. Принц хочет, чтобы мы изменили это. Он предлагает владение [GetTitleByKey('d_hyarromenya').GetNameNoTier] вместе с любой другой землей, которую мы сможем отвоевать у его соперников. Если мы поклянемся ему в верности, он даже поддержит нашу миссию."
 enedwaith.1104.a: "Звучит как план."
 enedwaith.1104.b: "Мы нападём, но не будем делать это за вас."
 enedwaith.1104.c: "Мы сами выберем свою судьбу."
 cardolani_volenteers: "Маленькие зелёные люди"
 saralain_invasion_war: "Саралайнское переселение"

 enedwaith.1105.t: "Саралайнское переселение"
 enedwaith.1105.desc: "Недавно группа энедвайтримских воинов и граждан прибыла в Талион и попросила земли для заселения в [Concept('eriador', 'Эриадоре')|E]. [cardolanprince.GetName] мудро [Select_CString(cardolanprince.IsFemale, 'передала', 'передал' )] этот вопрос мне и [Select_CString(cardolanprince.IsFemale, 'велела', 'велел' )], чтобы [migration_leader.GetName] [Select_CString(migration_leader.IsFemale, 'дождалась', 'дождался' )] моего решения. Опасность, которую представляют эти варвары, реальна, но они могут стать настоящим оплотом против тьмы, надвигающейся на север..."
 enedwaith.1105.a: "Предложить [GetTitleByKey('d_ethir_gwathlo').GetNameNoTier]."
 enedwaith.1105.b: "Предложить [GetTitleByKey('d_tyrn_gorthad').GetNameNoTier] и [GetTitleByKey('d_dyr_maenason').GetNameNoTier]."
 enedwaith.1105.c: "Предложить [GetTitleByKey('d_hyarromenya').GetNameNoTier]."
 enedwaith.1105.d: "Предложить [GetTitleByKey('d_shire').GetNameNoTier]."
 enedwaith.1105.e: "Предложить им земли в #ONCLICK:TITLE,k_rhudaur #TOOLTIP:LANDED_TITLE,k_rhudaur #L Рудауре#!#!#!."
 enedwaith.1105.f: "Отвергнуть их предложение."

 enedwaith.1106.t: "Интересное предложение"
 enedwaith.1106.desc: "[kingarthedain.GetName] [Select_CString(kingarthedain.IsFemale, 'направила', 'направил' )] к нам представителей с интересным предложением. Третье королевство севера, [GetTitleByKey('k_rhudaur').GetNameNoTier] долгое время подвергался нападениям и был захвачен горцами. Теперь, когда над этими землями нависла угроза [Concept('witchkingshort', 'Короля-чародея')|E] #ONCLICK:TITLE,k_angmar #TOOLTIP:LANDED_TITLE,k_angmar #L Ангмара#!#!#!, [kingarthedain.GetFirstName] желает, чтобы в Рудауре был восстановлен бастион, способный сдержать всех врагов. [Select_CString(kingarthedain.IsFemale, 'Она', 'Он' )] хочет, чтобы мы были этим бастионом."
 enedwaith.1106.a: "Это предложение, от которого мы не можем отказаться!"
 enedwaith.1106.b: "Мы поселимся в Рудауре, но сохраним независимость."
 enedwaith.1106.c: "Как насчёт «нет»?"

 enedwaith.1200.t: "Прибытие в Изенгард"
 enedwaith.1200.desc: "Перед нами возвышается великая башня [Concept('orthanc', 'Ортанк')|E], центр [Concept('gondorian', 'гондорской')|E] крепости [Concept('isengard', 'Изенгард')|E]. Башня внушительна, как и король, которого она олицетворяет. [Concept('gondor', 'Гондор')|E] находится в самом разгаре золотого века, и для нас было бы честью получить хотя бы крупицу богатств этой страны. Но, конечно, это зависит от короля."
 enedwaith.1200.a: "Обратиться к королю."

 enedwaith.1201.t: "Саралайнское переселение"
 enedwaith.1201.desc: "Огромное войско энедвайтримских воинов и граждан прибыло в [Concept('isengard', 'Изенгард')|E], просить земли для поселения в нашей державе. Они обещают служить нам и следовать нашим законам, если мы позволим им поселиться здесь. Риск, который представляют собой эти варвары, вполне преодолим, но мы могли бы предложить им что-нибудь на границе, чтобы обезопасить себя."
 enedwaith.1201.a: "Предложить [GetTitleByKey('d_parth_iaur').GetNameNoTier]."
 enedwaith.1201.b: "Предложить [GetTitleByKey('d_westmarches').GetNameNoTier] и [GetTitleByKey('d_drulad').GetNameNoTier]."

 enedwaith.1201.e: "Отвергнуть их."

 enedwaith.1011.t: "Новые земли - никогда не видеть"
 enedwaith.1011.desc: "Placeholder - [GetGlobalVariable('saralain_dev_pool').GetValue]"
 enedwaith.1011.a: "Placeholder - join"
 enedwaith.1011.b: "Placeholder - die"
 
 enedwaith.1202.t: "Предложение приграничных земель"
 enedwaith.1202.desc: "Король [Concept('gondor', 'Гондора')|E] предложил нам для заселения владение [target_duchy.GetName]. Эта земля находится на границе державы, и, хотя мы хотели бы сохранить некоторую независимость, это, конечно, не так заманчиво, как в других отдалённых землях. Итак, примем ли мы это предложение?"
 enedwaith.1202.a: "Мы согласны."
 enedwaith.1202.b: "Мы сами найдём новый дом."

 enedwaith.1203.t: "Ответ короля"
 enedwaith.1203.desc: "Король [Concept('gondor', 'Гондора')|E] отклонил нашу просьбу о заселении. Кроме того, он потребовал, чтобы мы вернулись в наши дома, и запретил нам проход через [Concept('isengard', 'Изенгард')|E]. Мы не можем стерпеть этого оскорбления. [Concept('sea_peoples', 'Морской народ')|E] должен заплатить за свои действия..."
