l_russian:

 ### Saralain ###

 enedwaith.0200.t: "Перерождённый Саралайн?"
 enedwaith.0200.desc: "[saralain_claimer.GetFirstNameNoTooltip] выдвигает свои претензии на титул «Короля Саралайна». И хотя королевство долго находилось в упадке и в конечном итоге было уничтожено, народ Саралайна уцелел. Похоже, что [saralain_claimer.GetFirstNameNoTooltip] надеется собрать их под своими знамёнами.\n\nКак один из предводителей кланов Саралайна, [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] ли я признать авторитет претендента? Станет ли [saralain_claimer.GetFirstNameNoTooltip] правителем забытого королевства?"
 enedwaith.0200.a: "[saralain_claimer.GetFirstNameNoTooltip], мой [saralain_claimer.GetTitleAsNameNoTooltip], я присягаю на верность твоему знамени!"
 enedwaith.0200.b: "[saralain_claimer.GetFirstNameNoTooltip] всего лишь очередной претендент, которым не будет конца..."
 enedwaith.0200.c: "Пройдоха [saralain_claimer.GetFirstNameNoTooltip] не будет королём, этот титул по-праву мой!"

 enedwaith.0202.t: "Возрождённый Саралайн!"
 enedwaith.0202.desc: "Свершилось! Взойдя на трон Саралайна, я [Select_CString(ROOT.Char.IsFemale, 'объединила', 'объединил' )] кланы под своим знаменем и [Select_CString(ROOT.Char.IsFemale, 'принесла', 'принёс' )] мир, свободу, справедливость и безопасность в мою новую [Concept('realm', 'державу')|E]!\n\nТеперь мы посмотрим, как отреагируют кланы, которые всё ещё не определились с выбором. Встанут ли они под мои знамёна или останутся разобщёнными и слабыми? Только время покажет..."
 enedwaith.0202.a: "Я буду править с изяществом и силой."

 enedwaith.0300.t: "Клинок в ночи"
 enedwaith.0300.desc: "В залах тихо, и только тусклый свет свечей даёт мне реальное представление о том, как я продвигаюсь к своей опочивальне. Стражника, обычно стоящего перед моей дверью, нет, хотя это не редкость. Как раз в тот момент, когда я собираюсь лечь в постель, я замечаю тень, проникающую через окно. К тому времени, как он появился в комнате, я уже [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] встать и взять в руки меч. \n\nЧто за идиот набрался смелости прийти за мной? Я смотрю, как он достаёт нож и приближается ко мне. Он, наверное, думает, что я только лаю, но не кусаюсь. Он может подойти так близко, как захочет. Этот незваный гость на собственном опыте узнает, что бывает, если разозлить Бешеного Пса."
 enedwaith.0300.a: "Ты действительно думаешь, что сможешь убить МЕНЯ?"

 enedwaith.0301.t: "Впадая в ярость"
 enedwaith.0301.desc: "На моем лице кровь, но, к счастью, не моя собственная. Я наблюдаю, как вокруг тела потенциального убийцы, который думал, что сможет уложить Бешеного Пса, растекается лужа крови. Негодяй мёртв, но я чувствую, как в моей груди разгорается гнев. Кто-то послал этого человека за мной, и этот кто-то всё ещё на свободе. \n\nЯ чувствую, как бешено колотится сердце, а на лбу вот-вот лопнет вена. Кто-то пытался убить меня. \n\nЗначит мне придётся убить их [Select_CString(ROOT.Char.IsFemale, 'первой', 'первым' )]. \n\nБыло два очевидных подозреваемых. Мой брат Шамис, Змей, и Бердиг, Хорёк. Трусливые, нелояльные люди, они были совершенно не похожи на тех, кто пытался сделать что-то подобное. Это мог быть один из них, а могли быть и оба. Поэтому единственным способом выяснить это было убрать их обоих. "
 enedwaith.0301.a: "Когда я доберусь до этих коварных змей, они познают страдания!"
 enedwaith.0301.b: "Я могу быть [Select_CString(ROOT.Char.IsFemale, 'терпеливой', 'терпеливым' )] и нанести удар, когда буду [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )]"
 enedwaith.0301.c: "Бросить этих злодеев в темнейшие подземелья!"

 enedwaith.0302.t: "Предатель разоблачён"
 enedwaith.0302.desc: "Когда Хорёк и Змей оказались в моей темнице, я с нетерпением жду часов пыток над ними и их сообщниками. Однако через несколько дней крики надоедают, а признания я не получаю. Только постоянные причитания, что это были не они, а Колан. Если бы они выбрали любое другое имя, то, скорее всего, остались бы неуслышанными. Но они выбрали именно того человека, на которого можно свалить вину. \n\nЕсли это был не один из этих двоих, то это должен был быть он. Змей и Хорёк уже давно должны были сломаться, а значит, хоть раз в жизни они говорили мне правду. \n\nЯрость снова начинает нарастать в моей груди, когда я вспоминаю дни своей юности с этим человеком. Он был прав, когда бежал от меня на юг, я бы дал ему жить спокойно. Но он не мог оставить все как есть, не так ли? Если этот ублюдок ещё жив, он быстро поймет, что его дни сочтены. \n\nПока же другие кланы дрожат от страха перед тем, что я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )] с Хорьком и Змеем. Никогда не наступит лучшего времени, чтобы привлечь их в свои ряды."
 enedwaith.0302.a: "Я приду за тобой, Колан. Ты не сможешь от меня спрятаться!"
 enedwaith.0302.b: "Аргх, как же я [Select_CString(ROOT.Char.IsFemale, 'хотела', 'хотел' )] бы добраться до этого ублюдка!"

 enedwaith.0303.t: "Бешеный Пес велит нам встать на колени"
 enedwaith.0303.desc: "Когда до меня дошли слухи о покушении на короля Мадога, я почти [Select_CString(ROOT.Char.IsFemale, 'пожалела', 'пожалел' )] бедные души, которые должны были стать мишенью для гнева Бешеного Пса. Но теперь я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что кланы, против которых он развязал войну, не только не виновны в преступлении, он требует, чтобы все кланы преклонили перед ним колено, чтобы они помогли ему в его стремлении отомстить истинному виновнику. \n\nЕсли бы я [Select_CString(ROOT.Char.IsFemale, 'отказалась', 'отказался' )], то, без сомнения, [Select_CString(ROOT.Char.IsFemale, 'навлекла', 'навлёк' )] бы на себя его гнев. Конечно, это было бы унизительно, но, возможно, в наше время нашему народу необходимо единство?"
 enedwaith.0303.a: "Мы подчинимся Бешеному Псу, чтобы он не обрушил на нас свою ярость"
 enedwaith.0303.b: "Мы никогда не встанем на колени перед Бешеным Псом"

 ### Migration event chain

 enedwaith.1000.t: "Preparing for the Migration"
 enedwaith.1000.desc: "It has been decided, We are going to leave Enedwaith! Already, heralds have gone out to the other chiefs inviting them to come with us, under our management of course. Now all that's left to do is to decide how many of our people are coming with us."
 enedwaith.1000.a: "Commit a small group"
 enedwaith.1000.b: "We're all going"
 saralain_dev_pool_1: "1 ед. [Concept('development', 'развития')|E] будет добавлена в резерв"
 saralain_dev_pool_2: "Всё [Concept('development', 'развитие')|E] вашей державы будет добавлено в резерв"
 call_for_migration: "Разослать вестников ко всем правителям энедвайтрим, чтобы они присоединились к переселению"
 lotr_saralain_migration_event_widget_text: "#difficulty_easy Development Pool: #! [GetGlobalVariable('saralain_dev_pool').GetValue|0|+]"
 event_window_widget_lotr_saralain_migration_tooltip_widget: "The Development pool represents the [development|e] that has been commited to the Migration. it will be dispursed amoung the [counties|e] you decide to settle"
 
 enedwaith.1002.t: "Call for Migration"
 enedwaith.1002.desc: "A Group of Enedwaithrim chiefs, lead by [migration_leader.GetName], have announced that they will be leaving Enedwaith to search for better lands to settle. current rumor has them planning to move either north into [cardolan|e] or south into [gondor|e]. Heralds from the leader of the migration have arrived and offered us a place in their party."
 enedwaith.1002.a: "Count Me In"
 enedwaith.1002.b: "Join with a small band"
 enedwaith.1002.c: "All of us will go!"
 enedwaith.1002.d: "More Land for the rest of us!"
 join_migration: "Присоединиться к переселению"
 migration_game_end_warning: "@warning_icon! #warning Your Game Will End #!"
 
 enedwaith.1003.t: "[sender.GetFirstName] Joins the Migration"
 enedwaith.1003.desc: "Heralds from [sender.GetName] have arrived pledging their swords for our cause. they will join our Migration and settle with us when we reach our new home!"
 enedwaith.1003.a: "Excellent"
 
 enedwaith.1005.t: "Time to Go"
 enedwaith.1005.desc: "[migration_leader.GetName] has sent out the call that the time we have been waiting for has arrived. the Saralaini Migration has begun! Of course, time has passed since we made the commitment to join in the Migration and we don't have to go if we don't want to..."
 enedwaith.1005.a: "We Go!"
 enedwaith.1005.b: "We Stay!"
 
 enedwaith.1100.t: "Arrival in Thalion"
 enedwaith.1100.desc: "Thalion has fallen on hard times since the days of the kings of [arnor|E], now, the capital of [cardolan|E] is little more than a palace in a field. nevertheless it is still the capital of the southern remnant and its lord is still the person we have to talk to in order to settle in [eriador|e]"
 enedwaith.1100.a: "Petition the Prince"
 
 enedwaith.1101.t: "The Saralaini Migration"
 enedwaith.1101.desc: "A host of Enedwaithrim warriors and civilians arrived in Thalion today. seeking my permission to settle somewhere in [eriador|e]. In return for this, they are offering to swear fealty to me as their lord and to enforce our laws. Of course, inviting in such a host of barbarians could have #warning consequences#! but they are unlikely to leave and they could prove useful against the [witchking|e]"
 enedwaith.1101.a: "Offer [GetTitleByKey('d_ethir_gwathlo').GetNameNoTier]"
 enedwaith.1101.b: "Offer [GetTitleByKey('d_tyrn_gorthad').GetNameNoTier] and [GetTitleByKey('d_dyr_maenason').GetNameNoTier]"
 enedwaith.1101.c: "Offer land in [GetTitleByKey('k_arthedain').GetNameNoTier]"
 enedwaith.1101.d: "Refer them to the King"
 enedwaith.1101.e: "Refuse their offer"
 saralani_react_poorly: "@warning_icon! #warning The Saralaini Will React Poorly #!"
 
 enedwaith.1102.t: "Land Offered"
 enedwaith.1102.desc: "The Prince of [cardolan|e] has offered us [target_duchy.GetNameNoTier] for us to settle. we would become direct vassals of the Prince and as long as we maintain his laws we will be left pretty much alone."
 enedwaith.1102.a: "We Accept"
 enedwaith.1102.b: "Placeholder - No/invade"
 enedwaith.1102.c: "We can win better land..."
 sarlain_end_scripting: "#warning End of Scripted Chain #!"
 
 enedwaith.1103.t: "Cardolan Orders us to Leave"
 enedwaith.1103.desc: "The Prince of [cardolan|e] has ordered us to leave his realm and seek lands elsewhere. declaring us barbarians he has warned his armies and will resist any attempt to settle in his lands. what are we to do with this insult..."
 enedwaith.1103.a: "We will Take this Land by Force!"
 enedwaith.1103.b: "We'll be back..."
 
 enedwaith.1104.t: "An Unexpected Offer"
 enedwaith.1104.desc: "The Prince of [GetTitleByKey('k_cardolan').GetNameNoTier] has presented a very unexpected preposition, [cardolan|E] has long been the second power in [eriador|e], falling behind [GetTitleByKey('k_arthedain').GetNameNoTier] in both prestige and power. The prince wants us to change that. Offering [GetTitleByKey('d_hyarromenya').GetNameNoTier] along with any other land we can conquer from his rival. if we swear loyalty he will even back our mission"
 enedwaith.1104.a: "Sounds like a Plan"
 enedwaith.1104.b: "We'll Attack, but we wont do it for you."
 enedwaith.1104.c: "We'll choose our own destiny"
 cardolani_volenteers: "Маленькие зелёные люди"
 saralain_invasion_war: "Саралайнское переселение"
 
 enedwaith.1105.t: "The Saralaini Migration"
 enedwaith.1105.desc: "Recently a group of Enedwaithrim warriors and civilians arrived in Thalion and asked [cardolanprince.GetName] for land to settle in [eriador|e]. the Prince wisely referred the issue to me and told their leader, [migration_leader.GetName] to wait for my decision. The risk these barbarians pose is real, but they could be a true bulwark against the darkness rising in the north..."
 enedwaith.1105.a: "Offer [GetTitleByKey('d_ethir_gwathlo').GetNameNoTier]"
 enedwaith.1105.b: "Offer [GetTitleByKey('d_tyrn_gorthad').GetNameNoTier] and [GetTitleByKey('d_dyr_maenason').GetNameNoTier]"
 enedwaith.1105.c: "Offer [GetTitleByKey('d_hyarromenya').GetNameNoTier]"
 enedwaith.1105.d: "Offer [GetTitleByKey('d_shire').GetNameNoTier]"
 enedwaith.1105.e: "Offer them land in [GetTitleByKey('k_rhudaur').GetNameNoTier]"
 enedwaith.1105.f: "Refuse their offer"
 
 enedwaith.1106.t: "An Interesting Offer"
 enedwaith.1106.desc: "Representatives of [kingarthedain.GetName] have arrived with an interesting offer for us. The third realm of the north, [GetTitleByKey('k_rhudaur').GetNameNoTier] has long been disserted and overrun by the hillmen, now with the threat of the [witchkingshort|e] in [GetTitleByKey('k_angmar').GetNameNoTier], [kingarthedain.GetFirstName] wishes to see a bulwark reestablished in Rhudaur, one that can hold off all foes. He wants us to be that bulwark."
 enedwaith.1106.a: "It's an offer we cannot refuse!"
 enedwaith.1106.b: "We'll settle in Rhudaur but maintain independence"
 enedwaith.1106.c: "How about no?"
 
 enedwaith.1200.t: "Arrival in Isengard"
 enedwaith.1200.desc: "Before us stands the great tower of [orthanc|E] the center of the [gondorian|e] fortress of [isengard|E]. the tower is imposing but so is the king it represents. [gondor|e] is in the midst of a golden age and we would be honored to get even a trickle of the lands wealth. but of course that is up to the King."
 enedwaith.1200.a: "Petition the King"
 
 enedwaith.1201.t: "The Saralaini Migration"
 enedwaith.1201.desc: "A great host of Enedwaithrim Warriors and Civilians has arrived at [isengard|E] to ask for land to settle in our realm. They promise to serve in our stead and follow our laws if we allow them to settle here. The risk these barbarians pose is manageable, but we might want to offer them something on the border to be safe."
 enedwaith.1201.a: "Offer [GetTitleByKey('d_parth_iaur').GetNameNoTier]"
 enedwaith.1201.b: "Offer [GetTitleByKey('d_westmarches').GetNameNoTier] and [GetTitleByKey('d_drulad').GetNameNoTier]"

 enedwaith.1201.e: "Refuse them."

 enedwaith.1011.t: "New Lands - Should never be seen"
 enedwaith.1011.desc: "Placeholder - [GetGlobalVariable('saralain_dev_pool').GetValue]"
 enedwaith.1011.a: "Placeholder - join"
 enedwaith.1011.b: "Placeholder - die"
 
 enedwaith.1202.t: "Border Land Offered"
 enedwaith.1202.desc: "The king of [gondor|E] has offered us [target_duchy.GetName] to settle. The land is on the border of the realm and while we would maintain some independence it is certainly not as tempting as other farther lands. So, do we accept the offer?"
 enedwaith.1202.a: "We Accept"
 enedwaith.1202.b: "We'll Find a New home ourselves" 

 enedwaith.1203.t: "The King's Response"
 enedwaith.1203.desc: "The king of [gondor|e] has refused our request to settle. In addition he has demanded that we return to our homes and barred us passage through [isengard|E]. This insult is something that we can not let stand. The [sea_peoples|e] must pay for their actions..."
 enedwaith.1203.a: "We'll be back..."
 enedwaith.1203.b: "Cast out the [dunedain|e]"

 SARALANI_INVASION_CB_NAME: "Саралайнское вторжение"