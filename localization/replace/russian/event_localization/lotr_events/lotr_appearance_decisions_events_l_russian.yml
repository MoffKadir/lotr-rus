l_russian:
 lotr_appearance_decisions_events.4000.t: "Заказ маски"
 lotr_appearance_decisions_events.4000.desc: "Я снова ловлю себя на том, что смотрю в зеркало на своё изуродованное лицо. Я ловлю себя на том, что делаю это всё чаще с тех пор, как [Select_CString(ROOT.Char.IsFemale, 'сняла', 'снял' )] повязки и [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] показать свое лицо миру. Чем больше я смотрю, тем большее отвращение испытываю к тому, что смотрит на меня в ответ. Знакомые черты моего лица навсегда изменились, и я не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что смогу продолжать видеть себя [Select_CString(ROOT.Char.IsFemale, 'такой', 'таким' )].\n\nЯ понимаю, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] что-то сделать, чтобы избавить себя от этих мучений. Я не смогу править, если не смогу сосредоточиться ни на чем, кроме сломленного ужаса, который смотрит на меня из каждого отражения..."
 lotr_appearance_decisions_events.4000.a: "Мне подойдёт маска, чтобы скрыть это уродство."
 lotr_appearance_decisions_events.4000.b: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] закрыть всё своё лицо!"
 lotr_appearance_decisions_events.4000.c: "Нет, я - [disfigured_root.GetNameNoTooltip]! Мне не нужна маска!"

 lotr_appearance_decisions_events.4001.t: "Показ лица всему миру"
 lotr_appearance_decisions_events.4001.desc: "Как и каждое утро с тех пор, как я [Select_CString(ROOT.Char.IsFemale, 'надела', 'надел' )] маску, я надеваю кожаный ремешок на голову и чувствую, как холодный, безжалостный металл касается моего разбитого лица. Тяжело вздохнув, я пересекаю комнату, беру ручное зеркальце с прикроватного столика и подношу его к лицу.\n\nЯ с отвращением смотрю в зеркало. [Select_CString(ROOT.Char.IsFemale, 'Трусиха, которая', 'Трус, который' )] слишком [Select_CString(ROOT.Char.IsFemale, 'боялась', 'боялся' )] показать миру свою истинную сущность... Не в первый раз я задаюсь вопросом, не оставить ли мне маску в своих покоях и не предстать перед двором с открытым лицом, как оно есть."
 lotr_appearance_decisions_events.4001.a: "Я сниму свою маску и вновь покажу своё лицо миру!"
 lotr_appearance_decisions_events.4001.b: "Нет, я не вынесу этого."

 lotr_appearance_decisions_events.5000.t: "Взор одного глаза"
 lotr_appearance_decisions_events.5000.desc: "Я рассматриваю своё отражение, не [Select_CString(ROOT.Char.IsFemale, 'уверенная', 'уверенный' )], что это правильный способ рассказать о потере глаза. Возможно, мне больше подойдёт другой вариант.\n\nПередо мной разложены несколько повязок. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать, принять ли одну из них или предстать перед миром [Select_CString(ROOT.Char.IsFemale, 'такой, какая', 'таким, какой' )] я есть."
 lotr_appearance_decisions_events.5000.a: "$lotr_health_events.4000.a$"
 lotr_appearance_decisions_events.5000.b: "$lotr_health_events.4000.b$"
 lotr_appearance_decisions_events.5000.c: "$lotr_health_events.4000.c$"
 lotr_appearance_decisions_events.5000.d: "$lotr_health_events.4000.d$"
 lotr_appearance_decisions_events.5000.e: "$lotr_health_events.4000.e$"
 lotr_appearance_decisions_events.5000.f: "$lotr_health_events.4000.f$"
 lotr_appearance_decisions_events.5000.g: "$lotr_health_events.4000.g$"
 lotr_appearance_decisions_events.5000.h: "Это приемлемо."