 ### Emperor Sandamal - Our Path Forward (Victory) ###

 mumakan.0001.t: "Победа в войне"
 mumakan.0001.desc: "Гонец опускается передо мной на колени на мраморном полу командного павильона, и долгое время я ничего не говорю - я просто смотрю на пыль на его сапогах, на усталые морщинки вокруг его глаз. Ещё до того, как он произносит хоть слово, я понимаю, что всё кончено: [GetTitleByKey('k_koronande').GetNameNoTier] пала. Не путём женитьбы, как это удалось в своё время #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofmamakil18').GetID] #L Матаре «Мудрому»#!#! со всей его дипломатией и осторожным, бескровным гением, а силой оружия, путём тридцатилетнего напряжённого терпения, вылившихся в одну решительную кампанию. Я вспоминаю холодный, размеренный голос моего дяди, который говорил мне, что империи не строятся на чувствах. Я уже не в первый раз думаю, что он был прав в этом, даже если ошибался почти во всём остальном. Победа лежит у меня в груди, как камень: тяжёлая, холодная и настоящая."
 mumakan.0001.a: "Железный лев доказал правдивость своего имени."

 mumakan.0002.t: "Приветствие героя"
 mumakan.0002.desc: "Когда я вхожу, большой зал буквально взрывается. Вожди племён выкрикивают мое имя, придворные поэты уже декламируют свои стихи, а знамёна завоёванной республики свисают, словно трофеи, со сводчатого потолка, где когда-то висели знамёна моего отца. Я принимаю всё это с прямой спиной и невозмутимым лицом, я всегда с таким хладнокровием выполнял приказы трона, независимо от того, сулят ли они триумф или катастрофу. Именно [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] первым подчинил [GetTitleByKey('k_koronande').GetNameNoTier] воле #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#!, но он добился этого с помощью невесты и пира. Я добился этого безжалостным острием меча. То, что завоевано мечом, должно быть удержано мечом, и я не должен забывать эту истину, даже когда эти люди ликуют.\n\nТе вожди, которые когда-то шептались о слабости династии, теперь кричат громче всех. Я вижу их лица, каждого из них; они радуются, потому что ожидают большой добычи. Я вознагражу их достаточно, чтобы удовлетворить, но не настолько, чтобы ободрить. Работа империи никогда не заканчивается, она только меняет свои очертания."
 mumakan.0002.a: "Пейте вволю! Нужно отпраздновать это."
 mumakan.0002.b: "Празднуйте, если должны, но не принимайте ни одну победу за окончание нашей борьбы."

 mumakan.0003.t: "Встреча с Амедой"
 mumakan.0003.desc: "Он появляется в шёлке цвета морской пены и кланяется ровно так низко, как того требует протокол, и ни на йоту ниже; это человек, который просчитал каждый жест в своей жизни и понял, что точное выражение почтения стоит дороже, чем его излишество. [aameda.GetFirstName] говорит красиво, как и все ему подобные. Он говорит о братских узах, об общей крови между #L [GetCultureByKey('koronandi').GetCollectiveNoun|l]им#! народом и [GetCultureByKey('mumakanil').GetName|l], а также о родстве, которое война прервала, но не смогла уничтожить. Отчасти он прав, что и делает его опасным.\n\nЯ провёл тридцать лет при дворе, полном людей, которые улыбаются одними губами, а глазами что-то подсчитывают; я знаю этот тип людей так же хорошо, как свое собственное отражение. Я не сомневаюсь, что он будет верно служить империи; до тех пор, пока ему это не станет невыгодно. Полезная змея остается змеей. Я буду держать его при себе, наблюдая за ним, как человек следит за веревкой моста, в прочность которой он не до конца верит."
 mumakan.0003.a: "Твои слова нежны, как шёлк, но мои глаза всегда открыты."
 mumakan.0003.b: "Человек с таким «братским» духом заслуживает видного места рядом со мной."

 mumakan.0004.t: "Сообщения о сопротивлении"
 mumakan.0004.desc: "Донесения от губернатора теперь поступают непрерывным потоком: о засадах на восточной дороге снабжения, о деревенских старейшинах, которые замолкают, когда солдаты задают вопросы, и о судье, найденном мертвым в канаве под #ONCLICK:TITLE,c_korlan #TOOLTIP:LANDED_TITLE,c_korlan #L Корланом#!#!#!. Не было ни свидетелей, ни подозреваемых, и весь район утверждает, что ничего не слышал. Я не удивлен; я бы меньше думал о них, если бы они просто сложили оружие и забыли. Люди, которые так долго сражались, которые пролили столько крови за республику, которая дала им то, во что они верили, не откажутся от своей гордости вместе с оружием в руках. Гордость, однажды проглоченная, отравляет изнутри.\n\nОтвет моего дяди на это был бы простым, жестоким и эффективным в краткосрочной перспективе. Тем не менее, в долгосрочной перспективе это породило бы ту же ненависть, которая в конечном итоге сделала его неуправляемым; ту же ненависть, которая принесла мне и наследство, и бремя. Я не унаследую свою гибель таким образом. Есть другие способы закончить войну, кроме как с помощью меча."
 mumakan.0004.a: "Если они не хотят мира, пусть у них будет тень, которую они не смогут ударить."
 mumakan.0004.b: "100 друзей послужат лучше 100 рабов, подадим им руку, а не кулак."

 ### Emperor Sandamal - Magnanimity (White Peace) ###

 mumakan.0011.t: "Мирное решение"
 mumakan.0011.desc: "Есть особое унижение в том, когда тянешься к чему-то обеими руками и обнаруживаешь, что оно ускользнуло из-под твоих пальцев. Это не было вырвано или украдено; оно просто находится вне досягаемости, и винить в этом некого, кроме расстояния. Я подписываю условия этого белого мира в палатке, пропахшей грязью и мокрой парусиной. Я сохраняю полное спокойствие, потому что лицо императора принадлежит его народу, даже если его сердце не занято этой задачей.\n\nПобеда была в моих руках. Я мог видеть ее очертания и чуять ее обещание в последних донесениях. Затем линии снабжения были прерваны, начались дожди, и вожди северян начали посылать мне подчеркнутые знаки молчания вместо своей дани. Война, которая пожирает империю, не принесет победы, я всегда это знал. И все же, осознание этого не делает подписание соглашения более легким."
 mumakan.0011.a: "Мы примем этот мир. Я не буду править королевством из пепла и костей."

 mumakan.0012.t: "Встреча с Атаракой"
 mumakan.0012.desc: "Я ожидал увидеть демагога: человека, который поднимается в толпе и сгорает, как только толпа рассеивается, полного огня и недовольства, но пустого внутри. То, что произошло за столом напротив меня, было тем, к чему я не был готов. Он был уставшим, но порядочным человеком, на которого его народ взвалил непосильную ношу, и он нес ее, не дрогнув, ни разу не попросив об этом. Он не злорадствовал и не прихорашивался. Он прочитал условия договора с пристальным вниманием человека, который понимает, что слова имеют значение.\n\nКогда он, наконец, встретился со мной взглядом, я увидел в нем печаль, а не торжество. Я понял, что не могу ненавидеть его за то, что он держал в руках то, что я не мог взять. Я встречал королей, великих полководцев и людей, которые утверждали, что верят в правоту своего дела; я научился не доверять им всем, потому что вера - это часто маска, надетая поверх амбиций. И все же этот человек верил, и это стоило ему всего. Я осознал эту цену, потому что всю свою жизнь по-разному расплачивался за это. Мы расстались без теплоты или холодности. Никто из нас не говорил о молчаливом понимании, возникшем между нами в тот последний момент: что в другую эпоху или в другом мире мы могли бы быть друг для друга кем-то другим, а не противниками."
 mumakan.0012.a: "Иди с миром, Атарака. Ты заслужил уважение, которого мало кто когда-либо удостоится от меня."
 mumakan.0012.b: "Наши дела здесь закончены. Не жди такой милости, если мы встретимся снова."

 mumakan.0013.t: "Потеря легитимности"
 mumakan.0013.desc: "Мои подданные с осторожностью относятся к выражению своего несогласия. Они всегда были осторожны, эти вожди, которые преклоняют колени, затачивая свои ножи. Однако шепот уже не такой тихий, как раньше, и мой слух остается превосходным. Говорят, боги лишили нас благосклонности. Они утверждают, что династию взвесили и нашли несостоятельной, а Железный лев стар и зубы у него притупились. Я слышал эту песню раньше во всех вариациях. Я пережил всех, кто когда-либо пел ее.\n\nТрон все еще стоит, потому что я все еще стою. Существует фундаментальная разница между неудачей и поражением. Это различие, которое эти люди, которые никогда не правили ничем большим, чем речная долина, не могут полностью осознать. Пусть они шепчутся. Я по-прежнему Железный лев. Они вспомнят эту истину, когда их ропот наконец достигнет моих ушей, а это неизбежно произойдет."
 mumakan.0013.a: "Пусть шепчутся в тени. Они увидят, что мои когти остры, как всегда."
 mumakan.0013.b: "Это было лишь временное отступление. Я подарю им победу, которая заставит всех замолчать."

 mumakan.0014.t: "Бремя терпения"
 mumakan.0014.desc: "Дань от нафаратских вождей поступает с опозданием, затем в меньшем количестве, чем следовало бы, а затем и вовсе не поступает. Депеши от северных префектур отличаются особым осторожным тоном, что означает, что они сообщают о бедствии как можно мягче. Они надеются, что я не стану наказывать гонца за это сообщение. Целью этой кампании было заставить этих людей замолчать. Она должна была как можно яснее продемонстрировать, что возможности империи превосходят амбиции любого племени или вождя, который возомнил себя выше трона.\n\nВместо этого я вызвал у них недовольство и создал прецедент. Осмелевшие люди - самый опасный тип людей. Я не могу бороться с ними сейчас, поскольку казна этого не выдержит, а армии нужно передохнуть. Я должен быть терпеливым. Терпение всегда было моим главным оружием и самыми тяжелыми цепями. Оно привело меня так далеко, и я должен верить, что оно поможет мне продвинуться дальше. И все же я устал, а терпение - верный спутник на долгом пути."
 mumakan.0014.a: "Пока что согласиться с их условиями. Политическая цена неповиновения слишком высока."
 mumakan.0014.b: "Раздать золото из казны. Мы должны обеспечить их молчание, чтобы спасти наши реформы."

 ### Emperor Sandamal - Defeat / Last Days ###

 mumakan.0021.t: "Волна разрушения"
 mumakan.0021.desc: "Поражение. Это слово засело у меня в голове, как камень, брошенный в тихую воду. Я наблюдаю, как от него расходятся кольца. Каждое из них - следствие, которое я уже начал просчитывать. Двор, вожди и отдаленные провинции почувствуют волнение еще до того, как новость достигнет их ушей. Я никогда раньше не употреблял это слово по отношению к себе. Ни за тридцать лет, ни за дюжину кампаний, ни за годы дворцовых интриг это не сломило бы человека с менее железным хребтом.\n\nТем не менее, это неоспоримый факт, сказанный посланником, у которого пыль на сапогах и страх в глазах. Я не могу спорить с арифметикой этого. Армии #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#! были разбиты и изгнаны из [GetTitleByKey('k_koronande').GetNameNoTier]. Человек, о котором мне говорили, что его никто не превзошел. Империя рушится у меня под ногами. Я чувствую это так, как моряк ощущает изменение течения перед приближением шторма. Все, на что я потратил тридцать лет, сейчас, в этот момент, находится в настоящей опасности."
 mumakan.0021.a: "Невозможно!"

 mumakan.0022.t: "Достоинство побеждённых"
 mumakan.0022.desc: "Они привели меня в [GetTitleByKey('c_korlan').GetNameNoTier] для подписания. Я понял, что выбор был осознанным. Это был завоеванный город, зал врага и стол победителя. Я вошел в этот зал с прямой спиной и невозмутимым выражением лица. Лицо императора принадлежит его империи даже в ее худший час. На самом деле, оно принадлежит народу, особенно в его худший час. [ataraka.GetFirstName] сидел напротив меня и не злорадствовал. Я ожидал насмешки и почти предпочел бы ее. Злорадствующего человека легко презирать, а мне нужно было что-то непринужденное в этой комнате.\n\n[aameda.GetFirstName] представил условия с тонкой, осторожной улыбкой. Это была улыбка человека, который играл в игру дольше, чем кто-либо другой в комнате, и только что подтвердил свой успех. Договор, который они положили передо мной, сотнями нитей связал Мумакана с волей Коронандэ, по крайней мере, на целое поколение. Тогда я заплакал впервые с тех пор, как был мальчиком, наблюдая, как слуги моего отца выносят его из зала для аудиенций. Я плакал не о себе. Я плакал об империи и о сыновьях и дочерях, которые должны были родиться в тени этого дня. Они должны найти какой-то способ устоять перед этим. Я подписал пергамент, но не склонился перед ним. Это последнее достоинство принадлежит мне и империи. Ни один договор, ни на каком языке, не может лишить нас его."
 mumakan.0022.a: "Чернила высохли, но мой дух остается непоколебимым."

 mumakan.0023.t: "Хищные языки"
 mumakan.0023.desc: "Двор превратился в место, где звучат очень осторожные голоса и очень быстрые взгляды. Каждый оценивает своего соседа. Каждый просчитывает, что означает поражение для человека рядом с ним и, что более важно, что это значит для него самого. Даже имперские принцы перестали прикрывать свои амбиции обычной маской почтения, которой требует протокол.\n\nЯ знаю этот двор. Я вырос здесь как подопечный, заложник и запасной наследник, от которого никто не ожидал, что он выживет. Я усвоил его правила еще до того, как научился бриться. Я понимаю язык подтекста, тяжесть подчеркнутого молчания и полезность предложений, сделанных через посредников, чтобы сохранить свои руки чистыми. Я знаю, что делать, когда собираются падальщики. Я всегда знал. Вопрос не в том, смогу ли я с ними справиться. Вопрос в том, превысят ли затраты на такое управление в конечном итоге цену альтернативы."
 mumakan.0023.a: "Заглушение самого громкого голоса поможет остальным запомнить свое место."
 mumakan.0023.b: "Дать им пустые обещания. Жадностью управлять гораздо легче, чем амбициями."

 mumakan.0024.t: "Бдение императора"
 mumakan.0024.desc: "В тишине двора, вынесшего свое решение, есть что-то особенное. Я научился слышать это еще ребенком. Я услышал это, наблюдая за выражением лица моего дяди, когда он думал, что никто не видит. Я видел это по слугам, которые двигались немного быстрее, и по стражникам, которые стояли немного прямее. Я слышал это по дверям, которые закрывались чуть плотнее, чем нужно.\n\nПри дворе сейчас царит тишина, и я знаю, что это значит. Я знаю, потому что я пережил это раньше. Я пережил людей, которые убили моего отца. Я пережил годы преднамеренной жестокости моего дяди. Я пережил все кампании, все предательства и все тайные заговоры, которые считали себя достаточно умными, чтобы добраться до трона. Пусть они приходят, кем бы они ни были и что бы они ни устроили. Я по-прежнему Железный лев. Железный лев не сдается, не склоняется и не моргает."
 mumakan.0024.a: "Я все еще Железный лев. Пусть они испытают меня на прочность, если посмеют."
 mumakan.0024.b: "Удвоить стражу. Доверие - это роскошь, которую я больше не могу себе позволить."

 mumakan.0025.t: "Амеда передаёт свои наилучшие пожелания"
 mumakan.0025.desc: "Лезвие вонзается между третьим и четвертым ребром. Это точный удар, работа человека, которому точно сказали, куда наносить удар, потому что нанявшая его рука не потерпела бы ничего меньшего, чем совершенство. Я пошатываюсь, и убийца почти нежно подхватывает меня. Он опускает меня на мраморный пол, как будто это дань вежливости, а не убийство.\n\nКогда мои колени касаются холодного пола моей собственной комнаты, я вижу это. К внутренней стороне плаща мужчины, там, где только умирающий может находиться достаточно близко, чтобы прочитать, приколот маленький кусочек шелка цвета морской пены. На нем вышит герб рода [GetScriptedCharacterByHistoryID('lineofaamediadvisor').GetDynastyName].\n\nМрамор очень холодный. Мрак не предвещает ничего хорошего."
 mumakan.0025.a: "Таков удел Железного льва..."

 mumakan.0026.t: "Тень Железного льва"
 mumakan.0026.desc: "[sandamal.GetFirstName] мертв. Империя, которая в течение тридцати лет подчинялась его воле и держалась на плаву благодаря железному терпению этого человека, теперь обнаруживает, из чего она сделана без него. Принцы, которые когда-то преклоняли колени, теперь стоят прямо. Они стремятся к тому, чего всегда жаждали: к власти в ее самой эгоистичной и праздной форме.\n\nОтдаленные провинции затихли, как люди, которые выжидают, в какую сторону подует ветер, прежде чем примкнуть к какой-либо стороне. Настал момент. Не сражения, кампании или стратегические обсуждения определяют нас сейчас. Вот здесь, прямо сейчас, находится стержень, от которого зависит будущее империи. Тот, кто сдвинется с места первым, будет двигаться по инерции хаоса. Тот, кто сдвинется с места последним, унаследует все, что останется."
 mumakan.0026.a: "Сталь решит судьбу престолонаследия. Трон принадлежит сильнейшему."

 mumakan.0027.t: "Мстительное освобождение"
 mumakan.0027.desc: "Они пересекают границу не как завоеватели, потому что они слишком умны для этого. Вместо этого они приходят как освободители. Их знамена провозглашают свободу народа мумаканил от ига несостоявшейся династии. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] признать, что риторика хорошо продумана. Риторика - это то, в чем в Коронандэ всегда преуспевали лучше всего, и Атарака, прежде всего, знает, как заставить слово падать, как клинок.\n\nАвантюра, что предпринял [sandamal.GetFirstName], завершилась. Империя, которую он стремился укрепить путем завоеваний, теперь поглощается теми самыми людьми, которых он не смог покорить. Это своего рода ирония, о которой историки будут писать на протяжении многих поколений с удобного расстояния. Это не то утешение, которое доступно тем из нас, кто переживает это. Сейчас я стою на краю пропасти. Империя истощена. Я смотрю на горизонт, в сторону моря, и впадаю в отчаяние."
 mumakan.0027.a: "Собрать все оставшиеся силы. Империя не должна пасть!"
 mumakan.0027.b: "#N Бросайте посты! Бегите, спасайте свои жизни!#!"

 mumakan.0028.t: "Ухмылка республики"
 mumakan.0028.desc: "[ataraka.GetFirstName] был уже почти у ворот, когда обернулся. То, что последовало за этим, не было государственным деятелем, республиканским героем или оратором, который поднял десять тысяч человек на борьбу против империи. Это был просто человек, который, вопреки всем разумным расчетам, выжил. Он не мог смириться с этим фактом. Он ухмыльнулся и поднял руку.\n\nС самым величественным презрительным прощанием, которое я когда-либо видел за тридцать лет наблюдения за тем, как великие люди покидают свои комнаты, спаситель Коронандэ попрощался с империей Мумакан. Это был жест непринужденности, последняя насмешка над тяжеловесным, железным достоинством, которое я сохранял всю свою жизнь. Затем он исчез. Он прошел через ворота и растворился в пыли, возвращаясь в свою республику. К своему немалому удивлению, я обнаружил, что не могу заставить себя возненавидеть его за это."
 mumakan.0028.a: "Последнее оскорбление, нанесенное с изяществом мастера."

 ### Ataraka II - Miracle at Korlan (Victory) ###

 mumakan.0031.t: "Чудесный поворот событий"
 mumakan.0031.desc: "Я не позволял себе представить такое. Ни разу, ни в лагерях в джунглях, ни в долгой темноте осады. Я не осмеливался на это в те предрассветные часы, когда лежал без сна, ощущая тяжесть мертвых на своей груди. Выживание республики зависело от решений, для принятия которых я не был уверен, что у меня хватит мудрости. Я запретил себе роскошь представлять этот момент. И вот он настал, и я обнаружил, что у меня нет для этого подходящей тары.\n\nЧто-то поднимается во мне, как вода, просачивающаяся сквозь камень, или солнце после долгих лет хмурости. Я думаю, это можно назвать радостью. Это простая, огромная и смущающая радость. Я не могу это остановить, да и не хочу. Мы были в меньшинстве. Они сожгли [GetTitleByKey('c_korlan').GetNameNoTier]. Они думали, что мы сломаемся, но мы не сломались. Каким-то образом, невероятно и великолепно, мы победили.\n\nРеспублика жива. Мой народ в безопасности. Я думаю о людях, которые стояли рядом со мной в грязи, когда не оставалось никаких веских причин для того, чтобы стоять. Я хочу найти каждого из них, пожать им руки и сказать, что мы сделали это. Мы совершили невозможное. Кажется, я смеюсь. Я этого не стыжусь."
 mumakan.0031.a: "Республика выстояла. Путь наших предков наконец-то в безопасности!"

 mumakan.0032.t: "Низвергнутый император"
 mumakan.0032.desc: "Император [sandamal.GetFirstName] стоит перед нами, поверженный нашими руками в этой невозможной победе. Этот потенциальный грабитель нашей республики совсем не такой, каким я его себе представлял. Он держится с последним достоинством, на которое способен, но я вижу огонь в его глазах. Это то же самое жжение, которое я почувствовал, когда увидел, как [GetTitleByKey('k_koronande').GetNameNoTier] растерзана и уничтожена. Я испытываю мимолетную жалость к державе, но ее быстро заглушает презрение.\n\nЧто бы хорошего ни сделал этот человек для своей страны, он оставил мою страну и мою семью в руинах. Рядом со мной [aameda.GetFirstName] представляет договор. Это документ, имеющий обязательную силу, и он полностью оплачивает каждое совершенное святотатство. Это воздастся нынешнему поколению и следующим. [sandamal.GetFirstNameNoTooltip] стоит неподвижно, как старое дерево. Несмотря на слезы, выступившие на его лице, он подписывает пергамент. Он встает во весь рост в последний раз, прежде чем его достоинство иссякнет. [aameda.GetFirstNameNoTooltip] просто улыбается скупой, холодной улыбкой. В ней нет жалости, только ожидание. Империя навсегда вписана в анналы истории."
 mumakan.0032.a: "В этот день было утрачено нечто очень ценное."
 mumakan.0032.b: "Он - пережиток уходящей эпохи. Ничего ценного не было потеряно."

 mumakan.0033.t: "Долг разорённых"
 mumakan.0033.desc: "Я был рад оставить сломленного императора на произвол судьбы в том хаосе провинций, который его теперь ожидает. И все же я помнил, что он сделал с моей страной. Я помнил о бессмысленном и ничем не сдерживаемом разрушении. Я думал о том, что я был вынужден делать, и о состоянии моего народа. Они разбиты и залиты кровью. Отцы, матери и невинные дети - все они были поглощены разрухой, которую он навлек на нас. Внезапно я чувствую злобу, которая сильнее всего остального в моем сердце. Это тяжелее, чем моя радость, и острее, чем мое горе.\n\nЯ поворачиваюсь и изображаю самую вопиющую и язвительную улыбку в своей жизни. Мне больше не нужна дипломатическая маска или взвешенные слова государственного деятеля. Мы победили. Однажды он украл нашу гордость, и теперь я показал ему реальность его нынешнего положения. Он ничего не может сделать, кроме как молча и удивленно ахнуть."
 mumakan.0033.a: "Пусть он подавится своим собственным молчанием."

 mumakan.0034.t: "Труд живущих"
 mumakan.0034.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] лежит в руинах. Большая гавань все еще завалена почерневшими останками сгоревшего флота. Дворцы разрушены до основания, а на улицах остались шрамы, которые не заживут за одно поколение. Впереди огромная работа, и я не буду оскорблять ее, называя как-то иначе.\n\nОднако я жив, чтобы смотреть правде в глаза. Мой народ жив. Республика жива. Она пострадала до неузнаваемости и превратилась в нечто почти неузнаваемое, но она живет. Все, что живет, можно восстановить. Я обнаружил, что смотрю на эту истину не со страхом, а с чувством, очень похожим на голод. Я провел годы, борясь за выживание республики. Теперь, наконец, я могу бороться за ее процветание. Камень за камнем, закон за законом, корабль за кораблем. Я не устал. Я закатываю рукава и радуюсь этому."
 mumakan.0034.a: "Вложить все силы в город. Мы должны защитить наши стены и наше будущее."
 mumakan.0034.b: "Сначала восстановим флот. Наша торговля - это источник жизненной силы, который профинансирует всё остальное."

 mumakan.0035.t: "Горнило свободы"
 mumakan.0035.desc: "Приходит известие, что [sandamal.GetFirstName] мертв. [GetTitleByKey('e_mumakan').GetNameNoTier], этот великий и изнуряющий механизм, начал разрушаться изнутри. [aameda.GetFirstName] появляется у моего локтя, как он всегда делает, когда открывается дверь. Своим точно выверенным голосом он доказывает, что настал подходящий момент. Он видит истинные возможности республики. Он хочет, чтобы мы распространили свои притязания на центральную часть страны, в то время как империя слишком занята кровопролитием, чтобы сопротивляться.\n\nЯ внимательно слушаю его, потому что он не ошибается насчет возможности. Радость от победы не сделала меня дураком. Затем я смотрю на [GetTitleByKey('c_korlan').GetNameNoTier], как он перестраивается. Я смотрю на восток, в сторону границы, и думаю о жителях Мумакана. Они фермеры, ремесленники и матери с детьми на руках. Они не выбирали нового императора. Они не выбирали жить во тьме, как и мой народ не хотел, чтобы на него напали. Я задаю себе вопрос, ради ответа на который я построил эту республику. Разве люди не заслуживают того, чтобы управлять собой? Если я боролся, несмотря ни на что, потому что верил, что у нашего народа должно быть такое право, почему бы не распространить эту прекрасную свободу на всех? Передо мной дебаты в большом совете. Одни голоса призывают к миру, другие - к войне. Я стою на трибуне и присоединяю свой голос к какофонии."
 mumakan.0035.a: "Мы принесём им свободу. Пусть империя рухнет, а народ восстанет."
 mumakan.0035.b: "Месть - единственный язык, который они понимают. Теперь мы станем хозяевами."
 mumakan.0035.b.tt: "Республика должна быть реорганизована в первую Коронандскую империю"
 mumakan.0035.c: "Мы уже достаточно пролили крови. Пусть уничтожат сами себя, пока мы заботимся о своих."

 ### Ataraka II - White Peace ###

 mumakan.0041.t: "Цена выживания"
 mumakan.0041.desc: "Война заканчивается безрезультатно - ни триумфа, ни катастрофы, только долгий выдох двух измученных народов, отступающих от края пропасти. Коронандэ остается свободной: избитая, разграбленная, половина ее башен разрушена, ее улицы все еще представляют собой выжженный остов, весь свет был затемнен кровью ее сыновей, но она свободна, она дышит, мы все дышим, больше нет ига войны, теперь рассвет наступил. Хотя бы в этот раз это принесет надежду. Ибо мы, живые, завоевали в мирное время награду более ценную, чем когда-либо на войне. Наши жизни, наша свобода. Наше выживание…"
 mumakan.0041.a: "Выживание - это сама по себе победа. Пусть начнется исцеление."

 mumakan.0042.t: "Признание равных"
 mumakan.0042.desc: "Атарака встречается с императором Мумакана, ожидая, что его врагом будет какой-нибудь тёмный властелин, какой-нибудь король-тиран с армией рабов, но история редко бывает такой черно-белой, перед ним человек, император, и он гораздо больше похож на уставшего от долга старика, хорошего человека, хотя и с другой стороны. Чем больше они разговаривают, тем больше он их уважает, хотя так много боли было куплено за столь малую цену, они оба выжили, и теперь, наконец, никто не является хозяином, потому что и Атарака, и Сандамал считают друг друга равными."
 mumakan.0042.a: "Построим прочный мир. Мы должны вместе смотреть в будущее."
 mumakan.0042.b: "Я уважаю этого человека, но наши державы снова столкнутся. Мы должны быть тверды."

 mumakan.0043.t: "Восставшие из пепла"
 mumakan.0043.desc: "Корлан должен быть отстроен заново — гавань, рынки, суды, вся сложная архитектура цивилизации, которая за несколько ужасных месяцев была практически уничтожена, — все это должно быть восстановлено. Всю свою карьеру я строил то, что, по мнению тех, кто был осторожнее и не так уверен в своих силах, построить было невозможно, и в конце концов я всегда находил способ доказать, что они ошибались. Республика не пережила бы эту войну, если бы осталась недостроенной. Я не остановлюсь."
 mumakan.0043.a: "Восстановить стены. Наша безопасность - основа нашей свободы."
 mumakan.0043.b: "Восстановить рынки. Процветание - лучшая месть."

 mumakan.0044.t: "Надвигающаяся буря"
 mumakan.0044.desc: "Аамеди отводит меня в сторону — как он всегда делает именно в тот момент, когда я бы предпочел, чтобы меня не отвлекали, — и говорит тихим, размеренным голосом, который приберегает для правды, которую ему не хочется говорить. Он говорит, что мир был простым компромиссом, а не убеждением; что Сандамал уже пополняет запасы и наблюдает за нашим восстановлением с терпеливым вниманием человека, который намерен вернуться; что мы должны наращивать силы сейчас, пока у нас еще есть на это время. Все мои инстинкты говорят о том, что верить ему не стоит: война закончилась, погибших едва похоронили, а я устал так, как и представить себе не мог. Но я слишком дорого заплатил за то, чтобы понять: Аамеди говорит спокойно, только когда уверен в своих словах, а я еще ни разу не ошибался, когда он был уверен."
 mumakan.0044.a: "Он прав. Мы должны собрать армию, достойную республики."
 mumakan.0044.b: "Нет. Мы должны стремиться к примирению. Написать письмо императору."

 mumakan.0045.t: "Последняя битва"
 mumakan.0045.desc: "Они вернулись — чёрная орда на горизонте, знамёна и флаги, море людей и копий, длинные колонны солдат Мумакана, движущиеся через восточные перевалы, — все, о чем предупреждал меня Аамеди, и даже больше. Все, что мы построили за годы, прошедшие после разграбления, — каждая стена, возведенная из обломков, каждый корабль, спущенный на воду из сырых досок, каждая надежда, которую республика отправляла на тренировочные полигоны, чтобы ее сыновья проливали кровь, потели и учились, — все это свелось к одному дню на этой земле. Мы сделали все, что было в наших силах. Сыны Коронандэ на своих постах, они готовы и знают, что защищают. Что бы ни случилось дальше, решение будет приниматься здесь, и я буду стоять во главе — я устал решать все из-за стен."
 mumakan.0045.a: "Призвать сынов республики! Пусть они выступят единым фронтом!"
 mumakan.0045.b: "Выпустить мумаков! Они не пройдут!"

 ## Ataraka II - War Loss ##

 mumakan.0051.t: "Конец республики"
 mumakan.0051.desc: "Всё кончено — не так, как заканчиваются великие дела в песнях, с последним отчаянным рывком и именем, которое стоит запомнить, а так, как на самом деле заканчивается большинство вещей: постепенно, неизбежно, пока не наступит утро, когда ворота просто не выдержат. Республика — то, во что я вкладывал каждый час своей жизни, то, ради чего я брался за оружие, то, во что я верил, когда не мог заставить себя поверить во что-то другое, — исчезла, и я бегу, хотя поклялся, что никогда этого не сделаю, и вот я бегу, а на лицо мне летят холодные брызги морской воды. Позади меня, на горизонте, пылает Корлан: его башни, его дворы, его гавань, улица, на которой тридцать лет назад я вел свое первое дело перед судьей, сказавшим, что я слишком предан закону. Я уношу с собой все, что осталось, — горстку верных людей, тлеющие угли того, что когда-то было великим, — и больше не оглядываюсь, потому что если оглянусь, то не смогу остановиться." # AI Place Holder - Please Replace
 mumakan.0051.a: "Мы спаслись, но у нас не осталось ничего, кроме наших жизней."
 mumakan.0051.a.tt: "#N Все резервы исчерпаны#!"

 mumakan.0052.t: "Последнее противостояние"
 mumakan.0052.desc: "Это все, что у нас осталось, — последняя монета, выгребанная из пустых хранилищ, последние люди, которые все еще готовы встать под знамена республики, хотя у них есть все основания этого не делать. Аамеди ушел, и я отправлюсь в изгнание с теми немногими силами, что у меня остались. Я бегу и не останавливаюсь, потому что останавливаться — это то, чему я еще не научился и не собираюсь учиться сегодня. Республика повержена и скована цепями, ее кровь заливает южные моря от Пэла до Кхая. Я не дурак, я знаю, что день упущен, но моя страна не будет спокойно оставаться в цепях, и так будет продолжаться до тех пор, пока мы живы, освободив коронадцев. Мы добираемся до безопасного места на скрытой поляне в густых джунглях. Оцениваем ситуацию и понимаем..." # AI Place Holder - Please Replace

 mumakan.0052.a: "Мы едва спасли наши жизни."
 mumakan.0052.a.tt: "#N Резервов не осталось - мы сражаемся голыми руками.#!"
 mumakan.0052.b: "Мы спаслись, но были ранены!"
 mumakan.0052.b.tt: "#N Резервов не осталось - мы сражаемся голыми руками.#!"
 mumakan.0052.c: "Мы спаслись, но остались с голыми руками."
 mumakan.0052.c.tt: "#N Резервов не осталось - мы сражаемся голыми руками.#!"
 mumakan.0052.d: "Горстка ополченцев - это всё, что мы можем собрать."
 mumakan.0052.d.tt: "#N Горстка ополченцев - это всё, что мы можем собрать.#!"
 mumakan.0052.e: "Небольшой боевой отряд сплачивается под знаменем."
 mumakan.0052.e.tt: "#N Небольшой боевой отряд сплачивается под знаменем.#!"
 mumakan.0052.f: "Можно разместить подходящий гарнизон."
 mumakan.0052.f.tt: "#N Можно разместить подходящий гарнизон.#!"
 mumakan.0052.g: "Достаточно оружия для надёжной обороны."
 mumakan.0052.g.tt: "#N Достаточно оружия для надёжной обороны.#!"
 mumakan.0052.h: "Начинает формироваться настоящая армия."
 mumakan.0052.h.tt: "#N Начинает формироваться настоящая армия.#!"
 mumakan.0052.i: "Из наших скрытых запасов получается внушительное войско."
 mumakan.0052.i.tt: "#N Из наших скрытых запасов получается внушительное войско.#!"
 mumakan.0052.j: "Мумакил осёдланы, и стража собрана в полной силе."
 mumakan.0052.j.tt: "#N Мумакил осёдланы, и стража собрана в полной силе.#!"
 mumakan.0052.k: "Каждый гражданин был вооружён - это нация, находящаяся в состоянии войны."
 mumakan.0052.k.tt: "#N Каждый гражданин был вооружён - это нация, находящаяся в состоянии войны.#!"

 ### General Baciiri - In the Emperor's Name ###
 mumakan.0071.t: "Предрешённый исход"
 mumakan.0071.desc: "С опустошением в сердце коронандцев, это был лишь вопрос времени, когда их кровь остынет, а решимость ослабнет. Теперь #italic предрешённое свершилось#!, этот военный фарс окончен, и мы одержали заслуженную победу, то, что нам причитается. Теперь начинается задача по восстановлению этого величественного порта и превращению его в инструмент процветания всей империи. Этот город больше не будет выщелачивать пищу из наших желудков. Жирные купеческие властители этого города больше не будут осушать #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакан#!#!#! досуха из-за нечестно нажитого богатства, к которому они стремятся.\n\nТеперь, когда мы вернули всё, что они украли, мои воины вернулись домой, чтобы насладиться плодами своего великого труда. Но есть еще одна обязанность, которую я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выполнить, это великая честь и тяжкое бремя - быть глазами и руками нашего великого императора #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofmamakil125').GetID] #L Сандамала#!#! как [Select_CString(ROOT.Char.IsFemale, 'первая имперская наместница', 'первый имперский наместник' )] этой провинции, чтобы сохранить мир в этих землях и подготовить их к присоединению к нашей великой империи. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] смотреть в будущее, и я принимаю во внимание всех, кто остался, чтобы выполнить эту последнюю задачу."
 mumakan.0071.a: "Пришло время завоевать мир."

 mumakan.0072.t: "У городских врат Коронандэ"
 mumakan.0072.desc: "Я брал много городов. Но ни в один из них я не въезжал вот так — не как проезжающий мимо, не как завоеватель, уходящий, пока не рассеялся дым, а как человек, который останется здесь до конца времен. Люди, выстроившиеся вдоль улицы, молча наблюдают за происходящим — это не молчание побежденной армии, не приветственное молчание, а особое молчание людей, которые потеряли все и теперь с осторожным терпением тех, кто понял, что терпение — это все, что у них осталось, ждут, что будет дальше. Я мысленно подвожу итоги: ворота нуждаются в ремонте, в стене гавани есть брешь, через которую можно пройти, зернохранилища разграблены. Затем мой взгляд падает на ребенка в толпе — лет семи, не больше, он держит за руку женщину и смотрит на меня с таким выражением лица, которое я не могу понять и не скоро забуду. Что-то сжимается у меня в груди. Я отгоняю эти мысли и продолжаю путь." # AI Place Holder - Please Replace
 mumakan.0072.a: "Оценить ущерб и начать наводить порядок."
 mumakan.0072.b: "Пусть солдаты празднуют - они заслужили свою добычу."

 mumakan.0073.t: "Встреча с Аамеди"
 mumakan.0073.desc: "Он появляется именно в тот момент и именно в том месте, где от него больше всего пользы, с выражением лица человека, который уже давно ждал этого момента и рад, что наконец дождался. Он ориентируется в руинах политической жизни республики с легкостью, которая впечатлила бы человека, годами изучавшего эту сферу. Но для человека, который помогал ее создавать, это нечто совершенно иное. Он предлагает мне свои услуги, свои обширные связи, уцелевшие семьи торговцев и ростовщиков — тысячи нитей из шелка и железа, и все они проходят через его руки. Он обещает, что, если мы объединим наши интересы, город будет у моих ног, как и у его.\n\nЯ встречал таких людей, как Аамеди, во всех армиях, в которых служил: проницательных, незаменимых, не признающих никаких флагов, кроме своего собственного. Я работал под началом таких людей, как Аамеди, но пообещал себе, что больше этого не сделаю. Я не уверен, что ему можно доверять. Я не уверен, что могу позволить себе такую роскошь, как доверие."
 mumakan.0073.a: "На Амеди можно положиться - его знания слишком ценны, чтобы растрачивать их впустую."
 mumakan.0073.b: "Аамеди нельзя доверять - я знаю таких людей, как он, он скорее нанес бы мне удар в спину, если бы это было ему полезно."

 mumakan.0074.t: "Отпор"
 mumakan.0074.desc: "Он кланяется — безупречным, неторопливым поклоном, который требует многолетней практики, чтобы выглядеть непринужденным, — и уходит, не споря, что, на мой взгляд, еще больше выбивает из колеи, чем если бы он спорил. Его взгляд, когда он оборачивается, спокоен, мрачен и слегка насмешлив, как у человека, который уже слышал подобный ответ и на несколько шагов опережает собеседника. В тот последний момент он посмотрел на меня так, как мастер смотрит на инструмент с едва заметной трещиной: не то чтобы с презрением, но с особым разочарованием профессионала, столкнувшегося с предсказуемой проблемой." # AI Place Holder - Please Replace
 mumakan.0074.a: "Скатертью дорожка."

 mumakan.0075.t: "Соглашение с Аамеди"
 mumakan.0075.desc: "Он улыбается — без особой теплоты; я не думаю, что он способен на теплоту, — и в качестве подтверждения сделки предлагает подарок: имя, место и человека, который одновременно является полезной приманкой для более крупной сети сопротивления и, что немаловажно, личным врагом Аамеди. Он совершенно не скрывает, что эта сделка принесет ему прямую и, вероятно, немалую выгоду. Как ни странно, я уважаю его за честность — за то, что он не притворяется, будто его интересы совпадают с вашими, но все равно предлагает вам честную сделку. По крайней мере, вы знаете, за что платите. Я вслушался в это имя. Я знаю, с чего начать."
 mumakan.0075.a: "Тогда давайте начнём - покажите мне, где прячутся крысы."

 mumakan.0076.t: "Бесконечное сопротивление"
 mumakan.0076.desc: "Несмотря на все меры — удвоенное патрулирование, комендантский час, обеспечение поставок через три отдельных пункта, — [GetCultureByKey('koronandi').GetName|l] отказываются сдаваться и становятся все наглее. В предрассветные часы на постах находят убитых солдат; на дорогах, которые еще вчера были пустынными и тихими, горят фургоны с припасами; трое мужчин, которым я доверял управление внешними районами, просто перестали выходить на связь. Я участвовал в тяжелых войнах. Я воевал на труднопроходимой местности, против опытных командиров, против людей, у которых были все основания для победы и все ресурсы для этого. Но я никогда не воевал против целого народа — целого народа на его собственной земле, для которого каждый холм, каждый переулок и знакомое лицо — это преимущество, которое не нужно было планировать. Я начинаю понимать, почему Сандамал пообещал мне губернаторство, а не просто победу."
 mumakan.0076.a: "Удвоить патрули, но следить за порядком, ведь теперь эти люди - наши подданные!"
 mumakan.0076.b: "Возможно, Аамеди всё-таки был прав..."

 mumakan.0077.t: "Предсказание Аамеди"
 mumakan.0077.desc: "Он появляется — как будто одной мысли о том, что он нужен, достаточно, чтобы его вызвать, — с той понимающей улыбкой, которая за эти недели стала мне активно не нравиться. Это улыбка человека, который терпеливо ждал, пока реальность сама приведет аргументы в его пользу.  Он снова предлагает свои услуги с неторопливой благожелательностью человека, который никогда по-настоящему не сомневался в исходе этого разговора. Я долго смотрю на него — на его опрятный, аккуратный вид, выглаженные одежды, спокойные руки — и вспоминаю солдата, которого потерял на Корланской дороге две ночи назад. Я специально запомнил его имя, потому что считаю, что это самое меньшее, что командир может сделать для погибшего. Я думаю о гордости, о том, чего она мне стоила и чего может стоить в будущем."
 mumakan.0077.a: "Я не стану ползти к перебежчику - убирайся с глаз моих долой."
 mumakan.0077.b: "...ладно, ты, невыносимая змея, помоги мне покончить с этим."

 mumakan.0078.t: "Ответ Аамеди - Гордость превыше политики"
 mumakan.0078.desc: "Он пожимает плечами — великолепным жестом человека, который получал этот ответ в сотне разных советах от сотни разных старейшин и находил все версии одинаково предсказуемыми, — и уходит, не настаивая на своем, потому что такие люди, как Аамеди, знают, что настаивать редко бывает нужно. Уже в дверях, не оборачиваясь, он спокойно замечает тоном наставника, поправляющего многообещающего, но упрямого ученика: гордость — плохой щит от ножей в темноте, и я это уже знаю, но от этого не становится легче смотреть, как он уходит." # AI Place Holder - Please Replace
 mumakan.0078.a: "Пусть строят козни - я удержу этот город в одиночку с помощью меча."

 mumakan.0079.t: "Ответ Аамеди - Итоги"
 mumakan.0079.desc: "Его самодовольство, если уж на то пошло, даже хуже, чем вся эта неразбериха, — это устоявшееся, закостенелое самодовольство, которое явно не менялось годами. Но через несколько дней после нашего соглашения количество засад стало сокращаться: сначала крупных, потом поменьше, пока дороги не опустели, как никогда с тех пор, как я выехал за ворота. Его паутина проникает в Коронандэ, как вода проникает в старый камень, — находит каждую трещинку, каждый шов, каждое темное место, где может укрыться человек, прежде чем он станет проблемой, — и делает это быстрее, чем я смог бы построить с нуля, даже имея вдвое больше ресурсов. Мне не нравится, что это говорит о том, кто на самом деле знает этот город и кто на самом деле им управляет. Но я всегда уважал результат, а результат неоспорим. А пока — пока — мы работаем вместе."
 mumakan.0079.a: "Результаты говорят сами за себя - на данный момент мы работаем вместе."

 ### General Baciiri - White Peace ###

 mumakan.0081.t: "Бесчестие перед смертью"
 mumakan.0081.desc: "Приказ исходит от престола: принять белый мир — кампания окончена, завоеванные территории сданы, кровь, пролитая за эти годы, и сожженный Корлан стратегически ничего не значат в сравнении с меняющимися расчетами империи, которой я служил всю свою жизнь, но которую так и не смог понять. Я солдат. Я всегда был солдатом, а солдат подчиняется своему императору, и я подчинюсь своему — я складываю приказ и отдаю приказ отступить, не меняя выражения лица, потому что это тоже входит в обязанности солдата. Но послушание и достоинство — разные вещи, и, стоя здесь с этим приказом в руке, я понимаю, что мне нелегко сохранять достоинство. Интересно, понимает ли мой император, что он от меня требует. Наверное, нет."
 mumakan.0081.a: "Проглотить гордость и повиноваться - я служу трону, а не своему эго."

 mumakan.0082.t: "Последствия мира"
 mumakan.0082.desc: "Император щедр: земля вместо обещанного губернаторства - тихое поместье в мирной провинции, где я мог бы построить дом и что-нибудь посадить, и не просыпаться до рассвета, чтобы подсчитать расположение войск. Я понимаю, что это справедливое предложение. В земле нет ничего плохого; земля долговечна, земля реальна, и я достаточно часто спал на холодной земле, чтобы понимать ценность крыши над головой. Но я не был рожден для крыши над головой - я родился в сточных канавах Амару, и я прокладывал себе путь оттуда, используя единственные средства, которые у меня были, и с тех пор каждый шаг, который я делал, был движением вперед, и мысль о том, чтобы развернуться и назвать это жизнью, сидит у меня в груди как камень, который я не могу сдвинуть с места. Меч - это единственное, что я когда-либо по-настоящему понимал. Не думаю, что я еще закончил с этим."
 mumakan.0082.a: "Отказаться - я солдат, а не фермер."
 mumakan.0082.b: "Принять землю и спокойную жизнь - для меня эта война окончена."

 ### General Baciiri - Defeat ###

 mumakan.0091.t: "Наше величайшее поражение"
 mumakan.0091.desc: "Моя армия разбита вдребезги - не в результате какого-то организованного тактического отступления, которое можно выдать за передислокацию, а по-настоящему разбита, как это бывает, когда по ней наносят достаточно сильные удары и достаточно часто, чтобы ее невозможно было восстановить. Это сделали [GetCultureByKey('koronandi').GetName|l] - те оборванные, полуголодные, с ввалившимися глазами защитники разгромленной республики, которые не должны были побеждать, но все равно победили, которые держались вместе благодаря тому, что я понимаю лучше, чем хотел бы признать: особому упрямству людей, которые решили, что они не будут побеждены. Те, кто позволит этому закончиться. Обещанное губернаторство - это дым. Я стоял на пороге величайшего свершения, которое когда-либо собирался совершить, а люди, которые были слишком упрямы, чтобы понять, что они потерпели поражение, протянули руку и отобрали это у меня. Я уважаю это. Я уважаю это так, как вы относитесь к пожару - полностью и с того, что осталось от безопасного расстояния."
 mumakan.0091.a: "Отступить и перегруппироваться - возможно, ещё есть шанс."

 mumakan.0092.t: "В тупике"
 mumakan.0092.desc: "Передо мной долгий путь домой, и у меня такое ощущение, что мне зачитывают вслух приговор - каждый шаг - это слово, пункт назначения - приговор, которого я пока не знаю. Я думаю о Сандамале, который доверил мне великую задачу своего правления и перед лицом которого мне придется как-то предстать, когда этот поход закончится. Я думаю о людях, которые последовали за мной сюда и которые не последуют за мной обратно, и я тихо произношу их имена на ходу, потому что я всегда верил, что это самое малое, что командир может сделать для погибших. Будет ли то, что ждет меня в конце этого пути, судом или милосердием, трибуной или вежливым уходом в безвестность, я не могу сказать - политика империи всегда была выше моего понимания. Это не имеет значения. Я сталкивался с вещами и похуже неопределенности, и я всегда сталкивался с ними одинаково: шаг за шагом, глядя вперед, пока все не закончится."
 mumakan.0092.a: "Ждать указаний императора и предстать перед любым ожидающим вас судом."
 mumakan.0092.b: "Исчезнуть в приграничье - лучше изгнание, чем казнь."

 mumakan.0093.t: "Вернуться или нет?"
 mumakan.0093.desc: "Сандамал мёртв, и империя - этот огромный, скрежещущий, кажущийся несокрушимым механизм, которому я отдал тридцать лет своей жизни, - трещит по всем швам одновременно, и каждый амбициозный властитель в Мумакане внезапно обнаруживает, что верность - понятие гибкое, когда трон пустует. Каждая рука, держащая меч, внезапно стала на вес золота у трона, а это значит, что, возможно, впервые за свою карьеру я не просто полезен, но и ценен, и между этими двумя вещами есть разница, которую человек из Амару учится чувствовать нутром. Я смотрю на людей, которые все еще со мной, - закаленных в боях, преданных сверх всякой меры, ожидающих моего слова так, как они всегда ждали, - и я оцениваю то, что у меня на самом деле есть, чего больше, чем кажется, и меньше, чем мне нужно, и, возможно, достаточно. Я всю свою жизнь был полезен влиятельным людям. Возможно, пришло время выяснить, являюсь ли я сам влиятельным человеком."
 mumakan.0093.a: "Встать на сторону нового императора - верность трону останется неизменной."
 mumakan.0093.b: "Оставаться в стороне - пусть принцы обескровят друг друга, прежде чем выбрать сторону."
 mumakan.0093.c: "Потребовать своё в этом хаосе - генералу с армией не нужен император."

 ### Ataraka Initial Story Chain ###
 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aamedi is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aamedi responding.

 mumakan.0110.t: "Падение Корлана"
 mumakan.0110.desc: "#italic Наступает утро, и рассвет приносит#! #bold смерть.#!\n\nВы можете видеть, как над заливом, мерцая, как кровавая луна, утром так же ясно, как и ночью, поднимается над Корланом пламя, великое и ужасное, чёрное и безжизненное, желтоватое безмолвие. Оно горит, и ваш народ горит вместе с ним, ваша республика, ваше бремя, ваша честь, ваша надежда. Оно горит, как ваши глаза. Оно горит, как ваше сердце. Когда ветер подхватывает парус вашего одинокого судна и доносит до вас запах дыма, горящих специй, горящей плоти, вы понимаете.\n\nСтарания сотен поколений преданы огню. Тысячи лет законов, советов и торговли, десять тысяч #L [GetCultureByKey('koronandi').GetCollectiveNoun|l]их#! лиц в их десяти тысячах трудов - и все это теперь тешит тщеславие тирана."
 mumakan.0110.a: "Я смотрю на погребальный костёр республики."
 mumakan.0110.b: "У меня нет слов."
 # cynical response
 mumakan.0110.c: "Что сделано, то сделано."

 # mumakan.0111 Aamedi's response is the same no matter what you said.
 mumakan.0111.t: "Ответ Аамеди"
 mumakan.0111.desc: "Аамеди хранил безмолвие, но это молчание нельзя назвать мирным. Это видно по его позе. Он сжимает кулаки и скрипит зубами. Его обычная надменная непримиримость куда-то подевалась. Огонь и смерть сверкают в его глазах, окрашенных отчаянием и ненавистью. Он смотрит на воду, прежде чем, наконец, повернуться к вам.\n\n«Вы тоже это чувствуете, Атарака». Его голос напряжён. «Вы чувствуете эту боль, это горе. Держитесь за это. Только это будет поддерживать нас в предстоящие долгие дни, и благодаря этому мы, возможно, ещё увидим настоящую победу...»"
 # you look back and think of your choices how did it come to this?
 mumakan.0111.a: "Я помню дорогу, которая привела нас к этому мрачному дню..."

 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "Воззвание Сандамала"
 mumakan.0112.desc: "Это был унылый день, когда пришло послание.\n\nГонец со свитком, запечатанным императорской печатью Сандамала, потребовал встречи с Великим советом, и в глубине души я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]знал, что ничего хорошего из этого не выйдет. Развернув свиток, эмиссар заговорил голосом императора.\n\n«Советники Коронандэ, внемлите моим словам и выслушайте последнее предложение о снисхождении. Долгое время вы насыщались кровью моего народа, высасывая нашу жизненную силу и оплевывая честь наших предков. Довольно. Смиритесь перед законными наследниками благословенного Индура и преклоните колени перед его троном, и не нужно будет проливать кровь, ибо золото оплатит ваши виру за ваши грехи. Откажитесь, и у меня не останется другого выхода, кроме как отомстить за свой народ сталью».\n\nСовет немедленно разразился возмущением по поводу такой наглости, вопиющих попыток вымогательства. Слова быстро нарастают, пыл достигает апогея, из уст советников сыплются клятвы и проклятия, когда они клянутся никогда не преклонять колени перед императором."
 mumakan.0112.a: "Итак, это была война."

 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "Военный совет"
 mumakan.0113.desc: "Когда эмиссар отбыл, совет перешёл к обсуждению надвигающейся войны. Но тогда не было особого страха - ведь разве Коронандэ не была невообразимо богата? Разве стены Корлана не были могучими и высокими? Сыны республики были едины, в отличие от давно разделенных дикарей империи, которые теперь выкрикивали угрозы у их ворот.\n\nИ всё же, несмотря на весь этот пыл и хвастовство, до моего слуха донесся голос осторожности - Аамеди говорил об осторожности, о том, что он много слышал об императоре Сандамале и о тех, кто находится у него в услужении. И хотя мне тогда хотелось огрызнуться на него, обвинить в том, что политика его фракции и вопиющая коррупция привели к такому провалу, я [Select_CString(ROOT.Char.IsFemale, 'справилась', 'справился' )] с собой. Сейчас было не время. Не тогда, когда судьба республики потенциально висела на волоске.\n\nОднако, несмотря на моё собственное решение, я не [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел' )] ничего подобного в совете - фракции быстро разделились, обсуждая стоимость защиты, кого следует нанять, кого призвать. И всё же, в конце концов, совет с трудом определился со своими мерами..."
 mumakan.0113.a: "Мы сосредоточились на мумакил, чтобы противостоять империи в бою."
 mumakan.0113.b: "Сыны республики - наша сила."
 mumakan.0113.c: "Мы должны подготовиться к контратаке!"

 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
 mumakan.0114.t: "Молниеносный поход"
 mumakan.0114.desc: "Однако все приготовления были напрасны. Армии Мумакана выступили ещё до того, как эмиссар Сандамала заговорил с нами, и едва мы начали возводить оборону, как с востока пришли имперские войска. Любые попытки помешать им пресекались с легкостью, как будто армии Коронандэ были всего лишь мелкой помехой.\n\nПеред таким натиском надежды внезапно рассеялись, уступив место пьянящей уверенности, которая была всего день назад. Войско Сандамала наводило отчаяние скоростью своего продвижения, а это было оружие пострашнее стали."
 mumakan.0114.a: "И всё же мы должны были попытаться!"
 # cynical response
 mumakan.0114.b: "Ни один вариант не был исключён!" # cynical
 mumakan.0114.c: "Наша самоуверенность была нашей глупостью."

 # mumakan.0115 The siege was bloody
 mumakan.0115.t: "Кровь и золото"
 mumakan.0115.desc: "Осада продолжалась недолго, учитывая все обстоятельства. Какое-то время стены держались, но великие мумакил наконец прорвали их, и оттуда распространилась паника. Многие жители Корлана стали причиной его гибели, когда бежали от разрушенной стены, отчаянно пытаясь найти убежище в домах или на кораблях. Хаос лишил их всякой надежды на успешную оборону, и имперские силы не были слепы. Они быстро направились к гавани, стремясь воспрепятствовать любому бегству. Лишь нескольким кораблям удалось отчалить, прежде чем первый из них был подожжен, и огромные корабли легли на погребальный костер республики. И пожар распространялся, пока не охватил не только порт, но и весь город. Моя собственная жена погибла тогда, оказавшись под осыпающимися камнями и пылающим залом. Не пощадили и гордые дворцы великих семей. Они были разграблены, их обитатели перебиты или закованы в цепи, и их заставили служить победителю. Бесчисленные сокровища республики, как из крови, так и из золота, стали собственностью империи."
 mumakan.0115.a: "Это было адское зрелище."

 # mumakan.0116 There was little hope, hundreds died in the fires, you sought advice from Aamedi.
 mumakan.0116.t: "Бегство совета"
 mumakan.0116.desc: "Тогда советники попытались сбежать, видя безнадежность ситуации, не обращая на меня никакого внимания, несмотря на мои призывы к спокойствию и выработке плана. Но бегству не суждено было состояться. Не для них. Когда гавань была взята, паника, в конце концов, охватила даже их самих, и обвинение распространилось так же быстро. Некоторые пытались добраться до своих поместий, другие - до стен, чтобы бежать по суше. Третьи пытались добраться до гаваней, несмотря на опасность. Они погибли так же легко, как и массы, к которым они когда-то относились с презрением.\n\nСтража совета осталась позади, верная до последнего, отчаянно сдерживая имперские силы.\n\nИменно в этом хаосе ко мне подошёл Аамеди и с удивительной силой потащил меня по улицам, наша стража постепенно гибла.\n\n«День потерян. Завтра мы ещё можем одержать победу, но для этого сперва нужно выжить»."
 mumakan.0116.a: "Возможно, но как?"

 # mumakan.0117 Finally the city was falling, Aamedi had a ship, you had to flee, but you had left with...
 mumakan.0117.t: "Самый длинный день в истории Корлана"
 mumakan.0117.desc: "Город уже почти пал. У меня сжалось сердце, когда я увидел, как жемчужина морей, жемчужина республики, была сожжена и разрушена таким образом.\n\nВ конце концов, Аамеди привел меня к месту, которое он искал, - к скрытой нише, выходящей в залив, где стояла небольшая лодка, уже в то время спешно загруженная припасами.\n\n«Это старый запасной вариант», - тихо сказал он, - «на тот день, когда совету, возможно, пришлось бы спасаться бегством. Предшественник моего предшественника приказал построить его... То, что я доживу до того времени, когда им воспользуются, - горькая чаша».\n\nМы поспешно загрузили лодку всем, что она могла выдержать, перед отплытием, едва избежав вторжения вражеских войск. Наблюдая за горящим городом, я мог думать только о..."
 # with glory and brave deeds
 mumakan.0117.a: "Доблести защитников."
 # with the final respect of your people
 mumakan.0117.b: "Скорби по погибшим."
 # knowledge of war cynical
 mumakan.0117.c: "Том, что война ещё не окончена."

 # mumakan.0120 A Toast to the end of the republic
 # Essential scene: Aamedi gives a thorough analysis of the situation.
 # They need time to evacuate what they can, build up civilian resistance, and delay as long as possible.
 # Option A: (Defensive Strategy)
 # Option B: We will fight to the bitter end (Offensive Strategy)
 # Option C: evacuate our resources to fight another day
 mumakan.0120.t: "Речь у края света"
 mumakan.0120.desc: "«Итак», - голос Амеди сумел вернуть себе непринужденное, добродушное выражение, за которым скрывались все его истинные чувства. «Корлан предан огню; по всей вероятности, большая часть совета сейчас мертва или закована в цепи, так же как и многие из самых знатных и старинных родов державы».\n\nЯ прикусываю язык, чтобы удержаться от комментариев по поводу предполагаемого благородства этих... старинных родов.\n\nОн продолжает, набирая скорость, как катящийся валун. «Вероятно, казна была разграблена и вывезена, за исключением того немногого, что у нас есть на этом корабле. Селения будут трястись от ужаса, когда город падет. Я ожидаю, что многие сдадутся при первых признаках появления армии Сандамала. Нам нужно будет действовать осторожно, но пока мы продолжаем сражаться, республика не погибла».\n\nОн поворачивается ко мне, его глаза больше не горят, а сосредоточенно смотрят в одну точку. «Вы - глава республики. Как мы будем сражаться теперь, когда наши самые большие ресурсы потеряны?»"
 # Defensive Strategy
 mumakan.0120.a: "Мы не можем надеяться победить их в открытом поле."
 mumakan.0120.a.tt: "Вы будете следовать по пути концентрации на оборонительной тактике и истощении сил, изматывая оккупационные имперские силы."
 # Offensive Strategy
 mumakan.0120.b: "Мы должны нанести удар сейчас, пока у нас еще есть силы, какими бы разрозненными они ни были."
 mumakan.0120.b.tt: "Вы будете следовать по пути концентрации на наступательной тактике, ставя все на одну решающую битву, чтобы изгнать захватчиков."

 # Evacuating things to the reserve
 mumakan.0120.c: "Этот бой не состоится ни сегодня, ни завтра. Но, возможно, когда-нибудь."
 mumakan.0120.c.tt: "Вы получите #P +1#! ресурсов. Это укрепит вас в изгнании, если вы потерпите поражение."

 ### War Perspective Events (Ataraka) ###

 # The following events describe the war from Ataraka's perspective at 1, 5, and 10 months.
 # Always a few options: keep potential exile laamp strengthened, or spend last reserves.

 # mumakan.0131 1 month mark perspective event
 mumakan.0131.t: "Сплочение уцелевших"
 mumakan.0131.desc: "Некоторые сомневались, но спустя месяц после падения Корлана нам удалось выстоять. Ситуация по-прежнему остаётся крайне нестабильной, но именно это время позволило начать собирать разрозненные остатки поддержки. Начинают прибывать посыльные и грузы, и некоторые ранее напуганные города начали осторожно протягивать руку помощи.\n\nЭто многообещающий знак, но теперь мне нужно решить, что делать с этими новообретёнными ресурсами..."
 # Spends resources (and spawns extra troops)
 mumakan.0131.a: "Мы должны набрать больше солдат!"
 mumakan.0131.a.tt: "Вы получите 1000 ополчения"
 # Spends resources (and grants extra siege modifier)
 mumakan.0131.b: "Мы не сможем одержать победу, если не сможем вернуть себе города."
 mumakan.0131.b.tt: "Вы получите модификатор осады"
 # continue evacuation / do not use resources
 mumakan.0131.c: "Ещё нет. Подождём и посмотрим, как будут развиваться события."
 mumakan.0131.c.tt: "Вы получите #P +1#! ресурсов."

 # mumakan.0132 8 month mark perspective event
 mumakan.0132.t: "Отчаянная борьба"
 mumakan.0132.desc: "Восемь месяцев. Я прожил восемь месяцев в холмах и джунглях внутренних земель, спал в пещерах, пахнущих мокрым камнем и старой землей, питался тем, что могла дать земля и наши редеющие союзники, вел войну с помощью средств отчаяния - засад, отступления, отрицания, терпения. Мы удерживаем промежутки между их сжимающимися кулаками, обломками, местами, которые слишком малы, или слишком круты, или слишком густо заросли джунглями, чтобы их колонны могли пройти, не истекая кровью при каждом шаге.\n\nВосемь месяцев, и мы не сдались. Разведчики из войска Сандамала - я начал узнавать их по выправке, по особой усталости людей, которые ожидали короткой кампании и оказались втянутыми в то, чему не будет конца, - докладывают своим командирам, что сопротивление продолжается. Что мы продолжим. Я испытываю мрачное удовлетворение от этого, хотя и не могу позволить себе роскошь зацикливаться на этом.\n\nАамеди подсчитывал наши запасы с дотошностью человека, который знает, что войны выигрывают не храбрецы, а те, у кого есть средства, и цифры, которые он мне приводит, поразительны. Мы выживаем, но само по себе выживание не освободит республику. Вопрос в том, потрачу ли я то немногое, что у нас есть сейчас, на то, чтобы сохранить наше хрупкое преимущество, или буду беречь его до наступления мрачных дней, которые, я знаю, грядут."
 mumakan.0132.a: "Потратить ресурсы для продолжения войны."
 mumakan.0132.a.tt: "Вы тратите #N -1#! ресурсов."
 mumakan.0132.b: "Потратить золото для продолжения войны."
 mumakan.0132.b.tt: "200 золотых покроют расходы"

 # mumakan.0133 15 month mark perspective event
 mumakan.0133.t: "Годовщина"
 mumakan.0133.desc: "Я перемещаюсь из деревни в лагерь, из деревни в деревню, пробираясь через густые джунгли, чтобы избежать захвата, координировать оборону, вдохновлять на сопротивление. Но в такие дни, как этот, именно я испытываю потребность в вере.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] ужасы, которые никто не должен видеть. Я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] неописуемое отчаяние от нищеты и разрушений. Но что ждёт меня сейчас?..\n\nСегодня влажный день. Жаркий день. Плотный спёртый воздух наполняет легкие и горло. Он смешивается с вонью горелой рвоты. Он душит меня. Он заставляет меня пошатываться, как ничто другое на этой проклятой войне. За хребтом раскинулась долина, усеянная белыми костями, и голодные собаки. Они обгладывают останки, разрывают кости на части, человеческие кости, человеческие останки. Мужчины, женщины, дети - проходимцы, мошенники и благородные...\n\n#N теперь это все пища для собак.#!"
 mumakan.0133.a: "Я попытаюсь выстоять..."
 mumakan.0133.a.tt: "Но ваш желудок пуст."
 mumakan.0133.b: "Я кашляю снова, и снова, и снова..."
 mumakan.0133.b.tt: "Но всё ещё не можете вздохнуть."
 # cynical option (requires global_var:ataraka_cynicism = 3)
 mumakan.0133.c: "Мы ничего не можем сделать для мёртвых."
 mumakan.0133.c.tt: "И вы вообще ничего не чувствуете."

 mumakan.0134.t: "Героическая оборона"
 mumakan.0134.desc: "Я не знаю как, но мы продержались два года против врага, который превосходил нас числом в десять раз. Вокруг лагеря, в котором мы живём, меня окружают сыны республики, они избиты и перебинтованы, их копья обветшали, а щиты в трещинах, но они улыбаются. Хотя война продолжается уже два года, они всё ещё сражаются, как и я. Аамеди хлопает меня по плечу и приглашает отойти в сторонку.\n\n«У этих людей есть такая надежда, но я боюсь, что она может продлиться недолго», - говорит Аамеди.\n\nОн наклоняется ко мне, понижая голос. «Вам следует развивать этот источник морального духа, пока вы ещё можете это сделать. Человек, у которого есть надежда, полезен и послушен, хотя это может стоить нам эффективности при определённых обстоятельствах».\n\nАмеди замолкает, позволяя мне обдумать варианты. «Обеспечьте меня всем необходимым, и я уверяю вас, что армии республики будут сражаться в два раза упорнее, чем раньше»."
 mumakan.0134.a: "Я обеспечу вас всем необходимым."
 mumakan.0134.a.tt: "Вы потратите #N -1#! ресурсов и #N 100#! товаров для обмена"
 mumakan.0134.b: "Нет, мы должны расставить приоритеты."
 mumakan.0134.b.tt: "Вы получите #P +1#! ресурсов."

 # mumakan.0135 38 month mark perspective event
 mumakan.0135.t: "Цена выживания"
 mumakan.0135.desc: "Три года. Три года я спал в грязи, ел то, что дают джунгли, и был благодарен за это, наблюдал, как людей, которых я тренировал и рядом с которыми проливал кровь, уносили с поля боя на носилках, сделанных из веток и рваной ткани. Три года этой изнурительной, неблагодарной, необходимой войны - и вот теперь Аамеди приходит ко мне с предложением, которое, как я знал, в укромном уголке за пазухой, где я храню правду, с которой не хочу сталкиваться, всегда было на подходе.\n\nОн нашел покупателей. Чужеземные купцы - муламбурилские торговцы, люди из отдаленных портов, которым наплевать на республику или империю, но очень хочется наживы, - они щедро заплатят за то, что осталось от наследия Корлана. Священные бронзовые изделия старого храма. Звездные карты гильдии навигаторов, которые переписывались от руки сотнями поколений. Древние юридические документы из Стены закона, те самые камни, на которых впервые были начертаны слова Тарасара. Наследие. Память. Идентичность.\n\n«Это предметы», - говорит Амеди, и его голос звучит мягче, чем я ожидал, а это значит, что он точно знает, о чем меня просит. «Предметы не истекают кровью. Предметы не умирают от голода. Предметы не оставляют детей без отцов», - он делает паузу. «А наш народ - да».\n\nЯ смотрю на реликвии, лежащие передо мной, и думаю о том, как Тарасар отказался от своей короны, чтобы республикой управляли мудрые, а не знать по праву рождения. Интересно, что бы он сказал, увидев, как его наследники торгуются из-за его наследства, чтобы купить копья?"
 mumakan.0135.a: "Продать священные сокровища Корлана за оружие - выживание важнее наследия."
 mumakan.0135.a.tt: "Вы получите #P +2#! ресурсов!"
 mumakan.0135.b: "Предложить муламбурил торговые монополии в обмен на оружие и товары."
 mumakan.0135.b.tt: "Вы получите #P +1#! ресурсов за #P 100#! товаров для обмена."
 mumakan.0135.c: "Мы не продадим свою душу, чтобы спасти свою шкуру."
 mumakan.0135.c.tt: "Вы тратите #N -1#! ресурсов"

 # mumakan.0136 50 month mark perspective event
 mumakan.0136.t: "Горький расчёт"
 mumakan.0136.desc: "Четыре года и два месяца. Я перестал считать дни; Аамеди подсчитывает их за меня в той книге, которую он держит у себя на груди, в той, где столбцы цифр превращают человеческие жизни в стратегическую арифметику. Я изменился за эти годы - я чувствую это по тому, как я теперь держу клинок, по тому, как я оцениваю деревню не по ее жителям, а по ее защищенности, по тому, как я выслушиваю сообщения о потерях с невозмутимостью, которая привела бы в ужас человека, который когда-то вел дела в судах Корлана.\n\nАамеди предлагает нечто такое, что заставляет даже его самого колебаться, прежде чем произнести это вслух, и именно поэтому я знаю, что это действительно ужасно. Мы отступаем - медленно, методично, уступая позиции, чтобы выиграть время, - и он предлагает оставить после себя нечто большее, чем выжженную землю.\n\n«Колодцы», - говорит он, не глядя мне в глаза. «Если мы лишим их воды, то лишим их возможности сохранить то, что они забрали. Это будет стоить им месяцев. Это будет стоить им людей. Это будет стоить им воли продолжать».\n\n«Нам это тоже дорого обходится», - говорю я.\n\n«Да». - пауза. «Но мы уже умираем, Атарака. Вопрос в том, умрем ли мы, сделав это дорогостоящим, или мы умрем, упростив это».\n\nЯ смотрю на свои руки - руки юриста, руки сына портного - и думаю о колодцах моего детства, о прохладной воде, которую набирали в глиняные горшки, о смехе детей, собравшихся у бассейна. Я думаю о том, кем я становлюсь, и о том, узнает ли республика, за спасение которой я борюсь, человека, который ее спасет."
 mumakan.0136.a: "Отравить колодцы на нашем пути отступления - пусть они выпьют смерть, даже если нам придется сделать то же самое."
 mumakan.0136.a.tt: "Вы получите #P +2#! ресурсов за #N лимит снабжения и повышение истощения#!"
 mumakan.0136.b: "Потратить остатки казны на вооружение наших оставшихся войск."
 mumakan.0136.b.tt: "Вы потратите #N -1#! ресурсов, чтобы получить #P 100#! товаров для обмена."
 mumakan.0136.c: "Спасаем, что можем, и готовимся к бегству - в жизни нет ничего постыдного."
 mumakan.0136.c.tt: "Вы получите #P +1#! ресурсов"

 # mumakan.0137 The Human Cost
 mumakan.0137.t: "Человеческие потери"
 mumakan.0137.desc: "Я много раз спорил с Аамеди. Мы спорим о стратегии, о ресурсах, о моральных границах, на которых я настаиваю, а он считает это странным. Но это первый раз, когда я спорил с ним и с абсолютной уверенностью знал, что я прав, а правота может нас погубить.\n\nДеревни в тылу наших войск голодают. Не медленный голод из-за скудных пайков, а отчаянный, опустошающий голод, от которого кожа становится как бумага, а глаза - как стекло, который заставляет матерей кормить своих детей супом из древесной коры и называть это обедом. Война уничтожила урожай; имперцы захватили то, что не унес огонь, а того, что осталось, едва хватает, чтобы поддерживать моих солдат на ногах. Совет Аамеди ясен, холоден и стратегически обоснован: запасы предназначены для армии, армия - для республики, а республику нельзя спасти, кормя людей, которые не могут воевать.\n\nЯ слушаю его. Я понимаю его рассуждения. Я понимаю, что он, вероятно, прав в отношении узкой, ужасной математики выживания.\n\nТогда я думаю о своей матери - жене бакалейщика, женщине, которая обеспечивала свои полки продуктами, а своих соседей - едой в любое неурожайное время года, - и я думаю о том, что бы она сказала мужчине, который позволил детям голодать, чтобы солдаты могли есть. И я знаю, что я сделаю, даже если это будет стоить мне войны."
 mumakan.0137.a: "Мы должны накормить всех, кого сможем, из наших собственных запасов."
 mumakan.0137.a.tt: "Вы потеряете #N -100#! товаров для обмена."
 mumakan.0137.b: "Мы должны эвакуировать всех, кого только сможем, и обеспечить их всем необходимым."
 mumakan.0137.b.tt: "Вы получите #P +1#! ресурсов за #N -200#! товаров для обмена."

 # mumakan.0138 The Death of the General
 mumakan.0138.t: "Смерть генерала"
 mumakan.0138.desc: "Аамеди появляется в командной палатке на рассвете с тем особым выражением лица, которое он приберегает для получения новостей, одновременно ошеломляющих и полезных: слегка приподнятые уголки его рта, блеск в глазах, который он не совсем скрывает, и невозмутимость в его поведении, которая говорит мне о том, что он уже просчитал все последствия прежде чем соизволите поделиться со мной своими сведениями.\n\n«Генерал мёртв», - говорит он. Просто. Как будто обсуждая погоду.\n\nЯ жду, потому что молчание Аамеди так же продуманно, как и его слова.\n\n«Его собственные люди», - продолжает он. «Мятеж. Похоже, годы гнили в джунглях, уменьшение жалованья и особое унижение от того, что их перехитрили люди, которые, как им говорили, сдадутся через месяц, в конце концов подорвали даже мумаканскую дисциплину». Ни малейшей улыбки. «Какая жалость».\n\nЯ должен чувствовать триумф. Человек, который сжег Корлан, который разрушил мою республику, который сделал мою жену воспоминанием, а мой народ изгнанником на своей собственной земле, - он мертв, а его армия распадается. Но я провел на этой войне слишком много лет, чтобы ошибочно принимать возможность за победу. Раненый зверь опасен, а армия без лидера - вдвойне. Некоторые дезертируют. Другие будут сражаться упорнее, им нечего терять, и ненависть заполнит пустоту, где когда-то стояла дисциплина.\n\nАамеди наблюдает за моими размышлениями, и когда я поднимаю взгляд, выражение его лица меняется - теперь оно становится напряженным и едва сдерживаемым. Он ждет моего приказа."
 mumakan.0138.a: "Начать контратаку, пока они ослаблены - этого требуют предки!"
 mumakan.0138.a.tt: "PLACEHOLDER_TT"
 mumakan.0138.b: "Аамеди призывает к терпению - мы должны расставлять приоритеты в текущих обстоятельствах."
 mumakan.0138.b.tt: "PLACEHOLDER_TT"

 # mumakan.0139 Nafarati Revolt
 mumakan.0139.t: "Северная буря"
 mumakan.0139.desc: "Когда он нас нашёл, гонец был полуживым от усталости - муламбурилская торговка, которая передавала собирала разведданные для Аамеди по каналам, о которых я давным-давно предпочел не расспрашивать слишком подробно. Новости, которые она принесла, из тех, что меняют ход войны на одном дыхании.\n\nНафаратцы подняли восстание.\n\nНе пограничная стычка, не спор о дани - полное отделение, северные военачальники объявляют о своей независимости от империи, которая обескровила себя, пытаясь сокрушить нас. Великая авантюра Сандамала провалилась: он отстранил нафаратцев от вторжения в Коронандэ, чтобы доказать, что трон в них не нуждается, и тем самым доказал с точностью до наоборот. Теперь, с пустой имперской казной и армией, увязшей в наших джунглях, нафаратцы просто... ушли. Забрали своих солдат, земли, преданность и амбиции и заявили империи, что она может оставить себе свой умирающий трон.\n\nАамеди уже смеётся - не своим обычным осторожным, размеренным смехом, а чем-то грубым и неподдельным, чего я никогда раньше от него не слышал. «Ты понимаешь, что это значит?» - спрашивает он, и на этот раз в его голосе нет расчета, только дикая, недоверчивая радость человека, наблюдающего, как дом его врага загорается изнутри.\n\nЯ понимаю. Империя не может воевать на два фронта. Вопрос сейчас в том, будем ли мы ковать железо, пока оно раскалено добела, или позволим огню сделать всю работу за нас."
 mumakan.0139.a: "Не может быть!"

 ### Sandamal War Perspective Events ###

 mumakan.0140.t: "Падение Коронандэ"
 mumakan.0140.desc: "Депеша прибывает ко двору в руках всадника, чья лошадь едва не пала под ним, и я еще до того, как печать была вскрыта, узнаю, что в ней содержится - особая настойчивость человека, который скакал без отдыха, говорит сама за себя, а я читаю подобные истории уже тридцать лет. Корлан пал. Великий портовый город, жемчужина, которая на протяжении многих поколений обескровливала мою империю из-за удушения южной торговли, был взят штурмом. Мой генерал - простолюдин, которого я вырастил из ничего, которому я доверял так, как не доверяю почти никому, - осуществил то, о чем мечтал каждый император со времени ухода Джи-Индура III, но никто не осмеливался попытаться.\n\nЯ позволяю себе вздохнуть с облегчением. Лишь раз. Затем я откладываю донесение в сторону и приступаю к расчетам, которые позволят определить, является ли эта победа закреплением моего наследия или просто прелюдией к его раскрытию. Вожди племен будут ожидать вознаграждения. Казна нуждается в пополнении за счет добычи. Нафаратцы на севере, намеренно исключенные из кампании, отметят как победу, так и свое отсутствие в ней, и сделают выводы, которыми мне нужно будет осторожно управлять.\n\nТвердая рука, щедрое вознаграждение и суровая кара, если потребуется. Война выиграна. Мир - это все."
 mumakan.0140.a: "Наконец-то республика склонится перед троном Мумакана."
 mumakan.0140.b: "Хорошо, но время для празднования настанет только тогда, пока последний коронандрим преклонит колени."

 mumakan.0141.t: "Донесения с фронта"
 mumakan.0141.desc: "Донесения генерала всегда были образцом военной четкости - о занятых и удерживаемых позициях, развернутых силах, потраченных силах - и я всегда читал их с признательностью человека, который ценит компетентность превыше всех позолоченных добродетелей, вместе взятых. Но в этом послании есть нотка, которой я раньше от него не видел: предостережение, пронизывающее уверенность, как темная нить сквозь яркую ткань.\n\nСопротивление, пишет он, усиливается в отдаленных районах. Селения, которые должны были сдаться после падения Корлана, вместо этого погрузились в молчание - не молчание покорности, а опасное молчание людей, решающих, как бороться без армии. Он развернул дополнительные патрули. Он перекрыл основные дороги. Он уверяет меня, что полностью контролирует ситуацию.\n\nЯ правлю уже тридцать лет и понял, что когда компетентный человек уверяет вас, что он полностью контролирует ситуацию, это означает, что он имеет дело с чем-то, что его удивило, и он пока не хочет об этом говорить. Это меня не тревожит - мой генерал более чем способен, а остатки республики не смогут долго сопротивляться без своей столицы, своей казны или своего флота. Но я отмечаю донесение и откладываю его в той части своего сознания, где храню то, что однажды может потребовать моего непосредственного внимания."
 mumakan.0141.a: "Хотя этого и следовало ожидать, это не очень здорово"
 mumakan.0141.b: "У генерала достаточно людей - это его испытание."

 mumakan.0142.t: "Упрямый юг"
 mumakan.0142.desc: "Шестнадцать месяцев. Предполагалось, что кампания продлится максимум три-четыре года, если погода изменится или прибрежные города окажутся более лояльными к республике, чем предполагали их торговые счета. Вместо этого я сижу в своем зале для аудиенций в Амару и читаю депеши, которые приобрели особую повторяющуюся интонацию войны, которая забыла, как закончиться.\n\n[GetCultureByKey('koronandi').GetName] не умрут. Я говорю это не с восхищением - хотя и вынужден признать, что в какой-то мере неохотно, - но с усталым признанием человека, который изучал историю достаточно долго, чтобы понимать, что оккупация страны - это совсем другое искусство, чем ее завоевание. Мой генерал удерживает города, дороги, гавани. Сопротивление удерживает холмы, джунгли, верность каждой фермерской жены, которая прячет оружие под камнями своего очага. Сейчас я сражаюсь не с солдатами - это народ, а народ нельзя победить теми же средствами, что и армию.\n\nПри дворе становится неспокойно. Вожди племен, которые так громко приветствовали падение Корлана, начали роптать по поводу дороговизны и продолжительности кампаний, а также особых неудобств, связанных с кампаниями, которые поглощают их ополчением и не приносят ничего, кроме новых депеш с требованием увеличить войска. Я заставляю их замолчать, пока что, под тяжестью трона и памяти о победе. Но память исчезает, а терпение - даже терпение императора - имеет свою структуру, и я чувствую, как образуются трещины."
 mumakan.0142.a: "Мы полны решимости - победа, несомненно, близка."
 mumakan.0142.b: "Они доказали свою эффективность, но на фоне неба этого будет недостаточно."

 mumakan.0143.t: "Тяжесть пяти лет"
 mumakan.0143.desc: "Пять лет. Война, которая должна была стать моим главным триумфом - действие, заставившее замолчать слухи, доказавшее, что династия по-прежнему пользуется божественной милостью, показавшее нафаратцам и всем другим беспокойным племенам, что императорскому трону не нужен ничей меч, кроме его собственного, - стала камнем на шее империи, и я чувствую, как он тянется.\n\nДепеши из казначейства больше не содержат цифр; они приходят с извинениями, тщательно сформулированными объяснениями того, почему цифры не такие, какими они должны быть, сопровождаемые предложениями о том, что я мог бы рассмотреть альтернативные способы финансирования. Вожди племен перешли от ропота к особому подчеркнутому молчанию, которое предшествует предъявлению требований, и их требования, когда они предъявляются, не являются ни скромными, ни подлежащими обсуждению. Они хотят оплаты. Они отправили своих сыновей и новобранцев на войну в джунглях, которая отняла у них пять лет сил, и они хотят компенсации, и они правы, что хотят ее - что делает их желание не менее опасным.\n\nПередо мной три варианта, и ни один из них не является хорошим, что является естественным условием имперского правления, с которым я смирился давным-давно. Но я устал - не от усталости тела, с которой я давно научился справляться, а от усталости разума, которая является более откровенным изнеможением, и которое труднее скрыть."
 mumakan.0143.a: "Заплатить им из имперской казны - лояльность нужно покупать."
 mumakan.0143.b: "Пообещать им добычу из Коронандэ - пусть жадность подпитывает поход."
 mumakan.0143.c: "Отказаться и напомнить им, кто здесь император - трон не выпрашивает."

 mumakan.0144.t: "Вечная война"
 mumakan.0144.desc: "Депеша поступает не от моего генерала, а о нем, и это различие такого рода, что меняет все.\n\nГенерал Масе мертв. Не пал в бою, не заболел лихорадкой, не погиб от тысячи мирских жестокостей в походе в джунгли - убит своими же солдатами, людьми, которые последовали за ним через брешь в Корлане и которые теперь, после семи лет бесконечной войны, решили, что их терпению есть предел, их верности не делает этого.\n\nЯ откладываю депешу и долго сижу неподвижно, потому что неподвижность - это то, что я делаю, когда мир меняется подо мной, а за тридцать лет он менялся много раз, и я еще ни разу не позволил себе споткнуться. Масе был моим - я нашел его, я вырастил его, я дал ему величайшее командование в империи, и он одержал величайшую победу - и теперь он мертв в палатке в джунглях, которые должны были быть усмирены много лет назад, убит теми самыми солдатами, которых я послал, чтобы обеспечить его успех.\n\nСреди нафаратцев царит беспокойство. Вожди племен не на шутку встревожены. Казна - это рана, которая не затягивается. И теперь я должен найти другого командира, другую армию, еще одну причину, по которой империя поверит, что эта война - нечто иное, чем медленное уничтожение всего, на что я потратил тридцать лет.\n\nЯ созываю свой совет. Я не позволяю им увидеть, как дрожат мои руки."
 mumakan.0144.a: "Мы не можем останавливаться сейчас, мы не должны!"

 mumakan.0145.t: "Нафаратское восстание"
 mumakan.0145.desc: "Двенадцать лет. Половина поколения прожила в джунглях, которые поглощают армии и не возвращают ничего, кроме костей и донесений, полных осторожных формулировок о «продолжающихся боях» и «меняющейся ситуации». Двенадцать лет прошло с тех пор, как я наблюдал, как горит Корлан, и думал - по-настоящему, искренне думал, - что самое трудное позади.\n\nИ вот теперь нафаратцы подняли восстание.\n\nЯ должен был это предвидеть. Я действительно видел это - я видел очертания этого много лет назад, чувствовал напряжение в каждой задержке выплаты дани и в каждом демонстративном отсутствии при дворе, холодной аналитической частью своего разума понимал, что северные военачальники ждали именно такого момента: трон перегружен, казна истощена, армия обескровленный в ходе кампании, которая стала открытой раной империи. Я отстранил их от участия во вторжении в Коронандэ, чтобы доказать, что они мне не нужны. Вместо этого я доказал, что без угрозы имперской силы, способной удержать их, у них нет причин оставаться.\n\nИмперия не может сражаться на два фронта. Я знаю это. Это знал каждый император, который когда-либо сидел на этом троне и продержался на нем больше одного времени года. Вопрос, который стоит передо мной сейчас - холодный, непреклонный, требующий ответа, который я не хочу давать, - это то, с какого фронта я отступаю.\n\nЯ по-прежнему Железный лев. Но железо, слишком долго пролежавшее под дождем, ржавеет - и я боюсь, что дождь лил уже очень долго."
 mumakan.0145.a: "Будь они прокляты!"

 ### General War Perspective Events ###

 mumakan.0151.t: "Донесения с фронта"
 mumakan.0151.desc: "Я пишу донесение императору за час до рассвета, при свете единственной масляной лампы, подбирая каждое слово с тщательностью человека, который понимает, что донесение - это не просто информация, это архитектура. То, что я напишу в этом письме, определит, чего ожидает Сандамал, и то, чего он ожидает, определит то, что он отправит, а то, что он отправит, определит, завершу ли я эту кампанию как губернатор завоеванной провинции или как заметка в истории имперских завоеваний.\n\nСопротивление ослабевает. Я пишу это, и в основном это правда - организованные остатки республиканской армии рассеяны по отдаленным районам, их пути снабжения прерваны, их руководство сведено к адвокату, ставшему мятежником, и тому совету отчаявшихся, который он собрал в горах. Пройдет месяц, может быть, два, и последние угольки погаснут. Я верю в это. Я должен верить в это, потому что альтернатива - что я участвую в войне против народа, а не армии, и что такие войны заканчиваются не так, как подсказывает мне мое обучение, - это мысль, к которой я еще не готов принять.\n\nЯ запечатываю депешу и вручаю ее своему самому быстрому гонцу. Я прошу минимального подкрепления. Император прочтет в этом уверенность, а уверенность - это то, что ему нужно от меня, потому что уверенность - это то, за что я получил назначение и пост губернатора, и все, чего я добился, выбравшись из трущоб Амару."
 mumakan.0151.a: "Доложить, что победа неизбежна, и запросить минимальное подкрепление."

 mumakan.0152.t: "Терпение джунглей"
 mumakan.0152.desc: "Шестнадцать месяцев в полях, и я осваиваю новый вид ведения войны - такой, которому не учат в лагерях, где я проходил подготовку, такой, который не предусмотрен ни в одном руководстве по тактике, потому что ни одно руководство не написано людьми, которые коллективно и без формальных консультаций решили, что они скорее умрут на своих собственных холмах, чем жить под сапогом империи.\n\n[GetCultureByKey('koronandi').GetName] сражаются не так, как сражаются солдаты. Они не удерживают позиции, не сражаются на перекрестках дорог и не выстраиваются в боевые порядки, где компетентный командир может использовать численное превосходство. Они исчезают. Они нападают из-за деревьев и исчезают в местности, знакомой им с детства. Они сражаются из-за каждой изгороди, каждой оросительной канавы, каждой стены зернохранилища. Патруль уходит и не возвращается. На дороге, которая еще вчера была безопасной, горит фургон с припасами. Утром деревенский староста присягает на верность, а к вечеру укрывает дюжину вооруженных людей.\n\nЯ удерживаю каждый город, каждую дорогу, каждую гавань. У меня в десять раз больше сил, чем у них. И все же каждую неделю мои солдаты гибнут в зеленом мраке внутренних районов, убитые людьми, которые должны были сдаться несколько месяцев назад, и которые сражаются, когда их загоняют в угол, с ожесточением, которое заставило бы задуматься любого опытного командира. Это не солдаты. Это отцы, лавочники, рыбаки - и они убивают моих людей.\n\nМне нужно изменить свой подход, иначе эти джунгли съедят меня заживо."
 mumakan.0152.a: "Перейти к стратегии осады - заморим их голодом, чтобы заставить подчиниться."
 mumakan.0152.b: "Совершить агрессивные набеги, чтобы сломить их волю."

 mumakan.0153.t: "Ухудшение ситуации"
 mumakan.0153.desc: "Пять лет. Я занимал этот пост пять лет - дольше, чем в любой кампании, в которой я когда-либо участвовал, дольше, чем я потратил на то, чтобы подняться с нуля в имперской армии, дольше, чем я готов признать перед лицом, которое каждое утро вижу в бадье с водой, лицом, которое постарело на полтора десятилетия самое время. Джунгли делают это с человеком. Жара, сырость, бесконечная зеленая тьма, давящая со всех сторон, особое безумие борьбы с врагом, который повсюду и нигде, и который отказывается просто остановиться с упрямством, которое я привык уважать, как уважают море.\n\nАрмия разлагается. Не от болезней - хотя болезни берут свое, как это всегда бывает на юге, - а изнутри, от медленного действия яда бесцельности, которым заражаются солдаты, которые забыли, как выглядит победа, и начали подозревать, что не узнают ее, когда она придет. Растет число дезертирств. Число сторонников лагеря выросло до размеров собственного маленького города, паразитирующего и неуправляемого. На прошлой неделе трое солдат были найдены мертвыми при обстоятельствах, которые офицеры называют «стычкой», а я называю мятежом.\n\nУ меня осталось два инструмента: страх и снисходительность. Страх удержит их в узде, но сделает хрупкими. Снисходительность заставит их двигаться, но превратит в животных. Ни то, ни другое я бы не выбрал, если бы у меня была возможность выбора, но роскошь - это то, что я оставил в Амару, если у меня вообще когда-либо было такое."
 mumakan.0153.a: "Публично казнить дезертиров для поддержания дисциплины."
 mumakan.0153.b: "Позволить последователям и мародёрам поддерживать боевой дух на плаву."

 mumakan.0154.t: "Предательство"
 mumakan.0154.desc: "Я слышу движение полога палатки еще до того, как вижу лезвие - семь лет войны в джунглях сделали мой слух острее, чем у любой дворцовой гончей, - но слышать шум и уметь его остановить - разные навыки, и для второго требуется более молодое тело, чем то, которое я износил до сухожилий и рубцов в этом зеленом аду.\n\nЯ знаю эти лица. Я знаю их, потому что я взял за правило знать каждого человека под моим командованием, потому что это самое малое, что командир должен людям, которые следуют за ним, и потому что мальчишка из трущоб Амару рано узнает, что расстояние между верностью и убийством часто не более чем пропущенный обед или нарушенное обещание. Это не повстанцы. Это не #L [GetCultureByKey('koronandi').GetCollectiveNoun|l]ие#! шпионы. Это мои собственные солдаты - люди, которых я обучал, люди, которых я провел через брешь в Корлане, люди, которые приветствовали меня, когда пали стены, - и они решили, исходя из конкретной арифметики измученных и отчаявшихся людей, что мертвый я ценнее, чем живой.\n\nЯ думаю о Сандамале, который доверил мне свою великую задачу. Я думаю о обещанном губернаторстве, о жизни, которую я строил из ничего, о доказательствах того, что человек из ниоткуда может чего-то добиться. Я думаю о ребенке в толпе в тот день, когда я въезжал в ворота Корлана, о том, чье лицо я никогда не забуду.\n\nЛезвие приближается. Я не закрываю глаз."
 mumakan.0154.a: "Итак, вот как это закончится - не в бою, а предательством со стороны моих собственных людей."

 ## Decision Events ##
 mumakan.0200.t: "Наследие Амава"
 mumakan.0200.desc: "Наконец-то держава, которой когда-то правил [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], первый король всех [Concept('men', 'людей')|E] #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#!, была возрождена из пепла мифов. Отныне [GetTitleByKey('h_utter_south').GetName] простоит до скончания времён!\n\nЯ поведу южные земли в новое будущее и проложу путь, который обеспечит, что никто не обретёт достаточную силу, чтобы встать у нас на пути!"
 mumakan.0200.a: "Возвышение юга завершено."

 mumakan.0201.t: "Талилан в огне"
 mumakan.0201.desc: "Мои армии разбили последних защитников #ONCLICK:TITLE,k_talilan #TOOLTIP:LANDED_TITLE,k_talilan #L Талилана#!#!#!, а оставшиеся [Concept('elves', 'эльфы')|E] бежали. Их леса горят... - хорошо! Пусть это послужит уроком для всех, кто встанет на моём пути. Никто не может противостоять мощи завоевателей!"
 mumakan.0201.a: "Скатертью дорожка."

 mumakan.0202.t: "Возвышение нафаратцев"
 mumakan.0202.desc: "Воистину, это славный день! Мы создали собственное [Concept('kingdom', 'королевство')|E], в котором наш народ сможет жить и процветать. Теперь никто не может отказать нам в том, что причитается нам по праву крови и железа!\n\nВоздвигнем грандиозное военное святилище неподалеку от [Concept('capital', 'столицы')|E] в ознаменование этого триумфального дня и создадим тренировочную площадку для наших воинов, где они смогут учиться и совершенствоваться в военном искусстве. Скоро топот их марширующих ног будет слышен по всему Крайнему югу!"
 mumakan.0202.a: "Слава Джи-Индуру!"

 mumakan.0203.t: "Величественный дворец"
 mumakan.0203.desc: "Он завершён! Строительство дворца, которое продолжалось так долго, подошло к концу. Теперь на центральной площади столицы возвышаются стены из белого мрамора, а главный вход в само сооружение охраняют две статуи прекрасной работы. Внутри есть множество залов и комнат - их хватит, чтобы разместить целый маленький городок в одиночку!\n\nВ стенах этого сооружения я смогу отдохнуть, когда бремя правления станет слишком тяжёлым, и мне будет даровано несколько драгоценных мгновений тишины и покоя. Набравшись сил, я появлюсь вновь и буду править с обновлённой мудростью и благоразумием, чтобы королевства-близнецы могли продолжать процветать под моей нежной рукой."
 mumakan.0203.a: "Воистину, великолепно."

 mumakan.0250.t: "Подношение оваг"
 mumakan.0250.desc: "Дрожа, я [Select_CString(ROOT.Char.IsFemale, 'поставила', 'поставил' )] корзину, наполненную фруктами и вяленым мясом, на покрытые гравировкой камни у подножия высоких гор. Домашний скот был отогнан в уединённое, обнесённое стеной место неподалеку, и мы оставим его там, чтобы оваг могли забрать его.\n\nКраем глаза я замечаю движение. Поворачиваясь в ту сторону, я ничего не вижу. Нет, это была тень там, под камнями? Я не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )].\n\nКак мне жаль измученные души наших предков, обречённых вечно скитаться по этим унылым холмам. Этим подношением они будут умиротворены ещё на десятилетие..."
 mumakan.0250.a: "Возвращаемся домой."

 mumakan.0350.t: "Последнее испытание"
 mumakan.0350.desc: "Песок под моими ногами кажется тёплым, когда вечернее солнце начинает опускаться за мою спину, туда, где раскинулся остров. Я отворачиваюсь от его света и смотрю во мрак, лежащий на востоке. Я не оборачиваюсь к тем, кто стоит на берегу вместе со мной, потому что все слова давно сказаны. Они знают наши традиции, как и я.\n\nПервая волна касается моих ног, но я не останавливаюсь. Вскоре вода обнимает меня, и я начинаю плыть. Я иду вперёд, на восток, и солнце садится у меня за спиной. Пусть моя сила унесёт меня далеко и принесёт благосклонность тем, кто теперь должен править Амбасоном."
 mumakan.0350.a: "Я буду плыть до тех пор, пока не лишусь сил."

 #Elevating the Kingdom of Ambason & the Isles
 mumakan.0351.t: "Исполнение обещания Амбы"
 mumakan.0351.desc: "Много лет я плаваю по миру, разбойничаю, граблю и жгу. У королей не бывает столько золота, сколько скопилось у меня после грабежей, а моё имя проклинают от Сенга-Муты до Кхая.\n\nЯ, без сомнения, [Select_CString(ROOT.Char.IsFemale, 'самая', 'самый' )] печально [Select_CString(ROOT.Char.IsFemale, 'известная женщина', 'известный мужчина' )] на свете, [Select_CString(ROOT.Char.IsFemale, 'истинная дочь', 'истинный сын' )] Амбы, и [Select_CString(ROOT.Char.IsFemale, 'вложила', 'вложил' )] свою добычу и репутацию в обустройство и укрепление провинции $c_ambason$.\n\nТеперь, по прошествии стольких веков, обещание, данное Амавом своей дочери Амбе, наконец-то выполнено, и мой народ претендует на собственное королевство..."
 mumakan.0351.a: "Амба смотрит на меня с гордостью."
 mumakan.0351.c: "Я — [founder.GetLadyLord|U] крови и золота!"
 mumakan.0351.b: "Наконец-то моя мечта сбылась..."
 mumakan.0352.t: "$mumakan.0351.t$"
 mumakan.0352.desc: "«Тайне» о том, что [founder.GetFirstName] откажется от любой короны, если к ней не прилагается [founder.GetPrimaryTitle.GetNameNoTier], уже много лет, и она давно уже не тайна.\n\n[founder.GetHerHis|U] душа лежит к этому так давно, что кажется, будто мой сюзерен [Select_CString(founder.IsFemale, 'посвятила', 'посвятил' )] всю жизнь выводу своего родного острова из тени.\n\nПосле бесчисленных налётов, войн и резни [founder.GetSheHe] наконец [Select_CString(founder.IsFemale, 'преуспела', 'преуспел' )].\n\nВесьма вероятно, что все самоцветы в [founder.GetHerHis] короне добыты в разных налётах. А при дворе ходят разговоры, что есть в ней и пустые гнёзда, которые [founder.GetTitledFirstNameNoTooltip] ещё может заполнить."
 mumakan.0352.a: "Просто представьте, сколько у нас будет золота!"
 mumakan.0352.b: "#EMP [founder.GetTitleAsNameNoTooltip|U]#!? [founder.GetSheHe|U] хуже разбойничьего барона!"
 mumakan.0353.t: "$mumakan.0351.t$"
 mumakan.0353.desc: "В Сенга-Муте даже последний крестьянин слышал о морском чудовище, имя которому [founder.GetFirstName], Гроза морей, и о [founder.GetHerHis] попытках добиться признания гнезда пиратов и грабителей полноценной державой.\n\nЭта легенда вселяет страх в сердца как мелкого дворянства, так и смердов, но в последнее время грань между мифом и реальностью несколько размылась.\n\nИбо сегодня #EMP [founder.GetTitleAsNameNoTooltip|l]#! [founder.GetFirstNameNoTooltip] [Select_CString(founder.IsFemale, 'объявила', 'объявил' )], что дело всей [founder.GetHerHis] жизни увенчалось успехом.\n\nНа побережье Сенга-Муты появилось новое королевство, и это ужасающее зрелище."
 mumakan.0353.a: "[founder.GetSheHe|U] ведь не собирается грабить #EMP нас#!, правда?"
 mumakan.0353.b: "Это просто [founder.GetTitleAsNameNoTooltip|l] воров!"


 mumakan.0400.opening: "Грозный и могучий Сандамал Мумаканский,"
 mumakan.0400.desc: "Вы одержали над нами верх. Мы покоряемся вашему могуществу. Прошу, избавьте нас от дальнейших разрушений и разграблений! Мы подчинимся вашему правлению и будем хорошо служить вам, если вы примете нас."
 mumakan.0400.a: "Никакого мира - только война."
 mumakan.0400.b: "Очень хорошо... но ты будешь унижен."
 mumakan.0400.b.tt: "#high Вы#! покоряете всех правителей в пределах державы [GetTitleByKey('k_koronande').GetName]"

 mumakan.0401.opening: "Несуразный Атарака,"
 mumakan.0401.desc: "Если вы думаете, что ваши ядовитые слова могут повлиять на меня, подумайте ещё раз. Война продолжится, пока все ваши жалкие города не превратятся в руины."
 mumakan.0401.a: "Будь он проклят!"

 mumakan.0402.opening: "Мудрый Атарака,"
 mumakan.0402.desc: "Ваша капитуляция принята. Вы будете служить мне, но не из Коронандэ. Вместо этого вы будете править теми островами в заливе от моего имени. Проследите за тем, чтобы прибыть туда в надлежащее время."
 mumakan.0402.a: "Прощай, Коронандэ..."
 mumakan.0402.a.tt: "[sandamal.GetName] покоряет всех правителей в пределах державы [GetTitleByKey('k_koronande').GetName]"