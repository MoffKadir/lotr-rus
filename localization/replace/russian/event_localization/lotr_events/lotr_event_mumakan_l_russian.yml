 ### Emperor Sandamal - Our Path Forward (Victory) ###

 mumakan.0001.t: "Победа в войне"
 mumakan.0001.desc: "Гонец опускается передо мной на колени на мраморном полу командного павильона, и долгое время я ничего не говорю - я просто смотрю на пыль на его сапогах, на усталые морщинки вокруг его глаз. Ещё до того, как он произносит хоть слово, я понимаю, что всё кончено: [GetTitleByKey('k_koronande').GetNameNoTier] пала. Не путём женитьбы, как это удалось в своё время #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofmamakil18').GetID] #L Матаре «Мудрому»#!#! со всей его дипломатией и осторожным, бескровным гением, а силой оружия, путём тридцатилетнего напряжённого терпения, вылившихся в одну решительную кампанию. Я вспоминаю холодный, размеренный голос моего дяди, который говорил мне, что империи не строятся на чувствах. Я уже не в первый раз думаю, что он был прав в этом, даже если ошибался почти во всём остальном. Победа лежит у меня в груди, как камень: тяжёлая, холодная и настоящая."
 mumakan.0001.a: "Железный лев доказал правдивость своего имени."

 mumakan.0002.t: "Приветствие героя"
 mumakan.0002.desc: "Когда я вхожу, большой зал буквально взрывается. Вожди племён выкрикивают мое имя, придворные поэты уже декламируют свои стихи, а знамёна завоёванной республики свисают, словно трофеи, со сводчатого потолка, где когда-то висели знамёна моего отца. Я принимаю всё это с прямой спиной и невозмутимым лицом, я всегда с таким хладнокровием выполнял приказы трона, независимо от того, сулят ли они триумф или катастрофу. Именно [GetScriptedCharacterByHistoryID('lineofmamakil18').GetFirstNameNicknamed] первым подчинил [GetTitleByKey('k_koronande').GetNameNoTier] воле #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#!, но он добился этого с помощью невесты и пира. Я добился этого безжалостным острием меча. То, что завоевано мечом, должно быть удержано мечом, и я не должен забывать эту истину, даже когда эти люди ликуют.\n\nТе вожди, которые когда-то шептались о слабости династии, теперь кричат громче всех. Я вижу их лица, каждого из них; они радуются, потому что ожидают большой добычи. Я вознагражу их достаточно, чтобы удовлетворить, но не настолько, чтобы ободрить. Работа империи никогда не заканчивается, она только меняет свои очертания."
 mumakan.0002.a: "Пейте вволю! Нужно отпраздновать это."
 mumakan.0002.b: "Празднуйте, если должны, но не принимайте ни одну победу за окончание нашей борьбы."

 mumakan.0003.t: "Встреча с Амедой"
 mumakan.0003.desc: "Он появляется в шёлке цвета морской пены и кланяется ровно так низко, как того требует протокол, и ни на йоту ниже; это человек, который просчитал каждый жест в своей жизни и понял, что точное выражение почтения стоит дороже, чем его излишество. [aameda.GetFirstName] говорит красиво, как и все ему подобные. Он говорит о братских узах, об общей крови между #L [GetCultureByKey('koronandi').GetCollectiveNoun|l]им#! народом и [GetCultureByKey('mumakanil').GetName|l], а также о родстве, которое война прервала, но не смогла уничтожить. Отчасти он прав, что и делает его опасным.\n\nЯ провёл тридцать лет при дворе, полном людей, которые улыбаются одними губами, а глазами что-то подсчитывают; я знаю этот тип людей так же хорошо, как свое собственное отражение. Я не сомневаюсь, что он будет верно служить империи; до тех пор, пока ему это не станет невыгодно. Полезная змея остается змеей. Я буду держать его при себе, наблюдая за ним, как человек следит за веревкой моста, в прочность которой он не до конца верит."
 mumakan.0003.a: "Твои слова нежны, как шёлк, но мои глаза всегда открыты."
 mumakan.0003.b: "Человек с таким «братским» духом заслуживает видного места рядом со мной."

 mumakan.0004.t: "Сообщения о сопротивлении"
 mumakan.0004.desc: "Донесения от губернатора теперь поступают непрерывным потоком: о засадах на восточной дороге снабжения, о деревенских старейшинах, которые замолкают, когда солдаты задают вопросы, и о судье, найденном мертвым в канаве под #ONCLICK:TITLE,c_korlan #TOOLTIP:LANDED_TITLE,c_korlan #L Корланом#!#!#!. Не было ни свидетелей, ни подозреваемых, и весь район утверждает, что ничего не слышал. Я не удивлен; я бы меньше думал о них, если бы они просто сложили оружие и забыли. Люди, которые так долго сражались, которые пролили столько крови за республику, которая дала им то, во что они верили, не откажутся от своей гордости вместе с оружием в руках. Гордость, однажды проглоченная, отравляет изнутри.\n\nОтвет моего дяди на это был бы простым, жестоким и эффективным в краткосрочной перспективе. Тем не менее, в долгосрочной перспективе это породило бы ту же ненависть, которая в конечном итоге сделала его неуправляемым; ту же ненависть, которая принесла мне и наследство, и бремя. Я не унаследую свою гибель таким образом. Есть другие способы закончить войну, кроме как с помощью меча."
 mumakan.0004.a: "Если они не хотят мира, пусть у них будет тень, которую они не смогут ударить."
 mumakan.0004.b: "100 друзей послужат лучше 100 рабов, подадим им руку, а не кулак."

 ### Emperor Sandamal - Magnanimity (White Peace) ###

 mumakan.0011.t: "Мирное решение"
 mumakan.0011.desc: "Есть особое унижение в том, когда тянешься к чему-то обеими руками и обнаруживаешь, что оно ускользнуло из-под твоих пальцев. Это не было вырвано или украдено; оно просто находится вне досягаемости, и винить в этом некого, кроме расстояния. Я подписываю условия этого белого мира в палатке, пропахшей грязью и мокрой парусиной. Я сохраняю полное спокойствие, потому что лицо императора принадлежит его народу, даже если его сердце не занято этой задачей.\n\nПобеда была в моих руках. Я мог видеть ее очертания и чуять ее обещание в последних донесениях. Затем линии снабжения были прерваны, начались дожди, и вожди северян начали посылать мне подчеркнутые знаки молчания вместо своей дани. Война, которая пожирает империю, не принесет победы, я всегда это знал. И все же, осознание этого не делает подписание соглашения более легким."
 mumakan.0011.a: "Мы примем этот мир. Я не буду править королевством из пепла и костей."

 mumakan.0012.t: "Встреча с Атаракой"
 mumakan.0012.desc: "Я ожидал увидеть демагога: человека, который поднимается в толпе и сгорает, как только толпа рассеивается, полного огня и недовольства, но пустого внутри. То, что произошло за столом напротив меня, было тем, к чему я не был готов. Он был уставшим, но порядочным человеком, на которого его народ взвалил непосильную ношу, и он нес ее, не дрогнув, ни разу не попросив об этом. Он не злорадствовал и не прихорашивался. Он прочитал условия договора с пристальным вниманием человека, который понимает, что слова имеют значение.\n\nКогда он, наконец, встретился со мной взглядом, я увидел в нем печаль, а не торжество. Я понял, что не могу ненавидеть его за то, что он держал в руках то, что я не мог взять. Я встречал королей, великих полководцев и людей, которые утверждали, что верят в правоту своего дела; я научился не доверять им всем, потому что вера - это часто маска, надетая поверх амбиций. И все же этот человек верил, и это стоило ему всего. Я осознал эту цену, потому что всю свою жизнь по-разному расплачивался за это. Мы расстались без теплоты или холодности. Никто из нас не говорил о молчаливом понимании, возникшем между нами в тот последний момент: что в другую эпоху или в другом мире мы могли бы быть друг для друга кем-то другим, а не противниками."
 mumakan.0012.a: "Иди с миром, Атарака. Ты заслужил уважение, которого мало кто когда-либо удостоится от меня."
 mumakan.0012.b: "Наши дела здесь закончены. Не жди такой милости, если мы встретимся снова."

 mumakan.0013.t: "Потеря легитимности"
 mumakan.0013.desc: "Мои подданные с осторожностью относятся к выражению своего несогласия. Они всегда были осторожны, эти вожди, которые преклоняют колени, затачивая свои ножи. Однако шепот уже не такой тихий, как раньше, и мой слух остается превосходным. Говорят, боги лишили нас благосклонности. Они утверждают, что династию взвесили и нашли несостоятельной, а Железный лев стар и зубы у него притупились. Я слышал эту песню раньше во всех вариациях. Я пережил всех, кто когда-либо пел ее.\n\nТрон все еще стоит, потому что я все еще стою. Существует фундаментальная разница между неудачей и поражением. Это различие, которое эти люди, которые никогда не правили ничем большим, чем речная долина, не могут полностью осознать. Пусть они шепчутся. Я по-прежнему Железный лев. Они вспомнят эту истину, когда их ропот наконец достигнет моих ушей, а это неизбежно произойдет."
 mumakan.0013.a: "Пусть шепчутся в тени. Они увидят, что мои когти остры, как всегда."
 mumakan.0013.b: "Это было лишь временное отступление. Я подарю им победу, которая заставит всех замолчать."

 mumakan.0014.t: "Бремя терпения"
 mumakan.0014.desc: "Дань от нафаратских вождей поступает с опозданием, затем в меньшем количестве, чем следовало бы, а затем и вовсе не поступает. Депеши от северных префектур отличаются особым осторожным тоном, что означает, что они сообщают о бедствии как можно мягче. Они надеются, что я не стану наказывать гонца за это сообщение. Целью этой кампании было заставить этих людей замолчать. Она должна была как можно яснее продемонстрировать, что возможности империи превосходят амбиции любого племени или вождя, который возомнил себя выше трона.\n\nВместо этого я вызвал у них недовольство и создал прецедент. Осмелевшие люди - самый опасный тип людей. Я не могу бороться с ними сейчас, поскольку казна этого не выдержит, а армии нужно передохнуть. Я должен быть терпеливым. Терпение всегда было моим главным оружием и самыми тяжелыми цепями. Оно привело меня так далеко, и я должен верить, что оно поможет мне продвинуться дальше. И все же я устал, а терпение - верный спутник на долгом пути."
 mumakan.0014.a: "Пока что согласиться с их условиями. Политическая цена неповиновения слишком высока."
 mumakan.0014.b: "Раздать золото из казны. Мы должны обеспечить их молчание, чтобы спасти наши реформы."

 ### Emperor Sandamal - Defeat / Last Days ###

 mumakan.0021.t: "Волна разрушения"
 mumakan.0021.desc: "Поражение. Это слово засело у меня в голове, как камень, брошенный в тихую воду. Я наблюдаю, как от него расходятся кольца. Каждое из них - следствие, которое я уже начал просчитывать. Двор, вожди и отдаленные провинции почувствуют волнение еще до того, как новость достигнет их ушей. Я никогда раньше не употреблял это слово по отношению к себе. Ни за тридцать лет, ни за дюжину кампаний, ни за годы дворцовых интриг это не сломило бы человека с менее железным хребтом.\n\nТем не менее, это неоспоримый факт, сказанный посланником, у которого пыль на сапогах и страх в глазах. Я не могу спорить с арифметикой этого. Армии #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#! были разбиты и изгнаны из [GetTitleByKey('k_koronande').GetNameNoTier]. Человек, о котором мне говорили, что его никто не превзошел. Империя рушится у меня под ногами. Я чувствую это так, как моряк ощущает изменение течения перед приближением шторма. Все, на что я потратил тридцать лет, сейчас, в этот момент, находится в настоящей опасности."
 mumakan.0021.a: "Невозможно!"

 mumakan.0022.t: "Достоинство побеждённых"
 mumakan.0022.desc: "Они привели меня в [GetTitleByKey('c_korlan').GetNameNoTier] для подписания. Я понял, что выбор был осознанным. Это был завоеванный город, зал врага и стол победителя. Я вошел в этот зал с прямой спиной и невозмутимым выражением лица. Лицо императора принадлежит его империи даже в ее худший час. На самом деле, оно принадлежит народу, особенно в его худший час. [ataraka.GetFirstName] сидел напротив меня и не злорадствовал. Я ожидал насмешки и почти предпочел бы ее. Злорадствующего человека легко презирать, а мне нужно было что-то непринужденное в этой комнате.\n\n[aameda.GetFirstName] представил условия с тонкой, осторожной улыбкой. Это была улыбка человека, который играл в игру дольше, чем кто-либо другой в комнате, и только что подтвердил свой успех. Договор, который они положили передо мной, сотнями нитей связал Мумакана с волей Коронандэ, по крайней мере, на целое поколение. Тогда я заплакал впервые с тех пор, как был мальчиком, наблюдая, как слуги моего отца выносят его из зала для аудиенций. Я плакал не о себе. Я плакал об империи и о сыновьях и дочерях, которые должны были родиться в тени этого дня. Они должны найти какой-то способ устоять перед этим. Я подписал пергамент, но не склонился перед ним. Это последнее достоинство принадлежит мне и империи. Ни один договор, ни на каком языке, не может лишить нас его."
 mumakan.0022.a: "Чернила высохли, но мой дух остается непоколебимым."

 mumakan.0023.t: "Хищные языки"
 mumakan.0023.desc: "Двор превратился в место, где звучат очень осторожные голоса и очень быстрые взгляды. Каждый оценивает своего соседа. Каждый просчитывает, что означает поражение для человека рядом с ним и, что более важно, что это значит для него самого. Даже имперские принцы перестали прикрывать свои амбиции обычной маской почтения, которой требует протокол.\n\nЯ знаю этот двор. Я вырос здесь как подопечный, заложник и запасной наследник, от которого никто не ожидал, что он выживет. Я усвоил его правила еще до того, как научился бриться. Я понимаю язык подтекста, тяжесть подчеркнутого молчания и полезность предложений, сделанных через посредников, чтобы сохранить свои руки чистыми. Я знаю, что делать, когда собираются падальщики. Я всегда знал. Вопрос не в том, смогу ли я с ними справиться. Вопрос в том, превысят ли затраты на такое управление в конечном итоге цену альтернативы."
 mumakan.0023.a: "Заглушение самого громкого голоса поможет остальным запомнить свое место."
 mumakan.0023.b: "Дать им пустые обещания. Жадностью управлять гораздо легче, чем амбициями."

 mumakan.0024.t: "Бдение императора"
 mumakan.0024.desc: "В тишине двора, вынесшего свое решение, есть что-то особенное. Я научился слышать это еще ребенком. Я услышал это, наблюдая за выражением лица моего дяди, когда он думал, что никто не видит. Я видел это по слугам, которые двигались немного быстрее, и по стражникам, которые стояли немного прямее. Я слышал это по дверям, которые закрывались чуть плотнее, чем нужно.\n\nПри дворе сейчас царит тишина, и я знаю, что это значит. Я знаю, потому что я пережил это раньше. Я пережил людей, которые убили моего отца. Я пережил годы преднамеренной жестокости моего дяди. Я пережил все кампании, все предательства и все тайные заговоры, которые считали себя достаточно умными, чтобы добраться до трона. Пусть они приходят, кем бы они ни были и что бы они ни устроили. Я по-прежнему Железный лев. Железный лев не сдается, не склоняется и не моргает."
 mumakan.0024.a: "Я все еще Железный лев. Пусть они испытают меня на прочность, если посмеют."
 mumakan.0024.b: "Удвоить стражу. Доверие - это роскошь, которую я больше не могу себе позволить."

 mumakan.0025.t: "Амеда передаёт свои наилучшие пожелания"
 mumakan.0025.desc: "Лезвие вонзается между третьим и четвертым ребром. Это точный удар, работа человека, которому точно сказали, куда наносить удар, потому что нанявшая его рука не потерпела бы ничего меньшего, чем совершенство. Я пошатываюсь, и убийца почти нежно подхватывает меня. Он опускает меня на мраморный пол, как будто это дань вежливости, а не убийство.\n\nКогда мои колени касаются холодного пола моей собственной комнаты, я вижу это. К внутренней стороне плаща мужчины, там, где только умирающий может находиться достаточно близко, чтобы прочитать, приколот маленький кусочек шелка цвета морской пены. На нем вышит герб рода [GetScriptedCharacterByHistoryID('lineofaamediadvisor').GetDynastyName].\n\nМрамор очень холодный. Мрак не предвещает ничего хорошего."
 mumakan.0025.a: "Таков удел Железного льва..."

 mumakan.0026.t: "Тень Железного льва"
 mumakan.0026.desc: "[sandamal.GetFirstName] мертв. Империя, которая в течение тридцати лет подчинялась его воле и держалась на плаву благодаря железному терпению этого человека, теперь обнаруживает, из чего она сделана без него. Принцы, которые когда-то преклоняли колени, теперь стоят прямо. Они стремятся к тому, чего всегда жаждали: к власти в ее самой эгоистичной и праздной форме.\n\nОтдаленные провинции затихли, как люди, которые выжидают, в какую сторону подует ветер, прежде чем примкнуть к какой-либо стороне. Настал момент. Не сражения, кампании или стратегические обсуждения определяют нас сейчас. Вот здесь, прямо сейчас, находится стержень, от которого зависит будущее империи. Тот, кто сдвинется с места первым, будет двигаться по инерции хаоса. Тот, кто сдвинется с места последним, унаследует все, что останется."
 mumakan.0026.a: "Сталь решит судьбу престолонаследия. Трон принадлежит сильнейшему."

 mumakan.0027.t: "Мстительное освобождение"
 mumakan.0027.desc: "Они пересекают границу не как завоеватели, потому что они слишком умны для этого. Вместо этого они приходят как освободители. Их знамена провозглашают свободу народа мумаканил от ига несостоявшейся династии. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] признать, что риторика хорошо продумана. Риторика - это то, в чем в Коронандэ всегда преуспевали лучше всего, и Атарака, прежде всего, знает, как заставить слово падать, как клинок.\n\nАвантюра, что предпринял [sandamal.GetFirstName], завершилась. Империя, которую он стремился укрепить путем завоеваний, теперь поглощается теми самыми людьми, которых он не смог покорить. Это своего рода ирония, о которой историки будут писать на протяжении многих поколений с удобного расстояния. Это не то утешение, которое доступно тем из нас, кто переживает это. Сейчас я стою на краю пропасти. Империя истощена. Я смотрю на горизонт, в сторону моря, и впадаю в отчаяние."
 mumakan.0027.a: "Собрать все оставшиеся силы. Империя не должна пасть!"
 mumakan.0027.b: "#N Бросайте посты! Бегите, спасайте свои жизни!#!"

 mumakan.0028.t: "Ухмылка республики"
 mumakan.0028.desc: "[ataraka.GetFirstName] был уже почти у ворот, когда обернулся. То, что последовало за этим, не было государственным деятелем, республиканским героем или оратором, который поднял десять тысяч человек на борьбу против империи. Это был просто человек, который, вопреки всем разумным расчетам, выжил. Он не мог смириться с этим фактом. Он ухмыльнулся и поднял руку.\n\nС самым величественным презрительным прощанием, которое я когда-либо видел за тридцать лет наблюдения за тем, как великие люди покидают свои комнаты, спаситель Коронандэ попрощался с империей Мумакан. Это был жест непринужденности, последняя насмешка над тяжеловесным, железным достоинством, которое я сохранял всю свою жизнь. Затем он исчез. Он прошел через ворота и растворился в пыли, возвращаясь в свою республику. К своему немалому удивлению, я обнаружил, что не могу заставить себя возненавидеть его за это."
 mumakan.0028.a: "Последнее оскорбление, нанесенное с изяществом мастера."

 ### Ataraka II - Miracle at Korlan (Victory) ###

 mumakan.0031.t: "Чудесный поворот событий"
 mumakan.0031.desc: "Я не позволял себе представить такое. Ни разу, ни в лагерях в джунглях, ни в долгой темноте осады. Я не осмеливался на это в те предрассветные часы, когда лежал без сна, ощущая тяжесть мертвых на своей груди. Выживание республики зависело от решений, для принятия которых я не был уверен, что у меня хватит мудрости. Я запретил себе роскошь представлять этот момент. И вот он настал, и я обнаружил, что у меня нет для этого подходящей тары.\n\nЧто-то поднимается во мне, как вода, просачивающаяся сквозь камень, или солнце после долгих лет хмурости. Я думаю, это можно назвать радостью. Это простая, огромная и смущающая радость. Я не могу это остановить, да и не хочу. Мы были в меньшинстве. Они сожгли [GetTitleByKey('c_korlan').GetNameNoTier]. Они думали, что мы сломаемся, но мы не сломались. Каким-то образом, невероятно и великолепно, мы победили.\n\nРеспублика жива. Мой народ в безопасности. Я думаю о людях, которые стояли рядом со мной в грязи, когда не оставалось никаких веских причин для того, чтобы стоять. Я хочу найти каждого из них, пожать им руки и сказать, что мы сделали это. Мы совершили невозможное. Кажется, я смеюсь. Я этого не стыжусь."
 mumakan.0031.a: "Республика выстояла. Путь наших предков наконец-то в безопасности!"

 mumakan.0032.t: "Низвергнутый император"
 mumakan.0032.desc: "Император [sandamal.GetFirstName] стоит перед нами, поверженный нашими руками в этой невозможной победе. Этот потенциальный грабитель нашей республики совсем не такой, каким я его себе представлял. Он держится с последним достоинством, на которое способен, но я вижу огонь в его глазах. Это то же самое жжение, которое я почувствовал, когда увидел, как [GetTitleByKey('k_koronande').GetNameNoTier] растерзана и уничтожена. Я испытываю мимолетную жалость к державе, но ее быстро заглушает презрение.\n\nЧто бы хорошего ни сделал этот человек для своей страны, он оставил мою страну и мою семью в руинах. Рядом со мной [aameda.GetFirstName] представляет договор. Это документ, имеющий обязательную силу, и он полностью оплачивает каждое совершенное святотатство. Это воздастся нынешнему поколению и следующим. [sandamal.GetFirstNameNoTooltip] стоит неподвижно, как старое дерево. Несмотря на слезы, выступившие на его лице, он подписывает пергамент. Он встает во весь рост в последний раз, прежде чем его достоинство иссякнет. [aameda.GetFirstNameNoTooltip] просто улыбается скупой, холодной улыбкой. В ней нет жалости, только ожидание. Империя навсегда вписана в анналы истории."
 mumakan.0032.a: "В этот день было утрачено нечто очень ценное."
 mumakan.0032.b: "Он - пережиток уходящей эпохи. Ничего ценного не было потеряно."

 mumakan.0033.t: "Долг разорённых"
 mumakan.0033.desc: "Я был рад оставить сломленного императора на произвол судьбы в том хаосе провинций, который его теперь ожидает. И все же я помнил, что он сделал с моей страной. Я помнил о бессмысленном и ничем не сдерживаемом разрушении. Я думал о том, что я был вынужден делать, и о состоянии моего народа. Они разбиты и залиты кровью. Отцы, матери и невинные дети - все они были поглощены разрухой, которую он навлек на нас. Внезапно я чувствую злобу, которая сильнее всего остального в моем сердце. Это тяжелее, чем моя радость, и острее, чем мое горе.\n\nЯ поворачиваюсь и изображаю самую вопиющую и язвительную улыбку в своей жизни. Мне больше не нужна дипломатическая маска или взвешенные слова государственного деятеля. Мы победили. Однажды он украл нашу гордость, и теперь я показал ему реальность его нынешнего положения. Он ничего не может сделать, кроме как молча и удивленно ахнуть."
 mumakan.0033.a: "Пусть он подавится своим собственным молчанием."

 mumakan.0034.t: "Труд живущих"
 mumakan.0034.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] лежит в руинах. Большая гавань все еще завалена почерневшими останками сгоревшего флота. Дворцы разрушены до основания, а на улицах остались шрамы, которые не заживут за одно поколение. Впереди огромная работа, и я не буду оскорблять ее, называя как-то иначе.\n\nОднако я жив, чтобы смотреть правде в глаза. Мой народ жив. Республика жива. Она пострадала до неузнаваемости и превратилась в нечто почти неузнаваемое, но она живет. Все, что живет, можно восстановить. Я обнаружил, что смотрю на эту истину не со страхом, а с чувством, очень похожим на голод. Я провел годы, борясь за выживание республики. Теперь, наконец, я могу бороться за ее процветание. Камень за камнем, закон за законом, корабль за кораблем. Я не устал. Я закатываю рукава и радуюсь этому."
 mumakan.0034.a: "Вложить все силы в город. Мы должны защитить наши стены и наше будущее."
 mumakan.0034.b: "Сначала восстановим флот. Наша торговля - это источник жизненной силы, который профинансирует всё остальное."

 mumakan.0035.t: "Горнило свободы"
 mumakan.0035.desc: "Приходит известие, что [sandamal.GetFirstName] мертв. [GetTitleByKey('e_mumakan').GetNameNoTier], этот великий и изнуряющий механизм, начал разрушаться изнутри. [aameda.GetFirstName] появляется у моего локтя, как он всегда делает, когда открывается дверь. Своим точно выверенным голосом он доказывает, что настал подходящий момент. Он видит истинные возможности республики. Он хочет, чтобы мы распространили свои притязания на центральную часть страны, в то время как империя слишком занята кровопролитием, чтобы сопротивляться.\n\nЯ внимательно слушаю его, потому что он не ошибается насчет возможности. Радость от победы не сделала меня дураком. Затем я смотрю на [GetTitleByKey('c_korlan').GetNameNoTier], как он перестраивается. Я смотрю на восток, в сторону границы, и думаю о жителях Мумакана. Они фермеры, ремесленники и матери с детьми на руках. Они не выбирали нового императора. Они не выбирали жить во тьме, как и мой народ не хотел, чтобы на него напали. Я задаю себе вопрос, ради ответа на который я построил эту республику. Разве люди не заслуживают того, чтобы управлять собой? Если я боролся, несмотря ни на что, потому что верил, что у нашего народа должно быть такое право, почему бы не распространить эту прекрасную свободу на всех? Передо мной дебаты в большом совете. Одни голоса призывают к миру, другие - к войне. Я стою на трибуне и присоединяю свой голос к какофонии."
 mumakan.0035.a: "Мы принесём им свободу. Пусть империя рухнет, а народ восстанет."
 mumakan.0035.b: "Месть - единственный язык, который они понимают. Теперь мы станем хозяевами."
 mumakan.0035.b.tt: "Республика должна быть реорганизована в первую Коронандскую империю"
 mumakan.0035.c: "Мы уже достаточно пролили крови. Пусть уничтожат сами себя, пока мы заботимся о своих."

 ### Ataraka II - White Peace ###

 mumakan.0041.t: "Цена выживания"
 mumakan.0041.desc: "Война окончилась безрезультатно. Нет ни торжества, ни катастрофы. Есть лишь долгий выдох двух измождённых народов, отступивших от края. [GetTitleByKey('k_koronande').GetNameNoTier] осталась свободной. Она избита и разграблена. Половина её башен повержена, а улицы всё ещё представляют собой выжженные руины. Свет был затмён кровью её сыновей, и всё же она свободна.\n\nОна дышит, и все мы дышим вместе с ней. Мы больше не под ярмом войны. Рассвет наконец наступил, и на сей раз он несёт надежду. Мы, живые, обрели приз, более драгоценный в мире, чем всё, что можно было бы найти на войне. У нас есть наши жизни. У нас есть наша свобода. Мы выжили."
 mumakan.0041.a: "Выживание - это сама по себе победа. Пусть начнется исцеление."

 mumakan.0042.t: "Признание равных"
 mumakan.0042.desc: "Я шёл на эту встречу, ожидая увидеть чудовище. Я ожидал увидеть тёмного владыку или тирана, правящего армией рабов. История редко бывает столь простой. Передо мной стоит человек. Император — усталая душа, скованная долгом. Он — человек достойный и принципиальный, однако стоит по ту сторону реки крови.\n\nЧем больше мы говорим, тем сильнее я замечаю, как начинаю его уважать. Это горькое осознание, когда столько боли было куплено за столь малое. Мы оба пережили бурю. Теперь, наконец, ни один из нас не является хозяином. Мы смотрим друг на друга не как победитель и побеждённый, а как равные. Бремя наших государств тяжело давит на плечи обоих. В этот миг тишины вражда прошлого кажется далёким и изматывающим сном."
 mumakan.0042.a: "Построим прочный мир. Мы должны вместе смотреть в будущее."
 mumakan.0042.b: "Я уважаю этого человека, но наши державы снова столкнутся. Мы должны быть тверды."

 mumakan.0043.t: "Восставшие из пепла"
 mumakan.0043.desc: "[GetTitleByKey('c_korlan').GetNameNoTier] должен быть восстановлен. Гавань, рынки и суды — всё это части замысловатой архитектуры цивилизации, которая была почти обращена в ничто. На протяжении ужасающих месяцев казалось, что всё будет потеряно. Всю свою карьеру я строил то, что люди с большей осторожностью и меньшей убеждённостью считали невозможным. Я всегда находил способ доказать их неправоту.\n\nРеспублика выстояла в этой войне не для того, чтобы оставаться наполовину восстановленной. Я не остановлюсь теперь. Мы вернём красоту и жизнь нашей столице. Каждый заложенный камень — свидетельство нашего выживания."
 mumakan.0043.a: "Восстановить стены. Наша безопасность - основа нашей свободы."
 mumakan.0043.b: "Восстановить рынки. Процветание - лучшая месть."

 mumakan.0044.t: "Надвигающаяся буря"
 mumakan.0044.desc: "[aameda.GetFirstName] отводит меня в сторону именно в тот момент, когда я предпочёл бы, чтобы меня не беспокоили. Он говорит тем тихим и размеренным голосом, который приберегает для истин, которые предпочёл бы не озвучивать. Он говорит, что мир был простым актом удобства, а не убеждения. Он предупреждает, что [sandamal.GetFirstName] уже пополняет запасы и наблюдает за нашим восстановлением с терпеливым вниманием человека, намеренного вернуться. Он говорит, что мы должны наращивать силы сейчас, пока у нас ещё есть время.\n\nВсе мои инстинкты восстают против этих слов. Война окончена, и мёртвые едва погребены. Я устал до самых костей так, как не считал возможным. Но я слишком дорогой ценой усвоил, что [aameda.GetFirstName] говорит тихо лишь тогда, когда абсолютно уверен. Мне ещё ни разу не шло на пользу отвергать его, когда в его глазах появляется этот взгляд."
 mumakan.0044.a: "Он прав. Мы должны собрать армию, достойную республики."
 mumakan.0044.b: "Нет. Мы должны стремиться к примирению. Написать письмо императору."

 mumakan.0045.t: "Последняя битва"
 mumakan.0045.desc: "Они вернулись. Чёрная волна знамён и стягов стоит на горизонте, как надвигающаяся буря. Длинные колонны солдат #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#! движутся через восточные перевалы. Это всё, о чём предупреждал меня [aameda.GetFirstName], и даже более того. Всё, что мы возводили в годы после разорения, теперь висит на волоске. Каждая стена, поднятая из руин, каждый корабль, спущенный на воду с упрямой надеждой — всё вело к этому мигу. Каждый сын республики, что был отправлен на учебные плацы, чтобы проливать кровь и пот, был подготовлен к этому единственному дню на этом единственном клочке земли.\n\nМы сделали всё, что могли. Сыны [GetTitleByKey('k_koronande').GetNameNoTier] на своих постах. Они готовы, и они знают, что именно защищают. Что бы ни произошло дальше — решится здесь, и я встану впереди. Я более не намерен решать судьбу своего народа из-за каменных стен. Время обсуждений прошло. Настало время стали."
 mumakan.0045.a: "Призвать сынов республики! Пусть они выступят единым фронтом!"
 mumakan.0045.b: "Выпустить мумаков! Они не пройдут!"

 ## Ataraka II - War Loss ##

 mumakan.0051.t: "Конец республики"
 mumakan.0051.desc: "Всё кончено. Великие дела заканчиваются в песнях не так. Не было последнего дерзкого стояния и ни одного имени, достойного памяти. Вместо этого всё закончилось обыденно и бесславно, как и заканчивается большинство вещей — постепенно и неотвратимо, пока однажды утром ворота просто не выдержали.\n\nРеспублика погибла. Это было дело, в которое я вложил каждый час своей жизни. Это было то, ради чего я взялся за оружие, и единственное, во что я верил, когда мир погружался во тьму. Теперь я бегу. Я клялся, что никогда не сделаю этого, но делаю это сейчас, пока морские брызги холодят моё лицо. Позади, на горизонте, [GetTitleByKey('c_korlan').GetNameNoTier] горит. Её башни, суды и гавань — всё объято пламенем. Даже улица, на которой я вёл своё первое дело тридцать лет назад, поглощена огнём. Я несу с собой всё, что осталось — горстку верных душ и угольки чего-то некогда великолепного. Я больше не оглядываюсь. Если оглянусь — знаю, что не смогу остановиться."
 mumakan.0051.a: "Мы спаслись, но у нас не осталось ничего, кроме наших жизней."
 mumakan.0051.a.tt: "#N Все резервы исчерпаны#!"

 mumakan.0052.t: "Последнее противостояние"
 mumakan.0052.desc: "Это всё, что у нас осталось. Последние монеты, выскребленные из пустых казначейств, и последние люди, которые всё ещё отвечают на зов знамени республики. У них есть все основания бросить нас, но они остаются. [aameda.GetFirstName] ушёл своим путём. Я поведу те немногие силы, что мне остались, в глубокую зелёную тьму. Я бегу и не останавливаюсь. Остановка — это то, чему я ещё не научился, и не собираюсь учиться сегодня.\n\nРеспублика пала и закована в цепи. Её кровь пропитала южные моря от #ONCLICK:TITLE,k_pel #TOOLTIP:LANDED_TITLE,k_pel #L Пэла#!#!#! до #ONCLICK:TITLE,e_khy #TOOLTIP:LANDED_TITLE,e_khy #L Кхая#!#!#!. Я не глупец. Я знаю, что день проигран. Однако моя страна не будет безмолвно пребывать в цепях. Она никогда не будет по-настоящему покорена, пока живы свободные [GetCultureByKey('koronandi').GetName|l]. Мы достигли укрытия — потаённой поляны в густом сердце джунглей. Здесь полог деревьев достаточно плотен, чтобы скрыть наши костры от имперских разведчиков. Мы оцениваем наше положение и приходим к осознанию истины нашего нового существования."
 mumakan.0052.a: "Мы едва спаслиcь."
 mumakan.0052.a.tt: "#N Резервов не осталось - мы сражаемся голыми руками.#!"
 mumakan.0052.b: "Мы спаслись, но были ранены!"
 mumakan.0052.b.tt: "#N Резервов не осталось - мы сражаемся голыми руками.#!"
 mumakan.0052.c: "Мы спаслись, но остались с голыми руками."
 mumakan.0052.c.tt: "#N Резервов не осталось - мы сражаемся голыми руками.#!"
 mumakan.0052.d: "Горстка ополченцев - всё, что мы можем собрать."
 mumakan.0052.d.tt: "#N Горстка ополченцев - всё, что мы можем собрать.#!"
 mumakan.0052.e: "Небольшой отряд собирается под знаменем."
 mumakan.0052.e.tt: "#N Небольшой отряд собирается под знаменем.#!"
 mumakan.0052.f: "Можно выставить полноценный гарнизон."
 mumakan.0052.f.tt: "#N Можно выставить полноценный гарнизон.#!"
 mumakan.0052.g: "Достаточно оружия для надёжной обороны."
 mumakan.0052.g.tt: "#N Достаточно оружия для надёжной обороны.#!"
 mumakan.0052.h: "Настоящая армия начинает обретать форму."
 mumakan.0052.h.tt: "#N Настоящая армия начинает обретать форму.#!"
 mumakan.0052.i: "Наши тайные запасы порождают грозное войско."
 mumakan.0052.i.tt: "#N Наши тайные запасы порождают грозное войско.#!"
 mumakan.0052.j: "Мумакил осёдланы, и стража собрана в полной силе."
 mumakan.0052.j.tt: "#N Мумакил осёдланы, и стража собрана в полной силе.#!"
 mumakan.0052.k: "Каждый гражданин вооружён - это нация в состоянии войны."
 mumakan.0052.k.tt: "#N Каждый гражданин вооружён - это нация в состоянии войны.#!"

 ### General Baciiri - In the Emperor's Name ###
 mumakan.0071.t: "Предрешённый исход"
 mumakan.0071.desc: "С тех пор как #L [GetCultureByKey('koronandi').GetCollectiveNoun|l]ое#! сердце было повержено, оставалось лишь вопросом времени, когда их кровь иссякнет, а решимость станет бескровной. И вот предрешённый исход свершился. Этот фарс войны окончен. Мы одержали заслуженную победу и забрали то, что нам причитается. Теперь начинается задача перестройки этого порта в инструмент процветания империи. Более не будет этот город пиявкой, сосущей наши запасы. Более не будут жирные купеческие властители выкачивать из #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#! всё до последнего ради неправедных богатств, к которым они так алчут.\n\nТеперь, когда мы вернули всё, что они украли, мои товарищи-солдаты возвратились домой вкушать плоды своего великого труда. Но мне предстоит ещё один долг. Быть глазами и руками нашего великого императора #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofmamakil125').GetID] #L Сандамала#!#! — великая честь и тяжкое бремя. Как первый имперский наместник этих земель, я должен хранить мир в государстве. Я должен подготовить их к вхождению в нашу славную империю. Я смотрю в будущее и подсчитываю всех, кто остался, дабы помочь мне в этой последней задаче."
 mumakan.0071.a: "Война выиграна. Теперь мы завоюем мир."
 
 mumakan.0072.t: "У врат Коронандэ"
 mumakan.0072.desc: "Я брал множество городов. Но ни в один не въезжал вот так. Я не просто проезжий. Я не завоеватель, который уедет, когда рассеется дым. Я — тот, кто будет здесь и когда сменятся времена года. Люди вдоль улицы наблюдают в молчании. Это не молчание побеждённой армии. Это не молчание приветствия. Это особое молчание народа, потерявшего всё. Они ждут с терпеливой осторожностью тех, кто усвоил, что терпение — это всё, что у них осталось. Они ждут, что будет дальше.\n\nЯ выстраиваю в голове солдатские расчёты. Ворота нуждаются в починке. В стене гавани зияет брешь, через которую можно провести целый строй. Зернохранилища опустошены. И тут в толпе мой взгляд ловит ребёнка. Ему около семи лет, он держит женщину за руку. Он смотрит на меня с выражением, которое я не могу до конца прочесть и не скоро забуду. Что-то шевелится в моей груди. Я запоминаю этот миг и еду дальше. Впереди много работы."
 mumakan.0072.a: "Осмотреть ущерб. Мы должны немедленно навести порядок."
 mumakan.0072.b: "Пусть воины празднуют. Они заслужили свою добычу."

 mumakan.0073.t: "Архитектор теней"
 mumakan.0073.desc: "[aameda.GetFirstName] появляется именно в тот момент и именно в том месте, где он наиболее полезен. На его лице — выражение человека, который ожидал этого знакомства уже давно и считает его приятно запоздавшим. Он ориентируется в руинах политической жизни республики с беглостью, впечатляющей для человека, изучавшего её годами. Для человека, помогавшего её строить, — это нечто иное. Он предлагает мне свои услуги и свои многочисленные связи. Он преподносит уцелевшие семьи купцов и ростовщиков, словно тысячу нитей из шёлка и железа, сходящихся в его руках. Он обещает, что если мы объединим интересы, город будет повиноваться моей малейшей прихоти.\n\nЯ встречал таких людей, как [aameda.GetFirstNameNoTooltip], в каждой армии, в которой служил. Они умны и незаменимы, но преданы лишь собственному знамени. Я прежде служил под началом подобных людей, и это то, что я поклялся никогда не повторять. Я не убеждён, что ему можно доверять. Однако я не убеждён, что могу позволить себе роскошь этого убеждения."
 mumakan.0073.a: "Его знания слишком ценны, чтобы ими разбрасываться. Принять его в наши ряды."
 mumakan.0073.b: "Он перебежчик и змея. Держать его на расстоянии."

 mumakan.0074.t: "Тихий уход"
 mumakan.0074.desc: "Он кланяется. Это безупречный, неторопливый поклон из тех, что требуют долгих лет практики, чтобы выглядеть непринуждённо. Он удаляется без возражений. Его молчание тревожит меня больше, чем встревожил бы протест. Его глаза спокойны, темны и слегка веселы, прежде чем он отворачивается. Он выглядит как человек, который слышал этот ответ прежде и уже на несколько ходов впереди.\n\nВ тот последний миг он посмотрел на меня так, как ремесленник смотрит на инструмент с тонкой трещиной. Это не было презрением. Это было особое разочарование профессионала, столкнувшегося с предсказуемой проблемой. Он покидает моё присутствие так же тихо, как тень, отступающая от солнца. Я сделал свой выбор. Я лишь надеюсь, что не доживу до дня, когда он решит, что я более не полезный инструмент его замыслов."
 mumakan.0074.a: "Скатертью дорога."

 mumakan.0075.t: "Цена порядка"
 mumakan.0075.desc: "Он улыбается. Это не тёплый жест. Я не думаю, что теплота — регистр, доступный подобному человеку. В знак закрепления договорённости он преподносит подарок. Он даёт имя, местоположение и человека, который одновременно является полезной приманкой для сети сопротивления и его личным врагом. Он совершенно откровенен в том, что извлечёт из этой договорённости прямую и значительную выгоду.\n\nК моему удивлению, это вызывает уважение. Есть честность в человеке, который не притворяется, будто его интересы и мои — одно и то же, но при этом предлагает честную сделку. По крайней мере, я точно знаю, за что плачу. Я слушаю, пока он произносит имя. Я знаю, с чего нам начать. «Шёлк и железо», что он обещал, — теперь в моих руках. Посмотрим, как остро они режут."
 mumakan.0075.a: "Тогда приступим. Покажи мне, где прячутся крысы."

 mumakan.0076.t: "Незримый враг"
 mumakan.0076.desc: "Несмотря на все меры, [GetCultureByKey('koronandi').GetName|l] отказываются покориться. Удвоенные патрули, комендантские часы и линии снабжения, защищённые в трёх отдельных точках, — всего этого недостаточно. Они становятся смелее. Солдат находят мёртвыми на постах в серые предрассветные часы. Обозы с припасами горят на дорогах, которые были тихи и спокойны ещё вчера. Трое из тех, кому я доверил управление внешними кварталами, просто перестали отвечать на донесения.\n\nЯ вёл тяжёлые войны. Я сражался на сложной местности против искусных командиров, у которых были все основания победить. Но я никогда прежде не воевал с народом. Я никогда не противостоял целой нации на её собственной земле, где каждый холм, каждый переулок и каждое знакомое лицо — преимущество, которое им не нужно было планировать. Я начинаю понимать, почему Сандамал пообещал мне наместничество, а не просто победу. Это битва, где линия фронта всюду, а враг — каждый."
 mumakan.0076.a: "Удвоить патрули. Мы должны поддерживать порядок, не теряя дисциплины."
 mumakan.0076.b: "Возможно, [aameda.GetFirstNameNoTooltip] был прав. Одной сталью этого не решить."

 mumakan.0077.t: "Цена гордости"
 mumakan.0077.desc: "[aameda.GetFirstName] появляется так, будто сама мысль о том, что он нужен, достаточна, чтобы его призвать. На его лице — осведомлённая улыбка, которую я начал активно не любить. Это улыбка человека, терпеливо ожидавшего, пока реальность приведёт его аргументы за него. Он вновь предлагает свои услуги с неторопливой благосклонностью того, кто по-настоящему никогда не сомневался в исходе этого разговора.\n\nЯ долго смотрю на него. Смотрю на его опрятную, тщательную персону. Вижу отглаженные одежды и сложенные руки. Затем я думаю о солдате, которого потерял на дороге к #L [GetTitleByKey('c_korlan').GetNameNoTier]у#! две ночи назад. Я взял за правило узнавать имя этого мальчика, потому что верю — это наименьшее, чем командир обязан мертвецу. Я думаю о своей гордости и о том, чего она мне уже стоила. Я думаю о том, чего она может стоить впредь, если я продолжу игнорировать тени в этом городе. Солдат погиб из-за моего упрямства. Я не могу позволить, чтобы это повторилось."
 mumakan.0077.a: "Я не стану ползать перед перебежчиком. Прочь с глаз моих."
 mumakan.0077.b: "Помоги мне покончить с этим, невыносимая змея."

 mumakan.0078.t: "Прощание интригана"
 mumakan.0078.desc: "[aameda.GetFirstName] пожимает плечами. Это великолепное пожимание плечами человека, который получал этот ответ в сотне разных комнат от сотни разных командиров. Каждый вариант он находит одинаково предсказуемым. Он уходит, не настаивая, поскольку люди вроде него знают, что настойчивость редко бывает необходимой. У двери он останавливается. Не оборачиваясь, он роняет тихое замечание тоном наставника, поправляющего способного, но упрямого ученика.\n\nОн говорит мне, что гордость — плохой щит от ножей в темноте. Я уже знаю эту истину. Знание её не делает лёгким зрелище его ухода. Он оставляет меня наедине с моими картами и подсчётами мертвецов. Я — солдат империи, и у меня есть приказы. Если этот город должен удерживаться одним мечом — да будет так. Я буду точить клинок, пока он либо не усмирит улицы, либо не сломается в моей руке."
 mumakan.0078.a: "Пусть плетёт свои интриги. Я удержу этот город одним мечом."

 mumakan.0079.t: "Горькая действенность"
 mumakan.0079.desc: "Его самодовольство, если возможно, ещё хуже прежнего фиаско. Это устоявшееся, архитектурное самодовольство, которое явно было несущим многие годы. Но через считанные дни после нашего соглашения засады начинают сходить на нет. Сначала прекращаются крупные, затем мелкие, пока дороги не становятся тихими так, как не были с первого дня, когда я въехал в ворота. Его осведомительная сеть движется сквозь Коронандэ как вода сквозь старый камень. Она находит каждую трещину, каждый шов, каждое тёмное место, где скрывающийся человек мог бы укрыться, прежде чем стать проблемой. Она действует быстрее, чем всё, что я мог бы выстроить с нуля, имея вдвое больше средств.\n\nМне не нравится, что это говорит о том, кто действительно знает этот город. Мне не нравится, что это значит для того, кто на самом деле им управляет. Однако я всегда был человеком, уважающим результаты, и эти результаты неоспоримы. Пока мы работаем вместе. Я буду наслаждаться тишиной на дорогах, даже если придётся терпеть присутствие человека, который её купил для меня."
 mumakan.0079.a: "Результаты говорят сами за себя. Пока мы будем работать вместе."

 ### General Mase - White Peace ###

 mumakan.0081.t: "Пустой мандат"
 mumakan.0081.desc: "Приказ исходит от трона. Мне надлежит принять белый мир. Кампания оканчивается, завоевания сдаются. Кровь, годы и пожарища #L [GetTitleByKey('c_korlan').GetNameNoTier]а#! стратегически обращены в ничто. Таковы переменчивые расчёты империи, которой я служил всю жизнь, но в чьи дела меня никогда по-настоящему не посвящали.\n\nЯ солдат. Я всегда был солдатом, а солдат повинуется своему императору. И я повинуюсь. Я складываю депешу и отдаю приказ встать. Я не позволяю выражению моего лица измениться, потому что это тоже часть солдатского ремесла. Однако повиновение и достоинство — разные вещи. Стоя здесь с этим приказом в руке, я с трудом нахожу последнее. Интересно, понимает ли мой император, что он попросил меня проглотить. Я прихожу к выводу, что, вероятно, нет. Я выиграл войну лишь для того, чтобы мне сказали, что победа была ошибкой."
 mumakan.0081.a: "Я служу трону, а не своему эго. Я повинуюсь."

 mumakan.0082.t: "Беспокойная награда"
 mumakan.0082.desc: "Император щедр. Вместо обещанного наместничества он предлагает мне землю. Тихое владение в мирной провинции. Место, где я мог бы построить дом и засеять поля. Место, где я мог бы наконец перестать просыпаться до рассвета, чтобы высчитывать дислокацию войск. Я понимаю, что это справедливое предложение. В земле нет ничего дурного. Земля прочна, земля реальна. Я достаточно раз спал на холодной земле, чтобы знать цену крыши.\n\nНо я был рождён не для крыши. Я родился в канавах Амару. Я выбрался из них единственными инструментами, что у меня были. Каждый мой шаг с тех пор был шагом вперёд. Мысль о том, чтобы развернуться сейчас и назвать это жизнью, сидит в моей груди как камень, который я не могу сдвинуть. Меч — единственное, что я всегда по-настоящему понимал. Я не думаю, что закончил с ним. Солдат без войны — просто человек, ожидающий, когда угаснет. Я не готов угаснуть."
 mumakan.0082.a: "Я солдат, а не фермер. Я отказываюсь оседать."
 mumakan.0082.b: "Я принимаю землю. Для меня эта война окончена."

 ### General Mase - Defeat ###

 mumakan.0091.t: "Шокирующее поражение"
 mumakan.0091.desc: "Моя армия разбита. Это не какое-то упорядоченное тактическое отступление, которое можно представить как перегруппировку. Она по-настоящему разбита. Вот как выглядят вещи, когда по ним ударили достаточно сильно и часто, чтобы их уже нельзя было собрать заново. [GetCultureByKey('koronandi').GetName] сделали это. Оборванные и полуголодные. Пустоглазые защитники республики, у которых не было ни единого шанса на победу. Но они всё равно победили.\n\nИх удержало вместе нечто, что я понимаю лучше, чем хотел бы признать. Это особое упрямство народа, решившего, что не он будет тем, кто позволит всему закончиться. Обещанное наместничество — дым. Я стоял на пороге величайшего свершения в своей жизни. Народ, слишком упрямый, чтобы знать, что он побеждён, протянул руку и отнял его у меня. Я уважаю это. Уважаю так, как уважают огонь. Полностью и с достаточно безопасного расстояния — того, что от него осталось."
 mumakan.0091.a: "Отступить и перегруппироваться. Мы ещё можем встать на ноги."

 mumakan.0092.t: "Неведомый вердикт"
 mumakan.0092.desc: "Впереди — долгий марш домой. Он ощущается как приговор, зачитываемый вслух. Каждый шаг — слово, а пункт назначения — вердикт, которого я пока не могу знать. Я думаю о Сандамале. Он доверил мне великое дело своего правления, и я должен найти способ предстать перед ним, когда этот марш закончится. Я думаю о людях, которые последовали за мной сюда и не следуют за мной назад. Я тихо повторяю их имена на ходу. Я всегда верил, что это меньшее, чем командир обязан мертвецам.\n\nЯ не могу сказать, что ждёт меня в конце этой дороги. Это может быть суд или милость. Это может быть трибунал или вежливая отставка в безвестность. Политика империи всегда была выше моего горизонта. Это неважно. Я встречал вещи и похуже неизвестности. И всегда встречал их одинаково. Я делаю один шаг за раз, глядя прямо перед собой, пока всё не закончится."
 mumakan.0092.a: "Я приму любой суд, который меня ждёт. Я служу трону."
 mumakan.0092.b: "Я не стану жертвенным агнцем. Граница широка."

 mumakan.0093.t: "Пустой трон"
 mumakan.0093.desc: "Сандамал мёртв. Империя трескается по всем швам. Эта громадная и, казалось бы, нерушимая военная машина даёт сбой. Каждый честолюбивый лорд в Мумакане вдруг обнаруживает, что верность — понятие гибкое, когда трон пустует. Каждая рука с мечом стоит на вес золота. Впервые за всю карьеру я не просто полезен. Я ценен. Между этими двумя вещами есть разница, которую выходец из Амару учится чувствовать нутром.\n\nЯ смотрю на людей, оставшихся со мной. Они закалены в боях и верны до безрассудства. Они ждут моего слова так, как ждали всегда. Я подвожу итог тому, чем действительно располагаю. Это больше, чем кажется, и меньше, чем нужно. Возможно, этого достаточно. Всю жизнь я был полезен могущественным людям. Пожалуй, настало время выяснить, могущественный ли человек я сам. Я выбирался из тьмы прежде. Я смогу сделать это снова."
 mumakan.0093.a: "Я служу трону. Моя верность институту незыблема."
 mumakan.0093.b: "Пусть принцы зальют друг друга кровью. Мы подождём, пока осядет пыль."
 mumakan.0093.c: "Генералу с армией не нужен император. Я заявлю права на собственные земли."

 ### Ataraka Initial Story Chain ###
 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aameda is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aameda responding.

 mumakan.0110.t: "Падение Корлана"
 mumakan.0110.desc: "#italic Наступает утро, и рассвет несёт#! #bold смерть#!.\n\nВы видите это — мерцание, подобное кровавой луне над заливом, столь же ясное утром, как и ночью. Огонь поднимается над Корланом, великий и ужасный, в чёрном и бессильном мертвенном безмолвии. Он пылает, и ваш народ пылает вместе с ним — ваша республика, ваше бремя, ваша честь, ваша надежда. Он пылает как ваши глаза. Он пылает как ваше сердце. Когда ветер наполняет парус вашего одинокого судна и доносит до вас запах дыма, горящих пряностей, горящей плоти — вы знаете.\n\nТруд сотни поколений — в пламени. Тысячи лет закона, совета и торговли, десять тысяч #L [GetCultureByKey('koronandi').GetCollectiveNoun|l]их#! лиц в их десяти тысячах трудов — всё стало жертвоприношением тщеславию тирана."
 mumakan.0110.a: "Я взираю на погребальный костёр республики."
 mumakan.0110.b: "Нет слов."
 # cynical response
 mumakan.0110.c: "Что сделано, то сделано."
 
 mumakan.0111.t: "Приближение Амеды"
 mumakan.0111.desc: "[aameda.GetFirstName] хранил молчание, но это не мирная тишина. Вы видите это по его позе — руки сжаты, зубы скрипят. Его обычная надменная невозмутимость разбита вдребезги. В его глазах пылают огонь и смерть, окрашенные отчаянием и ненавистью в равной мере. Он вглядывается в воды, прежде чем наконец повернуться к вам.\n\n«Ты тоже чувствуешь это, Атарака». Его голос напряжён. «Эту боль, это горе. Держись за них. Лишь они поддержат нас в долгие дни впереди и, быть может, позволят нам узреть истинную победу...»"
 # you look back and think of your choices how did it come to this?
 mumakan.0111.a: "Я вспоминаю дорогу, что привела нас к этому мрачному дню..."

 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "Воззвание Сандамала"
 mumakan.0112.desc: "В тот хмурый день пришло послание.\n\nГонец, несущий свиток, скреплённый имперской печатью императора Сандамала, потребовал слова перед Великим советом, и в сердце моём я знал, что ничего доброго это не сулит. Развернув свиток, посланник заговорил голосом императора.\n\n«Советникам Коронандэ, внемлите словам моим и последнему предложению милосердия. Долго вы жирели на крови моего народа, выпивая нашу жизненную силу и плюя на честь наших предков. Довольно. Смиритесь пред законными наследниками благословенного Индура и преклоните колени перед его троном, и крови не будет, ибо золотом оплатите вы виру за ваши грехи. Откажете — и мне не останется иного, кроме как отомстить за мой народ сталью».\n\nСовет немедленно взрывается от возмущения при виде подобной дерзости и неприкрытых попыток вымогательства. Слова нарастают, пыл достигает предела, клятвы и проклятия льются от советников, поклявшихся никогда не преклонять колен перед императором."
 mumakan.0112.a: "И так началась война."

 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "Военный совет"
 mumakan.0113.desc: "Когда посланник удалился, Совет обратился к вопросу надвигающейся войны. Но тогда страха было мало — разве не была Коронандэ неслыханно богата? Разве не были стены Корлана могучи и высоки? Сыны республики стояли едины, в отличие от давно разрозненных дикарей империи, что ныне рычали угрозами у их ворот.\n\nНо посреди пыла и бахвальства один тихий голос осторожности привлёк моё внимание — Амеда говорил о благоразумии, о том, что слышал многое об императоре Сандамале и о тех, кто ему служит. И хотя мне тогда хотелось огрызнуться на него, отчитать за то, что именно политика его фракции и откровенная коррупция привели к этой пропасти — я совладал с собой. Не время. Не когда республика, возможно, висит на волоске.\n\nОднако, несмотря на мою собственную решимость, я нашёл мало оной в совете — фракции тут же раскололись, споря о стоимости обороны, кого нанять, кого призвать. И всё же, в конце концов, совет с трудом определился с мерами..."
 mumakan.0113.a: "Мы должны сосредоточиться на мумакил, чтобы встретить империю в поле." # Spawns 4 Elephants, 2 citizen guard, 2 mangonels
 mumakan.0113.a.tt: "Вы получите [Concept('men_at_arms', 'профессионалов')|E] - 4 отряда [GetMaA('war_mumak').GetName], 2 отряда [GetMaA('koronandi_citizen_guard').GetName] и 2 отряда [GetMaA('mangonel').GetName]" # Spawns 4 Elephants, 2 citizen guard, 2 mangonels
 mumakan.0113.b: "Сыны республики — наша сила." # Spawns 2 Elephants, 4 citizen guard, 2 mangonels
 mumakan.0113.b.tt: "Вы получите [Concept('men_at_arms', 'профессионалов')|E] - 2 отряда [GetMaA('war_mumak').GetName], 4 отряда [GetMaA('koronandi_citizen_guard').GetName] и 2 отряда [GetMaA('mangonel').GetName]" # Spawns 2 Elephants, 4 citizen guard, 2 mangonels THESE SHOULD BE A TOOLTIP
 mumakan.0113.c: "Мы должны готовиться к контратаке!" # Spawns 2 Elephants, 2 citizen guard, 4 mangonels
 mumakan.0113.c.tt: "Вы получите [Concept('men_at_arms', 'профессионалов')|E] - 2 отряда [GetMaA('war_mumak').GetName], 2 отряда [GetMaA('koronandi_citizen_guard').GetName] и 4 отряда [GetMaA('mangonel').GetName]" # Spawns 2 Elephants, 2 citizen guard, 4 mangonels THESE SHOULD BE A TOOLTIP

 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
 mumakan.0114.t: "Молниеносная кампания"
 mumakan.0114.desc: "Но все приготовления оказались тщетны. Армии Мумакана маршировали ещё прежде, чем посланник Сандамала заговорил с нами, и едва наши укрепления начали возводиться, как имперские армии обрушились с востока. Любые попытки преградить им путь отметались с лёгкостью, словно войска Коронандэ были лишь мелкими досадами.\n\nПред лицом такой кампании надежды рухнули в одночасье — от хмельной уверенности каких-то суток назад. Войско Сандамала сеяло отчаяние стремительностью своего наступления, и это было оружие страшнее стали."
 mumakan.0114.a: "И всё же мы должны были попытаться!"
 # cynical response
 mumakan.0114.b: "Все средства шли в ход!" # cynical
 mumakan.0114.c: "Наша самонадеянность стала нашей погибелью."

 # mumakan.0115 The siege was bloody
 mumakan.0115.t: "Кровь и золото"
 mumakan.0115.desc: "Осада длилась недолго, если подумать. Стены держались какое-то время, но великие мумакил в конце концов пробили их, и с того момента началась паника. Многочисленное население Корлана обернулось его гибелью — люди хлынули прочь от пробитой стены, отчаянно ища спасения в домах или на кораблях. Хаос погубил все надежды на успешную оборону, и имперские силы не были слепы.\n\nОни стремительно двинулись к гавани, стремясь отрезать пути к бегству. Лишь несколько кораблей успели отойти, прежде чем первый был подожжён — великие суда стали лучинами для погребального костра республики. И огонь распространился, пока не только порт, но и весь город оказался в объятиях ужасного пламени.\n\nМоя жена погибла тогда, погребённая под рухнувшим камнем и пылающими балками. Гордые дворцы великих семей не были пощажены. Их разграбили, семьи перебили или заковали в цепи, обратив в рабов победителей. Бесчисленные сокровища республики — и крови, и золота — были забраны для империи."
 mumakan.0115.a: "Воистину чудовищное зрелище."

 # mumakan.0116 There was little hope, hundreds died in the fires, you sought advice from Aameda.
 mumakan.0116.t: "Бегство совета"
 mumakan.0116.desc: "Советники бросились бежать, увидев безнадёжность дня, не обращая на меня внимания, несмотря на мои призывы к спокойствию, к плану. Но бегству не суждено было состояться. Не для них. Когда гавань была захвачена, паника наконец охватила и их, а обвинения разлетались столь же стремительно. Одни бросились к своим поместьям, другие — к стенам, чтобы бежать по суше. Третьи пытались прорваться к гавани, невзирая на опасность. Они погибали столь же легко, как и те массы, которые они некогда презирали.\n\nСтража совета осталась, верная до конца, отчаянно сдерживая имперские силы.\n\nИменно в этом хаосе Амеда возник подле меня и с неожиданной силой потащил через улицы, пока наша стража медленно таяла.\n\n«День проигран. Возможно, завтра мы одержим победу, но победа прежде всего требует выживания»."
 mumakan.0116.a: "Возможно, но как?"

 # mumakan.0117 Finally the city was falling, Aameda had a ship, you had to flee, but you had left with...
 mumakan.0117.t: "Самый долгий день Корлана"
 mumakan.0117.desc: "Город почти пал. Сердце моё горело, когда я видел жемчужину морей, сокровище республики, преданное огню и разрушению.\n\nАмеда наконец привёл меня к искомому месту — потаённой бухте, выходящей в залив, где небольшая лодка уже поспешно загружалась припасами.\n\n«Это старая мера предосторожности», — тихо сказал он, — «на случай, когда Совету пришлось бы бежать. Предшественник моего предшественника приказал её устроить... что мне довелось увидеть её в деле — горькая чаша».\n\nМы поспешно загрузили лодку тем, что она могла выдержать, и отчалили, едва избежав встречи с вторгшимися войсками. Глядя на горящий город, всё, о чём я мог думать — это..."
 # with glory and brave deeds
 mumakan.0117.a: "Доблесть защитников."
 # with the final respect of your people
 mumakan.0117.b: "Скорбь по погибшим."
 # knowledge of war cynical
 mumakan.0117.c: "Что война ещё не окончена."

 # mumakan.0120 A Toast to the end of the republic
 # Essential scene: Aameda gives a thorough analysis of the situation.
 # They need time to evacuate what they can, build up civilian resistance, and delay as long as possible.
 # Option A: (Defensive Strategy)
 # Option B: We will fight to the bitter end (Offensive Strategy)
 # Option C: evacuate our resources to fight another day
 mumakan.0120.t: "Тост на краю мира"
 mumakan.0120.desc: "«Итак». Голос Амеды вновь обрёл тот непринуждённый, благодушный тон, что скрывал все его истинные чувства. «Корлан предан огню; по всей видимости, большая часть совета перебита или в цепях, как и многие из знатнейших и прославленных домов державы».\n\nЯ прикусываю язык, дабы удержаться от комментариев о мнимой знатности таких... прославленных домов.\n\nОн продолжает, набирая ход подобно катящемуся валуну. «Весьма вероятно, что казна разграблена и увезена, за исключением того немногого, что мы имеем на этом корабле. Селения будут трястись от ужаса, когда город пал. Полагаю, многие сдадутся при первом же виде войска Сандамала. Нам придётся ступать осторожно, но пока мы сражаемся — республика всё ещё жива».\n\nОн поворачивается ко мне полностью, его глаза более не пылают, но пристально сосредоточены. «Ты — предводитель республики. Как мы будем сражаться теперь, когда наши величайшие ресурсы утрачены?»"
 # Defensive Strategy
 mumakan.0120.a: "Мы не можем надеяться встретить их в чистом поле."
 mumakan.0120.a.tt: "Вы изберёте путь, сосредоточенный на оборонительной тактике и истощении, изматывая оккупационные имперские силы."
 # Offensive Strategy
 mumakan.0120.b: "Мы должны ударить сейчас, пока у нас ещё есть хоть какая-то сила, пусть и разрозненная."
 mumakan.0120.b.tt: "Вы изберёте путь, сосредоточенный на наступательной тактике, бросив всё на одно решающее сражение ради изгнания захватчиков."

 # Evacuating things to the reserve
 mumakan.0120.c: "Мы не будем сражаться сегодня. И завтра. Но, быть может, когда-нибудь."
 mumakan.0120.c.tt: "Вы получите #P +1#! ресурсов\nОни укрепят вас в изгнании, если вы потерпите поражение."

 ### War Perspective Events (Ataraka) ###

 # The following events describe the war from Ataraka's perspective at 1, 5, and 10 months. 
 # Always a few options: keep potential exile laamp strengthened, or spend last reserves.

 # mumakan.0131 1 month mark perspective event 
 mumakan.0131.t: "Сбор остатков"
 mumakan.0131.desc: "Некоторые сомневались, но спустя месяц после разорения Корлана мы сумели продержаться. Наше положение всё ещё предельно шатко, но время позволило разрозненным остаткам поддержки начать собираться. Гонцы и припасы стали приходить, и некоторые ранее запуганные города начали осторожно выходить на связь.\n\nЭто обнадёживающий знак, но теперь мне нужно решить, как распорядиться этими вновь обретёнными ресурсами..." 
 # Spends resources (and spawns extra troops) 
 mumakan.0131.a: "Мы должны набрать больше солдат!" 
 # Spends resources (and grants extra siege modifier) 
 mumakan.0131.b: "Мы не победим, если не сможем вернуть города." 
 # continue evacuation / do not use resources 
 mumakan.0131.c: "Ещё нет. Подождём и посмотрим, как всё обернётся." 
 mumakan.0131.c.tt: "Вы получите #P +1#! ресурсов"

 # mumakan.0132 8 month mark perspective event
 mumakan.0132.t: "Отчаянная борьба"
 mumakan.0132.desc: "Восемь месяцев. Я прожил восемь месяцев в холмах и джунглях глубинки. Я сплю в пещерах, пахнущих сырым камнем и древней землёй. Я ем то, чем земля и наши тающие союзники могут поделиться. Я веду войну инструментами отчаявшихся. Засада. Отступление. Отказ от боя. Терпение. Мы удерживаем пространства меж их стискивающихся кулаков. Мы удерживаем обломки. Мы удерживаем места, слишком малые, или слишком крутые, или слишком густо заросшие джунглями, чтобы их колонны могли добраться туда, не истекая кровью за каждый шаг.\n\nВосемь месяцев прошло, и мы не сломлены. Разведчики из имперского войска докладывают своим командирам, что сопротивление продолжается. Я начал узнавать их по осанке. У них та особая усталость людей, ожидавших короткой кампании и увязших в войне, которая не желает кончаться. Я испытываю мрачное и тайное удовлетворение от этого. Позволить себе роскошь задерживаться на этой мысли я не могу.\n\n[aameda.GetFirstName] считал наши запасы с дотошной тщательностью. Он знает, что войны выигрываются снабжёнными, а не храбрыми. Цифры, которые он мне представляет, суровы. Мы выживаем, но одно лишь выживание не освободит республику. Я должен решить, потратить ли то немногое, что у нас есть, чтобы развить наше хрупкое преимущество. Другой путь — сберечь это на ещё более мрачные дни, которые, я знаю, грядут."
 mumakan.0132.a: "Черпать из наших запасов. Огонь сопротивления нужно питать."
 mumakan.0132.a.tt: "Вы тратите #N -1#! ресурсов"
 mumakan.0132.b: "Золото может купить то, в чём земля отказывает."
 mumakan.0132.b.tt: "Вы тратите значительную сумму [Concept('gold', 'золота')|E]"

 # mumakan.0133 15 month mark perspective event 
 mumakan.0133.t: "Годовщина" 
 mumakan.0133.desc: "Я перемещался от деревни к лагерю и обратно, пробираясь через густую, заросшую джунглями глушь, чтобы избежать поимки, координировать оборону, вдохновлять сопротивление. Но в такие дни, как сегодня, уже мне нужна вера.\n\nЯ видел ужасы, которых никому не следовало бы видеть. Я видел невообразимое отчаяние в нищете и разорении. Но то, что лежит предо мной сейчас...\n\nСегодня влажный день. Жаркий день. Густой затхлый воздух забивает мне лёгкие и горло. Он мешается со зловонием горелой рвоты. Он душит каждое моё отверстие. Он заставляет мой желудок выворачиваться, как ничто иное за всю эту проклятую войну. За гребнем — долина смолы, с белеющими костями и голодными псами. Они грызут останки, рвут кости — человеческие кости, человеческие останки. Мужчины, женщины, дети — живодёр, подлец и вельможа...\n\n#N Теперь всё пища для псов.#!"
 mumakan.0133.a: "Я пытаюсь согнуться от рвоты..." 
 mumakan.0133.a.tt: "Но желудок ваш пуст."
 mumakan.0133.b: "Я кашляю снова, и снова, и снова..." 
 mumakan.0133.b.tt: "Но вы всё равно не можете дышать."
 # cynical option (requires global_var:ataraka_cynicism = 3) 
 mumakan.0133.c: "Мы ничего не можем сделать для мёртвых."
 mumakan.0133.c.tt: "И ты не чувствуешь ровным счётом ничего."

 mumakan.0134.t: "Героическая оборона"
 mumakan.0134.desc: "Я не знаю как, но мы продержались два года против врага, превосходящего нас десять к одному. Вокруг лагеря, в котором вы пребывали, повсюду сыны республики — они избиты и перевязаны, их копья обветрены, а щиты посечены, и всё же они улыбаются. Ибо хотя война идёт уже два года — они по-прежнему сражаются, как и вы. [aameda.GetFirstName] касается моего плеча и приглашает в сторону.\n\n«У этих людей столько надежды, но я боюсь, что она может не продержаться», — говорит [aameda.GetFirstNameNoTooltip].\n\nОн наклоняется ко мне, понижая голос: «Тебе следует взрастить этот источник боевого духа, пока ещё можешь. Человек с надеждой одновременно полезен и послушен, хотя это может стоить нам эффективности определённых мер».\n\n[aameda.GetFirstNameNoTooltip] умолкает, давая мне обдумать варианты. «Предоставь мне необходимые ресурсы, и я уверяю тебя — армии республики будут сражаться вдвое яростнее прежнего»."
 mumakan.0134.a: "Я дам тебе то, что нужно." 
 mumakan.0134.a.tt: "Вы тратите #N -1#! ресурсов и #N 100#! товаров для обмена" 
 mumakan.0134.b: "Нет, мы должны сберечь наши резервные планы." 
 mumakan.0134.b.tt: "Вы получите #P +1#! ресурсов"

 # mumakan.0135 38 month mark perspective event
 mumakan.0135.t: "Цена выживания"
 mumakan.0135.desc: "Три года. Я провёл три года, спя в грязи и поедая то, что даёт джунгли. Я смотрел, как людей, которых я обучил и с которыми вместе проливал кровь, уносят с поля на носилках из веток и рваной ткани. Это была изнурительная и неблагодарная война. Теперь [aameda.GetFirstName] приходит ко мне с предложением. Я знал, что это произойдёт, — в том тихом месте за грудиной, где я храню истины, которые не хочу признавать.\n\nОн нашёл покупателей. Это муламбурилские торговцы из далёких портов, которым нет дела до республики. Им важна лишь прибыль. Они щедро заплатят за то, что осталось от наследия Корлана. Он показывает мне священные бронзы старого храма. Он показывает мне звёздные карты гильдии навигаторов, переписанные от руки на протяжении сотни поколений. У него даже есть древние инструменты закона со Стены закона. Это камни, на которых впервые были начертаны слова Тарасара. Это наше наследие. Это наша память.\n\n[aameda.GetFirstNameNoTooltip] говорит мне, что это лишь предметы. Его голос мягче, чем я ожидал. Он точно знает, о чём просит. Он говорит, что предметы не кровоточат и не голодают. Говорит, что они не оставляют детей без отцов. Наш народ делает и то и другое. Я смотрю на реликвии, разложенные передо мной. Я вспоминаю Тарасара, отрёкшегося от своей короны, дабы республика управлялась мудрецами. Интересно, что бы он сказал. Интересно, что бы он подумал о своих наследниках, торгующих его наследием ради покупки копий."
 mumakan.0135.a: "Продать священные сокровища Корлана ради оружия. Выживание важнее наследия."
 mumakan.0135.a.tt: "Вы получите #P +2#! ресурсов"
 mumakan.0135.b: "Предложить муламбурилам торговые монополии в обмен на оружие и товары."
 mumakan.0135.b.tt: "Вы получите #P +1#! ресурсов и #P 100#! товаров для обмена"
 mumakan.0135.c: "Мы не продадим свою душу ради спасения шкуры."
 mumakan.0135.c.tt: "Вы тратите #N -1#! ресурсов"

 # mumakan.0136 50 month mark perspective event
 mumakan.0136.t: "Колодец совести"
 mumakan.0136.desc: "Четыре года и два месяца. Я перестал считать дни. [aameda.GetFirstName] считает их за меня в учётной книгу, которую он держит у самой груди. У него есть столбцы цифр, которые переводят человеческие жизни в стратегическую арифметику. Я изменился за эти годы. Я чувствую это по тому, как теперь держу клинок. Я оцениваю деревню не по её людям, а по её обороноспособности. Я слушаю доклады о потерях с неподвижностью, которая ужаснула бы того человека, что когда-то вёл дела в судебных палатах.\n\n[aameda.GetFirstNameNoTooltip] предлагает нечто, при чём даже он мешкает. Именно так я понимаю, что это поистине ужасно. Мы отступаем медленно и методично, чтобы выиграть время. Он предлагает оставлять за собой нечто большее, чем выжженную землю. Он советует мне отравить колодцы. Он не встречается со мной взглядом. Он говорит, что если мы лишим их воды, мы лишим их возможности удерживать захваченное. Это стоит им месяцев и людей. Это стоит им воли к продолжению.\n\nЯ говорю ему, что это стоит и нам тоже. Он умолкает. Он говорит, что мы уже умираем. Он спрашивает, умрём ли мы, сделав это дорогим для врага, или умрём, сделав это лёгким. Я смотрю на свои руки. Это руки юриста и сына портного. Я вспоминаю колодцы своего детства. Я помню прохладную воду в глиняных кувшинах и смех детей вокруг бассейна. Я гадаю, кем я становлюсь. Я гадаю, узнала бы республика вообще человека, который её спасает."
 mumakan.0136.a: "Отравить колодцы. Пусть пьют смерть, даже если и нам придётся."
 mumakan.0136.a.tt: "Вы получите #P +2#! ресурсов ценой #N снижения лимита снабжения и усиления истощения#!"
 mumakan.0136.b: "Потратить последнее из казны, чтобы вооружить оставшиеся войска."
 mumakan.0136.b.tt: "Вы тратите #N -1#! ресурсов, чтобы получить #P 100#! товаров для обмена"
 mumakan.0136.c: "Спасти, что можно, и готовиться к бегству. В том, чтобы жить, нет позора."
 mumakan.0136.c.tt: "Вы получите #P +1#! ресурсов"

 # mumakan.0137 The Human Cost
 mumakan.0137.t: "Цена человечности"
 mumakan.0137.desc: "Я и [aameda.GetFirstName] спорили множество раз. Мы спорим о стратегии и ресурсах. Мы спорим о моральных границах, на которых я настаиваю, а он считает их старомодными. Но впервые я спорю с ним и знаю с абсолютной уверенностью, что я прав. А ещё я знаю, что правота может нас убить.\n\nДеревни за нашими линиями голодают. Это не медленный голод скудных пайков. Это отчаянный, выхолощенный голод, что превращает кожу в пергамент, а глаза — в стекло. Матери кормят детей супом из древесной коры и называют это ужином. Война уничтожила урожай. Имперцы забрали то, чего не тронул огонь. Оставшегося едва хватает, чтобы мои солдаты стояли на ногах. Совет, что дал [aameda.GetFirstNameNoTooltip], ясен и холоден. Он говорит, что запасы — для армии. Он говорит, что армия — для Республики. Он говорит, что Республику невозможно спасти, кормя людей, которые не могут сражаться.\n\nЯ слушаю его. Я понимаю его рассуждения. Я понимаю, что он, вероятно, прав в узкой и страшной математике выживания. Затем я думаю о своей матери. Она была женой бакалейщика. Она была женщиной, что держала полки полными и кормила соседей в каждую голодную пору. Я думаю, что сказала бы она человеку, позволившему детям голодать, чтобы солдаты ели. Я знаю, что сделаю. Я сделаю это, даже если это будет стоить мне войны."
 mumakan.0137.a: "Открыть зернохранилища. Мы должны накормить всех, кого сможем."
 mumakan.0137.a.tt: "Вы потеряете #N -100#! товаров для обмена"
 mumakan.0137.b: "Эвакуировать мирных жителей и обеспечить их в пути."
 mumakan.0137.b.tt: "Вы получите #P +1#! ресурсов за #N -200#! товаров для обмена"

 # mumakan.0138 The Death of the General
 mumakan.0138.t: "Смерть генерала"
 mumakan.0138.desc: "[aameda.GetFirstName] входит в командный шатёр на рассвете. На нём — то особое выражение, которое он приберегает для новостей, одновременно разрушительных и полезных. Уголок его рта чуть приподнят, а в глазах — блеск, который он не вполне подавляет. Его осанка говорит мне, что он уже просчитал все последствия, прежде чем соизволил поделиться со мной сведениями.\n\nОн говорит просто: генерал мёртв. Говорит это так, словно замечает погоду. Я жду, потому что когда [aameda.GetFirstNameNoTooltip] молчит, это так же выверено, как и его слова. Он объясняет, что это были собственные люди генерала. Мятеж наконец взял своё. Похоже, годы гниения в джунглях и тающего жалованья сделали своё дело. Унижение от того, что их перехитрил народ, который, по их словам, должен был сдаться за месяц, подточило даже мумаканскую дисциплину. Он слегка улыбается и называет это трагедией.\n\nЯ должен чувствовать торжество. Человек, который сжёг Корлан и разрушил мою Республику, мёртв. Он превратил мою жену в воспоминание, а мой народ — в изгнанников на собственной земле. Он мёртв, и его армия раскалывается. Однако я провёл слишком много лет на этой войне, чтобы путать возможность с победой. Раненый зверь опасен. Армия без вождя — вдвойне. Одни дезертируют, другие будут сражаться яростнее. Им нечего терять, и ненависть заполнит пустоту, где прежде была дисциплина. [aameda.GetFirstNameNoTooltip] наблюдает за тем, как я думаю. Его выражение меняется на острое предвкушение. Он ждёт моего приказа."
 mumakan.0138.a: "Подготовиться к контратаке, пока они ослаблены. Того требуют пращуры!"
 mumakan.0138.a.tt: "Вы подготовите контратаку, чтобы нанести удар по ослабленному Мумакану."
 mumakan.0138.b: "Терпение — наше величайшее оружие. Мы должны подождать, пока они развалятся."
 mumakan.0138.b.tt: "Вы подождёте, пока Мумакан развалится изнутри."

 # mumakan.0139 Nafarati Revolt
 mumakan.0139.t: "Северная буря"
 mumakan.0139.desc: "Гонец полумёртв от усталости, когда его находят. Это #L [GetCultureByKey('mulamburil').GetCollectiveNoun|l]ая#! торговка, которая вела разведку для Амеды через каналы, о которых я давно решил не расспрашивать слишком пристально. Вести, что она несёт, меняют облик войны в единый миг. [GetCultureByKey('nafarati').GetName] восстали.\n\nЭто не пограничная стычка и не спор из-за дани. Это полное отделение. Северные военачальники объявили о своей независимости от империи, которая обескровила себя, пытаясь сокрушить нас. Великая авантюра Сандамала обернулась против него. Он отстранил нафаратцев от вторжения в Коронандэ, дабы доказать, что трону они не нужны. Тем самым он доказал ровно обратное. Имперская казна истощена, армия увязла в наших джунглях. Нафаратцы просто ушли. Они забрали своих солдат, свои земли и свои амбиции. Они передали империи — пусть она оставит себе свой умирающий трон.\n\n[aameda.GetFirstName] уже смеётся. Это не его обычное осторожное, размеренное веселье. Это нечто необузданное и подлинное, чего я никогда прежде от него не слышал. Он спрашивает, понимаю ли я, что это значит. Впервые в его голосе нет расчёта. Лишь дикая и недоверчивая радость человека, наблюдающего, как дом его врага загорается изнутри. Я понимаю. Империя не может воевать на два фронта. Я должен решить — ударить, пока железо раскалено добела, или позволить огню сделать нашу работу за нас."
 mumakan.0139.a: "Они познают мой гнев!"

 ### Sandamal War Perspective Events ###

 mumakan.0140.t: "Падение Коронандэ"
 mumakan.0140.desc: "Депеша прибывает ко двору с всадником, чей конь полумёртв под ним. Я знаю, что в ней, ещё до того, как сломана печать. Особая торопливость человека, скакавшего без отдыха, говорит сама за себя. Я читал подобные истории тридцать лет. [GetTitleByKey('c_korlan').GetNameNoTier] пал. Великий город-гавань взят штурмом. Этот самоцвет, который обескровливал мою империю на протяжении поколений своей мёртвой хваткой на южной торговле. Мой генерал свершил то, о чём мечтал каждый император со времён #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('nazgul4').GetID] #L Джи-Индура#!#!, но никто не осмеливался предпринять. Он — простолюдин, которого я вознёс из ничего. Он — человек, которому я оказал доверие, что простираю почти ни к кому.\n\nЯ позволяю себе один вдох удовлетворения. Затем откладываю депешу в сторону. Я начинаю расчёты, которые определят, станет ли эта победа венцом моего наследия или прологом к его крушению. Вожди племён потребуют награды. Казна нуждается в пополнении из трофеев. [GetCultureByKey('nafarati').GetName] на севере были намеренно отстранены от кампании. Они отметят и победу, и своё отсутствие в ней. Они сделают выводы, с которыми мне придётся обращаться осторожно. Нужна твёрдая рука и щедрая награда. Суровое деяние может последовать, если потребуется. Война выиграна. Мир — это всё."
 mumakan.0140.a: "Наконец-то. Республика склоняется пред троном Мумакана."
 mumakan.0140.b: "Хорошо, но время празднования настанет лишь тогда, когда последний коронандец преклонит колено."

 mumakan.0141.t: "Донесения с фронта"
 mumakan.0141.desc: "Депеши, что присылал генерал [general.GetFirstName], всегда были образцом военной ясности. Он докладывает о занятых позициях и удерживаемых позициях. Он перечисляет развёрнутые силы и потраченные силы. Я всегда читал их с признательностью человека, ценящего компетентность превыше всех позолоченных добродетелей вместе взятых. В этой депеше — нечто, чего я прежде от него не видел. Сквозь уверенность нитью проступает осторожность, словно тёмная прядь в яркой ткани.\n\nСопротивление в глубинке крепнет. Сельские города должны были сдаться после падения #L [GetTitleByKey('c_korlan').GetNameNoTier]а#!. Вместо этого они замолчали. Это не молчание покорности. Это опасное молчание народа, решающего, как сражаться без армии. Генерал направил дополнительные патрули. Он закрепил основные дороги. Он заверяет меня, что полностью контролирует ситуацию.\n\nЯ правил тридцать лет. Я усвоил, что когда компетентный человек заверяет тебя в полном контроле, это означает, что он имеет дело с чем-то, что его удивило. Он пока не желает этого признавать. Меня это не тревожит. Мой генерал более чем способен. Остатки Республики не смогут долго поддерживать сопротивление без своей столицы и флота. Я делаю пометку о депеше. Я помещаю её в ту часть разума, где храню вещи, которые однажды могут потребовать моего прямого внимания."
 mumakan.0141.a: "Это было ожидаемо, хотя момент не самый удачный."
 mumakan.0141.b: "У генерала достаточно людей. Это его испытание."

 mumakan.0142.t: "Своеволие юга"
 mumakan.0142.desc: "Шестнадцать месяцев. Кампания должна была длиться три. Может, четыре от силы — если бы погода подвела или прибрежные города сохранили верность республике. Вместо этого я сижу в своём приёмном зале в [GetTitleByKey('c_amaru').GetNameNoTier]. Я читаю депеши, обретшие то особое монотонное звучание войны, забывшей, как ей закончиться.\n\n[GetCultureByKey('koronandi').GetName] не желают умирать. Я говорю это не с восхищением. Вынужден признать толику уважения. У меня — усталое признание человека, достаточно долго изучавшего историю, чтобы знать истину. Оккупировать страну — совсем иное искусство, нежели покорять её. Мой генерал удерживает города, дороги и гавани. Сопротивление удерживает холмы и джунгли. Оно удерживает верность каждой крестьянской жены, прячущей оружие под камнями очага. Это не солдаты, с которыми я сейчас воюю. Это народ. Народ нельзя победить теми же средствами, что и армию.\n\nДвор нетерпелив. Вожди племён громко ликовали при падении #L [GetTitleByKey('c_korlan').GetNameNoTier]а#!. Теперь они начали роптать о расходах и продолжительности. Они жалуются на кампании, пожирающие их ополченцев и не возвращающие ничего, кроме новых депеш. Я заглушаю их пока весом трона и памятью победы. Но память тускнеет. Даже у терпения императора есть свои пределы. Я чувствую, как трещины растут."
 mumakan.0142.a: "Мы ввязались. Победа наверняка близка."
 mumakan.0142.b: "Они доказали свою стойкость. Но против неба этого будет недостаточно."

 mumakan.0143.t: "Бремя пяти лет"
 mumakan.0143.desc: "Пять лет. Эта война должна была стать моим коронным триумфом. Деянием, которое должно было заглушить шёпот. Доказать, что династия всё ещё несёт божественную милость. Показать нафаратцам и каждому иному беспокойному племени, что имперскому трону не нужен иной меч, кроме собственного. Вместо этого она стала жерновом на шее империи. Я чувствую, как он тянет нас ко дну.\n\nДепеши из казначейства более не приходят с цифрами. Они приходят с извинениями. Я получаю тщательно составленные объяснения, почему цифры не таковы, какими должны быть. К ним прилагаются предложения рассмотреть альтернативные источники финансирования. Вожди племён уже не ропщут. Они вступили в ту особую многозначительную тишину, что предшествует требованиям. Их требования ни скромны, ни подлежат обсуждению, когда наконец приходят. Они хотят платы. Они отправляли своих сыновей и ополченцев в войну в джунглях, пожравшую пять лет их сил. Они хотят компенсации. Они не неправы в этом. Этот факт делает их желание не менее опасным.\n\nПередо мной три выбора, и ни один из них не хорош. Это естественное состояние имперского правления. Я давно принял эту реальность. Но я устал. Это не усталость тела, которую я давно научился преодолевать. Это усталость разума. Она честнее и тяжелее для сокрытия."
 mumakan.0143.a: "Заплатить им из казны. Верность должна быть куплена."
 mumakan.0143.b: "Пообещать им добычу из Коронандэ. Пусть алчность питает кампанию."
 mumakan.0143.c: "Напомнить им, кто здесь император. Трон не просит."

 mumakan.0144.t: "Бесконечная война"
 mumakan.0144.desc: "Прибыла депеша. Она не от генерала, а о нём. Это различие меняет всё. [general.GetNameNoTooltip] мёртв. Он не пал в бою. Его не скосила лихорадка. Он не пал жертвой тысячи обыденных жестокостей кампании в джунглях. Его убили собственные солдаты. Те самые люди, что следовали за ним через пролом в стене Корлана. После семи лет войны без конца они решили, что терпение их имеет предел, а верность — нет.\n\nЯ откладываю депешу. Я сижу очень неподвижно, долго. Неподвижность — то, что я делаю, когда земля уходит из-под ног. Она уходила много раз за тридцать лет. Я ещё ни разу не позволил ей увидеть, как я спотыкаюсь. [general.GetNameNoTooltip] был моим. Я нашёл его и возвысил. Я дал ему величайшее командование в империи, и он одержал величайшую победу. Теперь он мёртв в шатре в джунглях, которые должны были быть усмирены годы назад. Его убили те самые солдаты, которых я послал обеспечить его успех.\n\n[GetCultureByKey('nafarati').GetName] беспокойны. Вожди племён — уже за гранью беспокойства. Казна — незаживающая рана. Теперь я должен найти нового командующего и новую армию. Я должен найти новое основание для империи верить, что эта война — нечто большее, чем медленное поглощение всего, что я строил тридцать лет. Я созываю совет. Я не позволяю им видеть, как дрожат мои руки."
 mumakan.0144.a: "Мы не можем остановиться! Мы не должны!"

 mumakan.0145.t: "Нафаратское восстание"
 mumakan.0145.desc: "Двенадцать лет. Половина поколения была влита в джунгли, что поглощают армии. Они не возвращают ничего, кроме костей и депеш, полных осторожных формулировок о продолжающихся боях и меняющихся обстоятельствах. Двенадцать лет прошло с тех пор, как я смотрел, как горит [GetTitleByKey('c_korlan').GetNameNoTier]. Я искренне и честно думал, что самое трудное позади. Теперь [GetCultureByKey('nafarati').GetName|l] восстали.\n\nЯ должен был это предвидеть. Я предвидел. Я видел очертания этого годы назад и чувствовал напряжение в каждой задержанной дани. Я чувствовал демонстративное отсутствие северных военачальников при моём дворе. Я знал в холодной, аналитической части своего разума, что они ждали именно этого момента. Трон перенапряжён. Казна истощена. Армия обескровлена в кампании, ставшей открытой раной. Я отстранил их от вторжения в Коронандэ, чтобы доказать, что мне они не нужны. Вместо этого я доказал, что у них нет причин оставаться без угрозы имперской мощи, удерживающей их.\n\nИмперия не может воевать на два фронта. Каждый император, просидевший на этом троне дольше одного сезона, знает это. Вопрос стоит предо мной. Он холоден, неподвижен и требует ответа, который я не хочу давать. Я должен решить, какой фронт оставить. Я всё ещё Железный лев. Но железо ржавеет, когда слишком долго стоит под дождём. Боюсь, что дождь льёт уже очень давно."
 mumakan.0145.a: "Ничтожества! Они думают, что смогут разрушить всё мною созданное?"

 ### General War Perspective Events ###

 mumakan.0151.t: "Донесения с фронта"
 mumakan.0151.desc: "Я пишу депешу императору в предрассветный час, при свете одной масляной лампы. Я выбираю каждое слово с тщательностью человека, понимающего, что отчёт — это не просто информация. Это архитектура. То, что я выстрою этим письмом, определит, чего Сандамал будет ожидать. Его ожидания определят, что он пришлёт. То, что он пришлёт, решит, закончу ли я эту кампанию наместником покорённой провинции или примечанием в истории имперского самоуправства.\n\nСопротивление рушится. Я пишу это, потому что это в основном правда. Организованные остатки армии Республики рассеяны в глубинке. Их линии снабжения перерезаны. Их руководство сведено к юристу, ставшему мятежником, и тому совету отчаявшихся, что он собрал в горах. Я верю, что последние угли потухнут через месяц-два. Я должен в это верить. Иное — мысль, которую я пока не готов допустить. Я не могу принять, что веду войну против народа, а не армии. Такие войны не заканчиваются так, как говорит мне моя подготовка.\n\nЯ запечатываю депешу и передаю самому быстрому гонцу. Я запрашиваю минимальные подкрепления. Император прочтёт в этом запросе уверенность. Уверенность — то, что ему от меня нужно. Именно она обеспечила мне моё назначение, моё наместничество и всё, до чего я добрался от канав [GetTitleByKey('c_amaru').GetNameNoTier]."
 mumakan.0151.a: "Доложить, что победа неминуема. Запросить минимальные подкрепления."

 mumakan.0152.t: "Терпение джунглей"
 mumakan.0152.desc: "Шестнадцать месяцев в поле. Я осваиваю новый вид войны. Не тот, которому учат в лагерях подготовки. Ни один тактический учебник не предусматривает этого, потому что ни один учебник не написан народом, который скорее умрёт на своих холмах, чем будет жить под сапогом империи.\n\n[GetCultureByKey('koronandi').GetName] сражаются не так, как солдаты. Они не удерживают позиции и не оспаривают перекрёстки. Они не выстраиваются в линии, где компетентный командир может задействовать численное превосходство. Они исчезают. Они бьют из-за деревьев и растворяются в местности, которую знают с детства. Они бьют из-за каждой живой изгороди и каждого ирригационного рва. Патруль выходит и не возвращается. Обоз с припасами сгорает на дороге, которая вчера была безопасна. Деревенский староста утром клянётся в верности, а к ночи укрывает десяток вооружённых людей.\n\nЯ удерживаю каждый город, каждую дорогу и каждую гавань. У меня десятикратное превосходство. Но каждую неделю мои солдаты гибнут в зелёной тьме глубинки. Их отстреливают люди, которые должны были сдаться месяцы назад. Когда их загоняют в угол, они дерутся с яростью, что заставила бы задуматься любого бывалого командира. Это не солдаты. Это отцы, лавочники и рыбаки. Они убивают моих людей. Мне нужно менять подход, или эти джунгли сожрут меня заживо."
 mumakan.0152.a: "Перейти к осадной стратегии. Заморить их голодом."
 mumakan.0152.b: "Начать агрессивные налёты. Мы должны сломить их волю."

 mumakan.0153.t: "Укоренение гнили"
 mumakan.0153.desc: "Пять лет. Я провёл на этом посту пять лет. Это дольше любой кампании, что я когда-либо вёл. Это дольше, чем я карабкался наверх из ничего в имперской армии. Каждое утро я смотрю на лицо в тазу с водой и вижу человека, который постарел на десять лет за половину этого срока. Джунгли делают это с человеком. Жара, сырость и бесконечная зелёная тьма, сжимающаяся со всех сторон. То особое безумие борьбы с врагом, который всюду и нигде. Они отказываются остановиться с упрямством, которое я стал уважать так, как уважают море.\n\nАрмия гниёт. Гниль эта не от болезней. Болезни собирают свою дань, как всегда на юге. Это медленный яд бесцельности. Он поражает солдат, забывших, как выглядит победа. Они начали подозревать, что не узнают её, когда она придёт. Дезертирство растёт. Обозные пристали, разросшиеся в маленький город, — паразитические и неуправляемые. На прошлой неделе нашли троих мёртвых солдат. Офицеры называют это ссорой. Я называю это мятежом.\n\nУ меня осталось два инструмента. Страх и потворство. Страх удержит их в строю, но сделает хрупкими. Потворство заставит их двигаться, но превратит в зверей. Ни то, ни другое — не мой выбор, будь у меня роскошь выбора. Роскошь — то, что я оставил в [GetTitleByKey('c_amaru').GetNameNoTier], если вообще когда-либо ею обладал."
 mumakan.0153.a: "Казнить дезертиров. Инакомыслие не будет терпимо ни в какой форме."
 mumakan.0153.b: "Пусть берут жалованье с земли."

 mumakan.0154.t: "Цена честолюбия"
 mumakan.0154.desc: "Я слышу, как полог шатра шевелится, прежде чем вижу клинок. Семь лет войны в джунглях сделали мой слух острее, чем у любого дворцового пса. Услышать угрозу и суметь её остановить — разные умения. Второе требует тела моложе того, что я износил до жил и рубцов в этом зелёном аду.\n\nЯ знаю эти лица. Я взял за правило знать каждого человека под моим командованием. Это наименьшее, чем командир обязан людям, что следуют за ним. Мальчишка из канав Амару рано усваивает, что расстояние между верностью и убийством — зачастую не более чем пропущенная трапеза или нарушенное обещание. Это не мятежники. Это не #L [GetCultureByKey('koronandi').GetCollectiveNoun|l]ие#! лазутчики. Это мои собственные солдаты. Люди, которых я обучил и повёл через пролом в стене Корлана. Люди, которые кричали моё имя, когда стены рухнули. Они решили в той особой арифметике измождённых и отчаявшихся людей, что я стóю больше мёртвый, чем живой.\n\nЯ думаю о Сандамале, доверившем мне своё великое дело. Я думаю о наместничестве, что было обещано. Я думаю о жизни, которую строил из ничего. Это было доказательством того, что человек из ниоткуда может стать кем-то. Я думаю о ребёнке в толпе в тот день, когда я въехал во врата Корлана. Я так и не забыл это лицо.\n\nКлинок делает взмах. Я не закрываю глаз."
 mumakan.0154.a: "Так вот как это заканчивается. Не в бою, а преданным собственными людьми..."

 ## Decision Events ##
 mumakan.0200.t: "Наследие Амава"
 mumakan.0200.desc: "Наконец-то держава, которой когда-то правил [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], первый король всех [Concept('men', 'людей')|E] #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#!, была возрождена из пепла мифов. Отныне [GetTitleByKey('h_utter_south').GetName] простоит до скончания времён!\n\nЯ поведу южные земли в новое будущее и проложу путь, который обеспечит, что никто не обретёт достаточную силу, чтобы встать у нас на пути!"
 mumakan.0200.a: "Возвышение юга завершено."

 mumakan.0201.t: "Талилан в огне"
 mumakan.0201.desc: "Мои армии разбили последних защитников #ONCLICK:TITLE,k_talilan #TOOLTIP:LANDED_TITLE,k_talilan #L Талилана#!#!#!, а оставшиеся [Concept('elves', 'эльфы')|E] бежали. Их леса горят... - хорошо! Пусть это послужит уроком для всех, кто встанет на моём пути. Никто не может противостоять мощи завоевателей!"
 mumakan.0201.a: "Скатертью дорожка."

 mumakan.0202.t: "Возвышение нафаратцев"
 mumakan.0202.desc: "Воистину, это славный день! Мы создали собственное [Concept('kingdom', 'королевство')|E], в котором наш народ сможет жить и процветать. Теперь никто не может отказать нам в том, что причитается нам по праву крови и железа!\n\nВоздвигнем грандиозное военное святилище неподалеку от [Concept('capital', 'столицы')|E] в ознаменование этого триумфального дня и создадим тренировочную площадку для наших воинов, где они смогут учиться и совершенствоваться в военном искусстве. Скоро топот их марширующих ног будет слышен по всему Крайнему югу!"
 mumakan.0202.a: "Слава Джи-Индуру!"

 mumakan.0203.t: "Величественный дворец"
 mumakan.0203.desc: "Он завершён! Строительство дворца, которое продолжалось так долго, подошло к концу. Теперь на центральной площади столицы возвышаются стены из белого мрамора, а главный вход в само сооружение охраняют две статуи прекрасной работы. Внутри есть множество залов и комнат - их хватит, чтобы разместить целый маленький городок в одиночку!\n\nВ стенах этого сооружения я смогу отдохнуть, когда бремя правления станет слишком тяжёлым, и мне будет даровано несколько драгоценных мгновений тишины и покоя. Набравшись сил, я появлюсь вновь и буду править с обновлённой мудростью и благоразумием, чтобы королевства-близнецы могли продолжать процветать под моей нежной рукой."
 mumakan.0203.a: "Воистину, великолепно."

 mumakan.0250.t: "Подношение оваг"
 mumakan.0250.desc: "Дрожа, я [Select_CString(ROOT.Char.IsFemale, 'поставила', 'поставил' )] корзину, наполненную фруктами и вяленым мясом, на покрытые гравировкой камни у подножия высоких гор. Домашний скот был отогнан в уединённое, обнесённое стеной место неподалеку, и мы оставим его там, чтобы оваг могли забрать его.\n\nКраем глаза я замечаю движение. Поворачиваясь в ту сторону, я ничего не вижу. Нет, это была тень там, под камнями? Я не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )].\n\nКак мне жаль измученные души наших предков, обречённых вечно скитаться по этим унылым холмам. Этим подношением они будут умиротворены ещё на десятилетие..."
 mumakan.0250.a: "Возвращаемся домой."

 mumakan.0350.t: "Последнее испытание"
 mumakan.0350.desc: "Песок под моими ногами кажется тёплым, когда вечернее солнце начинает опускаться за мою спину, туда, где раскинулся остров. Я отворачиваюсь от его света и смотрю во мрак, лежащий на востоке. Я не оборачиваюсь к тем, кто стоит на берегу вместе со мной, потому что все слова давно сказаны. Они знают наши традиции, как и я.\n\nПервая волна касается моих ног, но я не останавливаюсь. Вскоре вода обнимает меня, и я начинаю плыть. Я иду вперёд, на восток, и солнце садится у меня за спиной. Пусть моя сила унесёт меня далеко и принесёт благосклонность тем, кто теперь должен править Амбасоном."
 mumakan.0350.a: "Я буду плыть до тех пор, пока не лишусь сил."

 #Elevating the Kingdom of Ambason & the Isles
 mumakan.0351.t: "Исполнение обещания Амбы"
 mumakan.0351.desc: "Много лет я плаваю по миру, разбойничаю, граблю и жгу. У королей не бывает столько золота, сколько скопилось у меня после грабежей, а моё имя проклинают от Сенга-Муты до Кхая.\n\nЯ, без сомнения, [Select_CString(ROOT.Char.IsFemale, 'самая', 'самый' )] печально [Select_CString(ROOT.Char.IsFemale, 'известная женщина', 'известный мужчина' )] на свете, [Select_CString(ROOT.Char.IsFemale, 'истинная дочь', 'истинный сын' )] Амбы, и [Select_CString(ROOT.Char.IsFemale, 'вложила', 'вложил' )] свою добычу и репутацию в обустройство и укрепление провинции $c_ambason$.\n\nТеперь, по прошествии стольких веков, обещание, данное Амавом своей дочери Амбе, наконец-то выполнено, и мой народ претендует на собственное королевство..."
 mumakan.0351.a: "Амба смотрит на меня с гордостью."
 mumakan.0351.c: "Я — [founder.GetLadyLord|U] крови и золота!"
 mumakan.0351.b: "Наконец-то моя мечта сбылась..."
 mumakan.0352.t: "$mumakan.0351.t$"
 mumakan.0352.desc: "«Тайне» о том, что [founder.GetFirstName] откажется от любой короны, если к ней не прилагается [founder.GetPrimaryTitle.GetNameNoTier], уже много лет, и она давно уже не тайна.\n\n[founder.GetHerHis|U] душа лежит к этому так давно, что кажется, будто мой сюзерен [Select_CString(founder.IsFemale, 'посвятила', 'посвятил' )] всю жизнь выводу своего родного острова из тени.\n\nПосле бесчисленных налётов, войн и резни [founder.GetSheHe] наконец [Select_CString(founder.IsFemale, 'преуспела', 'преуспел' )].\n\nВесьма вероятно, что все самоцветы в [founder.GetHerHis] короне добыты в разных налётах. А при дворе ходят разговоры, что есть в ней и пустые гнёзда, которые [founder.GetTitledFirstNameNoTooltip] ещё может заполнить."
 mumakan.0352.a: "Просто представьте, сколько у нас будет золота!"
 mumakan.0352.b: "#EMP [founder.GetTitleAsNameNoTooltip|U]#!? [founder.GetSheHe|U] хуже разбойничьего барона!"
 mumakan.0353.t: "$mumakan.0351.t$"
 mumakan.0353.desc: "В Сенга-Муте даже последний крестьянин слышал о морском чудовище, имя которому [founder.GetFirstName], Гроза морей, и о [founder.GetHerHis] попытках добиться признания гнезда пиратов и грабителей полноценной державой.\n\nЭта легенда вселяет страх в сердца как мелкого дворянства, так и смердов, но в последнее время грань между мифом и реальностью несколько размылась.\n\nИбо сегодня #EMP [founder.GetTitleAsNameNoTooltip|l]#! [founder.GetFirstNameNoTooltip] [Select_CString(founder.IsFemale, 'объявила', 'объявил' )], что дело всей [founder.GetHerHis] жизни увенчалось успехом.\n\nНа побережье Сенга-Муты появилось новое королевство, и это ужасающее зрелище."
 mumakan.0353.a: "[founder.GetSheHe|U] ведь не собирается грабить #EMP нас#!, правда?"
 mumakan.0353.b: "Это просто [founder.GetTitleAsNameNoTooltip|l] воров!"


 mumakan.0400.opening: "Грозный и могучий Сандамал Мумаканский,"
 mumakan.0400.desc: "Вы одержали над нами верх. Мы покоряемся вашему могуществу. Прошу, избавьте нас от дальнейших разрушений и разграблений! Мы подчинимся вашему правлению и будем хорошо служить вам, если вы примете нас."
 mumakan.0400.a: "Никакого мира - только война."
 mumakan.0400.b: "Очень хорошо... но ты будешь унижен."
 mumakan.0400.b.tt: "#high Вы#! покоряете всех правителей в пределах державы [GetTitleByKey('k_koronande').GetName]"

 mumakan.0401.opening: "Несуразный Атарака,"
 mumakan.0401.desc: "Если вы думаете, что ваши ядовитые слова могут повлиять на меня, подумайте ещё раз. Война продолжится, пока все ваши жалкие города не превратятся в руины."
 mumakan.0401.a: "Будь он проклят!"

 mumakan.0402.opening: "Мудрый Атарака,"
 mumakan.0402.desc: "Ваша капитуляция принята. Вы будете служить мне, но не из Коронандэ. Вместо этого вы будете править теми островами в заливе от моего имени. Проследите за тем, чтобы прибыть туда в надлежащее время."
 mumakan.0402.a: "Прощай, Коронандэ..."
 mumakan.0402.a.tt: "[sandamal.GetName] покоряет всех правителей в пределах державы [GetTitleByKey('k_koronande').GetName]"