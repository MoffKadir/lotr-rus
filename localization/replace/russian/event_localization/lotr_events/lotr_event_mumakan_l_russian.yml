 ### Emperor Sandamal - Our Path Forward (Victory) ###

 mumakan.0001.t: "The War is Won"
 mumakan.0001.desc: "Sandamal receives word that Koronande has fully capitulated and his generals hold the republic."
 mumakan.0001.a: "The Iron Lion has proven his name true."

 mumakan.0002.t: "A Hero's Welcome"
 mumakan.0002.desc: "The imperial court erupts in celebration as Sandamal's gamble pays off and the tribes renew their oaths and admiration, he has done the impossible, he has won Koronande for the empire, something which not even great ji-indur and only the great emperor matara has done."
 mumakan.0002.a: "Accept the adulation of the court with measured dignity."
 mumakan.0002.b: "Remind them that the work of empire is never finished."

 mumakan.0003.t: "A Meeting with Aamedi"
 mumakan.0003.desc: "The Koronandrim Aamedi is always in the right place in the right time he apears before Sandamal as the highest official to sign the treaty of surrender, meeting his mettel with oily pragmatism, he wishes to be aquainted, they are family - if distant, much like the Koronadrim and the Mumakanil. May their relationship be as fraternal as their histories."
 mumakan.0003.a: "Warn them he will be watching them all, fraternal or not"
 mumakan.0003.b: "Court him, he may prove more dangerous as a foe."

 mumakan.0004.t: "Reports of Resistance"
 mumakan.0004.desc: "Despite the victory, Koronandrim partisans continue to ambush supply lines and the governor reports unrest."
 mumakan.0004.a: "Win through force and guile"
 mumakan.0004.b: "Win them over with concessions - 100 friends serve better than 100 slaves."

 ### Emperor Sandamal - Magnanimity (White Peace) ###

 mumakan.0011.t: "White Peace"
 mumakan.0011.desc: "Neither side can press the advantage further and exhaustion forces both armies to the table."
 mumakan.0011.a: "We will accept this peace. lest this war end in utter ruin for both our realms"

 mumakan.0012.t: "The Meeting with Ataraka"
 mumakan.0012.desc: "Sandamal meets the battered but unbroken leader of Koronande to formalize terms of the stalemate. He is not at all what you expect, he is a kind man and a kind person, not some greedy prince, nor some grasping demegaog, or even a warrior, here is a good man, that has fought because it was his duty, much like you, trying to turn the wheel of history in a better direction, you should have hatred for him, for in his resistance he has doomed your own kingdom, but he has saved his. It is a misfortune and in the end you don't blame him. He was doing his duty, as were you. They share a couple of words, and come to an agreement, you would have liked to work together and maybe in the days to come it may still happen perhapse through peace, perhpase through war."
 mumakan.0012.a: "Offer a final respect, in him you have found an equal in honor and in skill."
 mumakan.0012.b: "Stare him down and leave without a word - let him wonder what comes next."

 mumakan.0013.t: "The Loss of Legitimacy"
 mumakan.0013.desc: "The tribal leaders and generals openly question whether the dynasty has lost divine favour after failing to take Koronande."
 mumakan.0013.a: "Remind them who sits the throne - I am still the Iron Lion."
 mumakan.0013.b: "Promise a greater campaign to come - this was merely a setback."

 mumakan.0014.t: "Trouble at Home"
 mumakan.0014.desc: "Emboldened by the stalemate, several tribal chiefs in the north begin withholding tribute and the Nafarati grow restless."
 mumakan.0014.a: "We must make concessions, we no longer have the political capital to continue."
 mumakan.0014.b: "Buy their loyalty with gold - we cannot afford yet another war, nor can we let go of our reforms."

 ### Emperor Sandamal - Defeat / Last Days ###

 mumakan.0021.t: "Defeat from the Jaws of Victory"
 mumakan.0021.desc: "The unthinkable has happened - the armies of Mumakan have been broken and driven from Koronande in humiliation."
 mumakan.0021.a: "Impossible"

 mumakan.0022.t: "Our Greatest Humiliation"
 mumakan.0022.desc: "Ataraka has come, and you are to meet him to his capital, to his table to beg for scraps, he has entirely humilated you, your army, your nation, all shall fall into dispair, you speak to him, he seems a great man, a masterful leader, this war has made him, and you know looking at him, talking to him he is a good man, perhapse the best in a gernation, for he has best you. you have a conversation, it is terse, this war has gone on for a lifetime it seems. Aamedi gets to buisness, he presents the terms, eyewatering terms, you cry for the first time since you were a child for this treaty, your failure shall bond mumakan in a hundred threads to be little more than a pleasure slave to Koronande to be used to their every thirsting whim. and yet, you have no choice, they have destroyed your armies, they have brought the entire empire low, this war cannot go on. lest your nation fall apart before their victorious armies and Amarû itself befall the same fate as their koronande."

 mumakan.0022.a: "You sign bitterly, and stand unbent, it will be your last dignity, it will be the nation's last dignity"

 mumakan.0023.t: "Tensions are Endless"
 mumakan.0023.desc: "The court is a nest of vipers now, with imperial princes whispering of succession and tribal leaders demanding answers."
 mumakan.0023.a: "Tighten the grip - execute the loudest dissenter as a warning."
 mumakan.0023.b: "Attempt to placate them with vast promises and high positions."

 mumakan.0024.t: "The Last Days of Our Emperor"
 mumakan.0024.desc: "Sandamal senses the walls closing in but refuses to bend - he has survived worse."
 mumakan.0024.a: "I am still the Iron Lion - let them come!"
 mumakan.0024.b: "Double the palace guard and trust no one."

 mumakan.0025.t: "Aamedi Sends His Regards"
 mumakan.0025.desc: "A poisoned blade in the dark - Sandamal the Iron Lion falls to an assassin's hand, his empire cracking behind him."
 mumakan.0025.a: "So ends the Iron Lion..."

 mumakan.0026.t: "The Crisis of Greatest Proportions"
 mumakan.0026.desc: "With Sandamal dead, the empire fractures as princes and tribal warlords scramble for the throne."
 mumakan.0026.a: "Seize the throne before anyone else can - strength is all that matters now."
 mumakan.0026.b: "Convene the tribal council and seek a mandate - legitimacy will outlast force."

 mumakan.0027.t: "The War of National Revenge"
 mumakan.0027.desc: "Koronande, sensing the chaos, launches a devastating counter-invasion into the heartlands of Mumakan. They claim to come to liberate the people of mumakan from the tyrany and incompetance of the emperors"
 mumakan.0027.a: "Rally whatever forces remain - the empire must not fall!"
 mumakan.0027.b: "There is no winning, they have found us hopeless, destitute, #high they shall come and kill us all #! #N Abandon your posts! Flee, flee for your lives!#!"

 mumakan.0028.t: "Childish Behavior"
 mumakan.0028.desc: "Before Ataraka leaves, he turns around, and flipps the bird, with the an such a salacious smirk that it alone could conquer the world twice over" 
 mumakan.0028.a: "Why I never!"

 ### Ataraka II - Miracle at Korlan (Victory) ###

 mumakan.0031.t: "The Miraculous Victory"
 mumakan.0031.desc: "Against all odds, Koronande has driven the invaders from its shores and the republic still stands."
 mumakan.0031.a: "The republic endures - the way of the forefathers endures!"

 mumakan.0032.t: "The Meeting before the Wall-Upon-Law"
 mumakan.0032.desc: "The emperor stands before us, laid low before us, by our hands have we won this impossible victory. This would be king, this would be ji-indur, this would be despoiler of our republic, is not at all what ataraka thought he would be. Here he stands with the last dignity he can muster but ataraka can see it in his eyes, they are burning, the same burning ataraka felt before the sight of koronande butchered and undone. ataraka will feel pity for discussing arguing about the realm they both lead, but he also feels contempt. What ever good this emperor would have done for his realm he still has left koronande in ruins, left ataraka's family in ruins, left their people in ruins, and now they are ruined both. Besides you Aamedi has drafted the treaty of peace, it is a document binding, for the damage they have done, the sacrilage they have done, will be repaied by this generation, and the next, and the next. Sandamal stands as still as an old oak as he signs he looks more tired than ever, aamedi simply similes, a terse smile, there is no pity in his eyes, only expectation. Thus Sandomal has signed his empire away, into the annals of history..."
 mumakan.0032.a: "... And Something great of worth has been lost"  #fires 0034
 mumakan.0032.b: "... And nothing of worth was lost"  # Fires 0033 fliping bird and the other flipping the bird event 0028

 mumakan.0033.t: "Fliping the Bird"
 mumakan.0033.desc: "You you were content to leave the broken emperor before you to what ever provencial disaster he shall soon be faced with. But after all he did to you country, senseless unshackled, destruction. After what you had to do, the horrible things you had to do- you have a better idea. A much. much. better idea. \n\n You turn and you muster the most agregious most lambasting most shit eating grin you could and with a swift guesture you flip the bird towards the emperor of mumakan, you've won, and he can do nothing but gasp in supprise"
 mumakan.0033.a: "Well I Never!" #fires 0034

 mumakan.0034.t: "Rebuilding"
 mumakan.0034.desc: "Korlan lies in ruins but the spirit of the Koronandrim is unbroken - now comes the long work of restoration."
 mumakan.0034.a: "Pour everything into rebuilding the city and its defenses."
 mumakan.0034.b: "Focus on rebuilding the fleet - our trade is our lifeblood."

 mumakan.0035.t: "The Great Debate"
 mumakan.0035.desc: "News arrives that Sandamal is dead and Mumakan descends into civil war - Aamedi argues this is the republic's moment to strike."
 mumakan.0035.a: "Press claims to their very heartlands - let the empire shatter piece by piece"
 mumakan.0035.b: "We will take revenge! The republic shall be reorganized INTO THE FIRST KORONADI EMPIRE" #Max Cyn
 mumakan.0035.c: "We have bled enough - rebuild and let them destroy themselves."

 ### Ataraka II - White Peace ###

 mumakan.0041.t: "We Have Survived"
 mumakan.0041.desc: "The war ends without resolution and Koronande remains free - battered, but free."
 mumakan.0041.a: "Survival is its own victory."

 mumakan.0042.t: "A Meeting with the Emperor"
 mumakan.0042.desc: "Ataraka meets with the emperor mumakan expecting his foe to be some dark lord, some tyrant king with an army of slaves, but history rarely is so black and white, ahead of him is a man, the emperor, and he is much more a tired old man of duty, a good man, though on the other side. The more the talks to the more he respects, though so much pain has been bought for so little, they have both survived, and now finally, no one is the master, for both ataraka and sandamal consider each other as equals."
 mumakan.0042.a: "Be conciliatory to build a lasting peace. We must look to the future."
 mumakan.0042.b: "Project strength, you know this is only a temperary respite."

 mumakan.0043.t: "Rise from Ruins"
 mumakan.0043.desc: "Korlan must be rebuilt from the desolation and salt of the sack, and the republic's institutions restored."
 mumakan.0043.a: "Rebuild walls"
 mumakan.0043.b: "Rebuild markets"

 mumakan.0044.t: "War is on the Horizon"
 mumakan.0044.desc: "Aamedi pulls you aside again, no matter what Sandamal Says, you must not trust him, that Sandamal is already planning a second campaign and the republic must prepare, which he will gladly get to doing once he 'has the proper resources.'"
 mumakan.0044.a: "We must build an army worthy of the republic!" 
 mumakan.0044.b: "No, we must persue Peace and Reconciliation! Pen a letter to Sandamal!" 

 mumakan.0045.t: "Последняя битва"
 mumakan.0045.desc: "Империя вернулась, чтобы покончить с нашей республикой раз и навсегда, мы сделали всё, что могли, и мы готовы."
 mumakan.0045.a: "Республика нуждается в своих сынах!"
 mumakan.0045.b: "Наши боевые мумаки отразят их натиск, они не пройдут!"


 ## Ataraka II - War Loss ##

 mumakan.0051.t: "The End of the Republic"
 mumakan.0051.desc: "Koronande has fallen and Ataraka must flee across the sea to preserve any hope of restoration."
 mumakan.0051.a: "We have escpaed but with little more than our bare hands."
 mumakan.0051.a.tt: "#N No reserves remain - we fight with bare hands.#!"

 mumakan.0052.t: "The End of the Republic"
 mumakan.0052.desc: "Ataraka makes his final stand with whatever reserves remain - every resource saved now buys blood and steel."

 mumakan.0052.a: "We have barely escaped with our lives" # Add trait maimed
 mumakan.0052.a.tt: "#N No reserves remain - we fight with bare hands.#!" 
 mumakan.0052.b: "We have escpaed but have been injured!" # Add trait wounded
 mumakan.0052.b.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.c: "We have escpaed but with little more than our bare hands."
 mumakan.0052.c.tt: "#N No reserves remain - we fight with bare hands.#!"
 mumakan.0052.d: "A handful of militia is all we can muster."
 mumakan.0052.d.tt: "#N A handful of militia is all we can muster.#!"
 mumakan.0052.e: "A small warband rallies to the banner."
 mumakan.0052.e.tt: "#N A small warband rallies to the banner.#!"
 mumakan.0052.f: "A proper garrison can be fielded."
 mumakan.0052.f.tt: "#N A proper garrison can be fielded.#!"
 mumakan.0052.g: "Enough arms for a credible defense."
 mumakan.0052.g.tt: "#N Enough arms for a credible defense.#!"
 mumakan.0052.h: "A real army begins to take shape."
 mumakan.0052.h.tt: "#N A real army begins to take shape.#!"
 mumakan.0052.i: "Our hidden stockpiles yield a formidable host."
 mumakan.0052.i.tt: "#N Our hidden stockpiles yield a formidable host.#!"
 mumakan.0052.j: "The Mumakil are saddled and the guard assembled in force."
 mumakan.0052.j.tt: "#N The Mumakil are saddled and the guard assembled in force.#!"
 mumakan.0052.k: "Every citizen has been armed - this is a nation at war."
 mumakan.0052.k.tt: "#N Every citizen has been armed - this is a nation at war.#!"

 ### General Baciiri - In the Emperor's Name ###
 mumakan.0071.t: "Предрешённый исход"
 mumakan.0071.desc: "С опустошением в сердце коронандцев, это был лишь вопрос времени, когда их кровь остынет, а решимость ослабнет. Теперь #italic предрешённое свершилось#!, этот военный фарс окончен, и мы одержали заслуженную победу, то, что нам причитается. Теперь начинается задача по восстановлению этого величественного порта и превращению его в инструмент процветания всей империи. Этот город больше не будет выщелачивать пищу из наших желудков. Жирные купеческие властители этого города больше не будут осушать #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакан#!#!#! досуха из-за нечестно нажитого богатства, к которому они стремятся.\n\nТеперь, когда мы вернули всё, что они украли, мои воины вернулись домой, чтобы насладиться плодами своего великого труда. Но есть еще одна обязанность, которую я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выполнить, это великая честь и тяжкое бремя - быть глазами и руками нашего великого императора #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofmamakil125').GetID] #L Сандамала#!#! как [Select_CString(ROOT.Char.IsFemale, 'первая имперская наместница', 'первый имперский наместник' )] этой провинции, чтобы сохранить мир в этих землях и подготовить их к присоединению к нашей великой империи. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] смотреть в будущее, и я принимаю во внимание всех, кто остался, чтобы выполнить эту последнюю задачу."
 mumakan.0071.a: "Пришло время завоевать мир."

 mumakan.0072.t: "Entering The City of Koronande"
 mumakan.0072.desc: "The general rides through the shattered gates of Korlan as its people watch in silence and fear."
 mumakan.0072.a: "Survey the damage and begin establishing order."
 mumakan.0072.b: "Let the soldiers celebrate - they have earned their plunder."

 mumakan.0073.t: "Meeting with Aamedi"
 mumakan.0073.desc: "Aamedi is always in the right place in the right time, and always with tbe right offer, long has his family been an ally of mumakan (he claims) but the general is not convinced in the slightest, he has met and danced with men such as he, little more than a user, aamedi says a user he may be, but he also may be used, it would be unwise to not untilise his skills. He asks him a question about power, and the general answers, but aamedi corrects him, he claims the republic is a very different animal to ride than what he is used to, he claims the republic is still republic of men, a republic of princes, but aamedi claims that indeed there are those who are bastards, and the honorable and the ugly and the fine, but here in the republic every person is in themselves a prince and unlike any prince that he has ever tried to lead. But he wan'ts the hard stuff, the information on the rebellion that is surely brewing, every vein of this republic ran through him, he would allow him to tap it, if he was given a modicum of power and to take advantage of the chaos."
 mumakan.0073.a: "Aamedi can be counted upon - his knowledge is too valuable to waste."
 mumakan.0073.b: "Aamedi cannot be trusted - I know men like him he would sooner backstab me once it was useful to him."

 mumakan.0074.t: "You Rebuff Him"
 mumakan.0074.desc: "Aamedi bows smoothly and withdraws, but his eyes promise that the general will regret this decision."
 mumakan.0074.a: "Good riddance."

 mumakan.0075.t: "An Accord with Aamedi"
 mumakan.0075.desc: "Aamedi smiles thinly and gives him a gift, he provides a name, a locations, and a man, he will contact them and set the up, bait for the bigger prize, and enemies of his. though admitedly he would benifit directly and quite profitably, they are a known quantity for the resistance"
 mumakan.0075.a: "Then let us begin - show me where the rats hide."

 mumakan.0076.t: "Resistance, Endless Resistance"
 mumakan.0076.desc: "Despite all efforts, the Koronandrim refuse to submit and ambushes grow bolder by the week."
 mumakan.0076.a: "Double the patrols, but keep them in good order, these people are fellow subjects now!"
 mumakan.0076.b: "Perhaps Aamedi was right after all..."

 mumakan.0077.t: "Aamedi Says I Told You So"
 mumakan.0077.desc: "Aamedi appears as if summoned, wearing that infuriating knowing smile, and offers his services once more."
 mumakan.0077.a: "I will not crawl to a turncoat - get out of my sight."
 mumakan.0077.b: "...Fine, you insufferable snake - help me end this."

 mumakan.0078.t: "Aamedi's Response"
 mumakan.0078.desc: "Aamedi shrugs and departs,pride makes a poor shield against knives in the dark."
 mumakan.0078.a: "Let him scheme - I will hold this city by the sword alone."

 mumakan.0079.t: "Aamedi's Response"
 mumakan.0079.desc: "Aamedi's smugness is unbearable, but within days the ambushes decrease as his intelligence network takes effect."
 mumakan.0079.a: "The results speak for themselves - for now, we work together."

 ### General Baciiri - White Peace ###

 mumakan.0081.t: "Dishonor Before Death"
 mumakan.0081.desc: "The general is ordered to accept a white peace - everything he fought for rendered meaningless by the princes and worst of all the emperor."
 mumakan.0081.a: "Swallow my pride and obey - I serve the throne, not my ego."

 mumakan.0082.t: "The Peace of Death"
 mumakan.0082.desc: "The general must choose between clinging to his wandering commission or accepting land and settling into obscurity."
 mumakan.0082.a: "Refuse to settle - I am a soldier, not a farmer."
 mumakan.0082.b: "Accept the land and a quiet life - this war is over for me."

 ### General Baciiri - Defeat ###

 mumakan.0091.t: "Our Greatest Defeat"
 mumakan.0091.desc: "The general's army is shattered and scattered, and the promised governorship has turned to ash."
 mumakan.0091.a: "Fall back and regroup - there may yet be a chance."

 mumakan.0092.t: "No Roads Left to Us"
 mumakan.0092.desc: "Defeated and disgraced, the general faces the long march home with nothing to show for years of blood."
 mumakan.0092.a: "Await the emperor's instruction and face whatever judgment awaits."
 mumakan.0092.b: "Disappear into the frontier - better exile than execution."

 mumakan.0093.t: "Return or No Return?"
 mumakan.0093.desc: "With Sandamal dead, the general must decide where his sword and his ambition point next."
 mumakan.0093.a: "Side with the new emperor - loyalty to the throne endures."
 mumakan.0093.b: "Remain aloof - let the princes bleed each other before choosing a side."
 mumakan.0093.c: "Claim your own in the chaos - a general with an army needs no emperor."

 ### Ataraka Initial Story Chain ###

 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aamedi is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aamedi responding.
 mumakan.0110.t: "Падение Корлана"
 mumakan.0110.desc: "#italic Наступает утро, и рассвет приносит#! #bold смерть.#!\n\nВы можете видеть, как над заливом, мерцая, как кровавая луна, утром так же ясно, как и ночью, поднимается над Корланом пламя, великое и ужасное, чёрное и безжизненное, желтоватое безмолвие. Оно горит, и ваш народ горит вместе с ним, ваша республика, ваше бремя, ваша честь, ваша надежда. Оно горит, как ваши глаза. Оно горит, как ваше сердце. Когда ветер подхватывает парус вашего одинокого судна и доносит до вас запах дыма, горящих специй, горящей плоти, вы понимаете.\n\nСтарания сотен поколений преданы огню. Тысячи лет законов, советов и торговли, десять тысяч лиц коронандрим в их десяти тысячах трудов - и все это теперь тешит тщеславие тирана."
 mumakan.0110.a: "Я смотрю на погребальный костёр республики."
 mumakan.0110.b: "У меня нет слов."
 # cynical response
 mumakan.0110.c: "Что сделано, то сделано."

 # mumakan.0111 Aamedi's response is the same no matter what you said.
 mumakan.0111.t: "Ответ Аамеди"
 mumakan.0111.desc: "Аамеди хранил безмолвие, но это молчание нельзя назвать мирным. Это видно по его позе. Он сжимает кулаки и скрипит зубами. Его обычная надменная непримиримость куда-то подевалась. Огонь и смерть сверкают в его глазах, окрашенных отчаянием и ненавистью. Он смотрит на воду, прежде чем, наконец, повернуться к вам.\n\n«Вы тоже это чувствуете, Атарака». Его голос напряжён. «Вы чувствуете эту боль, это горе. Держитесь за это. Только это будет поддерживать нас в предстоящие долгие дни, и благодаря этому мы, возможно, ещё увидим настоящую победу...»"
 # you look back and think of your choices how did it come to this?
 mumakan.0111.a: "Я помню дорогу, которая привела нас к этому мрачному дню..."

 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "Воззвание Сандамала"
 mumakan.0112.desc: "Это был унылый день, когда пришло послание.\n\nГонец со свитком, запечатанным императорской печатью Сандамала, потребовал встречи с Великим советом, и в глубине души я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]знал, что ничего хорошего из этого не выйдет. Развернув свиток, эмиссар заговорил голосом императора.\n\n«Советники Коронандэ, внемлите моим словам и выслушайте последнее предложение о снисхождении. Долгое время вы насыщались кровью моего народа, высасывая нашу жизненную силу и оплевывая честь наших предков. Довольно. Смиритесь перед законными наследниками благословенного Индура и преклоните колени перед его троном, и не нужно будет проливать кровь, ибо золото оплатит ваши виру за ваши грехи. Откажитесь, и у меня не останется другого выхода, кроме как отомстить за свой народ сталью».\n\nСовет немедленно разразился возмущением по поводу такой наглости, вопиющих попыток вымогательства. Слова быстро нарастают, пыл достигает апогея, из уст советников сыплются клятвы и проклятия, когда они клянутся никогда не преклонять колени перед императором."
 mumakan.0112.a: "Итак, это была война."

 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "Военный совет"
 mumakan.0113.desc: "Когда эмиссар отбыл, совет перешёл к обсуждению надвигающейся войны. Но тогда не было особого страха - ведь разве Коронандэ не была невообразимо богата? Разве стены Корлана не были могучими и высокими? Сыны республики были едины, в отличие от давно разделенных дикарей империи, которые теперь выкрикивали угрозы у их ворот.\n\nИ всё же, несмотря на весь этот пыл и хвастовство, до моего слуха донесся голос осторожности - Аамеди говорил об осторожности, о том, что он много слышал об императоре Сандамале и о тех, кто находится у него в услужении. И хотя мне тогда хотелось огрызнуться на него, обвинить в том, что политика его фракции и вопиющая коррупция привели к такому провалу, я [Select_CString(ROOT.Char.IsFemale, 'справилась', 'справился' )] с собой. Сейчас было не время. Не тогда, когда судьба республики потенциально висела на волоске.\n\nОднако, несмотря на моё собственное решение, я не [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашел' )] ничего подобного в совете - фракции быстро разделились, обсуждая стоимость защиты, кого следует нанять, кого призвать. И всё же, в конце концов, совет с трудом определился со своими мерами..."
 mumakan.0113.a: "Мы сосредоточились на мумакил, чтобы противостоять империи в бою."
 mumakan.0113.b: "Сыны республики - наша сила."
 mumakan.0113.c: "Мы должны подготовиться к контратаке!"

 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
 mumakan.0114.t: "Молниеносный поход"
 mumakan.0114.desc: "Однако все приготовления были напрасны. Армии Мумакана выступили ещё до того, как эмиссар Сандамала заговорил с нами, и едва мы начали возводить оборону, как с востока пришли имперские войска. Любые попытки помешать им пресекались с легкостью, как будто армии Коронандэ были всего лишь мелкой помехой.\n\nПеред таким натиском надежды внезапно рассеялись, уступив место пьянящей уверенности, которая была всего день назад. Войско Сандамала наводило отчаяние скоростью своего продвижения, а это было оружие пострашнее стали."
 mumakan.0114.a: "И всё же мы должны были попытаться!"
 # cynical response
 mumakan.0114.b: "Ни один вариант не был исключён!" # cynical
 mumakan.0114.c: "Наша самоуверенность была нашей глупостью."

 # mumakan.0115 The siege was bloody
 mumakan.0115.t: "Кровь и золото"
 mumakan.0115.desc: "Осада продолжалась недолго, учитывая все обстоятельства. Какое-то время стены держались, но великие мумакил наконец прорвали их, и оттуда распространилась паника. Многие жители Корлана стали причиной его гибели, когда бежали от разрушенной стены, отчаянно пытаясь найти убежище в домах или на кораблях. Хаос лишил их всякой надежды на успешную оборону, и имперские силы не были слепы. Они быстро направились к гавани, стремясь воспрепятствовать любому бегству. Лишь нескольким кораблям удалось отчалить, прежде чем первый из них был подожжен, и огромные корабли легли на погребальный костер республики. И пожар распространялся, пока не охватил не только порт, но и весь город. Моя собственная жена погибла тогда, оказавшись под осыпающимися камнями и пылающим залом. Не пощадили и гордые дворцы великих семей. Они были разграблены, их обитатели перебиты или закованы в цепи, и их заставили служить победителю. Бесчисленные сокровища республики, как из крови, так и из золота, стали собственностью империи."
 mumakan.0115.a: "Это было адское зрелище."

 # mumakan.0116 There was little hope, hundreds died in the fires, you sought advice from Aamedi.
 mumakan.0116.t: "Бегство совета"
 mumakan.0116.desc: "Тогда советники попытались сбежать, видя безнадежность ситуации, не обращая на меня никакого внимания, несмотря на мои призывы к спокойствию и выработке плана. Но бегству не суждено было состояться. Не для них. Когда гавань была взята, паника, в конце концов, охватила даже их самих, и обвинение распространилось так же быстро. Некоторые пытались добраться до своих поместий, другие - до стен, чтобы бежать по суше. Третьи пытались добраться до гаваней, несмотря на опасность. Они погибли так же легко, как и массы, к которым они когда-то относились с презрением.\n\nСтража совета осталась позади, верная до последнего, отчаянно сдерживая имперские силы.\n\nИменно в этом хаосе ко мне подошёл Аамеди и с удивительной силой потащил меня по улицам, наша стража постепенно гибла.\n\n«День потерян. Завтра мы ещё можем одержать победу, но для этого сперва нужно выжить»."
 mumakan.0116.a: "Возможно, но как?"

 # mumakan.0117 Finally the city was falling, Aamedi had a ship, you had to flee, but you had left with...
 mumakan.0117.t: "Самый длинный день в истории Корлана"
 mumakan.0117.desc: "Город уже почти пал. У меня сжалось сердце, когда я увидел, как жемчужина морей, жемчужина республики, была сожжена и разрушена таким образом.\n\nВ конце концов, Аамеди привел меня к месту, которое он искал, - к скрытой нише, выходящей в залив, где стояла небольшая лодка, уже в то время спешно загруженная припасами.\n\n«Это старый запасной вариант», - тихо сказал он, - «на тот день, когда совету, возможно, пришлось бы спасаться бегством. Предшественник моего предшественника приказал построить его... То, что я доживу до того времени, когда им воспользуются, - горькая чаша».\n\nМы поспешно загрузили лодку всем, что она могла выдержать, перед отплытием, едва избежав вторжения вражеских войск. Наблюдая за горящим городом, я мог думать только о..."
 # with glory and brave deeds
 mumakan.0117.a: "Доблести защитников."
 # with the final respect of your people
 mumakan.0117.b: "Скорби по погибшим."
 # knowledge of war cynical
 mumakan.0117.c: "Том, что война ещё не окончена."

 # mumakan.0120 A Toast to the end of the republic
 # Essential scene: Aamedi gives a thorough analysis of the situation.
 # They need time to evacuate what they can, build up civilian resistance, and delay as long as possible.
 # Option A: (Defensive Strategy)
 # Option B: We will fight to the bitter end (Offensive Strategy)
 # Option C: evacuate our resources to fight another day
 mumakan.0120.t: "Речь у края света"
 mumakan.0120.desc: "«Итак», - голос Амеди сумел вернуть себе непринужденное, добродушное выражение, за которым скрывались все его истинные чувства. «Корлан предан огню; по всей вероятности, большая часть совета сейчас мертва или закована в цепи, так же как и многие из самых знатных и старинных родов державы».\n\nЯ прикусываю язык, чтобы удержаться от комментариев по поводу предполагаемого благородства этих... старинных родов.\n\nОн продолжает, набирая скорость, как катящийся валун. «Вероятно, казна была разграблена и вывезена, за исключением того немногого, что у нас есть на этом корабле. Селения будут трястись от ужаса, когда город падет. Я ожидаю, что многие сдадутся при первых признаках появления армии Сандамала. Нам нужно будет действовать осторожно, но пока мы продолжаем сражаться, республика не погибла».\n\nОн поворачивается ко мне, его глаза больше не горят, а сосредоточенно смотрят в одну точку. «Вы - глава республики. Как мы будем сражаться теперь, когда наши самые большие ресурсы потеряны?»"
 # Defensive Strategy
 mumakan.0120.a: "Мы не можем надеяться победить их в открытом поле."
 mumakan.0120.a.tt: "Вы будете следовать по пути концентрации на оборонительной тактике и истощении сил, изматывая оккупационные имперские силы."
 # Offensive Strategy
 mumakan.0120.b: "Мы должны нанести удар сейчас, пока у нас еще есть силы, какими бы разрозненными они ни были."
 mumakan.0120.b.tt: "Вы будете следовать по пути концентрации на наступательной тактике, ставя все на одну решающую битву, чтобы изгнать захватчиков."
 # Evacuating things to the reserve
 mumakan.0120.c: "Этот бой не состоится ни сегодня, ни завтра. Но, возможно, когда-нибудь."
 mumakan.0120.c.tt: "Вы получите #P +1#! ресурсов. Это укрепит вас в изгнании, если вы потерпите поражение."



 ### War Perspective Events (Ataraka) ###

 # The following events describe the war from Ataraka's perspective at 1, 5, and 10 months.
 # Always a few options: keep potential exile laamp strengthened, or spend last reserves.

 # mumakan.0131 1 month mark perspective event
 mumakan.0131.t: "Сплочение уцелевших"
 mumakan.0131.desc: "Некоторые сомневались, но спустя месяц после падения Корлана нам удалось выстоять. Ситуация по-прежнему остаётся крайне нестабильной, но именно это время позволило начать собирать разрозненные остатки поддержки. Начинают прибывать посыльные и грузы, и некоторые ранее напуганные города начали осторожно протягивать руку помощи.\n\nЭто многообещающий знак, но теперь мне нужно решить, что делать с этими новообретёнными ресурсами..."
 # Spends resources (and spawns extra troops)
 mumakan.0131.a: "Мы должны набрать больше солдат!"
 mumakan.0131.a.tt: "Вы получите 1000 ополчения"
 # Spends resources (and grants extra siege modifier)
 mumakan.0131.b: "Мы не сможем одержать победу, если не сможем вернуть себе города."
 mumakan.0131.b.tt: "Вы получите модификатор осады"
 # continue evacuation / do not use resources
 mumakan.0131.c: "Ещё нет. Подождём и посмотрим, как будут развиваться события."
 mumakan.0131.c.tt: "Вы получите #P +1#! ресурсов."

 # mumakan.0132 8 month mark perspective event
 mumakan.0132.t: "Отчаянная борьба"
 mumakan.0132.desc: "Пережив 8 месяцев войны, мы больше не считаем своё выживание чистой случайностью."
 # spend resources to continue war
 mumakan.0132.a: "spend resources to continue war"
 mumakan.0132.a.tt: "Вы тратите #N -1#! ресурсов."
 # spend money to continue war
 mumakan.0132.b: "spend money to continue war"
 mumakan.0132.b.tt: "200 золотых покроют расходы"

 # mumakan.0133 15 month mark perspective event
 mumakan.0133.t: "Годовщина"
 mumakan.0133.desc: "Я перемещаюсь из деревни в лагерь, из деревни в деревню, пробираясь через густые джунгли, чтобы избежать захвата, координировать оборону, вдохновлять на сопротивление. Но в такие дни, как этот, именно я испытываю потребность в вере.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] ужасы, которые никто не должен видеть. Я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] неописуемое отчаяние от нищеты и разрушений. Но что ждёт меня сейчас?..\n\nСегодня влажный день. Жаркий день. Плотный спёртый воздух наполняет легкие и горло. Он смешивается с вонью горелой рвоты. Он душит меня. Он заставляет меня пошатываться, как ничто другое на этой проклятой войне. За хребтом раскинулась долина, усеянная белыми костями, и голодные собаки. Они обгладывают останки, разрывают кости на части, человеческие кости, человеческие останки. Мужчины, женщины, дети - проходимцы, мошенники и благородные...\n\n#N теперь это все пища для собак.#!"
 mumakan.0133.a: "Я попытаюсь выстоять..."
 mumakan.0133.a.tt: "Но ваш желудок пуст."
 mumakan.0133.b: "Я кашляю снова, и снова, и снова..."
 mumakan.0133.b.tt: "Но всё ещё не можете вздохнуть."
 # cynical option (requires global_var:ataraka_cynicism = 3)
 mumakan.0133.c: "Мы ничего не можем сделать для мёртвых."
 mumakan.0133.c.tt: "И вы вообще ничего не чувствуете."

 mumakan.0134.t: "Героическая оборона"
 mumakan.0134.desc: "Я не знаю как, но мы продержались два года против врага, который превосходил нас числом в десять раз. Вокруг лагеря, в котором мы живём, меня окружают сыны республики, они избиты и перебинтованы, их копья обветшали, а щиты в трещинах, но они улыбаются. Хотя война продолжается уже два года, они всё ещё сражаются, как и я. Аамеди хлопает меня по плечу и приглашает отойти в сторонку.\n\n«У этих людей есть такая надежда, но я боюсь, что она может продлиться недолго», - говорит Аамеди.\n\nОн наклоняется ко мне, понижая голос. «Вам следует развивать этот источник морального духа, пока вы ещё можете это сделать. Человек, у которого есть надежда, полезен и послушен, хотя это может стоить нам эффективности при определённых обстоятельствах».\n\nАмеди замолкает, позволяя мне обдумать варианты. «Обеспечьте меня всем необходимым, и я уверяю вас, что армии республики будут сражаться в два раза упорнее, чем раньше»."
 mumakan.0134.a: "Я обеспечу вас всем необходимым."
 mumakan.0134.a.tt: "Вы потратите #N -1#! ресурсов и #N 100#! товаров для обмена"
 mumakan.0134.b: "Нет, мы должны расставить приоритеты."
 mumakan.0134.b.tt: "Вы получите #P +1#! ресурсов."

 mumakan.0135.t: "38 Month Mark"
 mumakan.0135.desc: "Three years of war and Aamedi proposes selling state treasures and ancient relics to foreign merchants for arms."
 mumakan.0135.a: "Sell the sacred treasures of Korlan for weapons - survival trumps heritage."
 mumakan.0135.a.tt: "Вы получите #P +2#! ресурсов!"
 mumakan.0135.b: "Offer trade monopolies to the Mulamburil in exchange for arms and goods."
 mumakan.0135.b.tt: "Вы получите #P +1#! ресурсов за #P 100#! товаров для обмена."
 mumakan.0135.c: "We will not sell our soul to save our skin."
 mumakan.0135.c.tt: "Вы тратите #N -1#! ресурсов"

 mumakan.0136.t: "50 Month Mark"
 mumakan.0136.desc: "Over four years of siege warfare have left Ataraka hollowed out, and Aamedi suggests methods that would shame the forefathers."
 mumakan.0136.a: "Poison the wells behind our retreat - let them drink death - even if we must do so as well."
 mumakan.0136.a.tt: "Вы получите #P +2#! ресурсов за #N лимит снабжения и повышение истощения#!"
 mumakan.0136.b: "Spend the last of the treasury to arm our remaining troops."
 mumakan.0136.b.tt: "Вы потратите #N -1#! ресурсов, чтобы получить #P 100#! товаров для обмена."
 mumakan.0136.c: "Save what we can and prepare to flee - there is no shame in living."
 mumakan.0136.c.tt: "Вы получите #P +1#! ресурсов"

 mumakan.0137.t: "The Human Cost"
 mumakan.0137.desc: "After years of a war to the death, the Koronandrim are breaking - Despite Amedi warning against it without relief our people will die, and die in thounsands, tens of thousands"
 mumakan.0137.a: "We must feed whom ever we can with our own stores."
 mumakan.0137.a.tt: "Вы потеряете #N -100#! товаров для обмена."
 mumakan.0137.b: "We must evacuate whom ever we can, and provide for them."
 mumakan.0137.b.tt: "Вы получите #P +1#! ресурсов за #N -200#! товаров для обмена."

 mumakan.0138.t: "The Death of the General"
 mumakan.0138.desc: "Years in and the Mumakani army is rotting from within - their famed general's grip slips as aamedi reports he is dead with the slightest smile."
 mumakan.0138.a: "Launch a counterattack while they are weakened - the forefathers demand it!"
 mumakan.0138.a.tt: "PLACEHOLDER_TT"
 mumakan.0138.b: "Aamedi says patience - we must prioritize our contingencies"
 mumakan.0138.b.tt: "PLACEHOLDER_TT"

 mumakan.0139.t: "Nafarati Revolt" 
 mumakan.0139.desc: "Now thats a wonderful Idea!"
 mumakan.0139.a: "Good gravy!"

 ### Sandamal War Perspective Events ###

 mumakan.0140.t: "Fall of Koronande"
 mumakan.0140.desc: "Sandamal receives a triumphant report that Korlan has been sacked and the republic is crumbling."
 mumakan.0140.a: "At last - the republic bends before the throne of Mumakan."
 mumakan.0140.b: "Good, but do not celebrate until the last Koronandrim kneels."

 mumakan.0141.t: "Reports from the Front"
 mumakan.0141.desc: "A dispatch arrives from the front - the general reports swift progress but warns of stiffening resistance."
 mumakan.0141.a: "Though this was expected this isn't great"
 mumakan.0141.b: "The general has enough men - this is his test."

 mumakan.0142.t: "16 Month Mark"
 mumakan.0142.desc: "Over a year in and the war drags on they have proven more tanacious than we've expected, still their capital is in ruins, victory will soon be at hand, the last resistance will be crushed, soon... very soon."
 mumakan.0142.a: "We are committed - victory is surely near."
 mumakan.0142.b: "They have proven their mettel - but against the sky, it will not be enough"

 mumakan.0143.t: "65 Month Mark"
 mumakan.0143.desc: "Five years of war have drained the treasury and the tribal chiefs demand compensation for their continued service."
 mumakan.0143.a: "Pay them from the imperial treasury - loyalty must be bought."
 mumakan.0143.b: "Promise them plunder from Koronande - let greed fuel the campaign."
 mumakan.0143.c: "Refuse and remind them who is emperor - the throne does not beg."

 mumakan.0144.t: "The Forever War"  #85 months
 mumakan.0144.desc: "Seven years in and the general has been killed by his own mutinous soldiers - the campaign is collapsing. The Nafarati... they are becoming restless."
 mumakan.0144.a: "Appoint a new commander and send what ever fresh troops we can scrounge up - we cannot stop now, we must not!."

 mumakan.0145.t: "The Nafarati Revolt" #12 years
 mumakan.0145.desc: "This war is nearly twelve years old, half a generation has passed since koronande has fallen and still, STILL they do not die, and worst of all the Nafarati have become so embittered by this long campaign that they have revolted!"
 mumakan.0145.a: "Damn it all!"

 ### General War Perspective Events ###

 mumakan.0151.t: "Reports from the Front"
 mumakan.0151.desc: "The general drafts an optimistic report to the emperor, confident the resistance will crumble within weeks."
 mumakan.0151.a: "Report that victory is imminent and request minimal reinforcements."

 mumakan.0152.t: "16 Month Mark"
 mumakan.0152.desc: "Over a year in the field they are still fighting despite the loss of their capital, despite all he holds in disdain, when conrnered they fight more viciously than any lion."
 mumakan.0152.a: "Shift to a siege strategy - starve them into submission."
 mumakan.0152.b: "Launch aggressive raids to break their will."

 mumakan.0153.t: "65 Month Mark"
 mumakan.0153.desc: "Five years in and dispair sweeps the camp while desertion rises - the general must make brutal choices."
 mumakan.0153.a: "Execute deserters publicly to maintain discipline."
 mumakan.0153.b: "Allow camp followers and looting to keep morale afloat."

 mumakan.0154.t: "85 Month Mark"
 mumakan.0154.desc: "In the seventh year, the general is found dead in his tent - his own soldiers have had enough."
 mumakan.0154.a: "So this is how it ends - not in battle, but betrayed by my own men."

 ## Decision Events ##
 mumakan.0200.t: "Наследие Амава"
 mumakan.0200.desc: "Наконец-то держава, которой когда-то правил [GetScriptedCharacterByHistoryID('lineofamav1').GetFirstName], первый король всех [Concept('men', 'людей')|E] #ONCLICK:TITLE,e_mumakan #TOOLTIP:LANDED_TITLE,e_mumakan #L Мумакана#!#!#!, была возрождена из пепла мифов. Отныне [GetTitleByKey('h_utter_south').GetName] простоит до скончания времён!\n\nЯ поведу южные земли в новое будущее и проложу путь, который обеспечит, что никто не обретёт достаточную силу, чтобы встать у нас на пути!"
 mumakan.0200.a: "Возвышение юга завершено."

 mumakan.0201.t: "Талилан в огне"
 mumakan.0201.desc: "Мои армии разбили последних защитников #ONCLICK:TITLE,k_talilan #TOOLTIP:LANDED_TITLE,k_talilan #L Талилана#!#!#!, а оставшиеся [Concept('elves', 'эльфы')|E] бежали. Их леса горят... - хорошо! Пусть это послужит уроком для всех, кто встанет на моём пути. Никто не может противостоять мощи завоевателей!"
 mumakan.0201.a: "Скатертью дорожка."

 mumakan.0202.t: "Возвышение нафаратцев"
 mumakan.0202.desc: "Воистину, это славный день! Мы создали собственное [Concept('kingdom', 'королевство')|E], в котором наш народ сможет жить и процветать. Теперь никто не может отказать нам в том, что причитается нам по праву крови и железа!\n\nВоздвигнем грандиозное военное святилище неподалеку от [Concept('capital', 'столицы')|E] в ознаменование этого триумфального дня и создадим тренировочную площадку для наших воинов, где они смогут учиться и совершенствоваться в военном искусстве. Скоро топот их марширующих ног будет слышен по всему Крайнему югу!"
 mumakan.0202.a: "Слава Джи-Индуру!"

 mumakan.0203.t: "Величественный дворец"
 mumakan.0203.desc: "Он завершён! Строительство дворца, которое продолжалось так долго, подошло к концу. Теперь на центральной площади столицы возвышаются стены из белого мрамора, а главный вход в само сооружение охраняют две статуи прекрасной работы. Внутри есть множество залов и комнат - их хватит, чтобы разместить целый маленький городок в одиночку!\n\nВ стенах этого сооружения я смогу отдохнуть, когда бремя правления станет слишком тяжёлым, и мне будет даровано несколько драгоценных мгновений тишины и покоя. Набравшись сил, я появлюсь вновь и буду править с обновлённой мудростью и благоразумием, чтобы королевства-близнецы могли продолжать процветать под моей нежной рукой."
 mumakan.0203.a: "Воистину, великолепно."

 mumakan.0250.t: "Подношение оваг"
 mumakan.0250.desc: "Дрожа, я [Select_CString(ROOT.Char.IsFemale, 'поставила', 'поставил' )] корзину, наполненную фруктами и вяленым мясом, на покрытые гравировкой камни у подножия высоких гор. Домашний скот был отогнан в уединённое, обнесённое стеной место неподалеку, и мы оставим его там, чтобы оваг могли забрать его.\n\nКраем глаза я замечаю движение. Поворачиваясь в ту сторону, я ничего не вижу. Нет, это была тень там, под камнями? Я не [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )].\n\nКак мне жаль измученные души наших предков, обречённых вечно скитаться по этим унылым холмам. Этим подношением они будут умиротворены ещё на десятилетие..."
 mumakan.0250.a: "Возвращаемся домой."

 mumakan.0350.t: "Последнее испытание"
 mumakan.0350.desc: "Песок под моими ногами кажется тёплым, когда вечернее солнце начинает опускаться за мою спину, туда, где раскинулся остров. Я отворачиваюсь от его света и смотрю во мрак, лежащий на востоке. Я не оборачиваюсь к тем, кто стоит на берегу вместе со мной, потому что все слова давно сказаны. Они знают наши традиции, как и я.\n\nПервая волна касается моих ног, но я не останавливаюсь. Вскоре вода обнимает меня, и я начинаю плыть. Я иду вперёд, на восток, и солнце садится у меня за спиной. Пусть моя сила унесёт меня далеко и принесёт благосклонность тем, кто теперь должен править Амбасоном."
 mumakan.0350.a: "Я буду плыть до тех пор, пока не лишусь сил."

 #Elevating the Kingdom of Ambason & the Isles
 mumakan.0351.t: "Пиратское королевство"
 mumakan.0351.desc: "Много лет я плаваю по миру, разбойничаю, граблю и жгу. У королей не бывает столько золота, сколько скопилось у меня после грабежей, а моё имя проклинают от Сенга-Муты до Кхая.\n\nБез сомнения, ещё ни [Select_CString(founder.IsFemale, 'одна живая', 'один живой' )] [founder.GetWomanMan] не [Select_CString(founder.IsFemale, 'удостаивалась', 'удостаивался' )] такой известности и титула Грозы морей. $c_ambason$ — моё детище. Мои трофеи и моя репутация помогли заселить и укрепить остров.\n\nПо всему миру меня называют злейшим из пиратов.\n\nНо они #EMP наслышаны#! обо мне."
 mumakan.0351.a: "Я — [founder.GetLadyLord|U] крови и золота!"
 mumakan.0351.b: "Наконец-то моя мечта сбылась..."
 mumakan.0352.t: "$mumakan.0351.t$"
 mumakan.0352.desc: "«Тайне» о том, что [founder.GetFirstName] откажется от любой короны, если к ней не прилагается [founder.GetPrimaryTitle.GetNameNoTier], уже много лет, и она давно уже не тайна.\n\n[founder.GetHerHis|U] душа лежит к этому так давно, что кажется, будто мой сюзерен [Select_CString(founder.IsFemale, 'посвятила', 'посвятил' )] всю жизнь выводу своего родного острова из тени.\n\nПосле бесчисленных налётов, войн и резни [founder.GetSheHe] наконец [Select_CString(founder.IsFemale, 'преуспела', 'преуспел' )].\n\nВесьма вероятно, что все самоцветы в [founder.GetHerHis] короне добыты в разных налётах. А при дворе ходят разговоры, что есть в ней и пустые гнёзда, которые [founder.GetTitledFirstNameNoTooltip] ещё может заполнить."
 mumakan.0352.a: "Просто представьте, сколько у нас будет золота!"
 mumakan.0352.b: "#EMP [founder.GetTitleAsNameNoTooltip|U]#!? [founder.GetSheHe|U] хуже разбойничьего барона!"
 mumakan.0353.t: "$mumakan.0351.t$"
 mumakan.0353.desc: "В Сенга-Муте даже последний крестьянин слышал о морском чудовище, имя которому [founder.GetFirstName], Гроза морей, и о [founder.GetHerHis] попытках добиться признания гнезда пиратов и грабителей полноценной державой.\n\nЭта легенда вселяет страх в сердца как мелкого дворянства, так и смердов, но в последнее время грань между мифом и реальностью несколько размылась.\n\nИбо сегодня #EMP [founder.GetTitleAsNameNoTooltip|l]#! [founder.GetFirstNameNoTooltip] [Select_CString(founder.IsFemale, 'объявила', 'объявил' )], что дело всей [founder.GetHerHis] жизни увенчалось успехом.\n\nНа побережье Сенга-Муты появилось новое королевство, и это ужасающее зрелище."
 mumakan.0353.a: "[founder.GetSheHe|U] ведь не собирается грабить #EMP нас#!, правда?"
 mumakan.0353.b: "Это просто [founder.GetTitleAsNameNoTooltip|l] воров!"


 mumakan.0400.opening: "Грозный и могучий Сандамал Мумаканский,"
 mumakan.0400.desc: "Вы одержали над нами верх. Мы покоряемся вашему могуществу. Прошу, избавьте нас от дальнейших разрушений и разграблений! Мы подчинимся вашему правлению и будем хорошо служить вам, если вы примете нас."
 mumakan.0400.a: "Никакого мира - только война."
 mumakan.0400.b: "Очень хорошо... но ты будешь унижен."
 mumakan.0400.b.tt: "#high Вы#! покоряете всех правителей в пределах державы [GetTitleByKey('k_koronande').GetName]"

 mumakan.0401.opening: "Несуразный Атарака,"
 mumakan.0401.desc: "Если вы думаете, что ваши ядовитые слова могут повлиять на меня, подумайте ещё раз. Война продолжится, пока все ваши жалкие города не превратятся в руины."
 mumakan.0401.a: "Будь он проклят!"

 mumakan.0402.opening: "Мудрый Атарака,"
 mumakan.0402.desc: "Ваша капитуляция принята. Вы будете служить мне, но не из Коронандэ. Вместо этого вы будете править теми островами в заливе от моего имени. Проследите за тем, чтобы прибыть туда в надлежащее время."
 mumakan.0402.a: "Прощай, Коронандэ..."
 mumakan.0402.a.tt: "[sandamal.GetName] покоряет всех правителей в пределах державы [GetTitleByKey('k_koronande').GetName]"