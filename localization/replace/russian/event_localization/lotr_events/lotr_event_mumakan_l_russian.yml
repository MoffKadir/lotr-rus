 ## Koronande War Events ##
 ### Ataraka Initial Story Chain ###

 # mumakan.0110 The Fall of Kôrlan from Ataraka's perspective
 # Aamedi is with you as you look out into the bay, headed toward the inland fortress of Tânande.
 # 3 different responses, all lead to Aamedi responding.
 mumakan.0110.t: "Падение Корлана"
 mumakan.0110.desc: "Наступает утро, и рассвет приносит смерть.\n\nВы можете видеть, как над заливом, мерцая, как кровавая луна, утром так же ясно, как и ночью, поднимается над Корланом пламя, великое и ужасное, чёрное и безжизненное, желтоватое безмолвие. Оно горит, и ваш народ горит вместе с ним, ваша республика, ваше бремя, ваша честь, ваша надежда. Оно горит, как ваши глаза. Оно горит, как ваше сердце. Когда ветер подхватывает парус вашего одинокого судна и доносит до вас запах дыма, горящих специй, горящей плоти, вы понимаете.\n\nШесть тысяч лет. Шесть тысяч лет законов, советов и торговли, десять тысяч лиц коронандрим в их десяти тысячах трудов - и все это теперь тешит тщеславие тирана."
 mumakan.0110.a: "Oh Nauur"
 mumakan.0110.b: "Silence"
 # cynical response
 mumakan.0110.c: "Что сделано, то сделано."

 # mumakan.0111 Aamedi's response is the same no matter what you said.
 mumakan.0111.t: "Ответ Аамеди"
 mumakan.0111.desc: "Aamedi will look upon the water and in this moment his composure is gone, there is a blazing anger in his eyes, there is death in his eyes, he says that what you feel you must hold on to it tight, you must hold on to it until it burns your hand, until it is hotter and brighter than the sun. Then let that fire be your will and light entire when all hope and all good has failed."
 # you look back and think of your choices how did it come to this?
 mumakan.0111.a: "how did it come to this"

 # mumakan.0112 You remembered the day that the emperor sent his first, last and final ultimatum.
 mumakan.0112.t: "first, last and final ultimatum."
 mumakan.0112.desc: " you remembered the day that the emperor sent his first, last and final ultimatum and it was an outrage in all the ways possible, to we who would be slaves! there was no plausible path but war..."
 mumakan.0112.a: "War!"

 # mumakan.0113 War was coming from the east, you had little time to prepare, but...
 mumakan.0113.t: "War is comming"
 mumakan.0113.desc: "the great council of war was confident then, koronande gold beyond gold, wealth beyond wealth, to the bay there was the sea and the fleet and to the land there was your walls, you were invincible against the bickering savages of the mumakan, long weak and divided.  Aamedi warned you, and you though hated him for his corrupt dealings and the state he left the nation in, took his advice, measures must be taken, but your council those two faced sons of bitches cared more about the cost than the warnings of aamedi, and your orders, but despite it all you did what you could..."
 # All of these spawn different army compositions.
 mumakan.0113.a: "4 Elephants, 2 citizen gaurd, 2 mangonels"
 mumakan.0113.b: "2 Elephants, 4 citizen gaurd, 2 mangonels"
 mumakan.0113.c: "2 Elephants, 2 citizen gaurd, 4 mangonels"

 # mumakan.0114 But it was too little too late... the army of Mûmakan was at your gates, so you...
