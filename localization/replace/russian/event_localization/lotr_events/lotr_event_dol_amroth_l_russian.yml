l_russian:

 ### DOL AMROTH EVENTS ###
 swan_knights_force: "Рыцари Лебедя"

 dol_amroth.0401.t: "Орден Лебедя"
 dol_amroth.0401.desc: "Серебро, сверкающее и переливающееся серебро, но не для пира, а для войны. Крылатые шлемы и синие плащи: рыцарь Дол-Амрота являет собой произведение искусства, сжимая в руке длинное копьё и гордо подняв голову.\n\nИменно так весь мир видит рыцарей из Дор-эн-Эрниля, но в самом ордене знают горькую правду. Рыцарство мертво, а вместо него лишь коррупция, кумовство, да пустое бахвальство. Если орден Лебедя и возродится, тому, кто решит за это взяться, предстоит немало работы. Придётся расширить амротские резервы, проследить за исполнением клятвы Эделлонда, вновь сформировать прибрежные отряды и восстановить древний орден Тирит-Аэар. И только тогда принцы Дол-Амрота восстановят свою честь. Новый орден – Серебряного Лебедя – займёт место старого."
 dol_amroth.0401.a: "Предстоит много работы."
 dol_amroth.0401.a.tt: "Разблокировано несколько [Concept('decisions', 'решений')|E]"

 dol_amroth.0402.t: "Амротские новобранцы"
 dol_amroth.0402.desc: "Несмотря на то, что рядовые солдаты были наименее почётной должностью в ордене Лебедя, именно в них дух настоящего старого ордена сохранялся лучше всего. Однако их ряды со временем заметно поредели, ведь в службе рядового члена ордена мало чести.\n\nНам следует восстановить костяк ордена до надлежащего уровня."
 dol_amroth.0402.a: "Трубите в горны! Пусть каждый знает об указе, что [Select_CString(ROOT.Char.IsFemale, 'издала', 'издал' )] [ROOT.Char.GetTitleAsNameNoTooltip|l]!"

 dol_amroth.0403.t: "Набор амротских рекрутов"
 dol_amroth.0403.desc: "Ответив на призыв своего сюзерена, народ Дол-Амрота доказал, что он достоин высших почестей. Они оставили в прошлом своё происхождение и вступили в ряды амротских солдат, испытывая лишения и усердно тренируясь.\n\nЭти воины – костяк наших элитных войск, и никто не смеет сомневаться в их отваге или чести! Мы позаботимся о том, чтобы их уважали за ту жертву, которую они принесли."
 dol_amroth.0403.a: "Прекрасные новости! Пусть воины построятся во дворе!"
 amrothian_reserves: "Амротские новобранцы"

 dol_amroth.0404.t: "Люди Эделлонда"
 dol_amroth.0404.desc: "Эделлонд, получивший своё имя в честь эльфийской державы, располагавшейся здесь когда-то, является богатейшей областью в Дор-эн-Эрниле. Местные стараются подражать эльфийскому военному искусству, в отличие от всего остального [Concept('gondor', 'Гондора')|E], хранящего свои военные традиции со времён [Concept('numenor', 'Нуменора')|E]. Их ряды в ордене постепенно редели, практически не пополняясь из-за разложения, царящего в ордене. Следует вспомнить старые клятвы.\n\nЕсли их получится присоединить к войску княжества, они принесут с собой свои технологии и тактические уловки."
 dol_amroth.0404.a: "Отправить самых быстрых гонцов, чтобы собрать людей!"

 dol_amroth.0405.t: "Защищённые побережья"
 dol_amroth.0405.desc: "[ROOT.Char.GetTitleAsNameNoTooltip] [Select_CString(ROOT.Char.IsFemale, 'призвала', 'призвал' )] своих подданных, и воины Бельфаласа организовали береговые патрули, которые будут бдительно следить за нашим побережьем. При появлении любого пиратского корабля будет сообщено на ближайшую сторожевую башню, где может быть поднята тревога.\n\nТаким образом, обезопасив побережье, мы сможем всерьёз заняться реформацией солдат и рыцарей Ордена."
 dol_amroth.0405.a: "Они послужат нам примером."
 edhellond_soldiers: "Воины Эделлонда"

 dol_amroth.0406.t: "Отряды прибрежной стражи"
 dol_amroth.0406.desc: "Когда-то Дор-эн-Эрниль мог бросить вызов морякам Пеларгира, и прибрежная стража давала бой пиратам в открытом море и на берегу, и слава о них гремела по всему побережью. Однако, когда Пеларгир официально стал портовой столицей королевства, прибрежная стража лишилась финансирования и от неё осталась горстка береговых смотрителей.\n\nЕсли бы мы могли возродить их, они стали бы грозной силой."
 dol_amroth.0406.a: "Сейчас же начинайте подготовку!"

 dol_amroth.0407.t: "Прибрежная стража Толфаласа"
 dol_amroth.0407.desc: "С тяжёлыми двуручными мечами в руках, стражи готовы возвращать себе былую славу. Закованные в броню, они способны бросить вызов лучшим подразделениям врага.\n\nС ними Дол-Амрот может вновь начать распространять своё влияние на море. Наши берега защищены как никогда.\n\nНебольшая флотилия боевых кораблей доставит большинство этих недавно обученных людей в Толфалас, где они отточат свои навыки владения оружием и будут готовы, если нам потребуются нам в другом месте."
 dol_amroth.0407.a: "У пиратов нет ни шанса."
 seaward_soldiers: "Полк прибрежной стражи"

 dol_amroth.0408.t: "Восстановление Хранителей клятвы Тирит-Аэар"
 dol_amroth.0408.desc: "Тирит-Аэар, «Прибрежная башня» в переводе с [Concept('sindarin', 'синдарина')|E] — это высокая башня Дор-эн-Эрниля, построенная обитавшими в регионе [Concept('elves', 'эльфами')|E]. Это имя получили и элитные подразделения стражи, что несёт свой дозор у башни, Хранители клятвы Тирит-Аэар, лучшие из прибрежных стражей. Они обязаны приносить клятву во имя чести и отваги, подавая пример непоколебимой стойкости характера. И из всех подразделений былого ордена, это больше всего отошло от идеалов, раздавая должности за деньги или по родству, а не за заслуги. Придётся постараться, чтобы восстановить их былую славу.\n\nМы начнём с изгнания из ордена взяточников, а потом отыщем тех, кто будет достоин нести службу в ордене."
 dol_amroth.0408.a: "Отберите достойнейших для церемониального принесения присяги."

 dol_amroth.0409.t: "Восстановление Тирит-Аэар"
 dol_amroth.0409.desc: "Хотя потребовалось немало политических усилий, чтобы уволить коррумпированных членов ордена, наконец-то хранители клятвы Тирит Аэар-начинают походить на орден, достойный своего названия. Новые члены невероятно серьезно относятся к своим клятвам, являя собой образец рыцарской доблести и добродетели.\n\nБлагодаря им Тирит-Аэар надёжно охраняется и никогда больше не придёт в упадок. Каменщики отремонтировали башню, вернув ей эльфийскую красоту, и вновь подняли флаг принцев высоко над заливом Бельфалас."
 dol_amroth.0409.a: "Этой башне будет завидовать весь Гондор."
 tirith_aear_soldiers: "Хранители клятвы Тирит-Аэар"

 dol_amroth.0410.t: "Реформирование королевской Лебединой стражи"
 dol_amroth.0410.desc: "Лучшие из лучших, королевская Лебединая стража оберегает жизнь и покой принцев Дол-Амрота днём и ночью. В бой они первыми бросаются вслед за своими командирами, и [ROOT.Char.GetTitleAsNameNoTooltip|l] может не сомневаться, что в случае необходимости они с радостью положат свою жизнь на алтарь.\n\nМы больше не позволим политике влиять на назначения в ряды ордена! Только достойные будут приняты, те, кто чист сердцем и достоин нести знамя прославленного подразделения."
 dol_amroth.0410.a: "Только чистые сердцем будут удостоены чести."

 dol_amroth.0411.t: "Орден Серебряного Лебедя"
 dol_amroth.0411.desc: "Воплощение [Concept('numenorean', 'нуменорских')|E] добродетелей, королевский орден Серебряного Лебедя остаётся вершиной гондорского рыцарства. Непревзойдённые по силе духа и боевым навыкам, в их ряды вступают только лучшие. Получить приглашение в орден значит удостоится наивысшей почести, доступной в землях Дол-Амрота, и это не только высокое положение, но и огромная ответственность.\n\nС этими людьми принцам нечего бояться, ведь они окружены воплощением чести и отваги, самыми умелыми воинами Дор-эн-Эрниля.\n\nОстаётся только один окончательный выбор: послать за новыми следопытами Нимродель, чтобы они уничтожали наших врагов на расстоянии, или выбрать самых лучших рыцарей Лебедя, чтобы они стали рыцарями Когтя, непоколебимым оплотом против любого врага?"
 dol_amroth.0411.tt: "Доступно новое [Concept('decision', 'решение')|E]"
 dol_amroth.0411.a: "Рыцари Когтя защитят наши стены."
 dol_amroth.0411.b: "Следопыты Нимродель поразят наших врагов издалека!"
 royal_swan_guard_troops: "Рыцари Серебряного Лебедя"
 unlock_talon_knights: "Доступны [men_at_arms|El] - [GetMaA('talon_knights').GetName]"
 unlock_nimrodel_rangers: "Доступны [men_at_arms|El] - [GetMaA('nimrodel_rangers').GetName]"

 dol_amroth.0412.t: "Плацдарм в Харондоре"
 dol_amroth.0412.desc: "С возвращением #ONCLICK:TITLE,d_harfalas #TOOLTIP:LANDED_TITLE,d_harfalas #L Харфаласа#!#!#! наш плацдарм в #ONCLICK:TITLE,k_harondor #TOOLTIP:LANDED_TITLE,k_harondor #L Харондоре#!#!#! был укреплен. Чтобы раз и навсегда поставить пиратов на место, мы должны теперь повернуть на юг - к устью Харнена и к [Concept('umbar', 'Умбару')|E] за его пределами.\n\nГавань #ONCLICK:TITLE,c_mirlond #TOOLTIP:LANDED_TITLE,c_mirlond #L Мирлонда#!#!#! лежит прямо на нашем пути, и её необходимо захватить - ради Дол-Амрота и Гондора. Как только это будет сделано, Серебряный Лебедь двинется дальше на юг и сокрушит стены #ONCLICK:TITLE,c_ramlond #TOOLTIP:LANDED_TITLE,c_ramlond #L Рамлонда#!#!#!, а затем и сам [GetTitleByKey('c_umbar').GetNameNoTier]!"
 dol_amroth.0412.a: "Мы сделаем всё, чтобы спасти эти земли."
 dol_amroth.0412.tt: "Разблокированы [Concept('decision', 'решения')|E] «[GetDecision('decision_dol_amroth_umbar').GetName]» и «[GetDecision('decision_harnen_kingdom').GetName]»"

 dol_amroth.0413.t: "Атака по Умбару"
 dol_amroth.0413.desc: "Флот покинул порт, и наш набег против [Concept('umbar', 'Умбара')|E] успешно продолжается. Пусть наши клинки остаются острыми, а стрелы - меткими, поскольку мы стремимся уничтожить угрозу пиратов раз и навсегда!\n\nКогда Умбар будет взят, мы подожжём его флот и верфи, чтобы никогда больше чёрные паруса не появлялись у берегов прекрасного [Concept('gondor', 'Гондора')|E]!"
 dol_amroth.0413.a: "Возмездие грядёт!"

 dol_amroth.0414.t: "Умбар в огне"
 dol_amroth.0414.desc: "Защитники [Concept('umbar', 'Умбара')|E] разбиты, а его флоты и верфи преданы огню! Я наблюдаю с безопасного расстояния со своего корабля, как голодное пламя жадно пожирает морскую мощь пиратов. Действительно, одержана великая победа, но что будет дальше? Вернусь ли я в Дол-Амрот с триумфом, позволив пиратам восстановиться, даже если на это уйдут десятилетия? Или мне следует попытаться добиться большего... навсегда разобравшись с угрозой, которую Умбар представлял для [Concept('gondor', 'Гондора')|E] в прошлом?"
 dol_amroth.0414.a: "Мы оставим после себя только пепел."
 dol_amroth.0414.a.tt: "Вы оставите Умбар в тлеющих руинах, но не захватите никаких титулов"
 dol_amroth.0414.b: "У пиратов был шанс. Пусть теперь Умбаром правят харадрим."
 dol_amroth.0414.c: "Возможно, среди пиратов найдётся кто-нибудь, кто вразумится..."
 dol_amroth.0414.d: "Умбар когда-то принадлежал Гондору, и так будет снова."