l_russian:

 ### Istari Events ###

 istari.0003.t: "Дорога в даль и в даль идёт"
 istari.0003.desc: "[departing_istar.GetFirstNameNoTooltip|U] подходит ко мне, [Select_CString(departing_istar.IsFemale, 'одетая', 'одетый' )] для путешествия. На [Select_CString(departing_istar.IsFemale, 'ней', 'нём' )] самый тёплый плащ и шляпа, в руке посох, а на плече дорожная сумка.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя дорогая подруга', 'Мой дорогой друг' )], пришло время мне покинуть вас и прийти на помощь другим народам в их борьбе с силами Зла. Но не волнуйтесь, я [Select_CString(departing_istar.IsFemale, 'уверена', 'уверен' )], что вы справитесь и без меня».\n\nКоротко пожав мою руку и улыбнувшись, [Select_CString(departing_istar.IsFemale, 'она ушла', 'он ушёл' )]. Никакое моё слово не удержит [Select_CString(departing_istar.IsFemale, 'её', 'его' )]."
 istari.0003.a: "Береги себя, [Select_CString(departing_istar.IsFemale, 'старая подруга', 'старый друг' )]. Интересно, увидимся ли мы когда-нибудь снова?"

 istari.0100.t: "Два волшебника"
 istari.0100.desc: "В то время как остальные наши [Concept('wizards','собратья')|E] скитаются в одиночестве, мы двое обрели силу в нашем долгом товариществе. На протяжении многих пройденных нами путей [other_wizard.GetFirstName|U] постоянно [Select_CString(other_wizard.IsFemale, 'была', 'был' )] рядом со мной, предлагая советы и помощь, и я не могу представить нашу работу в одиночку.\n\nТем не менее, у каждого из нас по-прежнему есть свои сильные стороны, и хотя я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] фактическим лидером на этом последнем этапе нашего путешествия, возможно, [other_wizard.GetFirstName] лучше справится с тем, что ждёт нас впереди."
 istari.0100.a: "Я помогу нам пройти через предстоящие испытания."
 istari.0100.b: "Теперь нас поведёт [other_wizard.GetFirstName]."