l_russian:

 lotr_thani_hazad.0001.t: "Воля Повелителя бурь"
 lotr_thani_hazad.0001.desc: "Приказ прибыл в беззвёздную ночь.\n\n«#italic Настал час, [ROOT.Char.GetTitleAsName], когда Буря разразится в полную силу. Безрассудный Беллакар долгое время противостоял нам и нашим замыслам. Исполни волю своего господина. Исполни волю [Concept('stormking', 'Повелителя бурь')|E]. Исполни волю [Concept('sauroncharacter', 'Саурона')|E] Великого.\n\nУничтожь их.#!»"
 lotr_thani_hazad.0001.a: "Да запоют адунайские мечи."
 lotr_thani_hazad.0001.a.tt: "[Concept('sauronthedarklordcharacter', 'Тёмный властелин')|E] хочет, чтобы вы в ближайшее время вторглись в Беллакар." #[GetDecisionWithKey('decision_murder_bellakar').GetName]

 lotr_thani_hazad.0002.t: "Падение Пэла"
 lotr_thani_hazad.0002.desc: "Пэл долгое время был источником раздоров между Королевствами-близнецами и Балан-лай, но теперь, наконец, мы одержали победу!\n\nВпервые завоеванный около 50 года Т.Э., пять раз Пэл отбрасывал своих законных правителей, и четыре раза мы возвращались. Магрийский народ долго выжидал, планируя изгнать этих назойливых адунайцев, но ни один из них так и не добился своего.\n\nНо вот, наконец, после долгой борьбы адунай были изгнаны, и народ Пэла оказался под магрийской властью. На этот раз она не дрогнет, и земли Пэла теперь будут называть Тремаг - наш новый дом!"
 lotr_thani_hazad.0002.a: "Наконец-то наш!"

 ## Spy at Balan-lai Court event chain ##
 lotr_thani_hazad.1001.t: "Приятная встреча"
 lotr_thani_hazad.1001.desc: "Я устраиваю небольшой праздник при дворе, на который приглашены мои близкие родственники и большинство придворных. Вечер тёплый, небо чистое, над нами сверкают звёзды, и гости веселятся, как и я. \n\nВ разгар вечеринки ко мне подходит [stormhost_spy.GetFirstName], [Select_CString(stormhost_spy.IsFemale, 'один', 'одна' )] из моих придворных. «[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetTitleAsName], какое это радостное событие», - начинает [stormhost_spy.GetSheHe]. «Если вы согласны, я хочу показать вам кое-что, что сделает этот вечер ещё прекраснее!» \n\n[stormhost_spy.GetFirstName] желает, чтобы я [Select_CString(ROOT.Char.IsFemale, 'следовала', 'следовал' )] за [Select_CString(stormhost_spy.IsFemale, 'ней', 'ним' )], с восторженным выражением на [stormhost_spy.GetHerHis] лице."
 lotr_thani_hazad.1001.a: "Очень хорошо, [stormhost_spy.GetFirstName], покажи мне, что там ты [Select_CString(stormhost_spy.IsFemale, 'приготовила', 'приготовил' )]."
 lotr_thani_hazad.1001.b: "Разве ты не видишь, что я сейчас очень [Select_CString(ROOT.Char.IsFemale, 'занята', 'занят' )] и наслаждаюсь собой?"
 lotr_thani_hazad.1001.c: "Пойти за тобой в какой-то тёмный угол? Думаю, #italic нет!#! Стража!"
 lotr_thani_hazad.1001.d: "А как насчёт веселья и танцев?"

 lotr_thani_hazad.1020.t: "Изысканное дорвинионское вино"
 lotr_thani_hazad.1020.desc: "Когда толпа расступается, чтобы я и [stormhost_spy.GetFirstName] могли пройти, я замечаю небольшой столик, на котором стоит непочатая бутылка вина. Должно быть, это и есть то, что [Select_CString(stormhost_spy.IsFemale, 'хотела', 'хотел' )] показать мне [Select_CString(stormhost_spy.IsFemale, 'моя придворная', 'мой придворный' )]? \n\n«Это из далёкого [Concept('dorwinion', 'Дорвиниона')|E], [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetTitleAsName]», - охотно объясняет [stormhost_spy.GetFirstName]. «Говорят, это одно из лучших вин в тех краях. Могу ли я соблазнить вас попробовать его?»\n\n[stormhost_spy.GetFirstName] кажется, искренне [Select_CString(stormhost_spy.IsFemale, 'рада', 'рад' )] этому."
 lotr_thani_hazad.1020.a: "Очень хорошо! Давайте выпьем по паре бокалов!"
 lotr_thani_hazad.1020.b: "Лёгкий, достойный вкус, и не более того."
 lotr_thani_hazad.1020.c: "Это мне не нравится, [stormhost_spy.GetFirstName]."

 lotr_thani_hazad.1030.t: "Искусный портрет"
 lotr_thani_hazad.1030.desc: "Мы покидаем главный зал моего двора и входим в помещение поменьше, где меня встречает мужчина, стоящий возле пустого холста. Очевидно, он ждал нас. \n\n«Славный портрет для [Select_CString(ROOT.Char.IsFemale, 'славной правительницы', 'славного правителя' )]», - объясняет [Select_CString(stormhost_spy.IsFemale, 'моя придворная', 'мой придворный' )] [stormhost_spy.GetFirstName]. Их глаза обращены ко мне, ожидая ответа или реакции. \n\nВозможно, это дорогое предложение, и всё же - для [Select_CString(ROOT.Char.IsFemale, 'такой правительницы', 'такого правителя' )], как я, оно вполне может подойти..."
 lotr_thani_hazad.1030.a: "Отличная идея!"
 lotr_thani_hazad.1030.b: "Привилегия изобразить #italic меня#! должна быть достаточной наградой."
 lotr_thani_hazad.1030.c: "Это мне не нравится, [stormhost_spy.GetFirstName]."

 lotr_thani_hazad.1040.t: "Экзотическая птица"
 lotr_thani_hazad.1040.desc: "Когда [Select_CString(stormhost_spy.IsFemale, 'моя придворная', 'мой придворный' )] [stormhost_spy.GetFirstName] ведёт меня на другую сторону зала, я замечаю впереди вспышку ярких красок. Это сидящая в клетке певчая птица, каких я никогда раньше не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )]. Создание спокойно встречает мой взгляд, а затем издаёт краткое мелодичное щебетание. \n\n«Я [Select_CString(stormhost_spy.IsFemale, 'была уверена', 'был уверен' )], что вам понравится общество такой благородной птицы, как эта», - охотно объясняет [Select_CString(stormhost_spy.IsFemale, 'моя придворная', 'мой придворный' )]. \n\nМне кажется, [stormhost_spy.GetSheHe] [Select_CString(stormhost_spy.IsFemale, 'рада', 'рад' )], но, конечно, эта певчая птица обойдётся мне в целое состояние?"
 lotr_thani_hazad.1040.a: "Поистине чудесное создание!"
 lotr_thani_hazad.1040.b: "Такое #italic восхитительное#! зрелище! Это должно принадлежать мне!"
 lotr_thani_hazad.1040.c: "Это мне не нравится, [stormhost_spy.GetFirstName]."

 lotr_thani_hazad.1101.t: "Смелая просьба"
 lotr_thani_hazad.1101.desc: "Когда я вхожу в свой большой зал, чтобы выдать поручения своим слугам, ко мне обращается [stormhost_spy.GetFirstName]. «Минутку вашего времени, [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetTitleAsName]?» - спрашивает [stormhost_spy.GetSheHe], и я киваю в знак согласия. \n\n«Я преданно [Select_CString(stormhost_spy.IsFemale, 'служила', 'служил' )] вам, [ROOT.Char.Custom('FormOfAddressForLiege')], и хочу сделать больше. Прошу вас оказать мне честь стать [Select_CString(stormhost_spy.IsFemale, 'вашей тайной советницей', 'вашим тайным советником' )]». \n\nЯ [Select_CString(ROOT.Char.IsFemale, 'удивлена', 'удивлён' )], возможно, даже немного [Select_CString(ROOT.Char.IsFemale, 'ошеломлена', 'ошеломлён' )] такой дерзкой просьбой. Это не то решение, которое я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] принимать легкомысленно..."
 lotr_thani_hazad.1101.a: "Очень хорошо... служи мне верой и правдой, [stormhost_spy.GetFirstName]."
 lotr_thani_hazad.1101.b: "У меня уже есть довольно способный тайный советник."
 lotr_thani_hazad.1101.c: "Я не доверяю тебе... и никогда не [Select_CString(ROOT.Char.IsFemale, 'доверяла', 'доверял' )]!"

 lotr_thani_hazad.1150.t: "Шепот в моих ушах"
 lotr_thani_hazad.1150.desc: "Прошло некоторое время с тех пор, как [stormhost_spy.GetFirstName] [Select_CString(stormhost_spy.IsFemale, 'получила', 'получил' )] должность [Select_CString(stormhost_spy.IsFemale, 'тайной советницы', 'тайного советника' )]. За последние несколько дней [stormhost_spy.GetSheHe] часто [Select_CString(stormhost_spy.IsFemale, 'подходила', 'подходил' )] ко мне, желая побеседовать со мной. \n\n«Мои донесения показывают, что [GetTitleByKey('e_thon_an_kharlokh').GetName] наращивает свою мощь день за днём, [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetTitleAsName]», - заявляет [stormhost_spy.GetSheHe]. «Возможно, [stormking.GetName] не вторгнется в нашу державу, если мы выплатим [Select_CString(stormking.IsFemale, 'ей', 'ему' )] дань?» \n\nК такому предложению не стоит относиться легкомысленно..."
 lotr_thani_hazad.1150.desc.new: "Ко мне вновь обращается [Select_CString(stormhost_spy.IsFemale, 'моя придворная', 'мой придворный' )] [stormhost_spy.GetFirstName], повторяя свой совет. «[stormking.GetName] из державы [GetTitleByKey('e_thon_an_kharlokh').GetName] оставит нас в покое, если мы станем их данниками». \n\n«Так будет лучше для державы», - настаивает [stormhost_spy.GetSheHe]."
 lotr_thani_hazad.1150.a: "Возможно, это действительно мудрое решение..."
 event_thani_hazad_1155_a: "[stormking.GetName] становится вашим [Concept('suzerain', 'сюзереном')|E]."
 lotr_thani_hazad.1150.b: "Это #italic ужасная#! идея!"
 lotr_thani_hazad.1150.c: "Предлагать подобное... это #italic измена#!."
 lotr_thani_hazad.1150.d: "Не предлагайте больше таких глупостей!"

 lotr_thani_hazad.1200.t: "Тайна раскрыта"
 lotr_thani_hazad.1200.desc: "Поздно вечером ко мне обращается [Select_CString(spymaster.IsFemale, 'моя тайная советница', 'мой тайный советник' )], [spymaster.GetFirstName]. \n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetTitleAsName], у меня тяжкие новости», - начинает [spymaster.GetSheHe]. «Я [Select_CString(spymaster.IsFemale, 'обнаружила', 'обнаружил' )], что [stormking.GetName] получает из нашего двора тайные письма с донесениями, к которым [Select_CString(stormhost_spy.IsFemale, 'приложила', 'приложил' )] свою печать [stormhost_spy.GetFirstName], [Select_CString(stormhost_spy.IsFemale, 'ваша придворная', 'ваш придворный' )]! [stormhost_spy.GetSheHe] - [Select_CString(stormhost_spy.IsFemale, 'шпионка', 'шпион' )]!» \n\nЯ [Select_CString(ROOT.Char.IsFemale, 'потрясена', 'потрясён' )] этим открытием. Шпионы при моём дворе? Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] отреагировать соответствующим образом и немедленно."
 lotr_thani_hazad.1200.desc.new: "Когда я веду придворный приём в своём большом зале, ко мне подходит [Select_CString(spymaster.IsFemale, 'моя тайная советница', 'мой тайный советник' )] [spymaster.GetFirstName]. «У меня новости касательно [Select_CString(stormhost_spy.IsFemale, 'вашей узницы', 'вашего узника' )]. [stormhost_spy.GetFirstName]...», - начинает [spymaster.GetSheHe]. «Проведя некоторое время в подземелье, [stormhost_spy.GetFirstName] наконец [Select_CString(stormhost_spy.IsFemale, 'признала', 'признал' )] правду: [stormhost_spy.GetSheHe] - [Select_CString(stormhost_spy.IsFemale, 'шпионка, которую', 'шпион, которого' )] [Select_CString(stormking.IsFemale, 'подослала', 'подослал' )] к нам [stormking.GetName]!» \n\nХотя это откровение и шокирует, оно подтверждает мои подозрения. Учитывая тяжесть проступков, которые [Select_CString(stormhost_spy.IsFemale, 'могла', 'мог' )] совершить [stormhost_spy.GetFirstName]... Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] разобраться с [Select_CString(stormhost_spy.IsFemale, 'ней', 'ним' )] соответствующим образом и немедленно."
 lotr_thani_hazad.1200.a: "За измену надо платить... отрубить [stormhost_spy.GetHerHim] голову!"
 lotr_thani_hazad.1200.b: "Я проявлю милосердие. [stormhost_spy.GetFirstName], ты будешь [Select_CString(stormhost_spy.IsFemale, 'изгнана', 'изгнан' )]."
 lotr_thani_hazad.1200.c: "Если я пощажу тебя, ты [Select_CString(stormhost_spy.IsFemale, 'должна', 'должен' )] предать своего хозяина и стать моим агентом."

 ### The Stormhost Tulwangi Rebellion ###
 lotr_thani_hazad.2000.t: "Враги Бури"
 lotr_thani_hazad.2000.desc: "Вот уже два с половиной тысячелетия анбалукхори правят этими землями, и за это время между нами, [Concept('adunai', 'адунайцами')|E], и нашими подданными происходило несметное количество сражений. И так было всегда, ибо мы - отпрыски [Concept('numenor', 'Нуменора')|E], призванные держать в услужении дикие народы мира.\n\nПоэтому мы часто воевали с нашими непокорными подданными, и раз за разом выходили победителями. Поэтому нет ничего удивительного в том, что ко мне в суд приходят письма с предупреждениями о том, что [Select_CString(tulwangi_leader.IsFemale, 'некая', 'некий' )] [tulwangi_leader.GetName], [Select_CString(tulwangi_leader.IsFemale, 'красноречивая', 'красноречивый' )] выскочка, затевает мятеж, не имея особого происхождения и судьбы.\n\nОднако час близится. Скоро мои войска выступят в поход против [Concept('bellakar', 'Беллакара')|E], и многие погибнут в буре. Да, мы могущественны, но отмахнуться от угрозы - значит поставить под угрозу само наше правление. Судьба анбалукхори теперь висит на волоске."
 lotr_thani_hazad.2000.a: "Законные отпрыски [Concept('numenor', 'Нуменора')|E] никогда не склонятся перед оборванными дикарями!"
 lotr_thani_hazad.2000.a.tt: "Вы попытаетесь сокрушить [Select_CString(tulwangi_leader.IsFemale, 'эту бунтарку', 'этого бунтаря' )]."
 ## Option B: Reform: Unimplemented


 lotr_thani_hazad.2001.t: "Беспокойный выскочка"
 lotr_thani_hazad.2001.desc: "До меня дошли вести о [Select_CString(tulwangi_leader.IsFemale, 'харизматичной предводительнице', 'харизматичном вожде' )] племён, [Select_CString(tulwangi_leader.IsFemale, 'известной', 'известном' )] как [tulwangi_leader.GetName]. Мои шпионы прознали о [tulwangi_leader.GetHerHis] присутствии в сельскохозяйственных угодьях владения [tulwangi_leader.GetCurrentLocation.GetCounty.GetName], где [tulwangi_leader.GetSheHe] стремится привлечь больше сторонников в своё восстание.\n\n[Select_CString(tulwangi_leader.IsFemale, 'Самонадеянная смутьянка', 'Самонадеянный смутьян' )] - как и многие до [Select_CString(tulwangi_leader.IsFemale, 'неё - пыталась', 'него - пытался' )] спровоцировать неприятности среди местных жителей, утверждая, что действует во имя своих богов, чтобы освободить свой народ от гнета Грозового Воинства. Ночью пропали рабы, что, несомненно, дело рук этих мятежных отбросов. Возможно, нам стоит избавиться от проблемы, пока она не стала слишком большой."
 lotr_thani_hazad.2001.a: "Мы устроим на н[tulwangi_leader.GetHerHis] засаду."
 lotr_thani_hazad.2001.a.success: "Вы арестовываете [Select_CString(tulwangi_leader.IsFemale, 'смутьянку', 'смутьяна' )]"
 lotr_thani_hazad.2001.a.failure: "[tulwangi_leader.GetSheHe|U] избегает вашей западни"
 lotr_thani_hazad.2001.a.failure.tt: "[tulwangi_leader.GetHerHis|U] дело привлечёт новых сторонников"
 lotr_thani_hazad.2001.c: "У нас есть более важные проблемы, о которых стоит беспокоиться."
 lotr_tulwangi_rebellion_events_cause_strengthened_tt: "[tulwangi_leader.GetName] получает поддержку"
 lotr_tulwangi_rebellion_events_cause_greatly_strengthened_tt: "[tulwangi_leader.GetName] получает значительную поддержку"
 lotr_tulwangi_rebellion_opressed_me: "Угнетение с вашей стороны"
 lotr_tulwangi_rebellion_leaves_for_lahidas: "[tulwangi_leader.GetName] отправляется во владение [GetTitleByKey('c_lahidas').GetName]"



 lotr_thani_hazad.2003.t: "Растущая активность мятежников"
 lotr_thani_hazad.2003.desc: "Имя [Select_CString(tulwangi_leader.IsFemale, 'этой сопливой дурочки, известной', 'этого сопливого дурачка, известного' )] как [tulwangi_leader.GetFirstName], вновь появляется на моём столе. [Select_CString(tulwangi_leader.IsFemale, 'Известная смутьянка появилась', 'Известный смутьян появился' )] во владении [GetTitleByKey('c_lahidas').GetName]. [tulwangi_leader.GetSheHe|U] [Select_CString(tulwangi_leader.IsFemale, 'бежала', 'бежал' )] из владения [GetTitleByKey('c_rumyar').GetNameNoTier] после неудачной попытки поднять мятеж.\n\nОднако на этот раз [tulwangi_leader.GetSheHe], похоже, [Select_CString(tulwangi_leader.IsFemale, 'добилась', 'добился' )] большего успеха. Бесчисленное множество рабов и племен массово присоединились к [Select_CString(tulwangi_leader.IsFemale, 'её', 'его' )] делу. В городах начался кризис: поместья разграблены, а против местных владык анбалукхори вспыхивают бунты.\n\nХотя я сомневаюсь, что [tulwangi_leader.GetSheHe] или [tulwangi_leader.GetHerHis] глупые последователи многого добьются, до меня дошли бесчисленные мольбы. Разумеется, было бы разумно восстановить порядок и выкорчевать всех сторонников мятежа из этого района в качестве предупреждения для всех потенциальных смутьянов."
 lotr_thani_hazad.2003.a: "Высоко подвесить гниющие головы врагов Бури!"
 lotr_thani_hazad.2003.a.success: "Ваша демонстрация силы запугала сторонников мятежа"
 lotr_thani_hazad.2003.a.failure: "Вы не состоянии запугать сторонников восстания"
 lotr_thani_hazad.2003.b: "Я не стану обращать внимания на [Select_CString(tulwangi_leader.IsFemale, 'эту дуру', 'этого дурака' )]."
 lotr_tulwangi_rebellion_leaves_for_ishiqal: "[tulwangi_leader.GetName] отправляется в [GetTitleByKey('c_ishiqal').GetName]"


 lotr_thani_hazad.2006.t: "Недовольство среди рабочих"
 lotr_thani_hazad.2006.desc.a: "Перед моим троном гордо стоит [tulwangi_representative.GetName], [Select_CString(tulwangi_representative.IsFemale, 'немытая, но широкоплечая и высокая', 'немытый, но широкоплечий и высокий' )]. [Select_CString(tulwangi_representative.IsFemale, 'Она представилась как посланница', 'Он представился как посланник' )] так называемого «освободителя Тулванга».\n\n«Я из владения [GetTitleByKey('c_rumyar').GetNameNoTier], о [Select_CString(ROOT.Char.IsFemale, 'королева', 'король' )]-тиран, земли, где ваши родичи в древности омыли поля кровью моего рода». [Select_CString(tulwangi_representative.IsFemale, 'Она', 'Он' )] говорит спокойно. «Я [Select_CString(tulwangi_representative.IsFemale, 'пришла', 'пришёл' )] к вам во имя справедливости и чести, хотя и не знаю, есть ли они у вас. Освободите моих родичей и соседей, обращайтесь с нами достойно, и я обещаю, что мы не станем поднимать против вас оружие».\n\n"
 lotr_thani_hazad.2006.desc.b: "Я подозреваю, что [tulwangi_representative.GetName] и [tulwangi_leader.GetHerHis] мятеж как-то связаны с растущим недовольством.\n\n"
 lotr_thani_hazad.2006.desc.c: "«Об этом я умоляю вас, ибо мы ищем не насилия и не возмездия, а свободы»."
 lotr_thani_hazad.2006.a: "Я сделаю вам некоторые уступки, хотя и не [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] этого делать."
 lotr_rival_gave_title_away: "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'отдали', Select_CString(CHARACTER.IsFemale, 'отдала', 'отдал' ))] земли, которыми ранее [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'владели', Select_CString(TARGET_CHARACTER.IsFemale, 'владела', 'владел' ))] [TARGET_CHARACTER.GetShortUIName]."
 lotr_landed_tulwangi_reason: "Обмен земель на мир"
 lotr_thani_hazad.2006.b: "Таков ваш удел, живите с этим..."
 lotr_tulwangi_rebellion_interfered_with_my_workers: "[CHARACTER.GetShortUIName|U] [Select_CString(CHARACTER.IsLocalPlayer, 'вмешались', Select_CString(CHARACTER.IsFemale, 'вмешалась', 'вмешался' ))] от имени рабочих, которыми [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'владели', Select_CString(TARGET_CHARACTER.IsFemale, 'владела', 'владел' ))] [TARGET_CHARACTER.GetShortUIName]."
 lotr_thani_hazad.2006.c: "Я не терплю нелояльных мерзавцев."
 lotr_rival_stayed_out_of_my_business: "[CHARACTER.GetShortUIName|U] не [Select_CString(CHARACTER.IsLocalPlayer, 'стали', Select_CString(CHARACTER.IsFemale, 'стала', 'стал' ))] вмешиваться в то, как [TARGET_CHARACTER.GetShortUIName] [Select_CString(TARGET_CHARACTER.IsLocalPlayer, 'ведете', 'ведет')] дела."

 lotr_thani_hazad.2008.t: "Налётчики в ночи"
 lotr_thani_hazad.2008.desc: "С чела склонившегося передо мной посланника стекают бисеринки пота, и он глубоко дышит, передавая мне информацию.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetTitleAsName], я пришёл от имени владения [GetTitleByKey('c_ishiqal').GetName]. Боюсь, что угроза, которую предоставляет [tulwangi_leader.GetName], всё ещё сохраняется. Стражники и солдаты, размещённые во владении [GetTitleByKey('c_ishiqal').GetName], были найдены мёртвыми, убитыми ночью, а склады снабжения и поместья подверглись набегам. Я не думаю, что это какая-то маленькая сила, но и слишком большой она быть не может. Кто знает, какой ущерб они могут нанести, если соберут ещё больше сил?»"
 lotr_thani_hazad.2008.a: "Разберитесь с этим сами."
 lotr_thani_hazad.2008.a.tt: "Вы пренебрегаете борьбой с повстанцами, позволяя им ещё больше укрепиться."
 lotr_thani_hazad.2008.b: "Изолировать провинцию! Я хочу, чтобы [tulwangi_leader.GetName] [Select_CString(tulwangi_leader.IsFemale, 'была мертва', 'был мёртв' )], #italic немедленно#!!"
 lotr_thani_hazad.2008.b.tt: "Вероятность того, что [tulwangi_leader.GetName] погибнет, крайне маловероятна."

 lotr_thani_hazad.2009.t: "В холмы"
 lotr_thani_hazad.2009.desc: "Передо мной преклоняется правитель владения [GetTitleByKey('c_ishiqal').GetName]. [tulwangi_leader.GetName] не находится в его темнице, а значит он провалил мой приказ схватить [tulwangi_leader.GetHerHis]. В его глазах страх. Он глотает воздух, поднимаясь на ноги.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetTitleAsName], прошу прощения, но следов мятежников не обнаружено. Мои воины обыскали всё, что могли, но леса там огромны, а холмы крутые, и мест, где они могли бы спрятаться, бесконечное множество», - говорит он. Я не отвечаю. \n\n«Мы искали бесчисленное количество дней, и многие мои солдаты погибли, пытаясь преодолеть холмы. Они очень высоки, и опасны, [Select_CString(ROOT.Char.IsFemale, 'моя госпожа', 'мой господин' )]. Мы не могли больше продолжать поиски, [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetTitleAsName], пожалуйста, простите меня».\n\nМятежники, вероятно, уже давно скрылись, выжидая время. Сомневаюсь, что они снова появятся, пока не настанет подходящий момент."
 lotr_thani_hazad.2009.a: "Вы подвели меня однажды. Второго раза не будет."
 lotr_thani_hazad.2009.b: "Теперь уже ничего не поделаешь. Уходите."

 lotr_thani_hazad.2011.t: "Утихание бури"
 lotr_thani_hazad.2011.desc: "Посланцы прибывают на рассвете, измученные, их лошади на пределе возможностей, и они приносят дурные вести, ибо на востоке развеваются знамёна восстания.\n\n[tulwangi_leader.GetName], [Select_CString(tulwangi_leader.IsFemale, 'эта проклятая дикарка, сумела', 'этот проклятый дикарь, сумел' )] объединить под своими знамёнами коалицию недовольных тулвангских рабочих, рабов и различных мятежных туземных племён.\n\n[Select_CString(tulwangi_leader.IsFemale, 'Глупая и надменная', 'Глупый и надменный' )] выскочка [Select_CString(tulwangi_leader.IsFemale, 'укрепила', 'укрепил' )] свою власть, а мятежники стали видеть в [Select_CString(tulwangi_leader.IsFemale, 'ней', 'нём' )] настоящего лидера, и поэтому они словно мухи роятся перед [Select_CString(tulwangi_leader.IsFemale, 'её', 'его' )] знаменем.\n\nНа высоких стенах владения [GetTitleByKey('c_rumyar').GetNameNoTier] возвышаются отрубленные головы #italic моих#! подданных. Над пристанями поднимается дым. [bayoftulwang|E] окрасился в красное."
 lotr_thani_hazad.2011.a: "Покажем этим дикарям истинную [Concept('adunaic', 'адунайскую')|E] сталь."
 lotr_thani_hazad.2011.b: "[Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] признать, [tulwangi_leader.GetSheHe] #italic действительно#! [Select_CString(tulwangi_leader.IsFemale, 'смелая', 'смелый' )]..."
 lotr_thani_hazad.2011.b.tt: "#I Вы будете играть за персонажа [tulwangi_leader.GetFirstName], [Select_CString(tulwangi_leader.IsFemale, 'предводительницу', 'предводителя' )] восставших. #!"

 lotr_thani_hazad.2012.t: "Тулвангское восстание"
 lotr_thani_hazad.2012.desc: "Тон-ан-Харлок, могущественное Грозовое Воинство Анбалукхора, охвачено пламенем. Потрясающий поворот событий: восставшие тулвангцы, которых возглавляет [Select_CString(tulwangi_leader.IsFemale, 'яростная предводительница', 'яростный предводитель' )] [tulwangi_leader.GetFirstName], начали полномасштабное восстание против своих давних угнетателей. \n\nВ условиях, когда земли Грозового Воинства охвачены беспорядками, а войны ведутся как внутри, так и за его пределами, перед правителями, с которым связан Грозовой Воевода [stormhost_ruler.GetFirstName], открываются как опасности, так и возможности. \n\nЯ задаюсь вопросом, как лучше поступить..."
 lotr_thani_hazad.2012.a: "Это восстание непременно потерпит поражение."
 lotr_thani_hazad.2012.b: "Дело восставших правое! Я присоединяюсь к восстанию!"
 lotr_thani_hazad.2012.c: "[tulwangi_leader.GetFirstName] - действительно харизматичный лидер..."
 lotr_thani_hazad.2012.c.tt: "#I Вы будете играть за персонажа [tulwangi_leader.GetFirstName], [Select_CString(tulwangi_leader.IsFemale, 'предводительницу', 'предводителя' )] восставших. #!"

 lotr_thani_hazad.2100.t: "Потенциальная возможность"
 lotr_thani_hazad.2100.desc: "До меня дошли новости о том, что в державе нашего южного соседа, [southerndragonarmyadunaic|E], назревает беда. Они давно враждуют со своими подданными, и в последнее время мятежники создают проблемы в их землях.\n\nХотя [Concept('anbalukkhori', 'анбалукхори')|E] сосредоточены на [Concept('bellakar', 'Беллакаре')|E], между нами не потеряны узы дружбы. Вложение в это восстание может сыграть нам на руку, потенциально ослабив будущего врага, а в перспективе, возможно, даже сэкономив нам золото и солдат."
 lotr_thani_hazad.2100.a: "Мы пошлём им умеренную сумму золота."
 lotr_thani_hazad.2100.b: "Послать сундук, наполненный золотом!"
 lotr_thani_hazad.2100.c: "Их борьба не имеет для нас никакого значения."

 lotr_thani_hazad.2101.t: "Помощь от бозишнарудов"
 lotr_thani_hazad.2101.desc: "PLACEHOLDER - Ray offers a small sum of money"
 lotr_thani_hazad.2101.a: "Accept"
 lotr_thani_hazad.2101.b: "Deny"

 lotr_thani_hazad.2102.t: "Богатства Раи"
 lotr_thani_hazad.2102.desc: "PLACEHOLDER - Ray offers a large sum of money"
 lotr_thani_hazad.2102.a: "Accept"
 lotr_thani_hazad.2102.b: "Deny"

 lotr_thani_hazad.2104.t: "Гнев Башни"
 lotr_thani_hazad.2104.desc: "Мой двор молчит, пока посланник в чёрном идёт к моему трону. Мои придворные кланяются, и я тоже, ибо все знают, откуда и от чьего имени он прибыл.\n\n«Око видит многое, [ROOT.Char.GetTitleAsName], и теперь Оно видит беду в вашей державе», - говорит он, глядя мне в глаза. «Похоже, в ваших землях назревает восстание, большее, чем вы думаете».\n\n«Что вы имеете в виду?» - спрашиваю я. «В этих землях сотни безумцев, стремящихся нас рассорить, мой господин, но ни один из них не стоит внимания!»\n\n«Он - безумец, а ты - [Select_CString(ROOT.Char.IsFemale, 'дура', 'дурак' )]!» - зал вздрогнул. «Близится час, когда вы выступите против врагов нашего повелителя Саурона, но вы не замечаете того, что находится у вас под носом! Народ Тулванга свиреп, свирепее, чем вы думаете».\n\nЯ киваю, и наступает тишина.\n\n«Саурон Великий не терпит бездарности»."
 lotr_thani_hazad.2104.a: "Я не подведу вас, мой господин."

 lotr_thani_hazad.2105.t: "Золотая буря"
 lotr_thani_hazad.2105.desc: "В Грозовом Воинстве назревает смута. [Concept('anbalukkhori', 'Анбалукхори')|E] уже давно враждуют со своими подданными, к которым они относятся не лучше, чем к скоту. В их истории было бесчисленное множество восстаний, и все они заканчивались продолжающимся господством Ан-Балкумагана.\n\nСейчас, однако, Грозовое Воинство занято нападением на Беллакар, и лидеры мятежников используют эту возможность. Это, конечно, делает их весьма уязвимыми для любых действий восставших.\n\nВозможно, я могу быть настолько [Select_CString(ROOT.Char.IsFemale, 'любезна', 'любезен' )], что предложу свои войска для поддержания порядка... #italic разумеется#!, за хорошую цену!"
 lotr_thani_hazad.2105.a: "Думаю, Грозовой Воевода сочтёт моё предложение весьма заманчивым."
 lotr_thani_hazad.2105.b: "Разборки в далёких джунглях не имеют для меня никакого значения."

 lotr_thani_hazad.2106.t: "Предложение пиратов"
 lotr_thani_hazad.2106.desc: "Ко мне прибыл посланник из Никкеи, пиратской гавани, с предложением. Правитель Никкеи предлагает особый отряд закалённых наёмников, чтобы якобы «поддерживать мир» в моей державе в случае любой внутренней угрозы, подобной той, которую представляет [tulwangi_leader.GetName].\n\n«Заманчивое предложение, да?» - говорит посланник, его ухмылка обнажает мелкие кривые зубы. «Справедливая цена, полагаю»."
 lotr_thani_hazad.2106.a: "Возможно, эти подлые пираты принесут пользу..."
 lotr_thani_hazad.2106.tt: "Вы получите отряд наёмников-пиратов, когда начнётся восстание."
 lotr_thani_hazad.2106.b: "Я не нуждаюсь в помощи пиратов!"

 lotr_thani_hazad.2107.t: "Враг нашего врага"
 lotr_thani_hazad.2107.desc: "До меня быстро доходят новости о проблемах в Грозовом Воинстве, нашем заклятом враге. Долгое время они жестоко угнетали своих не-[Concept('adunaic', 'адунайских')|E] подданных, и поэтому нет ничего удивительного в том, что [Select_CString(tulwangi_leader.IsFemale, 'некая', 'некий' )] [tulwangi_leader.GetName], [Select_CString(tulwangi_leader.IsFemale, 'харизматичная мятежница, посеяла', 'харизматичный мятежник, посеял' )] смуту в державе Грозового Воеводы.\n\nХотя [Concept('anbalukkhori', 'анбалукхори')|E] на протяжении своей истории сталкивались с многочисленными восстаниями местного населения, это восстание, похоже, собрало больше последователей, чем многие другие в новейшей истории. Не исключено, что с дополнительной помощью это восстание может увенчаться успехом или, по крайней мере, значительно ослабить Грозовое Воинство. Однако, возможно, будет разумнее укрепить нашу собственную оборону от надвигающейся бури."
 lotr_thani_hazad.2107.a: "Возможно, у нас найдётся немного золота..."
 lotr_thani_hazad.2107.b: "Их усилия могут оказаться бесценными!"
 lotr_thani_hazad.2107.c: "У нас и так много работы."

 lotr_thani_hazad.2108.t: "Помощь из Нилулондэ"
 lotr_thani_hazad.2108.desc: "PLACEHOLDER - Bellakar offers a small sum of gold"
 lotr_thani_hazad.2108.a: "Accept"
 lotr_thani_hazad.2108.b: "Deny"

 lotr_thani_hazad.2109.t: "Золото из Беллакара"
 lotr_thani_hazad.2109.desc: "PLACEHOLDER - Bellakar offers a large sum of gold"
 lotr_thani_hazad.2109.a: "Accept"
 lotr_thani_hazad.2109.b: "Deny"

 lotr_thani_hazad.2110.t: "Проклятие тиранов"
 lotr_thani_hazad.2110.desc: "Бесчисленные годы [Concept('anbalukkhori', 'анбалукхори')|E], возможно, самая большая угроза для нас, кроме самого [Concept('sauronthedarklordcharacter', 'Тёмного Властелина')|E], жестоко подавляли своих подданных, особенно тех, в чьих жилах не течёт [Concept('adunaic', 'адунайская')|E] кровь.\n\nПротив этого ига было поднято множество восстаний, но ни одно из них не увенчалось успехом. Однако недавно появились новые вести. [Select_CString(tulwangi_leader.IsFemale, 'Некая', 'Некий' )] [tulwangi_leader.GetName], [Select_CString(tulwangi_leader.IsFemale, 'красноречивая мятежница, сплотила', 'красноречивый мятежник, сплотил' )] вокруг себя немало последователей среди рабов и местного населения [southerndragonarmyadunaic|E].\n\nНесколько попыток восстаний в истории достигали такого успеха, и хотя многое находится в руках судьбы, с дополнительной помощью [Select_CString(tulwangi_leader.IsFemale, 'эта мятежница', 'этот мятежник' )] может привести Ан-Балкумаган к новой, свободной эпохе."
 lotr_thani_hazad.2110.a: "Мы предложим им небольшой отряд."
 lotr_thani_hazad.2110.b: "Мы должны отдать всё, что в наших силах!"
 lotr_thani_hazad.2110.c: "Любое восстание против анбалукхори обречено."

 lotr_thani_hazad.2111.t: "Помощь от Первого лорда"
 lotr_thani_hazad.2111.desc: "PLACEHOLDER - Felaya offers a small army"
 lotr_thani_hazad.2111.a: "Любая помощь приветствуется!"
 lotr_thani_hazad.2111.b: "Этого слишком мало."

 lotr_thani_hazad.2112.t: "Воинство Фелайи"
 lotr_thani_hazad.2112.desc: "PLACEHOLDER - Felaya offers a large army"
 lotr_thani_hazad.2112.a: "Мы были бы глупцами, если бы отвергли это!"
 lotr_thani_hazad.2112.b: "Нам не нужны чужеземные воины."

 lotr_thani_hazad.2113.t: "Повстанцы на севере"
 lotr_thani_hazad.2113.desc: "До меня дошли вести о разгорающемя восстании в государстве [Concept('anbalukkhori', 'анбалукхори')|E], величайших из наших врагов. Хотя это вполне естественно, что мы, [Concept('adunai', 'адунайцы')|E], властвуем над менее развитыми народами, анбалукхори относятся к своим подданным не лучше, чем скоту. Они бесцеремонно эксплуатируют их.\n\nПоэтому они не раз сталкивались с восстаниями, а недавно [Select_CString(tulwangi_leader.IsFemale, 'некая', 'некий' )] [tulwangi_leader.GetName], предположительно [Select_CString(tulwangi_leader.IsFemale, 'опытная и харизматичная мятежница, стала', 'опытный и харизматичный мятежник, стал' )] вербовать рабов и местное население под свои знамёна. Хотя далеко не факт, что [Select_CString(tulwangi_leader.IsFemale, 'эта мятежница', 'этот мятежник' )] достигнет успеха, анбалукхори - одна из наших главных угроз. Поэтому помощь восставшим может оказаться полезной для ослабления и сдерживания Грозового Воинства, если не для чего-то большего."
 lotr_thani_hazad.2113.a: "Мы отправим несколько добровольцев."
 lotr_thani_hazad.2113.b: "Возможно, при достаточной помощи они смогут полностью уничтожить анбалукхори."
 lotr_thani_hazad.2113.c: "Я бы [Select_CString(ROOT.Char.IsFemale, 'предпочла', 'предпочёл' )] использовать воинов для защиты своей державы."

