 lotr_thani_hazad.3000.t: "Вопрос любви"
 lotr_thani_hazad.3000.desc_arimith: "Долгое время [imrazor.GetName], [Select_CString(imrazor.IsFemale, 'моя северная соседка, стремилась', 'мой северный сосед, стремился' )] завоевать моё расположение. И я [Select_CString(ROOT.Char.IsFemale, 'ответила', 'ответил' )] [Select_CString(imrazor.IsFemale, 'ей', 'ему' )] взаимностью, лишь несколько месяцев назад проникнувшись к [Select_CString(imrazor.IsFemale, 'ней', 'нему' )] романтическими чувствами. \n\nНаши отношения ставят нас в затруднительное положение. Разумеется, мы хотим объявить о нашем союзе и соединить наши сердца в браке. Однако вряд ли [Concept('balan_lai', 'Балан-лай')|E], наши соправители державы [GetTitleByKey('e_thani_hazad').GetName], одобрят это. \n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, стоит ли мне сосредоточиться на желаниях своего сердца и попытаться довести наш брак до конца, даже вопреки противодействию других членов совета. \n...или будет мудрее остаться тайными любовниками."
 lotr_thani_hazad.3000.desc_imrazor: "Моё сердце жаждет общества [arimith.GetName], милой певчей птички моей мечты, с момента нашей первой встречи много лет назад. \n\nВсего несколько месяцев назад она, наконец, обратила на меня свой взор, превзойдя мои надежды и дав понять, что романтические чувства взаимны! \n\nРазумеется, теперь мы оба хотим объявить о нашем союзе во всеуслышание и соединить наши сердца в браке, поскольку устали держать отношения в тайне. Однако вряд ли [Concept('balan_lai', 'Балан-лай')|E], наши соправители державы [GetTitleByKey('e_thani_hazad').GetName], одобрят это. \n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, стоит ли мне сосредоточиться на желаниях своего сердца и попытаться довести наш брак до конца, даже вопреки противодействию других членов совета. \n...или будет мудрее остаться тайными любовниками."
 lotr_thani_hazad.3000.a: "Я уговорю принцев разрешить этот брак!"
 lotr_thani_hazad.3000.b: "Они никогда не позволят нам быть вместе..."

 lotr_thani_hazad.3001.t: "Разлученные возлюбленные"
 lotr_thani_hazad.3001.desc_arimith: "С тяжелым сердцем и рукой я сажусь писать письмо моему возлюбленному. \n\n#EMP [imrazor.GetFirstName], мой милый принц,#! \n\n#EMP Я боюсь, что теперь нашим мечтам о браке не суждено сбыться.#! \n\nЯ откладываю перо и на мгновение задумываюсь над следующими словами, которые я хочу записать. \n\nЧто теперь будет с моими отношениями с принцем моей мечты?"
 lotr_thani_hazad.3001.desc_imrazor: "Печаль наполняет мое сердце, когда я сажусь писать письмо своей возлюбленной. \n\n#EMP [arimith.GetFirstName], мой лучезарный цветок,#! \n\n#EMP Я боюсь, что теперь нашим мечтам о браке не суждено сбыться.#! \n\nСо слезами на глазах я откладываю перо, раздумывая над тем, какие слова написать дальше. \n\nЧто теперь будет с моими отношениями с женщиной моей мечты?"
 lotr_thani_hazad.3001.a: "Мы останемся тайными любовниками."
 lotr_thani_hazad.3001.b: "Этим отношениям должен быть положен конец - ради блага державы."

 lotr_thani_hazad.3002.t: "Посещение принцев: Грандиозное путешествие"
 lotr_thani_hazad.3002.desc_arimith: "Решив, что наша любовь будет открыто признана, [imrazor.GetFirstName] и я планируем убедить других членов [Concept('balan_lai', 'Балан-лай')|E] разрешить наш брак.\n\nМы пришли к выводу, что будет лучше, если только один из нас отправится ко двору каждого из принцев и лично обратится к ним. \n\nЯ отправлюсь в это путешествие, преодолев [GetTitleByKey('e_thani_hazad').GetName], а Имразор будет управлять нашими державами до моего возвращения. \n\nТеперь мне осталось решить, когда я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] отправиться ко двору первого принца..."
 lotr_thani_hazad.3002.desc_imrazor: "Решив, что наша любовь будет открыто признана, [arimith.GetFirstName] и я планируем убедить других членов [Concept('balan_lai', 'Балан-лай')|E] разрешить наш брак. \n\nМы пришли к выводу, что будет лучше, если только один из нас отправится ко двору каждого из принцев и лично обратится к ним. \n\nЯ отправлюсь в это путешествие, преодолев [GetTitleByKey('e_thani_hazad').GetName], а Аримит будет управлять нашими державами до моего возвращения. \n\nТеперь мне осталось решить, когда я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] отправиться ко двору первого принца..."
 lotr_thani_hazad.3002.a: "Я больше не буду медлить! Подайте мне моего коня!"
 lotr_thani_hazad.3002.b: "Нет, еще нет..."

 lotr_thani_hazad.3003.t: "Посещение принцев: Глава Балан-лай"
 lotr_thani_hazad.3003.desc_arimith: "[phorakon.GetName] - глава [Concept('balan_lai', 'Балан-лай')|E] и занимает этот престижный пост уже много лет. Его слова имеют особое значение, но возраст уже настигает его. \n\nОн встречает меня с теплой улыбкой на исхудавшем лице. \n\n«Как приятно видеть Цветок Юга в моих чертогах!» - говорит он с уважением, - «Это желанный отдых от рутины, с которой я имею дело в эти дни». А теперь, дорогая Аримит, прошу, скажите, зачем вы пришли?» \n\nДолго объяснять не приходится, и вскоре улыбка Форакона мягко расширяется. «Вы получите мое благословение, фазэнэль из Карасаласа. Мне приятно знать, что мой друг [imrazor.GetFirstName] окажется в умелых и прекрасных руках». \n\nПовернувшись, я [Select_CString(ROOT.Char.IsFemale, 'вздохнула', 'вздохнул' )] с облегчением, получив один голос в свою пользу."
 lotr_thani_hazad.3003.desc_imrazor: "[phorakon.GetName], глава [Concept('balan_lai', 'Балан-лай')|E], считает себя моим наставником и является моим близким другом. Как только я прибываю к его двору, он принимает меня приветливо и радостно, и мне не требуется много времени, чтобы объяснить причину моего пребывания здесь. \n\nЯ понимаю, как мне повезло, что на моей стороне такой друг. «Ступай с миром, сын мой», - говорит он, пообещав проголосовать в мою пользу, когда соберется следующий совет принцев, чтобы обсудить вопрос о браке между [arimith.GetFirstName] и мной."
 lotr_thani_hazad.3003.a: "Бодрящее начало моих странствий!"

 lotr_thani_hazad.3004.t: "Посещение принцев: Торговый спор"
 lotr_thani_hazad.3004.desc_arimith: "Прибыв ко двору, которым правит [karaag.GetName], я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] встречен придворными, которые объяснили, что принц сейчас занят. После долгого ожидания в его зале он наконец прибывает в дурном настроении, не желая давать мне аудиенцию, но будучи вынужденным сделать это из-за того, что я тоже являюсь членом совета [Concept('balan_lai', 'Балан-лай')|E]. \n\nВыслушав мою просьбу, он не проявляет должного внимания, бросая скрытые взгляды в сторону выходов из зала, словно с трудом удерживая себя от того, чтобы не вернуться к работе, которой он был занят, когда я [Select_CString(ROOT.Char.IsFemale, 'вошла', 'вошел' )] в его крепость. \n\n«Во внешнем дворе толпятся купцы, препирающиеся между собой о мнимой несправедливости и несправедливых тарифах», - говорит Карааг. «Уладьте для меня этот спор, и я проголосую в вашу пользу». \n\nОчевидно, что ему не хватило терпения самому разобраться в ситуации. \n\nКакая-то часть меня жалеет его. Принц Карааг мог бы стать блестящим правителем, если бы только он заботился о том, чтобы... ну, #EMP править.#"
 lotr_thani_hazad.3004.desc_imrazor: "Прибыв ко двору, которым правит [karaag.GetName], я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] встречен придворными, которые объяснили, что принц сейчас занят. После долгого ожидания в его зале он наконец прибывает в дурном настроении, не желая давать мне аудиенцию, но будучи вынужденным сделать это из-за того, что я тоже являюсь членом совета [Concept('balan_lai', 'Балан-лай')|E]. \n\nВыслушав мою просьбу, он не проявляет должного внимания, бросая скрытые взгляды в сторону выходов из зала, словно с трудом удерживая себя от того, чтобы не вернуться к работе, которой он был занят, когда я [Select_CString(ROOT.Char.IsFemale, 'вошла', 'вошел' )] в его крепость. \n\n«Во внешнем дворе толпятся купцы, препирающиеся между собой о мнимой несправедливости и несправедливых тарифах», - говорит Карааг. «Уладьте для меня этот спор, и я проголосую в вашу пользу». \n\nОчевидно, что ему не хватило терпения самому разобраться в ситуации. \n\nКакая-то часть меня жалеет его. Принц Карааг мог бы стать блестящим правителем, если бы только он заботился о том, чтобы... ну, #EMP править.#"
 lotr_thani_hazad.3004.a: "А что, заботы купцов можно умерить с помощью монет?"
 lotr_thani_hazad.3004.b: "Я уговорю их найти общий язык!"
 lotr_thani_hazad.3004.c: "Я не обычная дворняга, чтобы ты мной командовал, [karaag.GetFirstName]!"
 lotr_thani_hazad.3004.a.success: "Вы убеждаете купцов"
 lotr_thani_hazad.3004.a.failure: "Вам не удается убедить купцов"
 lotr_thani_hazad.3004.a.success.tt: "К облегчению принца Караага, спор купцов был разрешен."
 lotr_thani_hazad.3004.a.failure.tt: "Спор купцов продолжается. Вам не удалось добиться расположения принца."
 lotr_thani_hazad.3004.c.tt: "Вы отказываетесь выполнять поручения, которые явно ниже вашего достоинства."
 lotr_thani_hazad.3004.c.it: "[karaag.GetFirstName] разочарован вашим выбором"
 lotr_thani_hazad.3004.c.it.tt: "[karaag.GetFirstName], скорее всего, проголосует не в вашу пользу, когда придет время."

 lotr_thani_hazad.3005.t: "Посещение принцев: Важное решение"
 lotr_thani_hazad.3005.desc_arimith: "Убедившись в твердости позиции Караага, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, продолжать ли мне путешествие или пока вернуться домой. \n\nНедалеко на севере находятся столицы двух самых северных принцев [Concept('balan_lai', 'Балан-лай')|E], правителей владений [GetTitleByKey('d_inzilloni').GetName] и [GetTitleByKey('d_holzoreth').GetName]. \n\nНо я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел' )] уже много дней вдали от державы [GetTitleByKey('d_karasalas').GetNameNoTier] - возможно, будет разумнее пока вернуться домой, и продолжить княжеские визиты позже?"
 lotr_thani_hazad.3005.desc_imrazor: "Убедившись в твердости позиции Караага, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, продолжать ли мне путешествие или пока вернуться домой. \n\nНедалеко на севере находятся столицы двух самых северных принцев [Concept('balan_lai', 'Балан-лай')|E], правителей владений [GetTitleByKey('d_inzilloni').GetName] и [GetTitleByKey('d_holzoreth').GetName]. \n\nНо я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел' )] уже много дней вдали от державы [GetTitleByKey('d_alsarias').GetNameNoTier] - возможно, будет разумнее пока вернуться домой, и продолжить княжеские визиты позже?"
 lotr_thani_hazad.3005.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] продолжать!"
 lotr_thani_hazad.3005.b: "Сейчас я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] вернуться в свою державу и к своей любви."
 lotr_thani_hazad.3005.b.tt: "Вы вернетесь домой. Вы можете продолжить путешествие позже."

 lotr_thani_hazad.3006.t: "Посещение принцев: Зов севера"
 lotr_thani_hazad.3006.desc_arimith: "Отдохнув от посещения принцев [Concept('balan_lai', 'Балан-лай')|E] и вернувшись домой некоторое время назад, я задаюсь вопросом, не настало ли время вновь отправиться в путь. \n\nНе отправиться ли мне к самым северным дворам принцев владений [GetTitleByKey('d_inzilloni').GetNameNoTier] и [GetTitleByKey('d_holzoreth').GetNameNoTier]?"
 lotr_thani_hazad.3006.desc_imrazor: "Отдохнув от посещения принцев [Concept('balan_lai', 'Балан-лай')|E] и вернувшись домой некоторое время назад, я задаюсь вопросом, не настало ли время вновь отправиться в путь. \n\nНе отправиться ли мне к самым северным дворам принцев владений [GetTitleByKey('d_inzilloni').GetNameNoTier] и [GetTitleByKey('d_holzoreth').GetNameNoTier]?"
 lotr_thani_hazad.3006.a: "Сейчас самое время! Я поеду на север."
 lotr_thani_hazad.3006.b: "Я еще не [Select_CString(ROOT.Char.IsFemale, 'придумала', 'придумал' )], как лучше их убедить..."

 lotr_thani_hazad.3007.t: "Посещение принцев: Двор Артазрока"
 lotr_thani_hazad.3007.desc_arimith: "[arzathroc.GetName] удостоил меня аудиенцией и терпеливо выслушал мою просьбу. Ожидая его ответа, я не могу не испытывать подозрений по поводу его поведения и манер. \n\n«Союз между двумя членами [Concept('balan_lai', 'Балан-лай')|E], не так ли?» - спокойно говорит принц, устремив на меня свой взгляд. «Наши державы долгое время существовали в условиях равновесия сил», - продолжает Артазрок. «Ваш союз сильно склонит чашу весов в пользу одного принца, не так ли?» \n\nЕго слова заставляют меня содрогнуться, и, хотя я стараюсь скрыть это, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] найти убедительный аргумент, который убедит настороженного принца проголосовать в мою пользу..."
 lotr_thani_hazad.3007.desc_imrazor: "[arzathroc.GetName] удостоил меня аудиенцией и терпеливо выслушал мою просьбу. Ожидая его ответа, я не могу не испытывать подозрений по поводу его поведения и манер. \n\n«Союз между двумя членами [Concept('balan_lai', 'Балан-лай')|E], не так ли?» - спокойно говорит принц, устремив на меня свой взгляд. «Наши державы долгое время существовали в условиях равновесия сил», - продолжает Артазрок. «Ваш союз сильно склонит чашу весов в пользу одного принца, не так ли?» \n\nЕго слова заставляют меня содрогнуться, и, хотя я стараюсь скрыть это, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] найти убедительный аргумент, который убедит настороженного принца проголосовать в мою пользу..."
 lotr_thani_hazad.3007.a: "Заверить его в том, что если обе державы станут единым целым, будут уступки."
 lotr_thani_hazad.3007.a.it: "Опасения Артазрока рассеиваются, и он проголосует в вашу пользу"
 lotr_thani_hazad.3007.a.tt: "Он согласился проголосовать в вашу пользу, когда придет время."
 lotr_thani_hazad.3007.b: "Золото может убедить его там, где не смогли помочь слова..."
 lotr_thani_hazad.3007.b.it: "Принц Артазрок отказывается от взятки"
 lotr_thani_hazad.3007.b.tt: "Возмущенный, он заявил, что проголосует против вас, когда придет время."
 lotr_thani_hazad.3007.c: "Обсудим этот деликатный вопрос подробнее, друг."
 lotr_thani_hazad.3007.a.success: "Вам удалось убедить принца Артазрока"
 lotr_thani_hazad.3007.a.failure: "Вам не удалось убедить принца Артазрока"
 lotr_thani_hazad.3007.a.success.tt: "Поддавшись вашим уговорам, принц Артазрок соглашается проголосовать в вашу пользу."
 lotr_thani_hazad.3007.a.failure.tt: "Принц Артазрок вряд ли проголосует в вашу пользу."


 lotr_thani_hazad.3008.t: "Посещение принцев: Северный бастион"
 lotr_thani_hazad.3008.desc_arimith: "Подойдя к цитадели [GetTitleByKey('d_holzoreth').GetNameNoTier], я обнаруживаю, что [daroc.GetName] склонился над картами в окружении своих военачальников. После того как он распустил их, я объясняю ему свою цель, как вдруг он прерывает меня. \n\n«Вы говорите о таких пустяках, когда на горизонте маячит угроза вторжения и войны?» \n\nОчевидно, что ни мои слова, ни мои эмоции не повлияют на его голос. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно подбирать слова, чтобы не разозлить его еще больше. «Ваш бдительный контроль за северными границами обеспечивает нашу всеобщую безопасность, мой принц. Чтобы доказать, что я уважаю и восхищаюсь вашим нелегким долгом, я...» \n\nДарок смотрит на меня, скрестив руки."
 lotr_thani_hazad.3008.desc_imrazor: "Подойдя к цитадели [GetTitleByKey('d_holzoreth').GetNameNoTier], я обнаруживаю, что [daroc.GetName] склонился над картами в окружении своих военачальников. После того как он распустил их, я объясняю ему свою цель, как вдруг он прерывает меня. \n\n«Вы говорите о таких пустяках, когда на горизонте маячит угроза вторжения и войны?» \n\nОчевидно, что ни мои слова, ни мои эмоции не повлияют на его голос. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно подбирать слова, чтобы не разозлить его еще больше. «Ваш бдительный контроль за северными границами обеспечивает нашу всеобщую безопасность, мой принц. Чтобы доказать, что я уважаю и восхищаюсь вашим нелегким долгом, я...» \n\nДарок смотрит на меня, скрестив руки."
 lotr_thani_hazad.3008.a: "...отправлю вам на помощь часть своих воинов."
 lotr_thani_hazad.3008.a.tt: "Вы отправите часть войск на помощь пограничным гарнизонам Холзорета."
 lotr_thani_hazad.3008.b: "...выделю дополнительные средства на содержание ваших гарнизонов."
 lotr_thani_hazad.3008.b.tt: "Вы потратите часть своего дохода на выплату жалования солдатам Холзорета."
 lotr_thani_hazad.3008.c: "...обещаю прийти к вам на помощь, если вы подвергнетесь вторжению."
 lotr_thani_hazad.3008.c.it: "Ваши слова не убедили принца"
 lotr_thani_hazad.3008.c.tt: "[daroc.GetName] не убежден вашими пустыми обещаниями."
 sent_soldiers_to_holzoreth: "В Холзорет отправлены солдаты"
 sent_soldiers_to_holzoreth_desc: "Солдаты были отправлены на укрепление северной обороны Холзорета, ослабив ваши силы."
 holzoreth_border_bolstered: "Усиленная граница"
 holzoreth_border_bolstered_desc: "Пограничные гарнизоны были усилены войсками, посланными другим членом Балан-лай."
 paying_soldiers_of_holzoreth: "Выплата жалования солдатам Холзорета"
 paying_soldiers_of_holzoreth_desc: "Часть ваших доходов идет на выплату жалования солдатам Холзорета."
 holzoreth_soldiers_paid: "Выплаченное солдатское жалование"
 holzoreth_soldiers_paid_desc: "Часть жалования ваших солдат выплачивается другим членом Балан-лай."

 lotr_thani_hazad.3009.t: "Посещение принцев: Дорога домой"
 lotr_thani_hazad.3009.desc_arimith: "После завершения переговоров с принцем Дароком я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, продолжать ли мне путешествие или пока вернуться домой. \n\nЯ [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы легко нанять корабль, чтобы он доставил меня на юг, к берегам державы [GetTitleByKey('d_gimileth').GetNameNoTier], где находится следующий принц. \n\nНо я уже много дней [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел' )] вдали от своей державы [GetTitleByKey('d_karasalas').GetNameNoTier] - могу ли я позволить себе воздерживаться от своих княжеских обязанностей еще дольше, чем уже [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )]?"
 lotr_thani_hazad.3009.desc_imrazor: "После завершения переговоров с принцем Дароком я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, продолжать ли мне путешествие или пока вернуться домой. \n\nЯ [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы легко нанять корабль, чтобы он доставил меня на юг, к берегам державы [GetTitleByKey('d_gimileth').GetNameNoTier], где находится следующий принц. \n\nНо я уже много дней [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел' )] вдали от своей державы [GetTitleByKey('d_alsarias').GetNameNoTier] - могу ли я позволить себе воздерживаться от своих княжеских обязанностей еще дольше, чем уже [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )]?"
 lotr_thani_hazad.3009.tt: "Вы заручились текушим количеством голосов в свою пользу [Var('imrazor_success_chance').GetValue]."
 lotr_thani_hazad.3009.a: "Проследуем ко двору принца Дэрая."
 lotr_thani_hazad.3009.b: "У меня есть дела при дворе."
 lotr_thani_hazad.3009.b.tt: "Вы вернетесь домой и сможете продолжить свои княжеские визиты в более позднее время."

 lotr_thani_hazad.3010.t: "Посещение принцев: Снова в путь"
 lotr_thani_hazad.3010.desc_arimith: "Прошло некоторое время с тех пор, как я в последний раз [Select_CString(ROOT.Char.IsFemale, 'посещала', 'посещал' )] одного из принцев [Concept('balan_lai', 'Балан-лай')|E]. Интересно, не пришло ли время снова отправиться в путь...\n\nНе отправиться ли мне к юго-западному двору принца державы [GetTitleByKey('d_gimileth').GetNameNoTier]?"
 lotr_thani_hazad.3010.desc_imrazor: "Прошло некоторое время с тех пор, как я в последний раз [Select_CString(ROOT.Char.IsFemale, 'посещала', 'посещал' )] одного из принцев [Concept('balan_lai', 'Балан-лай')|E]. Интересно, не пришло ли время снова отправиться в путь...\n\nНе отправиться ли мне к юго-западному двору принца державы [GetTitleByKey('d_gimileth').GetNameNoTier]?"
 lotr_thani_hazad.3010.a: "Продолжим путь!"
 lotr_thani_hazad.3010.b: "Я отложу это на более поздний срок..."

 lotr_thani_hazad.3011.t: "Посещение принцев: Младший из Балан-лай"
 lotr_thani_hazad.3011.desc_arimith: "[GetTitleByKey('d_gimileth').GetName] - держава, которая, как говорят, очень близка к [avari|El] из королевства [GetTitleByKey('k_drel').GetNameNoTier] - хотя многие сомневаются, что такое королевство действительно еще существует. Те немногие путники, которые осмеливаются пройти под древними деревьями большого леса вдоль южной границы Гимилета и которым удается вернуться, говорят о бесконечном лабиринте деревьев. \n\nОднако ходят слухи, что [derei.GetName] изредка принимает при своём дворе [Concept('elves', 'эльфов')|E]... \n\nСтоя у входа в тронный зал Дэрая, я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] изложить свои доводы."
 lotr_thani_hazad.3011.desc_imrazor: "[GetTitleByKey('d_gimileth').GetName] - держава, которая, как говорят, очень близка к [avari|El] из королевства [GetTitleByKey('k_drel').GetNameNoTier] - хотя многие сомневаются, что такое королевство действительно еще существует. Те немногие путники, которые осмеливаются пройти под древними деревьями большого леса вдоль южной границы Гимилета и которым удается вернуться, говорят о бесконечном лабиринте деревьев. \n\nОднако ходят слухи, что [derei.GetName] изредка принимает при своём дворе [Concept('elves', 'эльфов')|E]... \n\nСтоя у входа в тронный зал Дэрая, я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] изложить свои доводы."
 lotr_thani_hazad.3011.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] найти способ убедить его."
 lotr_thani_hazad.3011.tt: "Вы попытаетесь убедить молодого принца."

 lotr_thani_hazad.3012.t: "Посещение принцев: Неожиданный гость"
 lotr_thani_hazad.3012.desc_arimith: "Когда я вхожу в залы принца Дэрая, я начинаю произносить свою речь. \n\n«[derei.GetFirstName], я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )]...», но меня прерывает неизвестный голос. \n\n«Чтобы доказать, что истинная любовь - это блаженство, не так ли?» \n\nЯ поворачиваюсь и вижу фигуру, прислонившуюся к колонне. В его руках лежит лютня, и пальцы отыгрывают несколько нот. \n\n«Король [terilaen.GetFirstName]!», - восклицает Дэрай, в его голосе слышится удивление и облегчение. Он быстро передает свои опасения эльфу, и по манере их речи я понимаю, что они очень близки: «Но что, если голосование провалится, даже при моей поддержке? Что, если другие принцы сочтут это за оскорбление?» \n\n«Это не имеет значения», - голос эльфийского короля теперь звучит ясно, как хрусталь, прорезая все тени. Веселость, которой он отличался, исчезла, как солнце за тучами, оставив после себя суровую и холодную уверенность. «Любовь бесценна. И именно по этой причине любовь - более страшный и грозный враг, чем любая ненависть. И если им следует преградить путь, опасаясь беды, ты можешь навлечь её другим путём». И так же внезапно к нему вернулось тепло. «А я так люблю счастливые исходы. Поэтому я бы выступил за доброту и дружбу. Но, как всегда, мой юный ученик, решение должно быть только за тобой. Ибо жить с ним будешь ты и твои потомки, а не я!»\n\nПосле недолгого раздумья принц Дэрай заявляет о своей полной поддержке моей цели - в немалой степени благодаря вмешательству короля Терилаэна из королевства [GetTitleByKey('k_drel').GetNameNoTier]."
 lotr_thani_hazad.3012.desc_imrazor: "Когда я вхожу в залы принца Дэрая, я начинаю произносить свою речь. \n\n«[derei.GetFirstName], я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )]...», но меня прерывает неизвестный голос. \n\n«Чтобы доказать, что истинная любовь - это блаженство, не так ли?» \n\nЯ поворачиваюсь и вижу фигуру, прислонившуюся к колонне. В его руках лежит лютня, и пальцы отыгрывают несколько нот. \n\n«Король [terilaen.GetFirstName]!», - восклицает Дэрай, в его голосе слышится удивление и облегчение. Он быстро передает свои опасения эльфу, и по манере их речи я понимаю, что они очень близки: «Но что, если голосование провалится, даже при моей поддержке? Что, если другие принцы сочтут это за оскорбление?» \n\n«Это не имеет значения», - голос эльфийского короля теперь звучит ясно, как хрусталь, прорезая все тени. Веселость, которой он отличался, исчезла, как солнце за тучами, оставив после себя суровую и холодную уверенность. «Любовь бесценна. И именно по этой причине любовь - более страшный и грозный враг, чем любая ненависть. И если им следует преградить путь, опасаясь беды, ты можешь навлечь её другим путём». И так же внезапно к нему вернулось тепло. «А я так люблю счастливые исходы. Поэтому я бы выступил за доброту и дружбу. Но, как всегда, мой юный ученик, решение должно быть только за тобой. Ибо жить с ним будешь ты и твои потомки, а не я!»\n\nПосле недолгого раздумья принц Дэрай заявляет о своей полной поддержке моей цели - в немалой степени благодаря вмешательству короля Терилаэна из королевства [GetTitleByKey('k_drel').GetNameNoTier]."
 lotr_thani_hazad.3012.a: "Король Терилаэн проявил великодушие!"
 lotr_thani_hazad.3012.a.tt: "Вы вернётесь домой, чтобы спланировать свой следующий шаг"

 lotr_thani_hazad.3014.t: "Посещение принцев: Оставшийся двор"
 lotr_thani_hazad.3014.desc_arimith: "Разобравшись с принцем державы [GetTitleByKey('d_gimileth').GetNameNoTier], только один из членов [Concept('balan_lai', 'Балан-лай')|E] остаётся непосещённым. \n\n[seregul.GetName], который правит державой [GetTitleByKey('k_pel').GetNameNoTier], расположенной на восточной стороне [Concept('yellowmountains', 'Желтых гор')|E]. Быстрый в гневе и эгоистичный, иметь с ним дело будет нелегко. \n\nПрямое обращение к нему вряд ли принесет желаемые результаты, поэтому я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, как лучше подойти к этому деликатному делу."
 lotr_thani_hazad.3014.desc_imrazor: "Разобравшись с принцем державы [GetTitleByKey('d_gimileth').GetNameNoTier], только один из членов [Concept('balan_lai', 'Балан-лай')|E] остаётся непосещённым. \n\n[seregul.GetName], который правит державой [GetTitleByKey('k_pel').GetNameNoTier], расположенной на восточной стороне [Concept('yellowmountains', 'Желтых гор')|E]. Быстрый в гневе и эгоистичный, иметь с ним дело будет нелегко. \n\nПрямое обращение к нему вряд ли принесет желаемые результаты, поэтому я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, как лучше подойти к этому деликатному делу."
 lotr_thani_hazad.3014.a: "Лучшая надежда - если [seregul.GetFirstName] выйдет из игры..."
 lotr_thani_hazad.3014.b: "Нет надежды на то, что [seregul.GetFirstName] примет мою сторону..."
 lotr_thani_hazad.3014.b.tt: "[seregul.GetName] будет [Select_CString(seregul.IsFemale, 'проигнорирована', 'проигнорирован' )]. \nВеликий совет начнется через два месяца."
 lotr_thani_hazad.3014.c: "Я отправлю ему послание со своей просьбой."
 lotr_thani_hazad.3014.c.tt: "[seregul.GetName] получит от вас письмо с просьбой о поддержке."
 lotr_thani_hazad.3014.it: "[seregul.GetName] не убеждается вашим письмом"
 lotr_thani_hazad.3014.tt: "[seregul.GetName] отвергает вашу просьбу и проголосует против вас."
 lotr_thani_hazad.3014.d: "Принц [seregul.GetFirstName] лучше отнесётся к личному визиту."
 lotr_thani_hazad.3014.d.tt: "Вы отправитесь в [GetTitleByKey('c_arpel').GetNameNoTier], которым правит [seregul.GetName]." 

 lotr_thani_hazad.3015.t: "Посещение принцев: Последний двор"
 lotr_thani_hazad.3015.desc_arimith: "Побывав в землях державы [GetTitleByKey('d_gimileth').GetNameNoTier], только один из членов [Concept('balan_lai', 'Балан-лай')|E] остаётся непосещённым. Правитель державы [GetTitleByKey('k_pel').GetName].\n\nВступив в ряды [Concept('balan_lai', 'Балан-лай')|E] совсем недавно, его характер мне неизвестен. Очень важно произвести хорошее первое впечатление на нового члена совета, если я хочу добиться успеха в своем плане по получению еще одного голоса в свою пользу..."
 lotr_thani_hazad.3015.desc_imrazor: "Побывав в землях державы [GetTitleByKey('d_gimileth').GetNameNoTier], только один из членов [Concept('balan_lai', 'Балан-лай')|E] остаётся непосещённым. Правитель державы [GetTitleByKey('k_pel').GetName].\n\nВступив в ряды [Concept('balan_lai', 'Балан-лай')|E] совсем недавно, его характер мне неизвестен. Очень важно произвести хорошее первое впечатление на нового члена совета, если я хочу добиться успеха в своем плане по получению еще одного голоса в свою пользу..."
 lotr_thani_hazad.3015.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] познакомиться с новым принцем."
 lotr_thani_hazad.3015.b: "Это всего лишь один голос, и он может быть оставлен без внимания."
 lotr_thani_hazad.3015.b.tt: "Вы будете полагаться на те голоса, которые уже получили. \nВеликий совет [Concept('balan_lai', 'Балан-лай')|E] начнётся через несколько недель..."

 lotr_thani_hazad.3016.t: "Посещение принцев: Принц в клетке"
 lotr_thani_hazad.3016.desc: "Мой план окупился! [seregul.GetName] был схвачен и проводит время под домашним арестом. \n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, что делать с моим ценным пленником..."
 lotr_thani_hazad.3016.a: "Он будет гнить в заточении до окончания заседания совета."
 lotr_thani_hazad.3016.b: "Если он обещает проголосовать в нашу пользу, он может уйти..."
 lotr_thani_hazad.3016.b.tt: "Вы положитесь на то, что [seregul.GetName] сдержит своё слово и отпустите его. \nВеликий совет [Concept('balan_lai', 'Балан-лай')|E] начнётся через несколько недель..." 

 lotr_thani_hazad.3017.t: "Посещение принцев: Ключевая ошибка"
 lotr_thani_hazad.3017.desc: "Проклятье! [seregul.GetName] вырвался из моих рук, сорвав мою попытку похитить его. \n\nЭто серьезная неудача, но не обязательно роковая, если я соберу достаточно голосов, чтобы одолеть тех, кто выступает против нашего брака во время заседания [Concept('balan_lai', 'Балан-лай')|E]..."
 lotr_thani_hazad.3017.a: "Остаётся только надеяться, что [seregul.GetFirstName] не сорвёт голосование..."
 lotr_thani_hazad.3017.a.tt: "Вы вынуждены продолжить, не заручившись поддержкой #L [seregul.GetFirstName]а#!. \nВеликий совет [Concept('balan_lai', 'Балан-лай')|E] начнётся через несколько недель..."

 lotr_thani_hazad.3018.t: "Посещение принцев: Правитель Пэла"
 lotr_thani_hazad.3018.desc_seregul: "Войдя в большой зал, которым правит [seregul.GetName], я готовлюсь к предстоящему противостоянию. \n\nГордый правитель державы [GetTitleByKey('k_pel').GetName] не склонится на мою сторону так просто. Высокомерный человек, он считает себя выше прочих членов [Concept('balan_lai', 'Балан-лай')|E]. \n\n«О чём вы пришли просить меня, [ROOT.Char.GetFirstName]?» - приветствует меня принц, когда я предстаю перед его высоким троном. \n\nЯ задаюсь вопросом, готовясь подбирать слова с особой тщательностью..."
 lotr_thani_hazad.3018.desc: "Войдя в большой зал, которым правит [seregulsuccessor.GetName], я задаюсь вопросом, кто взял бразды правления этими землями в свои руки. Предшественник принца, Серегул, был гордым человеком, которого многие называли высокомерным. \n\nЧто, если его преемник будет таким же? Как привести убедительные доводы тому, о ком я ничего не знаю?"
 lotr_thani_hazad.3018.a: "Я [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришел' )], чтобы выразить свою щедрость соседу по ту сторону гор."
 lotr_thani_hazad.3018.b: "Я буду вам очень [Select_CString(ROOT.Char.IsFemale, 'обязана', 'обязан' )], друг."
 lotr_thani_hazad.3018.a.it: "Подкуп успешен"
 lotr_thani_hazad.3018.a.tt: "[seregulsuccessor.GetName] проголосует в вашу пользу, когда придёт время."
 lotr_thani_hazad.3018.b.it: "Ваши обещания не убедили принца"
 lotr_thani_hazad.3018.b.tt: "[seregulsuccessor.GetName] проголосует против вас, когда придёт время."

 lotr_thani_hazad.3020.t: "Посещение принцев: Великий совет"
 lotr_thani_hazad.3020.desc_seregul: "Этот день, наконец, настал. Великий совет [Concept('balan_lai', 'Балан-лай')|E] собрался, чтобы обсудить вопрос о браке между двумя его членами.\n\nЯ не могу сдержать волнения, когда наш лидер выходит вперёд, чтобы объявить результаты голосования по моему прошению.\n\n«Воля этого Великого совета, выраженная большинством голосов, заключается в том, чтобы этот брак был... разрешён!», - провозглашает [balan_lai_leader.GetFirstName], к моему облегчению и радости.\n\nБлагодаря поддержке Серегула моя мечта, наконец, осуществилась. Я поворачиваю голову, чтобы поймать взгляд [Select_CString(ROOT.Char.IsFemale, 'своего возлюбленного', 'своей возлюбленной' )].\n\nМного бессонных ночей я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл' )], репетируя, что скажу сегодня, но сейчас я слишком [Select_CString(ROOT.Char.IsFemale, 'подавлена', 'подавлен' )] эмоциями, чтобы сказать хоть что-либо."
 lotr_thani_hazad.3020.desc_seregul_rots: "Этот день, наконец, настал. Великий совет [Concept('balan_lai', 'Балан-лай')|E] собрался, чтобы обсудить вопрос о браке между двумя его членами.\n\nЯ не могу сдержать волнения, когда наш лидер выходит вперёд, чтобы объявить результаты голосования по моему прошению.\n\n«Воля этого Великого совета, выраженная большинством голосов, заключается в том, чтобы этот брак был... разрешён!», - провозглашает [balan_lai_leader.GetFirstName], к моему облегчению и радости.\n\nПринц Серегул таинственным образом отсутствовал на этой встрече, способствуя такому исходу, в то время как он наслаждается своим домашним арестом в охраняемой комнате моего дворца.\n\nЯ поворачиваю голову, чтобы поймать взгляд [Select_CString(ROOT.Char.IsFemale, 'своего возлюбленного', 'своей возлюбленной' )].\n\nМного бессонных ночей я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл' )], репетируя, что скажу сегодня, но сейчас я слишком [Select_CString(ROOT.Char.IsFemale, 'подавлена', 'подавлен' )] эмоциями, чтобы сказать хоть что-либо."
 lotr_thani_hazad.3020.desc: "Этот день, наконец, настал. Великий совет [Concept('balan_lai', 'Балан-лай')|E] собрался, чтобы обсудить вопрос о браке между двумя его членами.\n\nЯ не могу сдержать волнения, когда наш лидер выходит вперёд, чтобы объявить результаты голосования по моему прошению.\n\n«Воля этого Великого совета, выраженная большинством голосов, заключается в том, чтобы этот брак был... разрешён!», - провозглашает [balan_lai_leader.GetFirstName], к моему облегчению и радости.\n\nЯ поворачиваю голову, чтобы поймать взгляд [Select_CString(ROOT.Char.IsFemale, 'своего возлюбленного', 'своей возлюбленной' )]. Много бессонных ночей я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провёл' )], репетируя, что скажу сегодня, но сейчас я слишком [Select_CString(ROOT.Char.IsFemale, 'подавлена', 'подавлен' )] эмоциями, чтобы сказать хоть что-либо."
 lotr_thani_hazad.3020.a: "Наконец-то мы можем пожениться..."

 lotr_thani_hazad.3023.t: "Посещение принцев: Великий совет"
 lotr_thani_hazad.3023.desc: "Этот день, наконец, настал. Великий совет [Concept('balan_lai', 'Балан-лай')|E] собрался, чтобы обсудить вопрос о браке между двумя его членами.\n\nЯ не могу сдержать волнения, когда наш лидер выходит вперёд, чтобы объявить результаты голосования по моему прошению.\n\n«Воля этого Великого совета, выраженная большинством голосов, заключается в том, чтобы этот брак был... запрещён!» - объявляет глашатай.\n\nЭти слова поражают меня сильнее, чем любого врага. Мне кажется, что время остановилось. Взоры Совета обращаются ко мне и [Select_CString(ROOT.Char.IsFemale, 'моему возлюбленному', 'моей возлюбленной' )].\n\nПонимая, что всё было напрасно, я [Select_CString(ROOT.Char.IsFemale, 'преисполнена', 'преисполнен' )] разочарования и печали..."
 lotr_thani_hazad.3023.a: "Это возмутительно, это несправедливо! Мы созданы друг для друга!"

 lotr_thani_hazad.3024.t: "Княжеский брак"
 lotr_thani_hazad.3024.desc: "[imrazor.GetName], правитель провинции [GetTitleByKey('d_alsarias').GetName], посетил большинство - если не всех - моих коллег-членов [Concept('balan_lai', 'Балан-лай')|E], путешествуя по всему [Concept('thanihazad', 'Тани-Хазаду')|E], чтобы лично обратиться к каждому из них. Его просьба была простой, но в то же время опасной для нас: разрешить брак между ним и леди [arimith.GetFirstName], фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, ещё одной уважаемой представительницей [Concept('balan_lai', 'Балан-лай')|E].\n\nПосле того, как были проведено голосование по прошению, что подал [imrazor.getFirstName], глашатай объявил результаты:\n\n«Воля этого Великого совета, выраженная большинством голосов, заключается в том, чтобы этот брак был... разрешён!», - это показывает, что большинство членов совета проголосовали за это предложение.\n\nНе теряя времени, [imrazor.GetFirstName] и [arimith.GetFirstName] произнесли свои клятвы друг другу, объединив свои владения через брак. Только время покажет, как это повлияет на баланс сил в Тани-Хазаде..."
 lotr_thani_hazad.3024.tt: "[imrazor.GetName] женится на персонаже [arimith.GetName]"
 lotr_thani_hazad.3024.a: "Семь княжеств стали шестью..."

 lotr_thani_hazad.3025.t: "Предотвращённый союз"
 lotr_thani_hazad.3025.desc: "[imrazor.GetName], правитель провинции [GetTitleByKey('d_alsarias').GetName], посетил большинство - если не всех - моих коллег-членов [Concept('balan_lai', 'Балан-лай')|E], путешествуя по всему [Concept('thanihazad', 'Тани-Хазаду')|E], чтобы лично обратиться к каждому из них. Его просьба была простой, но в то же время опасной для нас: разрешить брак между ним и леди [arimith.GetFirstName], фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, ещё одной уважаемой представительницей [Concept('balan_lai', 'Балан-лай')|E].\n\nПосле того, как были проведено голосование по прошению, что подал [imrazor.getFirstName], глашатай объявил результаты:\n\n«Воля этого Великого совета, выраженная большинством голосов, заключается в том, чтобы этот брак был... запрещён!», - это показывает, что большинство членов совета проголосовали против этого прошения.\n\nНет никакой уверенности в том, как пара отреагирует на эту новость..."
 lotr_thani_hazad.3025.tt: "[imrazor.GetName] не сможет женится на персонаже [arimith.GetName]"
 lotr_thani_hazad.3025.a: "Неужели они и правда думали, что наши древние традиции будут забыты только ради них?"

 lotr_thani_hazad.3030.t: "Мольба [Select_CString(chain_participant.IsFemale, 'принцессы', 'принца' )]" # Phôrakon
 lotr_thani_hazad.3030.desc: "Ранним утром, когда я вхожу в зал совета, мой глашатай объявляет о появлении [Select_CString(chain_participant.IsFemale, 'неожиданной', 'неожиданного' )], но [Select_CString(chain_participant.IsFemale, 'желанной гостьи', 'желанного гостя' )]; к моему двору [Select_CString(chain_participant.IsFemale, 'прибыла', 'прибыл' )] коллега по [Concept('balan_lai', 'Балан-лай')|E], [chain_participant.GetName].\n\n[Select_CString(chain_participant.IsFemale, 'Ей', 'Ему' )] не требуется много времени, чтобы объяснить причину своего визита: меня просят оказать поддержку в довольно деликатном вопросе.\n\n[imrazor.GetFirstName] желает жениться на фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, леди [arimith.GetFirstName]. Подобного рода союзы были очень редки в истории [Concept('thanihazad', 'Тани-Хазада')|E], и к ним нельзя относиться легкомысленно. Такой брак потенциально может объединить два княжества.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно обдумать, какой ответ мне следует дать на эту необычную просьбу..."
 lotr_thani_hazad.3030.a: "Разумеется, я поддержу тебя. Ступай с миром, [Select_CString(chain_participant.IsFemale, 'подруга моя', 'друг мой' )]."
 lotr_thani_hazad.3030.a.tt: "Вы отдадите свой голос в поддержку желания персонажей [imrazor.GetFirstName] и [arimith.GetFirstName] пожениться."
 lotr_thani_hazad.3030.b: "Абсурд! Вы не должны нарушать устои [Concept('balan_lai', 'Балан-лай')|E]..."
 lotr_thani_hazad.3030.b.tt: "Вы отклоняете прошение персонажа [chain_participant.GetFirstName] и проголосуете против [Select_CString(chain_participant.IsFemale, 'её', 'его' )] желания."

 lotr_thani_hazad.3031.t: "Мольба [Select_CString(chain_participant.IsFemale, 'принцессы', 'принца' )]" #Karaag
 lotr_thani_hazad.3031.desc: "После безуспешной попытки уладить спор между купцами, я возвращаюсь в зал совета, и мой глашатай объявляет о присутствии посетителя; [Select_CString(chain_participant.IsFemale, 'прибыла', 'прибыл' )] мой коллега по [Concept('balan_lai', 'Балан-лай')|E], [chain_participant.GetName].\n\n[Select_CString(chain_participant.IsFemale, 'Ей', 'Ему' )] не требуется много времени, чтобы объяснить причину своего визита: меня просят оказать поддержку в довольно деликатном вопросе.\n\n[imrazor.GetFirstName] желает жениться на фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, леди [arimith.GetFirstName]. Подобного рода союзы были очень редки в истории [Concept('thanihazad', 'Тани-Хазада')|E], и к ним нельзя относиться легкомысленно. Такой брак потенциально может объединить два княжества.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно обдумать, какой ответ мне следует дать на эту необычную просьбу..."
 lotr_thani_hazad.3031.a: "Вы получите мою поддержку, если поможете мне разрешить торговый спор."
 lotr_thani_hazad.3031.a.tt: "Вы отдадите свой голос в поддержку желания персонажей [imrazor.GetFirstName] и [arimith.GetFirstName] пожениться в обмен на разрешение ими торгового спора."
 lotr_thani_hazad.3031.b: "Ба! У меня есть дела поважнее, чем выслушивать твой #EMP бред!#!"
 lotr_thani_hazad.3031.b.tt: "Вы отклоняете прошение персонажа [chain_participant.GetFirstName] и проголосуете против [Select_CString(chain_participant.IsFemale, 'её', 'его' )] желания."

 lotr_thani_hazad.3032.t: "Мольба [Select_CString(chain_participant.IsFemale, 'принцессы', 'принца' )]" #Arthazroc
 lotr_thani_hazad.3032.desc: "[Select_CString(chain_participant.IsFemale, 'Моя', 'Мой' )] коллега по [Concept('balan_lai', 'Балан-лай')|E] [chain_participant.GetName] [Select_CString(chain_participant.IsFemale, 'попросила', 'попросил' )] аудиенции для обсуждения «деликатного вопроса».\n\nВскоре становится известна причина этого визита: меня попросили оказать поддержку в довольно деликатном вопросе.\n\n[imrazor.GetFirstName] желает жениться на фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, леди [arimith.GetFirstName]. Подобного рода союзы были очень редки в истории [Concept('thanihazad', 'Тани-Хазада')|E], и к ним нельзя относиться легкомысленно.\n\nВ наших владениях долгое время сохранялся баланс сил, и такой союз значительно склонил бы чашу весов в пользу одного принца... Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно обдумать, какой ответ мне следует дать на эту необычную просьбу."
 lotr_thani_hazad.3032.a: "Я поддержу вас, если взамен вы предложите мне некоторые... уступки."
 lotr_thani_hazad.3032.a.tt: "Вы отдадите свой голос в поддержку желания персонажей [imrazor.GetFirstName] и [arimith.GetFirstName] пожениться в обмен на добровольные уступки."
 lotr_thani_hazad.3032.b: "Объединение их владений сильно нарушило бы баланс сил в Тани-Хазаде."
 lotr_thani_hazad.3032.b.tt: "Вы отклоняете прошение персонажа [chain_participant.GetFirstName] и проголосуете против [Select_CString(chain_participant.IsFemale, 'её', 'его' )] желания." 

 lotr_thani_hazad.3033.t: "Мольба [Select_CString(chain_participant.IsFemale, 'принцессы', 'принца' )]" #Daroc
 lotr_thani_hazad.3033.desc: "Когда я наблюдаю за запланированными на день учениями моих полководцев, меня прерывает [Select_CString(chain_participant.IsFemale, 'моя', 'мой' )] коллега по [Concept('balan_lai', 'Балан-лай')|E], [chain_participant.GetName].\n\nНе проходит много времени, как причина этого визита становится известна:\n\n[imrazor.GetFirstName] желает жениться на фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, леди [arimith.GetFirstName].\n\nСначала я [Select_CString(ROOT.Char.IsFemale, 'была возмущена', 'был возмущён' )] тем, что [Select_CString(chain_participant.IsFemale, 'принцесса осмелилась', 'принц осмелился' )] обратиться ко мне за помощью в таком несущественном вопросе, учитывая, что моё княжество - это главная защита от наших врагов, и то, как умышленно мои просьбы о подкреплении были проигнорированы остальными членами [Concept('balan_lai', 'Балан-лай')|E]. Но потом я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что это может быть именно тем ответом, на который я [Select_CString(ROOT.Char.IsFemale, 'надеялась', 'надеялся' )]..."
 lotr_thani_hazad.3033.a: "Вы получите мою поддержку, если поможете мне защитить мои владения."
 lotr_thani_hazad.3033.a.tt: "Вы отдадите свой голос в поддержку желания персонажей [imrazor.GetFirstName] и [arimith.GetFirstName] пожениться в обмен на их помощь в укреплении вашей обороны."
 lotr_thani_hazad.3033.b: "Я не буду отвлекаться от своего долга! Ступай прочь, [chain_participant.GetFirstName]."
 lotr_thani_hazad.3033.b.tt: "Вы отклоняете прошение персонажа [chain_participant.GetFirstName] и проголосуете против [Select_CString(chain_participant.IsFemale, 'её', 'его' )] желания."

 lotr_thani_hazad.3034.t: "Мольба [Select_CString(chain_participant.IsFemale, 'принцессы', 'принца' )]" #Derei
 lotr_thani_hazad.3034.desc: "Как раз в тот момент, когда я направляюсь на урок, который проводит [terilaen.GetFirstName], мой глашатай объявляет о неожиданном визите; [Select_CString(chain_participant.IsFemale, 'моя', 'мой' )] коллега по [Concept('balan_lai', 'Балан-лай')|E], [chain_participant.GetName] [Select_CString(chain_participant.IsFemale, 'прибыла', 'прибыл' )] с просьбой об аудиенции.\n\nНе требуется много времени, чтобы выяснить причину этого визита. [chain_participant.GetFirstName] просит меня оказать поддержку в довольно деликатном вопросе.\n\n[imrazor.GetFirstName] желает жениться на фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, леди [arimith.GetFirstName]. Подобного рода союзы были очень редки в истории [Concept('thanihazad', 'Тани-Хазада')|E], и к ним нельзя относиться легкомысленно. Некоторые владыки сочтут это оскорблением наших традиций.\n\nПока я тщательно обдумываю, какой ответ мне следует дать на этот необычный запрос. Появляется мой друг и наставник [terilaen.GetName], очевидно, уже подозревая о том, чего добивается [chain_participant.GetFirstName], он советует мне поддержать просьбу во имя любви..."
 lotr_thani_hazad.3034.a: "В таких просьбах нельзя отказывать, я проголосую за вас!"
 lotr_thani_hazad.3034.a.tt: "Вы отдадите свой голос в поддержку желания персонажей [imrazor.GetFirstName] и [arimith.GetFirstName] пожениться."
 lotr_thani_hazad.3034.b: "[terilaen.GetFirstName] мудр, но не понимает призвания [Concept('balan_lai', 'Балан-лай')|E]..."
 lotr_thani_hazad.3034.b.tt: "Вы отклоняете прошение персонажа [chain_participant.GetFirstName] и проголосуете против [Select_CString(chain_participant.IsFemale, 'её', 'его' )] - и желания персонажа [terilaen.GetFirstName]."

 lotr_thani_hazad.3035.t: "Мольба [Select_CString(chain_participant.IsFemale, 'принцессы', 'принца' )]" #Seregul
 lotr_thani_hazad.3035.desc: "Когда я [Select_CString(ROOT.Char.IsFemale, 'отдыхала', 'отдыхал' )] на своём троне после встречи с советом, я [Select_CString(ROOT.Char.IsFemale, 'была удивлена', 'был удивлён' )] тем, что стражники сообщили мне, что [Select_CString(chain_participant.IsFemale, 'прибыла', 'прибыл' )] [chain_participant.GetName] с просьбой о встрече.\n\nПредстав передо мной, [chain_participant.GetFirstName] объясняет цель этого визита: меня просят оказать поддержку в довольно деликатном вопросе.\n\n[imrazor.GetFirstName] желает жениться на фазэнель #ONCLICK:TITLE,d_karasalas #TOOLTIP:LANDED_TITLE,d_karasalas #L Карасаласа#!#!#!, леди [arimith.GetFirstName]. Подобного рода союзы были очень редки в истории [Concept('thanihazad', 'Тани-Хазада')|E], и не будут легкомысленно поддержаны на Великом совете. И не без оснований, объединение двух владений сильно нарушило бы баланс в регионе.\n\nНо если бы голосование зависело от моего одобрения, оба принца были бы у меня в долгу... Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно решить, что делать с этой необычной просьбой."
 lotr_thani_hazad.3035.a: "Кто я [Select_CString(ROOT.Char.IsFemale, 'такая', 'такой' )], чтобы стоять на пути истинной любви?"
 lotr_thani_hazad.3035.a.tt: "Вы отдадите свой голос в поддержку желания персонажей [imrazor.GetFirstName] и [arimith.GetFirstName] пожениться... в надежде, что они запомнят, кто разрешил это."
 lotr_thani_hazad.3035.b: "Это нарушит баланс сил в Тани-Хазаде!"
 lotr_thani_hazad.3035.b.tt: "Вы отклоняете прошение персонажа [chain_participant.GetFirstName] и проголосуете против [Select_CString(chain_participant.IsFemale, 'её', 'его' )] желания."

 lotr_thani_hazad.3103.t: "Посещение принцев: Неожиданный отказ"
 lotr_thani_hazad.3103.desc: "[phorakon.GetName] является лидером [Concept('balan_lai', 'Балан-лай')|E] и мудро правит #ONCLICK:TITLE,k_gimilthani #TOOLTIP:LANDED_TITLE,k_gimilthani #L Гимильтани#!#!#! на протяжении долгих лет.\n\n[Select_CString(ROOT.Char.IsFemale, 'Уверенная', 'Уверенный' )] в его поддержке, я [Select_CString(ROOT.Char.IsFemale, 'изложила', 'изложил' )] своё прошение и [Select_CString(ROOT.Char.IsFemale, 'попросила', 'попросил' )] его проголосовать в поддержку, прибыв в [GetTitleByKey('c_uruloni').GetNameNoTier].\n\nК моему ужасу, [phorakon.GetFirstName] отказался поддержать меня в этом вопросе! Утверждая, что наш брак является оскорблением наших традиций...\n\nЕсли даже он не поддерживает меня, чего я могу ожидать от остальных?"
 lotr_thani_hazad.3103.a: "Я никогда не [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )], что он будет таким холодным и безразличным..."
 lotr_thani_hazad.3103.a.tt: "Вы продолжите своё путешествие"

 lotr_thani_hazad.3104.t: "Посещение принцев: Отказ в аудиенции"
 lotr_thani_hazad.3104.desc: "Прибыв ко двору, которым правит [karaag.GetName], я долго [Select_CString(ROOT.Char.IsFemale, 'ждала', 'ждал' )] в зале принца, пока, наконец, один из его глашатаев не сообщил мне, что ему сегодня нездоровится.\n\nЯвно не желая даже принимать меня, [karaag.GetFirstName] отказывается предоставить мне аудиенцию.\n\nОчевидно, он «слишком занят», чтобы найти время для коллеги по [Concept('balan_lai', 'Балан-лай')|E]..."
 lotr_thani_hazad.3104.a: "Мы должны надеяться, что он будет занят также сильно, когда дело дойдёт до следующего совета принцев."
 lotr_thani_hazad.3104.a.tt: "Вы должны решить, продолжать ли путешествие или вернуться в свою столицу."

 lotr_thani_hazad.3107.t: "Посещение принцев: Подозрительный принц"
 lotr_thani_hazad.3107.desc: "[arzathroc.GetName] удостоил меня аудиенции и выслушал мою просьбу. Но пока я жду его ответа, я замечаю, что [Select_CString(ROOT.Char.IsFemale, 'застала', 'застал' )] его в плохом настроении. Мои худшие опасения подтверждаются, как только он дает мне свой ответ:\n\n«Союз двух членов [Concept('balan_lai', 'Балан-лай')|E], не так ли?» - он пристально смотрит на меня и продолжает: «Наши владения долгое время существовали в условиях идеального равновесия сил, а вы стремитесь разрушить его этим... этим союзом! Тонко завуалированная попытка склонить чашу весов в вашу пользу, и весьма существенная! Не так ли?»\n\nЯ не нахожу слов, не понимая, как он может даже рассматривать такие гнусные обвинения.\n\n«Я не могу этого допустить, [ROOT.Char.GetFirstName]», - заявляет он, разрушая мои надежды на успех."
 lotr_thani_hazad.3107.a: "Надеюсь, другие принцы будут более внимательны к моей цели..."
 lotr_thani_hazad.3107.a.tt: "Вы продолжите своё путешествие"

 lotr_thani_hazad.3108.t: "Посещение принцев: Военный склад ума"
 lotr_thani_hazad.3108.desc: "Когда я приближаюсь к цитадели [GetTitleByKey('d_holzoreth').GetNameNoTier], [daroc.GetName] принимает меня в окружении своих командиров, склонившись над какими-то картами. После того, как он отпустил их, я [Select_CString(ROOT.Char.IsFemale, 'объяснила', 'объяснил' )] ему свою цель, как вдруг он прервал меня:\n\n«Вы бы стали говорить о таких пустяках, когда на горизонте маячат угроза вторжения и войны?»\n\nОчевидно, что ни мои слова, ни мои эмоции не повлияют на его решение. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно подбирать слова, чтобы не разозлить его ещё больше. «Ваше бдение на северных границах обеспечивает безопасность всех нас, мой принц. Чтобы доказать, что я уважаю и восхищаюсь вашей нелегкой работой, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]...»\n\nДарок снова перебивает меня: «Что вы должны? Давать пустые обещания? Я больше не желаю отвлекаться от своих обязанностей, уходите сейчас же!» И вот так просто его стражники вывели меня из лагеря..."
 lotr_thani_hazad.3108.a: "Надеюсь, его обязанности также помешают ему присутствовать на следующем совете!"
 lotr_thani_hazad.3108.a.tt: "Вы должны решить, продолжать ли путешествие или вернуться в свою столицу."

 lotr_thani_hazad.3111.t: "Посещение принцев: Младший член Балан-лай"
 lotr_thani_hazad.3111.desc: "[GetTitleByKey('d_gimileth').GetName] - это земля, которая, как говорят, очень близка к [Concept('avari', 'авари')|E] из леса [GetTitleByKey('k_drel').GetNameNoTier] - хотя многие сомневаются, что такое королевство действительно всё ещё существует. Те немногие путешественники, которые осмеливаются пройти под вековыми деревьями большого леса вдоль южной границы Гимилета и которым удается вернуться, рассказывают о бесконечном лабиринте деревьев. И всё же я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] быть [Select_CString(ROOT.Char.IsFemale, 'сосредоточена', 'сосредоточен' )] на том, что будет дальше.\n\nСтоя в тронном зале Дэрая, я объясняю ему свою цель - заключить брак со своей второй половинкой, после чего молодой Дэрай, кажется, не в состоянии дать мне немедленный ответ, он явно пытается прийти к какому-то решению.\n\nВозможно, ещё несколькими удачными словами я [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] бы повлиять на результат..."
 lotr_thani_hazad.3111.a: "Позволь мне развеять все оставшиеся сомнения, [derei.GetFirstName], я [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )], чтобы-"
 lotr_thani_hazad.3111.a.tt: "Вас внезапно прерывает неожиданный посетитель"

 lotr_thani_hazad.3114.t: "Посещение принцев: Важное решение"
 lotr_thani_hazad.3114.desc: "Поскольку мои переговоры здесь завершены, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, хочу ли я продолжить своё путешествие или пока вернуться домой.\n\nНедалеко к северу находятся столицы двух самых северных принцев [Concept('balan_lai', 'Балан-лай')|E], правителей провинций [GetTitleByKey('d_inzilloni').GetName] и [GetTitleByKey('d_holzoreth').GetName].\n\nНо сейчас я [Select_CString(ROOT.Char.IsFemale, 'провела', 'провел' )] много дней вдали от своих владений, может быть, было бы разумнее вернуться домой и продолжить свои княжеские визиты позже?"
 lotr_thani_hazad.3114.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] двигаться дальше!"
 lotr_thani_hazad.3114.tt: "Вы продолжите своё путешествие и отправитесь на север."
 lotr_thani_hazad.3114.b: "А сейчас я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] вернуться в свои владения."
 lotr_thani_hazad.3114.b.tt: "Вы вернётесь домой. Вы можете продолжить путешествие позже."

 lotr_thani_hazad.3118.t: "Посещение принцев: [Select_CString(seregulsuccessor.IsFemale, 'Суровая правительница', 'Суровый правитель' )] Пэла"
 lotr_thani_hazad.3118.desc: "Направляясь в великий чертог [Select_CString(seregulsuccessor.IsFemale, 'правительницы', 'правителя' )] Пэла, я готовлюсь к предстоящему противостоянию.\n\n[Select_CString(seregulsuccessor.IsFemale, 'Гордую правительницу', 'Гордого правителя' )] провинции [GetTitleByKey('k_pel').GetName] будет нелегко склонить на мою сторону. [Select_CString(seregulsuccessor.IsFemale, 'Высокомерная властительница, она', 'Высокомерный властитель, он' )] считает себя выше других - даже выше многих членов [Concept('balan_lai', 'Балан-лай')|E].\n\n«О чём вы пришли просить меня, [ROOT.Char.GetFirstName]?»,- [Select_CString(seregulsuccessor.IsFemale, 'принцесса', 'принц' )] приветствует меня, когда я стою перед [Select_CString(seregulsuccessor.IsFemale, 'её', 'его' )] высоким троном. Я быстро объясняю причину своего присутствия здесь, но меня прерывают:\n\n«Я вижу!», - восклицает [seregulsuccessor.GetFirstName] с зловещим смехом. «Просто вы хотите объединить оба владения и получить больше власти, чем любой другой член [Concept('balan_lai', 'Балан-лай')|E]? Я этого не допущу! Пока я являюсь членом этого совета, ваш союз не получит моего благословения, запомните мои слова. А теперь убирайтесь с глаз моих долой!»\n\nЯ покидаю зал [Select_CString(seregulsuccessor.IsFemale, 'принцессы', 'принца' )], [Select_CString(ROOT.Char.IsFemale, 'недовольная и оскорблённая', 'недовольный и оскорблённый' )] [Select_CString(seregulsuccessor.IsFemale, 'её', 'его' )] резкими словами."
 lotr_thani_hazad.3118.a: "Похоже, это путешествие было напрасным."
 lotr_thani_hazad.3118.a.tt: "Вы вернётесь домой.\nВеликий совет начнётся через два месяца."

 ##### Azulzir's Travels Events #####


 lotr_thani_hazad.4000.t: "Под знамёнами бури"
 lotr_thani_hazad.4000.desc: "Наконец я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] в Адуназайн, главную гавань Ан-Балкумагана.\n\nЯ всю жизнь [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] об этом побережье в Миспире и [Select_CString(ROOT.Char.IsFemale, 'хранила', 'хранил' )] путевую книгу Сакалхада Зимрадунэ, который, будучи уроженцем этих земель, отзывался о них весьма высоко. Когда я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] над заливом башню, сияющую серебром и светлым электрумом, я [Select_CString(ROOT.Char.IsFemale, 'вообразила', 'вообразил' )], что анбалухорим — народ гордый и грозный, подобный западным владыкам. Но когда наш корабль вошёл под эти стены, а знамёна бури тяжело нависли над гаванью, я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что почти все мои представления были ложны.\n\nЕщё до того, как мы пришвартовались, на борт поднялись портовые служащие. Они говорили мало, но осмотрели всё. Я [Select_CString(ROOT.Char.IsFemale, 'назвала', 'назвал' )] своё имя и имя отца и [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] лишь то, что было необходимо. Когда они услышали, что я адунайского рода и из Миспира, их поведение изменилось, хотя и не слишком заметно. Моим слугам обыск пришёлся не по нраву, но я [Select_CString(ROOT.Char.IsFemale, 'осадила', 'осадил' )] их. Я [Select_CString(ROOT.Char.IsFemale, 'заплатила', 'заплатил' )] там, где ждали платы, и [Select_CString(ROOT.Char.IsFemale, 'была довольна', 'был доволен' )], что [Select_CString(ROOT.Char.IsFemale, 'сошла', 'сошёл' )] на берег, сохранив свой багаж при себе."
 lotr_thani_hazad.4000.a: "По крайней мере, я [Select_CString(ROOT.Char.IsFemale, 'сошла', 'сошёл' )] на берег [Select_CString(ROOT.Char.IsFemale, 'целой', 'целым' )]."
 lotr_thani_hazad.4000.a.tt: "Вы благополучно прибыли в гавань Ан-Балкумагана."


 lotr_thani_hazad.4001.t: "Пристань"
 lotr_thani_hazad.4001.desc: "Первое, что я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] на пристани, был рабочий невысокого роста, несомненно местный слуга из этих земель: его жестоко ударили кнутом по лицу за то, что он споткнулся под тяжестью ящика. Окровавленный, он пошатнулся, согнулся, получил ещё один удар, а затем без единого слова поднялся на ноги, снова взвалил ящик и пошёл дальше. Ни один прохожий не обратил на это внимания, даже не взглянул в сторону случившегося.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'отшатнулась', 'отшатнулся' )] от такой жестокости, и всё же это место не выглядит нищим. Гавань широка и полна товаров с разных берегов: кувшинов с вином, крашеных тканей, сосудов с маслом, резной слоновой кости, пряностей, леса и меди, потемневшей в трюмах. Богатства здесь в избытке, но его не выставляют напоказ, как в Миспире. Здесь его охраняют, считают, держат крепко и жадно.\n\nКогда мы поднялись от пристани, я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] солдат повсюду: у ворот, складов, таможенных домов и подходов к рынку. Речь вокруг меня была адунайской, но не моей, а простой люд поспешно отходил в сторону всякий раз, когда мимо проходили вооружённые люди."
 lotr_thani_hazad.4001.a: "Мне стоит внимательно присмотреться к этому месту."
 lotr_thani_hazad.4001.a.tt: "Вы изучаете гавань и её суровый порядок."


 lotr_thani_hazad.4002.t: "Моя первая ночь в гавани"
 lotr_thani_hazad.4002.desc: "После некоторой задержки мы нашли пристанище. Хозяин постоялого двора принял меня достаточно хорошо, когда моё положение стало ему ясно, хотя я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как он оценивает каждую застёжку, кольцо и сундук, проходившие через его двери. Он назвал высокую цену. Я [Select_CString(ROOT.Char.IsFemale, 'заплатила', 'заплатил' )].\n\nЗа ужином я [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )] больше, чем [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )]. Двое офицеров сидели во внутренней комнате с несколькими купцами. Они говорили о речной торговле, сборах, беспорядках во внутренних землях и каком-то деле о конфискации, которое их весьма забавляло. Раз или два я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], как они бросают взгляды в мою сторону.\n\nМне не раз говорили, что, если я желаю по-настоящему узнать Ан-Балкумаган, мне нужно отправиться вглубь страны. Возможно, так оно и есть. Но после времени, проведённого здесь, я одновременно [Select_CString(ROOT.Char.IsFemale, 'очарована', 'очарован' )] и [Select_CString(ROOT.Char.IsFemale, 'отвращена', 'отвращен' )] неприкрытой жестокостью этого места. Долгой ночью я размышляю о том, каким будет мое следующее назначение."
 lotr_thani_hazad.4002.a: "Я отплыву дальше, в Корлею."
 lotr_thani_hazad.4002.a.tt: "Вы продолжите своё путешествие на север вдоль кольца Белегаэра."
 lotr_thani_hazad.4002.b: "Мне стоит идти так далеко, как позволит судьба."
 lotr_thani_hazad.4002.b.tt: "Вы отправитесь на север, настолько далеко, насколько сможете."
 lotr_thani_hazad.4002.c: "Я останусь здесь на некоторое время и узнаю нравы этого места."
 lotr_thani_hazad.4002.c.tt: "Вы останетесь в гавани Ан-Балкумагана и понаблюдаете, прежде чем двинуться дальше."





 ##### Azulzir Travels: Arpel #####


 # 4010: Overland arrival into Arpel.
 lotr_thani_hazad.4010.t: "В стенах Арпэла"
 lotr_thani_hazad.4010.desc: "#Bold Три великие гавани есть на крайнем юге, и [GetTitleByKey('c_arpel').GetNameNoTier] ничуть не уступает другим.#!\n\nЯ спешиваюсь у внешней арки и иду среди толпы. Здесь женщины из [GetTitleByKey('k_koronande').GetNameNoTier] в шафрановых и индиговых одеждах, с медными браслетами до самых локтей, несут корзины с речной рыбой. Здесь мумаканские погонщики со своими медлительными, мудрыми зверями. Здесь сенганские купцы в светлом льне выкрикивают цены всякому, кто готов слушать. А плечом к плечу с ними, неторопливые и исполненные достоинства, идут люди этих самых земель — [GetTitleByKey('k_pel').GetNameNoTier], всех оттенков тёплого ореха, и нрав их так же тёпл. Среди них, укутанные в белое, движутся магрийцы и тумагрийцы, что в давние годы владели этими землями и были изгнаны, но всё ещё торгуют на её рынках так, будто никогда не уходили.\n\nВот чего я не [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )]: что женщины #ONCLICK:TITLE,k_pel #TOOLTIP:LANDED_TITLE,k_pel #L Пэла#!#!#! будут ходить столь свободно. У поясов они носят ключи и печати для счетных книг, а мужчины уступают им дорогу так же охотно, как любому купеческому принцу. Они торгуются, смеются, спорят о весе и мере, ведут сделки и трудятся без мужского дозволения и без супруга за плечом. В #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспире#!#!#! так работают лишь вдовы да бедняки; здесь же это просто рыночный час. [Concept('adunaic', 'Адунайский')|E] служит общим языком, но в их устах он древнее по звучанию и проще в гласных, а под ним течёт их собственная родная речь.\n\nМиспир, при всем его величии, никогда не показывал мне столько мира сразу. Мой кошель тяжёл, моя дорога долга, и хотя я сильно [Select_CString(ROOT.Char.IsFemale, 'взволнована', 'взволнован' )] всеми этими зрелищами, столь близкими и столь далёкими от дома, мне нужно осторожно решить, как провести этот первый день."
 lotr_thani_hazad.4010.a: "Я запасусь как следует, прежде чем идти дальше."
 lotr_thani_hazad.4010.a.tt: "Вы покупаете лучшее, что могут предложить рынки города [GetTitleByKey('c_arpel').GetNameNoTier]: копчёную рыбу, сушёные фрукты, твёрдый хлеб, сладкое южное вино. Вы получаете #P прибавку к здоровью#! и запас #P провизии#! для дороги."
 lotr_thani_hazad.4010.b: "Мне нужно мыслить масштабно — целый корабль экзотических товаров!"
 lotr_thani_hazad.4010.b.tt: "Вы вкладываете значительную часть своего наследства в торговое предприятие, отправляющееся из города [GetTitleByKey('c_arpel').GetNameNoTier]."
 lotr_thani_hazad.4010.c: "Сегодня я лишь пройдусь по улицам и немного отдохну."
 lotr_thani_hazad.4010.c.tt: "Вы проводите день праздно, впитывая виды и звуки города [GetTitleByKey('c_arpel').GetNameNoTier]."


 # 4011: The arrest in the rich quarter.
 lotr_thani_hazad.4011.t: "Крик из расписанного дома" 
 lotr_thani_hazad.4011.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'поднялась', 'поднялся' )] в лучший квартал, где дома державы [GetTitleByKey('k_pel').GetNameNoTier] обращены внутрь, к тенистым дворам, а дверные проёмы по старому обычаю расписаны красной охрой и лазуритом. Здесь в своей гордости живут купеческие кланы, и [GetTitleByKey('c_arpel').GetNameNoTier] здесь тише всего.\n\nИ тут я слышу это: не обычный рыночный шум, а одинокий голос, поднятый в ярости. Из высоких ворот меньше чем в двадцати шагах впереди трое мужчин в темных кольчугах тащат за руки пожилого #L [GetTitleByKey('k_pel').GetAdjective|l]ого#! господина. Он одет для совета или какого-то торжественного случая: в длинное одеяние из выбеленного льна и тяжёлое медное ожерелье. Даже сейчас, спутанный и грубо схваченный, он держится как человек, непривычный к насилию у собственного порога.\n\nОн кричит, и в его голосе нет страха. Я не могу разобрать каждое слово, но слышу: «#italic — Совет! Он связан решением совета! —#!», — прежде чем солдат сильно бьёт его по губам, и слова превращаются лишь в кровь.\n\nНесколько прохожих остановились. Ещё больше идут дальше, не отрывая глаз от своих сандалий. Двери соседних домов, как я вижу, заперты изнутри."
 lotr_thani_hazad.4011.a: "Я подойду ближе. Я узнаю, что здесь происходит."
 lotr_thani_hazad.4011.a.tt: "Вы приблизитесь к месту стычки."
 lotr_thani_hazad.4011.b: "Нет. Это не моя страна и не моя ссора."
 lotr_thani_hazad.4011.b.tt: "Вы идёте дальше. Это дело вас не касается."


 # 4012: Investigate path - armed escort to Seregul's palace.
 lotr_thani_hazad.4012.t: "Нежданное приглашение"
 lotr_thani_hazad.4012.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил' )] своих спутников на углу: одинокий человек, расспрашивающий о соседской ссоре, может получить ответы там, где [Select_CString(ROOT.Char.IsFemale, 'молодая госпожа', 'молодой лорд' )] со своей свитой не добьётся ничего.\n\nЯ не [Select_CString(ROOT.Char.IsFemale, 'прошла', 'прошел' )] и двадцати шагов к расписным воротам, как поняла, что меня уже ждали.\n\nОни вышли со всех сторон разом и очень быстро: шестеро, в таких же тёмных кольчугах, как и те, кто тащил старика, со знаком офицера стражи города [GetTitleByKey('c_arpel').GetNameNoTier]. Их капитан, высокий мужчина, несомненно [Concept('adunaic', 'адунаец')|E] с #L [GetTitleByKey('k_pel').GetAdjective|l]#! матерью, судя по его облику, учтиво мне поклонился.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя госпожа', 'Мой господин' )] из #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспира#!#!#!, — сказал он. — Наш принц [seregul.GetFirstName] услышал о вашем прибытии и давно желал общества столь [Select_CString(ROOT.Char.IsFemale, 'знатной молодой путешественницы', 'знатного молодого путешественника' )]. Он приглашает вас сегодня вечером к своему столу. Капитан стражи станет вашим провожатым, чтобы вы не заблудились на наших улицах, которые после наступления темноты могут сбить с толку чужеземцев».\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что вопроса мне не задавали."
 lotr_thani_hazad.4012.a: "Я кланяюсь и принимаю то, от чего нельзя отказаться."
 lotr_thani_hazad.4012.a.tt: "Вас под вооружённой охраной проводят во дворец персонажа [seregul.GetFirstName]."


 # 4013: Don't-investigate path - the letter and the same invitation.
 lotr_thani_hazad.4013.t: "Письмо, вложенное мне в руку" 
 lotr_thani_hazad.4013.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'повернулась', 'повернулся' )] спиной к расписанному дому и [Select_CString(ROOT.Char.IsFemale, 'пошла', 'пошел' )] дальше, а крики остались позади и затихли.\n\nНо я не [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] пройти и двух улиц, как из тенистой колоннады ко мне вышел еще один человек. По одежде он был #L [GetTitleByKey('k_pel').GetAdjective|l]им#! горожанином, уже не молодой, но и не старый, очень бледный под темной кожей, тяжело дышащий и старающийся этого не показывать.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Госпожа', 'Господин' )]... [Select_CString(ROOT.Char.IsFemale, 'госпожа', 'господин' )] с севера... Я знаю ваше лицо, вы прибыли этим утром с прекрасной свитой, вы из [Concept('adunaic', 'адунайцев')|E], да? Прошу, выслушайте меня! Это вопрос жизни и смерти!»\n\nДальше он не успел. Через плечо я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )], как далеко внизу по улице двое кольчужников принца сворачивают за угол и ускоряют шаг. Мужчина увидел их в тот же миг, и остатки цвета сошли с его лица. Он резко прижал что-то к моей груди: тонкий сверток, дважды запечатанный, с воском, тёплым от жара его тела.\n\n«Для великой [Concept('tamska', 'тамски')|E] из державы [GetTitleByKey('e_mag_tumag').GetNameNoTier]. Умоляю вас... любой дорогой... только пусть оно попадёт ей в руки...»\n\nИ тут он исчез, растворившись в море лиц города [GetTitleByKey('c_arpel').GetNameNoTier] так, будто его никогда и не было. Свёрток всё ещё был тёплым под моей туникой, когда подошли солдаты.\n\nОни не обнажили против меня оружия. Возможно, они даже не видели того человека. Их капитан поклонился совершенно должным образом. «[Select_CString(ROOT.Char.IsFemale, 'Моя госпожа', 'Мой господин' )] [GetScriptedCharacterByHistoryID('lineofzaradancadet22').GetFirstName] из #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспира#!#!#!. Наш принц [seregul.GetFirstName] услышал о вашем прибытии и приглашает вас сегодня вечером к своему столу. Нас послали сопровождать вас: наши улицы после наступления темноты могут сбить чужеземцев с пути».\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'поклонилась', 'поклонился' )] в ответ. Я чувствовала воск свертка у своих ребер. Он был, как мне казалось, поистине очень тёплым."
 lotr_thani_hazad.4013.a: "Что ж, что ж. Похоже, я буду ужинать с принцем."
 lotr_thani_hazad.4013.a.tt: "Вас под вооружённой охраной проводят во дворец персонажа [seregul.GetFirstName], а тайное письмо всё ещё будет спрятано при вас. Да благоволит вам судьба."


 # 4014: Counter event - Seregul's perspective.
 lotr_thani_hazad.4014.t: "[Select_CString(azulzir.IsFemale, 'Щеголеватая гостья', 'Щеголеватый гость' )]"
 lotr_thani_hazad.4014.desc: "Мне донесли, что в [GetTitleByKey('c_arpel').GetNameNoTier] из #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспира#!#!#! [Select_CString(azulzir.IsFemale, 'прибыла какая-то юная богатая ничтожность', 'прибыл какой-то юный богатый ничтожество' )], соря золотом так, будто оно столь же обычно, как вода. [Select_CString(azulzir.IsFemale, 'Адунайка', 'Адунаец' )] из какого-то старинного дома, название которого я никогда не [Select_CString(ROOT.Char.IsFemale, 'трудилась', 'трудился' )] запомнить: [azulzir.GetFullName], [Select_CString(azulzir.IsFemale, 'дочь', 'сын' )] недавно умершего кого-то-там в Миспире, [Select_CString(azulzir.IsFemale, 'явившаяся', 'явившийся' )] на юг, по-видимому, посмотреть мир.\n\n[Select_CString(azulzir.IsFemale, 'Туристка', 'Турист' )]. Из всех возможных напастей — в моём #ONCLICK:TITLE,c_arpel #TOOLTIP:LANDED_TITLE,c_arpel #L Арпэле#!#!#! [Select_CString(azulzir.IsFemale, 'туристка', 'турист' )].\n\nЯ бы не [Select_CString(ROOT.Char.IsFemale, 'обратила', 'обратил' )] на [Select_CString(azulzir.IsFemale, 'нее', 'него' )] ни малейшего внимания, не сунь [Select_CString(azulzir.IsFemale, 'она', 'он' )] нос туда, куда не следовало. [Select_CString(azulzir.IsFemale, 'Её', 'Его' )] видели в консульском квартале тем самым утром, когда я [Select_CString(ROOT.Char.IsFemale, 'произвела', 'произвел' )] аресты. А вскоре после этого [Select_CString(azulzir.IsFemale, 'ее видели', 'его видели' )] за любезничаньем со шпионом! [Select_CString(azulzir.IsFemale, 'Щеголиха', 'Щеголь' )] с избытком денег и недостатком ума в обычные времена была бы лишь досадной помехой. Но времена нынче необычные, а Миспир давно уже смотрит на дела моей раздробленной державы глазами острее моих.\n\nБудь они все прокляты! [Select_CString(azulzir.IsFemale, 'Ее прислали', 'Его прислали' )]? [phorakon.GetFirstName] или, что хуже, [tamska.GetFirstName]? [Select_CString(azulzir.IsFemale, 'Готовая', 'Готовый' )] донести обо всех моих промахах здесь, чтобы они нашли повод наброситься? Или [Select_CString(azulzir.IsFemale, 'она', 'он' )] лишь то, чем кажется: [Select_CString(azulzir.IsFemale, 'богатая городская дурочка', 'богатый городской дурак' )], [Select_CString(azulzir.IsFemale, 'приехавшая', 'приехавший' )] поглазеть на провинциалов.\n\nЭто неважно. Так или иначе, сегодня вечером [Select_CString(azulzir.IsFemale, 'она окажется', 'он окажется' )] за моим столом, и я #italic узнаю#!, с какой целью [Select_CString(azulzir.IsFemale, 'она явилась', 'он явился' )] в мои владения!"
 lotr_thani_hazad.4014.a: "Привести [Select_CString(azulzir.IsFemale, 'её', 'его' )]. Посмотрим, что за рыба сама забрела в мои сети."


 # 4015: First Seregul conversation - "what are you doing here?"
 lotr_thani_hazad.4015.t: "За столом принца"
 lotr_thani_hazad.4015.desc: "Зал, в котором меня принимает [seregul.GetFirstName], построен в старом высоком [Concept('adunaic', 'адунайском')|E] стиле: длинный, мраморный, с кедровыми стропилами и окнами, расположенными так высоко, что ни один человек не может заглянуть внутрь или наружу без дозволения принца. На этот вечер он отослал почти весь свой двор. Здесь только принц во главе стола, двое его стражников, неподвижных у стены, молчаливый распорядитель и я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )].\n\nОн старше, чем казался мне на портретах в зале закона. Худой, голубоглазый, дорого одетый, с беспокойным ртом человека, который, несомненно, сотню раз репетирует ответы, прежде чем произнести их. Я [Select_CString(ROOT.Char.IsFemale, 'стояла', 'стоял' )] там, ожидая его дозволения. Он жестом указывает на кресло по правую руку от себя, как человек мог бы указать место собаке.\n\n«[azulzir.GetFirstNameNoTooltip] из #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспира#!#!#!, — говорит он, чуть переиначивая мое имя, словно пробуя его на вкус. — Добро пожаловать в мой бедный город. В наши дни мы видим так мало достойных гостей с севера. Дорога, как мне говорят, плоха. Страна, как мне говорят, неспокойна. И всё же вы здесь — [Select_CString(ROOT.Char.IsFemale, 'одна', 'один' )], по всем сведениям, если не считать нескольких слуг и этого славного толстого кошеля; а ваш отец, как мне сообщили, совсем недавно лег в могилу».\n\n«Скажите мне, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный господин' )]. Чего во всём широком мире представитель вашего дома может искать в #ONCLICK:TITLE,c_arpel #TOOLTIP:LANDED_TITLE,c_arpel #L Арпэле#!#!#!?»"
 lotr_thani_hazad.4015.a: "Я всего лишь [Select_CString(ROOT.Char.IsFemale, 'путешественница', 'путешественник' )]. Мир широк, и я хочу увидеть его."
 lotr_thani_hazad.4015.b: "Я [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришел' )] учиться у прославленного принца державы [GetTitleByKey('k_pel').GetName]."


 # 4016: Second Seregul conversation - what he actually wants.
 lotr_thani_hazad.4016.t: "Настоящий вопрос принца"
 lotr_thani_hazad.4016.desc: "Он наливает мне вина, которое стоило бы годового содержания меньшей виллы моего покойного отца. Я осторожно беру чашу и пью, пока он смотрит на меня, изучает меня. Затем, словно эта мысль только сейчас пришла ему в голову, он ставит свою чашу и чуть наклоняется вперёд.\n\n«Вы, конечно, бывали при дворе в #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспире#!#!#!. Скажите мне — и простите старому провинциальному князю его любопытство, — как [balan_lai|E] отзывается обо мне в эти дни?»\n\nУлыбка возвращается, лёгкая как перо. Но глаза — нет.\n\n«Они, я уверен, говорят о смуте в #ONCLICK:TITLE,k_pel #TOOLTIP:LANDED_TITLE,k_pel #L Пэле#!#!#!. Они наверняка уже сплели для вас сказку. Коренные жители неспокойны. Совет важничает. Принц #ONCLICK:TITLE,c_arpel #TOOLTIP:LANDED_TITLE,c_arpel #L Арпэла#!#!#! не может управиться с собственным домом. Так уж заведено, когда [phorakon.GetFirstName] скучает, а [tamska.GetFirstName] мнит себя [Select_CString(tamska.IsFemale, 'умницей', 'умником' )], и им нужен южный дурак, над которым можно посмеяться за вечерним вином».\n\nОн ненадолго оставляет эти слова висеть в воздухе. Затем говорит мягче:\n\n«[Select_CString(ROOT.Char.IsFemale, 'Молодая женщина', 'Молодой человек' )] со вкусом, возвращаясь в [GetTitleByKey('c_mispir').GetNameNoTier] после долгого и расширяющего кругозор путешествия, [Select_CString(ROOT.Char.IsFemale, 'будет услышана', 'будет услышан' )], знаете ли. [Select_CString(ROOT.Char.IsFemale, 'Её впечатления имели', 'Его впечатления имели' )] бы вес. [Select_CString(ROOT.Char.IsFemale, 'Она могла', 'Он мог' )] бы, по-своему, исправить это дело за столом у своего дяди или кузена. [Select_CString(ROOT.Char.IsFemale, 'Она могла', 'Он мог' )] бы рассказать им, что [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] собственными глазами: что дикари сами стали здесь тиранами, что Совет связан не древним обещанием, а древней злобой, и что принц #ONCLICK:TITLE,k_pel #TOOLTIP:LANDED_TITLE,k_pel #L Пэла#!#!#! один удерживает цивилизацию в своем кулаке против этой тёмной земли».\n\nОн снова улыбается. Он не совсем попросил. Он не совсем угрожал. Но солдаты у стены не сдвинулись ни на дюйм, а распорядитель так и не наполнил мою чашу."
 lotr_thani_hazad.4016.a: "Я расскажу любую историю, какую мой хозяин пожелает услышать."
 lotr_thani_hazad.4016.b: "Я плохо подхожу на роль рупора принца, мой господин. Я вижу лишь то, что показывают мне глаза."
 lotr_thani_hazad.4016.c: "И чего, мой принц, стоила бы вам такая услуга?"


 # 4017: Agreement outcome - the purse and the ring.
 lotr_thani_hazad.4017.t: "Задаток принца"
 lotr_thani_hazad.4017.desc: "«Мудрый ответ, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный господин' )]. Мудрость в столь незрелом возрасте — вещь более редкая, чем рубины, и стоит почти столько же».\n\nОн зовёт своего распорядителя, а затем подталкивает через кедровый стол тяжелый кошель, и рядом с ним — тонкое медное кольцо с печатью #ONCLICK:TITLE,c_arpel #TOOLTIP:LANDED_TITLE,c_arpel #L Арпэла#!#!#!.\n\n«Примите это как знак дружбы принца. Называйте это задатком, благодарностью — как пожелаете. С этой ночи у вас есть друг на юге, и его память, как вы убедитесь, столь же длинна, как его рука».\n\nЯ кланяюсь. Солдаты у стены без единого слова расступаются, и я выхожу под высокие звёзды города [GetTitleByKey('c_arpel').GetNameNoTier] с золотом, тяжело оттягивающим пояс, и княжеским знаком на руке, что кажется ещё тяжелее."
 lotr_thani_hazad.4017.a: "Я [Select_CString(ROOT.Char.IsFemale, 'обрела', 'обрёл' )] либо покровителя, либо должника…"
 lotr_thani_hazad.4017.a.tt: "...кто из них кто, покажет лишь время"


 # 4018: Refusal outcome - cold dismissal.
 lotr_thani_hazad.4018.t: "Холодная чаша"
 lotr_thani_hazad.4018.desc: "«Ах. #italic Вот это уже весьма разочаровывает»#!.\n\nЕго спокойное выражение так и не покинуло лица, но глаза... На миг я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] в них расчёт и тень убийственного намерения, но она, казалось, исчезла, когда весы в его голове пришли в равновесие.\n\n«Ступайте, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный господин' )]. Свободно ходите по моему городу, вкушайте мое гостеприимство. Пусть никто не скажет, что принц Пэла негостеприимен. Но поразмыслите в долгой дороге, что ждёт вас впереди, о том, как мало друзей может позволить себе потерять человек, столь далёкий от дома своего отца».\n\nЯ кланяюсь и ухожу. Когда я выхожу из зала, он кажется холоднее, чем был при моём входе, а горло необъяснимо пересохло."
 lotr_thani_hazad.4018.a: "Я [Select_CString(ROOT.Char.IsFemale, 'сохранила', 'сохранил' )] себя свободной от поводка…"
 lotr_thani_hazad.4018.a.tt: "...но вы обрели в лице персонажа [seregul.GetFirstName] #N врага#!, а его власть на крайнем юге не так уж мала."


 # 4019: Haggle fails - Seregul takes mortal offence.
 lotr_thani_hazad.4019.t: "Один вопрос сверх меры"
 lotr_thani_hazad.4019.desc: "«Цену, говорите. #italic Цену»#!.\n\nОн ставит чашу на стол с медленной, нарочитой осторожностью, от которой почему-то хуже, чем если бы он швырнул её в стену. Теперь улыбка исчезла окончательно.\n\n«Скажите мне, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный господин' )], — дом вашего отца учил вас взвешивать княжескую милость так же, как торговец рыбой взвешивает свой улов? Я считал вас [Select_CString(ROOT.Char.IsFemale, 'зеленой', 'зеленым' )]. Теперь вижу, что вы просто #italic мелочны#!. Ступайте. Забирайте с собой свою дерзость и молитесь, чтобы вы покинули мой город прежде, чем я запомню ваше лицо».\n\nЯ скованно кланяюсь. Солдаты у ворот далеко не так учтивы, как те, что привели меня сюда."
 lotr_thani_hazad.4019.a: "Я [Select_CString(ROOT.Char.IsFemale, 'оскорбила', 'оскорбил' )] его, и не думаю, что он из тех, кто забывает такое."
 lotr_thani_hazad.4019.a.tt: "Ваш расчетливый подход нанес тяжкое оскорбление. [seregul.GetFirstName] теперь ваш #N заклятый враг#!, и у вас нет ни его золота, ни его расположения."


 # 4020: Haggle succeeds - Seregul is impressed.
 lotr_thani_hazad.4020.t: "Услуга за услугу"
 lotr_thani_hazad.4020.desc: "«#italic Ха!#! Вот теперь наконец говорит [Select_CString(ROOT.Char.IsFemale, 'дочь', 'сын' )] #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспира#!#!#!. Я уже начал опасаться, что там, на севере, вас в последнее время всех растят мягкотелыми».\n\nОн жестом подзывает распорядителя, требуя кошель тяжелее того, что прежде держал в мыслях.\n\n«Тогда цена, достойная языка, который я покупаю. Достаточно золота, чтобы вы еще долгие годы держались в достойном обществе, и моя... благосклонность в придачу; она откроет на крайнем юге больше дверей, чем одно лишь золото. Мы договорились, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный господин' )]?»\n\nЯ кланяюсь и понимаю, что теперь [Select_CString(ROOT.Char.IsFemale, 'сама улыбаюсь', 'сам улыбаюсь' )]. Мы договорились."
 lotr_thani_hazad.4020.a: "Мы договорились. И, думаю, я вдобавок [Select_CString(ROOT.Char.IsFemale, 'заслужила', 'заслужил' )] его уважение."
 lotr_thani_hazad.4020.a.tt: "Вы получаете #P очень большую сумму золота#! и #P благосклонность#! персонажа [seregul.GetFirstName]. Вы обязаны принцу, но заключили более выгодную сделку."


 # 4021: The map by lamplight - choosing the next road.
 lotr_thani_hazad.4021.t: "Воды"
 lotr_thani_hazad.4021.desc: "Дело с принцем, к добру или к худу, осталось позади. На столе в моей комнате разложена куча карт и том о землях, составленный купцом-путешественником Урезегаром Балари. За окном гавань темна; лишь солдаты и их фонари освещают огромную пристань и край Харагаэра за ней. Я никогда прежде не [Select_CString(ROOT.Char.IsFemale, 'замечала', 'замечал' )], как выглядят волны ночью. Под безлунным небом море светится странными клубящимися массами и на гребнях волн. Уже теперь эти диковинные зрелища встречают меня, хотя я всё ещё так близко к дому; мне едва удаётся представить, насколько странными будут виды, когда я отважусь выйти к землям, для которых у меня нет ни названий, ни карт, ни книг, ни историй. Эта мысль заставляет меня вновь обдумать дорогу впереди. Я [Select_CString(ROOT.Char.IsFemale, 'окунула', 'окунул' )] пальцы ног в воду, и теперь должна решить, нырнуть ли сразу в глубину или, быть может, еще немного остаться у спокойного берега."
 lotr_thani_hazad.4021.a: "Мне стоит сделать шаг дальше и отправиться на восток!"
 lotr_thani_hazad.4021.b: "Я буду гнаться за солнцем до самого края горизонта!"
 lotr_thani_hazad.4021.c: "Я ещё немного наслажусь городом [GetTitleByKey('c_arpel').GetNameNoTier]. Спешить незачем."
 lotr_thani_hazad.4021.a.tt: "Вы отправитесь в Маг и Тумаг, земли тамски, ко второй из великих гаваней Харагаэре."
 lotr_thani_hazad.4021.b.tt: "Вы отправитесь на восток, к самому горизонту, а затем ещё дальше."
 lotr_thani_hazad.4021.c.tt: "Вы решаете ненадолго задержаться. Остаётся лишь надеяться, что вы не попадете в сети интриг персонажа [seregul.GetFirstName]."

 ##### Balan-lai mechanic events #####
 lotr_thani_hazad.9001.t: "Унаследование власти"
 lotr_thani_hazad.9001.desc: "Я только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] весть о том, что [Select_CString(former_member.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMeShort', former_member )] [former_member.GetFirstName] [Select_CString(former_member.IsFemale, 'отошла', 'отошёл' )] в мир иной, когда приходит письмо, несущее печать [Concept('balan_lai', 'Балан-лай')|E]. Новость была одновременно мрачной и важной: я [Select_CString(ROOT.Char.IsFemale, 'унаследовала', 'унаследовал' )] [Select_CString(former_member.IsFemale, 'её', 'его' )] место в Совете. Мои мысли были заняты тяжестью новой ответственности, пока я [Select_CString(ROOT.Char.IsFemale, 'готовилась', 'готовился' )] к церемонии.\n\nЦеремония - это торжественное мероприятие, пропитанное традициями и почтением. Воздух насыщен ароматом благовоний, когда я стою перед Советом, их взгляды устремлены на меня. Твёрдой рукой, [balan_lai_leader.GetTitledFirstName] передаёт мне брошь в виде головы льва, золотая грива которого сверкает в свете свечей. Эта брошь - символ власти и единства принцев, и теперь она приколота к моему сердцу.\n\nЯ чувствую тяжесть своей новой ответственности, взгляды наших предков устремлены на меня, а мой голос, твёрдый и решительный, эхом разносится по залу..."
 lotr_thani_hazad.9001.a: "«Я клянусь защищать честь и долг нашего народа»."

 lotr_thani_hazad.9002.t: "Унаследование власти"
 lotr_thani_hazad.9002.desc: "Я только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] тяжёлую весть о том, что [Select_CString(former_member.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMeShort', former_member )] [former_member.GetFirstName] [Select_CString(former_member.IsFemale, 'отошла', 'отошёл' )] в мир иной, но вскоре за ней последовала ещё одна новость, которое имеет глубокие последствия для моего будущего. Я не только [Select_CString(ROOT.Char.IsFemale, 'унаследовала', 'унаследовал' )] [Select_CString(former_member.IsFemale, 'её', 'его' )] место в [Concept('balan_lai', 'Балан-лай')|E], но также [Select_CString(ROOT.Char.IsFemale, 'была избрана', 'был избран' )] главой Совета. Тяжесть этой двойной ответственности окутала меня подобно густому туману, смешивая печаль с всепоглощающим чувством долга.\n\nЦеремония состоялась в зале Великого совета, богатом историей и традициями. Когда я [Select_CString(ROOT.Char.IsFemale, 'приблизилась', 'приблизился' )] к возвышению, другие принцы наблюдали за мной с торжественным почтением, признавая оказанную мне честь. Они по очереди повторяли древние обряды и смазывали мне лоб ароматическими маслами, и в каждом обряде звучали отголоски наших предков.\n\nВ кульминационный момент церемонии церемониймейстер вручил мне брошь в виде головы льва, золотая грива которого сверкала в свете тысячи факелов. Эта брошь - символ власти и единства принцев, и теперь она приколота к моему сердцу. Глядя на собравшихся, я молча обещаю чтить память, что [Select_CString(former_member.IsFemale, 'оставила', 'оставил' )] после себя [ROOT.Char.Custom2('RelationToMeShort', former_member )], и руководить Балан-лай с непоколебимой преданностью, мудростью и силой."
 lotr_thani_hazad.9002.a: "«Я клянусь защищать честь и долг нашего народа»."

 lotr_thani_hazad.9003.t.leader: "Новый глава Совета"
 lotr_thani_hazad.9003.t.nonleader: "Новый член Совета"
 lotr_thani_hazad.9003.desc: "Зал Великого совета [Concept('balan_lai', 'Балан-лай')|E] был наполнен тихим ожиданием, когда мы собрались на очередную церемонию вступления в должность. [former_member.GetName] [Select_CString(former_member.IsFemale, 'отошла', 'отошёл' )] в мир иной, оставив пустоту в Совете, но сегодня [new_member.GetFirstName], [Select_CString(new_member.IsFemale, 'та', 'тот' )], кто заменит [Select_CString(former_member.IsFemale, 'её', 'его' )], принимает от нас приветствия.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'наблюдала', 'наблюдал' )], как [new_member.GetFirstNameNoTooltip] [Select_CString(new_member.IsFemale, 'подошла', 'подошёл' )] к возвышению, [Select_CString(new_member.IsFemale, 'её', 'его' )] шаги были размеренными, а взгляд - решительным. Церемониймейстер произнес нараспев древние обряды, каждое слово напоминало о нашем общем наследии и ответственности, которая с ним связана. Присутствие других принцев вокруг меня было ощутимым; мы все понимали важность этого момента не только для [Select_CString(new_member.IsFemale, 'неё', 'него' )], но и для Совета в целом.\n\n"
 lotr_thani_hazad.9003.desc_leader: "Глядя на нашего нового лидера, я [Select_CString(ROOT.Char.IsFemale, 'испытывала', 'испытывал' )] смесь уважения и надежды. Это был момент обновления, шанс укрепить наше единство и с новой решимостью взглянуть в будущее. В молчании я [Select_CString(ROOT.Char.IsFemale, 'присоединилась', 'присоединился' )] к остальным, дав обет поддерживать традиции и обязанности Балан-лай."
 lotr_thani_hazad.9003.desc_nonleader: "[Select_CString(new_member.IsFemale, 'Эта новая участница', 'Этот новый участник' )] привнесёт свежую кровь и новые перспективы в Балан-лай. Вместе мы продолжим защищать наше наследие и с непоколебимой решимостью противостоять предстоящим вызовам."
 lotr_thani_hazad.9003.a: "Пусть [Select_CString(new_member.IsFemale, 'она', 'он' )] исполнит свой долг!"

 lotr_thani_hazad.9010.t: "Прошение о вступлении в Совет"
 lotr_thani_hazad.9010.desc: "Сегодня передо мной предстал вопрос огромной важности: [potential_joiner.GetName] [Select_CString(potential_joiner.IsFemale, 'подала', 'подал' )] прошение, стремясь присоединиться к [Concept('balan_lai', 'Балан-лай')|E]. Как члена этого уважаемого Совета, меня спросили, хочу ли я воспользоваться своим правом наложить вето на [Select_CString(potential_joiner.IsFemale, 'её', 'его' )] вступление. Тяжесть этого решения лежит на мне, поскольку я знаю, что оно окажет существенное влияние на наши будущие обсуждения и баланс сил в Совете.\n\nРазмышляя о том, что из себя представляет [potential_joiner.GetFirstNameNoTooltip] и [Select_CString(potential_joiner.IsFemale, 'её', 'его' )] прошлых деяниях, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно взвесить, укрепит ли [Select_CString(potential_joiner.IsFemale, 'её', 'его' )] включение наши ряды или посеет раздор между нами. К этому выбору не следует относиться легкомысленно, поскольку он будет определять саму основу единства и эффективности нашего совета.\n\nРазмышляя, я остро осознаю доверие, оказанное мне моими коллегами, и ответственность, которую я несу за поддержание принципов и целостности Балан-лай."
 lotr_thani_hazad.9010.a: "[potential_joiner.GetNameNoTooltip] станет прекрасным дополнением к Совету!"
 lotr_thani_hazad.9010.b: "Только через мой труп. Я воспользуюсь своим правом вето..."

 lotr_thani_hazad.9011.t: "Свежеиспечённый член Балан-лай"
 lotr_thani_hazad.9011.desc: "Пришло письмо с печатью [Concept('balan_lai', 'Балан-лай')|E], и моё сердце подпрыгнуло, когда я [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал' )] слова: моё прошение было принято. Я [Select_CString(ROOT.Char.IsFemale, 'была принята', 'был принят' )] в качестве нового члена Совета. Предвкушение этого момента занимало мои мысли в течение нескольких недель, и вот он, наконец, настал. Торжественная церемония вступления в должность должна стать моим официальным вступлением в ряды уважаемых Балан-лай.\n\nЦеремония проходила в большом зале Совета, древние стены которого отдавались эхом под тяжестью традиций. Пока я [Select_CString(ROOT.Char.IsFemale, 'шла', 'шёл' )] к возвышению, другие члены совета наблюдали за мной с торжественным одобрением.\n\nВ кульминационный момент церемонии церемониймейстер вручил мне брошь в виде головы льва, золотая грива которого сверкала в свете факелов. Когда брошь была приколота к моей груди, меня охватило чувство гордости и долга. Этот символ моей новой должности ознаменовал начало важного пути. Я [Select_CString(ROOT.Char.IsFemale, 'стояла', 'стоял' )] перед собравшимися, [Select_CString(ROOT.Char.IsFemale, 'готовая', 'готовый' )] чтить традиции Балан-лай и внести свой вклад в его непреходящее наследие."
 lotr_thani_hazad.9011.a: "«Я клянусь защищать честь и долг нашего народа»."

 lotr_thani_hazad.9012.t: "Свежеиспечённый член Балан-лай"
 lotr_thani_hazad.9012.desc: "Сегодня я [Select_CString(ROOT.Char.IsFemale, 'имела', 'имел' )] честь наблюдать за тем, как [potential_joiner.GetFirstName] [Select_CString(potential_joiner.IsFemale, 'принесла', 'принёс' )] клятвы в качестве нового члена [Concept('balan_lai', 'Балан-лай')|E]. Церемония была одновременно торжественной и вдохновляющей, и завершилась тем, что церемониймейстер передал [Select_CString(potential_joiner.IsFemale, 'ей', 'ему' )] брошь в виде головы льва.\n\nТо, что [potential_joiner.GetFirstNameNoTooltip] [Select_CString(potential_joiner.IsFemale, 'была принята', 'был принят' )] в состав Совета, обещает оживить наши дебаты и укрепить наши ряды, укрепив нашу приверженность сохранению наследия и обязанностей Балан-лай."
 lotr_thani_hazad.9012.a: "Совет растёт..."

 lotr_thani_hazad.9013.t: "Прошение отклонено"
 lotr_thani_hazad.9013.desc: "Пришло письмо с печатью [Concept('balan_lai', 'Балан-лай')|E], но когда я [Select_CString(ROOT.Char.IsFemale, 'прочитала', 'прочитал' )] его содержание, у меня упало сердце. [vetoing_member.GetName] [Select_CString(vetoing_member.IsFemale, 'наложила', 'наложил' )] вето на моё прошение, и мне придётся ждать ещё десять лет, прежде чем я смогу снова обратиться к Совету. Во мне нарастают разочарование и досада; я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] так [Select_CString(ROOT.Char.IsFemale, 'близка', 'близок' )] к тому, чтобы вступить в их ряды, и только для того, чтобы мне помешал один-единственный несогласный голос!\n\nВето, что [Select_CString(vetoing_member.IsFemale, 'наложила', 'наложил' )] [vetoing_member.GetFirstNameNoTooltip], было воспринято как личное оскорбление, как препятствие, возникшее передо мной как раз в тот момент, когда я [Select_CString(ROOT.Char.IsFemale, 'была готова', 'был готов' )] внести свой вклад в развитие Совета. Тяжесть этой неудачи огромна, и перспектива ждать целое десятилетие кажется почти невыносимой.\n\nНесмотря на разочарование, я знаю, что [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] сохранять решимость. Это неудача, а не поражение. В течение следующих десяти лет я продолжу доказывать свою состоятельность и преданность делу, гарантируя, что, когда придёт время подавать прошение ещё раз, моя правота будет неоспоримой!"
 lotr_thani_hazad.9013.a: "Будь ты [Select_CString(vetoing_member.IsFemale, 'проклята', 'проклят' )], [vetoing_member.GetFirstNameNoTooltip]!"

 lotr_thani_hazad.9014.t: "Прошение отклонено"
 lotr_thani_hazad.9014.desc: "Сегодня я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие о том, что [vetoing_member.GetName] [Select_CString(vetoing_member.IsFemale, 'наложила', 'наложил' )] вето на прошение, что [Select_CString(potential_joiner.IsFemale, 'подала', 'подал' )] [potential_joiner.GetName] о вступлении в Балан-лай.\n\nХотя это решение означает, что [potential_joiner.GetFirstNameNoTooltip] [Select_CString(potential_joiner.IsFemale, 'должна', 'должен' )] будет подождать ещё десять лет, прежде чем снова подать прошение, оно подчёркивает важность и сложность процессов, проводимых нашим советом.\n\n[vetoing_member.GetFirstNameNoTooltip] своим выбором отражает тщательное рассмотрение, которое мы все должны уделить каждому потенциальному члену, гарантируя сохранение целостности и единства Балан-лай."
 lotr_thani_hazad.9014.a: "Досадно, но всё же достойно уважения."