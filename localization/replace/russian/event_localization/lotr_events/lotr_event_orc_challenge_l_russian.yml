l_russian:


 orc_challenge.0001.t: "Борьба за власть"
 orc_challenge.0001.desc: "[Select_CString(ROOT.Char.IsFemale, 'Вооружённая', 'Вооружённый' )] решимостью, с мечом в руке, я направляюсь в покои [Select_CString(chief.IsFemale, 'своей госпожи', 'своего господина' )] во владении [duel_location.GetBaseNameNoTierNoTooltip]. Распахнув дверь, я вижу, что [chief.GetTitledFirstName] находится в окружении отряда орков, каждый из которых закован в тяжёлую чёрную броню, и у каждого с пояса свисают острые и сверкающие мечи. С глухим рыком они все поворачиваются ко мне.\n\n#emphasis «[chief.GetTitledFirstName], я [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )] за тобой! Пора кончать с твоим правлением. Я вызываю тебя на поединок, не на жизнь, а на смерть, [ROOT.GetCharacter.GetFaith.HighGodName] мне свидетель...»#!"
 orc_challenge.0001.a: "#EMP Вызов брошен!#!"
 orc_challenge.0001.a.tt: "[chief.GetFirstName] [Select_CString(chief.IsFemale, 'обязана', 'обязан' )] встретиться со мной лицом к лицу."

 orc_challenge.0002.t: "Борьба за власть"
 orc_challenge.0002.desc: "Я беседую со своими командирами о старых сражениях, когда разъярённая фигура выходит из тени и входит в мои покои.\n\nКогда [pretender.GetSheHe] приближается, я понимаю, что это [pretender.GetTitledFirstName]. [pretender.GetSheHe|U] вонзает свой меч в землю и выкрикивает:\n\n#emphasis «[chief.GetTitledFirstName], я [Select_CString(pretender.IsFemale, 'пришла', 'пришёл' )] за тобой! Пора кончать с твоим правлением. Я вызываю тебя на смертельный поединок, как велит [ROOT.GetCharacter.GetFaith.HighGodName]».#!\n\nВзгляды всех присутствующих устремляются ко мне, словно кинжалы. Вызов брошен и мне придётся дать ответ..."

 orc_challenge.0002.a: "Я принимаю вызов!"
 orc_challenge.0002.a.tt: "Вы принимаете вызов на смертельный поединок."
 orc_challenge.0002.b: "Я принимаю вызов, но оружие выберу я..."
 orc_challenge.0002.b.tt: "Вы собираетесь смазать ядом рукоять оружия вашего противника."
 orc_challenge.0002.c: "Я принимаю вызов, смотри как бы завтра не пришлось пожалеть..."
 orc_challenge.0002.c.tt: "Вы планируете откупиться от противника."
 orc_challenge.0002.d: "Уберите эту падаль с глаз моих долой!"
 orc_challenge.0002.d.tt: "Вы отклоняете вызов."

 orc_challenge.0003.t: "Щедрое предложение"
 orc_challenge.0003.desc: "[chief.GetFirstName] принимает вызов и предлагает сойтись в бою в бойцовской яме на следующий день. Я чувствую запах страха и быстро с [Select_CString(chief.IsFemale, 'ней', 'ним' )] расправлюсь. Предвкушая кровавое утро, я собираюсь лечь спать.\n\nИ всё же, когда я возвращаюсь в спои покои и точу меч, в мои двери стучится посланник:\n\n«[Select_CString(ROOT.Char.IsFemale, 'Госпожа', 'Господин' )], [chief.GetTitledFirstName] посылает вам этот щедрый дар и просит пересмотреть своё решение о поединке. Ещё не слишком поздно остановить это безумие...»\n\nОн бросает мне мешочек, я хватаю его и открываю, обнаруживая мерцающее золото и серебро. От его блеска у меня слюнки текут! Но достаточно ли этого, чтобы заставить меня отступить, как какую-нибудь старую беззубую дворнягу?"
 orc_challenge.0003.a: "[Select_CString(chief.IsFemale, 'Эта проклятая трусиха', 'Этот проклятый трус' )] завтра умрёт, я позабочусь об этом!"
 orc_challenge.0003.a.tt: "Вы отказываетесь от подкупа."
 orc_challenge.0003.b: "Возможно, я немного [Select_CString(ROOT.Char.IsFemale, 'погорячилась', 'погорячился' )]..."
 orc_challenge.0003.b.tt: "Вы принимаете дары и отказываетесь от своего вызова."
 orc_challenge.0003.bribe_accepted.t: "Дар принят"

 orc_challenge.0004.t: "Грязный трус"
 orc_challenge.0004.desc: "Словно жалкий щенок варга [chief.GetTitledFirstName] выгоняет меня из своих покоев. [chief.GetHerHis|U] трусость превзошла все мои ожидания!\n\nНесмотря на это, моё неповиновение не прошло даром, ведь теперь всем известно: [chief.GetFirstName] [Select_CString(chief.IsFemale, 'слаба', 'слаб' )], и пройдёт совсем немного времени, прежде чем мы восстанем против [Select_CString(chief.IsFemale, 'неё', 'него' )]."
 orc_challenge.0004.a: "[chief.GetHerHis] время на исходе, война надвигается на н[chief.GetHerHis]."
 orc_challenge.0004.a.tt: "Вызов отклонён."

 orc_challenge.0005.t: "Мантия лидерства"
 orc_challenge.0005.desc.a: "[sc_loser.GetTitledFirstName] падает на землю, [Select_CString(sc_loser.IsFemale, 'её', 'его' )] чёрная кровь покрыла меня. Мухи уже собираются, что отложить личинки в труп. У этой мрази не было ни шанса против меня. Пусть каждый, кто думает, что сможет одержать верх надо мной, запомнит этот день. Они закончат так же, как [sc_loser.GetTitledFirstName]! Больше некому оспаривать мои земли и титулы.\n\nМои вассалы видели мой гнев и признали мою силу.\n\nМне удалось упрочить хватку над своими землями на годы вперёд."
 orc_challenge.0005.desc.b:0 "[sc_loser.GetTitledFirstName] гниёт на земле, [Select_CString(sc_loser.IsFemale, 'её', 'его' )] чёрная кровь покрыла меня. Все богатства и земли этой недостойной шавки теперь принадлежат мне!\n\nТеперь [chief.GetHerHis] вассалы приняли мою власть и признали мою силу. Пусть каждый, кто осмелится бросить мне вызов, вспомнит, как мне удалось добиться своего положения - через [chief.GetHerHis] хладный труп.\n\nПусть все вокруг знают, что [Select_CString(ROOT.Char.IsFemale, 'появилась новая предводительница', 'появился новый вождь' )], и я заберу всё, что мне причитается!"
 orc_challenge.0005.a: "Править будет [Select_CString(ROOT.Char.IsFemale, 'сильнейшая', 'сильнейший' )]!"
 orc_challenge.0005.a.tt: "Я одерживаю верх в смертельной схватке."