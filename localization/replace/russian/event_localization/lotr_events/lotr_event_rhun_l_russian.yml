 rhun.0100.t: "Поход рыцарей-драконов"
 rhun.0100.desc: "Орден Чёрного дракона долгое время был могущественной силой среди истерлингов, удерживая дикое приграничье под контролем и вселяя страх в сердца наших врагов. Теперь рыцари-драконы готовы выступить вперёд и защитить наши земли от любого, кто может им угрожать!\n\nРыцари-драконы - это грозная сила, обученная искусству ведения конного боя и оснащённая лучшим оружием и доспехами. Они беззаветно преданы своему делу и не остановятся ни перед чем, чтобы защитить свою родину. И как их новый лидер, я не успокоюсь, пока эти земли не станут безопасными для всех, кто называет их своим домом.\n\nТеперь, когда рыцари-драконы готовы к войне, мы сможем дать отпор любым захватчикам и обезопасить наши границы. Мы также сможем расширить наше влияние и торговать с соседними регионами, принося процветание нашему народу. Будущее истерлингов выглядит светлым, и я горжусь тем, что веду рыцарей-драконов в бой!"
 rhun.0100.a: "За Чёрного дракона!"