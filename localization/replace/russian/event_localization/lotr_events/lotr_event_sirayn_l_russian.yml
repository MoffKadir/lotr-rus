l_russian:

 sirayn.0001.t: "Выбор надзирателей"
 sirayn.0001.desc: "Моё господство над #ONCLICK:TITLE,e_sirayn #TOOLTIP:LANDED_TITLE,e_sirayn #L Сирайном#!#!#! практически абсолютно. От засушливых высокогорий [Concept('yellowmountains', 'Жёлтых гор')|E] до влажных джунглей [GetTitleByKey('d_sara_bask').GetNameNoTier], все преклоняются перед [Concept('khorahil', 'Хорахилом')|E], Пятым из Девяти. Поскольку мои взгляды обращены к новым фронтам, я понимаю, что, если я хочу одержать победу за рубежом, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] полагаться на лояльных надсмотрщиков, которые удержат местных в узде.\n\nОчевидным выбором являются #L [GetCultureByKey('bulgan').GetCollectiveNoun|l]ие#! кланы западных гор. Их кровожадность и фанатичная преданность сыграли важную роль в поддержании мира в Сирайне на протяжении последних столетий. Есть также [Concept('adunai', 'адунайцы')|E] из [Concept('anbalkumagan', 'Ан-Балкумагана')|E] и #ONCLICK:TITLE,k_tanturak #TOOLTIP:LANDED_TITLE,k_tanturak #L Тантурака#!#!#!, некогда мои родичи, навеки преданные Тёмному властелину. Несмотря на, возможно, чрезмерную изобретательность в своих методах, они преуспели в извлечении богатств из более мелких племён Крайнего Юга и охотно идут добровольцами в мои войска. Конечно, можно было бы полностью отказаться от использования людей. Хотя [Concept('orcs', 'орки')|E] плохие управленцы, они - оружие, которое мой хозяин использует снова и снова."
 sirayn.0001.a: "Булганцы будут вознаграждены за свою преданность."
 sirayn.0001.b: "Разослать весть всем адунайцам юга - слава и удача ждут вас на службе у Хорахиля."
 sirayn.0001.b.tt: "Тантураку не оказана помощь"
 sirayn.0001.c: "Высвободить орков. Пусть Сирайн сгорит."
 sirayn.0001.c.tt: "В Жёлтые горы не проводилось проникновение"
 sirayn.0001.a.effect: "Все подконтрольные [Concept('counties', 'графства')|E] в #L [GetTitleByKey('e_sirayn').GetNameNoTier]е#! получат модификатор [GetModifier( 'khorahil_bulgan_overseers_county_modifier' ).GetNameWithTooltip] на 50 лет."
 sirayn.0001.b.effect: "Все подконтрольные [Concept('counties', 'графства')|E] в #L [GetTitleByKey('e_sirayn').GetNameNoTier]е#! получат модификатор [GetModifier( 'khorahil_black_numenorean_overseers_county_modifier' ).GetNameWithTooltip] на 50 лет."
 sirayn.0001.c.effect1: "Отнять все [Concept('counties', 'графства')|E], принадлежащие [Concept('vassals', 'вассалам')|E], не являющимися [Concept('orc', 'орками')|E], в #L [GetTitleByKey('e_sirayn').GetNameNoTier]е#! и заменить их орками."
 sirayn.0001.c.effect2: "Все отнятые [Concept('counties', 'графства')|E] получат модификатор [GetModifier( 'orc_enslavement_free_folk_county_modifier' ).GetNameWithTooltip] на 20 лет."
 sirayn.0001.c.effect3: "С 20% вероятностью отнятые [Concept('counties', 'графства')|E] обратятся в местную [Concept('orc', 'орочью')|E] [Concept('culture', 'культуру')|E] и [Concept('faith', 'конфессию')|E]."

 sirayn.0002.t: "Вера их повелителя"
 sirayn.0002.desc: "Жители этих земель поклоняются мириадам богов, объединяясь в бесчисленные мелкие культы, чтобы совершать свои примитивные обряды.\n\nХотя это и жалко по сравнению с #ONCLICK:FAITH,lidless_eye #TOOLTIP:FAITH,lidless_eye культом Всевидящего ока#!#!, [Concept('darklord', 'Тёмный властелин')|E] хорошо знает, что вера - это мощный инструмент контроля. Действительно, [GetFaithByKey('faith_taimaraud').GetAdjective|l] - это моё собственное изобретение, созданное на основе примитивных суеверий и превращённое в смертоносное оружие.\n\nХотя Таймарод сослужил мне хорошую службу, возможно, мне следует более тесно сотрудничать с моей новой избранной кастой."
 sirayn.0002.a: "Я стану [Select_CString(ROOT.Char.IsFemale, 'вестницей', 'вестником' )] Ширы."
 sirayn.0002.b: "Я буду кулаком Зигура."
 sirayn.0002.c: "Я возвеличу Батан ан-Афан."
 sirayn.0002.d: "[Concept('orcs', 'Орки')|E] должны почитать меня."
 sirayn.0002.e: "Культ Таймарода ещё может пригодиться."
 sirayn.0002.f: "Ничто не скроется от взора Всевидящего ока."

 sirayn.0003.t: "Влияние на орков"
 sirayn.0003.desc: "[Concept('orcs', 'Орки')|E] [Concept('yellowmountains', 'Жёлтых гор')|E] слабы и рассеяны. Они живут в разрушенных чертогах, заваленных щебнем и шлаком, с тех пор как [Concept('blacklocks', 'Черновласы')|E] погибли в огне. Завоевать их было бы достаточно легко, но стоило бы немного. При более мягком подходе они могли бы служить моим интересам другими способами.\n\nИм нужны ресурсы и мотивация, которые я могу предоставить. Я стану их [Select_CString(ROOT.Char.IsFemale, 'богиней, щедрой, но своенравной', 'богом, щедрым, но своенравным' )], и обеспечу их всем необходимым для роста. Они будут полностью зависеть от меня, и я буду формировать их так, как сочту нужным. Слабые умрут от рук моих избраннков.\n\nИх фанатизм будет способствовать моим завоеваниям лучше, чем любой сброд, который они могут собрать сейчас."
 sirayn.0003.a: "Горы склонятся передо мной."

 sirayn.0005.t: "Королевства верных"
 sirayn.0005.desc: "На юге задули порывистые ветра. Возвышается [Concept('stormhost', 'Грозовое воинство')|E].\n\nЯ, [Concept('khorahil', 'Хорахил')|E], был послан моим повелителем, [Concept('sauroncharacter', 'Сауроном')|E] Великим, уничтожить державы его врагов, и, наконец, я готов исполнить его волю. Всё, что остаётся, - это решить, какие земли падут первыми.\n\n[Concept('bellakar', 'Беллакар')|E] представляет наибольший интерес. Очередные отпрыски [Concept('numenor', 'Нуменора')|E], давным-давно они пришли на помощь [Concept('gondor', 'Гондору')|E] в [Concept('warlastalliance', 'Войне Последнего союза')|E]. Когда [Concept('darklord', 'Тёмный властелин')|E] снова восстанет на севере, им нельзя будет позволить возобновить свои древние клятвы.\n\nОднако есть ещё и [Concept('khy', 'Кхай')|E]. Они - новая держава, всё ещё находящаяся в расцвете сил. Когда-то они были сборищем коневодов, а теперь играют в империю с необычным рвением, которое выдаёт вмешательство [Concept('istariconcept', 'истари')|E]. Если оставить их в покое, они могут превратиться в ещё большую угрозу."
 sirayn.0005.a: "Беллакар должен пасть первым."
 sirayn.0005.b: "Кхай, а вместе с ним и весь Ормал."

 sirayn.0006.t: "Окончательная победа"
 sirayn.0006.desc: "Победа за нами!\n\nБеспородные псы разбегаются перед поверженными знамёнами [Concept('southerndragonarmy', 'Воинства Южного дракона')|E]. Они разбиты, их армии разгромлены. Их властители попрятались в отдалённых крепостях, ожидая смертельного удара.\n\nТеперь они мои слуги, какими бы своевольными они ни были, и мой суд будет скорым. Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы даровать им освобождение, которого они так боятся, и покончить с этой державой раз и навсегда, оставив от неё лишь разрушенные и дымящиеся руины, пустую оболочку королевства.\n\nИли, возможно, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы найти им дальнейшее применение..."
 sirayn.0006.a: "Теперь они являются частью Грозового воинства, хотят они того или нет."
 sirayn.0006.b: "Я посажу верную марионетку на трон Беллакара."
 sirayn.0006.c: "Беллакар сгорит."
 sirayn.0006.d: "Они присоединятся к Грозовому воинству или умрут."
 sirayn.0006.e: "Мои слуги будут править Кхаем от моего имени."
 sirayn.0006.f: "Полностью сломить их."
 sirayn.0006.tt_1: "Все покорённые властители останутся [Concept('vassals', 'вассалами')|E] в пределах вашей [Concept('realm', 'державы')|E]."
 sirayn.0006.tt_2: "Посадить верного [Concept('tributary', 'данника')|E] на трон завоёванной [Concept('empire', 'империи')|E]."
 sirayn.0006.tt_3: "Все [Concept('titles', 'титулы')|E] в завоёванной [Concept('empire', 'империи')|E] будут уничтожены, что приведёт к расколу державы."

 sirayn.0007.t: "Полный разгром"
 sirayn.0007.desc: "Как до этого дошло?\n\nМои войска разгромлены и рассеяны, мои земли в осаде. Когда вся мощь врага обрушилась на мою цитадель, дрожащий вестник осмелился предстать передо мной.\n\n«М-мой господин», - едва удаётся выдавить ничтожеству, - «крестьяне поднимают восстание. Ваши вассалы сложили оружие. Пока мы говорим, [Concept('stormhost', 'Грозовое воинство')|E] рушится!»\n\nСверкнула сталь, и они замолчали."
 sirayn.0007.a: "Будь они прокляты!"

 sirayn.0010.t: "Укреплённые берега"
 sirayn.0010.desc: "По всему побережью возвышаются крепости и сторожевые башни, длинные линии траншей и сигнальных костров. Каждый замок кишит защитниками, одетыми в прочные кольчуги, вооружёнными луками и горящим маслом.\n\nЭти земли станут передовой любого будущего вторжения и хорошо подготовлены для отражения ошибочной контратаки."
 sirayn.0010.a: "Всё идёт по плану."

 sirayn.0011.t: "Ветра войны"
 sirayn.0011.desc: "Приходят вести о ужасе и войне в Ормальском заливе. [Concept('southerndragonarmy', 'Воинство Южного дракона')|E] выступило против [Concept('khy', 'Кхая')|E], возглавляемое [Concept('nazgul', 'назгул')|E] [Concept('khorahil', 'Хорахилом')|E].\n\nМы долго трудились, чтобы направить их на путь к свету. Наш долг - позаботиться о том, чтобы они безопасно пережили эту бурю."
 sirayn.0011.a: "Объединим верующих!"
 sirayn.0011.b: "Кхай сам по себе."

 sirayn.0012.t: "Дети бури"
 sirayn.0012.desc: "Жрец. Кинжал. Залитый кровью алтарь.\n\nТолпа фанатиков кричит и грохочет копьями, когда жрец провозглашает мою ценность. Тёмный дым поднимается от жаровень, закрывая заходящее солнце.\n\nХаршандатт помнит [Concept('khorahil', 'Хорахила')|E], Сенеда, своего Повелителя бурь. Теперь они собираются в большие отряды, чтобы служить моей воле."
 sirayn.0012.a: "Кхай содрогнётся перед бурей."

 sirayn.0013.t: "Дом Слепого колдуна"
 sirayn.0013.desc: "Давным-давно, во [Concept('secondage', 'Второй эпохе')|E], [Concept('anbalkumagan', 'Ан-Балкумаган')|E] был домом для человека по имени [Concept('khorahil', 'Хорахил')|E] [GetScriptedCharacterByHistoryID('nazgul5').GetDynastyHouseName]. Он пожертвовал всем: своей семьёй, честью, даже своими глазами, чтобы сохранить это, но всё было напрасно. Его земли, полученные кровью, были украдены у него алчными властителями [Concept('numenor', 'Нуменора')|E].\n\nЧто же стало с могучим Нуменором? Он погрузился на дно Белегаэра, а я [Select_CString(ROOT.Char.IsFemale, 'выстояла', 'выстоял' )].\n\n[Concept('southerndragonarmy', 'Воинство Южного дракона')|E] входит в [GetTitleByKey('k_an_balkumagan').GetNameNoTier], его правители приветствуют нас с распростёртыми объятиями. Они платят дань зерном и сталью, собираемыми для разжигания грядущих войн. Энергичная молодежь собирается в толпы, желая присоединиться к могущественному [Concept('stormhost', 'Грозовому воинству')|E].\n\nСкоро [Concept('bellakar', 'Беллакар')|E] устрашится [GetCultureByKey('anbalukkhori').GetName|l]."
 sirayn.0013.a: "Это земли снова принадлежат мне."
 
 sirayn.0014.t: "Затишье перед бурей"
 sirayn.0014.desc: "Этим утром прибыл гонец, одетый в черное. Сейчас он говорит со мной ледяным голосом.\n\n«Я принёс вести от моего господина, Хорахила, Повелителя бурь, владыки-императора Сирайна и всего юга. Тень растёт, и скоро настанет его час, когда все земли содрогнутся и падут перед его огромным воинством. Готовясь к этому дню, мой повелитель желает передать вам своё благословение, чтобы вы могли приумножить свою силу и восстановить славу анбалукхори. В ответ он требует от вас подчинения».\n\n«Преклонитесь перед ним и получите великие дары. Воспротивьтесь и будете уничтожены»."
 sirayn.0014.a: "Мы должны присоединиться к Грозовому воинству."
 sirayn.0014.b: "Мы ни перед кем не преклонимся."
 sirayn.0014.tt: "Вы станете вассалом державы [GetTitleByKey('e_thon_an_kharlokh').GetNameNoTier]"

 sirayn.0015.t: "Тень на юге"
 sirayn.0015.desc: "На юг [Concept('middleearth', 'Средиземья')|E] опускается тьма. От [Concept('bellakar', 'Беллакара')|E] до [Concept('khy', 'Кхая')|E], через [Concept('farharad', 'Дальний Харад')|E] и [Concept('yellowmountains', 'Жёлтые горы')|E] все покоряются [Concept('stormhost', 'Грозовому воинству')|E].\n\nПовсюду враги [Concept('sauroncharacter', 'Саурона')|E] прячутся и обращаются в бегство. Я безупречно [Select_CString(ROOT.Char.IsFemale, 'выполнила', 'выполнил' )] волю [Concept('darklord', 'Тёмного властелина')|E], и в землях [Concept('harad', 'Харада')|E] не осталось настоящих противников его воли. Теперь пришло время выполнить моё последнее задание.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] вернуться в [Concept('mordor', 'Мордор')|E] и подготовить эти земли к возвращению моего повелителя."
 sirayn.0015.a: "Мы выступим на север."

 sirayn.0016.t: "Новый император Беллакара"
 sirayn.0016.desc: "[Concept('bellakar', 'Беллакар')|E] побеждён, но правление не станет моим бременем. Я поставлю марионетку из числа самых преданных мне людей, чтобы извлечь богатства из этой земли и погрузить их во тьму.\n\nУ меня есть много компетентных кандидатов, из которых я могу выбрать, но правильный выбор - дело тонкое. Новый император должен быть достаточно силен, чтобы противостоять врагам как внутренним, так и внешним, будь то войска [Concept('gondor', 'Гондора')|E] или #L [GetCultureByKey('bellakaze').GetCollectiveNoun|l]ие#! повстанцы."
 sirayn.0016.a: "Булганцы хорошо послужили мне в Сирайне."
 sirayn.0016.b: "Послать орков."
 sirayn.0016.c: "Тантуракцы получат новый дом."
 sirayn.0016.d: "Анбалукхори давно мечтали о Беллакаре."
 sirayn.0016.e: "Местные беллакарцы будут поддерживать мир."
 sirayn.0016.f: "Теджин удержат их в узде."

 sirayn.0017.t: "Новый император Кхая"
 sirayn.0017.desc: "[Concept('khy', 'Кхай')|E] разгромлен. Он будет восстановлен, как памятник провалу [Concept('istariconcept', 'истари')|E]. Хотя и есть определённое удовольствие видеть, как держава впадает в такое бессилие, нельзя позволить ей оставаться такой.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] назначить сильную руку для правления Ормалом от моего имени."
 sirayn.0017.a: "Булганцы хорошо послужили мне в Сирайне."
 sirayn.0017.b: "Послать орков."
 sirayn.0017.c: "Тантуракцы получат новый дом."
 sirayn.0017.d: "Анбалукхори давно мечтали о Беллакаре."
 sirayn.0017.e: "Местные кхайцы будут поддерживать мир."

 sirayn.0018.t: "Новости из Тантурака"
 sirayn.0018.desc: "Ещё одно скучное донесение с южной границы с #ONCLICK:TITLE,k_tanturak #TOOLTIP:LANDED_TITLE,k_tanturak #L Тантураком#!#!#!: хаос и война.\n\nВ давние времена [GetCultureByKey('tanturaki').GetName|l] считались одними из самых ревностных слуг [Concept('darklord', 'Тёмного властелина')|E], непревзойдёнными в своем почитании Тени. Однако в последнее время они стали вызывать раздражение. Тантурак погрузился в безумие, его властители одержимы древними обидами и непрекращающимися междоусобицами. Их рабы угрожают открытым восстанием, и всё же соперничающие «короли» этих земель наслаждаются своей кровавой кашей.\n\nБыло бы благоразумнее просто закрыть на это глаза и позволить глупцам забыться, но я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы вмешаться, если бы [Select_CString(ROOT.Char.IsFemale, 'захотела', 'захотел' )]. Однако такое вмешательство обошлось бы дорого и замедлило бы мои усилия по консолидации севера."
 sirayn.0018.a: "Тантурак - не моя забота."
 sirayn.0018.b: "Я поддержу Тантурак."
 sirayn.0018.tt: "Можно разблокировать адунайских [Concept('men_at_arms', 'профессионалов')|E] через [Concept('decision', 'решение')|E] «Стабилизировать Сирайн»."

 sirayn.0019.t: "Помощь для Тантурака"
 sirayn.0019.desc: "Тантурак разрывается на части, два соперничающих претендента обескровливают державу, в то время как вероломные рабы готовят восстание. На одной стороне - вечно [Select_CString(tanturak_king_1.IsFemale, 'амбициозная', 'амбициозный' )] [tanturak_king_1.GetFirstName] [tanturak_king_1.GetDynastyHouseName], а на другой - [Select_CString(tanturak_king_2.IsFemale, 'смелая', 'смелый' )] [tanturak_king_2.GetFirstName] [tanturak_king_2.GetDynastyHouseName]. Чтобы в Тантураке воцарилась стабильность, один король должен пасть.\n\nИгра в ваятеля королей - это не праздное занятие, даже для такой слабой державы, как это. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно обдумать свои варианты."
 sirayn.0019.a: "[tanturak_king_1.GetFirstNameNoTooltip] получит мою поддержку."
 sirayn.0019.b: "[tanturak_king_2.GetFirstNameNoTooltip] заслуживает трона."
 sirayn.0019.tt: "Вы заключите [Concept('alliance', 'союз')|E] с выбранным королём."

 sirayn.0020.t: "Перекованный Абрахан"
 sirayn.0020.desc: "Из выжженных солнцем песков Абрахана восстаёт легион воинов, жаждущих крови.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'преобразила', 'преобразил' )] пустов, превратив их в нечто жестокое и сильное. Там, где когда-то были жалкие хижины и немногочисленные отряды, теперь стоят крепкие замки и организованные армии.\n\nНа границах [Concept('khy', 'Кхая')|E] рождаётся новое королевство, новый фронт в грядущей войне, и я буду стоять над всем этим как их [Select_CString(ROOT.Char.IsFemale, 'золотая королева', 'золотой король' )]."
 sirayn.0020.a: "Дни Кхая сочтены."

 sirayn.1001.t: "Мечта Сикентра"
 sirayn.1001.desc: "Все булганцы знают историю Сикентра Великого - рождённый наследником скромного племени в тени [Concept('yellowmountains', 'Жёлтых гор')|E], он объединил наш народ под единым знаменем и дал ему цель. Как стрела, выпущенная из лука, он поразил дряхлеющую империю Масра и, как могучий молот, сокрушил нхазад Харшандатта.\n\nНи один народ не мог помешать ему - ни [Concept('khy', 'Кхай')|E] на севере, ни Линерия на юге, ни города на востоке, ни племена на западе. И только когда враги сговорились между собой, великий Сикентр, могущественнейший из людей, наконец пал. Он умер как его империя - с мечом наперевес, сражаясь со многими врагами одновременно.\n\nС того дня булганцы жили в тени его славы, вынужденные трудиться под началом низших владык, пока наше наследие медленно сходило на нет. Довольно! Сегодня мы объявляем мечту Сикентра осуществленной, его древняя империя восстановлена, а вместе с ней - гордость и слава булганцев."
 sirayn.1001.a: "Слава булганцам! Слава Сикентру Тарбану!"

 sirayn.1002.t: "Пересечение Пелу"
 sirayn.1002.desc: "Ободрённый победами над империей Масра и Харшандаттом, Сикентр обратил свой взор на богатства балхьядцев. Он дошёл до реки Пелу в Саммаре, но морская мощь [Concept('anarikean', 'анарикейцев')|E] не была преодолена. Его единственный сын был убит во время этого нападения.\n\nС тех пор прошло много долгих веков, и сейчас на востоке нет силы, способной противостоять булганцам. Планы Сикентра в отношении [Concept('khy', 'Кхая')|E] наконец-то осуществились."
 sirayn.1002.a: "Ормал трепещет перед нами."

 sirayn.1003.t: "Месть за Сикентра"
 sirayn.1003.desc: "Империя Сикентра была на пике своего могущества и величия, когда гадюки сговорились против нее. Беллакар, Рая и Ан-Балкумаган - теперь уже враги - когда-то вместе противостояли Сикентру и могущественным булганцам. Они напали все разом, и даже тогда Сикентр выстоял! Но даже лев не может держаться вечно, и его мечта разбилась о скалы Райшула.\n\nСегодня эта мечта возрождается. Рая и Тулванг принадлежат нам, вырванные из хватки гадюк."
 sirayn.1003.a: "Они больше не смогут сопротивляться."

 sirayn.1004.t: "Единая Пова"
 sirayn.1004.desc: "Наконец-то наш народ, долгое время бывший рабами и нищими, зарабатывавшими на скудную жизнь, возвысился. Мы провели бесчисленное количество поколений, враждуя между собой, находясь под сенью якобы великих держав, но довольно!\n\nВсе эти равнины, дикие и свободные, насколько хватает глаз, будут принадлежать одному, единому народу. Голубое небо простирается дальше, и мы наслаждаемся плодами нашей стойкости."
 sirayn.1004.a: "Пока на небе сияет солнце, мы не будем рабами."

 sirayn.1005.t: "Золото, устилающее мои дороги" #AIGENERATED
 sirayn.1005.desc: "Торговля стала жизненной силой моей державы. Я [Select_CString(ROOT.Char.IsFemale, 'обеспечила', 'обеспечил' )] безопасность путей через реки и хребты, [Select_CString(ROOT.Char.IsFemale, 'построила', 'построил' )] безопасные гавани и наблюдаю, как оживают рынки. Купцы стекаются в мою столицу, их монеты и товары обогащают не только их самих, но и мою державу. Богатство больше не струйка - это прилив. А я - его [Select_CString(ROOT.Char.IsFemale, 'хозяйка', 'хозяин' )]." #AIGENERATED
 sirayn.1005.a: "Пусть придут купцы. Их золото создаст мое наследие." #AIGENERATED

 sirayn.1006.t: "Восстановление Тайморода"
 sirayn.1006.desc: "В древности Таймород считался повелителем судеб, покровителем магистратов и законодателей, судьёй мёртвых. Его храмы были тихими местами, это правда, но никогда не были мрачными.\n\nЭта ересь [Concept('khorahil', 'Хорахила')|E], этот кровожадный кабал, извратил священные обязанности таймородитов в насмешку над самими собой. Этому пришёл конец.\n\n[GetFaithByKey('faith_taimaraud').GetAdjective] вновь восстановлен, его священное предназначение вернулось. [Concept('nazgul', 'Назгул')|E] должны найти какую-нибудь другую жалкую [Concept('faith', 'веру')|E], которую они могли бы провозгласить."
 sirayn.1006.a: "Ночь на исходе."

 # Sponsor Tayee Religious Building
 sirayn.1050.t: "Тайитская святыня"
 sirayn.1050.desc: "Для правителей с таким статусом, как у меня, одним из способов продемонстрировать нашу преданность Тайи является возведение религиозных объектов, посвящённых им. Поступая так, мы не только улучшаем духовную жизнь местных жителей, но и заслуживаем благосклонность богов и демонстрируем свою набожность.\n\nТаким образом, выбрав владение [county.GetNameNoTier] в качестве идеальной локации, я [Select_CString(ROOT.Char.IsFemale, 'отдала', 'отдал' )] распоряжение о строительстве"
 sirayn.1050.desc.wayshrine: "#Bold тайитского путевого святилища#!. Несмотря на небольшие места отправления культа, в которых часто не пребывают [faith.PriestNeuterPlural], путевые святилища по-прежнему играют свою роль. В изолированных землях путевые святилища могут служить местом созерцания для путешественников, прибывающих на перекрёсток дорог. Вдоль пути специй [Concept('namalo', 'намало')|E] и другие купцы часто ищут благосклонности богов за свои начинания."
 sirayn.1050.desc.small_temple: "#Bold небольшого тайитского храма#!. Небольшие храмы, подобные этим, служат духовным потребностям небольших поселений или, в некоторых случаях, сельских районов, где люди живут далеко друг от друга. В этих скромных сооружениях часто находятся святилища десятков богов, и все участники тайитского хора могут восхвалять своих покровителей."
 sirayn.1050.desc.small_monastery: "#Bold небольшого [faith.GetNameNoTooltip]ого монастыря#!. Здесь верующие могут сосредоточиться на духовных вопросах, изучать теологию и служить своим покровителям в спокойной обстановке. Они также могут оказывать ограниченный объем услуг местному сообществу, благодаря своим знаниям и мудрости."
 sirayn.1050.desc.large_temple: "#Bold большого тайитского храма#!. Конечно, это не величественный монумент, но он всё равно будет впечатляющим зрелищем в поселении, в котором будет построен. Его присутствие вдохновит местных жителей на великие дела, и в нем разместятся святилища всех основных богов тайитского пантеона, а также многих местных божеств."
 sirayn.1050.desc.large_monastery: "#Bold большого [faith.GetNameNoTooltip]ого монастыря#!. Здесь верующие могут сосредоточиться на духовных вопросах, изучать теологию и служить своим покровителям в спокойной обстановке. В этом большом здании также может проводиться ряд служб для местного сообщества, например, в больницах, школах и различных хозяйственных зданиях, таких как пивоварни."
 sirayn.1050.desc.conclusion: "\n\nВ целом, на завершение строительства этого здания потребуется некоторое время, но я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что ожидание того стоит."
 sirayn.1050.a: "Я с нетерпением жду завершения."
 sirayn.1050.disclaimer: "#bold Когда строительство этого священного места будет завершено примерно через один-два года, вы получите перечисленные ниже бонусы.#!"
 sirayn.1051.t: "Тайитская святыня завершена"
 sirayn.1051.desc.wayshrine: "Да славится [faith.HighGodName]!\n\nЯ только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие о том, что тайитское путевое святилище, которое я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )] построить, было завершено во владении [county.GetNameNoTier]. Хотя это простое сооружение, нет сомнений, что местные путешественники будут использовать его для молитв и богослужений."
 sirayn.1051.desc.small_temple: "Да славится [faith.HighGodName]!\n\nЯ только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие о том, что небольшой тайитский храм, который я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )] построить, был завершён во владении [county.GetNameNoTier]. Нет сомнений, что он будет играть важную роль в религиозной жизни местного поселения на долгие годы вперед."
 sirayn.1051.desc.small_monastery: "Да славится [faith.HighGodName]!\n\nЯ только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие о том, что небольшой #L [faith.GetName|l]ий#! монастырь, который я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )] построить, был завершён во владении [county.GetNameNoTier]. Он может быть скромным по размерам по сравнению с другими крупными монастырскими комплексами, но обеспечит местное сообщество многими способами."
 sirayn.1051.desc.large_temple: "Да славится [faith.HighGodName]!\n\nЯ только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие о том, что большой тайитский храм, который я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )] построить, был завершён во владении [county.GetNameNoTier]. Хотя он не может сравниться с великими городами-храмами, это всё равно величественное зрелище, которое будет вдохновлять и удовлетворять духовные потребности многих верующих на протяжении многих поколений."
 sirayn.1051.desc.large_monastery: "Да славится [faith.HighGodName]!\n\nЯ только что [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие о том, что большой #L [faith.GetName|l]ий#! монастырь, который я [Select_CString(ROOT.Char.IsFemale, 'приказала', 'приказал' )] построить, был завершён во владении [county.GetNameNoTier]. Благодаря своим огромным размерам и приличной по размеру монашеской общине, он будет оказывать множество важных услуг близлежащим поселениям и служить местным центром образования и веры."
 sirayn.1051.a: "Я [Select_CString(ROOT.Char.IsFemale, 'рада, что основала', 'рад, что основал' )] такую святыню."
 sirayn.1052.t: "$sirayn.1051.t$"
 sirayn.1052.desc: "До моего обращения в [ROOT.Char.GetFaith.GetAdjective|l] я [Select_CString(ROOT.Char.IsFemale, 'пожертвовала', 'пожертвовал' )] значительную сумму средств на строительство нового тайитского религиозного сооружения во владении [county.GetNameNoTier]. Это здание, строительство которого скоро завершится, больше не имеет для меня никакого духовного значения.\n\nТем не менее, я все еще могу поощрять его использование в качестве жеста доброй воли по отношению к #L [religion_scope.GetName|l]ой#! общине, частью которой я когда-то [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )]. С другой стороны, возможно, мне следует продемонстрировать искренность моей новой веры в учения [ROOT.Char.GetFaith.HighGodNamePossessive] и отказаться от этой структуры, предоставив её своей судьбе или повторно использовав в качестве какого-либо другого средства."
 sirayn.1052.a: "Позволить местным тайитам использовать его для своих религиозных нужд."
 sirayn.1052.a.tooltip: "Поскольку вы обратились в не-тайитскую [Concept('faith', 'конфессию')|E], вы утратили право на [Concept('character_modifier', 'модификатор персонажа')|E], который изначально могли получить."
 sirayn.1052.b: "Отречься от этого здания - я истинно [Select_CString(ROOT.Char.IsFemale, 'верующая', 'верующий' )] [ROOT.Char.GetFaith.GetAdherentName]!"
 sirayn.1052.b.tooltip: "Чтобы доказать, что ваше обращение в [THIS.Char.GetFaith.GetAdjective|l] является подлинным, вы не только теряете право на [Concept('character_modifier', 'модификатор персонажа')|E], который изначально могли получить, но и на [Concept('county_modifier', 'модификатор графства')|E] в вашей [Concept('realm_capital', 'столице')|E]"
 sirayn.1053.t: "Строительство тайитской святыни отменено"
 sirayn.1053.desc: "Некоторое время назад я [Select_CString(ROOT.Char.IsFemale, 'пожертвовала', 'пожертвовал' )] значительную сумму на строительство новой тайитской святыни во владении [county.GetNameNoTier]. К сожалению, этот регион больше не находится под моим управлением, что вынудило меня преждевременно отменить проект."
 sirayn.1053.a: "Досадно."
 
 # Become Avatar of Faith
 sirayn.1100.t: "Воплощение [ROOT.Char.GetFaith.HighGodNamePossessive]"
 sirayn.1100.desc: "В великолепном расположении духа я пробираюсь через улицы владения [capital.GetName], [Select_CString(ROOT.Char.IsFemale, 'окружённая', 'окружённый' )] возбуждённой толпой. В глазах тех, кто внизу, меня окружает почти осязаемый покров божественности, святой [GetTrait('avatar').GetName(ROOT.Char)|l]. Наконец, на торжественной церемонии [ROOT.Char.GetFaith.PriestNeuterPlural|l] провозглашают меня смертным воплощением мощи [ROOT.Char.GetFaith.HighGodNamePossessive]."
 sirayn.1100.desc.landless: "В великолепном расположении духа я пробираюсь через улицы владения [capital.GetName], [Select_CString(ROOT.Char.IsFemale, 'окружённая', 'окружённый' )] возбуждённой толпой. В глазах тех, кто внизу, меня окружает почти осязаемый покров божественности, святой [GetTrait('avatar').GetName(ROOT.Char)|l]. Наконец, [ROOT.Char.GetFaith.PriestNeuterPlural|l] провозглашают меня смертным воплощением мощи [ROOT.Char.GetFaith.HighGodNamePossessive]."
 sirayn.1100.a: "Я - сосуд [ROOT.Char.GetFaith.HighGodHerHis] воли!"
 lotr_avatar_changed_faith.tt: "Вы отказались от своей веры"
 lotr_avatar_changed_faith.tt2: "Все #L [old_faith.GetName|l]ие#! [Concept('ruler', 'правители')|E] теряют #N 30#! [Concept('opinion', 'мнения')|E]"
 lotr_avatar_changed_faith.tt3: "Воплощение отказывается от вашей веры"
 lotr_avatar_changed_faith.tt4: "Все #L [old_faith.GetName|l]ие#! [Concept('ruler', 'правители')|E] теряют #N 30#! [Concept('opinion', 'мнения')|E] о персонаже [fake_avatar.GetFirstNameRegnal]"

 sirayn.1101.opening: "[new_avatar.Custom2('AppropriateGreeting', ROOT.Char)]"
 sirayn.1101.desc.hof: "Вы, несомненно, тоже слышали о моей исключительной набожности и добродетели среди #L [new_avatar.GetFaith.GetName|l]их#! верующих. Теперь, когда [avatars_hof.GetTitledFirstName] [Select_CString(avatars_hof.IsFemale, 'признала', 'признал' )] это, я приму божественность [new_avatar.GetFaith.HighGodNamePossessive] как [new_avatar.GetFaith.HighGodHerHis] смертное воплощение на земле. Все склонятся перед #TOOLTIP:GAME_TRAIT,avatar,avatars_hof #L воплощением#!#!!"
 sirayn.1101.desc: "Вы, несомненно, тоже слышали о моей исключительной набожности и добродетели среди #L [new_avatar.GetFaith.GetName|l]их#! верующих. По правде говоря, я [Select_CString(new_avatar.IsFemale, 'приняла', 'принял' )] божественность [new_avatar.GetFaith.HighGodNamePossessive] как [new_avatar.GetFaith.HighGodHerHis] смертное воплощение на земле. Все склонятся перед #TOOLTIP:GAME_TRAIT,avatar,new_avatar #L воплощением#!#!!"
 sirayn.1101.a: "Славься, [ROOT.Char.GetFaith.HighGodName]!"
 sirayn.1101.b: "Интересно..."
 sirayn.1101.c: "Будь проклят этот день!"

 sirayn.1600.t: "Изменники и злодеи"
 sirayn.1600.desc: "Я просыпаюсь, [Select_CString(ROOT.Char.IsFemale, 'разбуженная', 'разбуженный' )] шепотом. [ROOT.Char.GetFaith.HighGodName], моя верная проводница! Она присматривает за мной с самого моего рождения. И вот! Убийца в моих покоях, как и предсказывало провидение Йом в моем сне. Я вскакиваю на ноги и выхватываю клинок, который лежал рядом со мной. Прежде чем потенциальный убийца успевает среагировать, я обрушиваюсь на него со всей своей яростью. Скоро все будет кончено.\n\nЯ не последую за своим отцом в раннюю могилу, в этом я клянусь серебряными лучами мягкого света Йом. Как я и [Select_CString(ROOT.Char.IsFemale, 'предполагала', 'предполагал' )], убийца носит символ моего ненавистного заклятого врага: цепь на шее с кулоном в виде солнца! Я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что это один из моих стражников. Изменники! Изменники и злодеи, везде!\n\nЯ знаю, кто послал этого человека. Должно быть, это мой злобный дядя, [uncle_arien.GetFirstName]. Когда мой отец отстранил его от управления Исрой, он так и не простил этого. Не прощу и я этого коварного проступка..."
 sirayn.1600.a: "Я покончу с ним и его богиней солнца раз и навсегда."

 sirayn.1601.t: "Непокорность Ариэн"
 sirayn.1601.desc: "Как и предвидела [ROOT.Char.GetFaith.HighGodName], поклонники мерзкой богини Солнца восстали против моего правого дела. Что ж, пусть восстают! Я все равно сокрушу их. Гнетущее солнце больше не будет затмевать нежный свет луны! Не будут больше эти интервенты из [Concept('khy', 'Кхая')|E] препятствовать тому, что является законной землей наших тайитских предков!\n\nНеважно, скольких им удастся склонить к своим ложным убеждениям. С мудрыми словами Йом в моих ушах меня не остановить."
 sirayn.1601.a: "Мой клинок отведает крови многих ариэнистов!"

 sirayn.1602.t: "Превосходство Йом"
 sirayn.1602.desc: "Дело сделано. Воинства Ариэн разбиты, их предводители убиты или обращены в бегство. Осталось только послать сообщение всем, кто еще осмеливается цепляться за почитание богини Солнца. «Писец! Приди, передай мои слова, чтобы все услышали!»\n\n«Да будет известно, что я, Радьяни из Исры, больше не потерплю, чтобы кто-либо в державе [GetTitleByKey('e_sirayn').GetNameNoTier] следовал вере Ариэн. Отрекитесь от этой ложной богини или лишитесь чинов и титулов. [ROOT.Char.GetFaith.HighGodName] - милосердная матрона, но я - нет. Покайтесь сейчас и вернитесь к вере своих отцов, или будете раздавлены под моей пятой».\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'вздохнула', 'вздохнул' )] с облегчением. Наконец-то я [Select_CString(ROOT.Char.IsFemale, 'принесла', 'принес' )] мир, стабильность и процветание своему королевству и его соседям."
 sirayn.1602.a: "Ариэн была изгнана."
 sirayn.1602.a.tt: "Все ариэнитские [Concept('ruler', 'правители')|E] в державе [GetTitleByKey('e_sirayn').GetNameNoTier] должны отречься от Ариэн или будут свергнуты"

 sirayn.1603.opening: "Последователям ложной Ариэн,"
 sirayn.1603.desc: "Ваши войска разбиты, а непокорность усмирена. В очередной раз [ROOT.Char.GetFaith.HighGodName] оказалась могущественнее Ариэн. Теперь перед вами стоит последний выбор. Отрекитесь от этого ложного божества и вернитесь к вере своих предков, или я лишу вас положения и титула. Выбирайте мудро!"
 sirayn.1603.a: "Кажется, лучше всего будет обратиться..."
 sirayn.1603.b: "Никогда! Я отправлюсь в изгнание, если придётся..."

 sirayn.1604.t: "Меч Йом"
 sirayn.1604.desc: "До меня дошли вести из державы [GetTitleByKey('k_isra').GetName], что его правительница, юная [radyani.GetFirstName], объявила тотальную войну всем, кто почитает нашу могущественную [ROOT.Char.GetFaith.HighGodName], богиню Солнца и Огня!\n\nМои жрецы возмущены. «Это оскорбление величия нашего божества не может продолжаться. Пусть все, кто следует за Ариэн, вместе достанут свои мечи! Мы должны объединиться, чтобы помешать обезумевшей Радьяни сокрушить всех правителей на своем пути! К оружию!» - призывают они, едва не устраивая в моей столице настоящий бунт фанатиков.\n\nНо будет ли разумным вступление в эту войну? Не поздно ли отступить?"
 sirayn.1604.a: "Благословенная Ариэн, мой клинок принадлежит тебе!"
 sirayn.1604.b: "Пришло время обратиться."
 sirayn.1604.b.tt: "Вы выходите из войны «[radyani_religious_war.GetName]»"

 sirayn.1605.t: "Воплощение Йом"
 sirayn.1605.desc: "Когда к моим серьгам прикрепляют две серебристые подвески, мое восхождение завершено. Выкованное в форме растущей луны [ROOT.Char.GetFaith.HighGodNamePossessive], это украшение символизирует коронацию воплощения богини - проявление ее воли. Я несу ее долг и меч, и я не потерплю неудачу в своей задаче.\n\n[ROOT.Char.GetFaith.GetAdherentNamePlural] пойдут за мной, а я позабочусь о том, чтобы мечты Йом были услышаны по всему Ормальскому заливу. Под её руководством нет ничего невозможного."
 sirayn.1605.a: "Вперёд, к мести."
 sirayn.1605.a.tt: "Вы получите [Concept('artifact', 'артефакт')|E]-меч"

 sirayn.1650.t: "Падение Ариэн"
 sirayn.1650.desc: "Я стою среди руин Заринуши, самого священного места поклонения Ариэн. Мои последователи разрушили это место, кирпич за кирпичом, и обнажили его фундамент. Я оставлю его таким для всеобщего обозрения в знак моей победы и превосходства [ROOT.Char.GetFaith.HighGodName] над гордой Ариэн. Как низко она пала!\n\n[Concept('khy', 'Кхай')|E] сломлен, а Ариэн усмирена - мой поход завершен. Я [Select_CString(ROOT.Char.IsFemale, 'отомстила', 'отомстил' )] за всех, кто пострадал под хвастливым игом Богини солнца, и в первую очередь за своего отца. Никогда больше этот гнет не вернется! Клянусь серебряными лучами света Йом и самой своей жизнью."
 sirayn.1650.desc.no_pope: "Лишённые лидера, оставшиеся в живых ариэнисты были рассеяны по ветру. Скатертью дорога!"
 sirayn.1650.desc.pope.sacrificed: "[scoped_pope.GetName] [Select_CString(scoped_pope.IsFemale, 'был принесена', 'был принесен' )] в жертву в честь Йом по моему приказу. [Select_CString(scoped_pope.IsFemale, 'Её', 'Его' )] оставшиеся последователи бежали, и я [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад' )], что [Select_CString(ROOT.Char.IsFemale, 'избавилась', 'избавился' )] от них."
 sirayn.1650.desc.pope.executed: "[scoped_pope.GetName] [Select_CString(scoped_pope.IsFemale, 'была изрублена', 'был изрублен' )] у меня под ногами, хныча и взывая о пощаде. [Select_CString(scoped_pope.IsFemale, 'Её', 'Его' )] оставшиеся последователи бежали, и я [Select_CString(ROOT.Char.IsFemale, 'рада', 'рад' )], что [Select_CString(ROOT.Char.IsFemale, 'избавилась', 'избавился' )] от них."
 sirayn.1650.a: "Наконец-то я [Select_CString(ROOT.Char.IsFemale, 'избавила', 'избавил' )] эту землю от лжи Ариэн."