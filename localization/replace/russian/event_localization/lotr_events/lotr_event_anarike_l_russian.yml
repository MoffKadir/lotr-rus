l_russian:

 ### Anarike Events ###
 anarike.0050.t: "Вопрос лидерства"
 anarike.0050.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'укрепила', 'укрепил' )] своё влияние во всех городах Линерии и [Select_CString(ROOT.Char.IsFemale, 'убедила', 'убедил' )] их гордых правителей объединиться, чтобы восстановить славную Линерийскую лигу. Но вместе с этим успехом пришло и бремя: мне предстоит выбрать одного из них, который станет правителем этой возрождённой нации.\n\nЕсли бы это решение было оставлено на усмотрение самих линерийцев, они вернулись бы к своим мелким дрязгам в течение нескольких дней, если не часов. Отдав предпочтение одному из них, я смогу обеспечить Линерии стабильность и безопасность. Вместе мы создадим наш новый союз ради благополучия и процветания [Concept('anarike', 'Анарикэ')|E] и Линерии!"
 anarike.0050.a: "[lyneriaholder.GetName] - мой выбор."
 anarike.0050.a.tt: "[lyneriaholder.GetName] станет [Select_CString(lyneriaholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.b: "[twincitiesholder.GetName] получит мою поддержку."
 anarike.0050.b.tt: "[twincitiesholder.GetName] станет [Select_CString(twincitiesholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.c: "[nymaraholder.GetName] - очевидный выбор."
 anarike.0050.c.tt: "[nymaraholder.GetName] станет [Select_CString(nymaraholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.d: "[murnakholder.GetName] заслуживает доверия."
 anarike.0050.d.tt: "[murnakholder.GetName] станет [Select_CString(murnakholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.e: "Мой выбор - [lynharholder.GetName]."
 anarike.0050.e.tt: "[lynharholder.GetName] станет [Select_CString(lynharholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"

 anarike.0051.t: "Альянс у врат залива"
 anarike.0051.desc: "После того как [chosen_league_lord.GetName] [Select_CString(chosen_league_lord.IsFemale, 'стала правительницей', 'стал правителем' )] укреплённой Линерийской лиги, наш союз может закрепиться. [Concept('anarike', 'Анарикэ')|E] будет контролировать восток, а Линерия - запад. Вместе мы достаточно сильны, чтобы получить контроль над всеми судоходными путями, ведущими в Ормальский залив и из него.\n\nНас ждут богатство и процветание! Скоро мы сможем покончить с выплатой дани владыке [Concept('khy', 'Кхая')|E], вернув Анарикэ былую славу."
 anarike.0051.a: "Пусть писцы отметят этот день в нашей истории."
 anarike.0051.a.tt: "Вы и [chosen_league_lord.GetName] заключаете [Concept('alliance', 'союз')|E]"

 anarike.0052.t: "Единый залив"
 anarike.0052.desc: "Мы зашли так далеко. Многие трудности и испытания остались позади, и теперь я стану [Select_CString(ROOT.Char.IsFemale, 'правительницей', 'правителем' )] новой империи!\n\nСкоро все берега, которые орошают воды Ормала, будет знать мое имя и признавать мою власть. С этого дня и до своего последнего я буду защищать свою новую державу и нести мир и стабильность на весь Ормальский залив!"
 anarike.0052.a: "Славный день!"


 ### ROA Anarike Events ###
 ##### Anarikê: The Twilight of a Long Reign #####

 anarike.1001.t: "Конец долгого дня"
 anarike.1001.desc: "Я стою [Select_CString(ROOT.Char.IsFemale, 'одна', 'один' )] на высоком балконе старого дворца капитанов, он старше многих камней подо мной. Прошло столетие с тех пор, как я впервые [Select_CString(ROOT.Char.IsFemale, 'надела', 'надел' )] корону [Concept('anarike', 'Анарикэ')|E] - тогда я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] ребенком, ноги которого едва доставали до пола трона, и [Select_CString(ROOT.Char.IsFemale, 'наблюдала', 'наблюдал' )] за дебатами [saibeth_nazrubari|E] поверх своей головы без права голоса.\n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'стара', 'стар' )]. На моих руках морщин больше, чем за всю мою жизнь, и совет, который когда-то говорил через мою голову, теперь прислушивается к каждому моему слову. Я [Select_CString(ROOT.Char.IsFemale, 'даровала', 'даровал' )] своему народу нерушимое спокойствие - сто с лишним лет без войн на берегах Анарикэ, без голода в её городах, без мятежей против моего трона. Купцы [Concept('ormal_bay', 'Ормальского залива')|E] стали счастливы и довольны моим миром, а дети Анарикэ состарились в нём.\n\nСолнце сейчас садится на западе, и в глубине души я знаю, что больше не увижу таких закатов."
 anarike.1001.a: "Я [Select_CString(ROOT.Char.IsFemale, 'была', 'был' )] безмерно [Select_CString(ROOT.Char.IsFemale, 'благословлена', 'благословлён' )]."
 anarike.1001.b: "О чём ещё может мечтать любой человек, кроме мира?"
 anarike.1001.c: "И всё же... мои сыновья всё ещё давят на меня."
 anarike.1001.c.tt: "Вы обратите свои мысли к вопросу о престолонаследии."

 anarike.1002.t: "Два сына Анарикэ"
 anarike.1002.desc: "С высокой галереи я смотрю вниз, во внутренний двор, и вижу там двух своих сыновей - наследников [Concept('anarike', 'Анарикэ')|E], наследников всего, что я [Select_CString(ROOT.Char.IsFemale, 'построила', 'построил' )], и всего, что я [Select_CString(ROOT.Char.IsFemale, 'сохранила', 'сохранил' )]. Они родились с разницей всего в год, но я никогда не [Select_CString(ROOT.Char.IsFemale, 'встречала', 'встречал' )] двух братьев, настолько не похожих друг на друга по характеру.\n\n[first_son.GetFirstName] - старший. Даже сейчас, в этом саду, он неугомонен из-за своей целеустремлённости. Он хотел бы, чтобы Анарикэ оставалась гордой - державой, равной великому [Concept('khy', 'Кхаю')|E] - свободной, независимой и сильной до разрушения мира. Честолюбие без способностей и решимости мало вознаграждается, но сила моего первенца велика, а решимость ещё больше, и я знаю, что из-за его честолюбия он добьётся успеха.\n\n[second_son.GetFirstName], младше на один год, сидит в дальнем конце галереи вместе с кхайским послом. Из них двоих он всегда был мудрее и осторожнее. Он хотел бы, чтобы мы уладили долгую ссору с нашими отдалёнными кхайскими родичами из земель, в которых течёт кровь наших матерей, - и, к моему великому сожалению, именно эту задачу я никогда не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] бы выполнить. И всё же, когда я вижу его, я знаю, что он превзойдёт меня там, где я потерплю неудачу, и, несомненно, ничто под светом Ярендиля сможет остановить его.\n\nДва сына. Два пути. Оба верные, оба способные. И только один трон."
 anarike.1002.a: "[first_son.GetFirstName] старше. Старший должен править."
 anarike.1002.a.tt: "Вы отдадите предпочтение персонажу [first_son.GetFirstName], когда соберётся [saibeth_nazrubari|E]."
 anarike.1002.b: "[second_son.GetFirstName] видит мир таким, какой он есть, а не таким, каким он был."
 anarike.1002.b.tt: "Вы отдадите предпочтение персонажу [second_son.GetFirstName], когда соберётся [saibeth_nazrubari|E]."
 anarike.1002.c: "Это решение не может быть принято одним человеком. Мнение Сайбет должно быть услышано."
 anarike.1002.c.tt: "Вы пока воздержитесь и выслушаете Совет, прежде чем принимать решение."

 anarike.1003.t: "Созыв [saibeth_nazrubari|E]"
 anarike.1003.desc: "В зале [saibeth_nazrubari|E] места заполнены до краев. Этот самый верховный совет [Concept('anarike', 'Анарикэ')|E], основанный после [Concept('akallabeth', 'Акаллабет')|E] для того, чтобы сдерживать королей этого дома и давать им советы, был созван, чтобы выслушать мою волю и завещание.\n\nОни долго служили мне, эти мужчины и женщины - некоторые всю свою жизнь, некоторые унаследовали свои посты от отцов, которые служили мне в прежние годы, и я знаю, что они прислушаются к моей последней воле.\n\nЯ смотрю на длинный стол - златовласых капитанов и принцев-торговцев, знатоков [Concept('adunaic', 'адунайского')|E] языка и корабелов королевского арсенала - и понимаю, что то, что я скажу дальше, переживёт меня на столько лет, что я и сосчитать не смогу.\n\n#EMP «Милорды. Миледи. Вопрос престолонаследия».#!"
 anarike.1003.a: "[first_son.GetFirstName] будет править. Пусть Анарикэ стоит в одиночестве, как во времена наших пращуров."
 anarike.1003.a.tt: "[first_son.GetFirstName] станет вашим преемником. Он унаследует мандат по сохранению независимости Анарикэ и её славного наследия. [second_son.GetFirstName], возможно, испытает немалую печаль из-за того, что его обошли."
 anarike.1003.b: "[second_son.GetFirstName] будет править. Пусть он наладит дружбу с [Concept('khy', 'Кхаем')|E]."
 anarike.1003.b.tt: "[second_son.GetFirstName] станет вашим преемником. Он унаследует мандат по примирению с [Concept('khy', 'Кхаем')|E] и налаживанию отношений со всеми соседями Анарикэ. [first_son.GetFirstName] испытает негодование из-за того, что его обошли в законном порядке рождения."
 anarike.1003.c: "Пусть они правят вместе, объединив свои силы."
 anarike.1003.c.tt: "[first_son.GetFirstName] унаследует трон; [second_son.GetFirstName] будет назначен главным министром. Будут ли они держаться вместе или рассорятся, станет ясно в ближайшие годы."
 anarike.1003.d: "Я оставляю выбор за самим Сайбет, когда меня не станет."
 anarike.1003.d.tt: "[saibeth_nazrubari|E] соберётся после вашей смерти и изберёт вашего преемника из числа ваших сыновей, опираясь на своё мнение."

 anarike.1004.t: "За разделяющими морями"
 anarike.1004.desc: "В комнате тихо, но не темно. Как я и [Select_CString(ROOT.Char.IsFemale, 'просила', 'просил' )], они открыли большое окно с видом на море, чтобы я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] в последний раз услышать чаек и вдохнуть морской воздух. [first_son.GetFirstName] становится на колени с одной стороны кровати; [second_son.GetFirstName] - с другой. Мои самые старые друзья из [saibeth_nazrubari|E] стоят в изножье кровати, облачённые в официальные серые одежды ещё не начавшегося траура.\n\nБоли нет. Это, прежде всего, дар, который мне был дан, - смерть без боли после жизни без войны. За окном кричат чайки, а на воде играет тот же золотисто-розовый свет, который я [Select_CString(ROOT.Char.IsFemale, 'наблюдала', 'наблюдал' )] вечерами сто лет подряд.\n\nМои мысли занимает [first_wife.GetFirstName], которая ждёт меня за звездой Яренделя, [second_wife.GetFirstName], что держит в руках мокрые лица моих сыновей. Я думаю о последнем лорде-адмирале, основателе моего рода, чьё давнее предвидение направило [Concept('anarike', 'Анарикэ')|E] в нужное русло. Из всего, что у меня было, и всё, что я сейчас отпускаю.\n\n#EMP «Держава#!, - бормочу я, и они все наклоняются ко мне. #EMP - в мире»#!.\n\nА потом - я ухожу."
 anarike.1004.a: "Король умер. Да здравствует король."