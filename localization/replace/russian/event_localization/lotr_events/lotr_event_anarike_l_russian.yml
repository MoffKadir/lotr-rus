 ### Anarike Events ###
 anarike.0050.t: "Вопрос лидерства"
 anarike.0050.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'укрепила', 'укрепил' )] своё влияние во всех городах Линерии и [Select_CString(ROOT.Char.IsFemale, 'убедила', 'убедил' )] их гордых правителей объединиться, чтобы восстановить славную Линерийскую лигу. Но вместе с этим успехом пришло и бремя: мне предстоит выбрать одного из них, который станет правителем этой возрождённой нации.\n\nЕсли бы это решение было оставлено на усмотрение самих линерийцев, они вернулись бы к своим мелким дрязгам в течение нескольких дней, если не часов. Отдав предпочтение одному из них, я смогу обеспечить Линерии стабильность и безопасность. Вместе мы создадим наш новый союз ради благополучия и процветания [Concept('anarike', 'Анарикэ')|E] и Линерии!"
 anarike.0050.a: "[lyneriaholder.GetName] - мой выбор."
 anarike.0050.a.tt: "[lyneriaholder.GetName] станет [Select_CString(lyneriaholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.b: "[twincitiesholder.GetName] получит мою поддержку."
 anarike.0050.b.tt: "[twincitiesholder.GetName] станет [Select_CString(twincitiesholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.c: "[nymaraholder.GetName] - очевидный выбор."
 anarike.0050.c.tt: "[nymaraholder.GetName] станет [Select_CString(nymaraholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.d: "[murnakholder.GetName] заслуживает доверия."
 anarike.0050.d.tt: "[murnakholder.GetName] станет [Select_CString(murnakholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"
 anarike.0050.e: "Мой выбор - [lynharholder.GetName]."
 anarike.0050.e.tt: "[lynharholder.GetName] станет [Select_CString(lynharholder.IsFemale, 'правительницей', 'правителем' )] Линерийской лиги"

 anarike.0051.t: "Альянс у врат залива"
 anarike.0051.desc: "После того как [chosen_league_lord.GetName] [Select_CString(chosen_league_lord.IsFemale, 'стала правительницей', 'стал правителем' )] укреплённой Линерийской лиги, наш союз может закрепиться. [Concept('anarike', 'Анарикэ')|E] будет контролировать восток, а Линерия - запад. Вместе мы достаточно сильны, чтобы получить контроль над всеми судоходными путями, ведущими в Ормальский залив и из него.\n\nНас ждут богатство и процветание! Скоро мы сможем покончить с выплатой дани владыке [Concept('khy', 'Кхая')|E], вернув Анарикэ былую славу."
 anarike.0051.a: "Пусть писцы отметят этот день в нашей истории."
 anarike.0051.a.tt: "Вы и [chosen_league_lord.GetName] заключаете [Concept('alliance', 'союз')|E]"

 anarike.0052.t: "Единый залив"
 anarike.0052.desc: "Мы зашли так далеко. Многие трудности и испытания остались позади, и теперь я стану [Select_CString(ROOT.Char.IsFemale, 'правительницей', 'правителем' )] новой империи!\n\nСкоро все берега, которые орошают воды Ормала, будет знать мое имя и признавать мою власть. С этого дня и до своего последнего я буду защищать свою новую державу и нести мир и стабильность на весь Ормальский залив!"
 anarike.0052.a: "Славный день!"


 ### ROA Anarike Events ###
 ##### Anarikê: The Twilight of a Long Reign #####

 anarike.1001.t: "A Long Day's Ending"
 anarike.1001.desc: "Upon the high balcony of the old palace of the captains, I stand alone older than many of the stones below me. A century has passed since I first wore the crown of [Concept('anarike', 'Анарикэ')|E] - a child then, with feet that scarcely touched the floor of the throne, watching the [saibeth_nazrubari|E] debate over my head and I only an observent.\n\nNow I am old. My hands are spotted with the marks of long years, and the council that once spoke over my head now has come to hang on my every word. The reign I have given my people has been one of unbroken serenity - a hundred years and more without war upon Anarikê's shores, without famine within her cities, without rebellion against my throne. The merchants of the [ormal_bay|E] have grown happy and content upon my peace, and the children of Anarikê have grown old beneath it.\n\nI think of [first_wife.GetFirstName], the love of my youth, who walked these same stones at my side and who lies now in the marble silence of the royal crypt. Though no children came of our union, the joy she gave me was its own gift however breif. I think of [second_wife.GetFirstName], who came to me when my heart was hollow and broken, and made it whole again with her impatient, infectious joy - and who bore me, in time, the two wonderful sons who shall outlive me. Two loves I have been given in this life - and many would count themselves blessed for one.\n\nThe sun is setting red over the [ormal_bay|E], and in my bones I know that I shall not see many more such sunsets."
 anarike.1001.a: "I have been blessed beyond measure."
 anarike.1001.b: "What more could any man ask for, than peace?"
 anarike.1001.c: "And yet... my sons weigh upon me still."
 anarike.1001.c.tt: "You will turn your thoughts to the matter of succession."

 anarike.1002.t: "Two Sons of Anarikê"
 anarike.1002.desc: "From the high gallery I look down into the inner courtyard, and there I see my two sons - the heirs of [Concept('anarike', 'Анарикэ')|E], the inheritors of all I have built and all I have preserved. Both are children of [second_wife.GetFirstName], my second love, born scarcely a year apart, yet I have never known two brothers so unalike in temper.\n\n[first_son.GetFirstName], the elder, is always in motion, in debate, in work. He never stops moving and yet he is the most steadfast to our traditions of the two. He would have Anarikê stand proud - an equal realm to great [khy|E] - free and independent and strong until the breaking of the world; The blood of two great realms, Númenor and Khy kept a strength of two pillars, not a mingling of waters. Capable, I know him to be. Loyal beyond question. And zealously does he keep to the worship of iarandel.\n\n[second_son.GetFirstName], the younger by a single year, sits at the far end of the cloister with a Khyan envoy, speaking softly in the trade-tongue. He has always been the wiser of the more careful of the two and though he stands still and serene, he would have us work towards a new direction, walking away from our legacy to a glorious new day.  #italic 'The past should be a hearth, not a chain,' #! he had said to me once, and I have not forgotten it. He would have us mend the long quarrel with our estranged Khyan kin, the land of our mothers' blood - the very thing I could never accomplish, and which I have long counted as the greatest failure of my long reign, a task I know him to be more than capable to acomplish.\n\nTwo sons. Two paths. Both faithful, both able. And only one throne."
 anarike.1002.a: "[first_son.GetFirstName] is the elder. The elder should reign."
 anarike.1002.a.tt: "You will be inclined toward [first_son.GetFirstName] when the [saibeth_nazrubari|E] convenes."
 anarike.1002.b: "[second_son.GetFirstName] sees the world as it is, not as it was."
 anarike.1002.b.tt: "You will be inclined toward [second_son.GetFirstName] when the [saibeth_nazrubari|E] convenes."
 anarike.1002.c: "This is not a decision for one man alone. The Sâibêth must be heard."
 anarike.1002.c.tt: "You make no judgement yet, and will hear the Council before deciding."

 anarike.1003.t: "The Sâibêth ’nAzrubârî Convenes"
 anarike.1003.desc: "In the council hall the great seats are filled. The [saibeth_nazrubari|E] - the High Council of [Concept('anarike', 'Анарикэ')|E], founded in the wake of the [akallabeth|E] to constrain and counsel the kings of this house - has been summoned to hear my will and testament.\n\nThey have served me long, these men and women - some all their lives, some inheriting their seats from fathers who served my earlier years. They know me as no one save my sons does. They will respect my last word; of that I am certain. The Council holds the ancient right to deprive a king of his throne - but it has rarely seen fit to overturn the orderly succession of one who has ruled well.\n\nI look down the long table - silver-haired captains and merchant-princes, lore-keepers of the [adunaic|E] tongue and shipwrights of the royal arsenal - and I am aware that what I say next shall outlive me by more years than I can count.\n\n#EMP 'My lords. My ladies. The matter of the succession.' #!"
 anarike.1003.a: "[first_son.GetFirstName] shall reign. Let Anarikê stand alone, as our forefathers did."
 anarike.1003.a.tt: "[first_son.GetFirstName] will succeed you. He will inherit a mandate to preserve Anarikê's independence and the proud separation of her dual heritage. [second_son.GetFirstName] will harbour resentment at being passed over."
 anarike.1003.b: "[second_son.GetFirstName] shall reign. Let him do what I could not, and make peace with [khy|E]."
 anarike.1003.b.tt: "[second_son.GetFirstName] will succeed you. He will inherit a mandate to seek reconciliation with [khy|E] and pursue better relations with all of Anarikê's neighbours. [first_son.GetFirstName] will harbour resentment at being passed over the rightful order of birth."
 anarike.1003.c: "Let them rule together"
 anarike.1003.c.tt: "[first_son.GetFirstName] will inherit the throne; [second_son.GetFirstName] will be appointed Chief Minister. Whether they hold together or fall apart shall be seen in the years to come."
 anarike.1003.d: "I leave the choice to the Sâibêth itself, when I am gone."
 anarike.1003.d.tt: "Upon your death, the [saibeth_nazrubari|E] shall convene and elect your successor from among your sons by the weight of their own counsel."

 anarike.1004.t: "Beyond the Sundering Seas"
 anarike.1004.desc: "The chamber is hushed but not dark. They have opened the great window to the sea, as I asked - that I might hear the gulls and smell the sea-air one last time. [first_son.GetFirstName] kneels at one side of the bed; [second_son.GetFirstName] at the other. My oldest friends amoungst the [saibeth_nazrubari|E] stands in attendance at the foot of the bed, in the formal grey of mourning-not-yet-begun.\n\nThere is no pain. That, more than anything else, is the gift I have been given - a death without pain, after a life without war. The gulls cry beyond the window, and the light upon the water is the same gold and rose I have watched a hundred years of evenings.\n\nI think of [first_wife.GetFirstName], waiting, past the star of Iarendel, I see [second_wife.GetFirstName] holding my sons' wet faces. I think of the last Lord-Admiral, the founder of my line, whose long-dead foresight set [Concept('anarike', 'Анарикэ')|E] upon its course. Of all I have held, and all I am now letting go.\n\n#EMP 'The realm,' #! I murmur - and they all lean close. #EMP '- is at peace.' #!\n\nAnd then - I am gone."
 anarike.1004.a: "(A king has died. Long live the king.)"