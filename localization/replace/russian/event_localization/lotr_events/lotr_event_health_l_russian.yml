l_russian:

 lotr_health_events.1098.t: "[SCOPE.Custom('EventTitleDisease')]: Lost Pride"
 lotr_health_events.1098.desc: "The fear of losing my beard has been a constant companion throughout my life. My childhood nurse told me haunting stories of itching chins, and bloody blisters across the skin, culminating in the victim's hair falling off.\n\nYet now, the Beardrot is no longer just a bedtime tale. Gingerly, I run my trembling fingers through the residual patches of my once mighty beard. A dark and devastating force is tainting my hair, consuming it as I still breathe."
 lotr_health_events.1098.court_physician.desc: "\n\n"My [ROOT.Char.GetLadyLord], I will do everything in my power, but it might be wise to prepare for the worst...""
 lotr_health_events.1098.a: "Oh, [ROOT.Char.GetFaith.HealthGodName]! Save me from this nightmare!"

 lotr_health_events.1099.t: "[SCOPE.Custom('EventTitleDisease')]: The Wraith's Touch"
 lotr_health_events.1099.desc: "Since I have been in contact with this Dark Rider, I haven't felt the same. Everything around me feels like inside a nightmare:\n\nthe colours aren't as bright as they once were, the sun on my skin gives no warmth and I feel all my energy draining out of me. All I want to do anymore is sleep.\n\nI fear I have been touched by the terrible Black Breath, of which no cure is known."
 lotr_health_events.1099.court_physician.desc: "\n\n"My [ROOT.Char.GetLadyLord], I will do everything in my power, but it might be wise to prepare for the worst...""
 lotr_health_events.1099.a: "Oh, [ROOT.Char.GetFaith.HealthGodName]! Save me from this nightmare!"