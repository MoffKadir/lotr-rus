l_russian:

 lotr_health_events.1098.t: "[SCOPE.Custom('EventTitleDisease')]: Утраченная гордость"
 lotr_health_events.1098.desc: "Страх потерять бороду был постоянным спутником на протяжении всей моей жизни. В детстве кормилица рассказывала мне жуткие истории о зудящих подбородках и кровавых волдырях на коже, в результате которых у жертвы выпадали волосы.\n\nТем не менее, теперь бородная гниль - это уже не просто сказка на ночь. Я осторожно провожу дрожащими пальцами по остаткам своей некогда могучей бороды. Тёмная и разрушительная сила окрашивает мои волосы, поглощая их, пока я ещё дышу."
 lotr_health_events.1098.court_physician.desc: "\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetLadyLord], я сделаю всё, что в моих силах, но, возможно, было бы разумно приготовиться к худшему...»"
 lotr_health_events.1098.a: "О, [ROOT.Char.GetFaith.HealthGodName]! Спаси меня от этого кошмара!"

 lotr_health_events.1099.t: "[SCOPE.Custom('EventTitleDisease')]: Касание призрака"
 lotr_health_events.1099.desc: "С тех пор, как я [Select_CString(ROOT.Char.IsFemale, 'встретилась', 'встретился' )] с этим тёмным всадником, я не [Select_CString(ROOT.Char.IsFemale, 'чувствовала', 'чувствовал' )] себя [Select_CString(ROOT.Char.IsFemale, 'прежней', 'прежним' )]. Всё вокруг меня словно в ночном кошмаре:\n\nцвета уже не такие яркие, как раньше, солнце не греет мою кожу, и я чувствую, как из меня уходит вся энергия. Всё, чего я сейчас хочу, - это спать.\n\nБоюсь, меня коснулось ужасное чёрное дыхание, которое считается неизлечимым."
 lotr_health_events.1099.court_physician.desc: "\n\n«[Select_CString(ROOT.Char.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.GetLadyLord], я сделаю всё, что в моих силах, но, возможно, было бы разумно приготовиться к худшему...»"
 lotr_health_events.1099.a: "О, [ROOT.Char.GetFaith.HealthGodName]! Спаси меня от этого кошмара!"