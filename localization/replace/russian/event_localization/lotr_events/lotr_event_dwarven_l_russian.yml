l_russian:

 dwarven.0101.t: "Одна жизнь - одна пара"
 dwarven.0101.desc.intro: "[Select_CString(dead_character.IsFemale, 'Моя супруга', 'Мой супруг' )], [dead_character.GetTitledFirstName], [Select_CString(dead_character.IsFemale, 'умерла', 'умер' )], оставив после себя жизнь, которую мы строили вместе. В чертогах стало холоднее, но жизнь продолжается.\n\nСреди нашего народа браки редки и не воспринимаются легкомысленно. Большинство [Concept('dwarves', 'гномов')|E] живут в одиночестве, но те, кто находит пару, связывают себя узами брака на всю жизнь."
 dwarven.0101.desc.no.dwarven.remarriage: "Такие узы представляют не столько любовь, но честь и постоянство - гномы заключают брак только один раз, и никакие традиции не допускают повторного брака, даже после смерти.\n\nПусть горе тяготит меня, но теперь я [Select_CString(ROOT.Char.IsFemale, 'должна идти одна', 'должен идти один' )]. Искать пару - значит выступить против традиций нашего народа, и я хорошо знаю, что ни один гном никогда не поступал так и хранил честь."
 dwarven.0101.desc.dwarven.remarriage.allowed: "Такие узы нелегко расторгнуть - даже после смерти. Традиция гласит, что гном не должен вступать в новый брак, а на тех, кто его заключает, часто смотрят с тихим неодобрением.\n\nТем не менее, ни один закон не запрещает этого. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, стоит ли мне следовать традициям и остаться [Select_CString(ROOT.Char.IsFemale, 'одной', 'одному' )], или же искать другую пару, зная, что это вызовет осуждение."
 dwarven.0101.a: "[dead_character.GetTitledFirstName] навеки в моём сердце, в жизни и памяти."
 dwarven.0101.b: "Да простит меня Махал, но я снова нуждаюсь в тепле."

 dwarven_racial.1001.t: "Хорошая стрижка"
 dwarven_racial.1001.desc: "Я закрываю дверь в свои покои и запираю её на ключ. Такие вещи требуют сосредоточенности, и их нельзя отвлекать. Затем следует несколько подготовительных минут, чтобы убедиться, что свечи будут гореть долго и ровно, поправить зеркало и аккуратно расставить табурет. Вскоре я [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] начать.\n\nРитуал начинается с тщательной оценки текущего состояния моей бороды. Конечно, могло быть и хуже, учитывая все обстоятельства. Немного неровная, с несколькими выбившимися волосками, но ничего, что можно было бы исправить. Я [Select_CString(ROOT.Char.IsFemale, 'приступила', 'приступил' )] к работе с особой тщательностью и дисциплиной.\n\nКаждое аккуратное движение лезвием сопровождается нанесением свежей теплой воды, которая смягчает волосы и обеспечивает аккуратность. Процесс требует времени, но с такими задачами не стоит торопиться. Постепенно симметрия возвращается, и непослушные пряди укладываются в линию.\n\nНаконец-то я откидываюсь на спинку стула и изучаю свое отражение. В целом, я [Select_CString(ROOT.Char.IsFemale, 'стала', 'стал' )] выглядеть намного лучше. Борода теперь имеет изящную форму, подчеркивающую ее достоинства. Я [Select_CString(ROOT.Char.IsFemale, 'подстригла', 'подстриг' )] гораздо более красивую фигуру, и в придачу этот процесс был расслабляющим."
 dwarven_racial.1001.a: "Надо заниматься этим почаще."

 dwarven_racial.1002.t: "Фантастическая стрижка"
 dwarven_racial.1002.desc: "Я запираю дверь и готовлю свои покои к предстоящей работе. Я выбираю самую удобную подушку для табурета для бритья, устанавливаю зеркало так, чтобы свет лампы не бил мне в глаза, и зажигаю ароматическую свечу для пущей убедительности.\n\nФигура в зеркале стала выглядеть лучше, и я [Select_CString(ROOT.Char.IsFemale, 'обратила', 'обратил' )] внимание на плачевное состояние своей бороды. Множество волосков выпало, а по всей поверхности образовались неровные участки. Я [Select_CString(ROOT.Char.IsFemale, 'принялась', 'принялся' )] за работу и вскоре [Select_CString(ROOT.Char.IsFemale, 'вошла', 'вошёл' )] в устойчивый ритм, чередуя бритвенные движения с нанесением на лицо успокаивающей воды и каменной соли. Вскоре я теряюсь в рутине, и дневное бремя сваливается с моих плеч.\n\nПроходит некоторое время, но в конце концов я откладываю бритву, чтобы оценить работу своих рук. Это величественно. Моя борода теперь гордо свисает, ухоженная до совершенства. Я выгляжу на много лет моложе, но от этого не менее [Select_CString(ROOT.Char.IsFemale, 'мудрой', 'мудрым' )]. Я чувствую прилив сил и [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] к любым испытаниям."
 dwarven_racial.1002.a: "Я выгляжу... величественно."

 dwarven_racial.1003.t: "Хорошая стрижка?"
 dwarven_racial.1003.desc: "Когда я закрываю дверь в свою спальню, меня охватывает знакомое чувство уюта. Я сажусь на табурет у зеркала и бросаю взгляд на фигуру, смотрящую на меня из зеркала. Мой взгляд прикован к внушительной бороде на моём подбородке. Однако из моего носа торчит несколько лишних волосков, и, кажется, он немного длиннее с левой стороны, ближе к уху...\n\nЯ осторожно беру бритву и начинаю подстригать - несколько пучков здесь, несколько волосков там, ещё чуть-чуть... теперь разберусь с этим кусочком... на несколько волосков больше, чем нужно, но я просто выровняю их...\n\nМои мысли обрываются, а глаза расширяются. Я не могу исправить то, что только что [Select_CString(ROOT.Char.IsFemale, 'натворила', 'натворил' )]. Я [Select_CString(ROOT.Char.IsFemale, 'сделала', 'сделал' )] надрез слишком близко к коже, и теперь у меня в руке остается целый клок волос. Я смотрю в зеркало и чуть не вскрикиваю от ужаса.\n\nЕдинственный способ исправить ту катастрофу, которую я сам на себя [Select_CString(ROOT.Char.IsFemale, 'навлекла', 'навлёк' )], - это сбрить #italic всё#! это."
 dwarven_racial.1003.a: "Я не могу этого сделать! Я бы никогда не [Select_CString(ROOT.Char.IsFemale, 'смогла', 'смог' )] этого сделать!"

 ### Balin events ###
 dwarven.0205.t: "Вглядываясь в Кхелед-зарам"
 dwarven.0205.desc.1: "Выйдя из Великих врат, я и мои спутники спускаемся по долине к длинному спокойному озеру. [Glossary('Кхелед-зарам','kheled_zaram_gloss')], в которое вглядывался сам [durin|E], стоит безмолвно и неподвижно. Мы долго смотрим в него, размышляя о судьбе нашей колонии и о том, каким должен быть наш следующий шаг. Вижу ли я намёк на древние звезды, увенчанные могучей короной? Знак или, может быть, плод моего усталого разума?\n\nНо внезапно спокойствие нарушает страшный шум. Мы поднимаемся с места и оборачиваемся: ужас, как лед, наполняет наши вены. С юго-востока по долине мчится отряд [Concept('orcs', 'орков')|E] с луками и мечами в руках. Я поспешно отдаю приказ отступить за Врата. Но хотя [Concept('dwarves', 'гномы')|E] и бегут быстро, нас быстро настигают! Хотя мы поднимаем топоры, а наши доспехи останавливают множество стрел, их просто слишком много. В хаосе мы разделены, и я не знаю, кто выживет, а кто умрёт. Да смилостивится [mahalcharacter|E] над всеми нами."
 dwarven.0205.desc.2: "Я иду один, старый [Concept('dwarf', 'гном')|E], ссутулившийся от напряжения и забот. Если бы моя борода уже не была белой, она бы точно стала такой! А ведь когда-то все было так многообещающе.\n\nСпустившись в долину, я наконец пришел к Кхелед-зараму, откуда [durin|E] вглядывался в тишину и безмятежность.\n\nВглядываясь в его чистые и холодные глубины, мой разум мечется, отчаянно ища разгадку. Вижу ли я намёк на древние звезды, увенчанные могучей короной? Знак или, может быть, плод моего усталого разума?\n\nОднако внезапно спокойствие нарушает страшный шум. Поднявшись, я увидел с юго-востока отряд [Concept('orcs', 'орков')|E], мчащихся по долине! В их руках луки и стрелы, а в их рядах - варги. Лед наполняет мои жилы, и я устремляюсь к Великим вратам. И хотя мои доспехи выдерживают множество стрел, наконец одна находит в них брешь. Я падаю на колени, но в нескольких футах от Ворот мои верные спутники бросаются навстречу врагу.\n\nЯ чувствую, что теряю сознание. Да смилостивится [mahalcharacter|E] над всеми нами. Прости глупость непутевого сына."
 dwarven.0205.a: "Даин... ты был прав..."
 dwarven.0205.b: "Гах!"

 dwarven.0210.t: "Битва за Мазарбул"
 dwarven.0210.desc: "Хотя я и выжил, но не без ранений и потерь. Многие воины и друзья, которые доверяли мне, лежат убитыми у ворот и в залах. А впереди еще больше плохих новостей. Отряд [Concept('orcs', 'орков')|E], который мы разгромили, как говорят разведчики, был лишь авангардом большого войска [Concept('orcs', 'орков')|E]. \n\nМы считали их побеждёнными, но, похоже, они просто выжидали время. Меня охватило страшное сомнение, и я сам себя осуждаю за свою глупость! Но я не подаю виду, ибо кто же поведёт за собой, если не я? Я - повелитель [Concept('moria', 'Мории')|E], и если сегодня мне суждено умереть, то и я умру как повелитель.\n\nС мрачными лицами мои верные последователи принялись за работу, готовясь к худшему."
 dwarven.0210.a: "Барабаны. Барабаны бьют в глубине. Они близко."

 ## Introduction ###
 dwarven.1000.t: "Дети Махала"
 dwarven.1000.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'родилась', 'родился' )] среди детей [Concept( 'mahalcharacter', 'Махала' )|E], приёмных детей [eru|E], стойких [Concept( 'dwarves', 'гномов' )|E]. Наш отец создал нас в тёмные времена, и поэтому мы выносливее [Concept( 'conceptracemen', 'людей' )|E], и более устойчивы к болезням и порче.\n\nМы - долгожители и медленно расцветаем: мы считаем, что наша молодежь - не более чем дети до достижения ими [Concept( 'majority', 'совершеннолетия' )|E] в 40 лет, и что неуместно вступать в брак до 70 лет. Немногие из нас вступают в брак, а те, кто вступает, - только один раз. Гномы обоих полов носят бороды с рождения, а гном без бороды является объектом большого стыда и насмешек.\n\n[Concept('khuzdul', 'Кхуздул')|E], наш священный язык, сотворённый самим [Concept('mahalcharacter', 'Создателем')|E], никогда не произносится в присутствии не-гномов и предназначен для древних преданий и торжественных собраний. В повседневной жизни мы переходим на язык наших ближайших соседей и деловых партнёров.\n\nХотя мы не боимся солнца, как [orcs|El], нам комфортнее всего под землёй, где мы высекаем залы в живой скале. Многие из чертогов наших предков были разрушены, и сейчас самое время вернуть их!"
 dwarven.1000.a: "[Glossary('Барук Кхазад','baruk_khazad_gloss')]! [Glossary('Кхазад ай-мену','khazad_ai_menu_gloss')]!"

 ### Invite Dwarves to the White Mountains events ###
 dwarven.2000.t: "Короли гномов"
 dwarven.2000.desc: "Приняв решение пригласить [Concept('dwarves', 'гномов')|E] заселить горы у моих границ, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать, к кому из их королей обратиться со своим предложением.\n\nГномы обычно держатся особняком и не покидают пределов своих подгорных чертогов, но даже среди их народа могут найтись те, кто захочет принять этот вызов и со временем стать полноправными владыками этого нового гномьего королевства.\n\nПока я обдумываю свой выбор, мне на ум приходят несколько кандидатов..."
