 dwarven.2001.t: "[mountains_inviter.GetName]: приглашение"
 dwarven.2001.desc.gundabad: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих у священной горы [Concept('gundabad', 'Гундузбад')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии под её вершинами!\n\nГундабад был местом, где пробудился [Concept('durindeathless', 'Дурин Бессмертный')|E], когда мир был молод и зелен, но вот уже много тысячелетий он кишит [Concept('orcs', 'орками')|E]. Может быть, настало время изменить этот факт?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.carndum: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на равнинах [Concept('angmar', 'Ангмара')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии под пиками, что лежат к северу от этих земель!\n\nЗа исключением самых ранних дней Третьей эпохи, гномы никогда не жили под этими вершинами. Какие богатства могут быть там спрятаны?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.mountgram: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на равнинах [Concept('angmar', 'Ангмара')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии на одинокой вершине горы Грам!\n\nЭто место уже давно заселено мерзкими [Concept('orcs', 'орками')|E] и [Concept('goblins', 'гоблинами')|E], которые не раз совершали набеги на [Concept('eriador', 'Эриадор')|E]. Если гномы захватят это место, то смогут сделать много хорошего.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.greydelve: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на севере [Concept('anduinvale', 'Долины Андуина')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в западных [Concept('greymountains', 'Серых горах')|E]!\n\n[Concept('longbeards', 'Длиннобороды')|E] жили в этих горах на протяжении многих лет, но были изгнаны [Concept('dragon', 'драконьим')|E] пламенем. Пришло ли наконец время вернуться?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.greymountains: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на севере [Concept('mirkwood', 'Лихолесья')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в восточных [Concept('greymountains', 'Серых горах')|E]!\n\n[Concept('longbeards', 'Длиннобороды')|E] жили в этих горах на протяжении многих лет, но были изгнаны [Concept('dragon', 'драконьим')|E] пламенем. Пришло ли наконец время вернуться?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.erebor: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих у Долгого озера, [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в [Concept('lonelymountain', 'Одинокой горе')|E]!\n\nКогда-то это был гордый дом [Concept('longbeards', 'Длиннобородов')|E], народа [Concept('durin', 'Дурина')|E], пока не случилась трагедия, и они не были изгнаны со своей горы. Пришло ли время вернуть это место [Concept('dwarves', 'гномам')|E]?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.ironhills: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих в предгорьях [Concept('ironhills', 'Железных холмов')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в том же регионе!\n\nВ Железных холмах гномьи поселения существовали тысячелетиями, начиная с мифической Первой эпохи, и, похоже, гномье присутствие там будет всегда.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.uldonaspine: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на равнинах Рованиона, [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии на хребте Ульдоны!\n\nНекогда богатое владение [Concept('ironfists', 'Железноруков')|E] было разграблено огненным змеем и превратилось в разорённое гнездовье [Concept('goblins', 'гоблинов')|E]. Похоже, скоро всё изменится...\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.moria: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на юге [Concept('anduinvale', 'Долины Андуина')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в самом [Concept('khazaddum', 'Кхазад-думе')|E]!\n\n[Concept('longbeards', 'Длиннобороды')|E] жили в этих горах тысячелетиями, но были изгнаны яростью Проклятия Дурина. Пришло ли наконец время вернуться?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.goblintown: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих в центральной [Concept('anduinvale', 'Долине Андуина')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в горах у Высокого перевала!\n\nГоблинград, расположенный неподалеку, всегда беспокоил путников, стремящихся пересечь [Concept('mistymountains', 'Мглистые горы')|E]. Возможно, пришло время [Concept('dwarves', 'гномам')|E] окончательно покончить с присутствием [Concept('goblins', 'гоблинов')|E] в этих краях?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.belegost: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих у равнин Луна, [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в северных [Concept('bluemountains', 'Синих горах')|E]!\n\nДревняя родина [Concept('broadbeams', 'Широкозадов')|E], этот горный хребет с течением веков становился все слабее и слабее. Пришло ли время нашему роду вновь возродиться?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.nogrod: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на юге Башенных холмов, [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в южных [Concept('bluemountains', 'Синих горах')|E]!\n\nДревняя родина [Concept('firebeards', 'Огнебородов')|E], этот горный хребет с течением веков становился все слабее и слабее. Пришло ли время нашему роду вновь возродиться?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.glitteringcaves: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на равнинах [Concept('rohan', 'Рохана')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в северных [Concept('whitemountains', 'Белых горах')|E]!\n\nГномы никогда прежде не обитали под этими вершинами. Кто может сказать, какие несметные богатства могут быть обнаружены в Белых горах?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.whitemountains: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на полях [Concept('gondor', 'Гондора')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в южных [Concept('whitemountains', 'Белых горах')|E]!\n\n Гномы никогда прежде не обитали под этими вершинами. Кто может сказать, какие несметные богатства могут быть обнаружены в Белых горах?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.barazimabul: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих в джунглях Заджантака, [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в центральных [Concept('yellowmountains', 'Жёлтых горах')|E]!\n\nКогда-то эти горы были заселены бежавшими с востока [Concept('blacklocks', 'Черновласами')|E], но до сих пор они остаются нетронутыми. Кто знает, какие богатства еще дремлют под их вершинами?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.easternyellows: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих в джунглях Юсакана, [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в восточных [Concept('yellowmountains', 'Жёлтых горах')|E]!\n\nКогда-то эти горы были заселены бежавшими с востока [Concept('blacklocks', 'Черновласами')|E], но до сих пор они остаются нетронутыми. Кто знает, какие богатства еще дремлют под их вершинами?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.southernyellows: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих на равнинах Тумага, [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии в южных [Concept('yellowmountains', 'Жёлтых горах')|E]!\n\nКогда-то эти горы были заселены бежавшими с востока [Concept('blacklocks', 'Черновласами')|E], но до сих пор они остаются нетронутыми. Кто знает, какие богатства еще дремлют под их вершинами?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.desc.blackflame: "К моему двору прибыл гонец с необычным предложением. [mountains_inviter.GetName], [Select_CString(mountains_inviter.IsFemale, 'одна', 'один' )] из правителей, живущих в предгорьях юго-западной оконечности [Concept('yellowmountains', 'Жёлтых гор')|E], [Select_CString(mountains_inviter.IsFemale, 'предложила', 'предложил' )] спонсировать основание [Concept('dwarven', 'гномьей')|E] колонии прямо на границе [Concept('thanihazad', 'Тани-Хазада')|E]!\n\nКогда-то эти горы были заселены бежавшими с востока [Concept('blacklocks', 'Черновласами')|E], но до сих пор они остаются нетронутыми. Кто знает, какие богатства еще дремлют под их вершинами?\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать достойного кандидата, который откликнется на приглашение, которое [Select_CString(mountains_inviter.IsFemale, 'сделала', 'сделал' )] [mountains_inviter.GetFirstName], чтобы быть [Select_CString(ROOT.Char.IsFemale, 'уверенной', 'уверенным' )], что новое гномье владение будет в надежных руках после основания!"
 dwarven.2001.a: "Мой рыцарь, [candidate1.GetName], справится с этой задачей!"
 dwarven.2001.a.tt: "[candidate1.GetName] отправится в эти дикие горы, чтобы основать там новую колонию"
 dwarven.2001.b: "Я поручаю это дело вам, [candidate2.GetFirstName]."
 dwarven.2001.b.tt: "[candidate2.GetFirstName] отправится в эти нетронутые вершины, чтобы основать там новую колонию"
 dwarven.2001.c: "Я считаю, что [candidate3.GetName] лучше всего подходит для этой миссии."
 dwarven.2001.c.tt: "[candidate3.GetName] отправится в эти нетронутые вершины, чтобы основать там новую колонию"
 dwarven.2001.d: "Это задание для [gimli.GetFirstName], сына Глоина!"
 dwarven.2001.d.tt: "[gimli.GetName] отправится в эти нетронутые вершины, чтобы основать там новую колонию"
 dwarven.2001.e: "Для этой задачи лучше всего подойдёт [gamil.GetFirstName], ученик Гимли!"
 dwarven.2001.e.tt: "[gamil.GetName] отправится в эти нетронутые вершины, чтобы основать там новую колонию"

 dwarven.2002.t: "Прибытие гномов-колонистов"
 dwarven.2002.desc: "В ответ на мое недавнее приглашение поселиться в горах у границ моей [Concept('realm', 'державы')|E] [mountainssettler.GetName] [Select_CString(mountainssettler.IsFemale, 'прибыла', 'прибыл' )] ко мне с небольшим отрядом [Concept('dwarves', 'гномов')|E]-авантюристов.\n\nОни просят моей поддержки в финансировании их новой гномьей твердыни, которую они планируют основать во владении [target_county.GetNameNoTier]. Если я помогу им в этом, они смогут быстрее развить свою новую державу и стать более успешными..."
 dwarven.2002.a: "Я выделю им щедрую сумму."
 dwarven.2002.a.tt: "Новая колония получит две развитые дополнительные постройки"
 dwarven.2002.b: "Выделим им приличную сумму."
 dwarven.2002.b.tt: "Новая колония получит две дополнительные постройки"
 dwarven.2002.c: "Они получат часть моего золота."
 dwarven.2002.c.tt: "Новая колония получит одну дополнительную постройку"
 dwarven.2002.d: "Средства? Разрешения на заселение вполне достаточно!"
 dwarven.2002.d.tt: "Новая колония не получит дополнительные постройки"

 dwarven.2004.t: "Заселение гор"
 dwarven.2004.desc: "Из [Concept('dwarven', 'гномьей')|E] колонии в горах, которую я [Select_CString(ROOT.Char.IsFemale, 'спонсировала', 'спонсировал' )], до меня доходят радостные вести. Строительство завершено, и новая гномья крепость во владении [target_county.GetNameNoTier] завершена!\n\n[Select_CString(mountainssettler.IsFemale, 'Новая гномья правительница', 'Новый гномий правитель' )], [mountainssettler.GetName], [Select_CString(mountainssettler.IsFemale, 'вступила', 'вступил' )] во владение новой крепостью, и гномы усердно принялись за добычу полезных ископаемых в своих новых землях. Пусть [ROOT.Char.GetFaith.HighGodName] дарует им скорый успех в их начинаниях!"
 dwarven.2004.a: "Желаем удачи нашим новым соседям!"
 dwarven.2004.a.tt: "[mountainssettler.GetName] становится вашим [Concept('protectorate', 'протекторатом')|E]"
 dwarven.2004.b: "Остаётся надеяться, что они не затаили обиду на нас за отказ в финансировании..."
 dwarven.2004.c: "Интересно, что [mountainssettler.GetFirstName] будет делать дальше..."

 dwarven.2005.t: "Успешное заселение"
 dwarven.2005.desc: "Из [Concept('dwarven', 'гномьей')|E] колонии, которую [Select_CString(mountains_inviter.IsFemale, 'спонсировала', 'спонсировал' )] [mountains_inviter.GetName], до меня доходят радостные вести. Строительство завершено, и новая гномья крепость во владении [target_county.GetNameNoTier] завершена!\n\n[Select_CString(mountainssettler.IsFemale, 'Новая гномья правительница', 'Новый гномий правитель' )], [mountainssettler.GetName], [Select_CString(mountainssettler.IsFemale, 'вступила', 'вступил' )] во владение новой крепостью, и гномы усердно принялись за добычу полезных ископаемых в своих новых землях. Пусть [ROOT.Char.GetFaith.HighGodName] дарует им скорый успех в их начинаниях!"
 dwarven.2005.a: "Желаем им удачи и благословения Махала."
 dwarven.2005.b: "[mountainssettler.GetFirstName] [Select_CString(mountainssettler.IsFemale, 'обязана', 'обязан' )] мне своей верностью!"
 dwarven.2005.c: "Интересно, что [mountainssettler.GetFirstName] будет делать дальше..."

 ### Dwarven Reincarnation Events
 dwarven.5002.t: "[my_dorfdad.GetFirstNameNoTooltip]: сходства"
 dwarven.5002.desc: "Чем старше я становлюсь, тем больше я замечаю, что я и [my_dorfdad.GetFirstName], [Select_CString(my_dorfdad.IsFemale, 'описанная', 'описанный' )] в легендах [Concept( 'dwarves', 'гномов' )|E], имеем много общего. И в характере, и во внешности я, кажется, [Select_CString(ROOT.Char.IsFemale, 'унаследовала', 'унаследовал' )] некоторые черты [my_dorfdad.GetHerHis] характера."
 dwarven.5002.durin: "Мне снится тёмное озеро..."
 dwarven.5002.durin.tt: "В отражении которого звёзды выстроились в корону."
 dwarven.5002.uri: "Мне снится огонь..."
 dwarven.5002.uri.tt: "Горящий в кузне, жаркий и яростный."
 dwarven.5002.dwalin: "Мне снятся знания..."
 dwarven.5002.dwalin.tt: "Сокрытые в подземных хранилищах."
 dwarven.5002.thrar: "Мне снится гора..."
 dwarven.5002.thrar.tt: "Вечно непреклонная, непоколебимая и гордая."
 dwarven.5002.sindri: "Мне снится золото..."
 dwarven.5002.sindri.tt: "Горы богатств, принадлежащих лишь мне."
 dwarven.5002.thulin: "Мне снится дракон..."
 dwarven.5002.thulin.tt: "Его череп висит на стене."
 dwarven.5002.bavor: "Мне снятся семь самоцветов..."
 dwarven.5002.bavor.tt: "Украшающих великолепно сделанное ожерелье"
 dwarven.5002.fallback: "Мне снится молот..."
 dwarven.5002.fallback.tt: "Высоко поднятый над головой ремесленника с грустью в глазах."

 dwarven.5003.t: "Беря пример с праотца"
 dwarven.5003.desc: "[Select_CString(new_dorfdad.IsFemale, 'Юная', 'Юный' )] [new_dorfdad.GetFirstName], похоже, берёт пример с [Concept('dwarffather', 'праотца')|E] своего клана, коим был [my_dorfdad.GetFirstNameNicknamed]! [Select_CString(new_dorfdad.IsFemale, 'Она', 'Он' )] становится довольно многообещающим молодым [Concept( 'dwarf', 'гномом' )|E].\n\nБудь то природа или воспитание, в [Select_CString(new_dorfdad.IsFemale, 'ней', 'нём' )] сияет сила народа, которому положил начало [my_dorfdad.GetFirstNameNoTooltip]."
 dwarven.5003.desc_mother: "[Select_CString(new_dorfdad.IsFemale, 'Юная', 'Юный' )] [new_dorfdad.GetFirstName], похоже, берёт пример с [Concept('dwarfmother', 'праматери')|E] своего клана, коей была [my_dorfdad.GetFirstNameNicknamed]! [Select_CString(new_dorfdad.IsFemale, 'Она', 'Он' )] становится довольно многообещающим молодым [Concept( 'dwarf', 'гномом' )|E].\n\nБудь то природа или воспитание, в [Select_CString(new_dorfdad.IsFemale, 'ней', 'нём' )] сияет сила народа, которому положила начало [my_dorfdad.GetFirstNameNoTooltip]."
 dwarven.5003.a: "Интересно..."
 dwarven.5003.tt: "[new_dorfdad.GetFirstNameNoTooltip] получает одно из [Concept( 'personality_traits', 'свойств личности' )|E] своего предка"

 dwarven.5100.t: "[my_dorfdad.GetFirstNameNoTooltip] [Select_CString(my_dorfdad.IsFemale, 'Возродившаяся', 'Возродившийся' )]"
 dwarven.5100.desc: "Сначала были сны и обрывочные воспоминания, едва различимые, словно в тумане. Теперь, я полностью [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )].\n\nЯ - [my_dorfdad.GetFirstNameNoTooltip], один из семи гномьих [Concept('dwarffather', 'праотцов')|E], [Select_CString(ROOT.Char.IsFemale, 'возродившаяся', 'возродившийся' )] милостью [Concept( 'mahalcharacter', 'Махала' )|E], чтобы вновь вести наш народ!"
 dwarven.5100.desc_mother: "Сначала были сны и обрывочные воспоминания, едва различимые, словно в тумане. Теперь, я полностью [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )].\n\nЯ - [my_dorfdad.GetFirstNameNoTooltip], одна из семи гномьих [Concept('dwarfmother', 'праматерей')|E], [Select_CString(ROOT.Char.IsFemale, 'возродившаяся', 'возродившийся' )] милостью [Concept( 'mahalcharacter', 'Махала' )|E], чтобы вновь вести наш народ!"
 dwarven.5100.a: "Мне нужно рассказать семье"
 
 dwarven.5101.t: "[my_dorfdad.GetFirstNameNoTooltip] [Select_CString(my_dorfdad.IsFemale, 'Возродившаяся', 'Возродившийся' )]"
 dwarven.5101.desc.intro: "До меня дошли вести и том, что [new_dorfdad.GetFirstName] - это наш перерождённый [Concept( 'dwarffather', 'праотец' )|E], [my_dorfdad.GetFirstNameNoTooltip] [Select_CString(my_dorfdad.IsFemale, 'возродившаяся', 'возродившийся' )]!\n\n"
 dwarven.5101.desc.intro_mother: "До меня дошли вести и том, что [new_dorfdad.GetFirstName] - это наша перерождённая [Concept('dwarfmother', 'праматерь')|E], [my_dorfdad.GetFirstNameNoTooltip] [Select_CString(my_dorfdad.IsFemale, 'возродившаяся', 'возродившийся' )]!\n\n"
 dwarven.5101.desc.longbeard: "[longbeards|E]"
 dwarven.5101.desc.firebeard: "[firebeards|E]"
 dwarven.5101.desc.broadbeam: "[broadbeams|E]"
 dwarven.5101.desc.blacklock: "[blacklocks|E]"
 dwarven.5101.desc.ironfist: "[ironfists|E]"
 dwarven.5101.desc.stiffbeard: "[stiffbeards|E]"
 dwarven.5101.desc.stonefoot: "[stonefoots|E]"
 dwarven.5101.desc.fallback: "[Concept( 'dwarf', 'Гномы' )|E]"
 dwarven.5101.desc.outro: "узнают радостную новость - [Select_CString(new_dorfdad.IsFemale, 'наша мать', 'наш отец' )] снова ходит среди нас."
 dwarven.5101.a.close: "[Select_CString(new_dorfdad.IsFemale, 'Моя собственная', 'Мой собственный' )] [ROOT.Char.Custom2('RelationToMeShort', new_dorfdad )]!"
 dwarven.5101.a: "[Select_CString(new_dorfdad.IsFemale, 'Наша мать', 'Наш отец' )], вновь [Select_CString(new_dorfdad.IsFemale, 'возродившаяся', 'возродившийся' )]!"
 dwarven.5101.a.tt: "Возродившиеся [Concept( 'dwarffathers_pluralshort', 'праотцы гномов' )|E] имеют преимущественное право при [Concept( 'succession', 'наследовании' )|E]"
 dwarven.5101.a.tt_mother: "Возродившиеся [Concept( 'dwarfmothers_pluralshort', 'праматери гномов' )|E] имеют преимущественное право при [Concept( 'succession', 'наследовании' )|E]"

 dwarven.5102.t: "[new_dorfdad.GetFirstNameNoTooltip] [Select_CString(new_dorfdad.IsFemale, 'умерла', 'умер' )]" #Event could use better loc
 dwarven.5102.desc: "[new_dorfdad.GetFirstNameNoTooltip], [Select_CString(new_dorfdad.IsFemale, 'возрождённая', 'возрождённый' )] [GetTrait('dwarf_father').GetName( GetNullCharacter )|l] нашего клана, [Select_CString(new_dorfdad.IsFemale, 'умерла', 'умер' )]. После [Select_CString(new_dorfdad.IsFemale, 'её', 'его' )] смерти наступил период общей скорби, когда мы ожидаем [Select_CString(new_dorfdad.IsFemale, 'её', 'его' )] возвращения."
 dwarven.5102.a: "Спи спокойно, [Select_CString(new_dorfdad.IsFemale, 'мать', 'отец' )]."

 ### High King of Durin's Folk Trait events
 dwarven.6001.t: "Укхзад"
 dwarven.6001.desc.regular: "После того, как мой предшественник объединил горы Народа Дурина, наш род обрел престиж и гордость, превосходящие прежних правителей.\n\nВзойдя на трон, я [Select_CString(ROOT.Char.IsFemale, 'была признана', 'был признан' )] как габлабад [Concept('durinsfolk', 'Народа Дурина')|E]. \n\nНет большей чести, которую может быть возложена любого [Select_CString(ROOT.Char.IsFemale, 'женщину', 'мужчину' )]. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] оправдать ожидания моих подданных, если хочу оставаться у власти."
 dwarven.6001.a: "Моё время только настало!"

 dwarven.6002.t: "Новый габлабад"
 dwarven.6002.desc: "Потеряв всю мою легитимность, я более не могу претендовать на титул укхзада. Королевством теперь правит [new_holder.GetTitledFirstName]."
 dwarven.6002.a: "Это ещё не конец!"

 ### Unite the Blue Mountains Events ###
 dwarven.6200.t: "Объединение западных кланов"
 dwarven.6200.desc: "Давным-давно кланы [Concept('broadbeams', 'Широкозадов')|E] и [Concept('firebeards', 'Огнебородов')|E] делили [Concept('bluemountains', 'Синие горы')|E] как свой родовой дом, и долгое время мы были довольны этим. Но теперь всё изменилось.\n\nМы скрепили узы нерушимой дружбы и непреклонных союзов, и отвоевали наши древние крепости и вернули им былую славу. Наши народы стали ближе, чем когда-либо. Став новым габлабадом [Concept('bluemountains', 'Синих гор')|E], я призову к единству все западные кланы и поведу их в новое, светлое будущее."
 dwarven.6200.a: "Отправить письмо всем гномьим владыкам под этими вершинами!"
 dwarven.6200.a.tt: "Вы обратитесь ко всем независимым [Concept('dwarven', 'гномьим')|E] правителям в [Concept('bluemountains', 'Синих горах')|E]"

 dwarven.6201.opening: "[Select_CString(ROOT.Char.IsFemale, 'Крепкая повелительница', 'Крепкий повелитель' )] кланов,"
 dwarven.6201.desc: "[sender.GetTitledFirstName] призывает вас присягнуть на верность и дружбу, в то время как кланы [Concept('bluemountains', 'Синих гор')|E] стремятся к истинному единству среди всех [Concept('dwarves', 'гномов')|E] запада. Пришло время объединиться!"
 dwarven.6201.a: "Мы клянёмся тебе в верности, [sender.GetFirstName], габлабад!"
 dwarven.6201.b: "Мы не обязаны покориться вам!"

 dwarven.6202.opening: "Истинный сын Махала,"
 dwarven.6202.desc: "Мы с радостью присягаем вам на верность, [sender.GetTitledFirstName]. Когда для всех [Concept('dwarves', 'гномов')|E] [Concept('bluemountains', 'Синих гор')|E] наступит новая эпоха, мы поможем вам, чем сможем. Вместе мы будем противостоять тени, поднимающейся на востоке."
 dwarven.6202.a: "Действительно, мудрый выбор."

 dwarven.6203.opening: "Лжепретендент,"
 dwarven.6203.desc: "Мы не видим причин менять статус-кво, сохранявшийся тысячелетиями. В этом деле вы предоставлены сами себе."
 dwarven.6203.a: "Безрассудные глупцы!"

 ### Nurunkizdin/Uldona Spine Events
 dwarven.6300.t: "Высекатель Тьмы"
 dwarven.6300.desc: "Сегодня тот самый день.\n\nВокруг меня собрались представители всех крупных гильдий, а также мастера гильдии инструментальщиков и резчиков по камню. Внизу, в нижних пещерах, толпятся нетерпеливые [Concept('dwarves', 'гномы')|E], а с балконов наверху раздаются ещё более радостные возгласы. Строительство почти завершено.\n\nЭто будет Узфелак, жемчужина #L [GetTitleByKey('k_nurunkizdin').GetNameNoTier]а#!. Огромная башня, перевернутая, свисает с вершины горы, где когда-то обитали мерзкие [Concept('goblins', 'гоблины')|E]. На вершине - хрустальная лампа, свет от которой будет сиять, наполняя эти давно затемнённые залы.\n\nМастера гильдии совместно вручили мне церемониальный резец, искусно украшенный золотой филигранью. «Для нас было бы честью, сюзерен, если бы вы придали форму последнему камню». После последнего удара мой знак был вырезан, и лампа зажглась. Свет, прекрасный во всех отношениях, струится по каждой скале.\n\nДалеко внизу раздаётся жалобный крик."
 dwarven.6300.a: "Трепещите! Узфелак, Высекатель Тьмы!"

 ### Shaving Events
 dwarven.9000.t: "Начисто [Select_CString(ROOT.Char.IsFemale, 'обритая', 'обритый' )]"
 dwarven.9000.cruel.desc: "«О, [recipient.GetFirstNameNoTooltip]!», - Я театрально вздыхаю. «Не бойся. Я здесь не за твоей головой, мне вообще ничего не нужно, хватит и твоей бороды.»"

 dwarven.9001.cruel.desc: "От довольного выражения на [actor.GetHerHis] лице у меня по спине пробегает холодок.\n\n«Не бойся. Мне не нужна твоя голова. Мне вообще ничего не нужно, хватит и твоей бороды»."
 dwarven.9001.compassionate.desc: "«[recipient.GetFirstNameNoTooltip], знай, что мне это не доставляет удовольствия. Но тебя нужно обрить. Ради стабильности державы.»"
 dwarven.9001.a: "Что...? Отпусти меня! #emp Нееет!#!"

 dwarven.9002.t: "Снова [Select_CString(ROOT.Char.IsFemale, 'бородатая', 'бородатый' )]"
 dwarven.9002.desc: "Прошло много лет с тех пор, как меня постыдно начисто обрили. В моих силах было предпринято всё, что можно, чтобы моя заветная борода отросла быстрее, использовались зелья и мази, чтобы придать ей объём и блеск, и, наконец, она приобрела презентабельный вид."
 dwarven.9002.a: "Я снова могу без стыда показаться на публике"

 dwarven.9500.t: "Течение моей жизни"
 dwarven.9500.desc: "Становясь старше, я начинаю размышлять о своём будущем. Главный выбор, который сейчас стоит передо мной, - искать ли мне [Select_CString(ROOT.Char.IsFemale, 'спутника', 'спутницу' )] жизни или сосредоточиться прежде всего на своём ремесле. Нередко [Concept('dwarf', 'гномы')|E] не ищут себе пару и сосредотачиваются на оттачивании своего ремесла. А может быть, [Select_CString(ROOT.Char.IsFemale, 'мой спутник', 'моя спутница' )] жизни не хочет [Select_CString(ROOT.Char.IsFemale, 'жениться на мне', 'выходить за меня' )] или уже [Select_CString(ROOT.Char.IsFemale, 'выбрал', 'выбрала' )] другого! Независимо от причины, в любом из этих вариантов нет ничего постыдного. Однако я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] помнить о наследии моего дома и семьи, чтобы оно не прервалось из-за меня..."
 dwarven.9500.a: "Я буду искать себе пару"
 dwarven.9500.b: "Моё ремесло взывает ко мне!"

 dwarven.9700.t: "Одинокая гора - наша"
 dwarven.9700.desc.evil: "Слишком долго проклятые гномы [Concept('lonelymountain', 'Одинокой горы ')|E] жирели и гордились своими грудами золота, прячась за вратами своей великой горы. Они стойко защищали свои дома, их топоры были остры, а доспехи почти непробиваемы. Но теперь это не так.\n\nТеперь Одинокая гора повержена, ее врата разрушены, а залы красны от гномьей крови. Богатства гномов: сверкающие драгоценности, драгоценные камни, искусно вырезанное оружие, золото сверх меры и печали - все это мы можем взять и разграбить. Многие считали это королевство непобедимым, разве что [Concept('dragon', 'драконьим')|E] огнем, но я [Select_CString(ROOT.Char.IsFemale, 'повергла', 'поверг' )] его в прах."
 dwarven.9700.desc.good: "Падение Эребора потрясло многих, и это была великая трагедия, сродни разорению Смауга. И хотя память о том поражении все еще хранится в наших сердцах, горесть утраты сменилась радостью и надеждой.\n\nОдинокая гора снова наша, скверна, занимавшая ее, полностью очищена, и на троне теперь восседает гном. Эти дикие захватчики были побеждены, как и проклятый дракон в прошлом."
 dwarven.9700.a: "Ура!"

 dwarven.9701.t: "Падение Эребора"
 dwarven.9701.desc: "Эребор, жемчужина моего народа, пал. В событии, которое надолго запомнится гномьему роду, врата Одинокой горы пали, и враги хлынули в сверкающие чертоги гномов. Как и тогда, когда Смауг Золотой сжег Дэйл и Эребор, бесчисленное множество гномов вновь отправились в изгнание, и они с печалью и скорбью оглядываются на свою родину, надеясь однажды вернуться в нее снова. Я не позволю этой мерзости надолго осквернить Эребор.\n\nОднажды мы вернемся и отомстим кровью. Как и Смауга, мы одолеем этот сброд, оскверняющий наш дом!"
 dwarven.9701.a: "Пусть они боятся возвращения детей Махала!"

 dwarven.9805.t: "Узурпация трона"
 dwarven.9805.desc: "Возможно, мой [Select_CString(king.IsFemale, 'моя', 'мой' )] [king.Custom('GetQueenKing')], [king.Custom('GetQueenKing')] [king.GetFirstName] [Select_CString(king.IsFemale, 'потеряла', 'потерял' )] право на власть. Вместо того чтобы позволить [Select_CString(king.IsFemale, 'незаконной правительнице', 'незаконному правителю' )] продолжать занимать своё место на троне, возможно, мне следует возвести на трон [Select_CString(king.IsFemale, 'новую королеву', 'нового короля' )]? Хотя, если подумать, почему я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] даже рассматривать возможность посадить на трон кого-то другого, когда я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] являюсь вполне [Select_CString(ROOT.Char.IsFemale, 'подходящей кандидаткой', 'подходящим кандидатом' )]?\n\nВозможно, настало время мне взять власть над своим кланом в свои руки и занять трон своего народа. Но как мне это сделать? Угрозой меча или кинжала? Быть убедительным дипломатом и семьянином? Примет ли [king.GetFirstNameNoTooltip] моё правление или будет сопротивляться?\n\nИмею ли я право требовать этого от н[king.GetHerHis]?"
 dwarven.9805.a: "Послать [king.GetHerHim] весть о том, что [king.GetSheHe] больше не правит нашим народом."
 dwarven.9805.b: "Я не могу этого сделать, это измена."

 dwarven.9806.t: "[Select_CString(claimant.IsFemale, 'Новая', 'Новый' )] [claimant.Custom('GetQueenKing')]!?"
 dwarven.9806.desc: "[Select_CString(claimant.IsFemale, 'Моя родственница', 'Мой родственник' )] [claimant.GetFirstName] [Select_CString(claimant.IsFemale, 'прислала', 'прислал' )] в мои чертоги возмутительное послание! [claimant.GetFirstName] утверждает, что моя власть над нашим народом незаконна и что [claimant.GetSheHe] - [Select_CString(claimant.IsFemale, 'истинная правительница', 'истинный правитель' )] нашего клана.\n\n[claimant.GetSheHe] просит меня отступить, отказаться от своей короны и трона, чтобы стать [claimant.GetHerHis] [Select_CString(ROOT.Char.IsFemale, 'подданной', 'подданным' )], или [claimant.GetSheHe] свергнет меня! Трон принадлежит мне по праву, но стоит ли сопротивляться, когда я знаю, что это будет стоить жизни стольким моим людям? Как [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] поступить [ROOT.Char.Custom('GetQueenKing')], столкнувшись с подобным предательством?"
 dwarven.9806.a: "Если [Select_CString(claimant.IsFemale, 'эта изменница', 'этот изменник' )] хочет войны, то [claimant.GetSheHe] получит её!"
 dwarven.9806.b: "Я не стану причиной ненужных смертей, я уступлю."

 dwarven.9807.t: "Это будет война!"
 dwarven.9807.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие, что [king.GetFirstName] [Select_CString(king.IsFemale, 'отвергла', 'отверг' )] моё предложение и не хочет мирно уступить мне трон нашего народа. Я не хочу кровопролития, но [king.GetSheHe] принуждает меня, ибо [king.GetHerHis] правление не должно больше продолжаться. Наш народ теперь страдает из-за [king.GetHerHis] выбора."
 dwarven.9807.a: "До этого не должно было дойти, [Select_CString(king.IsFemale, 'родственница', 'родич' )]."

 dwarven.9808.t: "[Select_CString(claimant.IsFemale, 'Новая', 'Новый' )] [claimant.Custom('GetQueenKing')]"
 dwarven.9808.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] известие, что [king.GetFirstName] [Select_CString(king.IsFemale, 'прислушалась', 'прислушался' )] к моему предложению и [Select_CString(king.IsFemale, 'решила', 'решил' )] мирно уступить мне трон нашего народа. Меня радует, что [king.GetSheHe] [Select_CString(king.IsFemale, 'решила', 'решил' )] не жертвовать жизнями нашего народа ради удовлетворения своей гордыни.\n\nМоё правление началось, и мои потомки займут трон после меня. Как [Select_CString(ROOT.Char.IsFemale, 'новая', 'новый' )] [claimant.Custom('GetQueenKing')], я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, как поведу свой народ в эту новую эпоху. Что ждёт меня в будущем? Поведу ли я их в светлое будущее или в славный век? Или же из меня получится [Select_CString(ROOT.Char.IsFemale, 'худшая', 'худший' )] [claimant.Custom('GetQueenKing')], чем все, кто был до меня?"
 dwarven.9808.a: "Для моего народа начинается новая эра!"

 dwarven.9809.t: "Корона победы"
 dwarven.9809.desc: "Отказавшись от моего предложения уступить трон мирным путём, [king.GetFirstName] не [Select_CString(king.IsFemale, 'смогла', 'смог' )] даже защитить свои притязания в войне, так как [king.GetSheHe] [Select_CString(king.IsFemale, 'была побеждена', 'был побеждён' )].\n\nМоё правление началось, и мои потомки должны занять трон после меня. Как [Select_CString(ROOT.Char.IsFemale, 'новая', 'новый' )] [claimant.Custom('GetQueenKing')], я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, как поведу свой народ в эту новую эпоху. Что ждёт меня в будущем? Поведу ли я их в светлое будущее или в славный век? Или же из меня получится [Select_CString(ROOT.Char.IsFemale, 'худшая', 'худший' )] [claimant.Custom('GetQueenKing')], чем все, кто был до меня?"
 dwarven.9809.a: "Для моего народа начинается новая эра!"

 dwarven.9810.t: "Унижение в поражении"
 dwarven.9810.desc: "[Select_CString(claimant.IsFemale, 'Моя родственница', 'Мой родственник' )] [claimant.GetFirstName] [Select_CString(claimant.IsFemale, 'победила', 'победил' )] меня.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'сражалась', 'сражался' )] лишь для того, чтобы защитить то, что [Concept('mahalcharacter', 'Махал')|E] дал мне, от [Select_CString(claimant.IsFemale, 'этой предательницы', 'этого предателя' )], и всё же его благосклонность сошла с моего лица. Теперь [claimant.GetFirstName] правит как [claimant.Custom('GetQueenKing')], к добру или к худу."
 dwarven.9810.a: "Я могу только надеяться, что [claimant.GetSheHe] не разрушит то, чего я [Select_CString(ROOT.Char.IsFemale, 'достигла', 'достиг' )]."

 dwarven.9811.t: "Мои усилия не увенчались успехом"
 dwarven.9811.desc: "[king.GetFirstName] всё ещё правит нашим народом как [king.Custom('GetQueenKing')], я [Select_CString(ROOT.Char.IsFemale, 'была побеждена', 'был побеждён' )].\n\n[Concept('mahalcharacter', 'Махал')|E] по-прежнему на [king.GetHerHis] стороне, это моя собственная глупость довела меня до этого, я [Select_CString(ROOT.Char.IsFemale, 'погубила', 'погубил' )] наш народ ради своих эгоистичных желаний."
 dwarven.9811.a: "Желать чужого трона - глупость."

 dwarven.9999.t: "Название для нашего объединённого народа"
 dwarven.9999.desc: "После долгих лет жизни в разных чертогах [Concept('dwarves', 'гномьи')|E] кланы объединились под одним знаменем. Пришло время выбрать название для этой новой державы, которое будет воспеваться в наших чертогах ещё долгие века."
 dwarven.9999.a: "Мы будем называть себя «$h_mountains_mountains$»."
 dwarven.9999.b: "В честь нашего Творца мы примем имя «$h_mountains_mahal$»."
 dwarven.9999.c: "Наш народ всегда называли «$h_mountains_khazad$»."