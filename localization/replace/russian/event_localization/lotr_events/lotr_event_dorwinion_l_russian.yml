 ### FACTION ALIGNMENT DECISIONS ###
 dorwinion.0001.t: "Выбирая сторону"
 dorwinion.0001.desc: "Годами две политических фракции доминировали на арене Дорвиниона: Винные лорды и Великие купцы.\n\nВеликие купцы были первыми верховными лордами державы. Они разжились несметными богатствами, активно эксплуатируя торговые маршруты на восток и запад. Эти гиганты коммерции являются купеческой элитой крупных городов Дорвиниона. Многие из них заручились поддержкой извне.\n\nВинные лорды же, напротив, снискали богатство благодаря владению и распоряжению акрами и акрами плодородных земель. Они пожинали плоды Йаванны, производя львиную долю экспортируемых Дорвинионом товаров."
 dorwinion.0001.a: "Мы выберем сторону Винных лордов"
 dorwinion.0001.b: "Мы предпочтём Великих Купцов"
 dorwinion.0001.c: "Их цели для нас ничего не значат. Мы сохраним нейтралитет"

 dorwinion.0002.t: "Выбирая сторону"
 flavourevent.0002.desc.winelords: "Ситуация в державе серьёзно изменилась с тех пор, как моя династия встала на сторону Винных лордов. Возможно, пришло время пересмотреть свои политические предпочтения..."
 flavourevent.0002.desc.mastermerchants: "Ситуация в державе серьёзно изменилась с тех пор, как моя династия встала на сторону Великих купцов. Возможно, пришло время пересмотреть свои политические предпочтения..."
 dorwinion.0002.a: "Мы выберем сторону Винных лордов"
 dorwinion.0002.b: "Мы предпочтём Великих купцов"
 dorwinion.0002.c: "Их цели для нас ничего не значат. Пришла пора нейтралитета"
 dorwinion.0002.d: "Хотя... может и не стоит"

 dorwinion.0004.t: "Новый порядок"
 dorwinion.0004.desc: "Качество винограда определяет качество вина больше, чем любой другой фактор. То же самое верно и в отношении руководства, и [dorwinion|E] видел свою долю недобросовестных правителей, которые добились своего избрания, обманывая и давая обещания, о которых они забывали, как только выборы заканчивались.\n\nТакая ложь и мелкие дрязги больше не будут беспокоить королевство! Наряду с избавлением от коррумпированной системы, мы покончили с фракционностью, которая угрожала разрушить всю нашу политику!\n\nОтныне наши правители будут воплощать истинную суть правления - старинную смесь традиций, благородства и безграничного потенциала Дорвиниона, объединённую под эгидой одной династии."
 dorwinion.0004.a: "Ушли в прошлое избирательные бюллетени, их заменила царственная элегантность наследственного правления!"

 ### Form the League of the Winelands ###
 dorwinion.0501.t: "Объединение Винного края"
 dorwinion.0501.desc: "[Concept('rulers', 'Правители')|E] [Concept('dorwinion', 'Дорвиниона')|E] долгое время были разделены, и каждый властитель и бургомистр руководствовался своими собственными землями и интересами. Хотя это обеспечило большую свободу и процветание, это также сделало нас уязвимыми перед внешними угрозами и внутренними раздорами.\n\nДля решения этих проблем мы решили создать Лигу Винного края, коалицию самых могущественных и влиятельных правителей региона. Эта лига будет служить единым фронтом против любых внешних угроз, а также поможет более эффективно разрешать внутренние споры.\n\nЛигой Винного края будет руководить совет представителей от каждого города-члена, которые будут работать сообща над принятием решений, приносящих пользу всем добрым [Concept('men', 'людям')|E] Дорвиниона."
 dorwinion.0501.a: "Винный край должен объединиться под одним знаменем."