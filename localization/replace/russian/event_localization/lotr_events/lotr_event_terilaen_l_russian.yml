l_russian:
 wander_terilaen.1001.t: "Посещение людских земель: Отправляясь в путь"
 wander_terilaen.1001.desc: "Прошло уже некоторое время с тех пор, как я [Select_CString(ROOT.Char.IsFemale, 'покинула', 'покинул' )] свой лес, и я снова хочу жить так, как живут [Concept('conceptracemen', 'люди')|E], хотя бы временно. С этой целью я [Select_CString(ROOT.Char.IsFemale, 'отправилась', 'отправился' )] во владение [destination_terilaen.GetName].\n\nПутешествуя по древним лесам, я размышляю о том, как течёт время. Кажется, что здесь, в лесистых землях эльфов, оно почти остановилось. Мир людей, однако, быстро меняется. Те, кого я [Select_CString(ROOT.Char.IsFemale, 'встречала', 'встречал' )] в своих прошлых путешествиях, состарились или уже ушли в небытие.\n\nЯ ценю то время, когда живу среди постоянно меняющихся людей, ибо знаю, что, когда я вернусь домой, моё королевство всё ещё будет таким, каким я его [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил' )]."
 wander_terilaen.1001.a: "Я отправлюсь в путь."
 wander_terilaen.1001.a.tt: "Вы отправитесь во владение [destination_terilaen.GetName]"

 wander_terilaen.1010.t: "Посещение людских земель: Врач"
 wander_terilaen.1010.desc: "Пока я [Select_CString(ROOT.Char.IsFemale, 'изучала', 'изучал' )] владение [destination_terilaen.GetName], я [Select_CString(ROOT.Char.IsFemale, 'встретила', 'встретил' )] врача, которому требуется ассистент. Он был впечатлён моими знаниями о травах и сразу же нанял меня.\n\nТеперь я провожу свои дни, нанося мази на пациентов, подбирая лекарства и травы и помогая своему работодателю в лечении больных. Хотя я обладаю обширными познаниями в искусстве врачевания, в основном это применимо к моим собратьям-[Concept('elves', 'эльфам')|E]. Людские недуги и методы их лечения для меня в новинку. Врач стремился восполнить этот пробел в моих знаниях, и я также предлагаю советы, основанные на моём многолетнем опыте."
 wander_terilaen.1010.a: "Я многому [Select_CString(ROOT.Char.IsFemale, 'научилась', 'научился' )]."

 wander_terilaen.1011.t: "Посещение людских земель: Нападение!"
 wander_terilaen.1011.desc: "Когда я [Select_CString(ROOT.Char.IsFemale, 'шла', 'шёл' )] по улицам владения [destination_terilaen.GetName], меня внезапно окружила банда [Concept('conceptracemen', 'людей')|E] отвратительного вида. Я [Select_CString(ROOT.Char.IsFemale, 'безоружна', 'безоружен' )], а у них в руках ножи и дубинки.\n\n[Select_CString(ROOT.Char.IsFemale, 'Обидела', 'Обидел' )] ли я их чем-то, или они просто хотят поразвлечься, или хотят ограбить меня, или всё это вместе взятое, я не знаю. Я знаю только, что они хотят причинить мне боль."
 wander_terilaen.1011.a: "В бой!"
 wander_terilaen.1011.b: "Бежать!"

 wander_terilaen.1012.t: "Посещение людских земель: Рождение!"
 wander_terilaen.1012.desc: "Прибыв во владение [destination_terilaen.GetName], я вижу, как по улицам бежит отчаявшийся мужчина. Он зовёт врача. Я спрашиваю его, в чём дело, он отвечает, что у его беременной жены осложнения при родах, и он боится, что повитуха не справится. Он думает, что потеряет и жену, и ребёнка.\n\nЯ иду за ним к его дому и, приближаясь, слышу крики. От повитухи я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что ребёнок находится в неправильном положении, а мать уже измучена долгими родами. Спасти обоих будет нелегко."
 wander_terilaen.1012.a: "Я сделаю всё возможное, чтобы помочь."

 wander_terilaen.1013.t: "Посещение людских земель: Беседа"
 wander_terilaen.1013.desc: "Я направляюсь к чертогам, где правит [destination_terilaen.GetCounty.GetTitle.GetHolder.GetName]. Под личиной [Select_CString(ROOT.Char.IsFemale, 'мудрой странницы, жаждущей', 'мудрого странника, жаждущего' )] дать [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'правительнице', 'правителю' )] совет, способный улучшить жизнь подданных, я прошу, чтобы [destination_terilaen.GetCounty.GetTitle.GetHolder.GetName] [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'предоставила', 'предоставил' )] мне аудиенцию.\n\nЯ могу либо потакать [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'ей', 'ему' )], когда [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'она', 'он' )] рассказывает о своей политике и правлении, либо попытаться направить разговор в русло улучшения жизни населения владения [destination_terilaen.GetName]."
 wander_terilaen.1013.a: "Обсудим [destination_terilaen.GetCounty.GetTitle.GetHolder.GetHerHis] правление."
 wander_terilaen.1013.b: "Поговорим о жизни этих людей."

 wander_terilaen.1014.t: "Посещение людских земель: [Select_CString(leper.IsFemale, 'Прокажённая', 'Прокажённый' )]"
 wander_terilaen.1014.desc: "На окраине владения [destination_terilaen.GetName] передо мной предстаёт печальное зрелище. [Select_CString(leper.IsFemale, 'Прокажённая, изгнанная', 'Прокажённый, изгнанный' )] своими родичами, которые теперь избегают [Select_CString(leper.IsFemale, 'её', 'его' )].\n\nЯ сажусь рядом с этим человеком, и [Select_CString(leper.IsFemale, 'она', 'он' )] спрашивает, знаю ли я о [Select_CString(leper.IsFemale, 'её', 'его' )] недуге, и если да, то почему я [Select_CString(ROOT.Char.IsFemale, 'подошла', 'подошёл' )]. Я улыбаюсь [Select_CString(leper.IsFemale, 'ей', 'ему' )] и говорю, что я [Select_CString(ROOT.Char.IsFemale, 'целительница', 'целитель' )] и знаю, как вылечить эту болезнь. [Select_CString(leper.IsFemale, 'Она', 'Он' )] умоляет меня вылечить [Select_CString(leper.IsFemale, 'её', 'его' )], если на то будет моя воля."
 wander_terilaen.1014.a: "Обратись к свету."

 wander_terilaen.1015.t: "Посещение людских земель: Менестрель"
 wander_terilaen.1015.desc: "На этот раз я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] не работать среди [Concept('conceptracemen', 'людей')|E], а играть для них. Население владения [destination_terilaen.GetName], похоже, ценит мои мелодии, и всякий раз, когда я пою или играю, собирается толпа слушателей.\n\nЯ исполняю не только местные песни, но и песни прошлых эпох, которые редко известны жителям этого региона. Я даже [Select_CString(ROOT.Char.IsFemale, 'вдохновила', 'вдохновил' )] некоторых петь вместе со мной, и наши дуэты и хоры получаются веселее, чем мог бы мечтать любой человек в одиночку."
 wander_terilaen.1015.a: "Музыка объединяет всех нас."

 wander_terilaen.1016.t: "Посещение людских земель: [Select_CString(ROOT.Char.IsFemale, 'Плотница', 'Плотник' )]"
 wander_terilaen.1016.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'приехала', 'приехал' )] сюда как [Select_CString(ROOT.Char.IsFemale, 'плотница', 'плотник' )], и в качестве [Select_CString(ROOT.Char.IsFemale, 'таковой', 'такового' )] ко мне обратилась обедневшая семья из владения [destination_terilaen.GetName]. Им нужно починить крышу, протечки - наименьшая из их проблем, говорят они мне. Прошло так много времени с тех пор, как её ремонтировали, что они начали беспокоиться, что она может упасть им на головы. Они накопили приличную сумму, чтобы оплатить такую услугу, и предлагают её мне.\n\nЭто означает несколько дней напряжённой работы, но это хорошая работа для, как мне кажется, хороших людей. Я сделаю это."
 wander_terilaen.1016.a: "Я честно выполню свою работу."
 wander_terilaen.1016.b: "Это мне в радость, плата не нужна."

 wander_terilaen.1017.t: "Посещение людских земель: [Select_CString(ROOT.Char.IsFemale, 'Ткачиха', 'Ткач' )]"
 wander_terilaen.1017.desc: "Я предлагаю свои услуги в качестве [Select_CString(ROOT.Char.IsFemale, 'ткачихи', 'ткача' )] в окрестностях владения [destination_terilaen.GetName]. Вскоре ко мне приходит купец, который хочет что-то уникальное и красивое, чтобы украсить свой грандиозный дом.\n\nОн говорит мне, что хотел бы художественный гобелен, пересказывающий историю этого места, но просит меня сделать то, чего желает моё сердце, иначе произведение потеряет художественность."
 wander_terilaen.1017.a: "Я сплету историю этого места."
 wander_terilaen.1017.b: "Я сотку сцену из Куивиэнена."

 wander_terilaen.1018.t: "Посещение людских земель: [Select_CString(champion.IsFemale, 'Воительница', 'воитель' )]"
 wander_terilaen.1018.desc: "Исследуя владение [destination_terilaen.GetName], я слышу скрежет металла и звуки борьбы. Я прибываю на место и вижу, как сильный человек с деревянным мечом в руках легко расправляется со своими противниками, несколькими молодыми людьми, также вооружёнными деревянными мечами. Когда я приближаюсь, [Select_CString(champion.IsFemale, 'Воительница', 'воитель' )] с любопытством смотрит на меня, оценивая мою силу. [Select_CString(champion.IsFemale, 'Она', 'Он' )] окликает меня:\n\n«Новичок! Не хочешь присоединиться?»"
 wander_terilaen.1018.a: "Это будет хорошее упражнение."

 wander_terilaen.1019.t: "Посещение людских земель: Слежка"
 wander_terilaen.1019.desc: "В последние дни моего путешествия во владение [destination_terilaen.GetName] в моём сердце росла тревога. Кто-то следует за мной. Я не знаю, кто они, или чего они хотят, или как они могут следовать за мной, [Select_CString(ROOT.Char.IsFemale, 'одной', 'одним' )] из [Concept('quendi', 'квенди')|E].\n\nДолжно быть, это прекрасный охотник, который заметил меня и заинтересовался... Возможно..."
 wander_terilaen.1019.a: "Попытаться найти его."

 wander_terilaen.1020.t: "Посещение людских земель: Безумцы"
 wander_terilaen.1020.desc: "Когда я приближаюсь к общественной площади во владении [destination_terilaen.GetName], я замечаю [Concept('conceptracemen', 'людей')|E], столпившихся вокруг небольшой группы. Они проклинают солнце, звёзды и луну, они проповедуют, что свет выявляет грехи в сердцах людей. Они мечтают о тёмном мире, где человечество будет предоставлено самим себе, чтобы жить в мире.\n\nЭто злые слова, вызванные болью и безумием в сердцах этих бедняг."
 wander_terilaen.1020.a: "Я постараюсь вразумить их."

 wander_terilaen.1021.t: "Посещение людских земель: Скорбящий человек"
 wander_terilaen.1021.desc: "Когда я иду по улицам владения [destination_terilaen.GetName], я слышу доносящиеся неподалеку рыдания. У края дороги плачет [Select_CString(grieving_father.IsFemale, 'сильная женщина', 'сильный мужчина' )]. Очевидно, [Select_CString(grieving_father.IsFemale, 'она пьяна', 'он пьян' )]. Несколько человек наблюдают за происходящим издалека, одни с насмешкой, другие с жалостью. Я подхожу к [Select_CString(grieving_father.IsFemale, 'ней', 'нему' )] и спрашиваю, чем могу помочь. [Select_CString(grieving_father.IsFemale, 'Она', 'Он' )] говорит, что я ничего не могу сделать, потому что [Select_CString(grieving_father.IsFemale, 'её', 'его' )] единственный сын умер.\n\nЯ сажусь рядом с [Select_CString(grieving_father.IsFemale, 'ней', 'ним' )] и беру [Select_CString(grieving_father.IsFemale, 'её', 'его' )] за руку. Если бы только [Concept('conceptracemen', 'люди')|E] могли понять, насколько по-настоящему увлекательна их жизнь, они сочли бы судьбу небольшой платой за это.\n\n«Не отчаивайся», - наконец говорю я [Select_CString(grieving_father.IsFemale, 'ей', 'ему' )]."
 wander_terilaen.1021.a: "Люди унаследуют мир."

 wander_terilaen.1022.t: "Посещение людских земель: Самосуд"
 wander_terilaen.1022.desc: "Я слышу сильную суматоху на улицах владения [destination_terilaen.GetName]! Издалека я вижу, как люди тащат по улицам сопротивляющегося мужчину. Толпа постоянно заставляет его подчиниться, она озверела.\n\nКакое бы преступление ни совершил этот человек, это не лучший способ расправиться с ним, с толпой невозможно спорить, её невозможно переубедить, она просто взбешена. Боги, этот человек, возможно, даже невиновен! К тому времени, как я доберусь до них, его уже повесят."
 wander_terilaen.1022.a: "Такое насилие, какое ужасное зрелище."

 wander_terilaen.1023.t: "Посещение людских земель: Мудрец"
 wander_terilaen.1023.desc: "В бедном квартале владения [destination_terilaen.GetName] я вижу редкое зрелище. На обочине улицы сидит одетый в лохмотья по-настоящему мудрый человек, его глаза смотрят на меня из скрытых глубин знания и любопытства. Я уже не в первый раз думаю о том, какой это ужасный позор, что человек стал таким эфемерным, таким падшим.\n\nЯ опускаюсь на колени рядом с этим человеком и даю ему несколько монет.\n\n«Какое у вас странное лицо, [Select_CString(ROOT.Char.IsFemale, 'девушка', 'юноша' )]», - говорит он мне. «Старое и молодое, грустное и счастливое, как у фей»."
 wander_terilaen.1023.a: "Это будет интересный разговор."

 wander_terilaen.1024.t: "Посещение людских земель: Таверна"
 wander_terilaen.1024.desc: "Сегодня вечером я буду веселиться с [Concept('conceptracemen', 'людьми')|E]. Здесь, во владении [destination_terilaen.GetName], есть особенно хорошая таверна, в которую я давно [Select_CString(ROOT.Char.IsFemale, 'собиралась', 'собирался' )] зайти.\n\nКогда я вхожу, меня встречает смех. Какой-то местный дурачок поёт непристойную песенку, и окружающим это очень нравится. В конце вечера на меня обращает внимание симпатичный парень и просит спеть, я напеваю пару старых причудливых людских стишков. Они находят их забавными.\n\nПосле этого у меня налаживаются хорошие отношения с людьми, несмотря на то, что они пьяны. Я в основном молчу и позволяю им говорить, когда кто-то задаёт мне вопрос, я отвечаю тем же, они смеются и ругаются."
 wander_terilaen.1024.a: "Это было весело."

 wander_terilaen.1025.t: "Посещение людских земель: Библиотека"
 wander_terilaen.1025.desc: "В заброшенном каменном доме во владении [destination_terilaen.GetName] я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )] настоящее сокровище. В углу стоит небольшая библиотека пыльных книг прошлых веков, оставленных гнить.\n\nСоставляя их каталог, я [Select_CString(ROOT.Char.IsFemale, 'определила', 'определил' )] три коллекции, которые были бы достойны изучения, но, к сожалению, я не могу взять с собой все три."
 wander_terilaen.1025.a: "Собрание по медицине."
 wander_terilaen.1025.b: "Собрание по фехтованию."
 wander_terilaen.1025.c: "СОбрание по поэзии."

 wander_terilaen.1026.t: "Посещение людских земель: Дом"
 wander_terilaen.1026.desc: "Когда я [Select_CString(ROOT.Char.IsFemale, 'работала плотницей', 'работал плотником' )] во владении [destination_terilaen.GetName], ко мне обратился владелец лавки, который был наслышан о качестве моей работы. Он хочет, чтобы я [Select_CString(ROOT.Char.IsFemale, 'возглавила', 'возглавил' )] команду, которая построит совершенно новый дом для него и его семьи в течение следующих недель.\n\nПлата хорошая, работа интересная, а дом не такой большой, чтобы это задержало меня надолго. Я в восторге."
 wander_terilaen.1026.a: "Надеюсь, он выстоит."

 wander_terilaen.1027.t: "Посещение людских земель: Старый целитель"
 wander_terilaen.1027.desc: "Наслаждаясь своим времяпрепровождением, я наблюдаю за людьми в таверне во владении [destination_terilaen.GetName]. Я замечаю старика, потягивающего пиво. Его руки явно испачканы травами за многие годы, я вижу, что он старый целитель.\n\nЯ подхожу к нему и предлагаю заплатить за выпивку. Он торжественно благодарит меня. Я поддерживаю непринуждённую беседу, но всегда ориентируюсь на его опыт, надеясь узнать больше."
 wander_terilaen.1027.a: "Интересная тема."

 wander_terilaen.1028.t: "Посещение людских земель: Концерт"
 wander_terilaen.1028.desc: "Сегодня вечером во владении [destination_terilaen.GetName] происходит нечто удивительное. Знаменитый [Concept('conceptracemen', 'людской')|E] менестрель проезжает по городу и выступает с публичным чтением человеческой поэзии.\n\nЭто, безусловно, прекрасная возможность понаблюдать за работой талантливого человека и, возможно, выучить несколько поэм."
 wander_terilaen.1028.a: "Какой приятный вечер."

 wander_terilaen.1029.t: "Посещение людских земель: Нападение?"
 wander_terilaen.1029.desc: "Прогуливаясь по улицам владения [destination_terilaen.GetName], я вдруг слышу пронзительные боевые кличи! Меня быстро окружает целая банда детей, вооружённых деревянными мечами и палками. Один ребёнок бросает мне меч и предлагает защищаться. Похоже, это их вожак.\n\nЯ даю маленьким негодяям волю. Они не хотят причинить мне вреда, но они злобные. Даже когда я разоружаю их и отбрасываю в сторону, они продолжают возвращаться и нападать на меня со всех сторон. Будь я человеком, завтра у меня наверняка появилось бы несколько синяков. Примерно через час я, наконец, [Select_CString(ROOT.Char.IsFemale, 'утомила', 'утомил' )] самых выносливых из них."
 wander_terilaen.1029.a: "Упрямые сорванцы."

 wander_terilaen.1030.t: "Посещение людских земель: Представление"
 wander_terilaen.1030.desc: "На этот раз я [Select_CString(ROOT.Char.IsFemale, 'приехала', 'приехал' )] в качестве [Select_CString(ROOT.Char.IsFemale, 'певицы', 'певца' )] во владение [destination_terilaen.GetName]. Сегодня утром актёр спросил, не хочу ли я сыграть в пьесе.\n\nК моему удивлению, это не комедия, а серьёзная пьеса, трагедия о простом человеке. Очень интересный сценарий, я ещё не [Select_CString(ROOT.Char.IsFemale, 'сталкивалась', 'сталкивался' )] с таким, возможно, это что-то новенькое.\n\nЯ провожу вторую половину дня, репетируя, и к вечеру чувствую, что [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] к роли второго плана. Довольно много людей пришло насладиться спектаклем."
 wander_terilaen.1030.a: "Ни пуха, ни пера."

 wander_terilaen.1031.t: "Посещение людских земель: Ограбление"
 wander_terilaen.1031.desc: "Однажды ночью, прогуливаясь по улицам владения [destination_terilaen.GetName], я [Select_CString(ROOT.Char.IsFemale, 'проследила', 'проследил' )] за группой подозрительных [Concept('conceptracemen', 'людей')|E], которые бродили по улицам. Интересно наблюдать за криминальными элементами в людских обществах, за такой ущербной концепцией, возникшей из тьмы в их сердцах. Насилие над братьями, жадность, неуправляемые амбиции.\n\nЯ вижу, как они подходят к хорошо одетому старику. Я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что это ограбление. И всё же старик отдал свой кошель и даже ботинки, но они всё ещё угрожают ему.\n\nВнезапно один из них бьёт старика. Когда другой достает меч, я вмешиваюсь, выхватывая кинжал."
 wander_terilaen.1031.a: "Это уже слишком."

 wander_terilaen.1032.t: "Посещение людских земель: Умирающий человек"
 wander_terilaen.1032.desc: "Выходя из лавки во владении [destination_terilaen.GetName], торгующей горшками, я слышу болезненные стоны, доносящиеся из одного из домов. Я стучу в дверь, но никто не отвечает.\n\nЯ вхожу и вижу молодого человека, лежащего в постели и умирающего раньше времени от очень сильной лихорадки. Я вижу, что его дыхание прерывается, а покраснение на лице указывает на очень сильную, широко распространенную инфекцию. Возможно, я не смогу спасти его, но я могу узнать об этой болезни, пока пытаюсь."
 wander_terilaen.1032.a: "И всё же я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] попытаться."

 wander_terilaen.1033.t: "Посещение людских земель: Пьяница"
 wander_terilaen.1033.desc: "Этой ночью я [Select_CString(ROOT.Char.IsFemale, 'проходила', 'проходил' )] мимо таверны во владении [destination_terilaen.GetName], когда ко мне подошел пьяный крестьянин.\n\n«[Select_CString(ROOT.Char.IsFemale, 'Госпожа', 'Господин' )]», - говорит он, - «вы кажетесь человеком великой мудрости и красноречивых познаний. Не поделитесь ли лакомым кусочком?»\n\n«Бедняга, я всего лишь [Select_CString(ROOT.Char.IsFemale, 'плотница', 'плотник' )]», - говорю я, забавляясь. - «И всё же, разве [Select_CString(ROOT.Char.IsFemale, 'плотница', 'плотник' )] не [Select_CString(ROOT.Char.IsFemale, 'привыкла', 'привык' )] обращаться с занозистыми предметами? Упрямым и обидчивым может быть человек. И спокойным, как вода. Следите за тем, чтобы они были менее колючими и менее гладкими, вот мой совет»."
 wander_terilaen.1033.a: "Он выглядит таким растерянным."

 wander_terilaen.1034.t: "Посещение людских земель: Разъярённая толпа"
 wander_terilaen.1034.desc: "Я иду по улицам владения [destination_terilaen.GetName], когда слышу, что где-то поблизости начинается большая суматоха. Я бегу туда и вижу, как люди бросают камни в женщину. Они выкрикивают обвинения в её адрес. Я бегу к ней и призываю толпу остановиться. Они действительно перестают бросать камни, но теперь пытаются силой оттащить меня.\n\n«Злые люди! Немедленно прекратите это безумие! Здесь вы совершаете больше зла, чем могла бы совершить любая другая женщина, потому что вы отказываетесь от своих личных мотивов в пользу воли толпы убийц! И так много людей, желающих творить добро, впадают во зло, потому что толпа не может сомневаться в себе, это тупой и жестокий организм»."
 wander_terilaen.1034.a: "Толпа обдумывает мои слова."

 wander_terilaen.1035.t: "Посещение людских земель: Солдат"
 wander_terilaen.1035.desc: "Сидя у врат владения [destination_terilaen.GetName], я замечаю скучающего солдата средних лет, играющего со своим копьём. Я подхожу к нему и начинаю разговор, который постепенно перерастает в светскую беседу.\n\nК концу он многое рассказал мне о войнах, в которых участвовал, и личных историях, о своих тренировках и повседневной жизни солдата, а также о своих путешествиях по этим землям. Всё это очень интересно."
 wander_terilaen.1035.a: "Ещё одна страница в дневнике."

 wander_terilaen.1099.t: "Посещение людских земель: Возвращение домой"
 wander_terilaen.1099.desc: "Я многое [Select_CString(ROOT.Char.IsFemale, 'повидала', 'повидал' )] в [Concept('conceptracemen', 'людских')|E] землях, но теперь пришло время вернуться в свои владения.\n\nКак бы я ни [Select_CString(ROOT.Char.IsFemale, 'любила', 'любил' )] свои путешествия, я [Select_CString(ROOT.Char.IsFemale, 'королева', 'король' )] [Concept('cuind', 'куинд')|E] и [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] вернуться к своим обязанностям."
 wander_terilaen.1099.a: "Пора возвращаться к своим родичам."
 wander_terilaen.1099.a.tt: "Вы вернётесь в свою столицу"