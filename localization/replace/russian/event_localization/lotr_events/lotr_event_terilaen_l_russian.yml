l_russian:
 wander_terilaen.1001.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Отправляясь в путь"
 wander_terilaen.1001.desc: "Прошло уже некоторое время с тех пор, как я [Select_CString(ROOT.Char.IsFemale, 'покинула', 'покинул' )] свой лес, и я снова хочу жить так, как живут люди, хотя бы временно. С этой целью я [Select_CString(ROOT.Char.IsFemale, 'отправилась', 'отправился' )] во владение [destination_terilaen.GetName].\n\nПутешествуя по древним лесам, я размышляю о том, как течёт время. Кажется, что здесь, в лесистых землях эльфов, оно почти остановилось. Мир людей, однако, быстро меняется. Те, кого я [Select_CString(ROOT.Char.IsFemale, 'встречала', 'встречал' )] в своих прошлых путешествиях, состарились или уже ушли в небытие.\n\nЯ ценю то время, когда живу среди постоянно меняющихся людей, ибо знаю, что, когда я вернусь домой, моё королевство всё ещё будет таким, каким я его [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил' )]."
 wander_terilaen.1001.a: "Я отправлюсь в путь."
 wander_terilaen.1001.a.tt: "Вы отправитесь во владение [destination_terilaen.GetName]"

 wander_terilaen.1010.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Врач"
 wander_terilaen.1010.desc: "Пока я [Select_CString(ROOT.Char.IsFemale, 'изучала', 'изучал' )] владение [destination_terilaen.GetName], я [Select_CString(ROOT.Char.IsFemale, 'встретила', 'встретил' )] врача, которому требуется ассистент. Он был впечатлён моими знаниями о травах и сразу же нанял меня.\n\nТеперь я провожу свои дни, нанося мази на пациентов, подбирая лекарства и травы и помогая своему работодателю в лечении больных. Хотя я обладаю обширными познаниями в искусстве врачевания, в основном это применимо к моим собратьям-[Concept('elves', 'эльфам')|E]. Людские недуги и методы их лечения для меня в новинку. Врач стремился восполнить этот пробел в моих знаниях, и я также предлагаю советы, основанные на моём многолетнем опыте."
 wander_terilaen.1010.a: "Я многому [Select_CString(ROOT.Char.IsFemale, 'научилась', 'научился' )]."

 wander_terilaen.1011.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Нападение"
 wander_terilaen.1011.desc: "Когда я [Select_CString(ROOT.Char.IsFemale, 'шла', 'шёл' )] по улицам владения [destination_terilaen.GetName], меня внезапно окружила банда людей отвратительного вида. Я [Select_CString(ROOT.Char.IsFemale, 'безоружна', 'безоружен' )], а у них в руках ножи и дубинки.\n\n[Select_CString(ROOT.Char.IsFemale, 'Обидела', 'Обидел' )] ли я их чем-то, или они просто хотят поразвлечься, или хотят ограбить меня, или всё это вместе взятое, я не знаю. Я знаю только, что они хотят причинить мне боль."
 wander_terilaen.1011.a: "В бой!"
 wander_terilaen.1011.b: "Бежать!"

 wander_terilaen.1012.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Рождение!"
 wander_terilaen.1012.desc: "Прибыв во владение [destination_terilaen.GetName], я вижу, как по улицам бежит отчаявшийся мужчина. Он зовёт врача. Я спрашиваю его, в чём дело, он отвечает, что у его беременной жены осложнения при родах, и он боится, что повитуха не справится. Он думает, что потеряет и жену, и ребёнка.\n\nЯ иду за ним к его дому и, приближаясь, слышу крики. От повитухи я [Select_CString(ROOT.Char.IsFemale, 'узнала', 'узнал' )], что ребёнок находится в неправильном положении, а мать уже измучена долгими родами. Спасти обоих будет нелегко."
 wander_terilaen.1012.a: "Я сделаю всё возможное, чтобы помочь."

 wander_terilaen.1013.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Беседа"
 wander_terilaen.1013.desc: "Я направляюсь к чертогам, где правит [destination_terilaen.GetCounty.GetTitle.GetHolder.GetName]. Под личиной [Select_CString(ROOT.Char.IsFemale, 'мудрой странницы, жаждущей', 'мудрого странника, жаждущего' )] дать [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'правительнице', 'правителю' )] совет, способный улучшить жизнь подданных, я прошу, чтобы [destination_terilaen.GetCounty.GetTitle.GetHolder.GetName] [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'предоставила', 'предоставил' )] мне аудиенцию.\n\nЯ могу либо потакать [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'ей', 'ему' )], когда [Select_CString(destination_terilaen.GetCounty.GetTitle.GetHolder.IsFemale, 'она', 'он' )] рассказывает о своей политике и правлении, либо попытаться направить разговор в русло улучшения жизни населения владения [destination_terilaen.GetName]."
 wander_terilaen.1013.a: "Обсудим [destination_terilaen.GetCounty.GetTitle.GetHolder.GetHerHis] правление."
 wander_terilaen.1013.b: "Поговорим о жизни этих людей."

 wander_terilaen.1014.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Прокажённый"
 wander_terilaen.1014.desc: "На окраине владения [destination_terilaen.GetName] передо мной предстаёт печальное зрелище. Прокажённый, изгнанный своими родичами, которые теперь избегают его.\n\nЯ сажусь рядом с этим человеком, и он спрашивает, знаю ли я о его недуге, и если да, то почему я [Select_CString(ROOT.Char.IsFemale, 'подошла', 'подошёл' )]. Я улыбаюсь ему и говорю, что я [Select_CString(ROOT.Char.IsFemale, 'целительница', 'целитель' )] и знаю, как вылечить эту болезнь. Он умоляет меня вылечить его, если на то будет моя воля."
 wander_terilaen.1014.a: "Обратись к свету."

 wander_terilaen.1015.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Менестрель"
 wander_terilaen.1015.desc: "На этот раз я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] не работать среди людей, а играть для них. Население владения [destination_terilaen.GetName], похоже, ценит мои мелодии, и всякий раз, когда я пою или играю, собирается толпа слушателей.\n\nЯ исполняю не только местные песни, но и песни прошлых эпох, которые редко известны жителям этого региона. Я даже [Select_CString(ROOT.Char.IsFemale, 'вдохновила', 'вдохновил' )] некоторых петь вместе со мной, и наши дуэты и хоры получаются веселее, чем мог бы мечтать любой человек в одиночку."
 wander_terilaen.1015.a: "Музыка объединяет всех нас."

 wander_terilaen.1016.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: [Select_CString(ROOT.Char.IsFemale, 'Плотница', 'Плотник' )]"
 wander_terilaen.1016.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'приехала', 'приехал' )] сюда как [Select_CString(ROOT.Char.IsFemale, 'плотница', 'плотник' )], и в качестве [Select_CString(ROOT.Char.IsFemale, 'таковой', 'такового' )] ко мне обратилась обедневшая семья из владения [destination_terilaen.GetName]. Им нужно починить крышу, протечки - наименьшая из их проблем, говорят они мне. Прошло так много времени с тех пор, как её ремонтировали, что они начали беспокоиться, что она может упасть им на головы. Они накопили приличную сумму, чтобы оплатить такую услугу, и предлагают её мне.\n\nЭто означает несколько дней напряжённой работы, но это хорошая работа для, как мне кажется, хороших людей. Я сделаю это."
 wander_terilaen.1016.a: "Я честно выполню свою работу."
 wander_terilaen.1016.b: "Это мне в радость, плата не нужна."

 wander_terilaen.1017.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: [Select_CString(ROOT.Char.IsFemale, 'Ткачиха', 'Ткач' )]"
 wander_terilaen.1017.desc: "Я предлагаю свои услуги в качестве [Select_CString(ROOT.Char.IsFemale, 'ткачихи', 'ткача' )] в окрестностях владения [destination_terilaen.GetName]. Вскоре ко мне приходит купец, который хочет что-то уникальное и красивое, чтобы украсить свой грандиозный дом.\n\nОн говорит мне, что хотел бы художественный гобелен, пересказывающий историю этого места, но просит меня сделать то, чего желает моё сердце, иначе произведение потеряет художественность."
 wander_terilaen.1017.a: "Я сплету историю этого места."
 wander_terilaen.1017.b: "Я сотку сцену из [Concept('cuivienen', 'Куивиэнена')|E]."

 wander_terilaen.1018.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Воитель"
 wander_terilaen.1018.desc: "Исследуя владение [destination_terilaen.GetName], я слышу скрежет металла и звуки борьбы. Я прибываю на место и вижу, как сильный человек с деревянным мечом в руках легко расправляется со своими противниками, несколькими молодыми людьми, также вооружёнными деревянными мечами. Когда я приближаюсь, воитель с любопытством смотрит на меня, оценивая мою силу. Он окликает меня:\n\n«Новичок! Не хочешь присоединиться?»"
 wander_terilaen.1018.a: "Это будет хорошее упражнение."

 wander_terilaen.1019.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Слежка"
 wander_terilaen.1019.desc: "В последние дни моего путешествия во владение [destination_terilaen.GetName] в моём сердце росла тревога. Кто-то следует за мной. Я не знаю, кто они, или чего они хотят, или как они могут следовать за мной, [Select_CString(ROOT.Char.IsFemale, 'одной', 'одним' )] из [Concept('quendi', 'квенди')|E].\n\nДолжно быть, это прекрасный охотник, который заметил меня и заинтересовался... Возможно..."
 wander_terilaen.1019.a: "Попытаться найти его."

 wander_terilaen.1020.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Безумцы"
 wander_terilaen.1020.desc: "Когда я приближаюсь к общественной площади во владении [destination_terilaen.GetName], я замечаю людей, столпившихся вокруг небольшой группы. Они проклинают солнце, звёзды и луну, они проповедуют, что свет выявляет грехи в сердцах людей. Они мечтают о тёмном мире, где человечество будет предоставлено самим себе, чтобы жить в мире.\n\nЭто злые слова, вызванные болью и безумием в сердцах этих бедняг."
 wander_terilaen.1020.a: "Я постараюсь вразумить их."

 wander_terilaen.1099.t: "Посещение [Concept('conceptracemen', 'людских')|E] земель: Возвращение домой"
 wander_terilaen.1099.desc: "Я многое [Select_CString(ROOT.Char.IsFemale, 'повидала', 'повидал' )] в людских землях, но теперь пришло время вернуться в свои владения.\n\nКак бы я ни [Select_CString(ROOT.Char.IsFemale, 'любила', 'любил' )] свои путешествия, я [Select_CString(ROOT.Char.IsFemale, 'королева', 'король' )] [Concept('cuind', 'куинд')|E] и [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] вернуться к своим обязанностям."
 wander_terilaen.1099.a: "Пора возвращаться к своим родичам."
 wander_terilaen.1099.a.tt: "Вы вернётесь в свою столицу"