l_russian:
 ### ANGMAR START DATE EVENTS ###

 arnor.1201.t: "Беженцы из Рудаура"
 arnor.1201.desc: "Поздним вечером спокойного дня один из моих глашатаев приближается к моему трону. \n\n «Ваша светлость», - говорит он, «с востока прибыли беженцы из Рудаура. Их предводитель просит официальной аудиенции у вас». \n\nЯ киваю, одобряя просьбу. Вскоре перед моим троном преклоняет колени радушный мужчина. «Мой король, я - [mellondir.GetFirstName], бывший властитель Феннас Друнина. Но, как вы знаете, зло постигло эту землю, и [Concept('hillmen', 'горцы')|E] изгнали меня из моих владений. Теперь я ищу лишь безопасности и убежища, о король, и я буду верным слугой тебе, и во имя твоё буду сражаться».\n\nНекоторое время я сижу в задумчивости, прежде чем наконец дать ответ: \n\n«Воистину, настали мрачные времена, и нам понадобятся доблестные люди. Вы бежали, но сейчас не время вспоминать о делах, совершённых в спешке». Я встаю на ноги и обращаю свой взор на лорда Меллондира. «Скоро мы выступим в поход против Рудаура, и любой воин будет незаменим. Если ты ищешь убежища, то я дарую его! Да будешь ты верен и доблестен». \n\nКажется, у меня появился неожиданный союзник..."
 arnor.1201.a: "Вам будет передано владение [GetTitleByKey('c_killarbrag').GetName] для восстановления."
 event_arnor_1201_a: "[mellondir.GetName] станет вашим вассалом и получит владение [GetTitleByKey('c_killarbrag').GetNameNoTier]."
 arnor.1201.b: "Я найду для вас место при своём дворе."
 event_arnor_1201_b: "[mellondir.GetName] и его семья останутся при вашем дворе."

 arnor.3002.opening: "Благородный и справедливый владыка Талиона,"
 arnor.3002.desc: "Много лет прошло с тех пор, как род [Concept('isildur', 'Исильдура')|E] потерпел крах в вашем королевстве. Теперь один я - последний король из рода [Concept('elendil', 'Элендиля')|E], который все еще правит на Севере. Много времени прошло с тех пор, как скончался Эарендур и разделился [arnor|E], и вот я стремлюсь положить конец этому расколу.\n\nОтныне я по справедливости претендую на владычество над Арнором, и никто не может оспорить мои претензии. [Glossary('Эт Эарелло Эндоренна утулиэн. Синомэ маруван ар Хильдиньяр тенн Амбар-метта', 'oath_of_elendil_gloss' )]. Так говорил Элендиль.\n\nВаша верность будет вознаграждена, ваша доблесть почтена, если только вы примете мою законную власть. Наследники Исильдура не склонятся и не дрогнут."

 arnor.3002.a: "Мы должны объединиться, чтобы пережить бурю."
 arnor.3002.b: "Вы не выше и не благороднее нас!"

 arnor.3201.t: "Беженцы из Рудаура"
 arnor.3201.desc: "В то время как я проводил придворный приём в довольно скучное утро, один из моих глашатаев прибыл со срочным донесением. Я рад, что хоть что-то отвлечёт меня от мирских дел, и велю ему говорить. \n\n«Ваша светлость», - говорит он, «с востока прибыли беженцы из Рудаура. Их предводитель просит официальной аудиенции у вас». \n\nВскоре в мой тронный зал приводят незнакомца. Он преклоняет колено и заявляет: «Мой король, я - [mellondir.GetFirstName], бывший властитель Феннас Друнина. Но, как вы знаете, зло постигло эту землю, и [Concept('hillmen', 'горцы')|E] изгнали меня из моих земель. Теперь я ищу лишь безопасности и убежища, господин, и я и мои подданные готовы присягнуть вам».\n\nЯ поднимаюсь с трона и иду к лорду Меллондиру. \n\n«Прекрасен ты и твои люди! Настали тяжёлые времена, и зло вновь возвышается. Да, вы бежали, но я бы сделал то же самое! Умирать в тщетной последней битве - глупо, и вам лучше быть здесь, а не в качестве падали для ворон». Я тепло улыбаюсь. «Если вы ищете убежища, оно будет предоставлено. Прольём кровь горцев как братья, плечом к плечу!» \n\nКажется, у меня появился неожиданный союзник..."
 arnor.3201.a: "Вам будет даровано владение [GetTitleByKey('c_dinach').GetName]."
 event_arnor_3201_a: "[mellondir.GetName] станет вашим вассалом и получит владение [GetTitleByKey('c_dinach').GetNameNoTier]."
 arnor.3201.b: "Я найду для вас место при своём дворе."
 event_arnor_3201_b: "[mellondir.GetName] и его семья останутся при вашем дворе."

 arnor.7002.t: "Дилемма"
 arnor.7002.desc: "Мои шпионы и разведчики пришли к единодушному выводу: шансы невелики. Полчища [Concept('hillmen', 'горцев')|E] открыто выступили против меня, значительно превосходя наши силы.\n\nВыбор, наконец, за мной: сражаться или бежать. Сражение - почти верная гибель, но мы всё ещё можем быть бастионом против Тьмы. Но что толку в доблестной смерти? Бегство на запад может быть бесславным, но это наша главная надежда на выживание."
 arnor.7002.a: "Пусть приходят, мы славно сразимся!"
 arnor.7002.b: "Возможно, это и не доблесть, но бегство - самый мудрый выбор."
 defiant_defenders: "Стойкие защитники"

 arnor.7022.t: "Грядущее поражение"
 arnor.7022.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] выступить против мерзких захватчиков с севера, которых возглавляет мерзкий [hwaldar.GetFirstName], провозгласивший себя правителем державы [GetTitleByKey('k_rhudaur').GetName]. Да будет проклят он и весь его дом! \n\nМои храбрые защитники терпят неудачи, и я начинаю сомневаться в своём решении. Есть ли доблесть в безнадёжной последней битве? А как же наши жёны и дети, которые укрываются за стенами Феннас Друнина, надеясь на наш мимолётный успех? \n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] либо смириться с грядущим, либо обратиться к безопасности королевств Кардолан и Артедайн на западе. Но смогу ли я вынести позор бегства от самого важного поединка в моей жизни?"
 arnor.7022.a: "Каждый мужчина, способный держать меч, должен быть вооружен! Мы будем сражаться!"
 arnor.7022.b: "Я вынесу позор поражения, чтобы спасти невинных от гибели."
 arnor.7022.b.tt: "Вы покинете Угол с последними дунэдайн."
 last_reserves: "Ополчение дунэдайн"
 arnor.7022.c: "Мы отправимся в дебри, чтобы отомстить."
 
 arnor.7003.t: "Куда пойти?"
 arnor.7003.desc: "Теперь, когда я [Select_CString(ROOT.Char.IsFemale, 'приняла', 'принял' )] решение бежать, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать, где искать убежище.\n\n[GetTitleByKey('k_arthedain').GetNameNoTier] - более безопасный выбор, но бежать так далеко ко двору #L [GetTitleByKey('c_fornost').GetNameNoTier]а#! само по себе чревато тем, что нас сочтут презренными трусами. \n\n[GetTitleByKey('c_thalion').GetNameNoTier], столица более нестабильного #L [GetTitleByKey('k_cardolan').GetNameNoTier]а#!, тем временем находится близко к угрозе, но почти наверняка будет более гостеприимным, и король [tarvegil.GetFirstName], скорее всего, предоставит нам убежище.\n\nТеперь мне предстоит сделать выбор: безопасность, но при этом унижение в Артедайне или приграничье Кардолана?"
 arnor.7003.a: "Я буду искать убежища в Артедайне."
 arnor.7003.b: "Я буду искать убежища в Кардолане."
 event_arnor_07003_a: "Вы будете искать убежище в столице державы [GetTitleByKey('e_arthedain').GetName], городе [GetTitleByKey('c_fornost').GetNameNoTier]."
 event_arnor_07003_b: "Вы будете искать убежище в столице державы [GetTitleByKey('k_cardolan').GetName], городе [GetTitleByKey('c_thalion').GetNameNoTier]."

 arnor.7004.t: "Крепость королей"
 arnor.7004.desc: "Врата распахиваются, и меня проводят по длинному узкому коридору. Перед высоким троном короля я молча склоняюсь, пока мне не велят подняться, и [argeleb.GetFirstName] смотрит на меня.\n\n«Мой король, я - [ROOT.Char.GetFirstName], [Select_CString(ROOT.Char.IsFemale, 'бывшая владычица', 'бывший владыка' )] Феннас Друнина. Но, как вы знаете, зло постигло эту землю, и [Concept('hillmen', 'горцы')|E] изгнали меня из моих владений. Теперь я ищу лишь безопасности и убежища, о король, и я буду верным слугой тебе, и во имя твоё буду сражаться».\n\nНекоторое время Аргелеб сидит в задумчивости, прежде чем вновь заговорить:\n\n«Воистину, настали мрачные времена, и нам понадобятся доблестные люди. Ты [Select_CString(ROOT.Char.IsFemale, 'бежала', 'бежал' )], но сейчас не время вспоминать о делах, совершённых в спешке». Аргелеб поднимается на ноги и поворачивается ко мне. «Скоро мы выступим в поход против Рудаура, и любой воин будет незаменим. Если ты ищешь убежища, то я дарую его! Да будешь ты [Select_CString(ROOT.Char.IsFemale, 'верна и доблестна', 'верен и доблестен' )]». \n\nУслышав слова короля, я облегчённо [Select_CString(ROOT.Char.IsFemale, 'вздохнула', 'вздохнул' )]."
 arnor.7004.a: "Я вечно [Select_CString(ROOT.Char.IsFemale, 'благодарна', 'благодарен' )] вам, милорд."
 event_arnor_07004_a: "[argeleb.GetName] дарует вам убежище во владении [GetTitleByKey('c_killarbrag').GetNameNoTier]"
 arnor.7004.b: "Я возьму в руки меч, чтобы сражаться за вас, Ваша светлость."

 arnor.7008.t: "Двор Тарвегиля"
 arnor.7008.desc: "Врата распахиваются, и меня ведут к трону короля. Я кланяюсь и встаю, а король [tarvegil.GetFirstName] смотрит на меня.\n\n«Мой король, я - [ROOT.Char.GetFirstName], [Select_CString(ROOT.Char.IsFemale, 'бывшая владычица', 'бывший владыка' )] Феннас Друнина. Но, как вы знаете, зло постигло эту землю, и [Concept('hillmen', 'горцы')|E] изгнали меня из моих владений. Теперь я ищу лишь безопасности и убежища, господин, я и мои люди готовы сражаться за вас».\n\nТарвегиль поднимается со своего трона и идёт ко мне. \n\n«[Select_CString(ROOT.Char.IsFemale, 'Прекрасна', 'Прекрасен' )] ты и твои люди! Настали тяжёлые времена, и зло вновь возвышается. Да, вы бежали, но я бы сделал то же самое! Умирать в тщетной последней битве - глупо, и вам лучше быть здесь, а не в качестве падали для ворон». Он тепло улыбается. «Если вы ищете убежища, оно будет предоставлено. Прольём кровь горцев как братья, плечом к плечу!» \n\nУслышав слова короля, я облегчённо [Select_CString(ROOT.Char.IsFemale, 'вздохнула', 'вздохнул' )]."
 arnor.7008.a: "Я вечно [Select_CString(ROOT.Char.IsFemale, 'благодарна', 'благодарен' )] вам, милорд."
 event_arnor_07008_b: "[tarvegil.GetName] дарует вам убежище во владении [GetTitleByKey('c_dinach').GetNameNoTier]" 
 arnor.7008.b: "Я возьму в руки меч, чтобы сражаться за вас, Ваша светлость."
 
 arnor.7011.t: "Новый дом"
 arnor.7011.desc: "Прибыв в небольшой форпост, предоставленный мне королём, я наконец-то могу вздохнуть с облегчением. Здесь я и моя семья в безопасности... пока что. \n\nИ всё же мои мысли непрошено устремляются на восток, где свирепый [hwaldar.GetFirstName] со своими полчищами жестоких [Concept('hillmen', 'горцев')|E] всё ещё опустошает истерзанные войной земли, которые я когда-то [Select_CString(ROOT.Char.IsFemale, 'называла', 'называл' )] своим родным домом.\n\nЯ задаюсь вопросом, что мне делать в ближайшие месяцы и годы..."
 arnor.7011.a: "Я обучу ещё больше воинов, чтобы однажды вернуть [GetTitleByKey('d_dor_en_egladil').GetNameNoTier]!"
 arnor.7011.b: "Я сосредоточусь на обустройстве этого нового дома и обеспечении безопасности своей семьи."
 reclaimers_of_egladil: "Освободители Эгладиля"

 arnor.7024.t: "В дебри"
 arnor.7024.desc: "После того как я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] начать патрулирование дебрей [Concept('eriador', 'Эриадора')|E], моя свита начала обустраивать простейший лагерь.\n\nБольшинство дунэдайн, все еще живших в Углу Митэйтеля, последовали за мной, и в моем распоряжении несколько десятков умелых мечников.\n\nСо временем мы даже сможем стать достаточно сильными, чтобы свергнуть варварских [Concept('hillmen', 'горцев')|E], которые сейчас претендуют на [rhudaur|E]..."
 arnor.7024.a: "Мы будем сражаться за Арнор!"
 arnor.7024.tt: "К вашему лагерю присоединились два полезных спутника"

 # Scions of Aramir events
 arnor.8001.t: "Падение рода Арамирах"
 arnor.8001.desc: "Это последние, горькие дни проигранной войны. Мы держались, сколько позволяли силы, но это не имело значения. [hwaldar.GetFirstName] со своими полчищами атаковал с ужасающей, безжалостной скоростью, не оставляя времени на организацию обороны, не говоря уже о том, чтобы надеть кольчугу или кожу, прежде чем начнётся бойня.\n\nВнезапно мир закружился. Я лежу в грязи, скользкой от крови моих убитых родичей, в то время как крики умирающих переходят в отдалённый, приглушённый шум. Из моей груди исходит острый, мучительный жар, вражеская стрела торчит из моего беззащитного тела и утекает моя жизнь.\n\nСильные руки поднимают меня с земли. Моргая налитыми кровью глазами, я вижу #L [culainn.GetFirstName]а#!. На лице моего сына застыла маска безысходного горя. «Отец!» - кричит он, и его голос вырывается из самой глубины души, когда он прижимает меня к себе, защищая от надвигающейся бойни.\n\nЯ изо всех сил пытаюсь дышать, используя последние остатки своих угасающих сил, чтобы схватить его за руку. Я не могу позволить ему умереть здесь. Мои губы шевелятся, выдавливая из горла, скользкого от крови, слабые последние слова, прежде чем тьма поглотит меня полностью..."
 arnor.8001.a: "«Оставь меня, [culainn.GetFirstNameNoTooltip]... Беги в [GetTitleByKey('k_arthedain').GetNameNoTier]... Найди короля...»"
 arnor.8001.b: "«Арамирах не отступают...»"
 event_arnor_08001_a: "Ваши родные перебиты, ваш сын - всё, что у вас осталось.\nОн должен выжить."
 event_arnor_08001_b: "Арамирах пали, но их честь уцелела."

 arnor.8002.t: "Отголоски резни"
 arnor.8002.desc: "Позади нас поднимается дым от нашего горящего дома, мрачный саван для моих убитых родственников. У меня нет времени горевать, потому что нападавшие скоро последуют за нами по пятам. Как раз в тот момент, когда отчаяние угрожает охватить меня, из кустов появляется окровавленная фигура.\n[midhir.GetFirstName], старейший друг моего отца.\n\nОн не тратит время на соболезнования. Вручая мне поводья двух заблудших лошадей, он говорит напряжённым от нетерпения голосом. «Прибереги свои слёзы для дороги, парень», - рявкает он, забираясь в седло. «Если мы задержимся здесь, то присоединимся к ним. Шевелись!»\n\nС развалинами наших жизней за спиной, мы садимся в сёдла и мчимся со скоростью ветра к безопасному западу. Я должен добраться до Артедайна, рассказать королю нашу трагическую историю и предъявить претензии на то, что было украдено у нас сегодня."
 arnor.8002.a: "В [GetTitleByKey('c_fornost').GetNameNoTier]! Мы отправимся в путь в поисках убежища!"
 event_arnor_08002_a: "Вы будете искать убежища в столице державы [GetTitleByKey('e_arthedain').GetName], провинции [GetTitleByKey('c_fornost').GetNameNoTier]."

 arnor.8003.t: "Врата Форноста"
 arnor.8003.desc: "Наше безумное бегство заканчивается, когда мы достигаем окрестностей столицы. [midhir.GetFirstName] и я слышим перешёптывания от собравшихся местных жителей, пока дворцовая стража ведёт нас по оживлённым улицам города [GetTitleByKey('c_fornost').GetNameNoTier] в [GetBuilding('wonder_fornost_03').GetName], где заседает королевский двор.\n\nДля [Concept('arnorians', 'свойством')|E]арнорцев мы представляем собой своеобразное зрелище: странствующие [Concept('hillmen', 'горцы')|E], в чьих чертах безошибочно угадывается кровь [Concept('westernesse', 'Вестернессе')|E]. Именно это странное наследие и наша отчаянная просьба поговорить с правителем заинтересовали короля настолько, что он согласился встретиться с нами.\n\nТам, на открытом воздухе, прямо перед дверями дворца, король [argeleb.GetFirstName] с торжественным величием взирает на нас с дворцового балкона. Уважая старшинство, он первым обращается к моему спутнику Мидиру.\n\n«Шагни вперёд, человек с холмов», - приказывает Аргелеб, и его голос отчётливо разносится по каменному двору. «До нас дошли слухи о разрушениях на Востоке, но вся правда от нас ускользает.\nГовори, солдат. Что случилось с Углом, и кто этот юноша, который скачет в твоей тени?»"
 arnor.8003.a: "Мидир смотрит на меня, и я делаю шаг вперёд, чтобы рассказать королю о нашей трагедии..."
 event_arnor_08003_a: "Король [argeleb.GetFirstName] принимает вас при дворе."

 arnor.8004.t: "Смелое предложение"
 arnor.8004.desc: "Перед королём #L [argeleb.GetFirstName]ом#!, при королевском дворе, я рассказываю об ужасе: как была проиграна война, как [hwaldar.GetFirstName] перебил последних [Concept('hillmen', 'горцев')|E]-лоялистов, и как мои родичи умирали в грязи.\n\nЯ говорю тихо, но с ноткой дрожи в голосе. «Я прошу вас о передышке, мой король, ибо я пришёл предложить вам свою службу. Дом #L [galadhion.GetFirstName]а#! был полностью уничтожен жестокостью Халдара, когда он лишил жизни вашего родича #L [aldor.GetFirstName]а#!. Однако я остаюсь единственным живым потомком #L [aramir.GetFirstName]а#!, чьими родителями были король [elenthorn.GetFirstNameNicknamed] и уважаемая придворная». Взгляд #L [argeleb.GetFirstName]а#! пронзает меня, но я продолжаю.\n\n«Помогите мне отомстить за наших павших родичей и наказать узурпатора Халдара. Признайте, что в моих жилах течёт кровь, и я воспользуюсь ею, чтобы сплотить все верные народы Рудаура под вашим знаменем. Так кровь ответит на кровь, и я преклоню колени перед вами и верну отпавших и потерянных сыновей Рудаура вашей старшей ветви, родич».\n\nПри дворе воцаряется тишина, пока король размышляет о цене восстановления Рудаура..."
 arnor.8004.a: "«Что скажете, мой король?»"
 event_arnor_08004_a: "Вы ждёте ответа от короля #L [argeleb.GetFirstName]а#!.\n\nБлагодаря достойной службе, возможно, короля [argeleb.GetFirstNameNoTooltip]а можно убедить признать вас не просто дальним потомком незаконнорождённой ветви, но и даже будущим правителем #ONCLICK:TITLE,k_rhudaur #TOOLTIP:LANDED_TITLE,k_rhudaur #L Рудаура#!#!#!."

 arnor.8005.t: "Королевский указ"
 arnor.8005.desc: "Над королевским двором повисла тяжёлая тишина, пока король [argeleb.GetFirstName] обдумывает мои слова. Когда он, наконец, снова смотрит на меня сверху вниз, суровое величие на его лице превращается в непреклонную решимость.\n\n«Преступления разбойника #L [hwaldar.GetFirstName]а#! взывают к отмщению», - заявляет король, и его голос эхом отражается от камня. «И кровь #L [earendur.GetFirstName]а#! не будет полностью уничтожена на Востоке. Ты предложил свою службу, юный отпрыск, и [GetTitleByKey('k_arthedain').GetNameNoTier] предоставит тебе передышку, чтобы ты послужил нашему делу. Я признаю, что в тебе течёт кровь [Concept('westernesse', 'Вестернессе')|E], но королевство не завоевывается одними обещаниями».\n\nАргелеб наклоняется вперёд, его глаза смотрят на меня с древней властностью. «Отправляйся в [GetTitleByKey('c_auchleathan').GetNameNoTier] и собери то, что осталось от твоего народа. Набирайся сил и готовься. Верни [GetTitleByKey('k_rhudaur').GetNameNoTier] под мою власть, и ты получишь то, что желаешь. Потерпев неудачу, ты останешься всего лишь очередным скитальцем в грязи»."
 arnor.8005.a: "«Я бесконечно благодарен вам, милорд»."
 event_arnor_08005_a: "[argeleb.GetName] предоставит вам убежище в провинции [GetTitleByKey('c_auchleathan').GetNameNoTier]"
 arnor.8005.b: "«Я возьму свой топор и буду служить вам в поле, ваша светлость»."

 arnor.8009.t: "Новый дом в Артедайне"
 arnor.8009.desc: "Добравшись до небольшого аванпоста, предоставленного нам королём #L [argeleb.GetFirstName]ом#!, [midhir.GetFirstName] и я, наконец, можем вздохнуть с облегчением. Здесь, на границе #ONCLICK:TITLE,k_arthedain #TOOLTIP:LANDED_TITLE,k_arthedain #L Артедайна#!#!#!, последние выжившие из нашего народа в безопасности... пока.\n\nИ всё же мои мысли неизбежно устремляются на восток. Там беззаконный язычник [hwaldar.GetFirstName] правит на руинах того, что принадлежало мне по праву рождения, вместе с племенами, верными ему. Король даровал нам своё покровительство, но восстановление нашего дома по-прежнему связано с высокой ценой: полным завоеванием #ONCLICK:TITLE,k_rhudaur #TOOLTIP:LANDED_TITLE,k_rhudaur #L Рудаура#!#!#!.\n\nГлядя на суровые стены этого убежища, я ловлю себя на том, что размышляю о том, как нам жить дальше..."
 arnor.8009.a: "Мы должны тренировать воинов. Я отомщу за свою родню и верну [GetTitleByKey('k_rhudaur').GetNameNoTier]!"
 arnor.8009.b: "Сперва мы должны укрепить это убежище и обеспечить себе выживание."
 avengers_of_the_aramirach: "Мстители рода Арамирах"

 arnor.8010.t: "Скитаясь по землям Эриадора"
 arnor.8010.desc: "После того, как я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )] начать патрулирование земель, прилегающих к #ONCLICK:TITLE,c_fornost #TOOLTIP:LANDED_TITLE,c_fornost #L Форносту#!#!#!, мой небольшой отряд разбил примитивный лагерь.\n\nВсе верные горцы, которым удалось избежать резни в Углу, встали под мои знамёна. Хотя нас немного, в наших жилах течёт смешанная кровь запада и холмов, у меня есть несколько дюжин умелых мечников, объединённых единой целью.\n\nСо временем, когда мы усмирим эти приграничные земли, мы, возможно, соберём силу, необходимую для того, чтобы свергнуть #L [hwaldar.GetFirstName]а#! и верные ему племена, которые теперь посягают на моё украденное право первородства..."
 arnor.8010.a: "Я отомщу за своих родных и верну [GetTitleByKey('k_rhudaur').GetNameNoTier]!"
 arnor.8010.tt: "К вашему лагерю присоединились два полезных подручных"

 arnor.9100.t: "Восстановление Тарбада"
 arnor.9100.desc: "Долгое время город Тарбад служил важным перевалочным пунктом между северным королевством [arnor|E] и его сестрой, южным королевством [gondor|E]. Но в результате [Concept('angmar_wars', 'Ангмарских войн')|E] и Великой чумы город обезлюдел, а жестокие наводнения последних десятилетий окончательно превратили гордый торговый центр в безжизненные руины. \n\nТеперь законные владыки Тарбада вернулись, пообещав вернуть городу и его легендарному мосту былое великолепие, чтобы торговля вновь потекла между королевствами Гондор и Арнор."
 arnor.9100.a: "Величественное достижение!"

 arnor.1001.t: "Укрепление Пасмурных холмов"
 arnor.1001.desc: "Протянувшиеся с севера на юг, суровые Пасмурные холмы образуют естественную защитную границу нашей державы, и если их правильно укрепить, они могут стать серьезной проблемой для всех потенциальных захватчиков. Именно поэтому я созываю своих зодчих и генералов, сообщая им о своем плане.\n\nОднако, как вскоре выясняется, это задание легче сказать, чем сделать, поскольку надлежащее укрепление Холмов потребует больших вложений в виде людей и денег. Мне предлагают множество проектов, от простых систем деревянных сторожевых башен и канав до разросшихся крепостей, соединенных высокими каменными стенами. В конечном итоге именно мне решать, что выбрать." # PLACEHOLDER
 arnor.1001.a: "Безопасность бесценна!"
 arnor.1001.b: "Мы не можем позволить себе быть слишком скупыми."
 arnor.1001.c: "Не будем экстравагантными."

 ###Struggle Flavor Events###

 arnor.2001.t: "Набеги орков!"
 arnor.2001.desc: "Сошедшие с [Concept('mistymountains', 'Мглистых гор')|E] орки долгое время были чумой [Concept('eriador', 'Эриадора')|E], начиная со [Concept('elderdays', 'Старших Дней')|E], и они снова напали на нашу державу. На этот раз они совершили набег на владение [disaster_county.GetNameNoTier]. Нам предстоит решить, как реагировать."
 arnor.2001.a: "Собрать войска!"
 arnor.2001.b: "[marshal.GetName], я доверяю эту задачу вам."
 biulding_destroyed: "Случайное [Concept('building', 'здание')|E] снизит уровень или будет уничтожено"

 arnor.2002.t: "Набеги разбойников!"
 arnor.2002.desc: "[Concept('eriador', 'Эриадор')|E] - опасное место, поскольку из-за раскола [Concept('arnor', 'Арнора')|E] между местными властителями и государствами-преемниками не было сотрудничества, что позволило набегам разбойников через границу стать обычным делом, на этот раз были замечены налётчики, направляющиеся в сторону владения [disaster_county.GetNameNoTier]. Пришло время решить, как реагировать."
 arnor.2002.a: "Собрать войска!"
 arnor.2002.b: "[marshal.GetName], я доверяю эту задачу вам."
 arnor.2002.c: "Если они хотят золото, отдадим его им."

 arnor.2003.t: "Молодой пастух"
 arnor.2003.desc: "Когда мы осматриваем руины деревни, оставшиеся после налета, к нам подходит молодой парень. Он был пастухом, который пас свое стадо в окрестностях деревни. На моих глазах он подошел к сгоревшему дому и разрыдался, увидев тела молодой пары и двух детей, которых мои солдаты до сих пор не похоронили. Очевидно, что произошло, но не очевидно, как я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] реагировать."
 arnor.2003.a: "Он останется при дворе, ни один ребенок не заслуживает того, чтобы быть сиротой."
 arnor.2003.b: "Отослать его в королевские владения, там он может пригодиться."

 arnor.2004.t: "Крестьяне покидают пограничье"
 arnor.2004.desc: "[Concept('eriador', 'Эриадор')|E] пришёл в упадок после распада [Concept('arnor', 'Арнора')|E]. С каждым годом всё больше наших сыновей и дочерей гибнет в [Concept('angmar_wars', 'Ангмарских войнах')|E], и с каждым годом все больше и больше наших земель оказываются заброшенными. По мере того, как дикая природа вторгается в наши границы, люди отступают на более безопасные территории в глубь страны, и в этом году жители владения [county1.GetNameNoTier] решили переселиться во владение [county2.GetNameNoTier]. мы можем либо позволить им уйти, либо заставить их остаться в этих землях."
 arnor.2004.a: "Позволить им переселиться."
 arnor.2004.b: "Заставить их остаться."
 biulding_destroyed_county_1: "Во владении [county1.GetName] будет понижено или уничтожено случайное [Concept('building', 'здание')|E]"
 biulding_add_county_2: "Во владении [biuld_prov.GetName] будет создано или улучшено случайное [Concept('building', 'здание')|E]"