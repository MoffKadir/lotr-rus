l_russian:

 zantaka_event_chain.0101.t: "Совет уступает"
 #zantaka_event_chain.0101.desc: "Хотя возвышенные и могущественные олигархи державы [GetTitleByKey('k_lyneria').GetNameNoTier] гордятся меритократией своих республик, мысль о том, что они изберут наложницу низкого происхождения на тот ранг, которого она заслуживает, смехотворна. В конце концов, было бы #italic неподобающе#!, если бы глава совета не был сыном одной из богатых и древних семей. В их глазах, такая, как я, должна молчать, выполнять их приказы и терпеть всё ради их удовольствия.\n\nОднако сегодня этот жестокий и бессердечный порядок рухнул. Силара, которые поколениями поддерживали порядок среди купцов, полностью уничтожены. В одночасье республика погрузилась в анархию, поскольку каждый олигарх мечтает взять на себя роль главы совета. Конечно, я готова к этому. За последние двенадцать лет я создала сеть шпионов, скрытых от посторонних глаз, и собрала список всех убийств, нарушенных клятв, растрат и незаконных сделок, совершенных олигархами, входящими в совет.\n\nКогда сегодня утром совет соберется, чтобы избрать своего нового главу, у меня будет возможность открыто осудить эти преступления. Если, конечно, я не получу голосов, которых заслуживаю..."
 zantaka_event_chain.0101.desc: "Хотя высокопоставленные и могущественные олигархи державы [GetTitleByKey('k_lyneria').GetNameNoTier] гордятся меритократией своих республик, на самом деле в их рядах нет места людям #italic низкого#! происхождения или нищим. Всю свою жизнь я [Select_CString(ROOT.Char.IsFemale, 'была вынуждена', 'был вынужден' )] преклоняться перед меньшими мужчинами и женщинами и выполнять все их приказы, даже когда их идиотизм был очевиден для меня. В их глазах моей единственной ролью было молчать, выглядеть мило и терпеть #italic всё#! ради их удовольствия.\n\nТем не менее, есть некоторое преимущество в том, чтобы быть никем для своих врагов. В течение последних двенадцати лет я [Select_CString(ROOT.Char.IsFemale, 'была вольна', 'был волен' )] действовать в высших сферах власти, и никто не замечал моих действий: всё это при условии, что я не [Select_CString(ROOT.Char.IsFemale, 'делала', 'делал' )] ничего, кроме удовлетворения желаний моего хозяина. Благодаря моим многолетним усилиям я [Select_CString(ROOT.Char.IsFemale, 'возглавила', 'возглавил' )] крупнейшую сеть шпионов и информаторов в городе [GetTitleByKey('c_pelorna').GetNameNoTier]. Так что очень немногие из членов совета свободны от грязи и позора, поскольку их привилегии ударили в их похотливые и высокомерные головы.\n\nТеперь, когда Силара мертвы, олигархи хранят молчание с помощью не слишком изощрённого шантажа, а несколько наёмников куплены за #italic позаимствованные#! городские сокровища, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что на завтрашних выборах я получу власть, которую всегда [Select_CString(ROOT.Char.IsFemale, 'заслуживала', 'заслуживал' )]."
 zantaka_event_chain.0101.a: "Пусть только попробуют остановить меня сейчас!"

 zantaka_event_chain.0102.t: "Гордость граждан"
 #zantaka_event_chain.0102.desc: "Теперь, когда моё правление укрепилось, хотя и не пользуется любовью, можно было бы подумать, что это самое время отпраздновать. На самом деле, совет знает, что любая попытка сместить меня приведёт к его падению вместе со мной, поскольку их преступления станут известны, а их репутация резко упадёт. Со временем они научатся подчиняться моей воле, как и все слуги, но пока хватит тихой ненависти и слов протеста.\n\nОднако, к моему удивлению, не только великим олигархам, похоже, претит мысль о том, что сирота из таверны придёт к власти в их городе. Даже простые горожане начали насмехаться надо мной и сопротивляться моему правлению, несмотря на мои очевидные способности правительницы.\n\nМоё правление над провинцией [GetTitleByKey('c_pelorna').GetNameNoTier] кажется, с каждым днём становится всё менее надёжным, и каждый открытый акт неповиновения, похоже, влечёт за собой другой. Если я хочу выжить в ближайшие месяцы, годы или, возможно, просто недели, мне нужно будет усмирить этих недоброжелателей и напомнить им, что я не какая-то высокомерная наложница, а их законная хозяйка."
 zantaka_event_chain.0102.desc: "Несмотря на ожесточённое сопротивление, Совет в конечном счете согласился допустить мой приход к власти, официально мотивируя свой выбор моими тесными связями с #italic таинственно#! погибшими Силара. Конечно, мой обширный список проклятий, связанных с шантажом, поддержкой наёмников или, боги упасите, с моими #italic навыками [Select_CString(ROOT.Char.IsFemale, 'правительницы', 'правителя' )]#!, не имел к этому #italic никакого#! отношения. Хотя оппозиция моему правлению остаётся ожесточённой и с ней трудно справиться, у совета не осталось другого выбора, кроме как объявить меня своим главой.\n\nОднако, к моему удивлению, гнев по поводу моего возвышения распространяется не только на недовольных олигархов. Действительно, даже простые граждане громко и открыто выражают недовольство моим возвышением: оскорбляют моё низкое происхождение, заявляют, что я ни на что не гожусь, кроме как угождать мужчинам, или настаивают на том, чтобы я [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил' )] политику и [Select_CString(ROOT.Char.IsFemale, 'продавала', 'продавал' )] своё тело, как моя скромная мать. Помимо того, что эта тенденция #italic глубоко#! оскорбительна, она представляет собой серьёзную угрозу моей власти. Совет только делает вид, что слушает меня, опасаясь возмущения общественности в связи с раскрытием их секретов. Если бы меня считали не более чем [Select_CString(ROOT.Char.IsFemale, 'лживой узурпаторшей', 'лживым узурпатором' )], никакие доказательства не убедили бы массы в моих притязаниях, оставив открытой дверь для моего смещения. Если я хочу выжить в ближайшие годы или, возможно, просто месяцы, я #italic [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]#! положить конец этому инакомыслию."
 zantaka_event_chain.0102.a: "Я не потерплю неудачу!"
 zantaka_strife_begins: "#N Если в течение следующих трёх лет вы не достигнете #italic ожидаемого#! уровня легитимности, уровня репутации #italic Доброе имя#! или #italic 100 ед. контроля#! во владении [GetTitleByKey('c_pelorna').GetNameNoTier], #italic вы будете отстранены от власти!#!#!"

 zantaka_event_chain.0103.t: "Воля народа"
 zantaka_event_chain.0103.desc: "Хотя за последние годы моего правления было проведено много городских советов, этот отличается от других. Я чувствую напряжение в воздухе, как будто сегодня должно произойти что-то ужасное. Я [Select_CString(ROOT.Char.IsFemale, 'потрясена', 'потрясён' )], когда [council_leader.GetTitledFirstName] с высокомерной улыбкой на лице заявляет, что вопрос, который будет обсуждаться сегодня, - это #italic мой#! судебный процесс по обвинению в убийстве Силара. Как [Select_CString(council_leader.IsFemale, 'эта некомпетентная дура могла', 'этот некомпетентный болван мог' )] #italic это#! обнаружить? Убийства были идеальными! Конечно, мой мотив был бы ясен, но моя позиция должна защищать меня от подобных необоснованных обвинений. Благодаря тому, что может быть делом рук только какого-нибудь предателя из немногочисленных рядов моих агентов, [council_leader.GetTitledFirstName] [Select_CString(council_leader.IsFemale, 'собрала', 'собрал' )] достаточно улик, чтобы возбудить против меня серьёзное дело.\n\nНекоторые члены совета притворяются шокированными, другие смотрят на меня с презрением. Очевидно, что справедливого суда надо мной не будет, хотя при таких обстоятельствах даже это могло бы меня не спасти. Единогласно я [Select_CString(ROOT.Char.IsFemale, 'признана виновной', 'признан виновным' )] в убийстве, цареубийстве и государственной измене городу. Когда стражник подходит, чтобы отвести меня в подземелье, [council_leader.GetTitledFirstName] останавливает их. «Я [Select_CString(council_leader.IsFemale, 'сама', 'сам' )] #italic позабочусь#! о [Select_CString(ROOT.Char.IsFemale, 'ней', 'нём' )]», - говорит [Select_CString(council_leader.IsFemale, 'она', 'он' )] им, прежде чем повернуться ко мне: «Я [Select_CString(council_leader.IsFemale, 'протянула', 'протянул' )] тебе руку помощи, Зантака, никогда не забывай об этом. То, чем ты не [Select_CString(ROOT.Char.IsFemale, 'захотела', 'захотел' )] поделиться со мной, я возьму на себя...»"
 zantaka_event_chain.0103.a: "Мы все подохнете, #italic свиньи#!!"

 zantaka_event_chain.0104.t: "Новый порядок"
 zantaka_event_chain.0104.desc: "Наконец-то моя власть над городом [GetTitleByKey('c_pelorna').GetNameNoTier] укреплена. У совета, столкнувшегося с моими несомненными способностями [Select_CString(ROOT.Char.IsFemale, 'правительниц', 'правителя' )] и растущим положением в обществе, теперь нет иного выбора, кроме как неохотно принять моё правление. Те, кто когда-то считали меня [Select_CString(ROOT.Char.IsFemale, 'высокомерной', 'высокомерным' )] выскочкой, [Select_CString(ROOT.Char.IsFemale, 'склонной', 'склонным' )] к подчинению, теперь вынуждены признать во мне лидера, [Select_CString(ROOT.Char.IsFemale, 'которой я была рождена', 'которым я был рождён' )]. По всей державе [GetTitleByKey('k_lyneria').GetNameNoTier], моё имя известно и произносится со страхом среди сильных мира сего, тех, кто мог бы так много потерять, если бы их собственные жертвы и слуги восстали, как я.\n\nКогда я смотрю на то, где я сейчас, даже я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] с трудом могу представить, как высоко я [Select_CString(ROOT.Char.IsFemale, 'поднялась', 'поднялся' )]. И всё же, очень немногие обладают моей удачей или мастерством. Шрамы моей юности остаются глубоко внутри меня, я, [Select_CString(ROOT.Char.IsFemale, 'которая была одной', 'который был одним' )] из немногих счастливчиков, достигших того, о чем часто [Select_CString(ROOT.Char.IsFemale, 'мечтала', 'мечтал' )], - «побега» со службы при дворе власти. Но даже это оказалось не более чем позолоченной тюрьмой, местом боли, мучений и унижения для удовольствия бессердечных хозяев. Моя борьба была тяжёлой, моя победа была вырвана из холодных, мёртвых рук жестокого порядка, который был до меня. Мои мечты, которые когда-то были не более чем фантазиями бедной девочки-сироты, наконец-то могут осуществиться. Жестокие хозяева этого мира наконец познают справедливость и #italic ужас!#!"
 zantaka_event_chain.0104.a: "#italic Таков гнев Виналима#!"
 zantaka_reforms_begin: "Укрепив свою власть над городом [GetTitleByKey('c_pelorna').GetNameNoTier], вы можете свободно начать проводить реформы в своих землях и стремиться к расширению своей власти во всей державе [GetTitleByKey('k_lyneria').GetNameNoTier]."

 zantaka_event_chain.0105.t: "Сделка с [Select_CString(council_leader.IsFemale, 'делательницей', 'делателем' )] королей"
 zantaka_event_chain.0105.desc: "После очередной утомительной встречи с городским советом я с удивлением вижу, что ко мне подходит [council_leader.GetTitledFirstName], мой главный соперник среди олигархов. Прежде чем я успеваю его о чем-либо спросить, он хватает меня за руку и начинает говорить. «Зантака», - говорит он, не называя меня по титулу, - «Позволь мне говорить прямо. Твоя позиция неприемлема. Твоё падение зависит не от #italic «если»#!, а от #italic «когда»#!. Но, может, мы сможем прийти к соглашению, которое #italic порадует#! нас обоих. Моя жена недавно скончалась, как ты знаешь, и это принесло бы мне большое удовольствие обладать женщиной с твоими... #italic навыками#! на моей стороне... и в моей постели, конечно».\n\nЯ почти отвергаю это оскорбительное предложение, как только слышу его, но в последний момент воздерживаюсь. Править в совете в одиночку, когда со всех сторон одни враги, наверняка будет непросто даже для такой опытной женщины, как я. И всё же, действительно ли этот союз стоит того, чтобы продать своё тело и душу другому? Пока я колеблюсь, [council_leader.GetTitledFirstName] наклоняется ко мне, его глаза полны желания, которое я вижу у слишком многих. «Если моё предложение тебя заинтересует, встретимся в моих покоях сегодня вечером. Я верю, что ты оправдаешь свою #italic репутацию#!...»"
 zantaka_event_chain.0105.a: "Я больше не возлягу со #italic свиньями#!!"
 zantaka_event_chain.0105.b: "Я [Select_CString(ROOT.Char.IsFemale, 'пережила', 'пережил' )] гораздо худшее, чтобы попасть сюда..."
 zantaka_marriage_no: "Вы отказываетесь от предложения персонажа [council_leader.GetTitledFirstName], надеясь самостоятельно укрепить свою власть и воплотить своё видение города [GetTitleByKey('c_pelorna').GetNameNoTier], свободного от каких-либо связей со старым порядком."
 zantaka_marriage_yes: "Вы уступаете персонажу [council_leader.GetTitledFirstName], становясь его женой и отказываетесь от своей новообретённой свободы, чтобы любой ценой удержать власть."

 zantaka_event_chain.0106.t: "Путь королев"
 zantaka_event_chain.0106.desc: "Впервые я могу свободно смотреть в будущее, без страха и тревог, которые так долго преследовали меня. Я поднялась выше, чем кто-либо мог ожидать, но всё же остаюсь незначительной в огромном мире, в который я сейчас вступила. Прошли те времена, когда для меня имел значение только один город. Даже просто в пределах #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!, я правлю одним из беднейших городов, окружённым с обеих сторон великими державами лиги. Если я не буду осторожна, то всё равно могу пасть после стольких трудов.\n\nХотя у меня есть большие мечты о проведении реформ в этих землях и прекращении несправедливости, которую олигархи навязывают своему народу, я всё же должна учитывать холодную политическую реальность. Как незамужняя женщина, первым шагом на пути к обретению большей власти для меня обычно было бы найти себе слабого и легко управляемого мужа. Если бы я пошла по этому пути, лучшим выбором, несомненно, был бы [emelkyn_son.GetTitledFirstName], сын [Select_CString(emelkyn_ruler.IsFemale, 'правительницы', 'правителя' )] #ONCLICK:TITLE,c_emelcyn #TOOLTIP:LANDED_TITLE,c_emelcyn #L Эмелькина#!#!#!, [Select_CString(emelkyn_ruler.IsFemale, 'которой', 'которым' )] является [emelkyn_ruler.GetTitledFirstName]. Тем не менее, у меня нет желания выходить замуж и снова попадать под власть мужчины, пусть даже только номинально, и такие прагматичные политические игры, несомненно, потребовали бы от меня отказаться от моей мечты о реформах."
 zantaka_event_chain.0106.a: "Я одолею их всех..."
 zantaka_revolt_route_tooltip: "Вы остаётесь верны своим революционным мечтам, стремясь доказать всему миру, что было неправильно когда-либо сомневаться в вашем умении и праве править."
 zantaka_event_chain.0106.b: "Я попала сюда не потому, что бунтовала против всего мира..."
 zantaka_marriage_route_tooltip: "Вы будете стремиться к браку и политической власти в #ONCLICK:TITLE,c_emelcyn #TOOLTIP:LANDED_TITLE,c_emelcyn #L Эмелькине#!#!#!, отказавшись от своих мечтаний о грандиозных реформах в пользу личной власти."
 zantaka_league_loses_opinion: "Все члены Линерийской лиги снизят своё [Concept('opinion', 'мнение')|E] о вас на #N 80#!."

 zantaka_event_chain.0107.t: "Решение совета"
 zantaka_event_chain.0107.desc: "Когда я прибываю в [GetTitleByKey('c_emelcyn').GetNameNoTier], [emelkyn_ruler.GetTitledFirstName] довольно холодно принимает меня. После выполнения обычных формальностей мне разрешается въехать в город и официально представиться перед его советом в качестве кандидатки на брак, который заключим я и [emelkyn_son.GetTitledFirstName], один из самых выдающихся его членов.\n\nУчитывая, что моя репутация всё ещё сильно страдает из-за моего происхождения, потребуется много усилий, споров и убеждения, чтобы склонить совет на мою сторону, если это вообще произойдёт. Пока что, [emelkyn_ruler.GetTitledFirstName] имеет большое влияние на своих коллег-олигархов в силу своего положения. Возможно, всё, что потребуется для заключения брака, - это завоевать [Select_CString(emelkyn_ruler.IsFemale, 'её', 'его' )] расположение. Однако для меня открыт и третий путь. [emelkyn_son.GetTitledFirstName] - похотливый мужчина, сгорающий от желания. Если бы я смогла найти подходящую возможность, то, возможно, смогла бы убедить его взять меня в жены, невзирая на пожелания совета. Хотя я и не хочу идти по этому пути, рано или поздно мне #italic придётся#! переспать с ним..."
 zantaka_event_chain.0107.a: "[emelkyn_son.GetTitledFirstName] не устоит перед моими чарами..."
 zantaka_event_chain.0107.success.seduction: "#P Вы нашли возможность попытаться соблазнить персонажа [emelkyn_son.GetTitledFirstName].#!"
 zantaka_event_chain.0107.failure: "#N Ваша попытка заключить брак с персонажем [emelkyn_son.GetTitledFirstName] закончилась неудачей#!"
 zantaka_event_chain.0107.b: "При достаточном усердии [emelkyn_ruler.GetTitledFirstName] наверняка проникнется ко мне симпатией."
 zantaka_event_chain.0107.success: "#P Вам удалось обговорить свой брак с персонажем [emelkyn_son.GetTitledFirstName]#!"
 zantaka_event_chain.0107.c: "Совет прислушается к моим словам."
 zantaka_personal_seduction: "Вы попытаетесь найти способ соблазнить персонажа [emelkyn_son.GetTitledFirstName], заставив его объявить вас своей супругой, несмотря на пожелания остальной части его державы."
 zantaka_befriend_ruler: "Вы попытаетесь убедить персонажа [emelkyn_ruler.GetTitledFirstName] поддержать ваш брак с персонажем [emelkyn_son.GetTitledFirstName]."
 zantaka_convince_council: "Вы попытаетесь убедить совет разрешить ваш брак с персонажем [emelkyn_son.GetTitledFirstName] исходя из ваших собственных соображений."

 zantaka_event_chain.0108.t: "Королева сердец"
 zantaka_event_chain.0108.desc: "After my arrival at [GetTitleByKey('c_emelcyn').GetNameNoTier], I began looking for and taking any opportunity to approach [emelkyn_son.GetTitledFirstName]. At first, I only talk to him, but quickly enough I begin to go further. Simple smiles and caresses turn into a stolen kiss away from the eyes of the council. As night comes after a long day of seduction and debates, my next move is clear. With the help of a bribed servant, I take the secret paths hidden throughout the palace all the way to my target's chambers, wearing my most alluring nightgown. It is only natural I play my best card. \n\n[emelkyn_son.GetTitledFirstName] is shocked to see me but is clearly #italic very#! pleased. "My dear, I desire you more than you can imagine." I softly tell him. "Never have I seen such an irrestible man as you, [emelkyn_son.GetTitledFirstName]. The council, cold and blind to love, would have us be seperated, but I know it is Vilaneem herself that has brought me in your arms. I see it in your eyes: you too desire me, do you not? I am yours to take. There is no desire or pleasure that I would deny you." I lean into him and kiss him with false but great passion. "Make love to me tonight, make me your wife tommorow, and every night after I will be yours." What follows, I know very well. Soon, I will see if I have myself a puppet..."
 zantaka_event_chain.0108.a: "Такова цена власти..."
 zantaka_event_chain.0108.success_crit: "#P [emelkyn_son.GetTitledFirstName] совершенно очарован вами и становится безвольным мужем, которого вы искали#!"
 zantaka_event_chain.0108.success: "#N [emelkyn_son.GetTitledFirstName] соглашается жениться на вас после вашей #italic демонстрации#!, но проявляет своеволие#!"

 zantaka_event_chain.0109.t: "Игра кукловода"
 zantaka_event_chain.0109.seduce: "After a rather long night that has clearly left [emelkyn_son.GetTitledFirstName] exhausted, the next part of my plan comes into motion. As planned, a servant of [emelkyn_son.GetTitledFirstName] enters his master's chambers and sees us together in a #itlaic compromising#! position. The servant quickly leaves, sure to be bringing word to [emelkyn_ruler.GetTitledFirstName] of this clear lapse in behaviour from [emelkyn_son.GetTitledFirstName]. \n\nWhen the second day of debates with the council begins, I declare that [emelkyn_son.GetTitledFirstName] had officially taken me as his wife last night, explaining what would otherwise have been #italic scandalous#! behaviour. After my more than impressive showing, [emelkyn_son.GetTitledFirstName] confirms my words, clearly desiring the privilege of enjoying the false love I showed him. The council of [GetTitleByKey('c_emelcyn').GetNameNoTier], unable to find any reasoable counter to my new husband's words, begrudgingly agrees to recognize my marriage to [emelkyn_son.GetTitledFirstName]. Despite this being a victory, it feels hollow to me. I have myself a husband, well connected, dumb, easy to control and in the perfect place to facilitate my rise, but it has a price. By day, I shall be mighty, but by night I will once more have to be a slave to another's pleasure..."
 zantaka_event_chain.0109.other: "Though [emelkyn_ruler.GetTitledFirstName] and his council strongly opposed my marriage to [emelkyn_son.GetTitledFirstName] at first, this attitude seems to have finally changed. My words and my talent have impressed them and no more to they see me as a lucky usurper. For quite possibly the first time, I have been able to convince the high courts of power that I am more than my mother or than my birth. The satisfaction of proving so many wrong is not lost to me. \n\nDespite this, however, I still must contend with the reality of being the wife of [emelkyn_son.GetTitledFirstName]. While it is most certainly far better to be a powerful and rich wife than a powerless concubine, both share a similar burden. If [emelkyn_son.GetTitledFirstName] is to truly become a loyal agent, I will have no choice but to submit myself to his pleasure, at least in part, so that he becomes reliant on me. The pains of my youth have left me with no taste for such acts, yet they have made me a master in exciting others. Even now, as I rise to be the most powerful woman [GetTitleByKey('k_lyneria').GetNameNoTier] has ever known, I remain forced to dwell on my scars. Ambition always has a price, and for me it has always been the same..."
 zantaka_event_chain.0109.a: "Power is #italic always #!worth the sacrifice!"

 zantaka_event_chain.0110.t: "A Snapped Web"
 zantaka_event_chain.0110.desc: "Despite my best efforts, [emelkyn_ruler.GetTitledFirstName] and his council have ruled out any chance of accepting my marriage to [emelkyn_son.GetTitledFirstName]. They openly declared my power to have been usurped from the Sylaara, refusing to hear my arguments and demands of recognition. By the end, it would seem that the only reason I have not been sent to some dungeon in [GetTitleByKey('c_emelcyn').GetNameNoTier] is [emelkyn_ruler.GetTitledFirstName]'s respect of diplomatic immunity. \n\nAs I leave [GetTitleByKey('c_emelcyn').GetNameNoTier], I am overtaken by the bitter taste of defeat. Perhaps, I should have been bolder in my moves, less restrained, more willing to lie and to submit to please. This humiliation is sure to not be forgotten soon, but some part of me is releived. Had I married [emelkyn_son.GetTitledFirstName], I would once more have had to serve and pleasure a man, even if in name only after some time. My mind once more turns to my dreams of old, to the reforms I had long dreamt of bringing to my people. I have no place among the Oligarchs, that much is clear. There may very well still be a road to power ahead of me, even if it will be hard and long..."
 zantaka_revolution_take_2: "You will once more go down the road of revolution and reform, seeking to rise to power in [GetTitleByKey('k_lyneria').GetNameNoTier] at the expense of the powers that wronged you."
 zantaka_event_chain.0110.a: "Perhaps this is a sign..."
 zantaka_event_chain.0110.b: "I will surely be able to find another."

 zantaka_event_chain.0111.t: "League within League"
 zantaka_event_chain.0111.desc: "At last, true power is mine. No more am I simply the master of some petty city, barely worthy of note among the greats of [GetTitleByKey('k_lyneria').GetNameNoTier]. [GetTitleByKey('c_emelcyn').GetNameNoTier], proud and #italic mighty#! is now under my rule. I had thought myself rich when I first came to power over the small town of [GetTitleByKey('c_pelorna').GetNameNoTier]. Now, I know that there is so much more to wealth than I had thought. Countless servants cater to my every need and every day I enjoy the finest luxuries the Bay of Ormal has to offer. My life is so pleasant that I can almost forget my husband [emelkyn_vassal.GetTitledFirstName]. \n\nYet, even now, I am unsatisfied: every luxury, every power and every privilege making me wish for ever more. After suffering so much to get here, do I not deserve it all? When I look at a map of my realm, I cannot help but de annoyed by the continued sovereignty of the small city state of [GetTitleByKey('c_murnak').GetNameNoTier]. Though it is larger than that backwater [GetTitleByKey('c_pelorna').GetNameNoTier], it remains a poor and minor city. Yet, its position would make it very valuable in consolidating my new realm into a coherent state. Were I to rule all of [GetTitleByKey('d_sylara').GetNameNoTier], all of [GetTitleByKey('k_lyneria').GetNameNoTier] may follow."
 zantaka_event_chain.0111.a: "I will have it #italic all!#!"
 zantaka_event_chain.0111.b: "This... this is enough."
 zantaka_sieze_murnak: "You will make a play to subdue [GetTitleByKey('c_murnak').GetNameNoTier] into your growing realm, at the risk of bringing on the wrath of the league at large."
 zantaka_no_murnak: "You content yourself with your already impressive rise, enjoying the spoils of your ascension."
 zantaka_league_opinion_loss: "All members of the Lynerian League have lost #N 50#! [opinion|e] of you."

 zantaka_event_chain.0112.t: "Games of Power"
 zantaka_event_chain.0112.desc: "It feels hard to believe that the last hurdle in the way of me achieving my dreams of unrivaled power is to subdue a city as minor as #italic [GetTitleByKey('c_murnak').GetNameNoTier]#!. Yet, the city is likely to be the last straw in the eyes of the League, its leaders already displeased by my rise, hating the thought that a lowborn street girl could rise above their ancient rule and great wealth. Despite their greed and their wishes, however, my ambition will not be quelled here: nor will it be until all of [GetTitleByKey('k_lyneria').GetNameNoTier] is mine, as it would have always been if our people truly chose the worthy as their leaders. \n\nI will need a plan to subdue [GetTitleByKey('c_murnak').GetNameNoTier], however. My newfound wealth would make it rather easy to bribe the city's council into signing a treaty of submission, yet such an endeavor would likely prove rather expensive, even for one as rich as me. Having come into the possession of [GetTitleByKey('c_emelcyn').GetNameNoTier]'s mighty navy, I could seek to enforce a blockade of the city, yet such an act of obvious power projection and dominance would be sure to rouse the ire of the League."
 zantaka_event_chain.0112.a: "A #italic hefty#! bribe should smooth out things..."
 zantaka_murnak_bribe: "You bribe the city council of [GetTitleByKey('c_murnak').GetNameNoTier] to obtain its submission."
 zantaka_event_chain.0112.b: "My navy is sure to scare them into submission..."
 zantaka_murnak_blockade: "You attempt to blockade the port of [GetTitleByKey('c_murnak').GetNameNoTier] to force its submission."
 zantaka_event_chain.0112.success: "#P Вы успешно подчинили [GetTitleByKey('c_murnak').GetNameNoTier]#!"
 zantaka_event_chain.0112.failure: "#N Вы не сумели подчинить [GetTitleByKey('c_murnak').GetNameNoTier]#!"

 zantaka_event_chain.0113.t: "Unending Will"
 zantaka_event_chain.0113.desc: "As expected, my efforts to see [GetTitleByKey('c_murnak').GetNameNoTier] subdued into my realm have been met with great success. [murnak_ruler.GetTitledFirstName] has seen the futility of resisting against my inevitable rise and has accepted my terms for his submission. Officially, I am know the ruler of the Tetrarchy of [GetTitleByKey('d_sylara').GetNameNoTier] in which the four cities of the realm are equal members. Of course, as the direct ruler of two cities and the influential wife of the man that rules yet another, power within this new realm is fully withing my hands. \n\nWhile the league rages and voices great complaints, the #italic willing#! submission of [GetTitleByKey('c_murnak').GetNameNoTier] keeps them powerless to act against me. In a decade or so, I am sure that this enmity will pass, the League too divided to truly act against my power. By then, I will surely have grown in influence to the point of finally bringing about the unification of the League under one absolute ruler: myself, of course. All that is left for me to do now is wait for my reputation to heal. I hear that the havens of [GetTitleByKey('d_mutayiisi_sengani').GetNameNoTier], found beyond the wilds of southern [GetTitleByKey('k_lyneria').GetNameNoTier], are as rich as our own cities. Plotting their fall is sure to keep me busy until the League bends and makes me its master..."
 zantaka_event_chain.0113.a: "None now stand that can oppose me!"

 zantaka_event_chain.0114.t: "The League Stands"
 zantaka_event_chain.0114.desc: "Perhaps better realising the nature of its position that I would have thought, [GetTitleByKey('c_murnak').GetNameNoTier] has openly refused and denounced my attempt to see it subdued into my realm. [murnak_ruler.GetTitledFirstName] has taken the issue to the wider Lynerian League, prompting a hardline response against my actions. The ever proud Oligarchs of the League have officially declared my acts a declaration of war and demanded that heavy reparations be paid as recompense for my criminal acts. \n\nIn my eyes, there is only one way to reply to this outrage. Though I had desired to be allowed to complete my rise in peace, it is clear to me that it will have to be achieved through war. Surely, I who have been able to scheme the fall of centuries old houses, turn men into little more than puppets and have ruled my realm better than any council master before me can win a war against these fat and useless Oligarchs. I will put these fools back in their place and when I will be done they will beg me to spare them and to become their master."
 zantaka_event_chain.0114.a: "I. Will. Not. Fail. HERE!"