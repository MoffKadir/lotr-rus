l_russian:

 zantaka_event_chain.0001.t: "Королева, рождённая в тени"
 zantaka_event_chain.0001.desc: "Наконец-то [GetTitleByKey('k_lyneria').GetNameNoTier] принадлежит мне. Впервые в истории Линерийская лига вышла за рамки конфедерации и стала по-настоящему могущественной державой. По ту сторону Ормальского залива все вынуждены склониться перед моим неоспоримым превосходством, даже сам [GetTitleByKey('e_khy').GetNameNoTier]. Под моим началом собраны огромные флоты, ожидающие моего приказа, чтобы пополнить мою безграничную казну еще большим богатством. Старые олигархи практически бессильны, мои владения находятся под моей абсолютной властью.\n\nЯ совершила невозможное, немыслимое. Те немногие, кто всё ещё сомневался в моём правлении и насмехался надо мной в тени, теперь замолкли. В #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#! наступила новая эра силы и невиданного превосходства, и я - его глашатай.\n\nЛохмотья, в которых я была рождена, теперь стали лишь далеким воспоминанием, а мои прежние муки забыты перед лицом моей мощи и славы. Теперь лишь  глупцы осмелятся выступить против меня, никто не обладает достаточной силой, чтобы свергнуть меня или оскорбить. Я не просто повелительница ночи, не скромная куртизанка: я #italic королева#!, и все склонятся перед моей властью!"
 zantaka_event_chain.0001.desc.other: "Наконец-то мечта, с которой начался мой дом, осуществилась. Наследники Зантаки теперь правят объединённой Линерией, а её народ наконец-то свободен от своих древних оков. Под моим мудрым и справедливым правлением земля, несомненно, будет расти и процветать."
 zantaka_event_chain.0001.a: "Пусть великие #italic отчаиваются#! при упоминании моего имени!"

 zantaka_event_chain.0101.t: "Совет уступает"
 #zantaka_event_chain.0101.desc: "Хотя возвышенные и могущественные олигархи державы [GetTitleByKey('k_lyneria').GetNameNoTier] гордятся меритократией своих республик, мысль о том, что они изберут наложницу низкого происхождения на тот ранг, которого она заслуживает, смехотворна. В конце концов, было бы #italic неподобающе#!, если бы глава совета не был сыном одной из богатых и древних семей. В их глазах, такая, как я, должна молчать, выполнять их приказы и терпеть всё ради их удовольствия.\n\nОднако сегодня этот жестокий и бессердечный порядок рухнул. Силара, которые поколениями поддерживали порядок среди купцов, полностью уничтожены. В одночасье республика погрузилась в анархию, поскольку каждый олигарх мечтает взять на себя роль главы совета. Конечно, я готова к этому. За последние двенадцать лет я создала сеть шпионов, скрытых от посторонних глаз, и собрала список всех убийств, нарушенных клятв, растрат и незаконных сделок, совершенных олигархами, входящими в совет.\n\nКогда сегодня утром совет соберется, чтобы избрать своего нового главу, у меня будет возможность открыто осудить эти преступления. Если, конечно, я не получу голосов, которых заслуживаю..."
 zantaka_event_chain.0101.desc: "В течение последних двенадцати лет я [Select_CString(ROOT.Char.IsFemale, 'была вольна', 'был волен' )] действовать в высших сферах власти, и никто не замечал моих действий: всё это при условии, что я не [Select_CString(ROOT.Char.IsFemale, 'делала', 'делал' )] ничего, кроме удовлетворения желаний моего хозяина. Благодаря моим многолетним усилиям я [Select_CString(ROOT.Char.IsFemale, 'возглавила', 'возглавил' )] крупнейшую сеть шпионов и информаторов в городе [GetTitleByKey('c_pelorna').GetNameNoTier]. Так что очень немногие из членов совета свободны от грязи и позора, поскольку их привилегии ударили в их похотливые и высокомерные головы.\n\nТеперь, когда Силара мертвы, олигархи хранят молчание с помощью не слишком изощрённого шантажа, а несколько наёмников куплены за #italic позаимствованные#! городские сокровища, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что на завтрашних выборах я получу власть, которую всегда [Select_CString(ROOT.Char.IsFemale, 'заслуживала', 'заслуживал' )]."
 zantaka_event_chain.0101.a: "Пусть только попробуют остановить меня сейчас!"
 zantaka_may_not_increase_authority: "#N Вы не можете повышать авторитет короны, пока не стабилизируете своё правление.#!"

 zantaka_event_chain.0102.t: "Гордость граждан"
 #zantaka_event_chain.0102.desc: "Теперь, когда моё правление укрепилось, хотя и не пользуется любовью, можно было бы подумать, что это самое время отпраздновать. На самом деле, совет знает, что любая попытка сместить меня приведёт к его падению вместе со мной, поскольку их преступления станут известны, а их репутация резко упадёт. Со временем они научатся подчиняться моей воле, как и все слуги, но пока хватит тихой ненависти и слов протеста.\n\nОднако, к моему удивлению, не только великим олигархам, похоже, претит мысль о том, что сирота из таверны придёт к власти в их городе. Даже простые горожане начали насмехаться надо мной и сопротивляться моему правлению, несмотря на мои очевидные способности правительницы.\n\nМоё правление над провинцией [GetTitleByKey('c_pelorna').GetNameNoTier] кажется, с каждым днём становится всё менее надёжным, и каждый открытый акт неповиновения, похоже, влечёт за собой другой. Если я хочу выжить в ближайшие месяцы, годы или, возможно, просто недели, мне нужно будет усмирить этих недоброжелателей и напомнить им, что я не какая-то высокомерная наложница, а их законная хозяйка."
 zantaka_event_chain.0102.desc: "Несмотря на ожесточённое сопротивление моему правлению, у совета не осталось другого выбора, кроме как объявить меня своим главой.\n\nК моему удивлению, гнев по поводу моего возвышения распространяется не только на недовольных олигархов. Действительно, даже простые граждане громко и открыто выражают недовольство моим возвышением. Это представляет собой серьёзную угрозу моей власти. Совет только делает вид, что слушает меня, опасаясь возмущения общественности в связи с раскрытием их секретов. Если бы меня считали не более чем [Select_CString(ROOT.Char.IsFemale, 'лживой узурпаторшей', 'лживым узурпатором' )], никакие доказательства не убедили бы массы в моих притязаниях, оставив открытой дверь для моего смещения. Если я хочу выжить в ближайшие годы или, возможно, просто месяцы, я #italic [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]#! положить конец этому инакомыслию."
 zantaka_event_chain.0102.a: "Я не потерплю неудачу!"
 zantaka_strife_begins: "#N Если в течение следующих трёх лет вы не достигнете #italic ожидаемого#! уровня легитимности, уровня репутации #italic Доброе имя#! или #italic 100 ед. контроля#! во владении [GetTitleByKey('c_pelorna').GetNameNoTier], #italic вы будете отстранены от власти!#!#!"

 zantaka_event_chain.0103.t: "Воля народа"
 zantaka_event_chain.0103.desc: "Хотя за последние годы моего правления было проведено много городских советов, этот отличается от других. Я чувствую напряжение в воздухе, как будто сегодня должно произойти что-то ужасное. Я [Select_CString(ROOT.Char.IsFemale, 'потрясена', 'потрясён' )], когда [council_leader.GetTitledFirstName] с высокомерной улыбкой на лице заявляет, что вопрос, который будет обсуждаться сегодня, - это #italic мой#! судебный процесс по обвинению в убийстве Силара. Как [Select_CString(council_leader.IsFemale, 'эта некомпетентная дура могла', 'этот некомпетентный болван мог' )] #italic это#! обнаружить? Убийства были идеальными! Конечно, мой мотив был бы ясен, но моя позиция должна защищать меня от подобных необоснованных обвинений. Благодаря тому, что может быть делом рук только какого-нибудь предателя из немногочисленных рядов моих агентов, [council_leader.GetTitledFirstName] [Select_CString(council_leader.IsFemale, 'собрала', 'собрал' )] достаточно улик, чтобы возбудить против меня серьёзное дело.\n\nНекоторые члены совета притворяются шокированными, другие смотрят на меня с презрением. Очевидно, что справедливого суда надо мной не будет, хотя при таких обстоятельствах даже это могло бы меня не спасти. Единогласно я [Select_CString(ROOT.Char.IsFemale, 'признана виновной', 'признан виновным' )] в убийстве, цареубийстве и государственной измене городу. Когда стражник подходит, чтобы отвести меня в подземелье, [council_leader.GetTitledFirstName] останавливает их. «Я [Select_CString(council_leader.IsFemale, 'сама', 'сам' )] #italic позабочусь#! о [Select_CString(ROOT.Char.IsFemale, 'ней', 'нём' )]», - говорит [Select_CString(council_leader.IsFemale, 'она', 'он' )] им, прежде чем повернуться ко мне: «Тебе протянули руку помощи, Зантака, никогда не забывай об этом. Ты дорого заплатишь за свою гордыню...»"
 zantaka_event_chain.0103.a: "Мы все подохнете, #italic свиньи#!!"

 zantaka_event_chain.0104.t: "Новый порядок"
 zantaka_event_chain.0104.desc: "Наконец-то моя власть над городом [GetTitleByKey('c_pelorna').GetNameNoTier] укреплена. Те, кто когда-то считали меня [Select_CString(ROOT.Char.IsFemale, 'высокомерной', 'высокомерным' )] выскочкой, теперь вынуждены признать во мне лидера, [Select_CString(ROOT.Char.IsFemale, 'которой я была рождена', 'которым я был рождён' )]. По всей державе [GetTitleByKey('k_lyneria').GetNameNoTier], моё имя известно и произносится со страхом среди сильных мира сего.\n\nМоя борьба была тяжёлой, моя победа была вырвана из холодных, мёртвых рук жестокого порядка, который был до меня. Мои мечты, которые когда-то были не более чем фантазиями бедной девочки-сироты, наконец-то могут осуществиться. Жестокие хозяева этого мира наконец познают справедливость и #italic ужас!#!"
 zantaka_event_chain.0104.a: "#italic Таков гнев Виналима#!"
 zantaka_reforms_begin: "Укрепив свою власть над городом [GetTitleByKey('c_pelorna').GetNameNoTier], вы можете свободно начать проводить реформы в своих землях и стремиться к расширению своей власти во всей державе [GetTitleByKey('k_lyneria').GetNameNoTier]."

 zantaka_event_chain.0105.t: "Сделка с [Select_CString(council_leader.IsFemale, 'делательницей', 'делателем' )] королей"
 zantaka_event_chain.0105.desc: "После очередной утомительной встречи с городским советом я с удивлением вижу, что ко мне подходит [council_leader.GetTitledFirstName], мой главный соперник среди олигархов. Прежде чем я успеваю его о чем-либо спросить, он хватает меня за руку и начинает говорить. «Зантака», - говорит он, не называя меня по титулу, - «Позволь мне говорить прямо. Твоя позиция неприемлема. Твоё падение зависит не от #italic «если»#!, а от #italic «когда»#!. Но, может, мы сможем прийти к соглашению, которое #italic порадует#! нас обоих. Моя жена недавно скончалась, как ты знаешь, и это принесло бы мне большое удовольствие обладать женщиной с твоими... #italic навыками#! на моей стороне... и в моей постели, конечно».\n\nЯ почти отвергаю это оскорбительное предложение, как только слышу его, но в последний момент воздерживаюсь. Править в совете в одиночку, когда со всех сторон одни враги, наверняка будет непросто даже для такой опытной женщины, как я. И всё же, действительно ли этот союз стоит того, чтобы продать своё тело и душу другому? Пока я колеблюсь, [council_leader.GetTitledFirstName] наклоняется ко мне, его глаза полны желания, которое я вижу у слишком многих. «Если моё предложение тебя заинтересует, встретимся в моих покоях сегодня вечером. Я верю, что ты оправдаешь свою #italic репутацию#!...»"
 zantaka_event_chain.0105.a: "Я больше не возлягу со #italic свиньями#!!"
 zantaka_event_chain.0105.b: "Я [Select_CString(ROOT.Char.IsFemale, 'пережила', 'пережил' )] гораздо худшее, чтобы попасть сюда..."
 zantaka_marriage_no: "Вы отказываетесь от предложения персонажа [council_leader.GetTitledFirstName], надеясь самостоятельно укрепить свою власть и воплотить своё видение города [GetTitleByKey('c_pelorna').GetNameNoTier], свободного от каких-либо связей со старым порядком."
 zantaka_marriage_yes: "Вы уступаете персонажу [council_leader.GetTitledFirstName], становясь его женой и отказываетесь от своей новообретённой свободы, чтобы любой ценой удержать власть."

 zantaka_event_chain.0106.t: "Путь королев"
 zantaka_event_chain.0106.desc: "Впервые я могу свободно смотреть в будущее, без страха и тревог, которые так долго преследовали меня. Даже просто в пределах #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!, я правлю одним из беднейших городов, окружённым с обеих сторон великими державами лиги. Если я не буду осторожна, то всё равно могу пасть после стольких трудов.\n\nХотя у меня есть большие мечты о проведении реформ в этих землях, я всё же должна учитывать холодную политическую реальность. Как незамужняя женщина, первым шагом на пути к обретению большей власти для меня обычно было бы найти себе слабого и легко управляемого мужа. Если бы я пошла по этому пути, лучшим выбором, несомненно, был бы [emelkyn_son.GetTitledFirstName], сын [Select_CString(emelkyn_ruler.IsFemale, 'правительницы', 'правителя' )] #ONCLICK:TITLE,c_emelcyn #TOOLTIP:LANDED_TITLE,c_emelcyn #L Эмелькина#!#!#!, [Select_CString(emelkyn_ruler.IsFemale, 'которой', 'которым' )] является [emelkyn_ruler.GetTitledFirstName]. Тем не менее, у меня нет желания выходить замуж и снова попадать под власть мужчины, пусть даже только номинально, и такие прагматичные политические игры, несомненно, потребовали бы от меня отказаться от моей мечты о реформах."
 zantaka_event_chain.0106.a: "Я одолею их всех..."
 zantaka_revolt_route_tooltip: "Вы остаётесь верны своим революционным мечтам, стремясь доказать всему миру, что было неправильно когда-либо сомневаться в вашем умении и праве править."
 zantaka_event_chain.0106.b: "Я попала сюда не потому, что бунтовала против всего мира..."
 zantaka_marriage_route_tooltip: "Вы будете стремиться к браку и политической власти в #ONCLICK:TITLE,c_emelcyn #TOOLTIP:LANDED_TITLE,c_emelcyn #L Эмелькине#!#!#!, отказавшись от своих мечтаний о грандиозных реформах в пользу личной власти."
 zantaka_league_loses_opinion: "Все члены Линерийской лиги снизят своё [Concept('opinion', 'мнение')|E] о вас на #N 80#!."

 zantaka_event_chain.0107.t: "Решение совета"
 zantaka_event_chain.0107.desc: "Когда я прибываю в [GetTitleByKey('c_emelcyn').GetNameNoTier], [emelkyn_ruler.GetTitledFirstName] довольно холодно принимает меня. После выполнения обычных формальностей мне разрешается въехать в город и официально представиться перед его советом в качестве кандидатки на брак, который заключим я и [emelkyn_son.GetTitledFirstName], один из самых выдающихся его членов.\n\nУчитывая, что моя репутация всё ещё сильно страдает из-за моего происхождения, потребуется много усилий, споров и убеждения, чтобы склонить совет на мою сторону, если это вообще произойдёт. Пока что, [emelkyn_ruler.GetTitledFirstName] имеет большое влияние на своих коллег-олигархов в силу своего положения. Возможно, всё, что потребуется для заключения брака, - это завоевать [Select_CString(emelkyn_ruler.IsFemale, 'её', 'его' )] расположение. Однако для меня открыт и третий путь. [emelkyn_son.GetTitledFirstName] - похотливый мужчина, сгорающий от желания. Если бы я смогла найти подходящую возможность, то, возможно, смогла бы убедить его взять меня в жены, невзирая на пожелания совета. Хотя я и не хочу идти по этому пути, рано или поздно мне #italic придётся#! переспать с ним..."
 zantaka_event_chain.0107.a: "[emelkyn_son.GetTitledFirstName] не устоит перед моими чарами..."
 zantaka_event_chain.0107.success.seduction: "#P Вы нашли возможность попытаться соблазнить персонажа [emelkyn_son.GetTitledFirstName].#!"
 zantaka_event_chain.0107.failure: "#N Ваша попытка заключить брак с персонажем [emelkyn_son.GetTitledFirstName] закончилась неудачей#!"
 zantaka_event_chain.0107.b: "При достаточном усердии [emelkyn_ruler.GetTitledFirstName] наверняка проникнется ко мне симпатией."
 zantaka_event_chain.0107.success: "#P Вам удалось обговорить свой брак с персонажем [emelkyn_son.GetTitledFirstName]#!"
 zantaka_event_chain.0107.c: "Совет прислушается к моим словам."
 zantaka_personal_seduction: "Вы попытаетесь найти способ соблазнить персонажа [emelkyn_son.GetTitledFirstName], заставив его объявить вас своей супругой, несмотря на пожелания остальной части его державы."
 zantaka_befriend_ruler: "Вы попытаетесь убедить персонажа [emelkyn_ruler.GetTitledFirstName] поддержать ваш брак с персонажем [emelkyn_son.GetTitledFirstName]."
 zantaka_convince_council: "Вы попытаетесь убедить совет разрешить ваш брак с персонажем [emelkyn_son.GetTitledFirstName] исходя из ваших собственных соображений."

 zantaka_event_chain.0108.t: "Королева сердец"
 zantaka_event_chain.0108.desc: "После того, как я прибыла в [GetTitleByKey('c_emelcyn').GetNameNoTier], я начала искать и использовать любую возможность, чтобы [emelkyn_son.GetTitledFirstName] поддался моим чарам. Поначалу я только разговариваю с ним, но довольно быстро начинаю продвигаться дальше. Простые улыбки и ласки превращаются в украденный поцелуй, когда совет не замечает нас. Когда после долгого дня соблазнения и споров наступает ночь, мой следующий шаг ясен. С помощью подкупленного слуги я пробираюсь тайными тропами, скрытыми по всему дворцу, до самых покоев моей цели, надев свою самую соблазнительную ночную рубашку. Вполне естественно, что я разыгрываю свою лучшую карту.\n\n[emelkyn_son.GetTitledFirstName] шокирован, увидев меня, но явно #italic очень#! рад. «Мой дорогой, я желаю тебя больше, чем ты можешь себе представить», - тихо говорю я ему. «Я никогда не видела такого неотразимого мужчину, как ты, [emelkyn_son.GetTitledFirstName]. Совет, холодный и слепой к любви, хотел бы, чтобы мы расстались, но я знаю, что сама Виналим привела меня в твои объятия. Я вижу это по твоим глазам: ты тоже желаешь меня, не так ли? Я принадлежу тебе. Нет такого желания или удовольствия, в котором я могла бы отказать тебе». Я наклоняюсь к нему и целую с притворной, но большой страстью. «Займись со мной любовью сегодня вечером, сделай меня своей женой завтра, и каждую последующую ночь я буду принадлежать тебе». Что последует дальше, я знаю очень хорошо. Скоро я увижу, есть ли у меня марионетка..."
 zantaka_event_chain.0108.a: "Такова цена власти..."
 zantaka_event_chain.0108.success_crit: "#P [emelkyn_son.GetTitledFirstName] совершенно очарован вами и становится безвольным мужем, которого вы искали#!"
 zantaka_event_chain.0108.success: "#N [emelkyn_son.GetTitledFirstName] соглашается жениться на вас после вашей #italic демонстрации#!, но проявляет своеволие#!"

 zantaka_event_chain.0109.t: "Игра кукловода"
 zantaka_event_chain.0109.seduce: "После довольно долгой ночи, после которой [emelkyn_son.GetTitledFirstName] явно вымотан, начинается второй день совета. Когда начинаются обсуждения с советом, я заявляю, что [emelkyn_son.GetTitledFirstName] вчера вечером официально взял меня в жены, объяснив это тем, что в противном случае было бы #italic скандальным#! поведением. После моего более чем впечатляющего выступления, [emelkyn_son.GetTitledFirstName] подтверждает мои слова. Совет #ONCLICK:TITLE,c_emelcyn #TOOLTIP:LANDED_TITLE,c_emelcyn #L Эмелькина#!#!#!, не в состоянии найти никакого возражения против слов моего нового мужа, неохотно соглашается признать наш брак. Несмотря на то, что это победа, я чувствую себя опустошённой. У меня есть муж, у него хорошие связи, он глуп, им легко управлять, и он находится в идеальном положении, чтобы способствовать моему возвышению, но за это приходится платить. Днём я буду могущественна, но ночью мне снова придётся стать рабыней чужого удовольствия..."
 zantaka_event_chain.0109.other: "Хотя поначалу [emelkyn_ruler.GetTitledFirstName] и совет решительно выступали против того, чтобы [emelkyn_son.GetTitledFirstName] стал моим мужем, это отношение, похоже, наконец изменилось. Возможно, впервые мне удалось убедить вышестоящих в том, что я значу больше, чем моя мать или моё происхождение.\n\nЕсли [emelkyn_son.GetTitledFirstName] действительно хочет стать лояльным агентом, у меня не будет другого выбора, кроме как подчиниться его воле, по крайней мере частично, чтобы он стал полагаться на меня. Даже сейчас, когда я становлюсь самой могущественной женщиной, которую когда-либо видела [GetTitleByKey('k_lyneria').GetNameNoTier], у амбиций всегда есть цена, и для меня она всегда была одинаковой..."
 zantaka_event_chain.0109.a: "Власть #italic всегда#! стоит жертв!"

 zantaka_event_chain.0110.t: "Оборванная паутина"
 zantaka_event_chain.0110.desc: "Несмотря на все мои усилия, [emelkyn_ruler.GetTitledFirstName] и совет исключили любую возможность согласия на то, чтобы [emelkyn_son.GetTitledFirstName] стал моим мужем.\n\nКогда я покидаю [GetTitleByKey('c_emelcyn').GetNameNoTier], меня охватывает горечь поражения. Возможно, мне следовало быть смелее в своих действиях, менее сдержанной, охотнее лгать и подчиняться, чтобы угодить. Это унижение, конечно, не скоро забудется, но какая-то часть меня освободилась. Я снова вспоминаю о своих давних мечтах, о реформах, которые я давно мечтала провести для своего народа. Вполне возможно, что впереди меня все еще ждет путь к власти, даже если он будет трудным и долгим..."
 zantaka_revolution_take_2: "Вы снова пойдёте по пути революции и реформ, стремясь прийти к власти в #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#! вопреки всем, кто причинил вам зло."
 zantaka_event_chain.0110.a: "Возможно, это знак..."
 zantaka_event_chain.0110.b: "Я наверняка смогу найти другого."

 zantaka_event_chain.0111.t: "Лига внутри лиги"
 zantaka_event_chain.0111.desc: "Наконец-то я обрела истинную власть. [GetTitleByKey('c_emelcyn').GetNameNoTier], гордый и #italic могущественный#!, теперь находится под моей властью. Я считала себя богатой, когда впервые пришла к власти в маленьком городке [GetTitleByKey('c_pelorna').GetNameNoTier]. Теперь я знаю, что богатство - это гораздо больше, чем я думала. Моя жизнь настолько приятна, что мой муж [emelkyn_vassal.GetTitledFirstName] почти не занимает мои мысли.\n\nНо даже сейчас я не удовлетворена. После стольких страданий, чтобы попасть сюда, разве я не заслужила всего этого? Когда я смотрю на карту своих владений, меня не может не раздражать сохраняющийся суверенитет маленького города-государства [GetTitleByKey('c_murnak').GetNameNoTier]. Его расположение сделало его ценным для объединения моих новых владений в единое государство. Если бы вся [GetTitleByKey('d_sylara').GetNameNoTier] находилась под моей властью, за ней последует вся [GetTitleByKey('k_lyneria').GetNameNoTier]."
 zantaka_event_chain.0111.a: "Я получу #italic всё!#!"
 zantaka_event_chain.0111.b: "Этого... этого достаточно."
 zantaka_sieze_murnak: "Вы попытаетесь включить [GetTitleByKey('c_murnak').GetNameNoTier] в состав свои растущих владений, рискуя навлечь на себя гнев всей лиги."
 zantaka_no_murnak: "Вы довольствуетесь своим и без того впечатляющим возвышением, наслаждаясь плодами своего восхождения."
 zantaka_league_opinion_loss: "Все члены Линерийской лиги снижают своё [Concept('opinion', 'мнение')|E] о вас на #N 50#!."

 zantaka_event_chain.0112.t: "Игры власти"
 zantaka_event_chain.0112.desc: "Трудно поверить, что последнее препятствие на пути к осуществлению моей мечты о непревзойдённой власти - это покорение такого незначительного города, как #italic [GetTitleByKey('c_murnak').GetNameNoTier]#!. Тем не менее, этот город, вероятно, станет последней каплей в глазах Лиги, её лидеры уже недовольны моим возвышением. Мои амбиции здесь не будут подавлены: и не будут до тех пор, пока вся [GetTitleByKey('k_lyneria').GetNameNoTier] не станет моей.\n\nОднако мне понадобится план, чтобы подчинить [GetTitleByKey('c_murnak').GetNameNoTier]. Благодаря моему новообретённому богатству было бы довольно легко подкупить городской совет, чтобы он подписал соглашение о подчинении, но такая попытка, скорее всего, окажется довольно дорогостоящей, даже для такого богатого человека, как я. Получив флот #ONCLICK:TITLE,c_emelcyn #TOOLTIP:LANDED_TITLE,c_emelcyn #L Эмелькина#!#!#!, я могла бы попытаться усилить блокаду города, но такой акт доминирования наверняка вызовет гнев Лиги."
 zantaka_event_chain.0112.a: "#italic Увесистый#! кошель должен сгладить ситуацию..."
 zantaka_murnak_bribe: "Вы подкупите совет города [GetTitleByKey('c_murnak').GetNameNoTier], чтобы добиться его покорности."
 zantaka_event_chain.0112.b: "Мой флот наверняка напугает их и заставит подчиниться..."
 zantaka_murnak_blockade: "Вы попытаетесь установить блокаду порта города [GetTitleByKey('c_murnak').GetNameNoTier], чтобы добиться его покорности."
 zantaka_event_chain.0112.success: "#P Вы успешно подчинили [GetTitleByKey('c_murnak').GetNameNoTier]#!"
 zantaka_event_chain.0112.failure: "#N Вы не сумели подчинить [GetTitleByKey('c_murnak').GetNameNoTier]#!"

 zantaka_event_chain.0113.t: "Бесконечная воля"
 zantaka_event_chain.0113.desc: "Как и ожидалось, мои попытки подчинить [GetTitleByKey('c_murnak').GetNameNoTier] увенчались большим успехом. [murnak_ruler.GetTitledFirstName] [Select_CString(murnak_ruler.IsFemale, 'поняла', 'понял' )] тщетность сопротивления моему неизбежному возвышению и [Select_CString(murnak_ruler.IsFemale, 'приняла', 'принял' )] мои условия подчинения.\n\nВ то время как лига негодует и высказывает множество жалоб, #italic добровольное#! подчинение города [GetTitleByKey('c_murnak').GetNameNoTier] лишает их возможности действовать против меня. Я уверена, что примерно через десять лет эта вражда пройдет, Лига будет слишком разделена, чтобы по-настоящему противостоять моей власти. К тому времени мое влияние, несомненно, возрастет настолько, что я, наконец, добьюсь объединения Лиги под руководством одной абсолютной правительницы - себя, конечно. Все, что мне теперь остается делать, - это ждать, пока моя репутация восстановится."
 zantaka_event_chain.0113.a: "Теперь нет никого, кто мог бы противостоять мне!"

 zantaka_event_chain.0114.t: "Лига выстояла"
 zantaka_event_chain.0114.desc: "Возможно, лучше понимая природу своего положения, чем я думала, [GetTitleByKey('c_murnak').GetNameNoTier] отказался и осудил мою попытку подчинить его своей власти. Вечно гордые олигархи Лиги официально объявили мои действия объявлением войны и потребовали выплаты крупных репараций в качестве компенсации за мои преступные действия.\n\nХотя я хотела, чтобы мне позволили завершить моё восхождение в условиях мира, мне ясно, что этого придется добиваться путем войны. Конечно, я, которая смогла спланировать падение древних родов, превратить людей в марионеток и управляла своими владениями лучше, чем любой глава совета до меня, могу выиграть войну против этих жирных и бесполезных олигархов..."
 zantaka_event_chain.0114.a: "Я. Не. Потерплю. НЕУДАЧУ!"

 zantaka_event_chain.0201.t: "Зеркало жалости"
 zantaka_event_chain.0201.desc: "Когда я провожу инспекцию городского порта, мои стражники предупреждают меня о том, что часть собранных налогов и пошлин была украдена. Они рассказали мне, что какая-то девушка заговорила с ними, сначала, по-видимому, чтобы соблазнить их, но только для того, чтобы они потеряли бдительность, в то время как сообщник скрылся с украденным золотом. Это преступление в некотором смысле напоминает мне дни моей юности. Очевидно, что тот, кто разработал этот план, знал, что делает. Такие навыки всегда могут пригодиться...\n\nКогда мои стражники неизбежно ловят девушку, мне говорят, что она была главарем этих воров. Заинтересовавшись, я решаю попробовать поговорить с ней. «Как тебя зовут, девица?», - спрашиваю я её. Она колеблется, прежде чем ответить. «Не знаю, почему вас это волнует, госпожа, но я [daughter.GetTitledFirstName]. У меня нет ничего, что могло бы заинтересовать такую богатую женщину, как вы, если только мужчины не в вашем вкусе...» «Мне всегда нужно больше агентов и толковых слуг», - отвечаю я ей. «Если ты достаточно смела и искусна, чтобы обокрасть главу совета, возможно, ты согласишься пойти дальше за приемлемую цену...» Девушка, кажется, заинтересована. Возможно, я только что нашла себе нового агента..."
 zantaka_event_chain.0201.a: "Посмотрим, чего она стоит..."
 zantaka_adopts_girl: "Вы сделаете персонажа [daughter.GetTitledFirstName] своим агентом, проверив её на прочность."
 zantaka_event_chain.0201.b: "У меня есть дела поважнее..."
 zantaka_no_adoption: "Вы отказываетесь от мысли, чтобы [daughter.GetTitledFirstName] стала вашим агентом."

 zantaka_event_chain.0202.t: "Найденная родня"
 zantaka_event_chain.0202.desc: "За последние несколько месяцев [daughter.GetTitledFirstName] стала для меня чем-то большим, чем агент, я стала относиться к ней как к близкому другу. Прошло много долгих лет с тех пор, как у меня был кто-то, с кем я могла бы свободно поговорить, кто мог бы по-настоящему понять меня и мою жизнь. В ней я нашла подругу, возможно, самую близкую подругу, которая у меня когда-либо была.\n\nИ всё же, какая-то часть меня чувствует более глубокую связь с ней. По своему выбору, я никогда не была матерью, всегда искала любой способ помешать мужчинам, которые использовали меня, навязать мне муки материнства. Когда [daughter.GetTitledFirstName] попадается мне на глаза, какая-то часть меня испытывает к ней первобытную материнскую любовь.\n\nУ меня нет наследника, и я не хочу, чтобы муж поступал со мной по-своему. Возможно, я могла бы признать наши узы, удочерив её как свою собственную дочь. Да, это дало бы мне наследника без необходимости в муже, но даже помимо этого я просто чувствую, что так будет правильно."
 zantaka_event_chain.0202.a: "Неужели именно так ощущается #italic счастье#!?"
 zantaka_event_chain.0202.b: "Даже сейчас было бы разумнее найти #italic подобающего#! наследника..."

 zantaka_event_chain.0203.t: "Разбитые сокровища"
 zantaka_event_chain.0203.desc: "С принятием моего нового закона монополии, которые долгое время досаждали подданным #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!, были объявлены вне закона на моих землях. Как бы ни ворчали олигархи, у них нет иного выбора, кроме как подчиниться. Я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что многие из них попытаются найти ту или иную лазейку, чтобы сохранить свою несправедливую власть, но со временем эта борьба только укрепит мои реформы.\n\nПростые люди теперь впервые получили доступ к возможностям, которые всегда были для них недоступны. Им больше не нужно работать в поте лица ради выгоды какой-нибудь жадной гильдии или купца: теперь все вольны работать ради собственной выгоды и продвижения по службе. Я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что скоро на смену прогнившим политиканам из совета придёт новое поколение квалифицированных, но долгое время не замечаемых людей, хотя пока я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] довольствоваться этой ужасной старой гвардией."
 zantaka_event_chain.0203.a: "Я наслаждаюсь яростью этих глупцов..."

 zantaka_event_chain.0204.t: "Перо или меч"
 zantaka_event_chain.0204.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'собрала', 'собрал' )] значительные ресурсы, необходимые для начала моей новой политики, направленной на процветание давно угнетённых масс моей державы, и теперь пришло время решить, #italic как#! именно распределить эти ресурсы.\n\nОдним из вариантов было бы вложить значительные средства в образование и экономическое развитие, стремясь просвещать население и увеличивать его благосостояние за счет уделения большего внимания совершенствованию ремесел.\n\nДругим вариантом было бы использовать эти средства для моего флота и торговли. Такое начинание, несомненно, увеличило бы богатство моих земель и увеличило бы мою власть и влияние. Увеличение военно-морской мощи, несомненно, укрепило бы и моё военное положение, ещё больше укрепив мою позицию."
 zantaka_event_chain.0204.a: "Мои земли станут богаче, чем когда-либо!"
 zantaka_event_chain.0204.b: "Пусть другие трудятся, пока мы пожинаем плоды."
 zantaka_peasant_education: "Вы направите свои ресурсы на местное развитие."
 zantaka_peasant_navy: "Вы сосредоточите свои усилия на развитии торговли."
 zantaka_event_chain.0204.success: "#P Ваши вложения успешны#!"
 zantaka_event_chain.0204.failure: "#N Ваши вложения безуспешны#!"

 zantaka_event_chain.0205.t: "Время жатвы"
 zantaka_event_chain.0205.success: "Хотя поначалу это и было трудно, мои вложения в мой народ и державу увенчались большим успехом. Мои подданные больше не будут трудиться ради ничтожной выгоды, лишь обогащая своих бессердечных повелителей! Вместо того, чтобы страдать, они накапливают новообретённое богатство.\n\nПо мере того, как мой народ становится богаче, богатею и я. Моё влияние на всю #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерию#!#!#! с каждым днём растёт, поскольку старый порядок вынужден признать мою долгую череду успехов.\n\nМои позиции сильны, как никогда, но даже сейчас ещё многое предстоит сделать. Возможно, скоро я по-настоящему избавлюсь от олигархов, чья гегемония сейчас действительно начинает разваливаться..."
 zantaka_event_chain.0205.fail: "Несмотря на все мои усилия, мои грандиозные планы по улучшению положения угнетённых на моих землях потерпели полный провал.\n\nСнова и снова олигархам удавалось присваивать или растрачивать мои средства, пока их не осталось так мало, что они стали бесполезными. Теперь, когда моя казна растрачена впустую, я сомневаюсь, что когда-нибудь смогу снова провести столь масштабную реформу.\n\nПохоже, я [Select_CString(ROOT.Char.IsFemale, 'обречена', 'обречён' )] оставаться второстепенным игроком в #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!, по крайней мере, на данный момент..."
 zantaka_event_chain.0205.a: "Эти жирные свиньи скоро почувствуют голод..."
 zantaka_event_chain.0205.b: "Как они могли украсть #italic столько#! золота?!"

 zantaka_event_chain.0206.t: "Право королевы"
 zantaka_event_chain.0206.desc: "Наконец-то были разрушены вековые традиции, которые не допускали женщин к власти в линерийском обществе. Благодаря моим огромным усилиям в качестве первого лидера по-настоящему объединённой #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!, мои подданные наконец-то согласились прекратить своё бессмысленное игнорирование стольких людей.\n\nТем не менее, один вопрос всё ещё остаётся без ответа. У старого порядка уже давно вошло в привычку брать наложниц не более чем в рабыни, и я слишком хорошо [Select_CString(ROOT.Char.IsFemale, 'знакома', 'знаком' )] с этим обычаем. Теперь, когда старый порядок окончательно рухнул, я могу, наконец, положить конец этой отвратительной практике. Если бы это действительно зависело только от меня, я бы [Select_CString(ROOT.Char.IsFemale, 'продвинула', 'продвинул' )] свои реформы ещё дальше, в последний раз, и [Select_CString(ROOT.Char.IsFemale, 'положила', 'положил' )] конец этому чёрному пятну на справедливой и процветающей в остальном земле. Однако такой шаг может навлечь на меня гнев некоторых моих подданных, даже тех, кого я [Select_CString(ROOT.Char.IsFemale, 'сама привела', 'сам привёл' )] к власти. Было бы почти глупо останавливаться на достигнутом, но, возможно, я [Select_CString(ROOT.Char.IsFemale, 'зашла', 'зашёл' )] достаточно далеко..."
 zantaka_event_chain.0206.a: "Так будут разорваны последние оковы."
 zantaka_event_chain.0206.b: "Возможно, это зашло слишком далеко..."

 zantaka_event_chain.0207.t: "Новый порядок"
 zantaka_event_chain.0207.desc: "Олигархи, которые так долго противостояли мне, которые хотели подавить меня со дня моего рождения, наконец-то пали. Старый порядок, который правил #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерией#!#!#! на протяжении веков, был разрушен. Великие купеческие семьи, которые досаждали нашим городам как паразиты, наконец-то обессилели: их старые подданные свободны от своих цепей.\n\nНа месте старой Лиги теперь возвышается великая держава. Положение человека больше не будет зависеть от богатства! Только заслуги будут определять, кто придёт к власти при моём новом порядке.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что при мне или, возможно, при моих преемниках [GetTitleByKey('k_lyneria').GetNameNoTier] превратится в самостоятельную империю, перестав быть союзом мелких городов, подчиняющихся великим державам Залива. Когда-нибудь мы поставим на колени даже [GetTitleByKey('e_khy').GetNameNoTier]!"
 zantaka_event_chain.0207.a: "Моя слава растёт."

 zantaka_event_chain.0208.t: "Воинства среди теней"
 zantaka_event_chain.0208.desc: "Годы подготовки привели к этому моменту. По всей #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#! враги правящего порядка ожидают моего приказа, их служение моему делу гарантировано.\n\nТам, где когда-то была сотня мелких фракций, призывающих к переменам или реформам, теперь осталась только одна. По моему призыву тысячи готовы взяться за оружие во имя прекращения тирании олигархов.\n\nТем не менее, Лига остаётся сильной. Она, несомненно, будет бороться за наше дело как единое целое, как мы и будем бороться. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбрать подходящее время для удара, иначе я могу потерпеть поражение. Пройдут месяцы или годы, но мои люди будут готовы, когда настанет день. Скоро Лига падёт, и на её место поднимусь я!"
 zantaka_event_chain.0208.a: "Скоро всё будет готово..."
 zantaka_event_chain.0208.a.effects: "Теперь вы можете объявить войну Линерийской лиге, в которой вас поддержат ваши сторонники, рассеянные по #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!."

 zantaka_event_chain.0209.t: "Война отступников"
 zantaka_event_chain.0209.desc: "Время пришло. Согласно моему приказу, мои войска открыто собрались в городах Лиги. По всей #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#! мои люди начинают атаковать силы правящих советов. Довольно быстро олигархи потеряют контроль над ситуацией, когда верные мне банды начнут грабить и разорять линерийскую сельскую местность.\n\nТеперь пришло время мне открыто заявить о себе. Я объявляю по всем городам Лиги: я больше не буду мириться с ней и её отвратительными институтами! Вместо него я буду править как [Select_CString(ROOT.Char.IsFemale, 'абсолютная правительница', 'абсолютный правитель' )] и проведу реформы, в которых так отчаянно нуждается наш народ.\n\nПризыв к войне громко разносится по всей #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!, и сначала сотни, а вскоре и тысячи людей присоединяются, чтобы сражаться за моё дело. Скоро Лига падёт, и я займу её место."
 zantaka_event_chain.0209.a: "Всё это вело к сегодняшнему дню."
 zantaka_rebels: "Линерийские мятежники"
 zantaka_lyneria_cb: "Линерийская гражданская война"

 zantaka_event_chain.0210.t: "Война отступников"
 zantaka_event_chain.0210.desc: "В каком-то захолустном городишке [Select_CString(claimant.IsFemale, 'узурпаторша', 'узурпатор' )] [claimant.GetTitledFirstName] по глупости [Select_CString(claimant.IsFemale, 'объявила', 'объявил' )] себя [Select_CString(claimant.IsFemale, 'абсолютной правительницей', 'абсолютным правителем' )] всей #ONCLICK:TITLE,k_lyneria #TOOLTIP:LANDED_TITLE,k_lyneria #L Линерии#!#!#!. В то время как такое притязание обычно высмеивали, отвергали и рассматривали после нескольких месяцев давления, [claimant.GetTitledFirstName] [Select_CString(claimant.IsFemale, 'собрала', 'собрал' )] значительные силы под своим началом.\n\nХотя у этой толпы вряд ли хватит сил свергнуть наш многовековой порядок, она достаточно многочисленна, чтобы вызывать беспокойство. Если Лига не предпримет действий сейчас, она вполне может оказаться раздавленной этим кризисом..."
 zantaka_event_chain.0210.a: "Эти глупцы будут поставлены на место!"