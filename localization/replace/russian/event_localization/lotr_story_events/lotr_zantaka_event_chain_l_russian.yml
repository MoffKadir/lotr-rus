l_russian:

 zantaka_event_chain.0101.t: "Совет уступает"
 #zantaka_event_chain.0101.desc: "Хотя возвышенные и могущественные олигархи державы [GetTitleByKey('k_lyneria').GetNameNoTier] гордятся меритократией своих республик, мысль о том, что они изберут наложницу низкого происхождения на тот ранг, которого она заслуживает, смехотворна. В конце концов, было бы #italic неподобающе#!, если бы глава совета не был сыном одной из богатых и древних семей. В их глазах, такая, как я, должна молчать, выполнять их приказы и терпеть всё ради их удовольствия.\n\nОднако сегодня этот жестокий и бессердечный порядок рухнул. Силара, которые поколениями поддерживали порядок среди купцов, полностью уничтожены. В одночасье республика погрузилась в анархию, поскольку каждый олигарх мечтает взять на себя роль главы совета. Конечно, я готова к этому. За последние двенадцать лет я создала сеть шпионов, скрытых от посторонних глаз, и собрала список всех убийств, нарушенных клятв, растрат и незаконных сделок, совершенных олигархами, входящими в совет.\n\nКогда сегодня утром совет соберется, чтобы избрать своего нового главу, у меня будет возможность открыто осудить эти преступления. Если, конечно, я не получу голосов, которых заслуживаю..."
 zantaka_event_chain.0101.desc: "Хотя высокопоставленные и могущественные олигархи державы [GetTitleByKey('k_lyneria').GetNameNoTier] гордятся меритократией своих республик, на самом деле в их рядах нет места людям #italic низкого#! происхождения или нищим. Всю свою жизнь я [Select_CString(ROOT.Char.IsFemale, 'была вынуждена', 'был вынужден' )] преклоняться перед меньшими мужчинами и женщинами и выполнять все их приказы, даже когда их идиотизм был очевиден для меня. В их глазах моей единственной ролью было молчать, выглядеть мило и терпеть #italic всё#! ради их удовольствия.\n\nТем не менее, есть некоторое преимущество в том, чтобы быть никем для своих врагов. В течение последних двенадцати лет я [Select_CString(ROOT.Char.IsFemale, 'была вольна', 'был волен' )] действовать в высших сферах власти, и никто не замечал моих действий: всё это при условии, что я не [Select_CString(ROOT.Char.IsFemale, 'делала', 'делал' )] ничего, кроме удовлетворения желаний моего хозяина. Благодаря моим многолетним усилиям я [Select_CString(ROOT.Char.IsFemale, 'возглавила', 'возглавил' )] крупнейшую сеть шпионов и информаторов в городе [GetTitleByKey('c_pelorna').GetNameNoTier]. Так что очень немногие из членов совета свободны от грязи и позора, поскольку их привилегии ударили в их похотливые и высокомерные головы.\n\nТеперь, когда Силара мертвы, олигархи хранят молчание с помощью не слишком изощрённого шантажа, а несколько наёмников куплены за #italic позаимствованные#! городские сокровища, я [Select_CString(ROOT.Char.IsFemale, 'уверена', 'уверен' )], что на завтрашних выборах я получу власть, которую всегда [Select_CString(ROOT.Char.IsFemale, 'заслуживала', 'заслуживал' )]."
 zantaka_event_chain.0101.a: "Пусть только попробуют остановить меня сейчас!"

 zantaka_event_chain.0102.t: "Гордость граждан"
 #zantaka_event_chain.0102.desc: "Теперь, когда моё правление укрепилось, хотя и не пользуется любовью, можно было бы подумать, что это самое время отпраздновать. На самом деле, совет знает, что любая попытка сместить меня приведёт к его падению вместе со мной, поскольку их преступления станут известны, а их репутация резко упадёт. Со временем они научатся подчиняться моей воле, как и все слуги, но пока хватит тихой ненависти и слов протеста.\n\nОднако, к моему удивлению, не только великим олигархам, похоже, претит мысль о том, что сирота из таверны придёт к власти в их городе. Даже простые горожане начали насмехаться надо мной и сопротивляться моему правлению, несмотря на мои очевидные способности правительницы.\n\nМоё правление над провинцией [GetTitleByKey('c_pelorna').GetNameNoTier] кажется, с каждым днём становится всё менее надёжным, и каждый открытый акт неповиновения, похоже, влечёт за собой другой. Если я хочу выжить в ближайшие месяцы, годы или, возможно, просто недели, мне нужно будет усмирить этих недоброжелателей и напомнить им, что я не какая-то высокомерная наложница, а их законная хозяйка."
 zantaka_event_chain.0102.desc: "Несмотря на ожесточённое сопротивление, Совет в конечном счете согласился допустить мой приход к власти, официально мотивируя свой выбор моими тесными связями с #italic таинственно#! погибшими Силара. Конечно, мой обширный список проклятий, связанных с шантажом, поддержкой наёмников или, боги упасите, с моими #italic навыками [Select_CString(ROOT.Char.IsFemale, 'правительницы', 'правителя' )]#!, не имел к этому #italic никакого#! отношения. Хотя оппозиция моему правлению остаётся ожесточённой и с ней трудно справиться, у совета не осталось другого выбора, кроме как объявить меня своим главой.\n\nОднако, к моему удивлению, гнев по поводу моего возвышения распространяется не только на недовольных олигархов. Действительно, даже простые граждане громко и открыто выражают недовольство моим возвышением: оскорбляют моё низкое происхождение, заявляют, что я ни на что не гожусь, кроме как угождать мужчинам, или настаивают на том, чтобы я [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил' )] политику и [Select_CString(ROOT.Char.IsFemale, 'продавала', 'продавал' )] своё тело, как моя скромная мать. Помимо того, что эта тенденция #italic глубоко#! оскорбительна, она представляет собой серьёзную угрозу моей власти. Совет только делает вид, что слушает меня, опасаясь возмущения общественности в связи с раскрытием их секретов. Если бы меня считали не более чем [Select_CString(ROOT.Char.IsFemale, 'лживой узурпаторшей', 'лживым узурпатором' )], никакие доказательства не убедили бы массы в моих притязаниях, оставив открытой дверь для моего смещения. Если я хочу выжить в ближайшие годы или, возможно, просто месяцы, я #italic [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )]#! положить конец этому инакомыслию."
 zantaka_event_chain.0102.a: "Я не потерплю неудачу!"
 zantaka_strife_begins: "#N Если в течение следующих трёх лет вы не достигнете #italic ожидаемого#! уровня легитимности, уровня репутации #italic Доброе имя#! или #italic 100 ед. контроля#! во владении [GetTitleByKey('c_pelorna').GetNameNoTier], #italic вы будете отстранены от власти!#!#!"

 zantaka_event_chain.0103.t: "Воля народа"
 zantaka_event_chain.0103.desc: "Хотя за последние годы моего правления было проведено много городских советов, этот отличается от других. Я чувствую напряжение в воздухе, как будто сегодня должно произойти что-то ужасное. Я [Select_CString(ROOT.Char.IsFemale, 'потрясена', 'потрясён' )], когда [council_leader.GetTitledFirstName] с высокомерной улыбкой на лице заявляет, что вопрос, который будет обсуждаться сегодня, - это #italic мой#! судебный процесс по обвинению в убийстве Силара. Как [Select_CString(council_leader.IsFemale, 'эта некомпетентная дура могла', 'этот некомпетентный болван мог' )] #italic это#! обнаружить? Убийства были идеальными! Конечно, мой мотив был бы ясен, но моя позиция должна защищать меня от подобных необоснованных обвинений. Благодаря тому, что может быть делом рук только какого-нибудь предателя из немногочисленных рядов моих агентов, [council_leader.GetTitledFirstName] [Select_CString(council_leader.IsFemale, 'собрала', 'собрал' )] достаточно улик, чтобы возбудить против меня серьёзное дело.\n\nНекоторые члены совета притворяются шокированными, другие смотрят на меня с презрением. Очевидно, что справедливого суда надо мной не будет, хотя при таких обстоятельствах даже это могло бы меня не спасти. Единогласно я [Select_CString(ROOT.Char.IsFemale, 'признана виновной', 'признан виновным' )] в убийстве, цареубийстве и государственной измене городу. Когда стражник подходит, чтобы отвести меня в подземелье, [council_leader.GetTitledFirstName] останавливает их. «Я [Select_CString(council_leader.IsFemale, 'сама', 'сам' )] #italic позабочусь#! о [Select_CString(ROOT.Char.IsFemale, 'ней', 'нём' )]», - говорит [Select_CString(council_leader.IsFemale, 'она', 'он' )] им, прежде чем повернуться ко мне: «Я [Select_CString(council_leader.IsFemale, 'протянула', 'протянул' )] тебе руку помощи, Зантака, никогда не забывай об этом. То, чем ты не [Select_CString(ROOT.Char.IsFemale, 'захотела', 'захотел' )] поделиться со мной, я возьму на себя...»"
 zantaka_event_chain.0103.a: "Мы все подохнете, #italic свиньи#!!"

 zantaka_event_chain.0104.t: "Новый порядок"
 zantaka_event_chain.0104.desc: "Наконец-то моя власть над городом [GetTitleByKey('c_pelorna').GetNameNoTier] укреплена. У совета, столкнувшегося с моими несомненными способностями [Select_CString(ROOT.Char.IsFemale, 'правительниц', 'правителя' )] и растущим положением в обществе, теперь нет иного выбора, кроме как неохотно принять моё правление. Те, кто когда-то считали меня [Select_CString(ROOT.Char.IsFemale, 'высокомерной', 'высокомерным' )] выскочкой, [Select_CString(ROOT.Char.IsFemale, 'склонной', 'склонным' )] к подчинению, теперь вынуждены признать во мне лидера, [Select_CString(ROOT.Char.IsFemale, 'которой я была рождена', 'которым я был рождён' )]. По всей державе [GetTitleByKey('k_lyneria').GetNameNoTier], моё имя известно и произносится со страхом среди сильных мира сего, тех, кто мог бы так много потерять, если бы их собственные жертвы и слуги восстали, как я.\n\nКогда я смотрю на то, где я сейчас, даже я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] с трудом могу представить, как высоко я [Select_CString(ROOT.Char.IsFemale, 'поднялась', 'поднялся' )]. И всё же, очень немногие обладают моей удачей или мастерством. Шрамы моей юности остаются глубоко внутри меня, я, [Select_CString(ROOT.Char.IsFemale, 'которая была одной', 'который был одним' )] из немногих счастливчиков, достигших того, о чем часто [Select_CString(ROOT.Char.IsFemale, 'мечтала', 'мечтал' )], - «побега» со службы при дворе власти. Но даже это оказалось не более чем позолоченной тюрьмой, местом боли, мучений и унижения для удовольствия бессердечных хозяев. Моя борьба была тяжёлой, моя победа была вырвана из холодных, мёртвых рук жестокого порядка, который был до меня. Мои мечты, которые когда-то были не более чем фантазиями бедной девочки-сироты, наконец-то могут осуществиться. Жестокие хозяева этого мира наконец познают справедливость и #italic ужас!#!"
 zantaka_event_chain.0104.a: "#italic Таков гнев Виналима#!"
 zantaka_reforms_begin: "Укрепив свою власть над городом [GetTitleByKey('c_pelorna').GetNameNoTier], вы можете свободно начать проводить реформы в своих землях и стремиться к расширению своей власти во всей державе [GetTitleByKey('k_lyneria').GetNameNoTier]."

 zantaka_event_chain.0105.t: "Сделка с [Select_CString(council_leader.IsFemale, 'делательницей', 'делателем' )] королей"
 zantaka_event_chain.0105.desc: "После очередной утомительной встречи с городским советом я с удивлением вижу, что ко мне подходит [council_leader.GetTitledFirstName], мой главный соперник среди олигархов. Прежде чем я успеваю его о чем-либо спросить, он хватает меня за руку и начинает говорить. «Зантака», - говорит он, не называя меня по титулу, - «Позволь мне говорить прямо. Твоя позиция неприемлема. Твоё падение зависит не от #italic «если»#!, а от #italic «когда»#!. Но, может, мы сможем прийти к соглашению, которое #italic порадует#! нас обоих. Моя жена недавно скончалась, как ты знаешь, и это принесло бы мне большое удовольствие обладать женщиной с твоими... #italic навыками#! на моей стороне... и в моей постели, конечно».\n\nЯ почти отвергаю это оскорбительное предложение, как только слышу его, но в последний момент воздерживаюсь. Править в совете в одиночку, когда со всех сторон одни враги, наверняка будет непросто даже для такой опытной женщины, как я. И всё же, действительно ли этот союз стоит того, чтобы продать своё тело и душу другому? Пока я колеблюсь, [council_leader.GetTitledFirstName] наклоняется ко мне, его глаза полны желания, которое я вижу у слишком многих. «Если моё предложение тебя заинтересует, встретимся в моих покоях сегодня вечером. Я верю, что ты оправдаешь свою #italic репутацию#!...»"
 zantaka_event_chain.0105.a: "Я больше не возлягу со #italic свиньями#!!"
 zantaka_event_chain.0105.b: "Я [Select_CString(ROOT.Char.IsFemale, 'пережила', 'пережил' )] гораздо худшее, чтобы попасть сюда..."
 zantaka_marriage_no: "Вы отказываетесь от предложения персонажа [council_leader.GetTitledFirstName], надеясь самостоятельно укрепить свою власть и воплотить своё видение города [GetTitleByKey('c_pelorna').GetNameNoTier], свободного от каких-либо связей со старым порядком."
 zantaka_marriage_yes: "Вы уступаете персонажу [council_leader.GetTitledFirstName], становясь его женой и отказываетесь от своей новообретённой свободы, чтобы любой ценой удержать власть."