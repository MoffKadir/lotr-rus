 #Events after getting both Dwarven Rings

 skorgrim_dourhand.1000.t: "Судьба Колец"
 skorgrim_dourhand.1000.desc: "После успешного обретения [Concept('sevenringsofdwarves', 'Кольца Огнебородов')|E] и [Concept('sevenringsofdwarves', 'Кольца Широкозадов')|E] начинается следующий этап плана.\n\nСогласно первоначальному соглашению с [Concept('witchkingshort', 'Королём-чародеем')|E] он обещал мне невообразимые богатства и бессмертие в обмен на эти кольца, но простая передача их в обмен на обещания может не способствовать достижению нашей цели восстановления [Concept('nogrod', 'Ногрода')|E]. Возможно, Король-чародей вознаградит нас чем-нибудь... или, возможно, нет. Однако, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы оставить оба кольца себе и, используя их магию, восстановить Ногрод самостоятельно, по крайней мере теоретически, это хороший вариант. К сожалению, сохранение колец вызовет гнев Короля-чародея, и открытая война против него может привести к нашему уничтожению...\n\nВ любом случае, оба варианта сопряжены с определһнными рисками, но что мы можем сделать на данный момент? Наши родичи, и даже мой [GetTrait('dwarf_father').GetName( GetNullCharacter )|l] [dwalin_V.GetFirstNameRegnal] предан мной, и теперь [Concept('dwarves', 'гномы')|E] ненавидят меня за мои действия... После всего, что произошло, действительно ли оно того стоило? Только время покажет."
 skorgrim_dourhand.1000.a: "[Concept('witchkingshort', 'Король-чародей')|E] получит своё. Подготовиться к путешествию в Ангмар."
 skorgrim_dourhand.1000.b: "Почему мне нужно с ними расставаться? [Concept('witchkingshort', 'Королю-чародею')|E] нечего предложить из того, чего у меня уже нет."
 skorgrim_dourhand_travel_angmar: "#V Вы#!, #V [skorgrim_dourhand.GetName]#!, отправитесь в [GetTitleByKey('c_carn_dum').GetNameNoTier] и встретитесь с [Concept('witchkingshort', 'Королём-чародеем')|E] Ангмара."
 skorgrim_dourhand_keep_rings: "@warning_icon!#T #V Вы#!, #V [skorgrim_dourhand.GetName]#!, решаете оставить гномьи Кольца себе. Этот путь разгневает [Concept('witchkingshort', 'Короля-чародеем')|E] Ангмара и может привести к катастрофическим последствиям!"

 skorgrim_dourhand.1001.t: "Тёмный трон Карн-Дума"
 skorgrim_dourhand.1001.desc: "Я, наконец, [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] в [GetTitleByKey('c_carn_dum').GetNameNoTier], сердце [Concept('angmar', 'Ангмара')|E], и передо мной возвышается тёмная крепость. Когда я вхожу, большие двери быстро закрываются, и слуга проводит меня в тронный зал.\n\nТам восседает [Concept('witchkingshort', 'Король-чародей')|E], повелитель [Concept('income', 'nazgul')|E], с холодным взглядом. Он сидит в доспехах и ведёт себя вызывающе, его присутствие вызывает во мне смесь ужаса и боязни, которая овладевает мной, но я стараюсь сохранять спокойствие.\n\n«Ты [Select_CString(ROOT.Char.IsFemale, 'принесла', 'принёс' )] мне [Concept('sevenringsofdwarves', 'Кольца')|E]?» - говорит он хриплым и ужасным голосом.\n\n«Да, мой повелитель, оба. Я к вашим услугам», - отвечаю я. Затем снимаю оба кольца со своей руки и протягиваю их ему. Он берёт кольца с ещё большей жадностью, чем у меня, и надевает их себе на пальцы. Вскоре после этого он отвечает:\n\n«Ты [Select_CString(ROOT.Char.IsFemale, 'проделала', 'проделал' )] хорошую работу, не так ли? Я даже чувствую их силу, как у моего [Concept('nineringsofmenshort', 'кольца')|E]. А теперь позволь мне подумать о твоей награде, ха-ха-ха...»"
 skorgrim_dourhand.1001.a: "Я жду вашего ответа..."
 skorgrim_dourhand_carn_dum: "Вы передаёте [Concept('sevenringsofdwarves', 'Кольца гномов')|E] [Concept('witchkingshort', 'Королю-чародею')|E] и просите о выполнении соглашения"

 skorgrim_dourhand.1002.t: "Награда для пешки"
 skorgrim_dourhand.1002.desc: "[skorgrim_dourhand.GetFirstName] стоит передо мной, его глаза горят жалкой, отчаянной жадностью, когда он ждёт выполнения нашего соглашения. Он передал мне [Concept('sevenringsofdwarves', 'Кольца')|E] [Concept('bluemountains', 'Синих гор')|E], лишив [Concept('firebeards', 'Огнебородов')|E] и [Concept('broadbeams', 'Широкозадов')|E] их древней силы и исполнив волю моего повелителя #L [sauron.GetFirstName]а#!.\n\n«Бессмертие» и «слава», которые я шептал ему на ухо, были всего лишь приманками для простодушного ума. Я [Concept('witchkingshort', 'Король-чародей')|E] [Concept('angmar', 'Ангмара')|E], и мне не престало быть в долгу перед мимолётными жизнями смертных. Я мог бы положить конец его предательству здесь, даровав ему быструю смерть в тёмных недрах #ONCLICK:TITLE,c_carn_dum #TOOLTIP:LANDED_TITLE,c_carn_dum #L Карн-Дума#!#!.\n\nТем не менее, есть определённая... польза в инструменте, который уже разорвал свои узы. Если позволить ему жить как марионеточному королю, это обезопасит горные перевалы и сохранит связь чахлого народа со мной и моим повелителем. Я должен решить: стоит ли этот жалкий негодяй того, или мне следует просто показать ему истинное значение «бессмертия», которого он жаждет?"
 skorgrim_dourhand.1002.a: "«Твоя служба подошла к концу, [skorgrim_dourhand.GetFirstName]...»"
 skorgrim_dourhand_death_wk: "[skorgrim_dourhand.GetName] будет казнён по вашему приказу."
 skorgrim_dourhand.1002.b: "«Кому ты служишь?»"
 skorgrim_dourhand_pact_wk: "[skorgrim_dourhand.GetName] получит выбор: власть над #ONCLICK:TITLE,k_gundabad #TOOLTIP:LANDED_TITLE,k_gundabad #L Гундабадом#!#! или помощь в восстановлении #ONCLICK:TITLE,k_nogrod #TOOLTIP:LANDED_TITLE,k_nogrod #L Ногрода#!#!."

 skorgrim_dourhand.1003.t: "Обретение бессмертия"
 skorgrim_dourhand.1003.desc: "[Concept('witchkingshort', 'Король-чародей')|E] убирает [Concept('sevenringsofdwarves', 'Кольца')|E] в мешочек, его внимание уже ускользает от меня, словно я простая мошка. «Соглашение?» - проскрежетал он, и его голос был похож на скрежет надгробной плиты. «Ты не ведёшь переговоров с Тьмой, жалкий пёс. Ты просто служишь ей, пока не выдохнешься. Как и было обещано, тебе дарована вечность. Твоё имя будет вечно опозорено».\n\nОн не предлагает больше ни слов, ни суда, ни церемонии. Небрежным, почти скучающим движением запястья его моргульский клинок достигает моего сердца.\n\nХолод лезвия пронзает меня, когда оно погружается в мою грудь. Я смотрю вниз, наблюдая, как моя собственная кровь окрашивает пол #ONCLICK:TITLE,c_carn_dum #TOOLTIP:LANDED_TITLE,c_carn_dum #L Карн-Дума#!#!. В мои последние мгновения только одна мысль приходит мне в голову. Ради этого я предал свой народ? Я строил козни и убивал своих родичей только для того, чтобы умереть опозоренным в тёмном зале?\n\nВ конце концов, мне не досталось трона. Никакой славы. Только сырой пол и звук удаляющихся шагов Короля-чародея, прежде чем я успел перевести дыхание. Соглашение было ложью, и я был глупцом, который купился на это."
 skorgrim_dourhand.1003.a: "Это... бессмертие, к которому я стремился?"

 skorgrim_dourhand.1004.t: "Трон теней"
 skorgrim_dourhand.1004.desc: "Я чувствую пристальный взор [Concept('witchkingshort', 'Короля-чародея')|E], леденящее давление, которое, кажется, вытягивает весь воздух из моих лёгких. Моя жизнь висит на волоске, но когда моргульский клинок начинает подниматься, я нахожу слова, чтобы остановить его руку. Я говорю о полезности. Я прокладываю путь, по которому моё выживание послужит его замыслу лучше, чем когда-либо смог бы мой труп. На мгновение воздух становится ещё холоднее, словно Повелитель [Concept('nazgul', 'назгул')|E] взвешивает искру моих амбиций и пустоту своих собственных.\n\nРитмичный стук в его груди прекращается. Железная маска наклоняется, рассматривая меня не как существо, а как фигуру на доске.\n\n«Ты порождение великих иллюзий, ничтожество», - проскрежетал он, и тень его присутствия нависла надо мной. «Но даже иллюзию можно использовать в интересах моего повелителя. Ты хочешь править? Очень хорошо. Я дам тебе место среди камней, пока твои руки будут обагрены кровью моих врагов. Выбирай, где начнётся твоя «слава», но помни: тень, которая возвысит тебя, может с такой же лёгкостью похоронить тебя»."
 skorgrim_dourhand.1004.a: "Великодушный, верни чертоги #ONCLICK:TITLE,k_gundabad #TOOLTIP:LANDED_TITLE,k_gundabad #L Гундабада#!#! моему роду!"
 skorgrim_dourhand.1004.b: "Прошу, помоги мне восстановить [GetTitleByKey('k_nogrod').GetNameNoTier]!"

 skorgrim_dourhand.1005.t: "Сорванная сделка"
 skorgrim_dourhand.1005.desc: "PLACEHOLDER"
 skorgrim_dourhand.1005.a: "Это незначительная неудача."
 skorgrim_dourhand.1005.b: "Он познает боль."
 wk_devastates_nogrod: "Вам станет доступно решение, позволяющее сокрушить державу Скоргрима и отнять оба кольца"

