l_russian:

 ##########################
 # Korlea ROA Event Chain #
 ##########################

 korlea.0001.t: "Выбор предводителя экспедиции"
 korlea.0001.desc: "Перед моим троном стоят [belphegor.GetFirstName], [lominzil.GetFirstName] и [nimruzir.GetFirstName], три кандидата, которые выделялись среди всех претендентов на то, чтобы возглавить запланированную мной экспедицию на Крайний Юг. Один из них будет назначен капитаном «Охотника за мечтой», корабля, который я [Select_CString(ROOT.Char.IsFemale, 'подготовила', 'подготовил' )] для этого путешествия.\n\n[belphegor.GetName] - прямой, амбициозный человек. Опытный моряк, он, несомненно, стал бы отважным руководителем экспедиции. Но хватит ли у него дальновидности для такого путешествия в неизведанное, как это?\n\nКроме того, есть [lominzil.GetName]. Женщина с острым умом и необыкновенной красотой, она знает, чего хочет, и уже много лет умело ведёт финансы и учётные книги своей династии. Может ли она быть правильным выбором?\n\nИ, наконец, есть учёный, [nimruzir.GetName], самый молодой из троих. Хранитель истории, он обладает наибольшими знаниями о Крайнем Юге, но сможет ли он найти применение своей мудрости в столь опасном путешествии?"
 korlea.0001.a: "[belphegor.GetFirstName] - подходящий человек для этой работы."
 korlea.0001.b: "Наверняка [lominzil.GetFirstName] справится с этим."
 korlea.0001.c: "[nimruzir.GetFirstName] поведёт всех за собой."
 korlea.0001.d: "Если подумать, то я не думаю, что это хорошая идея."
 korlea.0001.d.tt: "#n Вы откажетесь от сюжетного контента Корлеи#!"

 korlea_expedition_camp_name: "Команда «Охотника за мечтой»"

 korlea.0002.t: "Выбор предводителя экспедиции"
 korlea.0002.desc: "Перед моим троном стоят [belphegor.GetFirstName], [lominzil.GetFirstName] и [nimruzir.GetFirstName], три кандидата, которые выделялись среди всех претендентов на то, чтобы возглавить запланированную мной экспедицию на Крайний Юг. Один из них будет назначен капитаном «Охотника за мечтой», корабля, который я [Select_CString(ROOT.Char.IsFemale, 'подготовила', 'подготовил' )] для этого путешествия.\n\n[belphegor.GetName] - прямой, амбициозный человек. Опытный моряк, он, несомненно, стал бы отважным руководителем экспедиции. Но хватит ли у него дальновидности для такого путешествия в неизведанное, как это?\n\nКроме того, есть [lominzil.GetName]. Женщина с острым умом и необыкновенной красотой, она знает, чего хочет, и уже много лет умело ведёт финансы и учётные книги своей династии. Может ли она быть правильным выбором?\n\nИ, наконец, есть учёный, [nimruzir.GetName], самый молодой из троих. Хранитель истории, он обладает наибольшими знаниями о Крайнем Юге, но сможет ли он найти применение своей мудрости в столь опасном путешествии?"
 korlea.0002.a: "[belphegor.GetFirstName] - подходящий человек для этой работы."
 korlea.0002.b: "Наверняка [lominzil.GetFirstName] справится с этим."
 korlea.0002.c: "[nimruzir.GetFirstName] поведёт всех за собой."
 korlea.0002.d: "Если подумать, то я не думаю, что это хорошая идея."
 korlea.0002.d.tt: "#n Вы откажетесь от сюжетного контента Корлеи#!"

 korlea.0005.t: "В Белегаэр"
 korlea.0005.desc: "Мы уходим, но куда?"
 korlea.0005.a: "Отправимся в Бозиша-Дар."
 korlea.0005.a.tt: "Вы отправитесь в порт Бозиша-Дар"
 korlea.0005.b: "Наш путь лежит на юг."
 korlea.0005.b.tt: "Вы отправитесь на юг, в сторону Тулванга"

 korlea.0006.t: "Оживлённый торговый порт"
 korlea.0006.desc: "Жизнь большого города! Ого..."
 korlea.0006.b: "Осмотрим город!"
 korlea.0006.b.tt: "Вы посетите рынки Бозиша-Дара"
 korlea.0006.a: "Пополним припасы и отправимся в плавание."
 korlea.0006.a.tt: "Вы отправитесь на юг, в сторону Тулванга"

 korlea.0007.t: "Бозишнарудские рынки"
 korlea.0007.desc: "О, здесь так много лавок!"
 korlea.0007.a: "Я посмотрю, не смогу ли я что-нибудь купить."
 korlea.0007.a.food: "Вы покупаете местную еду"
 korlea.0007.a.martial: "Вы покупаете книгу о военном деле"
 korlea.0007.a.diplo: "Вы слушаете сказителя"
 korlea.0007.a.ring: "Вы покупаете кольцо"
 korlea.0007.a.scam: "Вас обманули"
 korlea.0007.b: "Осмотрим достопримечательности!"
 korlea.0007.b.tt: "Вы решаете ничего не покупать"

 korlea.0008.t: "Приглашение кралуя"
 korlea.0008.desc: "The Bossmang is calling us."
 korlea.0008.a: "С нашей стороны было бы невежливо отказать."
 korlea.0008.a.tt: "Вы посетите дворец персонажа [rayholder.GetName]"
 korlea.0008.b: "Я вежливо откажусь и уйду."
 korlea.0008.b.tt: "Вы отправитесь на юг, в сторону Тулванга"
 
 korlea.0009.t: "Владыка Раи"
 korlea.0009.desc: "Really cool guy. He gave us some gold!"
 korlea.0009.a: "Мы у вас в долгу, великий кралуй."
 korlea.0009.a.tt: "Вы отправитесь на юг, в сторону Тулванга"

 korlea.0020.t: "Жизнь в море"
 korlea.0020.desc: "Когда солёный бриз мягко обдувает палубу «Охотника за мечтой», я понимаю, что рядом со мной на палубе стоит [korlea_first_mate.GetFirstName]."
 korlea.0020.a: "Белегаэр великолепен, не так ли?"
 korlea.0020.b: "Тебе следует перестать подвергать сомнению мои решения, [korlea_first_mate.GetFirstName]."
 korlea.0020.c: "Мне действительно нравится твоё общество, [korlea_first_mate.GetFirstName]..."

 korlea.0021.t: "Вызов за лидерство"
 korlea.0021.desc: "TEMP [korlea_second_mate.GetFirstName] is questioning my authority!"
 korlea.0021.a: "Обсудим это как взрослые люди."
 korlea.0021.b: "#italic Я#! здесь капитан. Нет ты!"
 korlea.0021.c: "Я могу в любой момент вышвырнуть тебя с корабля..."

 korlea.0050.t: "Остров пиратов"
 korlea.0050.desc: "Наше путешествие привело нас во владение [GetTitleByKey('c_sunira').GetNameNoTier], где мы с удивлением обнаружили множество тулвангских пиратов!"
 korlea.0050.a: "Возможно, это было не такое уж разумное решение..."
 korlea.0050.a.tt: "Вы решаете покинуть провинцию [GetTitleByKey('c_sunira').GetNameNoTier] и продолжить путешествие"
 korlea.0050.b: "Швартуйте корабль! Посмотрим, что может предложить остров."
 korlea.0050.b.tt: "Вы останетесь в провинции [GetTitleByKey('c_sunira').GetNameNoTier] на короткое время"

 korlea.0051.t: "Выпивка в таверне"
 korlea.0051.desc: "TEMP While having a bit of a drink at the local tavern, I chat with [corsair_lady.GetName], a friendly local."
 korlea.0051.a: "Расскажи мне историю этого острова!"
 korlea.0051.b: "Как сражаются пираты?"
 korlea.0051.c: "Присоединяйся к нашей экспедиции!"

 korlea.0052.t: "Таинственная карта"
 korlea.0052.desc: "TEMP [corsair_lady.GetName] has produced a mysterious map, claiming it leads to hidden treasure!"
 korlea.0052.a: "Сокровище! Вы привлекли моё внимание..."
 korlea.0052.a.tt: "Вы прячете карту сокровищ в карман для последующего использования"
 korlea.0052.b: "Это, должно быть, подделка. Вместо этого купим припасы."

 korlea.0053.t: "Шквал летящих кулаков"
 korlea.0053.desc: "TEMP A bar fight has broken out! How do we deal with this?"
 korlea.0053.a: "Попробуем выскользнуть незамеченными..."
 korlea.0053.b: "Драка? Я в деле!"

 korlea.0099.t: "Прокладывание курса"
 korlea.0099.desc: "TEMP It's time to set sail again. We'll travel to [GetTitleByKey('c_adunazain').GetNameNoTier] next!"
 korlea.0099.a: "Возможно, это было не самое разумное решение..."
 korlea.0099.a.tt: "Вы решаете покинуть провинцию [GetTitleByKey('c_sunira').GetNameNoTier] и продолжить путешествие"

 korlea.0100.t: "Чёрный порт"
 korlea.0100.desc: "TEMP We've come to Anballukhor, an enemy of Bellakar our home. Let us hope [GetTitleByKey('c_adunazain').GetNameNoTier] is still somewhat safe!"
 korlea.0100.a: "Нам лучше поторопиться..."
 korlea.0100.a.tt: "Вы решаете покинуть провинцию [GetTitleByKey('c_adunazain').GetNameNoTier] и продолжить путешествие"
 korlea.0100.b: "Возможно, стоит остаться здесь на некоторое время."
 korlea.0100.b.tt: "Вы решаете пришвартовать #italic Охотника за мечтой#! в чёрном порту"