l_russian:

 seregul.9996.t: "Наконец-то меня признали!"
 seregul.9996.desc: "Принцы наконец прислушались к голосу разума и избрали меня своим предводителем.\n\nЯ поведу нас в новую эпоху: с силой и мудростью, позволяющей определить верный путь. Больше [Concept('balan_lai', 'Балан-лай')|E] не будут отвергать меня, и я больше не стану враждовать с ними.\n\nТо маленькое дело с [Concept('stormhost', 'Грозовым воинством')|E] будет забыто, и никто ничего не узнает. Будем надеяться."
 seregul.9996.a: "Забудем об этом."
 seregul.9996.a.tt: "Теперь, когда вы стали главой Балан-лай, больше нет смысла строить против них заговоры."

 seregul.9997.t: "Серегул избран!"
 seregul.9997.desc: "Эта сопливая крыса, Серегул, похоже, использовал наши дары, чтобы избраться главой [Concept('balan_lai', 'Балан-лай')|E]! Нас обвели вокруг пальца.\n\nПодумать только, этот никчёмный, вечно ноющий, заблуждающийся дурак смог получить власть... Балан-лай, должно быть, прогнили сильнее, чем я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )].\n\nЯ ещё могу убить его за это предательство."
 seregul.9997.a: "Проклятье!"
 seregul.9997.b: "Я увижу его мёртвым!"
 seregul.9997.c: "О, но у меня слишком много доказательств..."

 seregul.9998.t: "Это [Select_CString(ROOT.Char.IsFemale, 'должна была', 'должен был' )] быть я!"
 seregul.9998.desc: "[leader.GetFullName] [Select_CString(leader.IsFemale, 'избрана нашей следующей предводительницей', 'избран нашим следующим предводителем' )] моими коллегами из [Concept('balan_lai', 'Балан-лай')|E]. Это возмутительно! У меня есть старшинство, опыт, кровь и видение, чтобы вести нас в новую эпоху. Западные принцы, избалованные своими богатыми землями и покорным населением, всегда смотрели свысока на меня и моих людей. Я не [Select_CString(ROOT.Char.IsFemale, 'забыла', 'забыл' )], как они нарушили Конкордат в 3000 г. Т.Э., чтобы унизить меня, и оставили меня [Select_CString(ROOT.Char.IsFemale, 'саму', 'самого' )] разбираться с сепаратистами.\n\nВозможно, я ещё не [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] действовать, но и это новое унижение не будет забыто."
 seregul.9998.a: "Балан-лай отвергают меня."

 seregul.9999.t: "Много дел"
 seregul.9999.desc: "$k_pel$ раскололся! Со всех сторон меня окружают предатели и приспособленцы. Они требуют, чтобы меня отстранили, если хотят мирно вернуться под адунайскую власть. Мерзкая сепаратистская мразь! Что есть государство, если не продолжение своего правителя?\n\nЯ сокрушу их, и родится новый $k_pel$. Такой, где принц не служит интересам тех, кто ниже него. Это возможность изменить унизительное положение нашего королевства.\n\nОсталось лишь выбрать, куда падёт первый удар.\n#X У вас есть 10 лет, чтобы стабилизировать державу, иначе она #bold расколется#! ещё сильнее!#!"
 seregul.9999.a: "Сосредоточиться на юге."
 seregul.9999.a.tt: "Вы сосредоточитесь на провинции [GetTitleByKey('d_barasi').GetName], богатейшем городе Пэла и доме любовника вашей жены."
 seregul.9999.b: "Сосредоточиться на востоке."
 seregul.9999.b.tt: "Вы сосредоточитесь на землях провинции [GetTitleByKey('d_shanwo').GetName], диком восточном рубеже, захваченном авантюристами и разбойниками."
 seregul.9999.c: "Сосредоточиться на западе."
 seregul.9999.c.tt: "Вы сосредоточитесь на внутренних делах и мирной провинции [GetTitleByKey('c_mokuba').GetName], находящейся под защитой эльфов."
 seregul.9999.d: "Зачем сосредотачиваться?!"
 seregul.9999.d.tt: "Зачем выбирать один путь, если можно взять всё?"

 seregul.0001.t: "Судьба соперника"
 seregul.0001.desc: "Порочный распутник [mayor.GetFullName] вмешался в мои домашние дела. Мне стыдно признаться, даже самому себе, что он соблазнил мою жену. И всё же для меня это не может быть тайной, когда об этом знает вся моя держава: ведь она родила ему бастарда и уже много лет заботится об этом ребёнке.\n\nГодами я держал свой гнев при себе. Город Бараси был слишком ценен, чтобы потерять его по личным причинам, и слишком силён, чтобы склониться перед моей волей, как сказал бы мой совет.\n\nЧто ж, теперь этот похотливый мерзавец осмелился отрицать мою власть над городом Бараси, и такое двойное предательство не останется без ответа. Рано или поздно город склонится, но я больше не могу выносить мысль, что этот человек свободно ходит под солнцем, бросая мне вызов."
 seregul.0001.a: "Я хочу, чтобы он умер."
 seregul.0001.b: "Я хочу, чтобы он оказался в моей власти."
 seregul.0001.c: "Кому нужна тонкость? Пора воевать!"

 seregul.0002.t: "Неверная жена"
 seregul.0002.desc: "Теперь, когда [mayor.GetFullName] находится в моей власти, я должен решить, какую судьбу разделит неверная [wife.GetFirstName].\n\nОна не любит меня, и я не люблю её. Доброта и привязанность, которые мы могли испытывать друг к другу в юности, давно рассеялись и были окончательно забыты, когда она родила своего бастарда-полукровку.\n\nЯ был бы в своем праве, если бы заключил её в темницу, хотя мне говорят, что это может подлить масла в обвинения моих вассалов в тирании. Другим, более тихим вариантом было бы устроить её смерть. И всё же она ещё может оказаться полезным орудием против своего любовника..."
 seregul.0002.desc.b: "Теперь, когда [mayor.GetFullName] находится в моей власти, я должен решить, какую судьбу разделит вероломная [wife.GetFirstName].\n\nОна не любит меня, и я не люблю её. Доброта и привязанность, которые мы могли испытывать друг к другу в юности, давно рассеялись и были окончательно забыты, когда она родила своего бастарда-полукровку.\n\nЯ был бы в своём праве, если бы заключил её в темницу, хотя мне говорят, что это может подлить масла в обвинения моих вассалов в тирании. Другим, более тихим вариантом было бы устроить её смерть."
 seregul.0002.a: "Ей больше нельзя доверять."
 seregul.0002.b: "Я хочу её смерти!"
 seregul.0002.c: "Она должна доказать свою верность."
 seregul.0002.d: "Я отказываюсь даже думать об этом."

 seregul.0003.t: "Позорное пятно"
 seregul.0003.desc: "Дело с изменой моей жены почти улажено; теперь осталось лишь решить судьбу ребёнка. Это живое доказательство неверности моей жены, злодейства моего вассала и моего собственного унижения.\n\nЯ должен обдумать свой ход. Ребёнку нельзя позволить уйти на свободу, это ясно. Этот маленький знак неуважения может со временем вырасти в претендента, ведь в нём течёт королевская кровь.\n\nТак или иначе, я должен взять его под свою власть. Его мать просит узаконить его как члена дома [wife.GetDynastyName] и обещает, что его воспитают самым верным придворным. Но почему-то я ей не доверяю."
 seregul.0003.a: "Схватить ребенка."
 seregul.0003.b: "Ребёнок должен умереть."
 seregul.0003.c: "Вообще-то, я проявлю великодушие."
 
 seregul.0004.t: "Внимание на юге: Противостояние с городом"
 seregul.0004.desc: "Город Бараси выступил против меня. Как богатейший город в державе $k_pel$, он всегда держался надменно по отношению к своему принцу. Мои предки терпели это, а затем терпел и я. Но теперь город сам подписал себе приговор, и для Бараси уже ничто не будет прежним: они откололись от королевства, а их вожди виновны в измене.\n\nЯ подчиню город своей воле — войной или более тонкими средствами. Город может быть богат, но у них не будет ни рынка для продажи, ни пищи для покупки, если я полностью разорву между нами экономические связи. Они будут голодать, а затем в конце концов сломаются и приползут обратно в мои заботливые объятия."
 seregul.0004.a: "Пора воевать!"
 seregul.0004.b: "Мы задушим их экономику."
 seregul.0004.c: "Они достаточно скоро падут."

 seregul.0005.t: "Падение Бараси"
 seregul.0005.desc: "Как и ожидалось, экономика гордого города Бараси рухнула, стоило ему быть отрезанным от моей державы. Город голодает, а купцы всё сильнее боятся, что могут быть низведены до нищеты.\n\nГордые олигархи наконец сломлены, и теперь они просят у меня мира, отдавая себя на мою милость. Мой канцлер сообщает, что тех немногих, кто всё ещё желал изображать силу на переговорах, их же коллеги отстранили от обсуждений.\n\nГород наконец полностью в моей власти. Победа."
 seregul.0005.desc.b: "Бараси пал. Завоёванный и разграбленный, город пустеет: жители бегут, и не осталось никого, кто желал бы противостоять моей мощи. Этот гордый город сломлен. Олигархи, которые не бежали, теперь просят у меня мира.\n\nЯ хочу взять город себе, но это, без сомнения, разгневает моих местных вассалов. Если не я, то им будет править верный мне человек. Я больше не потерплю неповиновения от этого ныне сломленного города.\n\nВыбор стоит между одним из моих и одним из их людей."
 seregul.0005.a: "Он мой!"
 seregul.0005.b: "[potential_oligarchic_vassal.GetFirstNameNoTooltip] будет править им от моего имени."
 seregul.0005.c: "[local_oligarchic_vassal.GetFirstNameNoTooltip] будет править ради мира."

 seregul.0006.t: "Хайалла" 
 seregul.0006.desc.a: "Хайалла не так неуловимы, как можно было бы ожидать: хотя они в основном держатся особняком, они много общались с племенами Пэла и открыто живут как простой земледельческий народ. Они давно связаны с харадунайской властью Пэла и даже имеют место в местном совете.\n\nНо [chaialla_ruler.GetFullName] действительно не [Select_CString(chaialla_ruler.IsFemale, 'держалась', 'держался' )] в стороне: [Select_CString(chaialla_ruler.IsFemale, 'она откололась', 'он откололся' )] вместе с прочими сепаратистами после предательского Совета 3000 г. Т.Э. и с тех пор [Select_CString(chaialla_ruler.IsFemale, 'сотрудничала', 'сотрудничал' )] с Бараси против меня.\n\nС падением Бараси они остались уязвимы.\n\nПо праву я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] сокрушить их и принести цивилизованное правление в их маленькие земли, но мой совет, как всегда, проповедует осторожность и говорит мне, что мы могли бы заключить сделку, чтобы восстановить старые связи."
 seregul.0006.a: "Мы сокрушим их."
 seregul.0006.b: "Я потребую, чтобы они преклонили колено."
 seregul.0006.b.tt.vassal: "[chaialla_ruler.GetFirstNameNoTooltip] [Select_CString(chaialla_ruler.IsFemale, 'стала', 'стал' )] вашим вассалом!"

 seregul.0101.t: "Внимание на восток: Напряжённость на востоке"
 seregul.0101.desc.a: "В суматохе, возникшей после Совета 3000 г. Т.Э., самые восточные земли Пэла оказались в руках оппортунистов.\n\nСовсем рядом находится Разбойничий король, харизматичный и весёлый человек, который, если верить слухам, поклоняется тёмным богам. Он собрал вокруг себя немалую силу и с комфортом противостоит мне. Ещё дальше магрийский военачальник Опейеми захватил земли для своего племени. Я [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], что он опытный генерал, но у него нет друзей на родине.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] как-то подчинить их своей воле, но их войска могут оказаться слишком велики для Пэла. Я знаю, что между ними нет любви, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы попытаться манипулировать ими, чтобы они сражались друг с другом..."
 seregul.0101.a: "Натравить их друг против друга."
 seregul.0101.b: "Я просто сокрушу их."
 seregul.0101.a.tt.success: "Глупцы идут войной друг на друга!"
 seregul.0101.a.tt.failure: "Они поняли это и объединились! Это война!"

 seregul.0102.t: "Банда Весельчаков"
 seregul.0102.desc.a: "Разбойничий король, возможно, и выиграл себе немного времени, но теперь я лишу его свободы раз и навсегда.\n\nЕсли он хочет сохранить своё правление, ему придётся присягнуть мне на верность. Это будет ультиматум, если он откажется - начнётся война. Но если я не сочту разумным удерживать эту погань у власти, война всё равно будет, и я своими силами покончу с ним."
 seregul.0102.desc.b: "В суматохе, возникшей после Совета 3000 г. Т.Э., самые восточные земли Пэла оказались в руках оппортунистов.\n\nСовсем рядом находится Разбойничий король, харизматичный и весёлый человек, который, если верить слухам, поклоняется тёмным богам. Он собрал вокруг себя немалую силу и с комфортом противостоит мне.\n\nИметь с ним дело будет нелегко. Возможно, мне удастся убедить его преклонить колено, если я достаточно подслащу ситуацию..."
 seregul.0102.a: "Он должен поклясться в верности."
 seregul.0102.b: "Этот жалкий сброд? Войско?"
 seregul.0102.a.tt.success: "Он согласен!"

 seregul.0103.t: "Древняя угроза"
 seregul.0103.desc.a: "Королевства-близнецы Маг и Тумаг веками правили жителями Пэла, пока коалиция повстанцев не вытеснила их. Затем они обратились за защитой к [Concept('balan_lai', 'Балан-лай')|E], которые давно отказались от каких-либо притязаний на Пэл. Так появились принцы Пэла, защитники державы от варварской угрозы со стороны Мага и Тумага.\n\nМои подданные ничем не лучше, но магрийцев нельзя терпеть, они могут привести с собой огромную силу. Этот авантюрист может стать авангардом настоящего вторжения. Он должен подчиниться или умереть."
 seregul.0103.a: "Дадим отпор захватчикам!"
 seregul.0103.b: "Дадим им последний шанс признать меня."

 seregul.0104.t: "[defender.GetCulture.GetName] побеждены!"
 seregul.0104.desc: "Мы наконец-то покорили #L [defender.GetCulture.GetCollectiveNoun|l]их#! захватчиков.\n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, что делать с землями, которые они незаконно захватили. Чужаки больше никогда не будут не угрожать законному харадунайскому Пэлу."
 seregul.0104.a: "Я возьму их себе, само собой."
 seregul.0104.b: "Разбойничий король купит эту землю."

 seregul.0201.t: "Внимание на запад: Протекторат куинд"
 seregul.0201.desc: "[Concept('cuind', 'Куинд')|E] гарантируют независимость наших западных сепаратистов! [toya.GetFullName] - [Select_CString(toya.IsFemale, 'мирная правительница', 'мирный правитель' )], и я ранее [Select_CString(ROOT.Char.IsFemale, 'рассчитывала', 'рассчитывал' )] на [toya.GetHerHis] поддержку как на человека, который не предпримет агрессивных шагов, независимо от того, как сильно я буду давить на совет.\n\nЯ явно [Select_CString(ROOT.Char.IsFemale, 'ошибалась', 'ошибался' )], потому что [toya.GetFirstNameNoTooltip] имеет дело с эльфами! Теперь [GetTitleByKey('c_mokuba').GetNameNoTier] считает себя в безопасности от Пэла, под защитой могущественного и неуловимого эльфийского короля. Но я не собираюсь так легко отказываться от своих земель.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], что этот эльфийский король любит [Concept('mankind', 'человечество')|E], и, возможно, мне удастся обманом заставить его вернуть [toya.GetHerHis] в мои объятия.\n\nВ противном случае я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы организовать свои войска для быстрой кампании в надежде, что эльфы выступят слишком поздно."
 seregul.0201.a: "Я могу убедить короля куинд."
 seregul.0201.a.tt.success: "Он соглашается освободить провинцию [GetTitleByKey('c_mokuba').GetNameNoTier]"
 seregul.0201.b: "Нам просто нужно поторопиться!"

 seregul.0202.t: "Переговоры с эльфами"
 seregul.0202.desc.a: "Наша предыдущая попытка не удалась. Я вновь обращусь к эльфам. Надеюсь, к этому времени [terilaen.GetFirstName] уже простит меня, и я смогу обмануть его своей скромностью, хотя раньше мне не удавалось заставить его поверить моим обещаниям. Держу пари, что этот эльф умеет прощать.\n\nЭто моё последнее средство. Если переговоры провалятся, нам придётся обратиться к пути войны."
 seregul.0202.desc.b: "[Concept('cuind', 'Куинд')|E] гарантируют независимость наших западных сепаратистов! [toya.GetFullName] - [Select_CString(toya.IsFemale, 'мирная правительница', 'мирный правитель' )], и я ранее [Select_CString(ROOT.Char.IsFemale, 'рассчитывала', 'рассчитывал' )] на [toya.GetHerHis] поддержку как на человека, который не предпримет агрессивных шагов, независимо от того, как сильно я буду давить на совет.\n\nЯ явно [Select_CString(ROOT.Char.IsFemale, 'ошибалась', 'ошибался' )], потому что [toya.GetFirstNameNoTooltip] имеет дело с эльфами! Теперь [GetTitleByKey('c_mokuba').GetNameNoTier] считает себя в безопасности от Пэла, под защитой могущественного и неуловимого эльфийского короля. Но я не собираюсь так легко отказываться от своих земель.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )], что этот эльфийский король любит [Concept('mankind', 'человечество')|E], и, возможно, мне удастся обманом заставить его вернуть [toya.GetHerHis] в мои объятия."
 seregul.0202.a: "Я попытаюсь."

 seregul.0250.t: "Пэл уступает!"
 seregul.0250.desc.a: "После долгих лет беспорядков местные лидеры наконец-то замолчали! За последние несколько месяцев они больше не оспаривали мой авторитет, и на собраниях ко мне проявляли должное уважение.\n\nИх свирепость в конце концов сменилась страхом. Всё больше и больше людей соглашаются со всем, что я говорю на совете, и ходит всё меньше слухов.\n\nНаконец-то пришло время укрепить мою власть и начать медленно лишать совет его прав. Их бессмысленный мятеж закончился, и для Пэла наступила новая эра."
 seregul.0250.desc.b: "После долгих лет беспорядков местные лидеры наконец-то замолчали! За последние несколько месяцев они больше не оспаривали мой авторитет, и на собраниях ко мне проявляли должное уважение.\n\nИх гнев остыл. У меня появилось несколько подхалимов в совете, и, независимо от того, что я говорю, со мной всё больше и больше соглашаются.\n\nНаконец-то пришло время укрепить мою власть и начать медленно лишать совет его прав. Их бессмысленный мятеж закончился, и для Пэла наступила новая эра."
 seregul.0250.a: "Лучший Пэл."

 seregul.0251.t: "Пять лет на стабилизацию!"
 seregul.0251.desc: "Катастрофический Совет 3000 года Т.Э. глубоко ранил мой имидж. Меня считают неэффективным лидером, который подтолкнул своих вассалов к мятежу, а теперь не может их обуздать. Конечно, всё это пропаганда, распространяемая теми, кто хотел бы, чтобы я [Select_CString(ROOT.Char.IsFemale, 'потерпела', 'потерпел' )] неудачу. Я [Select_CString(ROOT.Char.IsFemale, 'пыталась', 'пытался' )] руководить местным населением, но они оттолкнули меня, словно коварные дикари, каковыми они и являются.\n\nТем не менее, мне нужно показать, что я могу снова объединить державу. Жители центральных земель Пэла, возможно, и удержались от раскола, но большинство из них не любят меня и всё равно могут попытаться отделиться, если я не восстановлю державу. Я уже вижу, что они сговариваются. Мне нужно это исправить.\n#X У вас есть ещё пять лет, чтобы стабилизироваться!#!"
 seregul.0251.a: "Я добьюсь стабильности!"
 seregul.0251.b: "Бараси по-прежнему проявляет непокорность."
 seregul.0252.c: "Дикий восток должен быть обуздан!"
 seregul.0252.d: "Эльфы всё ещё покушаются на запад."

 seregul.0252.t: "Пэл вновь раскалывается!"
 seregul.0252.desc: "Катастрофа! [rebel_leader.GetFullName] вчера, по-видимому, тайно [Select_CString(rebel_leader.IsFemale, 'встретилась', 'встретился' )] с большинством местных лидеров Пэла.\n\nСегодня я [Select_CString(ROOT.Char.IsFemale, 'получила', 'получил' )] письмо, которое, по-видимому, было разослано на этом тайном заседании Совета многим жителям королевства, в котором говорится:\n\n«Тиран, восседающий на троне Пэла, превратил королевство в несуществующее государство. Совет больше не заинтересован в том, чтобы харадунайцы продолжали править нашей землей. Поэтому это единогласное решение этого собрания состоит в том, что все должны взять в руки оружие и помочь свергнуть это захолустное государство».\n\nСогласно новым сообщениям они, похоже, объединяются."
 seregul.0252.a: "В этом огне ещё возродится новый Пэл!"

 seregul.0253.t: "Запад не придёт!"
 seregul.0253.desc: "Ночью из Миспира в спешном порядке прибыл посланник. [Concept('balan_lai', 'Балан-лай')|E] сообщают, что, собравшись, они пришли к решению, что будут придерживаться своего вердикта от 3000 года Т.Э. и не окажут никакой помощи в текущем восстании.\n\nДержу пари, что они видят в этом мой конец, и их страх и зависть ко мне теперь, наконец, могут быть спокойны, зная, что в обозримом будущем я буду [Select_CString(ROOT.Char.IsFemale, 'вовлечена', 'вовлечён' )] в эту войну.\n\nЯ никогда не забуду этого предательства."
 seregul.0253.a: "Они боятся меня!"

 seregul.0254.t: "Пэл потерян!"
 seregul.0254.desc.a: "Случилось немыслимое! Коренное население уничтожило харадунайское государство Пэл.\n\nЯ всё ещё контролирую $d_arpel$, и, таким образом, несмотря на их предательство, я всё ещё принц [Concept('balan_lai', 'Балан-лай')|E]. Путь будет долгим, но я должен восстановить своё королевство, вернуть своё положение и отомстить тем, кто меня сверг.\n\nВозможно, моя месть свершится не скоро, но тогда она будет ещё более полной."
 seregul.0254.desc.b: "Случилось немыслимое! Коренное население уничтожило харадунайское государство Пэл.\n\nЯ даже потерял своё положение принца [Concept('balan_lai', 'Балан-лай')|E]. Путь будет долгим и мучительным, но я должен восстановить своё королевство, вернуть своё положение и отомстить тем, кто меня сверг.\n\nВозможно, моя месть свершится не скоро, но тогда она будет ещё более полной."
 seregul.0254.a: "Я ещё одержу верх."

 seregul.0255.t: "Горе побеждённым"
 seregul.0255.desc: "Естественно, я победил.\n\nВойна опустошила окрестности, и даже в столице пришлось немало потасовок, но теперь она окончена.\n\nМестное население разбито, мятежники в цепях, а я торжествую.\n\nПришло время восстать новому Пэлу."
 seregul.0255.a: "Кого же ждёт виселица?"

 seregul.0300.t: "Взгляд в будущее"
 seregul.0300.desc: "Я уже давно знаю, что не могу доверять другим принцам [Concept('balan_lai', 'Балан-лай')|E]. Хотя я, несомненно, следующий в очереди на лидерство, [phorakon.GetFirstName] всегда относился ко мне с презрением, в то же время проявляя благосклонность к #L [imrazor.GetFirstName]у#!.\n\nЭто явно политический шаг, начатый злобой высокомерного старика по отношению ко мне. Он вызывает в воображении образ [imrazor.GetFirstNameNoTooltip]а в качестве его преемника, несмотря на то, что был более зрелый, опытный и умный кандидат, за которого обычно проголосовало бы большинство принцев, - я.\n\nОчевидно, что его решение бросить меня на произвол мятежа коренного населения - это способ подорвать мою репутацию, выставив меня некомпетентным в глазах других принцев.\n\nТеперь я должен подумать, как вести себя с принцами Балан-лай."
 seregul.0300.a: "Как их предводитель."
 seregul.0300.b: "Как друг."

 seregul.0301.t: "Обратиться к Серегулу?"
 seregul.0301.desc: "[seregul.GetFullName], принц [Concept('balan_lai', 'Балан-лай')|E], безрассудный человек. Его грубые ошибки недавно привели к тому, что Совет Пэла, состоящий из представителей всех коренных племён королевства, осудил его правление. Многие из них полностью отделились от Пэла и требуют его низложения, если кто-то потребует мирного возвращения под защиту харадунайцев.\n\nБалан-лай закрыли глаза на это, предоставив его своей судьбе. Вероятно, они надеются, что его действительно свергнут.\n\nЭто, естественно, ещё больше разозлило [seregul.GetFirstNameNoTooltip]а в отношении своих коллег. Если бы мы помогли ему вернуть его королевство, он был бы у нас в долгу, и мы могли бы использовать такую пешку, чтобы вызвать беспорядки на юге, пока мы озираемся на север, на [Concept('bellakar', 'Беллакар')|E]."
 seregul.0301.a: "Полезная, хотя и некомпетентная пешка."
 seregul.0301.a.tt: "Если мы не получим от него ответа через пару месяцев, значит, он нам отказал."
 seregul.0301.b: "Это слишком рискованно."
 seregul.0301.b.tt: "Что, если он обманул меня?"

 seregul.0302.t: "Письмо на столе"
 seregul.0302.desc: "Сегодня, когда я вошёл в свои покои, меня встретило странное зрелище. Прямо в центре стола лежало письмо, запечатанное чёрным воском.\n\nОпросив своих стражников и слуг, я выяснил, что никто не видел, чтобы кто-то входил в мои покои этим утром. Меня охватывает странное чувство.\n\nЭто, несомненно, работа шпионов. Хорошо спланированный заговор, чтобы положить это письмо на мой стол... Или у этого может быть более зловещее объяснение? Колдовство? Умертвия?\n\nЯ перестаю думать об этом, жизнь в страхе не приносит мне пользы. Я должен просто открыть его или избавиться от письма."
 seregul.0302.a: "Открыть его."
 seregul.0302.a.tt: "Оно написано довольно тонким и длинным почерком..."
 seregul.0302.b: "Сжечь его."
 seregul.0302.b.tt: "#help Этот выбор лишит вас доступа к контенту#!"

 seregul.0303.t: "Осаждённому правителю Пэла, Серегулу"
 seregul.0303.desc: "Я внимательно слежу за сложной ситуацией, в которой вы оказались. Местное население по своей природе склонно к предательству и всегда стремятся свергнуть законное [Concept('adunaic', 'адунайское')|E] правление. Мы должны объединиться против восстания, иначе все потеряем свои владения. Вам нужно только попросить нас о помощи. Мы не потребуем ничего взамен, кроме того, чего вы уже желаете, и возьмём то, что должно принадлежать вам, силой оружия. Ваши коллеги по собственной воле не окажут вам ничего, кроме презрения, вы знаете, что это правда."
 seregul.0303.a: "Я согласен!"
 seregul.0303.a.tt: "#P Вы получите помощь от Грозового воинства и новый казус белли против Балан-лай.#!"
 seregul.0303.b: "Раскрыть содержание письма Балан-лай."
 seregul.0303.b.tt: "#P Доведя это до сведения Балан-лай, вы значительно улучшите своё положение среди принцев.#!"

 seregul.0316.t: "Отправиться в путь?"
 seregul.0316.desc: "Я полон решимости отправиться в провинцию [seregul_destination.GetCounty.GetName] и раскрыть перед Балан-лай заговор Грозового воинства, направленный против моих коллег!\n\nНо могу ли я отправиться прямо сейчас?"
 seregul.0316.a: "Самое время."
 seregul.0316.b: "У меня много работы."

 seregul.0304.t: "Bringing the Issue to the Balan Lai"
 seregul.0304.toast: "Seregul has exposed the Stormhost's plot!"
 seregul.0304.desc: "I have come to [seregul_destination.GetCounty.GetName] to deliver the treasonous letter to [seregul_destination.GetController.GetFirstName]. During the travel I often wondered if this was the best course of action. I do not like [seregul_destination.GetController.GetHerHim], but standing against the [Concept('balan_lai', 'Балан-лай')|E] would be madness. And this way, I may yet curry some favour. Even if they are still set against me, they will always have to recognize I am a steadfast member of our alliance.\n\nAs [seregul_destination.GetController.GetFirstName] reads the letter his eyes grow wide. Rage, fear, maybe a mixture? I cannot read [seregul_destination.GetController.GetHerHim].\n\n[seregul_destination.GetController.GetSheHe|U] puts the letter down and looks at me with a milder expression. "You did good bringing me this, Seregul. This will unite the Balân-Lâi against our old enemy. But how shall we act?""
 seregul.0304.a: "I have a plan."
 seregul.0304.b: "I am sure you will figure it out."
 seregul.0304.b.tt: "The Balân-Lâi will decide how to act against the Storm Host, you will be notified."

 seregul.0305.t: "How to Address the Stormhost"
 seregul.0305.desc.a: "I have been granted leadership by the [Concept('balan_lai', 'Балан-лай')|E] on the matter of dealing with the Stormhost.\n\nThough powerful when united, we are a disjointed force, hard to coordinate, with too many heads. That would suggest that the best course of action would be to wait for a moment of weakness of the Storm Marshal.\n\nI know he has his eyes turned north, and covets the riches of [Concept('bellakar', 'Беллакар')|E]. A secret alliance with that old Númenórean colony would certainly spell the end of the [Concept('stormhost', 'Грозовое воинство')|E], unexpectedly at war with at both north and south borders. But there are other ways, like my own kingdom, theirs certainly count with a fair share of secessionists, the Marshal rules with an iron fist.\n\nOtherwise, I could claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.desc.b: "Seregul has brought to us the vile letter from the Storm Marshal. A dagger drenched in honey. The Marshal promised Seregul gifts and help if he were to betray the [Concept('balan_lai', 'Балан-лай')|E].\n\nThankfully Seregul has shown no appetite for the honey, for a coordinated attack from the east and north would have wounded us at the very least.\n\nNow the [Concept('stormhost', 'Грозовое воинство')|E] has the Balân-Lâi's attention, and we mean to wound it back. We need only decide on a course of action.\n\nThey have their eyes turned on [Concept('bellakar', 'Беллакар')|E], and we could offer that old Númenórean realm our friendship in secret, and destroy our enemy when the time comes. Or we could choose to attack from the inside, and ally with disgruntled forces subjugated by the Stormhost. And yet, I could simply claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.a: "Ally with Bellakar."
 seregul.0305.b: "Forment Rebellion."
 seregul.0305.c: "Direct action."

 seregul.0306.t: "An Offer of Alliance"
 seregul.0306.desc: "An envoy from the [Concept('balan_lai', 'Балан-лай')|E] requests audience! The envoy tells my court he wishes to discuss a matter of alliance! It is so rare for new things to happen, especially coming from the [Concept('sevenlands', 'Семь земель')|E], that I have to contain my own gasp.\n\n Although we have economic ties with the Princes, and both sides try to maintain a healthy, cordial, relationship, we have barely had formal diplomatic ties in our histories.\n\nThe envoy proceeds to explain that the [Concept('stormhost', 'Грозовое воинство')|E] has sought one of the Princes, to undermine the Balân-Lâi. The Prince, [seregul.GetFirstNameNoTooltip], has instead in secret brought this letter to his peers, and the Balân-Lâi has decided, seeing as the [storm_marshal.GetFullName] desires to attack Bellakar, to offer us their aid in that eventual war.\n\nIt is up to me to decide whether and how this tie shall be established."
 seregul.0306.a: "I will gladly accept mutual defense."
 seregul.0306.b: "A personal alliance."
 seregul.0306.c: "We don't need them."

 seregul.0307.t: "Bellakar Accepts!"
 seregul.0307.desc: "[niluhin.GetFullName] has accepted our generous offer!\n\nWhen the time comes, [Concept('bellakar', 'Беллакар')|E] will call the Princes of the [Concept('balan_lai', 'Балан-лай')|E] to crush the [Concept('stormhost', 'Грозовое воинство')|E]."
 seregul.0307.a: "We will be there."

 seregul.0308.t: "Bellakar: Full Alliance"
 seregul.0308.desc: "[niluhin.GetFullName], rather than depend on the Princes whims to come to his aid if and when the time comes that the [Concept('stormhost', 'Грозовое воинство')|E] shall attack his realm, has proposed a direct alliance with me.\n\nThis is great news! Though far away, [Concept('bellakar', 'Беллакар')|E] could help my personal ambitions!"
 seregul.0308.a: "Wonderful!"

 seregul.0309.t: "Bellakar Rejects Us!"
 seregul.0309.desc: "For whatever reason, [niluhin.GetFullName] has rejected our proposal! Maybe [niluhin.GetSheHe] feared that were secret strings or plots attached to our magnanimous proposal. Maybe [niluhin.GetSheHePossessive] is less rational than we thought. We will never know [niluhin.GetHerHis] reasons.\n\n We must look for another way to weaken the [Concept('stormhost', 'Грозовое воинство')|E]."
 seregul.0309.a: "Let us review our options."

 seregul.0310.t: "On Incinting Rebellion"
 seregul.0310.desc: "I have decided that we should forment instability within the [Concept('stormhost', 'Грозовое воинство')|E]. As an artificial state conjured by a dark power, it lacks some of the organic foundations a realm such as our Princedoms, even Pél, have.\n\nIt fills such a hole with dread, dividing their subjects to keep them weak, tempting and threatening their nobles. Ever projecting a merciless, ruthless, image of itself onto it's subject's and it's neighbour's hearts.\n\nWe shall look for disgruntlement and make such a subject feel they have the support of a realm the Storm Marshall fears. They will feel that they are no longer alone, and under our protection, and then, when they rise up, we may decide how to act against a distracted enemy."
 seregul.0310.a: "The Nobles."
 seregul.0310.b: "The Slaves."

 seregul.0311.t: "An Offer of Rebellion"
 seregul.0311.desc: "A discreet letter was delivered to me today. In it is the seal of the [Concept('balan_lai', 'Балан-лай')|E], ever our enemies to the south.\n\nToday they offer me friendship! They describe a neutered plot against their lands by the [storm_marshal.GetTitleAsName].\n\nThey now desire to hurt him in retaliation, and have elected to promote my claim to [storm_marshal.GetFirstNamePossessiveNoTooltip] throne.\n\nDo I desire it, or will I remain loyal?"
 seregul.0311.a: "Yes."
 seregul.0311.a.tt: "When the war against Bellakar starts, you will have a chance to break free."
 seregul.0311.b: "I am loyal!"

 seregul.0312.t: "$k_an_balkumagan$ has accepted"
 seregul.0312.desc: "[ab_ruler.GetFullName] has taken our money, and accepted the offer. There is no saying when, and if, he will attack his liege. But we have sown some discord there."
 seregul.0312.a: "Okay."

 seregul.0313.t: "$k_an_balkumagan$ refuses!"
 seregul.0313.desc: "[ab_ruler.GetFullName] remains silent. He will not accept our offer. We won't be able to try any more covert instabilization of the [Concept('stormhost', 'Грозовое воинство')|E] either, due to the risk of them having brought our letter to the [storm_marshal.GetTitleAsName]."
 seregul.0313.a: "Damn."
 
 seregul.0314.t: "Bellakar Calls for Aid!"
 seregul.0314.desc: "[join_war.GetName] has started! [Concept('bellakar', 'Беллакар')|E] calls for the aid promised by the [Concept('balan_lai', 'Балан-лай')|E]. How will [princedom.GetNameNoTier] answer?"
 seregul.0314.a: "We will be there."
 seregul.0314.b: "We will not answer."

 seregul.0315.t: "The Time has Come!"
 seregul.0315.desc: "Years ago we promised the [Concept('balan_lai', 'Балан-лай')|E] that when the [Concept('stormhost', 'Грозовое воинство')|E] stirred to war against [Concept('bellakar', 'Беллакар')|E], we would attack our masters and seek independence. Now is the time. But have we changed our mind?"
 seregul.0315.a: "No! We want to be free!"
 seregul.0315.b: "Yes... Now is not the time."

 seregul.0401.t: "To the [storm_marshal.GetTitleAsName],"
 seregul.0401.desc: "I accept your help. And I do believe our interests align. As you have well noted, I have no love for my so called peers, who are always spiteful and jealous of me. I shall be an useful and faithful ally, especially when I come to my own as leader of the Balân-Lâi. This I do swear."
 seregul.0401.a: "Hah! As if he was our equal."
 seregul.0401.a.tt: "He will be expected to declare his war within the next 10 years. And if he doesn't, you will betray him to the Balân-Lâi, and war will happen anyway."
 seregul.0401.b: "We shouldn't send gifts to our enemy."
 seregul.0401.b.tt: "Seregul has, since our first communications, been elected the leader of the Balân=Lâi, he will not betray them now!"

 seregul.0402.t: "The First Gift"
 seregul.0402.desc: "A shady envoy arrives, bringing a chest of gold.\n\n"This is the first gift." He says in a slow and smooth speech "Our master sends greetings, and hopes you will use it well. Next time I will return with soldiers. Do not forget your promise.""
 seregul.0402.a: "Much appreciated."

 seregul.0403.t: "The Second Gift"
 seregul.0403.desc: "The shady envoy is back. Ahead of a long line of men. Most are rabble, but there are quite a few armored, well-trained men. I am glad.\n\nI am told they have come through secret ways in Usakan, to avoid the eyes of the [Concept('balan_lai', 'Балан-лай')|E]\n\n"This is the second gift." The envoy says in his slow, smooth voice. "Now you should have what you need to rein the savages in. Next I will return with councillors. The day that you shall fulfill your promise draws nearer.""
 seregul.0403.a: "A great boon to my cause!"
 stormhost_mercenaries: "Anbalukkhôri Auxillaries"

 seregul.0404.t: "The Final Gift"
 seregul.0404.desc: "The shady envoy is back. With him there comes a few sinister, martial-looking, [Concept('anbalukkhori', 'анбалукхори')|E] men.\n\n"This is the final gift. These men are... well connected. Let them deal with your troublemakers, and follow their military guidance, and you shall have everything you need.\n\nYou will not see me anymore. But, be forewarned, our master has not forgotten your promise. Get your affairs in order, and prepare for the attack.""
 seregul.0404.a: "I will..."

 seregul.0406.t: "The First Warning"
 seregul.0406.desc: "A sinister man calls on me today. An eery feeling washes over me when he talks, in a slithery tone.\n\n"Are you enjoying our gifts, lord? Have you forgotten your promise? I am come to remind you. You would not want the displeasure of the [Concept('southerndragonarmyadunaic', 'Тон ан-Харлок')|E]. You have less than five years left, or you will face the consequence.""
 seregul.0406.a: "Still plenty of time..."

 seregul.0408.t: "The Last Warning"
 seregul.0408.desc: "The sinister man is back.\n\n"You have enjoyed and spent our gifts. We hope you have brought your affairs in order. Now it is time to repay us. You will not live to see another year, if you do not fulfill your promise. Your treason shall be exposed for the wide world to see. You will not survive such a reveal. The Eye is watching you.""
 seregul.0408.a: "Oh dear."

 seregul.0410.t: "Time's Up"
 seregul.0410.desc: "One of my spies in Mispir arrives in haste. He comes running down my corridors towards my court room.\n\nAs he enters the room I tell him to calm down, and to explain what has happened for him to break his cover and pass openly towards Pél.\n\n"My lord, you are the talk of $c_mispir$! Apparently a letter has arrived, and [leader.GetFirstName] has been summoned. My sources tell me he has left the audience irate. Swearing to see your Highness dead."
 seregul.0410.a: "The Stormhost has exposed me!"

 seregul.0411.t: "Seregul Betrayed Us!"
 seregul.0411.desc: "The vile Prince of Pél, [seregul.GetFirstName] has betrayed the [Concept('balan_lai', 'Балан-лай')|E]! Apparently, he was approached by the [Concept('stormhost', 'Грозовое воинство')|E], years ago, and has been preparing for a large scale invasion against the Balân-Lâi ever since!\n\nLong suspected to be a blundering fool, now we have our confirmation! How can one man believe he can oppose all of us? The Balân-Lâi has stood strong for millenia. It shall not fall for one arrogant idiot, who relies on treacherous allies!"
 seregul.0411.a: "This shall not stand! To war!"
 seregul.0411.a.tt: "You have called every Prince to uphold the Concordant and put an end to the betrayer."
 seregul.0411.tt: "Death to the Traitor Prince!"

 seregul.0412.t: "The Day is Here"
 seregul.0412.desc.a: "Long have I planned and awaited the day my armies would march upon [GetTitleByKey('d_alsarias').GetNameNoTier]. Now the day has come. My armies stand as prepared as they will ever be to fight my former peers.\n\nThose among them who have antagonized me will fear my coming, for they know I shall offer no mercy. All those years of disdain and contempt, believing me the lesser of the Princes... This will be my hour.\n\nAnd yet, if the Stormhost were to help, this war would feel much safer, and victory even more attainable."
 seregul.0412.desc.b: "Long have I planned and awaited the day my armies would march upon [GetTitleByKey('d_alsarias').GetNameNoTier]. Now the day has come. My armies stand as prepared as they will ever be to fight my former peers.\n\nThose among them who have antagonized me will fear my coming, for they know I shall offer no mercy. All those years of disdain and contempt, believing me the lesser of the Princes... This will be my hour."
 seregul.0412.a: "To victory!"
 seregul.0412.b: "Send a message in haste."
 call_stormhost: "The Stormhost has already given you all the help they are willing to give. If they are to help you again, it will come at a cost..."

 seregul.0413.t: "[seregul.GetFirstNameNoTooltip] Asks for Help"
 seregul.0413.desc: "The [Concept('balan_lai', 'Балан-лай')|E] Princedom that we have had in our pocket for years has finally stirred to pay the price of the gifts we gave [seregul.GetHerHim]. He attacks [seregul.GetHerHis] peers and seeks to take it all.\n\nI may help [seregul.GetHerHim], if I wish. But it is certainly not in my interests to have such a strong neighbour as [seregul.GetSheHe] would become if victorious.\n\nIf we are to help it will be for nothing less than [seregul.GetHerHis] full fealty, and direct control over the lands in the [GetTitleByKey('k_kharadune').GetName]."
 seregul.0413.a: "A good opportunity."
 seregul.0413.a.tt: "If we win and [seregul.GetSheHe] refuses to swear fealty, you will go to war against [seregul.GetHerHim]."
 seregul.0413.b: "Hah! I care not for him."
 seregul.0413.b.tt: "No help coming from the Stormhost!"

 seregul.0414.t: "Victory!"
 seregul.0414.desc: "Rejoice! For I have won!\n\nNot only am I now the leader of the Balân-Lâi, but of most of the [Concept('sevenlands', 'Семь земель')|E]! Rejoice, for I shall never again need to show a calm face in front of disrespect. Now all shall measure their words, take their bows and remind themselves of my superiority.\n\nHenceforth I shall rule this land with an iron fist. Peace is too fragile to be kept by a council, a strong, single-minded hand is needed."
 seregul.0414.a: "Rejoice!"

 seregul.0415.t: "Seregul's Folly"
 seregul.0415.desc.a: "At last we have [seregul.GetFirstName] in our power. This mad man who we once saw as our peer. Who sold himself to treacherous allies, our oldest enemies. To the shadow itself!\n\nWhat a resentful, deluded man. To have thinked he would topple the [Concept('balan_lai', 'Балан-лай')|E]!\n\nNow the war is over, and peace can reign again, may it last for a thousand years...\n\n[seregul.GetFirstNameNoTooltip] shall be executed on the morrow, and his line shall be excluded from the Balân-Lâi until they can prove themselves once more."
 seregul.0415.desc.b: "I am vanquished and fettered. This is the day I die. Curse the day when I opened that letter.\n\nAll my work, plans and desires have come to naught. My life ends in shame. Put down like a dog by my enemy.\n\nMy line shall continue, although I have no doubt they shall be ostracized by the Balân-Lâi. May they one day avenge me."
 seregul.0415.a: "So ends Seregul's Folly."
 seregul.0415.b: "Goodbye."

 seregul.0416.t: "The Stormhost's Demands"
 seregul.0416.desc.a: "As I deal with small matters of rebellion among the Princes, an envoy arrives from the [Concept('stormhost', 'Грозовое воинство')|E]. He stares at me for a time, until I bid him speak.\n\n"I have come to remind you of your debts, Prince of Pél. Would the war have been won if not for the help of the Southern Dragon Army?" He pauses for a while as if waiting for an answer.\n\n"You have been in our debt since you have accepted the gifts. You could not even pay us properly, and we had to win your war for you. Hence, the great [storm_marshal.GetFullName] demands your full submission, and concession of the lands under the [GetTitleByKey('k_kharadune').GetName] to his direct control. Or we shall invade.""
 seregul.0416.desc.b: "As I deal with small matters of rebellion among the Princes, an envoy arrives from the [Concept('stormhost', 'Грозовое воинство')|E]. He stares at me for a time, until I bid him speak.\n\n"I have come to remind you of your debts, Prince of Pél. You have fulfilled your promise, but it is still too small a price to pay for the gifts you have been given." He pauses for a while as if waiting for an answer.\n\n"Hence, the great [storm_marshal.GetFullName] demands your submission, and tribute, so that the [Concept('sevenlands', 'Семь земель')|E] shall never again pose a threat to the Southern Dragon Army. If you refuse me now, we shall invade. And your debt will grow.""
 seregul.0416.a: "You will have your tribute."
 seregul.0416.b: "I knew there would be a price."
 seregul.0416.c: "What?! Never!"

 seregul.0417.t: "Who shall be the new Prince of Pél?"
 seregul.0417.desc: "Now that Seregul is finally deposed and executed, we can finally look forward to a future of peace and prosperity in Pél. To that end, regardless of Seregul's reforms, the original accord with the Pél people shall be restored and the Council reinstated.\n\nEven with such limitations to their power, there are many families in the [Concept('sevenlands', 'Семь земель')|E] who would cherish the opportunity to become a member of the Balân-Lâi, and I have already been approached by some of the more politically competent ones.\n\nI have picked some of the most competent candidates from such families, now I need only to choose."
 seregul.0417.a: "[potential_prince_1.GetFullNameNoTooltip]"
 seregul.0417.b: "[potential_prince_2.GetFullNameNoTooltip]"
 seregul.0417.c: "[potential_prince_3.GetFullNameNoTooltip]"
 seregul.0417.d: "[potential_prince_4.GetFullNameNoTooltip]"
 seregul.0417.e: "[fallback_prince.GetFullNameNoTooltip]"