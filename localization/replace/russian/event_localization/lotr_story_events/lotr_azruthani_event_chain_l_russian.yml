 azrathani.302.t: "The Debt to [loaner.GetPrimaryTitle.GetNameNoTierNoTooltip] Comes Due"
 azrathani.302.desc: "The due date is here. [loaner.GetFirstName] has invested in me, but now comes [loaner.GetHerHis] payday.\n\nI owe [loaner.GetHerHim] "
 azrathani.302.desc.k: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_karasalas').GetValue|0]#!, and #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_karasalas_interest')|0]#! of interest\n\n"
 azrathani.302.desc.a: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_alsarias').GetValue|0]#!, and #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_alsarias_interest')|0]#! of interest\n\n"
 azrathani.302.desc.g: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_gimileth').GetValue|0]#!, and #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_gimileth_interest')|0]#! of interest\n\n"
 azrathani.302.desc.gt: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_gimilthani').GetValue|0]#!, and #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_gimilthani_interest')|0]#! of interest\n\n"
 azrathani.302.desc.p: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_pel').GetValue|0]#!, and #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_pel_interest')|0]#! of interest\n\n"
 azrathani.302.desc.outro: "I must now think how much I want to pay. Paying off parts of my loan, or, better yet, the whole thing, would lessen our fiscal load next year, and it would show the Princes of the [balan_lai|E] that this is a safe investment. Regardless, I should pay at least the interest, lest I fall into a debt spiral.\n\n"
 azrathani.302.a: "The full amount."
 azrathani.302.b: "Half the debt plus interest."
 azrathani.302.c: "Only a quarter of the debt plus interest."
 azrathani.302.d: "I can only pay the interest."
 azrathani.302.e: "Add the interest to the principal."
 debt_spiral: "#N Be careful not to get on a debt spiral!#!"
 zirnaihin.302.f: "Default!"
 bankruptcy: "#N This is very risky. The Prince will likely seek to recoup his losses with war!#!"

 azrathani.306.t: "The Debt to the Merchants of $d_inzilloni$ Comes Due"
 azrathani.306.desc: "The due date is here. [loaner.GetFirstName] has invested in me, but now comes [loaner.GetHerHis] pay day.\n\nI owe [loaner.GetHerHim] #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_inzilloni').GetValue|0]#!, and #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_inzilloni_interest')|0]#! of interest\n\n"

 azrathani.308.t: "Seeking Investments"
 azrathani.308.desc: "I find myself in need of more funds.\n\nWith the help of my colleagues I have selected three of the richest Princes of the [balan_lai|E], and I should reach out to one of them for investment.\n\nOr I could just ask for a loan from the merchants of $d_inzilloni$, they are always happy to loan gold (if at high interest).\n\n"
 azrathani.308.a: "[loaner_candidate_1.GetFullNameNoTooltip]"
 azrathani.308.b: "[loaner_candidate_2.GetFullNameNoTooltip]"
 azrathani.308.c: "[loaner_candidate_3.GetFullNameNoTooltip]"
 azrathani.308.d: "The Merchants of $d_inzilloni$."
 inzilloni_debt: "#V The merchants from $d_inzilloni$ offer large, easy, loans. But they come at #N [GetTitleByKey('d_inzilloni').MakeScope.Var('loan_interest').GetValue|%0] /year#! interest rates.#!"
 azrathani.308.e: "More Options."
 azrathani.308.f: "Nevermind."

 azrathani.309.t: "[GetTitleByKey('c_gidwama').GetHolder.GetFirstNameNoTooltip] Asks for Investment!"
 azrathani.309.desc: "The would-be conqueror of Azrathâni, [GetTitleByKey('c_gidwama').GetHolder.GetFirstName] has sent word that [GetTitleByKey('c_gidwama').GetHolder.GetSheHe] needs more investment.\n\n[GetTitleByKey('c_gidwama').GetHolder.GetSheHe|U] guarantees me this is not charity, and thus promises to pay me #P [loan_title.MakeScope.Var('loan_interest').GetValue|%0]/year#! of interest.\n\nIt is up to me to decide if, and how much should I loan [GetTitleByKey('c_gidwama').GetHolder.GetHerHim]."
 azrathani.309.a: "As much as I can."
 azrathani.309.b: "A solid amount."
 azrathani.309.c: "Not much."
 azrathani.309.d: "No, this is a bad investment."
 azrathani.309.toast: "[loaner.GetFirstNameNoTooltip] has invested in the expedition!"
 azrathani.309.toast.no: "[loaner.GetFirstNameNoTooltip] has refused to invest in the expedition!"

 azrathani.310.t: "[GetTitleByKey('c_gidwama').GetHolder.GetFirstNameNoTooltip] Has Defaulted!"
 azrathani.310.intro: "[GetTitleByKey('c_gidwama').GetHolder.GetFirstNameNoTooltip] has defaulted on his loan, valued in #V @gold_icon![SCOPE.GetValue('defaulted_loan')|0]#!."
 azrathani.310.inzilloni: "\n\nThe merchants of this city had invested in the expedition, and knew the risk. A few might be seriously hurt by their lost loans, but most will have diversified enough that it shouldn't matter"
 azrathani.310.desc: "\n\nThis money is sadly lost for good, such was the risk when we invested in this expedition."
 azrathani.310.outro: "\n\n Still, this does give me the excuse needed of invading the land and taking the emerald mine for myself. Maybe the gold shall still be recouped after all."
 azrathani.310.a: "To war!"
 azrathani.310.b: "I will bide my time."