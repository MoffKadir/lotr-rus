 azrathani.302.t: "[loaner.GetPrimaryTitle.GetNameNoTierNoTooltip]: Долг подлежит уплате"
 azrathani.302.desc: "Срок наступил. [loaner.GetFirstName] [Select_CString(loaner.IsFemale, 'вложила', 'вложил' )] в меня средства, но теперь настал [loaner.GetHerHis] день расплаты.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] [loaner.GetHerHim] "
 azrathani.302.desc.k: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_karasalas').GetValue|0]#! и #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_karasalas_interest')|0]#! процентов.\n\n"
 azrathani.302.desc.a: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_alsarias').GetValue|0]#! и #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_alsarias_interest')|0]#! процентов.\n\n"
 azrathani.302.desc.g: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_gimileth').GetValue|0]#! и #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_gimileth_interest')|0]#! процентов.\n\n"
 azrathani.302.desc.gt: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_gimilthani').GetValue|0]#! и #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_gimilthani_interest')|0]#! процентов.\n\n"
 azrathani.302.desc.p: "#V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_pel').GetValue|0]#! и #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_pel_interest')|0]#! процентов.\n\n"
 azrathani.302.desc.outro: "Теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] подумать, сколько хочу заплатить. Выплата части моего долга или, что ещё лучше, всего долга уменьшит нашу финансовую нагрузку в следующем году и покажет принцам [Concept('balan_lai', 'Балан-лай')|E], что это безопасное вложение. В любом случае, я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] заплатить хотя бы проценты, чтобы не попасть в долговую спираль.\n\n"
 azrathani.302.a: "Полную сумму."
 azrathani.302.b: "Половину долга с процентами."
 azrathani.302.c: "Только четверть долга с процентами."
 azrathani.302.d: "Я могу заплатить только проценты."
 azrathani.302.e: "Добавить проценты к основной сумме."
 debt_spiral: "#N Будьте осторожны, чтобы не попасть в долговую спираль!#!"
 zirnaihin.302.f: "Дефолт!"
 bankruptcy: "#N Это очень рискованно. Принц, скорее всего, попытается возместить свои потери войной!#!"

 azrathani.306.t: "Долг перед купцами $d_inzilloni$ подлежит уплате"
 azrathani.306.desc: "Срок наступил. [loaner.GetFirstName] [Select_CString(loaner.IsFemale, 'вложила', 'вложил' )] в меня средства, но теперь настал [loaner.GetHerHis] день расплаты.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] [loaner.GetHerHim] #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_inzilloni').GetValue|0]#! и #V @gold_icon![GetPlayer.MakeScope.ScriptValue('debt_inzilloni_interest')|0]#! процентов.\n\n"

 azrathani.308.t: "Поиск вложений"
 azrathani.308.desc: "Я нуждаюсь в дополнительных средствах.\n\nС помощью моих коллег я [Select_CString(ROOT.Char.IsFemale, 'отобрала', 'отобрал' )] трёх богатейших принцев [Concept('balan_lai', 'Балан-лай')|E], и мне следует обратиться к одному из них за вложениями.\n\nИли я могу просто попросить заём у купцов $d_inzilloni$, они всегда рады дать золото в долг (хотя и под высокий процент).\n\n"
 azrathani.308.a: "[loaner_candidate_1.GetFullNameNoTooltip]"
 azrathani.308.b: "[loaner_candidate_2.GetFullNameNoTooltip]"
 azrathani.308.c: "[loaner_candidate_3.GetFullNameNoTooltip]"
 azrathani.308.d: "Купцы $d_inzilloni$."
 inzilloni_debt: "#V Купцы из $d_inzilloni$ предлагают крупные, лёгкие займы. Но они обойдутся в процентную ставку в #N [GetTitleByKey('d_inzilloni').MakeScope.Var('loan_interest').GetValue|%0]/год#!.#!"
 azrathani.308.e: "Больше вариантов."
 azrathani.308.f: "Неважно."

 azrathani.309.t: "[GetTitleByKey('c_gidwama').GetHolder.GetFirstNameNoTooltip] просит вложений!"
 azrathani.309.desc: "Потенциальный завоеватель Азратани, [GetTitleByKey('c_gidwama').GetHolder.GetFirstName] присылает весть, что [GetTitleByKey('c_gidwama').GetHolder.GetSheHe] нуждается в дополнительных вложениях.\n\n[GetTitleByKey('c_gidwama').GetHolder.GetSheHe|U] заверяет меня, что это не благотворительность, и обещает выплачивать мне #P [loan_title.MakeScope.Var('loan_interest').GetValue|%0]/год#! процентов.\n\nМне решать, давать ли и сколько ссудить [GetTitleByKey('c_gidwama').GetHolder.GetHerHim]."
 azrathani.309.a: "Сколько смогу."
 azrathani.309.b: "Солидную сумму."
 azrathani.309.c: "Немного."
 azrathani.309.d: "Нет, это плохое вложение."
 azrathani.309.toast: "[loaner.GetFirstNameNoTooltip] вкладывается в экспедицию!"
 azrathani.309.toast.no: "[loaner.GetFirstNameNoTooltip] отказывается вложиться в экспедицию!"

 azrathani.310.t: "[GetTitleByKey('c_gidwama').GetHolder.GetFirstNameNoTooltip] объявляет дефолт!"
 azrathani.310.intro: "[GetTitleByKey('c_gidwama').GetHolder.GetFirstNameNoTooltip] не выплачивает свой долг в размере #V @gold_icon![SCOPE.GetValue('defaulted_loan')|0]#!."
 azrathani.310.inzilloni: "\n\nКупцы этого города вложились в экспедицию и знали о рисках. Некоторые могут серьёзно пострадать от потерянных займов, но большинство достаточно диверсифицировали свои вложения, так что это не должно иметь значения."
 azrathani.310.desc: "\n\nЭти средства, к сожалению, потеряны навсегда, таков был риск, когда мы вложились в эту экспедицию."
 azrathani.310.outro: "\n\nТем не менее, это даёт мне повод вторгнуться в эту землю и забрать изумрудный рудник себе. Возможно, золото всё же удастся вернуть."
 azrathani.310.a: "Война!"
 azrathani.310.b: "Я выжду время."