l_russian:

 azrathani.001.t: "Состояние экспедиции"
 azrathani.001.desc: "Два года назад мы отправились из Карасаласа на трёх больших зафрахтованных кораблях, загруженных всеми припасами и людьми, которых только смогли раздобыть. Три отпрыска княжеских семей, профинансировавших наше путешествие, увеличили наши ряды:\n\n[priest.GetFirstName], брат принца Алсариаса.\n[spymaster.GetFullName], [Select_CString(spymaster.IsFemale, 'внучатая племянница', 'внучатый племянник' )] принца Гимилета.\nИ, как всегда, [Select_CString(steward.IsFemale, 'наша младшая кузина', 'наш младший кузен' )], [steward.GetFullName].\n\nМы прибыли в эту землю с огромными долгами, и бо́льшая часть средств была потрачена ещё до прибытия. К счастью, того, что у нас было, хватило, чтобы [chief.GetFullName] заблестела в глазах. Он сказал нам, что купцов найти трудно, и разработка месторождения не стоит того. Его главной заботой была уступка озера Легве. Похоже, это священное место для его народа. Наши люди прозвали его Нинакхас — водная пропасть.\n\nПосле многих месяцев трудов мы наконец возвели прочное постоянное укрепление, но наши финансисты ожидают ежегодных процентов, и день расплаты приближается."
 azrathani.001.a: "Работа должна уже начаться."
 hired_mercenaries: "Люди экспедиции"

 azrathani.002.t: "[chief.GetFirstNameNoTooltip]: Безрассудство"
 azrathani.002.desc: "Слишком долго я [Select_CString(ROOT.Char.IsFemale, 'наблюдал', 'наблюдал' )], как [chief.GetFirstName] неуклюже руководит нашими племенами, всегда близоруко и жадно. Мне стыдно думать, что я даже [Select_CString(ROOT.Char.IsFemale, 'помогала', 'помогал' )] ему исправлять его ошибки.\n\nНо теперь он перешёл непростительную черту. Вопреки моим предостережениям, слушаясь лишь своей ненасытной алчности, он продал часть нашей земли чужеземцам. И не каким-нибудь, а харадунаим, которые, вероятно, пользуются поддержкой [Concept('balan_lai', 'Балан-лай')|E]. Это недопустимо. Думать, что они насытятся одним маленьким куском земли! [chief.GetFirstNameNoTooltip] был обманут сладкими речами!\n\nДаже его собственная опора, культ Кутамаджи, теперь недовольна им, ибо он продал чужеземцам Легве, их священное озеро. Пришло время мне свергнуть этого глупца и взять контроль над нашим народом, чтобы противостоять и изгнать харадунаим.\n\nМой брат, [general.GetFirstName], является нашим единомышленником, и он станет нашим генералом в грядущие трудные времена."
 azrathani.002.a: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] действовать быстро!"

 azrathani.003.t: "[new_chief.GetFirstNameNoTooltip]: Переворот"
 azrathani.003.desc.a: "Когда мы снова приближаемся к владению [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier], я начинаю замечать, что местные жители ведут приглушённые разговоры и смотрят на нас с беспокойством и страхом, в некоторых я даже чувствую возмущение.\n\nНаконец я подхожу к одной такой группе и спрашиваю, о чём они говорят.\n\nПохоже, сегодня утром через наши земли прошёл посланник, которого отправил [new_chief.GetTitleAsNameNoTooltip|l] [chief.GetFirstName], рассказывая всем желающим о перевороте против него самого.\n\nПо-видимому, [new_chief.GetFirstName] был недоволен тем, что бывший [new_chief.GetTitleAsNameNoTooltip|l] решил продать нам землю, и намерен вернуть её. [new_chief.GetTitleAsNameNoTooltip] [new_chief.GetFirstNameNoTooltip] пользуется поддержкой некоторых из людей своего предшественника, не желающих доверять нам своё священное озеро."
 azrathani.003.desc.b: "[new_chief.GetFirstName] всегда был гадюкой. Сегодня утром он объявил меня своим врагом, и вскоре мои люди без моего ведома сдались. Изменники, все как один.\n\nНо у меня всё ещё есть золото, и моё племя не полностью отказалось от моей власти. Так что я выжду время и, возможно, однажды восстану снова."
 azrathani.003.a: "Это сулит опасность."
 azrathani.003.b: "Изменники!"

 azrathani.004.t: "К горам"
 azrathani.004.desc: "Наконец мы закончили строительство нашей штаб-квартиры. После долгого года надзора за нанятыми нами местными жителями и выполнения посильной работы при строительстве теперь мы наконец можем отправиться взглянуть на это месторождение.\n\n[chief.GetFirstName] показал мне множество изумрудов, которые он и его люди собрали там, и я был достаточно [Select_CString(ROOT.Char.IsFemale, 'убеждена', 'убеждён' )], что месторождение реально, но я ещё не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] его.\n\nДля этого путешествия мне понадобятся и местный проводник, и переводчик, ибо я ещё не говорю на их языке и не знаю этой земли.\n\n[tutor.GetFirstName] помогал мне с самого нашего прибытия, фактически он был переводчиком во время переговоров, которые вели я и [chief.GetFirstNameNoTooltip], и я нанял его сразу по их окончании. Он рассказал мне о следопыте, [Select_CString(guide.IsFemale, 'которая', 'который' )] много раз [Select_CString(guide.IsFemale, 'ходила', 'ходил' )] к горе, — [guide.GetFirstName]. [Select_CString(guide.IsFemale, 'Она', 'Он' )] будет [Select_CString(guide.IsFemale, 'нашей проводницей', 'нашим проводником' )] в этом путешествии."
 azrathani.004.a: "Пора отыскать сокровища."

 azrathani.005.t: "Озеро Нинакхас"
 azrathani.005.desc: "Здесь я снова смотрю на озеро. Это прекрасное зрелище. Тёмные воды простираются на север, насколько хватает глаз, и земля поднимается по его западным берегам. Восточный берег туманен и далёк, но можно увидеть горы, поднимающиеся над туманом, и суровую землю, поднимающуюся им навстречу.\n\nНекоторые местные жители принимают свои ритуальные омовения на южном берегу. Здесь мы останавливаемся и смотрим на нашего проводника.\n\n[guide.GetFirstName] уверенно говорит, что мы должны идти по берегу на север, к подножию гор. И мы следуем за ним.\n\nЭто долгий путь по пересечённой местности. Но наконец, прямо под крутыми горными стенами, наш проводник находит узкий проход на восток, почти вырезанный в горе.\n\nЗаглядывая через край, видно, что до озера далеко падать."
 azrathani.005.a: "Только не смотрите вниз."

 azrathani.006.t: "Зелёные горы"
 azrathani.006.desc: "После ночёвки на восточном берегу Нинакхаса [guide.GetFirstNameNoTooltip] ведёт нас по узкой тропе, петляющей по склону горы.\n\nКогда мы поднимаемся, [tutor.GetFirstNameNoTooltip] рассказывает нам об открытии. Несколько лет назад на горе произошёл большой камнепад. Несколько молодых людей из племени заинтересовались, что его вызвало, и захотели увидеть разрушения. Когда они вернулись в племя с самоцветами, [chief.GetFirstName] организовал отряд, чтобы найти как можно больше камней, и затем снова и снова.\n\nНаконец мы выходим на пологий спуск к долине. Я сразу понимаю, что здесь можно основать поселение. Пока [steward.GetFirstName] и [brother.GetFirstName] измеряют землю, у меня есть возможность поискать эти разбросанные изумруды."
 azrathani.006.a: "Что легко найти?"
 azrathani.006.b: "Я заберусь выше и поищу ещё!"
 big_find: "#P Вы наполняете целый мешок изумрудами!#!"
 some_gems: "Вы находите немного самоцветов"
 one_gem: "Вы находите один самоцвет"
 lots_of_gems: "Вы наполняете полный мешок самоцветов!"
 you_fall: "Вы падаете с горы!"
 seriously_hurt: "Вы серьёзно ранены!"

 azrathani.007.t: "Прибытие!"
 azrathani.007.desc: "Сегодня утром нас встретило весьма необычное прибытие в нашу маленькую бухту. Не обычные потрёпанные торговые суда, курсирующие к далёкому [Concept('ormal_bay', 'Ормальскому заливу')|E], и не случайный корабль из [Concept('sevenlands', 'Семи земель')|E] с корреспонденцией и припасами. Настоящий флагман флота [GetDynastyByID('dynasty_erimrazor').GetName] бросает якорь в нашей маленькой бухте. Когда несколько пассажиров приближаются на маленькой лодке, я понимаю, что среди них находится [prince.GetFirstName].\n\nЭто хорошие новости!\n\nОтпрыск Имразорхин выходит из лодки с широкой улыбкой на лице, после чего он и [brother.GetFirstName] обнимаются.\n\n«Дорогие мои, я наконец могу присоединиться к экспедиции, как и обещал. И я привожу с собой задержавшиеся вложения, которые выделил мой дорогой родич, [uncle.GetFullName], с щедрым планом погашения»."
 azrathani.007.a: "Пора основать новый город!"
 azrathani.007.b: "Укрепление под нашим прямым контролем."
 appoint_chancellor: "[prince.GetFirstName] будет [Select_CString(prince.IsFemale, 'назначена', 'назначен' )] вашим канцлером.#!"

 azrathani.008.t: "Подготовка к добыче ресурсов"
 azrathani.008.desc: "Наконец мы построили инфраструктуру, необходимую для организации постоянной добычи в Лайкуриде. Прошло уже полдесятилетия с нашего прибытия в эту землю, и работа только начинается.\n\nМестные чиновники в растущей горной деревне уже демонстрируют раскол между #L [GetFaithByKey('faith_good_pel').GetName|l]ими#! и #L [GetFaithByKey('faith_drel').GetName|l]ими#! фракциями. Возникает вопрос, кто из нас должен возглавить город. Это не будет [brother.GetFirstName], он нужен рядом со мной.\n\nИтак, кандидаты: наш маленький кузен, [steward.GetFirstName], всегда верный и компетентный управленец; [prince.GetFirstName], дружелюбный и способный человек; [priest.GetFirstName], странный и, честно говоря, неприятный, но учёный; и [spymaster.GetFirstName], зловещий человек, который точно сможет держать население в узде."
 azrathani.008.a: "[steward.GetFirstNameNoTooltip], наш верный малый кузен."
 little_cousin: "[steward.GetFirstNameNoTooltip] — лучший управленец в экспедиции."
 azrathani.008.b: "[prince.GetFirstNameNoTooltip], княжеский отпрыск."
 princeling: "Назначение Имразорхина покажет Балан-лай, что рудник в надёжных руках."
 azrathani.008.c: "[priest.GetFirstNameNoTooltip], [Select_CString(priest.IsFemale, 'проповедница', 'проповедник' )]."
 alsarias_brother: "[priest.GetFirstNameNoTooltip] — учёный человек, хоть и неприятный"
 azrathani.008.d: "[spymaster.GetFirstNameNoTooltip], маньяк."
 sociopath: "Невозможно предсказать, что [spymaster.GetFirstNameNoTooltip] сделает во главе. Наверняка ничего хорошего."

 azrathani.009.t: "Год на посту"
 azrathani.009.desc.intro: "[appointed.GetFirstName] уже год находится на посту градоправителя нашего поселения в Лайкуриде. Я [Select_CString(ROOT.Char.IsFemale, 'назначила', 'назначил' )] встречу с ним, чтобы узнать о его политике и планах для города, а также о том, как местный совет работает с ним и друг с другом.\n\n"
 azrathani.009.desc.a: "[appointed.GetFirstNameNoTooltip] тепло приветствует меня и с энтузиазмом рассказывает о финансовом положении города. Похоже, ему удалось создать профицит, одновременно расширяя инфраструктуру. Это гораздо лучше, чем я [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )]!\n\nЗатем он объясняет, что фракции Совета недовольны его жёсткой налоговой политикой, но он уверяет меня, что они неохотно признают, что он делает это для блага города."
 azrathani.009.desc.b: "[appointed.GetFirstNameNoTooltip] опаздывает на нашу встречу. За ним следуют полдюжины подхалимов, как харадунаим, так и дрэлы. Он извиняется за опоздание и заверяет меня, что искренне желает дать мне полный отчёт о своей политике, и снова извиняется, что у него мало времени.\n\nОн говорит мне, что все разумные в местном Совете любят и уважают его. К сожалению, говорит он, большинство во фракции Худу-Кай неразумны. Кроме того, он украшает город и привёз нескольких таких специалистов из [Concept('sevenlands', 'Семи земель')|E]."
 azrathani.009.desc.c: "[appointed.GetFirstNameNoTooltip] выглядит дико, когда приходит на нашу встречу. Он не хочет рассказывать, как получил травму лица, но когда он говорит о местном Совете, я быстро понимаю, что он крайне непопулярен среди них, и есть пара кандидатов, которые могли его ударить.\n\n«Всему есть естественный порядок», — говорит он. «Нужно просто знать своё место в великом порядке, а затем следовать своим инстинктам — которые всегда должны быть отточены — и тогда Эру откроет, как упорядочить всё, что было неправильным. К этому я и стремился»."
 azrathani.009.desc.d: "[appointed.GetFirstNameNoTooltip] приглашает меня на обед. Я пытаюсь вытянуть из него ответы, пока он разделывает жареную курицу. Время от времени он смотрит на меня с саркастическим видом и возвращается к своей курице.\n\nНаконец, когда трапеза подходит к концу, я снова настаиваю, чтобы он дал мне отчёт о своих делах.\n\n«Всё просто, не так ли? Если хочешь править, нужно, чтобы тебя боялись. Страх первичен, страх удержит тебя у власти. Уважение, лояльность — всё уступает страху. Нет разницы между Советом и народом. Все они испуганный скот»."
 azrathani.009.a: "Вот почему [appointed.GetFirstNameNoTooltip] - мой выбор."

 azrathani.010.t: "Великий рудник Азратани"
 azrathani.010.desc: "Сегодня день, о котором мы мечтали с момента прибытия в эту землю. Сегодня рудники Лайкурид заработали в полную силу.\n\nМы долго надеялись и с самого первого проникновения в эту гору имели основания полагать, что в горе может находиться почти неисчерпаемое месторождение изумрудов.\n\nТеперь мы проверим эту теорию на практике. Прорыта не одна шахтная штольня, а несколько, на разных уровнях горы. Рудник, по сути, поглотил наше поселение и превратился в полностью реализованный горнодобывающий комплекс."
 azrathani.010.a: "Пусть богатство течёт рекой!"

 azrathani.011.t: "Держава Азратани"
 azrathani.011.desc: "Уже много лет экспедиция трудится в этой земле. И хотя мы пришли с официальной целью довести рудник до совершенства, управление людьми и землёй оказалось нашим величайшим испытанием. И независимые племена, и наши собственные местные жители проливали нашу кровь.\n\nНо теперь это, кажется, осталось позади. Когда все племена полностью под моим контролем, и жители этой земли наконец начинают признавать меня [Select_CString(ROOT.Char.IsFemale, 'законной правительницей', 'законным правителем' )], чувство наступления нового дня росло в моём сердце, и теперь оно ощутимо.\n\nСегодня прибыл посланник из [Concept('sevenlands', 'Семи земель')|E], возвещая, что принцы [Concept('balan_lai', 'Балан-лай')|E] достаточно довольны, чтобы признать меня [Select_CString(ROOT.Char.IsFemale, 'правительницей', 'правителем' )] этой земли, хотя пока ещё не как [Select_CString(ROOT.Char.IsFemale, 'одну', 'одного' )] из них.\n\nНовый день настал. Я больше не [Select_CString(ROOT.Char.IsFemale, 'чужачка, стремящаяся', 'чужак, стремящийся' )] эксплуатировать эту землю и [Select_CString(ROOT.Char.IsFemale, 'имеющая', 'имеющий' )] дело с конкурирующими властями.\n\nСегодня и до дня моей смерти я — закон этой земли."
 azrathani.011.a: "Рассвет лучших дней."
 ends_azrathani_story: "Завершает сюжет экспедиции Азратани"

 azrathani.013.t: "Экспедиция Азратани"
 azrathani.013.desc: "Чуть более года назад экспедиция харадунаим, которую возглавляли [expeditionary.GetFirstName] и [brother.GetFirstName], высадилась в провинции [GetTitleByKey('c_gidwama').GetNameNoTier]. Они и [GetTitleByKey('d_metkharan').GetHolder.GetFirstName] сумели договориться об аренде земли, и с тех пор они заняты строительством своей штаб-квартиры.\n\nМеня уведомили, что среди [Concept('balan_lai', 'Балан-лай')|E] есть некоторое беспокойство, что я воспользуюсь моментом слабости южного герцогства, чтобы увеличить свою власть над этой землёй. Разумеется, мне эта земля не нужна, и я слишком [Select_CString(ROOT.Char.IsFemale, 'занята', 'занят' )] своими замыслами.\n\nЕсли я пообещаю не вторгаться в эту землю в течение долгого времени, принцы, местные жители и экспедиционеры будут чувствовать себя в большей безопасности и будут благодарны.\n\nИли я могу промолчать и ничего не обещать."
 azrathani.013.a: "Пусть люди знают, что я хочу мира."
 azrathani.013.b: "Я промолчу."
 TRUCE_PROMISED: "Терилаэн пообещал не вмешиваться в экспедицию Азратани."

