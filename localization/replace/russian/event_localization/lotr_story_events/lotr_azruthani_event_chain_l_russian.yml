 native_resistance_army: "Дрэлское ополчение"

 azrathani.101.t: "Великий урожай!"
 azrathani.101.desc: "Когда дрэлский народ собирает урожай этого года, мы видим, что это уже самый большой урожай за последнее время, он заполнил большую часть наших хранилищ, и ещё многое предстоит собрать.\n\nЭто великое провидение, и оно может оказаться спасительным даром для экспедиции.\n\nЛюди пребывают в радостном настроении, усердно и с охотой работая в полях. Обычай этой земли — устраивать пиры в благодарность богам за провидение всякий раз, когда случается большой урожай, и люди уже с нетерпением ждут их. Конечно, было бы неэкономично тратить наше заработанное с трудом продовольствие на празднества, и мне нужно помнить о своих долгах."
 azrathani.101.a: "Люди должны насладиться урожаем!"
 azrathani.101.b: "Куй железо, пока горячо."

 azrathani.102.t: "Местные празднества"
 azrathani.102.desc: "Местные дрэлы чувствуют себя достаточно счастливыми и уверенными в нашей власти над этой землёй, что они теряют свои запреты и организуют всё более крупные религиозные церемонии, особенно на берегах озера Нинакхас, которое они называют Легве.\n\nМне сказали, что мы вступаем в период традиционных праздников, и мы ожидаем, что в этом году праздники будут больше, чем когда-либо. Можно сказать, что отрадно видеть такую уверенность в нашей власти. Это то, ради чего мы работали. И всё же можно также сказать, что это беспрецедентная возможность заработать ещё немного денег на этом народе.\n\nОт нас ожидают, что мы как-то поучаствуем: либо мы поддержим и поможем финансировать эти праздники, либо сделаем непопулярный выбор и взимаем плату с участников, возможно, чуть больше, чем нужно..."
 azrathani.102.a: "Мы будем способствовать празднествам."
 azrathani.102.b: "Мы обложим эти пиры налогом."

 azrathani.103.t: "[steward.GetFirstNameNoTooltip] предлагает два годовых бюджета"
 azrathani.103.desc: "[steward.GetFirstName] встречается со мной сегодня, чтобы обсудить годовой бюджет. Он говорит мне, что в этом году у нас есть отличная возможность.\n\nБлагодаря нескольким случайным излишкам в бюджете в прошлом году, мы можем составить бюджет, который не только проведёт нас через следующий год, но и действительно изменит наше материальное положение.\n\nОн предлагает два способа достижения этого. Первый — вложить золото в землю, стимулируя расселение и предпринимательство среди местного населения. Второй план — использовать эти излишки для получения ликвидности и, возможно, погасить некоторые долги."
 azrathani.103.a: "Развитие."
 azrathani.103.b: "Золото."

 azrathani.104.t: "[diplomat.GetFirstNameNoTooltip] обсуждает пропаганду"
 azrathani.104.desc: "[diplomat.GetFirstName] подходит ко мне сегодня, чтобы обсудить тонкое искусство пропаганды. Он говорит мне, что изучает, как именно улучшить положение экспедиции.\n\n«Видите ли, суть этой миссии — экономическая добыча, чистая и простая. Мы пришли, чтобы извлечь богатства горы и разбогатеть.\n\nЭто благородная цель, ибо богатство создаётся в мире, а мы лишь агенты этого созидания. Если мы заставим людей смотреть на нас так, мы завоюем их благосклонность.\n\nК сожалению, мы не можем выстроить нарратив, что мы здесь и для улучшения жизни местного населения, и для извлечения как можно большего богатства для наших благодетелей из [Concept('sevenlands', 'Семи земель')|E]. Поэтому нужно выбрать»."
 azrathani.104.a: "Местное население."
 azrathani.104.b: "Принцы."

 azrathani.105.t: "Избыток рабочей силы"
 azrathani.105.desc: "В этом году мы видим, как много молодых людей присоединяются к рабочей силе. Всё большее их число слоняется вокруг Азралони в поисках оплачиваемой работы.\n\nЭто, конечно, признак процветания и показывает, что местное население начинает видеть в нас надёжный источник богатства.\n\nИ всё же мы не рассчитывали на этот бум, и теперь должны справиться с этой неожиданной рабочей силой.\n\nОчевидный способ — создать работу, строить и нанимать больше людей на каждый проект.\n\nМенее очевидный, но интригующий способ — стимулировать конкуренцию между этими молодыми людьми и заставить их согласиться на более низкую заработную плату. Это может принести значительный излишек в бюджет этого года."
 azrathani.105.a: "Приступим к строительству!"
 azrathani.105.b: "Снизить жалования."

 azrathani.106.t: "Дорожные пошлины"
 azrathani.106.desc: "С контролем над землёй приходит контроль над дорогами. А с контролем над дорогами — контроль над торговлей.\n\nМы должны облагать налогом торговлю, ведь нам нужны деньги для собственных начинаний. Вопрос в том, какие товары облагать налогом.\n\nБезусловно, наибольший спрос на основные товары. Даже наша элита, члены экспедиции и те местные землевладельцы, которые были здесь до нашего прибытия, могут позволить себе мало роскоши.\n\nЕсли мы обложим налогом основные продукты, мы выйдем на гораздо больший рынок, но мы поднимем их цены, и неизбежно пострадает часть бедного населения.\n\nЕсли же мы обложим налогом предметы роскоши, мы сможем избежать голода среди бедноты. Но их мало, и налог с них едва ли поможет."
 azrathani.106.a: "Мы обложим налогом роскошь."
 azrathani.106.b: "Мы обложим налогом продовольствие."

 azrathani.107.t: "Народ требует еды"
 azrathani.107.desc: "В прошлом году поставки зерна были невелики. Наши хранилища истощаются, а поля всё ещё лежат сухими и голыми.\n\nКогда цены на наших рынках растут, люди начинают требовать решений. Многие представители различных семей земли потребовали импортировать зерно из [Concept('sevenlands', 'Семи земель')|E], чтобы население не страдало.\n\nЭто будет недёшево, нам придётся не только покупать зерно по экстренным ценам, но и фрахтовать корабль для его доставки. Что мы могли бы сделать вместо этого — выкупить скудные запасы зерна в этой земле и распределить их среди людей.\n\nИли, возможно, нам стоит выкупить зерно и затем продать его населению по разумным ценам, едва превышающим себестоимость..."
 azrathani.107.a: "Импортировать зерно."
 azrathani.107.b: "Купить остатки и распределить."
 azrathani.107.c: "Почему бы нам не получить прибыль?"

 azrathani.108.t: "Народ требует оружия"
 azrathani.108.desc: "С тех пор как мы взяли эту землю под контроль, мы избегали рекрутирования из местного населения и скупали любое оружие, произведённое в наших поселениях и привезённое торговцами, чтобы вооружить экспедицию.\n\nЕстественно, дрэлы всё реже видят оружие, распространяемое среди них, как это было принято при племенной власти их ривов. Нам почти не нужно ополчение, и мы не доверили бы им сражаться против их бывших соотечественников.\n\nОни всё это понимают, но тем не менее чувствуют себя менее защищёнными. Нападения животных, личные распри и случайные злоупотребления властью нашими солдатами — вот некоторые из причин, приводимых в просьбе. Раздавать оружие порой враждебному населению неразумно. Это усложнит нам контроль над ними. Но это может быть полезно для завоевания доброй воли."
 azrathani.108.a: "Разумная просьба."
 azrathani.108.b: "Нет, для этого есть солдаты."
 azrathani.108.c: "Погодите, зачем им #EMP на самом деле#! нужно оружие?"

 azrathani.109.t: "Праздники?"
 azrathani.109.desc: "Сегодня со мной встречается группа местных лидеров, чтобы обсудить некоторые опасения по поводу дрэлов у нас на службе. По-видимому, они хотят работать меньше.\n\nОни объясняют, что в их культуре есть несколько дней в году, которые посвящены празднествам, и работа, если не срочная, в эти дни избегается.\n\nОни также объясняют, что никто не ожидал, что мы будем следовать этому обычаю, и они согласны, что это уже компенсируется оплатой золотом.\n\nНо, утверждают они, из-за этого наблюдается заметная деморализация их народа. Поэтому они просят, чтобы хотя бы на следующий год эти дни отдыха соблюдались."
 azrathani.109.a: "Понятно, мы можем пойти на уступки."
 azrathani.109.b: "Согласятся ли они на повышенное жалование?"
 azrathani.109.c: "Неподчинение? В темницу!"
 azrathani.109.c.tt: "Вы выкупаете лидеров за достаточную сумму денег."

 azrathani.110.t: "Скучающие солдаты"
 azrathani.110.desc: "Внезапно, когда я иду, я слышу крики, затем проклятия, затем звуки борьбы. Когда я бегу к месту суматохи, раздаётся ещё один пронзительный крик.\n\nЯ прибываю на место и вижу трёх солдат из моего гарнизона, стоящих над двумя дрэлскими женщинами, оплакивающими безжизненное тело старика. Один из моих солдат держит окровавленный меч. Женщины явно напуганы, и младшая из них поразительно похожа на старика.\n\nСолдат с окровавленным мечом начинает объяснять, что они разговаривали с молодой девушкой и флиртовали с ней. Она испугалась и закричала, что привлекло её отца откуда-то поблизости. Завязалась борьба, и старик был убит.\n\nСтаршая женщина требует наказать солдат."
 azrathani.110.a: "Наказание — смерть."
 azrathani.110.b: "Они будут оштрафованы."
 azrathani.110.c: "Я не могу подрывать их авторитет."

 azrathani.111.t: "Трудный случай"
 azrathani.111.desc: "Сегодня патруль привёл ко мне преступника. Они говорят, что дрэлский юноша, который уже подозревался в связях с опасной местной бандой, был пойман с поличным, в прямом смысле. Он только что вырезал семью поселенцев недалеко от Азралони, когда патруль наткнулся на него.\n\nЯ уже собираюсь приказать казнить его, когда один из моих слуг вбегает в комнату, говоря, что группа разгневанных дрэлцев только что прибыла ходатайствовать за этого человека.\n\n«Этот мальчик — мой сын», — утверждает старик, возглавляющий группу. «И я знаю в глубине души, что он невиновен в тех преступлениях, в которых вы, люди, его обвиняете. Это вы, захватчики, известны тем, что режете наш народ!» — группа согласно бормочет. «Я говорю вам! Это ваши люди учинили резню. А теперь моего мальчика приносят в жертву, как скот! Мы не потерпим этого. Люди узнают о этой несправедливости. И я не позволю вам забрать моего мальчика без боя!»"
 azrathani.111.a: "Довольно!"
 azrathani.111.a.tt: "Преступник казнён, старик заключён в темницу."
 azrathani.111.b: "Тогда забирайте его."
 azrathani.111.b.tt: "Вы отпускаете преступника."

 azrathani.112.t: "[spymaster.GetFirstNameNoTooltip] предлагает налоговую политику"
 azrathani.112.desc: "[spymaster.GetFirstName] встречает меня с широкой улыбкой на лице. У него появилась идея. Довольно хорошая, утверждает он. Чтобы одновременно решить наши недавние проблемы с населением и наши вечные денежные заботы.\n\n«Мы знаем, что в нашей земле зреет организованное сопротивление, всегда стремящееся подорвать экспедицию, всегда ищущее средства, оружие или способы посеять раздор. Под самым нашим носом есть осиное гнездо, а то и несколько. Это ясно. А как бороться с вредителями, если не перекрыть им еду?\n\nПусть они голодают, любая мысль о сопротивлении, о борьбе исчезнет из их маленьких сердец, и они будут благодарны за каждую крошку, которую мы им дадим.\n\nДавайте захватим поставки продовольствия и конфискуем активы всех подозрительных. Я могу справиться со всем этим сам, вам нужно только дать разрешение»."
 azrathani.112.a: "Я так не думаю."
 azrathani.112.b: "Хорошая идея, на самом деле."

 azrathani.113.t: "[priest.GetFirstNameNoTooltip] предлагает налоговую политику"
 azrathani.113.desc: "[priest.GetFirstName] сегодня явно чем-то [Select_CString(ROOT.Char.IsFemale, 'обеспокоена', 'обеспокоен' )].\n\n«Эти дикари никогда не примут истинный путь, [ROOT.Char.GetFirstNameNoTooltip]! Они совершенно упёрты в своём невежестве. Сегодня, когда я [Select_CString(ROOT.Char.IsFemale, 'попыталась', 'попытался' )] просветить одного из них, он имел наглость предположить, что я #EMP [Select_CString(ROOT.Char.IsFemale, 'равна', 'равен' )]#! им в глазах их бога! Чепуха!\n\nДаже сейчас, когда мы могли бы держать ногу у них на шее, они всё ещё думают, что [Concept('adunaic', 'адунайское')|E] превосходство — это просто красивая сказка, которую мы рассказываем себе, чтобы чувствовать себя лучше.\n\nЭто дикий народ, и его ещё нужно приручить. У меня есть как раз план, чтобы сломить их. И он идёт с бонусом — заработать немного золота. Стоит притеснять самых упёртых из них»."
 azrathani.113.a: "Что?! Это ужасная идея."
 azrathani.113.b: "Золото, говорите?"

 azrathani.114.t: "Коррупция"
 azrathani.114.desc: "В последние несколько недель я замечаю ухудшение наших государственных финансов. Хотя нет видимой причины для довольно серьёзного снижения доходов, она всё же есть.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )] к выводу, что кто-то в нашей администрации переправляет золото себе.\n\nСегодня я [Select_CString(ROOT.Char.IsFemale, 'нашла', 'нашёл' )] виновных. Группа старших дрэлских вельмож, доставшихся нам от предыдущей администрации, недовольных нашим присутствием здесь, сговорились присваивать как можно больше золота, а затем сбежать в племенные земли своего народа.\n\nОни были слишком жадны для своего же блага. Мы поймали их до того, как они смогли сбежать."
 azrathani.114.corrupt: "\n\nКогда я думаю об этом, мне приходит в голову довольно блестящая идея. Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы просто позволить им продолжать их козни, но с тем, чтобы золото поступало напрямую ко мне."
 azrathani.114.a: "Давайте работать вместе."
 azrathani.114.b: "Недопустимо."

 azrathani.115.t: "Засада!"
 azrathani.115.desc: "Когда я сегодня днём [Select_CString(ROOT.Char.IsFemale, 'направлялась', 'направлялся' )] к озеру, на меня напали несколько дрэлов в капюшонах. Это было не что иное, как покушение на мою жизнь.\n\nЯ истекаю кровью и [Select_CString(ROOT.Char.IsFemale, 'вынуждена', 'вынужден' )] повернуть назад и отступить. Но нападавшие повержены. Один из моих капитанов возвращается после разведки местности и говорит, что неподалёку, скрытый небольшой рощей, он нашёл деревянный дом.\n\nВ этом доме находятся несколько женщин и детей. Мой капитан уверен, что именно здесь планировалось нападение, и что семьи должны быть как-то вовлечены. Он спрашивает меня, что делать."
 azrathani.115.a: "Они не дали нож, отпустить их."
 azrathani.115.b: "Убить их."
 azrathani.115.c: "Они раскроют свои секреты."
 azrathani.115.d: "Пытать их, чтобы выяснить имена, а затем убить всех."

 azrathani.116.t: "Нападение на рудник"
 azrathani.116.desc: "Прошлой ночью в Лайкуриде было успешно совершено значительное нападение. Пытаясь вытеснить нас с этой земли, местные разрушили инфраструктуру и серьёзно подорвали производительную способность нашего поселения.\n\nЭто нелепый план отчаявшихся или откровенно немирных людей! Думающих, что мы уйдём, если нас заставят истекать кровью. Им придётся бороться с нами до победного конца, если нас хотят изгнать из этой земли!\n\nЭто нападение, таким образом, бесполезно и принесёт местным жителям только боль. Вопрос в том, как мы должны наказать дрэлов."
 azrathani.116.a: "Собрать зачинщиков и казнить их."
 azrathani.116.b: "Обложить город тяжёлым налогом."
 azrathani.116.c: "Еженедельные публичные казни в течение года."
 azrathani.116.d: "О, они #EMP заплатят#!."

 #Exploration events
 azrathani.201.t: "Исследование земли"
 azrathani.201.desc: "Это прекрасная земля, зажатая между Зелёными горами и морем, дикая и спокойная. Граничащая с [Concept('elven', 'эльфийским')|E] лесом $k_drel$, иногда эта земля кажется наполненной почти неестественным покоем. В эти дни птицы здесь кажутся менее торопливыми, чем в других местах, а холмы — более молодыми, вода — более освежающей, а воздух — более насыщенным.\n\nКрасота озера Нинакхас, чёрного и неподвижного, не имеет себе равных в [Concept('sevenlands', 'Семи землях')|E]. Туземцы говорят, что в нём живёт бог, и что он великий целитель."
 azrathani.201.a: "Пойдём уже."

 azrathani.202.t: "Хороший день для рыбалки"
 azrathani.202.desc: "Тихое, тёплое утро, когда я снова прихожу к озеру. Сегодня всё, кажется, движется с особенным спокойствием, только дальнее пение птиц и редкие всплески на воде.\n\nЯ чувствую сильное желание просто расслабиться и по-настоящему насладиться этим утром, насладиться рыбалкой.\n\nИ всё же всегда есть работа. В озере плещутся [ROOT.Char.Custom('GetRegionalFish')], и знаю, что [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы сэкономить на обеде, если поймаю достаточно."
 azrathani.202.a: "Просто расслабиться."
 lucky_find: "#P Вы поймали большую рыбу!#!"
 lucky_find_tt: "Вы поймали большую рыбу!"
 pleasant_day: "Вы провели приятный день"
 azrathani.202.b: "Постараться изо всех сил."
 try_hard: "#P Вы наслаждаетесь работой!#!"
 try_hard_tt: "Вы наслаждаетесь работой!"
 decent_haul: "У вас приличный улов"
 wasted_efforts: "Ваши усилия тщетны!"

 azrathani.203.t: "Богатства озера Нинакхас"
 azrathani.203.desc: "Озеро имеет большое религиозное значение для местного населения. Многие приходят сюда со всего полуострова, чтобы просить бога о его дарах исцеления. Целители приходят за мастерством, мужчины — за безопасным рождением детей, воины — перед битвой, пастухи — за свои стада, молодые женщины — за своих отцов, и так далее. Все они приносят дары богу, чтобы получить что-то взамен.\n\nЛегенда об озере давно утвердилась, и ходят слухи, что даже [Concept('elven', 'эльфийский')|E] король [Concept('cuind', 'куинд')|E] одаривал бога Легве.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы поискать некоторые из этих даров. Возможно, какие-то выбросило на берег, но самое впечатляющее, безусловно, находится под водой. Однако вода очень холодная."
 azrathani.203.a: "Осмотреться вокруг озера."
 azrathani.203.a.tt: "#P Вы можете найти ценности#!\n#N Или простудиться.#!"
 azrathani.203.a.a: "Вы находите оружие!"
 azrathani.203.a.b: "Вы находите красивую вещь"
 azrathani.203.a.c: "Вы находите... что-то..."
 azrathani.203.a.d: "Вы находите маленький мешочек монет"
 azrathani.203.a.e: "Вы находите что-то целебное!"
 azrathani.203.a.f: "Вы не чувствуете кончиков пальцев"
 azrathani.203.b: "Настоящие сокровища под водой."
 azrathani.203.b.tt: "#P Вы можете найти гораздо более ценные артефакты#!\n#N Но вода ледяная!#!"
 azrathani.203.b.d: "Вы находите мешочек монет"
 azrathani.203.b.g: "Вы находите что-то эльфийское!"
 azrathani.203.b.h: "Вы чуть не утонули!"

 azrathani.204.t: "Церемония на озере"
 azrathani.204.desc: "Сегодня небольшая группа дрэлов собралась на углу южного берега озера Нинакхас, чтобы провести одну из своих ритуальных церемоний омовения.\n\nУ женщин в волосах цветы, а мужчины поют глубокими голосами для бога озера. Некоторые из них купаются. Один молодой человек смело преодолевает течение озера с мешком вещей за спиной, чтобы бросить дары в глубокую воду.\n\nКогда я приближаюсь к группе, некоторые из местных с осторожностью приветствуют меня. Старик перестаёт петь и идёт ко мне. Когда мы встречаемся, он спрашивает, какова моя цель здесь."
 azrathani.204.a: "Дружелюбно спросить о церемонии."
 azrathani.204.b: "Заплатили ли ваши люди пошлину за использование озера?"

 azrathani.205.t: "Церемония на озере..."
 azrathani.205.desc: "Когда я приближаюсь к Нинакхасу, я вижу небольшую группу дрэлов, смотрящих прямо на меня с берега. Они выглядят организованными для церемонии, но не проводят обычных обрядов.\n\nКогда я приближаюсь, ко мне идёт мужчина средних лет. Он странный: его одежда грязная, борода растрёпана, а глаза дикие и глубокие. Но у него мирный вид и мудрый взгляд, когда он сосредотачивается. Он смотрит глубоко в мои глаза и говорит:\n\n«Мы ждали тебя, [lomizir.GetFirstNameNoTooltip]. Бог, живущий в Легве, попросил меня провести сегодня для тебя церемонию. Ты будешь [Select_CString(ROOT.Char.IsFemale, 'омыта', 'омыт' )] его благодатью, и мы попросим его благословить тебя. Есть ли у тебя дар для бога?»"
 azrathani.205.a: "Есть."
 azrathani.205.b: "Ха! Глупые суеверия."

 azrathani.206.t: "Чудо?"
 azrathani.206.desc: "[mystic.GetFirstName] велит мне взять мои монеты и несколько других артефактов, принесённых группой, в мешок и отнести их в глубокую воду как подношение богу Легве.\n\nКогда я плыву против течения, они начинают петь. Песня смешивается со звуком воды в моих ушах, создавая глубокую, мирную мелодию. Когда я отпускаю дары, песня переходит в зенит, чувство сожаления об утрате ценностей медленно превращается в глубокое ощущение осмысленности, когда я плыву обратно.\n\nКогда я достигаю берега, [mystic.GetFirstNameNoTooltip] помогает мне выйти из воды и целует меня в лоб. Я чувствую себя более сильным человеком."
 azrathani.206.a: "Необъяснимое ощущение."
 azrathani.206.b: "Не согласитесь ли вы работать на меня?"

 azrathani.207.t: "Снова в Лайкурид"
 azrathani.207.desc: "Лайкурид, Зелёные горы, как назвали их мои люди, всё ещё хранит много секретов. Сегодня я иду в поисках новых самоцветов.\n\nКогда я смотрю на коричневато-зелёные склоны горы, я размышляю о том, что это и есть причина, по которой мы пришли в это место. Не озеро, не местные и даже не постройка княжества. Просто история о богатствах горы позвала нас сюда. Амбиции [Concept('balan_lai', 'Балан-лай')|E] и наши собственные откликнулись на этот зов.\n\nНо довольно моих размышлений, мне нужно решить, какой путь выбрать в поисках самоцветов."
 azrathani.207.a: "Старая горная тропа."
 azrathani.207.b: "Нехоженая тропа."

 azrathani.208.t: "Вид с горы"
 azrathani.208.desc: "Я весь день [Select_CString(ROOT.Char.IsFemale, 'искала', 'искал' )] ценности в горных перевалах, поднимаясь всё выше. Когда день клонится к вечеру, я достигаю небольшого плато на скале.\n\nКогда солнце садится, я смотрю на свою землю. Тень горы уже простирается до самого озера Нинакхас, а вся земля между ними покрыта тьмой и туманом. Но солнце всё ещё светит на озеро и земли за ним глубоким, ярким, красным цветом. Зелёная трава и жёлтая земля жадно впитывают последние лучи солнца, а на поверхности чёрного озера появляются золотые пятна.\n\nЯ вижу далеко океан, темнеющий, и наше укрепление стоит перед ним, маленьким серым пятнышком на фоне его бескрайности."
 azrathani.208.a: "Какое красивое место."
 
 azrathani.209.t: "Старый храм?"
 azrathani.209.desc: "Когда я иду по горным тропам, я нахожу что-то необычное. Каменную дверь с вырезанными древними письменами. Это тёмное место, но меня почему-то тянет к нему.\n\nКогда я толкаю дверь, ясно, что здесь никого не было много лет, столетий. В стенах вырезаны статуи чудовищ, и аккуратно сложены кости. Склеп.\n\nТяжёлое чувство в сердце велит мне бежать."
 azrathani.209.a: "Злое место, но что в нём скрыто?"
 temple_valuables: "Вы находите много ценностей"
 finds_nothing: "Вы не находите ничего, кроме костей"
 become_mystic: "Вы находите... смысл?"
 azrathani.209.b: "Бежать!"
 manages_to_run: "Вы благополучно убегаете"

 azrathani.210.t: "Звук в лесу"
 azrathani.210.desc: "Это был тяжёлый день ходьбы, но не более того. Земля сегодня, кажется, пуста и нема. Я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] странного крестьянина, птицу или лису, но никаких возможностей заработать золото.\n\nПока я не слышу #EMP что-то...#! Шум в ближайшей лесистой местности. Когда я оборачиваюсь, я отчётливо слышу звук бегущего существа.\n\nНеизвестно, что наблюдало за мной, опасно или безвредно, и каковы были его намерения. Оно вполне могло охотиться на меня.\n\nИ всё же это был бесплодный день исследований. Если бы я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] принести добычу домой, это компенсировало бы потраченный день."
 azrathani.210.a: "Выследить и убить его, что бы это ни было."
 azrathani.210.b: "Я вернусь с охотниками."
 azrathani.210.c: "Оставить его в покое."
 didnt_find_animal: "#N Вы не находите животное#!"
 killed_animal_azrathani: "Ваша добыча - [ROOT.Char.Custom('GetAnimalTypeKill')]!"
 didnt_find_animal_tt: "Вы не находите животное"

 azrathani.211.t: "Ведьмовской шабаш"
 azrathani.211.desc: "Бродя по пересечённой местности, я слышу слабое завывание откуда-то поблизости. Это какая-то жуткая песня.\n\nКогда я ищу источник, я вижу дым, поднимающийся прямо из земли. Певица находится где-то ниже меня. Я обхожу и нахожу вход. Маленький, грязный проход, полный корней.\n\nЯ следую за ним, и песня становится громче, к ней присоединяются ещё два голоса. Впереди виден яркий свет костра. Проход открывается в маленькую комнату, где три местные женщины поют свою жуткую завывающую песню и бросают травы в огонь.\n\nЭто ведьмы!"
 azrathani.211.a: "Они должны много знать."
 talk_to_witches: "Вы ждёте и спрашиваете их о секретах"
 learn_from_witches: "Вы учитесь у ведьм"
 they_trick_you: "Вас обманули!"
 azrathani.211.b: "У них должны быть #EMP ценности#!."
 rob_the_witches: "Вы грабите их, забирая ценности"
 you_are_cursed: "Они проклинают вас!"

 azrathani.212.t: "Караван купцов"
 azrathani.212.desc: "Довольно необычное зрелище! Полностью загруженный караван из трёх мулов и четырёх суровых купцов направляется ко мне по этим редко посещаемым дорогам.\n\nСкорее всего, они опытны в своём деле. Вероятно, местные парни в одной из своих первых экспедиций.\n\nКогда они приближаются, я приветствую их. Неопытные купцы с хорошими товарами — это уникальная возможность заработать."
 azrathani.212.a: "Поторговаться с ними."
 successful_barter: "Вы заключаете выгодную сделку!"
 failed_barter: "Они переигрывают вас"
 azrathani.212.b: "Направить их в Азралони."
 azrathani.212.c: "Ограбить их."
 rob_merchants: "Вы грабите купцов!"
 linched_by_merchants: "Вас линчуют!"

