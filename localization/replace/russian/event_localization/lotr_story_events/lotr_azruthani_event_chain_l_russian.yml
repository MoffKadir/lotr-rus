l_russian:

 azrathani.001.t: "The State of the Expedition"
 azrathani.001.desc: "Two years ago we set out from Karasalas on three large chartered ships, filled with as many supplies and men as we could arrange for. Three scions from the princely families that financed our journey increased our numbers:\n\n[priest.GetFirstName], brother to the Prince of Alsarias.\n[spymaster.GetFullName], a great nephew of the Prince of Gimilêth.\nAnd, as always, our little cousin, [steward.GetFullName].\n\nWe have come to this land heavily indebted, with good part of the money spent before arriving. Thankfully what we had was enough to make [chief.GetFullNamePossessive] eyes glitter. He told us traders are hard to come by, and exploiting the deposit would not be worth it. His main concern was giving up the lake, Legwe. It seems to be a sacred place for his people. Our own men have come to call it Nînakhâs, the water chasm.\n\nAfter many months of labour we have finally erected a solid permanent fortification, but our financeers expect yearly interest, and their pay day draws near."
 azrathani.001.a: "The work must start already."
 hired_mercenaries: "The Expedition's Men"

 azrathani.002.t: "[chief.GetFirstNamePossessiveNoTooltip] Folly"
 azrathani.002.desc: "For too long I have watched [chief.GetFirstName] blunder his way about the leadership of our tribes, always myopic and grasping. I am ashamed to think I have even helped him mend his mistakes.\n\nBut now he has crossed an unforgivable line. Against my warnings, taking the counsel only of his unquencheable greed, he has sold a piece of our land to a foreigner. And not any foreigner, a $kharadunaim$, who likely has the support of the [balan_lai|E]. This cannot stand. To think they would be sated with one little piece of land! [chief.GetFirstNameNoTooltip] has been deceived by soft talk!\n\nEven his own power base, the $faith_good_pel$, are unhappy with him now, for he sold to the foreigners Legwe, their sacred lake. It is time I depose this fool, and take control of our people, to resist and expel the $kharadunaim$.\n\nMy brother, [general.GetFirstName], is united in purpose with me, and shall be our general in the trying times to come."
 azrathani.002.a: "I must act quickly!"

 azrathani.003.t: "[new_chief.GetFirstNamePossessiveNoTooltip] Coup"
 azrathani.003.desc.a: "As we approach [ROOT.Char.GetCapitalLocation.GetTitle.GetNameNoTier] again, I have started to notice the native people of the land having hushed discussions and looking towards us with worry and fear, in some I can even feel indignation.\n\nI finally approach one such group and ask what they are talking about.\n\nSeems that earlier today an envoy from [chief.GetFirstName] has gone through our lands, telling anyone who wished to hear about a coup against himself, the former [new_chief.GetTitleAsNameNoTooltip].\n\nSeemingly [new_chief.GetFirstName] was disgruntled at the former [new_chief.GetTitleAsNamePossessiveNoTooltip] decision to sell us the land, and has every intention of retaking it. Even some of the old [new_chief.GetTitleAsNamePossessiveNoTooltip] people are backing [new_chief.GetFirstNameNoTooltip], not wanting to entrust their sacred lake to our keeping."
 azrathani.003.desc.b: "[new_chief.GetFirstName] has always been a snake. Earlier today he declared me his enemy, and soon my people, without my knowledge, surrendered. Turncoats, the bunch of them.\n\nStill I have the money, and my tribe hasn't completely forsaken my authority. So I shall bide my time, and maybe one day I will rise again."
 azrathani.003.a: "This bodes danger."
 azrathani.003.b: "The traitor!"

 azrathani.004.t: "To the Mountains"
 azrathani.004.desc: "At long last we have finished building our headquarters. After a long year overseeing the natives under our employment and doing as much labour as we could in the construction, now we can finally go and take a look at this deposit.\n\n[chief.GetFirstName] showed me many emeralds that him and his people gathered there, and I was sufficiently convinced that the deposit is real, but I have not yet looked upon it.\n\nFor this journey I will need both a native guide and a translator, for I do not yet speak the language or know the land.\n\nI have been relying on [tutor.GetFirstName] since we first got here, in fact he was the translator during our negotiations with [chief.GetFirstNameNoTooltip], and I hired him as soon as they were over. He has told me of a tracker who has made the journey to the mountain many times, [guide.GetFirstName]. This shall be our guide in this journey."
 azrathani.004.a: "Now to find our riches."

 azrathani.005.t: "Lake Nînakhâs"
 azrathani.005.desc: "Here I look at the lake again. It is a beautiful sight. The dark waters stretch north as far as the eye can see and the land rises on its western banks. The eastern shore is misty and distant, but one can see mountains rising above the mist, and a rugged land rising to meet them.\n\nSome natives are taking one of their ceremonial baths at its southern shore. Here we stop and look at our guide, [guide.GetFirstName].\n\nHe says confidently that we must follow the bank to the north, to the feet of the mountains. And so we follow him.\n\nIt is a long trek through rugged terrain. But finally, just below the steep mountain walls, our guide finds a narrow passage eastward, almost carved into the mountain.\n\nLooking over the edge, it's a long fall to the lake."
 azrathani.005.a: "Don't look down."

 azrathani.006.t: "The Green Mountains"
 azrathani.006.desc: "After spending the night at the eastern shore of Nînakhâs, [guide.GetFirstNameNoTooltip] leads us towards a narrow path, winding back and forth through the side of the mountain.\n\nAs we go up, [tutor.GetFirstNameNoTooltip] tells us about the discovery. Some years ago there was a big rockslide down the mountain. A few youngsters in the tribe were curious about what had caused it and to see the destruction caused. When they returned to the tribe with gems, [chief.GetFirstName] organized a party to find as many gems as possible, and then again and again.\n\nWe finally come to a gentle down slope towards the valley. I know right away that a settlement could be founded here. As [steward.GetFirstName] and [brother.GetFirstName] measure out the land, I have the opportunity to look around for some of these scattered emeralds."
 azrathani.006.a: "What is easy to find?"
 azrathani.006.b: "I will climb and look for more!"
 big_find: "#P You fill a whole bag of emeralds!#!"
 some_gems: "You find some gems"
 one_gem: "You find one gem"
 lots_of_gems: "You fill a whole bag worth of gems!"
 you_fall: "You fall in the mountain!"
 seriously_hurt: "You are seriously hurt!"

 azrathani.007.t: "An Arrival!"
 azrathani.007.desc: "This morning we were greeted by a very unusual arrival to our little bay. Not the usual beat down merchant ships travelling to and fro the distant [ormal_bay|E], nor the odd ship from the [sevenlands|E] bringing us correspondence and supplies. A genuine flagship from the [GetDynastyByID('dynasty_erimrazor').GetName] fleet is anchoring in our little bay. As a few of the passengers approach in a small rowboat, I recognize among them [prince.GetFirstName].\n\nThis is good news!\n\nThe Imrazôrhîn scion steps out of the boat with a big smile on his face and hugs [brother.GetFirstName].\n\n\"My dear fellows, I am finally able to join the expedition, just as I promised. And I bring with me the delayed investment of my dear kinsmen, [uncle.GetFullName], with a generous repayment plan."
 azrathani.007.a: "Let us promote a new city!"
 azrathani.007.b: "A fortification, under our direct control."
 appoint_chancellor: "[prince.GetFirstName] will be appointed as your chancellor.#!"

 azrathani.008.t: "Ready to Begin Mining"
 azrathani.008.desc: "At last we have built the infrastructure neccessary to establish a permanent mining operation in Lâikurîd. It has been half a decade since we first arrived in this land, and the work only now begins.\n\nThe native officials on the growing mountain village already show to be divided by the [GetFaithByKey('faith_good_pel').GetName] and [GetFaithByKey('faith_drel').GetName] factions. The question arises of which of us should lead the city. It won't be [brother.GetFirstName], he's needed at my side.\n\nSo the candidates are: our little cousin, [steward.GetFirstName], ever loyal, and a competent administrator; [prince.GetFirstName], a friendly and capable man; [priest.GetFirstName], a weird and frankly dislikable man, but learned; and [spymaster.GetFirstName], a sinister man, who is sure to keep the populace in check."
 azrathani.008.a: "[steward.GetFirstNameNoTooltip], our loyal little cousin."
 little_cousin: "[steward.GetFirstNameNoTooltip] is the best administrator in the expedition."
 azrathani.008.b: "[prince.GetFirstNameNoTooltip], the princeling."
 princeling: "Appointing an Imrazôrhîn would show the Balân-Lâi the mine is in good hands."
 azrathani.008.c: "[priest.GetFirstNameNoTooltip], the preachy man."
 alsarias_brother: "[priest.GetFirstNameNoTooltip] is a learned man, if unlikable"
 azrathani.008.d: "[spymaster.GetFirstNameNoTooltip], the maniac."
 sociopath: "There is no telling what [spymaster.GetFirstNameNoTooltip] would do in charge. Certainly nothing good."

 azrathani.009.t: "One Year on the Job"
 azrathani.009.desc.intro: "[appointed.GetFirstName] has been mayor of our settlement in Lâikurîd for a year today. I have scheduled a meeting with him today to know of his policies and plans for the city. As well as how the native council is working with him and each other.\n\n"
 azrathani.009.desc.a: "[appointed.GetFirstNameNoTooltip] greets me warmly and procceeds to talk with enthusiasm about the financial situation of the city. Apparently he has managed a surplus all while expanding the infrastructure. This is much better than I expected!\n\nHe procceeds to explain that the factions of the Council are not happy with his heavy taxing policies, but he guarantees me that they begrudgingly recognize he is doing this for the good of the city."
 azrathani.009.desc.b: "[appointed.GetFirstNameNoTooltip] arrives late for our meeting. On his tail are half a dozen sycophants, both $kharadunaim$ and $drel$. He apologizes for being late, and guarantees me he earnestly desires to give me a full account of his policies, and apologizes again for not having much time.\n\nHe tells me anyone reasonable in the native Council likes and respects him. Unfortunately, he says, the majority in the Hudu-Kai faction are not reasonable. Furthermore, he has embelleshing the city and has brought a number of such especialists from the [sevenlands|E]."
 azrathani.009.desc.c: "[appointed.GetFirstNameNoTooltip] has a wild look in his face as he arrives to our meeting. He does not want to disclose how he was hurt in the face, but as he talks about the native Council I can quickly see he is widely disliked by them, and there are a couple candidates for having punched him.\n\n\"There is a natural order to things.\" He says. \"One must simply know one's place in the grand order, and then follow one's instincts - which should always be honed - and one shall be revealed by Êru on how to order all things out of place. Thus have I strived.\""
 azrathani.009.desc.d: "[appointed.GetFirstNameNoTooltip] invites me to talk over lunch. I try to get answers out of him as he works through a roasted chicken. Every so often he stares at me with a sarcastic look, and goes back to his chicken.\n\nFinally, as the meal comes to an end, I press him again to give me some report on his doings.\n\n\"It's simple is it not? If one is to rule one must be feared. Fear is primal, fear will keep one in power. Respect, loyalty, all gives way to fear. There is no difference between the Council and the people. They are all frightened cattle.\""
 azrathani.009.a: "This is why I chose [appointed.GetFirstNameNoTooltip]."

 azrathani.010.t: "The Great Mine of Azrathâni"
 azrathani.010.desc: "Today is the day we have dreamt of since arriving in this land. Today the mines of Lâikurîd have reached full maturity.\n\nWe have long hoped, and ever since we first delved into this mountain have had some reason to believe, that there may be a near inexhaustible deposit of emeralds hidden in the mountain.\n\nNow we shall put that theory to the test. Not one mine shaft, but several, at various levels of the mountain, have been delved. The mine has, in fact, absorbed our settlement and grown into a fully realized mining complex."
 azrathani.010.a: "Let the wealth flow!"

 azrathani.011.t: "The Realm of Azrathâni"
 azrathani.011.desc: "For years now the expedition has laboured in this land. And although we came with the official purpose of bringing the mine into fruition, the management of the people and the land has by far been our greatest challenge. Both the independent tribes, and our own natives have spilled our blood.\n\nBut that seems now to be behind us. With all tribes completely under my control, and the people of this land finally starting to recognize me as its rightful ruler, the feeling of a new day dawning has been growing in my heart and by now it feels palpable.\n\nToday, an envoy from the [sevenlands|E] has arrived, proclaiming that the Princes of the [balan_lai|E] are happy enough to acknowledge me as the ruler of this land, although not yet as one of them.\n\nThe new day is here. No longer will I be an outsider looking to exploit this land, having to deal with competing authorities.\n\nToday and to the day of my death I am, ultimately, the law of this land."
 azrathani.011.a: "The dawn of better days."
 ends_azrathani_story: "Ends the Azrathâni Expedition Story"

 azrathani.013.t: "The Azrathâni Expedition"
 azrathani.013.desc: "Little more than a year ago, a $kharadunaim$ expedition, led by [expeditionary.GetFirstName] and [brother.GetFirstName], disembarked in [GetTitleByKey('c_gidwama').GetNameNoTier]. They were successful in negotiating a lease on the land with [GetTitleByKey('d_metkharan').GetHolder.GetFirstName], and have been busy building up their headquarters since.\n\nI have been informed there is some concern among the [balan_lai|E] that I will take advantage of this moment of weakness in the southern duchy to increase my power over the land. Of course, I have no use for the land and I am far too busy with my own projects.\n\nIf I were to promise not to invade the land for a long period to come, the Princes, natives and expeditionaires would feel safer, and grateful.\n\nOr I could keep silent, and not promise anything."
 azrathani.013.a: "Let people know I want peace."
 azrathani.013.b: "I will keep silent."
 TRUCE_PROMISED: "Terilaen has promised to not interfere with the Azrathâni Expedition."

