 hazard_warning: "#N This will reduce native acceptance by 1#!"
 hazard_warning_2: "#N This will reduce native acceptance by 2#!"
 hazard_easing: "#P This will increase native acceptance by 1#!"
 hazard_easing_2: "#P This will increase native acceptance by 2#!"
 hazard_warning_tt: "It angers the native population"
 hazard_easing_tt: "It pleases the native population"
 native_resistance_army: "The $drel$ Militia"

 azrathani.101.t: "A Great Harvest!"
 azrathani.101.desc: "As the $drel$ people gather this year's harvest, we can see it is already the greatest harvest in recent memory, it has filled most of our storage and there's still much more to be gathered.\n\nThis is a great providence, and it could prove a saving boon to the expedition.\n\nThe people are in a joyful mood, as they work hard and eagerly on the fields. The custom of the land is throwing feasts to thank the god's providence whenever a great harvest happens, and the people are already looking forward to them. Of course, it wouldn't really be the economical choice to waste our hard earned food in celebrations, and I have my debts to mindful of."
 azrathani.101.a: "The people shall enjoy the harvest!"
 azrathani.101.b: "Make hay while the sun shines."

 azrathani.102.t: "Native Festivals"
 azrathani.102.desc: "The native $drel$ people are feeling happy and secure enough with our rule over this land that they are losing their inhibitions and organizing ever larger religious ceremonies, especially by the shores of lake Ninakhâs, which they call Legwe.\n\nNow, I am told, we are entering a period of traditional festivals, and we expect this year's festivals to be larger than ever. One could say it is heartening to see such confidence in our rule. This is what we worked for. And yet, one could also say that this is an unprecedented opportunity of making some more money out of this people.\n\nWe are expected to get involved somehow, either we promote and help fund these festivals or we make the unpopular choice of raising funding from the attendants, and maybe raise a bit more than needed..."
 azrathani.102.a: "We shall promote the festivities."
 azrathani.102.b: "We will tax these feasts."

 azrathani.103.t: "[steward.GetFirstNameNoTooltip] Proposes Two Yearly Budgets"
 azrathani.103.desc: "[steward.GetFirstName] meets with me today to discuss the yearly budget. He tells me we have a great opportunity this year.\n\nDue to quite a few coincidental surpluses on the budget this last year, we are able to project a budget that will not just carry us through the next year but actually change our material situation.\n\nHe proposes two ways for achieving it. One would see the money reinvested into the land, incentivizing settlement and enterprises by the native population. The other plan is to use these surpluses to get some liquidity, and maybe pay some debts."
 azrathani.103.a: "Development."
 azrathani.103.b: "Money."

 azrathani.104.t: "[diplomat.GetFirstNameNoTooltip] Discusses Propaganda"
 azrathani.104.desc: "[diplomat.GetFirstName] approaches me today to discuss the fine art of propaganda. He tells me he has been studying how exactly to better the expedition's standing.\n\n\"See, the essence of this mission is one of economic extraction, pure and simple. We have come to tap the riches of the mountain and become wealthy.\n\nThis is a noble cause, for wealth is being created into the world and we are merely the agents of this creation. If we make people look at us this way, we will have conquered their good-will.\n\nUnfortunately, we cannot build such a narrative that we are both here to improve the lives of the natives and to extract as much wealth as possible for our benefactors in the [sevenlands|E]. Thus a choice is needed.\""
 azrathani.104.a: "The natives."
 azrathani.104.b: "The Princes."

 azrathani.105.t: "Surplus of Labour"
 azrathani.105.desc: "This year we are seeing many young men join the workforce. An increasing number of them has been loitering around Azralôni seeking gainful employment.\n\nThis is, of course, a sign of prosperity and it shows that the native population is starting to see us as a reliable source of wealth.\n\nAnd yet, we did not count on this boom and now we must deal with this unexpected workforce.\n\nThe obvious way to go about this is creating work, building and employing more people to work on each project.\n\nA less obvious, and yet intriguing way, would be to foster competition between these young men, and force them to accept lower wages. This could generate a significant surplus in this year's budget."
 azrathani.105.a: "Let us build!"
 azrathani.105.b: "Drive wages down."

 azrathani.106.t: "Road Tolls"
 azrathani.106.desc: "With control of the land comes control of the roads. And with control of the roads comes control of trade.\n\nWe should tax trade, for we need the money for our own endeavours. The question is what products we should tax.\n\nBy far the greatest demand is for basic goods. Even our elite, the expedition members and whatever land owning natives there were when we arrived, can afford little luxury.\n\nIf we were to tax basic products we would tap into a much bigger market, but we would be pushing their prices higher, and inevitably some of the poorer population would suffer.\n\nIf we were to tax luxury products, on the other hand, we would make sure to avoid starving the poorer people. But they are hard to come by and the taxation would barely help."
 azrathani.106.a: "We will tax luxury."
 azrathani.106.b: "We will tax food."

 azrathani.107.t: "The People Demand Food"
 azrathani.107.desc: "The supply of grain this past year has not been great. Our storages have been dwindling and the farmland still lies bare and dry.\n\nAs the prices rise in our markets, the people have started demanding solutions. Many representatives of the various families of the land have demanded we import grain from the [sevenlands|E], lest the population suffers.\n\nThis would not be cheap, we would need not only have to buy the grain at emergency prices, but also charter a ship to bring it over. What we could do, otherwise, is buy out the meager grain storages of the land and ration it to the people.\n\nOr, maybe, we should buy out the grain and then sell it back to the population, at reasonable prices of course, barely above cost..."
 azrathani.107.a: "Import the grain."
 azrathani.107.b: "Buy what remains and ration."
 azrathani.107.c: "Why shouldn't we make a profit?"

 azrathani.108.t: "The People Demand Weapons"
 azrathani.108.desc: "Since we have taken over this land we have avoided recruiting from the local populace, and we have been buying any weapons produced in our settlements, and brought by traders to arm the expedition.\n\nSo naturally the $drel$ people are seeing less and less weapons distributed among them, as was the custom under the tribal authority of their Rîwa. We have little need for the militia, and we wouldn't trust them to fight against their old compatriots.\n\nThey understand all of this, but nonetheless they are feeling less secure. Animal attacks, personal feuds and our own soldier's occasional abuse of power are some of the reasons cited for the request. Giving weapons to an, at times, hostile population is not wise. It would make our job to control them much harder. But it might be good to build goodwill."
 azrathani.108.a: "A reasonable request."
 azrathani.108.b: "No, that's what soldiers are for."
 azrathani.108.c: "Wait, why do they #EMP really#! want weapons?"

 azrathani.109.t: "Holidays?"
 azrathani.109.desc: "A party of native leaders meets with me today to discuss some concerns about $drel$ people in our employment. Apparently they wish to work less.\n\nThey explain that in their culture there are several days in the year which are dedicated for celebrations and work, unless urgent, is avoided.\n\nThey further explain that no one expected us to follow this custom, and they agree this is already compesated by payment in gold.\n\nBut, they argue that there has been a noticeable demoralization of their people due to this. So they request that at least for the following year these days of rest be respected."
 azrathani.109.a: "Understandable, we can play nice."
 azrathani.109.b: "Would they accept increased pay?"
 azrathani.109.c: "Insubordination? To the dungeon!"
 azrathani.109.c.tt: "You ransom the leaders with enough money to pay."

 azrathani.110.t: "Bored Soldiers"
 azrathani.110.desc: "Suddenly, as I walk about, I hear screams, followed by curses, followed by sounds of struggle. As I run towards the comotion, there is another, piercing, scream.\n\nI arrive at the scene to find three soldiers from my garrison standing over two $drel$ women grieving over an old man's lifeless body. One of my soldiers holds a bloody sword. The women are clearly scared, and the younger one holds a striking resemblance to the old man.\n\nThe soldier with the bloody sword starts explaining that they were talking to the young lady and flirting with her. She got scared and screamed, which brought her father from somewhere nearby. A struggle followed and the old man was killed.\n\nThe older woman demands that the soldiers be punished."
 azrathani.110.a: "The punishment is death."
 azrathani.110.b: "They will be fined."
 azrathani.110.c: "I cannot undermine their authority."

 azrathani.111.t: "A Hard Case"
 azrathani.111.desc: "A criminal has been brought before me by the patrol today. They tell me that the young $drel$ man, who was already suspected of consorting with a dangerous local gang, was caught red handed, quite literally. He had just slaughtered a family of homesteaders not far from Azralôni when a patrol ran into him.\n\nI am about to order his execution when one of my servants rushes into the room saying a group of angry $drel$ people, just arrived to plead for the man.\n\n\"This boy is my son.\" Alleges the old man leading the group. \"And I know in my heart he is innocent of whatever crimes you people would accuse him of. It is you, the occupiers, who have been known to slaughter our people!\" The group murmurs in agreement. \"I tell you! 'Twas your men who did the slaughter. And now my boy is being sacrificed like a farm animal! We shall not stand for this. The people will know of this injustice. And I will not let you take my boy without a fight!\""
 azrathani.111.a: "Enough!"
 azrathani.111.a.tt: "The criminal is executed, and the old man imprisoned."
 azrathani.111.b: "You have him then."
 azrathani.111.b.tt: "You let the criminal go."

 azrathani.112.t: "[spymaster.GetFirstNameNoTooltip] Proposes Tax Policy"
 azrathani.112.desc: "[spymaster.GetFirstName] meets me with a wide smile in his face. He has had an idea. A quite good one, he affirms. To both deal with our recent troubles with the population and our ever present money concerns.\n\n\"We know there is organized resistance brewing in our land, ever seeking to undermine the expedition, ever looking for funds, or weapons, or to sow dissent. There is a nest of rats, or several, under our very noses. This much is clear. And how should we deal with pests but cut their food?\n\nShould they starve any notion of resistance, of fighting, will be gone from their little hearts, and they will be thankful for each crumble we give them.\n\nLet us seize the supply of food, and seize the assets of anyone suspicious. I can handle all of that myself, you need only give me the permission.\""
 azrathani.112.a: "I don't think so."
 azrathani.112.b: "Good idea, actually."

 azrathani.113.t: "[priest.GetFirstNameNoTooltip] Proposes Tax Policy"
 azrathani.113.desc: "[priest.GetFirstName] is clearly bothered by something today.\n\n\"These savages will never embrace the true way, [ROOT.Char.GetFirstNameNoTooltip]! They are completely stubborn in their ignorance. Today, as I tried to enlighten one of them, he had the audacity to suggest to me I am #EMP equal#! to them in the eyes of their god! Nonsense!\n\nEven though we, right now, could have our boots in their necks, they still seem to think [adunaic|E] superiority is just a fancy tale we tell ourselves to feel better.\n\nThis is a wild people, and they still need domestication. I have just the plan to break them. And it comes with the bonus of making some gold too. Let us oppress the more stubborn among them.\""
 azrathani.113.a: "What?! This is a terrible idea."
 azrathani.113.b: "Gold, you say?"

 azrathani.114.t: "Corruption"
 azrathani.114.desc: "The last few weeks I have been noticing a worsening of our public finance. Even though there is no apparent reason for the somewhat severe decrease in income, still there is one.\n\nI have come to the conclusion that there is, somewhere in our administration, someone funneling gold for themselves.\n\nToday, I have found the culprits. A group of senior $drel$ officials we inherited from the previous administration, disgruntled by our presence here, have colluded to embezzle as much gold as possible and then escape to the tribal lands of their people.\n\nThey have been too greedy for their own good. We have caught them before they could escape."
 azrathani.114.corrupt: "\n\nAs I think about this, a reasonably brilliant idea occurs. I could just make them continue their scheme, but funneling the gold directly to me."
 azrathani.114.a: "Let us work together."
 azrathani.114.b: "Unacceptable."

 azrathani.115.t: "Ambush!"
 azrathani.115.desc: "As I was making my way to the lake this afternoon, I was jumped by several hooded $drel$ men. It was nothing short of an attempt at my life.\n\nI am bleeding and I must turn back and retreat. But the ambushers are vanquished. One of my captains now returns from scouting the area, and says he has found a wooden house hidden by a small patch of trees nearby.\n\nIn this house there are a few women and children. My captain is sure this is where they plotted the attack, and that the families must be involved somehow. He asks me what shall be done."
 azrathani.115.a: "They did not yield the knife, let them go."
 azrathani.115.b: "Kill them."
 azrathani.115.c: "They will give up their secrets."
 azrathani.115.d: "Torture them for more names, and then kill all."

 azrathani.116.t: "An Attack on the Mine"
 azrathani.116.desc: "Last night a signnificant attack was successfully carried out in Lâikurîd. In an attempt to push us off this land, the natives have destroyed infrastructure and seriously hampered the productive capacity of our settlement there.\n\nThis is a ridiculous plan by a desperate, or outright unmartial, people! Thinking we would go away if we were made to bleed. They will have to struggle us into the ground if we are to be expelled from this land!\n\nThis attack is, thus, futile and will only bring the natives pain. The question is how should we punish the $drel$ people."
 azrathani.116.a: "Round up the agitators and kill them."
 azrathani.116.b: "A heavy tax levied on the city."
 azrathani.116.c: "Weekly public executions for a year."
 azrathani.116.d: "Oh, they #EMP will#! pay."

 #Exploration events
 azrathani.201.t: "Explore the Land"
 azrathani.201.desc: "This is a beautiful land, pressed between the Green Mountains and the sea, wild and calm. Bordering the [elven|E] forest of $k_drel$, some times this land seems filled with an almost unnatural peace. These days the birds seem less hasty than elsewhere, and the hills younger, the water more refreshing and the air richer.\n\nThe beauty of Lake Ninakhâs, black and still, is unparalleled in the [sevenlands|E]. The natives say a god lives in it, and that he is a great healer."
 azrathani.201.a: "Let's go already."

 azrathani.202.t: "A Nice Day for Fishing"
 azrathani.202.desc: "It is a quiet, warm morning as I come to the lake again. Today everything seems to be moving with a peculiar calm, there's only the distant singing of birds and the occasional splash on the water.\n\nI feel a great desire to just relax, and really enjoy this morning, and enjoy my time fishing.\n\nAnd yet, there is always work to be done. I have seen some [ROOT.Char.Custom('GetRegionalFish')] today, and I know I could save on the dinner provisions if I were to catch enough of them."
 azrathani.202.a: "Just relax."
 lucky_find: "#P You catch a big fish!#!"
 lucky_find_tt: "You caught a big fish!"
 pleasant_day: "You have a nice day"
 azrathani.202.b: "Try your hardest."
 try_hard: "#P You enjoy the work!#!"
 try_hard_tt: "You enjoy the work!"
 decent_haul: "You make a decent haul"
 wasted_efforts: "Your efforts are for naught!"

 azrathani.203.t: "The Riches of Lake Ninakhâs"
 azrathani.203.desc: "The lake is of major religious significance to the natives. Many come here from all over the peninsula to beg the god for his healing gifts. Healers come to ask for skill, men come to ask for their children to be delivered safely, warriors come before battle, herders come for their herds, young women for their fathers, and so on and so forth. All of them bear gifts for the god, so they may receive another back.\n\nThe legend of the lake has long been established, and there are rumours that even the [elven|E] king of the [cuind|E] has gifted the god of Legwe.\n\nI could look for some of these gifts. Some may have washed up on the shores, but the most impressive stuff will surely be underwater. The water is very cold though."
 azrathani.203.a: "Look around the lake."
 azrathani.203.a.tt: "#P You might find valuables#!\n#N Or get a cold.#!"
 azrathani.203.a.a: "You find a weapon!"
 azrathani.203.a.b: "You find a pretty thing"
 azrathani.203.a.c: "You find... something..."
 azrathani.203.a.d: "You find a small bag of coins"
 azrathani.203.a.e: "You find something medicinal!"
 azrathani.203.a.f: "You cannot feel your finger tips"
 azrathani.203.b: "The real treasures are underwater."
 azrathani.203.b.tt: "#P You might find much more valuable artifacts#!\n#N But the water is freezing!#!"
 azrathani.203.b.d: "You find a bag of coins"
 azrathani.203.b.g: "You find something elven!"
 azrathani.203.b.h: "You almost drowned!"

 azrathani.204.t: "A Ceremony on the Lake"
 azrathani.204.desc: "Today a small group of $drel$ people have gathered on a corner of the southern shore of Lake Ninakhâs to perform one of their bathing ceremonies.\n\nThe women have flowers in their hair and the men are singing for the god of the lake in their deep voices. Some of them are bathing. One young man braves the currents of the lake with a bag of items on his back, to drop the gifts in the deep water.\n\nAs I approach the group, I am cautiously greeted by some of the natives. An old man stops singing and walks towards me. As we meet, he asks me what is my intent here."
 azrathani.204.a: "Amicably ask about the ceremony."
 azrathani.204.b: "Have your people paid the toll to use the lake?"

 azrathani.205.t: "A Ceremony on the Lake..."
 azrathani.205.desc: "As I approach Ninakhâs, I see a small group of $drel$ people looking straight at me from the shore. They seem organized for a ceremony, but they are not doing the usual rites.\n\nAs I approach, a middle aged man comes towards me. He is a weird one, his clothes are dirty, his beard dishevelled and his eyes wild and deep. But he has a peaceful semblance, and a wise look when he focus. He looks deeply into my eyes, and says:\n\n\"We have been expecting you, [lomizir.GetFirstNameNoTooltip]. The god who lives in Legwe has asked me to perform a ceremony for you today. You shall be bathed into his grace, and we shall ask for him to bless you. Do you have a gift for the god?\""
 azrathani.205.a: "I do."
 azrathani.205.b: "Hah! Silly superstitions."

 azrathani.206.t: "A Miracle?"
 azrathani.206.desc: "[mystic.GetFirstName] instructs me to take my coins and a few other artifacts the group has brought in a bag and take it to the deep water, as an offering for the god of Legwe.\n\nAs I swim against the current they begin to sing. The song mixes with the sound of the water in my ears to create a deep, peaceful, melody. As I release the gifts the song goes into a crescendo, a feeling of regret at letting go of the valuables slowly turns into a deep feeling of meaningfulness as I swim back.\n\nWhen I arrive at shore, [mystic.GetFirstNameNoTooltip] helps me out of the water and kisses my forehead. I feel like a stronger man."
 azrathani.206.a: "An unexplainable experience."
 azrathani.206.b: "Would you be willing to work for me?"

 azrathani.207.t: "Once more up Lâikurîd"
 azrathani.207.desc: "Lâikurîd, the Green Mountains, as my men have named them, still holds many secrets to be found. Today I come in search of more gems.\n\nAs I look up the brownish green slopes of the mountain I reflect on how this is the reason why we came to this place. Not the lake, the natives, or even to build a princedom. But simply a story about the riches of the mountain called us here. The [balan_lai|E]'s and our own ambitions harkened the call.\n\nBut enough of my wonderings, I need to decide what path to take in my search for gems."
 azrathani.207.a: "The old mountain path."
 azrathani.207.b: "An unthreaded path."

 azrathani.208.t: "A View from the Mountain"
 azrathani.208.desc: "I have been searching for valuables all day through the mountain passes, ever climbing higher. As the day grows late, I reach a small plateau on the rock.\n\nAs the sun goes down, I look towards my land. The shadow of the mountain already stretches all the way towards lake Ninakhâs, with the whole rising land in between covered by darkness and mists. But the sun still shines on the lake and the lands beyond, in a deep, vivid, red. The green grass and yellow earth drink the last rays of sun eagerly, and the black lake has shining golden patches on it's surface.\n\nI can see far away the ocean, turning dark, and my fortification stand before it, a small speck of grey rock against its vastness."
 azrathani.208.a: "What a beautiful place."
 
 azrathani.209.t: "An Old Temple?"
 azrathani.209.desc: "As I walk through the mountain paths, I find something peculiar. A stone door, carved with old letters. This is a dark place and yet I feel weirdly attracted to it.\n\nAs I push the door it is clear no one has been here for many years, centuries. There are beastly statues carved into the mountain walls, and bones neatly stored. A sepulchre.\n\nA heavy feeling in my heart tells me to run away."
 azrathani.209.a: "An evil place, but what does it hold?."
 temple_valuables: "You find many valuables"
 finds_nothing: "You find nothing but bones"
 become_mystic: "You find... meaning?"
 azrathani.209.b: "Run!"
 manages_to_run: "You run away safely"

 azrathani.210.t: "A Sound in the Woods"
 azrathani.210.desc: "This has been a labourious day of walking, but not much else. The land is empty and dumb today, it seems. I have seen the odd peasant, bird or fox, but no opportunities whatsoever to make some gold.\n\n Until I hear #EMP something...#! A rush in a nearby wooded area. As I turn around, I make out the clear sound of a creature running.\n\nThere is no telling what was watching me, dangerous or harmless, and what was it's intentions with me. It may well be hunting me.\n\nAnd yet, this has been a fruitless day of exploration.If I could bring a catch home, it would make up for the wasted day."
 azrathani.210.a: "Stalk and kill it, whatever it is."
 azrathani.210.b: "I will return, with hunters."
 azrathani.210.c: "Leave it be."
 didnt_find_animal: "#N You do not find the animal#!"
 killed_animal_azrathani: "You've killed the [ROOT.Char.Custom('GetAnimalTypeKill')]!"
 didnt_find_animal_tt: "You do not find the animal"

 azrathani.211.t: "A Witch Convenant"
 azrathani.211.desc: "Walking about the rugged land, I hear a faint ululating sound from somewhere nearby. It is some kind of eery song.\n\nAs I look for the source, I see smoke rising from the ground itself. The singer is below me, somewhere. I walk around until I find an entrance. A small, dirty, passage, full of roots.\n\nI follow it as the song grows louder, and two other voices join in. There is the clear light of a fire ahead of me. The passage opens into a small room, where three native women sing their eery ululating song and throw herbs into a fire.\n\nThese are witches!"
 azrathani.211.a: "They must know things."
 talk_to_witches: "You wait and ask them about their secrets"
 learn_from_witches: "You learn from the witches"
 they_trick_you: "You are tricked!"
 azrathani.211.b: "They must #EMP own#! things."
 rob_the_witches: "You rob them of their valuables"
 you_are_cursed: "They curse you!"

 azrathani.212.t: "A Merchant Train"
 azrathani.212.desc: "Quite the unusual sight! A fully loaded merchant train of three mules and four austere merchants comes towards me in these seldom travelled roads.\n\nThese are most likely experienced in the profession. Probably local boys in one of their first expeditions.\n\nAs they approach, I hail them. Inexperienced merchants with good products makes for a unique opportunity to make money."
 azrathani.212.a: "Barter with them."
 successful_barter: "You get a bargain!"
 failed_barter: "They get the better of you"
 azrathani.212.b: "Direct them to Azralôni."
 azrathani.212.c: "Rob them."
 rob_merchants: "You rob the merchants!"
 linched_by_merchants: "You get linched!"

