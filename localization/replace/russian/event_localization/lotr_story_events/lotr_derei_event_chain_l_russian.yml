l_russian:

 derei.1000.t: "В поисках советов"
 derei.1000.desc: "Я получил власть в свои руки. Теперь только от меня зависит, что будет лучше для населения #ONCLICK:TITLE,d_gimileth #TOOLTIP:LANDED_TITLE,d_gimileth #L Гимилета#!#!#!, и по каким путям мне следует идти. Это ужасающая перспектива. Несмотря на то, что [terilaen.GetFirstName] действительно вырастил меня правителем, осознание этого ошеломляет.\n\nЯ не считаю, что должен тратить свою жизнь на то, чтобы решать мелкие вопросы без плана. Мудрый правитель строит планы на будущее, следует выбранному пути, но мои инстинкты подсказывают мне, что им нельзя доверять, и моё сердце молчит."
 derei.1000.a: "Мне нужен совет."

 derei.1001.t: "Чертоги куинд"
 derei.1001.desc: "Когда я въезжаю в этот великий город [Concept('cuind', 'куинд')|E], после нескольких дней путешествия по густому лесу, я вижу своего наставника в лице его величества. Редкое зрелище для [Concept('conceptracemen', 'людей')|E]. Я задаю ему вопросы, которые не дают мне покоя: кем я должен стать? Как я должен править? Как вести себя с другими принцами?\n\n«Мой юный ученик, ты получишь совет, какой пожелаешь, а также руководство, и мои наставления тебе уже известны. Я твой наставник и, возможно, даже твой друг, но я не принадлежу к числу людей, несмотря на долгие годы моего обучения. Я не могу руководить твоими мечтами или тем, к чему ты должен стремиться в этой жизни…»\n\n«Благородное сердце - это тот, кто желает пролить свет на этот мрачный мир, но разве твоё благородное сердце не является частью благородства? Тебе надоело играть в игры? Твоим коллегам - нет. Интриги и очарование, которыми они пользовались веками. Как молодой человек становится взрослым среди детей? Как благородному сердцу удается избегать атрибутов благородства? Возможно, они не могут. Это твоя загадка, которую тебе предстоит разгадать. Перед тобой открыт весь мир, мой дорогой подопечный»."
 derei.1001.a: "Есть о чём подумать..."
 derei.1001.a.toast: "Дэрай обратился к вам за советом, а вы загадали ему загадку!"

 derei.1002.t: "Обращение к принцам: Город Урулони"
 derei.1002.desc: "Этот великий и древний город служит резиденцией самой престижной княжеской семьи [Concept('balan_lai', 'Балан-лай')|E], Имразорин. Их предок по прямой линии - великий [imrazorI.GetFirstName], принц Зимратани, чьим дедом был [zimrathon.GetFirstNameNicknamedRegnal], король [Concept('numenor', 'Нуменора')|E]. Здесь меня встречает его наследник, [phorakon.GetName].\n\nСтарик обращается со мной по-доброму, почти по-отечески, но до дружелюбия ему далеко. Этот человек давно привык к просителям, к тому, что он выше своих коллег, первый среди равных. Высокомерие смягчается великодушием. Я могу здесь кое-чему научиться."
 derei.1002.a: "Старика можно склонить на свою сторону."
 derei.1002.a.success: "Старик отнёсся к вам хорошо"
 derei.1002.a.failure: "Он почти не слушает"
 derei.1002.a.toast: "Дэрай - очаровательный юноша!"
 derei.1002.b: "Я должен узнать как можно больше."
 derei.1002.b.success: "Он даёт вам много полезных советов"
 derei.1002.b.failure: "Вы задали не те вопросы!"

 derei.1003.t: "Обращение к принцам: Жемчужина Юга"
 derei.1003.desc: "Я приехал в Карасалас, где меня ждёт [arimith.GetName], прекрасная принцесса, которую иногда называют «Жемчужиной Южных земель». Это край лесов и равнин, где много процветающих ферм. Здесь довольно красиво.\n\nКогда меня допустили в зал её совета, она всё ещё занималась какими-то мелкими делами. Я поражён её компетентностью, она обладает обширными знаниями даже в самых незначительных вопросах своей державы и предлагает практические действия, используя как можно меньше слов. Перед нами трудолюбивая, дисциплинированная правительница. Я не могу не восхищаться ею.\n\nКогда она, наконец, обращает своё внимание на меня, взгляд у неё проницательный, но отстранённый. Совершенно противоположно Форакону. Старик говорил как отец и слушал как измученный король, эта принцесса уделяет мне всё своё внимание, но без теплоты."
 derei.1003.a: "Я должен приложить усилия, чтобы наладить отношения."
 derei.1003.a.success: "Она наслаждается беседой"
 derei.1003.a.failure: "Она выглядит скучающей"
 derei.1003.b: "Обсудим правление."
 derei.1003.b.success: "У неё есть много хороших идей для Гимилета"
 derei.1003.b.failure: "Она сбита с толку вашими вопросами"

 derei.1004.t: "Обращение к принцам: Очевидный наследник"
 derei.1004.desc: "Сегодня меня встречает, возможно, самый знаменитый принц [Concept('balan_lai', 'Балан-лай')|E], [imrazor.GetFirstName], принц Алсариаса. Его недавнее желание жениться на Аримит вызвало прения среди Балан-лай, вынудив некоторых принцев встать на его защиту, а других осудить это как циничную игру за власть. Терилаэн, похоже, считает, что это истинная любовь. Как бы то ни было, это человек, у которого есть воля изменить статус-кво. Я был приглашен на частный ужин с ним.\n\nПока мы пьём, едим и разговариваем, я нахожу, что он впечатляющий человек. Трудолюбивый, харизматичный и невероятно энергичный. Я вижу, что этот человек - настоящий принц, и я понимаю, почему он является неоспоримым кандидатом на пост преемника Форакона.\n\nВо время разговора он может легко ориентироваться в политических интересах, остроумных замечаниях и, казалось бы, искренней заботе обо мне и моем народе. Я очень хорошо провожу время."
 derei.1004.a: "Какой приятный человек."
 derei.1004.a.success: "Вы быстро устанавливаете узы!"
 derei.1004.a.failure: "Вы очень любезно беседуете"

 derei.1005.t: "Обращение к принцам: Цитадель"
 derei.1005.desc: "После неприятного путешествия через болота провинции [GetTitleByKey('d_gimilurush').GetNameNoTier] я прибыл в величественную цитадель Азаридет. Она представляет собой впечатляющее зрелище на фоне гор. Эта страна богата сельскохозяйственными угодьями, торговлей и кипучей деятельностью. И все жё, здесь правит самый затворнический принц [Concept('balan_lai', 'Балан-лай')|E], [karaag.GetFirstName]. Я направляюсь в замок только для того, чтобы найти его извиняющегося сенешаля, который сообщает мне, что Карааг, к сожалению, не сможет присутствовать на нашей сегодняшней встрече.\n\nУдовлетворение моего любопытства, безусловно, является наименьшим из его приоритетов, но все же отказ коллеге в официальной встрече, несомненно, может быть воспринят как оскорбление. Имразор предупреждал меня, что Карааг никогда не идет на встречу, которой может избежать. Этот принц озабочен не правлением, а только своей мастерской."
 derei.1005.a: "Я подожду и последую за ним, если он появится."
 derei.1005.a.success: "Он умоляет вас не раскрывать его секретов"
 derei.1005.a.failure: "Он ускользает от вас"
 derei.1005.a.toast: "Теперь вы в долгу перед Дэраем за его благоразумие"
 derei.1005.b: "Чепуха, я просто поговорю с его домочадцами."
 derei.1005.b.success: "Вы многое узнаёте о тактике принца"
 derei.1005.b.failure: "Вы не узнаёте ничего полезного"

 derei.1006.t: "Обращение к принцам: Великий порт"
 derei.1006.desc: "В [GetTitleByKey('c_inzilloni').GetNameNoTier] находится самый загруженный торговый порт [Concept('thanihazad', 'Тани-Хазада')|E]. Этот древний нуменорский город превратился в крупный торговый центр с могущественным торговым классом и самым большим торговым флотом в Семи землях. Здесь меня встречает его принц, [arthazroc.GetFirstName], человек с дурной репутацией.\n\nОн встречает меня вежливо, но его проницательный взгляд ищет слабость. Я боюсь, что он ее найдет. Какое-то время он развлекает меня беседой, но не дает достойных ответов. Это тонкий человек, привыкший получать желаемое с помощью манипуляций.\n\nЯ замолкаю, и он, как паук, почуявший добычу в своей паутине, шевелится. Он извиняется за то, что невнятно отвечает на мои вопросы, но утверждает, что его отвлекли недавние неприятности с торговцами. Он продолжает объяснять, что у него нет средств, чтобы выкупить дело у особенно проблемного торговца, и если бы его проблемы были решены, он мог бы предоставить мне еще одну аудиенцию."
 derei.1006.a: "Предложить поговорить с конкурентами этого купца."
 derei.1006.a.success: "Артазрок впечатлён"
 derei.1006.a.failure: "Торговцы обманывают вас!"
 derei.1006.a.toast: "Дэрай помог вам с купцами"
 derei.1006.b: "Я заплачу старому пауку."
 derei.1006.b.success: "Он развлекает вас рассказами о своих старых происках"
 derei.1006.b.toast: "Дэрай заплатил за несколько уроков плетения интриг"

 derei.1007.t: "Обращение к принцам: Великан"
 derei.1007.desc: "Я прибыл в пограничное княжество [GetTitleByKey('d_holzoreth').GetNameNoTier], где меня ожидает принц [daroc.GetFirstName]. Это относительно засушливая местность, на которой есть леса и джунгли. Она сильно милитаризована, так как над ней всегда нависала угроза вторжений из #L [GetTitleByKey('k_an_balkumagan').GetNameNoTier]а#!. Когда я приближаюсь к замку, я вижу полк тренирующихся [Concept('blacklocks', 'Черновласов')|E].\n\nПринц этих земель - сильный человек, из древнего рода воинов. Он, безусловно, внушителен, воин до мозга костей, его хромота только кажется врагом, которого нужно побеждать на каждом шагу. Это энергичный и физически сильный человек.\n\nОн говорит со мной как практичный человек, но с более мягкой стороны; он очень открыт и время от времени вставляет шутку в свою речь."
 derei.1007.a: "Постараться быть помягче."
 derei.1007.a.success: "Он дружелюбный человек!"
 derei.1007.a.failure: "Встреча получилась неловкой"
 derei.1007.b: "Спросить о жизни на границе."
 derei.1007.b.success: "Ему есть что рассказать об этом"

 derei.1008.t: "Обращение к принцам: Антагонист"
 derei.1008.desc: "Моё желание встретиться со всеми принцами привело меня, наконец, в странное княжество [Concept('balan_lai', 'Балан-лай')|E], [GetTitleByKey('k_pel').GetNameNoTier]. Миновав горы и холмы, я обнаружил, что передо мной равнина с множеством хороших сельскохозяйственных угодий. Я уже несколько дней не видел [Concept('adunai', 'адунайцев')|E].\n\n[seregul.GetName] принял меня в своём замке. Он вежливо приветствует меня, но я чувствую, что его что-то беспокоит. На большинство моих вопросов он отвечает спокойно, но как только я начинаю расспрашивать об уникальной политической ситуации в Пэле, местном совете, он рассердился.\n\n«Ты смеешь упоминать при мне об этих изменниках? В тот момент, когда я предложил им руководство, они взбунтовались. Сильная рука всегда была нужна, теперь я это понимаю. Слишком долго мы позволяли им расти бесконтрольно. Они пригласили нас на эту землю, потому что были слабы, и все же они возмущены тем, что я указываю им путь. Я еще пролью их кровь, медленно, и покажу им, как Пэл относится к измене».\n\nИтак, это принц Пэла, вспыльчивый глупец."
 derei.1008.a: "Ничего себе."
 derei.1008.a.success: "Вы успешно провели встречу"
 derei.1008.a.failure: "Эта встреча - настоящая катастрофа"
 derei.1008.a.toast: "Этот ребёнок пытался научить вас править!"

 derei.1009.t: "Обращение к принцам: Столица"
 derei.1009.desc: "Великий город [GetTitleByKey('c_mispir').GetNameNoTier] служит резиденцией [Concept('balan_lai', 'Балан-лай')|E]. Это слишком важный город, чтобы принадлежать какому-либо принцу, не склоняя чашу весов власти, и нуждается в сохранении нейтралитета в качестве общего двора принцев. Миспиром правит наместник, избранный из числа представителей местной олигархии.\n\nСегодня меня принимает [GetTitleByKey('c_mispir').GetHolder.GetName]. Я надеюсь узнать об управлении величайшим городом [Concept('thanihazad', 'Тани-Хазада')|E], поразмышлять о своих путешествиях и попытаться извлечь из них смысл.\n\nОт дружелюбного Имразора и старого, по-отечески заботливого Форакона до мелочного Серегула. От Караага, бегущего от власти, до Артазрока, цепляющегося за нее, как только может, - я встречал самых разных правителей.\n\nЯ пришел к убеждению, что самая большая ловушка, в которую может попасть правитель, - это отчуждение, как у Серегула и Караага. Чтобы избежать этого, правитель должен быть усердным и не останавливаться на достигнутом, а стремиться работать усерднее, как Дарок и Аримит. Кроме того, принц должен быть открытым и дружелюбным, как Имразор."
 derei.1009.a: "Есть о чем поразмыслить на обратном пути домой."
 derei.1009.a.success: "Вы многое узнали"

 derei.1010.t: "Беглянка!"
 derei.1010.desc: "Недавний захват пиратами южной оконечности полуострова Дрэл вызвал страх и вынужденное переселение части местного населения в более укоренившиеся племена на севере. Немногие осмелились бежать в наши леса. А те, кто это сделал, были изгнаны. Но сегодня прибыли посланцы от [GetTitleByKey('d_cuindore').GetHolder.GetFirstName], которые сопровождают молодую человеческую девушку.\n\nУ неё решительное выражение лица, но она не может скрыть страха. Я улыбаюсь ей и предлагаю сесть на траву рядом со мной. Я прошу её рассказать свою историю, и она рассказывает её после минутного колебания, обретая уверенность по мере продолжения рассказа.\n\nЭто ужасная история. Её родители были казнены, а их единственная дочь взята в плен. Когда она увидела свой шанс сбежать, она вслепую побежала в наш лес, слишком напуганная, чтобы рассмотреть неуловимых [Concept('elves', 'эльфов')|E].\n\nКогда она заканчивает рассказывать о своей встрече с Нимлот, она благодарит меня за доброту [Concept('cuind', 'куинд')|E] и спрашивает, что с ней будет дальше."
 derei.1010.a: "Она должна жить среди людей."
 derei.1010.a.tt: "Вы отправите Амали жить ко двору Дэрая, он будет относиться к ней по-доброму"
 derei.1010.b: "Я могу сделать для неё исключение."
 derei.1010.b.tt: "Об Амали позаботятся в Дрэле, она способная девушка"

 derei.1011.t: "Посланники Терилаэна"
 derei.1011.desc: "Около полудня я подхожу к воротам своей крепости, чтобы встретить двух эльфов, прибывших с юга. Я сразу замечаю, что девушка вовсе не эльфийка, хотя и одета как эльф, а очень симпатичная #L [derei_wife.GetCulture.GetCollectiveNoun|l]ая#! женщина.\n\nЭльф объясняет, что девушка сбежала из захваченного региона на оконечности мыса Дрэл, от вулмавских пиратов, которые теперь правят там. Он говорит, что [GetTitleByKey('k_drel').GetHolder.GetFirstName] в своей мудрости выбрал мою крепость в качестве её временного пристанища и надеется, что я позабочусь о ней, пока она полностью не поправится, не отдохнёт и не поймёт, куда хочет отправиться. Я знаю, что к такой просьбе следует отнестись с величайшим гостеприимством.\n\nМы прощаемся с эльфом, и я приглашаю её на обед. [derei_wife.GetFirstName] смотрит на меня серьёзным, но осторожным взглядом прекрасных карих глаз. Меня тянет к этой женщине. Мне не терпится услышать её голос, поэтому я прошу рассказать о её стране, о том, как там живётся, чем можно помочь, чего хотят люди. Она любит поговорить! И очень интересуется многими вещами, особенно о Терилаэне и куинд. Мы беседуем целый день, и разговор переходит к нашему детству, надеждам и мечтам. К концу я чувствую, что между нами установились прочные узы."
 derei.1011.a: "Она очень интересная личность!"

 derei.1012.a: "Возможно, настало время жениться."

 derei.1013.t: "Мечтая о ней"
 derei.1013.desc: "Прошло уже несколько месяцев с тех пор, как [derei_wife.GetFirstName] появилась при моем дворе. Мы разговаривали каждый день и проводили вместе много часов. Я не могу перестать думать о ней.\n\nНесколько моих родственников и женщин подошли ко мне, чтобы спросить о моих намерениях в отношении нее. Как только меня спросили, хочу ли я жениться на ней, я нерешительно согласился, что это возможно. Мои родственники были потрясены и стали увещевать меня и приказывать взять девушку в наложницы.\n\nСегодня тот самый день. Я объясню свои чувства Амали. Когда мы встречаемся на улице, чтобы совершить утреннюю прогулку, у меня потеют ладони, а речь звучит особенно невнятно. Она смотрит на меня с любопытством. Проходит полчаса, прежде чем я набираюсь смелости. Я говорю ей, что был и остаюсь влюблен в нее, и спрашиваю, решила ли она уже, что делать со своей жизнью. Она целует меня. Возможно, это самый счастливый день в моей жизни."
 derei.1013.a: "Я женюсь на этой женщине!"
 derei.1013.a.toast: "Ещё всего несколько недель!"
 derei.1013.b: "Разве наложничество омрачит нашу любовь? Это правильно..."
 derei.1013.c: "Я не могу этого сделать, она крестьянка..."

 derei.1014.t: "Наша свадьба!"
 derei.1014.desc: "Сегодня день, когда мы поженимся. С тех пор, как я объявил о свадьбе, дни были наполнены неприязненными взглядами и завуалированными оскорблениями со стороны большинства моих придворных, особенно часто в них упоминается [derei_wife.GetFirstName]. И всё же это были самые счастливые недели в нашей молодой жизни. Просто гулять, держась за руки, когда у нас есть такая возможность, или время от времени целоваться, и особенно разговаривать за едой - все это наполняет радостью моё сердце и, я верю, и её.\n\nЯ вернулся в совет, и хотя главной проблемой был мой брак с женщиной низкого происхождения и то, как это повредило бы моей репутации среди [Concept('balan_lai', 'Балан-лай')|E], я старался решать другие вопросы так справедливо и старательно, как только могу.\n\nСегодня мой двор в трауре, многие из наиболее эффектных придворных одеты в черное. И многие другие остаются в своих покоях или избегают меня, чтобы не выказывать своего одобрения. На церемонию приходит только пара, чтобы засвидетельствовать это, когда я беру Амали за руку, и меня спрашивают, согласен ли я стать ее мужем."
 derei.1014.a: "Да, конечно, да!"
 derei.1014.b: "Я не могу этого сделать!"

 derei.1015.t: "Знай свою землю"
 derei.1015.desc: "Теперь, когда я [Select_CString(ROOT.Char.IsFemale, 'оценила', 'оценил' )] своих собратьев-принцев, я гораздо лучше представляю, каким должен быть хороший правитель. Пришло время мне оценить свою собственную землю и свой народ. В последующие годы я надеюсь поближе познакомиться с этим местом, чтобы понять его проблемы и лучше понять, какие решения могут сработать.\n\nДля начала в этой поездке я посещу поселения, находящиеся вне моего непосредственного контроля, и поговорю с их правителями."
 derei.1015.a: "В путь."
 derei.1015.b: "Я не могу прямо сейчас."
 derei.1015.b.tt: "Через четыре месяца у вас будет ещё одна возможность"

 derei.1016.t: "Город Карадукал"
 derei.1016.desc: "Дорога занимает меньше дня, чтобы добраться до города [GetTitleByKey('b_kharadukal').GetNameNoTier], это плодородная земля со множеством ферм.\n\nЗдесь меня встречает его [Select_CString(derei_vassal.IsFemale, 'правительница', 'правитель' )], [derei_vassal.GetFirstName]. [derei_vassal.GetSheHe|U] много рассказывает мне об этом месте, всегда подчёркивая нехватку ресурсов для того, чтобы существенно изменить жизнь горожан. У меня просят золота, и не просто так.\n\nЯ не [Select_CString(ROOT.Char.IsFemale, 'обязана', 'обязан' )] делать [derei_vassal.GetHerHim] этот подарок, и неизвестно, действительно ли [derei_vassal.GetSheHe] вложит средства в город. И всё же, то, что [Select_CString(derei_vassal.IsFemale, 'правительница', 'правитель' )] становится богаче, действительно принесёт пользу городу в долгосрочной перспективе."
 derei.1016.a: "Продолжай в том же духе."
 derei.1016.b: "Вот небольшая помощь."

 derei.1017.t: "Племя Дрэла"
 derei.1017.desc: "Когда я подхожу к землям, где правит [moreno.GetFirstName], лес начал редеть, и местность стала довольно неровной, с множеством холмов. [moreno.GetFirstNameNoTooltip] встречает меня в большом, довольно добротно построенном деревянном доме посреди деревни. [Select_CString(moreno.IsFemale, 'Она пригласила', 'Он пригласил' )] меня на довольно скромный ужин. Я не верю, что люди здесь живут так скудно.\n\n[Select_CString(moreno.IsFemale, 'Она хотела', 'Он хотел' )] бы убедить меня в обратном. Когда мы говорим о вопросах управления, [Select_CString(moreno.IsFemale, 'она', 'он' )] обращает моё внимание на свои нужды и нужды этих земель, и всё же сердится, когда я спрашиваю, какой вклад [Select_CString(moreno.IsFemale, 'она', 'он' )] может внести в проекты развития своих земель. Когда я, наконец, перехожу эту черту и прямо спрашиваю, сколько [Select_CString(moreno.IsFemale, 'она готова', 'он готов' )] вложить в небольшой ирригационный проект на своих землях, [Select_CString(moreno.IsFemale, 'она', 'он' )] приходит в ярость.\n\n«Ты избалованный ребёнок. Мой народ поколениями работал, проливал кровь и умирал на этой земле. Мы слишком много платили тебе и твоим родичам на протяжении долгих лет. Ты, ребёнок из длинной династии захватчиков. Попроси у меня то, что принадлежит мне, ещё раз, и я буду защищаться, как от грабителей!»"
 derei.1017.a: "Я понимаю вашу точку зрения, что я могу для вас сделать?"
 derei.1017.b: "О, неужели это так?"
 derei.1017.b.tt: "#X Если вы проиграете бой, то получите ещё одно ранение!#!"
 derei.1017.b.toast: "Вашей свите удаётся вывести вас из боя!"

 derei.1018.t: "Планы позднего вечера"
 derei.1018.desc: "С тех пор как я [Select_CString(ROOT.Char.IsFemale, 'вернулась', 'вернулся' )] из города [GetTitleByKey('c_mispir').GetNameNoTierNoTooltip], я всякий раз, когда мои обязанности позволяли мне выкроить свободное время, [Select_CString(ROOT.Char.IsFemale, 'искала и обдумывала', 'искал и обдумывал' )] план улучшения положения не только провинции [GetTitleByKey('d_gimileth').GetNameNoTier], но и [Concept('balan_lai', 'Балан-лай')|E] в целом.\n\nСегодня вечером я и [derei_wife.GetFirstNameNoTooltip] долго говорили о том, как мы могли бы работать, чтобы преодолеть раскол между коренными народами [Concept('sevenlands', 'Семи земель')|E] и харадунай. Во время своих путешествий я [Select_CString(ROOT.Char.IsFemale, 'наблюдала', 'наблюдал' )] очень неэффективный способ управления нашими землями. Люди чувствуют, что они работают не для того, чтобы улучшить свою собственную жизнь, а ради принцев. Если бы мы, как издавна верили мои предки, не стремились к какому-то врождённому господству над коренным населением, а скорее действовали как наставники и искренне старались возвысить местных, эти земли могли бы познать небывалое процветание.\n\n«Всё это очень хорошо и благородно», - перебивает [derei_wife.GetFirstNameNoTooltip]. «Действительно, люди трудятся ради земли, которая им не принадлежит. Но твоим коллегам наплевать на их недовольство. Балан-лай существовал долго, и пусть он простоит ещё долго, не подвергаясь опасности. Ты не убедишь принцев нравоучениями. Тебе понадобятся друзья, чтобы играть в их игры, даже шантажировать их, если понадобится!»"
 derei.1018.a: "[derei_wife.GetFirstNameNoTooltip] говорит мудро."
 derei.1018.a.tt: "У вас есть план! Пришло время вернуться к Терилаэну и снова обратиться за советом!"
 derei.1018.b: "Я не могу прямо сейчас."
 derei.1018.b.tt: "Через месяц у вас будет ещё одна возможность"
 derei.1018.c: "Теперь я знаю, что делать."
 derei.1018.c.tt: "Вы сделаете делом своей жизни убеждение принцев и преодоление социального раскола в Семи землях"

 derei.1019.t: "Время пришло?"
 derei.1019.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'отложила', 'отложил' )] свою поездку ко двору Терилаэна, и я могу отложить её снова, но я не могу откладывать её вечно.\n\nМне не терпится получить его совет."
 derei.1019.a: "В путь!"
 derei.1019.b: "Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] отложить это ещё на месяц."

 derei.1020.t: "Повторный визит в чертоги куинд"
 derei.1020.desc: "Я вновь прибываю в [GetTitleByKey('c_ainglad').GetNameNoTierNoTooltip], чтобы спросить совета у Терилаэна. Меня принимают со всей учтивостью перед его троном. Здесь я преклоняю колени перед своим наставником и другом и объясняю своё желание наставить принцев [Concept('balan_lai', 'Балан-лай')|E] на путь истинный.\n\n«Дорогой Дэрай, [Concept('conceptracemen', 'люди')|E] - поистине удивительная раса. Только вчера ты пришёл попросить меня, чтобы я сам принимал за тебя решения, а сегодня ты уже вырос и стал мужчиной.\n\nПоистине, сердца всех [Concept('cuind', 'куинд')|E] наполнились бы радостью, если бы харадунайцы отказались от безрассудства ваших предков и вернулись к своим обязанностям наставников менее удачливых людей. Если бы ты смог добиться этого, это было бы поистине великим подвигом.\n\nНо для достижения такой цели, как настоящая культурная реформа, я думаю, тебя нужно взять руководство в свои руки. Не забывай, что люди могут говорить тебе одно, а в глубине души хранить совсем другое.\n\nСтупай, Дэрай. Прощай, надежды куинд пребывают с тобой»."
 derei.1020.a: "Впереди долгий путь."
 derei.1020.tt: "Вы сделаете делом своей жизни убеждение принцев и преодоление социального раскола в Семи землях"
 derei.1020.a.toast: "Дэрай хочет реформировать Балан-лай!"

 derei.1021.t: "Какого принца выбрать?"
 derei.1021.desc: "Я и [derei_wife.GetFirstName] с помощью совета отобрали несколько кандидатов, которые, по нашему мнению, могут соответствовать моему подходу.\n\nКого же мне выбрать?"
 derei.1021.leader.desc: "Я и [derei_wife.GetFirstName] с помощью двора отобрали несколько кандидатов, которые, по нашему мнению, могут соответствовать моему подходу. [Select_CString(balan_lai_leader.IsFemale, 'Самая важная', 'Самый важный' )] из них - глава Балан-лай, если убедить [balan_lai_leader.GetHerHis], это было бы полезно для моего дела. Но мне не нужно спешить с обращением к н[balan_lai_leader.GetHerHim].\n\nКого же мне выбрать?"
 derei.1021.a: "[balan_lai_leader.GetFullNameNoTooltip]"
 derei.1021.b: "[balan_lai_1.GetFullNameNoTooltip]"
 derei.1021.c: "[balan_lai_2.GetFullNameNoTooltip]"
 derei.1021.d: "[balan_lai_3.GetFullNameNoTooltip]"
 derei.1021.e: "Больше вариантов."

 derei.1022.t: "[target_prince.GetFullNameNoTooltip]"
 derei.1022.desc: "Письмо уже составлено.\n\nВ этом письме я [Select_CString(ROOT.Char.IsFemale, 'призвала', 'призвал' )] к добросовестности, которой возможно связаны [target_prince.GetFirstNameNoTooltip] и я, и я, насколько это в моих силах, [Select_CString(ROOT.Char.IsFemale, 'объяснила', 'объяснил' )] моральную и практическую необходимость изменения нашего образа жизни. Посмотрим, принесёт ли плоды моё обращение к [target_prince.GetHerHis] совести.\n\n#X Если у вас не получится, вы не сможете повторно обратиться к этому принцу в течение 5 лет#!"
 derei.1022.hook.desc: "Письмо уже составлено.\n\nВ этом письме я [Select_CString(ROOT.Char.IsFemale, 'призвала', 'призвал' )] к добросовестности, которой возможно связаны [target_prince.GetFirstNameNoTooltip] и я, и я, насколько это в моих силах, [Select_CString(ROOT.Char.IsFemale, 'объяснила', 'объяснил' )] моральную и практическую необходимость изменения нашего образа жизни. Наконец, я также [Select_CString(ROOT.Char.IsFemale, 'напомнила', 'напомнил' )] [target_prince.GetHerHim] об одолжении. Посмотрим, принесёт ли плоды моё обращение к [target_prince.GetHerHis] совести.\n\n#X Если у вас не получится, вы не сможете повторно обратиться к этому принцу в течение 5 лет#!"
 derei.1022.a: "Отправить письмо!"
 derei.1022.a.tt: "Вы получите ответ через месяц"
 derei.1022.a.success: "#P Успех!#"
 derei.1022.a.failure: "#N Провал!#"
 derei.1022.b: "На самом деле, я слишком тороплюсь."
 derei.1022.c.tt: "Как у игрока, у них будет выбор."

 derei.1023.t: "Просветлённый принц Дэрай,"
 derei.1023.desc: "Я [Select_CString(target_prince.IsFemale, 'провела', 'провёл' )] много дней, серьёзно обдумывая ваши аргументы. Вы умеете убеждать. С тяжёлым сердцем, но в то же время полным надежды, я отрекаюсь от путей своих предков и принимаю путь ваших предков. Пусть [target_prince.GetPrimaryTitle.GetNameNoTier] знает, какое процветание вы нам обещали!"
 derei.1023.a: "Хвала Эру!"

 derei.1024.t: "Смелый принц Дэрай,"
 derei.1024.desc: "Вы осмеливаетесь предлагать мне отказаться от традиций моих предков! Ваши провинциальные замашки могут хорошо работать в вашем маленьком княжестве, но здесь, в провинции [target_prince.GetPrimaryTitle.GetNameNoTier], мы придерживаемся более цивилизованных добродетелей. Я не позволю, чтобы наша [Concept('adunai', 'адунайская')|E] идентичность была подорвана вашими слабыми идеями."
 derei.1024.a: "Проклятье!"

 derei.1025.t: "[Select_CString(target_prince.IsFemale, 'Уважаемая', 'Уважаемый' )] [target_prince.GetFirstNameNoTooltip],"
 derei.1025.desc: "Я пишу вам в надежде, что смогу указать на наши заблуждения. Слишком долго мы притесняли местное население и отчуждали его от земли, которая принадлежит всем нам, а не только харадунайцам. Я прошу вас поискать в своём сердце истину моих слов, и если это не поможет, подумайте о богатстве, которого мы могли бы достичь, если бы коренное население работало по доброй воле, а не под кнутом."
 derei.1025.a: "Эти слова звучат убедительно."
 derei.1025.a.toast: "[target_prince.GetSheHe|U] соглашается!"
 derei.1025.b: "[derei.GetFirstNameNoTooltip] услышит то, что хочет услышать."
 derei.1025.c: "Нет."
 derei.1025.c.toast: "[target_prince.GetSheHe|U] отказывается!"

 derei.1026.t: "Исторический день"
 derei.1026.desc: "В залах Балан-лай в городе [GetTitleByKey('c_mispir').GetNameNoTier] принцы собираются, чтобы официально подписать реформу. В воздухе витает волнение. Действительно ли принцы верят в поправку, или они думают, что это изменение статус-кво откроет новые, более циничные возможности, не имеет значения. Это надёжный свод законов, который обеспечит более справедливую жизнь для всех народов [Concept('sevenlands', 'Семи земель')|E].\n\nПосле торжественной церемонии подписания я выступаю перед своими коллегами на площади и объявляю законы жителям #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспира#!#!#!. Аплодисменты варьируются от умеренных до восторженных. Многие из них, даже здесь, в #ONCLICK:TITLE,c_mispir #TOOLTIP:LANDED_TITLE,c_mispir #L Миспире#!#!#!, не имеют надлежащего [Concept('adunaic', 'адунайского')|E] происхождения.\n\nКогда я заканчиваю свою речь, [balan_lai_1.GetName] вручает мне церемониальный экземпляр моих реформ. Это станет бесценной реликвией моего дома."
 derei.1026.a: "Наконец-то моя работа закончена."

 derei.1027.t: "Терилаэн прибыл!"
 derei.1027.desc: "Когда утро перерастает в приятный тёплый день, я слышу громкие фанфары у ворот, сопровождаемые приятной эльфийской музыкой. Я спешу к воротам, где меня уже ждёт [terilaen.GetFirstName] во главе эльфийской свиты. Он не принял чужую личность и облачился во все символы своей власти. Он обнимает меня и ведёт в зал двора.\n\n«Мой самый дорогой и благородный подопечный. Ты показал себя великим человеком. По сути, ты историческая фигура. Твой путь краток, как это бывает с [Concept('conceptracemen', 'людьми')|E], но я рад, что ты оставил след в этом мире. Твой народ не забудет тебя, как и я.\n\nДавным-давно я сказал, что надежда [Concept('cuind', 'куинд')|E] последует за тобой. Теперь она расцвела благодаря твоим усилиям. Я пришёл, чтобы почтить тебя перед твоим народом, чтобы они знали, что эльфы Дрэла связаны с тобой вечной дружбой и верностью. Прошу, прими этот дар, Саптан», — он кланяется."
 derei.1027.trigger.desc: "Когда утро перерастает в приятный тёплый день, я слышу громкие фанфары у ворот, сопровождаемые приятной эльфийской музыкой. Я спешу к воротам, где меня ждёт [terilaen.GetFirstName] во главе эльфийской свиты.\n\n[Select_CString(terilaen.IsFemale, 'Предводительница', 'Предводитель' )] [Concept('elven', 'эльфов')|E] склоняется передо мной и говорит:\n\n«Хотя Терилаэн больше не возглавляет нас, мы хотели бы, чтобы все знали, что мы остаёмся друзьями Гимилета и Дэрая Мудрого. Пусть этот скипетр символизирует нашу дружбу на долгие годы вперёд, и пусть мудрость Дэрая ещё долго после его ухода будет направлять харадунайцев и удерживать их от безрассудства»."
 derei.1027.a: "[terilaen.GetFirstNameNoTooltip] оказывает мне большую честь."

 derei.1028.toast: "Дэрай реформировал Балан-лай!"

 derei.1029.t: "[amali.GetFirstNameNoTooltip] умерла"
 derei.1029.desc: "[amali.GetFirstName], моя любовь, моя верная, способная и любящая спутница, умерла.\n\nЧто мне теперь делать без её мудрого совета? Как мне жить дальше без её общества? Я никогда больше не увижу её, и, таким образом, любовь и радость ослабевают и, боюсь, никогда не вернутся в мою жизнь. Смерть - такой жестокий дар, и всё же это удел [Concept('conceptracemen', 'людей')|E].\n\nЯ должен напоминать себе, что теперь она свободна от жизненной борьбы, и однажды я тоже буду свободен. А пока нужно сделать работу и прожить жизнь.\n\nЯ никогда не забуду её и те дни, которые мы провели вместе."
 derei.1029.a: "Я больше никогда не женюсь."
 derei.1029.b: "Я не вынесу одиночества."