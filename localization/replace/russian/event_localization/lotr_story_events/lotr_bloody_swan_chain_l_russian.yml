l_russian:

 ###########################
 # Bloody Swan Event Chain #
 ###########################

 ### Éira Events ###
 bloody_swan.0001.t: "Ядовитое жало"
 bloody_swan.0001.desc: "Мой отец [murdered_father.GetFirstName] безжизненно покоится на ложе, моё зрение затуманено слезами, наворачивающимися на глаза, я чувствую, что нахожусь на грани отчаяния. Мой отец долгое время стремился к тому, чтобы сблизить враждующие кланы холмов, и в последние месяцы он наконец-то приблизился к своей цели. Но теперь, похоже, все было напрасно...\n\nЯ вытираю слезы с лица и снова смотрю на отца. По крайней мере, в смерти он выглядит спокойным. Но... что это? Почему вены на его шее такие темные и заметные? Я подзываю к себе одного из травников, и они быстро подтверждают мои подозрения: это знак того, что его отравили. И, кажется, я знаю, кто стоит за этим темным делом..."
 bloody_swan.0001.a: "Эта [Concept('gondor', 'гондорская')|E] шавка заплатит за то, что он сделал, клянусь."
 bloody_swan.0001.a.tt: "Открывает несколько #high сюжетных решений#!"

 bloody_swan.0002.t: "В поисках ответов"
 bloody_swan.0002.desc: "Мечта моего отца витает в долинах и предгорьях этой земли; шепот на ветру, обещание, оставшееся незавершенным. Он желал мира между кланами, единства среди нашего народа... и теперь он лежит в холодной земле, преданный той самой силой, с которой он когда-то стремился сотрудничать.\n\nУ меня пока нет доказательств - только горькая уверенность. Яд, которым он был отравлен, время его смерти, вызванные этим политические потрясения - все это наводит меня на мысли о [Concept('tharbad', 'Тарбаде')|E]. [gondorian_governor.GetName]. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] действовать осторожно. Никаких поспешных обвинений, никакого неуместного гнева. Мне нужны доказательства. Мне нужны свидетели. Мне нужна правда.\n\nНеобходимо разослать весточку нашим разрозненным союзникам. Нужно просмотреть старые записи. И, возможно... при дворе Глормагиля есть те, кто затаил злобу или распустил языки. Я выясню, что было сделано и чьими руками. Но я не позволю смерти моего отца парализовать меня. Племена теперь смотрят на меня. Его наследие по-прежнему вызывает у них доверие. И, так или иначе, я позабочусь о том, чтобы его чтили."
 bloody_swan.0002.a: "Время траура прошло. Теперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] действовать."
 bloody_swan.0002.a.tt: "Вы отправитесь в [Concept('tharbad', 'Тарбад')|E], чтобы найти ответы на некоторые вопросы"

 bloody_swan.0003.t: "Подозрение в Тарбаде"
 bloody_swan.0003.desc: "Всё указывает на [Concept('tharbad', 'Тарбад')|E]. Смерть моего отца была слишком точной, слишком своевременной и слишком безобидной для межплеменной вражды или личной неприязни. Он представлял угрозу только для одного человека: для того, кто больше всего выиграет от его отсутствия.\n\n[gondorian_governor.GetName], правитель [Concept('enedhwaith', 'Энедвайта')|E], притворяется далеким хозяином, но его влияние шире, чем многие могут предположить. В Тарбаде ходят слухи о том, что слуг уволили слишком внезапно, целителей заставили замолчать слишком быстро, о пиршестве, на котором вино наливали только для одного.\n\nЕсли бы он действительно приказал отравить моего отца, он не сделал бы этого открыто. Но правда всегда просачивается сквозь щели. Я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] внимательно слушать... и нанести удар, когда придет время."
 bloody_swan.0003.a: "Стены не защитят тебя от правосудия, Глормагиль."
 bloody_swan.0003.a.tt: "Вы останетесь в Тарбаде на несколько дней, чтобы найти ответы"

 bloody_swan.0004.t: "Паутина лжи"
 bloody_swan.0004.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'начала', 'начал' )] разбираться в историях, рассказанных теми, кого [gondorian_governor.GetName] держит при себе: старыми слугами, писцами-изгнанниками, даже одним из его соперников при дворе. Все они говорят осторожно... но я знаю, как услышать то, что осталось невысказанным.\n\nОдин человек утверждал, что видел имя моего отца в списке «смутьянов», за которыми следовало следить. Другой вспоминает странного гостя, который приехал в ночь перед отравлением и исчез на следующий день. Виноторговец вспомнил, что ему заплатили за доставку редкого урожая, но только за одну бутылку.\n\nЭто нити, но еще не верёвка. Но с каждым днем они все туже обвиваются вокруг имени Глормагиля. Если я буду [Select_CString(ROOT.Char.IsFemale, 'осторожна', 'осторожен' )], то найду нужные мне доказательства."
 bloody_swan.0004.a: "Продолжай говорить. Я докопаюсь до правды, до лжи."
 bloody_swan.0004.a.tt: "Вы приближаетесь к тому, чтобы найти нужное вам доказательство"

 bloody_swan.0005.t: "Долгожданное доказательство"
 bloody_swan.0005.desc: "Наконец-то у меня есть то, что мне нужно. Пожилой управляющий, когда-то служивший при дворе, которым правил [gondorian_governor.GetName], тайно признался. По его словам, он больше не мог жить с чувством вины. Он видел, как готовили яд, редкую смесь, известную только некоторым гондорским аптекарям. Он сам доставил его, спрятав в вине, которое украшало чашу моего отца.\n\nОн передал мне письмо: приказы, подписанные рукой Глормагиля. Подпись совпадает. Печать истинна. Это то оружие, которое я [Select_CString(ROOT.Char.IsFemale, 'искала', 'искал' )].\n\nТеперь я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] решить, как наилучшим образом использовать это. Племена сплотятся вокруг меня, если узнают правду. Далекий король [Concept('gondor', 'Гондора')|E] может прислушаться — или же он может похоронить это. Но одно можно сказать наверняка: Глормагиль будет бояться имени Эйры."
 bloody_swan.0005.a: "Теперь он увидит, к чему приведёт пролитая кровь вождя."
 bloody_swan.0005.a.tt: "Вы возвращаетесь в свои чертоги с доказательством в руках, чтобы решить, что с ним делать"
 bloody_swan.0005.tt: "#P Вы нашли доказательство убийства Бранта Глормагилем#!"

 bloody_swan.0010.t: "Переговоры в Галтреве"
 bloody_swan.0010.desc: "[GetTitleByKey('c_galtrev').GetNameNoTier] - большое #L [galtrevholder.GetCulture.GetCollectiveNoun|l]ое#! поселение, расположенное в холмистой местности между Королевским трактом [Concept('gondor', 'Гондора')|E] и [Concept('mistymountains', 'Мглистыми горами')|E]. Здесь проходит множество путешественников и паломников, направляющихся к святилищу в озере Лок-Тиар, расположенном на востоке.\n\nКогда я выхожу на главную площадь, меня тепло приветствует [galtrevholder.GetTitledFirstName], [Select_CString(galtrevholder.IsFemale, 'которая', 'который' )] приглашает меня присоединиться к [Select_CString(galtrevholder.IsFemale, 'ней', 'нему' )] у большого костра неподалёку. «Ты [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришёл' )] поговорить о делах, да?» - спрашивает [galtrevholder.GetSheHe]."
 bloody_swan.0010.a: "Я здесь для того, чтобы убедить вас помочь мне."
 bloody_swan.0010.a.success: "Вам удалось расположить к себе персонажа [galtrevholder.GetName]"
 bloody_swan.0010.a.failure: "Вам не удалось расположить к себе персонажа [galtrevholder.GetName]"
 bloody_swan.0010.b: "У меня есть пара монет, которые могли бы стать вашими..."
 bloody_swan.0010.c: "Вы у меня #italic в долгу#!, [galtrevholder.GetFirstName]."

 bloody_swan.0011.t: "Встреча у берегов Гватло"
 bloody_swan.0011.desc: "Я добираюсь до владения [GetTitleByKey('c_den_runnach').GetNameNoTier], где у берега реки Гватло меня ждёт [runnachholder.GetName]. Река здесь очень широкая, а земли на другом берегу - лишь отдалённый намёк на холмы и поля за речным туманом.\n\n«Итак», - [runnachholder.GetFirstName] нарушает молчание. «Я довольно много [Select_CString(runnachholder.IsFemale, 'слышала', 'слышал' )] о тебе, дочь Бранта. Ты приехала, чтобы продолжить дело своего отца?», - [runnachholder.GetSheHe] быстро переходит к делу."
 bloody_swan.0011.a: "Я здесь для того, чтобы убедить вас помочь мне."
 bloody_swan.0011.a.success: "Вы произвели впечатление на персонажа [runnachholder.GetName]"
 bloody_swan.0011.a.failure: "Вам не удалось убедить персонажа [runnachholder.GetName]"
 bloody_swan.0011.b: "У меня есть пара монет, которые могли бы стать вашими..."
 bloody_swan.0011.c: "Вы мне #italic обязаны#!, [runnachholder.GetFirstName]."

 bloody_swan.0012.t: "Чертог Ирнберна"
 bloody_swan.0012.desc: "Во владении [GetTitleByKey('c_iarnburn').GetNameNoTier] вокруг величественного деревянного чертога, которым владеет [Select_CString(iarnburnholder.IsFemale, 'предводительница', 'вождь' )], [iarnburnholder.GetName], выросла большая деревня, окружённая стеной. Я вхожу внутрь, чтобы встретиться с [Select_CString(iarnburnholder.IsFemale, 'местной властительницей', 'местным властителем' )].\n\n«О. Неужели это [Select_CString(ROOT.Char.IsFemale, 'юная', 'юный' )] [ROOT.Char.GetName]», - приветствует меня [iarnburnholder.GetFirstName], поднимаясь со своего стула. «Какое прекрасное зрелище! Я [Select_CString(iarnburnholder.IsFemale, 'слышала', 'слышал' )], у вас есть предложение, да?»"
 bloody_swan.0012.a: "Я здесь для того, чтобы убедить вас помочь мне."
 bloody_swan.0012.a.success: "Вам удалось расположить к себе персонажа [iarnburnholder.GetName]"
 bloody_swan.0012.a.failure: "Вам не удалось расположить к себе персонажа [iarnburnholder.GetName]"
 bloody_swan.0012.b: "У меня есть пара монет, которые могут стать вашими..."
 bloody_swan.0012.c: "Вы мне #italic обязаны#!, [iarnburnholder.GetFirstName]."

 bloody_swan.0013.t: "Люди гор"
 bloody_swan.0013.desc: "Деревня [GetTitleByKey('c_westmarches').GetNameNoTier] находится на дальнем берегу реки Изен, за землями моего народа. Здесь живут горцы, которые являются нашими дальними родичами. Они тоже трудятся под гнётом [Concept('gondor', 'Гондора')|E] и разделяют наше недоверие к Крылатой короне.\n\nМеня встречают с одинаковой вежливостью и осторожностью, [westmarchesholder.GetName] выходит навстречу, чтобы поприветствовать меня в центре деревни. «Что привело речников так далеко на юг?», - спрашивает [westmarchesholder.GetFirstName]. «Мы уже много лет не имели дел с такими, как вы. Говорите быстро, или убирайтесь отсюда».\n\nЯ в нескольких предложениях объясняю причину своего прихода, а затем предлагаю союз. «Вместе мы сможем показать этим гондорским псам, что мы сильнее, чем они о нас думают»."
 bloody_swan.0013.a: "Я здесь, чтобы убедить вас помочь мне."
 bloody_swan.0013.a.success: "Вы сумели убедить персонажа [westmarchesholder.GetName]"
 bloody_swan.0013.a.failure: "Вы не сумели убедить персонажа [westmarchesholder.GetName]"
 bloody_swan.0013.b: "У меня есть пара монет, которые могли бы стать вашими..."
 bloody_swan.0013.c: "Вы мне #italic обязаны#!, [westmarchesholder.GetFirstName]."

 bloody_swan.0014.t: "Гордость [Select_CString(angrastholder.IsFemale, 'дерзкой разбойницы', 'дерзкого разбойника' )]"
 bloody_swan.0014.desc: "Я стою перед воротами владения [GetTitleByKey('c_angrast').GetNameNoTier] и не могу попасть внутрь. Через несколько очень долгих минут над воротами появляется человек, который смотрит на меня сверху вниз. «Что тут у нас?», - издевается [angrastholder.GetSheHe] надо мной. «Беги обратно к своей матери, девочка. Война - это не игра для тебя».\n\n«Ты слишком быстро [Select_CString(angrastholder.IsFemale, 'заговорила', 'заговорил' )] о побеге, [Select_CString(angrastholder.IsFemale, 'разбойница', 'разбойник' )]», - отвечаю я, не отступая. «Но мы не такие уж разные, ты и я. У нас общий враг!»\n\n[angrastholder.GetTitledFirstName] смотрит на меня, слегка наклонив свою голову. «...Очень хорошо», - наконец произносит [angrastholder.GetSheHe]. «Но сделай это побыстрее. Моё время дорого...»"
 bloody_swan.0014.a: "Я здесь для того, чтобы убедить вас помочь мне."
 bloody_swan.0014.a.success: "Вам удалось убедить персонажа [angrastholder.GetName]"
 bloody_swan.0014.a.failure: "Вам не удалось убедить персонажа [angrastholder.GetName]"
 bloody_swan.0014.b: "У меня есть пара монет, которые могут стать вашими..."
 bloody_swan.0014.c: "Вы мне #italic обязаны#!, [angrastholder.GetFirstName]."

 bloody_swan.0020.t: "У Врат Дурина"
 bloody_swan.0020.desc: "Я стою перед вратами [Concept('dwarves', 'гномов')|E], выкованными много веков назад. [moriaholder.GetName] появляется из зловещей темноты в сопровождении стражников в тяжёлых доспехах. «Прошло много веков с тех пор, как к моему народу приходили гости с #italic этой#! стороны гор», - начинает [moriaholder.GetTitledFirstName] дружелюбным, но сдержанным тоном. «[Select_CString(moriaholder.IsFemale, 'Должна', 'Должен' )] сказать, я не [Select_CString(moriaholder.IsFemale, 'ожидала', 'ожидал' )], что речников поведёт [Select_CString(ROOT.Char.IsFemale, 'такая девушка', 'такой парнишка' )], как ты. Так! Изложи своё дело, [ROOT.Char.GetTitledFirstName]. Что привело тебя в [Concept('khazaddum', 'Кхазад-дум')|E]?»\n\nЯ делаю паузу, тщательно подбирая слова. «Я благодарю вас за честь принять меня, [Select_CString(moriaholder.IsFemale, 'великая королева', 'великий король' )]. Мой народ вскоре должен начать войну против людей, захвативших наши земли, и мы хотим вооружиться. Известно, что гномы - лучшие мастера по изготовлению оружия, и именно поэтому я [Select_CString(ROOT.Char.IsFemale, 'попросила', 'попросил' )] у вас аудиенции, чтобы обсудить торговлю. Оружие гномов, за наше золото»."
 bloody_swan.0020.a: "Обсудим хорошую сделку, друзья."
 bloody_swan.0020.b: "Назови свою цену, [Concept('dwarf', 'гном')|E]."
 bloody_swan.0020.c: "Думаю, мы оба можем извлечь из этого выгоду..."
 bloody_swan.0020.tt: "Куплена гномья броня"

 bloody_swan.0021.t: "Бремя власти"
 bloody_swan.0021.desc: "Я была коронована как новая королева свободных речников. Церемония была простой, но этот титул тяжким грузом лёг на мои плечи. Теперь я несу ответственность за безопасность и процветание моего народа и должна провести его через испытания, которые ждут меня впереди.\n\nХотя другие вожди тайно поклялись мне в верности, они пока не могут открыто объявить себя моими вассалами - по крайней мере, пока [Concept('gondor', 'Гондор')|E] остаётся сильным. Достаточно скоро я найду способ заставить их отделиться и присоединиться к моему делу.\n\nЯ должна быть бдительной и неустанной ради моего народа и наследия моего отца. Чтобы моя месть наконец свершилась..."
 bloody_swan.0021.a: "Я не успокоюсь, пока мой народ не будет свободен, а мой отец не будет отомщён."

 bloody_swan.0022.t: "Последний хол"
 bloody_swan.0022.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'достигла', 'достиг' )] таких высот, о которых мой отец даже не мечтал, и племена наконец-то объединились. Но остаётся одно: [glormagil.GetTitledFirstName]. Он тот, с кем нужно разобраться, чтобы утолить жажду мести, которая горит в моём сердце. Он тот, кого нужно заставить заплатить за свои преступления и бояться имени #italic Кровавого копья#!.\n\nПередо мной лежат три пути. Я могу столкнуться с ним лицом к лицу и рискнуть начать открытую войну с [Concept('gondor', 'Гондором')|E]. Я могу нанести удар из тени и рискнуть быть [Select_CString(ROOT.Char.IsFemale, 'убитой', 'убитым' )] его стражей. Или я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы использовать имеющиеся у меня доказательства, чтобы воззвать к далёкому королю Гондора и надеяться, что он ценит справедливость превыше политики. Каждый путь несет в себе свои риски и выгоды, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] выбирать мудро..."
 bloody_swan.0022.b: "Это война, [glormagil.GetFirstName]."
 bloody_swan.0022.b.tt: "Открывает #high сюжетное решение#!, позволяющее объявить войну Глормагилю"
 bloody_swan.0022.a: "Я нанесу удар из тени. Он этого не заметит."
 bloody_swan.0022.a.tt: "Открывает #high сюжетное решение#!, позволяющее устроить покушение на Глормагиля"
 bloody_swan.0022.c: "Я обращусь к королю. Правосудие должно восторжествовать, даже если оно будет медленным."
 bloody_swan.0022.c.tt: "Открывает #high сюжетное решение#!, позволяющее обратиться к королю Гондора за правосудием"
 bloody_swan.0022.d: "Возможно, время мести прошло..."
 bloody_swan.0022.d.tt: "Открывает #high сюжетное решение#!, позволяющее простить Глормагиля и пойти дальше"

 bloody_swan.0025.t: "Снова в Тарбад"
 bloody_swan.0025.desc: "[gondorian_governor.GetTitledFirstName] [Select_CString(gondorian_governor.IsFemale, 'должна', 'должен' )] ответить за свои преступления, и я не успокоюсь, пока не добьюсь справедливости. Пришло время навсегда избавиться от н[gondorian_governor.GetHerHis].\n\nС этой целью я вернусь в Тарбад, город, в котором укрывается [Select_CString(gondorian_governor.IsFemale, 'эта злодейка', 'этот злодей' )]. Я возьму с собой лишь нескольких моих самых надёжных воинов, и я нанесу удар быстро и решительно. Город большой, и я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] быть [Select_CString(ROOT.Char.IsFemale, 'осторожна', 'осторожен' )], чтобы не столкнуться со стражниками, если хочу приблизиться к [Select_CString(gondorian_governor.IsFemale, 'ней', 'нему' )].\n\nЭто опасная миссия, но я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] её выполнить. От этого зависит судьба моего народа и наследие моего отца."
 bloody_swan.0025.a: "Я встречусь с ним лицом к лицу в его собственном городе."
 bloody_swan.0025.a.tt: "Вы отправитесь в Тарбад, чтобы встретиться лицом к лицу с Глормагилем"

 bloody_swan.0026.t: "По переполненным улицам"
 bloody_swan.0026.desc: "Тарбад - оживлённый город, наполненный торговцами, путешественниками и стражниками. Пройти через городские ворота - это одно, но час уже поздний, и на улицах не так многолюдно, как днем.\n\nМы перегруппировываемся в тёмном переулке, и я останавливаюсь, чтобы принять решение. Стоит ли мне смешаться с несколькими ночными прохожими и попытаться подобраться поближе к поместью, где укрывается [gondorian_governor.GetName], не привлекая внимания? Или мне стоит пойти более прямым путём, захватив и допросив одного из стражников и используя его как маскировку, чтобы проникнуть в центр города?"
 bloody_swan.0026.a: "Мы растворимся в толпе и будем осторожно продвигаться вперёд."
 bloody_swan.0026.a.success: "Вы успешно смешиваетесь с толпой и направляетесь к [Concept('estate', 'поместью')|E] Глормагиля."
 bloody_swan.0026.a.failure: "Вам не удаётся слиться с толпой и вы привлекли к себе внимание, что вынуждает вас поспешно ретироваться из Тарбада."
 bloody_swan.0026.a.failure.tt: "Вас раскрыли"
 bloody_swan.0026.b: "Захватим стражника и используем его доспехи в качестве маскировки."
 bloody_swan.0026.b.success: "Вы успешно захватываете стражника и используете его доспехи для маскировки, что позволяет вам более свободно передвигаться по городу."
 bloody_swan.0026.b.failure: "Вам не удаётся схватить стражника, и вы вынуждены спасаться бегством, привлекая к себе внимание."
 bloody_swan.0026.b.failure.tt: "Вас раскрыли"

 bloody_swan.0027.t: "Поместье"
 bloody_swan.0027.desc: "Поместье Глормагиля - это большой укреплённый особняк, расположенный в самом сердце Тарбада. Он хорошо охраняется, по периметру установлены патрули и сторожевые башни. Главный вход представляет собой большие ворота, но есть также несколько входов поменьше, которые можно использовать для проникновения.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] тщательно выбрать подход. Прямое нападение на главные ворота было бы рискованным, но зато самым быстрым. Проникнуть внутрь через один из небольших входов было бы безопаснее, но потребует больше времени и усилий. Я не могу позволить себе тратить время впустую, но я также не могу позволить себе быть безрассудным, чтобы меня не поймали и не бросили в темницу или ещё чего похуже."
 bloody_swan.0027.a: "Мы начнём прямую атаку на главные ворота."
 bloody_swan.0027.a.success: "Вы успешно преодолели главные ворота"
 bloody_swan.0027.a.failure: "Вашу атаку отразили, а вас схватили"
 bloody_swan.0027.a.failure.tt: "Вас схватили"
 bloody_swan.0027.b: "Где-то должно быть незащищённое окно."
 bloody_swan.0027.b.success: "Вы успешно нашли окно для входа в поместье"
 bloody_swan.0027.b.failure: "Вас раскрыли и схватили"
 bloody_swan.0027.b.failure.tt: "Вас схватили"

 bloody_swan.0028.t: "Финальное противостояние"
 bloody_swan.0028.desc: "Я вышибаю дверь в личные покои, где должен находиться [gondorian_governor.GetTitledFirstName]. Там стоит он, человек, отравивший моего отца. Он сжимает в руке меч, и на его лице появляется слабая, жестокая улыбка, когда он замечает, что я одна.\n\n«Итак», - спокойно произносит он. «Ты пришла, глупая девчонка». Выражение его лица меняется, и в тёмных глазах вспыхивает гнев. «Ты младшая дочь недостойного дома, обречённая на ничтожество. Возвращайтесь в свои хижины на холмах и молитесь, чтобы [Concept('gondor', 'Гондор')|E] довольствовался тем, что оставил вас гнить там».\n\n«Вы ошибаетесь, #italic милорд#!», - отвечаю я, и мои руки сжимают древко моего копья. «Это закончится сегодня ночью, здесь и сейчас. Вы заплатите за смерть моего отца. Вот и всё».\n\n«Дура!» - кричит он, бросаясь вперёд с поднятым клинком. «Я убью тебя сам, пока мои стражники разбираются с твоими людьми...»\n\nЯ наношу удар, но он уворачивается. Завязывается поединок."
 bloody_swan.0028.a: "Я положу этому конец."
 bloody_swan.0028.a.tt: "Начать [Concept('single_combat_duel', 'поединок')|E] против персонажа [gondorian_governor.GetTitledFirstName]"

 bloody_swan.0029.t: "Отмщение"
 bloody_swan.0029.desc: "Бездыханный, но всё ещё теплый [gondorian_governor.GetTitledFirstName] падает на землю передо мной, и я наконец-то могу перевести дух. Наконец-то свершилась месть. Собака, оборвавшая жизнь моего отца, убита!\n\nИ всё же я чувствую... пустоту. Груз ответственности никуда не делся. Мой народ был освобождён от гнёта Глормагиля, но кто может сказать, какого нового губернатора назначит Крылатая корона?\n\nЯ застываю в глубокой задумчивости, пока ко мне не подбегает один из моих спутников. «Нам пора уходить, миледи», - объясняет он, выводя меня из оцепенения. Мы поспешно покидаем город, поскольку хаос, который мы вызвали, распространяется..."
 bloody_swan.0029.a: "Мне нужно о многом подумать."
 bloody_swan.0029.a.tt: "Вы вернётесь в Дунландфеллс"

 bloody_swan.0030.t: "Глормагиль сдаётся"
 bloody_swan.0030.desc: "«Сдаюсь! Я сдаюсь!»\n\n[gondorian_governor.GetTitledFirstName] бросает меч и опускается передо мной на колени со слезами отчаяния на глазах. «Я сдаюсь!», - снова кричит он. «Прошу, я сделаю всё, что угодно, если вы пощадите меня! Вы храбро сражались, разве вы не докажете, что вы сильнее, проявив милосердие к тому, кто подчинился вам, миледи?»\n\nЕго жалобный скулёж заставляет меня глубоко вздохнуть. «Свяжите его и уведите», - приказываю я одному из своих спутников. Кто-то устроил пожар в поместье, и в нарастающем хаосе и неразберихе нам удаётся сбежать с нашим пленником."
 bloody_swan.0030.a: "Бросить его в мою темницу!"
 bloody_swan.0030.a.tt: "Вы вернётесь в Дунландфеллс"

 bloody_swan.0031.t: "Новая цель"
 bloody_swan.0031.desc: "Я выполнила свою клятву и восстановила справедливость в отношении убийцы моего отца. Передо мной теперь лежит много путей. Я - первая королева своего народа, и с падением губернатора [Concept('gondor', 'Гондора')|E] многие вожди теперь признают мою власть, сбросив ярмо Крылатой короны. Теперь я должна укрепить своё правление и позаботиться о том, чтобы Гондор не вернулся и снова не притеснял эти земли..."
 bloody_swan.0031.a: "Нам предстоит многое сделать."

 ### Glormagil Events ###
 bloody_swan.0201.t: "Искра восстания"
 bloody_swan.0201.desc: "В донесениях с восточных холмов говорится о разгорающихся пожарах, о встречах, проводимых в тени, и о том, что вожди заключают союзы без моего разрешения. Снова и снова всплывает одно имя: [eira.GetName], дочь этого проклятого идеалиста #L [murdered_father.GetFirstName]а#!, от которого я избавился. В девице течет кровь ее отца, и не только. Она говорит о справедливости и свободе.\n\nГлупцы всегда забывают, что правосудие вершат победители. Но я не буду действовать поспешно. В открытой войне с мелким племенным герцогством нет славы. Нет, есть другие способы утихомирить подобные разговоры. Шепот золота на ухо недовольному воину. #italic Несчастный случай на охоте!# со слишком преданным слугой. Возможно, даже тайная сделка, заключенная с одной из ее соперниц.\n\nЭта земля многому меня научила. Здесь кинжалы значат больше, чем указы."
 bloody_swan.0201.a: "Послать соглядатаев к её двору. Посеять инакомыслие и разрушить их единство."
 bloody_swan.0201.a.tt: "Разблокирует доступ к нескольким #high сюжетным решениям#!"

 bloody_swan.0202.t: "Посланец принца"
 bloody_swan.0202.desc: "С юга прибывает покрытый пылью гонец с лебединым гербом Бельфаласа. Его слова резки, а тон граничит с дерзостью: [maratar.GetFirstName], второй сын принца Белфаласа, возглавил карательную экспедицию, чтобы разобраться с разбойниками, свирепствующими на побережье. Даже не сказав мне ни слова.\n\nТак. Принц стремится к славе. Без сомнения, он рассчитывает проскакать галопом по [Concept('enedhwaith', 'Энедвайту')|E], как по турнирному полю, растоптав мою тонкую сеть взяток, перемирий и угроз. Я могу напомнить ему, кто здесь #italic на самом деле!# правит. Или, возможно, я позволю ему броситься в огонь и сгореть там, забрав с собой этих разбойников.\n\nНо, с другой стороны, его отец пользуется поддержкой короля. Возможно, этому Маратару можно было бы... придать форму."
 bloody_swan.0202.a: "Послать приглашение. Возможно, мы будем полезны друг другу."
 bloody_swan.0202.b: "Позволить ему разгуляться... навстречу своей гибели."

 ### Rlain Events ###
 bloody_swan.0301.t: "Единство кланов"
 bloody_swan.0301.desc: "Свершилось! Вожди объединились, чтобы создать свободную конфедерацию под моим знаменем. Вместе мы скоро станем достаточно сильны, а [glormagil.GetTitledFirstName], эта комнатная собачонка Крылатой короны, будет [Select_CString(glormagil.IsFemale, 'свергнута', 'свергнут' )] вместе с игом [Concept('gondor', 'Гондора')|E]!\n\nПлемена всё ещё опасаются друг друга и меня. Они были разделены так долго, но они видели доказательства моей доблести и моего мастерства. Я [Select_CString(ROOT.Char.IsFemale, 'была первой', 'был первым' )], кто открыто совершил набег на побережье Гондора, и я буду [Select_CString(ROOT.Char.IsFemale, 'той', 'тем' )], кто покончит с их властью над Речными землями раз и навсегда. И... какие трофеи я получу для себя, когда мы победим! Тарбад богат и созрел для захвата..."
 bloody_swan.0301.a: "Я буду править этим землями."

 bloody_swan.0302.t: "Возвышение Азиры"
 bloody_swan.0302.desc: "Я стою на острие начала новой эры для моего народа. Кланы объединены, и вожди теперь следуют указаниям Азиры, Волчьего повелителя Холода и Жестокости. Я [Select_CString(ROOT.Char.IsFemale, 'взяла', 'взял' )] то, что принадлежит мне по праву завоевания, и я не собираюсь останавливаться на достигнутом.\n\nТеперь, когда [Concept('gondor', 'Гондор')|E] изгнан из [Concept('enedhwaith', 'Энедвайта')|E], пришло время спланировать мой следующий шаг. [Concept('arnor', 'Арнор')|E] занят войнами на севере, но Гондор ещё не оправился от поражения, которое я ему [Select_CString(ROOT.Char.IsFemale, 'нанесла', 'нанёс' )].\n\nКакой бы способ я ни [Select_CString(ROOT.Char.IsFemale, 'выбрала', 'выбрал' )] для следующего удара, я позабочусь о том, чтобы имя [Select_CString(ROOT.Char.IsFemale, 'Дерзкой разбойницы', 'Дерзкого разбойника' )] произносилось в страхе шёпотом по всем землям. Я стану бичом Крылатой короны, проклятием всех дунэдайн!"
 bloody_swan.0302.a: "Моё имя навсегда останется в бесчестии."