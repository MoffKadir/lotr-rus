l_russian:

 festival.004.hobbit.desc: "Гости собираются в праздничном саду, оживлённо обсуждая свои пожелания на грядущие дни и годы.\n\nПод мягким сиянием звёзд я на мгновение останавливаюсь, впитывая весёлую атмосферу и тихие звуки празднества, доносящиеся со всех сторон, и мне приходит в голову, что я тоже [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы загадать желание."
 festival.004.e: "Я желаю, чтобы наши кладовые были полны и чтобы было много вкусных обедов."

 festival.008.hobbit.desc: "Кажется, сам воздух вибрирует от свиста флейт и грохота барабанов, в то время как юные [Concept('hobbits', 'хоббиты')|E] весело танцуют - некоторые даже взбираются для этого на столы.\n\nЭто их радостное проявление радует и разум, и настроение, и я начинаю думать о том, что нас ждёт впереди. О хорошем урожае, обильных обедах и заслуженном отдыхе после тяжёлого дня труда."

 festival.010.d: "Конечно же, местные лакомства!"

 festival.014.hobbit.t: "Счастливые деньки"
 festival.014.hobbit.desc: "Сегодня день нашего запланированного празднества! Все приглашённые [Concept('hobbit', 'хоббиты')|E] прибыли, и каждый сияет от волнения и радости. Скоро празднества начнутся по-настоящему, и это будет грандиозное событие!"
 festival.014.b: "Я с нетерпением жду банкета!"

 festival.018.hobbit.t: "Жажда"
 festival.018.hobbit.desc: "Ах, какой сегодня весёлый вечер! Насколько хватает глаз, радостные хоббиты действительно чудесно проводят время. Но внезапно возникает суматоха. Когда я исследую источник шума, мне на глаза попадается [possessed_priestess.GetFirstName], [Select_CString(possessed_priestess.IsFemale, 'юноша, которого', 'девушка, которую' )] я раньше не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )].\n\n«Пожалуйста, налейте что-нибудь, чтобы промочить горло, побыстрее!» - умоляет [Select_CString(possessed_priestess.IsFemale, 'она', 'он' )], протягивая мне пустую чашку. Действительно, как странно! Запасы уже закончились? Или [possessed_priestess.GetFirstName] испытывает трудности с поиском винных бочек, которые стоят прямо за углом?"
 festival.018.d: "Вот, позволь мне принести тебе что-нибудь выпить."

 festival.019.d: "Что ж, это должно стать отличным развлечением для всех гостей!"

 festival.101.hobbit.t: "Определённый аромат"
 festival.101.hobbit.desc: "Задолго до того, как [target_character.GetName] попадётся кому-нибудь на глаза, до них, безусловно, #italic донесётся#! [target_character.GetHerHis] запах. Хотя духи не являются чем-то необычным в Шире, их аромат ощущается на расстоянии ста футов от владельца.\n\nВозможно, здесь уместна сдержанная нотка, хотя шёпот в другое ухо может гарантировать, что этот недостаток сохранится ещё долго после того, как аромат выветрится."

 festival.103.hobbit.desc: "Прогуливаясь по территории празднества, я слышу громкий голос.\n\n«Мои стихи #italic прекрасны#!! Всего две недели назад [target_character2.GetName] [Select_CString(target_character2.IsFemale, 'испытала', 'испытал' )] моё поэтическое мастерство и [Select_CString(target_character2.IsFemale, 'была поражена', 'был поражён' )] моим мастерством!», - хвастается [target_character.GetFirstName].\n\nЯ не припоминаю никаких слухов о том, что [Select_CString(target_character.IsFemale, 'она', 'он' )] обладает какими-либо поэтическими способностями, но подкрепление [target_character.GetHerHis] притязаний могло бы сослужить мне хорошую службу. Хотя, трудно устоять от того, чтобы поставить [Select_CString(target_character.IsFemale, 'хвастунью', 'хвастуна' )] на место..."

 festival.104.hobbit.desc: "У каждого сборища есть свои приливы и отливы, и нужно остерегаться его течений, чтобы не оказаться на мели.\n\nКогда [target_character3.GetFirstName] и [target_character4.GetFirstName] приветствуют друг друга, я внезапно оказываюсь [Select_CString(ROOT.Char.IsFemale, 'затерянной', 'затерянным' )] в толпе, [Select_CString(ROOT.Char.IsFemale, 'лишённая', 'лишённый' )] возможности вести беседу.\n\nНа некотором расстоянии я вижу, как [target_character.GetFirstName] и [target_character2.GetFirstName] многозначительно смотрят в мою сторону, но является ли такой жест приглашением?"