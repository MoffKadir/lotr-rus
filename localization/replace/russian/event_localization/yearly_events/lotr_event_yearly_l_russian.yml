l_russian:

 # The Longing - Child wants to Sail
 lotr_yearly.0001.t: "Стремление"
 lotr_yearly.0001.desc.intro: "В последние недели [Select_CString(sailor_child.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sailor_child'))] [sailor_child.GetFirstName] проявляет большой интерес к морю, проводит много часов, наблюдая за швартовкой кораблей и посадкой моряков в порту, и играет на берегу, когда это возможно. Сегодня [sailor_child.GetSheHe] [Select_CString(sailor_child.IsFemale, 'загнала', 'загнал' )] меня в угол, возбуждённо настаивая на том, чтобы я [Select_CString(ROOT.Char.IsFemale, 'научила', 'научил' )] [sailor_child.GetHerHis] ходить под парусом.\n\n"
 lotr_yearly.0001.desc.parent: "«[sailor_child.Custom2('RelationToMeShort', ROOT.Char)|U], "
 lotr_yearly.0001.desc.guardian: "«[ROOT.Char.Custom('MistressMaster')|U] [ROOT.Char.GetFirstNameNoTooltip], "
 lotr_yearly.0001.desc.nosailor: "могу ли я стать [Select_CString(sailor_child.IsFemale, 'морячкой', 'моряком' )]?"
 lotr_yearly.0001.desc.model_sailor_you: "могу ли я стать [Select_CString(sailor_child.IsFemale, 'морячкой', 'моряком' )], как ты?"
 lotr_yearly.0001.desc.model_sailor_family: "могу ли я стать [Select_CString(sailor_child.IsFemale, 'морячкой', 'моряком' )], как [model_sailor.GetFirstName]?"
 lotr_yearly.0001.desc.model_sailor: "могу ли я стать [Select_CString(sailor_child.IsFemale, 'морячкой', 'моряком' )], как [sailor_child.Char.Custom2('RelationToMeShort', SCOPE.sC('model_sailor'))] [model_sailor.GetFirstName]?"
 lotr_yearly.0001.desc.outro: " Прошу, позволь мне, я хочу управлять таким могучим судном, как [ROOT.Char.Custom('RegionalShipType')]!»"
 lotr_yearly.0001.a.me: "Я научу тебя всему, что нужно."
 lotr_yearly.0001.a.sailor: "[model_sailor.GetFirstName] научит вас всему, что нужно."
 lotr_yearly.0001.a.nosailor: "Я найду кого-нибудь, кто научит тебя всему, что нужно."
 lotr_yearly.0001.d: "И речи быть не может!"
 taught_sailing_success: "[sailor_child.GetFirstName] изучает основы"
 taught_sailing_failure: "[sailor_child.GetFirstName] быстро сдаётся"

 # The Little Loremaster
 lotr_yearly.0002.t: "[Select_CString(ROOT.Char.IsFemale, 'Маленькая хранительница', 'Маленький хранитель' )] знаний"
 lotr_yearly.0002.desc.intro: "В последнее время [curious_child.GetFirstName] не даёт мне покоя своими расспросами о [Concept('middleearth', 'Средиземье')|E] и его истории. [curious_child.GetSheHe|U] [Select_CString(curious_child.IsFemale, 'одержима', 'одержим' )] желанием узнать всё до мельчайших подробностей, вплоть до изучения приложений. Каждые пять минут [Select_CString(curious_child.IsFemale, 'она', 'он' )] задает новые вопросы:"
 lotr_yearly.0002.desc.outro: "\n\nДошло до того, что даже [Select_CString(loremaster.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName|l] [loremaster.GetFirstName] заметно раздражается. Теперь [curious_child.GetSheHe] даже не дает нам спокойно поесть!"
 lotr_yearly.0002.a: "#EMP Вздох.#! Ну, понимаешь..."
 lotr_yearly.0002.b: "Наверняка [loremaster.GetFirstName] знает это."
 lotr_yearly.0002.c: "Хватит! Разбирайся [Select_CString(curious_child.IsFemale, 'сама', 'сам' )]!"
 lotr_yearly.0002.c.rage: "[ROOT.Char.Custom('CulturalCurse')|U]! Мне #bold наплевать!#!"
 lotr_yearly.0002.tt: "[curious_child.GetFirstNameNoTooltip] продвинется в [Concept('education_focus', 'обучении')|E] [Concept('learning', 'учености')|E]"
 lotr_yearly.0002.tt_matching: "[curious_child.GetFirstNameNoTooltip] значительно продвинется в [Concept('education_focus', 'обучении')|E] [Concept('learning', 'учености')|E]"

