l_russian:
 ####################################
 ### Bountig Medlokan Story Cycle ###
 ####################################
 # Intro to his story - fight in the West against Rohan
 story_cycle_bountig_medlokan: "Скитания Бунтига"
 story_cycle_bountig_medlokan_desc: "Судьба оторвала #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('bountigmedlokan').GetID] #L Бунтига#!#! от его дома и семьи, и теперь он скитается по обширным землям [Concept('middleearth', 'Средиземья')|E]. Его путешествия коснутся многих стран на западе и юге, прежде чем настанет время снова вернуться на родину. Ищите особые сюжетные контракты, которые позволят ему набраться опыта и мудрости во время путешествия.\n\n$bountig_event_chain.0012.a.tt.2$"
 bountig_medlokan_intro_to_story: "Ваше [Concept('domicile', 'имение')|E] будет перемещено в столицу персонажа [contract_employer.GetName].n\n[contract_employer.GetName] начнёт войну с персонажем [GetTitleByKey('k_rohan').GetHolder.GetName] в союзе с #V вами#!"

 #################################
 ### Eradan - War in the North ###
 #################################
 story_cycle_eradan: "Защитники Эриадора"
 story_cycle_eradan_desc: "[GetTitleByKey('d_laamp_guardians_of_sarn_ford').GetName] призваны защищать [Concept('eriador', 'Эриадор')|E]. На севере [Concept('middleearth', 'Средиземья')|E] растёт новая угроза, и Эрадан, Андриэль и Фарин должны остановить её. Ищите особые сюжетные контракты, которые помогут вам пройти путь защитников Эриадора! В безопасных местах вы можете поговорить с местными жителями, чтобы получить информацию о следующем этапе вашего путешествия."
 warriors_three_desc: "Троица воинов"

 ########################
 ### Arphazêl's Story ###
 ########################
 story_cycle_arphazel: "Восходящая заря"
 story_cycle_arphazel_desc: "Арфазель из Анагзайяна сбежала из своего плена и теперь стремится построить новую жизнь. Ищите особые сюжетные контракты, которые помогут Арфазель продвинуться в приключениях!"

 ####################
 ### Purge of Ray ###
 ####################
 lotr_story_cycle_purge_of_ray: "Чистка Раи"
 lotr_story_cycle_purge_of_ray_desc: "Своим возвышением [GetTitleByKey('k_ray').GetHolder.GetFirstName] погрузил державу [GetTitleByKey('k_ray').GetName] в хаос, и как мятежники, так и реакционеры стремятся извлечь выгоду из нестабильности и привести к трону свою фракцию. Чтобы восстановить порядок в Рае, потребуются умелые интриги и железный кулак."
 pacification: "Усмирение"
 resistance: "Сопротивление"
 purge_opponents: "Противники"
 min_pacification: "0"
 max_pacification: "20"
 min_resistance: "$min_pacification$"
 max_resistance: "$max_pacification$"

 ###############################
 ### Éira Bloodspear's Story ###
 ###############################
 story_cycle_eira: "Стремление к мести"
 story_cycle_eira_desc: "TEMP Mark my words, vengeance #italic will#! be mine!"
 EIRA_FORMABLE_KINGDOM: "[GetTitleByKey('k_dunlandfells').GetName]"

 ################
 ### THE MASK ###
 ################
 story_cycle_goblin_mask: "Маска"
 story_cycle_goblin_mask_desc: "Вы нашли любопытную маску. На ней нет украшений, за исключением нескольких звериных рогов, и она, кажется, идеально подходит к вашему лицу. От неё исходит странное притяжение, словно она #italic хочет#!, чтобы её надели. Вам трудно противостоять этому притяжению. Маска иногда приносит пользу, но иногда она может сбить вас с пути истинного. Остерегайтесь последствий владения маской... потому что в какой-то момент она может начать владеть #italic вами...#!"

 ##############################
 ### Avatar of Sîrayn Deity ###
 ##############################
 story_cycle_avatar_of_faith: "Воплощение [GetPlayer.GetFaith.HighGodNamePossessive]"
 story_cycle_avatar_of_faith_desc: "Вы вознеслись, чтобы воплотить в себе [GetPlayer.GetFaith.HighGodNameAlternatePossessive]. Как на воплощение [GetPlayer.GetFaith.HighGodHerHis] воли, все #L [GetPlayer.GetFaith.GetName|l]#! верующие смотрят на вас с почтением. Если вы хорошо разыграете свои карты, то сможете даже создать систему правления, в которой это божественное происхождение будет передаваться и вашим потомкам."
 story_cycle_avatar_of_faith_info_tooltips: "$story_cycle_avatar_of_faith_warn_tt$\n$story_cycle_avatar_of_faith_warn_tt2$"
 story_cycle_avatar_of_faith_warn_tt: "#warning @warning_icon! Отказ от вашей [Concept('faith', 'конфессии')|E] лишит вас божественности и повлечёт за собой последствия#!"
 story_cycle_avatar_of_faith_warn_tt2: "#help Создание новой [Concept('faith', 'конфессии')|E] не повлечёт за собой такого наказания#!"