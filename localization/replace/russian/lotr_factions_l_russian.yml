l_russian:
 # Vanilla faction extra loc
 LOTR_ORC_FACTION_DEMAND_INDEPENDENCE_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nУ вас, ничтожества, не хватит духу повести нас за собой! [faction_leader.GetPrimaryTitle.GetNameNoTier] и другие племена фракции [faction.GetName] больше не последуют за вами, убожество. Примите наши требования или мы разорвём вас на куски!"

 LOTR_ORC_FACTION_DEMAND_LIBERTY_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nМы с парнями устали от вашей бесполезной болтовни. Либо соглашайтесь с требованиями фракции [faction.GetName], либо мы выпотрошим вас и заберём с вашего трупа всё, что захотим!"

 LOTR_ORC_FACTION_DEMAND_POPULIST_DESC: "#L [peasant_leader.GetCulture.GetCollectiveNoun|l]ие#! [peasant_leader.GetFaith.GetAdherentNamePlural|l] достаточно настрадались от гнёта подобных вам жалких тиранов! Настало время [Concept( 'orcs', 'орков' )|E]! \n\nНас ведёт [peasant_leader.GetFaith.WarGodName], и мы готовы уничтожить вас и освободиться от вашей [ROOT.Char.Custom2('GetUnbelieverTermAdjective', peasant_leader)]ой власти!"

 LOTR_ORC_FACTION_DEMAND_CLAIMANT_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nМы с парнями пораскинули мозгами... Таким слабакам, как вы, нечего нами управлять! [faction_claimant.GetName] возглавит [faction_targeted_title.GetNameNoTier], так или иначе!"
 LOTR_ORC_FACTION_DEMAND_CLAIMANT_DESC_ME: "Мы с парнями пораскинули мозгами... Таким слабакам, как вы, нечего нами управлять! [faction_targeted_title.GetNameNoTier] по праву принадлежит МНЕ, и если вы не отдадите мне то, что моё по праву, я просто заберу это у вас!"

 LOTR_ORC_FACTION_DEMAND_COLLAPSE_DESC: "[faction_leader.Custom2('AppropriateGreetingNegative', ROOT.Char)]\n\nВаша слабость неприемлема! [faction_target.GetPrimaryTitle.GetNameNoTier] - жалкое подобие державы. Мы считаем, что нам будет лучше самим по себе. Признайте нашу независимость или мы заставим вас истекать кровью!"

 # Orc Revolt Faction
 orc_revolt_faction: "Фракция восстания орков"
 orc_revolt_faction_desc: "Орки, наводнившие некоторые части нашей державы, становятся всё смелее, собирая свои силы под руководством новых вождей, и, если их не подавить, могут восстать в надежде восстановить свою независимость."
 orc_revolt_faction_short_effect_desc: "Хочет независимости"
 orc_revolt_faction_every_county: "Каждое графство во фракции"
 orc_revolt_faction_spawn_county_levies: "Создаёт [Concept('army','армию')|E] орков-мятежников, пропорциональную [Concept('levies','ополчению')] графства."
 FACTION_DEMAND_ORC_REVOLT: "[ROOT.Char.Custom('InsultAdjective')] [ROOT.Char.GetTitledFirstName]"
 FACTION_DEMAND_ORC_REVOLT_DESC: "В последние месяцы орки, наводнившие некоторые части нашей державы, стали смелее, набираясь сил под руководством новых вождей. Местным гарнизонам не удалось их искоренить, и теперь они подняли полномасштабное восстание.\n\nМы стоим перед выбором: начать тотальную войну, чтобы уничтожить орков или полностью покинуть наводнённые орками земли."
 FACTION_DEMAND_ORC_REVOLT_ACCEPT: "Вывести гарнизоны и покинуть территорию!"
 FACTION_DEMAND_ORC_REVOLT_REFUSE: "Мы должны изгнать орочью мерзость! Война!"
 FACTION_ORC_REVOLT_NAME: "Восстание орков"
 FACTION_ORC_REVOLT_TITLE_NAME: "Восстание орков"

 maglor_nadi_manye_faction: "Фракция еретиков Нади-манье"
 maglor_nadi_manye_faction_short_effect_desc: "Хочет возвести на престол духовного лидера"
 maglor_nadi_manye_faction_desc: "Фракция, нацелившаяся на ваши земли в надежде сделать свою конфессию доминирующей в регионе"
 maglor_nadi_manye_faction_special_character_title: "Лидер нади-маньитов"

 #Rule By Shadows
 FACTION_REASON_RULE_BY_SHADOWS: "[GetCultureTradition('tradition_rule_of_the_shadows').GetName]: $VALUE|0+=$"