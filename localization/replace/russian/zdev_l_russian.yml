l_russian:

 lotr_thani_hazad.4000.t: "Под буревыми знаменами"
 lotr_thani_hazad.4000.desc: "Наконец я [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] в Адуназаин, главную гавань Ан-Балкумагана.\n\nЯ всю жизнь [Select_CString(ROOT.Char.IsFemale, 'слышала', 'слышал' )] об этом побережье в Миспире и [Select_CString(ROOT.Char.IsFemale, 'хранила', 'хранил' )] путевую книгу Сакалхада Зимрадуне, который, будучи уроженцем этих земель, отзывался о них весьма высоко. Когда я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] над заливом башню, сияющую серебром и светлым электрумом, я [Select_CString(ROOT.Char.IsFemale, 'вообразила', 'вообразил' )], что анбалухорим — народ гордый и грозный, подобный западным владыкам. Но когда наш корабль вошел под эти стены, а буревые знамена тяжело нависли над гаванью, я [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что почти все мои представления были ложны.\n\nЕще до того, как мы пришвартовались, на борт поднялись портовые люди. Они говорили мало, но осмотрели все. Я [Select_CString(ROOT.Char.IsFemale, 'назвала', 'назвал' )] свое имя и имя отца и [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )] лишь то, что было необходимо. Когда они услышали, что я адунайского рода и из Миспира, их поведение изменилось, хотя и не слишком заметно. Моим слугам обыск пришелся не по нраву, но я [Select_CString(ROOT.Char.IsFemale, 'осадила', 'осадил' )] их. Я [Select_CString(ROOT.Char.IsFemale, 'заплатила', 'заплатил' )] там, где ждали платы, и [Select_CString(ROOT.Char.IsFemale, 'была довольна', 'был доволен' )], что [Select_CString(ROOT.Char.IsFemale, 'сошла', 'сошел' )] на берег, сохранив свой багаж при себе."
 lotr_thani_hazad.4000.a: "По крайней мере, я [Select_CString(ROOT.Char.IsFemale, 'сошла', 'сошел' )] на берег [Select_CString(ROOT.Char.IsFemale, 'целой', 'целым' )]."
 lotr_thani_hazad.4000.a.tt: "Вы благополучно прибыли в гавань Ан-Балкумагана."

 lotr_thani_hazad.4001.t: "Пристань"
 lotr_thani_hazad.4001.desc: "Первое, что я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] на пристани, был рабочий невысокого роста, несомненно местный слуга из этих земель: его жестоко ударили кнутом по лицу за то, что он споткнулся под тяжестью ящика. Окровавленный, он пошатнулся, согнулся, получил еще один удар, а затем без единого слова поднялся на ноги, снова взвалил ящик и пошел дальше. Ни один прохожий не обратил на это внимания, даже не взглянул в сторону случившегося.\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'отшатнулась', 'отшатнулся' )] от такой жестокости, и все же это место не выглядит нищим. Гавань широка и полна товаров с разных берегов: кувшинов с вином, крашеных тканей, сосудов с маслом, резной слоновой кости, пряностей, леса и меди, потемневшей в трюмах. Богатства здесь в избытке, но его не выставляют напоказ, как в Миспире. Здесь его охраняют, считают, держат крепко и жадно.\n\nКогда мы поднялись от пристани, я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] солдат повсюду: у ворот, складов, таможенных домов и подходов к рынку. Речь вокруг меня была адунайской, но не моей, а простой люд поспешно отходил в сторону всякий раз, когда мимо проходили вооруженные люди."
 lotr_thani_hazad.4001.a: "Мне стоит внимательно присмотреться к этому месту."
 lotr_thani_hazad.4001.a.tt: "Вы изучаете гавань и ее суровый порядок."

 lotr_thani_hazad.4002.t: "Моя первая ночь в гавани"
 lotr_thani_hazad.4002.desc: "После некоторой задержки мы нашли пристанище. Хозяин постоялого двора принял меня достаточно хорошо, когда мое положение стало ему ясно, хотя я [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )], как он оценивает каждую застежку, кольцо и сундук, проходившие через его двери. Он назвал высокую цену. Я [Select_CString(ROOT.Char.IsFemale, 'заплатила', 'заплатил' )].\n\nЗа ужином я [Select_CString(ROOT.Char.IsFemale, 'услышала', 'услышал' )] больше, чем [Select_CString(ROOT.Char.IsFemale, 'сказала', 'сказал' )]. Двое офицеров сидели во внутренней комнате с несколькими купцами. Они говорили о речной торговле, сборах, беспорядках во внутренних землях и каком-то деле о конфискации, которое их весьма забавляло. Раз или два я [Select_CString(ROOT.Char.IsFemale, 'заметила', 'заметил' )], как они бросают взгляды в мою сторону.\n\nМне не раз говорили, что, если я желаю по-настоящему узнать Ан-Балкумаган, мне нужно отправиться вглубь страны. Возможно, так оно и есть. Но после времени, проведенного здесь, я одновременно [Select_CString(ROOT.Char.IsFemale, 'очарована', 'очарован' )] и [Select_CString(ROOT.Char.IsFemale, 'отвращена', 'отвращен' )] неприкрытой жестокостью этого места. Долгой ночью я размышляю о том, каким будет мое следующее назначение."
 lotr_thani_hazad.4002.a: "Я отплыву дальше, в Корлею."
 lotr_thani_hazad.4002.a.tt: "Вы продолжите свое путешествие на север вдоль кольца Белегаэра."
 lotr_thani_hazad.4002.b: "Мне стоит идти так далеко, как позволит судьба."
 lotr_thani_hazad.4002.b.tt: "Вы отправитесь на север, настолько далеко, насколько сможете."
 lotr_thani_hazad.4002.c: "Я останусь здесь на некоторое время и узнаю нравы этого места."
 lotr_thani_hazad.4002.c.tt: "Вы остаетесь в гавани Ан-Балкумагана и наблюдаете, прежде чем двинуться дальше."



 ##### Azulzir Travels: Arpel #####

 # 4010: Overland arrival into Arpel.
 lotr_thani_hazad.4010.t: "В стенах Арпела"
 lotr_thani_hazad.4010.desc: "#Bold Три великие гавани есть на крайнем юге, и [GetTitleByKey('c_arpel').GetNameNoTier] ничуть не уступает другим.#!\n\nЯ спешиваюсь у внешней арки и иду среди толпы. Здесь женщины из [GetTitleByKey('k_koronande').GetNameNoTier] в шафрановых и индиговых одеждах, с медными браслетами до самых локтей, несут корзины с речной рыбой. Здесь мумакийские погонщики со своими медлительными, мудрыми зверями. Здесь купцы из Сенгани в светлом льне выкрикивают цены всякому, кто готов слушать. А плечом к плечу с ними, неторопливые и исполненные достоинства, идут люди этих самых земель — [GetTitleByKey('k_pel').GetNameNoTier], всех оттенков теплого ореха, и нрав их так же тепл. Среди них, укутанные в белое, движутся магрин и тумагрин, что в давние годы владели этой страной и были изгнаны, но все еще торгуют на ее рынках так, будто никогда не уходили.\n\nВот чего я не [Select_CString(ROOT.Char.IsFemale, 'ожидала', 'ожидал' )]: что женщины [GetTitleByKey('k_pel').GetNameNoTier] будут ходить столь свободно. У поясов они носят ключи и печати для счетных книг, а мужчины уступают им дорогу так же охотно, как любому князю-купцу. Они торгуются, смеются, спорят о весе и мере, ведут сделки и трудятся без мужского дозволения и без супруга за плечом. В [GetTitleByKey('c_mispir').GetNameNoTier] так работают лишь вдовы да бедные; здесь же это просто рыночный час. [adunaic|E] служит общим языком, но в их устах он древнее по звучанию и проще в гласных, а под ним течет их собственная родная речь.\n\nМиспир, при всем ее величии, никогда не показывал мне столько мира сразу. Мой кошель тяжел, моя дорога долга, и хотя я [Select_CString(ROOT.Char.IsFemale, 'сильно взволнована', 'сильно взволнован' )] всеми этими зрелищами, столь близкими и столь далекими от дома, мне нужно осторожно решить, как провести этот первый день."
 lotr_thani_hazad.4010.a: "Я запасусь как следует, прежде чем идти дальше."
 lotr_thani_hazad.4010.a.tt: "Вы покупаете лучшее, что могут предложить рынки [GetTitleByKey('c_arpel').GetNameNoTier]: копченую рыбу, сушеные фрукты, твердый хлеб, сладкое южное вино. Вы получаете #P прибавку к здоровью#! и запас #P провизии#! для дороги."
 lotr_thani_hazad.4010.b: "Такой порт — лучшее место, чтобы сделать ставку на корабль."
 lotr_thani_hazad.4010.b.tt: "Вы вкладываете значительную часть своего наследства в торговое предприятие, отправляющееся из [GetTitleByKey('c_arpel').GetNameNoTier]."
 lotr_thani_hazad.4010.c: "Сегодня я лишь пройдусь по ее улицам и немного отдохну."
 lotr_thani_hazad.4010.c.tt: "Вы проводите день праздно, впитывая виды и звуки [GetTitleByKey('c_arpel').GetNameNoTier]."

 # 4011: The arrest in the rich quarter.
 lotr_thani_hazad.4011.t: "Крик из расписанного дома" 
 lotr_thani_hazad.4011.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'поднялась', 'поднялся' )] в лучший квартал, где дома [GetTitleByKey('k_pel').GetNameNoTier] обращены внутрь, к тенистым дворам, а дверные проемы по старому обычаю расписаны красной охрой и лазуритом. Здесь в своей гордости живут купеческие кланы, и [GetTitleByKey('c_arpel').GetNameNoTier] здесь тише всего.\n\nИ тут я слышу это: не обычный рыночный шум, а одинокий голос, поднятый в ярости. Из высоких ворот меньше чем в двадцати шагах впереди трое мужчин в темных кольчугах тащат за руки пожилого господина из [GetTitleByKey('k_pel').GetNameNoTier]. Он одет для совета или какого-то торжественного случая: в длинное одеяние из выбеленного льна и тяжелое медное ожерелье. Даже сейчас, спутанный и грубо схваченный, он держится как человек, непривычный к насилию у собственного порога.\n\nОн кричит, и в его голосе нет страха. Я не могу разобрать каждое слово, но слышу: '#italic — Совет! Он связан решением Совета! —#!' — прежде чем солдат сильно бьет его по губам, и слова превращаются лишь в кровь.\n\nНесколько прохожих остановились. Еще больше идут дальше, не отрывая глаз от своих сандалий. Двери соседних домов, как я вижу, заперты изнутри."
 lotr_thani_hazad.4011.a: "Я подойду ближе. Я узнаю, что здесь происходит."
 lotr_thani_hazad.4011.a.tt: "Вы приблизитесь к месту волнения." # You are going where you arent wanted this will decrease the global variable Azulzir_seregul_relation which is default at 1 to 0
 lotr_thani_hazad.4011.b: "Нет. Это не моя страна и не моя ссора."
 lotr_thani_hazad.4011.b.tt: "Вы идете дальше. Это дело вас не касается." # Seregul Appreciates your non-nosyness improves chances for deal later increases global variable Azulzir_seregul_relation from 1 to 2

 # 4012: Investigate path - armed escort to Seregul's palace.
 lotr_thani_hazad.4012.t: "Нежданное приглашение"
 lotr_thani_hazad.4012.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'оставила', 'оставил' )] своих спутников на углу: одинокий человек, расспрашивающий о соседской ссоре, может получить ответы там, где [Select_CString(ROOT.Char.IsFemale, 'молодая госпожа', 'молодой лорд' )] со своей свитой не добьется ничего.\n\nЯ не [Select_CString(ROOT.Char.IsFemale, 'прошла', 'прошел' )] и двадцати шагов к расписным воротам, как поняла, что меня уже ждали.\n\nОни вышли со всех сторон разом и очень быстро: шестеро, в таких же темных кольчугах, как и те, кто тащил старика, со знаком офицера [GetTitleByKey('c_arpel').GetNameNoTier]. Их капитан, высокий мужчина, несомненно [adunaic|E] с матерью из [GetTitleByKey('k_pel').GetNameNoTier], судя по его облику, учтиво мне поклонился.\n\n'Мой [Select_CString(ROOT.Char.IsFemale, 'госпожа', 'господин' )] из [GetTitleByKey('c_mispir').GetNameNoTier], — сказал он. — Наш князь [seregul.GetFirstName] услышал о вашем прибытии и давно желал общества столь [Select_CString(ROOT.Char.IsFemale, 'знатной молодой путешественницы', 'знатного молодого путешественника' )]. Он приглашает вас сегодня вечером к своему столу. Капитан стражи станет вашим провожатым, чтобы вы не заблудились на наших улицах, которые после наступления темноты могут сбить с толку чужеземца.'\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'поняла', 'понял' )], что вопроса мне не задавали."
 lotr_thani_hazad.4012.a: "Я кланяюсь и принимаю то, от чего нельзя отказаться."
 lotr_thani_hazad.4012.a.tt: "Вас под вооруженной охраной проводят во дворец [seregul.GetFirstName]."

 # 4013: Don't-investigate path - the letter and the same invitation.
 lotr_thani_hazad.4013.t: "Письмо, вложенное мне в руку" 
 lotr_thani_hazad.4013.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'повернулась', 'повернулся' )] спиной к расписанному дому и [Select_CString(ROOT.Char.IsFemale, 'пошла', 'пошел' )] дальше, а крики остались позади и затихли.\n\nНо я не [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )] пройти и двух улиц, как из тенистой колоннады ко мне вышел еще один человек. По одежде он был [GetTitleByKey('k_pel').GetNameNoTier] из горожан, уже не молодой, но и не старый, очень бледный под темной кожей, тяжело дышащий и старающийся этого не показывать.\n\n'[Select_CString(ROOT.Char.IsFemale, 'Госпожа', 'Господин' )]... [Select_CString(ROOT.Char.IsFemale, 'госпожа', 'господин' )] с севера... Я знаю ваше лицо, вы прибыли этим утром с прекрасной свитой, вы [adunaic|E], да? Прошу, выслушайте меня! Это вопрос жизни и смерти!'\n\nДальше он не [Select_CString(ROOT.Char.IsFemale, 'успела', 'успел' )]. Через плечо я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )], как далеко внизу по улице двое кольчужников князя сворачивают за угол и ускоряют шаг. Мужчина увидел их в тот же миг, и остатки цвета сошли с его лица. Он резко прижал что-то к моей груди: тонкий сверток, дважды запечатанный, с воском, теплым от жара его тела.\n\n'Для великой [tamska|E] из [GetTitleByKey('e_mag_tumag').GetNameNoTier]. Умоляю вас... любой дорогой... только пусть оно попадет ей в руки...'\n\nИ тут он исчез, растворившись в море лиц [GetTitleByKey('c_arpel').GetNameNoTier] так, будто его никогда и не было. Сверток все еще был теплым под моей туникой, когда подошли солдаты.\n\nОни не обнажили против меня оружия. Возможно, они даже не видели того человека. Их капитан поклонился совершенно должным образом. '[Select_CString(ROOT.Char.IsFemale, 'Моя госпожа', 'Мой господин' )] [GetScriptedCharacterByHistoryID('lineofzaradancadet22').GetFirstName] из [GetTitleByKey('c_mispir').GetNameNoTier]. Наш князь [seregul.GetFirstName] услышал о вашем прибытии и приглашает вас сегодня вечером к своему столу. Нас послали сопровождать вас: наши улицы после наступления темноты могут сбить чужеземца с пути.'\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'поклонилась', 'поклонился' )] в ответ. Я чувствовала воск свертка у своих ребер. Он был, как мне казалось, поистине очень теплым."
 lotr_thani_hazad.4013.a: "Что ж, что ж. Похоже, я буду ужинать с князем."
 lotr_thani_hazad.4013.a.tt: "Вас под вооруженной охраной проводят во дворец [seregul.GetFirstName], а тайное письмо все еще будет спрятано при вас. Да благоволит вам судьба."

 # 4014: Counter event - Pel's perspective.
 lotr_thani_hazad.4014.t: "Щеголеватый гость"
 lotr_thani_hazad.4014.desc: "Мне донесли, что в [GetTitleByKey('c_arpel').GetNameNoTier] из [GetTitleByKey('c_mispir').GetNameNoTier] [Select_CString(azulzir.IsFemale, 'прибыла какая-то юная богатая ничтожность', 'прибыл какой-то юный богатый ничтожество' )], соря золотом так, будто оно столь же обычно, как вода. [Select_CString(azulzir.IsFemale, 'Адунайка', 'Адунаец' )] из какого-то старинного дома, название которого я никогда не [Select_CString(ROOT.Char.IsFemale, 'трудилась', 'трудился' )] запомнить: [azulzir.GetFullName], [Select_CString(azulzir.IsFemale, 'дочь', 'сын' )] недавно умершего кого-то-там в Миспире, [Select_CString(azulzir.IsFemale, 'явившаяся', 'явившийся' )] на юг, по-видимому, посмотреть мир.\n\n[Select_CString(azulzir.IsFemale, 'Туристка', 'Турист' )]. Из всех возможных напастей — в моем [GetTitleByKey('c_arpel').GetNameNoTier] [Select_CString(azulzir.IsFemale, 'туристка', 'турист' )].\n\nЯ бы не [Select_CString(ROOT.Char.IsFemale, 'обратила', 'обратил' )] на [Select_CString(azulzir.IsFemale, 'нее', 'него' )] ни малейшего внимания, не сунь [Select_CString(azulzir.IsFemale, 'она', 'он' )] нос туда, куда не следовало. [Select_CString(azulzir.IsFemale, 'Ее видели', 'Его видели' )] в консульском квартале тем самым утром, когда я [Select_CString(ROOT.Char.IsFemale, 'произвела', 'произвел' )] аресты. А вскоре после этого [Select_CString(azulzir.IsFemale, 'ее видели', 'его видели' )] за любезничаньем со шпионом! [Select_CString(azulzir.IsFemale, 'Щеголиха', 'Щеголь' )] с избытком денег и недостатком ума в обычные времена была бы лишь досадной помехой. Но времена нынче необычные, а Миспир давно уже смотрит на дела моего разбитого царства глазами острее моих.\n\nБудь они все прокляты! [Select_CString(azulzir.IsFemale, 'Ее прислали', 'Его прислали' )]? [Select_CString(azulzir.IsFemale, 'Любимица', 'Любимец' )] [phorakon.GetFirstName] или, что хуже, [tamska.GetFirstName]? [Select_CString(azulzir.IsFemale, 'Готовая', 'Готовый' )] донести обо всех моих промахах здесь, чтобы они нашли повод наброситься? Или [Select_CString(azulzir.IsFemale, 'она', 'он' )] лишь то, чем кажется: [Select_CString(azulzir.IsFemale, 'богатая городская дурочка', 'богатый городской дурак' )], [Select_CString(azulzir.IsFemale, 'приехавшая', 'приехавший' )] поглазеть на провинциалов.\n\nЭто неважно. Так или иначе, сегодня вечером [Select_CString(azulzir.IsFemale, 'она окажется', 'он окажется' )] за моим столом, и я #italic узнаю#!, с какой целью [Select_CString(azulzir.IsFemale, 'она явилась', 'он явился' )] в мои владения!"
 lotr_thani_hazad.4014.a: "Ввести [Select_CString(azulzir.IsFemale, 'ее', 'его' )]. Посмотрим, что за рыба сама забрела в мои сети."

 # 4015: First Seregul conversation - "what are you doing here?"
 lotr_thani_hazad.4015.t: "За столом князя"
 lotr_thani_hazad.4015.desc: "Зал [seregul.GetFirstName] построен в старом высоком [adunaic|E] стиле: длинный, мраморный, с кедровыми стропилами и окнами, расположенными так высоко, что ни один человек не может заглянуть внутрь или наружу без княжеского дозволения. На этот вечер он отослал почти весь свой двор. Здесь только князь во главе стола, двое его стражников, неподвижных у стены, молчаливый распорядитель и я [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )].\n\nОн старше, чем казался мне на портретах в зале закона. Худой, голубоглазый, дорого одетый, с беспокойным ртом человека, который, несомненно, сотню раз репетирует ответы, прежде чем произнести их. Я [Select_CString(ROOT.Char.IsFemale, 'стояла', 'стоял' )] там, ожидая его дозволения. Он жестом указывает на кресло по правую руку от себя, как человек мог бы указать место собаке.\n\n'[azulzir.GetFirstNameNoTooltip] из [GetTitleByKey('c_mispir').GetNameNoTier], — говорит он, чуть переиначивая мое имя, словно пробуя его на вкус. — Добро пожаловать в мой бедный город. В наши дни мы видим так мало достойных гостей с севера. Дорога, как мне говорят, плоха. Страна, как мне говорят, неспокойна. И все же вы здесь — [Select_CString(ROOT.Char.IsFemale, 'одна', 'один' )], по всем сведениям, если не считать нескольких слуг и этого славного толстого кошеля; а ваш отец, как мне сообщили, совсем недавно лег в могилу.'\n\n'Скажите мне, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный лорд' )]. Чего во всем широком мире человек вашего дома может искать в [GetTitleByKey('c_arpel').GetNameNoTier]?'" # Guys I don't he likes seregul
 lotr_thani_hazad.4015.a: "Я всего лишь [Select_CString(ROOT.Char.IsFemale, 'путешественница', 'путешественник' )]. Мир широк, и я хочу увидеть его."
 lotr_thani_hazad.4015.b: "Я [Select_CString(ROOT.Char.IsFemale, 'пришла', 'пришел' )] учиться у прославленного князя [GetTitleByKey('k_pel').GetName]." # he is expecting flattery no change

 # 4016: Second Seregul conversation - what he actually wants.
 lotr_thani_hazad.4016.t: "Настоящий вопрос князя"
 lotr_thani_hazad.4016.desc: "Он наливает мне вина, которое стоило бы годового содержания меньшей виллы моего покойного отца. Я осторожно беру чашу и пью, пока он смотрит на меня, изучает меня. Затем, словно эта мысль только сейчас пришла ему в голову, он ставит свою чашу и чуть наклоняется вперед.\n\n'Вы, конечно, бывали при дворе в [GetTitleByKey('c_mispir').GetNameNoTier]. Скажите мне — и простите старому провинциальному князю его любопытство, — как [balan_lai|E] говорит обо мне в эти дни?'\n\nУлыбка возвращается, легкая как перо. Но глаза — нет.\n\n'Они, я уверен, говорят о смутах в [GetTitleByKey('k_pel').GetName]. Они наверняка уже сплели для вас сказку. Туземцы неспокойны. Совет важничает. Князь [GetTitleByKey('c_arpel').GetNameNoTier] не может управиться с собственным домом. Так уж заведено, когда [phorakon.GetFirstName] скучает, а [tamska.GetFirstName] мнит себя [Select_CString(tamska.IsFemale, 'умницей', 'умником' )], и им нужен южный дурак, над которым можно посмеяться за вечерним вином.'\n\nОн ненадолго оставляет эти слова висеть в воздухе. Затем говорит мягче:\n\n'[Select_CString(ROOT.Char.IsFemale, 'Молодая женщина', 'Молодой человек' )] со вкусом, возвращаясь в [GetTitleByKey('c_mispir').GetNameNoTier] после долгого и расширяющего кругозор путешествия, [Select_CString(ROOT.Char.IsFemale, 'будет услышана', 'будет услышан' )], знаете ли. [Select_CString(ROOT.Char.IsFemale, 'Ее впечатления имели', 'Его впечатления имели' )] бы вес. [Select_CString(ROOT.Char.IsFemale, 'Она могла', 'Он мог' )] бы, по-своему, исправить это дело за столом у своего дяди или кузена. [Select_CString(ROOT.Char.IsFemale, 'Она могла', 'Он мог' )] бы рассказать им, что [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )] собственными глазами: что дикари сами стали здесь тиранами, что Совет связан не древним обещанием, а древней злобой, и что князь [GetTitleByKey('k_pel').GetNameNoTier] один удерживает цивилизацию в своем кулаке против этой темной земли.'\n\nОн снова улыбается. Он не совсем попросил. Он не совсем угрожал. Но солдаты у стены не сдвинулись ни на дюйм, а распорядитель так и не наполнил мою чашу."
 lotr_thani_hazad.4016.a: "Я расскажу любую историю, какую мой хозяин пожелает услышать."
 lotr_thani_hazad.4016.b: "Я плохо подхожу на роль княжеского рупора, мой лорд. Я вижу лишь то, что показывают мне глаза."
 lotr_thani_hazad.4016.c: "И чего, мой князь, стоила бы вам такая услуга?" # Skill check diplomacy. difficulty will be impossible harder or easier or by previous events as described through the use of a global variable

 # 4017: Agreement outcome - the purse and the ring.
 lotr_thani_hazad.4017.t: "Задаток князя"
 lotr_thani_hazad.4017.desc: "'Мудрый ответ, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный лорд' )]. Мудрость в столь [Select_CString(ROOT.Char.IsFemale, 'зеленой', 'зеленом' )] возрасте — вещь более редкая, чем рубины, и стоит почти столько же.'\n\nОн зовет своего распорядителя, а затем подталкивает через кедровый стол тяжелый кошель, и рядом с ним — тонкое медное кольцо с печатью [GetTitleByKey('c_arpel').GetNameNoTier].\n\n'Примите это как знак княжеской приязни. Называйте это задатком, благодарностью — как пожелаете. С этой ночи у вас есть друг на юге, и его память, как вы убедитесь, столь же длинна, как его рука.'\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'кланяюсь', 'кланяюсь' )]. Солдаты у стены без единого слова расступаются, и я [Select_CString(ROOT.Char.IsFemale, 'выхожу', 'выхожу' )] под высокие звезды [GetTitleByKey('c_arpel').GetNameNoTier] с золотом, тяжело оттягивающим пояс, и княжеским знаком на руке, что кажется еще тяжелее."
 lotr_thani_hazad.4017.a: "Я [Select_CString(ROOT.Char.IsFemale, 'обрела', 'обрел' )] либо покровителя, либо должника…"
 lotr_thani_hazad.4017.a.tt: "...кто из них кто, покажет лишь время"

 # 4018: Refusal outcome - cold dismissal.
 lotr_thani_hazad.4018.t: "Холодная чаша"
 lotr_thani_hazad.4018.desc: "'Ах. #italic Вот это уже весьма разочаровывает.#!'\n\nЕго спокойное выражение так и не покинуло лица, но глаза... На миг я [Select_CString(ROOT.Char.IsFemale, 'увидела', 'увидел' )] в них расчет и тень убийственного намерения, но она, казалось, исчезла, когда весы в его голове пришли в равновесие.\n\n'Ступайте, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный лорд' )]. Свободно ходите по моему городу, вкушайте мое гостеприимство. Пусть никто не скажет, что князь Пела негостеприимен. Но поразмыслите в долгой дороге, что ждет вас впереди, о том, как мало друзей может позволить себе потерять человек, столь далекий от дома своего отца.'\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'кланяюсь', 'кланяюсь' )] и [Select_CString(ROOT.Char.IsFemale, 'ухожу', 'ухожу' )]. Когда я выхожу из зала, он кажется холоднее, чем был при моем входе, а горло мое необъяснимо пересохло."
 lotr_thani_hazad.4018.a: "Я [Select_CString(ROOT.Char.IsFemale, 'сохранила', 'сохранил' )] себя свободной от поводка…"
 lotr_thani_hazad.4018.a.tt: "...Но вы обрели в лице [seregul.GetFirstName] #N врага#!, а его власть на крайнем юге не так уж мала."

 # 4019: Haggle fails - Seregul takes mortal offence.
 lotr_thani_hazad.4019.t: "Один вопрос сверх меры"
 lotr_thani_hazad.4019.desc: "'Цену, говорите. #italic Цену.#!'\n\nОн ставит чашу на стол с медленной, нарочитой осторожностью, от которой почему-то хуже, чем если бы он швырнул ее в стену. Теперь улыбка исчезла окончательно.\n\n'Скажите мне, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный лорд' )], — дом вашего отца учил вас взвешивать княжескую милость так же, как торговец рыбой взвешивает свой улов? Я считал вас [Select_CString(ROOT.Char.IsFemale, 'зеленой', 'зеленым' )]. Теперь вижу, что вы просто #italic мелочны#!. Ступайте. Забирайте с собой свою дерзость и молитесь, чтобы вы покинули мой город прежде, чем я вспомню ваше лицо.'\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'скованно кланяюсь', 'скованно кланяюсь' )]. Солдаты у ворот далеко не так учтивы, как те, что привели меня сюда."
 lotr_thani_hazad.4019.a: "Я [Select_CString(ROOT.Char.IsFemale, 'оскорбила', 'оскорбил' )] его, и не думаю, что он из тех, кто забывает такое."
 lotr_thani_hazad.4019.a.tt: "Ваш расчетливый подход нанес тяжкое оскорбление. [seregul.GetFirstName] теперь ваш #N заклятый враг#!, и у вас нет ни его золота, ни его расположения."

 # 4020: Haggle succeeds - Seregul is impressed.
 lotr_thani_hazad.4020.t: "Услуга за услугу"
 lotr_thani_hazad.4020.desc: "'#italic Ха!#! Вот теперь наконец говорит [Select_CString(ROOT.Char.IsFemale, 'дочь', 'сын' )] [GetTitleByKey('c_mispir').GetNameNoTier]. Я уже начал опасаться, что там, на севере, вас в последнее время всех растят мягкотелыми.'\n\nОн жестом подзывает распорядителя, требуя кошель тяжелее того, что прежде держал в мыслях.\n\n'Тогда цена, достойная языка, который я покупаю. Достаточно золота, чтобы вы еще долгие годы держались в достойном обществе, и моя... благосклонность в придачу; она откроет на крайнем юге больше дверей, чем одно лишь золото. Мы договорились, [Select_CString(ROOT.Char.IsFemale, 'юная госпожа', 'юный лорд' )]?'\n\nЯ [Select_CString(ROOT.Char.IsFemale, 'кланяюсь', 'кланяюсь' )] и понимаю, что теперь [Select_CString(ROOT.Char.IsFemale, 'сама улыбаюсь', 'сам улыбаюсь' )]. Мы договорились."
 lotr_thani_hazad.4020.a: "Мы договорились. И, думаю, я вдобавок [Select_CString(ROOT.Char.IsFemale, 'заслужила', 'заслужил' )] его уважение."
 lotr_thani_hazad.4020.a.tt: "Вы получаете #P очень большую сумму золота#! и #P благосклонность#! [seregul.GetFirstName]. Вы обязаны князю, но заключили более выгодную сделку."

 # 4021: The map by lamplight - choosing the next road.
 lotr_thani_hazad.4021.t: "Воды"
 lotr_thani_hazad.4021.desc: "Дело с князем, к добру или к худу, осталось позади. На столе в моей комнате разложена куча карт и том о землях, составленный купцом-путешественником Урезегаром Балари. За окном гавань темна; лишь солдаты и их фонари освещают огромную пристань и край Харагаэра за ней. Я никогда прежде не [Select_CString(ROOT.Char.IsFemale, 'замечала', 'замечал' )], как выглядят волны ночью. Под безлунным небом море светится странными клубящимися массами и на гребнях волн. Уже теперь эти диковинные зрелища встречают меня, хотя я все еще так близко к дому; мне едва удается представить, насколько странными будут виды, когда я [Select_CString(ROOT.Char.IsFemale, 'отважусь', 'отважусь' )] выйти к землям, для которых у меня нет ни названий, ни карт, ни книг, ни историй. Эта мысль заставляет меня вновь обдумать дорогу впереди. Я [Select_CString(ROOT.Char.IsFemale, 'окунула', 'окунул' )] пальцы ног в воду, и теперь должна решить, нырнуть ли сразу в глубину или, быть может, еще немного остаться у спокойного берега."
 lotr_thani_hazad.4021.a: "Мне стоит сделать шаг дальше и отправиться на восток!"
 lotr_thani_hazad.4021.b: "Я буду гнаться за солнцем до самого края горизонта!"
 lotr_thani_hazad.4021.c: "Я еще немного насладюсь [GetTitleByKey('c_arpel').GetNameNoTier]. Спешить незачем."
 lotr_thani_hazad.4021.a.tt: "Вы отправитесь к Магу и Тумагу, земле Тамски, и ко второй из великих гаваней на Харагаэре."
 lotr_thani_hazad.4021.b.tt: "Вы отправитесь на восток, к самому горизонту, а затем еще дальше."
 lotr_thani_hazad.4021.c.tt: "Вы решаете остаться ненадолго. Будем надеяться, что вы не попадете в сети интриг [seregul.GetFirstName]."


 seregul.9996.t: "Наконец-то меня признали!"
 seregul.9996.desc: "Князья наконец прислушались к разуму и избрали меня своим предводителем.\n\nЯ поведу нас в новую эпоху: с силой и мудростью, позволяющей знать верный путь. Больше [balan_lai|E] не будут отвергать меня, и я больше не стану враждовать с ними.\n\nТо маленькое дело со [stormhost|E] будет забыто, и никто ничего не узнает. Будем надеяться."
 seregul.9996.a: "Забудем об этом."
 seregul.9996.a.tt: "Теперь, когда вы стали предводителем Балан-Лаи, больше нет смысла строить против них заговоры."

 seregul.9997.t: "Серегул избран!"
 seregul.9997.desc: "Эта сопливая крыса, Серегул, похоже, использовал наши дары, чтобы избраться предводителем [balan_lai|E]! Нас обвели вокруг пальца.\n\nПодумать только, этот никчемный, вечно ноющий, заблуждающийся дурак смог получить власть... Балан-Лаи, должно быть, прогнили сильнее, чем я [Select_CString(ROOT.Char.IsFemale, 'думала', 'думал' )].\n\nЯ еще могу убить его за это предательство."
 seregul.9997.a: "Проклятье!"
 seregul.9997.b: "Я увижу его мертвым!"
 seregul.9997.c: "О, но у меня слишком много доказательств..."

 seregul.9998.t: "Это должен был быть я!"
 seregul.9998.desc: "Мои ровни из [balan_lai|E] сочли нужным избрать [leader.GetFullName] нашим следующим предводителем. Это возмутительно! У меня есть старшинство, опыт, кровь и видение, чтобы вести нас в новую эпоху. Западные князья, избалованные своими богатыми землями и покорным населением, всегда смотрели свысока на меня и моих людей. Я не [Select_CString(ROOT.Char.IsFemale, 'забыла', 'забыл' )], как они нарушили Конкордат в 3000 г. Т.Э., чтобы унизить меня, и оставили меня [Select_CString(ROOT.Char.IsFemale, 'саму', 'самого' )] разбираться с сепаратистами.\n\nВозможно, я еще не [Select_CString(ROOT.Char.IsFemale, 'готова', 'готов' )] действовать, но и это новое унижение не будет забыто."
 seregul.9998.a: "Балан-Лаи отвергают меня."

 seregul.9999.t: "Много дел"
 seregul.9999.desc: "$k_pel$ раскололся! Со всех сторон меня окружают предатели и приспособленцы. Они требуют, чтобы меня отстранили, если хотят мирно вернуться под адунайскую власть. Мерзкая сепаратистская мразь! Что есть государство, если не продолжение своего правителя?\n\nЯ сокрушу их, и родится новый $k_pel$. Такой, где князь не служит интересам тех, кто ниже него. Это возможность изменить унизительное положение нашего королевства.\n\nОсталось лишь выбрать, куда падет первый удар.\n#X У вас есть 10 лет, чтобы стабилизировать державу, иначе она #bold расколется#! еще сильнее!#!"
 seregul.9999.a: "Сосредоточиться на юге."
 seregul.9999.a.tt: "Вы сосредоточитесь на [GetTitleByKey('d_barasi').GetName], богатейшем городе Пела и доме любовника вашей жены."
 seregul.9999.b: "Сосредоточиться на востоке."
 seregul.9999.b.tt: "Вы сосредоточитесь на землях [GetTitleByKey('d_shanwo').GetName], диком восточном рубеже, захваченном авантюристами и разбойниками."
 seregul.9999.c: "Сосредоточиться на западе."
 seregul.9999.c.tt: "Вы сосредоточитесь на внутренних делах и мирном [GetTitleByKey('c_mokuba').GetName], находящемся под защитой эльфов."
 seregul.9999.d: "Зачем сосредотачиваться?!"
 seregul.9999.d.tt: "Зачем выбирать один путь, если можно взять все?"

 seregul.0001.t: "Судьба соперника"
 seregul.0001.desc: "Порочный распутник [mayor.GetFullName] вмешался в мои домашние дела. Мне стыдно признаться, даже самому себе, что он соблазнил мою жену. И все же для меня это не может быть тайной, когда об этом знает вся моя держава: ведь она родила ему бастарда и уже много лет заботится об этом ребенке.\n\nГодами я держал свой гнев при себе. Город Бараси был слишком ценен, чтобы потерять его по личным причинам, и слишком силен, чтобы склониться перед моей волей, как сказал бы мой совет.\n\nЧто ж, теперь этот похотливый мерзавец осмелился отрицать мою власть над городом Бараси, и такое двойное предательство не останется без ответа. Рано или поздно город склонится, но я больше не могу выносить мысль, что этот человек свободно ходит под солнцем, бросая мне вызов."
 seregul.0001.a: "Мне нужно, чтобы он умер."
 seregul.0001.b: "Я хочу, чтобы он оказался в моей власти."
 seregul.0001.c: "Кому нужна тонкость? К войне!"

 seregul.0002.t: "Неверная жена"
 seregul.0002.desc: "Теперь, когда судьба похотливого [mayor.GetFullName] решена, я должен решить, что делать с вероломной [wife.GetFirstName].\n\nОна не любит меня, и я не люблю ее. Доброта и привязанность, которые мы могли испытывать друг к другу в юности, давно рассеялись и были окончательно забыты, когда она родила своего полукровного бастарда.\n\nЯ был бы в своем праве, если бы заключил ее в темницу, хотя мне говорят, что это может подлить масла в обвинения моих вассалов в тирании. Другим, более тихим вариантом было бы устроить ее смерть. И все же она еще может оказаться полезным орудием против своего любовника..."
 seregul.0002.desc.b: "Теперь, когда судьба похотливого [mayor.GetFullName] решена, я должен решить, что делать с вероломной [wife.GetFirstName].\n\nОна не любит меня, и я не люблю ее. Доброта и привязанность, которые мы могли испытывать друг к другу в юности, давно рассеялись и были окончательно забыты, когда она родила своего полукровного бастарда.\n\nЯ был бы в своем праве, если бы заключил ее в темницу, хотя мне говорят, что это может подлить масла в обвинения моих вассалов в тирании. Другим, более тихим вариантом было бы устроить ее смерть."
 seregul.0002.a: "Ей больше нельзя доверять."
 seregul.0002.b: "Я хочу ее смерти!"
 seregul.0002.c: "Она должна доказать свою верность."
 seregul.0002.d: "Я отказываюсь даже думать об этом."

 seregul.0003.t: "Позорное пятно"
 seregul.0003.desc: "Дело с изменой моей жены почти улажено; теперь осталось лишь решить судьбу ребенка. Это живое доказательство неверности моей жены, злодейства моего вассала и моего собственного унижения.\n\nЯ должен обдумать свой ход. Ребенку нельзя позволить уйти на свободу, это ясно. Этот маленький знак неуважения может со временем вырасти в претендента, ведь в нем течет королевская кровь.\n\nТак или иначе, я должен заполучить его в свою власть. Его мать просит узаконить его как [wife.GetDynastyName] и обещает, что его воспитают самым верным придворным. Но почему-то я ей не доверяю."
 seregul.0003.a: "Схватить ребенка."
 seregul.0003.b: "Ребенок должен умереть."
 seregul.0003.c: "Вообще-то, я проявлю великодушие."

 seregul.0004.t: "Южный фокус: противостояние с городом"
 seregul.0004.desc: "Город Бараси выступил против меня. Как богатейший город в $k_pel$, он всегда держался надменно по отношению к своему князю. Мои предки терпели это, а затем терпел и я. Но теперь город сам подписал себе приговор, и для Бараси уже ничто не будет прежним: они откололись от королевства, а их вожди виновны в измене.\n\nЯ склоню город к своей воле — войной или более тонкими средствами. Город может быть богат, но у них не будет ни рынка для продажи, ни пищи для покупки, если я установлю между нами полный экономический разрыв. Они будут голодать, а затем в конце концов сломаются и приползут обратно в мои заботливые объятия."
 seregul.0004.a: "К войне!"
 seregul.0004.b: "Мы задушим их экономику."
 seregul.0004.c: "Они достаточно скоро падут."

 seregul.0005.t: "Падение Бараси"
 seregul.0005.desc: "Как и ожидалось, экономика гордого города Бараси рухнула, стоило ему быть отрезанным от моей державы. Город голодает, а купцы все сильнее боятся, что могут быть низведены до нищеты.\n\nГордые олигархи наконец сломлены, и теперь они просят у меня мира, отдавая себя на мою милость. Мой канцлер сообщает, что тех немногих, кто все еще желал изображать силу на переговорах, их же ровни отстранили от обсуждений.\n\nГород наконец полностью в моей власти. Победа."
 seregul.0005.desc.b: "Бараси пал. Завоеванный и разграбленный, город пустеет: жители бегут, и не осталось никого, кто желал бы противостоять моей мощи. Этот гордый город сломлен. Олигархи, которые не бежали, теперь просят у меня мира.\n\nЯ хочу взять город себе, но это, без сомнения, разгневает моих местных вассалов. Если не я, то им будет править верный мне человек. Я больше не потерплю неповиновения от этого ныне сломленного города.\n\nВыбор стоит между одним из моих и одним из их людей."
 seregul.0005.a: "Он мой!"
 seregul.0005.b: "[potential_oligarchic_vassal.GetFirstNameNoTooltip] будет править им от моего имени."
 seregul.0005.c: "Ради мира [local_oligarchic_vassal.GetFirstNameNoTooltip] будет править."

 seregul.0006.t: "Чайалла" 
 seregul.0006.desc.a: "Чайалла не так неуловимы, как можно было бы ожидать: хотя они в основном держатся особняком, они много общались с племенами Пела и открыто живут как простой земледельческий народ. Они давно связаны с харадунайской властью Пела и даже имеют место в местном совете.\n\nНо [chaialla_ruler.GetFullName] действительно не [Select_CString(chaialla_ruler.IsFemale, 'держалась', 'держался' )] в стороне: [Select_CString(chaialla_ruler.IsFemale, 'она откололась', 'он откололся' )] вместе с прочими сепаратистами после предательского Совета 3000 г. Т.Э. и с тех пор [Select_CString(chaialla_ruler.IsFemale, 'сотрудничала', 'сотрудничал' )] с Бараси против меня.\n\nС падением Бараси они остались уязвимы.\n\nПо праву я должен сокрушить их и принести цивилизованное правление в их маленькие земли, но мой совет, как всегда, проповедует осторожность и говорит мне, что мы могли бы заключить сделку, чтобы восстановить старые связи."
 seregul.0006.a: "Мы сокрушим их."
 seregul.0006.b: "Я требую, чтобы они преклонили колено."
 seregul.0006.b.tt.vassal: "[chaialla_ruler.GetFirstNameNoTooltip] [Select_CString(chaialla_ruler.IsFemale, 'стала', 'стал' )] вашим вассалом!"

 seregul.0101.t: "Focus East: Tensions in the East"
 seregul.0101.desc.a: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me. Further away the Magrin warlord Opeyemi has seized the land for his tribe. I hear he is a competent general, but has no friends in his homeland.\n\nI must bend them to my will somehow, but their armies might be too much for Pél to handle. I know there is no love between them, I could try and manipulate them to fight each other..."
 seregul.0101.a: "Play them against each other."
 seregul.0101.b: "I will just crush them."
 seregul.0101.a.tt.success: "The fools go to war against one another!"
 seregul.0101.a.tt.failure: "They have seen through it and allied! To war!"

 seregul.0102.t: "A Band of Merry Men"
 seregul.0102.desc.a: "The Bandit King may have bought himself some time, but now I shall end his freedom once and for all.\n\nIf he desires to keep his rule he will have to swear fealty to me. This will be an ultimatum, and if he refuses war. But if I do not judge it wise to keep this scum in power, war it will still be and by my own might I will end him."
 seregul.0102.desc.b: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me.\n\nDealing with him will not be easy. I might be able to convince him to bend the knee, if I sweeten the pot enough..."
 seregul.0102.a: "He must swear his fealty."
 seregul.0102.b: "That pathethic rabble? An army?"
 seregul.0102.a.tt.success: "He has accepted!"

 seregul.0103.t: "An Ancient Threat"
 seregul.0103.desc.a: "The Twin Realms of Mag and Tumag for centuries ruled the natives of Pél, until a coalition of rebels ousted them. They then sought the [balan_lai|E] for protection, who had long given up any claims on Pél. Thus it was that the Princes of Pél began, protectors of the realm against the barbarian threat of Mag and Tumag.\n\nMy subjects are no better, but the Magrin cannot be tolerated to settle in, they could bring a great force with them. This adventurer might become the vanguard of a real invasion. He must bend or die."
 seregul.0103.a: "Repel the invaders!"
 seregul.0103.b: "One last chance to acknowledge me."

 seregul.0104.t: "The [defender.GetCulture.GetName] Defeated!"
 seregul.0104.desc: "We have at last subjugated the [defender.GetCulture.GetName] invaders.\n\nNow I must decide what to do with the lands they unlawfully seized. May outsiders never again threathen rightfully Kharadûnaic Pél."
 seregul.0104.a: "I shall take it for myself, of course."
 seregul.0104.b: "The Bandit King will buy the land."

 seregul.0201.t: "Focus West: The Cuind protectorate"
 seregul.0201.desc: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms.\n\nOtherwise, I could organize my armies for a speedy campaign, in the hope that the elves will move slower."
 seregul.0201.a: "I can convince the Cuind King."
 seregul.0201.a.tt.success: "He agreed to release [GetTitleByKey('c_mokuba').GetNameNoTier]"
 seregul.0201.b: "We just need to be quick!"

 seregul.0202.t: "Negotiating with the Elves"
 seregul.0202.desc.a: "Our previous attempt did not work. I shall come again to talk to [terilaen.GetFirstName]. Hopefully he will have forgiven me by now, and I can deceive him on the sicerity of my humbleness, even though I could not make him believe my promises previously. I am betting that this elf is a forgiving person.\n\nThis is my last resource. We must need conquer it in war if the talks fail."
 seregul.0202.desc.b: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms."
 seregul.0202.a: "I will try."

 seregul.0250.t: "Pél Yields!"
 seregul.0250.desc.a: "After years of disruption the various native leaders are finally silent! For the last few months, no more have them challenged my authority, and I have been shown the proper respect in meetings.\n\nTheir fierceness has finally given into fear. More and more have been agreeing with anything I say on Council, and there have been fewer rumours going around.\n\nAt last the time is come to solidify my power, and start to slowly take away the Council's rights. Their inane mutiny is over and this is a new era for Pél."
 seregul.0250.desc.b: "After years of disruption the various native leaders are finally silent! For the last few months, no more have them challenged my authority, and I have been shown the proper respect in meetings.\n\nTheir anger has cooled off. I have acquired a few sycophants in the Council, and, regardless of what I say, when I speak more and more agree.\n\nAt last the time is come to solidify my power, and start to slowly take away the Council's rights. Their inane mutiny is over and this is a new era for Pél."
 seregul.0250.a: "A better Pél."

 seregul.0251.t: "Five Years to Stabilize!"
 seregul.0251.desc: "The disastrous Council of 3000 T.A. has deeply wounded my image. I am seen as an inefectual leader who pushed his vassals into mutiny and now fails to rein them back in. Of course it is all propaganda spread by those who would like to see me fail. I have tried guiding the natives, and they slapped my hand away like the treasonous savages they are.\n\nStill, I need to show I can unite the realm again. The heartlands of Pél might have restrained from secessionism, but most love me not, and might still try to break away if I do not mend the realm. Already I see them conspiring. I need to fix this.\n#X You have five more years to stabilize!#!"
 seregul.0251.a: "I will stabilize!"
 seregul.0251.b: "Barasi still stands in defiance."
 seregul.0252.c: "The wild east must be reined in!"
 seregul.0252.d: "The elves still encroach in the west."

 seregul.0252.t: "Pél Shatters Again!"
 seregul.0252.desc: "Disaster! [rebel_leader.GetFullName] has apparently met yesterday in secret with most of the native leaders of Pél.\n\nI have today been given a letter, apparently sent by this secret meeting of the Council to many across the kingdom, which says:\n\n"The tyrant seating in the throne of Pél has turned the kingdom into a defunct state. It is no longer in the interests of the Council that the Kharadûnâi should continue their rule over our land. Therefore it is the unanimous decision of this assembly that all should take arms and help topple this deadwood state."\n\nAs more reports come in, they seem to have all joined."
 seregul.0252.a: "In this fire a new Pél will be reborn yet!"

 seregul.0253.t: "The West is not Coming!"
 seregul.0253.desc: "An envoy has arrived in haste from $c_mispir$ during the night. The [balan_lai|E] sends word that, having convened, they will keep with their decision in 3000 T.A. and will be offering no help for the current rebellion.\n\nI will wager they see this as my end, and their fear and jealousy of me can now finally rest easy knowing I am tied up on this war for the foreseeable future.\n\nI shall never forget this betrayal."
 seregul.0253.a: "They fear me!"

 seregul.0254.t: "Pél is Lost!"
 seregul.0254.desc.a: "The unthinkable has happened! The natives have destroyed the kharadunaic state of Pél.\n\nI still hold $d_arpel$, and, as such, in spite of their betrayal, I am still a Prince of the [balan_lai|E]. The road will be long but I must rebuild my kingdom, recover my status, and have my revenge on those that toppled me.\n\nMy vengeance may be slow in coming, but it will be all the more complete then."
 seregul.0254.desc.b: "The unthinkable has happened! The natives have destroyed the kharadunaic state of Pél.\n\nI have even lost my standing as a Prince of the [balan_lai|E]. The road will be long and painful but I must rebuild my kingdom, recover my status, and have my revenge on those that toppled me.\n\nMy vengeance may be slow in coming, but it will be all the more complete then."
 seregul.0254.a: "I shall win yet."

 seregul.0255.t: "Woe to the Vanquished"
 seregul.0255.desc: "Naturally I have won.\n\nThe war has devasted the countryside, and even the capital has seen it's fair share of fighting, but now it is over.\n\nThe natives broken, the rebels in chains, and I triumphant.\n\nTime for a new Pél to rise."
 seregul.0255.a: "Now who's getting hanged?"

 seregul.0300.t: "Thinking to the Future"
 seregul.0300.desc: "I have known for a while that I cannot trust the other Princes of the [balan_lai|E]. Although I am clearly next in line for the leadership, [phorakon.GetFirstName] has always shown me disdain, while showing favoritism to [imrazor.GetFirstName].\n\nThis is clearly a political move, started by the arrogant old man's malice towards me. He conjures this image of [imrazor.GetFirstNameNoTooltip] as his successor, in spite of there being an older, more experienced, smarter candidate that the majority of Princes would normally vote for, me.\n\nHis decision to abandon me to the current native mutiny is clearly the path he's seen of undermining my reputation, making me appear incompetent to the other Princes.\n\nNow I must ponder on how to behave towards the Princes of Balân-Lâi."
 seregul.0300.a: "As their leader."
 seregul.0300.b: "As a friend."

 seregul.0301.t: "Reach out to Seregul?"
 seregul.0301.desc: "[seregul.GetFullName], a Prince of the [balan_lai|E], is a rash man. His blunders recently led to the Council of Pél, composed by representatives of all native tribes under the Kingdom, to denounce his rule. Many have seceeded altogheter from Pél, and demand his resignation if they are to come back peacefully to Kharadûnaic protection.\n\nThe Balân-Lâi has turned a blind eye to the matter, abandoning him to his fate. Likely hoping he will in fact be deposed.\n\nThis has, naturally, made [seregul.GetFirstNameNoTooltip] all the angrier with his peers. If we were to help him rein back his Kingdom, he would be in our debt, and we could use such a pawn to cause disruption in the south while we look north, to [bellakar|E]."
 seregul.0301.a: "A useful, if incompetent, pawn."
 seregul.0301.a.tt: "If we don't hear back from him in a couple of months he has denied us."
 seregul.0301.b: "Too risky."
 seregul.0301.b.tt: "What if he double crossed me?"

 seregul.0302.t: "A Letter on the Desk"
 seregul.0302.desc: "Today as I went into my study, I was greeted by a peculiar sight. A letter, placed squarely in the center of the desk, sealed with black wax.\n\nAs I question my guards and servants, I discover no one has seen anyone entering my study this morning. A quite eery feeling grows on me.\n\nIt must be the work of spies, surely. A well planned plot, to place this letter on my desk... Or could it have a more sinister explanation? Sorcery? Wights?\n\nI stop thinking on it, living in fear does me no good. I should just open it, or get rid of it."
 seregul.0302.a: "Open it."
 seregul.0302.a.tt: "It is written in a rather thin and long hand..."
 seregul.0302.b: "Burn it."
 seregul.0302.b.tt: "#help This choice will lock you out of content#!"

 seregul.0303.t: "To the beleaguered ruler of Pél, Seregul"
 seregul.0303.desc: "I have followed closely the difficult situation you find yourself in. The natives are treasonous by nature, and ever looking to topple rightful [adunaic|E] rule. We must stand together against insurrection, or rather all lose our realms. You need only ask for our help. We will require nothing in return but what you desire already, to take what ought to be yours by might of arms. Your peers will give you nothing but disdain out of their own will, you know that to be true."
 seregul.0303.a: "Accept!"
 seregul.0303.a.tt: "#P You will receive aid from the Stormhost and a new casus belli against the Balân-Lâi.#!"
 seregul.0303.b: "Bring the letter to the Balân-Lâi."
 seregul.0303.b.tt: "#P Bringing this to the Balân-Lâi will greatly improve your standing among the Princes.#!"

 seregul.0316.t: "Start the Travel?"
 seregul.0316.desc: "I am resolved to travel to [seregul_destination.GetCounty.GetName] and expose to the Balân-Lâi the Stormhost's plot to turn me against my peers!\n\nBut can I go right now?"
 seregul.0316.a: "Let's go."
 seregul.0316.b: "I cannot right now."

 seregul.0304.t: "Bringing the Issue to the Balan Lai"
 seregul.0304.toast: "Seregul has exposed the Stormhost's plot!"
 seregul.0304.desc: "I have come to [seregul_destination.GetCounty.GetName] to deliver the treasonous letter to [seregul_destination.GetController.GetFirstName]. During the travel I often wondered if this was the best course of action. I do not like [seregul_destination.GetController.GetHerHim], but standing against the [balan_lai|E] would be madness. And this way, I may yet curry some favour. Even if they are still set against me, they will always have to recognize I am a steadfast member of our alliance.\n\nAs [seregul_destination.GetController.GetFirstName] reads the letter his eyes grow wide. Rage, fear, maybe a mixture? I cannot read [seregul_destination.GetController.GetHerHim].\n\n[seregul_destination.GetController.GetSheHe|U] puts the letter down and looks at me with a milder expression. "You did good bringing me this, Seregul. This will unite the Balân-Lâi against our old enemy. But how shall we act?""
 seregul.0304.a: "I have a plan."
 seregul.0304.b: "I am sure you will figure it out."
 seregul.0304.b.tt: "The Balân-Lâi will decide how to act against the Storm Host, you will be notified."

 seregul.0305.t: "How to Address the Stormhost"
 seregul.0305.desc.a: "I have been granted leadership by the [balan_lai|E] on the matter of dealing with the Stormhost.\n\nThough powerful when united, we are a disjointed force, hard to coordinate, with too many heads. That would suggest that the best course of action would be to wait for a moment of weakness of the Storm Marshal.\n\nI know he has his eyes turned north, and covets the riches of [bellakar|E]. A secret alliance with that old Númenórean colony would certainly spell the end of the [stormhost|E], unexpectedly at war with at both north and south borders. But there are other ways, like my own kingdom, theirs certainly count with a fair share of secessionists, the Marshal rules with an iron fist.\n\nOtherwise, I could claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.desc.b: "Seregul has brought to us the vile letter from the Storm Marshal. A dagger drenched in honey. The Marshal promised Seregul gifts and help if he were to betray the [balan_lai|E].\n\nThankfully Seregul has shown no appetite for the honey, for a coordinated attack from the east and north would have wounded us at the very least.\n\nNow the [stormhost|E] has the Balân-Lâi's attention, and we mean to wound it back. We need only decide on a course of action.\n\nThey have their eyes turned on [bellakar|E], and we could offer that old Númenórean realm our friendship in secret, and destroy our enemy when the time comes. Or we could choose to attack from the inside, and ally with disgruntled forces subjugated by the Stormhost. And yet, I could simply claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.a: "Ally with Bellakar."
 seregul.0305.b: "Forment Rebellion."
 seregul.0305.c: "Direct action."

 seregul.0306.t: "An Offer of Alliance"
 seregul.0306.desc: "An envoy from the [balan_lai|E] requests audience! The envoy tells my court he wishes to discuss a matter of alliance! It is so rare for new things to happen, especially coming from the [sevenlands|E], that I have to contain my own gasp.\n\n Although we have economic ties with the Princes, and both sides try to maintain a healthy, cordial, relationship, we have barely had formal diplomatic ties in our histories.\n\nThe envoy proceeds to explain that the [stormhost|E] has sought one of the Princes, to undermine the Balân-Lâi. The Prince, [seregul.GetFirstNameNoTooltip], has instead in secret brought this letter to his peers, and the Balân-Lâi has decided, seeing as the [storm_marshal.GetFullName] desires to attack Bellakar, to offer us their aid in that eventual war.\n\nIt is up to me to decide whether and how this tie shall be established."
 seregul.0306.a: "I will gladly accept mutual defense."
 seregul.0306.b: "A personal alliance."
 seregul.0306.c: "We don't need them."

 seregul.0307.t: "Bellakar Accepts!"
 seregul.0307.desc: "[niluhin.GetFullName] has accepted our generous offer!\n\nWhen the time comes, [bellakar|E] will call the Princes of the [balan_lai|E] to crush the [stormhost|E]."
 seregul.0307.a: "We will be there."

 seregul.0308.t: "Bellakar: Full Alliance"
 seregul.0308.desc: "[niluhin.GetFullName], rather than depend on the Princes whims to come to his aid if and when the time comes that the [stormhost|E] shall attack his realm, has proposed a direct alliance with me.\n\nThis is great news! Though far away, [bellakar|E] could help my personal ambitions!"
 seregul.0308.a: "Wonderful!"

 seregul.0309.t: "Bellakar Rejects Us!"
 seregul.0309.desc: "For whatever reason, [niluhin.GetFullName] has rejected our proposal! Maybe [niluhin.GetSheHe] feared that were secret strings or plots attached to our magnanimous proposal. Maybe [niluhin.GetSheHePossessive] is less rational than we thought. We will never know [niluhin.GetHerHis] reasons.\n\n We must look for another way to weaken the [stormhost|E]."
 seregul.0309.a: "Let us review our options."

 seregul.0310.t: "On Incinting Rebellion"
 seregul.0310.desc: "I have decided that we should forment instability within the [stormhost|E]. As an artificial state conjured by a dark power, it lacks some of the organic foundations a realm such as our Princedoms, even Pél, have.\n\nIt fills such a hole with dread, dividing their subjects to keep them weak, tempting and threatening their nobles. Ever projecting a merciless, ruthless, image of itself onto it's subject's and it's neighbour's hearts.\n\nWe shall look for disgruntlement and make such a subject feel they have the support of a realm the Storm Marshall fears. They will feel that they are no longer alone, and under our protection, and then, when they rise up, we may decide how to act against a distracted enemy."
 seregul.0310.a: "The Nobles."
 seregul.0310.b: "The Slaves."

 seregul.0311.t: "An Offer of Rebellion"
 seregul.0311.desc: "A discreet letter was delivered to me today. In it is the seal of the [balan_lai|E], ever our enemies to the south.\n\nToday they offer me friendship! They describe a neutered plot against their lands by the [storm_marshal.GetTitleAsName].\n\nThey now desire to hurt him in retaliation, and have elected to promote my claim to [storm_marshal.GetFirstNamePossessiveNoTooltip] throne.\n\nDo I desire it, or will I remain loyal?"
 seregul.0311.a: "Yes."
 seregul.0311.a.tt: "When the war against Bellakar starts, you will have a chance to break free."
 seregul.0311.b: "I am loyal!"

 seregul.0312.t: "$k_an_balkumagan$ has accepted"
 seregul.0312.desc: "[ab_ruler.GetFullName] has taken our money, and accepted the offer. There is no saying when, and if, he will attack his liege. But we have sown some discord there."
 seregul.0312.a: "Okay."

 seregul.0313.t: "$k_an_balkumagan$ refuses!"
 seregul.0313.desc: "[ab_ruler.GetFullName] remains silent. He will not accept our offer. We won't be able to try any more covert instabilization of the [stormhost|E] either, due to the risk of them having brought our letter to the [storm_marshal.GetTitleAsName]."
 seregul.0313.a: "Damn."

 seregul.0314.t: "Bellakar Calls for Aid!"
 seregul.0314.desc: "[join_war.GetName] has started! [bellakar|E] calls for the aid promised by the [balan_lai|E]. How will [princedom.GetNameNoTier] answer?"
 seregul.0314.a: "We will be there."
 seregul.0314.b: "We will not answer."

 seregul.0315.t: "The Time has Come!"
 seregul.0315.desc: "Years ago we promised the [balan_lai|E] that when the [stormhost|E] stirred to war against [bellakar|E], we would attack our masters and seek independence. Now is the time. But have we changed our mind?"
 seregul.0315.a: "No! We want to be free!"
 seregul.0315.b: "Yes... Now is not the time."

 seregul.0401.t: "To the [storm_marshal.GetTitleAsName],"
 seregul.0401.desc: "I accept your help. And I do believe our interests align. As you have well noted, I have no love for my so called peers, who are always spiteful and jealous of me. I shall be an useful and faithful ally, especially when I come to my own as leader of the Balân-Lâi. This I do swear."
 seregul.0401.a: "Hah! As if he was our equal."
 seregul.0401.a.tt: "He will be expected to declare his war within the next 10 years. And if he doesn't, you will betray him to the Balân-Lâi, and war will happen anyway."
 seregul.0401.b: "We shouldn't send gifts to our enemy."
 seregul.0401.b.tt: "Seregul has, since our first communications, been elected the leader of the Balân=Lâi, he will not betray them now!"

 seregul.0402.t: "The First Gift"
 seregul.0402.desc: "A shady envoy arrives, bringing a chest of gold.\n\n"This is the first gift." He says in a slow and smooth speech "Our master sends greetings, and hopes you will use it well. Next time I will return with soldiers. Do not forget your promise.""
 seregul.0402.a: "Much appreciated."

 seregul.0403.t: "The Second Gift"
 seregul.0403.desc: "The shady envoy is back. Ahead of a long line of men. Most are rabble, but there are quite a few armored, well-trained men. I am glad.\n\nI am told they have come through secret ways in Usakan, to avoid the eyes of the [balan_lai|E]\n\n"This is the second gift." The envoy says in his slow, smooth voice. "Now you should have what you need to rein the savages in. Next I will return with councillors. The day that you shall fulfill your promise draws nearer.""
 seregul.0403.a: "A great boon to my cause!"
 stormhost_mercenaries: "Anbalukkhôri Auxillaries"

 seregul.0404.t: "The Final Gift"
 seregul.0404.desc: "The shady envoy is back. With him there comes a few sinister, martial-looking, [anbalukkhori|E] men.\n\n"This is the final gift. These men are... well connected. Let them deal with your troublemakers, and follow their military guidance, and you shall have everything you need.\n\nYou will not see me anymore. But, be forewarned, our master has not forgotten your promise. Get your affairs in order, and prepare for the attack.""
 seregul.0404.a: "I will..."

 seregul.0406.t: "The First Warning"
 seregul.0406.desc: "A sinister man calls on me today. An eery feeling washes over me when he talks, in a slithery tone.\n\n"Are you enjoying our gifts, lord? Have you forgotten your promise? I am come to remind you. You would not want the displeasure of the [southerndragonarmyadunaic|E]. You have less than five years left, or you will face the consequence.""
 seregul.0406.a: "Still plenty of time..."

 seregul.0408.t: "The Last Warning"
 seregul.0408.desc: "The sinister man is back.\n\n"You have enjoyed and spent our gifts. We hope you have brought your affairs in order. Now it is time to repay us. You will not live to see another year, if you do not fulfill your promise. Your treason shall be exposed for the wide world to see. You will not survive such a reveal. The Eye is watching you.""
 seregul.0408.a: "Oh dear."

 seregul.0410.t: "Time's Up"
 seregul.0410.desc: "One of my spies in Mispir arrives in haste. He comes running down my corridors towards my court room.\n\nAs he enters the room I tell him to calm down, and to explain what has happened for him to break his cover and pass openly towards Pél.\n\n"My lord, you are the talk of $c_mispir$! Apparently a letter has arrived, and [leader.GetFirstName] has been summoned. My sources tell me he has left the audience irate. Swearing to see your Highness dead."
 seregul.0410.a: "The Stormhost has exposed me!"

 seregul.0411.t: "Seregul Betrayed Us!"
 seregul.0411.desc: "The vile Prince of Pél, [seregul.GetFirstName] has betrayed the [balan_lai|E]! Apparently, he was approached by the [stormhost|E], years ago, and has been preparing for a large scale invasion against the Balân-Lâi ever since!\n\nLong suspected to be a blundering fool, now we have our confirmation! How can one man believe he can oppose all of us? The Balân-Lâi has stood strong for millenia. It shall not fall for one arrogant idiot, who relies on treacherous allies!"
 seregul.0411.a: "This shall not stand! To war!"
 seregul.0411.a.tt: "You have called every Prince to uphold the Concordant and put an end to the betrayer."
 seregul.0411.tt: "Death to the Traitor Prince!"

 seregul.0412.t: "The Day is Here"
 seregul.0412.desc.a: "Long have I planned and awaited the day my armies would march upon [GetTitleByKey('d_alsarias').GetNameNoTier]. Now the day has come. My armies stand as prepared as they will ever be to fight my former peers.\n\nThose among them who have antagonized me will fear my coming, for they know I shall offer no mercy. All those years of disdain and contempt, believing me the lesser of the Princes... This will be my hour.\n\nAnd yet, if the Stormhost were to help, this war would feel much safer, and victory even more attainable."
 seregul.0412.desc.b: "Long have I planned and awaited the day my armies would march upon [GetTitleByKey('d_alsarias').GetNameNoTier]. Now the day has come. My armies stand as prepared as they will ever be to fight my former peers.\n\nThose among them who have antagonized me will fear my coming, for they know I shall offer no mercy. All those years of disdain and contempt, believing me the lesser of the Princes... This will be my hour."
 seregul.0412.a: "To victory!"
 seregul.0412.b: "Send a message in haste."
 call_stormhost: "The Stormhost has already given you all the help they are willing to give. If they are to help you again, it will come at a cost..."

 seregul.0413.t: "[seregul.GetFirstNameNoTooltip] Asks for Help"
 seregul.0413.desc: "The [balan_lai|E] Princedom that we have had in our pocket for years has finally stirred to pay the price of the gifts we gave [seregul.GetHerHim]. He attacks [seregul.GetHerHis] peers and seeks to take it all.\n\nI may help [seregul.GetHerHim], if I wish. But it is certainly not in my interests to have such a strong neighbour as [seregul.GetSheHe] would become if victorious.\n\nIf we are to help it will be for nothing less than [seregul.GetHerHis] full fealty, and direct control over the lands in the [GetTitleByKey('k_kharadune').GetName]."
 seregul.0413.a: "A good opportunity."
 seregul.0413.a.tt: "If we win and [seregul.GetSheHe] refuses to swear fealty, you will go to war against [seregul.GetHerHim]."
 seregul.0413.b: "Hah! I care not for him."
 seregul.0413.b.tt: "No help coming from the Stormhost!"

 seregul.0414.t: "Victory!"
 seregul.0414.desc: "Rejoice! For I have won!\n\nNot only am I now the leader of the Balân-Lâi, but of most of the [sevenlands|E]! Rejoice, for I shall never again need to show a calm face in front of disrespect. Now all shall measure their words, take their bows and remind themselves of my superiority.\n\nHenceforth I shall rule this land with an iron fist. Peace is too fragile to be kept by a council, a strong, single-minded hand is needed."
 seregul.0414.a: "Rejoice!"

 seregul.0415.t: "Seregul's Folly"
 seregul.0415.desc.a: "At last we have [seregul.GetFirstName] in our power. This mad man who we once saw as our peer. Who sold himself to treacherous allies, our oldest enemies. To the shadow itself!\n\nWhat a resentful, deluded man. To have thinked he would topple the [balan_lai|E]!\n\nNow the war is over, and peace can reign again, may it last for a thousand years...\n\n[seregul.GetFirstNameNoTooltip] shall be executed on the morrow, and his line shall be excluded from the Balân-Lâi until they can prove themselves once more."
 seregul.0415.desc.b: "I am vanquished and fettered. This is the day I die. Curse the day when I opened that letter.\n\nAll my work, plans and desires have come to naught. My life ends in shame. Put down like a dog by my enemy.\n\nMy line shall continue, although I have no doubt they shall be ostracized by the Balân-Lâi. May they one day avenge me."
 seregul.0415.a: "So ends Seregul's Folly."
 seregul.0415.b: "Goodbye."

 seregul.0416.t: "The Stormhost's Demands"
 seregul.0416.desc.a: "As I deal with small matters of rebellion among the Princes, an envoy arrives from the [stormhost|E]. He stares at me for a time, until I bid him speak.\n\n"I have come to remind you of your debts, Prince of Pél. Would the war have been won if not for the help of the Southern Dragon Army?" He pauses for a while as if waiting for an answer.\n\n"You have been in our debt since you have accepted the gifts. You could not even pay us properly, and we had to win your war for you. Hence, the great [storm_marshal.GetFullName] demands your full submission, and concession of the lands under the [GetTitleByKey('k_kharadune').GetName] to his direct control. Or we shall invade.""
 seregul.0416.desc.b: "As I deal with small matters of rebellion among the Princes, an envoy arrives from the [stormhost|E]. He stares at me for a time, until I bid him speak.\n\n"I have come to remind you of your debts, Prince of Pél. You have fulfilled your promise, but it is still too small a price to pay for the gifts you have been given." He pauses for a while as if waiting for an answer.\n\n"Hence, the great [storm_marshal.GetFullName] demands your submission, and tribute, so that the [sevenlands|E] shall never again pose a threat to the Southern Dragon Army. If you refuse me now, we shall invade. And your debt will grow.""
 seregul.0416.a: "You will have your tribute."
 seregul.0416.b: "I knew there would be a price."
 seregul.0416.c: "What?! Never!"

 seregul.0417.t: "Who shall be the new Prince of Pél?"
 seregul.0417.desc: "Now that Seregul is finally deposed and executed, we can finally look forward to a future of peace and prosperity in Pél. To that end, regardless of Seregul's reforms, the original accord with the Pél people shall be restored and the Council reinstated.\n\nEven with such limitations to their power, there are many families in the [sevenlands|E] who would cherish the opportunity to become a member of the Balân-Lâi, and I have already been approached by some of the more politically competent ones.\n\nI have picked some of the most competent candidates from such families, now I need only to choose."
 seregul.0417.a: "[potential_prince_1.GetFullNameNoTooltip]"
 seregul.0417.b: "[potential_prince_2.GetFullNameNoTooltip]"
 seregul.0417.c: "[potential_prince_3.GetFullNameNoTooltip]"
 seregul.0417.d: "[potential_prince_4.GetFullNameNoTooltip]"
 seregul.0417.e: "[fallback_prince.GetFullNameNoTooltip]"