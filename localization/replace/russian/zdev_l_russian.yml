l_russian:

 anarike.1001.t: "A Long Day's Ending"
 anarike.1001.desc: "Upon the high balcony of the old palace of the captains, I stand alone older than many of the stones below me. A century has passed since I first wore the crown of [anarike|E] - a child then, with feet that scarcely touched the floor of the throne, watching the [saibeth_nazrubari|E] debate over my head and I only an observent.\n\nNow I am old. My hands have more wrinkles than the years of my life, and the council that once spoke over my head now has come to hang on my every word. I have given my people unbroken serenity - a hundred years and more without war upon Anarikê's shores, without famine within her cities, without rebellion against my throne. The merchants of the [ormal_bay|E] have grown happy and content upon my peace, and the children of Anarikê have grown old beneath it.\n\nThe sun is setting now in the west, and in my bones I know that I shall not see many more such sunsets."
 anarike.1001.a: "I have been blessed beyond measure."
 anarike.1001.b: "What more could any man ask for, than peace?"
 anarike.1001.c: "And yet... my sons weigh upon me still."
 anarike.1001.c.tt: "You will turn your thoughts to the matter of succession."

 anarike.1002.t: "Two Sons of Anarikê"
 anarike.1002.desc: "From the high gallery I gaze down into the inner courtyard, and there I see my two sons - the heirs of [anarike|E], the inheritors of all I have built and all I have preserved. The two were born scarcely a year apart, yet I have never known two brothers so unalike in temper.\n\n[first_son.GetFirstName], is the elder. Even now in this garden is he restless with the restlessness of purpose. He would have Anarikê stand proud - an equal realm to great [khy|E] - free and independent and strong until the breaking of the world. Ambition without ability and resolve is little rewarded, but my first's strength his great and his resolve greater, of his ambition I know he shall be sucessful.\n\n[second_son.GetFirstName], the younger by a single year, sits at the far end of the cloister with the Khyan envoy. He has always been the wiser of the more careful of the two. He would have us mend the long quarrel with our estranged Khyan kin, the land of our mothers' blood - and in my great regret, the very task I could never accomplish, and yet when I see him I know he shall surpasses where I fail, and there is no doubt nothing shone under the light of Iarendil can stop him.\n\nTwo sons. Two paths. Both faithful, both able. And only one throne."
 anarike.1002.a: "[first_son.GetFirstName] is the elder. The elder should reign."
 anarike.1002.a.tt: "You will be inclined toward [first_son.GetFirstName] when the [saibeth_nazrubari|E] convenes."
 anarike.1002.b: "[second_son.GetFirstName] sees the world as it is, not as it was."
 anarike.1002.b.tt: "You will be inclined toward [second_son.GetFirstName] when the [saibeth_nazrubari|E] convenes."
 anarike.1002.c: "This is not a decision for one man alone. The Sâibêth must be heard."
 anarike.1002.c.tt: "You make no judgement yet, and will hear the Council before deciding."

 anarike.1003.t: "The [saibeth_nazrubari|E] Convenes"
 anarike.1003.desc: "In the hall of the [saibeth_nazrubari|E], the seats are filled to the brim. This most Supreme Council of [anarike|E] - founded in the wake of the [akallabeth|E] to constrain and counsel the kings of this house - has been summoned to hear my will and testament.\n\nThey have served me long, these men and women - some all their lives, some inheriting their seats from fathers who served my earlier years, and I know they shall heed my final will.\n\nI look down the long table - gold-maned captains and merchant-princes, lore-keepers of the [adunaic|E] tongue and shipwrights of the royal arsenal - and I am aware that what I say next shall outlive me by more years than I can count.\n\n#EMP 'My lords. My ladies. The matter of the succession.' #!"
 anarike.1003.a: "[first_son.GetFirstName] shall reign. Let Anarikê stand alone, as our forefathers did."
 anarike.1003.a.tt: "[first_son.GetFirstName] will succeed you. He will inherit a mandate to preserve Anarikê's independence and the proud heritage. [second_son.GetFirstName] may harbour no small sadness at being passed over."
 anarike.1003.b: "[second_son.GetFirstName] shall reign. Let him make Friendship with [khy|E]."
 anarike.1003.b.tt: "[second_son.GetFirstName] will succeed you. He will inherit a mandate to seek reconciliation with [khy|E] and pursue better relations with all of Anarikê's neighbours. [first_son.GetFirstName] will harbour resentment at being passed over the rightful order of birth."
 anarike.1003.c: "Let them rule together, with their strength combined."
 anarike.1003.c.tt: "[first_son.GetFirstName] will inherit the throne; [second_son.GetFirstName] will be appointed Chief Minister. Whether they hold together or fall apart shall be seen in the years to come."
 anarike.1003.d: "I leave the choice to the Sâibêth itself, when I am gone."
 anarike.1003.d.tt: "Upon your death, the [saibeth_nazrubari|E] shall convene and elect your successor from among your sons by the weight of their own counsel."

 anarike.1004.t: "Beyond the Sundering Seas"
 anarike.1004.desc: "The chamber is hushed but not dark. They have opened the great window to the sea, as I asked - that I might hear the gulls and smell the sea-air one last time. [first_son.GetFirstName] kneels at one side of the bed; [second_son.GetFirstName] at the other. My oldest friends amoungst the [saibeth_nazrubari|E] stands in attendance at the foot of the bed, in the formal grey of mourning-not-yet-begun.\n\nThere is no pain. That, more than anything else, is the gift I have been given - a death without pain, after a life without war. The gulls cry beyond the window, and the light upon the water is the same gold and rose I have watched a hundred years of evenings.\n\nI think of [first_wife.GetFirstName], waiting, past the star of Iarendel, I see [second_wife.GetFirstName] holding my sons' wet faces. I think of the last Lord-Admiral, the founder of my line, whose long-dead foresight set [Concept('anarike', 'Анарикэ')|E] upon its course. Of all I have held, and all I am now letting go.\n\n#EMP 'The realm,' #! I murmur - and they all lean close. #EMP '- is at peace.' #!\n\nAnd then - I am gone."
 anarike.1004.a: "The King has died. Long live the King."


lotr_thani_hazad.4000.t: "Under the Storm-Banners"
 lotr_thani_hazad.4000.desc: "At last I came to Adûnazâin, the chief haven of An-Balkûmagân.\n\nI had heard of this coast all my life in Mispir, and had kept the Travel book of Sakalkhâd  Zimradûne, who, being a native of this land, spoke of it highly. As I looked upon the tower silverine and electrum bright over the bay, I imagined the Anbalukhorim were a most proud and terrible people in the image of westerness. Yet when our ship stood in beneath those walls, and the storm-banners hung heavy above the harbour, I found that very little I imagined was true.\n\nBefore we had made fast, the harbour-men had come aboard. They spoke little, but examined everything. I gave my name, and my father's name, and said only what was needful. When they heard that I was Adûnaic and from Mispir, their manner changed, though not by much. My servants disliked the search, but I checked them. I paid where payment was expected, and was content to come ashore with my baggage still mine."
 lotr_thani_hazad.4000.a: "At least I have come ashore in one piece."
 lotr_thani_hazad.4000.a.tt: "You have arrived safely in the haven of An-Balkûmagân."

 lotr_thani_hazad.4001.t: "The Quay"
 lotr_thani_hazad.4001.desc: "The first thing I saw upon the quay was a labourer, smaller in statutre, no doubt a native servent from this land, was struck hard in the face with whip for stumbling beneath a crate. Then bloodied, he shifted, bent, was struck again, before he got to his feet wordlessly, lifted it again, and went on. Not one bypasser took any mind at this, nor even looked or acknowledged of the commotion.\n\nI balked at the harshness, yet the place is not lean. The harbour is broad and crowded with goods from many coasts: wine-jars, dyed cloth, jars of oil, worked ivory, spice, timber, and copper dark from the hold. There is wealth here in abundance, but it is not displayed as in Mispir. Here it stands guarded, counted, held close and held greedily.\n\nAs we went up from the quay, I saw soldiers everywhere: at gates, storehouses, customs-houses, and market approaches. The speech about me was Adûnaic, yet not mine, and the lesser folk stepped aside quickly whenever armed men passed."
 lotr_thani_hazad.4001.a: "I had best take careful measure of this place."
 lotr_thani_hazad.4001.a.tt: "You take in the haven and its hard order."

 lotr_thani_hazad.4002.t: "My First Night in the Haven"
 lotr_thani_hazad.4002.desc: "We found lodging after some delay. The innkeeper received me well enough once my station was plain to him, though I could see him weighing every clasp, ring, and chest that passed through his doorway. He named a high price. I paid it.\n\nAt supper I heard more than I said. Two officers sat in the inner room with several merchants. They spoke of river traffic, levies, disorder inland, and some matter of seizure that amused them greatly. Once or twice I caught them glancing my way.\n\nI had been told often enough that if I wished truly to know An-Balkûmagân, I must go inland. Perhaps that is so. But after my time here, I am both at once, facinated and repulsed by the unabashed cruelty here. I think long into the night of what my next destination will be."
 lotr_thani_hazad.4002.a: "I will sail on to Korlea."
 lotr_thani_hazad.4002.a.tt: "You continue your travels north along the ring of the Belegaer."
 lotr_thani_hazad.4002.b: "I should go as far as fortune will carry me."
 lotr_thani_hazad.4002.b.tt: "You shall go northwards, as far as you can."
 lotr_thani_hazad.4002.c: "I will remain here a while, and learn its tempers."
 lotr_thani_hazad.4002.c.tt: "You stay in the haven of An-Balkûmagân and observe before venturing farther."



 ##### Azulzir Travels: Arpel #####

 # 4010: Overland arrival into Arpel.
 lotr_thani_hazad.4010.t: "Within the Walls of Arpel"
 lotr_thani_hazad.4010.desc: "#Bold Three are the great havens of the utter south, and [GetTitleByKey('c_arpel').GetNameNoTier] is none the least of them.#!\n\nI dismount at the outer arch and walk in among the throng. There are women of [GetTitleByKey('k_koronande').GetNameNoTier] in saffron and indigo, brassy bangles to the elbow, bearing baskets of river fish. There are Mûmakani drovers with their slow, wise beasts. There are merchants of Sengani in pale linen, calling out their prices to any who will hear. And shoulder to shoulder with them, unhurried and dignified, the people of these very lands - the [GetTitleByKey('k_pel').GetNameNoTier], every shade of warm walnut and the people are warm as such. Among them, swathed in white, move Magrin and Tûmagrin, who in old years held this country and were driven out, yet trade in her markets still as if they had never gone.\n\nThis I had not looked for: that the women of the [GetTitleByKey('k_pel').GetNameNoTier] should walk so freely. They bear keys and ledger-seals at their belts, and the men step aside for them as readily as for any merchant prince. They haggle, they laugh, they argue weight and measure and work trades and labor with no man's leave and no husband at their shoulder. In [GetTitleByKey('c_mispir').GetNameNoTier], only do the widows and the poor work as such, Here it is only the hour of the market. [adunaic|E] is the common tongue, but theirs is older in the throat and plainer in the vowel, and beneath it runs their own native speech.\n\nMispir for all her grandeur never showed me so much of the world at once. My purse is heavy, my road is long, and I though I am greatly exited by all the sights so close and so far from home, I must carefully decide how this first day shall be spent."
 lotr_thani_hazad.4010.a: "I will lay in proper provision before I go further."
 lotr_thani_hazad.4010.a.tt: "You buy the best the markets of [GetTitleByKey('c_arpel').GetNameNoTier] have to offer - smoked fish, dried fruit, hard bread, sweet southern wine. You gain a #P health boost#! and a stockpile of #P provisions#! for the road."
 lotr_thani_hazad.4010.b: "Such a port is the very place to wager on a ship."
 lotr_thani_hazad.4010.b.tt: "You bind a large portion of your inheritance into a trading venture sailing out of [GetTitleByKey('c_arpel').GetNameNoTier]."
 lotr_thani_hazad.4010.c: "Today I will only walk her streets and rest a while."
 lotr_thani_hazad.4010.c.tt: "You spend the day idly, taking in the sights and sounds of [GetTitleByKey('c_arpel').GetNameNoTier]."

 # 4011: The arrest in the rich quarter.
 lotr_thani_hazad.4011.t: "A Cry from the Painted House" 
 lotr_thani_hazad.4011.desc: "I have come up into the better quarter, where the houses of the [GetTitleByKey('k_pel').GetNameNoTier] face inward upon shaded courts, and the doorways are painted in red ochre and lapis after the old custom. Here the merchant clans dwell in their pride, and [GetTitleByKey('c_arpel').GetNameNoTier] is at her quietest.\n\nIt is then that I hear it - not the ordinary noise of the market, but a single voice raised in fury. From a high gate not twenty paces ahead of me, three men in dark mail are dragging out an older [GetTitleByKey('k_pel').GetNameNoTier] gentleman by the arms. He is dressed for council or some fine occasion, in a long robe of bleached linen and a heavy copper collar. Even now, hobbled and roughly handled, he bears himself like a man unused to violence at his own door.\n\nHe is shouting and there is no fear in his voice. I cannot catch every word, but I hear: '#italic - the Council! He is bound by the Council!-#!' before a soldier strikes him hard across the mouth, and the words become only blood.\n\nA few passers-by have stopped. More walk on with their eyes on their sandals. The doors of the neighbouring houses, I see, are barred from within."
 lotr_thani_hazad.4011.a: "I will go nearer. I will see what is the matter here."
 lotr_thani_hazad.4011.a.tt: "You will approach the commotion." # You are going where you arent wanted this will decrease the global variable Azulzir_seregul_relation which is default at 1 to 0
 lotr_thani_hazad.4011.b: "No. This is not my country, nor my quarrel."
 lotr_thani_hazad.4011.b.tt: "You walk on. The matter is not yours" # Seregul Appreciates your non-nosyness improves chances for deal later increases global variable Azulzir_seregul_relation from 1 to 2

 # 4012: Investigate path - armed escort to Seregul's palace.
 lotr_thani_hazad.4012.t: "An Unlooked-for Invitation"
 lotr_thani_hazad.4012.desc: "I left my retainers at the corner - a lone man asking after a neighbour's quarrel may get answers where a young lord with his train cannot.\n\nI had not gone twenty paces toward the painted gate before I knew I had been awaited.\n\nThey came out from every direction, all at once, and very quickly - six of them, in the same dark mail as those who had dragged the old man, the badge of an officer of [GetTitleByKey('c_arpel').GetNameNoTier]. Their captain, a tall man no doubt [adunaic|E] with a [GetTitleByKey('k_pel').GetNameNoTier] mother by the look of him, made me a courteous bow.\n\n'My lord of [GetTitleByKey('c_mispir').GetNameNoTier],' said he. 'Our Prince [seregul.GetFirstName] has heard of your coming, and has long wished the company of so distinguished a young traveller. He bids you to his table this evening. The captain of the watch shall be your escort, lest you lose your way in our streets - which can be confusing, to a stranger, after dark.'\n\nIt was not, I understood, a question being asked of me."
 lotr_thani_hazad.4012.a: "I bow, and accept what cannot be refused."
 lotr_thani_hazad.4012.a.tt: "You will be conducted under armed guard to the palace of [seregul.GetFirstName]."

 # 4013: Don't-investigate path - the letter and the same invitation.
 lotr_thani_hazad.4013.t: "A Letter Pressed into My Hand" 
 lotr_thani_hazad.4013.desc: "I turned my back on the painted house and walked on and the shouting fell behind me and was lost.\n\nYet I had not gone the length of two streets before another came at me out of the shaded colonnade.He was a [GetTitleByKey('k_pel').GetNameNoTier] of the burgher sort by his dress, neither young nor old, very pale beneath his dark skin, breathing hard and trying not to show it.\n\n'Lord - lord of the north - I know your face, you came in this morning with a fine train, you are [adunaic|E], yes? - Please hear me! - it is a matter of life and death!'\n\nHe got no further. Over my shoulder I saw, far down the street, two of the Prince's mail-clad rounding the corner and quickening their pace. The man saw them in the same instant, and the colour, what little he had, went out of his face. He thrust something against my chest, hard - a thin packet, sealed twice, the wax warm from the heat of his body.\n\n'For the great [tamska|E] of the [GetTitleByKey('e_mag_tumag').GetNameNoTier]. I beg you - by any road - only let it reach her hand -'\n\nAnd then he was gone, back into the sea of faces of [GetTitleByKey('c_arpel').GetNameNoTier] vanished as if he were never there at all. The packet was still warm inside my tunic when the soldiers came up.\n\nThey did not draw upon me. They had not, perhaps, even seen the other man. Their captain bowed very correctly. 'My lord [GetScriptedCharacterByHistoryID('lineofzaradancadet22').GetFirstName] of [GetTitleByKey('c_mispir').GetNameNoTier]. Our Prince [seregul.GetFirstName] has heard of your coming, and bids you to his table this evening. We are sent to be your escort - for our streets, after dark, can be confusing to a stranger.'\n\nI bowed in return. I felt the wax of the packet against my ribs. It was, I thought, very warm indeed."
 lotr_thani_hazad.4013.a: "Well well, It seems I will be dining with the prince."
 lotr_thani_hazad.4013.a.tt: "You will be conducted under armed guard to the palace of [seregul.GetFirstName], the secret letter still hidden upon you. May fortune favour you." 

 # 4014: Counter event - Pel's perspective.
 lotr_thani_hazad.4014.t: "A Foppish Visitor"
 lotr_thani_hazad.4014.desc: "I have news that some young rich nobody has come into [GetTitleByKey('c_arpel').GetNameNoTier] from [GetTitleByKey('c_mispir').GetNameNoTier], throwing his gold about as if it were as common as water. An [adunaic|E] of some house of old bearing I have never troubled to remember - [azulzir.GetFullName] - son of a recently-deceased something-or-other in Mispir, come south, apparently, to see the world.\n\nA tourist. Of all things, in my [GetTitleByKey('c_arpel').GetNameNoTier], a tourist.\n\nI wouldn't have payed him a single heed had he not been snooping around where he should not have. He was seen in the consular district on the very morning I made my arrests. Then not long after he was seen covorting with a spy! A fop with too much money and too little sense is, in ordinary times, only an irritation. But these are not ordinary times, and Mispir has long had sharper eyes than mine in the affairs of my shattered realm. \n\nCurse them all! Is he sent? Some pet of [phorakon.GetFirstName], or worse, of [tamska.GetFirstName]? Ready to report all of my failings here so they can all find some reason pounce? Or is he merely what he seems - a rich city idiot come to gawk at the provincials.\n\nIt makes no matter. Either way, I shall have him at my table tonight, and I shall #italic know.#! what his perpose is in my realm!"
 lotr_thani_hazad.4014.a: "Bring him in. Let us see what manner of fish has wandered into my net."

 # 4015: First Seregul conversation - "what are you doing here?"
 lotr_thani_hazad.4015.t: "At the Prince's Table"
 lotr_thani_hazad.4015.desc: "The hall of [seregul.GetFirstName] is built in the old high-[adunaic|E] manner - long, marbled, raftered with cedar, the windows set so high that no man may look in or out save by the Prince's leave. He has sent most of his court away for the evening. There is only the Prince at the head of his board, two of his guard motionless at the wall, a silent steward, and myself.\n\nHe is older than I had seem him from the portraits in the hall of law. He is Lean, blue-eyed, expensively-dressed, with the restless mouth of a man who has no doubt rehearses his answers a hundred times before he gives them. I stood there awaiting for his leave. He gestures to the chair at his right hand as a man might gesture to a dog.\n\n'[azulzir.GetFirstNameNoTooltip] of [GetTitleByKey('c_mispir').GetNameNoTier],' he says - and he gives my name a little turn, as though tasting it. 'Welcome to my poor city. We see so few visitors of quality from the north these days. The road, they tell me, is bad. The country, they tell me, is unsettled. And yet here you are - alone, by all accounts, save for a few servants, and that fine fat purse - and your father, I am told, but lately in his grave.'\n\n'Tell me, young lord. What in the wide world can a man of your house possibly want in [GetTitleByKey('c_arpel').GetNameNoTier]?'" # Guys I don't he likes seregul
 lotr_thani_hazad.4015.a: "I am only a traveller. The world is wide, and I would like to see it." # Honest global variable Azulzir_seregul_relation is increased by 1
 lotr_thani_hazad.4015.b: "I have come to learn at the feet of the famed Prince of [GetTitleByKey('k_pel').GetName]." # he is expecting flattery no change

 # 4016: Second Seregul conversation - what he actually wants.
 lotr_thani_hazad.4016.t: "The Prince's Real Question"
 lotr_thani_hazad.4016.desc: "He pours me a wine that would cost a year's keep of my late father's smaller villa. I gingerly pick up the cup and drink as he looks at me, studies me. Then, as though the thought has only now come to him, he sets his cup down and leans forward a little.\n\n'You have been at court in [GetTitleByKey('c_mispir').GetNameNoTier], of course. Tell me - and forgive an old country prince his curiosity - how does the [balan_lai|E] speak of me, these days?'\n\nThe smile is back, light as a feather. The eyes are not.\n\n'They speak of the troubles in [GetTitleByKey('k_pel').GetName], I am sure. They will have spun you a tale. The natives are restive. The Council preens itself. The Prince of [GetTitleByKey('c_arpel').GetNameNoTier] cannot manage his own house. So it goes - when [phorakon.GetFirstName] is bored, and [tamska.GetFirstName] is feeling clever, and they need a southern fool to laugh at over their evening wine.'\n\nHe lets the words hang a moment. Then, more softly:\n\n'A young man of taste, returning to [GetTitleByKey('c_mispir').GetNameNoTier] at the end of a long and broadening journey - such a young man would be heard, you know. His impressions would carry. He might, in his own small way, set the matter straight at his uncle's table, or his cousin's. He might tell them what he saw with his own eyes - that the savages have made themselves the tyrants here, that the Council is not bound by old promise but by old grudge, and that the Prince of [GetTitleByKey('k_pel').GetNameNoTier] holds civilisation alone in his fist against this dark land.'\n\nHe smiles again. He has not quite asked. He has not quite threatened. But the soldiers at the wall have not moved an inch, and the steward has not refilled my cup."
 lotr_thani_hazad.4016.a: "I will tell whatever tale my host wishes told."
 lotr_thani_hazad.4016.b: "I am a poor servant for any prince's tongue, my lord. I see only what my eyes show me."
 lotr_thani_hazad.4016.c: "And what, my Prince, would such a service be worth to you?" # Skill check diplomacy. difficulty will be impossible harder or easier or by previous events as described through the use of a global variable

 # 4017: Agreement outcome - the purse and the ring.
 lotr_thani_hazad.4017.t: "The Prince's Earnest"
 lotr_thani_hazad.4017.desc: "'A wise answer, young lord. Wisdom, in one so green, is a thing rarer than rubies - and worth quite as much.'\n\nHe summons his steward before pushing a heavy purse across the cedarwood, and beside it a slim copper ring chased with the seal of [GetTitleByKey('c_arpel').GetNameNoTier].\n\n'Take these with the Prince's affection. Call it earnest, call it thanks, call it what you will. From this night, you have a friend in the south - and his memory, you will find, is as long as his arm.'\n\nI bow. The soldiers at the wall step aside without a word, and I walk out under the high stars of [GetTitleByKey('c_arpel').GetNameNoTier] with gold heavy at my belt, and the Prince's mark heavier still upon my hand."
 lotr_thani_hazad.4017.a: "I have either gained a patron, or a debtor…"
 lotr_thani_hazad.4017.a.tt: "...which is which only time will tell"

 # 4018: Refusal outcome - cold dismissal.
 lotr_thani_hazad.4018.t: "A Cold Cup"
 lotr_thani_hazad.4018.desc: "'Ah. #italic now that is very disappointing.#!'\n\nHis placid expression never left his face, but his eyes. For a moment there I saw calculation in his eyes, and a hint of murderous intent, but it seemed to leave once the scales leveled in his head.\n\n'Go, young lord.’Walk freely in my city, do partake in my hospitality. Let no one say that the Prince of Pel is unhomely. But reflect, on the long road ahead of you, upon how few friends a man so far from his father's house may afford to lose.'\n\nI bow, and I withdraw. The hall is colder when I walk out of it than it was when I came in, and my throat is unaccountably dry."
 lotr_thani_hazad.4018.a: "I have kept myself free from the leash…"
 lotr_thani_hazad.4018.a.tt: "...But you have gained [seregul.GetFirstName] as an #N enemy#!, and his reach in the utter south is not small."

 # 4019: Haggle fails - Seregul takes mortal offence.
 lotr_thani_hazad.4019.t: "A Question Too Many"
 lotr_thani_hazad.4019.desc: "'Worth, you say. #italic Worth.#!'\n\nHe sets down his cup with a slow, deliberate care that is somehow worse than if he had flung it at the wall. The smile is gone now altogether.\n\n'Tell me, young lord - did your father's house teach you to weigh a prince's favour as a fishmonger weighs his catch? I had thought you green. I see now you are merely #italic cheap.#! Go. Take your impertinence with you, and pray you are out of my city before I remember your face.'\n\nI bow stiffly. The soldiers at the gate are not nearly so courteous as those who brought me in."
 lotr_thani_hazad.4019.a: "I have insulted him - and I do not think he is a man who forgets such things."
 lotr_thani_hazad.4019.a.tt: "Your transactional approach has given grave offence. [seregul.GetFirstName] is now your #N bitter enemy#!, and you have neither his coin nor his goodwill to show for it."

 # 4020: Haggle succeeds - Seregul is impressed.
 lotr_thani_hazad.4020.t: "Quid pro Quo"
 lotr_thani_hazad.4020.desc: "'#italic Ha!#! There at last speaks a son of [GetTitleByKey('c_mispir').GetNameNoTier]. I had begun to fear they bred you all soft, of late, up there in the north.'\n\nHe beckons the steward forward with a gesture that calls for a heavier purse than the one he had first in mind.\n\n'A price fit for the tongue I am purchasing, then. Gold enough to keep you in fine company for many a year, and my… favor beside it - which shall open more doors in the utter south than gold alone. We are agreed, young lord?'\n\nI bow, and I find that I am smiling now myself. We are agreed."
 lotr_thani_hazad.4020.a: "We are agreed. And I have, I think, earned his respect besides."
 lotr_thani_hazad.4020.a.tt: "You receive a #P very large sum of gold#!, and the #P favor#! of [seregul.GetFirstName], You are beholden to the Prince, but you have struck the better bargain."

 # 4021: The map by lamplight - choosing the next road.
 lotr_thani_hazad.4021.t: "The Waters"
 lotr_thani_hazad.4021.desc: "The matter of the Prince is, for good or ill, behind me. A mess of maps are spread upon the table of my lodging and the tome of lands by the merchant venturer Urezegar Balari. Below the window the harbour is dark; Only the soldiers and their lanterns light up the giant quay and the rim of the Haragaer beyond. I never noticed how the waves looked at night. Under the moonless sky, the sea glows in strange swirling masses and on the crests of the waves. Already these strange sights greet me while I am still so close to home; I can scarcely imagine how strange the sights will be, when I venture forth to lands for which have no name and no maps or books or stories. The thought makes me reconsider the road ahead. I have dipped my toes into the water, and I must decide whether I will dive right into the deep, or perhaps remain by the comforts of the shore, just for a while longer.”"
 lotr_thani_hazad.4021.a: "I should take a step further, and go east!"
 lotr_thani_hazad.4021.b: "I will chase the sun to the ends of the horizon!"
 lotr_thani_hazad.4021.c: "I will enjoy [GetTitleByKey('c_arpel').GetNameNoTier] a while yet. There’s no need to rush"
 lotr_thani_hazad.4021.a.tt: "You set out for, the Mag and Tumag, land of the Tamska and to the second of the great ports on the haragaer"
 lotr_thani_hazad.4021.b.tt: "You set out to go east, as far as the horizon and then further still."
 lotr_thani_hazad.4021.c.tt: "You decide to stay a while, hopefully you won’t get caught in the machinations of [seregul.GetFirstName]"


 seregul.9996.t: "I am Finally Recognized!"
 seregul.9996.desc: "The Princes have finally listened to reason and elected me as their leader.\n\nI shall lead us into a new era. With strength and the wisdom to know the way. No longer will the [balan_lai|E] ostracize me, and no longer will I antagonize them.\n\nThat little business with the [stormhost|E] shall be forgotten, and none will be the wiser. Hopefully."
 seregul.9996.a: "Let us forget about that."
 seregul.9996.a.tt: "Now that you have been elected as the leader of the Balân-Lâi there's no more point in plotting against it."

 seregul.9997.t: "Seregul has been Elected!"
 seregul.9997.desc: "That sniveling rat, Seregul, seems to have used our gifts to get elected as leader of the [balan_lai|E]! We have been double-crossed.\n\nTo think this incompetent, whiny, deluded fool could get the leadership... The Balân-Lâi must be more rotten than I thought.\n\nI might kill him yet for this betrayal."
 seregul.9997.a: "Damn it!"
 seregul.9997.b: "I will see him dead!"
 seregul.9997.c: "Oh but I have far too much evidence..."

 seregul.9998.t: "It should have been me!"
 seregul.9998.desc: "My peers of the [balan_lai|E] have seen fit to elect [leader.GetFullName] as our next leader. This is outrageous! I have the seniority, the experience, the blood, and the vision to lead us to a new era. Ever have the western Princes, spoiled by their rich lands and tame population, looked down on me and mine. I have not forgotten how they broke the Concordant in 3000 T.A., to humiliate me, and left me to deal with the secessionists myself.\n\nI may yet not be ready to act, but this new humiliation will not be forgotten either."
 seregul.9998.a: "The Balân-Lâi forsakes me."

 seregul.9999.t: "Much to Do"
 seregul.9999.desc: "$k_pel$ has shattered! I am beset on all sides by traitors and opportunists. They demand that I be removed if they are to return peacefully to adûnaic rule. The vile secessionist scum! What is the state if not an extension of it's ruler?\n\nI shall crush them and a new $k_pel$ will be born. One where the Prince does not serve the interests of his lessers. This is the opportunity to change the humiliating condition of our kingdom.\n\nAll that is left is to choose where the first blow will fall.\n#X You have 10 years to stabilize or the realm #bold will#! break further!#!"
 seregul.9999.a: "Focus South."
 seregul.9999.a.tt: "You will focus on the [GetTitleByKey('d_barasi').GetName], the richest city in Pél and home to your wife's lover."
 seregul.9999.b: "Focus East."
 seregul.9999.b.tt: "You will focus on the lands of the [GetTitleByKey('d_shanwo').GetName], the wild eastern frontier, taken by adventurers and outlaws."
 seregul.9999.c: "Focus West."
 seregul.9999.c.tt: "You will focus on internal issues, and the pacific [GetTitleByKey('c_mokuba').GetName], protected by elves."
 seregul.9999.d: "Why focus?!"
 seregul.9999.d.tt: "Why bother choosing a path when you can take all?"

 seregul.0001.t: "The Fate of a Rival"
 seregul.0001.desc: "The villanous rake, [mayor.GetFullName], has meddled in my domestic affairs. I am ashamed to admit, even to myself, that he has seduced my wife. And yet it can be no secret to me when all my realm knows, for she has bore him a bastard, and for years now has cared for the child.\n\nFor years I have kept my anger to myself. The city of Barasi was too valuable to lose over personal reasons, too strong to bend to my will, my council would say.\n\nWell, now the lecherous villain makes so bold as to deny my authority over the city of Barasi, this twofold betrayal shall not go unanswered. The city will bend, sooner or later, but I cannot bear any longer knowing this man walks free under the sun in his defiance."
 seregul.0001.a: "I need him dead."
 seregul.0001.b: "I want him in my power."
 seregul.0001.c: "Who needs subtlety? To war!"

 seregul.0002.t: "A Disloyal Wife"
 seregul.0002.desc: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFirstName].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forgotten when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death. And yet, she might still prove a useful tool against her lover..."
 seregul.0002.desc.b: "Now that the fate of the lecherous [mayor.GetFullName] has been decided, I must decide what to do with the faithless [wife.GetFirstName].\n\nShe does not love me, and neither I love her. The kindness and affection we may have felt as a young couple has long dissipated, and was utterly forgotten when she bore her half-blooded bastard.\n\nI would be within my right to imprison her, though I am told it may fuel my vassal's accusations of tyranny. Another, quieter option would be to arrange her death."
 seregul.0002.a: "She cannot be trusted anymore."
 seregul.0002.b: "I want her dead!"
 seregul.0002.c: "She must prove her loyalty."
 seregul.0002.d: "I refuse to even think about this."

 seregul.0003.t: "A Shameful Blot"
 seregul.0003.desc: "My wife's affair is almost sorted, now all that is left to decide is the fate of the child. This living proof of my wife's faithlessness, my vassal's villainess, and my own humiliation.\n\nI must consider my move. The child must not allowed to go free, that much is clear. This little token of disrespect might grow to be a pretender, as it carries the royal blood.\n\nSo I must bring him into my power one way or another. His mother asks that he be legitimized as an [wife.GetDynastyName], and promises he shall be raised to be a most loyal courtier. I do not trust her, somehow."
 seregul.0003.a: "Seize the child."
 seregul.0003.b: "He must die."
 seregul.0003.c: "Actually, I shall be magnanimous."

 seregul.0004.t: "Focus South: Confronting the City"
 seregul.0004.desc: "The city of Barasi stands against me. As the richest city in $k_pel$, it has always acted haughtily towards it's Prince. This was tolerated, by my ancestors and then by me. But now the city has sealed it's doom and things will not again be what they were for Barasi, for they have broken away from the kingdom and it's leaders are guilty of treason.\n\nI will take bend the city to my will. Either through war or subtler ways. The city might be rich, but they will have no market to sell or food to buy if I enforce a complete economic rupture between us. They will starve and eventually they will break, and come crawling back to my nurturing arms."
 seregul.0004.a: "To war!"
 seregul.0004.b: "We will strangle their economy."
 seregul.0004.c: "They will fall soon enough."

 seregul.0005.t: "The Fall of Barasi"
 seregul.0005.desc: "As predicted, the economy of the proud city of Barasi has collapsed once they were cut off from my realm. The city starves and the merchants grow ever more fearful that they may be reduced to poverty.\n\nThe proud oligarchs are at last broken, and now they sue me for peace, and deliver themselves to my mercy. My chancellor tells me the few that still wished to project strength in the negotiations have been excluded from the talks by their peers.\n\nThe city is finally utterly at my mercy. Victory."
 seregul.0005.desc.b: "Barasi has fallen. Conquered and looted, the citizens flee and there's none left who wills to stand against my might. This proud city is broken. The oligarchs who haven't fled now sue me for peace.\n\nI do wish to take the city for myself, but that would no doubt anger my native vassals. If not me, a loyalist shall rule it. I will not have any more defiance from this now broken city.\n\nThe choice is between one of mine or one of theirs."
 seregul.0005.a: "It is mine!"
 seregul.0005.b: "[potential_oligarchic_vassal.GetFirstNameNoTooltip] will rule it in my name."
 seregul.0005.c: "For the sake of peace, [local_oligarchic_vassal.GetFirstNameNoTooltip] will rule."

 seregul.0006.t: "The Chaialla" 
 seregul.0006.desc.a: "The Chaialla are not as elusive as one might expect, though they mostly keep to themselves, they have had much contact with the tribes of Pél, and live openly as a simple farming folk. They have long had ties with the kharadûnaic rule of Pél, even enjoying a seat on the native council.\n\nBut [chaialla_ruler.GetFullName] has indeed not kept to himself, he broke away with the other secessionists after the treasonous Council of 3000 T.A., and has since been collaborating with Barasi against myself.\n\nWith the fall of Barasi they are left vunerable.\n\nBy rights I should crush them, and bring civilized rule over their little lands, but my council, as always, preaches caution, and tell me we could have a deal to restablish old ties."
 seregul.0006.a: "We'll crush them."
 seregul.0006.b: "I demand they bend the knee."
 seregul.0006.b.tt.vassal: "[chaialla_ruler.GetFirstNameNoTooltip] became your vassal!"

 seregul.0101.t: "Focus East: Tensions in the East"
 seregul.0101.desc.a: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me. Further away the Magrin warlord Opeyemi has seized the land for his tribe. I hear he is a competent general, but has no friends in his homeland.\n\nI must bend them to my will somehow, but their armies might be too much for Pél to handle. I know there is no love between them, I could try and manipulate them to fight each other..."
 seregul.0101.a: "Play them against each other."
 seregul.0101.b: "I will just crush them."
 seregul.0101.a.tt.success: "The fools go to war against one another!"
 seregul.0101.a.tt.failure: "They have seen through it and allied! To war!"

 seregul.0102.t: "A Band of Merry Men"
 seregul.0102.desc.a: "The Bandit King may have bought himself some time, but now I shall end his freedom once and for all.\n\nIf he desires to keep his rule he will have to swear fealty to me. This will be an ultimatum, and if he refuses war. But if I do not judge it wise to keep this scum in power, war it will still be and by my own might I will end him."
 seregul.0102.desc.b: "In the turmoil after the Council of 3000 T.A. the easternmost lands of Pél have fallen to opportunists.\n\nNearer at hand there is the Bandit King, a charismatic and merry man who, if the rumours are true, worships dark gods. He has rallied quite a force around him and comfortably stands in defiance against me.\n\nDealing with him will not be easy. I might be able to convince him to bend the knee, if I sweeten the pot enough..."
 seregul.0102.a: "He must swear his fealty."
 seregul.0102.b: "That pathethic rabble? An army?"
 seregul.0102.a.tt.success: "He has accepted!"

 seregul.0103.t: "An Ancient Threat"
 seregul.0103.desc.a: "The Twin Realms of Mag and Tumag for centuries ruled the natives of Pél, until a coalition of rebels ousted them. They then sought the [balan_lai|E] for protection, who had long given up any claims on Pél. Thus it was that the Princes of Pél began, protectors of the realm against the barbarian threat of Mag and Tumag.\n\nMy subjects are no better, but the Magrin cannot be tolerated to settle in, they could bring a great force with them. This adventurer might become the vanguard of a real invasion. He must bend or die."
 seregul.0103.a: "Repel the invaders!"
 seregul.0103.b: "One last chance to acknowledge me."

 seregul.0104.t: "The [defender.GetCulture.GetName] Defeated!"
 seregul.0104.desc: "We have at last subjugated the [defender.GetCulture.GetName] invaders.\n\nNow I must decide what to do with the lands they unlawfully seized. May outsiders never again threathen rightfully Kharadûnaic Pél."
 seregul.0104.a: "I shall take it for myself, of course."
 seregul.0104.b: "The Bandit King will buy the land."

 seregul.0201.t: "Focus West: The Cuind protectorate"
 seregul.0201.desc: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms.\n\nOtherwise, I could organize my armies for a speedy campaign, in the hope that the elves will move slower."
 seregul.0201.a: "I can convince the Cuind King."
 seregul.0201.a.tt.success: "He agreed to release [GetTitleByKey('c_mokuba').GetNameNoTier]"
 seregul.0201.b: "We just need to be quick!"

 seregul.0202.t: "Negotiating with the Elves"
 seregul.0202.desc.a: "Our previous attempt did not work. I shall come again to talk to [terilaen.GetFirstName]. Hopefully he will have forgiven me by now, and I can deceive him on the sicerity of my humbleness, even though I could not make him believe my promises previously. I am betting that this elf is a forgiving person.\n\nThis is my last resource. We must need conquer it in war if the talks fail."
 seregul.0202.desc.b: "The [cuind|E] have guaranteed the independence of our western secessionist! [toya.GetFullName] is a peaceful ruler, and I had previously counted on [toya.GetHerHis] support as someone who will not take aggressive moves regardless of how much I push the council.\n\nI was clearly wrong, for [toya.GetSheHe] had dealings with the [elves|E]! Now [GetTitleByKey('c_mokuba').GetNameNoTier] counts itself safe from Pél, under the protection of a powerful and elusive elven King. But I shall not give up my realm so easily.\n\nI hear this elven King to be a lover of [mankind|E], I may be able to trick him into releasing [toya.GetFirstNameNoTooltip] back into my arms."
 seregul.0202.a: "I will try."

 seregul.0250.t: "Pél Yields!"
 seregul.0250.desc.a: "After years of disruption the various native leaders are finally silent! For the last few months, no more have them challenged my authority, and I have been shown the proper respect in meetings.\n\nTheir fierceness has finally given into fear. More and more have been agreeing with anything I say on Council, and there have been fewer rumours going around.\n\nAt last the time is come to solidify my power, and start to slowly take away the Council's rights. Their inane mutiny is over and this is a new era for Pél."
 seregul.0250.desc.b: "After years of disruption the various native leaders are finally silent! For the last few months, no more have them challenged my authority, and I have been shown the proper respect in meetings.\n\nTheir anger has cooled off. I have acquired a few sycophants in the Council, and, regardless of what I say, when I speak more and more agree.\n\nAt last the time is come to solidify my power, and start to slowly take away the Council's rights. Their inane mutiny is over and this is a new era for Pél."
 seregul.0250.a: "A better Pél."

 seregul.0251.t: "Five Years to Stabilize!"
 seregul.0251.desc: "The disastrous Council of 3000 T.A. has deeply wounded my image. I am seen as an inefectual leader who pushed his vassals into mutiny and now fails to rein them back in. Of course it is all propaganda spread by those who would like to see me fail. I have tried guiding the natives, and they slapped my hand away like the treasonous savages they are.\n\nStill, I need to show I can unite the realm again. The heartlands of Pél might have restrained from secessionism, but most love me not, and might still try to break away if I do not mend the realm. Already I see them conspiring. I need to fix this.\n#X You have five more years to stabilize!#!"
 seregul.0251.a: "I will stabilize!"
 seregul.0251.b: "Barasi still stands in defiance."
 seregul.0252.c: "The wild east must be reined in!"
 seregul.0252.d: "The elves still encroach in the west."

 seregul.0252.t: "Pél Shatters Again!"
 seregul.0252.desc: "Disaster! [rebel_leader.GetFullName] has apparently met yesterday in secret with most of the native leaders of Pél.\n\nI have today been given a letter, apparently sent by this secret meeting of the Council to many across the kingdom, which says:\n\n"The tyrant seating in the throne of Pél has turned the kingdom into a defunct state. It is no longer in the interests of the Council that the Kharadûnâi should continue their rule over our land. Therefore it is the unanimous decision of this assembly that all should take arms and help topple this deadwood state."\n\nAs more reports come in, they seem to have all joined."
 seregul.0252.a: "In this fire a new Pél will be reborn yet!"

 seregul.0253.t: "The West is not Coming!"
 seregul.0253.desc: "An envoy has arrived in haste from $c_mispir$ during the night. The [balan_lai|E] sends word that, having convened, they will keep with their decision in 3000 T.A. and will be offering no help for the current rebellion.\n\nI will wager they see this as my end, and their fear and jealousy of me can now finally rest easy knowing I am tied up on this war for the foreseeable future.\n\nI shall never forget this betrayal."
 seregul.0253.a: "They fear me!"

 seregul.0254.t: "Pél is Lost!"
 seregul.0254.desc.a: "The unthinkable has happened! The natives have destroyed the kharadunaic state of Pél.\n\nI still hold $d_arpel$, and, as such, in spite of their betrayal, I am still a Prince of the [balan_lai|E]. The road will be long but I must rebuild my kingdom, recover my status, and have my revenge on those that toppled me.\n\nMy vengeance may be slow in coming, but it will be all the more complete then."
 seregul.0254.desc.b: "The unthinkable has happened! The natives have destroyed the kharadunaic state of Pél.\n\nI have even lost my standing as a Prince of the [balan_lai|E]. The road will be long and painful but I must rebuild my kingdom, recover my status, and have my revenge on those that toppled me.\n\nMy vengeance may be slow in coming, but it will be all the more complete then."
 seregul.0254.a: "I shall win yet."

 seregul.0255.t: "Woe to the Vanquished"
 seregul.0255.desc: "Naturally I have won.\n\nThe war has devasted the countryside, and even the capital has seen it's fair share of fighting, but now it is over.\n\nThe natives broken, the rebels in chains, and I triumphant.\n\nTime for a new Pél to rise."
 seregul.0255.a: "Now who's getting hanged?"

 seregul.0300.t: "Thinking to the Future"
 seregul.0300.desc: "I have known for a while that I cannot trust the other Princes of the [balan_lai|E]. Although I am clearly next in line for the leadership, [phorakon.GetFirstName] has always shown me disdain, while showing favoritism to [imrazor.GetFirstName].\n\nThis is clearly a political move, started by the arrogant old man's malice towards me. He conjures this image of [imrazor.GetFirstNameNoTooltip] as his successor, in spite of there being an older, more experienced, smarter candidate that the majority of Princes would normally vote for, me.\n\nHis decision to abandon me to the current native mutiny is clearly the path he's seen of undermining my reputation, making me appear incompetent to the other Princes.\n\nNow I must ponder on how to behave towards the Princes of Balân-Lâi."
 seregul.0300.a: "As their leader."
 seregul.0300.b: "As a friend."

 seregul.0301.t: "Reach out to Seregul?"
 seregul.0301.desc: "[seregul.GetFullName], a Prince of the [balan_lai|E], is a rash man. His blunders recently led to the Council of Pél, composed by representatives of all native tribes under the Kingdom, to denounce his rule. Many have seceeded altogheter from Pél, and demand his resignation if they are to come back peacefully to Kharadûnaic protection.\n\nThe Balân-Lâi has turned a blind eye to the matter, abandoning him to his fate. Likely hoping he will in fact be deposed.\n\nThis has, naturally, made [seregul.GetFirstNameNoTooltip] all the angrier with his peers. If we were to help him rein back his Kingdom, he would be in our debt, and we could use such a pawn to cause disruption in the south while we look north, to [bellakar|E]."
 seregul.0301.a: "A useful, if incompetent, pawn."
 seregul.0301.a.tt: "If we don't hear back from him in a couple of months he has denied us."
 seregul.0301.b: "Too risky."
 seregul.0301.b.tt: "What if he double crossed me?"

 seregul.0302.t: "A Letter on the Desk"
 seregul.0302.desc: "Today as I went into my study, I was greeted by a peculiar sight. A letter, placed squarely in the center of the desk, sealed with black wax.\n\nAs I question my guards and servants, I discover no one has seen anyone entering my study this morning. A quite eery feeling grows on me.\n\nIt must be the work of spies, surely. A well planned plot, to place this letter on my desk... Or could it have a more sinister explanation? Sorcery? Wights?\n\nI stop thinking on it, living in fear does me no good. I should just open it, or get rid of it."
 seregul.0302.a: "Open it."
 seregul.0302.a.tt: "It is written in a rather thin and long hand..."
 seregul.0302.b: "Burn it."
 seregul.0302.b.tt: "#help This choice will lock you out of content#!"

 seregul.0303.t: "To the beleaguered ruler of Pél, Seregul"
 seregul.0303.desc: "I have followed closely the difficult situation you find yourself in. The natives are treasonous by nature, and ever looking to topple rightful [adunaic|E] rule. We must stand together against insurrection, or rather all lose our realms. You need only ask for our help. We will require nothing in return but what you desire already, to take what ought to be yours by might of arms. Your peers will give you nothing but disdain out of their own will, you know that to be true."
 seregul.0303.a: "Accept!"
 seregul.0303.a.tt: "#P You will receive aid from the Stormhost and a new casus belli against the Balân-Lâi.#!"
 seregul.0303.b: "Bring the letter to the Balân-Lâi."
 seregul.0303.b.tt: "#P Bringing this to the Balân-Lâi will greatly improve your standing among the Princes.#!"

 seregul.0316.t: "Start the Travel?"
 seregul.0316.desc: "I am resolved to travel to [seregul_destination.GetCounty.GetName] and expose to the Balân-Lâi the Stormhost's plot to turn me against my peers!\n\nBut can I go right now?"
 seregul.0316.a: "Let's go."
 seregul.0316.b: "I cannot right now."

 seregul.0304.t: "Bringing the Issue to the Balan Lai"
 seregul.0304.toast: "Seregul has exposed the Stormhost's plot!"
 seregul.0304.desc: "I have come to [seregul_destination.GetCounty.GetName] to deliver the treasonous letter to [seregul_destination.GetController.GetFirstName]. During the travel I often wondered if this was the best course of action. I do not like [seregul_destination.GetController.GetHerHim], but standing against the [balan_lai|E] would be madness. And this way, I may yet curry some favour. Even if they are still set against me, they will always have to recognize I am a steadfast member of our alliance.\n\nAs [seregul_destination.GetController.GetFirstName] reads the letter his eyes grow wide. Rage, fear, maybe a mixture? I cannot read [seregul_destination.GetController.GetHerHim].\n\n[seregul_destination.GetController.GetSheHe|U] puts the letter down and looks at me with a milder expression. "You did good bringing me this, Seregul. This will unite the Balân-Lâi against our old enemy. But how shall we act?""
 seregul.0304.a: "I have a plan."
 seregul.0304.b: "I am sure you will figure it out."
 seregul.0304.b.tt: "The Balân-Lâi will decide how to act against the Storm Host, you will be notified."

 seregul.0305.t: "How to Address the Stormhost"
 seregul.0305.desc.a: "I have been granted leadership by the [balan_lai|E] on the matter of dealing with the Stormhost.\n\nThough powerful when united, we are a disjointed force, hard to coordinate, with too many heads. That would suggest that the best course of action would be to wait for a moment of weakness of the Storm Marshal.\n\nI know he has his eyes turned north, and covets the riches of [bellakar|E]. A secret alliance with that old Númenórean colony would certainly spell the end of the [stormhost|E], unexpectedly at war with at both north and south borders. But there are other ways, like my own kingdom, theirs certainly count with a fair share of secessionists, the Marshal rules with an iron fist.\n\nOtherwise, I could claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.desc.b: "Seregul has brought to us the vile letter from the Storm Marshal. A dagger drenched in honey. The Marshal promised Seregul gifts and help if he were to betray the [balan_lai|E].\n\nThankfully Seregul has shown no appetite for the honey, for a coordinated attack from the east and north would have wounded us at the very least.\n\nNow the [stormhost|E] has the Balân-Lâi's attention, and we mean to wound it back. We need only decide on a course of action.\n\nThey have their eyes turned on [bellakar|E], and we could offer that old Númenórean realm our friendship in secret, and destroy our enemy when the time comes. Or we could choose to attack from the inside, and ally with disgruntled forces subjugated by the Stormhost. And yet, I could simply claim [anbalkumagan|E] for myself, and strike when I see fit."
 seregul.0305.a: "Ally with Bellakar."
 seregul.0305.b: "Forment Rebellion."
 seregul.0305.c: "Direct action."

 seregul.0306.t: "An Offer of Alliance"
 seregul.0306.desc: "An envoy from the [balan_lai|E] requests audience! The envoy tells my court he wishes to discuss a matter of alliance! It is so rare for new things to happen, especially coming from the [sevenlands|E], that I have to contain my own gasp.\n\n Although we have economic ties with the Princes, and both sides try to maintain a healthy, cordial, relationship, we have barely had formal diplomatic ties in our histories.\n\nThe envoy proceeds to explain that the [stormhost|E] has sought one of the Princes, to undermine the Balân-Lâi. The Prince, [seregul.GetFirstNameNoTooltip], has instead in secret brought this letter to his peers, and the Balân-Lâi has decided, seeing as the [storm_marshal.GetFullName] desires to attack Bellakar, to offer us their aid in that eventual war.\n\nIt is up to me to decide whether and how this tie shall be established."
 seregul.0306.a: "I will gladly accept mutual defense."
 seregul.0306.b: "A personal alliance."
 seregul.0306.c: "We don't need them."

 seregul.0307.t: "Bellakar Accepts!"
 seregul.0307.desc: "[niluhin.GetFullName] has accepted our generous offer!\n\nWhen the time comes, [bellakar|E] will call the Princes of the [balan_lai|E] to crush the [stormhost|E]."
 seregul.0307.a: "We will be there."

 seregul.0308.t: "Bellakar: Full Alliance"
 seregul.0308.desc: "[niluhin.GetFullName], rather than depend on the Princes whims to come to his aid if and when the time comes that the [stormhost|E] shall attack his realm, has proposed a direct alliance with me.\n\nThis is great news! Though far away, [bellakar|E] could help my personal ambitions!"
 seregul.0308.a: "Wonderful!"

 seregul.0309.t: "Bellakar Rejects Us!"
 seregul.0309.desc: "For whatever reason, [niluhin.GetFullName] has rejected our proposal! Maybe [niluhin.GetSheHe] feared that were secret strings or plots attached to our magnanimous proposal. Maybe [niluhin.GetSheHePossessive] is less rational than we thought. We will never know [niluhin.GetHerHis] reasons.\n\n We must look for another way to weaken the [stormhost|E]."
 seregul.0309.a: "Let us review our options."

 seregul.0310.t: "On Incinting Rebellion"
 seregul.0310.desc: "I have decided that we should forment instability within the [stormhost|E]. As an artificial state conjured by a dark power, it lacks some of the organic foundations a realm such as our Princedoms, even Pél, have.\n\nIt fills such a hole with dread, dividing their subjects to keep them weak, tempting and threatening their nobles. Ever projecting a merciless, ruthless, image of itself onto it's subject's and it's neighbour's hearts.\n\nWe shall look for disgruntlement and make such a subject feel they have the support of a realm the Storm Marshall fears. They will feel that they are no longer alone, and under our protection, and then, when they rise up, we may decide how to act against a distracted enemy."
 seregul.0310.a: "The Nobles."
 seregul.0310.b: "The Slaves."

 seregul.0311.t: "An Offer of Rebellion"
 seregul.0311.desc: "A discreet letter was delivered to me today. In it is the seal of the [balan_lai|E], ever our enemies to the south.\n\nToday they offer me friendship! They describe a neutered plot against their lands by the [storm_marshal.GetTitleAsName].\n\nThey now desire to hurt him in retaliation, and have elected to promote my claim to [storm_marshal.GetFirstNamePossessiveNoTooltip] throne.\n\nDo I desire it, or will I remain loyal?"
 seregul.0311.a: "Yes."
 seregul.0311.a.tt: "When the war against Bellakar starts, you will have a chance to break free."
 seregul.0311.b: "I am loyal!"

 seregul.0312.t: "$k_an_balkumagan$ has accepted"
 seregul.0312.desc: "[ab_ruler.GetFullName] has taken our money, and accepted the offer. There is no saying when, and if, he will attack his liege. But we have sown some discord there."
 seregul.0312.a: "Okay."

 seregul.0313.t: "$k_an_balkumagan$ refuses!"
 seregul.0313.desc: "[ab_ruler.GetFullName] remains silent. He will not accept our offer. We won't be able to try any more covert instabilization of the [stormhost|E] either, due to the risk of them having brought our letter to the [storm_marshal.GetTitleAsName]."
 seregul.0313.a: "Damn."

 seregul.0314.t: "Bellakar Calls for Aid!"
 seregul.0314.desc: "[join_war.GetName] has started! [bellakar|E] calls for the aid promised by the [balan_lai|E]. How will [princedom.GetNameNoTier] answer?"
 seregul.0314.a: "We will be there."
 seregul.0314.b: "We will not answer."

 seregul.0315.t: "The Time has Come!"
 seregul.0315.desc: "Years ago we promised the [balan_lai|E] that when the [stormhost|E] stirred to war against [bellakar|E], we would attack our masters and seek independence. Now is the time. But have we changed our mind?"
 seregul.0315.a: "No! We want to be free!"
 seregul.0315.b: "Yes... Now is not the time."

 seregul.0401.t: "To the [storm_marshal.GetTitleAsName],"
 seregul.0401.desc: "I accept your help. And I do believe our interests align. As you have well noted, I have no love for my so called peers, who are always spiteful and jealous of me. I shall be an useful and faithful ally, especially when I come to my own as leader of the Balân-Lâi. This I do swear."
 seregul.0401.a: "Hah! As if he was our equal."
 seregul.0401.a.tt: "He will be expected to declare his war within the next 10 years. And if he doesn't, you will betray him to the Balân-Lâi, and war will happen anyway."
 seregul.0401.b: "We shouldn't send gifts to our enemy."
 seregul.0401.b.tt: "Seregul has, since our first communications, been elected the leader of the Balân=Lâi, he will not betray them now!"

 seregul.0402.t: "The First Gift"
 seregul.0402.desc: "A shady envoy arrives, bringing a chest of gold.\n\n"This is the first gift." He says in a slow and smooth speech "Our master sends greetings, and hopes you will use it well. Next time I will return with soldiers. Do not forget your promise.""
 seregul.0402.a: "Much appreciated."

 seregul.0403.t: "The Second Gift"
 seregul.0403.desc: "The shady envoy is back. Ahead of a long line of men. Most are rabble, but there are quite a few armored, well-trained men. I am glad.\n\nI am told they have come through secret ways in Usakan, to avoid the eyes of the [balan_lai|E]\n\n"This is the second gift." The envoy says in his slow, smooth voice. "Now you should have what you need to rein the savages in. Next I will return with councillors. The day that you shall fulfill your promise draws nearer.""
 seregul.0403.a: "A great boon to my cause!"
 stormhost_mercenaries: "Anbalukkhôri Auxillaries"

 seregul.0404.t: "The Final Gift"
 seregul.0404.desc: "The shady envoy is back. With him there comes a few sinister, martial-looking, [anbalukkhori|E] men.\n\n"This is the final gift. These men are... well connected. Let them deal with your troublemakers, and follow their military guidance, and you shall have everything you need.\n\nYou will not see me anymore. But, be forewarned, our master has not forgotten your promise. Get your affairs in order, and prepare for the attack.""
 seregul.0404.a: "I will..."

 seregul.0406.t: "The First Warning"
 seregul.0406.desc: "A sinister man calls on me today. An eery feeling washes over me when he talks, in a slithery tone.\n\n"Are you enjoying our gifts, lord? Have you forgotten your promise? I am come to remind you. You would not want the displeasure of the [southerndragonarmyadunaic|E]. You have less than five years left, or you will face the consequence.""
 seregul.0406.a: "Still plenty of time..."

 seregul.0408.t: "The Last Warning"
 seregul.0408.desc: "The sinister man is back.\n\n"You have enjoyed and spent our gifts. We hope you have brought your affairs in order. Now it is time to repay us. You will not live to see another year, if you do not fulfill your promise. Your treason shall be exposed for the wide world to see. You will not survive such a reveal. The Eye is watching you.""
 seregul.0408.a: "Oh dear."

 seregul.0410.t: "Time's Up"
 seregul.0410.desc: "One of my spies in Mispir arrives in haste. He comes running down my corridors towards my court room.\n\nAs he enters the room I tell him to calm down, and to explain what has happened for him to break his cover and pass openly towards Pél.\n\n"My lord, you are the talk of $c_mispir$! Apparently a letter has arrived, and [leader.GetFirstName] has been summoned. My sources tell me he has left the audience irate. Swearing to see your Highness dead."
 seregul.0410.a: "The Stormhost has exposed me!"

 seregul.0411.t: "Seregul Betrayed Us!"
 seregul.0411.desc: "The vile Prince of Pél, [seregul.GetFirstName] has betrayed the [balan_lai|E]! Apparently, he was approached by the [stormhost|E], years ago, and has been preparing for a large scale invasion against the Balân-Lâi ever since!\n\nLong suspected to be a blundering fool, now we have our confirmation! How can one man believe he can oppose all of us? The Balân-Lâi has stood strong for millenia. It shall not fall for one arrogant idiot, who relies on treacherous allies!"
 seregul.0411.a: "This shall not stand! To war!"
 seregul.0411.a.tt: "You have called every Prince to uphold the Concordant and put an end to the betrayer."
 seregul.0411.tt: "Death to the Traitor Prince!"

 seregul.0412.t: "The Day is Here"
 seregul.0412.desc.a: "Long have I planned and awaited the day my armies would march upon [GetTitleByKey('d_alsarias').GetNameNoTier]. Now the day has come. My armies stand as prepared as they will ever be to fight my former peers.\n\nThose among them who have antagonized me will fear my coming, for they know I shall offer no mercy. All those years of disdain and contempt, believing me the lesser of the Princes... This will be my hour.\n\nAnd yet, if the Stormhost were to help, this war would feel much safer, and victory even more attainable."
 seregul.0412.desc.b: "Long have I planned and awaited the day my armies would march upon [GetTitleByKey('d_alsarias').GetNameNoTier]. Now the day has come. My armies stand as prepared as they will ever be to fight my former peers.\n\nThose among them who have antagonized me will fear my coming, for they know I shall offer no mercy. All those years of disdain and contempt, believing me the lesser of the Princes... This will be my hour."
 seregul.0412.a: "To victory!"
 seregul.0412.b: "Send a message in haste."
 call_stormhost: "The Stormhost has already given you all the help they are willing to give. If they are to help you again, it will come at a cost..."

 seregul.0413.t: "[seregul.GetFirstNameNoTooltip] Asks for Help"
 seregul.0413.desc: "The [balan_lai|E] Princedom that we have had in our pocket for years has finally stirred to pay the price of the gifts we gave [seregul.GetHerHim]. He attacks [seregul.GetHerHis] peers and seeks to take it all.\n\nI may help [seregul.GetHerHim], if I wish. But it is certainly not in my interests to have such a strong neighbour as [seregul.GetSheHe] would become if victorious.\n\nIf we are to help it will be for nothing less than [seregul.GetHerHis] full fealty, and direct control over the lands in the [GetTitleByKey('k_kharadune').GetName]."
 seregul.0413.a: "A good opportunity."
 seregul.0413.a.tt: "If we win and [seregul.GetSheHe] refuses to swear fealty, you will go to war against [seregul.GetHerHim]."
 seregul.0413.b: "Hah! I care not for him."
 seregul.0413.b.tt: "No help coming from the Stormhost!"

 seregul.0414.t: "Victory!"
 seregul.0414.desc: "Rejoice! For I have won!\n\nNot only am I now the leader of the Balân-Lâi, but of most of the [sevenlands|E]! Rejoice, for I shall never again need to show a calm face in front of disrespect. Now all shall measure their words, take their bows and remind themselves of my superiority.\n\nHenceforth I shall rule this land with an iron fist. Peace is too fragile to be kept by a council, a strong, single-minded hand is needed."
 seregul.0414.a: "Rejoice!"

 seregul.0415.t: "Seregul's Folly"
 seregul.0415.desc.a: "At last we have [seregul.GetFirstName] in our power. This mad man who we once saw as our peer. Who sold himself to treacherous allies, our oldest enemies. To the shadow itself!\n\nWhat a resentful, deluded man. To have thinked he would topple the [balan_lai|E]!\n\nNow the war is over, and peace can reign again, may it last for a thousand years...\n\n[seregul.GetFirstNameNoTooltip] shall be executed on the morrow, and his line shall be excluded from the Balân-Lâi until they can prove themselves once more."
 seregul.0415.desc.b: "I am vanquished and fettered. This is the day I die. Curse the day when I opened that letter.\n\nAll my work, plans and desires have come to naught. My life ends in shame. Put down like a dog by my enemy.\n\nMy line shall continue, although I have no doubt they shall be ostracized by the Balân-Lâi. May they one day avenge me."
 seregul.0415.a: "So ends Seregul's Folly."
 seregul.0415.b: "Goodbye."

 seregul.0416.t: "The Stormhost's Demands"
 seregul.0416.desc.a: "As I deal with small matters of rebellion among the Princes, an envoy arrives from the [stormhost|E]. He stares at me for a time, until I bid him speak.\n\n"I have come to remind you of your debts, Prince of Pél. Would the war have been won if not for the help of the Southern Dragon Army?" He pauses for a while as if waiting for an answer.\n\n"You have been in our debt since you have accepted the gifts. You could not even pay us properly, and we had to win your war for you. Hence, the great [storm_marshal.GetFullName] demands your full submission, and concession of the lands under the [GetTitleByKey('k_kharadune').GetName] to his direct control. Or we shall invade.""
 seregul.0416.desc.b: "As I deal with small matters of rebellion among the Princes, an envoy arrives from the [stormhost|E]. He stares at me for a time, until I bid him speak.\n\n"I have come to remind you of your debts, Prince of Pél. You have fulfilled your promise, but it is still too small a price to pay for the gifts you have been given." He pauses for a while as if waiting for an answer.\n\n"Hence, the great [storm_marshal.GetFullName] demands your submission, and tribute, so that the [sevenlands|E] shall never again pose a threat to the Southern Dragon Army. If you refuse me now, we shall invade. And your debt will grow.""
 seregul.0416.a: "You will have your tribute."
 seregul.0416.b: "I knew there would be a price."
 seregul.0416.c: "What?! Never!"

 seregul.0417.t: "Who shall be the new Prince of Pél?"
 seregul.0417.desc: "Now that Seregul is finally deposed and executed, we can finally look forward to a future of peace and prosperity in Pél. To that end, regardless of Seregul's reforms, the original accord with the Pél people shall be restored and the Council reinstated.\n\nEven with such limitations to their power, there are many families in the [sevenlands|E] who would cherish the opportunity to become a member of the Balân-Lâi, and I have already been approached by some of the more politically competent ones.\n\nI have picked some of the most competent candidates from such families, now I need only to choose."
 seregul.0417.a: "[potential_prince_1.GetFullNameNoTooltip]"
 seregul.0417.b: "[potential_prince_2.GetFullNameNoTooltip]"
 seregul.0417.c: "[potential_prince_3.GetFullNameNoTooltip]"
 seregul.0417.d: "[potential_prince_4.GetFullNameNoTooltip]"
 seregul.0417.e: "[fallback_prince.GetFullNameNoTooltip]"