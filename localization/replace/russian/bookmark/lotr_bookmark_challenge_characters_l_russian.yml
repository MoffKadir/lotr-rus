l_russian:

 ### War of the Ring ###

 # Erwigiar
 challenge_character_erwigiar: "Верховный вождь Эрвигьяр"
 challenge_character_erwigiar_desc: "Предводитель эотеод, оставшихся в северной Долине Андуина, Эрвигьяр возглавляет малочисленный народ, тень своих родичей из Рохана.\n\n#bold Когда-то Фрамсбург был столицей могущественного королевства. Сможете ли вы вернуть его величие?#!"

 # Saebert
 challenge_character_saebert: "Верховный вождь Саберт"
 challenge_character_saebert_desc: "Мало кто из древних жителей Рованиона уцелел. Один из них - Саберт, налётчик с немалой славой. Он менее благороден, чем его предки, но не менее силён, чем они.\n\n#bold Сможет ли Саберт вернуть земли своих предков?#!"

 # Gimilkhâd
 challenge_character_gimilkhad: "Ар-Гимильхад"
 challenge_character_gimilkhad_desc: "Предводитель Ар-Адунаим, Гимильхад, утверждает, что является законным вожаком всех нуменорцев. Изгнанный на бесплодную скалу, похоже, его притязания так и останутся лишь на словах.\n\n#bold Но, возможно, Гимильхад сумеет доказать, что его утверждения - не безумие, а пророчество?#!"

 # Berúthiel
 challenge_character_beruthiel: "Леди Берутиэль"
 challenge_character_beruthiel_desc: "Знатная дама из ветви правящего дома Умбара, Берутиэль сплела могущественную паутину, чтобы принцы страны оставались в пределах её досягаемости.\n\n#bold Оказавшись между влюбленными, сможет ли Берутиэль сохранить своё королевство теней, или дневной свет раскроет все её злодеяния?#!"

 # Gyürüchill
 challenge_character_gyuruchill: "Катаджан Гьюрухиль II"
 challenge_character_gyuruchill_desc: "Один из самых могущественных владык теджин, Гьюрухиль II близок к своему концу. Однако грядут великие перемены, до которых он, возможно, не доживёт.\n\n#bold Теджин стоят на перепутье - какой путь вы выберете?#!"

 # Kalafar
 challenge_character_kalafar: "Таскрал Калафар"
 challenge_character_kalafar_desc: "Таскрал Хелкара, народ Калафара - последний тайный оплот старых порядков в землях, погружённых во тьму.\n\n#bold Сможет ли Хелкар, окружённый врагами, сохранить тайную веру, или его тоже поглотит тьма?#!"

 # Azruthôr III
 challenge_character_azruthor: "Барунхор Азрутор III"
 challenge_character_azruthor_desc: "Убеждённый традиционалист, Азрутор III - последний властитель, отстаивающий древние обычаи в Беллакаре.\n\n#bold Позволит ли Азрутор прошлому наконец умереть, или он будет упрямо цепляться за него?#!"

 # Fishi
 challenge_character_fishi: "Фиши «Знахарка»"
 challenge_character_fishi_desc: "Будучи отшельницей, Фиши возглавляет свой народ из глубин своего болота. Но ходят мрачные слухи о её истинной природе.\n\n#bold Сможет ли Фиши пережить пристальное внимание своих формальных владык, или её время на исходе?#!"

 # Szoranh
 challenge_character_szoranh: "Суао'п Зоран"
 challenge_character_szoranh_desc: "Странник из далёкого Вулмава, Зоран увидел шанс разбогатеть и сделать себе имя.\n\n#bold Изолированный на краю света, Зоран возвысится или падёт?#"

 # Eldberk
 challenge_character_eldberk: "Избад Эльдберк"
 challenge_character_eldberk_desc: "Добровольный изгнанник из Бузра-дума, Эльдберк испытывает сильное разочарование. И всё же он направил её в храбрую (или глупую) попытку вернуть древний Ногрод.\n\n#bold Сможет ли Эльдберк преодолеть свой гнев или разрушит всё, что он стремился построить?#"

 # Lanthir
 challenge_character_lanthir: "Аран Лантир"
 challenge_character_lanthir_desc: "Долгое время Лантир возглавлял свой народ из своих уединённых и безопасных чертогов.\n\n#bold И всё же, по мере того как мир меняется и проходят эпохи, может ли изоляция обеспечить защиту пенни?#"

 # Keiseimu
 challenge_character_keiseimu: "Худриаг Кейсейму"
 challenge_character_keiseimu_desc: "Приверженец традиций, худриаг Кейсейму на шаг приблизился к тому, чтобы вернуть трон своего деда и стать правителем всего Кханда.\n\n#bold Но окажется ли осторожность фатальной, когда Вангарис нанесёт ему сокрушительный удар?#"

 # Astarel
 challenge_character_astarel: "Шазада Астарель"
 challenge_character_astarel_desc: "Владычица Ибарада, Астарель - могущественный матриарх народа логат. Её народ разобщен, но, возможно, это можно изменить.\n\n#bold Сможет ли Астарель объединить свой враждующий народ, или это безнадёжно?#"

 # Argân
 challenge_character_axe_that_walks: "Избад Арган"
 challenge_character_axe_that_walks_desc: "«Топор, который ходит» уже стар и участвовал во многих сражениях. Но, возможно, пришло время для последнего великого похода.\n\n#bold Куда приведёт вас дорога, прежде чем время Аргана истечёт?#"

 # Creusa
 challenge_character_creusa: "Предводительница Креуса"
 challenge_character_creusa_desc: "Кольдунья из Лихолесья, владеющая тёмной магией, многое отдала в служении Тёмному властелину.\n\n#bold Не имея ни братьев, ни сестёр, ни детей, какое наследие вы сможете выкроить, прежде чем магия Креусы возьмёт своё?#"

 # Konnen
 challenge_character_konnen: "Арливда Коннен Корзун"
 challenge_character_konnen_desc: "Коннен, покрытый чешуёй, а не плотью, - один из последних оплотов своего народа.\n\n#bold Может ли Коннен надеяться защитить свой народ от вторжения харадрим и гондорцев?#"

 # Dasin II
 challenge_character_dasin: "Таскрал Дасин II"
 challenge_character_dasin_desc: "Возвысившийся в результате спорного наследования Дасин II оказался под осадой на двух фронтах.\n\n#bold Сможете ли вы при таких обстоятельствах обеспечить Пезарсану независимость?#"

 # Timnir
 challenge_character_timmir: "Таскрал Тиммир"
 challenge_character_timmir_desc: "Когда-то Тиммир был могущественным предводителем, чья искусная дипломатия обеспечила независимость его народа, но теперь его настигла старость.\n\n#bold Несмотря на его подорванный рассудок, сможете ли вы сохранить наследие Тиммира?#"

 # Ôn-Ikanna
 challenge_character_on_ikanna: "Укорьов Он-Иканна"
 challenge_character_on_ikanna_desc: "Великан среди своего народа, Он-Иканна, возможно, предвещает новое начало.\n\n#bold Когда-то хоннин правили всей Раей. Сможет ли Он-Иканна вернуть власть своего народа над этой землёй?#"

 # Rayo
 challenge_character_rayo: "Аутарб Райо"
 challenge_character_rayo_desc: "Терпеливый человек в песках пустыни, Райо знает силу клинка и то, что он может ему принести.\n\n#bold Что принесёт клинок Райо - освобождение, героизм или завоевания?"

 # Bêlzagar
 challenge_character_belzagar: "Зибдин Бельзагар"
 challenge_character_belzagar_desc: "Королевство Бельзагара, владыки крепости на краю света, очень молодое по гномьим меркам.\n\n#bold Сможет ли выстоять самая молодая крепость Черновласов в растущем хаосе конца эпохи?#"

 # Aglarin
 challenge_character_aglarin: "Пиратская владычица Агларин"
 challenge_character_aglarin_desc: "Одна из наследниц великого короля пиратов, Агларин и её братья теперь спорят о судьбе мыса Мардруак.\n\n#bold Кто же станет королём (или королевой) пиратов?#"

 # Borghal
 challenge_character_borghal: "Аутарб Боргал"
 challenge_character_borghal_desc: "Боргал, самый могущественный из вождей джелут, по-прежнему играет важную роль в делах Харада.\n\n#bold Но так ли это должно быть? Сможет ли Боргал возвысить джелут на высоты, невиданные за многие поколения?#"

 # Saelraed
 challenge_character_saelaed: "Верховный вождь Саэлрад"
 challenge_character_saelaed_desc: "Саэлрад владеет лишь половиной древних земель своего рода, и по ту сторону Андуина его род погрузился во тьму.\n\n#bold Сможет ли Саэлрад вновь объединить земли своего рода с помощью леди Фолдвин?#"

 # Radômor
 challenge_character_radomor: "Рива Радомор"
 challenge_character_radomor_desc: "Несравненный мечник, Радомор предпринял амбициозное завоевание, чтобы объединить свой народ и джунгли Заджантака.\n\n#bold Сумеет ли Радомор добиться успеха, или более могущественные силы переломят его клинок?#"

 # Rorimac
 challenge_character_rorimac: "Мастер Роримак"
 challenge_character_rorimac_desc: "Мастер Бакленда, Роримак формально независим от власти тана Шира.\n\n#bold Олдбаки когда-то возглавляли всех хоббитов - каким путём пойдут Брендибаки?#"

 # Legolas
 challenge_character_legolas: "Принц Леголас"
 challenge_character_legolas_desc: "Капитан южных границ Лесного королевства, принц Леголас, сын Трандуила, обязан оберегать эльфов, живущих в оставшейся части Лихолесья, не запятнанной Дол-Гулдуром. \n\n#bold В последнее время орки начали расползаться от гор Лихолесья и угрожают проникнуть на север, в родину эльфов...#"

 # Théodred
 challenge_character_theodred: "Второй маршал Теодред"
 challenge_character_theodred_desc: "Долг Второго маршала Риддермарка - защищать Вестфолд, самую западную провинцию Рохана. В последние дни Вестфолд подвергается набегам дикарей, наводящих ужас на население, и удерживается доблестным Теодредом, сыном короля. \n\n#bold Сможет ли принц Теодред восстановить порядок и узнать истинную причину налётов?#"

 # Jangi
 challenge_character_jangi: "Джанги Эзпаро"
 challenge_character_jangi_desc: "На протяжении веков Апайрабанда вселяли страх в сердца жителей берегов Ормальского залива, притесняя торговцев и грабя гробницы. Так было до прихода к власти Кодьянской гегемонии. Их захват Анарикэ и последующее господство на море привели к преследованию пиратского братства и охране морских путей в попытке вернуть былое процветание. Ситуация только ухудшилась после освобождения Анарикэ восставшим [Concept('khy', 'Кхаем')|E], когда Братство утратило свой статус символа морского сопротивления. Флотилии Апайрабанды, испытывавшие все большие трудности, были вынуждены покинуть свои родные воды и укрыться в тайных убежищах на Южном архипелаге, где им пришлось вступить в борьбу с Освобожденными Кадир и вулмавскими владениями. Корабли и их экипажи уничтожались один за другим, а их убежища обнаруживались и разрушались одно за другим.\n\n«Кровавый Махин», названный в честь какой-то давно забытой девы, склонной к насилию, - самый последний корабль из самого последнего флота Апайрабанды, изгнанный из своего убежища во время последней вулмавской кампании по уничтожению Апайрабанды раз и навсегда. В течение многих лет его команда бороздила просторы Харагаэра, но их сердца всегда стремились к искрящимся водам юности их братства.\n\nДжанги Эзпаро родился в море, вырос среди пиратов, постоянно находившихся в бегах, и был простым юнгой, когда «Кровавый Махин» покинул своё последнее укрытие. Поднимаясь по служебной лестнице и становясь капитаном, он видел, как все другие корабли были захвачены или потоплены. Как последний из Апайрабанды, он решил вернуться со своей немногочисленной командой в Ормальский залив, завершив историю Апайрабанды. Последний поиск сокровищ, прежде чем солнце навсегда зайдет над Апайрабандой!"

 # Bo Lagg
 challenge_character_bo_lagg_the_butcher: "Бо Лагг «Мясник»"
 challenge_character_bo_lagg_the_butcher_desc: "Чудовище с гор, Бо Лагг убил не одного беспомощного пастуха, но ему ещё предстоит проявить себя в борьбе с реальной угрозой.\n\n#bold Останется ли Мясник двуличным налётчиком, или же он приведёт весь Хеннакатт под своё кровавое знамя?#"

 # Hamshi
 challenge_character_hamshi: "Акнаджан Хамши"
 challenge_character_hamshi_desc: "В далёком прошлом муранийцы правили могущественной державой Харшандатт. Теперь их последние отпрыски пытаются сдержать натиск как нуарийцев из Сирайна, так и культистов богини Солнца из [Concept('khy', 'Кхая')|E].\n\nХамши из Зирената - последний из древнего рода. Серьёзный и исполненный долга правитель, который провёл свою долгую жизнь, присматривая за Долиной нхазадов, местом упокоения божественных мертвецов. Как характийский мистик, он видит себя не столько властелином, сколько хранителем памяти, хранителем гробниц и служителем предков.\n\nОднако время тяготеет над Хамши, и его пылкий сын Катор теперь готов взять бразды правления в свои руки. По мере того, как последние угли Харшандатта тлеют всё слабее, продолжит ли он покорно охранять то, что осталось, или создаст новое наследие из пепла?"

 # Gabar
 challenge_character_gabar: "Верховный вождь Габар"
 challenge_character_gabar_desc: "Младший сын великого рода, Габар сталкивается с угрозами со всех сторон. Орки на юге, воинственные племена на западе и огромные армии, сосредоточенные в Исре, на востоке.\n\n#bold Сможет ли владыка Тартауста пережить эту бурю или его сметёт тень?#"

 # Vîshrakh
 challenge_character_vishrakh_the_scribe: "Вишрах «Писарь»"
 challenge_character_vishrakh_the_scribe_desc: "В поисках запретных знаний Вишрах спрятал свою жизнь в руинах, еще более древних, чем он сам.\n\n#bold Откроет ли он секреты назгул или станет жертвой собственной трусости?#"

 # Scutsparg
 challenge_character_boss_scutsparg: "Босс Скатспарг"
 challenge_character_boss_scutsparg_desc: "В руки Скатспаргу попала маска, испещрённая символами, которые никто не может расшифровать. Хотя ее назначение неизвестно, он чувствует непреодолимое желание надеть ее.\n\n#bold Удастся ли ему раскрыть скрытую истину маски, или же его воля уйдет на второй план?#"

 # Adrahil II
 challenge_character_adrahil: "Принц Адрахиль II"
 challenge_character_adrahil_desc: "#TOLKIENQUOTE: «И последний и самый гордый Имрахиль, принц Дол Амрота, родственник повелителя Гондора, с золочёными знаменами с изображением корабля и серебряного лебедя, с отрядом рыцарей в полном вооружении на серых лошадях; а за ними семьсот вооружённых воинов: высоких, сероглазых и темноволосых».#!\n\nАдрахиль II, принц [Concept('dol_amroth', 'Дол Амрота')|E], могучей крепостью стоит на пути набегов пиратов и [haradrim|El] с юга. Но годы не щадят его и близится его закат. Настает очередь его сына, Имрахиля, нести знамя серебряного лебедя вперед, навстречу надвигающейся тьме."

 # Vangaris
 challenge_character_vangaris: "Худриаг Вангарис"
 challenge_character_vangaris_desc: "Вангарис — живое подтверждение жестокой меритократии [Concept('khand', 'Кханда')|E], где сильным суждено подняться до новых высот, а слабым лишь следовать за ними, или быть раздавленными. Некогда голодный сирота на улицах Стурлурзы Кханда, Вангарис стал повелителем всего Нижнего Кханда. Но сердце того, кому когда-то приходилось просить милостыни всегда жаждет большего.\n\nИ пусть представители древних кхандских родов смотрят на Вангариса свысока, он продолжит свой путь, навстречу новым завоеваниям, пока его сердце не обретёт покой. И ему совершенно не важно кто встанет на его пути."

 # Wulfgar
 challenge_character_wulfgarbrynjarsson: "Вульфгар Бриньярссон"
 challenge_character_wulfgarbrynjarsson_desc: "Один из потомков Вульфа, некогда короля [Concept('rohan', 'Рохана')|E] и Дунланда, Вульфгар - благородный и одинокий человек, заботящийся в первую очередь о безопасности своего народа. Поиски благотворного союза с соломенноголовыми были сорваны по всем пунктам [Concept('wizard', 'магом')|E] в [Concept('isengard', 'Изенгарде')|E]. Теперь, когда дунландцы присоединяются к армиям Изенгарда, Вульфгар должен принять решение противостоять ли гневу Теодена, или гневу [Concept('sarumancharacter', 'Сарумана')|E]." #Character from BfME: The Age of the Ring, written by Mathijs.

 # Mouth of Sauron
 challenge_character_mouth_of_sauron: "Голос Саурона"
 challenge_character_mouth_of_sauron_desc: "#TOLKIENQUOTE «Всадник был закутан в чёрный плащ, чёрным был и его остроконечный шлем; но это был не призрак Кольца, а живой человек. То был наместник башни Барад–дур. Имени его не сохранила ни одна легенда. Он, наверное, и сам запамятовал, как его зовут, ибо представился как «Голос Саурона».#!\n\nОтступник Гондора, наместник Тёмной башни, принявший командование над долиной Удуна, готовя её к войне. Его повелитель скоро нанесёт удар по ненавистному западу, и Голос Саурона будет готов, когда молот обрушится на королевства Свободных народов."

 # Aykaafak
 challenge_character_aykaafak: "Королева Айкаафак из Амбасона"
 challenge_character_aykaafak_desc: "Могущественные женщины-воительницы острова Амбасон ведут свою родословную от Амбы, младшей дочери легендарного Амава. Грозные налётчики и пираты, бороздящие океан Роменаэр, амбасона теперь стремятся завоевать королевство, которое было обещано им много веков назад..."

 # Zina-Konatl
 challenge_character_zina: "Король Зина-Конатл"
 challenge_character_zina_desc: "Зина-Конатл, происходящий из воинственных нафаратцев, недавно коронованный как король, - хитрый человек. Его народ давно желал большей независимости от своих повелителей-мумаканил, но правитель державы Сандамал оказался не таким снисходительным, как хотелось нафаратцам. Ибо Сандамал стремился обуздать власть племён и вернуть её короне, вызвав недовольство нафаратцев, которые стали действовать ещё более независимо, из-за ограничения их привилегий.\n\nЗина-Конатл начал свою собственную великую кампанию в Дреникане, и после пяти лет жестокой осады Тул-Макар наконец пал, его стены были сожжены, а жители преданы мечу вторгшимися войсками. Эти победы, одержанные во имя самих себя, ещё больше ободрили нафаратцев, которые начали даже совершать набеги на некоторые районы Туктана, и подтолкнули императора отдать приказ о вторжении в Коронандэ, которое теперь, наконец, началось.\n\nВнимательно следя за своим повелителем, Зина-Конатл должен только ждать удобного случая. Стоит ему проявить слабость, и нафаратское восстание начнётся полным ходом."

 # Bruka
 challenge_character_bruka: "Брука «Кровопускатель»"
 challenge_character_bruka_desc: "В самых восточных туннелях и норах Жёлтых гор обитают гоблины из племени Высекателей меток, которые первыми вторглись в эти древние земли. Они были покорены более крупными орками, когда Саурон потерпел поражение в Войне Последнего союза, и на протяжении многих поколений страдали под этим игом.\n\nТеперь король гоблинов Брука готов разрушить господство рукхаш-хай, пытаясь создать свободное королевство для Высекателей меток."

 # Ozag
 challenge_character_ozag: "Озаг «Повелитель огня»"
 challenge_character_ozag_desc: "Хитрый гоблин, Озаг занял Пылающий трон к северу от могучего вулкана Рангхасья, как только научился владеть колдовскими силами, дарованными ему тьмой. Теперь он стремится к ещё большей власти, подняв восстание против своего слабого повелителя, слабеющего Блудбага.\n\nСможет ли Озаг подняться на самую вершину орочьей иерархии Жёлтой горы и окутать низменности, окружающие вершины, новой тьмой, напоминающей о днях назгул Хорахила?"

 ### Long Winter ###

 # Nomid
 challenge_character_nomid: "Шазада Номид"
 challenge_character_nomid_desc: "В молодости шазада Номид был неплохим завоевателем, не великим, конечно, но достаточно хорошим. Теперь, в его годы, некогда верные подданные восстали, чтобы сбросить его иго, а его старые враги увидели шанс отомстить.\n\n#bold Сможет ли Номид сохранить свое наследие или станет последним, кто падет в Кровавые годы?#"

 # Thorne
 challenge_character_thorne: "Третий маршал Торн"
 challenge_character_thorne_desc: "Маршал Торн - хитрый человек, рассматривающий каждую ситуацию с выгодой для себя.\n\n#bold В то время как Рохан все больше и больше погружается в войну, как Торн может направить нити судьбы в свою пользу?#"

 # Fréalaf
 challenge_character_frealaf: "Первый маршал Фреалаф"
 challenge_character_frealaf_desc: "Фреалаф Хильдесон - племянник короля Хельма из Рохана и восходящая звезда рохиррим. Ему всего 28 лет, а он уже назначен первым маршалом Марки - престижная должность для столь юного человека. Люди говорят, что он похож на своего покойного отца Фреареда, прославленного гондорского воина и доверенного советника короля Грама.\n\n#bold Однако на Риддермарк обрушиваются беды, и верность и преданность Фреалафа своему королю подвергнется испытанию.#"

 # Cerith
 challenge_character_cerith: "Вождь Керит"
 challenge_character_cerith_desc: "Керит - повелитель народа Дунфеарна, один из разобщённых вождей Дунланда. Но, в отличие от остальных, он является союзником Фреки из Вестмарка, вассала ненавистных форгойл. Вскоре Керит окажется в центре внимания, поскольку Фрека столкнется с проблемами в Рохане и будет нуждаться в его помощи.\n\n#bold Поддержит ли Керит своих беспокойных родичей или выстроит собственную судьбу, освободившись от их влияния?#"

 # Gurnow
 challenge_character_gurnow: "Мэр Гурнов"
 challenge_character_gurnow_desc: "Гурнов - не более чем возвысившийся головорез, несмотря на все свои заявления о величии, однако в его жене течет последняя благородная кровь Тарбада.\n\n#bold Сможет ли Гурнов удержать свой угасающий город или холод поставит его на колени?#"

 # Eltariel
 challenge_character_eltariel: "Элтариэль, Клинок Галадриэль"
 challenge_character_eltariel_desc: "Многие люди, живущие в долинах и равнинах [Concept('rhovanion', 'Рованиона')|E], говорят, что Владычица [Concept('lothlorien', 'Лотлориэна')|E] обладает великой силой, которая простирается далеко за пределы Золотого леса. Немногие знают, какая правда скрывается за этими мифами. В то время как в Лориэне скрыта сила, другие инструменты, имеющиеся в распоряжении Владычицы, носят гораздо более естественный характер.\n\nОдним из них является Клинок Галадриэль. Охотница, убийца, мстительница - все эти обличья она примет для защиты Лотлориэна. Клинки Элтариэль столь же остры, сколь и смертоносны, и многие враги были повержены ими с безжалостной эффективностью."

 # Azrunêth
 challenge_character_azruneth: "Азрунет из флота Теней"
 challenge_character_azruneth_desc: "Созданный бандой опытных пиратов и выкованный в небольшую армаду быстроходных кораблей налётчиков, флот Теней уже много лет наводит ужас на западные побережья [Concept('belegaer_sea', 'моря Белегаэр')|E].\n\nНеожиданная смерть последнего повелителя пиратов бросила тень сомнения на единственного ребенка и наследницу упомянутого правителя, его дочь Азрунет. Может ли женщина на самом деле возглавить грозный флот воинственных пиратов и грабителей?\n\nПоследние месяцы доказали, что это правда. Набегов и добычи было предостаточно, и о новой командующей флота Теней уже поют морские песни.\n\nНо цели Азрунет заключаются в другом. Ее мечтой было объединить Священные острова и создать настоящее пиратское королевство, рай для всех и каждого, кто чувствует себя как дома на борту корабля..."

 # Shelepinn
 challenge_character_shelepinn: "Изгнанная королева Шэлепинн"
 challenge_character_shelepinn_desc: "Кинн-лай - разобщённый народ. В давние времена они были разделены после смерти своего первого короля. Шэлепинн, его гордая дочь, не могла вынести, что древним королевством Талилан правит кто-то другой, и поэтому отправилась в изгнание, прежде чем могла пролиться кровь.\n\nВ диких джунглях Юсакана она жила со своими немногочисленными последователями на протяжении многих поколений, практически не поддерживая контактов со своими родичами по ту сторону залива, которыми правил её племянник Далавин. Но мир меняется; тени сгущаются даже на крайнем юге Средиземья. Пришло ли время кинн-лай наконец воссоединиться?"