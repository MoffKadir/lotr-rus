 WASTELANDS_AUTOMATION_TOGGLE_TT_DEFAULT_DESC: "Если эта функция включена, ваш [Concept('ruler', 'правитель')|E] автоматически [Concept('colonise', 'колонизирует')|E] выбранный титул и все титулы, [Concept('de_jure', 'де-юре')|E] входящие в него, а также автоматически удаляет препятствия и строит постройки [Concept('settlement', 'поселения')|E].\n\nЕсли иное не предусмотрено настройками автоматизации, улучшение поселения в [Concept('castle', 'замковое')|E], [Concept('city', 'городское')|E] или [Concept('temple', 'храмовое')|E] [Concept('holding', 'владение')|E] происходит вручную.\n\n#help Автоматическая колонизация предназначена для игроков, незнакомых с механикой колонизации или желающих сосредоточить своё внимание на чём-то другом.#!"
 WASTELANDS_AUTOMATION_TOGGLE_TT_CUSTOM_DESC: "Если эта функция включена, ваш [Concept('ruler', 'правитель')|E] будет колонизировать самостоятельно, ограничиваясь лишь выбранными настройками."
