l_russian:

 # Reflavored Hashish to Pipeweed
 # Vanilla overwrites


 ### STRESS EVENTS ###
 stress_threshold.1001.hashishiyah.gain: "Подымлю немного, и станет легче..." # LOTR
 stress_threshold.1001.hashishiyah.effect: "Пожалуй сегодня ночью расслаблюсь, подымлю [ROOT.Char.Custom('GetPipeWeedName')]." # LOTR
 stress_threshold.1601.hashishiyah.gain: "Ещё трубочку, душу отвести..." # LOTR
 stress_threshold.1601.hashishiyah.effect: "Стоит только покурить [ROOT.Char.Custom('GetPipeWeedName')] и мысли утихают." # LOTR
 stress_threshold.1602.hashishiyah.gain: "Нужно выкурить трубку и успокоиться." # LOTR
 stress_threshold.1602.hashishiyah.effect: "[ROOT.Char.Custom('GetPipeWeedName')] всегда помогает мне расслабиться." # LOTR
 stress_threshold.1701.j.hashishiyah.gain: "Может стоит прикупить трубку?" # LOTR
 stress_threshold.1711.h.hashishiyah.gain: "Трубку! [ROOT.Char.Custom('GetPipeWeedName')] – и всё встанет на свои места." # LOTR
 stress_threshold.1731.i.hashishiyah.gain: " [ROOT.Char.Custom('GetPipeWeedName')] на дорожку." # LOTR
 stress_threshold.3401.f.hashishiyah.gain: "И трубку мне принесите!" # LOTR
 stress_threshold.3411.k.hashishiyah.gain: "Я уже не выдерживаю! Пожалуй, стоит выкурить трубку..." # LOTR
 stress_threshold.3421.h.hashishiyah.gain: "Подайте [ROOT.Char.Custom('GetPipeWeedName')] и трубку." # LOTR
 fogging_hard_memories_modifier: "Густое облако дыма" # LOTR
 fogging_hard_memories_modifier_desc: "Этого персонажа постоянно окружает густое облако дыма, источник которого – [CHARACTER.Custom('GetPipeWeedName')]." # LOTR
 tragic_stoner_modifier: "Хронический кашель" # LOTR
 tragic_stoner_modifier_desc: "[CHARACTER.Custom('GetPipeWeedName')] оседает в лёгких этого персонажа из-за регулярного курения, вызываю регулярные приступы кашля." # LOTR
 stress_threshold_special.1001.hashishiyah: "Никак не могу отделаться от этой боли. Нужно чем-то её заглушить..." # LOTR
 stress_trait_ongoing.0506.desc: "\n\n[ROOT.Char.Custom('GetPipeWeedName')] поможет хотя бы на время облегчить боль. Вопрос лишь в том, покурить мне в одиночестве, или обзавестись приятной компанией. [medication_friend.GetTitledFirstName] [Select_CString(medication_friend.IsFemale, 'спрашивала', 'спрашивал' )] не нужно ли мне сегодня дружеское плечо..." # LOTR
 hashish_alone_modifier: "Курение в одиночестве" # LOTR
 hashish_alone_modifier_desc: "Этот персонаж курит [ROOT.Char.Custom('GetPipeWeedName')] в больших количествах и так справляется с болью. За персонажем всегда тянется облако дыма." # LOTR
 hashish_with_friend_modifier: "Курение в компании" # LOTR
 hashish_with_friend_modifier_desc: "Этот персонаж вечерами курит [ROOT.Char.Custom('GetPipeWeedName')] в компании хорошего друга. Вместе они постоянно пускают кольца дыма." # LOTR
 stress_trait_ongoing.0511.a_flavour: "Вы выбрасываете трубку и мешочек с травами" # LOTR
 stress_trait_ongoing.0511.b_flavour: "Когда вы остаётесь наедине, вы вновь спокойно зажигаете трубку." # LOTR
 stress_trait_ongoing_0516.desc: "«—и вот почему эта встреча так важна».\n\nВстреча? Ах, да, точно, [important_guest.GetTitledFirstName], встреча. По поводу... Чего-то там. О чём мы #EMP вообще#! говорили? [important_guest.GetSheHe|U] судя по виду [Select_CString(important_guest.IsFemale, 'настроена', 'настроен' )] серьёзно, о чём бы ни была речь.\n\nЯ тянусь за трубкой, затягиваюсь плотным дымом и выдуваю очередное дымное кольцо. [important_guest.GetFirstNameNoTooltip] с недоумением пережидает затянувшуюся паузу и мне становится очевидно, что мне следует уделять больше внимания нашей беседе." # LOTR
 stress_trait_ongoing.0516.a.tt_fail: "Ваши постоянные отвлечения становятся причиной обиды" # LOTR
 stress_trait_ongoing.0516.c: "Расслабьтесь, [important_guest.GetFirstNameNoTooltip]. Возьмите вот, лучше, трубочку!" # LOTR
 stress_trait_ongoing.0516.c_flavour: "Вы достаёте [ROOT.Char.Custom('GetPipeWeedName')] из мешочка и готовы поделиться" # LOTR