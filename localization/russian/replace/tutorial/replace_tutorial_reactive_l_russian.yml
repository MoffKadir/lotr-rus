 reactive_advice_varangian_adventure_desc: "Вы можете начать [Concept('varangian_adventure', 'приключение бродяг')|E].\n\nПока длится $culture_era_tribal$ [Concept('era', 'эра')|E], этот тип войны позволит вам начать новую жизнь в чужих землях, далеко от холодных берегов вашей родины.\n\nУспешное [Concept('varangian_adventure', 'приключение бродяг')|E] не только перенесет вашу державу в другие земли, но и предоставит независимость вашим старым землям, включая вассалов."