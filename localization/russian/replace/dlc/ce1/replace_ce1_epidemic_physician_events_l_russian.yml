l_russian:
 physician_epidemic_events.1050.desc: "В тронный зал входят стражники, между ними в цепях стоит [physician.Custom2('MyCharacterIntroduction', ROOT.Char)]. После каждого сражения [Select_CString(physician.IsFemale, 'она обрабатывала', 'он обрабатывал' )] раны воинов, не делая различия между нашими солдатами и врагами.\n\nНеприятельские солдаты прозвали [Select_CString(physician.IsFemale, 'ее', 'его' )] лазарет «#L [ROOT.Char.GetPrimaryTitle.GetAdjective|l]ой#! таверной», и теперь военачальники требуют его закрыть. «Они страдают и истекают кровью точно так же, как мы, — спокойно объясняет [physician.GetFirstName]. — Кто я [Select_CString(physician.IsFemale, 'такая', 'такой' )], чтобы отказывать им в помощи?»"