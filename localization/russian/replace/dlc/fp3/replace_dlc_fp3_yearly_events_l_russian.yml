l_russian:
 ##################################################
 #IRANIAN INTERMEZZO FRONTIER FLAVOR EVENTS
 ##################################################

 fp3_yearly.2000.desc_drinking: "Всю ночь я [Select_CString(ROOT.Char.IsFemale, 'выпивала', 'выпивал' )] с верными вассалами и закадычными друзьями. Пока я наслаждаюсь последними каплями хмеля поутру,"
 fp3_yearly.2000.desc_hashish: "Всю ночь до рассвета я [Select_CString(ROOT.Char.IsFemale, 'курила', 'курил' )] [prudish_liege.Custom('GetPipeWeedName')] с верными вассалами и закадычными друзьями. Пока я делаю последнюю затяжку из своей трубки," #lotr
 fp3_yearly.2000.desc_warning: "[cautious_vassal.GetTitledFirstName] отводит меня в сторону, прерывая мое веселье:\n\n«[prudish_liege.GetTitledFirstName] славится своей строгостью. Если [Select_CString(prudish_liege.IsFemale, 'ее', 'его' )] #italic стражники#! увидят тебя в городе в таком виде, тебя арестуют и прикажут высечь. Отдохни здесь, внутри, а потом иди, как протрезвеешь»." #lotr
 fp3_yearly.2000.b_failure: "#italic Стражники#!, которыми командует [prudish_liege.GetTitledFirstNameNoTooltip], ловят меня и приказывают высечь." #lotr


 fp3_yearly.2001.desc_intro: "Мои #italic стражники#! сообщают мне, что [intoxicated.Custom2('MyCharacterIntroduction', ROOT.Char)] ходит по городу," #lotr
 fp3_yearly.2001.desc_hashish: "выдувая кольца дыма в небо" #lotr


 fp3_yearly.2010.t: "Фунты пшеницы" #lotr
 fp3_yearly.2010.desc: "Моих ушей не достигали вести о засухе или голоде, но народ округа [bakers_county.GetNameNoTier] тем не менее жалуется на чрезмерную дороговизну хлеба.\n\n«Это все твой придворный пекарь [greedy_baker.GetFirstName], — говорит мне [random_courtier.Custom2('MyCharacterIntroduction', ROOT.Char)]. — [Select_CString(greedy_baker.IsFemale, 'Она скупила', 'Он скупил' )] всю пшеницу и муку, что привозили в город, и не позволяет нам приобрести даже один #italic фунт#! на свои нужды»." #lotr
 fp3_yearly.2010.a_elephants: "мумакил!" #lotr


 fp3_yearly.2020.desc_cynical: "[ROOT.Char.GetFaith.HighGodName], религия — все это мало интересует [Select_CString(sinful_tax_collector.IsFemale, 'ее', 'его' )]. [Select_CString(sinful_tax_collector.IsFemale, 'Она', 'Он' )] регулярно просыпает молитвы и то и дело ворует у бедняков." #lotr

 fp3_yearly.2021.desc_cynical: "«[sinful_tax_collector.GetTitledFirstNameNoTooltip] [Select_CString(sinful_tax_collector.IsFemale, 'известна', 'известен' )] тем, что [ROOT.Char.GetFaith.HighGodName] не внушает [Select_CString(sinful_tax_collector.IsFemale, 'ей', 'ему' )] трепета. [Select_CString(sinful_tax_collector.IsFemale, 'Она', 'Он' )] регулярно просыпает молитвы и часто крадет у бедняков. Все мы боимся, что однажды [ROOT.Char.GetFaith.HighGodName] покарает [Select_CString(sinful_tax_collector.IsFemale, 'ее', 'его' )]»." #lotr
 fp3_yearly.2021.a: "[sinful_tax_collector.GetTitledFirstNameNoTooltip|U] будет [Select_CString(sinful_tax_collector.IsFemale, 'уволена', 'уволен' )]." #lotr

 fp3_yearly.8003.desc: "[Select_CString(superstitious_consort.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('superstitious_consort'))] [superstitious_consort.GetFirstName] имеет привычку жечь семена #italic эсфанда#!, чтобы отогнать силы зла, но теперь [Select_CString(superstitious_consort.IsFemale, 'она', 'он' )] утверждает, что [Select_CString(cruel_consort.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('cruel_consort'))] [cruel_consort.GetFirstName] [Select_CString(cruel_consort.IsFemale, 'сглазила', 'сглазил' )] [Select_CString(superstitious_consort.IsFemale, 'ее', 'его' )] и [Select_CString(cruel_consort.IsFemale, 'украла', 'украл' )] [Select_CString(superstitious_consort.IsFemale, 'ее', 'его' )] запас эсфанда. [cruel_consort.GetFirstNameNoTooltip], разумеется, все это отрицает, [superstitious_consort.GetFirstNameNoTooltip] же твердо намеревается заполучить новый эсфанд, чтобы спастись от сглаза.\n\n«Прошу, [ROOT.Char.Custom('FormOfAddressForLiege')], — умоляет [Select_CString(superstitious_consort.IsFemale, 'она', 'он' )]. — Жрец рассказал мне о священной горе в провинции [espad_mountain_province.GetName], лишь там цветут лучшие цветы эсфанда. Пошли за ними людей, ради меня»."

 ####The Frontiers' Call, by Ola Jentzsch####
 fp3_yearly.8004.t: "Граница зовет"
 fp3_yearly.8004.desc: "У некоторых из жителей местных роскошных городов до сих пор отдаются в сердце воющие ветра северных степей. Начинает чувствовать этот зов и [Select_CString(fp3_child_to_leave.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('fp3_child_to_leave'))] [fp3_child_to_leave.GetFirstName].\n\n«[Select_CString(parent.IsFemale, 'Матушка', 'Отец' )], отпусти меня. Я хочу отточить свой разум и клинок на ветру, странствовать с караванами и горцами, возможно даже найти легендарный Палисор».\n\n[worried_relation.GetFirstName], однако, беспокоится и не хочет, чтобы [fp3_child_to_leave.GetFirstNameNoTooltip] [Select_CString(fp3_child_to_leave.IsFemale, 'покидала', 'покидал' )] отчий дом. [Select_CString(fp3_child_to_leave.IsFemale, 'Она', 'Он' )] умоляет меня не отпускать [Select_CString(fp3_child_to_leave.IsFemale, 'дочь', 'сына' )]."

 fp3_yearly.8008.desc: "Я отползаю назад, в крови и без сил, глядя, как [fp3_child_to_leave.GetFirstNameNoTooltip] приближается ко мне с оружием в руке.\n\n«Я ведь уже [Select_CString(fp3_child_to_leave.IsFemale, 'сказала', 'сказал' )], [Select_CString(parent.IsFemale, 'матушка', 'отец' )], — я #italic уйду#!. Я отправлюсь на границу, как того желает моя душа, далеко по Рунскому пути, а оплатишь мое путешествие #italic ты#!».\n\nМне остается лишь наблюдать, как [Select_CString(fp3_child_to_leave.IsFemale, 'моя дочь', 'мой сын' )] уходит, высоко подняв голову и прихватив с собой мешок монет из моей казны."

 fp3_yearly.8009.desc_beginning: "Приграничье всегда служило прибежищем для язычников и странных сект, но сейчас, правя из провинции [caliphal_location.GetName], [righteous_caliph.GetTitleTierName|l] [righteous_caliph.GetFirstName] беспокоится об этом не на шутку.\n\n«Нам сейчас рассказывают, что в округе [very_heretic_county.GetName] объявились [very_heretic_county.GetCountyData.GetFaith.GetAdherentNamePlural|l], практикующие странные ритуалы, — [ROOT.Char.GetFaith.GetReligiousHeadTitle.GetAdjectiveNoTooltip|l]ий посланник, [hof_emissary.GetName], ненадолго замолкает, словно набираясь смелости, затем продолжает вполголоса, но с негодованием. — Ходят даже слухи о ритуалах #italic плотской#! природы. Хватит это терпеть!"


 fp3_yearly.8010.desc_not_muslim: "[righteous_caliph.GetTitleTierName] [righteous_caliph.GetFirstName] полностью разделяет взгляд на мир, как на арену вечной борьбы цивилизации и варварства, и очень беспокоится об угрозе, что грозит нам с коварного, неприрученного востока.\n\n«Ты исповедуешь [ROOT.Char.GetFaith.GetReligion.GetAdjective], и твой долг — подчинить нам языческие земли на границе, — говорит [Select_CString(righteous_caliph.IsFemale, 'она', 'он' )] мне. — Слишком долго мы терпели идолопоклонничество, которому предается [pagan_ruler.GetTitledFirstName]. Я дам тебе отряды верных воинов и кочевых наемников, чтобы ты [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] освободить округ [pagan_county.GetNameNoTier] от [Select_CString(pagan_ruler.IsFemale, 'ее', 'его' )] правления»."

 fp3_yearly.8012.desc: "«Похоже, — замечает [righteous_caliph.GetTitleTierName] [righteous_caliph.GetFirstName], — ты [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил')] выполнить свою клятву завоевать округ [pagan_county.GetNameNoTier] во имя нашей веры незамедлительно. Поистине ты — [Select_CString(ROOT.Char.IsFemale, 'надежная правительница', 'надежный правитель')] и ревностный приверженец [ROOT.Char.GetFaith.GetReligion.GetNameNoTooltip|l]ой веры. Мы этого не забудем»."

 fp3_yearly.8014.desc: "Я давно уже безуспешно пытаюсь сочетать свою любовь к хмельным напиткам со строгими взглядами #L [ROOT.Char.GetFaith.GetName|l]ой#! религии. К счастью, [Select_CString(smart_courtier.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('smart_courtier'))] [smart_courtier.GetFirstName] [Select_CString(smart_courtier.IsFemale, 'предложила', 'предложил' )] решение.\n\n«Я [Select_CString(smart_courtier.IsFemale, 'слышала', 'слышал' )] о жителях гор, — говорит [Select_CString(smart_courtier.IsFemale, 'она', 'он' )], — которым нужно время от времени пить вино, чтобы справляться с холодом. Ну и просто для веселья, конечно же. Они взяли за правило наливать хмельное в медный чайник, чтобы излишне ревностный сторонний наблюдатель решил, что они пьют чай, а не вино. Я и [Select_CString(smart_courtier.IsFemale, 'сама', 'сам' )] уже какое-то время так поступаю, это очень удобно»."

 #Forgotten Runestones, by Ola Jentzsch
 fp3_yearly.8016.t: "Забытые камни"
 fp3_yearly.8016.desc: "[Select_CString(hyrcanian_vassal.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('hyrcanian_vassal'))] [hyrcanian_vassal.GetFirstName] [Select_CString(hyrcanian_vassal.IsFemale, 'пригласила', 'пригласил' )] меня взглянуть на триаду необычных резных камней, скрытых в глубине местности, в которой угадываются [runestone_province.GetTerrain.GetNameNoTooltip|l] на [Select_CString(hyrcanian_vassal.IsFemale, 'ее', 'его' )] землях.\n\n«Их, должно быть, возвела затерянная экспедиция диких #italic северян#!, — говорит мне [Select_CString(hyrcanian_vassal.IsFemale, 'она', 'он' )]. — Местные, что населяют [runestone_province.GetTerrain.GetNameNoTooltip|l], полюбили эти камни и верят, что если камни уничтожить, то сделавших это тут же покарают их неизвестные создатели, явившись с Долины Андуина. Но я не верю в эти сказки. Хоть я и не могу прочесть буквы на этих камнях, я вижу, что перед нами языческие идолы, и потому их нужно разбить на куски. Не так ли, [Select_CString(ROOT.Char.IsFemale, 'госпожа', 'господин' )]?»" #lotr

 fp3_yearly.8017.desc: "Беда пришла! [runestone_county.GetNameNoTier] горюет — гневные воины #italic северян#! налетели туда, как стервятники на труп, вырезая все на своем пути. [hyrcanian_vassal.GetTitledFirstName] тоже не [Select_CString(hyrcanian_vassal.IsFemale, 'убереглась — она попала', 'уберегся — он попал' )] под удар топора и теперь очень [Select_CString(hyrcanian_vassal.IsFemale, 'плоха и сильно покалечена', 'плох и сильно покалечен' )]. Налетчики, впрочем, ушли так же быстро, как и пришли, вернулись на свои корабли и исчезли в утреннем тумане Андуина.\n\nСреди выживших ходят слухи, что нападавшие мстили за то давнее осквернение рунических камней, что [Select_CString(hyrcanian_vassal.IsFemale, 'устроила', 'устроил' )] [hyrcanian_vassal.GetFirstNameNoTooltip] годы тому назад..." #lotr


 fp3_yearly.8018.desc_eunuch: "Я упражняюсь с моим конем по имени [ROOT.Char.Custom('WarhorseStoryName')], и тут ко мне подходит путник из далеких земель. Он кланяется точно выверенным движением — явно давно при дворе.\n\n«Я служу знатной госпоже, — говорит он, — в Кхае, за этими большими горами. Госпожа моя очень любит играть в #italic човган#!, конную игру, что популярнее чем в ваших крошечных владениях. А еще она не прочь прихвастнуть и сказала друзьям, что на следующую игру оседлает лучшего коня под небесами. Мой народ издавна ценит #italic небесных коней#! твоей земли, и мне кажется, [ROOT.Char.Custom('FormOfAddressForLiege')], что твой конь — лучший из них. Я также знаю, что у тебя есть некоторые #italic денежные#! затруднения...\n\nЧто скажешь? Не продашь ли мне своего великолепного скакуна?»" #lotr
 fp3_yearly.8018.desc_grand_old_lady: "Я упражняюсь с моим конем по имени [ROOT.Char.Custom('WarhorseStoryName')], и тут ко мне приближается вместе со свитой благородная дама в изысканном одеянии.\n\n«Я прибыла, — говорит она мне, — из дворцов Кхая. В последнее время мне полюбился #italic човган#! — это конная игра, известная даже в твоей небольшой державе. Я пообещала явиться на следующую игру верхом на #italic небесном коне#!, потеющем кровью скакуне из Рохана — таких мой народ ценит выше даже таблетки бессмертия. Мне стало известно, что у тебя, [Select_CString(ROOT.Char.IsFemale, 'мелкой владетельницы', 'мелкого владетеля' )] этих земель, есть конь лучше всех прочих. Также мне стало известно, что ты сейчас в долгах...»\n\nОна вручает мне увесистый мешок с золотом. Ее намерения очевидны." #lotr

 fp3_yearly.8888.desc: "[upset_vassal.GetName] просит встречи со мной. [Select_CString(upset_vassal.IsFemale, 'Она заметно огорчена', 'Он заметно огорчен' )].\n\n«[Select_CString(ROOT.Char.IsFemale, 'Госпожа', 'Господин' )], — обращается [Select_CString(upset_vassal.IsFemale, 'она', 'он' )] ко мне, — [turkic_leader.GetCulture.GetName], чье племя возглавляет [turkic_leader.GetName], захватывают пастбища в округе [nomads_county.GetNameNoTier] и в целом осложняют жизнь доброму оседлому народу. Я [Select_CString(upset_vassal.IsFemale, 'пыталась', 'пытался' )] отправлять против них воинов-#italic наёмников#!, но всадники лишь уходят в пустыню, а через месяц нападают снова. Помоги мне прогнать этих немытых варваров раз и навсегда».\n\n«Я могу справиться с ними, — говорит мой [possibly_capable_marshal.GetCouncilTitle] [possibly_capable_marshal.GetFirstName]. — Отправь меня в округ [nomads_county.GetNameNoTierNoTooltip]»." #lotr

 fp3_frontier_story_cycle.0002_letter: "Я приношу извинения за свое поведение на встрече с кочевниками. Они и правда покинули округ [nomads_county.GetNameNoTier] и, как говорят, прекратили вражду с крестьянами. Я по-прежнему считаю, что к угрозе со стороны кочевников стоит относиться серьезно, но в то же время в знак уважения хочу подарить тебе эти красивые золотые монеты, давным-давно выкованные в [Concept('khyan', 'Кхайской')|E] империи." #lotr

 fp3_frontier_story_cycle.0003_not_jizya: "Нам надо заставить их платить дополнительный налог. Разве мало щедрости ты [Select_CString(ROOT.Char.IsFemale, 'явила', 'явил' )] им до этого?»\n\n" #lotr

 fp3_frontier_story_cycle.0007.desc: "«О [ROOT.Char.GetTitleTierName], — взывает [Select_CString(warmonger_councillor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('warmonger_councillor'))]! — Торговцы в округе [bandits_county.GetName] жалуются, что там орудуют конные разбойники. Теперь караваны избегают тех земель, что вредит нашей торговле на Рунском пути. Прошу, отправь меня туда разобраться с проблемами».\n\n«Нет, — сурово перебивает [Select_CString(warmonger_councillor.IsFemale, 'ее', 'его' )] [turkic_leader.GetName]. — Я могу отправить туда своих воинов, и они будут всегда охранять торговые пути — если нам разрешат отныне пасти коней в округе [bandits_county.GetNameNoTierNoTooltip]. Разве не лучше поступить так?»\n\nНо [warmonger_councillor.GetFirstNameNoTooltip] протестует: «Учти, [ROOT.Char.Custom('FormOfAddressForLiege')], крестьяне не любят, когда ты даешь кочевникам волю скакать где угодно»." #lotr

 fp3_yearly.8021.desc: "Несколько дней назад [alchemy_enthusiast.GetName], [Select_CString(alchemy_enthusiast.IsFemale, 'образованная', 'образованный' )] [alchemy_enthusiast.Custom2('RelationToMe', SCOPE.sC('upset_vassal'))], [Select_CString(alchemy_enthusiast.IsFemale, 'которую', 'которого' )] держит при себе [Select_CString(upset_vassal.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('upset_vassal'))] [upset_vassal.GetFirstName], [Select_CString(alchemy_enthusiast.IsFemale, 'принимала', 'принимал' )] участие в эксперименте с крепкой серной кислотой, который [Select_CString(alchemy_enthusiast.IsFemale, 'спланировала выдающаяся', 'спланировал выдающийся' )] алхимик [enthusiastic_alchemist.GetName]. По-видимому, что-то пошло совсем не по плану.\n\n«[enthusiastic_alchemist.GetFirstNameNoTooltip] заслуживает сурового наказания, — говорит мне [upset_vassal.GetTitledFirstNameNoTooltip]. — Взгляните, в каком жалком состоянии [Select_CString(alchemy_enthusiast.IsFemale, 'моя', 'мой' )] [alchemy_enthusiast.Custom2('RelationToMe', SCOPE.sC('upset_vassal'))]!»\n\n«Нет, [ROOT.Char.GetTitleTierName], — молит [enthusiastic_alchemist.GetFirstNameNoTooltip], — мне с трудом удалось довести до совершенства формулу, которую так стремились получить древние. В том, что [alchemy_enthusiast.GetTitledFirstNameNoTooltip] так беззаботно [Select_CString(alchemy_enthusiast.IsFemale, 'обращалась', 'обращался' )] с целой #italic унцией#! самого едкого вещества в [middleearth|E], моей вины нет»." #lotr

 fp3_yearly.8022.desc: "«Мое изобретение основано на стекловидном минерале, который древние [numenoreans|El] называли #italic витриолом#!, — объясняет [enthusiastic_alchemist.GetName]. — После тщательной прокалки зеленого витриола в железной реторте мне удалось создать эту едкую субстанцию. Я предвижу возможности использовать ее в научных и медицинских целях, но помните, [ROOT.Char.GetLadyLord|l], это вещество не допускает небрежности, как [alchemy_enthusiast.GetTitledFirstName] [Select_CString(alchemy_enthusiast.IsFemale, 'узнала', 'узнал' )] на собственном опыте. Возможно, вы согласитесь поддержать мои дальнейшие исследования»." #lotr

 fp3_yearly.8023.desc: "Когда я переливаю зловеще шипящие жидкости из бутылки в бутылку, [enthusiastic_alchemist.GetName] с тревогой смотрит на меня.\n\n«[ROOT.Char.GetTitleTierName], — говорит [enthusiastic_alchemist.GetSheHe], — в отличие от вас, я в основном изучаю историю и теологию и мало смыслю в алхимии. И все же мой опыт говорит мне, что мы больше ничего не узнаем. Стоит прекратить экспериментировать с этим витриоловым маслом, иначе [ROOT.GetCharacter.GetFaith.HighGodNameAlternate] может наказать нас за подобное излишество. Возможно, подобной кислоте не место в [middleearth|E]»." #lotr

 fp3_yearly.8024.desc: "Лихорадочная дрожь на мгновение стихает, и [dying_consort.GetFirstName] со слабой улыбкой смотрит на меня. «[ROOT.Char.GetWifeHusband|U] [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )], мне недолго осталось. Даже лучшие врачи согласны с тем, что моя смерть неминуема. Я чувствую это», — похоже, [dying_consort.GetHerHim] требуется прилагать немало усилий, чтобы оставаться в сознании.\n\n«Выслушай, — говорит [dying_consort.GetSheHe] слабеющим голосом, — мое предсмертное желание. Я хочу, чтобы мое тело отдали стервятникам согласно традициям моих предков, чтобы они унесли мою душу на небеса. Прошу, никаких похорон или сожжения. В бреду мне было видение мира по ту сторону... я хочу встретить свой конец по традиции, как [dying_consort.Custom('GetDaughterSon')] [dying_consort.GetFaith.CreatorNamePossessive]»." #lotr

 fp3_yearly.8025.desc: "[Select_CString(dying_consort.IsFemale, 'Покойная', 'Покойный' )] [dying_consort.GetName] со всеми подобающими церемониями [Select_CString(dying_consort.IsFemale, 'погребена', 'погребен' )] в нише древней #italic башни молчания#! и [Select_CString(dying_consort.IsFemale, 'отдана', 'отдан' )] на волю неба и стервятников, кружащих над башней.\n\nПрошло уже три дня с момента [Select_CString(dying_consort.IsFemale, её', 'его' )] смерти, и я до самого рассвета остаюсь у башни молчания. Согласно древним мифам, на четвертое утро после смерти душа вернется к своему духу #italic фраваши#! в высшем мире. Там она отдаст фраваши все знания, обретенные в жизни, чтобы помочь в вечной борьбе со злом. Но я не вижу никакой души, поднимающейся от потрескавшихся стен башни молчания, только темные силуэты стервятников в свете поднимающегося солнца." #lotr

 fp3_yearly.8026.t: "Тайная башня молчания" #lotr
 fp3_yearly.8026.desc: "Вдали от моей резиденции стоит древняя башня молчания, медленно распадающаяся под порывами холодного степного ветра. Здесь, вдали от любопытных глаз, я и [helpful_courtier.GetFirstName] можем перенести тело к месту упокоения внутри потрепанной ниши. Я в молчании смотрю, как стервятники спускаются подобно черному облаку, и на мгновение задаюсь вопросом, кто послал их сюда, боги или [ROOT.Char.GetFaith.DevilName]? Этого я никогда не узнаю.\n\n[helpful_courtier.GetFirstNameNoTooltip] хранит молчание, проникшись траурной атмосферой." #lotr

 fp3_yearly.8032.desc: "Приближается конец древнехайлузского календарного года, время древнего праздника поминовения душ умерших. [Select_CString(death_enthusiast.IsFemale, 'Моя', 'Мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('death_enthusiast'))] [death_enthusiast.GetTitledFirstName] [Select_CString(death_enthusiast.IsFemale, 'стала', 'стал' )] пребывать в почти мрачной молчаливости, оставляя еду у дверей в качестве подношения духам.\n\n«Вам стоит зажечь лампы, — говорит [death_enthusiast.GetSheHe] мне, — чтобы поприветствовать духов, ведь наверняка ваши предки смотрят на нас сквозь тонкие стены этого материального мира. Только подумайте, среди них [ancestor_1.GetName] и другие великие основатели вашего дома»."
 fp3_yearly.8032.a: "К сожалению, я не отмечаю ритуалы предков."

 fp3_yearly.8034.t: "Клад балхот" #lotr
 fp3_yearly.8034.desc: "«Выслушайте меня, [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetTitleTierName], — молит меня [wronged_vassal.GetName]. — Месяц назад я [Select_CString(wronged_vassal.IsFemale, 'осматривала', 'осматривал' )] земли вдоль реки во владении [hephthalite_hoard_province.GetNameNoTier] и [Select_CString(wronged_vassal.IsFemale, 'наткнулась', 'наткнулся' )] на великолепный золотой клад. На монетах были изображены цари с удлиненными черепами. Должно быть, это сокровище было спрятано балхот, возможно, царским кланом, которые правили этими землями в недавнем прошлом. Поскольку я [Select_CString(wronged_vassal.IsFemale, 'первой нашла', 'первым нашел' )] эти сокровища, думаю, я имею полное право забрать их себе. Но мой сюзерен [greedy_vassal.GetTitledFirstName] оспаривает мое право. [greedy_vassal.GetSheHe|U] пытается отнять у меня сокровища, заявляя, что является преемником балхот по праву владения этими землями. Я прошу вас о поддержке»." #lotr


 fp3_yearly.8036.t: "Земля пукколов" #lotr
 fp3_yearly.8036.desc: "Солнце уже село, когда я и [Select_CString(superstitious_councillor.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('superstitious_councillor'))] [superstitious_councillor.GetTitledFirstName] скачем по задворкам владения [spooky_county.GetNameNoTier].\n\nВ слабом свете луны мы натыкаемся на место, о котором мне уже доводилось слышать. Огромный лабиринт из стоящих камней, потрескавшихся и покосившихся, — не то кладбище, не то святыня древнего, давно забытого народа из Темных веков, прежде чем корабли пристали к западным берегам [Concept( 'middleearth', 'Средиземья' )|E]. Но на камнях высечены лица, во всем напоминающие человеческие, но с неуклюжими конечностями, сидящих на корточках с короткими руками, сложенными на толстом животе. Эти покосившиеся идолы холодно смотрят на нас, когда мы проходим мимо, и будто бы даже движутся.\n\n«Не стоит здесь задерживаться», — с дрожью в голосе говорит [superstitious_councillor.GetFirstNameNoTooltip]. Но я невольно задаюсь вопросами, кем были строители этого места? Здесь правда водятся призраки?" #lotr

 fp3_yearly.8040.a: "Я обращусь к мистическим учениям." #lotr

 fp3_yearly.8041.desc: "«Это будет непростой путь», — объявляет [sufi_mystic.GetName], услышав о моих трудностях.\n\n«Традиции мистиков могут помочь вам познать себя и вселенную, но для этого требуется невероятная дисциплина. Я стою лишь в начале этого пути. Тем не менее, [ROOT.Char.GetTitleTierName], мы можем попытаться достичь медитативного состояния, когда вы становитесь лишь каплей воды во сне [ROOT.GetCharacter.GetFaith.HighGodNameAlternatePossessive], ощущая раскинувшийся вокруг вас океан. Думаю, это поможет вам иначе взглянуть на эту мимолетную жизнь»." #lotr

 fp3_yearly.8043.desc: "[persian_polymath.GetFirstName] уже несколько недель задумчиво наблюдает за мной.\n\n«Увы, [ROOT.Char.GetTitleTierName|l], у меня закончились идеи. Я [Select_CString(persian_polymath.IsFemale, 'использовала', 'использовал' )] все свои знания и умения, но, как я уже [Select_CString(persian_polymath.IsFemale, 'говорила', 'говорил' )], болезни разума вылечить очень сложно. Тем не менее я считаю, что мы достигли прогресса. Ваши гуморы пришли в равновесие, ваш дух стал сильнее. Если вы наберетесь терпения и продолжите употреблять разумное количество рыбы и предписанных мной трав, то, если [ROOT.GetCharacter.GetFaith.HighGodNameAlternate] пожелает, вы еще сможете победить #italic наэргон#!».\n\n«Мне же придется вас покинуть, меня ждут новые знания»." #lotr


 fp3_yearly.8051_ending.desc: "Несмотря на это дурное знамение, [magi.GetName] не впадает в отчаяние.\n\n«Мы должны повторно зажечь огонь, — объявляет [magi.GetSheHe]. — Чистейшим и величайшим из огней является „Победоносный огонь“, рожденный от молнии. Но, поскольку это небольшой храм, можно обойтись „Огнем огней“ из печи златокузнеца. Можно обойтись даже более низким уровнем, освященным огнем домашнего очага...»"

 fp3_scholarship.8000.desc: "Мой придворный ученый [court_scholar.GetName] спешно подходит ко мне. За [Select_CString(court_scholar.IsFemale, 'ней', 'ним' )] следуют слуги со стопками книг, свитков и древних пергаментов.\n\n«Кажется, я стою на пороге прорыва! Мне нужно лишь достаточно времени, средства и столько чернил, чтобы ими было впору перекрасить Андуин»."




 fp3_yearly.8038.desc: "Понаблюдав за мной какое-то время, [persian_polymath.GetFirstName] выносит диагноз.\n\n«Все дело в переизбытке черной желчи в мозгу, [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetTitleTierName|l]. Даже древние понимали причину этого состояния, но мыслители [Concept( 'gondor', 'Гондора' )|E] уделили ей особое внимание. Мы назвали это состояние #italic «Наэргон»#!, и оно лишает вас радости и повергает в тоску. Некоторые пациенты теряют аппетит или уподобляются животным, но могут и просто обрести склонность к новаторству и размышлениям, что, пожалуй, уже не так плохо».\n\n«Но мы отклонились от темы... вы готовы попробовать диету из соленой рыбы и стеблей сельдерея? По моему опыту, это может помочь»." #lotr

 fp3_yearly.8045.desc: "Во время ночной прогулки мне встречается [Select_CString(buzina_enthusiast.IsFemale, 'моя', 'мой' )] [ROOT.Char.Custom2('RelationToMe', SCOPE.sC('buzina_enthusiast'))], [buzina_enthusiast.GetName], [Select_CString(buzina_enthusiast.IsFemale, 'баюкающая', 'баюкающий' )] в руках сверток размером с младенца. Но внешний вид обманчив — сверток издает странные звуки, а [buzina_enthusiast.GetNameNoTooltip] носит на лице свежие царапины.\n\n«Это не ребенок, [ROOT.Char.Custom('FormOfAddressForLiege')], это обезьяна, — шепчет [buzina_enthusiast.GetSheHe]. — Во время сбора налогов мне пришлось взять ее в уплату вместо золота. Говорят, она принадлежала великому харадримскому королю, который научил ее играть в шахматы. Увы, обезьяна заболела и стала... агрессивной».\n\n[buzina_enthusiast.GetSheHe|U] вручает мне сверток со словами. «Но наверняка у вас на попечении она быстро поправится»." #lotr