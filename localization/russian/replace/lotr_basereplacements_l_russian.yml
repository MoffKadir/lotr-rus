 # Scythian artifact
 kurgan_ornament_name: "Фигура пантеры балхот"
 kurgan_ornament_description: "Каменная фигура, которую [inspiration_owner.GetTitledFirstName] [Select_CString(inspiration_owner.IsFemale, 'добыла', 'добыл' )] в древнего кургана балхот."
 kurgan_saddle_name: "Седло из кургана"
 kurgan_saddle_description: "Седло, которое [inspiration_owner.GetTitledFirstName] [Select_CString(inspiration_owner.IsFemale, 'добыла', 'добыл' )] в кургане балхот. Ему более тысячи лет, но оно хорошо сохранилось в гробнице без доступа воздуха, в окружении дюжин мумифицированных лошадей. Возможно, так мы сможем понять искусство древних всадников."

 DLC_BUTTON_TOOLTIP: "#T [DlcItem.GetDlc.GetName]#!\n[DlcItem.GetDlc.GetDesc]\n\n#low [SelectLocalization( Or( DlcItem.GetDlc.IsEnabled, EqualTo_string(DlcItem.GetDlc.GetName, Localize('realms_dlc') ) ), 'DLC_ENABLED', 'DLC_NOT_ENABLED' )]#![AddTextIf( Not( EqualTo_string(DlcItem.GetDlc.GetName, Localize('realms_dlc') ) ), '\n#I Щелкните, чтобы посетить магазин#!' )]"

 KUMIS_GLOSS: "Алкогольный напиток из забродившего кобыльего молока, широко распространенный по всей Рунской степи. У истерлингских народов он называется #EMP паракин#!."
 ep3_emperor_yearly.2090.desc: "Я вижу знакомое (в некотором смысле) лицо. Передо мной стоит [mime.GetFirstName] — самый популярный в державе [Glossary( 'скоморох', 'MIMOS_GLOSS' )].\n\n«[Select_CString(ROOT.Char.IsFemale, 'Великая', 'Великий' )] [ROOT.Char.GetTitleAsNameNoTooltip|l], мне нет нужды представляться особо, ибо мое имя известно от рыночных площадей до пиршественных залов. Толпа замирает, когда я выступаю, и неистовствует, стоит мне приказать. Вы знаете, как мастерски я обращаюсь с толпой. Пожалуй, объединив усилия, мы оба можем получить немалую выгоду."
 MIMOS_GLOSS: "Скоморохи - мастера смеха и преданий: это одновременно и шуты, и барды, и сатирики. В больших залах и на деревенских ярмарках они рассказывают веселые и язвительные истории, формируя настроение публики с помощью остроумия и рифм."