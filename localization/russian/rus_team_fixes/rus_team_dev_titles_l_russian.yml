 lotr_balrog_explore_moria_construction_supplies_large: "Прекрасные гномьи строительные материалы"
 lotr_balrog_explore_moria_construction_supplies_large_desc: "Этот персонаж нашёл огромное количество строительных материалов в туннелях [Concept('moria', 'Мории')|E]."

 lotr_balrog_explore_moria_blacksmithing_tools: "Гномьи кузнечные инструменты"
 lotr_balrog_explore_moria_blacksmithing_tools_desc: "Этот персонаж нашёл тайник с кузнечными инструментами в туннелях [Concept('moria', 'Мории')|E]."

 lotr_balrog_explore_moria_blacksmithing_tools_large: "Прекрасные гномьи кузнечные инструменты"
 lotr_balrog_explore_moria_blacksmithing_tools_large_desc: "Этот персонаж нашёл тайник с мастерскими кузнечными инструментами в туннелях [Concept('moria', 'Мории')|E]."



 balrog_struggle.1022.tt: "Вы нашли обычный [Concept('dwarven', 'гномий')|E] [Concept('artifact', 'артефакт')|E]."
 balrog_struggle.1022.tt2: "Можно найти редкий [Concept('dwarven', 'гномий')|E] [Concept('artifact', 'артефакт')|E]."



 struggle_balrog_hide_realm: "Сокрыть державу"
 struggle_balrog_hide_realm_desc: "[Concept('balrog', 'Балрог')|E] уничтожил [Concept('khazaddum', 'Кхазад-дум')|E], и это нас погубит! Наша единственная надежда - полностью изолироваться, спрятаться в тёмных норах, пока опасность не минует."
 struggle_balrog_hide_realm_tooltip: "Успокоить балрога"
 struggle_balrog_hide_realm_confirm: "Закрыть ворота!"
 struggle_balrog_hide_realm.tt: "[Concept('balrog_struggle', 'Морийская борьба')|E] получит [Concept('struggle_catalyst_catalyst', 'катализатор')|E] успокоения, пока у вас есть [Concept('modifier', 'модификатор')|E] «[GetModifier('lotr_balrog_hiding_realm').GetNameWithTooltip]»."

 struggle_balrog_hide_realm_end: "Выйти из укрытия"
 struggle_balrog_hide_realm_end_desc: "Опасность, исходящая от [Concept('balrog', 'балрога')|E], миновала. Мы можем вновь выйти на свет."
 struggle_balrog_hide_realm_end_tooltip: "Выйти из укрытия"
 struggle_balrog_hide_realm_end_confirm: "Открыть ворота!"


 catalyst_delved_too_deep: "[Concept('delving', 'Подземное владение')|E] прокопано слишком глубоко."
 catalyst_delved_too_deep_desc: "Ежегодный сдвиг: [Concept('ruler', 'Правитель')|E] владеет [Concept('delving', 'подземным владением')|E] 4 уровня или выше в [Concept('struggle_region', 'области борьбы')|E]"
 catalyst_controls_too_large_area_moria: "[Concept('struggle_involved', 'Вовлечённый')|E] либо [Concept('struggle_interloper', 'вмешавшийся в борьбу')|E] [Concept('ruler', 'правитель')|E] слишком силён"
 catalyst_controls_too_large_area_moria_desc: "Ежегодный сдвиг: [Concept('struggle_involved', 'Вовлечённый')|E] либо [Concept('struggle_interloper', 'вмешавшийся в борьбу')|E] [Concept('ruler', 'правитель')|E] контролирует 50% [Concept('struggle_region', 'области борьбы')|E]"
 catalyst_hiding_realm: "[Concept('struggle_involved', 'Вовлечённый')|E] либо [Concept('struggle_interloper', 'вмешавшийся в борьбу')|E] [Concept('ruler', 'правитель')|E] находится в укрытии"
 catalyst_hiding_realm_desc: "Ежегодный сдвиг: Сокрытые державы"


 lotr_balrog_hiding_realm: "Сокрытая держава"
 lotr_balrog_hiding_realm_desc: "Этот персонаж предпринял решительные меры, чтобы скрыть свою [Concept('realm', 'державу')|E] от [Concept('balrog', 'балрога')|E]."




 balrog_struggle.1021.t: "Исследование Мории: поиск сокровищ"
 balrog_struggle.1021.desc: "Сделав последний спуск, мы достигли пункта назначения. Я осматриваю местность, оценивая своё окружение.\n\n[ROOT.Char.Custom('jind_RandomRoom_Type')] [ROOT.Char.Custom('jind_RandomRoom_Appearance')]\n\n[ROOT.Char.Custom('jind_RandomRoom_Condition')]\n\nОсторожно пробираясь, я замечаю что-то блестящее в углу."
 balrog_struggle.1021.a: "Сокровища [Concept('dwarves', 'гномов')|E]!"
 balrog_struggle.1021.b: "Обыскать каждый уголок, там должно быть что-то ещё!"
 balrog_struggle.1021.gold: "Вы нашли сокровище."
 balrog_struggle.1021.artifact: "Вы нашли гномий артефакт."
 balrog_struggle.1021.supplies: "Вы нашли полезные припасы."
 balrog_struggle.1021.materials_metal: "Вы нашли ценную металлическую руду."
 balrog_struggle.1021.materials_gems: "Вы нашли ценные самоцветы."

 balrog_struggle.1022.t: "Исследование Мории: в поисках артефактов"
 balrog_struggle.1022.desc: "Сделав последний спуск, мы достигли пункта назначения. Я осматриваю местность, оценивая своё окружение.\n\n[ROOT.Char.Custom('jind_RandomRoom_Type')] [ROOT.Char.Custom('jind_RandomRoom_Appearance')]\n\n[ROOT.Char.Custom('jind_RandomRoom_Condition')]\n\nСреди обломков и пыли я замечаю его - древний [Concept('dwarven', 'гномий')|E] [Concept('artifact', 'артефакт')|E]."
 balrog_struggle.1022.a: "Впечатляет!"
 balrog_struggle.1022.b: "Это? Это ерунда!"

 balrog_struggle.1023.t: "Исследование Мории: мешки с припасами"
 balrog_struggle.1023.desc: "Сделав последний спуск, мы достигли пункта назначения. Я осматриваю местность, оценивая своё окружение.\n\n[ROOT.Char.Custom('jind_RandomRoom_Type')] [ROOT.Char.Custom('jind_RandomRoom_Appearance')]\n\n[ROOT.Char.Custom('jind_RandomRoom_Condition')]\n\nХотя сокровищ здесь немного, нам удалось собрать солидный запас инструментов и других припасов."
 balrog_struggle.1023.a: "Хороший улов!"
 balrog_struggle.1023.b: "Здесь, внизу, должно быть что-то ещё..."

 balrog_struggle.1024.t: "Исследование Мории: Щедрость глубин"
 balrog_struggle.1024.desc: "Сделав последний спуск, мы достигли пункта назначения. Я осматриваю местность, оценивая своё окружение.\n\n[ROOT.Char.Custom('jind_RandomRoom_Type')] [ROOT.Char.Custom('jind_RandomRoom_Appearance')]\n\n[ROOT.Char.Custom('jind_RandomRoom_Condition')]\n\nМоё внимание привлекает небольшой сундучок в углу, к которому прислонена ржавая кирка."
 balrog_struggle.1024.a: "Возможно, там руда?"
 balrog_struggle.1024.b: "Может ли это быть [Concept('metal_mithril', 'митриль')|E]?"
 balrog_struggle.1024.tt: "Вы найдёте обычный [Concept('metal_lists', 'металл')|E] или [Concept('gem_list', 'самоцвет')|E]."
 balrog_struggle.1024.tt2: "Шанс найти редкий [Concept('metal_lists', 'металл')|E] или [Concept('gem_list', 'самоцвет')|E]."

 balrog_struggle.1030.t: "Исследование Мории: Пещеры Тримура Чертополохоборода"
 balrog_struggle.1030.desc: "После последнего спуска мы достигли пункта назначения. У меня отвисает челюсть, когда я осматриваюсь вокруг.\n\nПередо мной открывается огромная естественная пещера, залитая светом из тщательно вырезанных отверстий в потолке. Потоки талой воды стекают с горных вершин, питая настоящий лес, который раскинулся в пещере далеко внизу. Я слышу пение птиц среди переплетённых деревьев.\n\nЭто, должно быть, легендарные пещеры #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofdurin14').GetID] #L Тримура Чертополохоборода#!#!. Тримур, один из первых королей [Concept('khazaddum', 'Кхазад-дума')|E], был близким другом [Concept('elves', 'эльфов')|E] [Concept('eregion', 'Эрегиона')|E] и построил этот великолепный сад в честь их дружбы.\n\nДо сих пор он был забыт."
 balrog_struggle.1030.a: "Это место могло бы прокормить целый город!"

 balrog_struggle.1031.t: "Исследование Мории: Первый чертог"
 balrog_struggle.1031.desc: "Сделав последний спуск, мы достигли нашей цели. Холодок пробегает по моему телу, когда я смотрю на чертог передо мной.\n\nСолнечный свет льётся из отверстий в потолке, освещая множество древних святилищ, посвящённых [Concept('mahalcharacter', 'Махалу')|E] и [Concept('durindeathless', 'Дурину «Бессмертному»')|E]. Каменная кладка здесь очень древняя, но выполнена мастерски. Фрески на стенах и потолке рассказывают историю #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofdurinI').GetID] #L Дурина «Бессмертного»#!#!.\n\nЭто, должно быть, легендарный Первый чертог, где впервые поселился Дурин. Все подземелья, камеры и впадины [Concept('moria', 'Мории')|E], которые существуют сегодня, были начаты из этого места."
 balrog_struggle.1031.a: "Это священное место."
 balrog_struggle.1031.b: "Мы превратим его в святилище безрассудства!"

 balrog_struggle.1032.t: "Исследование Мории: Королевский чертог"
 balrog_struggle.1032.desc: "PLACEHOLDER"
 balrog_struggle.1032.a: "PLACEHOLDER Wow!"

 balrog_struggle.1033.t: "Исследование Мории: Большая западная пещера"
 balrog_struggle.1033.desc: "После последнего спуска мы достигли нашей цели. Я с удивлением смотрю на открывшуюся передо мной картину.\n\nЯ стою на узком выступе перед огромной пещерой, больше которой я ещё не [Select_CString(ROOT.Char.IsFemale, 'видела', 'видел' )]. Глубоко в землю уходят каньоны, а высоко над ней возвышаются горы. [Concept('metal_mithril', 'Митриль')|E] сверкает, как звезды, в крошечных прожилках по всему сводчатому потолку пещеры.\n\nЭто, должно быть, и есть легендарная Великая западная пещера. В центре впадины возвышаются Колонны Фаина, высокие сталагмиты, которые достигают самого потолка. Между ними расположены два огромных подъёмника, построенных [Concept('dwarves', 'гномами')|E] и приводимых в движение цепями и шестернями. В древности их называли Нан и Гилим, и они перевозили рабочих в шахты, расположенные далеко внизу, и обратно.\n\nИх механизмы бездействовали много лет."
 balrog_struggle.1033.a: "Это место огромно!"

 balrog_struggle.1034.t: "Исследование Мории: Своды Уруктарбуна"
 balrog_struggle.1034.desc: "PLACEHOLDER"
 balrog_struggle.1034.a: "PLACEHOLDER Wow!"

 balrog_struggle.1035.t: "Исследование Мории: Затерянная цитадель кузнецов колец"
 balrog_struggle.1035.desc: "PLACEHOLDER"
 balrog_struggle.1035.a: "PLACEHOLDER Wow!"

 balrog_struggle.1036.t: "Исследование Мории: Оружейные третьего яруса"
 balrog_struggle.1036.desc: "Сделав последний спуск, мы достигли места назначения. Я с удивлением смотрю на открывшееся передо мной зрелище.\n\nМы стоим на пороге длинного зала, вдоль стен которого возвышаются статуи [Concept('dwarven', 'гномьих')|E] героев. Со всех сторон расположены многочисленные кладовые, до краев заполненные оружием и доспехами, чудом не тронутыми со времён [Concept('khazaddum', 'Кхазад-дума')|E].\n\nЭто, должно быть, легендарные оружейные склады третьего уровня, сердце гномьего арсенала. Здесь хранились оружие и доспехи, чтобы снарядить огромную армию гномов. Они припасли кольчуги и шлемы, а также бесчисленные топоры, мечи и копья."
 balrog_struggle.1036.a: "Достаточно, чтобы снарядить великую армию, а?"



 lotr_balrog_explore_moria_unique_location_thistlebeard: "Пещеры Тримура Чертополохоборода"
 lotr_balrog_explore_moria_unique_location_thistlebeard_desc: "Над этой провинцией возвышаются легендарные подземные сады Тримура Чертополохоборода, её пещеры утопают в яркой зелени."

 lotr_balrog_explore_moria_unique_location_armouries: "Оружейная третьего уровня"
 lotr_balrog_explore_moria_unique_location_armouries_desc: "В этой провинции находится легендарный арсенал гномов [Concept('khazaddum', 'Кхазад-дума')|E]. Здесь в огромных количествах хранились оружие и доспехи."

 lotr_balrog_explore_moria_unique_location_first_hall: "Первый чертог"
 lotr_balrog_explore_moria_unique_location_first_hall_desc: "В этой провинции находится Первый чертог, древнее семя [Concept('khazaddum', 'Кхазад-дума')|E], прокопанное самим [Concept('durindeathless', 'Дурином «Бессмертным»')|E]."

 lotr_balrog_explore_moria_unique_location_west_cave: "Великая западная пещера"
 lotr_balrog_explore_moria_unique_location_west_cave_desc: "В этой провинции находится Великая западная пещера, огромная природная впадина с обширными [Concept('metal_mithril', 'митрилевыми')|E] жилами."



 #Custom Loc - Random Room Descriptions 
 # Chamber Type: Use [ROOT.Char.Custom('jind_RandomRoom_Type')]
 jind_RandomRoom_Type_Mine: "Чертог, по-видимому, является частью более крупной шахтёрской сети, с множеством боковых проходов, уходящих глубоко в землю."
 jind_RandomRoom_Type_Utility: "Расположенный в стороне от основных проходов, чертог, по-видимому, представляет собой какой-то служебный проход, тесный и скрытый."
 jind_RandomRoom_Type_Storeroom: "Чертог обширен, и в нём слышится эхо. Пустые корпуса огромных ящиков, бочек и сундуков указывают на то, что это одно из многих огромных хранилищ и складов древнего [Concept('khazaddum', 'Кхазад-дума')|E]."
 jind_RandomRoom_Type_SmallDwelling: "Чертог, по-видимому, был жилым по своей природе. Небольшой по размеру, он, вероятно, был домом для одного [Concept('dwarf', 'гнома')|E]."
 jind_RandomRoom_Type_Stairs: "Чертог представляет собой всего лишь одну площадку огромной лестницы, уходящей глубоко под землю."
 jind_RandomRoom_Type_Watercourse: "Чертог представляет собой обширный резервуар. Высоко вверху проходят акведуки, по которым вода поступает в широкий пруд, раскинувшийся вокруг меня."
 jind_RandomRoom_Type_Garrison: "Огромные ворота, укреплённые тяжёлой железной опускной решёткой, указывают на то, что в этом чертоге находился старый [Concept('dwarven', 'гномий')|E] гарнизон."
 jind_RandomRoom_Type_Forge: "В чертоге находятся остатки старой [Concept('dwarven', 'гномьей')|E] кузни."
 jind_RandomRoom_Type_Workshop: "Перед вами расставлены столы, заваленные инструментами и незаконченными изделиями. Чертог, похоже, когда-то был чем-то вроде мастерской."
 jind_RandomRoom_Type_LargeDwelling: "Чертог, по-видимому, является жилым по своей природе. С десятками соединённых комнат, вероятно, когда-то здесь проживал целый [Concept('dwarven', 'гномий')|E] [Concept('house', 'клан')|E]."
 jind_RandomRoom_Type_CivicBuilding: "Чертог с высокими сводчатыми потолками, по-видимому, когда-то был важным гражданским зданием - возможно, архивом или галереей."
 jind_RandomRoom_Type_GreatHall: "Этот чертог, несомненно, является одним из величайших залов собраний [Concept('durinsfolk', 'Народа Дурина')|E]. Далеко во мраке я всё ещё могу разглядеть остатки рыночных прилавков и пиршественных столов."

 # Chamber Appearance: Use [ROOT.Char.Custom('jind_RandomRoom_Appearance')]

 jind_RandomRoom_Appearance_Shunned: "Очевидно, что [Concept('dwarves', 'гномы')|E] избегали этого места. Двери были запечатаны, заложены кирпичом, и на каждой поверхности виднеются предупреждающие руны."
 jind_RandomRoom_Appearance_Unfinished: "Строительные леса цепляются за стены, а на земле валяются выброшенные инструменты. Кажется, что это место строилось, когда его забросили."
 jind_RandomRoom_Appearance_Austere: "Однако вас встречают только голые каменные стены. Кажется, что это место мало чем украшено."
 jind_RandomRoom_Appearance_Ancient: "Камень здесь древний, простой по дизайну, но изысканно выполненный. Вполне вероятно, что это место было одним из первых, когда-либо прорытых, возможно, даже самим [Concept('durin', 'Дурином')|E]."
 jind_RandomRoom_Appearance_Simple: "Ничем не примечательное по своему убранству, это место явно всегда было строго функциональным. Здесь не жили великие владыки, и здесь не совершались великие деяния."
 jind_RandomRoom_Appearance_Heroic: "Статуи и замысловатая резьба украшают каждую стену, изображая почитаемых предков и героев [Concept('durinsfolk', 'Народа Дурина')|E]."
 jind_RandomRoom_Appearance_Homely: "Даже в своей заброшенности это место кажется уютным. Оно было построено для комфорта, а не для великолепия."
 jind_RandomRoom_Appearance_RichlyDecorated: "Эффектно украшенное, это место, несомненно, когда-то было престижным и величественным. Каждая поверхность была украшена в той или иной манере: резные статуи, позолоченные вставки, гобелены с замысловатой тканью."
 jind_RandomRoom_Appearance_Elven: "Архитектура этого места сразу же узнаваема как [Concept('elven', 'эльфийская')|E] по своему дизайну, что является давним напоминанием о дружбе между [Concept('eregion', 'Эрегионом')|E] и [Concept('khazaddum', 'Кхазад-думом')|E]."
 jind_RandomRoom_Appearance_Fortified: "Очевидно, что это место было спроектировано так, чтобы его можно было защитить. В каждой стене спрятаны ловушки и лазейки для убийств, которые давно сломались."
 jind_RandomRoom_Appearance_Natural: "Интересно, что это место, по-видимому, представляет собой в основном естественную пещеру, лишь слегка приспособленную [Concept('dwarves', 'гномами')|E]."
 jind_RandomRoom_Appearance_Enchanted: "Очевидно, что когда-то это было место великой мощи и магии. Руны силы украшают каждую поверхность, хотя их заклинания давно разрушены."

 # Chamber Condition: Use [ROOT.Char.Custom('jind_RandomRoom_Condition')]
 jind_RandomRoom_Condition_CampOrcs: "Однако ныне этот чертог превратился в логово [Concept('orcs', 'орков')|E]. Хотя их давно нет, их ветхие жилища и выброшенные кости загромождают пространство."
 jind_RandomRoom_Condition_Blocked: "Однако ныне чертог частично обрушился. Упавшие камни перекрыли доступ к большей его части."
 jind_RandomRoom_Condition_SuspiciouslyIntact: "Тревожит то, что чертог подозрительно цел. По какой-то причине здесь не ступала нога ни одного живого существа."
 jind_RandomRoom_Condition_Flooded: "Однако ныне чертог полностью затоплен."
 jind_RandomRoom_Condition_UtterlyRuined: "Однако ныне чертог полностью разрушен. Из-за обрушившегося потолка и пола, а также из-за того, что проходы почти до потолка завалены обломками, ориентироваться в нём трудно."
 jind_RandomRoom_Condition_GoblinGnawed: "Однако ныне чертог изуродован туннелями [Concept('goblin', 'гоблинов')|E], которые прорыты в стенах и потолке, как насекомые."
 jind_RandomRoom_Condition_EarthquakeShattered: "Однако ныне чертог расколот. Через центр проходит огромная пропасть, ведущая глубоко под землю."
 jind_RandomRoom_Condition_Burnt: "Однако ныне чертог покрыт чёрными шрамами от огня. Все поверхности покрыты тонким слоем сажи."
 jind_RandomRoom_Condition_Despoiled: "Чертог в основном сохранился, но в нём явно побывали [Concept('orcs', 'орки')|E]. Всё, что напоминало о [Concept('dwarven', 'гномах')|E], было намеренно сломано, переделано в насмешку и снабжено ловушками."
 jind_RandomRoom_Condition_PassageOfTime: "Чертог в основном сохранился, но он, как и многое другое, подвергся медленному разрушительному действию времени."
 jind_RandomRoom_Condition_Intact: "Несмотря на холод и мрак, чертог на удивление нетронут. На мгновение я могу представить, как он выглядела когда-то, давным-давно."
 jind_RandomRoom_Condition_CampAdventurer: "Кто-то поселился здесь совсем недавно: заброшенный лагерь, построенный не [Concept('orc', 'орками')|E]."





