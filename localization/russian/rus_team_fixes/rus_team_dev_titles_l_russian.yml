 activity_balan_lai_province_desc:1 "#V Вы отправитесь на заседание совета во владении [ROOT.Province.GetName].#!\n\n"
 activity_balan_lai_province_desc_here:1 "#V Вы приступаете к приготовлениям во владении [ROOT.Province.GetName].#!\n\n"
 activity_balan_lai_province_desc_mispir:0 "#V Возможные награды#! при #V проведении заседания#! в #highlight древней резиденции Балан-Лай#! \n$BULLET_WITH_TAB$ Прогресс к фазе борьбы #V Статус-кво#!\n$BULLET_WITH_TAB$ @gold_icon! #P Сниженная стоимость проведения занятия#!\n$BULLET_WITH_TAB$ @legitimacy_icon! #P Прирост легитимности#!"
 activity_balan_lai_province_desc_capital:0 "#V Возможные награды#! при #V проведении заседания#! в #highlight вашей столице:#!\n$BULLET_WITH_TAB$ Прогресс к фазе борьбы #V Разобщённость#!\n$BULLET_WITH_TAB$ @opinion_icon! #P Улучшение мнения#!\n$BULLET_WITH_TAB$ @prestige_icon! #P Прирост престижа#!"
 activity_balan_lai_province_desc_other_capital:0 "#V Возможные награды#! при #V проведении заседания#! в #highlight чужеземной столице:#!\n$BULLET_WITH_TAB$ Прогресс к фазе борьбы #V Единство#!\n$BULLET_WITH_TAB$ @weak_hook_icon! #P Слабое влияние на владельца локации#!\n$BULLET_WITH_TAB$ @gold_icon! #N Повышенная стоимость проведения занятия#!\n#V [ROOT.Province.GetTitle.GetHolder.GetName] получит:#!\n$BULLET_WITH_TAB$ @opinion_icon! #P Прирост мнения#!\n$BULLET_WITH_TAB$ @prestige_icon! #P Прирост престижа#!"

 # Group Rules
 activity_balan_lai_guest_help_text:0 "Присутствующие члены совета [balan_lai|E] будут выстраивать дипломатию и плести интриги на заседании в соответствии с выбранными ими [Concept('intent', 'намерениями')|E].\n\nУ других [Concept('activity_guests', 'гостей')|E] будет возможность побеседовать и, возможно, оказать воздействие на членов совета."
