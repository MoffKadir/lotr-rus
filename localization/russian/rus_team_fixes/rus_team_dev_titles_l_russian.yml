 trait_kin_strife_purist_character_desc: "[ROOT.GetCharacter.GetFirstNameNoTooltip] считает, что только те, кто имеет чистокровное нуменорское происхождение, должны править Гондором как короли, возвышаясь над всеми другими королями людей."
