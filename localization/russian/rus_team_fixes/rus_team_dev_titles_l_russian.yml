 # Phases
 mingling_phase:0 "Фаза общения"
 mingling_phase_desc:0 "Период, когда члены совета общаются, ведут неофициальные переговоры и наслаждаются развлечениями, устроенных хозяином перед началом основных заседаний."
 voting_phase:0 "Фаза собрания"
 voting_phase_desc:0 "Структурированная процедура, направленная на тщательный обмен идеями, аргументами и стратегиями, что приводит к решающим голосованиям, которые определяют будущее держав."

