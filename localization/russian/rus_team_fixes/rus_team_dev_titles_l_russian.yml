 great_project_type_angmar_wars_militarise_duchy_desc: "У [Concept('angmar', 'Ангмара')|E] нет иной цели, кроме войны, и те, кто не участвует в конфликте, не имеют права оставаться нашими подданными. Все должны быть направлены на подготовку к предстоящим сражениям, #high чего#! бы это ни стоило."
