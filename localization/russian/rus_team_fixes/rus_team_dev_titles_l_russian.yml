 # Arnor 
 decision_destroy_angmar: "Уничтожить Ангмар"
 decision_destroy_angmar_desc: "Слишком долго тень Ангмара нависала над этими землями, и [Concept('dunedain', 'дунэдайн')|E] скорчились от страха. Тем не менее, пришло время нанести ответный удар и положить конец этой борьбе, изгнав мерзкого [Concept('witchking', 'Чародея')|E] из [Concept('eriador', 'Эриадора')|E] раз и навсегда!"
 decision_destroy_angmar_confirm: "Очистим эти земли!"
 decision_destroy_angmar_tooltip: "Начать войну, чтобы раз и навсегда уничтожить $k_angmar$"
 angmar_holds_no_land_in_dejure_arnor: "[GetTitleByKey('k_angmar').GetHolder.GetName] #N не#! владеет землями в [Concept('de_jure', 'де-юре')|E] границах #ONCLICK:TITLE,e_arnor #TOOLTIP:LANDED_TITLE,e_arnor #L Арнора#!#!#!"



 decision_craft_barrow_blades: "Выковать кинжал Вестернессе"
 decision_craft_barrow_blades_tooltip: "Создать зачарованный кинжал"
 decision_craft_barrow_blades_desc: "Хотя [Concept('westernesse', 'Вестернессе')|E] давным-давно ушла под воду, память о ней всё ещё жива. Здесь, в [Concept('arnor', 'Арноре')|E], сохранилась некоторая доля её мастерства, и здесь живут могучие кузнецы, обученные древним знаниям. Перед лицом такого ужасного врага, как Повелитель [Concept('angmar', 'Ангмара')|E], не хватит ничего, кроме тончайшего из наших клинков, сотканного из заклинаний для уничтожения его [Concept('nazgul', 'неживых')|E] слуг. Возможно, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы поручить одному из своих придворных изготовить такой кинжал или даже [Select_CString(ROOT.Char.IsFemale, 'сама', 'сам' )] взяться за молот."
 decision_craft_barrow_blades_confirm: "Мудрость [Concept('numenor', 'Нуменора')|E] ещё не утрачена полностью."

 decision_sponsor_ranger_company: "Проспонсировать отряд следопытов"
 decision_sponsor_ranger_company_tooltip: "Создать авантюриста-следопыта"
 decision_sponsor_ranger_company_desc: "В эти мрачные дни всё ещё есть те, кто хочет выйти за пределы наших высоких стен и нанести удар в сердце нашего врага. Если бы я [Select_CString(ROOT.Char.IsFemale, 'дала', 'дал' )] этим храбрым людям средства и официальное поручение, они могли бы пойти на великие жертвы ради защиты державы [ROOT.Char.GetPrimaryTitle.GetNameNoTier]."
 decision_sponsor_ranger_company_confirm: "Вперёд и защитите [Concept('arnor', 'Арнор')|E]!"
 decision_sponsor_ranger_company_tt: "Вы создадите и проспонсируете #TOOLTIP:GOVERNMENT_TYPE,landless_adventurer_government #L авантюриста#!#! с [Concept('camp_purpose', 'архетипом лагеря')|E] «[GetLaw('camp_purpose_rangers').GetName]». Вам будет представлен список кандидатов на должность капитана нового [Concept('camp', 'лагеря')|E]."

 decision_consolidate_the_realm: "Консолидировать державу"
 decision_consolidate_the_realm_tooltip: "Отозвать ваш народ из приграничья"
 decision_consolidate_the_realm_desc: "По мере того, как [Concept('angmar_wars', 'Ангмарские войны')|E] затягиваются, я нахожу, что держава [ROOT.Char.GetPrimaryTitle.GetNameNoTier] становится всё более и более неспособной защищать свои обширные границы. Если этот устойчивый спад продолжится, мы рискуем, что эти земли подвергнутся [Concept('devastation', 'опустошению')|E], а их жители погибнут.\n\nДержава не может позволить себе такое расточительство, и поэтому, возможно, будет разумно объединить мой народ внутри страны, оставив те земли, которые невозможно защитить, и переселив их жителей поближе к нашей столице. Однако не все поймут необходимость такого шага, и некоторые несогласные могут доставить неприятности."
 decision_consolidate_the_realm_confirm: "Нами должно руководить благоразумие."
 decision_consolidate_the_realm_tt: "Все [Concept('counties', 'графства')|E] в провинции [GetPlayer.MakeScope.Var('selected_duchy').Title.GetNameNoTier] будут [Concept('devastated', 'опустошены')|E] и вернутся в состояние [Concept('wilderness', 'дебрей')|E], а [GetPlayer.MakeScope.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetDeJureLiege.GetBaseNameNoTier] получит [Concept('development', 'развитие')|E] в размере развития потерянного региона. #V (Текущее значение - @development_icon![GetPlayer.MakeScope.Var('selected_duchy').Title.MakeScope.Var('decision_consolidate_the_realm_total_development_variable').GetValue])#!"
 decision_consolidate_the_realm_tt_safe: "Все [Concept('counties', 'графства')|E] в #high выбранном герцогстве#! будут [Concept('devastated', 'опустошены')|E] и вернутся в состояние [Concept('wilderness', 'дебрей')|E], и [GetPlayer.MakeScope.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetDeJureLiege.GetBaseNameNoTier] получит [Concept('development', 'развитие')|E] в размере развития потерянного региона."
 decision_consolidate_the_realm_tt_2: "Это, скорее всего, #N разозлит#! местных властителей, и они могут #N плохо#! отреагировать."
 pick_duchy: "Вы должны выбрать герцогство"

 # Angmar
 decision_destroy_arnor: "Уничтожить Арнор"
 decision_destroy_arnor_desc: "Проклятые [Concept('dunedain', 'дунэдайн')|E] [Concept('arnor', 'Арнора')|E] слишком долго избегали уничтожения, но в конце концов они в пределах нашей досягаемости. Их держава разгромлена, их народ опустошён, и теперь сердце их земель открыто для моих армий. Наконец-то они будут стёрты с лица [Concept('middleearth', 'Средиземья')|E]!"
 decision_destroy_arnor_confirm: "Мы выступаем на [GetTitleByKey('k_arthedain').GetHolder.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTierNoTooltip]!"
 decision_destroy_arnor_tooltip: "Начать войну, чтобы раз и навсегда уничтожить [Concept('dunedain', 'дунэдайн')|E]"
 arnor_holds_no_land_in_dejure_forodwaith: "[GetTitleByKey('k_arthedain').GetHolder.GetName] #N не#! владеет землями в [Concept('de_jure', 'де-юре')|E] границах #ONCLICK:TITLE,e_forodwaith #TOOLTIP:LANDED_TITLE,e_forodwaith #L Фородвайта#!#!#!"

 decision_assimilation_policy: "Принудительная ассимиляция"
 decision_assimilation_policy_desc: "[Concept('angmar', 'Ангмар')|E] - неестественная держава, моей тёмной волей объединённая из множества разрозненных племён, и с каждым завоеванием мои подданные становятся всё более разобщёнными. Чтобы обеспечить стабильность и абсолютную лояльность Ангмара, мы должны обеспечить культурную и религиозную однородность любыми доступными средствами."
 decision_assimilation_policy_confirm: "Они объединятся под #bold моей#! властью!"
 decision_assimilation_policy_tooltip: "Начать политику принудительной ассимиляции в вашей державе"
 decision_assimilation_policy_tt: "Вы откроете [Concept('decisions', 'решения')|E], позволяющие выбрать предпочитаемую [Concept('culture', 'культуру')|E] и [Concept('faith', 'конфессию')|E] из числа присутствующих в вашей державе."
 decision_assimilation_policy_tt_22: "Вы откроете [Concept('great_project', 'грандиозный проект')|E] #V $great_project_type_angmar_wars_assimilate_duchy_name$#!, позволяющий обратить [Concept('duchies', 'герцогства')|E] вашей державы в вашу предпочтительную культуру и конфессию, и преобразовать [Concept('tribal', 'племенные')|E] [Concept('counties', 'графства')|E] в [Concept('feudal', 'феодальные')|E]"

 decision_select_prefered_culture: "Выбрать предпочтительную культуру"
 decision_select_prefered_culture_desc: "Хотя в державе [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] много культур, одна из них должна возвыситься. Кого бы я ни [Select_CString(ROOT.Char.IsFemale, 'выбрала', 'выбрал' )], они должны быть достаточно сильны, чтобы противостоять [Concept('arnorians', 'арнорцам')|E], и достаточно преданы, чтобы служить мне."
 decision_select_prefered_culture_confirm: "Я выкую из них свой клинок!"
 decision_select_prefered_culture_tooltip: "Выбрать одну из культур вашей державы в качестве предпочтительной"
 decision_select_prefered_culture_tt: "Начав [Concept('great_project', 'грандиозный проект')|E] #V $great_project_type_angmar_wars_assimilate_duchy_name$#!, вы обратите [Concept('counties', 'графства')|E] в вашей державе в #L [GetPlayer.MakeScope.Var('selected_culture').Culture.GetCollectiveNoun|l]ую#! культуру."
 decision_select_prefered_culture_tt_2: "Все ваши вассалы с #L [GetPlayer.MakeScope.Var('selected_culture').Culture.GetCollectiveNoun|l]ой#! [Concept('culture', 'культурой')|E] получат о вас #P 10#! [Concept('opinion', 'мнения')|E]."
 decision_select_prefered_culture_tt_3: "Все ваши вассалы, #V не#! принадлежащие к #L [GetPlayer.MakeScope.Var('selected_culture').Culture.GetCollectiveNoun|l]ой#! [Concept('culture', 'культуре')|E] потеряют о вас #N 20#! [Concept('opinion', 'мнения')|E]."

 decision_select_prefered_faith: "Выбрать предпочтительную культуру"
 decision_select_prefered_faith_desc: "Хотя в прошлом с холмов державы [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] возносились молитвы многим богам и духам, пришло время объединить моё королевство в почитании тьмы. Хотя есть много религий, которые могут быть использованы в моих целях, выбор одного ортодоксального обряда значительно укрепит мой контроль и верность моих подданных."
 decision_select_prefered_faith_confirm: "Я заключу их во тьме!"
 decision_select_prefered_faith_tooltip: "Выбрать одну из конфессий вашей державы в качестве предпочтительной"
 decision_select_prefered_faith_tt: "Начав [Concept('great_project', 'грандиозный проект')|E] #V $great_project_type_angmar_wars_assimilate_duchy_name$#!, вы обратите [Concept('counties', 'графства')|E] в вашей державе в #L [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName|l]ую#! конфессию."
 decision_select_prefered_faith_tt_2: "Все ваши вассалы с #L [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName|l]ой#! [Concept('faith', 'конфессией')|E] получат о вас #P 10#! [Concept('opinion', 'мнения')|E]."
 decision_select_prefered_faith_tt_3: "Все ваши вассалы, #V не#! исповедующие #L [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName|l]ую#! [Concept('faith', 'конфессию')|E], потеряют о вас #N 20#! [Concept('opinion', 'мнения')|E]."

 decision_craft_morgul_blades: "Выковать моргульский клинок"
 decision_craft_morgul_blades_desc: "$PLACEHOLDER$"
 decision_craft_morgul_blades_tooltip: "Создать зачарованный кинжал"
 decision_craft_morgul_blades_confirm: "Во тьме их сковать."



 decision_subjugate_high_pass: "Покорить [GetTitleByKey('k_high_pass').GetBaseNameNoTierNoTooltip]"
 decision_subjugate_high_pass_desc: "[Concept('orcs', 'Орки')|E] центральных [Concept('mistymountains', 'Мглистых гор')|E] долгое время были непокорными и абсолютно независимыми. Однако, учитывая мои недавние завоевания, несомненно, пришло время приструнить их. Если я полностью подчиню себе горы вокруг #ONCLICK:TITLE,k_high_pass #TOOLTIP:LANDED_TITLE,k_high_pass #L Высокого перевала#!#!#!, я буду контролировать восточные подступы к [Concept('eriador', 'Эриадору')|E] и смогу более эффективно наступать на [Concept('rivendell', 'Ривенделл')|E] и [Concept('rhudaur', 'Рудаур')|E]."
 decision_subjugate_high_pass_tooltip: "Усмирить орков #ONCLICK:TITLE,k_high_pass #TOOLTIP:LANDED_TITLE,k_high_pass #L Высокого перевала#!#!#!"
 decision_subjugate_high_pass_confirm: "Перевалы будут трепетать при одном упоминании моего имени!"
 decision_subjugate_high_pass_tt: "[GetTitleByKey('k_high_pass').GetName] покорено"
 no_independent_rulers_in_high_pass: "В регионе [GetTitleByKey('k_high_pass').GetName] нет [Concept('independent', 'независимых')|E] [Concept('rulers', 'правителей')|E]"
 decision_subjugate_high_pass_effect_tt_safe: "Если ваша #high предпочтительная культура#! является [Concept('orcish', 'орочьей')|E], все [Concept('counties', 'графства')|E] в регионе [GetTitleByKey('k_high_pass').GetName] в пределах вашей [Concept('realm', 'державы')|E] примут вашу #high предпочтительную культуру#! и #high предпочтительную конфессию#!."
 decision_subjugate_high_pass_effect_tt: "Если ваша #high предпочтительная культура#! является [Concept('orcish', 'орочьей')|E], все [Concept('counties', 'графства')|E] в регионе [GetTitleByKey('k_high_pass').GetName] в пределах вашей [Concept('realm', 'державы')|E] примут вашу #high предпочтительную культуру#! ([GetGlobalVariable('angmar_prefered_culture').Culture.GetName]) и #high предпочтительную конфессию#! ([GetGlobalVariable('angmar_prefered_faith').Faith.GetAdjective])."

 # Elves
 decision_form_coalition_against_angmar: "Создать коалицию против Ангмара"
 decision_form_coalition_against_angmar_desc: "Хотя [Concept('elves', 'эльфы')|E] традиционно держались в стороне от дел [Concept('men', 'людей')|E], тяжёлая [Concept('situation', 'ситуация')|E] в [Concept('arnor', 'Арноре')|E] стала слишком серьёзной, чтобы её игнорировать. Эта тёмная сила в [Concept('angmar', 'Ангмаре')|E] угрожает не только уничтожить [Concept('dunedain', 'дунэдайн')|E], но и обрушиться на наши собственные [Concept('elven_refuge', 'приюты')|E]. Мы должны действовать немедленно, чтобы объединить Свободные народы против такого опасного врага."
 decision_form_coalition_against_angmar_tooltip: "Помочь дунэдайн в борьбе с Ангмаром"
 decision_form_coalition_against_angmar_confirm: "Мы выступаем на север!"
 decision_form_coalition_against_angmar_tt: "Вы заключите [Concept('defensive_alliance', 'оборонительный союз')|E] с персонажем [arnorian_ruler.GetName]"
 decision_form_coalition_against_angmar_tt_2: "Вам станет доступно [Concept('interaction', 'взаимодействие')|E], позволяющее пригласить других [Concept('elven_rulers', 'эльфийских правителей')|E] в [Concept('defensive_alliance', 'оборонительный союз')|E]"
 ANTI_ANGMAR_COALITION: "Северная коалиция"
 coalition_disolution_warning: "#high $ANTI_ANGMAR_COALITION$#! будет #N распущена#!, если вернётся [Concept('situation_phase', 'фаза')|E] «[GetSituationType('angmar_wars_situation').GetPhaseType('angmar_wars_arnor_ascendant').GetName]» или завершится фаза «[GetSituationType('angmar_wars_situation').GetPhaseType('angmar_wars_angmar_ascendant').GetName]»."

 ### Great Projects ###

 # Assimilate Duchy
 angmar_wars_assimilate_duchy_name: "Ассимилировать герцогство"
 great_project_type_angmar_wars_assimilate_duchy: "$angmar_wars_assimilate_duchy_name$"
 great_project_type_angmar_wars_assimilate_duchy_name: "$angmar_wars_assimilate_duchy_name$"
 great_project_type_angmar_wars_assimilate_duchy_fallback: "$PLACEHOLDER$"
 great_project_type_angmar_wars_assimilate_duchy_desc: "[Concept('angmar', 'Ангмар')|E] существует только с одной целью - полностью уничтожить [Concept('dunedain', 'дунэдайн')|E] [Concept('arnor', 'Арнора')|E]. В этой цели нет места несогласию или разобщённости, и все, кто не желает служить [Concept('witchking', 'Королю-чародею')|E], могут служить после смерти, в назидание своим подражателям."
 great_project_type_angmar_wars_assimilate_duchy_contribution_enforcement_patrols: "Патрули надзирателей"
 great_project_type_angmar_wars_assimilate_duchy_contribution_enforcement_patrols_desc: "Отряды верных солдат будут бродить по округе, следя за тем, чтобы все соблюдали их новые обряды."
 great_project_type_angmar_wars_assimilate_duchy_contribution_send_inhabitants: "Расселить поселенцев"
 great_project_type_angmar_wars_assimilate_duchy_contribution_send_inhabitants_desc: "Особые #L [GetGlobalVariable('angmar_prefered_culture').Culture.GetCollectiveNoun|l]ие#! поселения значительно ускорят процесс ассимиляции."
 great_project_type_angmar_wars_assimilate_duchy_contribution_send_inhabitants_2: "Расселить поселенцев"
 great_project_type_angmar_wars_assimilate_duchy_contribution_send_inhabitants_2_desc: "Особые #L [GetGlobalVariable('angmar_prefered_culture').Culture.GetCollectiveNoun|l]ие#! поселения значительно ускорят процесс ассимиляции."
 great_project_type_angmar_wars_assimilate_duchy_contribution_investigate_improper_rites: "Расследовать неподобающие обряды"
 great_project_type_angmar_wars_assimilate_duchy_contribution_investigate_improper_rites_desc: "Духовенство из владения [ROOT.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier] наставит население в правильном почитании [GetPlayer.MakeScope.Var('selected_faith').Faith.HighGodNamePossessive] и накажет тех, кто упорствует в своих еретических обрядах."
 great_project_type_angmar_wars_assimilate_duchy_contribution_promote_faithful_relocation: "Расселить верующих"
 great_project_type_angmar_wars_assimilate_duchy_contribution_promote_faithful_relocation_desc: "Если некоторые [GetGlobalVariable('angmar_prefered_faith').Faith.GetAdherentNamePlural|l] согласятся переселиться, тогда они смогут оказать сильное влияние на местное население."
 angmar_wars_assimilate_duchy_effect_tt: "[Concept('counties', 'Графства')|E] в пределах выбранного [Concept('duchy', 'герцогства')|E]:\n$EFFECT_LIST_BULLET$Не-#L [GetGlobalVariable('angmar_prefered_culture').Culture.GetCollectiveNoun|l]ие#! [Concept('cultures', 'культуры')|E] будут #P преобразованы#! в #L [GetGlobalVariable('angmar_prefered_culture').Culture.GetCollectiveNoun|l]ую#!\n$EFFECT_LIST_BULLET$Не-#L [GetGlobalVariable('angmar_prefered_faith').Faith.GetName|l]ие#! [Concept('faiths', 'конфессии')|E] будут #P преобразованы#! в [GetGlobalVariable('angmar_prefered_faith').Faith.GetAdjective|l]\n$EFFECT_LIST_BULLET$[Concept('tribal', 'Племенные')|E] [Concept('counties', 'графства')|E] будут #P преобразованы#! в [Concept('castle_holdings', 'замковые владения')|E] и [Concept('feudal', 'феодальную')|E] [Concept('government', 'форму правления')|E]\n$EFFECT_LIST_BULLET$Все #P преобразованные#! [Concept('counties', 'графства')|E] потеряют @control_icon!#N -50#! [Concept('control', 'контроля')|E] и получат [Concept('modifier', 'модификатор')|E] «[GetModifier('angmar_wars_forced_assimilation').GetNameWithTooltip]»"

