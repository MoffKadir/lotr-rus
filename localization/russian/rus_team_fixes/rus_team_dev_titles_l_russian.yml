 arnor.3001.t: "[new_prince.GetPrimaryTitle.GetBaseNameNoTier] преклоняет колени"
 arnor.3001.desc: "Посланники вернулись с вестями, что [new_prince.GetName] [Select_CString(new_prince.IsFemale, 'признала', 'признал' )] мои притязания на власть над всем [Concept('arnor', 'Арнором')|E]. Прибыли гонцы с клятвами верности и королевскими дарами, и они с нетерпением ждут, когда вернутся с ответным одобрением и благословением в [new_prince.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier].\n\nХотя обычных формальностей было бы достаточно, есть также возможность оказать [new_prince.GetHerHim] более высокие почести в знак признания [new_prince.GetHerHis] наследия и лояльности. Я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы даровать [new_prince.GetHerHim] и [new_prince.GetHerHis] наследникам титул «принц», возвысив их над всеми остальными моими вассалами и предоставив большую автономию, как и подобает гордым #L [new_prince.GetPrimaryTitle.GetAdjective|l]им#! землям."
 arnor.3001.a: "Такая верность должна быть вознаграждена."
 arnor.3001.b: "В дальнейших почестях нет необходимости."
 arnor.3001.a.tt: "Вы окажете дому [new_prince.GetHouse.GetName] княжеские почести"

 arnor.3002.opening: "Верный принц Кардолана,"
 arnor.3002.desc: "В знак признания вашего древнего происхождения и вашего расторопного и лояльного принятия наших королевских притязаний как короля всего Арнора, мы рады даровать вам и вашим наследникам, пока будет продолжаться ваш род, титул #high «принцев Кардолана»#! и все достоинства и почести, которые причитаются этому высокому титулу."
 arnor.3002.a: "Мой сюзерен."

 arnor.3003.opening: "Король Артедайна,"
 arnor.3003.desc: "После смерти #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineisildur11').GetID] #L короля Эарендура#!#! его сыновья пришли к соглашению, что каждый из них имеет право на своё собственное королевство, навсегда независимое и отличное от других. Время не изменило эту истину, и притязания на верховенство над всем Арнором являются нарушением тех первых договоров. Мы отвергаем ваши притязания на положение единоличных наследников рода Исильдура и не ставим вас выше по знатности или чести, чтобы отказаться от своего законного правления."
 arnor.3003.a: "Глупцы и изменники!"



 lotr_intro_events.6010.a.tt: "Вы выдвинете претензии на титул короля Арнора и потребуете клятв верности как от Кардолана, #P так и#! от Рудаура"
 lotr_intro_events.6010.b.tt: "Вы выдвинете претензии на титул короля Арнора и потребуете клятв верности #N только#! от Кардолана"
