 ### Decisions ###

 decision_group_type_angmar_wars_situation: "$situation_angmar_wars_situation$ - решения"

 # Arnor 
 decision_destroy_angmar: "Уничтожить Ангмар"
 decision_destroy_angmar_desc: "Too long has the shadow of $k_angmar$ loomed over these lands, and the [dunedain|E] cowered in fear. Yet the time has come to strike back and end this struggle by driving the foul [Concept('witchking''Sorcerer')|E] from [eriador|E] one and for all!"
 decision_destroy_angmar_confirm: "Let us cleanse these lands!"
 decision_destroy_angmar_tooltip: "Начать войну, чтобы раз и навсегда уничтожить $k_angmar$"
 angmar_holds_no_land_in_dejure_arnor: "[GetTitleByKey('k_angmar').GetHolder.GetName] #N не#! владеет землями в [Concept('de_jure', 'де-юре')|E] границах #ONCLICK:TITLE,e_arnor #TOOLTIP:LANDED_TITLE,e_arnor #L Арнора#!#!#!"



 decision_craft_barrow_blades: "Craft a $dagger_westernesse_name$"
 decision_craft_barrow_blades_tooltip: "Create an echanted dagger artifact"
 decision_craft_barrow_blades_desc: "Though long ago [westernesse|E] sank below the waves, its memory has not yet departed. Here in [arnor|E] some measure of its skill remains, and there reside mighty smiths trained in the lore of old. Facing such as terrible foe as the Lord of [angmar|E], none but the subtlest of our blades, woven with spells for the bane of his [Concept('nazgul','undead')|E] servants shall suffice. Perhaps I might commision one of my courtiers to craft such a dagger, or even take up the hammer myself."
 decision_craft_barrow_blades_confirm: "The wisdom of [numenor|E] is not yet wholy gone."

 decision_sponsor_ranger_company: "Sponsor Ranger Company"
 decision_sponsor_ranger_company_tooltip: "Create a Ranger Landless Adventurer"
 decision_sponsor_ranger_company_desc: "In these dark days, there are still some who wish to venture beyond our high walls and strike at the heart of our enemy. Were I to give these brave men funds and an offical commision, they might do great deads in defense of [ROOT.Char.GetPrimaryTitle.GetNameNoTier]."
 decision_sponsor_ranger_company_confirm: "Go forth and defend [arnor|E]!"
 decision_sponsor_ranger_company_tt: "You will create and fund a [GetGovernment('landless_adventurer_government').GetName] with the [GetLaw('camp_purpose_rangers').GetName] [camp_purpose|E]. You will be presented with a set of candidates to chose as captain of the new [camp|E]."

 decision_consolidate_the_realm: "Consolidate the Realm"
 decision_consolidate_the_realm_tooltip: "Pull back your people from the borderlands"
 decision_consolidate_the_realm_desc: "As the [angmar_wars|E] drag on, I find [ROOT.Char.GetPrimaryTitle.GetNameNoTier] growing more and more incapable of defending its far-flung bounds. Should this steady decline continue, we risk those lands falling into [devastation|E] and their people lost.\n\nThe realm can ill afford such waste, and therefore it may be prudent to consolidate my people inward, abandoning those lands which are indefensible and relocating thier inhabitants closer to our capital. Not all will see the nessecíty of such an action though, and some disenters may prove troublesome."
 decision_consolidate_the_realm_confirm: "Prudence must guide us"
 decision_consolidate_the_realm_tt: "All [counties|E] in [GetPlayer.MakeScope.Var('selected_duchy').Title.GetNameNoTier] will be [devastated|E] and return to [wilderness|E], and [GetPlayer.MakeScope.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetDeJureLiege.GetBaseNameNoTier] will recieve equal [development|E] to the lost region. #V (Currently @development_icon![GetPlayer.MakeScope.Var('selected_duchy').Title.MakeScope.Var('decision_consolidate_the_realm_total_development_variable').GetValue])#!"
 decision_consolidate_the_realm_tt_2: "This will likely #N anger#! the local lords, and they may react #N poorly#!."
 pick_duchy: "You must select a duchy"

 # Angmar
 decision_destroy_arnor: "Уничтожить Арнор"
 decision_destroy_arnor_desc: "The acursed [dunedain|E] of [arnor|E] have too long evaded destruction, but at lost they are within our grasp. Their realm has been shattered, their people devastated, and now their heatland lies open to my armies. At last, they shall be wiped from the face of [middleearth|E]!"
 decision_destroy_arnor_confirm: "We march to [GetTitleByKey('k_arthedain').GetHolder.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTierNoTooltip]!"
 decision_destroy_arnor_tooltip: "Начать войну, чтобы раз и навсегда уничтожить [Concept('dunedain', 'дунэдайн')|E]"
 arnor_holds_no_land_in_dejure_forodwaith: "[GetTitleByKey('k_arthedain').GetHolder.GetName] #N не#! владеет землями в [Concept('de_jure', 'де-юре')|E] границах #ONCLICK:TITLE,e_forodwaith #TOOLTIP:LANDED_TITLE,e_forodwaith #L Фородвайта#!#!#!"

 decision_assimilation_policy: "Force Assimilation"
 decision_assimilation_policy_desc: "[angmar|E] is not a natural realm, welded together by my dark will from many disparate tribes, and with each conquest my subjects grow ever more divided. To ensure the stability and absolute loyalty of [angmar|E], we must ensure cultural and religious homogeneity, by any means necessary."
 decision_assimilation_policy_confirm: "They shall be united in #bold me!#!"
 decision_assimilation_policy_tooltip: "Begin a policy of forced assimilation in your realm"
 decision_assimilation_policy_tt: "You unlock [decisions|E] to select a favoured [culture|E] and [faith|E] from among those present in your realm."
 decision_assimilation_policy_tt_22: "You unlock the #V $great_project_type_angmar_wars_assimilate_duchy_name$#! [great_project|E] to convert [duchies|E] in your realm to your favoured culture and faith, and convert and [tribal|E] [counties|E] to [feudal|E]"

 decision_select_prefered_culture: "Select Favoured Culture"
 decision_select_prefered_culture_desc: "Though there are many cultures in [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier], one must rise to the top. Whoever I choose must be strong enough to wield against the [arnorians|E], and loyal enough to serve me alone."
 decision_select_prefered_culture_confirm: "I will forge them into my blade!"
 decision_select_prefered_culture_tooltip: "Chose one culture from your realm to favour"
 decision_select_prefered_culture_tt: "You will convert [counties|E] in your realm to [GetPlayer.MakeScope.Var('selected_culture').Culture.GetName] when using the #V $great_project_type_angmar_wars_assimilate_duchy_name$#! [great_project|E]."
 decision_select_prefered_culture_tt_2: "All of your vassals of [GetPlayer.MakeScope.Var('selected_culture').Culture.GetName] [culture|E] will gain #P 10#! [opinion|E] of you."
 decision_select_prefered_culture_tt_3: "All of your vassals #V not#! of [GetPlayer.MakeScope.Var('selected_culture').Culture.GetName] [culture|E] will lose #N 20#! [opinion|E] of you."

 decision_select_prefered_faith: "Selected Favoured Faith"
 decision_select_prefered_faith_desc: "While in the past prayers to many gods and spirits rose from the hills of [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier], the time has come to unite my realm in the worship of the dark. While there are many faith which might be turned to my purposes, selecting one orthodox rite will greatly strength my control and my subjects' loyalty."
 decision_select_prefered_faith_confirm: "I will bind them to the Dark!"
 decision_select_prefered_faith_tooltip: "Chose one faith from your realm to favour"
 decision_select_prefered_faith_tt: "You convert [counties|E] in your realm to [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName] when using the #V $great_project_type_angmar_wars_assimilate_duchy_name$#! [great_project|E]."
 decision_select_prefered_faith_tt_2: "All of your vassals of [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName] [faith|E] will gain #P 10#! [opinion|E] of you."
 decision_select_prefered_faith_tt_3: "All of your vassals #V not#! of [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName] [faith|E] will lose #N 20#! [opinion|E] of you."

