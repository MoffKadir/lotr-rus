 angmar_wars.1040.t: "Клинок Вестернессе"
 angmar_wars.1040.desc: "$PLACEHOLDER$"
 angmar_wars.1040.a: "Ударь верно, мой клинок."

 angmar_wars.1050.t: "Защитники дебрей"
 angmar_wars.1050.desc: "В державе [ROOT.Char.GetPrimaryTitle.GetName] есть те, кого раздражают ограничения в обороне и безопасность каменных крепостей, вместо этого они мечтают об открытом небе и быстром возмездии в виде скрытой стрелы. Из самых храбрых и лучших таких солдат я [Select_CString(ROOT.Char.IsFemale, 'собрала', 'собрал' )] отряд верных людей, чтобы отправить их защищать #L [ROOT.Char.GetPrimaryTitle.GetAdjective|l]ие#! границы и сражаться в пустошах с нашими врагами.\n\nОсталось только решить, кто возглавит моих новых [Concept('ranger_laamp','следопытов')|E], потому что несколько человек выступили вперёд, предлагая встать во главе. У каждого есть свои сильные стороны, но такому отважному капитану, от решения которого может зависеть судьба державы, потребуются большое мужество и острый ум."
 angmar_wars.1050.a: "[option_one.GetTitledFirstName] - очевидный выбор."
 angmar_wars.1050.b: "[option_two.GetTitledFirstName] справится с этой работой."
 angmar_wars.1050.c: "Командуй, [option_three.GetTitledFirstName]."
 rangers_of_x: "Следопыты персонажа [GetPlayer.MakeScope.Var('sponsor').Char.GetFirstNameNoTooltip]"

 angmar_wars.1510.t: "Сущность Ангмара"
 angmar_wars.1510.desc: "Слишком долго держава [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] цеплялась за своё децентрализованное прошлое, где десятки небольших племён были преданы друг другу, и не было объединяющей культуры или религии. Хотя эта необузданная независимость оказалась благодатной почвой для моего прихода к власти, с тех пор она стала препятствием для создания настоящей империи.\n\nПришло время воссоздать [Concept('angmar', 'Ангмар')|E] по моему образу и подобию, сформировав его [Concept('culture', 'культуру')|E] и [Concept('faith', 'веру')|E] в соответствии с моим собственным видением. Из множества народов и верований в моей державе, несомненно, есть одно, которое может быть принято за образец и использовано для объединения многих в единое и лояльное целое. Не все ассимилируются добровольно, но со временем они обязательно должны ассимилироваться."
 angmar_wars.1510.a: "Я создам из них по-настоящему сильное общество!"
 angmar_wars.1510.b: "Они должны почитать то, что скажу я!"
 angmar_wars.1510.a.tt: "Станет доступно решение «[GetDecisionWithKey('decision_select_prefered_culture').GetName]»"
 angmar_wars.1510.b.tt: "Станет доступно решение «[GetDecisionWithKey('decision_select_prefered_faith').GetName]»"

 angmar_wars.1511.t: "#L [GetPlayer.MakeScope.Var('selected_culture').Culture.GetCollectiveNoun|U]ий#! триумф"
 angmar_wars.1511.desc: "Я [Select_CString(ROOT.Char.IsFemale, 'решила', 'решил' )], что из всех народов державы [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] [GetPlayer.MakeScope.Var('selected_culture').Culture.GetName|l] будут служить мне лучше всего. Возвысив их вождей и усмирив их врагов, со временем вся держава будет переделана по образу и подобию их [Concept('culture', 'культуры')|E]. От этого [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] станет только сильнее, а главное, ещё более преданным мне."
 angmar_wars.1511.a: "К более сильному и единому будущему!"
 angmar_wars.1511.b: "$angmar_wars.1511.a$"
 angmar_wars.1511.a.tt: "$decision_assimilation_policy_tt_22$"
 angmar_wars.1511.b.tt: "Станет доступно решение «[GetDecisionWithKey('decision_select_prefered_faith').GetName]»"

 angmar_wars.1512.t: "#L [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName]ое#! возвышение"
 angmar_wars.1512.desc: "Хотя в прошлом я [Select_CString(ROOT.Char.IsFemale, 'допускала', 'допускал' )] некоторую долю невежественной ереси и народных суеверий в державе [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier], наконец-то пришло время кодифицировать истинную [Concept('faith', 'веру')|E]. [GetPlayer.MakeScope.Var('selected_faith').Faith.GetAdjective] оказался самым действенным инструментом, и со временем все будут почитать [ROOT.Char.GetFaith.HighGodNamePossessive], будь то из рвения или из страха. С этим новым объединяющим символом веры [ROOT.Char.GetPrimaryTitle.GetBaseName], несомненно, скоро станет ещё более могущественным и #EMP моим#!."
 angmar_wars.1512.a: "Во славу Тьмы!"
 angmar_wars.1512.b: "$angmar_wars.1512.a$"
 angmar_wars.1512.a.tt: "$decision_assimilation_policy_tt_22$"
 angmar_wars.1512.b.tt: "Станет доступно решение «[GetDecisionWithKey('decision_select_prefered_culture').GetName]»"

 angmar_wars.1520.t: "Моргульский клинок"
 angmar_wars.1520.desc: "$PLACEHOLDER$"
 angmar_wars.1520.a: "Он хорошо мне послужит."


 ### Situation Flavor Events###

 angmar_wars.2001.t: "Набеги орков!"
 angmar_wars.2001.desc: "Сошедшие с [Concept('mistymountains', 'Мглистых гор')|E] орки долгое время были чумой [Concept('eriador', 'Эриадора')|E], начиная со [Concept('elderdays', 'Старших Дней')|E], и они снова напали на нашу державу. На этот раз они совершили набег на владение [disaster_county.GetNameNoTier]. Нам предстоит решить, как реагировать."
 angmar_wars.2001.a: "Собрать войска!"
 angmar_wars.2001.b: "[marshal.GetName], я доверяю эту задачу вам."
 building_destroyed: "Случайное [Concept('building', 'здание')|E] снизит уровень или будет уничтожено"

 angmar_wars.2002.t: "Набеги разбойников!"
 angmar_wars.2002.desc: "[Concept('eriador', 'Эриадор')|E] - опасное место, поскольку из-за раскола [Concept('arnor', 'Арнора')|E] между местными властителями и государствами-преемниками не было сотрудничества, что позволило набегам разбойников через границу стать обычным делом, на этот раз были замечены налётчики, направляющиеся в сторону владения [disaster_county.GetNameNoTier]. Пришло время решить, как реагировать."
 angmar_wars.2002.a: "Собрать войска!"
 angmar_wars.2002.b: "[marshal.GetName], я доверяю эту задачу вам."
 angmar_wars.2002.c: "Если они хотят золото, отдадим его им."

 angmar_wars.2003.t: "Молодой пастух"
 angmar_wars.2003.desc: "Когда мы осматриваем руины деревни, оставшиеся после налета, к нам подходит молодой парень. Он был пастухом, который пас свое стадо в окрестностях деревни. На моих глазах он подошел к сгоревшему дому и разрыдался, увидев тела молодой пары и двух детей, которых мои солдаты до сих пор не похоронили. Очевидно, что произошло, но не очевидно, как я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] реагировать."
 angmar_wars.2003.a: "Он останется при дворе, ни один ребенок не заслуживает того, чтобы быть сиротой."
 angmar_wars.2003.b: "Отослать его в королевские владения, там он может пригодиться."

 angmar_wars.2004.t: "Крестьяне покидают пограничье"
 angmar_wars.2004.desc: "[Concept('eriador', 'Эриадор')|E] пришёл в упадок после распада [Concept('arnor', 'Арнора')|E]. С каждым годом всё больше наших сыновей и дочерей гибнет в [Concept('angmar_wars', 'Ангмарских войнах')|E], и с каждым годом все больше и больше наших земель оказываются заброшенными. По мере того, как дикая природа вторгается в наши границы, люди отступают на более безопасные территории в глубь страны, и в этом году жители владения [county1.GetNameNoTier] решили переселиться во владение [county2.GetNameNoTier]. мы можем либо позволить им уйти, либо заставить их остаться в этих землях."
 angmar_wars.2004.a: "Позволить им переселиться."
 angmar_wars.2004.b: "Заставить их остаться."
 building_destroyed_county_1: "Во владении [county1.GetName] будет понижено или уничтожено случайное [Concept('building', 'здание')|E]"
 biulding_add_county_2: "Во владении [biuld_prov.GetName] будет создано или улучшено случайное [Concept('building', 'здание')|E]"





 noi_trevani.1000.t: "Топот мягких лап"
 noi_trevani.1000.desc: "Прошли месяцы с тех пор, как я и мой народ заселили долины и ущелья Митэйтеля и Брейг-Куик. В нашем стремлении вернуть себе наши древние дома наши мудрецы рассказывают истории о нашем прошлом и о том, какое из наших племён-основателей когда-то называло это место своим домом, до того, как появились Железная корона и Белое древо. Они рассказывают истории о Рысях, скрытном народе, который, как известно, берёт и выращивает рысей в качестве своих спутников на охоте, а также для пчеловодства, которым в наши дни занимаются редко, поскольку дни, кажется, становятся всё холоднее. Когда-то они были гордыми охотниками, но теперь их никто не видел уже много поколений, и все мы считали, что они погибли в войнах прошлого. Из-за стен моих покоев доносится шум. Словно в мифе, я вижу незнакомую женщину, окружённую несколькими стражами. Поначалу их символы мне незнакомы, но вскоре я понимаю: это последние остатки древнейшего племени. Женщина представляется как «Рысь», которую её племя называет так за то, что спустя долгое время ей удалось снова приручить рысь и провести их через большие трудности. Сейчас она предстала передо мной, чтобы принести клятвы верности, поскольку мои усилия по восстановлению наших древних домов принесли мир в эти дикие и опасные земли. Но могу ли я доверять ей? И действительно ли я хочу её верности?"
 noi_trevani.1000.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1000.a.tt: "Вы принимаете Рысь, и она становится вашей придворной."
 noi_trevani.1000.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1000.b.tt: "Рысь становится вашим вассалом и получает графства Митэйтель и Брейг-Куик."
 noi_trevani.1000.c: "Вы - слабый лидер, недостойная называться предводительницей. Умри!"
 noi_trevani.1000.c.tt: "Вы убиваете Рысь и её стражу."

 noi_trevani.1001.t: "Уверенное эхо шагов"
 noi_trevani.1001.desc: "Paceholder"
 noi_trevani.1001.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1001.a.tt: "Вы принимаете Козла, и он становится вашим придворным."
 noi_trevani.1001.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1001.b.tt: "Козёл становится вашим вассалом и получает графства Орнуиль и Карандор."
 noi_trevani.1001.c: "Вы - слабый лидер, недостойный называться вождём. Умри!"
 noi_trevani.1001.c.tt: "Вы убиваете Козла и его стражу."

 noi_trevani.1002.t: "Вызывающий рёв"
 noi_trevani.1002.desc: "Paceholder"
 noi_trevani.1002.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1002.a.tt: "Вы принимаете Медведя, и он становится вашим придворным."
 noi_trevani.1002.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1002.b.tt: "Медведь становится вашим вассалом и получает графства Харгваэрон, Найтгард и Троулер."
 noi_trevani.1002.c: "Вы - слабый лидер, недостойный называться вождём. Умри!"
 noi_trevani.1002.c.tt: "Вы убиваете Медведя и его стражу."

 noi_trevani.1003.t: "Пение петуха"
 noi_trevani.1003.desc: "Прошло уже несколько месяцев с тех пор, как мы с моим народом заселили скалистые холмы и болота к северо-западу от Рудаура, в частности, некогда бесплодные земли [GetTitleByKey('c_seansliabh').GetNameNoTier], [GetTitleByKey('c_glinkinlin').GetNameNoTier] и [GetTitleByKey('c_taobhtir').GetNameNoTier]. На этой бесплодной земле осталось всего несколько диких птиц - дичь, но всё равно это еда, когда мы делимся историями у очага. Мудрые и знающие люди нашего народа говорят о древнем племени ной-треван этих земель, [Concept('fowl_tribe', 'племени Птиц')|E]. Они были одними из самых гордых и хитроумных из девяти древних племён, но их род потерпел поражение в войнах Железной короны и был утрачен навсегда.\n\n«Не совсем так...» - мы поворачиваем головы к членам нашей группы, которых раньше здесь не было. Их очевидный лидер и глашатай ковыряет в зубах ребрышком, но прежде чем я успеваю отреагировать или вытащить оружие, он опускается передо мной на колени и протягивает руки в знак верности. Может ли он быть потомком Птиц? Я мысленно возвращаюсь к старым сказаниям - говорят, что Птицы никогда по-настоящему не присягали на верность вождям Девяти, и этот пришелец тоже не присягал мне. Станет ли он достойным вассалом?"
 noi_trevani.1003.a: "Я не поддамся на уловки Птицы, но все треван желанные гости при моём дворе."
 noi_trevani.1003.a.tt: "Вы принимаете Птицу, и он становится вашим придворным."
 noi_trevani.1003.b: "Пусть птицы вернутся на свои законные места для кормления!"
 noi_trevani.1003.b.tt: "Птица становится вашим вассалом и получает графства [GetTitleByKey('c_seansliabh').GetNameNoTierNoTooltip], [GetTitleByKey('c_glinkinlin').GetNameNoTierNoTooltip] и [GetTitleByKey('c_taobhtir').GetNameNoTierNoTooltip]."
 noi_trevani.1003.c: "Прекрати визжать, шавка!"
 noi_trevani.1003.c.tt: "Вы убиваете Птицу и его стражу."

 noi_trevani.1004.t: "Тихий стук"
 noi_trevani.1004.desc: "Paceholder"
 noi_trevani.1004.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1004.a.tt: "Вы принимаете Дятла и она становится вашей придворной."
 noi_trevani.1004.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1004.b.tt: "Дятел становится вашим вассалом и получает графства Энтритен и Нан-Торнаэт."
 noi_trevani.1004.c: "Вы - слабый лидер, недостойная называться предводительницей. Умри!"
 noi_trevani.1004.c.tt: "Вы убиваете Дятла и её стражу."

 noi_trevani.1005.t: "Тихая дробь"
 noi_trevani.1005.desc: "Paceholder"
 noi_trevani.1005.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1005.a.tt: "Вы принимаете Зайца и он становится вашим придворным."
 noi_trevani.1005.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1005.b.tt: "Заяц становится вашим вассалом и получает графства Друм-Теас и Таллнок."
 noi_trevani.1005.c: "Вы - слабый лидер, недостойный называться вождём. Умри!"
 noi_trevani.1005.c.tt: "Вы убиваете Зайца и его стражу."

 noi_trevani.1006.t: "Тройное карканье"
 noi_trevani.1006.desc: "Paceholder"
 noi_trevani.1006.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1006.a.tt: "Вы принимаете Ворона и он становится вашим придворным."
 noi_trevani.1006.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1006.b.tt: "Ворон становится вашим вассалом и получает графства Друм-Теас и Таллнок."
 noi_trevani.1006.c: "Вы - слабый лидер, недостойная называться предводительницей. Умри!"
 noi_trevani.1006.c.tt: "Вы убиваете Ворона и его стражу."

 noi_trevani.1007.t: "Величественное гарцевание"
 noi_trevani.1007.desc: "Paceholder"
 noi_trevani.1007.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1007.a.tt: "Вы принимаете [Select_CString(stag_descendant.IsFemale, 'Лань', 'Оленя' )] и [stag_descendant.GetSheHe] становится [Select_CString(stag_descendant.IsFemale, 'вашей придворной', 'вашим придворным' )]."
 noi_trevani.1007.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1007.b.tt: "[Select_CString(stag_descendant.IsFemale, 'Лань', 'Олень' )] становится вашим вассалом и получает графства Эттенмурс и Мойн-Дулдахд."
 noi_trevani.1007.c: "Вы - слабый лидер, [Select_CString(stag_descendant.IsFemale, 'недостойная', 'недостойный' )] называться [Select_CString(stag_descendant.IsFemale, 'предводительницей', 'вождём' )]. Умри!"
 noi_trevani.1007.c.tt: "Вы убиваете [Select_CString(stag_descendant.IsFemale, 'Лань', 'Оленя' )] и [stag_descendant.GetHerHis] стражу."

