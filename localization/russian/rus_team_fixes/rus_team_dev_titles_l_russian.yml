 decision_wk_return_rings_sauron: "Вернуть Саурону Кольца гномов"
 decision_wk_return_rings_sauron_tooltip: "Вы преподнесёте Кольца гномов Саурону"
 decision_wk_return_rings_sauron_desc: "[Concept('sevenringsofdwarves', 'Семь колец')|E] были дарованы каждому из королевских родов семи гномьих кланов в середине [Concept('secondage', 'Второй эпохи')|E]. Хотя его замысел развратить гномов и править ими пошёл не так, как он планировал, жадность, порождённая их могуществом, привела ко многим бедствиям.\n\nНа самом деле, их сокровища привлекли нескольких [Concept('dragons', 'драконов')|E], что привело к серьёзным разрушениям в их владениях. Из первоначальных семи четыре были поглощены драконьим пламенем, и мой повелитель [Concept('sauroncharacter', 'Саурон')|E] желает вернуть оставшиеся. Теперь, когда у меня есть два Кольца кланов [Concept('bluemountains', 'Синих гор')|E], я могу передать их ему, и таким образом помочь ему вернуть былую силу."
 decision_wk_return_rings_sauron_confirm: "Могущество Саурона возрастёт"



 decision_group_type_skorgrim_dourhand_rings: "Скоргрим Крепкохват - Кольца гномов"


 skorgrim_dourhand.0101.t: "Интересный договор"
 skorgrim_dourhand.0101.desc: "[Concept('dwarves', 'Гномы')|E] [Concept('bluemountains', 'Синих гор')|E] - народ упрямый и гордый, но даже в самом крепком камне есть свои трещины. [skorgrim_dourhand.GetName] жаждет вернуть утраченную славу Ногрода, что перевешивает его преданность своему роду. Это слабость, которой мы можем воспользоваться.\n\nЯ приготовил для гнома из клана [GetScriptedCharacterByHistoryID('lineofdourhand17').GetDynasty.GetName] свиток, содержащий обещания бессмертия и величия, которые намного превосходят его нынешнее положение. На самом деле, это всего лишь позолоченные кандалы. В обмен я потребую [Concept('sevenringsofdwarves', 'Кольцо Огнебородов')|E] и [Concept('sevenringsofdwarves', 'Кольцо Широкозадов')|E]. Если он добьётся успеха, два из [Concept('sevenringsofdwarvesshort', 'Семи')|E] вернутся в тень моего повелителя [Concept('sauroncharacter', 'Саурона')|E]. Если он потерпит неудачу, то узнает, что гнев [Concept('angmar', 'Ангмара')|E] гораздо страшнее любого сокровища гномов.\n\nНаш эмиссар готов отправиться в [Concept('eredluin', 'Эред Луин')|E]. Забросим ли мы этот крючок во мрак, или этот изгнанный принц недостоин нашего внимания?"
 skorgrim_dourhand.0101.a: "Отправить предложение. Пусть жадность его погубит."
 skorgrim_dourhand.0101.b: "Он недостоин нашего внимания. Сжечь свиток."

 skorgrim_dourhand.0102.t: "Тёмное предложение"
 skorgrim_dourhand.0102.desc: "Прибыл эмиссар из [Concept('angmar', 'Ангмара')|E] с письмом, запечатанным самим [Concept('witchkingshort', 'Королём-чародеем')|E]. Посланец утверждает, что это соглашение о взаимной выгоде. Он говорит, что у меня нет причин для беспокойства, но в его словах сквозит тень страха.\n\nПосле прочтения свитка становится ясна истинная суть предложения. Король-чародей обещает бессмертие и несметные богатства в обмен на передачу ему [Concept('sevenringsofdwarves', 'Кольца Огнебородов')|E] и [Concept('sevenringsofdwarves', 'Кольца Широкозадов')|E].\n\nХотя такой союз и мог бы обеспечить средства для восстановления [Concept('nogrod', 'Ногрода')|E], риски серьёзны. Если мы согласимся на сделку и не доставим оба Кольца, это, несомненно, приведёт к ужасному концу, точно так же, как отторжение владыки Ангмара может навлечь на нас его гнев. Я мог бы даже попытаться оставить Кольца себе, хотя он не из тех властителей, которые легко переносят предательство.\n\nДолжны ли мы предать своих сородичей ради власти или рискнуть навлечь на себя гнев Короля-чародея? Эмиссар ждёт нашего ответа."
 skorgrim_dourhand.0102.a: "Я в деле. Сообщить Королю-чародею, что я согласен."
 skorgrim_dourhand.0102.b: "Это гнусное предложение. Мне нужно сообщить Двалину V."
 skorgrim_dourhand.0102.b.effects: "#V Вы#!, #V [skorgrim_dourhand.GetFirstName]#!, отправитесь в [GetTitleByKey('c_manakhrrukul').GetNameNoTier]."

 skorgrim_dourhand.0103.t: "Предупреждение Двалину V"
 skorgrim_dourhand.0103.desc: "Холодные ветры [Concept('angmar', 'Ангмара')|E] следовали за мной от руин [Concept('nogrod', 'Ногрода')|E]. В моём сознании бушует буря теней, преследуемых пустыми обещаниями Короля-чародея о непревзойдённой силе и восстановлении моего народа. Это был дар, который я не мог принять, потому что ценой было предательство моего сюзерена и [Concept('dwarffather', 'праотца')|E], которым является [dwalin_V.GetNameRegnal].\n\nЯ стою в большом зале [GetTitleByKey('c_manakhrrukul').GetNameNoTier], моё дыхание прерывается, а двор смотрит на меня с жалостью. Слова вылетают в неистовом порыве; я рассказываю Двалину о тёмном договоре и тени, которая хочет получить [Concept('sevenringsofdwarves', 'Кольцо Широкозадов')|E].\n\nПока я говорю, кольцо на его руке мерцает ледяным блеском, как будто оно знает, что на нём есть метка. «Мой господин, он придёт за Кольцом! Вы должны действовать немедленно!», - кричу я, мой ужас наконец-то проходит. В зале воцаряется тяжёлая тишина; тайна раскрыта, а вместе с ней и наша безопасность."
 skorgrim_dourhand.0103.a: "Я исполнил свой долг. Двалин знает, что делать."
 skorgrim_dourhand.0103.a.tt: "Двалин V обдумает свой ответ на угрозу со стороны Ангмара"

 skorgrim_dourhand.0104.t: "Предупреждение от Скоргрима"
 skorgrim_dourhand.0104.desc: "С тех пор как [skorgrim_dourhand.GetName] отправился на задание по восстановлению [Concept('nogrod', 'Ногрода')|E], древнего чертога [Concept('firebeards', 'Огнебородов')|E], до моих залов почти не доходили слухи. И вот теперь, без предварительного приглашения, он прибыл ко двору с просьбой о срочной аудиенции, утверждая, что у него есть информация чрезвычайной важности.\n\nОн выглядит глубоко потрясённым. После нескольких судорожных, неразборчивых бормотаний он, наконец, обрёл дар речи. Он рассказывает душераздирающую историю: несколько дней назад прибыл эмиссар из [Concept('angmar', 'Ангмара')|E] с мрачным предложением. [Concept('witchkingshort', 'Король-чародей')|E] предложил ему непревзойдённую силу в обмен на предательство его рода и передачу [Concept('sevenringsofdwarves', 'Кольца Широкозадов')|E]. Пока он говорит, я смотрю на семейную реликвию, которая украшала руки моих предков на протяжении многих поколений. Кольцо, кажется, внезапно замерцало холодным светом, словно почувствовав тень своего преследователя.\n\n«Мой повелитель, он придёт за Кольцом! Вы должны действовать немедленно!», - кричит Скоргрим хриплым от ужаса голосом. В тронном зале повисает тяжёлая тишина, когда до всех доходит тяжесть его предупреждения."
 skorgrim_dourhand.0104.a: "Король-чародей никогда не приберёт его к рукам!"
 skorgrim_dourhand.0104.b: "Спокойно, Скоргрим. В этих залах мы в безопасности."

 skorgrim_dourhand.0105.t: "Награда за верность"
 skorgrim_dourhand.0105.desc: "Эхо предупреждения, что сделал [skorgrim_dourhand.GetFirstName], всё ещё звучит под сводами моего тронного зала. Не секрет, что он жаждет величия, но он предпочёл вывести эту тень на свет, а не воспользоваться предлагаемой ему тёмной силой. Отвергнув позолоченную ловушку [Concept('witchkingshort', 'Короля-чародея')|E], он, возможно, спас бесценную семейную реликвию [Concept('broadbeams', 'Широкозадов')|E] и, возможно, даже жизни моих родичей.\n\nТакой поступок не может остаться незамеченным. Если я хочу уберечь его от досягаемости тени, я должен предложить ему цель, которая соперничает с ложью [Concept('angmar', 'Ангмара')|E]. Должен ли я дать монету, чтобы воплотить в жизнь его мечты о восстановленном [Concept('nogrod', 'Ногроде')|E], или связать наши судьбы более формальным соглашением?"
 skorgrim_dourhand.0105.a: "Я профинансирую восстановление Ногрода."
 skorgrim_dourhand.0105.b: "Мы вместе выстоим против тени."
 skorgrim_alliance_effect_tooltip: "Вы и [skorgrim_dourhand.GetName] заключите оборонительный союз"
 skorgrim_dourhand.0105.c: "Он заслужил моё расположение и мою поддержку в будущем."
 skorgrim_dourhand.0105.d: "Безопасность нашего народа - достаточная награда."

 skorgrim_dourhand.0106.t: "Королевская благодарность"
 skorgrim_dourhand.0106.desc: "Выслушав моё донесение, [dwalin_V.GetNameRegnal] признал угрозу, исходящую от [Concept('witchkingshort', 'Короля-чародея')|E]. Он понимает, что я предпочёл сообщить ему эту информацию, а не принять силу и бессмертие, обещанные посланником из [Concept('angmar', 'Ангмара')|E]. Поступая таким образом, я отдаю предпочтение своему положению здесь, в [Concept('bluemountains', 'Синих горах')|E], а не опасному и неопределённому договору.\n\nКороль объявил двору, что мои действия заслуживают реального вознаграждения. Предложив свою официальную поддержку моему делу, он подтвердил моё положение и предоставил ресурсы, необходимые мне для продолжения моей работы. Это ощутимая выгода, которая имеет гораздо больший вес в этих залах, чем пустые обещания чародея."
 skorgrim_dourhand.0106.a: "Это только начало моего восстановления."

 skorgrim_dourhand.0107.t: "Подготовка к удару"
 skorgrim_dourhand.0107.desc: "Договор с [Concept('witchkingshort', 'Королём-чародеем')|E] подписан. Теперь предстоит опасное задание - доставить Кольца. Я должен решить, на кого из двух королей нацелиться в первую очередь: мой собственный сюзерен, [dwalin_V.GetNameRegnal], или юный [GetScriptedCharacterByHistoryID('lineofuri67').GetNameRegnal] из [Concept('firebeards', 'Огнебородов')|E].\n\nДвалин - наиболее логичный выбор для быстрого удара просто потому, что я уже нахожусь в пределах его двора; близость даёт мне возможности, которых нет на расстоянии. Однако выступать против своего сюзерена - это огромный риск. С другой стороны, король Огнебородов гораздо менее опытен и, вероятно, более восприимчив к обману, хотя его чертоги находятся дальше.\n\nЯ не могу позволить себе колебаться. Король-чародей не терпит неудач, и если я в ближайшее время не достану хотя бы одно из [Concept('sevenringsofdwarves', 'Семи')|E], его гнев обрушится на меня. Какой король первым лишится своей драгоценной реликвии?"
 skorgrim_dourhand.0107.a: "[dwalin_V.GetFirstNameRegnal]. Он доверчив, и мне хорошо знакомы его чертоги."
 skorgrim_dourhand.0107.b: "[fror_II.GetFirstNameRegnal]. Его неопытность станет его погибелью."
 skorgrim_broadbeam_choice_of_plan: "Вы начнёте замышлять кражу [Concept('sevenringsofdwarves', 'Кольца Широкозадов')|E] у своего сюзерена"
 skorgrim_firebeard_choice_of_plan: "Вы начнёте замышлять кражу [Concept('sevenringsofdwarves', 'Кольца Огнебородов')|E] у Огнебородов"

 skorgrim_dourhand.0108.t: "Способ обретения"
 skorgrim_dourhand.0108.desc: "Я определил свою цель, но способ захвата остаётся неизвестным. Я должен решить, как забрать одно из [Concept('sevenringsofdwarves', 'Семи')|E] с его пальца.\n\nПервый вариант - дипломатическая засада. Я могу пригласить короля на частный совет под предлогом обсуждения восстановления [Concept('nogrod', 'Ногрода')|E]. Как только он отделится от своей стражи, мои люди схватят его и силой захватят Кольцо. Это будет тихо и эффективно, при условии, что никто не заподозрит ловушку.\n\nВ качестве альтернативы, я могу завладеть Кольцом путём завоевания. Объявление открытой войны гораздо рискованнее и обойдётся дороже, но это позволяет мне продемонстрировать свою военную мощь и получить награду по праву завоевания. Когда Кольцо будет отобрано у поверженного врага, не возникнет вопросов о «предательстве»."
 skorgrim_dourhand.0108.a: "Заманите его в ловушку «встречей»."
 skorgrim_dourhand.0108.b: "Я заберу его силой. Подготовимся к войне."
 skorgrim_dourhand_meeting: "Вам станет доступно [Concept('decision', 'решение')|E], позволяющее устроить коварную засаду, когда будете принимать его в качестве почётного гостя"
 skorgrim_dourhand_war: "Вам станет доступно [Concept('decision', 'решение')|E], позволяющее объявить войну за артефакт за Кольцо Власти"

 skorgrim_dourhand.0109.t: "Приглашение на пир"
 skorgrim_dourhand.0109.desc: "[skorgrim_dourhand.GetFirstName] [Select_CString(skorgrim_dourhand.IsFemale, 'отправила', 'отправил' )] к моему двору гонца с приглашением в чертоги [GetTitleByKey('c_zillinakhur').GetNameNoTier]. [skorgrim_dourhand.GetFirstName] утверждает, что восстановление [Concept('nogrod', 'Ногрода')|E] достигло важной вехи, и просит меня присутствовать, чтобы лично проинспектировать ход работ и отпраздновать процветание нашего общего будущего пиром.\n\nХотя для сюзерена традиционно наблюдать за такими событиями, время выбрано странное. [skorgrim_dourhand.GetFirstName] всегда [Select_CString(skorgrim_dourhand.IsFemale, 'была амбициозна', 'был амбициозен' )], и частная встреча в глубине [Select_CString(skorgrim_dourhand.IsFemale, 'её', 'его' )] собственной территории даёт [Select_CString(skorgrim_dourhand.IsFemale, 'ей', 'ему' )] тактическое преимущество, которого у [Select_CString(skorgrim_dourhand.IsFemale, 'неё', 'него' )] здесь нет. Тем не менее, отказ был бы публичным оскорблением клана [GetScriptedCharacterByHistoryID('lineofdourhand17').GetDynasty.GetName] и мог бы свидетельствовать об отсутствии доверия, что могло бы разрушить наш нынешний союз.\n\n[Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] ли я почтить [Select_CString(skorgrim_dourhand.IsFemale, 'её', 'его' )] чертоги своим присутствием или проявлю осторожность и останусь в безопасности своих собственных владений?"
 skorgrim_dourhand.0109.a: "Я пойду. Посмотрим, что он построил."
 skorgrim_dourhand.0109.b: "У меня есть дела поважнее. Я останусь здесь."
 skorgrim_dourhand_broadbeam_meeting: "#V Вы#!, #V [dwalin_V.GetFirstName]#!, отправитесь в [GetTitleByKey('c_zillinakhur').GetNameNoTier]."
 skorgrim_dourhand_broadbeam_meeting_refusal: "Вы отказываетесь от приглашения, потенциально оскорбив персонажа [skorgrim_dourhand.GetFirstName] и вызвав у него подозрения."

 skorgrim_dourhand.0110.t: "Прибытие во владение [GetTitleByKey('c_zillinakhur').GetNameNoTier]"
 skorgrim_dourhand.0110.desc: "Путешествие из провинции [GetTitleByKey('c_manakhrrukul').GetNameNoTier] было быстрым, мы ехали по древним каменным дорогам, которые ведут на юг через [Concept('bluemountains', 'Синие горы')|E]. Когда моя свита поднимается на последний гребень, впереди замаячили ворота чертога [GetTitleByKey('c_zillinakhur').GetNameNoTier]. Холодные. Внушительные. Свежевытесанные.\n\nВоздух здесь насыщен запахом древесного угля и ритмичным стуком молотков, что свидетельствует о труде, который [skorgrim_dourhand.GetFirstName] [Select_CString(skorgrim_dourhand.IsFemale, 'приложила', 'приложил' )] к этим руинам. Несмотря на внешние признаки оживления, встречающих у ворот необычно мало, а залы за ними кажутся тихими для места, отмечающего такую веху. [skorgrim_dourhand.GetFirstName] стоит на пороге с натянутой улыбкой на лице и жестом приглашает меня войти в [Select_CString(skorgrim_dourhand.IsFemale, 'её', 'его' )] владения."
 skorgrim_dourhand.0110.a: "Да начнётся праздник!"
 king_received_by_skorgrim: "[skorgrim_dourhand.GetShortUIName] принимает вас."

 # Skorgrim War
 skorgrim_war_for_dwarven_rings: "Порча Скоргрима"
 lotr_skorgrim_success_attacker_desc: "Вы успешно отняли Кольцо у персонажа [defender.GetShortUINamePossessive]"
 lotr_skorgrim_success_defender_desc: "[attacker.GetShortUINamePossessive] отнимает фамильное кольцо вашего клана"
 lotr_skorgrim_defeat_attacker_desc: "Не сумев отнять Кольцо у персонажа [defender.GetShortUINamePossessive], вы предрешили свою судьбу"
 lotr_skorgrim_defeat_defender_desc: "Вы сохраняете фамильное кольцо и клянётесь наказать персонажа [attacker.GetShortUINamePossessive] за измену"
 SKORGRIM_TREASON_WAR_NAME: "Порча Скоргрима"

 #Events after getting both Dwarven Rings

 skorgrim_dourhand.1000.t: "Судьба Колец"
 skorgrim_dourhand.1000.desc: "После успешного обретения [Concept('sevenringsofdwarves', 'Кольца Огнебородов')|E] и [Concept('sevenringsofdwarves', 'Кольца Широкозадов')|E] начинается следующий этап плана.\n\nСогласно первоначальному соглашению с [Concept('witchkingshort', 'Королём-чародеем')|E] он обещал мне невообразимые богатства и бессмертие в обмен на эти кольца, но простая передача их в обмен на обещания может не способствовать достижению нашей цели восстановления [Concept('nogrod', 'Ногрода')|E]. Возможно, Король-чародей вознаградит нас чем-нибудь... или, возможно, нет. Однако, я [Select_CString(ROOT.Char.IsFemale, 'могла', 'мог' )] бы оставить оба кольца себе и, используя их магию, восстановить Ногрод самостоятельно, по крайней мере теоретически, это хороший вариант. К сожалению, сохранение колец вызовет гнев Короля-чародея, и открытая война против него может привести к нашему уничтожению...\n\nВ любом случае, оба варианта сопряжены с определһнными рисками, но что мы можем сделать на данный момент? Наши родичи, и даже мой [GetTrait('dwarf_father').GetName( GetNullCharacter )|l] [dwalin_V.GetFirstNameRegnal] предан мной, и теперь [Concept('dwarves', 'гномы')|E] ненавидят меня за мои действия... После всего, что произошло, действительно ли оно того стоило? Только время покажет."
 skorgrim_dourhand.1000.a: "[Concept('witchkingshort', 'Король-чародей')|E] получит своё. Подготовиться к путешествию в Ангмар."
 skorgrim_dourhand.1000.b: "Почему мне нужно с ними расставаться? [Concept('witchkingshort', 'Королю-чародею')|E] нечего предложить из того, чего у меня уже нет."
 skorgrim_dourhand_travel_angmar: "#V Вы#!, #V [skorgrim_dourhand.GetName]#!, отправитесь в [GetTitleByKey('c_carn_dum').GetNameNoTier] и встретитесь с [Concept('witchkingshort', 'Королём-чародеем')|E] Ангмара."
 skorgrim_dourhand_keep_rings: "@warning_icon!#T #V Вы#!, #V [skorgrim_dourhand.GetName]#!, решаете оставить гномьи Кольца себе. Этот путь разгневает [Concept('witchkingshort', 'Короля-чародеем')|E] Ангмара и может привести к катастрофическим последствиям!"

 skorgrim_dourhand.1001.t: "Тёмный трон Карн-Дума"
 skorgrim_dourhand.1001.desc: "Я, наконец, [Select_CString(ROOT.Char.IsFemale, 'прибыла', 'прибыл' )] в [GetTitleByKey('c_carn_dum').GetNameNoTier], сердце [Concept('angmar', 'Ангмара')|E], и передо мной возвышается тёмная крепость. Когда я вхожу, большие двери быстро закрываются, и слуга проводит меня в тронный зал.\n\nТам восседает [Concept('witchkingshort', 'Король-чародей')|E], повелитель [Concept('income', 'nazgul')|E], с холодным взглядом. Он сидит в доспехах и ведёт себя вызывающе, его присутствие вызывает во мне смесь ужаса и боязни, которая овладевает мной, но я стараюсь сохранять спокойствие.\n\n«Ты [Select_CString(ROOT.Char.IsFemale, 'принесла', 'принёс' )] мне [Concept('sevenringsofdwarves', 'Кольца')|E]?» - говорит он хриплым и ужасным голосом.\n\n«Да, мой повелитель, оба. Я к вашим услугам», - отвечаю я. Затем снимаю оба кольца со своей руки и протягиваю их ему. Он берёт кольца с ещё большей жадностью, чем у меня, и надевает их себе на пальцы. Вскоре после этого он отвечает:\n\n«Ты [Select_CString(ROOT.Char.IsFemale, 'проделала', 'проделал' )] хорошую работу, не так ли? Я даже чувствую их силу, как у моего [Concept('nineringsofmenshort', 'кольца')|E]. А теперь позволь мне подумать о твоей награде, ха-ха-ха...»"
 skorgrim_dourhand.1001.a: "Я жду вашего ответа..."
 skorgrim_dourhand_carn_dum: "Вы передаёте [Concept('sevenringsofdwarves', 'Кольца гномов')|E] [Concept('witchkingshort', 'Королю-чародею')|E] и просите о выполнении соглашения"

 skorgrim_dourhand.1002.t: "Выполнить соглашение?"
 skorgrim_dourhand.1002.desc: "[skorgrim_dourhand.GetName] [Select_CString(skorgrim_dourhand.IsFemale, 'передала', 'передал' )] мне как [Concept('sevenringsofdwarves', 'Кольцо Огнебородов')|E], так и [Concept('sevenringsofdwarves', 'Кольцо Широкозадов')|E], и теперь [Select_CString(skorgrim_dourhand.IsFemale, 'она', 'он' )] просит о выполнении соглашения.\n\nМои обещания бессмертия и богатства были не более чем ложью, поскольку главной целью, которая теперь достигнута, было получение [Concept('sevenringsofdwarves', 'Колец гномов')|E] у кланов [Concept('bluemountains', 'Синих гор')|E].\n\nХотя очевидно, что [Select_CString(skorgrim_dourhand.IsFemale, 'она проделала', 'он проделал' )] всю работу, я, [Concept('witchkingshort', 'Король-чародей')|E] [Concept('angmar', 'Ангмара')|E], повелитель [Concept('nazgul', 'назгул')|E], не даю обещаний никому, и уж тем более смертным!\n\nВ любом случае, [Select_CString(skorgrim_dourhand.IsFemale, 'она зарекомендовала', 'он зарекомендовал' )] себя как [Select_CString(skorgrim_dourhand.IsFemale, 'ценная союзница', 'ценный союзник' )], и я мог бы просто предложить [Select_CString(skorgrim_dourhand.IsFemale, 'ей', 'ему' )] либо помощь в восстановлении [Concept('nogrod', 'Ногрода')|E], либо передать [GetTitleByKey('d_gundabad').GetNameNoTier], в обоих случаях в качестве моего вассала. Кроме того, [Select_CString(skorgrim_dourhand.IsFemale, 'она была', 'он был' )] бы у меня в долгу за моё милосердие."
 skorgrim_dourhand.1002.a: "Показать ему МОЁ бессмертие!"
 skorgrim_dourhand_death_wk: "[skorgrim_dourhand.GetName] будет [Select_CString(skorgrim_dourhand.IsFemale, 'заключена', 'заключён' )] в темницу и [Select_CString(skorgrim_dourhand.IsFemale, 'казнена', 'казнён' )]."
 skorgrim_dourhand.1002.b: "Ты хорошо [Select_CString(skorgrim_dourhand.IsFemale, 'справилась', 'справился' )], позволь мне предложить тебе вассалитет"
 skorgrim_dourhand_pact_wk: "[skorgrim_dourhand.GetName] будет предложен выбор: власть над владением [GetTitleByKey('d_gundabad').GetNameNoTier] или помощь в восстановлении [Concept('nogrod', 'Ногрода')|E]."

 skorgrim_dourhand.1003.t: "Обретение бессмертия"
 skorgrim_dourhand.1003.desc: "\nНемного подумав, он заявляет, что его часть соглашения ждёт в соседней комнате, и приказывает мне идти туда.\n\nОказавшись внутри, он говорит: «Ты действительно думаешь, что я собираюсь вознаградить ТЕБЯ? Я покажу тебе, как обрести бессмертие и богатство!» Его стражники схватили меня, и затем я [Select_CString(ROOT.Char.IsFemale, 'была вынуждена', 'был вынужден' )] отправиться в подземелья.\n\nВскоре после этого я [Select_CString(ROOT.Char.IsFemale, 'оказалась', 'оказался' )] в тёмных подземельях крепости [GetTitleByKey('c_carn_dum').GetNameNoTier], а Король-чародей занес надо мной свой моргульский клинок.\n\nЯ украл два [Concept('sevenringsofdwarves', 'гномьих Кольца')|E], одно у моего клана, и, в конце концов, это зря? Вся работа, которую можно было бы проделать для [Concept('nogrod', 'Ногрода')|E], возможно, восстановить его былую славу... всё напрасно.\n\nМне становится холодно, и всё становится размытым... Для меня это конец..."
 skorgrim_dourhand.1003.a: "НЕТ!"



 decision_skorgrim_dourhand_alliance_khathzaibriz_tooltip: "Найти союзников среди #L [GetFaithByKey('faith_firebeards').GetName|l]их#! Огнебородов"
 decision_skorgrim_dourhand_alliance_khathzaibriz_desc: "Если я хочу преуспеть в своём начинании, мне понадобятся союзники.\n\nЕсли [GetTitleByKey('c_ibriz_garan').GetHolder.GetFirstName] из [GetTitleByKey('c_ibriz_garan').GetNameNoTier], возглавляющий моих родичей из чила Огнебородов получит от меня предложение взять под свой контроль часть [Concept('nogrod', 'Ногрода')|E], их родового чертога, это должно помочь привлечь их под моё начало.\n\nЕсли у них всё ещё не хватает духу для моих целей, я мог бы предложить, чтобы [GetTitleByKey('c_ibriz_garan').GetHolder.GetFirstNameNoTooltip] выдал за меня свою дочь, укрепив наши кровные узы и продемонстрировав мою приверженность общему наследию."
 decision_skorgrim_dourhand_alliance_khathzaibriz_confirm: "Наверняка потомки Дозорного проявят благоразумие."
 decision_skorgrim_dourhand_alliance_khathzaibriz_accepted: "Договор скреплён. Наши дома будут стоять как два столпа Эред-Луин."
 decision_skorgrim_dourhand_alliance_khathzaibriz_refused: "Они смеют отказываться от моего предложения?! Я не забуду этого оскорбления..."


 decision_skorgrim_dourhand_alliance_dourhand_tooltip: "Найти союзников среди членов вашего дома"
 decision_skorgrim_dourhand_alliance_dourhand_desc: "Я покинул владения нашего #TOOLTIP:GAME_TRAIT,dwarf_father,[GetNullCharacter] #L праотца#!#! #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineofdwalinV').GetID] #L Двалина V#!#!, преследуя свои собственные цели, но мой родич [GetTitleByKey('c_kairshadig').GetHolder.GetFirstName] остаётся главой клана [GetScriptedCharacterByHistoryID('lineofdourhand17').GetDynasty.GetName] в провинции [GetTitleByKey('c_kairshadig').GetNameNoTier].\n\nХотя наши прадеды были братьями, отдалённость между нашими ветвями стала слишком большой. Поскольку я не могу предложить им брак, мы станем братьями по оружию, если не по крови.\n\nЕсли [GetTitleByKey('c_kairshadig').GetHolder.GetFirstNameNoTooltip] получит от меня предложение разделить стремление к расширению наших границ и обеспечению безопасности нашего рода, я могу объединить Крепкохватов под одним грозным знаменем."

 decision_skorgrim_dourhand_alliance_dourhand_accepted: "Соглашение заключено. Наши владения будут объединены кровью и амбициями."
 decision_skorgrim_dourhand_alliance_dourhand_refused: "Он предпочёл своё жалкое горное жилище будущему величию... Что за глупец!"

 decision_skorgrim_dourhand_alliance_kharol_tooltip: "Найти союзников среди менее известных домов Широкозадов"
 decision_skorgrim_dourhand_alliance_kharol_desc: "Дом [GetScriptedCharacterByHistoryID('linekharol51').GetDynasty.GetName] - гордый и благородный род, но им не хватает величия, которое, по их мнению, им причитается.\n\nВ то время как их нынешний правитель [GetTitleByKey('c_fahamgathol').GetHolder.GetFirstName] уже связан с моим родом браком - [GetTitleByKey('c_kairshadig').GetHolder.GetFirstName] выдал за него свою сестру, моя собственная ветвь остаётся отдельной.\n\nЯ мог бы предложить, чтобы [GetTitleByKey('c_fahamgathol').GetHolder.GetFirstNameNoTooltip] выдал за меня свою сестру, но другие пути также остаются открытыми для меня."
 decision_skorgrim_dourhand_alliance_kharol_confirm: "Предложение о повышении статуса. Разве от такого можно отказаться?"
 decision_skorgrim_dourhand_alliance_kharol_accepted: "Теперь наши дома связаны, а вместе с ними и наше будущее в Эред-Луин."
 decision_skorgrim_dourhand_alliance_kharol_refused: "Похоже, я переоценил их амбиции... Со временем они станут свидетелями собственной глупости."



 # Tanturkai Intro
 lotr_intro_events.8001.t: "Кровавая десятина"
 lotr_intro_events.8001.desc: "На протяжении более 400 лет южные [usurper.GetHouse.GetName] и северные [old_king.GetHouse.GetName] без конца сражались за корону #ONCLICK:TITLE,k_tanturak #TOOLTIP:LANDED_TITLE,k_tanturak #L Тантурака#!#!#!. Казалось, что [usurper.GetTitledFirstName] [usurper.GetHouse.GetName] получит власть, когда [old_king.GetHouse.GetName] [Select_CString(old_king.IsFemale, 'была свергнута', 'был свергнут' )], однако вместо этого держава погрузилась в тотальную гражданскую войну.\n\nДействительно, северные дома #ONCLICK:TITLE,k_tanturak #TOOLTIP:LANDED_TITLE,k_tanturak #L Тантурака#!#!#!, во многих из которых текла кровь рода [old_king.GetHouse.GetName], были возмущены тем, настолько [Select_CString(usurper.IsFemale, 'жестокой оказалась молодая узурпаторша', 'жестоким оказался молодой узурпатор' )] [usurper.GetTitledFirstName]. Увидев в этом возможность возвыситься и потребовать кровавую корону своих предков, [claimant.GetTitledFirstName] [Select_CString(claimant.IsFemale, 'сплотила', 'сплотил' )] северные дома под своими знамёнами, ссылаясь на свой статус [Select_CString(claimant.IsFemale, 'ближайшей наследницы', 'ближайшего наследника' )] мужского пола рода [old_king.GetHouse.GetName], [Select_CString(claimant.IsFemale, 'которая', 'который' )] всё ещё [Select_CString(claimant.IsFemale, 'жива', 'жив' )], чтобы поддержать свои притязания.\n\nТем не менее, по мере того, как властители гордого и жестокого #ONCLICK:TITLE,k_tanturak #TOOLTIP:LANDED_TITLE,k_tanturak #L Тантурака#!#!#! поднимают оружие друг против друга, их долго угнетаемые рабы из числа коренного населения начинают видеть в этом хаосе шанс, наконец, разорвать свои цепи..."
 lotr_intro_events.8001.a: "#italic Я#! - король! #italic Единственный#! король!"
 tanturak_civil_war_rebellion_danger: "#N До тех пор, пока продолжается гражданская война за #V [GetTitleByKey('k_tanturak').GetNameNoTier]#!, оба королевства будут медленно, но верно распадаться под тяжестью восстания коренного населения. #V Через 10 лет, если гражданская война не закончится, ничего не останется.#!#!"






 ### Situtation Flavor Events###

 angmar_wars.2001.t: "Набеги орков!"
 angmar_wars.2001.desc: "Сошедшие с [Concept('mistymountains', 'Мглистых гор')|E] орки долгое время были чумой [Concept('eriador', 'Эриадора')|E], начиная со [Concept('elderdays', 'Старших Дней')|E], и они снова напали на нашу державу. На этот раз они совершили набег на владение [disaster_county.GetNameNoTier]. Нам предстоит решить, как реагировать."
 angmar_wars.2001.a: "Собрать войска!"
 angmar_wars.2001.b: "[marshal.GetName], я доверяю эту задачу вам."
 biulding_destroyed: "Случайное [Concept('building', 'здание')|E] снизит уровень или будет уничтожено"

 angmar_wars.2002.t: "Набеги разбойников!"
 angmar_wars.2002.desc: "[Concept('eriador', 'Эриадор')|E] - опасное место, поскольку из-за раскола [Concept('arnor', 'Арнора')|E] между местными властителями и государствами-преемниками не было сотрудничества, что позволило набегам разбойников через границу стать обычным делом, на этот раз были замечены налётчики, направляющиеся в сторону владения [disaster_county.GetNameNoTier]. Пришло время решить, как реагировать."
 angmar_wars.2002.a: "Собрать войска!"
 angmar_wars.2002.b: "[marshal.GetName], я доверяю эту задачу вам."
 angmar_wars.2002.c: "Если они хотят золото, отдадим его им."

 angmar_wars.2003.t: "Молодой пастух"
 angmar_wars.2003.desc: "Когда мы осматриваем руины деревни, оставшиеся после налета, к нам подходит молодой парень. Он был пастухом, который пас свое стадо в окрестностях деревни. На моих глазах он подошел к сгоревшему дому и разрыдался, увидев тела молодой пары и двух детей, которых мои солдаты до сих пор не похоронили. Очевидно, что произошло, но не очевидно, как я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] реагировать."
 angmar_wars.2003.a: "Он останется при дворе, ни один ребенок не заслуживает того, чтобы быть сиротой."
 angmar_wars.2003.b: "Отослать его в королевские владения, там он может пригодиться."

 angmar_wars.2004.t: "Крестьяне покидают пограничье"
 angmar_wars.2004.desc: "[Concept('eriador', 'Эриадор')|E] пришёл в упадок после распада [Concept('arnor', 'Арнора')|E]. С каждым годом всё больше наших сыновей и дочерей гибнет в [Concept('angmar_wars', 'Ангмарских войнах')|E], и с каждым годом все больше и больше наших земель оказываются заброшенными. По мере того, как дикая природа вторгается в наши границы, люди отступают на более безопасные территории в глубь страны, и в этом году жители владения [county1.GetNameNoTier] решили переселиться во владение [county2.GetNameNoTier]. мы можем либо позволить им уйти, либо заставить их остаться в этих землях."
 angmar_wars.2004.a: "Позволить им переселиться."
 angmar_wars.2004.b: "Заставить их остаться."
 biulding_destroyed_county_1: "Во владении [county1.GetName] будет понижено или уничтожено случайное [Concept('building', 'здание')|E]"
 biulding_add_county_2: "Во владении [biuld_prov.GetName] будет создано или улучшено случайное [Concept('building', 'здание')|E]"





 angmar_wars.0001.t: "Ангмарские войны"
 angmar_wars.0001.desc: "#TOLKIENQUOTE «Зло пришло в Арнор в начале правления Малвегиля Артедайнского. В то время на севере за Тролльим плато появилось королевство Ангмар. Его земли простирались от подножия Ангмарских гор на северной оконечности Мглистых гор, по обе стороны хребта. И много людей, орков и прочих свирепых тварей собралось там. Владыка тех земель был известен лишь как Король-чародей, и лишь после стало известно, что то был предводитель Кольценосцев. Выбор предводителя назгул объяснялся тем, что Арнор был в упадке, а Гондор на юге до сих пор сохранял былое могущество».#!\n\n#QUOTEDCHARACTER - Властелин колец, Приложение A#!"
 angmar_wars.0001.a: "Арнор должен выстоять!"
 angmar_wars.0001.b: "[Concept('dunedain', 'Дунэдайн')|E] падут!"
 angmar_wars.0001.c: "Мы защитим наши земли!"

