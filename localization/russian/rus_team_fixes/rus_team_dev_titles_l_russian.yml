 ### Decision Events ####
 
 angmar_wars.1020.t: "The Frontier of [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseNameNoTier]"
 angmar_wars.1020.desc: "My people in [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseName] have long been under constant threat, and the years have taken their toll upon the region. Now the duchy is little more than a shadow of its former self, and its population are scarcely surviving each winter. Should I recall them back to our heartlands in [GetPlayer.MakeScope.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetDeJureLiege.GetBaseNameNoTier] they would be at less risk and better able to help our realm.\n\nYet there are perhaps lords such as [county_lord.GetName] who would object to a forced relocation, whether for love of their ancestral land, a desire not to flee the front lines, or simply stubbornness. All such detractors will need to be convinced somehow for my plan to work."
 angmar_wars.1020.a: "They are #EMP my#! subjects, and they shall do as I say!"
 angmar_wars.1020.b: "Perhaps an explanation of the dangers at hand will convince them."
 angmar_wars.1020.b.tt: ""
 angmar_wars.1020.c: "I shall offer incentives to all those who will move."
 angmar_wars.1020.c.tt.1: ""
 angmar_wars.1020.c.tt.2: ""
 angmar_wars.1020.d: "[county_lord.GetTitledFirstName] is the only one whose opinion truely matters."
 angmar_wars.1020.e: "My own authority is all that matters"

 angmar_wars.1021.t: "A Demand from [GetPlayer.MakeScope.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier]"
 angmar_wars.1021.desc: "[county_lord.GetName] vs [king.GetName]"
 angmar_wars.1021.a: "Yes my liege"
 angmar_wars.1021.b: "Fine."
 angmar_wars.1021.c: "I'm outa here"
 angmar_wars.1021.d: "Freedom!"
 angmar_wars.1021.e: "We have no choice"

 angmar_wars.1022.t: "The Duty of a True Lord"
 angmar_wars.1022.desc: "[county_lord.GetName] sees the wisdom in my orders to evacuate [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseNameNoTier], but will not himself journey to safety in [king.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier]. According to his message, he will no longer serve a king who cannot defend his own lands, and if I shall not do so, he will take up the sword himself. No fief shall be his home as of yet, and he and his family shall instead roam the lands where once they lived. \n\nWhile his cause may seem noble, I wonder what he sees in [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseNameNoTier] that would make him abandon his people and oaths for the cold bed of the road."
 angmar_wars.1022.a: "If he wishes to rule the wild, let him!"
 angmar_wars.1022.b: "He dares insult my rule?"
 angmar_wars.1022.c: "I can defend my realm perfectly well against traitors such as you!"

 angmar_wars.1023.t: "King didn't like that"
 angmar_wars.1023.desc: ""
 angmar_wars.1023.a: ""

 angmar_wars.1024.t: "[county_lord.GetFirstNamePossessive] Rebellion"
 angmar_wars.1024.desc: "It appears my orders were too much for [county_lord.GetName], for he has declared independence from [ROOT.Char.GetPrimaryTitle.GetName], saying that if I shall not protect his lands, he will do so alone!\n\nSuch a slight gravely weakens my rule, but can my realm afford the required war to restore our honour?"
 angmar_wars.1024.a: "If he will not obey, he must be made to do so!"
 angmar_wars.1024.b: "Now is not the time for bloodshed"

 angmar_wars.1025.t: "Oops"
 angmar_wars.1025.desc: ""
 angmar_wars.1025.a: ""

 angmar_wars.1026.t: "[county_lord.GetTitledFirstName] Accepts"
 angmar_wars.1026.desc: "[county_lord.GetName] has seen the wisdom of my arguments and graciously followed my orders to evacuate the [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseName]. Now [county_lord.GetSheHe] stands before me in [king.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier], leading the last line of refugees to their new home.\n\n[county_lord.GetSheHe|U] too is homeless, and I have land aplenty of my own. Should I reward [county_lord.GetHerHis] loyalty with new grants from my own holdings?"
 angmar_wars.1026.a: "[first_reward_target.GetBaseNameNoTier] should suit."
 angmar_wars.1026.b: "How about [second_reward_target.GetBaseNameNoTier]?"
 angmar_wars.1026.c: "[third_reward_target.GetBaseNameNoTier] would be best for [county_lord.GetHerHim]."
 angmar_wars.1026.d: "A place at my court is reward enough."

 angmar_wars.1027.t: "A Generous Offer"
 angmar_wars.1027.desc: "[king.GetTitledFirstName] has seen it fit to graciously reward me for my loyalty and assistance in evacuating the [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseName]. Messengers have come from [king.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier], announcing that should I wish it, the [reward_county.GetBaseName] is to be the new fief of mine and mine heirs, so long as this realm shall last. I am grateful for the offer, but could it ever replace my old home?"
 angmar_wars.1027.a: "I shall settle anew in [reward_county.GetBaseNameNoTier]."
 angmar_wars.1027.b: "The road shall be home enough for me."

 angmar_wars.1028.t: "A Wanderer in the Wild"
 angmar_wars.1028.desc: "It would seem that [reward_county.GetBaseNameNoTier] was not enough to tempt [county_lord.GetFirstName], for he has declared that no fief shall be his home as of yet, and he and his family shall instead roam the lands where once they live. While I admire his dedication, I do wonder what he sees in [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseNameNoTier] that would make him abjure the comforts of civilisation for the cold bed of the road."
 angmar_wars.1028.a: "May he find peace in his wanderings"

