 kin_strife.0002.t: "Гондор в огне"
 kin_strife.0002.desc: "Из земель Гондора пришли новости. Давно назревавший спор о наследовании гондорского трона достиг апогея, и теперь между фракциями при гондорском дворе разразилась открытая война. Сейчас никто не может сказать, как долго продлится война, но на данный момент тяжёлый взор Гондора устремлён вовнутрь, поскольку их собственный дом трещит по швам и балансирует на грани краха.\n\nЭто даёт редкую возможность, если мы захотим ею воспользоваться. Мы могли бы попытаться, наконец, сбросить иго Гондора и обрести независимость. Однако такой шаг со временем может повлечь за собой суровое возмездие, если ущерб от гражданской войны не будет серьёзным. В качестве альтернативы, мы могли бы выждать время, прежде чем начать действовать, и, возможно, даже поторговаться с одной из фракций об уступках в обмен на нашу помощь..."
 kin_strife.0002.a: "Время пришло, мы больше не преклонимся перед Крылатой короной!"
 kin_strife.0002.b: "Не стоит торопиться. Нужно выждать и оценить наши возможности."

