 angmar_wars.0050.t: "$ANTI_ANGMAR_COALITION$"
 angmar_wars.0050.desc.elven: "В последнее время истинная сила [Concept('angmar', 'Ангмара')|E] стала очевидной, и ясно, что этот [GetTitleByKey('k_angmar').GetHolder.GetNickname] гораздо опаснее, чем мы [Concept('elves', 'эльфы')|E] сначала предполагали. Будь то [Concept('man', 'человек')|E] или [Concept('orc', 'орк')|E], или, возможно, даже один из [Concept('nazgul', 'назгул')|E], север быстро подпал под его власть, и теперь [Concept('arnor', 'Арнор')|E] тоже близок к катастрофе.\n\n[elven_ruler.GetPrimaryTitle.GetNameNoTier] не может больше оставаться в изоляции, оставив сражения [Concept('men', 'людям')|E]. Мои воины начали собираться для битвы, и по всему владению [elven_ruler.GetCapitalLocation.GetTitle.GetDeJureLiege.GetNameNoTier] раздаются звуки их труб. Мы выступим в поход, как в последний раз это делали во времена #TOOLTIP:CHARACTER,[GetScriptedCharacterByHistoryID('lineoforodreth4').GetID] #L Гиль-галада#!#!, где [arnorian_ruler.GetName] уже давно ждёт на нашей помощи, чтобы развеять эту тьму. Пусть никто не говорит, что [elven_ruler.GetFirstName] стоит в стороне, пока гибнут [Concept('dunedain', 'дунэдайн')|E]!"
 angmar_wars.0050.desc.arnor: ""
 angmar_wars.0050.a: "Пусть воинства эльдар выступят в поход!"
 angmar_wars.0050.b: "Наконец-то пришло избавление!"

 angmar_wars.0051.t: "Конец Северной коалиции"
 angmar_wars.0051.desc: "Наконец-то угроза со стороны [Concept('angmar', 'Ангмара')|E] была отброшена, и [GetTitleByKey('k_angmar').GetHolder.GetNickname] был вынужден отступить в [GetTitleByKey('k_angmar').GetHolder.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier]. Наши усилия увенчались успехом, и [Concept('arnor', 'Арнор')|E] получит передышку на некоторое время.\n\nС прекращением военных действий настал час [Concept('elves', 'эльфам')|E] вернуться домой, в [elven_ruler.GetPrimaryTitle.GetNameNoTier], а [Concept('dunedain', 'дунэдайн')|E] начать отстраиваться. Однако, если [GetTitleByKey('k_angmar').GetName] снова поднимется и будет угрожать нашим землям, эльфы [Concept('eriador', 'Эриадора')|E] тоже возьмутся за оружие, чтобы прийти на помощь."
 angmar_wars.0051.a: "Наконец-то на какое-то время воцарился мир."
 angmar_wars.0051.b: "Мы снова остались одни."

 ### Decision Events ####
 
 angmar_wars.1020.t: "#L [GetPlayer.MakeScope.Var('selected_duchy').Title.GetAdjective|l]ое#! приграничье"
 angmar_wars.1020.desc: "Мой народ в провинции [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseName] долгое время находился под постоянной угрозой, и прошедшие годы наложили свой отпечаток на регион. Сейчас от герцогства осталась лишь тень, а его население с трудом выживает каждую зиму. [Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] ли я отозвать их обратно в наши родные края во владение [GetPlayer.MakeScope.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetDeJureLiege.GetBaseNameNoTier], где они подвергались бы меньшему риску и могли бы лучше помочь нашей державе.\n\nОднако, возможно, есть властители, такие как [county_lord.GetName], которые выступят против принудительного переселения, будь то из любви к земле своих предков, желания не покидать линию фронта или просто из упрямства. Всех таких недоброжелателей нужно будет каким-то образом убедить, чтобы мой план сработал."
 angmar_wars.1020.a: "Они #EMP мои#! подданные, и они будут делать то, что я скажу!"
 angmar_wars.1020.b: "Возможно, объяснение предстоящих опасностей убедит их."
 angmar_wars.1020.b.tt: ""
 angmar_wars.1020.c: "Я предложу поощрения всем тем, кто переедет."
 angmar_wars.1020.c.tt.1: ""
 angmar_wars.1020.c.tt.2: ""
 angmar_wars.1020.d: "[county_lord.GetTitledFirstName] - [Select_CString(county_lord.IsFemale, 'единственная', 'единственный' )], чьё мнение действительно имеет значение."
 angmar_wars.1020.e: "Мой собственный авторитет - это всё, что имеет значение."

 angmar_wars.1021.t: "Требование из владения [GetPlayer.MakeScope.Char.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier]"
 angmar_wars.1021.desc: "[county_lord.GetName] vs [king.GetName]"
 angmar_wars.1021.a: "Да, мой сюзерен."
 angmar_wars.1021.b: "Прекрасно."
 angmar_wars.1021.c: "Самое время."
 angmar_wars.1021.d: "Свобода!"
 angmar_wars.1021.e: "У нас нет выбора"

 angmar_wars.1022.t: "Долг [Select_CString(county_lord.IsFemale, 'истинной владычицы', 'истинного владыки' )]"
 angmar_wars.1022.desc: "[county_lord.GetName] видит мудрость в моем приказе об эвакуации провинции [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseNameNoTier], но [Select_CString(county_lord.IsFemale, 'сама', 'сам' )] не отправится в безопасное место во владении [king.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier]. Согласно [Select_CString(county_lord.IsFemale, 'её', 'его' )] посланию, [Select_CString(county_lord.IsFemale, 'она', 'он' )] больше не будет служить [Select_CString(ROOT.Char.IsFemale, 'королеве, которая', 'королю, который' )] не может защитить свои собственные земли, и если я этого не сделаю, [Select_CString(county_lord.IsFemale, 'она сама', 'он сам' )] возьмется за меч. Пока что ни одно поместье не будет [Select_CString(county_lord.IsFemale, 'её', 'его' )] домом, и вместо этого [Select_CString(county_lord.IsFemale, 'она и её', 'он и его' )] семья будут бродить по землям, где когда-то жили.\n\nХотя [Select_CString(county_lord.IsFemale, 'её', 'его' )] цель может показаться благородной, мне интересно, что [Select_CString(county_lord.IsFemale, 'она', 'он' )] видит в провинции, что заставило [Select_CString(county_lord.IsFemale, 'её', 'его' )] отказаться от своего народа и клятв ради холодного дорожного ложа."
 angmar_wars.1022.a: "Если [Select_CString(county_lord.IsFemale, 'она', 'он' )] хочет править глухоманью, пусть правит!"
 angmar_wars.1022.b: "[Select_CString(county_lord.IsFemale, 'Она', 'Он' )] осмеливается оскорблять мою власть?"
 angmar_wars.1022.c: "Я прекрасно могу защитить свою державу от таких изменников, как вы!"

 angmar_wars.1023.t: "Королевское неодобрение"
 angmar_wars.1023.desc: ""
 angmar_wars.1023.a: ""

 angmar_wars.1024.t: "[county_lord.GetFirstName] [Select_CString(county_lord.IsFemale, 'восстала', 'восстал' )]"
 angmar_wars.1024.desc: "Похоже, что [county_lord.GetName] [Select_CString(county_lord.IsFemale, 'сочла', 'счёл' )] мои приказы непосильными, поскольку [Select_CString(county_lord.IsFemale, 'она объявила', 'он объявил' )] о независимости от державы [ROOT.Char.GetPrimaryTitle.GetName], заявив, что если я не буду защищать [Select_CString(county_lord.IsFemale, 'её', 'его' )] земли, [Select_CString(county_lord.IsFemale, 'она', 'он' )] сделает это в одиночку!\n\nТакое пренебрежение серьёзно ослабляет мою власть, но может ли моя держава позволить себе войну, необходимую для восстановления нашей чести?"
 angmar_wars.1024.a: "Если [Select_CString(county_lord.IsFemale, 'она', 'он' )] не желает подчиняться, [Select_CString(county_lord.IsFemale, 'её', 'его' )] нужно заставить это сделать!"
 angmar_wars.1024.b: "Сейчас не время для кровопролития."

 angmar_wars.1025.t: "Oops"
 angmar_wars.1025.desc: ""
 angmar_wars.1025.a: ""

 angmar_wars.1026.t: "[county_lord.GetTitledFirstName] соглашается"
 angmar_wars.1026.desc: "[county_lord.GetName] [Select_CString(county_lord.IsFemale, 'оценила', 'оценил' )] мудрость моих аргументов и любезно [Select_CString(county_lord.IsFemale, 'выполнила', 'выполнил' )] мой приказ об эвакуации провинции [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseName]. Сейчас [county_lord.GetSheHe] [Select_CString(county_lord.IsFemale, 'предстала', 'предстал' )] передо мной во владении [king.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier], возглавляя последнюю колонну беженцев, направляющихся в их новый дом.\n\n[county_lord.GetSheHe|U] тоже [Select_CString(county_lord.IsFemale, 'лишилась', 'лишился' )] крова, а у меня предостаточно земли. [Select_CString(ROOT.Char.IsFemale, 'Должна', 'Должен' )] ли я вознаградить [county_lord.GetHerHis] за преданность новыми дарами из моих собственных владений?"
 angmar_wars.1026.a: "[first_reward_target.GetBaseNameNoTier] вполне подойдёт."
 angmar_wars.1026.b: "Что насчёт владения [second_reward_target.GetBaseNameNoTier]?"
 angmar_wars.1026.c: "[third_reward_target.GetBaseNameNoTier] лучше всего подойдёт для н[county_lord.GetHerHis]."
 angmar_wars.1026.d: "Место при моём дворе - достаточная награда."

 angmar_wars.1027.t: "Щедрое предложение"
 angmar_wars.1027.desc: "[king.GetTitledFirstName] [Select_CString(king.IsFemale, 'сочла', 'счёл' )] нужным щедро вознаградить меня за мою преданность и помощь в эвакуации провинции [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseName]. Из владения [king.GetCapitalLocation.GetTitle.GetDeJureLiege.GetBaseNameNoTier] прибыли гонцы, объявившие, что, если я того пожелаю, [reward_county.GetBaseName] станет моей новой вотчиной, которая перейдёт и моим наследникам, до тех пор, пока будет существовать эта держава. Я [Select_CString(ROOT.Char.IsFemale, 'благодарна', 'благодарен' )] за предложение, но смогут ли эти земли когда-нибудь заменить мой старый дом?"
 angmar_wars.1027.a: "Я осяду во владении [reward_county.GetBaseNameNoTier]."
 angmar_wars.1027.b: "Дорога станет моим новым домом."

 angmar_wars.1028.t: "[Select_CString(county_lord.IsFemale, 'Странница', 'Странник' )] в глуши"
 angmar_wars.1028.desc: "Кажется, провинции [reward_county.GetBaseNameNoTier] оказалось недостаточно, чтобы соблазнить [county_lord.GetHerHis], ибо [county_lord.GetFirstName] [Select_CString(county_lord.IsFemale, 'заявила', 'заявил' )], что пока ни одно поместье не станет [county_lord.GetHerHis] домом, и вместо этого [county_lord.GetSheHe] и [county_lord.GetHerHis] семья будут бродить по землям, где когда-то жили. Хотя я восхищаюсь [county_lord.GetHerHis] преданностью делу, мне действительно интересно, что [county_lord.GetSheHe] [Select_CString(county_lord.IsFemale, 'нашла', 'нашёл' )] во владении [GetPlayer.MakeScope.Var('selected_duchy').Title.GetBaseNameNoTier] такого, что заставило [county_lord.GetHerHis] отказаться от удобств цивилизации ради холодной дороги."
 angmar_wars.1028.a: "Пусть [county_lord.GetSheHe] обретёт покой в своих странствиях."

