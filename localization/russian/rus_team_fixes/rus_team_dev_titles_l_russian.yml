 activity_balan_lai:0 "Заседание Балан-Лай"
 activity_balan_lai_desc:0 "Созыв заседания [balan_lai|E] объединяет самых влиятельных принцев [Concept('thanihazad', 'Тани-Хазада')|E] для обсуждения насущных проблем и выработки общей политики.\n\nЭто время для представления и обсуждения стратегий, направленных на общее благо, а также возможность укрепить альянсы, выявить соперничество и принять участие в тонком танце политических интриг.\n\nЗаседания совета становятся ареной, где сосуществуют единство и амбиции, где каждый член стремится придать форму будущему, защищая при этом свои собственные интересы."
 activity_balan_lai_selection_tooltip:1 "TODO"

 activity_balan_lai_not_on_member_cooldown:0 "Вы - [GetTrait('balan_lai_member').GetName( GetNullCharacter )|l] и последнее заседание проведено более 10 лет назад"
 activity_balan_lai_not_on_leader_cooldown:0 "Вы - [GetTitleByKey('d_balan_lai_leader').GetNameNoTier] и последнее заседание проведено более 5 лет назад"

 TRAVEL_NAME_FOR_activity_balan_lai:0 "Путешествие [Select_CString(Character.IsLocalPlayer, '', 'персонажа ' )][Character.GetNamePossessiveOrMy][Select_CString(Character.IsLocalPlayer, 'его персонажа', '' )] на заседание Балан-Лай"

 balan_lai_member_relation:0 "Член совета Балан-Лай"

 # Province Descs

 activity_balan_lai_destination_selection: "\nЗаседания совета могут быть проведены в [Concept('capital', 'столице')|E] державы любого члена совета или в древней резиденции [balan_lai|E] во владении [GetTitleByKey('c_mispir').GetNameNoTier]."
 activity_balan_lai_province_desc:1 "#V Вы отправитесь на заседание совета во владении [ROOT.Province.GetName].#!\n\n"
 activity_balan_lai_province_desc_here:1 "#V Вы приступаете к приготовлениям во владении [ROOT.Province.GetName].#!\n\n"
 activity_balan_lai_province_desc_mispir:0 "#V Возможные награды#! при #V проведении заседания#! в #highlight древней резиденции Балан-Лай#! \n$BULLET_WITH_TAB$ Прогресс к фазе борьбы #V Статус-кво#!\n$BULLET_WITH_TAB$ @gold_icon! #P Сниженная стоимость проведения занятия#!\n$BULLET_WITH_TAB$ @legitimacy_icon! #P Прирост легитимности#!"
 activity_balan_lai_province_desc_capital:0 "#V Возможные награды#! при #V проведении заседания#! в #highlight вашей столице:#!\n$BULLET_WITH_TAB$ Прогресс к фазе борьбы #V Разобщённость#!\n$BULLET_WITH_TAB$ @opinion_icon! #P Улучшение мнения#!\n$BULLET_WITH_TAB$ @prestige_icon! #P Прирост престижа#!"
 activity_balan_lai_province_desc_other_capital:0 "#V Возможные награды#! при #V проведении заседания#! в #highlight чужеземной столице:#!\n$BULLET_WITH_TAB$ Прогресс к фазе борьбы #V Единство#!\n$BULLET_WITH_TAB$ @weak_hook_icon! #P Слабое влияние на владельца локации#!\n$BULLET_WITH_TAB$ @gold_icon! #N Повышенная стоимость проведения занятия#!\n#V [ROOT.Province.GetTitle.GetHolder.GetName] получит:#!\n$BULLET_WITH_TAB$ @opinion_icon! #P Прирост мнения#!\n$BULLET_WITH_TAB$ @prestige_icon! #P Прирост престижа#!"

 # Group Rules
 activity_balan_lai_guest_help_text:0 "Присутствующие члены совета [balan_lai|E] будут выстраивать дипломатию и плести интриги на заседании в соответствии с выбранными ими [Concept('intent', 'намерениями')|E].\n\nУ других [Concept('activity_guests', 'гостей')|E] будет возможность побеседовать и, возможно, оказать воздействие на членов совета."
 activity_invite_rule_balan_lai_leader:0 "Глава совета"
 activity_invite_rule_balan_lai_members:0 "Члены совета"
 activity_invite_rule_balan_lai_prospective_members:0 "Потенциальные члены совета"

 # Activity Options
 balan_lai_option_leverage:0 "Воздействие"
 balan_lai_leverage_none:0 "Благородная сдержанность"
 balan_lai_leverage_none_desc:0 "Средства не будут выделены, что отражает желание сосредоточиться на дипломатии и убеждении в отношении неэтичного подкупа.\n\n#weak «Мы должны полагаться на слова, а не на монеты»#!"
 balan_lai_leverage_small:0 "Стратегические дары"
 balan_lai_leverage_small_desc:0 "Разумная сумма незаметно отложена для облегчения переговоров и получения дополнительных голосов там, где это необходимо.\n\n#weak «Небольшой стимул никогда не повредит»#!"
 balan_lai_leverage_large:0 "Влияние золота"
 balan_lai_leverage_large_desc:0 "Значительные ресурсы направлены на обеспечение поддержки, что позволяет незаметно влиять на решения совета с помощью множества удачных даров.\n\n#weak «За влияние приходится платить»#!"

 balan_lai_option_entertainment:0 "Расходы на организацию"
 balan_lai_hosting_cheap:0 "Скромное мероприятие"
 balan_lai_hosting_cheap_desc:0 "Базовые приготовления и упор на функциональность, а не на изысканность, с простыми блюдами и скромными развлечениями.\n\n#weak «Суть важнее стиля...»#!"
 balan_lai_hosting_normal:0 "Солидные затраты"
 balan_lai_hosting_normal_desc:0 "Сбалансированный подход, предлагающий достаточный комфорт и развлечения, чтобы оставить положительное впечатление.\n\n#weak «Комфорт и развлечения»#!"
 balan_lai_hosting_grand:0 "Демонстрация роскоши"
 balan_lai_hosting_grand_desc:0 "Мы не пожалеем средств, устроив роскошные пиры и грандиозные развлечения, призванные поразить и произвести впечатление.\n\n#weak «Пусть об этом будут говорить долгие годы!»#!"

 balan_lai_option_party_size:0 "Свита"
 balan_lai_party_size_few:0 "Одиночная делегация"
 balan_lai_party_size_few_desc:0 "Путешествовать в одиночку, уделяя особое внимание личному подходу и самостоятельности.\n\n#weak «Уединённое присутствие, сдержанное и непосредственное»#!"
 balan_lai_party_size_normal:0 "Отобранные спутники"
 balan_lai_party_size_normal_desc:0 "Отобранная группа последователей, оказывающая поддержку, сохраняя при этом сдержанное и достойное присутствие.\n\n#weak «Немногочисленные доверенные спутники»#!"
 balan_lai_party_size_many:0 "Величественная процессия"
 balan_lai_party_size_many_desc:0 "Большое количество последователей, демонстрирующих власть и влияние с заметным проявлением силы и престижа.\n\n#weak «Впечатляющая демонстрация силы и величия!»#!"

 # Intents
 balan_lai_request_defence_funding_intent:0 "@gold_icon! Добиться финансирования обороны"
 balan_lai_request_defence_funding_intent_desc:0 "Вы хотите обратиться за финансовой помощью, чтобы лучше защитить свои границы от внешних угроз."
 balan_lai_foster_trade_intent:0 "Способствовать развитию торговли"
 balan_lai_foster_trade_intent_desc:0 "Вы хотите укрепить торговые связи с державой вашей цели для получения взаимной выгоды."
 balan_lai_form_alliance_intent:0 "Заключить союз"
 balan_lai_form_alliance_intent_desc:0 "Вы хотите договориться о [Concept('alliance', 'союзе')|E] с вашей целью."
 balan_lai_expel_member_intent:0 "Исключить из совета"
 balan_lai_expel_member_intent_desc:0 "Вы хотите исключить вашу цель из [balan_lai|E]."

