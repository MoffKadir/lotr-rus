 noi_trevani.1008.b.tt: "Вепрь становится вашим вассалом и получает графства Креагтейл и Камет-Брин."
 noi_trevani.1008.c: "Вы - слабый лидер, [Select_CString(boar_descendant.IsFemale, 'недостойная', 'недостойный' )] называться [Select_CString(boar_descendant.IsFemale, 'предводительницей', 'вождём' )]. Умри!"
