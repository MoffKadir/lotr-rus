 balan_lai_foster_trade_intent:0 "Способствовать развитию торговли"
 balan_lai_foster_trade_intent_desc:0 "Вы хотите укрепить торговые связи с державой вашей цели для получения взаимной выгоды."
 balan_lai_form_alliance_intent:0 "Заключить союз"
 balan_lai_form_alliance_intent_desc:0 "Вы хотите договориться о [Concept('alliance', 'союзе')|E] с вашей целью."
 balan_lai_expel_member_intent:0 "Исключить из совета"
 balan_lai_expel_member_intent_desc:0 "Вы хотите исключить вашу цель из [balan_lai|E]."

