 noi_trevani.1003.t: "Пение петуха"
 noi_trevani.1003.desc: "Прошло уже несколько месяцев с тех пор, как мы с моим народом заселили скалистые холмы и болота к северо-западу от Рудаура, в частности, некогда бесплодные земли [GetTitleByKey('c_seansliabh').GetNameNoTier], [GetTitleByKey('c_glinkinlin').GetNameNoTier] и [GetTitleByKey('c_taobhtir').GetNameNoTier]. На этой бесплодной земле осталось всего несколько диких птиц - дичь, но всё равно это еда, когда мы делимся историями у очага. Мудрые и знающие люди нашего народа говорят о древнем племени ной-треван этих земель, [Concept('chicken_tribe', 'племени Цыплят')|E]. Они были одними из самых гордых и хитроумных из девяти древних племён, но их род потерпел поражение в войнах Железной короны и был утрачен навсегда.\n\n«Не совсем так...» - мы поворачиваем головы к членам нашей группы, которых раньше здесь не было. Их очевидный лидер и глашатай ковыряет в зубах ребрышком, но прежде чем я успеваю отреагировать или вытащить оружие, он опускается передо мной на колени и протягивает руки в знак верности. Может ли он быть потомком Цыплят? Я мысленно возвращаюсь к старым сказаниям - говорят, что Цыплят никогда по-настоящему не присягали на верность вождям Девяти, и этот пришелец тоже не присягал мне. Станет ли он достойным вассалом?"
 noi_trevani.1003.a: "Я не поддамся на уловки Цыплёнка, но все треван желанные гости при моём дворе."
 noi_trevani.1003.a.tt: "Вы принимаете Цыплёнка, и он становится вашим придворным."
 noi_trevani.1003.b: "Пусть птицы вернутся на свои законные места для кормления!"
 noi_trevani.1003.b.tt: "Цыплёнок становится вашим вассалом и получает графства [GetTitleByKey('c_seansliabh').GetNameNoTierNoTooltip], [GetTitleByKey('c_glinkinlin').GetNameNoTierNoTooltip] и [GetTitleByKey('c_taobhtir').GetNameNoTierNoTooltip]."
 noi_trevani.1003.c: "Прекрати визжать, шавка!"
 noi_trevani.1003.c.tt: "Вы убиваете Цыплёнка и его стражу."

