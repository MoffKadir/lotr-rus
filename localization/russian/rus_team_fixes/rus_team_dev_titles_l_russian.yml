 angmar_wars.1040.t: "A Blade of Westernesse"
 angmar_wars.1040.desc: "$PLACEHOLDER$"
 angmar_wars.1040.a: "Strike true, my blade"

 angmar_wars.1050.t: "Defender of the Wilds"
 angmar_wars.1050.desc: "There are those in [ROOT.Char.GetPrimaryTitle.GetName] who chafe at the restrictions of defense and the security of fortresses of stone, longing instead for the open sky and the swift retribution of a hidden arrow. From the bravest and best of such soldiers I have gathered a band of loyal men, to send out in defense of the frontiers of [ROOT.Char.GetPrimaryTitle.GetNameNoTier] and contest the empty lands against our foes.\n\nIt only remains to decide who will lead my new [Concept('ranger_laamp','Rangers')|E], for several men have stepped forward, offering to go. Each has his own strengths, but great courage and a keen mind will be required for such a daring captain, upon whose judgement may hang the fate of the [ROOT.Char.GetPrimaryTitle.GetTierAsNameNoTooltip]."
 angmar_wars.1050.a: "[option_one.GetTitledFirstName] is the clear choice"
 angmar_wars.1050.b: "[option_two.GetTitledFirstName] is the [option_two.GetWomanMan] for the job"
 angmar_wars.1050.c: "[option_three.GetTitledFirstName], the command is yours"
 rangers_of_x: "Rangers of [GetPlayer.MakeScope.Var('sponsor').Char.GetFirstNameNoTooltip]"

 angmar_wars.1510.t: "The Character of [angmar]"
 angmar_wars.1510.desc: "For too long [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] has clung to its decentralised past, with loyatly vested in dozens of small tribes, and no unifying culture or religion. Although this wild independence proved a fertile ground for my rise to power, it has since become a hinderence to a proper empire.\n\nThe time has come to reforge [angmar|E] in my image, shaping its [culture|E] and [faith|E] after my own vision. Of the many peoples and beliefs in my realm, surely there is one which may be elevated as the standard, and used to meld those many into one united and loyal whole. Not all will assimilate willingly, but assimilate they surely must in time."
 angmar_wars.1510.a: "I will shape them into a truely strong society!"
 angmar_wars.1510.b: "They must worship as I say!"
 angmar_wars.1510.a.tt: "You open [GetDecisionWithKey('decision_select_prefered_culture').GetName]"
 angmar_wars.1510.b.tt: "You open [GetDecisionWithKey('decision_select_prefered_faith').GetName]"

 angmar_wars.1511.t: "The Triumph of the [GetPlayer.MakeScope.Var('selected_culture').Culture.GetCollectiveNoun]"
 angmar_wars.1511.desc: "Out of all the peoples in [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier], I have decided the [GetPlayer.MakeScope.Var('selected_culture').Culture.GetCollectiveNoun] shall serve me best. By elevating their chiefs and humbling their foes, in time all the realm shall be remade in the image of their [culture|E]. [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier] shall be the stronger for it, and most of all, all the more loyal to me."
 angmar_wars.1511.a: "To a stronger, more unified, future!"
 angmar_wars.1511.b: "$angmar_wars.1511.a$"
 angmar_wars.1511.a.tt: "$decision_assimilation_policy_tt_22$"
 angmar_wars.1511.b.tt: "You open [GetDecisionWithKey('decision_select_prefered_faith').GetName]"
 
 angmar_wars.1512.t: "The Rise of [GetPlayer.MakeScope.Var('selected_faith').Faith.GetAdjective]"
 angmar_wars.1512.desc: "While in days past I permitted some measure of ignorant heresy and folk superstition in [ROOT.Char.GetPrimaryTitle.GetBaseNameNoTier], the time has finally come to codify the true [faith|E] of my realm. The [GetPlayer.MakeScope.Var('selected_faith').Faith.GetName] has proved the ablest tool, and in time all shall worship [ROOT.Char.GetFaith.HighGodName], whether in zeal or in fear. With this new unifying creed, soon the [ROOT.Char.GetPrimaryTitle.GetBaseName] shall surely be all the more powerful and all the more #EMP mine#!."
 angmar_wars.1512.a: "For the glory of the Dark!"
 angmar_wars.1512.b: "$angmar_wars.1512.a$"
 angmar_wars.1512.a.tt: "$decision_assimilation_policy_tt_22$"
 angmar_wars.1512.b.tt: "You open [GetDecisionWithKey('decision_select_prefered_culture').GetName]"

