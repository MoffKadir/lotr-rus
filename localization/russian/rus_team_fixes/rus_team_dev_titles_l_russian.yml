 decision_explore_moria.tt2: "Рискнуть навлечь на себя гнев [Concept('balrog', 'балрога')|E] в поисках [Concept('dwarven', 'гномьих')|E] [Concept('artifacts', 'артефактов')|E] и сокровищ."
 decision_explore_moria.tt3: "Ваш [Concept('camp', 'лагерь')|E] расположен в регионе [GetGeographicalRegion('middleearth_mountains_misty_khazad_dum').GetName]"


 lotr_balrog_explore_moria_supply_cache: "Тайник с гномьими припасами"
 lotr_balrog_explore_moria_supply_cache_desc: "Этот персонаж нашёл небольшой тайник с припасами в туннелях [Concept('moria', 'Мории')|E]."

 lotr_balrog_explore_moria_supply_cache_large: "Богатый тайник с гномьими припасами"
