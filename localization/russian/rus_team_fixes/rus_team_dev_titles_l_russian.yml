 noi_trevani.1002.desc: "Paceholder"
 noi_trevani.1002.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1002.a.tt: "Вы принимаете Медведя, и он становится вашим придворным."
