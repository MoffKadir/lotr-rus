 great_project_type_angmar_wars_support_outlying_duchy: "Поддержать отдалённые герцогства"
 great_project_type_angmar_wars_support_outlying_duchy_desc: "По мере того как [Concept('angmar_wars_situation', 'Ангмарские войны')|E] затягиваются, границы державы [owner.GetPrimaryTitle.GetName] становятся всё более слабыми, а положение тех, кто живёт рядом с ними, ухудшается. Хотя я могу направить их обратно в наше сердце, возможно, вместо этого стоит вложиться в эти отдалённые земли, чтобы укрепить их против разрушений войны."
