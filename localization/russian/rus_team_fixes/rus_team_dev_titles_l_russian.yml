 # Activity Options
 balan_lai_option_leverage:0 "Воздействие"
 balan_lai_leverage_none:0 "Благородная сдержанность"
 balan_lai_leverage_none_desc:0 "Средства не будут выделены, что отражает желание сосредоточиться на дипломатии и убеждении в отношении неэтичного подкупа.\n\n#weak «Мы должны полагаться на слова, а не на монеты»#!"
 balan_lai_leverage_small:0 "Стратегические дары"
 balan_lai_leverage_small_desc:0 "Разумная сумма незаметно отложена для облегчения переговоров и получения дополнительных голосов там, где это необходимо.\n\n#weak «Небольшой стимул никогда не повредит»#!"
 balan_lai_leverage_large:0 "Влияние золота"
 balan_lai_leverage_large_desc:0 "Значительные ресурсы направлены на обеспечение поддержки, что позволяет незаметно влиять на решения совета с помощью множества удачных даров.\n\n#weak «За влияние приходится платить»#!"

 balan_lai_option_entertainment:0 "Расходы на организацию"
 balan_lai_hosting_cheap:0 "Скромное мероприятие"
 balan_lai_hosting_cheap_desc:0 "Базовые приготовления и упор на функциональность, а не на изысканность, с простыми блюдами и скромными развлечениями.\n\n#weak «Суть важнее стиля...»#!"
 balan_lai_hosting_normal:0 "Солидные затраты"
 balan_lai_hosting_normal_desc:0 "Сбалансированный подход, предлагающий достаточный комфорт и развлечения, чтобы оставить положительное впечатление.\n\n#weak «Комфорт и развлечения»#!"
 balan_lai_hosting_grand:0 "Демонстрация роскоши"
 balan_lai_hosting_grand_desc:0 "Мы не пожалеем средств, устроив роскошные пиры и грандиозные развлечения, призванные поразить и произвести впечатление.\n\n#weak «Пусть об этом будут говорить долгие годы!»#!"

 balan_lai_option_party_size:0 "Свита"
 balan_lai_party_size_few:0 "Одиночная делегация"
 balan_lai_party_size_few_desc:0 "Путешествовать в одиночку, уделяя особое внимание личному подходу и самостоятельности.\n\n#weak «Уединённое присутствие, сдержанное и непосредственное»#!"
 balan_lai_party_size_normal:0 "Отобранные спутники"
 balan_lai_party_size_normal_desc:0 "Отобранная группа последователей, оказывающая поддержку, сохраняя при этом сдержанное и достойное присутствие.\n\n#weak «Немногочисленные доверенные спутники»#!"
 balan_lai_party_size_many:0 "Величественная процессия"
 balan_lai_party_size_many_desc:0 "Большое количество последователей, демонстрирующих власть и влияние с заметным проявлением силы и престижа.\n\n#weak «Впечатляющая демонстрация силы и величия!»#!"

