 activity_balan_lai:0 "Заседание Балан-Лай"
 activity_balan_lai_desc:0 "Созыв заседания [balan_lai|E] объединяет самых влиятельных принцев [Concept('thanihazad', 'Тани-Хазада')|E] для обсуждения насущных проблем и выработки общей политики.\n\nЭто время для представления и обсуждения стратегий, направленных на общее благо, а также возможность укрепить альянсы, выявить соперничество и принять участие в тонком танце политических интриг.\n\nЗаседания совета становятся ареной, где сосуществуют единство и амбиции, где каждый член стремится придать форму будущему, защищая при этом свои собственные интересы."
