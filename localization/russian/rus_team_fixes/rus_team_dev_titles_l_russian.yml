 angmar_wars.1520.desc: "$PLACEHOLDER$"
 angmar_wars.1520.a: "They shall serve me"


 ### Situation Flavor Events###

 angmar_wars.2001.t: "Набеги орков!"
 angmar_wars.2001.desc: "Сошедшие с [Concept('mistymountains', 'Мглистых гор')|E] орки долгое время были чумой [Concept('eriador', 'Эриадора')|E], начиная со [Concept('elderdays', 'Старших Дней')|E], и они снова напали на нашу державу. На этот раз они совершили набег на владение [disaster_county.GetNameNoTier]. Нам предстоит решить, как реагировать."
 angmar_wars.2001.a: "Собрать войска!"
 angmar_wars.2001.b: "[marshal.GetName], я доверяю эту задачу вам."
 building_destroyed: "Случайное [Concept('building', 'здание')|E] снизит уровень или будет уничтожено"

 angmar_wars.2002.t: "Набеги разбойников!"
 angmar_wars.2002.desc: "[Concept('eriador', 'Эриадор')|E] - опасное место, поскольку из-за раскола [Concept('arnor', 'Арнора')|E] между местными властителями и государствами-преемниками не было сотрудничества, что позволило набегам разбойников через границу стать обычным делом, на этот раз были замечены налётчики, направляющиеся в сторону владения [disaster_county.GetNameNoTier]. Пришло время решить, как реагировать."
 angmar_wars.2002.a: "Собрать войска!"
 angmar_wars.2002.b: "[marshal.GetName], я доверяю эту задачу вам."
 angmar_wars.2002.c: "Если они хотят золото, отдадим его им."

 angmar_wars.2003.t: "Молодой пастух"
 angmar_wars.2003.desc: "Когда мы осматриваем руины деревни, оставшиеся после налета, к нам подходит молодой парень. Он был пастухом, который пас свое стадо в окрестностях деревни. На моих глазах он подошел к сгоревшему дому и разрыдался, увидев тела молодой пары и двух детей, которых мои солдаты до сих пор не похоронили. Очевидно, что произошло, но не очевидно, как я [Select_CString(ROOT.Char.IsFemale, 'должна', 'должен' )] реагировать."
 angmar_wars.2003.a: "Он останется при дворе, ни один ребенок не заслуживает того, чтобы быть сиротой."
 angmar_wars.2003.b: "Отослать его в королевские владения, там он может пригодиться."

 angmar_wars.2004.t: "Крестьяне покидают пограничье"
 angmar_wars.2004.desc: "[Concept('eriador', 'Эриадор')|E] пришёл в упадок после распада [Concept('arnor', 'Арнора')|E]. С каждым годом всё больше наших сыновей и дочерей гибнет в [Concept('angmar_wars', 'Ангмарских войнах')|E], и с каждым годом все больше и больше наших земель оказываются заброшенными. По мере того, как дикая природа вторгается в наши границы, люди отступают на более безопасные территории в глубь страны, и в этом году жители владения [county1.GetNameNoTier] решили переселиться во владение [county2.GetNameNoTier]. мы можем либо позволить им уйти, либо заставить их остаться в этих землях."
 angmar_wars.2004.a: "Позволить им переселиться."
 angmar_wars.2004.b: "Заставить их остаться."
 building_destroyed_county_1: "Во владении [county1.GetName] будет понижено или уничтожено случайное [Concept('building', 'здание')|E]"
 biulding_add_county_2: "Во владении [biuld_prov.GetName] будет создано или улучшено случайное [Concept('building', 'здание')|E]"





 noi_trevani.1000.t: "Топот мягких лап"
 noi_trevani.1000.desc: "Прошли месяцы с тех пор, как я и мой народ заселили долины и ущелья Митэйтеля и Брейг-Куик. В нашем стремлении вернуть себе наши древние дома наши мудрецы рассказывают истории о нашем прошлом и о том, какое из наших племён-основателей когда-то называло это место своим домом, до того, как появились Железная корона и Белое древо. Они рассказывают истории о Рысях, скрытном народе, который, как известно, берёт и выращивает рысей в качестве своих спутников на охоте, а также для пчеловодства, которым в наши дни занимаются редко, поскольку дни, кажется, становятся всё холоднее. Когда-то они были гордыми охотниками, но теперь их никто не видел уже много поколений, и все мы считали, что они погибли в войнах прошлого. Из-за стен моих покоев доносится шум. Словно в мифе, я вижу незнакомую женщину, окружённую несколькими стражами. Поначалу их символы мне незнакомы, но вскоре я понимаю: это последние остатки древнейшего племени. Женщина представляется как «Рысь», которую её племя называет так за то, что спустя долгое время ей удалось снова приручить рысь и провести их через большие трудности. Сейчас она предстала передо мной, чтобы принести клятвы верности, поскольку мои усилия по восстановлению наших древних домов принесли мир в эти дикие и опасные земли. Но могу ли я доверять ей? И действительно ли я хочу её верности?"
 noi_trevani.1000.a: "Я приветствую вас при моём дворе, присаживайтесь к костру!"
 noi_trevani.1000.a.tt: "Вы принимаете Рысь, и она становится вашей придворной."
 noi_trevani.1000.b: "Эти земли - ваш дом. Пусть они снова процветают!"
 noi_trevani.1000.b.tt: "Рысь становится вашим вассалом и получает графства Митэйтель и Брейг-Куик."
 noi_trevani.1000.c: "Вы - слабый лидер, недостойная называться предводительницей. Умри!"
 noi_trevani.1000.c.tt: "Вы убиваете Рысь и её стражу."

