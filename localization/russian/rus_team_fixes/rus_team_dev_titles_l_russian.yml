 decision_fortify_weather_hills: "Укрепить Пасмурные холмы"
 decision_fortify_weather_hills_tooltip: "Укрепить Пасмурные холмы от нападения"
 decision_fortify_weather_hills_desc: "Издавна [GetTitleByKey('d_emyn_sul').GetNameNoTier] служил границей [Concept('arthedain', 'Артедайна')|E], охраняемой древней башней на Заверти в конце горного хребта. Хотя эти укрепления хорошо служили нам в прошлом, их уже недостаточно, чтобы отразить атаки [Concept('angmar', 'Ангмара')|E]. Мы должны расширить наши укрепления вдоль всей линии холмов, чтобы образовать неприступную стену против наших врагов."
 decision_fortify_weather_hills_confirm: "Никакая сила не возьмёт эти холмы!"
 decision_fortify_weather_hills_tt: "Вы сами выберете, сколько средств вложить в строительство укреплений"



 game_concept_lynx_tribe: "Линк"
 game_concept_lynx_tribe_plural: "Линкен"
 game_concept_lynx_tribe_desc: "Среди [Concept('noi_trevan', 'Ной-треван')|E] [Glossary('Линкен','linc_gloss')] были одной из первых групп скитающихся [Concept('daen', 'даэн')|E], достигших земель, которые ныне известны как [Concept('rhudaur', 'Рудаур')|E]. Поселившись в лесистых предгорьях Мглистых гор недалеко от истока Митэйтеля, они были выносливым народом охотников, ловчих и пчеловодов.\n\nОни предпочитали жить в отдалённых районах, таких как некоторые из крутых ущелий, по которым протекает Седой Ключ, и лишь изредка вступали в длительные контакты с другими племенами. При правлении дунэдайнских владык начала Третьей эпохи им удалось сохранить высокую степень квазиавтономии из-за того, что посланцам их де-юре повелителей было просто слишком трудно связаться с ними.\n\nВ качестве своего символа они выбрали местную рысь, которая часто бродит по заснеженным лесам и пологим склонам на подступах к горам и живёт в основном в сотрудничестве с охотничьими кошками. Когда Рудаур оказался под тенью Ангмара, многие воины из племени Рыси были вынуждены сражаться в войсках Короля-чародея, и поэтому их народ вымер, поскольку войны с Арнором обескровили его. Лишь очень немногие деревни дожили до конца чародейского владычества, и никто не знает, сохранились ли они до наших дней."

 game_concept_goat_tribe: "Гобхар"
 game_concept_goat_tribe_plural: "Гобхейр"
 game_concept_goat_tribe_desc: "Среди [Concept('noi_trevan', 'Ной-треван')|E] те, кто живут в предгорьях [Concept('rhudaur', 'Рудаура')|E], это - [Glossary('Гобхейр','gobhar_gloss')].\n\nГобхар - это племя, которое изначально имело [Concept('daen', 'даэнское')|E] происхождение и населяло земли Орнуил и Карандор непосредственно к северу от Имладриса. Они были хорошо известны своим упрямством, никогда полностью не принимая правление [Concept('dunedain', 'дунэдайн')|E] или [Concept('witchking', 'Короля-чародея')|E].\n\nИх навыки в альпинизме также не имели себе равных среди Девяти племён, и они были известны тем, что путешествовали через перевалы Мглистых гор, чтобы торговать с жителями долины Андуина.\n\nКогда ими правили дунэдайн, их часто называли гномоподобными, а король Рудаура Алдарион называл их «гномами, не жаждущими золота»."

 game_concept_fowl_tribe: "Койлеах трев"
 game_concept_fowl_tribe_plural: "Койлих"
 game_concept_fowl_tribe_desc: "Из [Concept('noi_trevan', 'Ной-треван')|E] наиболее чистокровные балшарим живут в пограничных землях на северо-западе, их небольшая конфедерация пастухов и ловчих переселяется из Рам Дуата в Сланслиаб, Глинкинлин и Таобхтир. Ведомые Бахаром, великим вождём балшаримского народа (а некоторые считают его потомком Балши «Мудреца»), они бежали с холодного севера и пришли в [Concept('rhudaur', 'Рудаур')|E] и почти сразу же начали ссориться с народом Тролльего плато и Мойн-Дулдахда, а также с эриадоррим на западе.\n\n[Glossary('Койлих','coileach_gloss')], названные в честь животного, которое они чаще всего выращивали и пасли, - народ хитрый и проницательный и часто очень воинственный. Они и племена их потомков были последними, кто присягнул на верность Первому королю, и в старых народных сказаниях говорится, что их присоединение никогда не было зафиксировано, но они всё равно пробились ко двору короля.\n\nОднако при короле и его народе боевой дух Птиц был умерен, и они начали смешиваться с народами других племён, особенно с народом Камет-Брин. Но они никогда полностью не забывали о своём балшаримском наследии, и говорят, что у последних вождей Птиц были предки из ангмаррим и даже из недружелюбных лоссот на западе.\n\nКогда правители дунэдайн пришли в Рудаур, Птицы оказали яростное сопротивление, нападая из дупел деревьев и болот, а также со скалистых холмов, на которых они жили. Хотя в конце концов их одолели, они никогда не теряли своего рвения к свободе (или к тому, что они себе о ней представляли), и часто восстание горцев возглавляли Птицы.\n\nИрония в том, что они первыми и глубже всех встали на службу тёмному Ангмару, а их вождь соблазнился предложениями власти или золота, а то и мести дунэдайн. Какой бы ни была причина, конец Ангмара означал конец Птиц, и мало кто из этого народа дожил до наших дней, если вообще дожил."

 game_concept_bear_tribe: "Матхан трев"
 game_concept_bear_tribe_plural: "Матэйн"
 game_concept_bear_tribe_desc: "Среди [Concept('noi_trevan', 'Ной-треван')|E], которые называют предгорья Рудаура своим домом, есть [Glossary('Матэйн','mathan_gloss')], народ столь же терпеливый и безжалостный, как и звери, чьё имя они носят.\n\nМатэйн ведут своё происхождение от [Concept('daen', 'даэн')|E], которые поселились вдоль быстрой реки Митэйтель в южном Рудауре, в долинах верхнего течения Бруинена. Они славятся своим мастерством в ловле рыбы не сетями, а копьём и руками, нанося удары по изобилию реки с такой же силой и точностью, как медведь по берегу ручья.\n\nЛетописцы-дунэдайн описывали их как мрачный и молчаливый народ, чья жизнь зависела как от силы, так и от терпения. Под властью дунэдайн или Ангмара они, где могли, держались своих рек и лесов, стремясь к уединению в своих дебрях, хотя и не могли полностью вырваться из-под власти своих повелителей."

 game_concept_hare_tribe: "Геаррог трев"
 game_concept_hare_tribe_plural: "Геарроган"
 game_concept_hare_tribe_desc: "Среди [Concept('noi_trevan', 'Ной-треван')|E] [Glossary('Геарроган','ghearrog_gloss')] происходят от кочующих [Concept('daen', 'даэн')|E], которые поселились на землях [Concept('rhudaur', 'Рудаура')|E], а предки их племён поселились среди центральных холмов своего нового дома и получили своё название из-за огромного количества зайцев, населявших эти земли, а также из-за их широкого использования их шкур и сухожилий для шитья одежды.\n\n[Glossary('Геаррог','ghearrog_gloss')] были известны как высококвалифицированные охотники и следопыты, которые любили гоняться за зайцами и ловить их голыми руками, чтобы постоянно демонстрировать своё мастерство. Однако их величайшим мастерством было умение говорить, которым они овладели с одной-единственной целью - выжить.\n\nНесмотря на то, что они были довольны своей новой родиной, у них был один большой недостаток: они находились между многими другими племенами, и если одно из них хотело добраться до другого, то им приходилось пересекать земли Геаррог. Это привело к тому, что они сосредоточились на поддержании мира и хороших отношений со всеми, кто граничил с ними, они добились этого, став посредниками между каждым из племён и улаживая их разногласия друг с другом. Благодаря своему уму, мудрости и, в глазах [Glossary('Геаррог','ghearrog_gloss')], потребности в абсолютной честности, они были желанными гостями в домах всех своих соседей.\n\nК сожалению, в последующие дни это не помогло: как приход нуменорцев, которые отказались от многих своих соглашений, так и возвышение Ангмара, не оставившего места для тех, кто умел говорить, а только для тех, кто был искусен в сражениях, привели к огромному и печальному уменьшению численности их народа."

 game_concept_raven_tribe: "Фитеах трев"
 game_concept_raven_tribe_plural: "Фитих"
 game_concept_raven_tribe_desc: "До того, как [Concept('noi_trevan', 'Ной-треван')|E] из холмов объединились под властью короля, три племени объединила королева. Сказители утверждают, что Воронья королева была не только хитрой, но и одним из самых мужественных духов, поэтому она обманом заставила трёх великих человеческих вождей жениться на ней так, что они не знали друг о друге, но когда она раскрылась и они узнали, что она заставила их принести клятву на крови служить ей, объединив все племена. И по прошествии тысячелетий их великое воинство переселилось в более плодородные земли [Concept('rhudaur', 'Рудаура')|E].\n\nНесмотря на то, что они не были изоляционистами, они смогли сохранить большую независимость среди племён, в основном из-за своих необычных и эзотерических практик. Это племя, [Glossary('Фитих','fitheach_gloss')], разделено на 3 касты. Правая каста - это фермеры, рабочие и те, кто готовит следующее поколение. Левое - воины и военные советники, известные среди остальных племён своим пренебрежением к традициям и чести. А среднее - проводники плотского и духовного миров, те, кто призывает отбраковывать зверей, когда мир так считает, те, кто не выбывает из своих рядов, а позволяет своей плоти и костям кормить мир, те, кто не цепляется за жизнь, но принимает дар смерти, когда это их призвание. Возможно, это даже правда, потому что никто не помнит последнего старейшину, который пытался избежать смерти.\n\nВо время войны Короля-чародея племя разделилось на 3 части, как в древние времена, одни поддерживали вторжение Северного короля, другие носили белую звезду на своих щитах. Но одна группа отвергла и то, и другое с простой целью - убить как можно больше орков и дунэдайн, считая их жестокими демонами одного типа, которые наводят страх на мир своей жадностью, с той лишь разницей, что один нападает из горных пещер, а другой - из Великого озера, и полагая, что с уничтожением обоих Рудаур сможет наконец-то обрести безопасность.\n\nВыжившие считают, что племя Ворона вымерло во время войны, хотя исследователи продолжают находить новые «открытые могилы», которые среднее крыло племени практиковало в период своего расцвета."

