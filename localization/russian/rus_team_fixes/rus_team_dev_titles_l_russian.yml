 angmar_wars_militarise_duchy_base_modifier_tt: "Все [Concept('county', 'графства')|E] в выбранном [Concept('duchy', 'герцогстве')|E] получат модификатор «[GetModifier('angmar_wars_militarise_duchy_base_modifier').GetNameWithTooltip]» и будут #N дважды [Concept('devastated', 'опустошены')|E]#!"
 angmar_wars_militarise_duchy_maa_modifier_tt: "Все [Concept('province', 'провинции')|E] в выбранном [Concept('duchy', 'герцогстве')|E] и [Concept('capital', 'столица')|E] [Concept('great_project_contributor_possessive', 'участника')|E] получат модификатор «[GetModifier('angmar_wars_militarise_duchy_maa_modifier').GetNameWithTooltip]»"
 angmar_wars_militarise_duchy_military_academy_modifier_tt: "#indent_newline:4 Все [Concept('county', 'графства')|E] [Concept('holder', 'владельца')|E] в выбранном [Concept('duchy', 'герцогстве')|E]:\n$BULLET$Все [Concept('knight', 'рыцари')|E] со [Concept('commander_trait', 'свойством командира')|E] получат #P [minister_exp_boost_value]#! [Concept('trait_level_track_xp', 'опыта пути развития свойства')|E] #weak (значение зависит от [Concept('martial_skill', 'навыка военного дела')|E] [Concept('great_project_contributor', 'участника')|E])#!#!"
 angmar_wars_militarise_duchy_fort_modifier_tt: "Все [Concept('county', 'графства')|E] в выбранном [Concept('duchy', 'герцогстве')|E] и [Concept('capital', 'столица')|E] [Concept('great_project_contributor_possessive', 'участника')|E] получат модификатор «[GetModifier('angmar_wars_militarise_duchy_fort_modifier').GetNameWithTooltip]»"
 angmar_wars_militarise_duchy_control_modifier_tt: "Все [Concept('county', 'графства')|E] в выбранном [Concept('duchy', 'герцогстве')|E] и [Concept('capital', 'столица')|E] [Concept('great_project_contributor_possessive', 'участника')|E] получат модификатор «[GetModifier('angmar_wars_militarise_duchy_control_modifier').GetNameWithTooltip]» и #P [minister_control_boost_value]#! @control_icon![Concept('county_control', 'контроля')|E] #weak (значение зависит от [Concept('martial_skill', 'навыка военного дела')|E] [Concept('great_project_contributor', 'участника')|E])#!, и открывает [Concept('absolute_control', 'абсолютный контроль')|E] для [Concept('rulers', 'правителей')|E] в пределах выбранного [Concept('duchy', 'герцогства')|E]"

