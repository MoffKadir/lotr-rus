 game_concept_angmar_aligned_desc: "#high Союзники Ангмара#! или #high зла#!, - это одна из сторон [Concept('angmar_wars_situation', 'Ангмарских войн')|E]. Она состоит из королевства Ангмар, других [Concept('angmar_rulers', 'ангмарских правителей')|E], а также их [Concept('alignment_evil', 'злых')|E] сторонников."

 game_concept_devastation: "Опустошение"
 game_concept_devastated: "Опустошено"
 game_concept_devastate: "Опустошить"
 game_concept_devastation_desc: "#high $game_concept_devastation$#! - это механика, которая имитирует серьёзные последствия [Concept('angmar_wars_s', 'Ангмарских войн')|E] для земель [Concept('arnor', 'Арнора')|E] и [Concept('angmar', 'Ангмара')|E]. $game_concept_devastation$ вызывается [Concept('raids', 'набегами')|E], [Concept('battles', 'сражениями')|E], [Concept('sieges', 'осадами')|E] и другими подобными серьёзными событиями и влияет на [Concept('county', 'графство')|E], где оно произошло. Когда [Concept('county', 'графство')|E] опустошается, оно сначала теряет своё [Concept('development', 'развитие')|E], затем все [Concept('buildings', 'постройки')|E] и, наконец, снижается уровень [Concept('holding', 'владения')|E]. Если [Concept('county', 'графство')|E] достигает #N 0#! [Concept('development', 'развития')|E] и #N 1#! уровня [Concept('holding', 'владения')|E], оно становится [Concept('wilderness', 'дебрями')|E]."

 game_concept_great_houses_of_arnor: "Великие дома Арнора"
 game_concept_great_house: "Великий дом"
 game_concept_great_houses_of_arnor_desc: "#high Великие дома Арнора#! - это те древние дома, которые могут проследить свои притязания до первых земельных пожалований, полученных от [Concept('elendil', 'Элендиля')|E] после [Concept('downfall', 'Низвержения')|E]. Каждому из них верховный король лично пожаловал большие [Concept('duchy', 'вотчины')|E], и большинство из них продолжали править теми же землями предков, пока они не были захвачены или заброшены во время [Concept('angmar_wars', 'Ангмарских войн')|E]. Великие дома оказывали сильное влияние на судьбу [Concept('arnor', 'Арнора')|E], и их представители всегда пользовались большим почётом при дворах королей."










