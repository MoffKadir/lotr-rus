 saltflats: "Солончаки"
 terrain_saltflats: "Солончаки"
 saltflats_desc: "Когда-то нетронутое море, в котором процветала жизнь, испаряясь, оставляло токсичные соли. Ландшафт равнинный, открытый и имеет сухую, гнетущую жару."
 combat_saltflats: "Защита в солончаках"
 saltflats_advantage: "[command_modifier_i|E][advantage|E] в солончаках"
 religious_decision.0201.saltflats: "Плоскостность [saltflats_location.GetNameNoTier]."
 religious_decision.0211.desc.beginning.saltflats: "Я поймал себя на том, что заглядываю в прошлое этого когда-то нетронутого моря [ROOT.Char.GetCurrentActivity.GetLocation.GetName], в котором процветала жизнь."
 saltflats_supply_limit_mult: "$MOD_SUPPLY_LIMIT_MULT$ в солончаках"
 saltflats_levy_size: "$MOD_LEVY_SIZE$ в солончаках"
  
 mallorn_forest: "Мэллорн Форест"
 terrain_mallorn_forest: "Мэллорн Форест"
 mallorn_forest_desc: "Древний лес, усеянный золотыми маллорнскими деревьями.."
 combat_mallorn_forest: "Защита в Маллорнском лесу"
 religious_decision.0201.mallorn_forest: "Плоскостность [mallorn_forest_location.GetNameNoTier]."
 religious_decision.0211.desc.beginning.mallorn_forest: "Мои мысли блуждают, пока я иду среди золотых деревьев Мэллорнов в [ROOT.Char.GetCurrentActivity.GetLocation.GetName]."
 mallorn_forest_supply_limit_mult: "$MOD_SUPPLY_LIMIT_MULT$ в Маллорнских лесах"
 mallorn_forest_levy_size: "$MOD_LEVY_SIZE$ в Маллорнских лесах"
  
