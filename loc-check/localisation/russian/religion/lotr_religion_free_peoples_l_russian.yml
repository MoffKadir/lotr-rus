  #Free Peoples Religion localization 
 rf_eruhini: "Дети Эру"
 religion_group_eruhini: "Эрухинск"
 religion_group_eruhini_adj: "Эрухини"
 religion_group_eruhini_desc: "«Мы не в шутку зовем вас «Детьми Эру». Мы считаем вас своими родичами, и родство наше теснее, чем общая связь, что объединяет нас со всеми прочими тварями, живущими в [Concept( 'ardaconcept', 'Арде' )|E], и этих тварей между собой».\n\nДети Эру, также известные как Хини Илуватаро или Эрухини — представители эльфийской и людской рас. Они были созданы вместе со вселенной, которую и населяли, из Музыки Айнур, но сами Айнур не принимали участия в их создании. Илуватар создавал их единолично. Они также обладали фэар (душами) того же типа, что у Айнур, хотя и значительно менее могущественными."
  
 free_peoples_religion: "Эрухинск"
 free_peoples_religion_desc: "«Мы не в шутку зовем вас «Детьми Эру». Мы считаем вас своими родичами, и родство наше теснее, чем общая связь, что объединяет нас со всеми прочими тварями, живущими в [Concept( 'ardaconcept', 'Арде' )|E], и этих тварей между собой».\n\nДети Эру, также известные как Хини Илуватаро или Эрухини — представители эльфийской и людской рас. Они были созданы вместе со вселенной, которую и населяли, из Музыки Айнур, но сами Айнур не принимали участия в их создании. Илуватар создавал их единолично. Они также обладали фэар (душами) того же типа, что у Айнур, хотя и значительно менее могущественными."
 free_peoples_religion_adj: "Эрухини"
  
 free_peoples: "Свободно-народн"
 free_peoples_adj: "Свободные народы"
 free_peoples_adherent: "Свободный народ"
 free_peoples_adherent_plural: "Свободные народы"
 free_peoples_desc: "Свободные народы Средиземья были теми людьми, что не находились под властью Саурона."
  
  ### Dwarven Religion ### 
  # Moved to dwarven faith file 
  
  ### Northmen Religion ### 
 northmen_religion: "Northmen"
 northmen_religion_desc: "The [northmen|E] of [rhovanion|E], distant kin to the house of Hador, have been long influenced by their friendships with both the [dwarves|E] and the [woodelves|E], and further influenced by the alliances they have had with [gondor|E]."
 northmen_religion_adj: "Northmen"
  
 faith_northmen: "Freastrōa"
 faith_northmen_adj: "Freastrōa"
 faith_northmen_adherent: "Freastrōan"
 faith_northmen_adherent_plural: "Freastrōans"
 faith_northmen_desc: "The ancient faith of the [northmen|E] is rooted in the pantheon of the Freas, which the [numenorean|E]s identified with the [valargods|E]. Freas translates roughly to 'The Great Ones', which includes in their ranks the following:\nAfodfréa, the Warrior\nAilgra, Lady of the Hearth,\nBaumya, Lord of the Hunt, known also as Béma\nBlostma, the wild maiden\nNefrea, the Deathgiver\nNeorth, Lord of the Waters\nUrdur, Mistress of Heaven\nVaxa, the Earth-Mother\nWolcenfréa, Lord of the Sky\n\nTogether these divine spirits govern the world and taught mankind how to live."
  
 faith_northmen_old: "Old Freastrōa"
 faith_northmen_old_adj: "Old Freastrōa"
 faith_northmen_old_adherent: "Old Freastrōan"
 faith_northmen_old_adherent_plural: "Old Freastrōans"
  
 faith_woodmen: "Widumannas"
 faith_woodmen_adj: "Widumannas"
 faith_woodmen_adherent: "Widumann"
 faith_woodmen_adherent_plural: "Widumanna"
 faith_woodmen_desc: "The Widumanna practise a primitive faith rooted in the forest that provides for all their needs. They are primarily followers of [bemacharacter|E], the Woodman name for the Valar [oromecharactershort|E]. \nLong ago, the Woodmen split from their plain-dwelling kin and settled the woods. With time, their way of worship changed, with some influence from the [lasgalendrimelves|E]. They are known to treat nature with great reverence and see it as their sacred duty to protect the wild forests of [mirkwood|E].\n\nMore recently, many of them have started to view [radagastcharacter|E] as their spiritual leader due to his strong connection with nature, though he very rarely if ever partakes in any ceremonies."
  
 faith_woodmen_old: "Old Widumannas"
 faith_woodmen_old_adj: "Old Widumannas"
 faith_woodmen_old_adherent: "Old Widumann"
 faith_woodmen_old_adherent_plural: "Old Widumanna"
  
 faith_dale: "Celduinic"
 faith_dale_adj: "Celduinic"
 faith_dale_adherent: "Celduinion"
 faith_dale_adherent_plural: "Celduinioni"
 faith_dale_desc: "Long influenced by the neighboring [dwarves|E] of [erebor|E] and the [elves|E] of [greenwoodshort|E], the [northmen|E] of the [dale|E]-lands show the least [gondorian|E] influence of all the [northmen|E] faiths. \n\nThe faith of the Celdin and the Dalish highlands tends to primarily revolve around two [valagod|E] in particular - [aulecharacter|E] and [oromecharactershort|E], though they are known to the Dalemen via the names Mahal and Tauron. Tauron the hunter and bow-master is the patron of warriors and hunters, the rural lands of the Celduin. Mahal is the patron of craftsmen, tradesman, and the cities that form the heart of Celduin's prosperity. While all the [valargods|E] are revered, it is these two who are held most dear to the folk of the Celduin."
  
 faith_dorwinion: "Aldenan"
 faith_dorwinion_adj: "Aldenan"
 faith_dorwinion_adherent: "Aldenan"
 faith_dorwinion_adherent_plural: "Aldenans"
 faith_dorwinion_desc: "The faith of the folk of [dorwinion|E] is rooted in the ancient blessing their land received when three of the [entwives|E] chose to make the lower Celduin river their abode. These three, known as the Earth-maidens, where named as the emissaries of Aldena, the Earth-mother, who gives bounty of the earth. By their influence, the land of [dorwinion|E] grew prosperous and fertile, and even long after their disappearence, the folk of [dorwinion|E] remain devoted followers of their teachings of careful but bounteous cultivation of the earth. Though they know of the other [valar|E] through the [entwives|E], [avari|E], and [dwarves|E], none are more loved more dearly and fiercly than [yavannacharactershort|E], whom they refer to as Aldena."
  
 faith_blue_sect: "Fiskurkyn"
 faith_blue_sect_adj: "Fiskurkyn"
 faith_blue_sect_adherent: "Fiskurkyn"
 faith_blue_sect_adherent_plural: "Fiskurkyns"
 faith_blue_sect_desc: "The Fiskurkyn, meaning "Kindred of the fish" in the ancient tongue of [rhovanion|E] are a Marine Cult that emerged when sailors, fishers and merchants around the Inland [seaofrhun|E] started to revere [ulmocharacter|E], whom they know as Neorth, as well as the Inland Sea itself, above the other [valargods|E].\n\nDeep beneath the Waves, the Lord of the Sea blesses the creatures of water and sends his scaled servants to guide and nourish man. Because of this, fish are often used for divination and minor fish deities are called upon for aid and counsel. Among the [northmen|E] faithful they are mostly known for being highly supersticious, for surely a dark fate will await those who set sail under an unfavorable omen."
 bluesect_religious_head_title: "High Seacaller"
 bluesect_religious_head_title_name: "The Blue Council"
 bluesect_priest: "Seacaller"
 bluesect_priest_plural: "Seacallers"
  
  #Rohirric Faiths localization 
 faith_rohirric: "Rohirric"
 faith_rohirric_adj: "Rohirric"
 faith_rohirric_adherent: "Rohirrim"
 faith_rohirric_adherent_plural: "Rohirrim"
 faith_rohirric_desc: "In [rohan|E] the Valar [oromecharactershort|E] and [yavannacharactershort|E], who are known to the [rohirrim|E] as [bemacharacter|E] and [foldewyncharacter|E], are revered above all others. Béma is patron of riders, hunters, warfare, and horses, while Foldewyn is revered as the lady of the hearth, the harvest, childbirth, and the arts of weaving and healing."
  
 faith_rohan_orome: "Éored of Béma"
 faith_rohan_orome_adj: "Béma"
 faith_rohan_orome_adherent: "Rider"
 faith_rohan_orome_adherent_plural: "Riders"
 faith_rohan_orome_desc: "The Éored of [bemacharacter|E] refers to those amongst the [rohirrim|E] who focus exclusively on the Great Rider. They believe that [bemacharacter|E] leads those with his favour in great hunts unrivalled in mortal lands. The adherents of this sect are amongst the most militant of the [rohirrim|E], desiring nothing less than to prove their strength in arms and riding. Hunts, feasts, and feats of strength are common amongst the brotherhoods of these men."
  
 faith_rohan_yavanna: "Fields of Foldewyn"
 faith_rohan_yavanna_adj: "Foldewyn"
 faith_rohan_yavanna_adherent: "Adherent of Foldewyn"
 faith_rohan_yavanna_adherent_plural: "Adherents of Foldewyn"
 faith_rohan_yavanna_desc: "In the more sedentary parts of [rohan|E], [foldewyncharacter|E] has begun to take primacy over [bemacharacter|E]. Her maternal care for the earth and the fields wins admirers far and wide, and the farmers look to her for blessings on their crops. Great harvest festivals and fairs dot the land, the people rejoicing in the bounty of mother earth - and mother [foldewyncharacter|E]."
  
  #Framling Faiths localization 
 faith_framling: "Liffrea"
 faith_framling_adj: "Liffrean"
 faith_framling_adherent: "Follower of Béma"
 faith_framling_adherent_plural: "Followers of Béma"
 faith_framling_desc: "In their long isolation, what few of the [eothed|E] remained in the upper reaches of the [anduinvale|E] by necessity became a hardened people. In the harsh north, the ancient, key figure of [bemacharacter|E] came to assimilate many of the other traditional [northmen|E] gods and understandings of the [valargods|E], moving to, if not the sole God, the only major one invoked.\n\nLoving to His people, harsh to those who would threaten them, the Horselord stands vigilant and stalwart as the guardian of the North."
  
  ### Drúedain Religion ### 
  
