 druedain_religion: "Drúedain" !
 druedain_religion_desc: "The Drúedain maintain a simple religion to match their simple lives, offering respect to the spirits of nature around them." !
 druedain_religion_adj: "Drúedain" !
  
 faith_druedain: "Drûghic"
 faith_druedain_adj: "Drûghic"
 faith_druedin_adherent: "Drû"
 faith_druedain_adherent_plural: "Drûath"
 faith_druedain_desc: "The Drûath live a simple existence but don't mistake their simplicity for stupidity. The Drûath see the Powers in everything around them – the rocks, the trees, and the animals, and as such have a great respect for them. Paying homage to these lesser spirits is just as important as praising [erutheone|E] and the Powers, and in many ways this deep seeded respect has shaped all of Drûath society."
 faith_druedain_old: "Old Drûghic"
 faith_druedain_old_adj: "Old Drûghic"
 faith_druedin_old_adherent: "Old Drû"
 faith_druedain_old_adherent_plural: "Old Drûath"
 druedain_religious_head_title: "Grand Druid"
 druedain_religious_head_title_name: "Spirit-Speakers"
 druedain_priest_male: "Druid"
 druedain_priest_male_plural: "Druids"
 druedain_bishop: "High Druid"
 druedain_bishop_plural: "High Druids"
  
  ### Bellakarean Religion ### 
 bellakari_religion: "Bellakarean"
 bellakari_religion_desc: "The lands of the old [bellakar|E]ean League are the home to many faiths formed as an evolution and reaction towards the melding of their [numenorean|E] and [haradric|E] heritage."
 bellakari_religion_adj: "Bellakarean"
  
 faith_path_of_wisdom: "Batân an-Izindi"
 faith_path_of_wisdom_adj: "Batân an-Izindi"
 faith_path_of_wisdom_adherent: "Izindithôn"
 faith_path_of_wisdom_adherent_plural: "Izindithôni"
 faith_path_of_wisdom_desc: "The Batân an-Izindi, Adunaic for 'The Path of Wisdom', is a religion of revelation begun by Imrathôr of Narîk-Zadan, known to history as Izindubêth the Prophet. The faith emphasizes the supremacy of [eruiluvatar|E] above all living things, even the [valargods|E]. The Kolir (Ainur) should be invoked and remembered, but their place of subordination to [erutheone|E] remembered, so that one does not, in their fervor for the Kolir, supplant [erutheone|E] who made them. \n\nIzindubêth is said to have received his revelations on the great mountain Urud an-Khibil, after five days of contemplation. Izindubêth in his revelation percieved that Ilúvatar's proper place and reverence was slowly being worn away by the Haradrim traditions Kâthasaptha sought to integrate. Thus he sought to return to a more pure and contemplation centered way of faith, and so the Batan an-Izindi was born. Izindubêth was given leave to preach throughout all of Bellakar, and many hearkened to his message. \n\nTo this day it has maintained its simple but powerful faith, striving not to enforce Eru's word by the sword but by diligent evangelism, and in friendship with the High Kings of [bellakar|E] and the Kâthasaptha. However, when the darkness or the profane dare to encroach upon the sacred lands of the faithful, the Army of the Righteous has arisen to fight in the name of the Allfather. \n\n#TOLKIENQUOTE "The One whom the Adûnâi name Êru, whom the Tumakveh deem Infinite in Wisdom—this One has sent me to make known the Batân an-Izindi, the Path of Truth, to those who will listen."#! \n\n#QUOTEDCHARACTER - Imrathôr Izindubêth upon descending from the Urud an-Khibil"
 path_of_wisdom_head_title: "Izindubêth"
 path_of_wisdom_head_title_name: "Izindizanda Êruhînim"
 path_of_wisdom_priest_male: "Sapthân"
 path_of_wisdom_priest_male_plural: "Sapthâni"
 path_of_wisdom_bishop: "Târik-Sapthân"
 path_of_wisdom_bishop_plural: "Târiki-Sapthân"
  
 faith_infinite_wisdom: "Kâthasaptha"
 faith_infinite_wisdom_adj: "Kâthasaptha"
 faith_infinite_wisdom_adherent: "Kâthasapthôn"
 faith_infinite_wisdom_adherent_plural: "Kâthasapthôni"
 faith_infinite_wisdom_desc: "Kâthasaptha, or 'Infinite Wisdom', refers to the syncretic faith founded by [zimrebal|E], first king of [bellakar|E]. [zimrebal|E] desired to unify his kingdom by bridging its two largest religious groups, the Númenórean Eruists and the native faiths of the Bellanarod. To achieve this, he identified the [haradrim|E] Tarkarûn-i-Mâsra (the ancient sky-god) with [eru|E], and the other pantheon members with the Valar or Maiar. In particular he claimed the moon goddess Ladnoca, which the Númenóreans equated to Varda, had been the one to give him this charge and the source of his divine mandate. He integrated the Númenórean and Bellanarod religious calendars and created a new fane in the style of Meneltarma upon Izindutârik, where the kings of Bellakar could offer prayers in the name of the Faithful to the [erutheone|E]. \n\nThis syncretism did not satisfy either side of the kingdom fully, with the more zealous [faithfulshort|E] claiming that the faith had been tainted by 'Southron Blasphemies' and the [haradrim|E] unsatisfied by the re-elevation of an ancient, all-but-forgotten god to the same level as the goddess Ladnóca, patroness of mankind. However, this syncretism has with time become accepted and embraced by a large majority of [bellakar|E], though traditional Haradrim cults and Númenórean worship still persist alongside it."
  
 faith_conservative_eruism: "Êru-bên"
 faith_conservative_eruism_adj: "Êru-bên"
 faith_conservative_eruism_adherent: "Êruhîn"
 faith_conservative_eruism_adherent_plural: "Êruhîni"
 faith_conservative_eruism_desc: "While much of the Bellakari have embraced either the ways of Kâthasaptha or the revelations of Izindubêth in their worship of [erutheone|E], there remains those who defiantly cling to what they view as a pure, unmingled [numenorean|E] faith tradition, untainted with the [haradric|E] blashphemies their kin have adopted. \n\nIn the absence of the Line of [elrosshort|E] and the [meneltarma|E] upon which to offer words to the One, the adherents of Êru-bên have come to the conclusion that every man bears the right to call upon and account himself before the One. The [tumakveh|E] may be able to speak for the [faithfulshort] of Bellakar as a body and present prayers upon Izindutârik, but each member of the faithful has that right as well."
  
