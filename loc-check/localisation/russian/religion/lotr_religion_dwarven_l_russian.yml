l_russian:
  ### Dwarven Religion ### 
 dwarven_religion: "Гномск"
 dwarven_religion_desc: "[dwarves|E] в особой мере поклоняются и боготворят Вала [aulecharacter|E], своего создателя, но не забывают и о роли остальных [valargods|E]."
 dwarven_religion_adj: "Гномы"
  
 faith_khazad: "Кхазадск"
 faith_khazad_adj: "Кхазад"
 faith_khazad_adherent: "Кхазад"
 faith_khazad_adherent_plural: "Кхазад"
 faith_khazad_desc: "Древние верования [Concept( 'dwarves', 'гномов' )|E], связанные с поклонением [Concept( 'mahalcharacter', 'Махалу' )|E], их создателю и отцу. Они также с глубоким трепетом относятся к своей истории и чести семьи, сохраняют память о своих предках, возводят грандиозные усыпальницы и мавзолеи, чтобы вернуться в землю, из которой они и вышли.\n\nГномы верят, что после смерти [mahalcharacter|E] созывает их в удалённые чертоги, чтобы ожидать Последней Битвы, после которой они, бок о бок с ним перестроят мир, заняв достойное место среди Детей Эру."
