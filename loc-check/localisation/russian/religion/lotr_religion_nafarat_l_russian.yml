l_russian:
 nafarat_religion: "Нафаратск"
 nafarat_religion_adj: "Нафарат"
 nafarat_religion_desc: "Нафарат — по своей сути религиозный остров в море прочих верований Харада. Помимо паствы Нафарати и находящейся в упадке веры Абрахана, немногие конфессии похожи на эту."
  
  #Abrakhân 
 faith_kanra: "Канрийск"
 faith_kanra_adj: "Канра"
 faith_kanra_adherent: "Последователь Канры"
 faith_kanra_adherent_plural: "Последователи Канры"
 faith_kanra_desc: "В те времена, когда Золотой король управлял Абраханом, он воздвиг ужасающий храм в честь своего покровителя — Зигура. И хотя сам он давно канул в лету, культ Зигура устоял. Его догматы слились воедино с памятью о Золотом короле, образовав новую систему верований: жуткий божественный правитель, что требует дани кровью и богатствами для украшения своих храмов и чертогов.\n\nНесмотря на это, последователи Канры также сохранили свою веру в гигантскую мифическую птицу, что обитает в Канрийских горах. Эта птица издревле служит знаком защиты и гарантом безопасности. Считается, что в давние времена эта птица была защитником и проводником для их предков."
  
 faith_nafar: "Нафарканск"
 faith_nafar_adj: "Нафар"
 faith_nafar_adherent: "Последователь Нафара"
 faith_nafar_adherent_plural: "Последователи Нафара"
 faith_nafar_desc: "В незапамятные времена народ, почитающий Нафара пришёл с востока. Они вошли в Великие Джунгли и отыскали там реку, на берегу которой ютилось золотое святилище. Старейшины собрались и объявили, что это — знак. Знак, согласно которому именно здесь они и должны были поселиться. Что это место станет их домом.\n\nИ даже когда Великие Джунгли превратились в пустыню, а река изменила русло, верующие не отступили, хотя их сородичи и отправились в тяжелый переход на юг, через горы.\n\nНастойчивость, решительность и напор — вот те качества, которые боги ценят превыше всего."
  
