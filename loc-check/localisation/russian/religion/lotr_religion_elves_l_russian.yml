  ### Elven Religion ### 
  
  #Elven Faiths localization 
 elven_religion: "Эльфийск"
 elven_religion_desc: "Как правило, эльфы не возводят храмов и не обучают священнослужителей, однако предпочитают более комплексный и устойчивый подход к поклонению, взывая к помощи Валар. Очень и очень редко они произносят имя Единого, поскольку считают, что оно слишком священно, чтобы поминать его всуе."
 elven_religion_adj: "Эльфы"
  
 faith_eldar: "Эльдавайтальск"
 faith_eldar_adj: "Эльдавайталэ"
 faith_eldar_adherent: "Эльда"
 faith_eldar_adherent_plural: "Эльдар"
 faith_eldar_desc: "Верования эльдар (кв. Эльдавайталэ) смотрятся мрачно и не подразумевают храмов и показного поклонения. У [valargods|E] они узнали о божественной природе мира и [ainulindale|E]. Они уважают и почитают Силы, и иногда призывают их на помощь, но не боготворят их, не молятся им. Молитвы могут быть адресованы лишь [Concept( 'erutheone', 'Единому' )|E], а имя его слишком священно, чтобы поминать его всуе."
  
 faith_calaquendi: "Калаквендийск"
 faith_calaquendi_adj: "Калаквенди"
 faith_calaquendi_adherent: "Калаквенде"
 faith_calaquendi_adherent_plural: "Калаквенди"
 faith_calaquendi_desc: "[uttermostwest|E] — дом высших эльфов Калаквенди. Они поддерживают в чистоте традиции, сложившиеся при основании мира. Эти традиции передали им сами Силы во время их пребывания в Валиноре.\n\nВо времена до создания Эа был лишь Эру, Единый, кого жители Арды называют Илуватаром. Он создал Айнур и они, под его предводительством исполнили великую песнь. Но Мелькор, самый могущественный из Айнур, решил завладеть песней и поработить Илуватара. Так в мотив встроились тёмные ноты, породив всё зло мира. Наконец, когда песня завершилась, Илуватар показал Айнур плоды их работы. А затем произнёс одно слово: «Эа», что значит бытие. Так всё и началось.\n\nНекоторые Айнур решили спуститься в Арду и поселиться там. Самых могущественных из них стали называть Валар. Через какое-то время, однако, из зависти и злости, Мелькор последовал за ними. Он начал войну между силами перед пробуждением Детей Эру. Наконец, когда завершились труды Айнур, пробудились Дети Эру. Они оказались в мире поврежденном, но не уничтоженном."
  
 faith_lomequendi: "Ломиквендийск"
 faith_lomequendi_adj: "Ломиквенди"
 faith_lomequendi_adherent: "Ломиквенде"
 faith_lomequendi_adherent_plural: "Ломиквенди"
 faith_lomequendi_desc: "[noldorelvesexiles|E] прозвали [sindarelves|E] и других эльфов, примкнувших к [Concept( 'greatjourney', 'Великому Походу' )|E] и не добравшихся до Валинора — ломиквенди, или Сумеречными Эльфами. Ломиквенди долгие годы накапливали знания во взаимодействии со своими сородичами аманьяр, а также майа Мелиан. Их религиозные традиции очень сильно напоминают традиции калаквенди. Тем не менее, им присущи и собственные традиции. Например, они чаще проводят ритуалы и организуют обряды инициации. Охоты могут посвящаться Оромэ, а сбор урожая Йаванне, причём делается это с большим формализмом, нежели в у калаквенди, которые прибегают скорее к молитвам и вознесению хвалы."
  
 faith_moriquendi: "Мориквендийск"
 faith_moriquendi_adj: "Мориквенди"
 faith_moriquendi_adherent: "Мориквенде"
 faith_moriquendi_adherent_plural: "Мориквенди"
 faith_moriquendi_desc: "Мориквенди их нарекли калаквенди после того, как первые отказались ответить на зов Валар и покинуть Кувиэнен. Традиции и обычаи мориквенди разнятся, серьёзно отличаясь в зависимости от места, времени, или конкретных племён. В этой связи их более высокородные сородичи на западе могут считать их "непросвещёнными". Их знания о Силах основаны на обрывках древних полузабытых воспоминаний о мимолётных встречах. В то же время они почитают Силы и Единого по-своему. Пусть подчас им не достаёт знаний о высшей правде, которыми обладают калаквенди, нельзя не отдать должное чистоте их веры и помыслов."
  
 faith_nandorin: "Даэта-тауронск"
 faith_nandorin_adj: "Даэта Таурон"
 faith_nandorin_adherent: "Тауронист"
 faith_nandorin_adherent_plural: "Тауронисты"
 faith_nandorin_desc: "Несмотря на то, что им не удалось проделать путь до конца, эльфы нандор из Зеленолесья, Лориэна и Долины Андуина всё же отправились в Великий поход. Во время своего длительного перехода они повстречали лишь одного из представителей Сил – Таурона, Великого Всадника, Охотника. Он бдительно оберегал их, говорил с ними, направлял их в путешествии на запад.\n\nИ пусть они слышали и о других Силах, Таурон занимал особое место в пантеоне нандор, уступая лишь Эльберет, Королеве звёзд.\n\nВ своей духовной жизни нандор обзавелись традициями проведения священной охоты и празднеств, в которых отражалась охота Таурона в ту пору, когда мир был юн."
  
 faith_conversion_cost_forces_of_evil: "Обращение к силам Тьмы"
  
  ### Ainur Religion ### 
 ainur_religion: "Айнурск"
 ainur_religion_adj: "Айнур"
 ainur_religion_desc: "Верования и ритуалы Айнур, что сошли в мир"
  
 faith_ainur: "Атарафелунск"
 faith_ainur_adj: "Атарафелун"
 faith_ainur_adherent: "Айну"
 faith_ainur_adherent_plural: "Айнур"
 faith_ainur_desc: "Сам [iluvatar|E] поручил [ainurgods|E] управлять Миром и повелевать Детьми Эру. И хотя это не всегда удаётся лучшим образом, [ainurgods|E] стремятся не посрамить ожиданий создателя, править по чести и справедливости.\n\nАтарафелун — одно из немногих известных слов языка валарин, на котором говорят Силы. Те, кто не принадлежат Айнур, не могут на нём говорить. Вольно это слово можно перевести как «Помазанный мир», мир [ardaconcept|E], созданный Айнур в Великой Песне, под руководством [eruiluvatar|E]."
