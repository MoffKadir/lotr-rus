l_russian:
 dru_diaspora_religion: "Другу"
 dru_diaspora_religion_adj: "Другск"
 dru_diaspora_religion_desc: "Другу — это таинственная раса людей, известная своим низким ростом и закрытостью. Они чтят духи и живут в гармонии с естественной средой, а также создают статуи, которые, кажется, наполнены собственным духом."
  
  ### Honnin ### 
 faith_honnin: "Ону"
 faith_honnin_adj: "Онск"
 faith_honnin_adherent: "Ону"
 faith_honnin_adherent_plural: "Онуи"
 faith_honnin_desc: "Древние верования народа Хоннин, основанные на историческом уважении к духам земли, что когда-то населяли в большом числе земли Раи: Нермир и Тавари. И хотя этих духов не видели уже многие годы, знания о богах, полученные от них, остались.\n\nВ древних храмах монахи-шаманы из орденов Ону возносят хвалу многочисленным богам. К наиболее почитаемым из них относятся Сузуш, Хика и Ару-Байто."
  
