  ### Elves ### 
 elves_in_edhellond: "Эльфийское влияние"
 bustling_elven_harbour: "Bustling elven harbour"
  
  
  ### Dúnedain Modifiers ### 
 anduril_modifier: "Андуриль"
 anduril_modifier_desc: "Перекованный и восстановленный из обломков [narsil|E], "[flameofthewest|E]" символизирует воодушевление и силу дунэдайн."
 princely_house_of_dol_amroth: "Княжеский дом Дол Амрота"
 princely_house_of_dol_amroth_desc: "Из-за их связи с Элендилом эта династия была удостоена княжеской чести."
 princely_house_of_ithilien: "Княжеский дом Итилиэн"
 princely_house_of_ithilien_desc: "Благодаря их верному служению королям Гондора, этот дом был удостоен княжеской чести."
 princely_house_of_cardolan: "Княжеский дом Кардолана"
 princely_house_of_cardolan_desc: "Из-за их готовности признать истинных королей Арнора этому дому была дарована княжеская честь."
 siege_of_gondor: "Осада Гондора"
 siege_of_gondor_desc: "Гондор оказывается в тяжелом положении со стороны своих многочисленных врагов. И все же доблесть Гондора не истощается и сплачивается, чтобы защитить себя."
 return_of_the_king_modifier: "Возвращение короля"
 return_of_the_king_modifier_desc: "Возвращение их короля обновило боевой дух [gondorian|E]. Теперь он сплачивает их для последнего удара по Темному Лорду и его прислужникам."
  
  ### War Misc ### 
 lotr_conquering_modifier: "Great Conquerors"
 lotr_conquering_modifier_desc: "Whether out of need or desire for glory, members of this house intend on immortalising their name, worthy amongst even the most revered of their ancestors through blood and iron."
  
  ### Dorwinion Factions ### 
 winelords: "Винные Лорды"
 winelords_desc: "Эта династия встала на сторону Винных Лордов."
 master_merchants: "Великие Купцы"
 master_merchants_desc: "Эта династия относит себя к Великим Купцам."
  
  ### Rhovanion Modifiers ### 
 heir_of_vidugavia: "Наследник Видугавии"
 heir_of_vidugavia_desc: "Стойкое лидерство этой династии привело к восстановлению Королевства Рованион, и их народ надеется, что они продолжат вести их в будущее."
 savior_of_rhovanion: "Спаситель Рованиона"
 savior_of_rhovanion_desc: "Этот персонаж отвоевал равнины Рованиона для своего народа, а процветание и размеры их владений превосходят даже легендарную Видугавию. Они уже становятся персонажами легенд и фольклора, почитаемыми и почитаемыми своим народом."
  
  ### Rhun Modifiers ### 
 rising_star_medloshukain: "Rising Star of Medlóshûkain"
 rising_star_medloshukain_desc: "Due to their personal prowess and popularity with their peers, this lord seems like a shoe-in to the position of Loke-kan"
  
  ### Anduin Vale ### 
 aladegan: "Аледеган"
 aladegan_desc: "Эта династия признаётся в качестве дома Аледегана, полноправных правителей Леса и Долины"
  
  ### Khand ### 
 ascendant_khand: "Лидеры возрождающегося Кханда"
 ascendant_khand_desc: "Эта династия привела Кханд в золотую эру расцвета, силы и единения. И хотя, как правило, Кханд после смерти правителя распадается на малые части, эта династия столь известна и любима, что ей, возможно, удасться предотвратить скорый распад."
  
  ### Dunedain Widowhood ### 
 refused_widowhood_modifier: "Отказ от вдовства"
 refused_widowhood_modifier_desc: "Этот персонаж решил не соблюдать традиции своего народа и отказался исполнить свои священные обязательства о верности одному человеку в браке даже в посмертии."
  
  ### Oath of Eorl ### 
 raised_large_oath_host_modifier: "Поднял большое воинство"
 raised_large_oath_host_modifier_desc: "Этот персонаж выполнил свою Клятву и послал большое войско в поддержку своего союзника."
 raised_small_oath_host_modifier: "Поднял малое воинство"
 raised_small_oath_host_modifier_desc: "Этот персонаж выполнил свою Клятву и послал небольшое войско в поддержку своего союзника."
 muster_of_rohan_modifier: "Рохан собирает войска"
 muster_of_rohan_modifier_desc: "Этот персонаж ответил на призы сюзерена и отправил ему в поддержку эоред."
  
  ### Isengard ### 
 friend_of_the_dunlendings_character_modifier: "Друг дунландцев"
 friend_of_the_dunlendings_character_modifier_desc: "Этот персонаж работал над объединением дунландцев под властью их собственного народа, заслужив их благодарность."
 enemy_of_the_dunlendings_character_modifier: "Враг дунландцев"
 enemy_of_the_dunlendings_character_modifier_desc: "Этот персонаж несправедливо претендовал на земли Дунланда и стремился заставить его жителей преклонить колени против их воли."
 unifier_of_the_dunlendings_character_modifier: "Объединитель дунландцев"
 unifier_of_the_dunlendings_character_modifier_desc: "Этот персонаж сумел объединить свой раздробленный народ под единым знаменем, заслужив их любовь."
 herdfolk_dunlending_opinion: "Herdfolk Dunlending Opinion" !
 hill_dunlending_opinion: "Hill Dunlending Opinion" !
 isengard_dunlending_opinion: "Мнение Изенгарда Дунландца"
 gondorian_opinion: "Гондорское мнение"
 rohirrim_opinion: "Мнение Рохиррим"
 loyal_dunlendings_of_isengard_county_modifier: "Верные дунландские гарнизоны"
 loyal_dunlendings_of_isengard_county_modifier_desc: "Гарнизон в этой провинции был поддержан группой верных воинов Дунландца."
 stripped_of_raw_resources_county_modifier: "Исчерпаны природные ресурсы"
 stripped_of_raw_resources_county_modifier_desc: "Многие естественные запасы камня и древесины были истощены за пределами Изенгарда, чтобы удовлетворить постоянно растущие потребности промышленности."
 shoddy_steel_character_modifier: "Низкокачественная сталь"
 shoddy_steel_character_modifier_desc: "Этот персонаж не смог обеспечить свои кузницы ресурсами, необходимыми для правильной работы, что привело к более низкому качеству стали для вооружения отрядов под их командованием."
 mustered_rohirrim_character_modifier: "Эоэрэ Собрана"
 mustered_rohirrim_character_modifier_desc: "Этот персонаж собрал большую часть своих войск, чтобы сформировать Эохэрэ для защиты Риддермарка."
 ineffective_agents_character_modifier: "Неэффективные агенты"
 ineffective_agents_character_modifier_desc: "Агенты этого персонажа недавно доказали свою неэффективность в проведении интриг и коварства."
 industrialised_isengard_1_county_modifier: "Мастерские Изенгарда"
 industrialised_isengard_1_county_modifier_desc: "Орки под командованием Сарумана разграбили древние нуменорские сады Изенгарда, вырубив деревья и построив обширные мастерские и жилые помещения для орков в недавно выкопанных ямах."
 industrialised_isengard_2_county_modifier: "Печи Изенгарда"
 industrialised_isengard_2_county_modifier_desc: "Орки под командованием Сарумана разграбили древние нуменорские сады Изенгарда, заменив их открытыми ямами, изрыгающими дым и сажу из бесчисленных подземных печей и кузниц."
 industrialised_isengard_3_county_modifier: "Промышленный комплекс Изенгарда"
 industrialised_isengard_3_county_modifier_desc: "Орки под командованием Сарумана разграбили древние нуменорские сады Изенгарда и вырыли подземный промышленный лабиринт, питая постоянно растущую военную машину волшебника."
 industrialised_isengard_1_province_modifier: "Ямы Изенгарда"
 industrialised_isengard_1_province_modifier_desc: "Эти ямы дали свежий камень и металл под ныне опустошенными садами Изенгарда."
 industrialised_isengard_2_province_modifier: "Копи Изенгарда"
 industrialised_isengard_2_province_modifier_desc: "Богатства земли выкапываются из глубин Изенгарда как орками, так и людьми."
 industrialised_isengard_3_province_modifier: "Лабиринт Изенгарда"
 industrialised_isengard_3_province_modifier_desc: "Рабочие трудятся в постоянно растущей сети лабиринтов туннелей и пещер, добывая все ценное из земли под Изенгардом."
 westfold_raided_county_modifier: "Рейды в Вестфолде"
 westfold_raided_county_modifier_desc: "Эта провинция недавно подверглась набегам, и ее жители были разорены бандой организованных орков и дунландцев."
 seat_of_the_new_dark_lord_county_modifier: "Престол Нового Темного Лорда"
 seat_of_the_new_dark_lord_county_modifier_desc: "Эта провинция была укреплена Саруманом как место его власти в качестве нового Темного Лорда Средиземья."
 dunland_capital_modifier: "Место Верховного Короля"
 dunland_capital_modifier_desc: "Верховный король Дунланда выбрал эту провинцию своей столицей, и она принимает множество поселенцев-дунландцев."
 academy_tuition_fees_modifier_1: "Стоимость обучения"
 academy_tuition_fees_modifier_1_desc: "Этот персонаж получает регулярный доход от учеников, посещающих их академию."
 academy_tuition_fees_modifier_2: "Стоимость обучения"
