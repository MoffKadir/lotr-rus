 khand_heir_0_successes: "Совершенно непригодный для правления"
 khand_heir_0_successes_desc: "Лорды клана Варяг широко считают этого персонажа совершенно непригодным для управления ими."
 khand_heir_1_successes: "Непригодный для правления"
 khand_heir_1_successes_desc: "Лорды клана Варяг считают этого персонажа неподходящим для управления ими."
 khand_heir_2_successes: "Не хватает потенциала"
 khand_heir_2_successes_desc: "Лорды клана Варяг считают, что этому персонажу не хватает потенциала в качестве будущего правителя."
 khand_heir_3_successes: "Лидерский потенциал"
 khand_heir_3_successes_desc: "Лорды клана Варяг считают, что этот персонаж демонстрирует некоторый потенциал в качестве будущего правителя."
 khand_heir_4_successes: "Соответствовать правилу"
 khand_heir_4_successes_desc: "Лорды клана Варяг считают этого персонажа подходящим для своего будущего правителя."
 khand_heir_5_successes: "Естественный преемник"
 khand_heir_5_successes_desc: "Лорды клана Варяг широко считают этого персонажа естественным и бесплатным будущим правителем."
  
  ### Ring of Men event chain modifiers 
  
 peasants_spooked_by_nazgul_modifier: "Крестьяне боятся Назгулов"
 peasants_spooked_by_nazgul_modifier_desc: "Ваши крестьяне не раз сталкивались с грозными черными всадниками и неохотно покидают свои дома после наступления темноты."
  
 precious_obsession_modifier: "Драгоценный потерянный"
 precious_obsession_modifier_desc: "Драгоценное навсегда потеряно для вас, все, что вы можете сделать, это попытаться жить с этой зияющей раной внутри вас."
  
  ### Hold court modifiers 
 hold_court_physician_attending_vassal_modifier: "Врач, посещающий вассала"
 hold_court_physician_attending_vassal_modifier_desc: "Этот персонаж в настоящее время лечит неизлечимо больного пациента и имеет ограниченное время для выполнения других обязанностей."
  
 hold_court_physician_teaching_modifier: "Преподавание врача"
 hold_court_physician_teaching_modifier_desc: "Этот персонаж в настоящее время обучает коллегу-человека тому, что он может, о способах эльфийского исцеления, и у него ограниченное время, чтобы заняться другими обязанностями."
  
