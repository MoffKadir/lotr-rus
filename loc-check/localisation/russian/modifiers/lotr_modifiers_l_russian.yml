  ### Elf Modifiers ### 
 elf_childraising_modifier: "Воспитание ребенка"
 elf_childraising_modifier_desc: "Этот персонаж и его супруг духовно привержены воспитанию своего ребенка до зрелости."
 elf_child_limit_modifier: "Закончили воспитывать детей"
 elf_child_limit_modifier_desc: "Этот эльф завершил часть своей жизни, связанную с воспитанием детей, и их желание производить потомство прекратилось.\n\nХотя они всегда будут оглядываться на те дни с большой любовью, теперь они направили свои силы тела и разума на другие задачи и искусства."
  
 elven_homeland_county_modifier: "Родина эльфов"
 elven_homeland_county_modifier_desc: "Это графство является традиционной родиной эльфов и может стать целью Elven Restoration Casus Belli."
  
 valar_ban_modifier: "Запрет Валар"
 valar_ban_modifier_desc: "Из-за их мятежа, гордыни или отказа покаяться этот персонаж находится под запретом Валар, лишенным права плавать в Валинор."
  
 hidden_elven_refugees_modifier: "Скрытые эльфийские беженцы"
 hidden_elven_refugees_modifier_desc: "Хотя подавляющее большинство эльфов, которые когда-то жили здесь, бежали, все же остались некоторые упрямые противники, наносящие удары по оккупантам их земли из скрытых убежищ."
  
 marauding_orc_drags_modifier: "Мародерство орков"
 marauding_orc_drags_modifier_desc: "Хотя орки, которые когда-то населяли эту землю, обычно либо бежали, либо были преданы мечу, некоторые банды орков все еще бродят по земле, грабя и преследуя жителей."
  
 legacy_of_oropher_modifier: "Наследие Орофера"
 light_of_the_forest_modifier: "Свет леса"
  
  ### Route Modifiers ### 
  
 rhun_road_province_modifier: "Рун Роуд"
 rhun_road_province_modifier_desc: "Эта провинция лежит на «Дороге Руна», главном торговом пути с востока на запад в северном Средиземье."
 rhun_road_income_character_modifier_1: "Плата за проезд по Рун-Роуд (I)"
 rhun_road_income_character_modifier_1_desc: "Этот персонаж контролирует небольшой участок Рунской дороги, способный взимать мизерные пошлины с караванов и путешественников."
 rhun_road_income_character_modifier_2: "Плата за проезд Рун-Роуд (II)"
 rhun_road_income_character_modifier_2_desc: "Этот персонаж контролирует средний сегмент Рунской дороги, способный взимать небольшую плату с караванов и путешественников."
 rhun_road_income_character_modifier_3: "Плата за проезд Рун-Роуд (III)"
 rhun_road_income_character_modifier_3_desc: "Этот персонаж контролирует примерно треть Рунской дороги, способный взимать приличную сумму пошлин с караванов и путешественников."
 rhun_road_income_character_modifier_4: "Плата за проезд по Рун-Роуд (IV)"
 rhun_road_income_character_modifier_4_desc: "Этот персонаж контролирует чуть менее половины Рунской дороги, способной взимать солидные пошлины с караванов и путешественников."
 rhun_road_income_character_modifier_5: "Плата за проезд Рун-Роуд (V)"
 rhun_road_income_character_modifier_5_desc: "Этот персонаж контролирует примерно половину Рун-роуд, способный взимать значительную плату с караванов и путешественников."
 rhun_road_income_character_modifier_6: "Плата за проезд Рун-Роуд (VI)"
 rhun_road_income_character_modifier_6_desc: "Этот персонаж контролирует большую часть Рунской дороги и может взимать значительную плату с караванов и путешественников."
 rhun_road_income_character_modifier_7: "Плата за проезд Рун-Роуд (VII)"
 rhun_road_income_character_modifier_7_desc: "Этот персонаж контролирует большую часть Рунской дороги и может взимать огромные суммы с караванов и путешественников."
 rhun_road_income_character_modifier_8: "Плата за проезд Рун-Роуд (VIII)"
 rhun_road_income_character_modifier_8_desc: "Этот персонаж контролирует три четверти Рунской дороги и может взимать большие пошлины с караванов и путешественников."
 rhun_road_income_character_modifier_9: "Плата за проезд Рун-Роуд (IX)"
 rhun_road_income_character_modifier_9_desc: "Этот персонаж контролирует почти всю Рунскую дорогу, способную взимать прибыль с караванов и путешественников."
 rhun_road_income_character_modifier_10: "Плата за проезд Рун-Роуд (X)"
 rhun_road_income_character_modifier_10_desc: "Этот персонаж контролирует всю Рунскую дорогу, способный диктовать любые пошлины караванам и путешественникам, которые они пожелают."
  
  ### Orc Modifiers ### 
 berserker_training_modifier: "Путь берсеркера"
 berserker_training_modifier_desc: "Этот персонаж тренируется, чтобы стать берсеркером."
  
 orc_traitor_modifier: "Орк-предатель"
 orc_traitor_modifier_desc: "Этот персонаж — предатель, который свернул с истинного орочьего пути."
  
 orc_challenge_retired_modifier: "Грязный трус"
 orc_challenge_retired_modifier_desc: "Этот персонаж — трус, который не явился на бой, который сам же и спровоцировал."
  
 orc_challenge_rejected_modifier: "Отклонил бой насмерть"
 orc_challenge_rejected_modifier_desc: "Этот персонаж отклонил вызов на смертельную схватку."
  
 orc_challenge_win_modifier: "Достойный лидер орков"
 orc_challenge_win_modifier_desc: "Этот персонаж одержал верх в схватке на смерть и утвердил собственное лидерство."
  
 orc_great_warchief_modifier: "Великий вождь"
 orc_great_warchief_modifier_desc: "Этот персонаж объединил орков под своими знамёнами с помощью силы и жестокости, послужив вестником новой эры доминирования орков."
  
 orc_champion_bodyguard_modifier: "Орочий воин-телохранитель"
 orc_champion_bodyguard_modifier_desc: "Этот персонаж нанял на службу могучего орка-воителя."
  
 orcs_morgai_fly_master_modifier: "Моргайский муховод"
 orcs_morgai_fly_master_modifier_desc: "Самопровозглашённый дрессировщик жутких и опасных Моргайских мух. В этом персонаже мухи организовали своё гнездо. На него неприятно смотреть, а сойтись с ним в бою – и вовсе страшно. Но жить ему осталось, вероятно, недолго..."
  
 orcs_ghul_kin_modifier: "Любитель гулей"
 orcs_ghul_kin_modifier_desc: "Этот орк восхищается и вдохновляется отвратительными вредителями Мордора, известными как гули. Персонаж живёт с ними, спит среди них и идёт с ними в бой. Пусть другие орки его сторонятся и отталкивают, его это мало волнует, поскольку у него уже есть новая «семья»."
  
  ### Corsair Modifiers ### 
 lotr_corsair_modifier: "Корсар"
 lotr_corsair_modifier_desc: "Всем известно, что этот персонаж не проявит жалости к тем, кого в море постигло несчастье."
 lotr_sea_aid_modifier: "Матросы-рекруты"
 lotr_sea_aid_modifier_desc: "Этот персонаж набрал несколько матросов-рекрутов после спасения их в море."
 lotr_sea_left_modifier: "Покинул моряков"
 lotr_sea_left_modifier_desc: "Всем суждено умереть, а море ничуть не хуже дыры в земле."
  
  ### Umbar Modifiers ### 
 political_violence: "Политические беспорядки"
 political_violence_desc: "В этой провинции происходят жестокие политические беспорядки"
  
  ### Rohirrim Modifiers 
 lotr_tracked_orcs_modifier: "Выследил орков"
 lotr_tracked_orcs_modifier_desc: "Этот персонаж вместе со своим отрядом выяснил местоположение крупного лагеря орков. Король, получив информацию, быстро уничтожил его."
 lotr_rohan_orcslayer_modifier: "Убийца орков"
 lotr_rohan_orcslayer_modifier_desc: "Этот персонаж снискал честь и уважение для себя и своего отряда, уничтожив крупный орочий патруль в Королевских землях, что не осталось незамеченным..."
  
 rohirrim_settlement: "Поселения рохиррим"
 rohirrim_settlement_desc: "В этом регионе наблюдается приток поселенцев рохиррим, что приводит к росту населения и активному строительству. Местные, однако, не в восторге от этих пришельцев."
  
 meara_story_modifier: "Meara Rider"
 meara_story_modifier_desc: "This individual rides one of the Mearas, the kings of horses descended from Felaróf, the legendary mount of Eorl the Young"
  
 bonded_with_meara_modifier: "Meara Friend"
 bonded_with_meara_modifier_desc: "This individual has bonded with their Meara mount, they now move and fight as one."
  
 resurgent_eotheod: "Resurgent Éotheod"
 resurgent_eotheod_desc: "The Éotheod have recently begun to increase in numbers and are starting to rebuild and reorganize."
  
 rider_of_the_mark: "Всадник Марки"
  
 wisdom_of_brego: "Мудрость Брего"
  
 blood_eorl_the_young: "Кровь Эорла Юного"
  
  # Haradrim Modifiers 
 jelut_unifier_modifier: "Собиратель Джелут"
 jelut_unifier_modifier_desc: "This character has united the disparate Jelut tribes under their Kingdom."
  
  ### Druedain Modifiers ### 
 honnin_resettlements: "Создание хоннинских сообществ"
 honnin_resettlements_desc: "Сообщества хоннинов организовываются на этой территории как часть программы повторного заселения их древних земель"
  
  ### Bellakar Modifiers ### 
 northernfocus: "Внимание на север"
 northernfocus_desc: "Понимая, что настоящие сражения ждут на севере, этот персонаж поручил уделить особое внимание флоту и способствовать экспансии в северном направлении"
 southernfocus: "Защита Родины"
 southernfocus_desc: "Осознавая, что в первую очередь необходимо выступить на защиту Родины, этот персонаж отдал приказ подготовить силы к вторжению извне."
  
   ### Cult of Saints Modifiers ### 
 patron_saint_prophet_modifier: "Посвящается Изиндубету Пророку"
 patron_saint_prophet_modifier_desc: "Этот персонаж посвящает свое поклонение Изиндубету Пророку. Его обычно считают основателем Батан ан-Изинди, и он получал видения от Единого."
 patron_saint_militant_modifier: "Посвящается святому Тамарзиру Воинствующему"
 patron_saint_militant_modifier_desc: "Этот персонаж посвящает свое поклонение Святому Тамарзиру Воинствующему, великому Святому Мечу, который защитил веру от язычников в трудную минуту."
 patron_saint_wise_modifier: "Посвящается Святому Эрухору Мудрому"
 patron_saint_wise_modifier_desc: "Этот персонаж посвящает свое поклонение Святому Эрухору Мудрому, одному из величайших ученых и политиков Фелайи. Его религиозное учение укрепило уникальную индивидуальность и независимость Фелаи от Беллакара."
 patron_saint_pilgrim_modifier: "Посвящается святому Бредабану, покровителю паломников."
 patron_saint_pilgrim_modifier_desc: "Этот персонаж посвящает свое поклонение святому Бродабану, покровителю паломников, святому человеку, который путешествовал по миру, чтобы увидеть красоту, созданную [valargods|E], распространяя веру посредством паломничества."
 patron_saint_anointed_modifier: "Посвящается святому Бавабатору Помазаннику."
 patron_saint_anointed_modifier_desc: "Этот персонаж посвящает свое поклонение Святому Бавабатору II Помазаннику, Первому Лорду Фелаи, который был настолько набожным и добродетельным, что его следует помнить как пример для всех будущих правителей Фелаи."
 patron_saint_chaste_modifier: "Посвящается Святой Бахгаллее Целомудренной"
 patron_saint_chaste_modifier_desc: "Этот персонаж посвящает свое поклонение святой Балгалейе Целомудренной, благочестивой и добродетельной монахине, посвятившей свою жизнь раздаче милостыни бедным."
 patron_saint_reformer: "Посвящается Святому Бору Реформатору"
 patron_saint_reformer_desc: "Этот персонаж посвящает свое поклонение Святому Бору Реформатору, новейшему Святому. Бор был амбициозным правителем, который преобразовал Теджин и показал своему народу истинную веру."
  
  ### Magic Modifiers ### 
 morgul_corruption_modifier: "Моргульская порча"
 morgul_corruption_modifier_desc: "Это место было осквернено грязными ритуалами [nazgulcharacter|E]."
  
 fading_morgul_corruption_modifier: "Слабеющая Моргульская порча"
 fading_morgul_corruption_modifier_desc: "Хотя эти земли удалось очистить от сил тьмы, в них остаются следы их былого правления. Люди здесь не живут."
  
  ### Dale Modifiers ### 
 thriving_dwarf_trade: "Процветающая торговля с гномами"
 thriving_dwarf_trade_desc: "Местный народ тесно связан со своими соседями-гномами, как экономически, так и политически. Эта связь привела к экономическому росту и притоку населения."
 minor_dwarf_trade: "Умеренная торговля с гномами"
 minor_dwarf_trade_desc: "Местные жители заключает небольшие торговые сделки с гномами, но в остальном стараются держаться от них подальше. Экономический рост носит ограниченный характер."
 collapsing_dwarf_trade: "Сниженная торговля с гномами"
 collapsing_dwarf_trade_desc: "Исторически местные жители вели активную торговлю с гномами, но по какой-то причине в последнее время её уровень упал, а местами и вовсе полностью сошёл на нет, от чего местная экономика пришла в упадок"
