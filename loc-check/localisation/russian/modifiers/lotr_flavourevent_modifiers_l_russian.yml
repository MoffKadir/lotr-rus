l_russian:
 flavourevent_sound_on_the_wind_positive: "Услышал мелодию ветра"
 flavourevent_sound_on_the_wind_positive_desc: "Этот персонаж недавно расслышал успокаивающие нотки в дуновениях ветра, что помогло ему настроиться на правильный лад."
 flavourevent_sound_on_the_wind_negative: "Услышал страшные завывания ветра"
 flavourevent_sound_on_the_wind_negative_desc: "Этот персонаж недавно расслышал тревожные нотки в завываниях ветра, что только усилило его сомнения."
  
 flavourevent_ate_honey_cake: "Съел медовый пряник"
 flavourevent_ate_honey_cake_desc: "Этот персонаж недавно попробовал медовый пряник ошеломительного вкуса прямиком из Долины Андуина."
  
 flavourevent_overheard_gossiping_servants: "Услышал сплетни"
 flavourevent_overheard_gossiping_servants_desc: "Подслушав местные сплетни, этот персонаж узнал кое-что новое."
  
 flavourevent_rumors_of_peasant_child: "Возможный крестьянский бастард"
 flavourevent_rumors_of_peasant_child_desc: "По слухам, этот персонаж затеял интрижку с кем-то из местных крестьян, плодом которой стал ребенок. И хотя никаких подтверждений слухам нет, зерно сомнения проросло."
  
 great_spice_trade_deal: "Превосходная сделка с торговцами специями"
 great_spice_trade_deal_desc: "Это графство получает существенные прибыли в связи с успешной сделкой, заключенной с торговцами специями из Раи."
  
 mediocre_spice_trade_deal: "Проходная сделка с торговцами специями"
 mediocre_spice_trade_deal_desc: "Это графство получает кое-какую прибыль от несколько невыгодной сделки, заключенной с торговцами специями из Раи"
  
 cup_of_coffee: "Ежедневная чашка кофе"
 cup_of_coffee_desc: "Чашка свежемолотого кофе в день помогает отточить рефлексы и настроить разум на нужный лад, пусть и сопровождается лёгкой раздражительностью."
  
 courting_boredom_modifier: "Скучающий"
  
 courting_irritation_modifier: "Раздраженный"
  
 courting_understood_modifier: "Понял"
  
 unusual_inspiration: "Необычное вдохновение"
 unusual_inspiration_desc: "Этот персонаж был вдохновлен странным выступлением оркского барда."
  
 recovering_from_storm_modifier: "Восстановление после Великого шторма"
 recovering_from_storm_modifier_desc: "Этот персонаж восстанавливается после сильного шторма. Они сильно ослаблены, и потребуется время, чтобы их сила вернулась."
