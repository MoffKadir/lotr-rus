l_russian:
  
  ### NORTHERN DUNEDAIN EVENTS ### 
  
  ### ELEGOST EVENTS ### 
 dunedain.0100.t: "Следопыты Севера"
 dunedain.0100.desc: "Со дня падения Форноста и гибели Арведуи, Следопыты Севера несли неусыпную стражу в дебрях некогда величественного Арнора. Некогда мы были гордым народом. Но ради выживания нам пришлось стать осторожнее и обратиться к кочевому образу жизни. Пока жив хоть один наследник Исильдура, не угасает и надежда для всех дунэдайн.\n\nЭлегост, сын Хальбарона, брат Хальбарада и родич вождя Арагорна, вы отправились далеко на юг, через величавую реку Гватло. Может быть даже слишком далеко. Но в землях Дунланда вы встречаете народ разделенный, отравленный коварством и происками сил зла. Можно ли спасти этих людей? Объединить их? Это целиком будет зависеть от ваших действий."
 dunedain.0100.a: "Мы отправимся в дебри."
 dunedain.0100.a.tt: "Вы начнёте своё завоевание."
 dunedain.0100.b: "Стоит вернуться на север."
 dunedain.0100.b.tt: "Вы оставите свои земли."
 dunedain_rangers_force: "Следопыты Дунэдайн"
