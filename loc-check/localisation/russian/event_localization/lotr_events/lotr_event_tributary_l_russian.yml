l_russian:
  
 tributary.0001.t: "Призыв к войне"
 tributary.0001.desc: "Ко мне в зал прибывают поспешные гонцы с новостями от [defender.GetFirstNameNoTooltip], в которых говорится, что на них напал мерзкий [attacker.GetFirstNameNoTooltip].\n\nПоскольку [defender.GetSheHe] находится под моей защитой, я имею честь явиться в [defender.GetHerHis] помощь. Должен ли я ответить на призыв к войне?"
 tributary.0001.a: "Эта война — оскорбление моего авторитета, войны!"
 tributary.0001.a.toast: "[protector.GetFirstNameNoTooltip] присоединяется к войне"
 tributary.0001.a.toast.protectorate.tt: "[protector.GetFirstNameNoTooltip] вступил в войну в защиту протектората [protector.GetHerHis]."
 tributary.0001.a.toast.tributary.tt: "[protector.GetFirstNameNoTooltip] присоединился к войне в защиту клиентского состояния [protector.GetHerHis]"
 tributary.0001.b: "Ты сам по себе..."
 tributary.0001.b.toast: "[protector.GetFirstNameNoTooltip] отказывается от призыва к войне"
 tributary.0001.b.toast.protectorate.tt: "[protector.GetFirstNameNoTooltip] отказался прийти вам на помощь, и вы больше не считаетесь протекторатом [protector.GetHerHis]"
 tributary.0001.b.toast.tributary.tt: "[protector.GetFirstNameNoTooltip] отказался прийти вам на помощь, и вы больше не считаетесь клиентом [protector.GetHerHis]"
  
 tributary.0002.t: "Заявка на свободу"
 tributary.0002.desc: "До меня дошли слухи, что [defender.GetFirstNameNoTooltip], такой же данник [attacker.GetFirstNameNoTooltip], поднял оружие против нашего сюзерена и призывает всех угнетенных правителей присоединиться к [defender.GetHerHim].\n\nТакой акт неповиновения был бы несомненно, нас ждет жестокое наказание, если мы потерпим неудачу!"
 tributary.0002.a: "Тогда мы не должны потерпеть неудачу..."
 tributary.0002.b: "[defender.GetSheHe|U] — дурак!"
  
 tributary.0007.t: "Призыв к войне"
 tributary.0007.desc: "Просматривая боевые планы предстоящей кампании, я обдумываю свою стратегию и наилучший путь к победе.\n\nКак сюзерен, я могу призвать на военную помощь государства-данники, хотя сомневаюсь, что они будут мне благодарны. за это.\n\nПослать ли мне вестников, призывающих их к оружию?"
 tributary.0007.a: "Нам нужен каждый человек, до которого мы можем добраться."
 tributary.0007.a.toast: "[aggressor.GetFirstNameNoTooltip] призывает [aggressor.GetHerHis] притоков"
 tributary.0007.a.toast.tt: "[aggressor.GetFirstNameNoTooltip] призвал [aggressor.GetHerHis] государства-данники присоединиться к войне"
 tributary.0007.a.toast.tribs: "Ваш сюзерен призывает вас к оружию"
 tributary.0007.a.toast.tribs.tt: "[aggressor.GetFirstNameNoTooltip] заставил вас оказывать военную поддержку в войне [aggressor.GetHerHis]"
 tributary.0007.b: "Я могу справиться с этим..."
 tributary.0007.b.tt: "Вы не призываете на помощь свои государства-данники"
