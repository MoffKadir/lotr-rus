l_russian:
  
  ### Abandon Darkness Events ### 
  #Khäz-gramaze 
 abdark.0001.t: "Культ рушащегося змея"
 abdark.0001.desc: "Культ Кхаз-грамаз в последнее время находится в неспокойном состоянии. После падения Барад-Дура популярность Культа неуклонно снижалась, и многие из моего народа начали возвращаться к старым способам поклонения.\n\n В моем дворе звучали все громче голоса, утверждающие, что это хороший развития и что мы должны низвергнуть наши оставшиеся святыни Царю-Змею и способствовать поклонению Нади-Манье.\n\n Я не могу притворяться, что в последнее время у меня самого не было сомнений. Независимо от моего решения, я должен занять четкую позицию относительно пути нашего народа."
 abdark.0001.a: "Мы достаточно долго обслуживаем Гхаз-грамаз."
 abdark.0001.at: "Вы кладете идола Нади-манье на свой личный алтарь."
 abdark.0001.b: "Ерунда, мы не можем отказаться от «Долгой мести»!"
 abdark.0001.bt: "Вы требуете, чтобы все ваши придворные оставались сильными в своей преданности Кхаз-грамазу."
 abdark.0001.btt: "Некоторые из графств вашего королевства все равно могут конвертироваться."
  
  # Kerkassk 
 abdark.0002.t: "Отсутствующий равнинный бог"
 abdark.0002.desc: "С тех пор, как Темный Лорд был унижен Западом, керкассикизм борется с трудностями. Наши церемонии уже не привлекают столько последователей, как когда-то, и ненависть, которая так долго подпитывала нас, похоже, угасает. В частном порядке многие из моих людей начали строить святыни Старому Пантеону наших предков. Многие из моих всадников плохо отзываются о Равнинном Боге, Керкасске, который, по-видимому, покинул нас, когда мы больше всего в нем нуждались, и воздают свои молитвы Древним Богам Тьмы и Света - Кор-Шархайгун и Хур-Ириге.\n\n Сегодня утром, Я оседлал лошадь и отправился в долгую поездку по равнинам Руна, чтобы подумать. Я не могу отрицать, что даже моя вера в Керкасску уже не так сильна, как когда-то. Но должен ли я действительно раз и навсегда отказаться от его поклонения?"
 abdark.0002.a: "Свет и Тьма, две стороны одной медали."
 abdark.0002.at: "Вы возвращаетесь из поездки, идете к своему личному храму и приносите зайца в жертву старому пантеону на всеобщее обозрение."
 abdark.0002.b: "Запад сгорит за их преступления! Я никогда не предам своего бога!"
 abdark.0002.bt: "Вы объявляете своим всадникам, что неверные будут привлечены к ответственности."
 abdark.0002.btt: "В любом случае, некоторые из графств вашего королевства могут преобразоваться."
  
