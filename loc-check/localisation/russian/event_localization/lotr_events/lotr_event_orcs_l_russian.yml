l_russian:
  
  
  ### ORC LIFESTYLE EVENTS ### 
  # Orc Commander Traits 
 orc_lifestyle.0010.t: "Война орков"
 orc_lifestyle.0010.desc: "Чтобы направлять орков в успешной кампании, иногда требуется... уникальный подход. Очень трудно контролировать орду, они плохо дисциплинированы и часто ссорятся между собой. \n\nКак вы будете держать своих собратьев под контролем?"
 orc_lifestyle.0010.a: "Несколько красивых баннеров и флагов должны поддерживать их в соответствующем порядке!"
 orc_lifestyle.0010.b: "Принеси мне хлыст! Боль и страх будут держать их в узде..."
 orc_lifestyle.0010.c: "Мне не нужно будет долго поддерживать их в порядке, если осада будет короткой..."
 orc_lifestyle.0010.d: "Я кричу громче всех, и они чувствуют ужас от моего имени."
 orc_lifestyle.0010.e: "Кончик моего клинка в задней части их никчемных шипов."
 orc_banners_of_the_great_eye_modifier: "Знамена Великого Ока"
 orc_banners_of_the_orc_modifier: "Знамена Орка"
  # Orc Hatred of the Free Peoples 
 orc_lifestyle.0020.t: "Ненависть к Свободному народу"
 orc_lifestyle.0020.desc: "Некоторые из рода орков направляют свою внутреннюю ненависть или страхи на какую-то специфическую культуру свободного народа.\n\nНапример, орки и гоблины города Гоблинов ненавидят гномов со слепой яростью. Орки горы Грам люто ненавидят всех хоббитов. Огхор-хай из леса Друэдайн - заклятые враги для любого из нас, кому не повезло найти их. Многие орки одновременно ненавидят эльфов и боятся их."
 orc_lifestyle.0020.a: "Все свободные люди будут страдать под моим гнетом."
 orc_lifestyle.0020.a.tt: "Направляйте свою ненависть ко всем странам и персонажам вместе со Свободными народами. Порабощение части населения приведет к замедлению развития и увеличению производства. Они будут буйствовать."
 orc_lifestyle.0020.hatred_free_folk_characters: "Все персонажи в вашем царстве, принадлежащие к Свободным народам"
 orc_lifestyle.0020.hatred_free_folk_titles: "Все графства в вашем королевстве, принадлежащие Свободным народам"
 orc_lifestyle.0020.b: "Люди! Я ненавижу вонь от этих грязных тарксов."
 orc_lifestyle.0020.b.tt: "Направьте свою ненависть ко всем странам и персонажам с помощью Свободных людей. Порабощение части населения приведет к замедлению развития и увеличению производства. Они будут буйствовать."
 orc_lifestyle.0020.hatred_free_folk_human_characters: "Все персонажи в вашем царстве, которые являются свободными людьми"
 orc_lifestyle.0020.hatred_free_folk_human_titles: "Все графства в вашем королевстве, которые являются свободными от людей народами"
 orc_lifestyle.0020.g: "Пусть пока свободный народ остается невредимым."
 orc_lifestyle_hatred_of_free_folk_modifier: "$orc_lifestyle.0020.t$"
 orc_lifestyle_hatred_of_free_folk_modifier_desc: "$orc_lifestyle.0020.desc$"
 orc_lifestyle_hatred_of_free_folk_humans_modifier: "Ненависть орков к таркам"
 orc_lifestyle_hatred_of_free_folk_humans_modifier_desc: "Тарк - это орочье оскорбление, означающее человека нуменорского происхождения, широко применяемое к любому человеку из Свободных народов."
 hatred_free_folk_character_opinion: "Орк $orc_lifestyle.0020.t$"
 orc_slaves_county_modifier: "Рабы-орки"
 orc_slaves_county_modifier_desc: "Орки поработили часть населения этого графства."
 orc_enslavement_free_folk_county_modifier: "Орк $orc_lifestyle.0020.t$"
 orc_enslavement_free_folk_county_modifier_desc: "$orc_slaves_county_modifier_desc$"
  # Orc Fell Ability 
 orc_lifestyle.0030.t: "Падшая Способность"
 orc_lifestyle.0030.desc: "В порыве ненависти, под влиянием врожденной испорченности и злобного духа всего оркского народа, вы получаете падшую способность. Теперь это ваше мастерство, и мастер из вас."
 orc_lifestyle.0030.a: "Ужасная сила течет по моим почерневшим венам."
 orc_lifestyle.0030.b: "Черты орка выдают мою змееинную скорость."
 orc_lifestyle.0030.c: "Ya hey! Ya-harri-hey! Ya hoy!"
 orc_lifestyle.0030.c.tt: "Крик грядущих триумфов."
 orc_lifestyle.0030.d: "Потрескавшаяся кожа, открытая непогоде, бросает вызов моей отвратительной выносливости."
 orc_lifestyle.0030.e: "Я ненавижу желтое лицо в небе."
 orc_lifestyle.0030.e.tt: "Ты напрасно грозишь кулаком солнцу."
 orc_lifestyle.0030.f: "Лучше держать эту способность под контролем."
 orc_fell_ability_horrible_strength: "Падшая Способность: Ужасная Сила"
 orc_fell_ability_horrible_strength_desc: "“$orc_lifestyle.0030.a$”"
 orc_fell_ability_snake_like_speed: "Падшая Способность: Змееинная скорость"
 orc_fell_ability_snake_like_speed_desc: "“$orc_lifestyle.0030.b$”"
 orc_fell_ability_yell_of_triumph: "Падшая Способность: Крик триумфа"
 orc_fell_ability_yell_of_triumph_desc: "“$orc_lifestyle.0030.c$” $orc_lifestyle.0030.c.tt$"
 orc_fell_ability_hideous_toughness: "Падшая Способность: Отвратительная Жесткость"
 orc_fell_ability_hideous_toughness_desc: "“$orc_lifestyle.0030.d$”"
 orc_fell_ability_hate_of_sunlight: "Падшая Способность: Ненависть к солнечному свету"
 orc_fell_ability_hate_of_sunlight_desc: "“$orc_lifestyle.0030.e$”"
 orc_fell_ability_craven: "Падшая Способность: Трусливость"
 orc_fell_ability_craven_desc: "“$orc_lifestyle.0030.f$” $orc_lifestyle.0030.e.tt$"
 wight_lifestyle.0035.t: "Падшая Способность"
 wight_lifestyle.0035.desc: "Нежить - это продирающий ужас для живых. Вы - один из таких ужасов, и у любого, кто сталкивается с вами, страх пробирается под кожу, а глаза вылезают из орбит.\n\nВы кривите злую улыбку, чувствуя прилив силы из неиспользованного источника внутри тебя, падшей способности."
 wight_lifestyle.0035.a: "Я нечестивый обитатель тьмы."
 wight_lifestyle.0035.b: "Позвольте мне произнести мои ужасные заклинания."
 wight_lifestyle.0035.c: "Солнце, я ненавижу его."
 wight_lifestyle.0035.d: "Огонь жаждет сломить меня."
 wight_lifestyle.0035.e: "Зловонный смрад наполняет воздух и душит моих врагов."
 wight_lifestyle.0035.f: "Древние, иссохшие руки дают железную хватку."
 wight_fell_ability_denizen_of_the_dark_modifier: "Падшая Способность: Обитатель Тьмы"
 wight_fell_ability_denizen_of_the_dark_modifier_desc: "“$wight_lifestyle.0035.a$”"
 wight_fell_ability_dreadful_spells_modifier: "Падшая Способность: Ужасные Заклинания"
 wight_fell_ability_dreadful_spells_modifier_desc: "“$wight_lifestyle.0035.b$”"
 wight_fell_ability_hate_of_sunlight_modifier: "Падшая Способность: Ненависть к солнечному свету"
 wight_fell_ability_hate_of_sunlight_modifier_desc: "“$wight_lifestyle.0035.c$”"
 wight_fell_ability_fear_of_fire_modifier: "Падшая Способность: Страх перед огнем"
 wight_fell_ability_fear_of_fire_modifier_desc: "“$wight_lifestyle.0035.d$”"
 wight_fell_ability_foul_thing_modifier: "Падшая Способность: Мерзкая Тварь"
 wight_fell_ability_foul_thing_modifier_desc: "“$wight_lifestyle.0035.e$”"
 wight_fell_ability_iron_grip_modifier: "Падшая Способность: Железная хватка"
 wight_fell_ability_iron_grip_modifier_desc: "“$wight_lifestyle.0035.f$”"
  
 ### COMING OF AGE ### 
 orcs.0001.t: "Наступление Совершеннолетия"
 orcs.0001.desc: "Жизнь орка никогда не бывает легкой, и не каждый доживает до совершеннолетия.\n\nИ все же вы здесь. Вы достигли зрелости, и теперь ваши люди будут знать вас под именем, которое описывает вас лучше, чем ваше имя при рождении."
 orcs.0001.a: "Это имя вселит ужас в сердца моих врагов!"
 orcs.0001.a.tt: "Вы с радостью принимаете свое прозвище."
 orcs.0001.b: "Никто не будет использовать это имя в моем присутствии!"
 orcs.0001.b.tt: "Я слышал это. НИ ОДНО!"
  
  ### THE FEAST ### 
 orcs.1001.t: "Пир Плоти?"
 orcs.1001.desc: "До меня дошла новость, что [wounded_courtier.GetTitledFirstNameNoTooltip] испытывает трудности. [wounded_courtier.GetHerHis] травмы, а также [wounded_courtier.GetHerHis] слабость очевидна для всех, и прошло много времени с тех пор, как я ел хорошее мясо...\n\nМожет быть, мне стоит пойти навестить ее?"
 orcs.1001.a: "Да, [wounded_courtier.GetHerHis] время пришло"
 orcs.1001.a.tt: "Было бы жаль, если бы столько мяса было испорчено..."
 orcs.1001.b: "Я атакаю [wounded_courtier.GetHerHis] когда [wounded_courtier.GetSheHe] будет спать"
 orcs.1001.b.tt: "Я застану [wounded_courtier.GetHerHim] в расплох..."
 orcs.1001.c: "В этом нет абсолютно никакой необходимости."
 orcs.1001.c.tt: "Я надеюсь, что их раны заживут."
  
 orcs.1002.t: "Пир Плоти!"
 orcs.1002.desc: "Нам предстоит ожесточенная борьба, но в конце концов победитель может быть только один!\n\nИ это Я!"
 orcs.1002.a: "Похоже, мясо снова в меню!"
 orcs.1002.a.tt: "Я буду услаждать себя [wounded_courtier.GetHerHis] плотью."
 orcs.1002.b: "Что...что я наделал!?"
 orcs.1002.b.tt: "Будь проклят мой неконтролируемый голод!"
  
 orcs.1003.t: "В Конце Концов Никакого Пира Не Было..."
 orcs.1003.desc: "Не смотря на [wounded_courtier.GetHerHis] травмы, я не смог покончить с [wounded_courtier.GetTitledFirstNameNoTooltip] и я сильно пострадали от этого противостояния..."
 orcs.1003.a: "Я проклинаю тебя [wounded_courtier.GetTitledFirstNameNoTooltip]!"
 orcs.1003.a.tt: "Это была плохая идея..."
  
  ### RISE OF THE BERSERKER ### 
 orcs.3001.t: "Путь Берсеркера"
 orcs.3001.desc: "Сегодня вечером меня навестил один из учителей ям Урук-Хай.\n\nОн говорит, что получил известие о моих способностях и что я мог бы выделиться среди слуг  [ROOT.GetCharacter.GetFaith.HighGodName] в битве.\n\nОн предлагает мне начать элитное обучение в Уруке, вступив в ряды Берсеркеров.\n\nДорога будет трудной, и рассказывают ужасные истории о смертельной тренировке и о том, что лишь немногим удается успешно ее завершить..."
 orcs.3001.a: "Я стану ужасом для врагов [ROOT.GetCharacter.GetFaith.HighGodName]."
 orcs.3001.a.tt: "Обучение начинается!"
 orcs.3001.b: "Я не готов к таким жертвам."
 orcs.3001.b.tt: "Это не для меня..."
  
 orcs.3002.t: "Первые Результаты"
 orcs.3002.desc: "После нескольких месяцев упорных тренировок и многочисленных пит-боев вы начинаете чувствовать, что стали намного более смертоносны.\n\nИдеально отлаженная машина, готовая выполнить свою цель: убивать."
 orcs.3002.a: "Впереди еще долгий путь."
 orcs.3002.a.tt: "Вы продолжаете обучаться."
 orcs.3002.b: "Я не могу продолжать, это слишком."
 orcs.3002.b.tt: "Вы прекращаете обучение."
  
 orcs.3003.t: "Сомнения в Ночи"
 orcs.3003.desc: "Прошел год с тех пор, как началось мое обучение. Год смерти и боли, гнева и ненависти. Мои чувства обострились. Мое сопротивление боли возросло многократно.\n\nЯ уже не тот, что прежде. Я мечтаю о запахе крови, и каждая жизнь, которую я пожинаю, приближает меня к экстазу. Но в моей темной камере, в часы сна, я спрашиваю себя: это то, чего я хочу?"
 orcs.3003.a: "Кровь зовет меня, пути назад нет."
 orcs.3003.a.tt: "Вы продолжаете обучаться."
 orcs.3003.b: "Все кончено, я не такой."
 orcs.3003.b.tt: "Вы прекращаете обучение."
  
 orcs.3004.t: "Последнее Испытание"
 orcs.3004.desc: "Сегодня, когда я вырезал грязную корягу, один из старых тренеров приказал мне следовать за ним в подземелья.\n\nВлажная обстановка и крики отчаяния рабов успокаивают меня. Но когда мы добираемся до самой дальней камеры, я обнаруживаю знакомое лицо...\n\n[myfam.GetTitledFirstNameNoTooltip], мой [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('myfam'))], висит между гибельными цепями. Грязная, окровавленная тряпка прикрывает [myfam.GetHerHis] глаза.\n\nГолос учителя, снимающего повязку с глаз, эхом разносится по туннелям: “Покажи мне свою цель... Полакомься [wounded_courtier.GetHerHis] кровью.”"
 orcs.3004.a: "УМРИ, УМРИ! УМРИ!"
 orcs.3004.a.tt: "Вы обрываете [myfam.GetHerHis] жизнь."
 orcs.3004.b: "Как ты смеешь? Освободите [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('myfam'))] немедленно!"
 orcs.3004.b.tt: "Вы разозлите своего учитиля, и он может сделать то, чего не можете вы. Затем вы покидаете путь Берсеркера."
 orcs.3004.c: "Нет, я буду пировать ТВОЕЙ кровью."
 orcs.3004.c.tt: "Атакуйте своего учитиля, освободите пленника и покиньте путь Берсеркера."
  
 orcs.3005.t: "Восстание Берсеркера"
 orcs.3005.desc: "Сегодня я избавился от всех своих связей. Я продемонстрировал всем свою полную приверженность делу и горячую преданность [ROOT.GetCharacter.GetFaith.HighGodName].\n\nКогда я надеваю шлем, я чувствую, как кровь моих врагов льется мне на голову. Его запах направляет мою волю, его тепло подпитывает мой гнев.\n\n[ROOT.Char.GetTitledFirstNameNoTooltip] умер, и на его месте восстает несущий смерть. Берсерк Урук-хай."
 orcs.3005.a: "RAAAAAAARGH!!!"
 orcs.3005.a.tt: "Вы завершили путь Берсеркера."
  
  ### An Orc Champion ### 
 orcs.2001.t: "Молодой Чемпион"
 orcs.2001.desc: "Недавно до меня дошли слухи о молодом орке, сеющем хаос в бойцовских ямах. Они также говорят, что он пользуется уважением среди других бойцов и что с каждым днем все больше и больше орков собираются посмотреть на его бой.\n\nНельзя отрицать, что он, должно быть, исключительный орк. И это именно то, что заставляет меня беспокоиться.\n\nПоставлено ли на карту мое лидерство? Может быть, мне стоит пойти посмотреть на это самому..."
 orcs.2001.a: "Я пойду к нему."
 orcs.2001.a.tt: "Вы будете искать орка..."
 orcs.2001.b: "Какое это имеет значение, я сомневаюсь, что он мне ровня."
 orcs.2001.b.tt: "Ты игнорируешь его."
  
 orcs.2002.t: "Молодой Чемпион"
 orcs.2002.desc: "Выследить его было нетрудно. Мои шпионы говорят, что после боя в яме этот орк всегда идет на одну и ту же свалку, чтобы выпить грога со своими товарищами.\n\nЯ иду туда инкогнито, и там я нахожу огромную группу уруков и грязных снагов, приветствующих имя:\n\n#emphasis [strongorc.GetTitledFirstNameNoTooltip]!, [strongorc.GetTitledFirstNameNoTooltip]!, [strongorc.GetTitledFirstNameNoTooltip]! #!\n\nВо главе стола могущественный урук наносит другому удар собственной рукой жертвы, жестоко оторванной. После этого кровавого, но занимательного шоу, [strongorc.GetTitledFirstNameNoTooltip] направляется к бочке за новой порцией грога. Сейчас самое время сблизиться с ним..."
 orcs.2002.a: "Этот орк - настоящее шоу! Я постараюсь заслужить его доверие и лояльность."
 orcs.2002.a.tt: "Вы пытаетесь подружиться с чемпионом в надежде, что он присоединится к вам."
 orcs.2002.b: "Я должен купить его услуги. Проявите доминирование и получите мощного телохранителя."
 orcs.2002.b.tt: "Вы нанимаете чемпиона в качестве своего личного телохранителя."
 orcs.2002.c: "Он представляет собой угрозу, которую я не могу себе позволить... #emphasis "Позволь мне наполнить твой кувшин, приятель. #!""
 orcs.2002.c.tt: "Ты пытаешься отравить чемпиона."
 orcs.2002.d: "Ба, это того не стоит."
 orcs.2002.d.tt: "Вы уходите, надеясь, что это не имеет большого значения."
  
 orcs.2003.t: "Верный Чемпион"
 orcs.2003.desc: "После нескольких ночей смеха и грога, [strongorc.GetTitledFirstNameNoTooltip] и я стали неразлучны.\n\nХотя я восхищаюсь его мощью, он нашел во мне командира, своего естественного лидера.\n\nСегодня он поклялся мне в вечной верности, и я приму его услуги как своего господина и друга."
 orcs.2003.a: "Объединившись, мы будем неудержимы."
 orcs.2003.a.tt: "[strongorc.GetTitledFirstNameNoTooltip] становится вашим верным телохранителем."
  
 orcs.2004.a.t: "Дружба Отвергнута"
 orcs.2004.b.t: "Больше Никакой Авторитетности"
  
 orcs.2005.t: "Новый Враг"
 orcs.2005.desc: "[strongorc.GetTitledFirstNameNoTooltip] видел, как я распространяю яд! В ярости он повышает голос, вскоре об этом знает вся таверна, и начинается драка, когда он пытается преследовать меня! Мне едва удается ускользнуть в этом хаосе, оставив после себя кучу потраченного впустую грога, довольно унизительный инцидент и нового врага. [strongorc.GetTitledFirstNameNoTooltip] сегодня избежал своей участи, но ему не всегда будет так везти..."
 orcs.2005.a: "Рано или поздно ты падешь передо мной!"
  
  ### Rebellious Slave ### 
 orcs.0014.t: "Мятежный Раб"
 orcs.0014.desc: "Мои воины приводят ко мне раба, которому ночью удалось сбежать из загонов. Совершив впечатляющий подвиг доблести, личинка убила двух моих самых сильных надзирателей во время своего побега. Но [escaped_slave.GetSheHe] не смогла уйти далеко, прежде чем моим следопытам удалось выследить [escaped_slave.GetHerHim].\n\n Какое послание мне адресовать этой личинке?"
 orcs.0014.a: "Закуйте [escaped_slave.GetHerHim] в цепи, я разберусь с этим позже"
 orcs.0014.b: "Я сам выпотрошу эту мерзкую личинку"
 orcs.0014.c: "Из твоей плоти получится прекрасный пир"
 orcs.0014.d: "Выживают только сильнейшие, мне нужны такие бойцы, как ты"
  
  ### Trespassing Neighbours ### 
 orcs.0015.t: "Вторгающиеся Соседи"
 orcs.0015.desc: "Мои разведчики заметили орков [nosy_neighbor.GetFirstNameNicknamed], глубоко забредших на мою территорию. До сих пор они не совершили никаких противоправных действий, но их мотивы неизвестны, и ничто не мешает им грабить наши земли."
 orcs.0015.a: "Предупреждения будет достаточно: уходите или будете убиты."
 orcs.0015.b: "Я отправлю их выпотрошенные тела обратно этой грязной личинке."
 orcs.0015.c: "Похоже, этот подонок хочет подраться. Давай отдадим это [nosy_neighbor.GetHerHim]."
 orcs.0015.a.message_1: "Предупреждения недостаточно"
 orcs.0015.a.message_2: "Нарушители границы возвращаются на свои земли"
 orcs_0015_being_raided_modifier: "Вторгающиеся Соседи"
  
  ### Olog Exiles ### 
 orcs.0016.t: "Изгнанники-Ологи"
 orcs.0016.desc: "Группа Изгнанников-Ологов приходит умолять меня позволить им присоединиться к моему племени после того, как их племя было уничтожено соперничающим кланом. Все они кажутся опытными бойцами, но они были опозорены неудачей, и мое собственное племя могло бы обидеться, если бы я впустил их."
 orcs.0016.a: "Вы должны были умереть с мечом в руке, когда у вас был шанс. #emphasis Убейте их!#"
 orcs.0016.b: "Там, где есть кнут, есть и путь. Из этих личинок получатся хорошие работники."
 orcs.0016.c: "Вы можете использовать это оружие с пользой и сражаться в качестве моих телохранителей."
 orcs_0016_olog_slaves_modifier: "Имеет Рабов-Ологов"
 orcs_0016_olog_bodyguards_modifier: "Имеет Телохранителей-Ологов"
  
  ### Orc Horde Forms ### 
 orcs.0020.t: "Орда Восстает!"
 orcs.0020.desc: "Что ж, вам пришлось сломать хребты, замучить нескольких невезучих ублюдков и убить по пути немало "невинных", но в конце концов орки, похоже, встали в очередь под вашей рукой. Видения наполняют вашу голову огромной добычей, которая вас ожидает, судьбой расы орков - охватить все земли, поработить и доминировать над всеми остальными! Скоро твое воинство пронесется по землям людей, и ни у кого не будет надежды устоять против твоей мощи! \n\nИнтересно, какой будет ваша первая цель? Хнычущие тарки, трусливые эльфийские ведьмы или сладкое золото гномьих владений?"
 orcs.0020.a: "Там будет золото, за которое можно ухватиться, и грог, который можно пить без конца!"
 orcs.0021.t: "Войско Орков Восстает!"
 orcs.0021.desc: "Тревожные новости достигли ваших ушей! Могущественный орк, которого называют просто "Великий вождь", собрал под свои знамена великое множество орков с намерением грабить и убивать по всей земле! Темные твари тяготеют к нему, в его рядах есть ологи и даже несколько темных людей. Сейчас у вас есть короткая передышка, но, несомненно, день его нападения не за горами. \n\nПоявился опасный враг. Мы должны быть начеку, и на наших границах должны быть установлена стража..."
 orcs.0021.a: "Как будто у нас было недостаточно проблем"
  
  
  ### Orkish Flavour ### 
 orcs.4100.t: "Мертвяк"
 orcs.4100.desc: "Древний вождь по имени Мертвяк [dead_meat.GetName], у которого давно истек срок службы Орка, вызвал вас на смертельный поединок. Вы явно сделали что-то, что заставило их подняться из дома престарелых."
 orcs.4100.a: "Твой меч, Мертвяк, отдай же его мне!"
 orcs.4100.b: "Отвали от меня, ты, гнилой труп!"
 orcs.4100.c: "Боже! Это мой дядя!"
 orcs.4100.c.success: "Вы ускользаете от Мертвяка"
 orcs.4100.c.failure: "Мертвяк оставляет на вас свой след"
 orcs.4100.c.tt: "Вы отвлекаете внимание, оставляя Мертвяка [dead_meat.getName] потеряным."
 orcs_4100_fly_corpse_the_warg_modifier: "Летай на Варге-трупе"
 orcs_4100_fly_corpse_the_warg_modifier_desc: "Этот персонаж едет верхом на изуродованном варге, зараженном личинками и зараженном болезнями. Он отказывается покинуть их сторону, являясь предвестником инфекции."
 orcs_4100_bark_worse_than_bite_modifier: "Лай хуже, чем укус"
 orcs_4100_bark_worse_than_bite_modifier_desc: "Лай этого персонажа хуже, чем его укус. Если они еще не покончили с этим, то будут красться в тени."
 orcs.4102.desc_success: "Мертвяк [dead_meat.getName] лай был хуже, чем их укус."
 orcs.4102.desc_failure: "Мертвяк [dead_meat.getName] лай был хуже, чем их укус, и только после вашей дуэли вы обнаруживаете, что Мертвяк бронит и прожевывает вас насквозь."
 orcs.4102.desc_warg: "\n\nРядом с вами крадется грустный старый варг, он принадлежал Мертвяку, но вы ему понравились. Он не собирается сдвинуться с места с вашей стороны."
 orcs.4102.a: "Оставить Мертвяка гнить, меч все еще в хорошем состоянии?"
 orcs.4102.b: "Ба! Побежден старым, конченым орком."
  
  
  
  
  
  
  
