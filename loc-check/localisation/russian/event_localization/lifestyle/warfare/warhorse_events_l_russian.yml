l_russian:
 warhorse.0001.t: "Боевой конь"
 warhorse.0001.desc: "Восхищаясь тем, как [ROOT.Char.Custom('HorseStoryMareStallion')] исполняет все мои команды, я раздумываю, какое имя [ROOT.Char.Custom('HorseStoryHerHim')] лучше подойдет..."
 warhorse.0001.a: "Имя, вдохновленное историей!"
 warhorse.0001.b: "Эпохи полны внушающих благоговейный трепет имён!"
 warhorse.0001.c: "Это просто лошадь, и имя будет соответствующее."
  
 warhorse.0002.desc: "Вдохновившись знаменитыми конями полководцев и героев прошлого, я назову своего скакуна в честь одного из них."
 warhorse.0002.a: "Рохаллор, в честь коня Верховного Короля Финголфина, на котором он подъехал к воротам Ангбанда!"
 warhorse.0002.b: "Асфалот, в честь коня могучего Глорфинделя!"
 warhorse.0002.c: "Фелароф, в честь первого из меарас, на котором Эорл Юный отправился на помощь Гондору!"
 warhorse.0002.d: "Аррох, в честь коня Хурина, на котором он отправился на битву Нирнаэт Арноэдиад!"
 warhorse.0002.e: "Толстяк Лампкин, в честь пони, на котором ездит таинственный Том Бомбадил!"
 warhorse.0002.go_back: "Хм, подумаем о другой теме..."
  
 warhorse.0003.desc: "Мифы разных народов богаты на выдающиеся события — и на имена коней."
 warhorse.0003.llamrei: "Нахар, в честь легендарного скакуна, на котором ездил Оромэ, Охотник Валар!"
 warhorse.0003.sleipnir: "Анкалагон — в честь величайшего из всех крылатых драконов!"
 warhorse.0003.uchchaihshravas: "Глаурунг, в честь Отца Драконов и слуги Моргота!"
 warhorse.0003.dadhi_kra: "Торондор — Повелитель Орлов!"
 warhorse.0005.devadatta: "Унголиант — первородная гигантская паучиха Арды!"
 warhorse.0005.keshi: "Ангаинор — в честь цепи, которую использовал доблестный Вала Тулкас, чтобы обуздать Моргота!"
 warhorse.0005.kanthaka: "Бауглир — синдаринское слово, обозначающее душителя, приписываемое Врагу!"
 warhorse.0005.burko: "Готмог — в честь повелителя балрогов, убийцы Феанора!"
 warhorse.0006.aranjagaan: "Сильмариль — наверняка сейчас Клятва Феанора это всего лишь слова!"
 warhorse.0006.haizum: "Гуртанг, в честь оружия, которым Турин Турамбар убил Глаурунга!"
 warhorse.0006.buraq: "Нарсиль — в честь меча короля Элендиля Высокого!"
 warhorse.0006.balius: "Гронд — название булавы Моргота, сразившей Финголфина!"
 warhorse.0007.xanthos: "Рингиль, в честь меча, которым владел Финголфин во время Войны Самоцветов!"
 warhorse.0007.boreas: "Дайлир, в честь любимой стрелы Белега, величайшего лучника Первой Эпохи!"
 warhorse.0003.go_on: "Хм, может стоит подумать о другом имени..."
  
 warhorse.0004.desc: "Лошадь — лишь животное, и имя у нее будет подобающим."
 warhorse.0004.a: "Лихач"
 warhorse.0004.b: "Аббат"
 warhorse.0004.c: "Танцор"
 warhorse.0004.d: "Глиттерхуф"
  
 warhorse.1001.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Надежный [ROOT.Char.Custom('HorseStoryMareStallion')|U]"
 warhorse.1001.desc: "Известный берейтор прибыл ко двору, услышав о моем могучем [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')], и предлагает [ROOT.Char.Custom('RandomHerHis')] свои услуги.\n\n«Взамен я прошу лишь небольшой компенсации за мои труды»."
 warhorse.1001.a: "[ROOT.Char.Custom('HorseStoryHerHim')|U] нужно стать сильнее."
 warhorse.1001.b: "[ROOT.Char.Custom('HorseStoryHerHim')|U] нужно научиться быть быстрее."
 warhorse.1001.c: "[ROOT.Char.Custom('HorseStoryHerHim')|U] нужно поработать над выносливостью."
 warhorse.1001.d: "Если [ROOT.Char.Custom('HorseStoryHerHim')] чего и не хватает, так это свирепости!"
 warhorse.1001.e: "Мне это не интересно."
 warhorse.1001.e.tt: "#F «[THIS.Char.Custom('WarhorseStoryName')] не нуждается ни в каком берейторе — есть же я!»#!"
 warhorse.1001.f: "Именно ради такой работы $master_of_horse_court_position$ и получает жалованье!"
 warhorse.1001.f.tt: "Ваш $master_of_horse_court_position$ начинает обучение скакуна."
 warhorse.1001.f.failure: "Похоже, $master_of_horse_court_position$ не так [Select_CString(m_horse.IsFemale, 'хороша', 'хорош' )], как вам казалось"
 warhorse.1001.f.failure.tt: "[m_horse.GetTitledFirstNameNoTooltip] не [Select_CString(m_horse.IsFemale, 'справилась', 'справился' )]. [ROOT.Char.Custom('WarhorseStoryName')] не хочет ходить под седлом."
  
 warhorse.1002.desc: "[ROOT.Char.Custom('WarhorseStoryName')] хорошо учится, результат уже виден!"
 warhorse.1002.a: "Удачное вложение денег!"
  
 warhorse.1101.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Солнечный день"
 warhorse.1101.desc: "Я направляюсь к конюшне, и [ROOT.Char.Custom('WarhorseStoryName')] приветствует меня радостным ржанием. [ROOT.Char.Custom('HorseStorySheHe')|U], похоже, радуется хорошей погоде и не прочь поразмяться — как и я."
 warhorse.1101.a: "Мне нужно использовать каждую возможность для тренировок!"
 warhorse.1101.b: "Было бы преступлением не насладиться таким хорошим деньком!"
  
 warhorse.1102.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Новый друг"
 warhorse.1102.desc: "[ROOT.Char.Custom('WarhorseStoryName')] радуется ослабленным вожжам, а я смотрю как холмы и равнины проносятся мимо. Я чувствую, как напрягается [ROOT.Char.Custom('HorseStoryHerHis')] шея, и нас обоих переполняют эмоции.\n\nКогда мы наконец останавливаемся, пусть усталые, но воодушевленные, в глазах своего скакуна я виже невероятный интеллект, осознавая, насколько мы сблизились.\n\n[ROOT.Char.Custom('WarhorseStoryName')|U] – мой истинный друг, которого я нашёл словно Эорл Феларофа."
 warhorse.1102.a: "Отныне наши судьбы переплетены."
  
 warhorse.1201.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Болезнь"
 warhorse.1201.desc: "Когда [ROOT.Char.Custom('WarhorseStoryName')] с трудом выходит из стойла, волоча ноги и опустив голову, у меня не остается сомнений: [ROOT.Char.Custom('HorseStoryMareStallion')] болеет.\n\nГлавный конюх уверяет, что от этой болезни есть лекарство, но оно обойдется в копеечку."
 warhorse.1201.a: "Я заплачу любую цену за здоровье [ROOT.Char.Custom('WarhorseStoryName')]!"
 warhorse.1201.b: "Все свершится по воле [ROOT.Char.GetFaith.HighGodNamePossessive]."
 warhorse.1201.b_good: "[ROOT.Char.Custom('WarhorseStoryName')] справляется с болезнью"
 warhorse.1201.b.tt: "[THIS.Char.Custom('HorseStorySheHe')|U] теперь меньше вам доверяет"
 warhorse.1201.b_bad: "[ROOT.Char.Custom('WarhorseStoryName')] умирает от болезни"
  
 warhorse.1301.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Любитель лошадей"
 warhorse.1301.desc: "[horse_vassal.Custom2('MyCharacterIntroduction', ROOT.Char)|U] с ног до головы осматривает моего скакуна, одобрительно кивая головой.\n\n«Вот это [ROOT.Char.Custom('HorseStoryMareStallion')], [Select_CString(ROOT.Char.IsFemale, 'моя', 'мой' )] [ROOT.Char.GetTitleTierName|l]! Для меня было бы честью, если бы вы позволили мне проехаться»."
 warhorse.1301.a: "Прошу!"
 warhorse.1301.a.tt: "[THIS.Char.Custom('WarhorseStoryName')] славится своей свирепостью, а [horse_vassal.GetFirstNameNoTooltip] не отличается особым мастерством. Не пострадает ли [SCOPE.sC('horseStory_vassal').GetSheHe]?"
 warhorse.1301.b: "[ROOT.Char.Custom('WarhorseStoryName')] принадлежит лишь мне!"
  
 warhorse.1401.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Жуткая лошадь"
 warhorse.1401.desc: "С наступлением темноты я оказываюсь на конюшне в полном одиночестве. Лишь [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')], переступая копытами, нарушает ночную тишину. Есть что-то странное в [ROOT.Char.Custom('HorseStoryHerHis')] взгляде, что-то... #EMP угрожающее#!.\n\n[ROOT.Char.Custom('HorseStoryHerHis')|U] взгляд преследует меня, когда я поворачиваюсь к выходу: я еще долго не могу забыть пробежавший по моей спине холодок."
 warhorse.1401.a: "Это глупо — [ROOT.Char.Custom('HorseStorySheHe')] всего лишь лошадь."
 warhorse.1401.a.tt: "#F Но почему вы никак не можете забыть [THIS.Char.Custom('HorseStoryHerHis')] взгляд?#!"
 warhorse.1401.b: "Это животное точно проклято, избавьтесь от [ROOT.Char.Custom('HorseStoryHerHim')]!"
  
 warhorse.1402.desc: "Избитые копытами ноги, руки искусаны, а тело все в синяках от падений... [ROOT.Char.Custom('WarhorseStoryName')] радостно ржет, почти сбросив меня на копье солдата, и я не знаю, сколько еще выдержу."
 warhorse.1402.a: "Уж лошади я не уступлю!"
 warhorse.1402.b: "[ROOT.Char.Custom('WarhorseStoryName')], на этом твоя история подходит к концу."
  
 warhorse.1499.desc: "У меня не идет из головы, как [ROOT.Char.Custom('HorseStoryMareStallion')] [ROOT.Char.Custom('WarhorseStoryName')] смотрит на меня: я не могу избавиться от страха. Все происходит, когда мы возвращаемся с небольшой прогулки. [ROOT.Char.Custom('HorseStorySheHe')|U] выбрасывает меня из седла, когда мы проезжаем мимо скалистого выступа, и я падаю головой прямо на острый камень. Боль ослепляет меня, и последнее, что я слышу, — это громкое ржание. А потом все стихает..."
 warhorse.1499.a: "[ROOT.Char.Custom('WarhorseStoryName')]... за что?"
  
 warhorse.1501.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Утро с другом"
 warhorse.1501.desc: "Ежедневные тяготы правления тяжким бременем ложатся на мои плечи, а мыслями я постоянно переношусь к своему другу по имени [ROOT.Char.Custom('WarhorseStoryName')] и тем прекрасным беззаботным моментам, которые мы проводим вместе на прогулках. [ROOT.Char.Custom('HorseStorySheHe')|U] никогда не откажется от прогулки, а я задумываюсь о том, не стоит ли сделать их частью повседневной жизни."
 warhorse.1501.a: "Лучше мне провести время за обучением рыцарей!"
 warhorse.1501.b: "А почему бы и нет? Правителям тоже нужно снимать напряжение."
  
 warhorse.1502.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Новый жеребёнок!"
 warhorse.1502.desc: "[ROOT.Char.Custom('WarhorseStoryName')] со своим партнёром встретились на охоте где-то год назад, и довольно долгое время мы ожидали рождения жеребёнка.\n\nЭтим утром, войдя во двор, я увидел маленького жеребёнка, что неуверенно бегал вокруг под неусыпным присмотром своих родителей.\n\nКак же мне следует поступить с новым потомком Феларофа?"
 warhorse.1502.a: "У моего наследника появится превосходный скакун."
 warhorse.1502.b: "Моя супруга всегда мечтала о собственном меархе."
 warhorse.1502.c: "Пусть идёт своим путём и сам выбирает себе наездника."
  
 warhorse.1503.t: "Меарас: новый жеребёнок!"
 warhorse.1503.desc: "[ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('event_liege'))]призывает меня, и я встречаю [event_liege.GetHerHim] во дворе [event_liege.GetHerHis] замка.\n\n«Мне хотелось бы тебя кое с кем познакомить. Встречай – новый представитель линии Феларофа. Наши династии жили бок о бок долгие годы и со времён Эорла мы оставались хорошими друзьями. И мне хотелось бы, чтобы эта традиция не умерла вместе с нами».\n\nЖеребёнок великолепен и, кажется, понимает, что здесь происходит. Он подходит ко мне, обнюхивая мою ладонь, и издаёт одобрительное ржание. Похоже, у меня теперь новая лошадь!"
 warhorse.1503.a: "Подарок, достойный короля!"
  
  
 warhorse.8001.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Конец жизни"
 warhorse.8001.desc: "[ROOT.Char.Custom('WarhorseStoryName')] стареет. [ROOT.Char.Custom('HorseStoryHerHis')|U] шаг уже не столь быстр, как прежде, а огонь в [ROOT.Char.Custom('HorseStoryHerHis')] глазах угасает.\n\nЕсли я хочу продолжить [ROOT.Char.Custom('HorseStoryHerHis')] род, нужно найти [ROOT.Char.Custom('HorseStoryHerHim')] подходящую пару."
 warhorse.8001.a: "[ROOT.Char.Custom('HorseStoryOppositeMareStallion')] — это в первую очередь сила."
 warhorse.8001.b: "[ROOT.Char.Custom('HorseStoryOppositeMareStallion')] — это в первую очередь ловкость."
 warhorse.8001.c: "Самое главное качество, каким может обладать [ROOT.Char.Custom('HorseStoryOppositeMareStallion')], это выносливость."
 warhorse.8001.d: "Найдите самого свирепого скакуна в этих землях!"
 warhorse.8001.e: "Нет, пусть проведет свои последние дни в покое."
  
 warhorse.8002.t: "[ROOT.Char.Custom('WarhorseStoryName')|U]: Круг жизни"
 warhorse.8002.desc: "[ROOT.Char.Custom('WarhorseStoryName')], свет моих очей, умирает, но оставляет после себя сильное потомство! Я уже вижу [ROOT.Char.Custom('HorseStoryHerHis')] черты в жеребенке. В некотором роде мой друг все еще со мной."
 warhorse.8002.a: "Покойся с миром, [ROOT.Char.Custom('WarhorseStoryName')]."
  
 warhorse.8003.desc: "На конюшне меня ждут печальные известия. [ROOT.Char.Custom('WarhorseStoryName')] умирает этой ночью, оставив пустоту в моем сердце."
 warhorse.8003.a: "О [ROOT.Char.Custom('WarhorseStoryName')], мне будет тебя не хватать!"
