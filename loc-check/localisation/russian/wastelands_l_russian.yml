l_russian:
 game_concept_colonisation: "Colonisation"
 game_concept_colonise: "Colonise"
 game_concept_colony: "Colony"
 game_concept_colonisation_desc: "Colonisation is a game mechanic that allows an [independent_ruler|E] to expand their [realm|E] into neighboring [wilderness|E] [counties|E].\n\nAfter an initial investment of [gold|E], a [settlement_holding|E] can be established, bringing the [county|E] into their [domain|E]. Initially, this settlement will be unproductive and it will be unable to build standard [buildings|E] in the [holding|E]. Instead, time and [gold|E] must be invested to increase [development|E] in the new settlement and clear any [colonisation_blockers|E] that exist.\n\nOnce all blockers have been cleared, the [settlement_holding|E] is fully upgraded, and the colony has reached a [county_development|E] of 3 or greater, the Settlement can be converted into a standard [holding|E]."
 game_concept_wilderness: "Wilderness"
 game_concept_wilderness_desc: "A wide and empty land, unclaimed by any lord of [middleearth|E] and very sparsely populated."
 game_concept_wilderness_holding: "Wilderness Holding"
 game_concept_wilderness_holdings: "Wilderness Holdings"
 game_concept_wilderness_holding_desc: "Wilderness Holdings are entirely unproductive and must be replaced by a [settlement_holding|E] during [colonisation|E] to unlock their potential."
 game_concept_settlement_holding: "Settlement Holding"
 game_concept_settlement_holdings: "Settlement Holdings"
 game_concept_settlement_holding_desc: "Settlement Holdings represent the small outposts, towns and colonies being established as part of the [colonisation|E] process.\n\nThey are less productive than other [holding_types|E], but clearing all [colonisation_blockers|E] and increasing [county_development|E] will allow their productivity to grow, eventually allowing them to be converted into a standard [holding|E].\n\n#V Settlement Holdings cannot be granted to [vassals|E] or other [characters|E]. #!"
 game_concept_colonisation_blocker: "Colonisation Blocker"
 game_concept_colonisation_blockers: "Colonisation Blockers"
 game_concept_blockers: "Blockers"
 game_concept_colonisation_blocker_desc: "Colonisation Blockers are [buildings|E] in [wilderness|E] [counties|E] that represent obstacles to the [colonisation|E] of the area.\n\nThese blockers apply negative [modifiers|E] to the county, reducing its productivity and preventing it from being converted into a standard [holding|E]."
  
 COLONISATION_ACTIONS: "Колонизация"
 colonise_land: "Колонизировать"
 colonise_land_desc: "[Concept( 'colonise', 'Колонизировать' )|E] это [county|E] [Concept( 'wilderness', 'диких земель' )|El] за [Title.MakeScope.ScriptValue('colonisation_cost_value')][gold_i]:\n[Title.MakeScope.GetScriptValueDesc('colonisation_cost_value')]\n\n#V @warning_icon! Вы должны быть [Concept( 'independent_ruler', 'независимым правителем' )|E], которые не предпринимал попыток колонизации [Concept( 'county', 'графства' )|E] за последние 5 лет."
 colonisation_cost_terrain: "[Title.GetProvince.GetTerrain.GetNameNoTooltip]" !
