  # Vanilla Tenet Rebrand 
  
 tenet_mystical_birthright_desc: "While every one of us is born some spirit of the gods within us, there are a lucky few blessed from birth with the ability to commune directly with the gods. These chosen few are destined to wield mystical powers and become great spiritual leaders."
  
  # 
 building_type_generic_university: "Академия"
 building_type_generic_university_desc: "Академия — это место, где правят знания, доступное тем, кто ищет мудрости и великих открытий о природе Средиземья. Туда стекаются учёные и философы со всего света. Они проводят время в дебатах, изучают хроники и пишут трактаты, со временем лишь приумножая знание, что хранится в стенах академии."
