l_russian:
  
  # LotR: The draugr was a draugr! 
 fp1_yearly.0066.t: "$fp1_yearly.0051.t$: Драугр"
 fp1_yearly.0066.desc: "Могильник [draugr.GetFirstNamePossessiveNoTooltip] пробирает до костей. Когда-то эта пещера использовалась для погребения усопших. Сейчас это место выглядит словно после налета. Вероятно, охотники за сокровищами взломали каждый каменный саркофаг в поисках ценностей. А может это мертвые выцарапали себе путь наружу.\n\nЯ чувствую как в легких застывает воздух. Один из моих дружинников — тот что шел впереди основной группы, падает на землю. Вокруг его лодыжки гниющей плотью обвивается рука драугра.\n\nОн уставился на меня своими пустыми глазницами."
 fp1_yearly.0066.a: "Бойцы! Ко мне!"
 fp1_yearly.0066.a.tt_success: "Вы созываете отряд и сообща вам удается одолеть драугра!"
 fp1_yearly.0066.a.tt_failure: "Вам едва удается унести ноги"
 draugr_monstrous_draugr_fp1_modifier: "Могильник Драугра"
 draugr_monstrous_draugr_fp1_modifier_desc: "Драугр бродит по этой земле, охотясь за живой плотью."
 fp1_yearly.0066.b: "БЕЖИМ!"
  
