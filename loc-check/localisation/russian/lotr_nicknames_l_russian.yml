  ### Gwaithurim Nicknames ### 
 nick_the_mad_dog: "Бешеный Пёс"
 nick_the_mad_dog_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известен [CHARACTER.GetHerHis|U] безрассудными и опасными подвигами, что принесло [CHARACTER.GetHerHim|U] репутацию свирепого врага."
 nick_the_river_snake: "Речная Змея"
 nick_the_river_snake_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известен как лживый и хитрый. Говорят, что [CHARACTER.GetHerHis|U] язык раздвоен."
 nick_the_weasel: "Проныра"
 nick_the_weasel_desc: "Поведение [CHARACTER.GetShortUINameNoTooltipNoFormat|U] часто сравнивали с поведением ласки."
 nick_the_riverlord: "Речной Владыка"
 nick_the_mountainfather: "Отец Гор"
 nick_the_mountainfather_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был великим патриархом, породившим много сильных детей и заботившимся о своей семье."
  
  ### the Istari ### 
 nick_the_white_istari: "$nick_the_white$"
 nick_the_white_istari_desc: "[CHARACTER.GetFirstNameNoTooltip|U] — Белый Волшебник, первый из [istariconcept|E], лидер Белого Совета"
 nick_the_grey_istari: "Серый"
 nick_the_grey_istari_desc: "[CHARACTER.GetFirstNameNoTooltip|U] — Серый Волшебник, один из [istariconcept|E], друг жителей [middleearth|E]"
 nick_the_brown_istari: "Браун"
 nick_the_brown_istari_desc: "[CHARACTER.GetFirstNameNoTooltip|U] — Коричневый Волшебник, один из [istariconcept|E], известный своим затворническим характером и любовью к дикой природе."
 nick_the_blue_istari: "Синий"
 nick_of_many_colors: "Многоцветный"
 nick_of_many_colors_desc: "[CHARACTER.GetFirstNameNoTooltip|U] — величайший из [istari|E], стремящийся более активно управлять судьбой [middleearth|E]."
 nick_the_radiant: "Лучезарный"
  
  ### Dunedain Nicknames ### 
 nick_the_tall_dunedain: "Высокий"
 nick_the_tall_dunedain_Desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] получил прозвище «Высокий», потому что даже по меркам [dunedain|E] [CHARACTER.GetSheHe|U] был исключительно высоким."
 nick_the_faithful: "Верный"
 nick_the_renewer_dunedain: "Энвиньятар"
 nick_the_renewer_dunedain_desc: "Энвиньятар — это имя [quenya|E], заявленное [CHARACTER.GetShortUINameNoTooltipNoFormat|U], что означает «Обновитель». В буквальном смысле это относится к [CHARACTER.GetHerHis|U] обновлению царствования [dunedain|E] и, таким образом, к обновлению надежды [men|E]."
 nick_southernvictor: " Хиярмендакил"
 nick_southernvictor_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] принял имя Хьярмендакил, что означает «южный победитель» в [quenya|E]."
 nick_umbardacil: "Umbardacil"
 nick_umbardacil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] принял имя Умбардакил, что означает «Победитель над Умбаром» в [quenya|E], после того как [CHARACTER.GetSheHe|U] отвоевал южную провинцию [umbar|E]."
 nick_romendacil: "Rómendacil"
 nick_romendacil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] взял себе имя Ромендасиль, что означает «Победитель Востока» в [quenya|E], после того как [CHARACTER.GetSheHe|U] вернул себе восточную провинцию Дор Рунен."
 nick_falastur: "Falastur"
 nick_falastur_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] взял имя Фаластур, слово [elven|E], означающее «Повелитель побережий»."
 nick_the_steadfast_dunedain: "Непоколебимый"
 nick_the_steadfast_dunedain_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был первым правящим стюардом [gondor|E]. Он принял правление как король во всем, кроме имени, после того, как линия королей потерпела неудачу на юге."
 nick_the_last_castellan: "the Last Castellan"
 nick_the_last_castellan_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был последним из [gondorian|E] кастелянов Улонда."
 nick_udalraph: "Удалраф"
 nick_udalraph_desc: "Эпитет [CHARACTER.GetShortUINameNoTooltipNoFormat|U] означает «Бесстременный», поскольку он был наездником, которому не нужны были стремена, как [northmen|E]."
 nick_the_sunsword: "the Sun-Sword"
 nick_the_sunsword_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] was nicknamed 'the Sun-Sword' for his silver blade and helm reflect the Sun's light into the eyes of his foes with unerring accuracy." !
 nick_atannahtar: "Atannahtar"
 nick_atannahtar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] earned his nickname from killing a lot enemy soldiers during King Minalcar's attack on the Easterlings. Atannahtar means man-slayer in [quenya|E]."
 nick_andamacil: "Andamacil"
 nick_andamacil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] was given the name Andamacil meaning long-sword. His peers chose this name for him because of the long sword he faithfuly carried into battle."
 nick_mormegil: "Mormegil"
 nick_mormegil_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] was given the name Mormegil meaning black-sword because of the mass murder he committed during the siege of Narthan."
  
  
