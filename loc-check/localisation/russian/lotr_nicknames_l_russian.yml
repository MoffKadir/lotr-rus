  ### Númenórean Nicknames ### 
 nick_minyatur: "Тар Миньятур"
 nick_minyatur_desc: "Тар-Миньятур было царственным именем Эльроса. Это означало «Верховный Первоправитель» в [quenya|E]."
 nick_nolimon: "Нолимон"
 nick_nolimon_desc: "Нолимон был эпитетом Вардамира, Второго Короля [numenor|E]. Оно означало «Знание» в [quenya|E]."
 nick_parmaite: "Пармаитэ"
 nick_star_watcher: "Star Watcher"
 nick_the_mariner: "the Mariner"
 nick_the_vigilant: "the Vigilant"
 nick_ship_builder: "Ship-Builder"
 nick_bright_sword: "Bright Sword"
 nick_jewel_gatherer: "Jewel Gatherer"
 nick_shore_son: "Shore-Son"
 nick_star_flame: "Star-Flame"
 nick_the_far_sighted: "the Far Sighted"
 nick_the_golden_pharazon: "Золотой"
 nick_the_golden_pharazon_desc: "Ар-Фаразон был последним царем [numenor|E]. Его прозвали «Золотым» из-за его великих проявлений богатства и власти. Он собрал величайшую армию, которую [middleearth|E] когда-либо видел, и его действия привели к [akallabeth|E]."
  
