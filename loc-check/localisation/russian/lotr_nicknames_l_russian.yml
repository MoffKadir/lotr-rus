  ### Nazgul ### 
 nick_witch_king: "Король-Чародей"
 nick_witch_king_desc: "[witchking|E], Первый из [nazgulcharacter|E], был назван так из-за средней части [thirdage|E] теми, кто жил на севере [middleearth|E], в годы его правления колдовским правителем [angmar|E]."
 nick_blind_sorcerer: "Слепой Колдун"
 nick_blind_sorcerer_desc: "[blindsorcerer|E], также известный как [stormking|E], Пятый из [nazgulcharacter|E], был назван так, потому что он пожертвовал своими глазами, чтобы обрести силу темной магии."
 nick_golden_king: "Золотой Король"
 nick_golden_king_desc: "[game_concept_goldenking|E], Третий из [nazgulcharacter|E], был назван так за свою золотую маску."
 nick_black_horseman: "the Black Horseman"
 nick_black_horseman_desc: "Черный Всадник, Девятый из [nazgulcharacter|E], был назван так потому, что часто появлялся верхом, окутанный тьмой."
 nick_fire_king: "the Flaming King"
 nick_fire_king_desc: "Пылающий Король, Восьмой из [nazgulcharacter|E], был назван так, потому что он принес огонь и разрушение в Хей Сарт во время серии кампаний, известных как Пламенные войны."
 nick_dawndeath: "Dawndeath"
 nick_dawndeath_desc: "Dawndeath, Четвертый из [nazgulcharacter|E], был назван так за свою привычку атаковать на рассвете."
 nick_shadow_of_east: "the Shadow of the East"
 nick_shadow_of_east_desc: "[khamulshadwoftheeast|E], также известный как [khamulblackeasterling|E], Второй из [nazgulcharacter|E], был назван так потому, что он служил величайшим командиром [sauroncharacter|E] на Востоке во время [thirdage|E]."
 nick_dog_lord: "the Dog Lord"
 nick_dog_lord_desc: "Повелитель Псов, Седьмой из [nazgulcharacter|E], был назван так, потому что он использовал тысячи боевых гончих в бою во время завоевания острова Вау."
 nick_ice_king: "the Ice-King"
 nick_ice_king_desc: "Ледяной Король, Шестой из [nazgulcharacter|E], был назван так, поскольку, как говорили, он правил Урдом, ледяным царством на крайнем северо-востоке от [middleearth|E]."
  
  ### Black Númenórean ### 
 nick_mouth_of_sauron: "Уста Саурона"
 nick_mouth_of_sauron_desc: "Уста Саурона был одним из самых преданных слуг [sauroncharacter|E], служа его глашатаем и посыльным, а также лейтенантом Башни Барад-дур во время Войны Кольца. Его настоящее имя было забыто даже им самим."
 nick_storm_disciple: "Последователь Бури"
 nick_storm_disciple_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] обучался темной магии у [stormking|E] и самого [witchkingshort|E]. Его правление в качестве Штормового Маршала привело к аннексии Тулванга и подавлению восстаний Тулванги."
 nick_black_vizier: "Черный Визирь"
 nick_black_vizier_desc: "Черный визирь был заместителем [game_concept_goldenking|E]. Он был колдуном происхождения Черного [numenorean|E], которого обучал сам Золотой Король. Его жестокость была такой же легендарной, как и его находчивость, и большая часть управления Абраханом осталась в его руках, что сделало его невероятно могущественным."
 nick_the_ghost_of_belegaer: "Ghost of the Belegaer"
 nick_the_ghost_of_belegaer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был легендарным королем-корсаром Мадруака. Его прозвали «Призраком Белегаера», так как его корабли, казалось, появлялись из ниоткуда и так же быстро исчезали."
 nick_the_sorceress_of_mirkwood: "the Sorceress of Mirkwood"
 nick_the_sorceress_of_mirkwood_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был практиком темной магии и страстным подданным [dolguldur|E]."
 nick_andrake: "Andrake"
 nick_andrake_desc: "[CHARACTER.GetFirstNameNoTooltip|U] был амбициозным авантюристом из [umbar|E], который собрал команду из негодяев и мошенников и захватил крепость Улонд. Затем он использовал его как военно-морскую базу для проведения набегов на побережье Андраста. Это принесло ему прозвище «Дрейк Андраста», которое быстро сократили до «Андрак»."
 nick_the_lost_jerman: "потерянный"
 nick_the_lost_jerman_desc: "[CHARACTER.GetFirstNameNoTooltip|U] был известным корсаром родом из [anbalkumagan|E]. К сожалению, его навигационные навыки были не лучшими."
 nick_falseheir: "Лженаследник"
 nick_falseheir_desc: "Многие из его сверстников считали, что [CHARACTER.GetFirstNameNoTooltip|U] не был сыном того, кем он себя называл, воспользовавшись замешательством после смерти своего предшественника, чтобы выдать себя за своего ребенка."
 nick_the_ship_born: "рожденный на корабле"
 nick_the_ship_born_desc: "[CHARACTER.GetFirstNameNoTooltip|U] родился на палубе корабля, когда наследники Кастамира отступали в [umbar|E]."
 nick_twice_bled: "Дважды кровоточащий"
 nick_the_iron_handed: "железная рука"
 nick_the_iron_handed_desc: "[CHARACTER.GetFirstNameNoTooltip|U], как известно, наносит удар — грозный противник в ближнем бою"
 nick_throng_cleaver: "Толпа-тесак"
 nick_throng_cleaver_desc: "[CHARACTER.GetFirstNameNoTooltip|U] был известен тем, что безжалостно прорубал себе путь сквозь большие группы врагов."
 nick_twice_bled_desc: "[CHARACTER.GetFirstNameNoTooltip|U], как говорят, истекал кровью только дважды в своей жизни\nОдин раз в юности, когда его отец жестоко наказал его за какое-то предполагаемое пренебрежение и изгнал из дома.\nОдин раз много позже, когда его ятаган ударил отца с такой силой, что он сломал два пальца и разрезал его пополам."
  
  ### Haruzan Nicknames ### 
 #nick_serpentlord: "the Serpent Lord"
 nick_serpentlord: "Чёрная Змея"
 nick_serpentlord_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был могущественным [haradrim|E] королем, известным и страшным [harad|E]. Его называли Змеиным Лордом, потому что, как говорили, он был избран смертным защитником Кхаз-Грамазе, которому суждено было потребовать Долгую месть против [dunedain|E]."
 nick_greatking: "the Great King"
 nick_greatking_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был легендарным королем Харузана, который расширил свое королевство от устья Харнена до холмов Лурмсакун. Он основал Высшее Королевство Харван, которое доминировало в [nearharad|E] на протяжении нескольких столетий."
 nick_the_serpents_shade: "the Serpent's Shade"
 nick_the_old_viper: "the Old Viper"
 nick_the_old_viper_desc: "Несмотря на преклонный возраст, хитрость [CHARACTER.GetFirstNameNoTooltip|U] все еще вызывала страх и уважение."
 nick_the_clawless: "Без когтей"
 nick_the_clawless_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был королем-марионеткой, установленным [gondor|E]. За это, наряду с его отношением, над ним издевались многие его подданные."
 nick_the_cunning_pezar: "Хитрый"
 nick_the_cunning_pezar_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] завоевал Харузан, расширив свое королевство до устья Харнена."
  
  ### Tedjin Nicknames ### 
 nick_tedjinrestorer: "Отец тейджинов"
 nick_tedjinrestorer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] заново основал Теджин Катаджате Каджаджара, навсегда закрепив за [CHARACTER.GetHerselfHimself|L] статус одного из величайших лидеров в истории Теджина."
 nick_tedjinrestorer_female: "Мать Теджина"
 nick_tedjinrestorer_female_desc: "$nick_tedjinrestorer_desc$"
  
  ### Haradrim Nicknames ### 
 nick_terror_of_nafarat: "Ужас Нафарата"
 nick_terror_of_nafarat_desc: "То, что когда-то было воином, стало темным инструментом, сокрушающим всех, кто противостоял слугам [zigur|E]."
 nick_the_camel: "the Camel"
 nick_the_camel_desc: "Над [CHARACTER.GetShortUINameNoTooltipNoFormat|U] часто издевались из-за ее внешности. Однако недооценка имела свои преимущества..."
 nick_the_trusting: "the Trusting"
 nick_the_trusting_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был очень доверчив, чем чаще всего пользовались его вассалы."
 nick_the_dowser: "лозоходец"
 nick_the_dowser_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известным мистиком, которого очень любили за его способность находить источники воды, используя только, казалось бы, обычную ветку."
 nick_the_hand_of_gurzil: "Рука Гурзила"
 nick_the_hand_of_gurzil_desc: "Говорят, что [CHARACTER.GetShortUINameNoTooltipNoFormat|U] получил жгучее, сияющее видение Гурзила, который выбрал [CHARACTER.GetHerHim|L], чтобы пересечь горы и изгнать [dunedain|E] из [umbar|E]."
 nick_the_jelut_unifier: "the Great Uniter"
 nick_the_jelut_unifier_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] successfully united the Jelut under one banner, for a time."
 nick_the_great_guide: "the Great Guide"
 nick_the_great_guide_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] wisely guided the united Jelut tribes out of their desert to descend upon the surrounding kingdoms."
 nick_gurzils_arrow: "Gurzil's Arrow"
 nick_gurzils_arrow_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] was a great leader who united the Jelut tribes."
 nick_the_suntouched: "the Suntouched"
 nick_the_suntouched_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] united the Jelut tribes. [CHARACTER.GetSheHe|U] was said to have been blessed by the gods to be immune to being burned by the sun."
  
  # Dune Sea 
 nick_the_sandstorm: "the Sandstorm"
 nick_the_sandstorm_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] was a legendary king, said to have briefly unified the nomadic tribes of the Dune Sea. He was said to sweep over his enemies with the speed of wind.\n\nThe Ezarkia [dynasty|E] of Koanoz claim descent from him."
 nick_tribemaker: "Tribemaker"
 nick_tribemaker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] united many of the Dune Sea nomads around Rakhudish and forged long-lasting friendships between them."
 nick_windrider: "Windrider"
 nick_windrider_desc: "In his youth, [CHARACTER.GetShortUINameNoTooltipNoFormat|U] was known as a crafty but very reckless leader. His men dubbed him 'Windrider' after he constructed a wooden vehicle which rode on the sands using a great sail. He used it a few times thorough his rule, mostly to impress his vassals, though it eventually cost him his leg."
 nick_scorpion_king: "the Scorpion King"
 nick_scorpion_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] had shown himself to be a capable leader, taking on a role as a figurehead for the nomads of the Dune Sea. This, along with his fascination with the great scorpions, earned him the title of 'Scorpion King'."
 nick_mother_of_shades: "Mother of Shades"
 nick_mother_of_shades_desc: "A flurry of myths surrounded [CHARACTER.GetShortUINameNoTooltipNoFormat|U], dubbed 'The Mother of Shades'. The most common one is the tale of [the_girl_and_the_spider|E], which tells of her youth and her leadership of the Cult of Sanbaiz. The leaders of many coven-tribes in service to the great spider claim descent from her."
 nick_the_evil_dunesea: "the Evil"
 nick_the_evil_dunesea_desc: "[CHARACTER.GetFirstNameNoTooltip|U] committed many dark and evil acts, which earned her a fierce competition among the coven-tribes."
 nick_the_widow: "the Widow"
 nick_the_widow_desc: "[CHARACTER.GetFirstNameNoTooltip|U]was said to have a dark beauty capable of enchanting anyone she set her eyes upon. It is also said that none of her countless husbands lived more than a year past their wedding."
 nick_the_knowing: "the Knowing"
 nick_the_knowing_desc: "[CHARACTER.GetFirstNameNoTooltip|U]'s knowledge was well respected among her sisters, but advice from her always came with a price."
 nick_the_old_crone: "the Old Crone"
 nick_the_old_crone_desc: "It is said that [CHARACTER.GetFirstNameNoTooltip|U] forged a dark pact with Sanbaiz - Her life was stretched long, but thin. She then aged very quickly and was thus unable to enjoy her lengthened lifespan."
 nick_the_camel_spider: "the Camel Spider"
 nick_the_camel_spider_desc: "Ruthless, hidden and venomous - It was said that her mother exchanged [CHARACTER.GetFirstNameNoTooltip|U]'s soul for that of a camel spider when she was a child. She ruthlessly dipatched her opponents and seized power from the shadows."
 nick_the_hag: "the Hag"
 nick_the_hag_desc: "[CHARACTER.GetFirstNameNoTooltip|U] was said to have been granted unnatural powers by Sanbaiz, but in exchange she was made hideous and deformed."
  
  ### Druedain Nicknames ### 
 nick_honnin_restorer: "Великий Восстановитель"
 nick_honnin_restorer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] удалось успешно вернуть земли, которые Хоннины потеряли так давно."
  
  
  ### Rhun and Khand Nicknames ### 
 nick_blackspear: "Blackspear"
 nick_blackspear_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] часто называют Черным копьем, потому что [CHARACTER.GetHerHis|L] предпочитаемое оружие — большое копье, обтянутое множеством черных полос ткани."
 nick_the_mysterious: "the Mysterious"
 nick_the_mysterious_desc: "Мало что было известно о [CHARACTER.GetShortUINameNoTooltipNoFormat|U], которого сверстники считали загадкой."
 nick_the_preserver_khand: "the Preserver"
 nick_the_preserver_khand_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] стал верховным королем [khand|E] после смерти своего деда. При нем варяги на долгий период объединились."
 nick_the_defeated_khand: "the Defeated"
 nick_the_defeated_khand_desc: "В отличие от других Верховных Королей [khand|E], он объединил варягов не силой воли, а создав коалицию против внешней угрозы с помощью своей харизмы. К сожалению, отсутствие у него военного опыта привело к его быстрой и позорной смерти во время вторжения Золотого Царства."
 nick_the_brightest_pebble: "the Brightest Pebble"
 nick_the_brightest_pebble_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был поразительно неумел. [CHARACTER.GetSheHe|U] считался самым блестящим мыслителем среди всех камешков на берегу [nurn|E]. Когда отец [CHARACTER.GetHerHis|L] умер, в результате переворота, поддержанного [mordor|E], клан [CHARACTER.GetHerHis|L] был свергнут."
 nick_the_spearmaster: "the Spearmaster"
 nick_the_spearmaster_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был хорошо известен своим умением обращаться с копьем."
 nick_gilded_star: "The Gilded Star"
 nick_gilded_star_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] успешно заново основал древнее королевство Шрелдор, принеся страх и смерть народам [rhovanion|E]."
  
  ### Bellakarean Nicknames 
 nick_ironhand: "Железная рука"
 nick_ironhand_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был хорошо известен как объединитель [bellakar|E]. Согласно древней легенде, он потерял руку в бою, и боги подарили ему новую, сделанную из железа, которой он мог двигать, как если бы это была его плоть."
 nick_league_maker: "Создатель лиги"
 nick_league_maker_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] присоединился к Королям кораблей из [gondor|E], а при нем [bellakar|E] процветал и пережил долгий золотой век."
 nick_the_virtuous: "добродетельный"
 nick_the_virtuous_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известен как исключительно благочестивый правитель. Он финансировал множество библиотек и храмов, посвященных большому количеству божеств по всему [bellakar|E]."
 nick_the_hammer_of_doom: "Молот Судьбы"
 nick_the_hammer_of_doom_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U], как известно, владел массивным боевым молотом, предположительно выкованным в Эсмер."
 nick_the_prudent: "благоразумный"
 nick_the_prudent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был очень осторожным правителем, всегда тщательно взвешивая варианты [CHARACTER.GetHerHis|U], прежде чем действовать. Иногда это замедляло действие [CHARACTER.GetHerHim|L], чем не раз пользовались враги [CHARACTER.GetHerHis|L]."
 nick_the_arrogant: "высокомерный"
 nick_the_arrogant_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был исключительно горд и тщеславен. У [CHARACTER.GetSheHe|U] была большая статуя [CHARACTER.GetHerselfHimself|U], вырезанная из мрамора высоко в горах, которая несколько лет спустя была быстро засыпана грязью оврага."
 nick_the_sorcerer_king: "Король-Заклинатель"
 nick_the_sorcerer_king_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был назван Королем-Заклинателем, потому что, по слухам, он проводил темные ритуалы глубоко в секретных катакомбах [GetTitleByKey('c_korlea').GetBaseNameNoTier]."
 nick_the_repentent: "кающийся"
 nick_the_repentent_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был посмертно назван «Покаявшимся», так как его действия привели к воссоединению [bellakar|E] под [tumakveh|E]."
 nick_the_silver_crowned: "увенчанный серебром"
 nick_the_silver_crowned_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известен своими [CHARACTER.GetHerHis|L] серебристо-белыми волосами."
  
  ### Cult of Saints ### 
 nick_the_prophet_saint: "$nick_the_prophet$"
 nick_the_prophet_saint_desc: "Изиндубет Имратор был величайшим из святых и основателем Батан ан-Изинди. Во время гегемонии Хатаджате над [bellakar|E] он призвал к крестовому походу против вторгшихся Теджинов из своего укрепленного монастыря Уруд ан-Хибил. Его воины, известные как Нардуви ам-Батан, яростно сражались, пока не были окончательно разбиты, а их монастырь взят штурмом."
 nick_the_militant_saint: "воинствующий"
 nick_the_militant_saint_desc: "Святой [CHARACTER.GetFirstNameNoTooltip|U] был почитаемым святым мечником, который защищал веру своими клинками и своим словом."
 nick_the_unbreakable_saint: "Нерушимый"
 nick_the_unbreakable_saint_desc: "О конституции святого [CHARACTER.GetFirstNameNoTooltip|U] ходили легенды. Он сохранил свою веру, какой бы вред ни выпал на его долю, и, несмотря на все трудности, прожил долгую жизнь, благословленную [erutheone|E]."
 nick_the_wise_saint: "$nick_the_wise$"
 nick_the_wise_saint_desc: "Святой [CHARACTER.GetFirstNameNoTooltip|U] был широко читаемым богословом и политическим философом. Его сочинения дали бы большой толчок для растущего чувства переплетения политической и религиозной идентичности фелаев, которое сформирует фактическую независимость региона."
 nick_the_patron_of_pilgrims: "the Patron of Pilgrims"
 nick_the_patron_of_pilgrims_desc: "Святой [CHARACTER.GetFirstNameNoTooltip|U] был известен тем, что путешествовал большую часть [middleearth|E], чтобы увидеть красоту, созданную [erutheone|E], и распространять веру посредством паломничества."
 nick_the_fasting_saint: "пост"
 nick_the_fasting_saint_desc: "Святой [CHARACTER.GetFirstNameNoTooltip|U] был очень почитаемым Изиндубетом, постившимся в течение длительных периодов времени. Говорят, что к концу своей жизни он жил только верой в [erutheone|E]."
 nick_the_anointed_saint: "$nick_the_anointed$"
 nick_the_anointed_saint_desc: "Святой [CHARACTER.GetFirstNameNoTooltip|U] был исключительно благочестивым Первым Лордом Фелайи. Он часто обращался за советом к Изиндубет и был одним из немногих светских правителей, которые когда-либо были освящены."
 nick_the_reformer_tedjin: "реформатор"
 nick_the_reformer_tedjin_desc: "Святой [CHARACTER.GetFirstNameNoTooltip|U] был великим лидером Конфедерации Теджин. [CHARACTER.GetSheHe|U] исправил пути [CHARACTER.GetHerHis|U] людей и был посмертно освящен на [CHARACTER.GetHerHis|U] великие дела."
  
  ### Thani-Hazad Nicknames ### 
 nick_the_rebuilder: "Восстановитель"
 nick_the_daring: "дерзкий"
 nick_the_resplendent: "Блистательный"
 nick_the_mystic: "Мистик"
 nick_the_mystic_desc: "Известно, что [CHARACTER.GetShortUINameNoTooltipNoFormat|U] совершал странные ритуалы, чтобы предугадать следующий ход [CHARACTER.GetHerHis|L]."
 nick_the_fierce_adunaic: "Свирепый"
 nick_the_fierce_adunaic_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] попытался утвердить свою королевскую власть против штурмового маршала. Он был относительно неудачным, но довольно настойчивым."
 nick_the_storm_caller: "Призывающий бурю"
 nick_the_storm_caller_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был начинающим колдуном, помешанным на использовании своих темных сил для вызова бурь и грома. В конце концов ему это удалось, но, к сожалению, он не научился контролировать вызванную им бурю. Рассказы о его неудачах были весьма популярны среди молодежи [anbalkumagan|E]."
  
