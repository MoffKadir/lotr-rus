l_russian:
  
  ### Eotheod Nicknames ### 
 nick_the_hapless: "[Select_CString(CHARACTER.IsFemale, 'Несчастная', 'Несчастный' )]"
 nick_hammerhand: "[Select_CString(CHARACTER.IsFemale, 'Молоторукая', 'Молоторукий' )]"
 nick_hammerhand_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] прозвали Молоторукой из-за его огромной силы и умения обращаться с кулаками: известно, что он сражался голыми руками. Иногда это приписывают суеверию, согласно которому, если бы «он не использовал оружие, никакое оружие не укусило бы его»."
 nick_leofa: "Леофа"
 nick_ednew: "Эднев"
 nick_eadig: "Эадиг"
 nick_knight_of_the_mark: "Рыцарь Марки"
 nick_wormtongue: "Червеуст"
 nick_wormtongue_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известен как Гнилоуст, ибо говорят, что каждое слово, слетавшее с его губ, было ложью."
 nick_wolfsbane: "Погибель Волков"
 nick_wolfsbane_desc: "Ходили слухи, что в приступе ярости [CHARACTER.GetFirstNameNoTooltip|U] самостоятельно уничтожил целую стаю волков. Это принесло [CHARACTER.GetHerHim|U] прозвище Волчий яд."
 nick_the_dragonslayer: "Убийца Дракона"
 nick_the_dragonslayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известен как Убийца Драконов, потому что он убил злого червя Ската. Его действия принесли ему большое сокровище, которое дракон ранее украл у [dwarves|E]."
 nick_the_unifier: "the Unifier"
 nick_steelsheen: "Steelsheen"
  
 nick_of_the_hills: "холмов"
 nick_of_the_hills_desc: "[CHARACTER.GetFirstNameNoTooltip|U] провел большую часть своей юности, путешествуя по диким холмам [rhovanion|E]. Это, наряду с его репутацией рейдера, который внезапно устраивает засады на торговцев, проезжающих через Коричневые земли, принесло ему прозвище «Холмы»."
 nick_the_rider_that_remained: "[Select_CString(CHARACTER.IsFemale, 'Отставшая Всадница', 'Отставший Всадник' )]"
 nick_the_rider_that_remained_desc: "Когда Эорл повел большую часть Эотеода на юг, некоторые остались в Долине по разным причинам. Они выбрали своим лидером [CHARACTER.GetFirstNameNoTooltip|U], которого южные родственники прозвали «Всадником, который остался». Хотя он никогда не претендовал на титул короля, так как все еще считал себя подданным короля [rohan|E], его помнили как праотца современных леофрингов («народ Леофра»)."
 nick_the_singer_of_sagas: "[Select_CString(CHARACTER.IsFemale, 'Поющая Саги', 'Поющий Саги' )]"
 nick_the_singer_of_sagas_desc: "[CHARACTER.GetFirstNameNoTooltip|U] был превосходным бардом, его легендарные сказки вдохновили многие мифы и саги, окружающие Фейри."
  
  ### Northmen Nicknames 
 nick_the_last: "the Last"
 nick_the_last_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был последним из их линии правителей."
  
  ### Dorwinion Nicknames ### 
 nick_gwinaran: "Гвинаран"
 nick_grapeseed: "Виноградная Косточка"
 nick_alphathel: "Альфатель"
 nick_half_full: "[Select_CString(CHARACTER.IsFemale, 'Оптимистка', 'Оптимист' )]"
 nick_half_full_desc: "[CHARACTER.GetFirstNameNoTooltip|U] часто высмеивали из-за его маленькой статуэтки."
 nick_anoriell: "Анориэлл"
 nick_anoriell_desc: "[CHARACTER.GetFirstNameNoTooltip|U] прозвали Анориэль, что означает «Солнечная дева» за ее красоту и яркий характер."
 nick_elf_friend: "[Select_CString(CHARACTER.IsFemale, 'Подруга Эльфов', 'Друг Эльфов' )]"
 nick_elf_friend_desc: "[CHARACTER.GetFirstNameNoTooltip|U] был очень добрым и открытым человеком, который в молодости подружился с одним из [lasgalendrimelves|E] Северной [game_concept_mirkwood|E]."
 nick_the_vine_whisperer: "[Select_CString(CHARACTER.IsFemale, 'Заклинательница Вин', 'Заклинатель Вин' )]"
 nick_the_vine_whisperer_desc: "Говорили, что [CHARACTER.GetShortUINameNoTooltipNoFormat|U] всегда точно знала, что нужно ее растениям. Под ее нежной заботой виноградники ее семьи выросли и стали одними из величайших в [dorwinion|E]."
 nick_wineblood: "Винная Кровь"
 nick_wineblood_desc: "Говорят, что в жилах [CHARACTER.GetShortUINameNoTooltipNoFormat|U] течет вино, как из-за его веселого характера, так и из-за пурпурного оттенка его крови."
 nick_the_esoteric_lotr: "the Esoteric"
 nick_the_esoteric_lotr_desc: "О [CHARACTER.GetShortUINameNoTooltipNoFormat|U] рассказывают много странных историй. Говорили, что он наполовину рыба, заползающая в море ночью, чтобы собраться со своими странными сородичами в глубине."
  
  ### Dale Nicknames ### 
 nick_the_bowman: "[Select_CString(CHARACTER.IsFemale, 'Лучница', 'Лучник' )]"
 nick_the_bowman_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был известен своей легендарной меткостью. Его величайшим подвигом было поражение Смауга. Ему удалось выпустить черную стрелу в единственное слабое место [Concept( 'dragon', 'дракона' )|E], на животе."
 nick_shatterstag: "Шаттерстаг"
 nick_shatterstag_desc: "В [CHARACTER.GetHerHis|U] юности [CHARACTER.GetShortUINameNoTooltipNoFormat|U] обманом заставил большого оленя протаранить дуб, в результате чего в его черепе образовалась трещина, которая теперь крепится на стенах зала [CHARACTER.GetHerHis|U]."
  
  ### Woodmen & Valemen Nicknames ### 
 nick_the_wood_goer: "[Select_CString(CHARACTER.IsFemale, 'Лесничая', 'Лесничий' )]"
 nick_the_wood_goer_desc: "Известно, что [CHARACTER.GetShortUINameNoTooltipNoFormat|U] большую часть времени [CHARACTER.GetHerHis|L] проводил в лесах [rhovanion|E]."
 nick_raven_eye: "Вороний Глаз"
 nick_raven_eye_desc: "Ходят слухи, что даже с одним оставшимся глазом зрение [CHARACTER.GetShortUINameNoTooltipNoFormat|U] в два раза острее, чем обычно."
 nick_honeybeard: "Медобород"
 nick_honeybeard_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] известен [CHARACTER.GetHerHis|L] веселым характером и любовью к мёду, но насмехается над [CHARACTER.GetHerHis|U] остроумием."
  
