  ### Event Nicknames ### 
 nick_serpent_slayer: "Убийца Змея"
 nick_serpent_slayer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] прославился тем, что убил меньшее Море-[serpent|E]."
 nick_rhudaur_explorer: "the Rhudaur Explorer"
 nick_rhudaur_explorer_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] исследовал безмолвные холмы и долины [rhudaur|E]."
 nick_troll_seeker: "the Troll Seeker"
 nick_troll_seeker_desc: "Во время своих путешествий [CHARACTER.GetShortUINameNoTooltipNoFormat|U] наткнулся на диких горных троллей."
 nick_the_emancipator: "the Emancipator"
 nick_loremaster: "the Loremaster"
 nick_loremaster_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был хорошо известен в научных кругах благодаря [CHARACTER.GetHerHis|U] обширным познаниям в [middleearth|E] и его истории."
 nick_brightlordlady: "Яркий [CHARACTER.GetLadyLord|U]"
 nick_brightlordlady_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] называли себя Яркими [CHARACTER.GetLadyLord|U], в отличие от [sauronthedarklordcharacter|E]."
 nick_archivist: "the Archivist"
 nick_archivist_desc: "[CHARACTER.GetShortUINameNoTooltipNoFormat|U] был широко известен как ученый с обширным архивом древних знаний со всех уголков [middleearth|E]."
  
