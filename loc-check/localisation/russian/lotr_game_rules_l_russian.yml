 game_rule_category_realms: "Царства в изгнании"
  
 rule_wotr: "Война Кольца"
 setting_default_wotr: "По умолчанию"
 setting_default_wotr_desc: "Война Кольца начнётся около 3018 года."
 setting_never_wotr: "#high Никогда#!"
 setting_never_wotr_desc: "События Войны Кольца никогда не произойдут."
 setting_random_wotr: "#high Случайно#!"
 setting_random_wotr_desc: "События Войны Кольца произойдут в случайное время."
  
 rule_ai_behavior: "Поведение ИИ LOTR"
 setting_default_ai_behavior: "По умолчанию"
 setting_default_ai_behavior_desc: "В важных событиях ИИ всегда будет принимать решения, близкие к каноничным."
 setting_weighted_ai_behavior: "Взвешенно-случайно"
 setting_weighted_ai_behavior_desc: "В важных событиях ИИ как правило будет принимать решения, близкие к каноничным."
 setting_random_ai_behavior: "Полная случайность"
 setting_random_ai_behavior_desc: "В важных событиях ИИ будет принимать совершенно случайные решения."
  
 rule_shattered_earth_rule: "Раздробленный мир"
 setting_shattered_earth_false: "Не раздробленный"
 setting_shattered_earth_false_desc: "Структура владений Средиземья останется такой, какой и должна быть по умолчанию."
 setting_shattered_earth_counties: "#high Раздробленный — графства#!"
 setting_shattered_earth_counties_desc: "Владения Средиземья будут раздроблены до независимых графств вскоре после начала игры."
 setting_shattered_earth_duchies: "#high Раздробленный — герцогства#!"
 setting_shattered_earth_duchies_desc: "Владения Средиземья будут раздроблены до независимых герцогств вскоре после начала игры."
 setting_shattered_earth_kingdoms: "#high Раздробленный — королевства#!"
 setting_shattered_earth_kingdoms_desc: "Владения Средиземья будут раздроблены до независимых королевств вскоре после начала игры."
 setting_shattered_earth_empires: "#high Раздробленный — империи#"
 setting_shattered_earth_empires_desc: "Владения Средиземья будут раздроблены до независимых империй вскоре после начала игры."
 shattered_earth.t: "Средиземье Раздроблено"
 shattered_earth.desc: "Мир изменён. Я чувствую это в воде. Я вижу это в земле. Я чувствую ветер перемен в воздухе. То, что было прежде, теперь кануло в лету...\n\nПохоже мы лишь игрушка в руках Богов!"
 shattered_earth.a: "Трижды прежде мир был разрушен на части. И вот опять?"
  
 rule_calendar_rule: "Система летоисчисления"
 setting_sindarin_calendar: "От наместников: синдарин"
 setting_sindarin_calendar_desc: "Стандартный игровой календарь заменён на версию календаря дунэдайн на синдарине."
 setting_quenya_calendar: "От наместников: квенья"
 setting_quenya_calendar_desc: "Стандартный игровой календарь заменён на версию календаря дунэдайн на квенья."
 setting_hobbit_calendar: "По календарю Шира"
 setting_hobbit_calendar_desc: "Стандартный игровой календарь заменён на версию календаря, используемую хоббитами Шира."
 setting_bellakaze_calendar: "Летоисчисление Тумаквэ"
 setting_bellakaze_calendar_desc: "Стандартный игровой календарь заменён на версию календаря, использовавшуюся бывшей колонией Нуменора — Беллакаром."
 setting_gregorian_calendar: "Грегорианский календарь"
 setting_gregorian_calendar_desc: "Игровое летоисчисление останется неизменным и будет соответствовать стандартному грегорианскому календарю."
  
 rule_sauron_appearance_rule: "Внешность Саурона"
 setting_fair_sauron: "Светлая"
 setting_fair_sauron_desc: "Майрон Восхитительный, как звал себя Саурон, был красив и светел. Он с гордостью использовал это имя вплоть до Низвержения Нуменора, когда больше не мог ему соответствовать."
 setting_corrupted_sauron: "Искаженная"
 setting_corrupted_sauron_desc: "Саурон-Лжец. Даже после разрушения своего тела Саурон все ещё пытается сохранить светлую форму, хоть это и не удается ему полностью."
 setting_crispy_sauron: "Обожженный"
 setting_crispy_sauron_desc: "Гортаур Ужасный, принявший собственную падшую природу. Саурон распрощался с обманчивой формой, представ пред миром в своём истинном жутком обличье."
 setting_armored_sauron: "Бронированный"
 setting_armored_sauron_desc: "Саурон Неукротимый — в перекованной древней броне Саурон принимает свою самую страшную форму."
  
 rule_golden_king_recall_rule: "Золотой король"
 setting_golden_king_recallable: "отзываемый"
 setting_golden_king_recallable_desc: "Дает Саурону возможность отозвать своего Назгула, Золотого Короля, из земель Абрахана на юге, чтобы помочь ему."
 setting_golden_king_not_recallable: "Не подлежит отзыву"
 setting_golden_king_not_recallable_desc: "#N Саурон не будет отзывать своего Назгула, Золотого Короля, в Мордор, что создаст дополнительную проблему для любых игроков на Юге.#!"
  
 rule_elven_expansion_rule: "Экспансия эльфов"
 setting_limited_elven_expansion: "Ограниченная"
 setting_limited_elven_expansion_desc: "Эльфам будет доступен ограниченный набор казус белли, а прогресс фабрикации претензий будет замедлен, чтобы отразить их каноничную природу, не направленную на экспансию."
 setting_free_elven_expansion: "Свободная"
 setting_free_elven_expansion_desc: "На эльфов не накладываются ограничения по доступным казус белли."
  
 rule_elven_conversion_rule: "Эльфийское обращение"
 setting_slow_elven_conversion: "Замедленное"
 setting_slow_elven_conversion_desc: "Культурное и религиозное обращение будет замедленно для эльфов, чтобы отразить их каноничную природу, не направленную на экспансию."
 setting_normal_elven_conversion: "Неизменное"
 setting_normal_elven_conversion_desc: "Культурное и религиозное обращение не будут замедлены, скорость останется такой же как в ванильной игре."
  
 rule_news_alerts_rule: "Оповещения о новостях"
 setting_no_news: "Нет новостей"
 setting_no_news_desc: "Новостные события не будут отправлены игрокам."
 setting_major_news: "Основные новости"
 setting_major_news_desc: "Новостные события будут отправлены игрокам, чтобы объявить об основных событиях в Средиземье."
 setting_all_news: "Все новости"
 setting_all_news_desc: "Новостные события будут отправлены игрокам, чтобы объявить как об основных, так и о незначительных событиях в Средиземье."
