l_english:

 ### Istari Events ###
 
 istari.0003.t: "The Road Goes Ever On And On"
 istari.0003.desc: "[departing_istar.GetFirstNameNoTooltip|U] comes to my hall, dressed for travel. He is wearing his warmest cloak and hat, staff in hand and travel bag on his shoulder.\n\"My friend, the time has come for me to leave your side and come to the help of other people in their fight against the forces of Evil. But fret not, I am certain you will be fine without me."\n\nAnd with a brief handshake and a smile he is off. No word from me will hold him back."
 istari.0003.a: "Take care, old friend. I wonder if we shall ever meet again."

 istari.0100.t: "Wizards Two"
 istari.0100.desc: "While the rest of our [Concept('wizards','brethren')|E] wander alone, we two have found strength in our long companionship. Throughout the many paths we have traveled, [other_wizard.GetFirstName|U] has been constantly at my side to offer counsel and aid, and I cannot imagine our work alone. \n\nYet we two still have each our own strengths, and while I have been the de facto leader in this last phase of our journeys, perhaps [other_wizard.GetFirstName] will be better suited to face what lies ahead."
 istari.0100.a: "I shall see us through the trials ahead"
 istari.0100.b: "It is time for [other_wizard.GetFirstName] to take the lead"
