 lotr_great_project.2000.t.base: "Rebuilding Arnor"
 lotr_great_project.2000.t.second: "$lotr_great_project.1000.t.base$: The Glory of [project_location.GetNameNoTooltip]"
 lotr_great_project.2000.desc.base: "The first stones are shifted, and the rubble of ages begins to clear. Collapsed halls are cleared, broken stone hauled away, and ancient roads reopened for the first time in generations.\n\nThe scars of decay remain everywhere, but out of the rubble the foundations of Arnorian architecture endure. Fires are lit once more, scaffolds raised, and the steady rhythm of labour echoes through the streets. This place is no longer abandoned and is coming back to life."
 lotr_great_project.2000.desc.second: "The city stirs with life. Rebuilt halls echo with the voice of poets, taverns and markets with the sound of the thousand voices of a prosperous people.\n\nAs my gaze follows shining spires towards the skies, I hear the laughter of children running in the gardens and playing with the fountains and multi-coloured birds that populate them."
 lotr_great_project.2000.a.first: "We shall make these ruins a home."
 lotr_great_project.2000.a.second:  "This is my #EMP true#! purpose."

