 rhun.0100.t: "The Dragon-Knights Ride Forth"
 rhun.0100.desc: "The Order of the Black Dragon has long been a powerful force among the Easterlings, keeping the wild frontier under control and striking fear into the hearts of our enemies. Now, the Dragon-Knights are ready to ride forth and defend our lands from any who would threaten them!\n\nThe Dragon-Knights are a formidable force, trained in the art of mounted combat and equipped with the finest weapons and armor. They are fiercely loyal to their cause and will stop at nothing to protect their homeland. And as their new leader, I will not rest until these lands are made safe for all who call them home.\n\nWith the Dragon-Knights now ready for war, we will be able to repel any invaders and secure our borders. We will also be able to expand our influence and trade with neighboring regions, bringing prosperity to our people. The future looks bright for the Easterlings, and I am proud to lead the Dragon-Knights into battle!"
 rhun.0100.a: "For the Black Dragon!"