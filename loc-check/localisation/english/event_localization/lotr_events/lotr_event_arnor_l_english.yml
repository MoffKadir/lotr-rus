l_english:
 ### ANGMAR START DATE EVENTS ###
 
 arnor.1201.t: "Refugees from Rhudaur"
 arnor.1201.desc: "It is the late afternoon of a rather quiet day as one of my heralds approaches my throne. \n\n"Your Grace," he says, "there are refugees arriving from Rhudaur in the east as we speak. Their leader has formally requested an audience with you." \n\nI nod, approving of the request. Soon enough, a hearty man kneels before my throne. "My King, I am [mellondir.GetFirstName], former Lord of Fennas Drúnin. Yet as you know, evil has befallen that land, and the [hillmen|E] have exiled me from my realm. I seek now only safety and refuge, O King, and I shall be a loyal servant of you, and in thy name I shall fight."\n\nI sit for a while in thought before at last I give an answer: \n\n"Evil times are these indeed, and valiant men we shall need. You have fled, sure, yet now is not the time to dwell on such deeds which were made in haste." I rise to my feet, turning my gaze upon Lord Mellondir. "Soon we shall march against Rhudaur, and any soldier shall be vital. If refuge you seek, then I grant it! May you be loyal and valiant." \n\nIt seems I have gained an unexpected ally..."
 arnor.1201.a: "You shall be given leave to rebuild the [GetTitleByKey('c_killarbrag').GetName]."
 event_arnor_1201_a: "[mellondir.GetName] will become your vassal and rule [GetTitleByKey('c_killarbrag').GetNameNoTier]."
 arnor.1201.b: "I will have a place for you at my court."
 event_arnor_1201_b: "[mellondir.GetName] and his family will remain at your court."
 
 arnor.3002.opening: "Noble and Just Lord of Thalion,"
 arnor.3002.desc: "Many years it has been since the line of [isildur|E] failed in thy kingdom. Now alone, I am the last king of the line of [elendil|E] who reigns still in the North. Long it has been since the passing of Eärendur and the sundering of [arnor|E], and so I seek to end this disunity.\n\nI now claim most justly Lordship of Arnor, and none may truthfully stand against it. [Glossary('Et Eärello Endorenna utúlien. Sinomë maruvan ar Hildinyar tenn Ambar-metta.', 'oath_of_elendil_gloss' )] Thus spake Elendil.\n\nThy fealty shall be rewarded, thy valour honoured, if only you would accept my rightful lordship. The heirs of Isildur shall not bow nor quail."

 arnor.3002.a: "We must unite to weather the storm."
 arnor.3002.b: "You are no greater or nobler than us!"
 
 arnor.3201.t: "Refugees from Rhudaur"
 arnor.3201.desc: "As I hold court on a rather bland morning, one of my heralds arrives with an urgent message. I am excited for something to distract me from my more mundane tasks and bid him to speak. \n\n"Your Grace," he says, "there are refugees arriving from Rhudaur in the east as we speak. Their leader has formally requested an audience with you." \n\nSoon enough, a stranger is brought into my throne room. He bends the knee, stating, "My King, I am [mellondir.GetFirstName], former Lord of Fennas Drúnin. Yet as you know, evil has befallen that land, and the [hillmen|E] have exiled me from my realm. I seek now only safety and refuge, Lord, and my men and I shall be bidden to you."\n\nI rise from my throne and walk down towards Lord Mellondir. \n\n"A fair sight are ye, and your men! Surely these are grave times, and evil raises its head again. Aye, you have fled, yet surely I would do the same! To die in a futile last stand is foolish, and you would do better here than as carrion for the crows." I smile warmly. "If refuge you seek, refuge you shall be granted. Let us spill Hillman blood as brothers and comrades!" \n\nIt seems I have gained an unexpected ally..."
 arnor.3201.a: "You shall be granted the [GetTitleByKey('c_dinach').GetName]."
 event_arnor_3201_a: "[mellondir.GetName] will become your vassal and rule [GetTitleByKey('c_dinach').GetNameNoTier]."
 arnor.3201.b: "I will have a place for you at my court."
 event_arnor_3201_b: "[mellondir.GetName] and his family will remain at your court."

 arnor.7002.t: "A Dilemma"
 arnor.7002.desc: "My spies and scouts all return with a unanimous conclusion: the odds are overwhelming. The hordes of the [hillmen|E] now openly march against me, outnumbering our forces vastly.\n\nAt last the choice is with me: fight, or flee. To fight is almost certain doom, yet we may still be a bastion against the Darkness. But what good is dying valorously for anyone? To flee west may be ignominious, yet it is our greatest hope for survival."
 arnor.7002.a: "Let them come, for we shall fight gloriously!"
 arnor.7002.b: "Valiant it may not be, but fleeing is the wisest choice."
 defiant_defenders: "Defiant Defenders"
 
 arnor.7022.t: "Looming Defeat"
 arnor.7022.desc: "I have decided to stand and fight against the vile invaders from the north, led by the brute, [hwaldar.GetFirstName], who now styles himself ruler of the [GetTitleByKey('k_rhudaur').GetName]. A pox upon him and his entire house! \n\nMy brave defenders have suffered setbacks, and I begin to doubt my decision. Is there valor in a hopeless final stand? What of our wives and children, seeking refuge behind the walls of Fennas Drúnin, depending on our fleeting success? \n\nI must either steel myself for what is surely to come or turn to the safety of the realms of Cardolan and Arthedain to the west. But can I bear the shame of fleeing from the most important fight of my life?"
 arnor.7022.a: "Every man able to bear a sword must be armed! We will fight!"
 arnor.7022.b: "I will bear the shame of defeat in order to save the innocents from slaughter."
 arnor.7022.b.tt: "You will flee the Angle with the last Dúnedain."
 last_reserves: "Dúnedain Militia"
 arnor.7022.c: "We shall take to the wilderness, seeking our revenge."
 
 arnor.7003.t: "Where To Go?"
 arnor.7003.desc: "Now that I have made the choice to flee, I must also choose where to seek refuge.\n\n[GetTitleByKey('k_arthedain').GetNameNoTier] is the safer choice, yet to flee so far to the court of [GetTitleByKey('c_fornost').GetNameNoTier] in itself would risk us being seen as utter cowards. \n\n[GetTitleByKey('c_thalion').GetNameNoTier], the capital of the more unstable [GetTitleByKey('k_cardolan').GetNameNoTier], meanwhile sits close to danger, yet it would almost certainly be more welcoming, and King [Tarvegil.GetFirstName] would likely grant us refuge.\n\nIt is my choice now: the safety, yet indignity, of Arthedain, or the frontlines of Cardolan?"
 arnor.7003.a: "I shall seek refuge in Arthedain."
 arnor.7003.b: "I shall seek refuge in Cardolan."
 event_arnor_07003_a: "You will seek refuge in the capital of the [GetTitleByKey('k_arthedain').GetName], [GetTitleByKey('c_fornost').GetNameNoTier]."
 event_arnor_07003_b: "You will seek refuge in the capital of the [GetTitleByKey('k_cardolan').GetName], [GetTitleByKey('c_thalion').GetNameNoTier]."
 
 arnor.7004.t: "The Fortress of Kings"
 arnor.7004.desc: "The gates swing open, and I am escorted down the long, narrow hallway. Before the high throne of the king I bow silently, until I am bidden to rise, and [argeleb.GetFirstName] looks upon me.\n\n"My King, I am [ROOT.Char.GetFirstName], former Lord of Fennas Drúnin. Yet as you know, evil has befallen that land, and the [hillmen|E] have exiled me from my realm. I seek now only safety and refuge, O King, and I shall be a loyal servant of you, and in thy name I shall fight."\n\nThen Argeleb sits for a while in thought, before at last he speaks again:\n\n"Evil times are these indeed, and valiant men we shall need. You have fled, sure, yet now is not the time to dwell on such deeds which were made in haste." Argeleb rises to his feet, turning to me. "Soon we shall march against Rhudaur, and any soldier shall be vital. If refuge you seek, then I grant it! May you be loyal and valiant." \n\nI breathe a sigh of relief upon hearing the King's words."
 arnor.7004.a: "You have my eternal gratitude, my Lord."
 event_arnor_07004_a: "[argeleb.GetName] will grant you refuge in [GetTitleByKey('c_killarbrag').GetNameNoTier]" 
 arnor.7004.b: "I shall take up my sword to serve in the field, your Grace."
 
 arnor.7008.t: "The Court of Tarvegil"
 arnor.7008.desc: "The gates swing open, and I am escorted before the King's throne. I bow and rise up, and [Tarvegil.GetFirstName], the king looks upon me.\n\n"My King, I am [ROOT.Char.GetFirstName], former Lord of Fennas Drúnin. Yet as you know, evil has befallen that land, and the [hillmen|E] have exiled me from my realm. I seek now only safety and refuge, Lord, and my men and I shall be bidden to you."\n\nTarvegil raises from his throne and walks down towards me. \n\n"A fair sight are ye, and your men! Surely these are grave times, and evil rises its head again. Aye, you have fled, yet surely I would do the same! To die in a futile last stand is foolish, and you would do better here than as carrion for the crows." He smiles warmly. "If refuge you seek, refuge you shall be granted. Let us spill Hillman blood as brothers and comrades!" \n\nI breathe a sigh of relief upon hearing the King's words."
 arnor.7008.a: "You have my eternal gratitude, my Lord."
 event_arnor_07008_b: "[Tarvegil.GetName] will grant you refuge in [GetTitleByKey('c_dinach').GetNameNoTier]" 
 arnor.7008.b: "I shall take up my sword to serve in the field, your Grace."
 
 arnor.7011.t: "A New Home"
 arnor.7011.desc: "After arriving at the small outpost granted to me by the king, I can finally breathe a sigh of relief. Here, my family and I are safe... for now. \n\nAnd yet, my thoughts uninvitedly turn towards the East, where surely the barbaric [hwaldar.GetFirstName] still ravages the war-torn lands I once called my birthright with his hordes of brutal [hillmen|E].\n\nI find myself wondering what I am to do in the months and years to come..."
 arnor.7011.a: "I shall train more men to one day reclaim [GetTitleByKey('d_dor_en_egladil').GetNameNoTier]!"
 arnor.7011.b: "I will focus on building up this new home and keep my family safe."
 reclaimers_of_egladil: "Reclaimers of Egladil"
 
 arnor.7024.t: "Into the Wilderness"
 arnor.7024.desc: "With my decision to begin patrolling the wilderness of [eriador|E], my entourage has begun to set up a rudimentary camp.\n\nMost of the Dúnedain that still dwelt in the Angle of Mitheithel have followed me, and I have a few dozen able sword-hands at my disposal.\n\nIn time, we might even become strong enough to topple the barbaric [hillmen|E] who now lay claim to [rhudaur|E]..."
 arnor.7024.a: "We shall fight for Arnor!"
 arnor.7024.tt: "Two useful retainers joined your camp"

 # Scions of Aramir events
 arnor.8001.t: "The Fall of the Aramirach"
 arnor.8001.desc: "These are the final, bitter days of a lost war. We have held out for as long as strength allowed, but it mattered not. [hwaldar.GetFirstName]'s horde struck with terrifying, remorseless speed, leaving no time to organize a defence, let alone don mail or leather before the carnage began.\n\nSuddenly, the world spins. I lie in the mud, slick with the blood of my slaughtered kin, while the screams of the dying fade into a distant, muffled clamour. A sharp, agonising heat radiates from my chest, an enemy arrow protruding from my defenceless torso and leaking my life away.\n\nStrong hands lift me from the ground. Through blinking, blood-streaked eyes, I see [culainn.GetFirstName]. My son's face is a mask of desperate grief. 'Father!' his voice cries out, torn from his very soul as he cradles me close against the oncoming slaughter.\n\nI struggle to breathe, using the absolute last of my fading energy to clutch his arm. I cannot let him die here. My lips move, forcing the faint, final words past a throat slick with blood before the darkness takes me entirely..."
 arnor.8001.a: "“Leave me, [culainn.GetFirstNameNoTooltip]... Flee to [GetTitleByKey('k_arthedain').GetNameNoTier]... Seek the King...”"
 arnor.8001.b: "“The Aramirach do not retreat...”"
 event_arnor_08001_a: "Your kin are slaughtered, your son is all that remains.\nHe must survive."
 event_arnor_08001_b: "The Aramirach have fallen, but their honour is left intact."

 arnor.8002.t: "Echoes of the Slaughter"
 arnor.8002.desc: "The smoke of our burning home rises behind us, a grim shroud for my slaughtered kin. There is no time to mourn, for the assailants will soon be on our heels. Just as despair threatens to take me, a bloodied figure emerges from the brush.\n[midhir.GetFirstName], a fellow [hillman|E] with [Glossary('Iarfer','iarfer_gloss')] roots and my father's oldest friend.\n\nHe does not waste breath on condolences. Thrusting the reins of two stray horses into my hands, his voice is tight with urgency. "Save your tears for the road, boy," he barks, hauling himself into the saddle. "If we linger here, we join them. Move!"\n\nWith the ruins of our lives at our backs, we mount up and ride as swift as the wind toward the safety of the west. I must reach Arthedain, lay our tragic tale before the King, and claim the birthright stolen from us this day."
 arnor.8002.a: "To [GetTitleByKey('c_fornost').GetNameNoTier]! We ride for refuge!"
 event_arnor_08002_a: "You will seek refuge in the capital of the [GetTitleByKey('k_arthedain').GetName], [GetTitleByKey('c_fornost').GetNameNoTier]."
 scions_of_aramir_camp_name: "Scions of Aramir"

 arnor.8003.t: "The Gates of Fornost"
 arnor.8003.desc: "Our frantic flight ends as we reach the capital's threshold. [midhir.GetFirstName] and I draw whispered remarks from the gathered locals as the palace guards guide us through the bustling streets of [GetTitleByKey('c_fornost').GetNameNoTier] toward the Royal Court at [GetBuilding('wonder_fornost_03').GetName].\n\nTo the [arnorians|E], we are a peculiar sight: errant [hillmen|E] carrying the unmistakable vestige of the blood of [westernesse|E] in our features. It was this strange heritage, and our desperate plea to speak with the sovereign, that piqued the King's interest enough to agree to meet us.\n\nThere, in the open air just outside the palace doors, King [argeleb.GetFirstName] looks down upon us from a palace balcony with solemn majesty. Respecting seniority, he addresses my companion Midhir first.\n\n"Step forward, man of the hills," Argeleb commands, his voice carrying clearly across the stone courtyard. "Word has reached us of ruin in the East, but the full truth escapes us.\nSpeak, soldier. What has befallen the Angle, and who is this youth who rides in your shadow?""
 arnor.8003.a: "Midhir looks to me, and I step forward to lay our tragedy before the King..."
 event_arnor_08003_a: "You are received at the Royal Court of King [argeleb.GetFirstName]."

 arnor.8004.t: "A Bold Proposal"
 arnor.8004.desc: "Before King [argeleb.GetFirstName], at the Royal Court, I recount the horror: how the war is lost, how [hwaldar.GetFirstName] has slaughtered the last of the loyalist [hillmen|E], and how my kinsmen died in the mud.\n\nI speak softly but with a hint of a tremor. "I ask for your reprieve, my King, for I have come to offer you service, as my ancestors have done for generations to the [mellondir.GetDynasty.GetName] of the Angle. Ten years ago, the [galadhion.GetHouse.GetName] were fully extinguished by Hwaldar's cruelty. Now, in this latest onslaught, the Angle too has fallen to his tyranny. I remain however, the sole living descendant of [aramir.GetFirstName], bastard son of King [elenthorn.GetFirstNameNicknamed]." [argeleb.GetFirstName]'s gaze pierces me, yet I press on.\n\n"Lend me your aid to avenge our fallen kinsmen and punish Hwaldar the Usurper. Acknowledge the blood which flows in my veins, and I shall wield it to rally all loyal peoples of Rhudaur to your banner. Thus blood shall answer blood, and I shall kneel before you and return the lapsed and lost sons of Rhudaur to your elder line, kinsman."\n\nThe court falls silent as the King reflects on my plea..."
 arnor.8004.a: "“What say you, my King?”"
 event_arnor_08004_a: "You await the response of King [argeleb.GetFirstName].\n\nThrough meritous service, perhaps King [argeleb.GetFirstNameNoTooltip] could be convinced not merely to acknowledge you as a distant bastard line, but as the future ruler of [GetTitleByKey('k_rhudaur').GetNameNoTier]."

 arnor.8005.t: "The King's Decree"
 arnor.8005.desc: "A heavy silence hangs over the Royal Court as King [argeleb.GetFirstName] ponders my words. When he finally looks back down upon me, the stern majesty of his expression hardens into an unyielding resolve.\n\n"The crimes of the lawless [hwaldar.GetFirstName] cry out for vengeance," the King declares, his voice echoing off the stone. "With the rising threat of [angmar|E] and the fall of the [galadhion.GetHouse.GetName], our list of allies grows thin. You have offered your service, young [hillman|E], and [GetTitleByKey('k_arthedain').GetNameNoTier] shall accept it. Though I acknowledge that the blood of [westernesse|E] that stirs within you, the lands of the Angle are not reclaimed by promises alone."\n\nArgeleb leans forward, his eyes locking onto mine with ancient authority. "Go to [GetTitleByKey('c_auchleathan').GetNameNoTier] and gather what remains of your people. Build your strength, and prepare. Bring [GetTitleByKey('k_rhudaur').GetNameNoTier] back into the fold, and you shall find that such loyalty does not go unrewarded. Fail, and you shall remain but another wanderer of no repute.""
 arnor.8005.a: "“You have my eternal gratitude, my Lord.”"
 event_arnor_08005_a: "[argeleb.GetName] will grant you refuge in [GetTitleByKey('c_auchleathan').GetNameNoTier]" 
 arnor.8005.b: "“I shall take up my axe to serve you in the field, Your Grace.”"

 arnor.8009.t: "A New Home in Arthedain"
 arnor.8009.desc: "Having arrived at the small outpost granted to us by King [argeleb.GetFirstName], [midhir.GetFirstName] and I can finally breathe a brief sigh of relief. Here, at the border of [GetTitleByKey('k_arthedain').GetNameNoTier], the last survivors of our people are safe... for now.\n\nYet, my thoughts inevitably drift eastward. There, the lawless heathen [hwaldar.GetFirstName] rules over the ruins of my birthright with those tribes loyal to thim. The King has given us his countenance, but the restoration of our house remains shackled to a heavy price: the total conquest of [GetTitleByKey('k_rhudaur').GetNameNoTier].\n\nLooking out over the rugged walls of this refuge, I find myself pondering how we shall navigate the time ahead..."
 arnor.8009.a: "We must train our men. I will avenge my kin and reclaim [GetTitleByKey('k_rhudaur').GetNameNoTier]!"
 arnor.8009.b: "We must first fortify this haven and ensure our survival."
 avengers_of_the_aramirach: "Avengers of the Aramirach"

 arnor.8010.t: "Roaming the Lands of Eriador"
 arnor.8010.desc: "With my decision to begin patrolling the lands surrounding [GetTitleByKey('c_fornost').GetNameNoTier], my small warband has set up a rudimentary camp.\n\nAny loyalist Hillmen who managed to escape the slaughter in the Angle have rallied to my banner. Though we are few, carrying the mixed blood of the West and the hills, I have a few dozen able sword-hands with a united purpose.\n\nIn time, as we master these new surroundings, we might yet gather the strength needed to topple [hwaldar.GetFirstName] and the tribes loyal to him who now lay claim to my stolen birthright..."
 arnor.8010.a: "I will avenge my kin and reclaim [GetTitleByKey('k_rhudaur').GetNameNoTier]!"
 arnor.8010.tt: "Two useful retainers joined your camp"
 
 arnor.9100.t: "The Rebuilding of Tharbad"
 arnor.9100.desc: "Long has the city of Tharbad served as an important waypoint between the northern realm of [arnor|E] and its sister, the southern realm of [gondor|E]. But the [angmar_wars|E] and the Great Plague have left the city depopulated, and vicious floods in the past decades have finally turned the proud trading hub into a lifeless ruin. \n\nNow, the rightful lords of Tharbad have returned, with the promise to restore the city and its iconic bridge to their splendor of old, so trade may once again flow between the kingdoms of Gondor and Arnor."
 arnor.9100.a: "A magnanimous achievement!"

 arnor.1001.t: "Fortifying the Weather Hills" 
 arnor.1001.desc: "Streching from north to south, the rugged Weather Hills form a natural protective boundary for our realm, and if properly fortified, could pose a major challenge for any would-be invaders. That is why I summon forth my architects and generals, informing them of my plan.\n\nYet as is soon made clear, that task is easier said than done, for properly fortifying the Hills would require a great investment in terms of manpower and money. Many designs are brought before me, from simple systems of wooden watchtowers and trenches to sprawling forts connected with high stone walls. It is up to me, ultimately, to decide what to choose." # PLACEHOLDER
 arnor.1001.a: "Security is priceless!" 
 arnor.1001.b: "We cannot afford to be too miserly." 
 arnor.1001.c: "Let's not be extragavant." 
 
 ###Struggle Flavor Events###
 
 arnor.2001.t: "Orc Raids!"
 arnor.2001.desc: "Coming out of the [mistymountains|e], orcs have long been a plague on [eriador|e] since the [elderdays|e] and their raiders have once again struck at our realm. this time raiding [disaster_county.GetNameNoTier]. Its now up to us to decide on how to respond."
 arnor.2001.a: "Rally the Troops!"
 arnor.2001.b: "[marshal.GetName], I trust this task to you."
 biulding_destroyed: "A random [building|e] will be downgraded or destoryed"
 
 arnor.2002.t: "Bandit Raids!"
 arnor.2002.desc: "[eriador|E] is a dangerous place, since the fragmentation of [arnor|E] there has been a lack of cooperation between local lords and the sucessor states, allowing cross border bandit raids being a fact of life, this time raiders have be spotted moving towards [disaster_county.GetNameNoTier]. Now it is time to decide how to respond."
 arnor.2002.a: "Rally the Troops!"
 arnor.2002.b: "[marshal.GetName], I trust this task to you."
 arnor.2002.c: "If its money they want, give it to them."
 
 arnor.2003.t: "The Young Shephard"
 arnor.2003.desc: "As we are surveying the ashes of the village following the raid. a young boy approaches. He was a shephard tending to his flock in the area around the village. As I watched he approched a burned house and burst into tears as he saw the bodies of the young couple and two kids my soilders still haven't buried. Its obvioius what happened, what isn't obvious is how I should respond"
 arnor.2003.a: "He'll stay at court, no child deserves to be an orphan"
 arnor.2003.b: "Send him to the royal estates, they can make good use of him there"
 
 arnor.2004.t: "Peasants Abandon Frontier"
 arnor.2004.desc: "[eriador|e] has been a land in decline since the fragmentation of [arnor|E]. every year more of our sons and daughters die in the [angmar_wars|E] and every year more and more of our lands lie abandoned. as the wilderness encroaches the people on our frontiers retreat back to safer ground in the interior, this year the people of [county1.GetNameNoTier] have decided to move to [county2.GetNameNoTier]. we can either let them move or we can force them to stay in the area."
 arnor.2004.a: "Let them relocate"
 arnor.2004.b: "Make them stay"
 biulding_destroyed_county_1: "A random [building|e] will be downgraded or destoryed in the [county1.GetName]"
 biulding_add_county_2: "A random [building|e] will be created or upgraded in the [biuld_prov.GetName]"