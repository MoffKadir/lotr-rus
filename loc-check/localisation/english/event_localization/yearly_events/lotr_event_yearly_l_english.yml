l_english:

 # The Longing - Child wants to Sail
 lotr_yearly.0001.t: "The Longing"
 lotr_yearly.0001.desc.intro: "In recent weeks, my [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('sailor_child'))] [sailor_child.GetFirstName] has been expressing great interest in the sea, spending many hours watching the ships docking and the sailors embarking at port, and playing along the shore whenever possible. Today, [sailor_child.GetSheHe] has cornered me, excitedly pressing me about learning to sail.\n\n"
 lotr_yearly.0001.desc.parent: ""[sailor_child.Custom2('RelationToMeShort', ROOT.Char)|U], "
 lotr_yearly.0001.desc.guardian: ""[ROOT.Char.Custom('MistressMaster')|U] [ROOT.Char.GetFirstNameNoTooltip], "
 lotr_yearly.0001.desc.nosailor: "can I become a sailor?"
 lotr_yearly.0001.desc.model_sailor_you: "can I become a sailor like you?"
 lotr_yearly.0001.desc.model_sailor_family: "can I become a sailor like [model_sailor.GetFirstName]?"
 lotr_yearly.0001.desc.model_sailor: "can I become a sailor like [sailor_child.Char.Custom2('RelationToMeShort', SCOPE.sC('model_sailor'))] [model_sailor.GetFirstName]?"
 lotr_yearly.0001.desc.outro: " Please let me, I want to steer a mighty [ROOT.Char.Custom('RegionalShipType')]!""
 lotr_yearly.0001.a.me: "I will teach you the ropes"
 lotr_yearly.0001.a.sailor: "[model_sailor.GetFirstName] will teach you the ropes"
 lotr_yearly.0001.a.nosailor: "I will find someone to teach you the ropes"
 lotr_yearly.0001.d: "Out of the question!"
 taught_sailing_success: "[sailor_child.GetFirstName] learns the Basics"
 taught_sailing_failure: "[sailor_child.GetFirstName] gives up quickly"
 
 # The Little Loremaster
 lotr_yearly.0002.t: "The Little Loremaster"
 lotr_yearly.0002.desc.intro: "In recent times, [curious_child.GetFirstName] has been poking holes into my belly about [middleearth|E]'s lore and history. [curious_child.GetSheHe|U] has become obsessed with learning about every last historical tidbit, down to studying the appendices. Every five minutes there are more questions:"
 lotr_yearly.0002.desc.outro: "\n\nIt has gotten to the point that even my [ROOT.Char.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName] [loremaster.GetFirstName] is getting visibly annoyed. Now [curious_child.GetSheHe] won't even let us eat in peace anymore!"
 lotr_yearly.0002.a: "#EMP Sigh.#! Well you see..."
 lotr_yearly.0002.b: "Go ask [loremaster.GetFirstName]."
 lotr_yearly.0002.c: "Enough! Figure it out on your own!"
 lotr_yearly.0002.c.rage: "[ROOT.Char.Custom('CulturalCurse')|U]! I don't #bold care!#!"
 lotr_yearly.0002.tt: "This will further [curious_child.GetFirstNamePossessiveNoTooltip] [learning|E] [education_focus|E]"
 lotr_yearly.0002.tt_matching: "This will greatly further [curious_child.GetFirstNamePossessiveNoTooltip] [learning|E] [education_focus|E]"
 
