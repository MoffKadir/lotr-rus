 ###############################
 travel_danger_events.6020.immortaltoast: "You return to Middle-earth, heavily weakened" #juke note: deliberately vague
 travel_danger_events.6020.b: "NOT AGAIN!"
 
 #################################
 ### LOTR TRAVEL DANGER EVENTS  ##
 #################################
 
 ### Giant Scorpion Attack ###
 lotr_travel_danger_events.0001.t: "$travel_danger_prefix$ Giant Scorpion Attack"
 lotr_travel_danger_events.0001.desc: "Dawn is setting as we make our way through the seemingly endless Dune Sea. Suddenly, I notice the sands beginning to shift a short distance to my left. A smooth, black shell appears, then three pairs of burning red eyes. Two giant pincers and a deadly stinger, large enough to impale a man, arise from the dunes.\n\nJust as I and my companions spring back, a giant scorpion emerges from its hiding spot, raising its claws and chittering angrily. My companions are terrified, why did we choose this path!?"
 lotr_travel_danger_events.0001.desc.again: "The sun is still high in the sky as we continue to make our way through the seemingly endless Dune Sea. Suddenly, I notice the sands beginning to shift a short distance to my right, with some now oh-so familiar chittering sounds.\n\nThis time, three giant scorpions burst from the sands, giant pincers clacking and with deadly stingers large enough to impale a man. These things must really hold a grudge!"
 lotr_travel_danger_events.0001.desc.victim: "\n\n#EMP "WATCH OUT!"#!, [beast_victim.GetFirstName] yells, raising [beast_victim.GetHerHis] spear towards the monstrous foe."
 lotr_travel_danger_events.0001.d: "Nobody move! They can sense the shifting sands."
 lotr_travel_danger_events.0001.d.tt: "You use your peoples' ancient knowledge of the Dune Sea to evade the giant scorpion."
 lotr_travel_danger_events.0001.sneak: "Your caravan manages to evade the giant scorpion"
 lotr_travel_danger_events.0001.a: "Try to encircle it! We won't go down today!"
 lotr_travel_danger_events.0001.b: "[beast_victim.GetFirstName], distract it!"
 lotr_travel_danger_events.0001.c: "RUN! RUN FOR YOUR LIVES!"
 lotr_travel_danger_events.0001.ran: "You successfully escape the giant scorpion"
 lotr_travel_danger_events.0001.success: "The threat is repelled by [ROOT.Char.GetShortUINamePossessiveNoTooltipNoFormat] blade"
 lotr_travel_danger_events.0001.wound: "A giant scorpion injures [ROOT.Char.GetShortUINameNoTooltipNoFormat]"
 lotr_travel_danger_events.0001.failure: "A giant scorpion crushes [ROOT.Char.GetShortUINameNoTooltipNoFormat]"
 
 ### Sandstorm! ###
 lotr_travel_danger_events.0002.t:1 "$travel_danger_prefix$ Sandstorm!"
 lotr_travel_danger_events.0002.desc: "As we make our way through the endless ocean of sand, dubbed the "Mirror of Fire" by the locals, we see something strange on the horizon: A great wall seems to stretch across the entire horizon in front of us. No, not a wall... a storm!\n\nPanic breaks out among my people, as we begin to hastily set camp - The Dune Sea is feared for its deathly dust storms known as the 'Breath of Sanbaiz'. I fear I shall not live to see another day if I try to survive on luck alone."
 lotr_travel_danger_events.0002.a: "Our guide is organizing our camp! I will be fine."
 lotr_travel_danger_events.0002.b: "I am the [ROOT.Char.GetNameRegnal]! I shall organize the camp myself!"
 lotr_travel_danger_events.0002.c: "I must save myself! Out of the way!"
 sandstorm_survived: "You survive the sandstorm"
 sandstorm_someone_dies: "Someone is killed by the sandstorm"
 sandstorm_many_die: "Many entourage members are killed by the sandstorm"
 sandstorm_you_die: "You are killed by the sandstorm."
 
 ### Mount Doom's Breath
 lotr_travel_danger_events.0003.t: "$travel_danger_prefix$ Mount Doom's Breath"
 lotr_travel_danger_events.0003.desc: "It's the air! The damnable air of [mordor|E]. The thundering breath of Mount Doom sweeps across the [GetTerrain( 'volcanic_plains' ).GetName] relentlessly. It burns my throat from the inside, it makes my eyes weep, it dries my lips and it deafens my ears. Sometimes it feels like the very land itself hates me."
 lotr_travel_danger_events.0003.a: "We need to press on!"
 lotr_travel_danger_events.0003.a.orc: "Keep moving you dregs!"
 scorched_throat_modifier: "Scorched Throat"
 scorched_throat_modifier_desc: "This character's throat has been damaged by the fell winds of [mordor|E]. They have trouble drawing breath."
 
 ### Troll Attack! ###
 lotr_travel_danger_events.0004.t.intro: "$travel_danger_prefix$ A Hungry "
 lotr_travel_danger_events.0004.t.black_troll: "Olog"
 lotr_travel_danger_events.0004.t.cave_troll: "Cave Troll"
 lotr_travel_danger_events.0004.t.sand_troll: "Sand Troll"
 lotr_travel_danger_events.0004.t.snow_troll: "Snow Troll"
 lotr_travel_danger_events.0004.t.mountain_troll: "Mountain Troll"
 lotr_travel_danger_events.0004.t.hill_troll: "Hill Troll"
 lotr_travel_danger_events.0004.desc.black_troll: "As my entourage travels through the desolate lands of [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], a broad, dark figure suddenly jumps out from an ambush - a massive [troll.GetCulture.GetName]! It spits out a curse in its' terrible, guttural tongue, Black Speech, and then addresses us properly:\n\n"Umbri ânai zadyash! You dare tresspass by my post? You WILL pay tribute, azh Bûrz-Durbagu. Olog makha marna mat!"\n\nIt is clear that it is hungry, and intends to fill its belly one way or another. My entourage is clearly terrified of the huge beast and look to me for guidance."
 lotr_travel_danger_events.0004.desc.cave_troll: "As my entourage travels through the depths of [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], what we had thought to be an ordinary boulder along the rocky wall suddenly stands up to block our passage - a massive [troll.GetCulture.GetName]! It addresses us with a series of grunts, barely resembling a language:\n\n"Whats this? Sum tasty little treats? I'm [troll.GetFirstName], an' this 's my tunnel! Ya' lot 's lookin' awsfully tasty..."\n\nIt is clear that it is hungry, and intends to fill its belly one way or another. My entourage is clearly terrified of the huge beast and look to me for guidance."
 lotr_travel_danger_events.0004.desc.sand_troll: "As my entourage travels through [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], something huge suddenly emerges from a nearby sand pit - a massive [troll.GetCulture.GetName]! It addresses us with a series of grunts, barely resembling a language:\n\n"You... roam thru' my dunes. Mine! You must pay me, in tribute, ay?"\n\nIt is clear that it is hungry, and intends to fill its belly one way or another. My entourage is clearly terrified of the huge beast and look to me for guidance."
 lotr_travel_danger_events.0004.desc.snow_troll: "As my entourage travels through the snowy wastes of [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], a huge, pale figure suddenly emerges from a large nearby snow pile to block our passage - a massive [troll.GetCulture.GetName]! It addresses us with a series of sighs and gestures:\n\nFirst, it raises its arms, showing us the frozen landscape around it. Then, it raises its thumb to its forehead, before pointing at us and then at its belly. This is its territory, we tresspass here and must pay it tribute.\n\nIt is clear that it is hungry, and intends to fill its belly one way or another. My entourage is clearly terrified of the huge beast and look to me for guidance."
 lotr_travel_danger_events.0004.desc.mountain_troll: "As my entourage travels through the depths of [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], what we had had taken for an ordinary rocky outcrop suddenly rises up to block our passage - a massive [troll.GetCulture.GetName]! It addresses us with a series of grunts, barely resembling a language:\n\n"Whats this? Sum tasty little treats? I'm [troll.GetFirstName], an' this 'ere pass belongs to me! Ya' lot 's lookin' awsfully tasty..."\n\nIt is clear that it is hungry, and intends to fill its belly one way or another. My entourage is clearly terrified of the huge beast and look to me for guidance."
 lotr_travel_danger_events.0004.desc.hill_troll: "As my entourage travels through [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], what we had thought to be an ordinary boulder suddenly stands up to block our passage - a massive [troll.GetCulture.GetName]! It addresses us with a series of grunts, barely resembling a language:\n\n"Whats this? Sum tasty little treats? I'm [troll.GetFirstName], an' this 's my road. Ya' lot 's lookin' awsfully tasty..."\n\nIt is clear that it is hungry, and intends to fill its belly one way or another. My entourage is clearly terrified of the huge beast and look to me for guidance."
 lotr_travel_danger_events.0004.desc.outro: "[troll_fodder.GetFirstName] is standing especially close..."
 lotr_travel_danger_events.0004.success: "You slay the Troll"
 lotr_travel_danger_events.0004.wound: "The Troll plunders the caravan"
 lotr_travel_danger_events.0004.failure: "The Troll devours you"
 lotr_travel_danger_events.0004.a: "I will slay you myself!"
 lotr_travel_danger_events.0004.a.tt: "Killing something this large can't be that hard, right?"
 lotr_travel_danger_events.0004.b: "Guards! To Arms!"
 lotr_travel_danger_events.0004.b.success.tt: "Your guards drive it off"
 lotr_travel_danger_events.0004.b.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.b.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.c: "Stand down! Let it go through our supplies."
 lotr_travel_danger_events.0004.d: "One of our horses should do."
 lotr_travel_danger_events.0004.e: "Distract it with a riddle."
 lotr_travel_danger_events.0004.e.success.tt: "The Troll is distracted"
 lotr_travel_danger_events.0004.e.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.e.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.riddle1: "...A hill? No... A cabbage!"
 lotr_travel_danger_events.0004.riddle2: "Some sort of... egg?"
 lotr_travel_danger_events.0004.riddle3: "A tree! No, that doesn't move..."
 lotr_travel_danger_events.0004.riddle4: "...Some sorta rock, perhaps?"
 # lotr_travel_danger_events.0004.riddle1: "...Thirty white horses?"
 # lotr_travel_danger_events.0004.riddle2: "...So empty it cant be filled?"
 # lotr_travel_danger_events.0004.riddle3: "...A box without hinges?"
 # lotr_travel_danger_events.0004.riddle4: "...Gnaws iron, bites steel?"
 lotr_travel_danger_events.0004.f: "[troll_fodder.GetFirstName] can spare a limb or two."
 lotr_travel_danger_events.0004.g: "You should join my warband!"
 lotr_travel_danger_events.0004.g.success.tt: "The Troll is persuaded"
 lotr_travel_danger_events.0004.g.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.g.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.h: "Run, you fools!"
 lotr_travel_danger_events.0004.h.success.tt: "You escape the Troll unscathed"
 lotr_travel_danger_events.0004.h.failure.tt: "$lotr_travel_danger_events.0004.wound$"
 lotr_travel_danger_events.0004.h.critical_failure.tt: "$lotr_travel_danger_events.0004.failure$"
 lotr_travel_danger_events.0004.h.continue.tt: "Your journey continues"
 lotr_travel_danger_events.0004.j: "$lotr_travel_danger_events.0004.e$"
 
 ### Flies and Spiders ###
 lotr_travel_danger_events.0005.t: "$travel_danger_prefix$ Flies and Spiders"
 lotr_travel_danger_events.0005.desc: "Since we have elected to pass beneath the mighty boughs of [mirkwood|E], we must now travel through the [ROOT.Char.GetCurrentLocation.GetTerrain.GetNameNoTooltip] of [ROOT.Char.GetCurrentLocation.GetNameNoTooltip]. It is a mostly unpleasant journey, since the thick canopy above us seems to block most of the lights, be it sun or moon. \n\nMy companions are uneasy and many keep their weapons close. "There are eyes in the dark," my caravan leader [caravan_leader.GetFirstName] tells me in hushed whispers, turning [caravan_leader.GetHerHis] head from one side of the road to the other.\n\nAs if to confirm [caravan_leader.GetHerHis] words, the underbrush to our right parts for a second, revealing an alarmingly large spider..."
 lotr_travel_danger_events.0005.a: "This creature might make a unseful ally if we capture it."
 lotr_travel_danger_events.0005.b: "It would be best try and move unseen for the remainder of our trip."
 lotr_travel_danger_events.0005.c: "Foes are upon us! Arm yourselves!"
 lotr_travel_danger_events.0005.d: "Stay on the path! Stay on the path at all cost!"
 lotr_travel_danger_events.0005.e: "We'll... wait here until it is gone..."
 lotr_travel_danger_events.0005.f: "Hack down the forest to clear a new path around it!"

 ### Shuddering Earth ###
 lotr_travel_danger_events.0006.t: "$travel_danger_prefix$ The Shuddering Earth"
 lotr_travel_danger_events.0006.desc: "The ashen plains of [mordor|E] stretch as far as the eye can see, its pits spitting noxious fumes that obscure the dreary, dark horizon. Yet as we travel through [ROOT.Char.GetCurrentLocation.GetNameNoTooltip], the monotony is suddenly broken.\n\nThe black earth shudders, jolting alive and throwing us all back. We can barely get to our feet as the ground rumbles violently, and around us new pits and chasms are formed rapidly, joining the already-existing ones that now spew forth even more vile and putrid substances high into the air. We have precious little time to act."
 lotr_travel_danger_events.0006.a: "All of you, get down and brace!"
 lotr_travel_danger_events.0006.b: "We must seek higher, more stable ground!"
 lotr_travel_danger_events.0006.b.success: "You manage to find sturdy ground"
 lotr_travel_danger_events.0006.b.success.tt: "You escape the earthquake's onslaught"
 lotr_travel_danger_events.0006.b.failure: "You do not manage to get to sturdy ground"
 lotr_travel_danger_events.0006.b.failure.tt: "You do not escape the earthquake's onslaught"
 lotr_travel_danger_events.0006.c: "Oh mighty [darklord|E], I kneel before thee!"
 lotr_travel_danger_events.0006.c.tt: "You shamefully cast some of your belongings into the pits as a sacrifice to [sauroncharacter|E], hoping for respite."
 lotr_travel_danger_events.0006.d: "O [ROOT.Char.GetFaith.HighGodName], accept my prostration and sacrifice!"
 lotr_travel_danger_events.0006.d.tt: "You pray and cast some of your belongings into the pits as a sacrifice, hoping for a respite."

 ### Black Flags ###
 lotr_travel_danger_events.0007.t: "$travel_danger_prefix$ Black Flags"
 lotr_travel_danger_events.0007.desc: "As I travel with my entourage alongside the coast, the keenest of my crew suddenly spots a grim ship sailing towards us, black flags raised. As they get closer, it becomes clear that this is a band of Corsairs! The pirates of the Belegaer have set upon us at last - but as I ready the forces I have with me, the captain of this dread galleon shouts across the bow.\n\n"Well met, penny-packing worms! Give up yer loot and jools and [corsair_leader.GetName] and [corsair_leader.GetHerHis] lads will let you keep your heads!" [corsair_leader.GetHerHis|U] crew laughs raucously, and begin to draw their steel.\n\nI consider my options. Shall I leap across the gap and fight [corsair_leader.GetNameNoTooltip] to the death? Can we outmaneuver [corsair_leader.GetHerHim]? Maybe I could even convince [corsair_leader.GetHerHim] to join me..."
 lotr_travel_danger_events.0007.a: "Have at thee, [corsair_leader.Custom2('InsultNoun', ROOT.Char)]!"
 lotr_travel_danger_events.0007.a.tt.duel_begins: "You will immediately duel [corsair_leader.GetNameNoTooltip] to the death"
 lotr_travel_danger_events.0007.b: "Ready at arms, you bilge rats! Take [corsair_leader.GetHerHim] captive!"
 lotr_travel_danger_events.0007.b.tt.crit_success.tt: "Masterful Victory"
 lotr_travel_danger_events.0007.b.tt.crit_success: "You imprison [corsair_leader.GetNameNoTooltip] and take some loot"
 lotr_travel_danger_events.0007.b.tt.success.tt: "Victory"
 lotr_travel_danger_events.0007.b.tt.success: "[corsair_leader.GetNameNoTooltip|U] is sent to [ROOT.Char.GetFaith.WaterGodName]"
 lotr_travel_danger_events.0007.b.tt.failure.tt: "Defeat"
 lotr_travel_danger_events.0007.b.tt.failure: "[corsair_leader.GetNameNoTooltip|U] makes off with your gold"
 lotr_travel_danger_events.0007.c: "I need a steady sea-hand."
 lotr_travel_danger_events.0007.c.tt.success.tt: "Victory"
 lotr_travel_danger_events.0007.c.tt.success: "[corsair_leader.GetNameNoTooltip|U] joins your merry crew"
 lotr_travel_danger_events.0007.c.tt.failure.tt: "Defeat"
 lotr_travel_danger_events.0007.c.tt.failure: "[corsair_leader.GetNameNoTooltip|U] spits on you, and takes your gold"
 
 ### Raiders of the Ship-lords ###
 lotr_travel_danger_events.0008.t: "$travel_danger_prefix$ Raiders of the Ship-Lords"
 lotr_travel_danger_events.0008.desc.pref: "We are passing through the lands of [location.GetName], humid and sweating darts on our travels. Suddenly, shadows fall across our path. It is a pack of [anbaluk_leader.GetCulture.GetNameNoTooltip] slavers!"
 lotr_travel_danger_events.0008.desc.adunaic: "\n\nI recognize these slavers, and they recognize me, and in the eyes of their captain fear begins to shine as [anbaluk_leader.GetSheHe] orders them to lower their weapons. This is [anbaluk_leader.GetName], a warrior of high renown amongst the [adunai|E] - and yet, [anbaluk_leader.GetHerHis] blood is mingled and [anbaluk_leader.GetHerHis] station is just that of a [Glossary('nardû','nardu_gloss')] - much lower than mine."
 lotr_travel_danger_events.0008.desc.tulbel: "\n\nWith a shock, it comes to me that I recognize these slavers, and they recognize me in turn. Their leader, the vile and infamous [anbaluk_leader.GetName], snarls and grins a cat's grin, and [anbaluk_leader.GetHerHis] soldiers lower their weapons. "I would have lesser men such as you in shackles already, [ROOT.Char.GetTitledFirstName] - but today I will settle for coin! Ha! Ha!""
 lotr_travel_danger_events.0008.desc.normal: "\n\nOne of the warriors whispers to their leader, and with a wicked grin he lowers his weapon. "You may know me as [anbaluk_leader.GetName], friend - but today you may also call me magnanimous! I would have taken your lives or freedom, but today I will settle for coin!""
 lotr_travel_danger_events.0008.desc.end: "\n\nMy soldiers look to me for guidance, and I consider my options. Shall I leap forwards and fight [anbaluk_leader.GetNameNoTooltip] to the death? Can we take [anbaluk_leader.GetHerHim] and [anbaluk_leader.GetHerHis] forces? Should we pay up? There are many possibilities..."
 lotr_travel_danger_events.0008.a: "Fall, you [anbaluk_leader.Custom2('InsultNoun', ROOT.Char)]!"
 lotr_travel_danger_events.0008.a.tt.duel_begins: "You will immediately duel [anbaluk_leader.GetNameNoTooltip] to the death"
 lotr_travel_danger_events.0008.b: "Soldiers! Cut [anbaluk_leader.GetHerHim] down!"
 lotr_travel_danger_events.0008.b.tt.crit_success.tt: "Masterful Victory"
 lotr_travel_danger_events.0008.b.tt.crit_success: "You imprison [anbaluk_leader.GetNameNoTooltip] and [anbaluk_leader.GetHerHis] captains and take some loot"
 lotr_travel_danger_events.0008.b.tt.success.tt: "Victory"
 lotr_travel_danger_events.0008.b.tt.success: "[anbaluk_leader.GetNameNoTooltip|U] and [anbaluk_leader.GetHerHis] captains are no more"
 lotr_travel_danger_events.0008.b.tt.failure.tt: "Defeat"
 lotr_travel_danger_events.0008.b.tt.failure: "[anbaluk_leader.GetNameNoTooltip|U] makes off with your gold"
 lotr_travel_danger_events.0008.c: "We need not fight, [Glossary('nardû','nardu_gloss')] - I need your sword!"
 lotr_travel_danger_events.0008.c.tt.crit_success.tt: "Masterful Victory"
 lotr_travel_danger_events.0008.c.tt.crit_success: "[anbaluk_leader.GetNameNoTooltip|U] and [anbaluk_leader.GetHerHis] captains enter your service"
 lotr_travel_danger_events.0008.c.tt.success.tt: "Victory"
 lotr_travel_danger_events.0008.c.tt.success: "One of [anbaluk_leader.GetNameNoTooltip|U]'s captains enters your service"
 lotr_travel_danger_events.0008.c.tt.failure.tt: "Defeat"
 lotr_travel_danger_events.0008.c.tt.failure: "[anbaluk_leader.GetNameNoTooltip|U] leaves, unimpressed"
 lotr_travel_danger_events.0008.d: "Take this and leave us be, vagabond!"
 
 ### Random Orc Encounter ###
 lotr_travel_danger_events.0200.t: "$travel_danger_prefix$ Orcish Waylayers"
 lotr_travel_danger_events.0200.desc: "As my travelling company makes its way through the [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName], we find the road blocked by a threatening band of [orcs|E]. Their leader steps forward, while his followers draw their weapons.\n\n"What've we got 'ere? Travellers who've forgotten who owns this road?" he snarls. "Well, let me remind you! I'm [nemesis_orc.GetName], and this 'ere road belongs to me 'n me boys! And there's a toll to be paid for those who want to pass..."\n\nMy entourage members look at me, expecting a decision of how to deal with this situation..."
 lotr_travel_danger_events.0200.a: "I guess we'll pay the toll..."
 lotr_travel_danger_events.0200.b: "To arms!"
 lotr_travel_danger_events.0200.b.success: "You slay the Orc leader"
 lotr_travel_danger_events.0200.b.failure: "You are beaten and robbed"
 lotr_travel_danger_events.0200.c: "Retreat! Flee while you can!"
 lotr_travel_danger_events.0200.d: "You #italic dare#! threaten #italic me#!?"
 lotr_travel_danger_events.0200.d.tt: "You scare off the Orcs"
 lotr_travel_danger_events.0200.e: "I could use someone like you..."
 lotr_travel_danger_events.0200.f: "[traveling_bodyguard.GetFirstName], slay him!"
 
 # Nemesis Orc - Ran away or paid him
 lotr_travel_danger_events.0201.t: "$travel_danger_prefix$ A Familiar Face"
 lotr_travel_danger_events.0201.desc: "I look out at the road leading through [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName] when I realize that the passage up ahead has been blocked. It is a large group of [orcs|E] that have erected a crude blockade of the road, and as I notice their leader, a cold realization overcomes me. I've met him before...\n\n"What's this now?" he bellows. "Well , well, well... look who it is! It's the cowardly [ROOT.Char.GetCulture.GetNameNoTooltip] swine! We meet again... and the toll still need paying."
 lotr_travel_danger_events.0201.desc.craven: "I look out at the road leading through [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName] when I realize that the passage up ahead has been blocked. It is a large group of [orcs|E] that have erected a crude blockade of the road, and as I notice their leader, a cold shiver runs down my spine. It cannot be... not him again!\n\nThe Orc brute laughs deviously. "It must be fate that brings us together yet again, [ROOT.Char.GetCulture.GetNameNoTooltip] filth! Well, you know what happens next... the toll doesn't pay itself!""
 lotr_travel_danger_events.0201.a: "I guess we'll pay the toll..."
 lotr_travel_danger_events.0201.b: "To arms!"
 lotr_travel_danger_events.0201.b.success: "You slay the Orc leader"
 lotr_travel_danger_events.0201.b.failure: "You are beaten and robbed"
 lotr_travel_danger_events.0201.c: "Retreat! Flee while you can!"
 lotr_travel_danger_events.0201.d: "You #italic dare#! threaten #italic me#!?"
 lotr_travel_danger_events.0201.d.tt: "You scare off the Orcs"
 lotr_travel_danger_events.0201.e: "I could use someone like you..."
 
 # Nemesis Orc - Cheated Death
 lotr_travel_danger_events.0202.t: "$travel_danger_prefix$ Revenge From Beyond the Grave"
 lotr_travel_danger_events.0202.desc: "The road that leads through the [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName] keeps winding on and on, but suddenly, our caravan comes to a halt. As I investigate the cause of this, I find the road blocked by a threatening band of [orcs|E] who've tossed a large tree right across the road. As I notice the Orcs' leader, I can hardly believe my eyes. Didn't I ... slay him?\n\n"YOU!" he screams. "You should've made sure I was dead... But it takes more than some lousy bladework to get rid of me! Here I am , and the toll still needs to be paid..."
 lotr_travel_danger_events.0202.desc.killed_again: "The road that leads through the [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName] keeps winding on and on, but suddenly, our caravan comes to a halt. As I investigate the cause of this, I find the road blocked by a threatening band of [orcs|E] who've tossed a large tree right across the road. As I notice the Orcs' leader, disbelief overcomes me. It cannot be. It cannot be him again...\n\n"YOU LEFT ME FOR DEAD, you stinking [ROOT.Char.GetCulture.GetNameNoTooltip] swine!" he roars. "But that was not my end, NO! I'm back from the grave, back to collect what is MINE!"\n\nMy entourage members look at me, expecting a decision of how to deal with this situation..."
 lotr_travel_danger_events.0202.desc.immortal: "I'm riding at the front of the caravan as it passes through the [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName] when I suddenly feel a chill in the air. Up ahead, a lone figure blocks my path. Getting closer, I realize that it is an [orc|E], his face a ruin held together by screws and nails. I freeze. It... it couldn't be... How many times do I have to slay him?\n\n"Thought I'd be done for this time, this time for good, eh?" I see him smile through broken teeth. I do not know how he endured, but there's an unholy fire in his eyes. "I will NEVER stop coming back. I'm [nemesis_orc.GetName]! I AM ETERNAL!""
 lotr_travel_danger_events.0202.a: "I guess we'll pay the toll..."
 lotr_travel_danger_events.0202.b: "To arms!"
 lotr_travel_danger_events.0202.b.success: "You slay the Orc leader"
 lotr_travel_danger_events.0202.b.failure: "You are beaten and robbed"
 lotr_travel_danger_events.0202.c: "Retreat! Flee while you can!"
 lotr_travel_danger_events.0202.d: "You #italic dare#! threaten #italic me#!?"
 lotr_travel_danger_events.0202.d.tt: "You scare off the Orcs"
 lotr_travel_danger_events.0202.e: "I could use someone like you..."
 
 #Nemesis Orc - Intimidated
 lotr_travel_danger_events.0203.t: "$travel_danger_prefix$ A Familiar Face"
 lotr_travel_danger_events.0203.desc: "I look out at the road leading through [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName] when I realize that the passage up ahead has been blocked. It is a large group of [orcs|E] that have erected a crude blockade of the road, and as I notice their leader, I'm surprised to recognize him. I've driven him and his band off in our previous encounter...\n\nI see recognition in his eyes along with fear, but also determination. He grabs his spear and screams: "Not this time! No! You'll play the toll, like everyone else!"
 lotr_travel_danger_events.0203.desc.lunatic: "I look out at the road leading through [ROOT.Char.GetCurrentLocation.Custom('GetTerrainTypePlural')] of [ROOT.Char.GetCurrentLocation.GetName] when I realize that the passage up ahead has been blocked. It is a large group of [orcs|E] that have erected a crude blockade of the road, and as I notice their leader, I shake my head in disbelief. How many times do I have to teach this Orc this same lesson over and over again?\n\nHe recoils at my sight and screams: "It's [ROOT.Char.GetCulture.GetNameNoTooltip] swine! Garn! Th-this time will be different, you hear me? No more tricks! You'll pay, you'll pay the toll this time!""
 lotr_travel_danger_events.0203.a: "I guess we'll pay the toll..."
 lotr_travel_danger_events.0203.b: "To arms!"
