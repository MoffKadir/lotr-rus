l_english:

 ###########################
 # Bloody Swan Event Chain #
 ###########################

 ### Éira Events ###
 bloody_swan.0001.t: "Poison's Sting"
 bloody_swan.0001.desc: "As I stand before the lifeless body of my father, [murdered_father.GetFirstName], my vision blurred by tears that well up in my eyes, I feel like I am on the brink of despair. Long had my father worked to bring the ever-hostile clans of the hills closer together, and in the last months he finally had gotten so close to his goal. But now it seems it was all for naught...\n\nI wipe the tears from my face and look down at my father once more. He looks peaceful in death, at least. But... what's this? Why are the veins on his neck so dark and visible? I call one of the herbalists to my side and they quickly confirm my suspicion: This is the mark of a man that was poisoned. And I think I know who is the villain behind this dark deed..."
 bloody_swan.0001.a: "That hound of [gondor|E] will pay for what he has done, I swear it."
 bloody_swan.0001.a.tt: "Unlocks several #high story decisions#!"

 bloody_swan.0002.t: "Searching for Answers"
 bloody_swan.0002.desc: "My father's dream lingers in the valleys and foothills of this land; a whisper on the wind, a promise left unfinished. He wished for peace between the clans, for unity among our people... and now he lies cold in the earth, betrayed by the very power he once sought to work beside.\n\nI have no proof yet - only a bitter certainty. The poison that took him, the timing of his death, the political tremors it caused; all of it leads my thoughts to [tharbad|E]. To [gondorian_governor.GetName]. I must tread carefully. No rash accusations, no misplaced anger. I need proof. I need witnesses. I need the truth.\n\nWord must be sent to our scattered allies. Old records must be scoured. And perhaps... there are those in Glormagil’s court who hold their own grudges; or loose tongues. I will uncover what was done, and by whose hand. But I will not let my father's death paralyze me. The tribes now look to me. His legacy still brings in their trust. And one way or another, I will see it honored."
 bloody_swan.0002.a: "The time for mourning is over. Now, I must act."
 bloody_swan.0002.a.tt: "You will travel to [tharbad|E] to seek some answers"

 bloody_swan.0003.t: "The Suspect in Tharbad"
 bloody_swan.0003.desc: "All signs point to [tharbad|E]. My father's death was too precise, too convenient, and too clean for a tribal feud or personal grudge. He was a threat only to one man: the one who stands to gain the most from his absence.\n\n[gondorian_governor.GetName], Governor of [enedhwaith|E], pretends to be a distant master, but his reach is longer than most would guess. There are whispers in Tharbad; of servants dismissed too suddenly, healers silenced too quickly, a feast where wine was poured only for one.\n\nIf he truly had my father poisoned, he would not have done so openly. But the truth always leaks through the cracks. I must listen carefully... and strike when the time is right."
 bloody_swan.0003.a: "Your walls cannot protect you from justice, Glormagil."
 bloody_swan.0003.a.tt: "You remain in Tharbad for a few days to seek answers"

 bloody_swan.0004.t: "A Web of Lies"
 bloody_swan.0004.desc: "I've begun to unravel the stories told by those close to [gondorian_governor.GetName]: old servants, exiled scribes, even one of his rivals at court. They all speak carefully, cautiously... but I know how to hear what is left unsaid.\n\nOne man claimed he had seen my father’s name on a list of ‘subversives’ to be watched. Another recalls a strange guest who arrived the night before the poisoning and vanished the day after. A wine merchant remembered being paid to deliver a rare vintage - but only a single bottle.\n\nThese are threads, not yet a rope. But they tighten around Glormagil’s name with each passing day. If I am careful, I will find the proof I need."
 bloody_swan.0004.a: "Keep speaking. I will find the truth, one lie at a time."
 bloody_swan.0004.a.tt: "You are getting closer to finding the proof you need"

 bloody_swan.0005.t: "Proof At Last"
 bloody_swan.0005.desc: "Finally, I have what I need. An aged steward, once in [gondorian_governor.GetName]'s' service, came forward in secret. He could no longer live with the guilt, he said. He saw the poison prepared; a rare mixture only known to certain Gondorian apothecaries. He delivered it himself, hidden in the wine that graced my father's cup.\n\nHe gave me a letter: orders signed in Glormagil’s hand. The signature matches. The seal is true. This is the weapon I have sought.\n\nNow I must decide how best to use it. The tribes will rally behind me if they know the truth. The distangt King of [gondor|E] might listen — or he might bury it. But one thing is certain: Glormagil will come to fear the name of Éira."
 bloody_swan.0005.a: "Now he will see what it means to cross a chieftain's blood."
 bloody_swan.0005.a.tt: "You return to your hall, proof in hand, to decide what to do with it"
 bloody_swan.0005.tt: "#P You have found proof of Brant's murder by Glormagil#!"
 
 bloody_swan.0010.t: "Negotiations in Galtrev"
 bloody_swan.0010.desc: "[GetTitleByKey('c_galtrev').GetNameNoTier] is a large town of the [galtrevholder.GetCulture.GetName], situated in the hilly region between [gondor|E]'s Royal Road and the [mistymountains|E]. Here, many travellers and pilgrims pass through on their way to the hallow at Loch Thiar, to the east.\n\nAs I enter the main square, I am greeted cordially by [galtrevholder.GetTitledFirstName], who invites me to join [galtrevholder.GetHerHim] at the large bonfire nearby. "You've come to talk business, aye?" [galtrevholder.GetSheHe] asks."
 bloody_swan.0010.a: "I'm here to convince you to aid me."
 bloody_swan.0010.a.success: "You manage to sway [galtrevholder.GetName]"
 bloody_swan.0010.a.failure: "You fail to sway [galtrevholder.GetName]"
 bloody_swan.0010.b: "I've got a few coins here that could be yours..."
 bloody_swan.0010.c: "You #italic owe#! me, [galtrevholder.GetFirstName]."
 
 bloody_swan.0011.t: "A Meeting by the Gwathló"
 bloody_swan.0011.desc: "I arrive at [GetTitleByKey('c_den_runnach').GetNameNoTier] and find [runnachholder.GetName] standing on the banks of the river Gwathló. The stream is very broad here, and the lands on the other side are but a distant suggestion of hills and fields beyond the river fog.\n\n"So," [runnachholder.GetFirstName] breaks the silence. "I've heard quite a bit about you, daughter of Brant. Have you come to continue your father's works?"  [runnachholder.GetSheHe] quickly gets to the point."
 bloody_swan.0011.a: "I'm here to convince you to aid me."
 bloody_swan.0011.a.success: "You manage to sway [runnachholder.GetName]"
 bloody_swan.0011.a.failure: "You fail to sway [runnachholder.GetName]"
 bloody_swan.0011.b: "I've got a few coins here that could be yours..."
 bloody_swan.0011.c: "You #italic owe#! me, [runnachholder.GetFirstName]."
 
 bloody_swan.0012.t: "The Hall of Iarnburn"
 bloody_swan.0012.desc: "At [GetTitleByKey('c_iarnburn').GetNameNoTier], a large walled village has sprung up around the majestic wooden hall of the chieftain, [iarnburnholder.GetName]. I step inside to meet with the local lord.\n\n"Ahh. If it isn't young [ROOT.Char.GetName]," [iarnburnholder.GetFirstName] greets me, rising from his seat. "What a fine sight! I hear you bring an offer, yes?""
 bloody_swan.0012.a: "I'm here to convince you to aid me."
 bloody_swan.0012.a.success: "You manage to sway [iarnburnholder.GetName]"
 bloody_swan.0012.a.failure: "You fail to sway [iarnburnholder.GetName]"
 bloody_swan.0012.b: "I've got a few coins here that could be yours..."
 bloody_swan.0012.c: "You #italic owe#! me, [iarnburnholder.GetFirstName]."

 bloody_swan.0013.t: "The Men of the Mountains"
 bloody_swan.0013.desc: "The village of [GetTitleByKey('c_westmarches').GetNameNoTier] lies on the far shore of the Isen river, beyond the lands of my people. Here dwell the Mountainmen, who are our distant kin. They too toil beneath the yoke of [gondor|E], and share our distrust of the Winged Crown.\n\nI am received with courtesy and caution alike as [westmarchesholder.GetName] steps forward to greet me in the village's centre. "What brings the Rivermen so far south?" [westmarchesholder.GetFirstName] asks. "We have not had dealings with your kind in many years. Speak quickly, or begone from here."\n\nI explain my reason for coming in a few sentences and then make my offer of alliance. "Together, we can show these hounds of Gondor that we are stronger than they think us to be.""
 bloody_swan.0013.a: "I'm here to convince you to aid me."
 bloody_swan.0013.a.success: "You manage to sway [westmarchesholder.GetName]"
 bloody_swan.0013.a.failure: "You fail to sway [westmarchesholder.GetName]"
 bloody_swan.0013.b: "I've got a few coins here that could be yours..."
 bloody_swan.0013.c: "You #italic owe#! me, [westmarchesholder.GetFirstName]."
 
 bloody_swan.0014.t: "The Brazen Brigand's Pride"
 bloody_swan.0014.desc: "I stand outside the gates of [GetTitleByKey('c_angrast').GetNameNoTier], unable to gain entrance. After a few very long minutes, a man appears above the gate, looking down at me. "What's this now?" he mocks me. "Run back to your mother, girl. War is no game for you."\n\n"You are quick to speak of running, brigand," I reply, standing my ground. "But we are not so different, you and I. We share a common enemy!"\n\n[angrastholder.GetTitledFirstName] looks at me, slightly tilting [angrastholder.GetHerHis] head slightly. "...Very well," [angrastholder.GetSheHe] says at last. "But make it quick. My time is precious...""
 bloody_swan.0014.a: "I'm here to convince you to aid me."
 bloody_swan.0014.a.success: "You manage to sway [angrastholder.GetName]"
 bloody_swan.0014.a.failure: "You fail to sway [angrastholder.GetName]"
 bloody_swan.0014.b: "I've got a few coins here that could be yours..."
 bloody_swan.0014.c: "You #italic owe#! me, [angrastholder.GetFirstName]."
 
 bloody_swan.0020.t: "At the Doors of Durin"
 bloody_swan.0020.desc: "I stand before the gates of the [dwarves|E], forged in ages ago. [moriaholder.GetName] appears from the foreboding darkness, flanked by a row of heavily armoured guards. "It has been many centuries since my people have had visitors from #italic this#! side of the mountains," [moriaholder.GetTitledFirstName] begins in a friendly, but reserved tone. "I must say, I did not expect the Rivermen to be led by a lass like yourself. Now! State your business, [ROOT.Char.GetTitledFirstName]. What brings you to [khazaddum|E]?"\n\nI pause to select my words with care. "I thank you for the honour of receiving me, great King. My people must soon go to war against the Men that have taken our lands, and we seek to arm ourselves. It is known that the Dwarves are the best crafters of weapons, and that is why I've sought an audience with you - to engage in trade. Dwarven arms, for our gold.""
 bloody_swan.0020.a: "Let's negotiate a good deal, friend."
 bloody_swan.0020.b: "Name your price, [dwarf|E]."
 bloody_swan.0020.c: "I think we can both profit from this..."
 bloody_swan.0020.tt: "Purchased Dwarven Armour"

 bloody_swan.0021.t: "The Weight of the Crown"
 bloody_swan.0021.desc: "I have been crowned as the new Queen of the free Rivermen. The ceremony was simple, but the weight of the title is heavy on my shoulders. I am now responsible for the safety and prosperity of my people, and I must lead them through the challenges that lie ahead.\n\nALthough the other chieftains have pledged their loyalty to me in secret, they cannot yet openly declare themselves to be my vassals - not while [gondor|E] remains strong. Soon enough, I will find a way for them to break away in earnest and join my cause.\n\n I must be vigilant and relentless, for the sake of my people and the legacy of my father. To see my vengeance fulfilled at last..."
 bloody_swan.0021.a: "I will not rest until my people are free and my father is avenged."

 bloody_swan.0022.t: "One Thing Remains"
 bloody_swan.0022.desc: "I have risen to greater heights than my father ever dreamt of, and the tribes are finally united. But one thing remains: [glormagil.GetTitledFirstName]. He is the one who must be dealt with to satisfy the thirst for vengeance that burns in my heart. He is the one who must be made to pay for his crimes, and to fear the name of the #italic Blood-spear#!.\n\nThree paths lie before me. I could confront him directly, and risk open war with [gondor|E]. I could strike from the shadows, and risk getting cut down by his guards. Or I could use the proof I have to appeal to the distant King of [gondor|E], and hope that he values justice over politics. Each path carries its own risks and rewards, and I must choose wisely..."
 bloody_swan.0022.a: "Open war is upon you, [glormagil.GetFirstName]."
 bloody_swan.0022.a.tt: "Unlocks the #high story decision#! to declare war on Glormagil"
 bloody_swan.0022.b: "I will strike from the shadows. He won't see it coming."
 bloody_swan.0022.b.tt: "Unlocks the #high story decision#! to assassinate Glormagil"
 bloody_swan.0022.c: "I will appeal to the King. Justice must be served, even if it is slow."
 bloody_swan.0022.c.tt: "Unlocks the #high story decision#! to appeal to the King of Gondor for justice"
 bloody_swan.0022.d: "Maybe the time for vengeance is over..."
 bloody_swan.0022.d.tt: "Unlocks the #high story decision#! to forgive Glormagil and move on"

 ### Glormagil Events ###
 bloody_swan.0201.t: "The Spark of Rebellion"
 bloody_swan.0201.desc: "Reports from the eastern hills speak of gathering fires, of meetings held in shadow and chieftains forging bonds without my sanction. One name comes up again and again: [eira.GetName], daughter of that damned idealist [murdered_father.GetFirstName] I rid myself of. The girl has her father’s blood, and more besides. She speaks of justice, and of freedom.\n\nFools always forget that justice is decided by those who win. But I will not act hastily. There is no glory in open war with a minor tribal duchy. No; there are other ways to quiet such talk. The whisper of gold in a discontent warrior’s ear. A #italic hunting accident!# for a too-loyal retainer. Perhaps even a secret deal struck with one of her rivals.\n\nThis land has taught me many things. Here, daggers matter more than decrees."
 bloody_swan.0201.a: "Send agents to her court. Sow dissent and break their unity."
 bloody_swan.0201.a.tt: "Unlocks several #high story decisions#!"

 bloody_swan.0202.t: "The Prince’s Messenger"
 bloody_swan.0202.desc: "A dust-covered messenger arrives from the south, bearing the swan crest of Belfalas. His words are blunt, his tone bordering on insolent: [maratar.GetFirstName], second son of the Prince of Belfalas, has led a self-sponsored punitive expedition to deal with the brigands that run rampant on the coasts. Without so much as a whisper to me.\n\nSo. The princeling seeks glory. No doubt he expects to gallop through [enedhwaith|E] like it’s a tournament field, trampling over my delicate network of bribes, truces, and threats.\n\nI could remind him who #italic truly!# governs here. Or perhaps I let him charge into the fire to burn, taking that brigand with him. \n\nBut then again, his father has the King’s ear. Perhaps this Maratar could be… shaped."
 bloody_swan.0202.a: "Send a welcome. We may yet find use for one another."
 bloody_swan.0202.b: "Let him run wild... to his doom."

 ### Rlain Events ###
 bloody_swan.0301.t: "The Clans Unite"
 bloody_swan.0301.desc: "It is done! The chieftains have come together to form a loose confederation under my banner. Together, we will soon be strong enough to challenge [glormagil.GetTitledFirstName], that lapdog of the Winged Crown, and finally break the yoke of [gondor|E]!\n\nThe tribes are still wary of one another, and of me. They have been divided for so long - but they have seen the proof of my prowess and my skill. I was the first to openly raid the coastlines of Gondor, and I shall be the one to end their hold over the Riverlands once and for all. And... what spoils I shall claim for myself, once we have won! Tharbad is rich, and ripe for the taking..."
 bloody_swan.0301.a: "I will dominate these lands."

 bloody_swan.0302.t: "The Rise of Azira"
 bloody_swan.0302.desc: "I stand at the forefront of a new era for my people. The clans are united, and the chieftains now follow the guidance of Azira, Wolf-lord of Cold and Brutality. I have taken what is mine by right of conquest, and I will not stop here.\n\nWith [gondor|E] driven from [enedhwaith|E] proper, the time has come to plan my next move. [arnor|E] is distracted with its wars in the north, but Gondor is reeling from the defeat I have dealt it.\n\nWhichever way I choose to strike next, I will make sure that the name of the Brazen Brigand is whispered in fear across the lands. I will be the scourge of the Winged Crown, the bane of all Dúnedain!"
 bloody_swan.0302.a: "My name will live in infamy."