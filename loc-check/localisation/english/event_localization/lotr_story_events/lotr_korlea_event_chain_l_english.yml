l_english:

 ##########################
 # Korlea ROA Event Chain #
 ##########################
 
 korlea.0001.t: "Choosing an Expedition Leader"
 korlea.0001.desc: "Before my seat stand [belphegor.GetFirstName], [lominzil.GetFirstName], and [nimruzir.GetFirstName], the three candidates that stood out among all candidates to lead my planned expedition into the Utter South. One of them shall be named Captain of the #italic Dream-chaser#!, the ship I've prepared for this voyage.\n\n[belphegor.GetName] is a direct, ambitious man. An experienced sailor, he would surely make for a brave expedition leader. But does he have the foresight for a journey into the unknown like this?\n\nThen, there is [lominzil.GetName]. A woman of sharp wit and distinct beauty, she knows what she wants, and has expertly handled the finances and books of her dynasty for many years. Could she be the right choice?\n\nAnd finally, there is the scholar, [nimruzir.GetName], the youngest among the three. A learned lore-master, he possesses the most knowledge about the Utter South - but will he be able to put his wisdom to good use on so dangerous a voyage?"
 korlea.0001.a: "[belphegor.GetFirstName] is the right man for the job."
 korlea.0001.b: "I trust [lominzil.GetFirstName] with this charge."
 korlea.0001.c: "Let [nimruzir.GetFirstName] take the lead."
 korlea.0001.d: "On second thought, I do not think this is a good idea."
 korlea.0001.d.tt: "#n You will opt out of Korlea's story content#!"
 
 korlea_expedition_camp_name: "Crew of the Dream-chaser"
 
 korlea.0002.t: "Choosing an Expedition Leader"
 korlea.0002.desc: "Before my seat stand [belphegor.GetFirstName], [lominzil.GetFirstName], and [nimruzir.GetFirstName], the three candidates that stood out among all candidates to lead my planned expedition into the Utter South. One of them shall be named Captain of the #italic Dream-chaser#!, the ship I've prepared for this voyage.\n\n[belphegor.GetName] is a direct, ambitious man. An experienced sailor, he would surely make for a brave expedition leader. But does he have the foresight for a journey into the unknown like this?\n\nThen, there is [lominzil.GetName]. A woman of sharp wit and distinct beauty, she knows what she wants, and has expertly handled the finances and books of her dynasty for many years. Could she be the right choice?\n\nAnd finally, there is the scholar, [nimruzir.GetName], the youngest among the three. A learned lore-master, he possesses the most knowledge about the Utter South - but will he be able to put his wisdom to good use on so dangerous a voyage?"
 korlea.0002.a: "[belphegor.GetFirstName] is the right man for the job."
 korlea.0002.b: "I trust [lominzil.GetFirstName] with this charge."
 korlea.0002.c: "Let [nimruzir.GetFirstName] take the lead."
 korlea.0002.d: "On second thought, I do not think this is a good idea."
 korlea.0002.d.tt: "#n You will opt out of Korlea's story content#!"
 
 korlea.0005.t: "Into the Belegaer"
 korlea.0005.desc: "TEMP We're leaving, but where to?"
 korlea.0005.a: "Let us go to Bozisha-Dar."
 korlea.0005.a.tt: "You will travel to the port of Bozisha-Dar"
 korlea.0005.b: "Our path lies to the South."
 korlea.0005.b.tt: "You will travel south towards Tulwang"
 
 korlea.0006.t: "A Bustling Tradeport"
 korlea.0006.desc: "TEMP  Big City Life! Woah..."
 korlea.0006.b: "Let's go see the city!"
 korlea.0006.b.tt: "You will explore the markets of Bozisha-Dar"
 korlea.0006.a: "Refill our provisions and set sail"
 korlea.0006.a.tt: "You will travel south towards Tulwang"
 
 korlea.0007.t: "The Bozishnarud Markets"
 korlea.0007.desc: "TEMP Aw man there are soo many stalls!"
 korlea.0007.a: "I'll see if I can't find something to purchase."
 korlea.0007.a.food: "You purchase local food"
 korlea.0007.a.martial: "You purchase a book on warfare"
 korlea.0007.a.diplo: "You listen to a storyteller"
 korlea.0007.a.ring: "You purchase a ring"
 korlea.0007.a.scam: "You get scammed"
 korlea.0007.b: "Let's take in the sights!"
 korlea.0007.b.tt: "You decide not to buy anything"

 korlea.0008.t: "An Invitation from the Kralyi"
 korlea.0008.desc: "TEMP The Bossmang is calling us."
 korlea.0008.a: "It would be rude for us to reject him."
 korlea.0008.a.tt: "You will visit the palace of [rayholder.GetName]"
 korlea.0008.b: "I'll politely decline and leave"
 korlea.0008.b.tt: "You will travel south towards Tulwang"
 
 korlea.0009.t: "The Lord of the Rây"
 korlea.0009.desc: "TEMP Really cool guy. He gave us some gold!"
 korlea.0009.a: "We are in your debt, Great Kralyi."
 korlea.0009.a.tt: "You will travel south towards Tulwang"
 
 korlea.0020.t: "Life At Sea"
 korlea.0020.desc: "TEMP As a salty breeze gently blows across the Dream-chaser's deck, I find myself standing next to [korlea_first_mate.GetFirstName] on the deck."
 korlea.0020.a: "The Belegaer is truly magnificent, isn't it?"
 korlea.0020.b: "You ought to stop questioning my decisions, [korlea_first_mate.GetFirstName]."
 korlea.0020.c: "I truly enjoy your company, [korlea_first_mate.GetFirstName]..."
 
 korlea.0021.t: "Challenged Leadership"
 korlea.0021.desc: "TEMP [korlea_second_mate.GetFirstName] is questioning my authority!"
 korlea.0021.a: "Come, let us talk this through like adults."
 korlea.0021.b: "#italic I'm#! the captain here. Not you!"
 korlea.0021.c: "I can have you thrown off the ship at any time..."
 
 korlea.0050.t: "The Isle of Corsairs"
 korlea.0050.desc: "TEMP Our voyage has brought us to [GetTitleByKey('c_sunira').GetNameNoTier] where we're surprised to find a host of Tulwangi Corsairs!"
 korlea.0050.a: "This might not have been such a smart decision..."
 korlea.0050.a.tt: "You decide to leave [GetTitleByKey('c_sunira').GetNameNoTier] and continue the voyage"
 korlea.0050.b: "Dock the ship! Let us see what the isle has to offer."
 korlea.0050.b.tt: "You will stay on [GetTitleByKey('c_sunira').GetNameNoTier] for a short while"
 
 korlea.0051.t: "A Drink At the Bar"
 korlea.0051.desc: "TEMP While having a bit of a drink at the local tavern, I chat with [corsair_lady.GetName], a friendly local."
 korlea.0051.a: "Tell me the history of this isle!"
 korlea.0051.b: "How do the Corsairs fight?"
 korlea.0051.c: "Come join our expedition!"
 
 korlea.0052.t: "The Mystery Map"
 korlea.0052.desc: "TEMP [corsair_lady.GetName] has produced a mysterious map, claiming it leads to hidden treasure!"
 korlea.0052.a: "Treasure! You have my attention..."
 korlea.0052.a.tt: "You pocket the treasure map for later use"
 korlea.0052.b: "That has got to be fake. Let's buy supplies instead."

 korlea.0053.t: "A Flurry of Flying Fists"
 korlea.0053.desc: "TEMP A bar fight has broken out! How do we deal with this?"
 korlea.0053.a: "Let's try to slip out unnoticed..."
 korlea.0053.b: "A fight? I'm in!"
 
 korlea.0099.t: "Setting Forth"
 korlea.0099.desc: "TEMP It's time to set sail again. We'll travel to [GetTitleByKey('c_adunazain').GetNameNoTier] next!"
 korlea.0099.a: "This might not have been such a smart decision..."
 korlea.0099.a.tt: "You decide to leave [GetTitleByKey('c_sunira').GetNameNoTier] and continue the voyage"
 
 korlea.0100.t: "The Black Port"
 korlea.0100.desc: "TEMP We've come to Anballukhor, an enemy of Bellakar our home. Let us hope [GetTitleByKey('c_adunazain').GetNameNoTier] is still somewhat safe!"
 korlea.0100.a: "We had best get going..."
 korlea.0100.a.tt: "You decide to leave [GetTitleByKey('c_adunazain').GetNameNoTier] and continue the voyage"
 korlea.0100.b: "It might be worth staying for a while."
 korlea.0100.b.tt: "You decide to dock the #italic Dream-chaser#! in the black port"