 #Events after getting both Dwarven Rings

 skorgrim_dourhand.1000.t: "The Fate of the Rings"
 skorgrim_dourhand.1000.desc: "After having successfully acquired both the [Concept('sevenringsofdwarves', 'Ring of the Firebeards')|E] and the [Concept('sevenringsofdwarves', 'Ring of the Broadbeams')|E], the next phase of the plan begins.\n\nIn the original agreement with the [witchkingshort|E], he promised me unimaginable riches and immortality in exchange for these Rings, but simply delivering them in exchange for promises might not be in the best interest of our goal of rebuilding [nogrod|E]. Perhaps the [witchkingshort] will reward us with something... or perhaps, no. However, I could keep both Rings for myself and, with their magic, rebuild [nogrod] on my own, a solid option, at least theoretically. Unfortunately, keeping the Rings will unleash the [witchkingshort]'s wrath, and an open war against them may cause our destruction... \n\nIn any case, both options carry their own risks, but at this point, what can we do? I have betrayed my kin, even my [GetTrait('dwarf_father').GetName( GetNullCharacter )]  [dwalin_V.GetFirstNameRegnal], and now the [dwarves|E] hate me for my actions... After all that has transpired, was it really worth it? Only time will tell."
 skorgrim_dourhand.1000.a: "The [witchkingshort] must pay his due. Make ready for Angmar."
 skorgrim_dourhand.1000.b: "Why should I part with them? The [witchkingshort] can offer nothing I do not already have. I am the King of Nogrod, and I obey to NO ONE!"
 skorgrim_dourhand_travel_angmar: "#V You#!, #V [skorgrim_dourhand.GetName]#!, will travel to [GetTitleByKey('c_carn_dum').GetNameNoTier] and see the [witchkingshort] of Angmar."
 skorgrim_dourhand_keep_rings: "@warning_icon!#T #V You#!, #V [skorgrim_dourhand.GetName]#!, choose to keep the Dwarven Rings. This path will enrage the [witchkingshort] of Angmar and may lead to catastrophic consequences!"

 skorgrim_dourhand.1001.t: "The Dark Throne of Carn Dûm"
 skorgrim_dourhand.1001.desc: "I've finally arrived at the dark spires of [GetTitleByKey('c_carn_dum').GetNameNoTier], the heart of [angmar|E], and I am quickly ushered in. As I enter the throneroom, the massive doors grind shut with a finality that makes my heart stutter.\n\nThere, upon a throne of jagged metal, sits the [witchkingshort|E], Lord of the [nazgul|E]. His presence is a cold blade pressed against my soul, a silhouette of shadow bound in ancient plate.\n\n"The treasures of your fathers, little thief, have you brought me the [Concept('sevenringsofdwarves', 'Rings')|E]?", he chilled. His voice is not a sound, but a jagged rasp that seems to tear the very air. "Yes, my Lord, both of them. I... I am at your service.", I reply hesitantly.\n\nSwiftly but decisively he snatches them from my hands outstretched. He does not look at the Rings; he looks through them, his unseen eyes fixed on some distant, dark malice. A low, rhythmic rattling begins in his chest, a sound that I realize, with mounting dread, is laughter. "You speak of service, Master Dwarf? You, who sold your kin's blood for a pittance of yellow gold? You believe these trinkets grant you a seat at my side?""
 skorgrim_dourhand.1001.a: "I await your answer..."
 skorgrim_dourhand_carn_dum: "You deliver the [Concept('sevenringsofdwarves', 'Dwarven Rings')|E] to the [witchkingshort|E], and ask for fulfillment of the pact."

 skorgrim_dourhand.1002.t: "A Pawn's Recompense"
 skorgrim_dourhand.1002.desc: "[skorgrim_dourhand.GetFirstName] stands before me, his eyes alight with a pathetic, desperate greed as he awaits the fulfillment of our pact. He has delivered to me the [Concept('sevenringsofdwarves', 'Rings')|E] of the [bluemountains|E], stripping the [firebeards|E] and [broadbeams|E] of their ancient strength and satisfying my Master [sauron.GetFirstName]'s will.\n\nThe 'immortality' and 'glory' I whispered in his ear were but lures for a simple mind. I am the [witchkingshort|E] of [angmar|E], and I do not owe debts to the fleeting lives of mortals. I could end his treachery here, granting him a swift death in the dark reaches of [GetTitleByKey('c_carn_dum').GetNameNoTier].\n\nYet, there is a certain... utility in a tool that has already broken its own bond. To let him live as a puppet king would secure the mountain passes and keep the stunted folk bound to me and my Master. I must decide: is this pitiful wretch worth the effort of his tether, or should I simply show him the true meaning of the 'immortality' he craves?"
 skorgrim_dourhand.1002.a: ""Your service has come to an end, [skorgrim_dourhand.GetFirstName]...""
 skorgrim_dourhand_death_wk: "[skorgrim_dourhand.GetName] will be executed by you."
 skorgrim_dourhand.1002.b: ""Whom do you serve?""
 skorgrim_dourhand_pact_wk: "[skorgrim_dourhand.GetName] will be asked if he wants dominion over [GetTitleByKey('k_gundabad').GetNameNoTier] or help in the reconstruction of [GetTitleByKey('k_nogrod').GetNameNoTier]."

 skorgrim_dourhand.1003.t: "Earning Immortality"
 skorgrim_dourhand.1003.desc: "The [witchkingshort|E] lets the [Concept('sevenringsofdwarves', 'Rings')|E] slip into a pouch, his attention already drifting from me as if I were a common pest. "A pact?" he grated, his voice like the grinding of a tombstone. "You do not negotiate with the Shadow, wretched cur. You merely serve it until you are spent. You have been granted eternity as promised. Your name shall echo in infamy forever."\n\nHe offers no further words, no trial, and no ceremony. With a casual, almost bored flick of his wrist, his Morgul blade finds my heart.\n\nThe blade's cold pierces me as it sinks into my chest. I look down, watching my own blood stain the floor of [GetTitleByKey('c_carn_dum').GetNameNoTier]. In my final moments there is but one thought that crosses my mind. I betrayed my people for this? I schemed, plotted and murdered my kin just to die disgraced in a dark hall?\n\nIn the end, there was no throne for me. No glory. Just a damp floor and the sound of the Witch-King's footsteps walking away before I've even stopped breathing. The pact was a lie, and I was the fool who bought it."
 skorgrim_dourhand.1003.a: "Is this... the immortality I sought?"

 skorgrim_dourhand.1004.t: "A Throne of Shadows"
 skorgrim_dourhand.1004.desc: "I can feel the [witchkingshort|E]'s gaze, a freezing pressure that seems to pull the very air from my lungs. My life hangs by a fraying thread, yet as the Morgul blade begins to rise, I find the words to stay his hand. I speak of utility. I lay out a path where my survival serves his design better than my corpse ever could. For a moment, the air grows even colder, as if the Lord of the [nazgul|E] is weighing the spark of my ambition against the void of his own.\n\nThe rhythmic rattling in his chest stops. The iron mask tilts, considering me not as a person, but as a piece on a board.\n\n"You are a creature of grand delusions, insignificant one," he grated, the shadow of his presence looming over me. "But even a delusion can be turned to my Master's purpose. You wish to rule? Very well. I shall grant you a seat among the stones, so long as your hands remain stained with the blood of my enemies. Choose where your 'glory' begins, but remember: the shadow that raises you can just as easily bury you.""
 skorgrim_dourhand.1004.a: "Generous one, return the halls of [GetTitleByKey('k_gundabad').GetNameNoTier] to my kin!"
 skorgrim_dourhand.1004.b: "Please, grant me the means to remake [GetTitleByKey('k_nogrod').GetNameNoTier]!"

 skorgrim_dourhand.1005.t: "A Deal Broken"
 skorgrim_dourhand.1005.desc: "PLACEHOLDER"
 skorgrim_dourhand.1005.a: "This is an insignificant setback"
 skorgrim_dourhand.1005.b: "He will learn pain"
 wk_devastates_nogrod: "You will unlock a decision to crush Skorgrim's Realm and get both Rings"

