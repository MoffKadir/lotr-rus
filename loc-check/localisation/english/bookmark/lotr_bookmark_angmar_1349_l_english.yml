 # Rise of Angmar 
 bm_1349_angmar: "Rise of the Witch-King"
 bm_1349_angmar_desc: "#TOLKIENQUOTE: "It was in the beginning of the reign of Malvegil of Arthedain that evil came to Arnor. For at that time the realm of Angmar arose in the North beyond the Ettenmoors. Its lands lay on both sides of the Mountains, and there were gathered many evil men, and Orcs, and other fell creatures.#!\n#QUOTEDCHARACTER: - Eriador, Arnor, and the Heirs of Isildur#!\n\nArnor. The northern kingdom of the Dúnedain, long sundered and broken between competing claims, now stands on the brink, perhaps, of unity. Argeleb of Arthedain has ascended the throne, and claimed for himself the throne of all Arnor, citing the end of the line of Isildur in the kingdoms of Rhudaur and Cardolan. The Prince of Cardolan, friendly to Argeleb, is likely to acknowledge this claim. But the Hillmen of Rhudaur, led foremost by Hwaldar, will likely fiercly resist the restoration of Dúnedain suzerainity over them. \n\nAnd to the north, a new fell power has been rising. Orcs, fell men, and other dark creatures gather beneath the banner of one only known as the 'Witch-King'..."

 bookmark_angmar_argeleb: "King Argeleb"
 bookmark_angmar_argeleb_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_argeleb_desc: "With the death of his father Malvegil, the new King of Arthedain Argeleb now stands poised to rebuild the shattered realm of his forefathers. The heir of Isildur, his claim to the position of King of Arnor is unquestionable, and Arthedain stands as the mightiest of the successor kingdoms of Arnor, with the second mightiest, Cardolan, friendly to it. \n\nBut Argeleb's pride and ambition might yet be his downfall, for in his focus upon the restoration of Arnor, he has blinded himself to many externalities..."
 bookmark_angmar_argeleb_alt_arveleg: "Prince Arveleg"

 bookmark_angmar_tarmacil: "King Tarvegil"
 bookmark_angmar_tarmacil_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_tarmacil_desc: "With the death of King Tarastôr, the male-line of [isildur|E] died out in [cardolan|E]. The throne fell to his cousins in the house of Caladir, one of the most ancient and powerful houses in [arnor|E]. For his part, Tarvegil has proven himself an able administrator and diplomat, but has watched his north-eastern border with a wary eye.\n\nCardolan has been aligned with [arthedain|E] ever since they supported [kingtargon|E] during the [cardolan_succession_crisis|E], and Tarvegil has endeavored to continue the good relations with Fornost. The chaos of [rhudaur|E]'s fall to the [hillmen|E] has made it abundantly clear that continued good relations with Arthedain remains of paramount importance, and soon Tarvegil will face a choice that will chart the future of Cardolan..."

 bookmark_angmar_hwaldar: "King Hwaldar"
 bookmark_angmar_hwaldar_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_hwaldar_desc: "For generations now the [hillmen|E] of Rhudaur have endured the whims and indignities of their Dúnedain overlords. Well, no longer!\n\nHwaldar Hillchief, aided by the King of the North, rose up against the impotent King Aldor of Rhudaur, and slew him on the steps of Cameth Brin, taking the seat of the ancient Dunedain citadel for his own. Now the Chief of Chiefs reigns supreme over much of Rhudaur, hunting down all the Dúnedain he can find, his eyes set on soon bringing down the last Dúnedain holdouts in the Angle.\n\nHwaldar is deep now in the counsels of Angmar, and should war come, he will relish the chance to bring the fight to the remaining Dúnedain of Arnor..."
 
 bookmark_angmar_mellondir: "High Lord Mellondir III"
 bookmark_angmar_mellondir_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_mellondir_desc: "When the last King of Rhudaur, the feeble Aldor, was slain by the upstart Hwaldar, a brutal [hillman|E] chief, most of the Dúnedain that remained within Rhudaur fled to the west. \n\nAll but one - Lord Mellondir of Fennas Drúnin still stands his ground, between the rivers Bruinen and Mitheithel. War is brewing as the savage tribes of Hillmen now gather to drive out even the last defenders of the Angle. \n\nTime will tell if Mellondir can fight the overwhelming odds or be forced to flee as well..."
 
 bookmark_angmar_witchking: "The Witch-king of Angmar"
 bookmark_angmar_witchking_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_witchking_desc: "The Shadow rises in the North. [sauroncharacter|E] was vanquished long ago by the [warlastallianceshort|E], yet he still bides his time. Yet it is now the hour of his greatest and chief lieutenant: [witchking|E] of [angmar|E].\n\nFrom his dreadful fortress of Carn Dûm, the Witch-King and his army of orcs and evil men stand poised to unleash havoc and devestation upon the North. The heirs of Arnor bicker still, and already [rhudaur|E] has fallen to his purpose. Yet the [dunedain|E] are still valiant, and they may prove to be more of a threat than the Witch-King expects.\n\nStill, with strength and ferocity, Angmar stands ready to rise as the greatest realm in the North."
 
 bookmark_angmar_skorgrim: "Skorgrim Dourhand"
 bookmark_angmar_skorgrim_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_skorgrim_desc: "TEMP Tonight, we are going to STEAL the rings!"

 bm_1349_gondor: "The Noontide of Gondor"
 bm_1349_gondor_desc: "In the reign of Atanatar II Alcarin, it was said that precious stones were in Gondor but pebbles for children to play with. Since those days, the long noontide of the south-realm has waxed, its strength and splendor growing day by day. It's navies dominate the coast as far south as the Bay of Tûlwang, and to the north, it maintains a strong vigilance and allies in Rhovanion. The Kings of Harad bow their heads to the Winged Crown, and send their sons as captives to its court.\n\nThe power of Gondor now recalls the strength of Númenor of old ere it fell. But just as Númenor of old, power and wealth begets pride, and the Dúnedain of the south have grown most proud indeed - of both their kingdom and of their ancient heritage. And this pride may yet be their downfall..."

 bookmark_angmar_romendacil: "King Romendacil II"
 bookmark_angmar_romendacil_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_romendacil_desc: "In truth, Rómendacil II has reigned far longer than he has sat the throne. Born Minalcar, he served as Regent of Gondor for both his uncle Narmacil I and his father Calmacil, where he proved himself an energetic, dynamic, and shrewd leader. After defeating a great Easterling force in T.A. 1248 and claiming the name of Rómendacil, he led Gondorian focus and diplomacy in a completely new direction. He courted the northmen of Rhovanion and established a powerful network of allies, clients, and subjects in Gondor's northern frontier, securing the north as the Ship-Kings once had the south. He fortified the Anduin and erected the mighty Argonath statues.\n\nNow in the twilight of his reign, Rómendacil II stands triumphant as one of the greatest Gondorian kings and statemen, with a legacy few can rival. Yet his policies towards the north may yet be the seeds of a great calamity, though he does not realize it.."
 bookmark_angmar_romendacil_alt_valacar: "Prince Valacar"
 bookmark_angmar_romendacil_alt_eldacar: "Eldacar"

 bookmark_angmar_calimehtar: "Sealord Calimehtar"
 bookmark_angmar_calimehtar_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_calimehtar_desc: "Younger brother of King [Glossary('Rómendacil','romendacil_gloss')], Calimehtar for years has served as his sibling’s trusted Captain of Ships and overall diplomat to the realms of the South. This has earned Calimehtar respect and honor from all quarters. While many of the Southern League desire for Calimehtar to lead them, Calimehtar has started to retire from political life, his sons and grandsons increasingly taking over his duties.\n\nCalimehtar currently rests content, his line assured a position of honor in service to the throne of [gondor|E]. But not all of his line will be so content…"
 bookmark_angmar_calimehtar_alt_castamir: "Castamir"
 bookmark_angmar_calimehtar_alt_morlaen: "Morlaen"
 
 bookmark_angmar_roquendil: "High Lord Roquendil"
 bookmark_angmar_roquendil_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_roquendil_desc: "PLACEHOLDER - Roquendil was appointed at a fairly young age to govern the province of Calenardhon, Lord Roquendil is a close friend and Brother-In-Law of Eldacar, the son of crown prince Valacar. He needs to secure the succession of his daughter Mahtariel, for he does not have any sons. Roquendil is a excellent Commander and a skilled ruler."
 bookmark_angmar_roquendil_alt_mahtariel: "Mahtariel"
 
 bookmark_angmar_dunloth: "Prince Dunloth"
 bookmark_angmar_dunloth_subheading: "$BOOKMARK_SUBHEADING_DEFAULT$"
 bookmark_angmar_dunloth_desc: "PLACEHOLDER - Prince Dunloth of Belfalas is a proud ruler, having recently inherited the rich and fertile fief of Belfalas." # Temp
 
