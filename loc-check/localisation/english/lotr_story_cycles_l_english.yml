 ####################################
 ### Bountig Medlokan Story Cycle ###
 ####################################
 # Intro to his story - fight in the West against Rohan
 bountig_medlokan_intro_to_story: "Your [domicile|E] will be moved to [contract_employer.GetName]'s capital.\n\n[contract_employer.GetName] will start a war with [GetTitleByKey('k_rohan').GetHolder.GetName] with #V you#! as their ally"
 story_cycle_bountig_medlokan: "Bountig's Travels"
 story_cycle_bountig_medlokan_desc: "Fate has torn [GetScriptedCharacterByHistoryID('bountigmedlokan').GetFirstName] from his home and family, and now he wanders through the wide lands of [middleearth|E]. His travels will touch many lands West and South before it is time to return again to his homeland. Look for special Story Contracts that will provide opportunies to grow in experience and wisdom durring his journey.\n\n$bountig_event_chain.0012.a.tt.2$"

 #######################################
 ### Azrathâni Expedition Story Cyle ###
 #######################################
 story_cycle_azrathani_expedition: "The Azrathâni Expedition"
 story_cycle_azrathani_expedition_desc: "A sailor's tale about a rich emerald deposit in the exotic south was all that was needed to set the [sevenlands|E] aflame.\n\nThe enterprising would-be conquerors must now deal with heavy debt and a hostile native population if they are to bring this mine to fruition, and perhaps then realize their ambition of becoming a princely family of the [balan_lai|E]."
 debt_breakdown: "#V Debt Breakdown:#!\n$BULLET$You owe #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_karasalas').GetValue|0]#! to [GetTitleByKey('d_karasalas').GetHolder.GetFullName] at #X [GetTitleByKey('d_karasalas').MakeScope.Var('loan_interest').GetValue|%0]/year#! interest.\n$BULLET$You owe #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_alsarias').GetValue|0]#! to [GetTitleByKey('d_alsarias').GetHolder.GetFullName] at #X [GetTitleByKey('d_alsarias').MakeScope.Var('loan_interest').GetValue|%0]/year#! interest.\n$BULLET$You owe #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_gimileth').GetValue|0]#! to [GetTitleByKey('d_gimileth').GetHolder.GetFullName] at #X [GetTitleByKey('d_gimileth').MakeScope.Var('loan_interest').GetValue|%0]/year#! interest.\n$BULLET$You owe #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_gimilthani').GetValue|0]#! to [GetTitleByKey('k_gimilthani').GetHolder.GetFullName] at #X [GetTitleByKey('k_gimilthani').MakeScope.Var('loan_interest').GetValue|%0]/year#! interest.\n$BULLET$You owe #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_pel').GetValue|0]#! to [GetTitleByKey('k_pel').GetHolder.GetFullName] at #X [GetTitleByKey('k_pel').MakeScope.Var('loan_interest').GetValue|%0]/year#! interest.\n$BULLET$You owe #V @gold_icon![GetTitleByKey('c_gidwama').MakeScope.Var('debt_inzilloni').GetValue|0]#! to the merchants of [GetTitleByKey('d_inzilloni').GetNameNoTier] at #X [GetTitleByKey('d_inzilloni').MakeScope.Var('loan_interest').GetValue|%0]/year#! interest."
 ziranihin_brothers: "The Zîrânîhîn Brothers"
 ziranihin_followers: "The Princely Scions"
 label_native_acceptance: "#V Native Acceptance#!"
 relaxed_natives: "#difficulty_easy Acceptance#!"
 angry_natives: "#difficulty_hard Resistance#!"
 
 #################################
 ### Eradan - War in the North ###
 #################################
 story_cycle_eradan: "The Defenders of Eriador"
 story_cycle_eradan_desc: "[GetTitleByKey('d_laamp_guardians_of_sarn_ford').GetName] have been called upon to defend [eriador|E]. In the north of [middleearth|E], a new threat is rising, and it falls upon Eradan, Andriel, and Farin to stop it. Look for special Story Contracts that will guide you along the path of the Defenders of Eriador! At safe locations, you may speak with the locals to gain information on the next leg of your journey."
 warriors_three_desc: "The Warriors Three"
 
 ########################
 ### Arphazêl's Story ###
 ########################
 story_cycle_arphazel: "The Ascending Dawn"
 story_cycle_arphazel_desc: "Arphazêl of Anagzâyan has escaped from her captivity and now seeks to build a new life for herself. Look for special story contracts that will advance Arphazêl's adventure!"

 ####################
 ### Purge of Ray ###
 ####################
 lotr_story_cycle_purge_of_ray: "Purge of Ray"
 lotr_story_cycle_purge_of_ray_desc: "[GetTitleByKey('k_ray').GetHolder.GetFirstNamePossessive] ascension has thrown [GetTitleByKey('k_ray').GetName] into chaos, and Revolutionaries and Reactionaries both seek to profit from the instability and bring their faction to the throne. Skilled intrigue and an iron fist will be required to restore order to Ray."
 pacification: "Pacification"
 resistance: "Resistance"
 purge_opponents: "Opponents"
 min_pacification: "0"
 max_pacification: "20"
 min_resistance: "$min_pacification$"
 max_resistance: "$max_pacification$"
 
