 ################
 ### THE MASK ###
 ################
 story_cycle_goblin_mask: "The Mask"
 story_cycle_goblin_mask_desc: "You have found a curious mask. It is unadorned except for a few animal horns, and it seems to fit perfectly to your face. It emanates a strange pull, as if it #italic wants#! to be worn. You find it difficult to withstand that pull. The mask sometimes offers boons, but sometimes, it might lead you astray. Beware the consequences of owning the mask... for at some point, it may begin owning #italic you...#!"