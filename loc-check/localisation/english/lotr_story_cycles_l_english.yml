 ### Éira Bloodspear's Story ###
 ###############################
 story_cycle_eira: "A Quest for Vengeance"
 story_cycle_eira_desc: "TEMP Mark my words, vengeance #italic will#! be mine!"
 EIRA_FORMABLE_KINGDOM: "[GetTitleByKey('k_dunlandfells').GetName]"
 
 ################
 ### THE MASK ###
 ################
 story_cycle_goblin_mask: "The Mask"
 story_cycle_goblin_mask_desc: "You have found a curious mask. It is unadorned except for a few animal horns, and it seems to fit perfectly to your face. It emanates a strange pull, as if it #italic wants#! to be worn. You find it difficult to withstand that pull. The mask sometimes offers boons, but sometimes, it might lead you astray. Beware the consequences of owning the mask... for at some point, it may begin owning #italic you...#!"
 
 ##############################
 ### Avatar of Sîrayn Deity ###
 ##############################
 story_cycle_avatar_of_faith: "Avatar of [GetPlayer.GetFaith.HighGodName]"
 story_cycle_avatar_of_faith_desc: "You have ascended to embody [GetPlayer.GetFaith.HighGodNameAlternate] [GetPlayer.GetFaith.HighGodHerselfHimself]. As the embodiment of [GetPlayer.GetFaith.HighGodHerHis] will, all [GetPlayer.GetFaith.GetAdjective] look up to you with reverence. If you play your cards well, you could even establish a system of rule where this divine lineage is passed onto your descendants as well."
 story_cycle_avatar_of_faith_info_tooltips: "$story_cycle_avatar_of_faith_warn_tt$\n$story_cycle_avatar_of_faith_warn_tt2$"
 story_cycle_avatar_of_faith_warn_tt: "#warning @warning_icon! Converting away from your [faith|E] will remove your divinity and incur consequences#!"
 story_cycle_avatar_of_faith_warn_tt2: "#help Creating a new [faith|E] will not incur this penalty#!"