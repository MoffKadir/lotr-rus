 yokudan_religion_desc:1 "Верования йокуданцев строятся вокруг поклонения духам, которые спаслись от Голода Сатакала. Некоторые конфессии принимают и чтут роль Мирового Змея в естественном порядке, другие же отвергают его в надежде избежать рока."
