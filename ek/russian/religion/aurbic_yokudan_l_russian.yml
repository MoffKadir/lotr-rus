# Yoku Spirits
 yoku_spirits:0 "Йокуданск"
 yoku_spirits_adj:0 "Духи Йоку"
 yoku_spirits_adherent:0 "Йокуданец"
 yoku_spirits_adherent_plural:0 "Йокуданцы"
 yoku_spirits_desc:1 "Религия Йокуды определяется деяниями Сатакала, Первого Змея, который постоянно пожирает сам себя и сбрасывает свою кожу, вследствие чего мир перерождается. Наряду с ним существуют боги — могущественные духи, освоившие процесс Обхода, благодаря которому они спасаются от Голода Сатакала и переживают цикл.\n\nВ противовес религии редгардов Хаммерфелла, центральное место в которой занимает Руптга, йокуданцы расколотого континента упрямо чтут Сатакала, Змея, явившегося Прежде."

# Walkabout
 walkabout:0 "Обходск"
 walkabout_adj:0 "Обход"
 walkabout_adherent:0 "Верующий в Обход"
 walkabout_adherent_plural:0 "Верующие в Обход"
 walkabout_desc:1 "Главным в пантеоне редгардов является Руптга, Высокий Папа, который придумал Обход, процесс, позволяющий «обходить» цикл разрушения мира. В представлении верующих боги — это герои, которых нужно имитировать, чтобы добраться до Далёких Берегов и спастись от вечного Голода Сатакала.\n\nИстинный Обход смертным недоступен, однако боги могут воплощаться в мире через великих редгардских героев. На сегодняшний день к этим богам присоединились чужеземные герои, такие как Аркей, Кинарет и Зенитар, которые показались редгардам и знакомыми, и полезными. Остальных они называют «тобр'а» — ненужными."
 
# Herd-Mother
 herd_mother:0 "Конепоклонническ"
 herd_mother_adj:0 "Мать Табуна"
 herd_mother_adherent:0 "Табунщик"
 herd_mother_adherent_plural:0 "Табунщики"
 herd_mother_desc:1 "Слабо изученная конфессия, которой следует народ всадников, йокуданских скотоводов родом с острова Акос Касаз. Они почитают анимистический дух — Мать Табуна. Она направляет племя и защищает их обширные табуны лошадей. В сказаниях Мать Табуна скачет так быстро, что Мировой Змей не может её догнать, и потому она переживает гибель мира в конце каждого цикла."
