 druadach_cult:1 "Друадахск"
 druadach_cult_adj:1 "Культ Друадах"
 druadach_cult_adherent:1 "Друаид"
 druadach_cult_adherent_plural:1 "Друаиды"
 druadach_cult_desc:0 "Друадахские горы являются домом для каждого из народов Предела. Но для некоторых из них это не просто дом, но отеческая божественная фигура, которая в древние времена привела в эти земли предков предельцев. Жить там бывает непросто, но друаиды уверены, что горы всегда защитят своих жителей от худших из капризов Кин."
 druadach_cult_religious_symbol:0 "земляной фетиш"
 druadach_cult_religious_head_title:0 "Воплощение"
 druadach_cult_religious_head_title_name:0 "Дух Друадах"

 hircine_coven:1 "Хирсинистск"
 hircine_coven_adj:1 "Ковен Хирсина"
 hircine_coven_adherent:1 "Последователь Хирсина"
 hircine_coven_adherent_plural:1 "Последователи Хирсина"
 hircine_coven_desc:0 "В число Старых Богов входит много божеств, но некоторые кланы посвящают себя только определённым из них, например, Хирсину, Владыке Арены. В обществе этих предельцев особенно уважают оборотней, но не как одарённых Духом Охоты, а как тех, кто жертвует собой, чтобы лучше служить клану."
 hircine_coven_religious_head_title:0 "Ковен Хирсина"
 hircine_coven_religious_head_title_name:0 "Ковен Хирсина"

 malacath_coven:1 "Малакатистск"
 malacath_coven_adj:1 "Ковен Малаката"
 malacath_coven_adherent:1 "Последователь Малаката"
 malacath_coven_adherent_plural:1 "Последователи Малаката"
 malacath_coven_desc:0 "Некоторые кланы предельцев посвящают себя Малакату, Владыке Пепла и Костей. Это роднит их с орками и гоблинами Ротгара, однако, по мнению этих кланов, именно #italic они#! являются избранным народом Малаката, а предназначение гоблинкенов лишь в том, чтобы испытывать истинных детей Князя."
 malacath_coven_religious_head_title_name:0 "Ковен Малаката"
 malacath_coven_religious_head_title:0 "Ковен Малаката"

 namira_coven:1 "Намиристск"
 namira_coven_adj:1 "Ковен Намиры"
 namira_coven_adherent:1 "Последователь Намиры"
 namira_coven_adherent_plural:1 "Последователи Намиры"
 namira_coven_desc:0 "Предельцы считают Намиру Богиней Царства Духов. Наряду с Хирсином, Богом Царства Плоти, она является одним из наиболее значимых Великих Духов. Намира — первородная двойственность: жизнь и смерть, начало и конец, в равной мере дающая и отнимающая. Практики поклонения Намире разнятся, однако многие почитающие её предельцы устраивают ритуальные жертвоприношения."
 namira_coven_religious_head_title_name:0 "Ковен Намиры"
 namira_coven_religious_head_title:0 "Ковен Намиры"

 witchman_faith: "Колдовск"
 witchman_faith_adj: "Колдовская вера"
 witchman_faith_adherent: "Колдун"
 witchman_faith_adherent_plural: "Колдуны"
 witchman_faith_desc: "Западные предельцы поклоняются разнообразному пантеону богов, включающему эльфийских аэдра, унаследованных от прежних владык Диренни, местных духов и заимствованных чужеземных богов. Во главе пантеона стоит чародей-король Магнус — зодчий мира, властитель богов и образцовый правитель для королей-колдунов."
 witchman_faith_religious_head_title: "Верховный жрец"
 witchman_faith_religious_head_title_name: "Колдун"