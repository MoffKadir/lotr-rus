 minotaur_cult_desc:0 "Члены культа минотавров, представленные в основном кланом Грозного Рога, поклоняются Хирсину в его аспекте Отца Зверолюдей. В минотаврах они видят проявление более чистой формы оборотничества, застывшем пребывании в промежуточной форме между человеком и зверем."
