 innovation_giant_maa:0 "Покорители тундры"
 innovation_giant_maa_desc:0 "Кочевники тундры Скайрима вдвое выше среднего норда. Из-за столь внушительного роста и образа жизни, который он диктует, воинов у них немного, но каждый из них на редкость силён и могуч."
 
 
