 secure_heartlands_decision:0 "Установить контроль над центральными землями"
 secure_heartlands_decision_desc:0 "Чтобы претендовать на наследие Империи, сперва нужно овладеть её сердцем. Мне нужно объединить центральные Сиродила на берегах Румаре и усмирить их знать. Только так я смогу доказать, что я — [Select_CString(ROOT.Char.IsFemale, 'истинная', 'истинный' )] [ROOT.Char.GetTitleTierName|l] Сиродила."
 secure_heartlands_decision_tooltip:0 "Установить контроль над центральными землями"
 secure_heartlands_decision_confirm:0 "Сердце Империи наше!"
 secure_heartlands_decision_vassal_heartlands_positive_opinion:0 "Все прямые вассалы в Румаре имеют #P положительное#! мнение о вас"
 secure_heartlands_decision_full_control_imperial_isle:0 "Каждое графство на Имперском острове должно иметь уровень [Concept( 'control', 'контроля' )|E] не ниже 90"
 heartlands_secured_modifier_tooltip:0 "Каждое [de_jure|El] [county|El] в регионе [GetTitleByKey('k_heartlands').GetName] получит модификатор [GetModifier( 'heartlands_secured_modifier' ).GetNameWithTooltip|U] на 15 лет"
 
 rebuild_imperial_legion_decision:0 "Восстановить Имперский легион"
 rebuild_imperial_legion_decision_desc:0 "[GetScriptedCharacterByHistoryID( 'akavir_100' ).GetTitledFirstName] умер, и после его смерти Имперский город утратил контроль над своими легионами. Если я хочу вновь явить Тамриэлю мощь наших войск, придётся начинать с нуля…"
 rebuild_imperial_legion_decision_tooltip:0 "Восстановить Имперский легион"
 rebuild_imperial_legion_decision_confirm:0 "Сформировать Первый легион!"
 rebuild_imperial_legion_decision_1000_legionnaires_1:0 "У вас есть не менее #V 1000#! полностью укомплектованных [Concept( 'men_at_arms', 'профессионалов' )|E] типа [GetMaA('armored_legionaires').GetName]"
 rebuild_imperial_legion_decision_1000_legionnaires_2: "У вашего [Concept('primary_title', 'первого титула')|E] есть не менее #V двух#! [Concept('regiment', 'полков')|E] по #V 500#! [Concept( 'title_men_at_arms', 'титулярных профессионалов' )|E] типа [GetMaA('armored_legionaires').GetName] в каждом"
 rebuild_imperial_legion_decision_300_lc_1:0 "У вас есть не менее #V 300#! полностью укомплектованных [Concept( 'men_at_arms', 'профессионалов' )|E] типа [light_cavalry|El]"
 rebuild_imperial_legion_decision_300_lc_2: "У вашего [Concept('primary_title', 'первого титула')|E] есть не менее #V одного#! [Concept('regiment', 'полка')|E] из #V 300#! [Concept( 'title_men_at_arms', 'титулярных профессионалов' )|E] типа [light_cavalry|El]"
 rebuild_legion_court_position_tooltip:0 "Доступна [Concept( 'court_position', 'должность при дворе' )|E] — [GetCourtPositionType('akolouthos_court_position').GetName()]"

 recognise_dawn_court_decision:0 "Признать Двор Красоты Рассвета сиродильским культом"
 recognise_dawn_court_decision_desc:0 "Вера, которая прибыла с нами из Акавира, веками переплеталась с разнообразными религиями Сиродила, приспосабливаясь к нашему новому дому и принимая его Божеств. Пришло время признать Двор Красоты Рассвета тем, чем он является на самом деле — исконным сиродильским культом."
 recognise_dawn_court_decision_tooltip:0 "Признать Двор Красоты Рассвета"
 recognise_dawn_court_decision_confirm:0 "Мы — сиродильцы!"
 dawn_court_gain_spiritual_head:0 "[GetFaithByKey('court_dawnbeauty').GetAdjective]ая конфессия получит доктрины [GetFaithDoctrine('doctrine_spiritual_head').GetBaseName] ([head_of_faith|El]) и [GetFaithDoctrine('doctrine_clerical_succession_spiritual_fixed_appointment').GetBaseName]"

 become_pretender_emperor_decision:0 "Стать императором-военачальником"
 become_pretender_emperor_decision_desc:0 "Я — [ROOT.Char.GetTitleTierName|El] и [Select_CString(ROOT.Char.IsFemale, 'правительница', 'правитель' )] Имперского города, так почему бы мне не властвовать и над всей Империей? Ведь [Select_CString(ROOT.Char.IsFemale, 'императрица — это та, кто может', 'император — это тот, кто может' )] поддержать свои притязания силой!\n\nПора показать им, на что я [Select_CString(ROOT.Char.IsFemale, 'способна', 'способен' )]!"
 become_pretender_emperor_decision_tooltip:0 "Провозгласить себя императором"
 become_pretender_emperor_decision_confirm:0 "Империя принадлежит мне!"
 become_pretender_emperor_decision_effect:0 "Будет создан [title|El] Империя [pretender_empire_house.GetBaseNameNoTooltip]. Он станет вашим [Concept( 'primary_title', 'первым титулом' )|E]"
 become_pretender_emperor_decision_title_break:0 "#N Вы провозгласите себя [Select_CString(ROOT.Char.IsFemale, 'императрицей', 'императором' )], но далеко не все признают ваши претензии. Если ваш [legitimacy_level|El] окажется ниже #V 4#! к моменту смерти, [title|El] Империя [pretender_empire_house.GetBaseNameNoTooltip] будет уничтожен. Все [vassals|El], не являющиеся [de_jure|El] вассалами других ваших титулов, получат независимость.#!"
 become_pretender_emperor_decision_title_break_attrebus:0 "#N Вы провозгласите себя императором, но далеко не все признают ваши претензии. Если ваш [legitimacy_level|El] окажется ниже #V 4#! к моменту смерти, тогда ваш [title|El] [GetTitleByKey('e_sosildor_empire').GetName] будет уничтожен. Все [vassals|El], не являющиеся [de_jure|El] вассалами других ваших титулов, получат независимость.#!"
 become_pretender_emperor_decision_effect_opinion:0 "Правители титулов ранга [Concept( 'kingdom', 'королевства' )|E] в регионе [GetGeographicalRegion('mundus_tamriel_cyrodiil').GetName] #n не одобрят этого#!"
 PRETENDER_EMPIRE_TITLE_NAME:0 "Империя [pretender_empire_house.GetBaseNameNoTooltip]"
 PRETENDER_EMPIRE_TITLE_NAME_ADJ:0 "[pretender_empire_house.GetBaseNameNoTooltip]ск"

 reunite_cyrodiil_decision:0 "Реформировать Сиродильскую Империю"
 reunite_cyrodiil_decision_desc:0 "Слишком долго Сиродил был разделён, а некогда могущественная Империя — сведена к разрозненным провинциям и враждующим лордам. Рубиновый Трон, престол императоров прошлого, взывает к [Select_CString(ROOT.Char.IsFemale, 'достойной правительнице', 'достойному правителю' )] — и я откликнусь."
 reunite_cyrodiil_decision_tooltip:0 "Восстановить Сиродильскую Империю"
 reunite_cyrodiil_decision_confirm:0 "Империя есть закон!"
 reunite_cyrodiil_decision_no_nibenay:0 "Титул [GetTitleByKey('e_nibenay').GetName] не имеет владетеля"
 reunite_cyrodiil_decision_no_colovia:0 "Титул [GetTitleByKey('e_colovian_estates').GetName] не имеет владетеля"
 reunite_cyrodiil_decision_no_potentate:0 "[GetTitleByKey('e_potentate').GetName] не имеет владетеля"
 reunite_cyrodiil_decision_secured_heartlands:0 "Вы приняли [decision|El] #V Установить контроль над центральными землями#!"
 reunite_cyrodiil_decision_cyrodiilic_cult:0 "Ваша конфессия — [GetFaithDoctrine('special_doctrine_cyrodiilic_cult').GetBaseName]"
 restore_cyrodiil_percentage_66:0 "Вы контролируете не менее #V 66%#! [Concept( 'counties', 'графств' )|E] в регионе [GetGeographicalRegion('mundus_tamriel_cyrodiil').GetName] (Сейчас: [SCOPE.ScriptValue('cyrodiil_decision_region_owned_percent_value')|0]%)"
 restore_cyrodiil_percentage_75:0 "Вы контролируете не менее #V 75%#! [Concept( 'counties', 'графств' )|E] в регионе [GetGeographicalRegion('mundus_tamriel_cyrodiil').GetName] (Сейчас: [SCOPE.ScriptValue('cyrodiil_decision_region_owned_percent_value')|0]%)"

 restore_tamriel_empire_decision:0 "Восстановить Тамриэльскую Империю"
 restore_tamriel_empire_decision_desc:0 "Вернув Сиродил и наши прежние провинции под имперский контроль, я смогу по праву провозгласить Империю восстановленной!"
 restore_tamriel_empire_decision_confirm:0 "АЗ ЕСМЬ ТАМРИЭЛЬ ПРИШЕДШИЙ."
 restore_tamriel_empire_de_jure:0 "Каждое [Concept('empire', 'верховное королевство')|E] во всех полностью контролируемых [Concept('region', 'регионах')|E] станет [de_jure|El] [Concept('vassal', 'вассалом')|E] титула [GetTitleByKey('h_tamriel').GetName]"
 restore_tamriel_empire_decision_tooltip:0 "Восстановить [GetTitleByKey('h_tamriel').GetName]"

 proclaim_third_era_decision:0 "Провозгласить Третью эру"
 proclaim_third_era_decision_confirm:0 "Тамриэль объединён!"
 proclaim_third_era_decision_desc:0 "Слишком долго разобщённые народы Тамриэля оставались разделёнными. Теперь, когда все провинции объединены под властью одного правителя, можно провозгласить новую Империю, что величественнее всех прежних." #PLACEHOLDER
 proclaim_third_era_decision_effect_tooltip:0 "#bold Да начнётся Третья эра#!."