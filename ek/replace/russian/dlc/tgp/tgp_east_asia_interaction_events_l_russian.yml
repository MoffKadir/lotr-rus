#EK Edit: Devaraja —> lord
 tgp_east_asia_interaction_events.0010.desc: "Отныне я служу [Select_CString(leaving_tributary.GetSuzerain.IsFemale, 'другой леди', 'другому лорду' )]. [Select_CString(leaving_tributary.GetSuzerain.IsFemale, 'Она', 'Он' )] покажет нам истинный путь.\n\nДа здравствует [leaving_tributary.GetSuzerain.GetName]!"
 tgp_east_asia_interaction_events.0020.desc: "[Select_CString(recipient.IsFemale, 'Моя леди', 'Мой лорд' )] [Select_CString(recipient.IsFemale, 'сумела', 'сумел' )] найти нужные слова.\n\nПозвольте послужить вам еще немного."
 tgp_east_asia_interaction_events.0025.desc: "Меня не так легко обмануть, я вижу вашу ложь насквозь!\n\nЯ ожидаю большего от [Select_CString(recipient.IsFemale, 'своей леди', 'своего лорда' )]!"
 tgp_east_asia_interaction_events.0035.desc: "[Select_CString(ROOT.Char.IsFemale, 'Вынуждена', 'Вынужден' )] сообщить, что я храню верность своему лорду и никогда [Select_CString(recipient.GetSuzerain.IsFemale, 'ей', 'ему' )] не изменю.\n\nВпредь не беспокой нас."
