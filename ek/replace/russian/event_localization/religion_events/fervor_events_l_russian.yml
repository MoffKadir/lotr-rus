 fervor.2002.desc.diligent: "[virtuous_theocrat.Custom('GetCouncilOrTitleName')] [virtuous_theocrat.GetFirstName] уже [Select_CString(virtuous_theocrat.IsFemale, 'вошла', 'вошел' )] в легенды своей тягой к неустанному труду. Лишь [ROOT.Char.GetFaith.HighGodName] имеет для н[virtuous_theocrat.GetHerHis] значение. \n\nНесмотря на высокое положение, [virtuous_theocrat.GetFirstNameNoTooltip] не боится пачкать руки и выполняет даже самую изнурительную работу, как и должен поступать каждый истинный [ROOT.Char.GetFaith.GetNameNoTooltip|l]ий подвижник."
 