l_english:
 #ERAS
 culture_era_nativity: "Merethic Era"
 culture_era_nativity_desc: "As time became linear, the people of Tamriel slowly emerged and evolved. The [Glossary( 'Merethic Era', 'MERETHIC_GLOSS' )] saw the rise and fall of many local kingdoms and hegemonies. Cultures as Tamriel knows them today began to form, split, and merge.\n\nOnly innovations related to [nativity_regions|E] can be found in this era."
 culture_era_tribal: "Empire of Men"
 culture_era_tribal_desc: "When the first Kingdoms and Empires were formed, and most of Tamriel was settled. Cyrodiil was seat first to one and then to another Empire."
 culture_era_early_medieval: "Early Interregnum"
 culture_era_early_medieval_desc: "The Akaviri Potentate of Cyrodiil was not made to last. It too was doomed to fall, and Tamriel shattered afterwards."
 culture_era_high_medieval: "Time of the Pretenders"
 culture_era_high_medieval_desc: "Regional hegemonies are formed in most parts of the world, claiming to be the sole inheritors of the old Imperial authority."
 culture_era_late_medieval: "Unification Wars"
 culture_era_late_medieval_desc: "Every great era has to end. The Unification Wars were a time of great conflict and of increasing centralization, as most of Tamriel would come under the rule of a single Empire."
