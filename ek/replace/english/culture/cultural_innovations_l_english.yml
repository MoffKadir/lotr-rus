 innovation_plate_armor: "Trip Hammers"
 innovation_plate_armor_desc: "Steady improvements in engineering have allowed us to partially automate the production of arms and armor with the use of sophisticated trip hammers. With this development, we will be able to produce much higher quantities of suits of full-body armor to protect our troops in battle. "

 ### Vanilla renames
 innovation_advanced_bowmaking: "Crossbows"
 innovation_advanced_bowmaking_desc: "While some ancient crossbows can be found deep within Dwemer ruins, the poor attempts at replicating them tended to produce inferior results compared to the good old bow and arrow. But recent advances in bolt forging and mass production of both the projectile and the base weapon make it possible to field cohorts using these deadly weapons."
 innovation_catapult: "Ballistas"
 innovation_catapult_desc: "While not very effective against walls and towers, large ballistas are a simple way of delivering ammunition into a besieged city without putting our own forces at too much risk."
 innovation_cranes_desc: "A forgotten marvel of engineering, the Remans used tread-wheel cranes to great effect when building their empire, and so too shall we."
 innovation_crop_rotation: "Plantations"
 innovation_crop_rotation_desc: "From the Saltrice plantations of the Deshaan to the vineyars of Auridon, agriculture in Tamriel has long progressed beyond subsistence farming and contributes to a sophisticated network of trade and urbanization."
 innovation_development_03_desc: "The great cities of Alinor, Mournhold, and the Imperial Isle have long stood out as relics of a great, unmatchable legacy. As our infrastructure and population grow, we finally have the means to develop new settlements which rival these ancient urban centers."
 innovation_horseshoes: "Military Roads"
 innovation_horseshoes_desc: "From the Hestra-Ways to the Imperial Highways, many Emperors and Potentates understood the value of a solid road network. While the last decades were not kind to this crumbling architecture, their repair and maintenance should be among our top priorities."
 innovation_muladi: "Warm Sands"
 innovation_table_of_princes: "Velothi Councils"
 innovation_table_of_princes_desc: "The Velothi clans have been led by their wisest and oldest members ever since they followed the prophet Veloth from Alinor."
 # Condottieri
 innovation_condottieri_desc: "During the Interregnum, Colovia became a popular destination for mercenaries. Local companies compete with Redguard, Nord, Bosmer, and even Breton mercenaries for the opportunity to work for the kings of the West."