 ep3_contract_event.0565.desc.failure: "Still, the howling, the clattering of thrown dishes and stools, the hard blows ring in my ears. I furiously scrub at my hands, but this stream cannot rinse away the marks of failure.\n\nWhat a mess. [councillor.GetTitledFirstName] lives, and my quest involving [task_contract_employer.GetTitledFirstName] is void. I should not tarry long here, else vengeance from one source or another may find me."
 ep3_contract_event.0581.a: "I have a quest to turn in."
 ep3_contract_event.0581.b: "It is a tempting offer..."

