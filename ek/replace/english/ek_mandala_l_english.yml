 tgp_east_asia_decision_events.0010.desc: "Sometimes enlightenment can come from the most unsuspecting sources.\n\nThe Mane way of ruling a realm resonates with me on a... higher plane. Surely my existence serves a grander purpose, to unite the realm under my divine and benevolent rule.\n\n#EMP 'All hail Mane [ROOT.Char.GetFirstNameNoTooltip]'#! has a nice ring to it..."
