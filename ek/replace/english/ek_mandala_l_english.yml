 game_concept_mandala: "Mane"
 game_concept_mandala_desc: "Under the $game_concept_mandala$ [government_form|E], the [domain_limit|E] and amount of [direct_vassals|E] are limited. Instead the [liege|E] and [suzerain|E] are reliant on [tributaries|E] for expanding their realm. \n\nA Mane ruler can aspire to be seen as a God King and then relies on [mandala_radiance|E] to acquire and keep tributaries.\n\nIt is also up to the ruler, to maintain [opinion|E] and grow relations with their Tributaries in an effort to keep them long-term. On succession Tributaries may scatter unless the ruler can proves to be a worthy [mandala_succesor|E]."
 game_concept_mandalas: "Manes"
 game_concept_mandala_government: "Mane Government"
 game_concept_mandala_succession: "Mane Succession"
 game_concept_mandala_trials: "Mane Trials"
 game_concept_mandala_succesor: "Mane Successor"
 game_concept_mandala_radiance: "Mane Radiance"
 game_concept_mandala_radiance_desc: "The magnetism to attract and maintain [subjects|E] for a [mandala|E] [ruler|E] is referred to as Mane Radiance. It is a blend of their [piety_level|E], #V [GetBuilding('mandala_capital_01').GetTypeName]#! [great_building|E] level as well as [mandala_aspect|E] level.\n\nHigher rewards, more Subjects and more power await those who combine the three to become more Radiant."
 game_concept_mandala_decree: "Mane Decree"
 game_concept_mandala_decrees: "Mane Decrees"
 game_concept_mandala_decree_desc: "The $game_concept_mandala_decrees$ are the three Decrees mandated by the [mandala|E] [ruler|E] — signified by [prosperity_decree|E], [expansion_decree|E] and [reverence_decree|E].\n\nGenerally the Mane realm has a very centralized authority, where the power over [subjects|E] and [laws|E] lies with the associated Ruler who can change them as required with little to no objection from its denizens."
 game_concept_mandala_decree_reverence_desc: "The [GetLaw('mandala_decree_reverence').GetName] mandates that the [mandala|E] [subjects|E] focus their efforts on furthering spirituality and worship.\n\n[pilgrimages|E], rituals and [piety|E] are the cornerstones of this Mane Decree."
 game_concept_mandala_aspect: "Mane Aspect"
 game_concept_mandala_aspects: "Mane Aspects"
 game_concept_mandala_ritual: "Mane Ritual"
 game_concept_mandala_rituals: "Mane Rituals"
 game_concept_mandala_ritual_desc: "Mane Rituals are tasks that appear occasionally for [mandala|E] [rulers|E] — it is a sign that a particular part of your [realm|E] is in need of your guidance and divine uplifting.\n\nBeing more skilled in your [mandala_aspect|E] will increase any gains from making appearances for your [subjects|E]."
 game_concept_mandala_ritual_tier: "Mane Ritual Tier"
 tributary_mandala: "Mane Tributary"
 tributary_mandala_desc: "A Mane [tributary|E] provides their [suzerain|E] with [gold|E], [levies|E] or even [piety|E] on a regular basis. The [tributary_contract|E] is inherited upon succession.\n\n$tributary_mandala_common_desc$"
 tributary_mandala_tribal_desc: "A tribal Mane [tributary|E] provides their [suzerain|E] with [gold|E], [levies|E] or even [prestige|E] on a regular basis. The [tributary_contract|E] is inherited upon succession.\n\n$tributary_mandala_common_desc$"
 turn_subject_into_mandala_interaction: "Invite to Become Mane"
 tgp_east_asia_interaction_events.1003.desc: "It is time for [recipient.GetPrimaryTitle.GetBaseNameNoTier] to  truly become part of the [actor.GetPrimaryTitle.GetAdjectiveNoTooltip] Mane. I am offering you to rule as a [actor.GetPrimaryTitle.GetTierAsNameNoTooltip], vested with the full support of my priesthood."
 ruined_my_temple_opinion: "Ruined My Mane Temple"
 mandala_plunder_cb_ended_invalid.desc: "The [war.GetName] has ended: either [attacker.GetShortUIName] [CharAreIs( attacker )] no longer an [aspect_of_destruction|E] [mandala|E] [ruler|E] with a planned [great_project|E], or [defender.GetShortUIName] [CharAreIs( defender )] no longer a Mane Ruler."
 mandala_raze_capital_structure_cb_ended_invalid.desc: "The [war.GetName] has ended: either [attacker.GetShortUIName] [CharAreIs( attacker )] no longer a [mandala|E] [ruler|E] with an un[ruined|E] Capital, or [defender.GetShortUIName] [CharAreIs( defender )] no longer a Mane Ruler with an unruined Capital."
