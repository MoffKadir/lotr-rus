 action_lesson_tgp_playtest_intro_mandala_desc: "Mane is a special Government focusing on Piety and Tributaries. Open this for an introduction to this government."
 lesson_tgp_playtest_intro_mandala_step_intro: "Mane"
 lesson_tgp_playtest_intro_mandala_step_government: "Mane Government"
 lesson_tgp_playtest_intro_mandala_step_government_desc: "Your powerbase comes from a more fluid network of [tributaries|E], with only a few more permanent [vassals|E].\n\nThis means that you can 'steal' other Mane [ruler|E]'s Tributaries, for example by using the $offer_tributary_status_interaction|V$ [character_interaction|E].\n\nReligion also plays a central role in the [mandala_government|E]. In order to perform many actions central to the government, you must spend [piety|E]."
