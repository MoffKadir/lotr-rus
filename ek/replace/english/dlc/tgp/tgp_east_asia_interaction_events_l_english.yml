#EK Edit: Devaraja —> lord
 tgp_east_asia_interaction_events.0010.desc: "I serve another lord now. One that will show us the true way.\n\nAll hail [leaving_tributary.GetSuzerain.GetName]!"
 tgp_east_asia_interaction_events.0020.desc: "My lord makes a compelling argument.\n\nAllow us to serve, if only for a while longer."
 tgp_east_asia_interaction_events.0025.desc: "I see through your petty lies and will not be coerced so easily!\n\nI expect more from my lord!"
 tgp_east_asia_interaction_events.0035.desc: "I regret to inform you that my faith remains with my true lord, [recipient.GetSuzerain.GetTitledFirstName].\n\nBother us no longer."
