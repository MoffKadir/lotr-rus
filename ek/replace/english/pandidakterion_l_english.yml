 pandidakterion_university_modifier: "Imperial University"
 pandidakterion_university_modifier_desc: "The Imperial University, founded in 2780 by Emperor Kastav and recently re-founded, is renowned for producing qualified bureaucrats that support the workings of the Imperial court.\nThe following [councillor_tasks|E] are more effective:\n$BULLET_WITH_TAB$[domestic_affairs|E]\n$BULLET_WITH_TAB$[promote_culture|E]\n$BULLET_WITH_TAB$[organize_levies|E]\n$BULLET_WITH_TAB$[espionage|E]\n$BULLET_WITH_TAB$[fabricate_claim|E][AddLocalizationIf( HasDlcFeature( 'wards_and_wardens' ), 'pandidakterion_adult_education_bonus')]"
 
 refounded_pandidakterion_memory: "Refounded the Imperial University"
 refounded_pandidakterion_memory_desc: "I refounded the Imperial University"
 refounded_pandidakterion_memory_desc_second_perspective: "you refounded the Imperial University"
 refounded_pandidakterion_memory_desc_third_perspective: "[owner.GetTitledFirstName] refounded the Imperial University"
 
 adult_education_has_pandidakterion_desc: "\n#P +++ The Imperial University#!"

 refound_pandidakterion_decision: "Refound the Imperial University"
 refound_pandidakterion_decision_desc: "Emperor [GetScriptedCharacterByHistoryID( 'reman_101' ).GetFirstName] founded the Imperial University in 1E 2780, and it quickly became one of the largest centers of study in the Empire. The sponsorship of the university eventually decreased with his successors, who preferred to use the Empire's treasury for military endeavours. The situation did not improve under the Potentates and the Imperial University eventually became overshadowed by the new Arcane University.\n\nIf we want to return the Imperial University to the forefront of Tamrielic knowledge, the institution needs to be renovated and reorganized."
 refound_pandidakterion_decision_tooltip: "Expand and reorganize the Imperial University"
 pandidakterion_tt: "You own the [GetTitleByKey('c_imperial_city').GetName]"