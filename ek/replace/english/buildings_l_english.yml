l_english:

 building_type_generic_silver_mines_01_desc:0 "Silver is a precious metal used by blacksmiths, craftsmen and jewelers throughout history in innumerable ways. Its value, combined with its alchemical and magical properties made silves mines quite common all over Tamriel and beyond."
 building_type_generic_gold_mines_01_desc:0 "Gold is a precious metal almost everywhere, used in metalworking, currency, arts and many other fields. This mine is a steady source of the yellow, shining metal, bringing pure wealth to its owner."

 building_type_qanats_01: "$building_qanats_06$"
 building_type_qanats_01_desc: "$building_qanats_05_desc$"
 building_qanats_01: "Ice Pits"
 building_qanats_01_desc: "These dome-shaped ice houses combine a subterranean storage area with heat-resistant construction materials to create an insulated space that functions as an evaporative cooler." 
 building_qanats_02: "Cistern"
 building_qanats_02_desc: "These arched structures, half underground, are used to store large volumes of water."
 building_qanats_03: "Windcatchers"
 building_qanats_03_desc: "These tall towers are connected to cisterns and other buildings. Through openings in the direction of the prevailing winds, they catch air flows which are then circulated in their interiors to provide cooling."
 building_qanats_04: "Underground Waterways"
 building_qanats_04_desc: "The first stage of a subterranean aqueduct system, the waterways are a series of vertical shafts, connected by a gently sloping tunnel, that taps into a source of underground water and delivers it to the surface."
 building_qanats_05: "Small Qanats"
 building_qanats_05_desc: "Qanats are underground aqueducts designed to mitigate loss of water from evaporation. While quite small at this stage, this system still provides a significant benefit to agriculture."
 building_qanats_06: "Qanats"
 building_qanats_06_desc: "The underground aqueducts have been expanded, connecting them to local cisterns, ice houses and irrigation systems."
 building_qanats_07: "Large Qanats"
 building_qanats_07_desc: "This large system of underground aqueducts stretches for several miles, providing a formidable water supply for both farmers and townspeople."
 building_qanats_08: "Massive Qanat System"
 building_qanats_08_desc: "Flowing into countless underground cisterns, irrigation channels, ice houses, bath houses, fountains and drinking wells, this formidable subterranean aqueduct system is a true testament to ingenuity."

 building_type_murex_farm_01: "Polychroma Fisheries"
 building_type_murex_farm_01_desc: "Nibenay's artisans use the luminous nacre of the rare Polychroma clam to create a most exquisite ruby-red dye, coveted across Cyrodiil and beyond."
 building_murex_farm_01: "Polychroma Harvesters"
 building_murex_farm_01_desc: "A thriving Polychroma fishing industry has been established along the Niben. It provides a modest but steady income through the sale of harvested shellfish."
 building_murex_farm_02: "Polychroma Processing Center"
 building_murex_farm_02_desc: "This center scrapes the Polychroma nacre and mixes it with secretions of a small local crustacean. This produces Adabala, the sacred red dye of the Ruby Throne."
 building_murex_farm_03: "Dye Distillery"
 building_murex_farm_03_desc: "The specialized destillery refines the nacreous element of the Adabala to delicately split sunlight into constellations in imitation of the Amulet of Kings."
 building_murex_farm_04: "Drying Flats"
 building_murex_farm_04_desc: "An open-air courtyard expedites the dye oxidation process. This reduces the production time for the red dye, ensuring a more efficient workflow."
 building_murex_farm_05: "Master Dyers Guild"
 building_murex_farm_05_desc: "The Master Dyers Guild, renowned for achieving the perfect shade of Adabala red, enhances the precision of textile dyeing. This results in consistently high-quality garments."
 building_murex_farm_06: "Silk Weaving Temple"
 building_murex_farm_06_desc: "This temple specializes in weaving Ancestor Moth silk for dyeing. The monks produce garments of exceptional quality, increasing their trade value."
 building_murex_farm_07: "Imperial Textile Workshop"
 building_murex_farm_07_desc: "The Imperial workshop focuses on mass production of the Adabala red-dyed textiles, significantly boosting income from the sale of these prestigious garments."
 building_murex_farm_08: "Temple of the Dragon'd Blood"
 building_murex_farm_08_desc: "A magnificent temple covered in wall-to-wall tapestries in the scintillant Adabala, depicting scenes of piety and glory from history. The steep summit of dye mastery and wealth."