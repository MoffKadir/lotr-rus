l_english:
 ek_spymaster_task.0001.t: "Espionage: Necromancer"
 ek_spymaster_task.0001.secret_necromancer.shared: "\n\nIt seems [secret_holder.GetSheHe] is also skilled in the necromantic arts, and regularly uses [secret_holder.GetHerHis] skills to manipulate the dead."
 ek_spymaster_task.0001.secret_necromancer: "\n\nI have damning evidence pointing at [secret_holder.GetHerHis] use of Necromancy, a true perversion of the cycle of life and death!"
 ek_spymaster_task.0001.a.necromancer: "We have a lot to learn from one another."
 ek_spymaster_task.0001.a: "Can't the dead rest in peace?!"