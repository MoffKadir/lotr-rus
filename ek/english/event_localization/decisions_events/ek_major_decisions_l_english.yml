l_english:
 ek_major_decisions.0001.t: "The Might of the [ROOT.Char.GetCulture.GetNameNoTooltip]"
 ek_major_decisions.0001.desc: "Our kind has rejected the mere idea of standard armies for centuries. We relied on outnumbering our enemies with clubs and other salvaged weapons, outfitting our soldiers with whatever was available at the moment.\n\nThis time must pass. It will take time and effort, and our people might disapprove of us turning back on our traditions, but we cannot rely on wave after wave of poorly-equiped warriors anymore.\n\nWe must train our soldiers, we must equip them with proper gear, and we must create an elite force that will be able to win our wars.\n\nThe survival of our people depends on it."
 ek_major_decisions.0001.a: "It is but the start, and we must go ever further!"
 ek_major_decisions.0001.b: "For the [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip]!"

 ek_major_decisions.0002.t: "The [reformer.GetCulture.GetNameNoTooltip] Culture - Rising Might"
 ek_major_decisions.0002.desc: "For a long time the [reformer.GetCulture.GetNameNoTooltip] warbands were nothing more than unorganised raiders, but under [reformer.GetTitledFirstName] this has now changed. [reformer.GetSheHe|U] has succeeded in reorganising the military so that [reformer.GetCulture.GetNameNoTooltip]s are now able to form proper armies.\n\n"
 ek_major_decisions.0002.desc.same_kin: "This may even lead others of our kind to take arms and claim the land they rightfully inhabit. Those who oppose us will have to deal with an increased number of [reformer.GetCulture.GetNameNoTooltip] uprisings."
 ek_major_decisions.0002.desc.other_kin: "This could lead to an increase in the strength and numbers of [reformer.GetCulture.GetNameNoTooltip] uprisings in the lands they claim as their home, so we may have to be prepared for that."
 ek_major_decisions.0002.a: "This is concerning."
 ek_major_decisions.0002.b: "A great day for our kind!"

 ek_hammerfell.0003.t: "Redguards United: the Constitution"
 ek_hammerfell.0003.desc.crown: "The peoples of Hammerfell have, since the first Yokudan beachhead, looked to the sortitions of the stars. When they look to the ruler of their new united Hammerfell, they expect me to accept the status that flows from their own recognition, and the stars'. They want me to crown me president. They want me to guard the #bold Redguard Republic#!."
 ek_hammerfell.0003.desc.forebear: "With Hammerfell united, it is time to cast off the chains of sortition. No longer are we bound by justiciability and electoral ballots; now, we are truly united. I am free to form the first true #bold Redguard Union#! and be its leader."
 ek_hammerfell.0003.desc.imperial: "\n\nBut tradition is not the only guide. The Useful Gods delivered us neighbours who could show us another way, one which binds subjects together under the name of Empire. This is new to the Redguards, but the Redguard is no stranger to change. I could adopt this new way of ruling, and become Emperor of the #bold Redguard Empire.#!"
 ek_hammerfell.0003.a: "We, the people."
 ek_hammerfell.0003.a.tooltip: "[GetTitleByKey('h_redguard_republic').GetName] will keep its original name. Your character will use $title_crown_redguards_male$ title."
 ek_hammerfell.0003.b: "The blessing of liberty."
 REDGUARD_UNION: "Redguard Union"
 ek_hammerfell.0003.b.tooltip: "[GetTitleByKey('h_redguard_republic').GetName] will be renamed to the $REDGUARD_UNION$. Your character will use $title_king_of_redguard_male$ or $title_king_of_redguard_female$ title."
 ek_hammerfell.0003.c: "We ordain and establish."
 REDGUARD_EMPIRE: "Redguard Empire"
 ek_hammerfell.0003.c.tooltip: "[GetTitleByKey('h_redguard_republic').GetName] will be renamed to the $REDGUARD_EMPIRE$. Your character will use $hegemon$ or $hegemon_female$ title."
 ek_hammerfell.0003.d: "The President shall command."
 ek_hammerfell.0003.d.tooltip: "[GetTitleByKey('h_redguard_republic').GetName] will keep its original name. Your character will use $title_president_redguards_male$ title."
 ek_hammerfell.0003.e: "Executive power shall vest."
 ek_hammerfell.0003.e.tooltip: "[GetTitleByKey('h_redguard_republic').GetName] will be renamed to the $REDGUARD_UNION$. Your character will use $title_dictator_redguards_male$ title."