l_english:
 ek_religious_decision.1013.t: "Communion with the Totem Spirit"
 ek_religious_decision.1013.desc.beginning: "I have spent many nights eagerly waiting for our Wise-Woman to finish her communion.\n\nOver time I nearly forgot about it, and after days of ritual trance she finally summoned me, telling she was confident in her prediction. "The signs are clear", she started."
 ek_religious_decision.1013.desc.great_battle: ""A great battle lies in wait for our Clan.""
 ek_religious_decision.1013.desc.new_friends: ""It is time for our Clan to heal old wounds and make new friends.""
 ek_religious_decision.1013.desc.hard_work: ""Hard work will lead our Clan to great fortunes in the future.""
 ek_religious_decision.1013.desc.betrayal: ""Our allies are not who we thought they were.""
 ek_religious_decision.1013.desc.new_beginnings: ""It is a time for new beginnings and open minds.""
 ek_religious_decision.1013.a: "Great. Thanks, Wise-Woman."

 ek_religious_decision.1014.t: "A Daedric Deal"
 ek_religious_decision.1014.desc: "It took me considerable effort, cost and time, but I've finally have been able to summon Sanguine to my quarters to renegotiate our deal.\n\nHe stands before me with a huge grin on his awe-inspiring face. "Tired, mortal? Is my curse too harsh on your poor fragile soul? Will you now keep your end of the bargain?""
 ek_religious_decision.1014.c: "With all my heart!"

 ek_religious_decision.1017.t: "Communion with an Ancestor Spirit"
 ek_religious_decision.1017.desc: "My [Concept( 'realm_priest', GetPlayer.GetCouncillorPosition( 'councillor_court_chaplain' ).GetPositionName )], [realm_priest.GetShortUIName], takes me to the ancestral resting place of my House.\n\nThe walls were decorated with ancient prayers and the names of each and every ancestor I have. Some of them were familiar, others not so much. I've spent many moons learning their stories, as such is our tradition, and now is the time to pick one of them.\n\nIn this moment, I tremble with anticipation, knowing full well that I will be judged by the spirit I chose."
 ek_religious_decision.1017.a: "Please, hand me the incenses."
 ek_religious_decision.1017.b: "How does the prayer go again?"
 ek_religious_decision.1017.c: "Let's get on with this already."
 ek_religious_decision.1017.d: "On second thought, let us avoid disturbing them..."
 ek_religious_decision.1017.a.tt.1: "Your ancestors will #P definitely bless#! this communion."
 ek_religious_decision.1017.a.tt.2: "Your ancestors will take notice of your piety."
 ek_religious_decision.1017.b.tt: "Your ancestors will #P likely bless#! this communion"
 ek_religious_decision.1017.c.tt: "Your ancestors will #N likely be offended#!, but the sheer audacity might instead #P impress someone else#!"
 ek_religious_decision.1017.d.flavor: "The Ancestors are not to be trifled with."

 ek_religious_decision.1018.desc.start_not_very_sinful: "I say my prayers and focus on [ancestor_spirit.GetFirstNameNoTooltip]'s spirit and presence."
 ek_religious_decision.1018.desc.start_very_sinful: "I begrudgingly spout my prayers, impatiently."
 ek_religious_decision.1018.desc: "\n\n"Sacred ancestor [ancestor_spirit.GetFirstNameNoTooltip], heed my call. I need your noble guidance!""
 ek_religious_decision.1018.desc.end_secret: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"I will aid you with the knowledge of a secret among your house. May this wisdom be useful to the glory of our line!""
 ek_religious_decision.1018.desc.end_bad: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. Suddenly, [ancestor_spirit.GetSheHe] answers me in a booming, angry voice.\n\n"How dare you disturb my rest? This world is not meant for me and you still summon me for your foolish inquiries? Begone and be cursed!""
 ek_religious_decision.1018.desc.end_dynasty: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"You worry yourself too much, [ROOT.Char.GetFirstNameNoTooltip]. I see that you've grown to be a great [ROOT.Char.GetTitleAsNameNoTooltip]. You honor my legacy and our lineage.""
 ek_religious_decision.1018.desc.end_diplo: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"You and me, my [ancestor_spirit.Custom2('RelationToMe', ROOT.Char)], share an understanding of what really builds relationships between people. Come closer, let us discuss proper diplomacy.""
 ek_religious_decision.1018.desc.end_stew: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"My [ancestor_spirit.Custom2('RelationToMe', ROOT.Char)], I was dying to tell you about some newfound business proposals...""
 ek_religious_decision.1018.desc.end_martial: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"There is much else to conquer, my [ancestor_spirit.Custom2('RelationToMe', ROOT.Char)], both in glory and in land...""
 ek_religious_decision.1018.desc.end_intrigue: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"Let me tell you the tales of secrecy and manipulation I've experienced in life...""
 ek_religious_decision.1018.desc.end_learning: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"Oh, how I envy you, my [ancestor_spirit.Custom2('RelationToMe', ROOT.Char)], for am I about to impart you the secret knowledge of the afterlife...""
 ek_religious_decision.1018.desc.end_magic: "\n\nThe smell of the incenses fill the air, and I see the face of my [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)] forming among the fumes. After hearing my pleas, [ancestor_spirit.GetSheHe] answers me in a faint voice.\n\n"I see that you have become a great mage, my [ancestor_spirit.Custom2('RelationToMe', ROOT.Char)]. Let me tell you all about my magical experiences.""
 ek_religious_decision.1018.desc.end_no_response: "\n\nAfter swearing I saw a face among the fumes, I waited for almost an hour with no answer to my prayers."
 ek_religious_decision.1018.secret: "That might be useful..."
 ek_religious_decision.1018.possessed: "What is happening to me!?"
 ek_religious_decision.1018.dynasty: "Thanks, [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)]."
 ek_religious_decision.1018.bad: "Why, [ROOT.Char.Custom2('RelationToMe', ancestor_spirit)]?"
 ek_religious_decision.1018.diplo: "Truly precious insights..."
 ek_religious_decision.1018.stew: "What's a #italic wasabi#!?"
 ek_religious_decision.1018.martial: "Fetch my armor!"
 ek_religious_decision.1018.intrigue: "... I understand."
 ek_religious_decision.1018.learning: "This has immense implications!"
 
 ek_religious_decision.1018.magic: "I've never heard about that spell!"
 ek_religious_decision.1018.no_change: "Did I say the right words?"
 ek_religious_decision.1018.no_change.zealous: "I must redouble my efforts!"
 
 ek_religious_decision.1019.t: "A Blighted Gift"
 ek_religious_decision.1019.desc: "As always, the Prince of Pestilence hears my pleas. I can hear his voice in my head, like skittering skeevers, and my skin is crawling under the very notion of his godly touch.\n\nIt is time to once again embrace the transformative power of illness and to revel in the form Peryite is choosing for it today."
 ek_religious_decision.1019.a: "I am ready"
 ek_religious_decision.1019.a.t: "Due to your level of [piety_level|E] Peryite will bless you with a minor disease."
 ek_religious_decision.1019.b: "I am ready"
 ek_religious_decision.1019.b.t: "Due to your level of [piety_level|E] Peryite will bless you with a disease of his choice"
 ek_religious_decision.1019.c: "I am ready"
 ek_religious_decision.1019.c.t: "Due to your level of [piety_level|E] Peryite will bless you with a disease of his choice, this can even start a minor epidemic."
 ek_religious_decision.1019.d: "I am ready"
 ek_religious_decision.1019.d.t: "Due to your level of [piety_level|E] Peryite will bless you with a disease of his choice, this can even start a major epidemic."
 ek_religious_decision.1019.e: "I am ready"
 ek_religious_decision.1019.e.t: "Due to your level of [piety_level|E] Peryite will bless you with a disease of his choice, this can even start an apocalyptic epidemic."

 ek_religious_decision.2001.t: "The Holy Site of [capital.GetNameNoTierNoTooltip]"
 ek_religious_decision.2001.desc: "For years my [ROOT.Char.GetFaith.GetAdjective] brethren have worshipped the divine around the settlement of [capital.GetNameNoTierNoTooltip], praying in small churches and forming small congregations.\n\nWith some work and religious will, I have managed to build the foundations of a new center of spirituality and religious worship in [capital.GetNameNoTierNoTooltip], and pilgrims from all over the province have already started to travel here.\n\nWord is now spreading among the faithful that [capital.GetNameNoTierNoTooltip] is now a proper Holy Site."
 ek_religious_decision.2001.a: "For the faithful!"
 fervor_gain_consecrated_holy_site: "Consecrated a new [holy_site|E]"