l_english:

 ############################
 #      ATTREBUS VICTORY    #
 ############################
 ek_attrebus_potentate.0001.t: "Attrebus Triumphant!"
 ek_attrebus_potentate.0001.desc: "At long last, I have broken the Akaviri Potentate. Its vassals have surrendered and acknowledged my supremacy. I had my doubts until the Potentate's own House Guard arrived in my camp, dragging their bound, erstwhile master behind them. Aixnieras was brought before me and forced to his knees. He resisted at first, but soon he submitted and kissed my banner.\n\n"Attrebus! Attrebus! Attrebus!" my men cheered, clanging weapons to shields. I planted my foot on Aixnieras' back, forcing him into the mud, and my soldiers cheered even louder: "ATTREBUS! ATTREBUS! ATTREBUS!"\n\nWe now march in triumph to the Imperial City, the seat of an Empire made weak by lesser men. The Eight gave me the strength to topple a tyrant, and they shall give me the strength to reforge Reman's realm. I have lived and fought for Cyrodiil, killed and bled for her Empire. All those years of blood have filled me with one belief."
 attrebus_potentate_cb_victory_zenas_allies_deal_ct: "[current_zenas_ally.GetFirstName] receives all the land held by the former Potentate within all the [de_jure|E] Duchies [current_zenas_ally.GetSheHe] currently holds land in and becomes your [vassal|E]"
 ek_attrebus_potentate.0001.a: "I alone can save Cyrodiil."
 
 ek_attrebus_potentate.0002.desc: "Cyrodiil is in shock! The Warlord [attrebus.GetFirstName], a zealot bent on destroying the Akaviri Potentate, seized the Imperial City and with it the crown of Cyrodiil!\n\nWhile it is said that the Elder Council should soon get in power, and become the ruling body of the Imperial Isles along with it most of the province, the young Warlord will still stay in control for a few years, to deal with the aftermath of the war...\n\nThe Warlord's hatred for the Akaviri is known by everyone, and some whisper that [attrebus.GetFirstName] might use this time to further his own ambitions..."
 ek_attrebus_potentate.0002.a: "What fate awaits the rest of Cyrodiil?"
 
 ek_attrebus_potentate.0064.t: "The Renewed Imperial Legion"
 ek_attrebus_potentate.0064.desc: ""My [ROOT.Char.GetTitleTierName], the work on restoring the Imperial Legions has been progressing well, but questions arise about its leadership. Your subjects expect you to relinquish direct control and appoint a new Grand Marshal."\n\nChoosing [imperial_legion_ec_loyalist.GetFirstName] would satisfy my new Nibenese subjects, but [imperial_legion_attrebus_loyalist.GetFirstName] followed me in my conquests, and ignoring him would upset my Colovian allies."
 ek_attrebus_potentate.0064.a: "[imperial_legion_ec_loyalist.GetFirstName] shall be the new Grand Marshal."
 attrebus_potentate_first_legion_ec_loyalist_desc: "This choice will upset your $colovian$ [subjects|E]"
 ek_attrebus_potentate.0064.c: "[imperial_legion_attrebus_loyalist.GetFirstName] shall continue to serve me as the Grand Marshal."
 attrebus_potentate_attrebus_anger_elder_council_desc: "This choice will upset your $nibenese$ [subjects|E]."
 
 ek_attrebus_potentate.0065.t: "The Tsaesci Act"
 ek_attrebus_potentate.0065.desc: "For centuries, Cyrodiil and most of Tamriel was ruled not by its native population, but by Tsaesci foreigners. While their service to the Reman Empire made them a worthy ally, their actions after the end of the Reman line have devastated most of Tamriel.\n\nNow, finally, we can make it right. The Akaviri Potentate had lost control over the other provinces over the last few decades, and the final blow has been dealt when Cyrodiil itself rose against them.\n\nThe only thing that is left to do is to ensure that never again should an Akaviri lord be allowed to rule over us...\nTo this end, the Tsaesci Act has been drafted and presented to the various lords of Cyrodiil. Any Tsaesci ruler immediately loses any right to any land, and every major Tsaesci settlement will be forcefully expelled from our land."
 ek_attrebus_potentate.0065.a: "Harsh, but necessary."
 
 ############################
 #      POTENTATE VICTORY   #
 ############################
 ek_attrebus_potentate.0101.t: "A Crushed Rebellion"
 ek_attrebus_potentate.0101.desc: "The upstart warlord [attrebus.GetFirstName] has been defeated. The lords who joined [attrebus.GetHerHis] cause have been forced to walk back to their home, their tail between their legs.\n\nAs the defeated general is brought to the Bastion, I can't help but feel both relief and intense worry... While the [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )] survives, our hold over the Province has been permanently damaged.\n\nOur victory has bought us some time, but who knows what the future holds..."
 ek_attrebus_potentate.0101.a: "A victory... Perhaps the turning point?"
 attrebus_potentate_potentate_win_colovian_estates_shattered: "The Colovian Estates are #v shattered#!, as Attrebus' failed rebellion marked the end of the confederacy."
 attrebus_potentate_potentate_win_only_control_heartlands: "After our victory over the Colovian lords, the Nibenese and other rulers of Cyrodiil who supported us #N have retracted their explicit vassalage#!.\nWe can keep the title of Potentate, #v but we will only keep control over the Heartlands#!."
 
 ek_attrebus_potentate.0102.desc: "The impossible happened. The Potentate, surrounded by all sides by our armies and our allies, managed to secure victory after victory, until we had no choice but to surrender. We have been brought to the Imperial City in chains, and we now rot in the Imperial dungeons, awaiting a trial from a Potentate that surely wish nothing but to see us dead.\n\nCyrodiil weeps, as the Snakes are still ruling her."
 ek_attrebus_potentate.0102.a: "This is a nightmare..."
 
 ek_attrebus_potentate.0103.desc: "[attrebus.GetFirstName]' rebellion was not meant to last. As the Potentate and the Warlord clashed in violent battles, the rulers of the Imperial City defeated time and time again the leader of the rebellion.\n\nAs [attrebus.GetFirstName] has been brought to the Imperial dungeons under heavy guard, it seems the Potentate, by defeating this immediate threat, bought [potentate.GetHerHim]self a sizeable amount of time.\n\nDespite the crushing victory, the various Nibenese lords that joined the Potentate due to their fear of another Colovian Emperor have decided to leave the grasp of [potentate.GetFirstName]. With only the support of the Imperial Isle and some parts of the Rumare bank, nobody expects the Potentate to last for very long."
 ek_attrebus_potentate.0103.a: "What fate awaits Cyrodiil, and the rest of the world?"
 
 ############################
 #      WAR INVALIDATED     #
 ############################
 ### Attrebus died
 ek_attrebus_potentate.0201.t: "The Death of a Warlord"
 
 ek_attrebus_potentate.0202.desc: "Fate can be cruel sometimes. We were so sure of ourselves, of our cause, of our victory, that we never thought how what would happen if we were to leave Mundus before we could crush the Potentate. But as news of our tragic end reaches the other Lords of Cyrodiil, it seems our cause falters.\n\nThe Potentate, hidden in the Imperial City, must surely laugh at our end. Our allies and subjects, who swore an oath to never stop fighting until the end, chose to get back to their castles and cities.\n\nWithout us to lead Cyrodiil, it seems our people will stay under the Potentate."
 ek_attrebus_potentate.0202.a: "No! They need me!"
 
 ek_attrebus_potentate.0203.desc: "The upstart warlord [attrebus.GetFirstName] has been defeated. The lords who joined [attrebus.GetHerHis] cause have been forced to walk back to their home, their tail between their legs. The [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )] survives, for now."
 
 ek_attrebus_potentate.0204.desc: "News from the Imperial Province! The Warlord [attrebus.GetFirstName], who was leading a rebellion against the Potentate of Cyrodiil, has just died. Without [attrebus.GetHerHis] leadership it seems [attrebus.GetHerHis] cause died out, as lords and subject get back to their castles and cities.\n\nNot all is good for the former Potentate however, as the lords that were supporting [potentate.GetHerHim] have retracted their support and do not recognize [potentate.GetHerHim] as their rightful Potentate anymore.\n\nTroubled times are still ahead, as all of Tamriel seems to fall to chaos..."
 ek_attrebus_potentate.0204.a: "An uneasy peace..."
 
 ek_attrebus_potentate.0251.t: "A Snake Decapitated"
 
 ek_attrebus_potentate.0252.desc: "It seems that our mortal enemy, [potentate.GetFirstName] was not meant to last. As our forces clashed, fate decided to take [potentate.GetHerHim] away from this world! Already the Nibenese lords decided to abandon this foolish cause, and in this chaos the Elder Council decided to step in and seize control of the Imperial Isle!\n\nAs our cause is now void, our allies decided to go back to their castles, and the confederacy that was to crush the Potentate has now dissolved peacefully.\n\nMany wonder what would have happened if we had been victorious before the death of the snake [potentate.GetFirstName], but that is a question better left to the Gods..."
 ek_attrebus_potentate.0252.a: "What about my destiny?"
 attrebus_potentate_potentate_death_colovian_estates_disband: "The #V Colovian Estates#! disband as our allies travel back to their homes and families."
 attrebus_potentate_potentate_death_elder_council_imperial_isle: "The #V Elder Council#! seizes control of the Imperial Isle, and one of their own now rules the Imperial City."
 
 ek_attrebus_potentate.0253.desc: "As the two titans [attrebus.GetFirstName] and [potentate.GetFirstName] were ready to set fire to Cyrodiil to crush the other, it seems that fate decided to find a somewhat peaceful resolution to the conflict.\n\nAs news of the death of [potentate.GetFirstName] reached the banks of the Rumare, the Elder Council dispatched envoys and small retinues to assume control over the important political buildings, before declaring the [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )] finally destroyed.\n\nAs the war is now over, allies of the Warlord are back to their castles, and the supporters of the late Potentate are hoping that nothing will happen to them..."
 ek_attrebus_potentate.0253.a: "A surprising peace..."

 ek_attrebus_potentate.0300.t: "The End of a Potentate"
 ek_attrebus_potentate.0300.desc: "With neither the Warlord [attrebus.GetFirstName] nor the Potentate [potentate.GetFirstName] in charge of the Cyrodiilic Potentate, supporters of both sides have decided to go back to their castles and cities.\n\nWith the Akaviri scourge removed from power and no obligations towards the colovian warlord, the Elder Council has decided to step in and have declared the Potentate null and void."
 ek_attrebus_potentate.0300.a: "What fate awaits Cyrodiil, and the rest of the world?"

 #############################
 #  POTENTATE FAMILY LAAMP?  #
 #############################
 ek_attrebus_potentate.0310.t: "Flames on the Horizon"
 ek_attrebus_potentate.0310.desc.intro.tower: "I stand on a white balcony, far above the Imperial City. Letting my gaze wander, I can see the declining city, the ruins of the outer districts and, on the horizon, the flames of [attrebus.GetFirstNamePossessive] army of locusts, coming to tear down everything the [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )] has built. The war is not going well."
 ek_attrebus_potentate.0310.desc.intro.generic: "I stand on a balcony, far above the capital. Letting my gaze wander, on the horizon I spot the flames of [attrebus.GetFirstNamePossessive] army of locusts, coming to tear down everything the [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )] has built. The war is not going well."
 ek_attrebus_potentate.0310.desc.nephew.sister: "\n\nEventually the calm voice of [adventurer.GetFirstName] interrupts the foreboding silence: "Uncle, you must hear me out. I know you too see the flames in the dusk and sense the smoke on your scales. I tried to convince my mother, but she is blind to the signs. If the Elementals wills it, I will face the night, but is there not nobility in survival?""
 ek_attrebus_potentate.0310.desc.nephew.generic: "\n\nEventually the calm voice of [adventurer.GetFirstName] interrupts the foreboding silence: "Uncle, you must hear me out. I know you too see the flames in the dusk and sense the smoke on your scales. If the Elementals will it, I will face the night, but is there not nobility in survival?""
 ek_attrebus_potentate.0310.desc.outro: "\n\nI ponder his words. Would sending him away be an admission of defeat? But it would only be for a little while, until this warlord is felled."
 ek_attrebus_potentate.0310.a: "Victory is assured! You will remain."
 ek_attrebus_potentate.0310.a.tt: "[adventurer.GetFirstName] will support you to the bitter end."
 ek_attrebus_potentate.0310.a.flavor: "Continue playing as [ROOT.Char.GetTitledFirstName]"
 ek_attrebus_potentate.0310.b: "Go through the sewers. Make haste for Nibenay."
 ek_attrebus_potentate.0310.b.tt: "[adventurer.GetFirstName] will flee the Imperial City alongside your family."
 ek_attrebus_potentate.0310.b.flavor: "Continue playing as [adventurer.GetFirstName], becoming an [adventurer|E]!"

 ek_attrebus_potentate.0311.t: "Escape from White-Gold"
 ek_attrebus_potentate.0311.desc: "I draw a breath of relief. We've made it to Lake Rumare unnoticed and chartered a small vessel at the [GetBuilding('imperial_city_harbor_01').GetName]. We have to get as far away from Cyrodiil as possible before the Warlord catches wind of our disappearance and sends his lackeys after us."
 ek_attrebus_potentate.0311.a: "Our flight must be swift, to Leyawiin."
 ek_attrebus_potentate.0311.flavor: "Having successfully escaped, you will now play as [adventurer.GetName]"
 
 ek_attrebus_potentate.0312.t: "The Shores of Topal Bay"
 ek_attrebus_potentate.0312.desc: "Arriving in [GetTitleByKey('b_leyawiin').GetNameNoTier], I am left to ponder my next move as my entourage stocks up on supplies. I stare into the endless blue of Topal Bay. We are foreigners on Tamriel, with no province to call our own. Where will my escape lead me?\n\nWe were once honoured guests in [GetTitleByKey('d_senchal').GetNameNoTier]. [GetBuilding('potentate_retreat_01').GetName], our old embassy, could grant us shelter.\n\n[GetTitleByKey('d_southpoint').GetNameNoTier] in Valenwood is a busy port. From there, we could disappear on the edges of Valenwood.\n\nThere's also the crumbling Imperial holdout in [GetTitleByKey('d_south_argonia').GetNameNoTier]. Lilmoth New City has a dreadful reputation, but it would be easy to keep a low profile and vanish from the records."
 ek_attrebus_potentate.0312.a: "Potentate's Retreat. We will find shelter in Elsweyr."
 ek_attrebus_potentate.0312.a.tt: "You secure a vessel to Potentate's Retreat"
 ek_attrebus_potentate.0312.b: "Southpoint. Valenwood will hide us well."
 ek_attrebus_potentate.0312.b.tt: "You secure a vessel to Southpoint"
 ek_attrebus_potentate.0312.c: "South Argonia. No one will search for us there."
 ek_attrebus_potentate.0312.c.tt: "You secure a vessel to New Lilmoth"
 
 ek_attrebus_potentate.0313.t.potentates_retreat: "Arrival at Potentate's Retreat: Who am I?"
 ek_attrebus_potentate.0313.t.southpoint: "Arrival at Southpoint: Who am I?"
 ek_attrebus_potentate.0313.t.south_argonia: "Arrival at South Argonia: Who am I?"
 ek_attrebus_potentate.0313.t.fallback: "Arrival: Who am I?"
 ek_attrebus_potentate.0313.desc.potentates_retreat: "At last I reach the former embassy at Potentate's Retreat. I have never visited before, but my mother told me stories of spending time here in her youth. Now the old walls are crumbling and some parts of the estate seem to have fallen into disrepair. Many of the locals seem to share my Akaviri heritage, though they treat us with suspicion."
 ek_attrebus_potentate.0313.desc.southpoint: "At last we make landfall at Southpoint. The trading port has doubtlessly seen better days, but I can spot ships from various regions of Tamriel docked here. Just outside the city, Valenwood truly begins, an impenetrable jungle of dense foliage."
 ek_attrebus_potentate.0313.desc.south_argonia: "At last we arrive at New Lilmoth. The rumors about South Argonia were false; the state of the city is far worse than I could have imagined. Everywhere are crumbling, half-finished foundations, slowly sinking back into the Black Marsh. Few visitors arrive here, and the natives eye me with curiosity and disbelief."
 ek_attrebus_potentate.0313.desc.fallback: "At last we have arrived. As we prepare to head out, we are disrupted."
 ek_attrebus_potentate.0313.desc.outro: " Unfortunately, my arrival has attracted some attention, and I am brought before [local_ruler.GetTitledFirstName].\n\n[local_ruler.GetSheHe|U] looks me up and down with clear curiosity, before asking me what should be a simple question: #V "Who are you?"#!\n\nI freeze. Who am I? Should I cling to my legacy as a scion of the [Glossary( 'Potentate', 'POTENTATE_GLOSS' )] of old? Such a proclamation would surely attract some attention to my cause, but also danger.\nAnd yet, Tamriel has entered a new age, one without a Potentate, and perhaps I can change alongside it? Shedding my old name, I could move on and find my own purpose."
 ek_attrebus_potentate.0313.a: "I am Cazuras, heir of the Potentate!"
 ek_attrebus_potentate.0313.a.tt: "Your proclamation may attract unwanted attention..."
 ek_attrebus_potentate.0313.b: "I don't know yet, but I will find out."
 ek_attrebus_potentate.0313.b.tt: "You shed your old name, having outgrown it."
 cazuras_change_name_tt: "You will adopt the name #V Kasir#!"

 ek_attrebus_potentate.0314.t: "The Fallen Potentate"
 ek_attrebus_potentate.0314.desc: "Devastating news reach me this morning. The Warlord [attrebus.GetFirstName], the soulless scourge, finally seized the Imperial City and with it the crown of Cyrodiil. My Uncle has failed, and suffered the consequences.\n\nThey say that the Elder Council will rule now, eager to fill their coffers with the rotting carcass of Reman's Empire. The Warlord's hatred for the Akaviri is unmatched, and he will no doubt soon begin his purge of my people.\n\nMy small entourage is all that remains of the [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )], the wise stewards of Tamriel."
 ek_attrebus_potentate.0314.a: "Devastating news."
 ek_attrebus_potentate.0314.a.tt: "You will reflect upon your future..."
 ek_attrebus_potentate.0314.b: "I will assume my birthright."
 ek_attrebus_potentate.0314.c: "And so the wheel keeps turning..."
 potentate_in_exile_rename_tt: "You will assume your position as the #V Potentate-In-Exile#!"

 ek_attrebus_potentate.0315.t: "Potentate-In-Exile"
 ek_attrebus_potentate.0315.desc: "When I led my army into the Imperial City to finally destroy the [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )], I had my men hunt down most of these serpent-men without issue. However, the close family of [old_potentate.GetFirstNamePossessive], the last Potentate, mysteriously vanished and slipped my grasp, apparently having abandoned the city in a hurry some time prior.\n\nNow I know what became of that vile spawn! [adventurer.GetFirstName] has proclaimed himself [adventurer.GetPrimaryTitle.GetNameNoTier], and seems to be active around [supposed_area.GetNameNoTier]. Though he is likely doomed to fade into obscurity, it wouldn't hurt to accelerate his fate."
 ek_attrebus_potentate.0315.a: "I will hunt him down."

 ek_attrebus_potentate.0316.t: "Serpents in Hiding"
 ek_attrebus_potentate.0316.desc: "When I led my army into the Imperial City to finally destroy the [Glossary( 'Akaviri Potentate', 'POTENTATE_GLOSS' )], I had my men hunt down most of these serpent-men without issue. However, the close family of [old_potentate.GetFirstNamePossessive], the last Potentate, mysteriously vanished and slipped my grasp, apparently having abandoned the city in a hurry some time prior.\n\nAs of yet, I still don't know what happened to them. Reports seem to suggest that they were last spotted in [GetTitleByKey('b_leyawiin').GetNameNoTier], hurriedly boarding a vessel en route towards [supposed_area.GetNameNoTier]. Whatever became of Cazuras, he is likely doomed to fade into obscurity."
 ek_attrebus_potentate.0316.a: "I wonder where that serpent fled..."
 cazuras_changes_his_name_tt: "#V Cazuras#! adopted the name Kasir"