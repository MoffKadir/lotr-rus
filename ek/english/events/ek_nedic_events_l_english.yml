l_english:
 ek_nedic.0001.t: "The Duraki Restored"
 ek_nedic.0001.desc: "The Duraki tribe of Nedes used to dwell in Craglorn, until they were conquered by the Ra Gada warrior wave. By attempting to reconstruct their society from scholarly sources, [ROOT.Char.GetNameNoTooltip] has lain the foundations for a revival of Nedic culture."
 ek_nedic.0001.a: "The Nedes are still remembered here!"