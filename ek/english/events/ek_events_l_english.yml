 life_extension.0154.t: "$clone_project$: A Slight Adjustment"
 life_extension.0154.desc: "While cleaning the filters of my [clone_possessive|E] growing tube, I ponder an unusual question. Should my Clone be a [ROOT.Char.GetWomanMan], like me, or would the opposite be more useful? At this stage it would only require a slight adjustment, posing little danger to my Project."
 life_extension.0154.a: "No need."
 life_extension.0154.a.tt: "$life_extension.0153.a.tt$"
 life_extension.0154.b: "Why not? A male Clone it is."
 life_extension.0154.b.tt: "Attempt to make the [clone|E] #V male#!"
 life_extension.0154.c: "Why not? A female Clone it is."
 life_extension.0154.c.tt: "Attempt to make the [clone|E] #V female#!"
