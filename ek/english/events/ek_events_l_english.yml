 life_extension.0154.infertile: "Your [clone|E] may become #N [GetTrait('infertile').GetName( GetPlayer )]#!"


 life_extension.0155.t: "$clone_project$: Size Matters"
 life_extension.0155.desc.intro: "My #V $clone_project$#! is progressing well, to the point where I am considering some experimental adjustments.\n\n"
 life_extension.0155.desc.giant: "Tall as a [GetTrait('giant').GetName( GetNullCharacter )], my great height sets me apart from most, but it also limits me in more ways than one. Should my [clone|E] be bound by the same restrictions? I could attempt to modify its spinal growth, resulting in a shorter statue."
 life_extension.0155.desc.dwarf: "Short as a [GetTrait('dwarf').GetName( GetNullCharacter )], my small statue sets me apart from most, often resulting in mockery and limiting me in more ways than one. Should my [clone|E] be bound by the same restrictions? I could attempt to modify its spinal growth, resulting in a taller height."
 life_extension.0155.desc.fallback: "My average height has never truly affected me, though I sometimes wonder how it would be if things were different. I could attempt to modify my [clone_possessive|E] spinal growth, resulting in a much taller or shorter statue."
 life_extension.0155.a: "Why mess with perfection?"
 life_extension.0155.a.tt: "$life_extension.0153.a.tt$"
 life_extension.0155.b.notgiantordwarf: "Must be a [GetTrait('giant').GetName( GetNullCharacter )] or a [GetTrait('dwarf').GetName( GetNullCharacter )]"
 life_extension.0155.b: "It will be the most average Clone of all time!"
 life_extension.0155.b.tt: "Attempt to remove any #V size-based#! [congenital|E] [traits|E] from the [clone|E]"
 life_extension.0155.c: "It will be tall!"
 life_extension.0155.c.tt: "Attempt to make the [clone|E] a [GetTrait('giant').GetName( GetNullCharacter )]"
 life_extension.0155.d: "It will be small!"
 life_extension.0155.d.mini_me: "I shall call [ROOT.Char.GetHerHim]... Mini-Me."
 life_extension.0155.d.tt: "Attempt to make the [clone|E] a [GetTrait('dwarf').GetName( GetNullCharacter )]"
 life_extension.0155.standard: "The [clone|E] will be a #M Average Sized#!"
 life_extension.0155.giant: "The [clone|E] will be a #M [GetTrait('giant').GetName( GetNullCharacter )]#!"
 life_extension.0155.dwarf: "The [clone|E] will be a #M [GetTrait('dwarf').GetName( GetNullCharacter )]#!"

 life_extension.0156.t: "$clone_project$: Artificial Aging"
 life_extension.0156.desc: "I find myself pondering what will happen if my #V $clone_project$#! is successful. Raising a child takes time, no matter if it was born, hatched, or artificially grown inside a magically enhanced tube.\n\nLuckily, the [cloning|E] process is not bound by the same restrictions as more popular methods of reproduction. By altering the alchemical makeup of the fluid, I could speed up the aging process significantly, resulting in an older child. Of course, this carries significant risks to its development, but I wouldn't be where I am now without a little experimentation."
 life_extension.0156.a: "A baby is fine, honestly."
 life_extension.0156.a.tt: "$life_extension.0153.a.tt$"
 life_extension.0156.b: "Age it to four."
 life_extension.0156.b.tt: "Attempt to age the [clone|E] to the age of #V 4#!"
 life_extension.0156.c: "Age it to eight."
 life_extension.0156.c.tt: "Attempt to age the [clone|E] to the age of #V 8#!"
 life_extension.0156.d: "Age it to twelve."
 life_extension.0156.d.tt: "Attempt to age the [clone|E] to the age of #V 12#!"
 life_extension.0156.age_4: "The [clone|E] will mature to #M Age 4#!"
 life_extension.0156.age_8: "The [clone|E] will mature to #M Age 8#!"
 life_extension.0156.age_12: "The [clone|E] will mature to #M Age 12#!"

 life_extension.0157.t: "$clone_project$: For the Price of One"
 life_extension.0157.desc.early: "While monitoring my #V $clone_project$#!, I've stumbled upon a peculiar development: It seems that the little grub has duplicated itself! Twins are a relatively common occurence, but seeing it happen like this is quite peculiar.\n\nThinking about it, I do have a spare tube in the back I was intending to use in case anything goes wrong with the main one. Two [clones|E] for the price of one... now there's an idea!"
 life_extension.0157.desc.late: "While monitoring my #V $clone_project$#!, I'm observing a somewhat worrying development: What I thought to be a benign tumour has grown significantly in size and turned out to be a smaller conjoined twin! At this stage, removing the growth shouldn't be too much of an issue, but it seems to be mostly healthy.\n\nThinking about it, I do have a spare tube in the back I was intending to use in case anything goes wrong with the main one. Two [clones|E] for the price of one... now there's an idea!"
 life_extension.0157.a: "One will suffice."
 life_extension.0157.a.tt: "$life_extension.0153.a.tt$"
 life_extension.0157.b: "Lets focus on healing the one I have."
 life_extension.0157.b.tt: "Attempt to surgically remove the attached twin from your [clone|E]"
 life_extension.0157.c: "Two for one? Sign me up."
 life_extension.0157.c.tt: "Attempt to separate them, resulting in two [clones|E] if the #V $clone_project$#! is successful"
 life_extension.0157.cured: "The [clone|E] is fine"
 life_extension.0157.twins: "The #V $clone_project$#! will yield #P Two#! [clones|E]"
 
 life_extension.0158.t: "$clone_project$: The Call of the Wild"
 life_extension.0158.desc.intro: "Night has fallen hours ago, and I am still at work in my laboratory. Through a small window in the corner of the chamber, a sliver of moonlight falls upon the tube, piercing the dim liquid inside and giving my creation an ominous glow. Far away in the wilds, I hear a wolf howl. Could this be a sign from [ROOT.Char.Custom('GetCustomHircineName')]?"
 life_extension.0158.desc.hircine: "\n\nThere are certain steps I could take to infect my [clone|E] with lycanthropy, making them a [GetTrait('lycan_character').GetName(GetNullCharacter)]. This would make it a powerful tool, a beast of immense strength, but it would also make it unpredictable."
 life_extension.0158.desc.werewolf: "\n\nI often feel the call of the wild, and tonight is no different. I could share the blessing of lycanthropy with my [clone|E], making it a [GetTrait('lycan_character').GetName(GetNullCharacter)]. This would make it a powerful tool, a beast of immense strength, but it would also make them unpredictable."
 life_extension.0158.a: "I should just go to bed."
 life_extension.0158.a.flavor: "$life_extension.0153.a.tt$"
 life_extension.0158.b: "[ROOT.Char.Custom('GetBaseHircineName')|U], grant me your boon!"
 life_extension.0158.b.flavor: "Attempt to infect the [clone|E] with lycanthropy, turning them into a #M [GetTrait('lycan_character').GetName(GetNullCharacter)]#! if the #V $clone_project$#! is successful"
 life_extension.0158.werewolf: "Your [clone|E] will be a #M [GetTrait('lycan_character').GetName(GetNullCharacter)]#!"


 life_extension.0200.t: "$clone_project$: Success!"
 life_extension.0200.t.complications: "$clone_project$: Success...?"
 life_extension.0200.desc.intro: "After nine months of diligent work, I stand before the fruits of my labor:\n\n"

 life_extension.0200.desc.mid.twin_kids: "Two children sit in front of me, visibly confused."
 life_extension.0200.desc.mid.twin_infants: "Two infants lay before me, still glistening with artificial amniotic fluid."
 life_extension.0200.desc.mid.kid: "A child sits in front of me, visibly confused."
 life_extension.0200.desc.mid.fallback: "An infant lays before me, still glistening with artificial amniotic fluid."

 life_extension.0200.desc.outro.fallback: "\n\nBefore me stands a marvel, something once thought impossible. My very own [GetTrait('clone').GetName( GetNullCharacter )]! Alas, what will I do with it now?"
 life_extension.0200.a: "I will raise you as my own."
 life_extension.0200.b: "Get this thing out of my sight."
 life_extension.0200.c: "It does look rather appetizing..."
 life_extension.0200.d: "I will dispose of it."

 life_extension.0201.t: "$clone_project$: A Name for a Clone"
 life_extension.0201.desc: "I am almost moved to tears - I see myself, yet someone else as well. Now it falls to me to decide on a name. Should [clone.GetSheHe] simply carry my name? Or should [clone.GetSheHe] get [clone.GetHerHis] own?"
 life_extension.0201.desc.sickly: "I am almost moved to tears - Thanks to my magical intervention, my Clone survived its terrible struggle. Now it falls to me to decide on a name. Should [clone.GetSheHe] simply carry my name? Or should [clone.GetSheHe] get [clone.GetHerHis] own?"
 life_extension.0201.a: "I will raise you as my own."

 life_extension.0250.t: "$clone_project$: Failure!"
 life_extension.0250.desc.stillborn: "After many months of diligent work, I stand before what remains of my [clone|E]:\n\nThough it grew a physical body, it was too weak to survive and died, presumably, from organ failure.\n\nMy #V $clone_project$#! has been a complete failure and I have little to show for it other than my research notes and a lot of waste. At least I got a [cloning_insight|E] out of it."
 life_extension.0250.desc.slurry: "After many months of diligent work, I stand before what remains of my [clone|E]:\n\nIt has become little more than a gory pile of slurry stuck to the bottom of the tube.\n\nMy #V $clone_project$#! has been a complete failure! I have little to show for it, other than my research notes and a lot of waste. At least I got a [cloning_insight|E] out of it."
 life_extension.0250.a: "[ROOT.Char.Custom('CulturalCurse')|U]!"
 life_extension.0250.a_compassionate: "Poor thing..."
 life_extension.0250.a_callous: "Shame. Now, where did I put my scalpel?"
 
 life_extension.0251.t: "$life_extension.0250.t$"
 life_extension.0251.desc.intro: "After many months of diligent work, I stand before what remains of my [clone|E]:\n\n"
 life_extension.0251.desc.mid.fallback: "It survived the process, just barely, but it is plagued by terrible growths and likely won't survive more than a few hours."
 life_extension.0251.desc.outro.fallback: "\n\nMy #V $clone_project$#! has been a complete failure and I have little to show for it. Perhaps it would be best to put my [clone.GetFirstName] out of its misery."
 life_extension.0251.a: "There isn't much to be done."
 life_extension.0251.a_compassionate: "I'm sorry, little one."
 life_extension.0251.a_callous: "Shame. Now, where did I put my scalpel?"
 life_extension.0251.b: "I can still save you!"
 life_extension.0251.b.win.desc: "The Clone pulls through"
 life_extension.0251.b.fail.desc: "Despite your best efforts, the Clone dies"


