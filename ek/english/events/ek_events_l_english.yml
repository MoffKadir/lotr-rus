l_english:
 ek_culture_creation_decision.0001.t: "The [new_culture.GetName] Resurgence"
 ek_culture_creation_decision.0001.desc_intro: "Long ago a lost tribe of our people, the [new_culture.GetName], was a prosperous culture and formed an advanced society.\n\nThe sands of time made it so they were unfortunately lost to history, but with a lot of scholar work, excavations, and translations of old texts, I believe I finally am able to tell the story of their culture, and spread it among my people."
 ek_culture_creation_decision.0001.desc_mid: "\n\nSome already claim to carry this [new_culture.GetName] identity deep within their hearts, and with them a new age begins for the [new_culture.GetHeritage.GetName] people."
 ek_culture_creation_decision.0001.desc_personal: "\n\nAs I myself hold these traditions dear to my heart, I will lead our newly reformed people, and we will once again thrive in Tamriel!"
 ek_culture_creation_decision.0001.a: "Join us into this new age!"
 ek_culture_creation_decision.0001.b: "A new age begins for me and my kind!"

 ek_playdate.0001.t: "Troublemaker"
 ek_playdate.0001.desc: "[victim.GetFirstNameNoTooltip] gets to my nerves every time I see [victim.GetHerHim]. The way [victim.GetSheHe] moves, talks and acts are infuriating. I have planned to play a decisive prank on [victim.GetHerHim] for a very long time and today, this opportunity presents itself."
 ek_playdate.0001.accessory_desc: "[victim.GetFirstNameNoTooltip] gets to my nerves every time I see [victim.GetHerHim]. Me and [accessory.GetFirstNameNoTooltip] always agreed that even the way [victim.GetSheHe] moves, talks and acts are infuriating, so we have planned to play a decisive prank on [victim.GetHerHim] for a very long time and today this opportunity presents itself."
 ek_playdate.0001.a: "Making [victim.GetHerHim] trip should do it."
 ek_playdate.0001.b: "Just make [victim.GetHerHim] look like a fool."
 ek_playdate.0001.c: "No, this is wrong."
 ek_playdate.0001.d: "I've heard of an experiment involving parts of a dead rat."

 ek_playdate.0002.t: "Brave Little Scrib"
 ek_playdate.0002.scrib_friend_desc: "[scrib_friend.GetFirstNameNoTooltip] is quite the musical enthusiast, with a diverse range of songs in [scrib_friend.GetHerHis] repertoire. However, there's one particular song that never fails to bring a smile to [scrib_friend.GetHerHis] face - a popular tune about a brave little scrib.\n\nWhenever [scrib_friend.GetFirstNameNoTooltip] decides to perform this special song, [scrib_friend.GetSheHe] sings it with such enthusiasm and passion that it's hard not to feel the joy radiating from [scrib_friend.GetHerHis] voice. It's almost as if [scrib_friend.GetSheHe] becomes one with the music, and as [scrib_friend.GetSheHe] sings, [scrib_friend.GetSheHe] can't help but do a little dance to the rhythm of the melody.\n\nI've been fortunate enough to witness [scrib_friend.GetFirstNameNoTooltip]'s musical talents on many occasions, and each time [scrib_friend.GetSheHe] invites me to join in the fun. It's hard to resist [scrib_friend.GetHerHis] contagious energy, and soon enough, I find myself tapping my feet and singing along too."
 ek_playdate.0002.desc: "As I'm busy playing with the other guests, I hear the sound of a familiar tune being sung by someone nearby. It's a joyful song about a little scrib who showed immense courage in the face of adversity.\n\nCurious about the source of the singing, I make my way towards the crowd that has gathered around the singer. As I approach, I notice that most of the children have abandoned their games to join in the singing and dancing.\n\nThe singer's voice is sweet and lively, and it's easy to see why the song has captured the attention of the young audience. The lyrics paint a vivid picture of a tiny scrib overcoming great obstacles and inspiring others to do the same.\n\nAs the song reaches its crescendo, the children's voices rise in unison, and their feet start to move to the rhythm of the beat. It's a joyous moment, filled with laughter and energy, and I can't help but be swept up in the contagious enthusiasm of the group.\n\nLooking around, I see that the adults are also joining in the fun, tapping their feet and clapping along to the music. It's heartening to see how a simple song about a brave little scrib can bring together people of all ages and backgrounds."
 ek_playdate.0002.a: "Life's an adventure!"
 ek_playdate.0002.b: "[scrib_friend.GetFirstNameNoTooltip], wait for me!"
 ek_playdate.0002.c: "Who cares?"
 ek_playdate.0002.d: "I think I know where I can get a scrib friend!"

 ek_court.0001.t: "$hold_court_header$ Animal Waste Policy"
 ek_court.0001.desc: "My [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('gardener'))]" [gardener.GetTitledFirstName] approaches the throne with a glint in [gardener.GetHerHis] eye. "My [ROOT.Char.GetTitleAsName]," [gardener.GetSheHe] begins, "this incessant stomping of beasts in the gardens must cease, nevermind the #EMP foul droppings#! they leave behind! They are ruining everything I do!"\n\nI ponder about what I've been told for a moment. While cattle, domestic animals and such can destroy a beautiful garden, some of my subjects enjoy taking their companions for a stroll."
 ek_court.0001.a: "Animals are now banned from my gardens!"
 ek_court.0001.b: "Remind me: Why am I paying you for?"
 ek_court.0001.c: "What if we use the waste as a fertilizer?"

 ek_court.0002.t: "$hold_court_header$ The $knight_culture_player_no_tooltip$'s Ball"
 ek_court.0002.desc: "[ball_courtier.GetFirstNameNoTooltip] approaches the throne in a sadly manner, with visible distress weighing [ball_courtier.GetHerHis] shoulders. "My [ROOT.Char.GetTitleAsName], as you're aware, the day of the $knight_culture_player_no_tooltip$'s Ball is drawing near. Unfortunately, some of the courtiers didn't have the time to receive the proper silks imported from [silk_county.GetName] for our garments, therefore we are in dire need of delaying the ball, if my [ROOT.Char.GetTitleAsName] would be so kind."\n\nThe request was far from simple. Delaying the ball would cost the realm quite a bit of gold in order the reschedule the preparations."
 ek_court.0002.a: "The date of the ball will be maintained!"
 ek_court.0002.b: "The ball will be delayed!"
 ek_court.0002.c: "Silks imported from [silk_county.GetName], you say?"

 the_liar: "M'aiq the Liar"
 ek_court.0003.t: "The Liar"
 ek_court.0003.intro: "I hear the footsteps of someone approaching me from behind and turn around to see an unfamiliar Khajiit. "M'aiq traveled a long way before getting here, as he heard many were calling for his wisdom." Before I can even answer, he starts talking again.\n\n"
 ek_court.0003.end: "\n\nAs I turn my head to call the guards, the strange wanderer mutters "M'aiq is done talking." and disappears from my sight. Good riddance, I guess."
 ek_court.0003.desc1: ""M'aiq has heard enough about royal courts and how would they affect one's culture. M'aiq is very tired of this conversation.""
 ek_court.0003.desc2: ""M'aiq keeps hearing about the people of Deshaan, but no matter how many times M'aiq visited, he could not find them.""
 ek_court.0003.desc3: ""Some say Argonians look just like Khajiit. M'aiq has never met an Argonian with fur."" 
 ek_court.0003.desc4: ""M'aiq saw a Dwemer, once. He tutored M'aiq's child for a few years - then, M'aiq saw two Dwemer.""  
 ek_court.0003.desc5: ""M'aiq has been told that the Bosmer capital moves around Valenwood with the seasons, but when he went there to see, it just stood still. Perhaps that was a transcription error.""  
 ek_court.0003.desc6: ""M'aiq has never seen the litter of a Khajiit and a Breton, but he is certain that if they exist, they must be charming creatures.""  
 ek_court.0003.desc7: ""M'aiq has heard many things about the identity of Vanus Galerion, and he does not believe a single one.""  
 ek_court.0003.desc8: ""M'aiq once praised the Eight Divines and made some people very upset. Perhaps they know something M'aiq doesn't?""
 ek_court.0003.desc9: ""M'aiq has never seen the litter of an Argonian and a Dremora, but he is certain that if they exist, this one would do anything to avoid them.""  
 ek_court.0003.desc10: ""Decisions, decisions... M'aiq is glad to not have too many options.""  
 ek_court.0003.desc11: ""Cartography is hard work. Every map is based on hundreds of others.""
 ek_court.0003.desc12: ""M'aiq is friendly to, but wary of ducks. They are prone to grumpiness, and M'aiq knows they possess power to end us all.""
 ek_court.0003.desc13: ""M'aiq has heard warnings about [Glossary( 'Daedric', 'DAEDRA_GLOSS' )] Whispers, but when he met Malacath, he wasn't whispering at all.""
 ek_court.0003.desc14: ""M'aiq wonders how the Dwemer powered their metallic contraptions. Soul gems? [Glossary( 'Daedric', 'DAEDRA_GLOSS' )] energy? Blood of innocents? Perhaps it just works.""
 ek_court.0003.desc15: ""Things were much simpler before. M'aiq used to have two thoughts at a time, now he has three.""
 ek_court.0003.desc16: ""Sometimes things are confusing to even M'aiq. How does Pa'alatiin relate to the waterways of Argonia?"" 
 ek_court.0003.desc17: ""We Khajiit have always known that dragons are just cats. This is true also of Alkhan, who others call Alduin. Despite common thought, Alkhan is also in fact female.""
 ek_court.0003.desc18: ""M'aiq read that the coastlines of Black Marsh change completely every now and then for no apparent reason. Could that be the whims of the Hist or a higher power?""
 ek_court.0003.desc19: ""M'aiq sometimes wonder whether the [Glossary( 'Princes of the Daedra', 'DAEDRA_GLOSS' )] appeal to our vices or our virtues.""
 ek_court.0003.desc20: ""M'aiq thinks that [Glossary( 'Daedric', 'DAEDRA_GLOSS' )] cults are curious. They change their rules several times before settling on how to worship the Princes.""
 ek_court.0003.desc21: ""Why have one old king when you can have two? How one adds up with two and two adds up with three however is a headache.""
 ek_court.0003.desc22: ""Sometimes M'aiq wonder whether some places are named for a particular reason, or they're made up on the spot just because.""
 ek_court.0003.desc23: ""They speak about a cartographer who went hiking in the Jeralls and never returned. M'aiq wonders what happened to him.""
 ek_court.0003.desc24: ""Some demand that the Minotaurs show themselves. M'aiq answer that the Minotaurs will reveal themselves when they can be represented in a proper fashion.""
 ek_court.0003.desc25: ""Trade routes? Why would Khajiit want a specific route for trade to travel, when it could go anywhere it wants?""
 ek_court.0003.desc26: ""M'aiq spent a long, long time in Skyrim. He got in trouble there and became a prisoner quite often, but luckily, he was re-released over and over.""
 ek_court.0003.desc27: ""M'aiq thought he saw a Snow Elf once. But he looked again, and it was only a mage.""
 ek_court.0003.desc28: ""Bandits? M'aiq knows nothing of bandits, but they must indeed be hounds.""
 ek_court.0003.desc29: ""People in Tamriel used to greatly appreciate the arts. M'aiq remembers when practically everyone owned a portrait of themselves.""
 ek_court.0003.desc30: ""M'aiq hears that the Houses of Morrowind used to pay tribute to the Tribunal Temple, in a previous time.""
 ek_court.0003.desc31: ""M'aiq used to possess many artifacts that bestowed immense powers to him. But no more. Sad indeed.""
 ek_court.0003.desc32: ""Atmora is home to what remains of ancient prehistoric Nords. Or was it wandered by the dead, or by old bearded kings?""
 ek_court.0003.desc33: "M'aiq has heard that the counts of Cyrodiil behave like kings. Such arrogance is no doubt unbecoming."
 ek_court.0003.desc34: ""The actual form of the mysterious lands of Akavir is not known in these lands. Any map you've seen, can only have been fanciful imagination.""
 ek_court.0003.desc35: ""As ancient Khajiit wisdom tells, the dragons of old are in fact just big cats. Their relation to the elusive monkey-kin is however unknown.""
 ek_court.0003.desc36: ""A ban hammer? M'aiq knows not the purpose of a hammer to ban, or what that means. He is however sure it exists for good reason.""
 ek_court.0003.desc37: ""The Redguards are fond of their coffee beans in drinks, but they are careful not to let it stain paper. M'aiq knows not why.""
 ek_court.0003.desc38: ""Many people come with questions to M'aiq. For all his wisdom, sometimes M'aiq can only shrug.""
 ek_court.0003.desc39: ""M'aiq has heard talk of an island called Olenveld, but M'aiq wonders if it ever truly existed.""
 ek_court.0003.desc40: ""Khajiit knows that in reality the ground we walk was created by the workings of a Thane and a Wraith. What it means? Who knows.""
 ek_court.0003.desc41: ""M'aiq cannot understand what 'inherit' means? Why would anyone give away their things?""
 ek_court.0003.desc42: ""Once the Dunmeri were united, then they split in many until only few remained. M'aiq pities them, for everyone knows Khajiit only know Anequinans and Pellitines.""
 ek_court.0003.desc43: ""M'aiq's father told him that Khajiit came from Black Marsh. Though M'aiq thinks he made this up.""
 ek_court.0003.desc44: ""M'aiq hears that when a rainbow persisted after the end of the month of rainbows, many dremora hissed at the gates like frightened kittens. They were not let in.""
 ek_court.0003.desc45: ""M'aiq has heard it said that Dragonbreaks are wont to break "save games". Alkosh aside, what does this mean? M'aiq thought games are for gambling, not saving coin.""
 ek_court.0003.desc46: ""M'aiq is told that Pelinal was once called Hans the Fox. M'aiq, too, was once a fox - but very briefly, for he missed the sound of his purrs.""
 ek_court.0003.desc47: ""M'aiq cannot quite tell the difference between the sour-faced Dunmer and Dremora. It seems neither could some conjurers, back in the old days."" 
 ek_court.0003.desc48: ""M'aiq does not see the point of being a vampire.  M'aiq's legacy already lives forever.""
 ek_court.0003.desc49: ""Many people accuse M'aiq of worshipping Boethra, even Boethra herself. M'aiq does not understand why. Perhaps she is lying.""
 ek_court.0003.desc50: ""There are many Khajiit in Morrowind, yes? Perhaps at one point, the two provinces were much closer than they are now?."" # This is a reference to a longstanding bug which made Morrowind and Elsweyr border each other.
 ek_court.0003.desc51: ""Some say great ships can travel the Niben. How they can pass the great bridges of Leyawiin is a mystery to M'aiq.""
 ek_court.0003.desc52: ""Some claim the Imga disappeared with Falinesti. M'aiq thinks that if so the Imga didn't disappear for long, and have no memory of having been gone.""
 ek_court.0003.desc53: ""Apparently the primal traditions of goblins once destroyed the world. M'aiq does not know why, but it happened."" # the goblin unit innovation primal traditions caused a ctd for no good reason after a ck3 update
 ek_court.0003.desc54: ""Telvanni wizards are a contentious sort. M'aiq thinks their insistence on maintaining rivalries even past death must cause some problems."" # parliament of bugs bug
 ek_court.0003.a: "That was... interesting."

 ek_court.0004.t: "$hold_court_header$ Last of His Kind"
 ek_court.0004.desc: "[finder.Custom2('MyCharacterIntroduction', ROOT.Char)|U] brings a strange-looking [yagrum.GetWomanMan] to my attention.\n\n"I found this [yagrum.GetWomanMan] wandering near the Dwemer ruins. [yagrum.GetSheHe|U] claims to be the last living Dwemer!"\n\n"I do not #EMP claim#! to be anything, you [finder.Custom('InsultNoun')]!", answers the [yagrum.GetWomanMan]. "My name is [yagrum.GetFullNameNoTooltip]. Once I was a Master Crafter in the service of Lord Kagrenac, and it seems that I am, unfortunately, the last of my kind. I haven't been able to find any other Dwemer since I've returned to this realm. I should be able to find something worth your while if you would be so kind as to fund me in the exploration of the lost settlements of my people.""
 ek_court.0004.a: "Very well, explore away."
 ek_court.0004.b: "Is that a joke, [finder.GetFirstNameNoTooltip]? The Dwarves are long gone!"

 ek_court.0005.t: "My [ROOT.Char.Custom('ComplimentAdjective')] benefactor,"
 ek_court.0005.ponzi.desc: "Exploring the lost settlements of my people have proven to be more perilous, and costly, than expected. I, once again, request your continued assistance."
 ek_court.0005.b: "Very well, keep the exploration up."
 ek_court.0005.c: "You [yagrum.Custom('InsultNoun')], you'll get no more coin from me!"
 ek_court.0005.puzzle.desc: "I finally have good news to share with you! I'm sending, attached to this letter, a token of my appreciation for your continued support. It's a curious object, which I cannot precisely define of the function. Perhaps it would be of interest to you?"
 ek_court.0005.a: "Well, it's something at least."
 ek_court.0005.arms.desc: "I finally have good news to share with you! I'm sending, along with this letter, a generous finding in return for your continued support. It's a cache of martial equipment made with fine Dwemer craftsmanship and materials that I found while exploring the ruins."
 ek_court.0005.e: "A welcome surprise, indeed!"
 ek_court.0005.automata.desc: "I'm saddened to inform that, while exploring the ruins below [automata_province.GetName], I have accidentally activated the ruins' automated defenses. I beg you to accept the gift I'm sending attached to this letter as a symbol of my deepest apologies."
 ek_court.0005.d: "May [ROOT.GetCharacter.GetFaith.HighGodName] curse this [yagrum.Custom('InsultAdjective')] dwarf!"
 ek_court.0005.falmer.desc: "I'm saddened to inform that, while exploring the ruins below [falmer_province.GetName], I have accidentally alerted its strange occupants. I beg you to accept the gift I'm sending attached to this letter as a symbol of my deepest apologies."

 ek_court.0006.t: "A Rat Infestation"
 ek_court.0006.desc: "[courtier.GetFirstNameNoTooltip] screams loudly, attracting my attention.\n\n"RATS! Rats, my [ROOT.Char.GetTitleAsName], there are rats in the pantry! Surely you plan to do something!"\n\n[courtier.GetHerHis|U] despair was palpable, and [courtier.GetSheHe] demanded swift action."
 ek_court.0006.a: "I'll hire a Fighters Guild apprentice!"
 tooltip.ek_court.0006.a.success: "The apprentice solves it"
 tooltip.ek_court.0006.a.failure: "The apprentice fails miserably"
 ek_court.0006.b: "The Ratcatcher Guild is the best choice!"
 tooltip.ek_court.0006.b.success: "The Ratcatchers solve the problem"
 tooltip.ek_court.0006.b.failure: "The Ratcatchers fail"
 ek_court.0006.c: "We'll find nature's best hunter!"
 tooltip.ek_court.0006.c.success: "The cat is a natural"
 tooltip.ek_court.0006.c.failure: "The cat befriends the rats"

 ek_court.0007.t: "Galerion the Mystic"
 ek_court.0007.desc: "Today, a distinguished visitor graces our court: Vanus Galerion, a figure of unparalleled achievement. His life's odyssey began as Trechtus, a serf on a minor noble's estate, marked by his early passion for knowledge. Against all odds, he escaped the clutches of a repressive lord, eventually finding solace with a troupe of itinerant performers. The fates then led him to Alinor, where he survived a near-fatal journey before fatefully crossing paths with a soothsayer named Heliand.\n\nHeliand recognized the latent genius within the young Trechtus and guided him to the Isle of Artaeum. Here, under the tutelage of Magister Iachesis, he was reborn as Vanus Galerion, the very first Archmagister of the Mages Guild. Today, we have the honor of welcoming this iconic figure to our court, where his presence enriches our realm with the wisdom of a lifetime's journey."
 ek_court.0007.a: "Could you please explain this theorem to me?"
 ek_court.0007.b: "I'm having some trouble understanding how this spell works..."
 ek_court.0007.c: "I would like to hire your services, Great Mage."

 learning_medicine.2010.tribal.t: "A Troubling Concoction"
 learning_medicine.2010.tribal.start.desc: "As I step over the threshold to my [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('court_physician'))] [court_physician.GetFirstNamePossessive] hut, I find [court_physician.GetHerHim] bent deeply over a cauldron.\n\n"This concoction of"
 learning_medicine.2010.tribal.desc: "mixed herbs"
 learning_medicine.2010.tribal.end.desc: "is horrendously difficult to master," [court_physician.GetSheHe] says with a sigh. "If I were to follow these instructions, I am as likely to cure my patient as I am to kill them outright.""
 learning_medicine.2010.tribal.a.success.desc: "I help [court_physician.GetFirstNameNoTooltip] brew the concoction"
 learning_medicine.2010.tribal.b: "I will buy you better ingredients."

 ek_historical_artifacts.0002.t: "Judgement of Verity"
 ek_historical_artifacts.0002.desc: "When Olaf One-Eye became High King, his reign was a time of relative instability and division, and as he died without a clear heir, a new method of electing a High King became necessary. So, the Crown of Verity was created to reunify Skyrim after Olaf's rule.\n\nThe validity of the Crown was not questioned since it was first used by Kjoric the White after striking down the usurper Asurn Ice-Breaker.\n\nNow, it is my time to see if the Crown deems me worthy."
 ek_historical_artifacts.0002.a: "Wear the Crown!"
 ek_historical_artifacts.0002.b: "Now is not a good time."

 ek_historical_artifacts.0003.desc: "Much has passed through my mind as I put the crown over my head. Was there anything else I could have done to be worthy?\n\nAll doubt vanished when I was properly crowned, as my ancestors before me, and the crown stayed in my head, as proof of my legitimacy as ruler of these lands. Everyone present at the ceremony cheered and hailed my name. Truly, a great day!"
 ek_historical_artifacts.0003.a: "All Hail [ROOT.GetCharacter.GetFullNameNoTooltip]!"
 
 ek_historical_artifacts.0004.desc: "The first time I put the crown over my head, it fell off, but I assumed it must have slipped from my shaking hands.\n\nIt was only by the third time I tried to place it over my head that the crowd started booing me. "No!", I shouted. "It can't be!""
 ek_historical_artifacts.0004.a: "One day I'll be worthy!"
 ek_historical_artifacts.0004.b: "And who are you to deny me this crown!?"

 ek_historical_artifacts.0005.t: "Blood of the Dragon"
 ek_historical_artifacts.0005.desc: "Akatosh himself blessed [alesh.GetFirstName] and her descendants with the blood of dragons and the [aok.GetName] when the Paravant dared to defy the Ayleid's rule. Thus does Alessia become the first gem in the Cyrodilic Amulet of Kings. The gem is the Red Diamond in the middle of the Amulet. It is surrounded by eight other gems, one for each of the Divines. This is the Symbol of the Empire.\n\n[reman.GetFirstName] and his descendantes also donned the Amulet as a symbol of the Emperor's power and as long as they wore it, Tamriel was safe.\n\nI now have the token of this Covenant in my possession. Was it fate that brought it to me or a mere coincidence?"
 ek_historical_artifacts.0005.a: "I need to know!"
 ek_historical_artifacts.0005.b: "Having this token is enough for me."
 ek_historical_artifacts.0005.a.success: "The [aok.GetName] stays put"
 ek_historical_artifacts.0005.a.success.tt: "You confirm that you are [GetTrait('dragonborn').GetName( GetNullCharacter )]!"
 ek_historical_artifacts.0005.a.failure: "The [aok.GetName] slips off as you try to fasten it around your neck"
 ek_historical_artifacts.0005.a.failure.tt: "You confirm that you are not [GetTrait('dragonborn').GetName( GetNullCharacter )]!"

 ek_daedric_artifacts.0001.t: "The Power of the Rose"
 ek_daedric_artifacts.0001.desc: "I have been studying this artifact for days now. It frequently changes smells and energies that I presume are fruit of the Rose's struggle to tune in frequencies from the Myriad Realms of Revelry and its various pleasure pockets. At night, in my chambers, I finally decide to try and use the Rose to summon a daedric servant.\n\nA bright light blinded me as the smell of alcohol, smoke and bodily fluids invaded my senses. After this explosion of otherworldy sensations passed, I was left alone with a very peculiar individual. "What are you?", I asked. "My name is [daedric_guest.GetName], mortal, and I'm bound by Lord Sanguine to your service for a brief time."\n\nI could hardly believe my eyes."
 ek_daedric_artifacts.0001.a: "Welcome to [GetPlayer.GetCurrentLocation.GetName], [daedric_guest.GetFirstNameNoTooltip]!"

 ek_daedric_artifacts.0002.desc: "[daedric_guest.GetFirstNameNoTooltip] approaches me with a faded visage. "Mortal, the time for me to go back to the realm of my Lord is approaching. If you wish to extend the time of my stay, I'd advise you to use the power of the Sanguine Rose once more."\n\nWhat the daedra fails to mention, and I'm aware of, is that the more I use the staff, the more likely it is to fade away back to Oblivion."
 ek_daedric_artifacts.0002.risk: "Using the Rose multiple times can lead to its destruction!"
 ek_daedric_artifacts.0002.a: "I'll use the Rose once more."
 ek_daedric_artifacts.0002.b: "I guess it's time for you to go."

 ek_daedric_artifacts.0003.t: "A Peculiar Bow"
 ek_daedric_artifacts.0003.desc: "After that failed attempt on my life, I feel strangely mesmerized by the bow that was found with the corpse of the assassin. As I hold the bow closer deep in the night, I can hear a soft whisper coming from the shadows.\n\n"You wish, [ROOT.GetCharacter.GetFirstNameNoTooltip], for power. Secrets in the dark. It's been a number of years since I've set foot on your world. Or perhaps it's been moments. One tends to lose track. Can you feel my cold touch, mortal? If I brought you this power, what would you bring me? Would you whisper secret prayers in my name?""
 ek_daedric_artifacts.0003.a: "Yes, my Lady."
 ek_daedric_artifacts.0003.c: "I have a counter-proposal."
 ek_daedric_artifacts.0003.c.tt.success: "Nocturnal accepts the deal"
 ek_daedric_artifacts.0003.c.tt.failure: "Nocturnal is offended"
 ek_daedric_artifacts.0003.c.tt.success.ct: "You return the bow"
 ek_daedric_artifacts.0003.c.tt.success.cd: "You destroy the bow"

 ek_daedric_artifacts.0004.t: "Inner Luminance"
 ek_daedric_artifacts.0004.desc: "Ever since I've got this strange gem from that kind old lady, I've been wondering what she meant when she mentioned that it was a "guiding light" for her family. But that question was abruptly answered when a disembodied voiced boomed with a thousand echos inside my mind when I was examining the object closer.\n\n"A new hand touches the beacon. Listen. Hear me and obey. It is time for my splendor to return to [GetPlayer.GetCurrentLocation.GetName] and you will aid me in this goal. But first, you must retrieve the token of my truth, which is buried in the ruins of my once great temple. I shall guide you unto it. Do what you must to retrieve it and Meridia will reward you. And great shall be your reward.""
 ek_daedric_artifacts.0004.a: "As you wish, my Prince."
 ek_daedric_artifacts.0004.c: "Oh, sure, right away!"
 ek_daedric_artifacts.0004.c.tt.success: "You successfully trick Meridia"
 ek_daedric_artifacts.0004.c.tt.failure: "Meridia uncovers your ruse"
 ek_daedric_artifacts.0004.b: "This is vile witchcraft! Begone!"

 ek_daedric_artifacts.0005.desc: "Spending much time and effort on my behalf, my agents found the item in a nameless ruin ridden with undead. The next days were filled with trepidation as my gift from the Lady of Infinite Energies made its way to me.\n\nThankfully, it arrived sooner than I expected. I immediately rushed to my quarters to deliver the blade to my Bright Lady.\n\n"Oh, yes my dear,", her resonating voice echoed through the shimmering halls of my mind. "It is done. Take Dawnbreaker as a symbol of my gratitude and accept your station as my Champion.""
 ek_daedric_artifacts.0005.a: "By Life and Light."
 ek_daedric_artifacts.0005.b: "Milady, I'm not worthy."
 ek_daedric_artifacts.0005.c.toast: "Meridia retrieves her sword and leaves"

 ek_daedric_artifacts.0006.t: "A Cold Plot"
 ek_daedric_artifacts.0006.desc: "I can barely sleep at night, thinking about that corpse in the wild and my heir as a killer. Guilt crawls through my mind, but I'm glad that I did the right thing to protect the honor of our family. I was almost passing out from exhaustion when a voice slithered through my chambers.\n\n"Your weeping disturbs me, mortal. Can't you understand? How else will one carve one's will upon the world if not through one's tongue and blade? The little one at least showed some... will. You, on the other hand? You are nothing. An empty vapor, dispersed by the slightest breeze. But fear not, mortal. I am called Boethiah. Many names have mortals given me. But I am not interested in names. I am interested only in deeds. Sacrifice [sacrifice.GetFirstName] to me and you shall be greatly rewarded.""
 ek_daedric_artifacts.0006.a: "I'm at your service."
 ek_daedric_artifacts.0006.c: "Begone, devious Hunger!"

 ek_daedric_artifacts.0007.t: "Dark Champion"
 ek_daedric_artifacts.0007.desc: "The deed is done, now all I have to do is reap the rewards He-Who-Destroys has promised to me. I call upon my Prince with bated breath.\n\n"You have done well, my Champion. You have earned my respect, a feat few manage and live to tell about. I shall write your name upon the Tablet of Absolute Darkness. You may keep my Ebony Mail, a token of my appreciation to my new champion. Its gifts will resonate with your talents. Now go. I have strings to pull that require my full attention. You may pursue your own course wherever it leads you. Remember always this: As you will it, so it shall be.""
 ek_daedric_artifacts.0007.a: "Say no more."
 ek_daedric_artifacts.0007.b: "I never signed up to be your Champion!"
 ek_daedric_artifacts.0007.b.toast: "Boethiah retrieves the mail and leaves."

 ek_daedric_artifacts.0008.t: "The Chosen"
 ek_daedric_artifacts.0008.desc: "While I'm doing my morning practice, the skies suddenly darkened and a hissing voice resonated through the sky.\n\n"The tales of your deeds with your [ROOT.Char.Custom('signature_weapon')] have caught my attention, mortal. That is most unwise. You Mundus-crawling beasts understand nothing of real power."\n\nA blue portal opens right in front of me and a large demonic creature leaps outside of it, weapon in hand.\n\n"I present to you [boethiahs_champion.GetFirstName], my Champion. I have need of a warrior. Only the most ruthless, cunning, and agile will do. But which among you truly exceeds the other? Prove yourselves to me!""
 ek_daedric_artifacts.0008.a: "Ha! I love a challenge!"
 ek_daedric_artifacts.0008.b: "Mercy!"
 ek_daedric_artifacts.0008.b.toast: "You barely escape with your life!"

 ek_daedric_artifacts.0010.desc: "As [boethiahs_champion.GetFirstName]'s body lays inert on the ground, I feel a great sense of accomplishment. This feeling is interrupted by the same voice as before, now with a different tone to it.\n\n"I greet you, Chosen One! A victory against one of my Champions brings great honor. Take Goldbrand, sheathe it in your enemies, and offer their souls as praise to me.""
 ek_daedric_artifacts.0010.a: "Praise Boethiah!" 
 ek_daedric_artifacts.0010.b: "I did it to honor [ROOT.GetCharacter.GetFaith.HighGodName]."
 ek_daedric_artifacts.0010.b.toast: "Boethiah retreats, offended."

 ek_daedric_artifacts.0011.t: "A True Friend"
 ek_daedric_artifacts.0011.desc: "I have been spending a lot of time with [recipient.GetFirstName] lately. I know what makes [recipient.GetHerHim] smile, cry and laugh.\n\nStill, there's one thing I don't know for sure. I don't know what makes [recipient.GetHerHim] scream. That has become a problem for me lately. I simply must know. [recipient.Custom2('RelationToMe', SCOPE.sC('actor'))|U] and [actor.Custom2('RelationToMe', SCOPE.sC('recipient'))] should know each other inside and out, right? As I sharpen my tools and make sure the ropes are tightly fixed, a deep voice resonates through the dungeon.\n\n"Good, mortal. I want to see a [recipient.GetWomanMan] brought to the edge. And pushed. I will reward you handsomely if you choose to serve the Lord of Brutality. I wish for suffering and death. Will you bring me both?""
 ek_daedric_artifacts.0011.a: "Suffering and death."
 ek_daedric_artifacts.0011.b: "Suffering, not death."
 ek_daedric_artifacts.0011.c: "Get out of my head, Daedra!"

 ek_daedric_artifacts.0012.t: "A Friendly Command"
 ek_daedric_artifacts.0012.desc: "Lately, I have come to consider myself to be a good [ROOT.Char.GetTitleAsName]. My subjects find me amusing and caring, the peasants rejoice anytime I make a public appearance. I bask in my own popularity, while watching my domain through my window, bathed in golden light, as the sun is setting on the horizon. Suddenly, I hear a calm, yet firm voice addressing me.\n\n"Fear not, [ROOT.Char.GetFirstNameNoTooltip]. I am the Queen of Dawn and Dusk, Azura. I have come to you because of your deeds. Your subjects, friends and lovers show you admirable devotion. I want that for me. If you show me the respect and admiration that you have for the mortals under your care and command, I will retribute it to you a thousand-fold. Serve me, and I will reward you well.""
 ek_daedric_artifacts.0012.a: "Whoa, calm down, there, lady! One step at a time."
 ek_daedric_artifacts.0012.b: "I pledge myself to your service, my Queen."
 ek_daedric_artifacts.0012.c: "By [ROOT.GetCharacter.GetFaith.HighGodName], begone!"

 ek_daedric_artifacts.0013.t: "The Wager"
 ek_daedric_artifacts.0013.desc: "While I was reviewing strategies in my chess board, a small figure with a dog on his side approaches me, holding a fine golden cup.\n\n"Greetings, fine [ROOT.Char.GetTitleAsName]. I see you have taken a taste to the board, is it not right?"\n\nThe little man keeps talking before I can interrupt him.\n\n"Of course it's right. So, can I interest you in a little gambling? How about a match for this beautiful cup, huh? If you lose, well, we can negotiate later.""
 ek_daedric_artifacts.0013.a: "Sit down. I will destroy you."
 ek_daedric_artifacts.0013.b: "No, thanks, I have better things to do."

 ek_daedric_artifacts.0015.desc: ""Well, well, well...", the small man said.\n\n"You don't even realise what you got yourself into, have you? No matter, all will be revealed. I am Clavicus Vile, Prince of Trickery and bargains. You now owe me for that game. Don't worry your little mortal mind over this, though. You can repay me with your eternal service. See? I can be reasonable.""
 ek_daedric_artifacts.0015.a: "As you wish."
 ek_daedric_artifacts.0015.b: "You tricked me! I didn't agree to that!"

 ek_daedric_artifacts.0016.desc: "The weird man seems shocked by the result of our bout.\n\n"H-how is it possible? You weren't supposed to win! Y-you cheated, haven't you?""
 ek_daedric_artifacts.0016.a: "Enough excuses, give me my prize."

 ek_daedric_artifacts.0017.t: "The Bitterness of Power"
 ek_daedric_artifacts.0017.desc: "Legends say only the boldest of the bold dare to drink from the Bittercup. I'm more and more certain that I am one of the boldest names in history, for I am seriously consider imbibing from the daedric source."
 ek_daedric_artifacts.0017.risk: "Bittercup will vanish after you drink from it."
 ek_daedric_artifacts.0017.a: "Down the hatch it goes!"
 ek_daedric_artifacts.0017.b: "I can't!"

 ek_daedric_artifacts.0018.t: "Desperate Bargain"
 ek_daedric_artifacts.0018.desc: "I was never a popular person. People would laugh at me, point at me or avert their gazes. After I became [ROOT.Char.GetTitleAsName], people started doing all of that behind my back.\n\nI grow weary of this. I prayed to [ROOT.GetCharacter.GetFaith.HighGodName] again and again to relieve me of this curse or take my life from me, to no avail. I kept doing it anyway. Then, one day, a sympathetic voice answered me.\n\n"Mortal, I have heard your prayers, while your [ROOT.GetCharacter.GetFaith.HighGodName] has not. I offer you a way out of it, if you let go of your old ways and embrace the Master of Insidious Wishes.""
 ek_daedric_artifacts.0018.a: "I pledge myself to you, my Lord."
 ek_daedric_artifacts.0018.b: "I offer my devotion whispered, not shouted."
 ek_daedric_artifacts.0018.c: "This is a test from [ROOT.GetCharacter.GetFaith.HighGodName]!"

 ek_daedric_artifacts.0019.t: "The Sharpest Edge"
 ek_daedric_artifacts.0019.descworthy: "Closely examining my new dagger, I notice an engraving on its side. Sliding my fingers through it, I feel a strange presence and a deep voice can be heard. "You found my razor. Good. Can you feel its hunger? Can you feel its... Frustration? Now I will make you a worthy bearer of it, like it shall always be. Draw a line of blood across the land in the name of Mehrunes Dagon!""
 ek_daedric_artifacts.0019.descunworthy: "Closely examining my new dagger, I notice an engraving on its side. Sliding my fingers through it, I feel a strange presence and a deep voice can be heard. "You have, unfortunately, found my razor. Can you feel its hunger? Can you feel its... Frustration? It's not meant for the likes of you. Now I will take it and confer it to someone who is worthy, the way it should have been. Return the Razor to me, mortal, or suffer the consequences!""
 ek_daedric_artifacts.0019.a: "It will be done, Lord Dagon."
 ek_daedric_artifacts.0019.b: "I could sow destruction from the shadows, my Lord."
 ek_daedric_artifacts.0019.c: "Begone, foul daedra!"

 ek_daedric_artifacts.0020.t: "Black Book: Filament and Filigree"
 ek_daedric_artifacts.0020.desc: "Shortly after I opened the book, the world distorted around me and I was transported to a whole different scenario, the one of a dimly-lit library, the biggest one I've ever seen, expanding itself beyond my line of sight. Above me, a deformed mass of eyes and tentacles pointed at me, invading my mind with a deep but gentle voice.\n\n"I see you have found one of the gifts I bestowed upon the mortal realm. I am Hermaeus Mora. Past, present, and future are as one to me and you deserve a boon for your deeds. I have a great opportunity for you, a choice. Would you choose strength, sorcery or stealth?"
 ek_daedric_artifacts.0020.a: "I seek strength." 
 ek_daedric_artifacts.0020.a.tt.success: "You achieve power"
 ek_daedric_artifacts.0020.a.tt.failure: "Your mind shatters"
 ek_daedric_artifacts.0020.b: "I seek the power of magic."
 ek_daedric_artifacts.0020.b.tt.success: "You conquer sorcery"
 ek_daedric_artifacts.0020.c.tt.success: "You become stealthy"
 ek_daedric_artifacts.0020.c: "I pursue stealth."

 ek_daedric_artifacts.0021.t: "Black Book: The Hidden Twilight"
 ek_daedric_artifacts.0021.desc: "Shortly after I opened the book, the world distorted around me and I was transported to a whole different scenario, the one of a dimly-lit library, the biggest one I've ever seen, expanding itself beyond my line of sight. Above me, a deformed mass of eyes and tentacles pointed at me, invading my mind with a deep but gentle voice.\n\n"I see you have found one of the gifts I bestowed upon the mortal realm. I am Hermaeus Mora. Past, present, and future are as one to me and you deserve a boon for your deeds. I have a great opportunity for you, a choice. Would you choose to impose agony, strengthen your grasp or have a boon bestowed upon you?"
 ek_daedric_artifacts.0021.a: "Bestow upon me your agony."
 ek_daedric_artifacts.0021.a.tt.success: "You thrive upon agony"
 ek_daedric_artifacts.0021.b: "Teach me how tight is your grasp."
 ek_daedric_artifacts.0021.b.tt.success: "Your grasp becomes tighter"
 ek_daedric_artifacts.0021.c: "Grant me your boon."
 ek_daedric_artifacts.0021.c.tt.success: "You receive the boon"

 ek_daedric_artifacts.0022.t: "Black Book: The Sallow Regent"
 ek_daedric_artifacts.0022.desc: "Shortly after I opened the book, the world distorted around me and I was transported to a whole different scenario, the one of a dimly-lit library, the biggest one I've ever seen, expanding itself beyond my line of sight. Above me, a deformed mass of eyes and tentacles pointed at me, invading my mind with a deep but gentle voice.\n\n"I see you have found one of the gifts I bestowed upon the mortal realm. I am Hermaeus Mora. Past, present, and future are as one to me and you deserve a boon for your deeds. I have a great opportunity for you, a choice. Would you choose to be mighty, a powerful sorcerer or be one with the shadows?"
 ek_daedric_artifacts.0022.a: "Grant me might."
 ek_daedric_artifacts.0022.a.tt.success: "You are taught might"
 ek_daedric_artifacts.0022.b: "Teach me sorcery."
 ek_daedric_artifacts.0022.b.tt.success: "You are taught sorcery"
 ek_daedric_artifacts.0022.c: "Teach me how to blend in the shadows."
 ek_daedric_artifacts.0022.c.tt.success: "You learn how to blend in the shadows"

 ek_daedric_artifacts.0023.t: "Black Book: The Winds of Change"
 ek_daedric_artifacts.0023.desc.hashfix: "Shortly after I opened the book, the world distorted around me and I was transported to a whole different scenario, the one of a dimly-lit library, the biggest one I've ever seen, expanding itself beyond my line of sight. Above me, a deformed mass of eyes and tentacles pointed at me, invading my mind with a deep but gentle voice.\n\n"I see you have found one of the gifts I bestowed upon the mortal realm. I am Hermaeus Mora. Past, present, and future are as one to me and you deserve a boon for your deeds. I have a great opportunity for you, a choice. Would you choose to have the insight of a scholar, to have an amicable face or to have an irresistible charm?"
 ek_daedric_artifacts.0023.a: "I want the insights of a scholar!"
 ek_daedric_artifacts.0023.a.tt.success: "You obtain the insights of a scholar"
 ek_daedric_artifacts.0023.b: "Tell me how to be a good friend."
 ek_daedric_artifacts.0023.b.tt.success: "You learn how to befriend someone"
 ek_daedric_artifacts.0023.c: "I want to be irresistible!"
 ek_daedric_artifacts.0023.c.tt.success: "You become irresistible"

 ek_daedric_artifacts.0024.t: "Black Book: Untold Legends"
 ek_daedric_artifacts.0024.desc: "Shortly after I opened the book, the world distorted around me and I was transported to a whole different scenario, the one of a dimly-lit library, the biggest one I've ever seen, expanding itself beyond my line of sight. Above me, a deformed mass of eyes and tentacles pointed at me, invading my mind with a deep but gentle voice.\n\n"I see you have found one of the gifts I bestowed upon the mortal realm. I am Hermaeus Mora. Past, present, and future are as one to me and you deserve a boon for your deeds. I have a great opportunity for you, a choice. Would you choose to have the skills of a bard, to have untold riches or to have one of my minions serve you?"
 ek_daedric_artifacts.0024.a: "I've always wanted to be a bard."
 ek_daedric_artifacts.0024.a.tt.success: "You acquire bardic skills"
 ek_daedric_artifacts.0024.b: "There is nothing better than cold, hard gold."
 ek_daedric_artifacts.0024.b.tt.success: "You acquire unsurmountable wealth"
 ek_daedric_artifacts.0024.c: "I have need of a servant."
 ek_daedric_artifacts.0024.c.tt.success: "You acquire a daedric servant"

 ek_daedric_artifacts.0025.t: "Black Book: Waking Dreams"
 ek_daedric_artifacts.0025.desc: "Shortly after I opened the book, the world distorted around me and I was transported to a whole different scenario, the one of a dimly-lit library, the biggest one I've ever seen, expanding itself beyond my line of sight. Above me, a deformed mass of eyes and tentacles pointed at me, invading my mind with a deep but gentle voice.\n\n"I see you have found one of the gifts I bestowed upon the mortal realm. I am Hermaeus Mora. Past, present, and future are as one to me and you deserve a boon for your deeds. I have a great opportunity for you, a choice. Would you choose to continue your path or would you like a chance to restart?"
 ek_daedric_artifacts.0025.a: "I wish I could go back."
 ek_daedric_artifacts.0025.a.tt.success: "You begin anew" 
 ek_daedric_artifacts.0025.b: "I want to go further."

 ek_daedric_artifacts.0026.t: "A Book that Knows"
 ek_daedric_artifacts.0026.desc: "Shortly after I opened the book, the world distorted around me and I was transported to a whole different and horrifying scenario, where green slime could be seen everywhere amidst the penumbra. Above me, a deformed mass of eyes and tentacles pointed at me, invading my mind with a deep but gentle voice.\n\n"I see you have found the Librum of Knowledge, my Oghma Infinium. I am Hermaeus Mora. Past, present, and future are as one to me and I offer you a deal in return for my book. Of course, you are always free to choose. What would you like in return for my book?"
 ek_daedric_artifacts.0026.a: "I wish to become the best."
 ek_daedric_artifacts.0026.a.tt.success: "You become the very best, like no one ever was"
 ek_daedric_artifacts.0026.b: "I wish to have a longer life."
 ek_daedric_artifacts.0026.b.tt.success: "Your lifespan is increased"
 ek_daedric_artifacts.0026.c: "I wish to keep the book in your name, my Lord."

 ek_daedric_artifacts.0027.t: "To Taste Death"
 ek_daedric_artifacts.0027.desc: "I have been eating the flesh of my equals for a while now. Every time I do it, it tastes sweeter. Every time I do it, other tastes get blander.\n\nOne night, while I was pondering about my next meal, I could hear a voice coming from inside of me, like my intestines were suddenly sentient.\n\n"The desire for power gnaws at the gut, does it not, [ROOT.GetCharacter.GetFirstNameNoTooltip]? Fear not. Namira feels the hunger inside of you. Gnawing at you. You see the dead and your mouth grows wet. Your stomach growls. It's all right. I will not shun you for what you are. Stay. I will grant you a boon if you promise to serve me.""
 ek_daedric_artifacts.0027.a: "I will serve as your champion, Lady of Decay!"
 ek_daedric_artifacts.0027.b: "I will worship you in secret."
 ek_daedric_artifacts.0027.c: "Get away from me, foul Daedra!" 

 ek_daedric_artifacts.0028.t: "Unexpected Results"
 ek_daedric_artifacts.0028.desc: "Right before my eyes, the dead beast transforms itself into a dead man, completely naked, save for a metallic ring in his hand.\n\nI have heard rumors and tales about werebeasts before, but seeing one of them that close was breathtaking."
 ek_daedric_artifacts.0028.a: "Nice find!"
 ek_daedric_artifacts.0028.b: "He deserves a proper burial."
 ek_daedric_artifacts.0028.c: "What an interesting specimen!"

 ek_daedric_artifacts.0029.t: "Unlocking Potential"
 ek_daedric_artifacts.0029.desc: "The Skeleton Key functions as a tool for "unlocking" all things, including portals, hidden potential, and other unknown possibilities.\n\nI've been wondering what hidden potential it could unlock in me, making me a better [ROOT.Char.GetTitleAsName]."
 ek_daedric_artifacts.0029.a: "I'll unlock my true potential!"
 ek_daedric_artifacts.0029.b: "I'd rather keep the key."
 
 ek_daedric_artifacts.0031.t: "A Worthy Challenge"
 ek_daedric_artifacts.0031.desc: "My [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('challenger'))], [challenger.GetFirstNameNoTooltip], has been acting in a very strange way lately. [challenger.GetSheHe|U] has been extremely rude to [challenger.GetHerHis] courtiers, peasants and servants, sometimes costing them their very lives. Talks about the [challenger.GetTitleAsName] getting mad reached my ears.\n\nWhile pondering about it, a deep, brash voice invaded my thoughts.\n\n"Power is intoxicating, isn't it? Your [ROOT.Char.Custom2('RelationToMeShort', SCOPE.sC('challenger'))], [challenger.GetFirstNameNoTooltip], is drunk. Does this injustice not consume you from the inside? Malacath will not have your rage denied! Prepare yourself. [challenger.GetFirstNameNoTooltip] comes to you. Defeat [challenger.GetHerHim] and claim [challenger.GetHerHis] lands for yourself!""
 ek_daedric_artifacts.0031.a: "Let [challenger.GetHerHim] come."
 ek_daedric_artifacts.0031.b: "Get away from me, daedra."

 ek_daedric_artifacts.0033.desc: "I stand victorious, as [challenger.GetFirstNameNoTooltip]'s body lies lifeless on the floor. Again, I hear the same forceful voice.\n\n"Well done, mortal. In exchange for the death of that [challenger.Custom('InsultNoun')], I will give you the Volendrung, my most prized possession in your world. It will make you most powerful indeed.""
 ek_daedric_artifacts.0033.a: "I graciously accept."
 ek_daedric_artifacts.0033.b: "I did it for the realm, not for you."

 ek_daedric_artifacts.0034.t: "Tickled to Death"
 ek_daedric_artifacts.0034.desc: "While the peasants celebrated a folk festival, a masked jester, doing funny tricks, caught my attention.\n\n"Turn your frown upside-down in your wrinkles\nLook at my garb, see for yourself how it twinkles!\nI am a knight in a quest for your giggles\nGreat jokes and fun from your old friend Tickles!"\n\nI was laughing hysterically at [ROOT.Char.GetHerHis] antics, but no one else seemed to notice [ROOT.Char.GetHerHim]."
 ek_daedric_artifacts.0034.a: "I want this jester performing in my next feast!"
 ek_daedric_artifacts.0034.a.tooltip: ""What jester, my liege?""
 ek_daedric_artifacts.0034.b: "That was funny, but enough of that."

 ek_daedric_artifacts.0035.new_life.t: "New Life Festival: Tickled to Death"
 ek_daedric_artifacts.0035.desc: "The feast is going great, the guests are all properly entertained, but I feel in my heart that something is missing. That's when it happens. Gloriously clad in colourful garbs, with [ROOT.Char.GetHerHis] mysterious mask and a shiny cap'n'bells, Tickles, the Jester, entered the hall tooting an imaginary fanfare while making silly sounds with [ROOT.Char.GetHerHis] mouth. It was clearly one of the most marvelous things I have witnessed in my entire life, but no one was paying enough attention. [concerned_courtier.GetFirstNameNoTooltip] was standing right next to me, so I called [concerned_courtier.GetHerHis] attention and asked if [concerned_courtier.GetSheHe] was not seeing that beauty of a performance. [concerned_courtier.GetSheHe|U] looked me straight in the eyes, concern weighing on [concerned_courtier.GetHerHis] shoulders.\n\n"[SCOPE.sC('concerned_courtier').Custom2('RelationToMeShort', ROOT.Char)|U] of mine, you can't possibly be serious. There's no one in there.""
 ek_daedric_artifacts.0035.a: "What do you mean? [ROOT.Char.GetSheHe|U] is right there! And [ROOT.Char.GetSheHe] is my new Court Jester!"
 ek_daedric_artifacts.0035.a.tooltip: "[concerned_courtier.GetFirstNameNoTooltip] grows even more concerned while Tickles is hired as your court jester"
 ek_daedric_artifacts.0035.b: "Sure, sure, I was joking, there are no jesters in the hall."
 ek_daedric_artifacts.0035.b.tooltip: "You hire Tickles as your court jester anyways"
 ek_daedric_artifacts.0035.c: "Wait, do you seriously not see [ROOT.Char.GetHerHim]? Am I going insane?"
 ek_daedric_artifacts.0035.c.tooltip: "[concerned_courtier.GetFirstNameNoTooltip] reassures you and you become closer than ever"

 ek_daedric_artifacts.0038.desc: "A letter is waiting for me as I return to my chambers, written in red ink — no, in #EMP blood#!.\n\n#EMP You really don't get it, do you? If you really want to discover who has been committing all those murders, come find me at midnight.#!\n\nThis handwriting... It almost looks like my own!"
 ek_daedric_artifacts.0038.a.tt: "I will attend this meeting and find out!"

 ek_daedric_artifacts.0039.t: "Murders at Court: Tickled to Death"
 ek_daedric_artifacts.0039.desc: "Going to the meeting point, a strange feeling of déjà-vu wraps around my mind and mid-way through the trip I notice that the location was never disclosed in the letter, but before I could start wondering if I had gone to the wrong place, I find [ROOT.Char.GetHerHim] standing right where I was going.\n\n"Hello [ROOT.Char.GetFirstNameNoTooltip]," [ROOT.Char.GetSheHe] says, looking me up and down while removing [ROOT.Char.GetHerHis] mask. "It is about time you found out about me. We did really enjoy our... #EMP time together#!, haven't we?"\n\nThe smile that spreads over [ROOT.Char.GetHerHis] face sends a shiver down my spine. It's identical to my own.\n\n"Lord Sheogorath offers you a choice. Accept who you are and be showered with boons. Deny his gifts and suffer for eternity.""
 ek_daedric_artifacts.0039.a: "I accept who I am."
 ek_daedric_artifacts.0039.b: "I... must confess."
 ek_daedric_artifacts.0039.c: "Tickles, you're such a silly jester!"

 ek_daedric_artifacts.0040.t: "Unlocking Potential"
 ek_daedric_artifacts.0040.desc: "The Shadowkey functions as a tool for "unlocking" all things, including portals, hidden potential, and other unknown possibilities.\n\nI've been wondering what hidden potential it could unlock in me, making me a better [ROOT.Char.GetTitleAsName]."
 ek_daedric_artifacts.0040.a: "I'll unlock my true potential!"
 ek_daedric_artifacts.0040.b: "I'd rather keep the key."

 ek_daedric_artifacts.0041.t: "Bane of Daedra"
 ek_daedric_artifacts.0041.desc: "Having no friends never bothered me that much but, lately, seeing people laughing together, playing games and making plans has frustrated me immensely.\n\nOne night, praying in my room for any modicum of company, my prayers seemed to be answered, but not in the way I was expecting.\n\n"Are you alone, little mortal? Fret not, for the Prince of Outcasts is here. I offer you the bold defender of the friendless, in exchange for your undying loyalty. Do not reject me, mortal, or being without company will be the least of your problems.""
 ek_daedric_artifacts.0041.a: "I accept, Master!"
 ek_daedric_artifacts.0041.b: "I don't care for trinkets, Daedra."

 ek_daedric_artifacts.0042.t: "Whom Gods Annoy"
 ek_daedric_artifacts.0042.desc: "There were rumors a spellsword was passing through [ROOT.Char.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] and heard that I like to buy curiosities.\n\nI invited [spellsword.GetHerHim] to my court to see what that was about. [spellsword.GetSheHe|U] wanted to sell an intricate [Glossary( 'Daedric', 'DAEDRA_GLOSS' )] staff. I eagerly examined it, knowing the value of Daedric relics. In fact, I was a bit suspicious when [spellsword.GetSheHe] told me its price."

 ek_daedric_artifacts.0043.desc: "After examining it for a bit I noticed a small word carved on it in [Glossary( 'Daedric', 'DAEDRA_GLOSS' )] runes. Using a book from my library, I translated it. The word was "nonsense".\n\nHowever, when I spoke it and held the staff, four scamps suddenly appeared! I thought I was done for! Strangely, they all just stood there.\n\nIt didn't take long before I realized they were following me! I couldn't be seen around with scamps following, so I decided to discard the staff. I can't explain it, but somehow I can't compel myself to actually let it go.\n\nReading more about it, I figured out that it can only be disposed of in its place of origin. That would be the shrine of Sheogorath in Darkfathom Cave, in the middle of the Cyrodiilic Blackwoods!"
 ek_daedric_artifacts.0043.a: "This staff is obviously cursed!"

 ek_daedric_artifacts.0044.desc: "I spent a great amount of time calculating, in secret, how much a trip to Darkfathom would cost to my coffers.\n\nWith that cost established, I realised I spent too much time procrastinating on finishing that calculation. The staff takes a hold on me. I can't stop staring at it. I'm starting to get used to the smell and the scamps almost seem... Charming."
 ek_daedric_artifacts.0044.a: "Get a hold of yourself!"
 ek_daedric_artifacts.0044.b: "I can manage to stay with them a little longer."

 ek_daedric_artifacts.0045.desc: "I have finally arrived at this accursed shrine! However, I can feel the staff's pull on me getting stronger as I approach my destination.\n\nI look to its fine craftsmanship and beautiful engravings and I almost weep by thinking this would be the last time I see my beloved pets. I've come to cherish their company, I could even say that I learned to love them."
 ek_daedric_artifacts.0045.a: "This madness must end!"
 ek_daedric_artifacts.0045.b: "NO! I'm not ready yet!"

 ek_daedric_artifacts.0046.t: "All Things Must Pass"
 ek_daedric_artifacts.0046.desc: "It has been quite some time now since I got rid of that accursed staff and those hideous scamps. I now see that even the hardest pains and grievances turn into dust with the passing of time.\n\nI realised that things that once enfuriated me do not affect me that much anymore."
 ek_daedric_artifacts.0046.a: "I just let it go."

 ek_daedric_artifacts.0042.a: "[spellsword.GetHerHis|U] loss, my gain."
 ek_daedric_artifacts.0042.b: "This seems too suspicious."

 ek_daedric_artifacts.0047.t: "Champion of Dreams"
