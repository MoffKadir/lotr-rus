 major_decisions.3100.tt_opinion_sorcerous: "Vassals of [cultures|E] with $tradition_sorcerer_kings_name$ [culture_tradition|E] or with $magicka_legacy_4_name$ [dynasty|E] legacy"
 major_decisions.3100.tt_opinion_altmeri: "Vassals of [cultures|E] with [GetCultureTradition('tradition_ceremoniarchy').GetName|V] [culture_tradition|E] and faith with the [GetFaithDoctrine('tenet_legalism').GetBaseName], [GetFaithDoctrine('tenet_divine_purity').GetBaseName] [core_tenets|E]"

 ek_faith_events.0007.t: "A New Battle[ROOT.Char.GetLadyLord]"
 ek_faith_events.0007.desc.fallback: "With [previous_battlelord.GetTitledFirstName]'s passing, the [GetTitleByKey('d_laamp_battlelords').GetName|l] now look to me for leadership. While our order accepts warriors of any creed, the $forgotten_gods_adherent$ faithful among us have made clear their disapproval that I have not devoted myself to Ebonarm. [fg_follower.GetFirstName] asks me if I will proclaim my devotion to Ebonarm the Black Knight — not merely as a hero, but as my divine patron."
 ek_faith_events.0007.desc.a: "In life, [previous_battlelord.GetTitledFirstName] had forsaken the worship of Ebonarm. Now that [previous_battlelord.GetFirstName] is dead, and I have assumed leadership of [GetTitleByKey('d_laamp_battlelords').GetName|l], the $forgotten_gods_adherent_plural$ among us who pray to the Black Knight look to me and wonder if I will return to the old ways of our order. [fg_follower.GetFirstName] asks me if I will proclaim my devotion to Ebonarm the Black Knight — not merely as a hero, but as my divine patron."
 ek_faith_events.0007.a: "Praise Ebonarm!"
 ek_faith_events.0007.b: "But I refuse!"
 every_fg_follower: "Every $forgotten_gods_adherent$ follower"


 ek_murder_ongoing.0001.t: "A Meeting with the Master"
 ek_murder_ongoing.0001.desc: "I eagerly await the arrival of the Morag Tong Master after acquiring the [writ_of_execution|E]. A sense of reverence fills the room as the Master steps forward, [assassin.GetHerHis] presence commanding respect and admiration.\n\nWith a solemn nod, the Master acknowledges my presence. [assassin.GetHerHis|U] voice, low and resonant, fills the room as [assassin.GetSheHe] addresses me with a sense of authority that demands attention. I listen intently, absorbing every word.\n\nAs the meeting draws to a close, the Master imparts a final word of caution, reminding me of the consequences that come with my decision. The fate of [target.GetName] now lies in their capable hands, guided by the discretion of the Morag Tong."
 ek_murder_ongoing.0001.a: "This is true civilization."

 ek_murder_ongoing.0002.t: "Boethiah's Gold"
 ek_murder_ongoing.0002.desc: "The Morag Tong Master sends me a letter.\n\n"My [ROOT.Char.GetLadyLord], I can safely share the information that one of my assassins, disguised as a servant, have begun poisoning [target.GetName]. This poison leaves no trace but will afflict whoever touches it with weakness and ill humors. It is called Boethiah's Gold.""
 ek_murder_ongoing.0002.a: "Good riddance."

 ek_murder_ongoing.0003.t: "From the Inside"
 ek_murder_ongoing.0003.desc: "A letter, marked with the Morag Tong seal, arrives.\n\n"My [ROOT.Char.GetLadyLord], I can safely share the information that one of my assassins has infiltrated [target.GetName]'s inner circle. [target.GetSheHe|U] considers [assassin.GetHerHim] a confidant and [assassin.GetSheHe] will start using that as a leverage, but the results of said intrusion can compromise the fulfillment of the Writ.\n\nAs this Honorable Execution is of your immediate interest, I am reporting said attempt to you.""
 ek_murder_ongoing.0003.a: "[assassin.GetSheHe|U] went for it..."
 ek_murder_ongoing.0003.a.success: "[assassin.GetSheHe|U] remains undetected"
 ek_murder_ongoing.0003.a.failure: "The assassin is discovered"
 ek_murder_ongoing.0003.toast.success: "The assassin remains undetected"
 ek_murder_ongoing.0003.toast.failure: "The assassin is discovered"
 ek_murder_ongoing.0003.b: "[assassin.GetSheHe|U] kept [assassin.GetHerHis] mouth shut."

 ek_murder_ongoing.0004.t: "A Pleasing Letter"
 ek_murder_ongoing.0004.desc: "A messenger delivers me a note crested with the Morag Tong's seal.\n\n"My [ROOT.Char.GetLadyLord], we are pleased to report that we have assigned the Writ against [target.GetName] to one of our Thinkers of the Morag Tong, already in the area of [target.GetCapitalLocation.GetName].\n\nWith such a high-ranking member of the Tong handling the Writ, we are hopeful that we will be able to execute this writ sooner than previously expected.""
 ek_murder_ongoing.0004.a: "Capable hands at last!"

 ek_murder_ongoing.0006.t: "Alluring Piety"
 ek_murder_ongoing.0006.desc: "One of the servants awaits me with a message, emblazoned with the Morag Tong symbol.\n\n"My [ROOT.Char.GetLadyLord], I came to you to report that the contract has a new fruitful happening. We have one of our best agents in a position of trust, impersonating a local priest in [target.GetCapitalLocation.GetName] and [target.GetName] has been enjoying [assassin.GetHerHis] company lately.\n\nWith this newfound leverage, [assassin.GetSheHe]...""
 ek_murder_ongoing.0006.a: "Managed to use [assassin.GetHerHis] diplomatic skills to ensure proximity."
 ek_murder_ongoing.0006.a.success: "[assassin.GetSheHe|U] manages to pull it off"
 ek_murder_ongoing.0006.a.failure: "[assassin.GetSheHe|U] fails miserably"
 ek_murder_ongoing.0006.a_gregarious: "Hold it! I'll tell you exactly what to do."
 ek_murder_ongoing.0006.b: "Used [assassin.GetHerHis] superior knowledge to maintain legitimacy."
 ek_murder_ongoing.0006.b_scholar: ""Wait, I know just what would interest [target.GetName].""
 ek_murder_ongoing.0006.c: "Divine matters are not to be trifled with!"

 ek_murder_ongoing.0007.t: "A Lethal Messenger"
 ek_murder_ongoing.0007.desc: "An agent of the Morag Tong awaits me with news.\n\n"My [ROOT.Char.GetLadyLord], I am thrilled to announce that one of our members has the opportunity to become a personal courier to [target.GetName]. Should we decide to go forward with this, our messenger pidgeon can further our efforts to carry out our Writ.""
 ek_murder_ongoing.0007.a: "Good news!"
 
 ek_murder_ongoing.0008.t: "Productive Associates"
 ek_murder_ongoing.0008.desc: "A cloaked messenger delivers me a letter.\n\n""My [ROOT.Char.GetLadyLord], We are pleased to inform you that some Associates of the Morag Tong, already in [target.GetCapitalLocation.GetName], are able to enter support roles in the writ against [target.GetName].\n\nThough these associates are untested, and untrained in the Mephalic skills, their support will be invaluable to our assigned assassin. However, their lack of training may present significant risks to the security of this writ. Herefore, I am writing to ask you to approve of this action.""
 ek_murder_ongoing.0008.a: "The more the merrier!"
 ek_murder_ongoing.0008.b: "The fewer the favourabler!"

 ek_murder_ongoing.0009.t: "An Intriguing Letter"
 ek_murder_ongoing.0009.desc: "I am surprised by a small scroll engraved with the Morag Tong sigil on it.\n\n"My [ROOT.Char.GetLadyLord], I am sorry to have to announce that the previous Master assigned to this writ has been reassigned.\n\nUnfortunately, the transitional period, in which I will be establishing operations at the former guild hall, will be diverting Tong attention until the transition completes. I hope you will understand.""
 ek_murder_ongoing.0009.a: "I will pay to ensure uninterrupted operation of my writ."
 ek_murder_ongoing.0009.b: "Acceptable."
 ek_murder_ongoing.0009.c: "Unacceptable! I demand a refund."

 ek_murder_ongoing.0010.t: "Thrall Betrayal"
 ek_murder_ongoing.0010.desc: "A servant, livid, hands me a note.\n\n"My [ROOT.Char.GetLadyLord], it is with great regret that I must inform you that the Thrall that we assigned to your writ against [target.GetName] has abandoned all writs, and has absconded to parts as yet unknown.\n\nNonetheless, I am writing to discuss our options moving forward. Our new members require extra... Motivation to maintain our schedule.""
 ek_murder_ongoing.0010.a: "Let the assassins know I am behind this."
 ek_murder_ongoing.0010.b: "I shall dangle a bribe in front of these assassins."
 ek_murder_ongoing.0010.c: "I paid you to complete this writ, and you shall honour the contract."
 ek_murder_ongoing.0010.d: "The mere act of asking shows I was wrong to engage the Morag Tong."

 ek_murder_ongoing.0011.t: "A Grand Setback"
 ek_murder_ongoing.0011.desc: "I've found an exquisitely decorated envelope in my chambers, finely decorated with the Morag Tong seal.\n\n"My [ROOT.Char.GetLadyLord], I am the Grandmaster of the Morag Tong. Mephala has forsaken our guild hall which was handling your writ against [target.GetName], and everybody from the Master down to the lowest Associate has been killed or apprehended. We are deeply regretful to have had this happen, and even more regretful that it interferes with the commission of your scheme. I have enclosed a full refund and some compensation for our failure. Please advise me on whether you wish to continue with this writ, in which case we will begin our operation anew, or to abandon it.""
 ek_murder_ongoing.0011.a: "Begin it again."
 ek_murder_ongoing.0011.b: "I shall handle this myself from now on."
 ek_murder_ongoing.0011.c: "It seems that this assassination is not fated to be."

 ek_murder_ongoing.0012.t: "Worth Its Weight In Gold"
 ek_murder_ongoing.0012.desc: "As I wander through my palace, I feel a note appearing in my pocket.\n\n"My [ROOT.Char.GetLadyLord],  as you are doubtless aware, the Morag Tong is not a charitable organisation. We are a Mephalic guild, with a long and storied history.\n\nIt has come to my attention that, though you have contracted us for a matter, you have not given us fair consideration. I trust that you understand the implications of this letter.""
 ek_murder_ongoing.0012.a: "Throw in a bonus to make sure this doesn't happen again."
 ek_murder_ongoing.0012.b: "Confound these grasping assassins! I'll pay…"
 ek_murder_ongoing.0012.c: "No. Would Mephala want her followers to extort?"
 ek_murder_ongoing.0012.c.flavor: "Yes."

 ek_murder_ongoing.0013.t: "Cat Got Your Tong?"
 ek_murder_ongoing.0013.desc: "I woke up in the middle of the night with the sound of a note falling in my nightstand.\n\n"My [ROOT.Char.GetLadyLord], I am pleased to offer an update on the progress of your writ. The guards have arrested our operative assigned to your writ.\n\nWe are assigning a new assassin now, but there will be a delay in the execution of this writ. This could take time.\n\nThank you for your understanding.""
 ek_murder_ongoing.0013.a: "Most unfortunate."

 ek_murder_ongoing.0014.t: "A Captured Thrall"
 ek_murder_ongoing.0014.desc: "A courier delivers me a letter with the Morag Tong sigil upon it.\n\n"My [ROOT.Char.GetLadyLord],  I am writing to you to announce that, regretfully, [target.GetName]'s guards have captured and interrogated a thrall who was assisting in your writ in a support role.\n\nThis will not end the writ — the Morag Tong will not abandon writs so easily — but you must understand that this will compromise the secrecy of this writ unless the Morag Tong withdraws in the area of [target.GetCapitalLocation.GetName], which will delay execution of all writs there.\n\nAs you are our foremost patron in the locality, we wish to consult you in this matter. Which option would you prefer?""
 ek_murder_ongoing.0014.a: "I will accept any breach of secrecy if it will see [target.GetFirstName] dead faster!"
 ek_murder_ongoing.0014.b: "I understand. Please withdraw to protect your secrecy."

 ek_murder_ongoing.0015.t: "Mephalic Boon"
 ek_murder_ongoing.0015.desc: "A cloaked envoy delivers me a letter.\n\n"Mephalic wishes to those who would grasp in their own hands the black hands of our patron the ancipation of our lord Poesy of Vivec. The ever-spinning web draws tighter at its centre where I a Master of the Morag Tong feel the Aurbic strokes at the edges where those under the Three move as they were long ago commanded by the anticipatory triumvirate such as you yourself to whom I now write. The spinner has left behind her a trail of secrets and murders and you have one and wish for it to become the other and it is us to whom you have turned to enact this most sacred of metamorphoses. Hail to the webspinner; move in shadows.""
 ek_murder_ongoing.0015.a: "What?"
 mephalic_boon: "You receive a Mephalic Boon!"