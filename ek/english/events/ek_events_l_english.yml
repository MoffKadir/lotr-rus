 ek_daedric_artifacts.0060.t: "A Vampiric Blade" #draft event loc, needs peer review
 ek_daedric_artifacts.0060.descworthy: "As I examine my katana, its sharp edge nicks my skin causing a small cut and I feel a tiny part of my life force leech away. I sense a strange presence and a mysterious voice whispers in my ear. "Good, you found my blade. Can you feel its power? Can you feel its... hunger? You will be a fine bearer of my blade, as long as you hold it, you will absorb the energy of any foe you cut down. Go forth and bring terror and strife to the land in the name of Mephala!""
 ek_daedric_artifacts.0060.descunworthy: "As I examine my katana, its sharp edge nicks my skin causing a small cut and I feel a tiny part of my life force leech away. I sense a strange presence and a mysterious voice whispers in my ear. "You found my blade. Can you feel its power? Can you feel its... hunger? You are not worthy to bear my blade. Return it to me at once of suffer the consequences!""
 ek_daedric_artifacts.0060.a: "Thank you for this gift, Webspinner."
 ek_daedric_artifacts.0060.b: "I will serve you as a whisper in the dark."
 ek_daedric_artifacts.0060.c: "Begone, foul daedra!"
 
 ek_daedric_artifacts.0061.t: "Blight and Pestilence" #draft event loc, needs peer review
 ek_daedric_artifacts.0061.desc: "Lately, I have been thinking a lot about disease and plagues. As I whisper to myself, pondering their source and how they shape the natural order of the world, I sense a strange presence as an otherworldly voice begins to speak to me. "Do you think on my blessings mortal? Would you serve me and spread them throughout the land? I am the Prince of Pestilence, Peryite. Serve me, and I will grant you a gift.""
 ek_daedric_artifacts.0061.a: "I will serve you but not openly."
 ek_daedric_artifacts.0061.b: "I pledge myself to your service, Blighted Lord."
 ek_daedric_artifacts.0061.c: "By [ROOT.GetCharacter.GetFaith.HighGodName], begone!"
 
