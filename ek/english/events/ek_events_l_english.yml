 ek_death_management.0001.t: "Know Thyself: Unconquered"
 ek_death_management.0001.lich.desc: "A year ago, I knew my death was imminent. But today, I stand here, alive — or almost alive — and unconquered. I have become an immortal lich, beyond the reach of death. A mere mortal might foresee their impending demise and await it. I foresaw my death and triumphed over it."
 ek_death_management.0001.lich.a: "Now death serves me."
#NOTE TO TRANSLATORS: this is not a mistake, it is a joke
 ek_death_management.0001.vampire.desc: "A year ago, I knew my death was imminent. But tonight, I stand here, almost alive. I have escaped death's grasp: I have become a vampire. Mere mortals, as I once was, might foresee their death and quake in fear. I foresaw my death, and denied it. Now I visit it upon mortals on the points of my fangs."
 ek_death_management.0001.vampyre.desc: "A year ago, I knew my death was imminent. But tonight, I stand here, almost alive. I have escaped death's grasp: I have become a vampyre. Mere mortals, as I once was, might foresee their death and quake in fear. I foresaw my death, and denied it. Now I visit it upon mortals on the points of my fangs." 
 ek_death_management.0001.vampire.a: "I shall live forever"
 #ek_death_management.0001.briarheart.desc: "A year ago, I knew my death was imminent. But I, like Lorkh, faced death. And while I may not have escaped unscathed, I escaped alive. The gaping hole, and beating briar heart, within my chest prove it. Weak cowards might foresee their deaths and fear it. But we Briarhearts know there is nothing to fear. Death is rebirth."
 #ek_death_management.0001.briarheart.a: "And I am reborn."
 ek_death_management.0001.lifespan_6.desc: "A year ago, I knew my death was imminent. But since then, I have become practically immortal. I need no longer fear death, for life has extended itself before me into the endless future. Other mortals might foresee their death and resign themselves to its inevitability, but I did not. I have faced death, and it has backed down."
 ek_death_management.0001.lifespan_6.a: "My life awaits me."

 ek_wild_magic_event.0001.t: "The Wild Magic Stirs"
 ek_wild_magic_event.0001.opening: "Secret knowledge passed down among our people from generation to generation allows us a deeper understanding, a deeper attention to the shifting of the mortal world around us. Magicka is all around us, penetrates us and affects us - and our sensitivity to it allows us an innate feel for its movements.\n\nNow the Wild Magic is again shifting and"
 ek_wild_magic_event.0001.weak: "it has stilled to almost nothing. An emptiness fills me - have I been abandoned? What have I done to deserve such a weakening of my innate powers? I must rest, and preserve my arcane talents until a better day."
 ek_wild_magic_event.0001.bad: "its illuminous streaks of light have softened, the starlight itself seemingly dimming to my mind. My arcane powers are waning, yet so be it. Another day will come, and my powers will then be doubly strengthened."
 ek_wild_magic_event.0001.neutral: "it has stabilised itself, overtaken by calm and peace. I am left at my natural state of arcana."
 ek_wild_magic_event.0001.good: "its intensity is waxing, strengthening my pool of Magicka and allowing me greater power than what is normally gifted to me. I would do wise in making good use of this."
 ek_wild_magic_event.0001.powerful: "it is roaring inside me, twisting and turning with immense power that simply must make its presence known. The winds are now a storm, a mighty storm and along with it my power has grown to levels I have rarely felt. A glorious and fateful day!"
 ek_wild_magic_event.0001.option1: "I feel weakened."
 ek_wild_magic_event.0001.option2: "My strength wanes."
 ek_wild_magic_event.0001.option3: "Very well."
 ek_wild_magic_event.0001.option4: "My strength waxes."
 ek_wild_magic_event.0001.option5: "I feel powerful!"

 ek_responsible_suicide.0001.t: "The Responsible Choice"
 ek_responsible_suicide.0001.desc: "I am washed and perfumed, dressed in a fine burial shroud, stitched upon which are solemn words of comfort. Even my ghost will be known to have done nothing wrong, nor to have allowed wrong-doing to besmirch the name of House [house.GetNameNoTooltip].\n\nI kneel before my kinsmen and retainers, grim-faced and resolute all. I raise my knife to my abdomen, and pray my last living prayer:\n\n#italic "The fire is mine: let it consume thee,\nand make a secret door\nat the altar of Padhome\nIn the House of Boet-hi-Ah\nWhere we become safe\nAnd looked after."#!"
 ek_responsible_suicide.0001a: "I commend a pure memory of me unto [heir.GetFirstName]"
 ek_responsible_suicide.0001b: "Let [liege.GetTitledFirstName] be half-slain with this!"
 ek_responsible_suicide.0001c: "No! Leave me! I must live!"
 ek_responsible_suicide.0001a.flavor: "You take ultimate responsibility for your sins, to restore honour to your House."
 ek_responsible_suicide.0001b.flavor: "You take ultimate responsibility as a protest to the actions and character of your superiors."
 ek_responsible_suicide.0001c.flavor: "You back out of making this choice."
 responsible_suicide_death_tooltip: "@death_icon! You die"

 ek_responsible_suicide.0002.t: "The Responsible Choice"
 ek_responsible_suicide.0002.desc: "There is an ominous silence in my kinhouse. People avoid looking at me, and there is a growing sense of resentment in the air. It seems that all my vassals are here today to quietly accuse me, all of them save one.\n\n[responsible.GetName], that wretched cur, has gone and ritually disemboweled [responsible.GetHerselfHimself], claiming that [responsible.GetSheHe] could no longer bear living witness to the shame and folly with which I am bringing ruin to the ancestral patrimony of House [ROOT.Char.GetHouse.GetNameNoTooltip] and its retainers.\n\nUnderscored with [responsible.GetHerHis] blood, these ridiculous accusations have spread far and wide. All across Morrowind, people are speaking ill of the House that martyrs its servants!"
 ek_responsible_suicide.0002a: "I should have killed [responsible.GetTitledFirstName] when [responsible.GetSheHe] still lived!"

 life_extension.0001.t: "Out of Reach"
 life_extension.0001.desc: "As I delved deeper into the arcane and mystical realms, my insatiable quest for immortality led me down a treacherous path. I sought the power to extend my lifespan, to transcend the limitations of mortal existence. In my relentless pursuit of forbidden knowledge, I summoned magics beyond my understanding, invoking ancient incantations and bargaining with dark forces.\n\nHowever, my endeavors to elongate my existence have ended in failure. The secrets of immortality remain elusive, concealed in the depths of the mystical arts. The magic I wielded was not powerful enough to grant me the longevity I so desperately sought, and I am left to confront the harsh reality of my mortality. This defeat weighs heavily on my shoulders, a stark reminder that the pursuit of eternal life comes at a great cost and often leads to tragic consequences."
 life_extension.0001.a: "My time is nearing its end..."

 life_extension.0002.t: "Reaching for Eternity"
 life_extension.0002.life1.desc: "Through years of tireless study and countless experiments, I have successfully unlocked the secrets of longevity.\n\nMy years now stretch into the early hundreds, an age rarely reached by my kind. With newfound vitality and wisdom, I can continue to shape the world and leave my mark upon history."
 life_extension.0002.life2.desc: "Through relentless dedication and unwavering commitment to the pursuit of knowledge, I have successfully unlocked the enigmatic secrets of longevity. With profound insight into the mystical forces that underpin existence, I have extended my lifespan, achieving an age that defies the norms of mortals. I now stand upon the precipice of my mid-100s, a rare and remarkable feat in a world of fleeting years.\n\nThe years have gifted me with enduring vitality and unparalleled wisdom. With this newfound lease on life, I am well-equipped to continue my journey of enlightenment and influence the course of history in ways few can fathom. As I look ahead to the uncharted territory of my future, I know that the possibilities are endless, and the legacy I shall leave will be one of extraordinary significance. This achievement stands as a testament to the boundless potential of human determination and the unrelenting pursuit of truth and power."
 life_extension.0002.life3.desc: "After years of relentless study and unwavering commitment to the arcane arts, I have achieved the unimaginable. Through my profound understanding of ancient and hidden knowledge, I have successfully extended my lifespan to reach the astonishing age of the mid-200s. My existence defies the limitations of mortals, and I have become a living testament to the boundless potential of the human spirit.\n\nThis newfound longevity has granted me unparalleled wisdom, power, and influence. As I step into the uncharted territory of my future, I am armed with the knowledge and strength to shape the world in profound ways that few can conceive. My legacy is poised to transcend generations, and I stand as a beacon of what is attainable through unwavering determination, esoteric understanding, and the relentless pursuit of greatness. This remarkable achievement stands as a testament to the inexhaustible depths of human potential, and I am now poised to leave an indelible mark on history."
 life_extension.0002.life4.desc: "Through the relentless pursuit of magical and alchemical knowledge, I have achieved an extraordinary feat that defies the boundaries of mortality.\n\nMy lifespan has been extended to reach an astonishing age in the mid-300s, marking me as an exceptional and legendary figure in the annals of history."
 life_extension.0002.life5.desc: "With unwavering dedication and a profound mastery of arcane arts and alchemical sciences, I have achieved a feat that transcends the limits of mortality.\n\nMy lifespan now extends to a staggering age in the mid-550s, a milestone that places me in a realm of existence far beyond the reach of ordinary mortals."
 life_extension.0002.life6.desc: "In a momentous and awe-inspiring turn of fate, I have transcended the limitations of mortality and achieved true immortality. My existence is now untethered by the passage of time, and I stand as an eternal sentinel amid the ebb and flow of history.\n\nThis profound transformation has granted me unfading life, an existence unbound by the chains of aging."
 life_extension.0002.a: "Truly wondrous..."

 life_extension.0290.t: "Transcending Mortality"
 life_extension.0290.desc1: "It is time. I have granted unlife to the lesser souls of other people long enough; now, I will achieve it for myself.\n\nHowever, I am well aware that there is a fine line between life and death. One step too far, and my soul may be lost forever, cast into the darkness of oblivion. One step too little, and my body will suffer deeply without achieving its goal.\n\nAm I willing to take that risk? Is my knowledge of the arcane sufficient enough to carry my soul beyond life and into the cold clutch of undeath?"
 life_extension.0290.desc2: "WIP event desc for mastery over undeath tenet" #EK TODO LOC
 life_extension.0290.desc_mannimarco: "I still recall my expulsion from the Psijic Order so many years ago. Those narrow-minded fools could not see the heights of magical skill I knew, even then, that I would attain. Such was their arrogance that they thought that sending me here, to Tamriel, would somehow be a punishment — what folly! Here, I have had practically unlimited resources to hone my craft and sharpen my mastery over death!\n\nAnd it is this mastery which shall carry me forward into the future, for, today, I will take the next step towards my final ascension to godhood: lichdom. I will use my great power, beyond Vanus Galerion's so-called Mage's Guild and beyond my former "masters" in the Psijic Order. With this great power I will turn my very soul into a reservoir of magicka from which I will draw to chart my course into the future, as the master of death."
 life_extension.0290.desc_attrebus: "I have dedicated my life to fighting the Tsaesci. They are unnatural serpents, foreign and undying. The more the land cries out against them, the tighter they coil around it. When I die, they will live. I cannot die knowing that they will remain. To defeat the serpent, I must match the serpent, and I can only do that by becoming as immortal as they.\n\nMy slaughter of the Tsaesci will take on a new purpose. No longer will it be mere scouring. No: the power of their deaths will raise me beyond mortality. To cast them out, I will stoop to their depths. But I must be careful. The serpent's profane magicks grant him life eternal, but my own methods could cast me into death forever without recourse or return. And then my mission would fail. But surely it is worth it, to uncoil the serpent’s grasp…"
 life_extension.0290.desc_rilis_xii: "I tire of the constraints of Altmer society and the limited Altmeri form. We claim to be so perfect, yet when power is within our grasp, we turn our backs! I alone see clearly. No other Altmer will claim the immortality, the magickal potency, the intimate knowledge of death itself, that lichdom grants. They react with fear and loathing at the very concept. I shall no longer hide from them.\n\nThe cowards may reject and attack me. To die, unfulfilled, without ever attaining lichdom, is worse. This is why I shall draw on all the magick I have at hand and all the death I have ever caused to ascend to unrivalled potency and power. The world shall tremble at the name of [ROOT.Char.GetFullName]!\n\nThe only question now is whether the time is right."
 life_extension.0290a: "There is no way back now!"
 life_extension.0290a.tt: "You will attempt the ritual to become a lich.\n\nThe higher your[arcana_i][arcana|E], the better are your chances of success. The risk however increases based on the level of secrecy required of you, which depends on the Necromancy doctrine of your [faith|E]. Faiths with [GetFaithDoctrine('tenet_necromancy_worship').GetBaseName] get further reduced risk.\n\nFailure may result in #N death#!."
 life_extension.0290.success: "The ritual is a success!"
 life_extension.0290.failure: "The ritual is a failure"
 life_extension.0290.death: "The ritual goes horribly wrong..."
 life_extension.0290b: "I need more time to prepare for this."
 life_extension.0290b.tt: "You will not attempt the ritual yet. You may however try again in the future, when you are feeling ready."

 life_extension.0260.t: "A New Necromancer"
 life_extension.0260.desc: "[revealed_necromancer.GetFirstName|U] has revealed [revealed_necromancer.GetHerHis] true colors to the world!\n\nApparently [revealed_necromancer.GetSheHe] was practicing necromancy for quite some time and now decided to step out into the open with it to fully utilize these powers. [revealed_necromancer.GetSheHe|U] is now able to cast necromantic spells, and only time can tell what will come of this."
 life_extension.0260a: "A great achievement!"
 life_extension.0260b: "I will need to watch [revealed_necromancer.GetHerHis] next steps."
 life_extension.0260c: "This is deeply concerning."


 ### Study Cloning
 life_extension.0100.t: "Cloning Research"
 life_extension.0100.desc: "Recently, I've grown curious about an obscure and unexplored magical practice - the art of replicating oneself via the use of magic. I've heard vague tales of such things, mages having philosophical debates with themselves or people giving birth to their own fathers during Dragon Breaks. I wonder, would this be worth a deeper investigation? The ethical implications are... questionable, but a research project like this could yield fascinating insights.\n\nFirst of all, I will have to decide how many resources to dedicate to this #V $life_extension.0100.t$#!."
 life_extension.0100.a.tt: "You begin your #V $life_extension.0100.t$#!"
 life_extension.0100.a: "Just some basic lab supplies."
 life_extension.0100.b: "I will fund a proper study."
 life_extension.0100.c: "I need research assistants! And sheep!"

 life_extension.0101.t: "$life_extension.0100.t$: An Obscure Technique"
 life_extension.0101.desc: "Despite my diligent study, I've found almost no scholarly sources on the topic whatsoever. It seems that whichever mages, if any, previously practiced this obscure technique were not too keen on sharing their insights.\n\nThere is...one option. If I want to continue my research, it looks like I will be forced to experiment on myself, using what little knowledge I have to extrapolate potential solutions. The mortal essence is fickle, so I have to be careful not to harm myself while magically investigating my own living tissue. A single moment of inattention could have dire consequences."
 life_extension.0101.a: "The things we do for science..."
 life_extension.0101.a.tt: "You experiment on yourself."
 life_extension.0101.a.tt2: "Your chance of success is based on your [learning_skill|E] and the number of $restoration_name$ and $alteration_name$ [lifestyle|E] [perks|E] you have unlocked."
 life_extension.0101.a.win.desc: "$life_extension.0100.t$: #P Success!#!"
 life_extension.0101.a.win.tt: "You greatly further your #v $life_extension.0100.t$#!"
 life_extension.0101.a.fail.desc: "$life_extension.0100.t$: #N Failure!#!"
 life_extension.0101.b: "I'm not messing around in there!"

 life_extension.0102.t: "$life_extension.0100.t$: A Suitable Vessel"
 life_extension.0102.desc: "Through great effort, restless study and ethically questionable experimentation I have finally figured out a hypothetical method of self-replication! My project will be grown inside of a tube, filled with substances I would rather not dwell on.\n\nFrom this, a new question arises: Do I want to put my theories into practice right now? I could always wait for a more opportune time."
 life_extension.0102.a: "I've come this far!"
 life_extension.0102.d: "I'll shelve this project for now."

 

 life_extension.0150.t: "$clone_project$"
 life_extension.0150.desc: "My laboratory is prepared and everything is ready for me to begin. I stand before a large tube, hooked up to various magical devices and filled with a dim substance. The time has come to put my theories into practice!"
 life_extension.0150.a: "Let's get to work."
 gain_cloning_insight_tt: "Gain #G +1#! [cloning_insight|E]"
 
 life_extension.0151.t: "$clone_project$: Allocating Resources"
 life_extension.0151.desc: "As my #V $clone_project$#! proceeds, I've come to the conclusion that I could benefit from allocating additional resources to my research effort.\n\nThere are various ways I could improve my output, such as investing in better equipment or simply dedicating more of my time to the project."
 life_extension.0151.a: "I'll be fine."
 life_extension.0151.b: "Purchase additional Equipment."
 life_extension.0151.c: "I know some unorthodox scholarly sources."
 life_extension.0151.d: "I will dedicate myself to this project full time!"
 life_extension.0151.e: "I will consult Oblivion for help."
 life_extension.0151.f: "[ROOT.Char.Custom('GetBaseHermaeusName')], guide me!"

 life_extension.0152.t: "$clone_project$: Synaptic Focus"
 life_extension.0152.desc: "As my [clone|E] develops, I routinely use magic to monitor its vitals for irregularities. During this process, I've steadily grown my understanding of its internal patterns.\n\nIf I was so inclined, I could subtly influence its development in a particular direction, improving its initial [skills|E] in that field."
 life_extension.0152.a: "The mind is a delicate thing best left alone."
 life_extension.0152.b: "It'll naturally excel at combat."
 life_extension.0152.c: "It'll be a competent administrator."
 life_extension.0152.d: "It'll be a scholar and mage."
 life_extension.0152.a.tt: "#V The [clone|E] will have a normal [skill|E] distribution#!"
 life_extension.0152.b.tt: "#V The [clone|E] will have better [martial_i] [martial|E] and [prowess_i] [prowess|E] [skills|E], but struggle in other fields#!"
 life_extension.0152.c.tt: "#V The [clone|E] will have better [diplomacy_i] [diplomacy|E], [stewardship_i] [stewardship|E] and [intrigue_i] [intrigue|E] [skills|E], but struggle in other fields#!"
 life_extension.0152.d.tt: "#V The [clone|E] will have better [learning_i] [learning|E] and [arcana_i] [arcana|E] [skills|E], but struggle in other fields#!"

 life_extension.0153.t: "$clone_project$: Transcending the Mundane"
 life_extension.0153.desc: "I stand before the faintly illuminated tube, watching the thick liquids swirling within. My #V $clone_project$#! is progressing steadily, but a thought has gripped me as of late.\n\nShould my [clone|E] truly be a mere copy of myself, or should I try to create something better? Eliminating flaws, nurturing promising strains... I could pull on the very sinews of creation in order to improve its [congenital|E] traits. If I failed... the consequences could be dire, and even if I were to succeed, its stability would suffer, increasing my risk of failure."
 life_extension.0153.a: "Playing god? This is beneath me."
 life_extension.0153.b: "Try to improve its Physique"
 life_extension.0153.b.repeat_attempt: "Try to improve its Physique again"
 life_extension.0153.c: "Try to improve its Beauty"
 life_extension.0153.c.repeat_attempt: "Try to improve its Beauty again"
 life_extension.0153.d: "Try to improve its Intellect"
 life_extension.0153.d.repeat_attempt: "Try to improve its Intellect again"
