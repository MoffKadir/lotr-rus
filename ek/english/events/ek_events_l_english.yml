 ek_slavery_events.0001.t: "The Slavery Abolishment Act"
 ek_slavery_events.0001a.desc: "We [banner.GetCulture.GetNameNoTooltip] have allowed slavery within our midst since time immemorial. No matter the reason that led one to enter servile status, it was generally accepted that they were no longer in control of their own life.\n\nThe master could dispose of them as they saw fit, be it hard labour, domestic work or anything else. Yet on this momentous day I, [ROOT.Char.GetFullNameNoTooltip], am choosing to end this practice, declaring it illegal in perpetuity.\n\nMany [banner.GetCulture.GetCollectiveNounNoTooltip] may denounce this new law as dangerous or preposterous... Nevertheless my decision is taken, the law is published and all will abide by it."
 ek_slavery_events.0001b.desc: "Keeping chattel slaves is an abhorrent practice, an affront to the very dignity of [ROOT.Char.GetFaith.HighGodName]! Until now however, some of my vassals have adonned themselves to the traffick of their fellow subjects, treating the unfortunate souls with little more care than property.\n\nNo more! My decree is signed and published, so that none may ignore the law; Slavery is banned across all of the provinces of [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], with retroactive effect on new territorial additions.\n\nLet the freed souls rejoice, for we acknowledge what should have never been denied: their right to liberty."
 ek_slavery_events.0001.option.1: "Within the jurisdiction of [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], slavery is henceforth abolished!"
 ek_slavery_events.0001.option.2: "Within the jurisdiction of [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], slavery is henceforth abolished!"
 ek_slavery_events.0001.option.3: "Wait, let's not upend my realm with such a drastic change."
 every_non_slaver_vassal: "Every [vassal|E] of a non-[slaver|E] [culture|E]"
 every_slaver_vassal: "Every [vassal|E] of a [slaver|E] [culture|E]"
 every_glory_hound_vassal_slaver: "Every $glory_hound_vassal$ of a [slaver|E] [culture]"
 every_parochial_vassal_slaver: "Every $parochial_vassal$ of a [slaver|E] [culture]"
 ek_slavery_events.0001.cultural_acceptance_loss: "Banned Slavery"

 ek_slavery_events.0002.t: "The Slavery Abolishment Act"
 ek_slavery_events.0002a.desc: "We [ROOT.Char.GetCulture.GetNameNoTooltip] have allowed slavery within our midst since time immemorial. No matter the reason that led one to enter servile status, it was accepted that they were at the beck and call of their master.\n\nHard labour, farm work, household jobs or any other tasks could be assigned at leisure by the slave owner. Yet on this fateful day, my liege [banner.GetFullName] took the drastic step of declaring slavery illegal, and in perpetuity at that!\n\nMany [ROOT.Char.GetCulture.GetCollectiveNounNoTooltip] have already denounced this new law as a travesty and the ruin of our economy... Nevertheless, [banner.GetTitledFirstNameNoTooltip] upheld their decision and seem determined to enforce the law to its fullest extent, in contravention of customary law."
 ek_slavery_events.0002b.desc: "Chattel slavery is a detestable practice, an affront to the very dignity of [ROOT.Char.GetFaith.HighGodName]! Until now however, some of my fellow vassals have been allowed to partake in this wretched institution: they treat as people as property to be exploited based on their customs.\n\nNo more! The decree of my liege [banner.GetFullName] is signed and published, so that none may ignore the law; Slavery is banned across all of the provinces of [banner.GetPrimaryTitle.GetNameNoTierNoTooltip], with retroactive effect on new slaveholding territories.\n\nLet the freed souls rejoice, for we acknowledge what should have never been denied: their right to liberty."
 ek_slavery_events.0002.option.1: "This day will be remembered as the ending of a foul practice."
 ek_slavery_events.0002.option.2: "[banner.GetPrimaryTitle.GetNameNoTierNoTooltip] will be destabilised in the near future. It will tide over eventually..."
 ek_slavery_events.0002.option.3: "This flouting of tradition won't stand for long, mark my words!"
 ban_slavery_in_realm_decision_effect_vassal: "The #V $building_type_slave_markets_01$#! line of [buildings|E] are disabled and cannot be built within the [realm|E] of your [liege|E]"

 ek_mane_furstock_event.0002.t: "The Third Moon"
 ek_mane_furstock_event.0002.twin.desc: ""All throughout our Khajiiti lives do we feel the push and pull of the moons, Jode and Jone, waxing and waning through the Lattice above. They have been with me always, but never closer than tonight. Together, they have brought into the night sky the mystical Third Moon which every Khajiit lives in the hope of beholding.\n\nAnd I have not only beheld it. The Third Moon has honoured me by heralding not just the birth of one moons-blessed Mane, but two. I am now the proud [ROOT.Char.GetMotherFather] of twin Manes, one for each of the twin moons to which I owe their birth.\n\n[mane_kitten.GetName] and [mane_kitten_2.GetName] were birthed beneath the light of all three lunar companions, and they are forever marked as Manes."
 ek_mane_furstock_event.0002.desc: "All throughout our Khajiiti lives do we feel the push and pull of the moons, Jode and Jone, waxing and waning through the Lattice above. They have been with me always, but never closer than tonight. Together, they have brought into the night sky the mystical Third Moon which every Khajiit lives in the hope of beholding.\n\nAnd I have not only beheld it. The Third Moon has honoured me by heralding [mane_kitten.GetName]'s birth beneath the light of all three lunar companions.\n\nThe Third Moon has touched [mane_kitten.GetName], and [mane_kitten.GetSheHe] is forever marked as Mane."
 ek_mane_furstock_event.0002.option1: "A great honour for our family!"
 ek_mane_furstock_event.0002.option1.tooltip: "Your newborn kitten may be eligible to become the next Mane, inheriting based on the principles of [GetLaw('mbhof_succession_law').GetName] and leaving your [dynasty|E] if chosen"
 ek_mane_furstock_event.0002.option1.twin.tooltip: "Your newborn kittens may be eligible to become the next Mane, inheriting based on the principles of [GetLaw('mbhof_succession_law').GetName] and leaving your [dynasty|E] if chosen"
 ek_mane_furstock_event.0002.option2: "My child will never be Mane!"
 ek_mane_furstock_event.0002.option2.twin: "My children will never be Mane"
 ek_mane_furstock_event.0002.option2.tooltip: "Your newborn kitten will not be eligible to become the next Mane"
 ek_mane_furstock_event.0002.option2.twin.tooltip: "Your newborn kittens will not be eligible to become the next Mane"

 ek_crisis_event.0001.t: "Ghosts in the Storm"
 ek_crisis_event.0001.desc.a: "A horror from the Merethic Era has returned! The Snow Elves, long thought wiped out, have poured out of the ground in [peasant_leader.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier], emerging from caves and old ruins. They have long been the boogeymen of Nord folklore, snatching children and poisoning livestock, but they have never been seen in such numbers or force before.\n\nRefugees fleeing [peasant_leader.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] report that the Snow Elves are hunched and blind, resembling goblins more than mer. It is said that they are led by [peasant_leader.GetTitledFirstName], who united various Snow Elven tribes beneath the surface and led them to reclaim the surface. [peasant_leader.GetTitledFirstNameNoTooltip] has begun resettling hordes of Snow Elves into [peasant_leader.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] from beneath the earth.\n\nThe locals have been nearly completely driven from their land, with a few fortified holdouts still remaining."
 ek_crisis_event.0001.desc.b: "Our long lost cousins have returned to us! What should be a joyous day has turned to horror. These Falmer are blind, hunched creatures, having suffered horrible betrayal by the Dwemer who took them in. Our people are conflicted, some seeing this as a divine punishment, a cruel joke at the expense of our race. Others see this as an opportunity to help them return to the fold, and encourage us to welcome them with open arms, regardless of their current condition.\n\n[peasant_leader.GetTitledFirstName], a great [peasant_leader.GetTitleTierName] of their people, has united the Betrayed tribes beneath [peasant_leader.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTier] into a single great army. [peasant_leader.GetHerHis|U] army poured out of the old Dwemer ruins in [peasant_leader.GetCapitalLocation.GetCounty.GetTitle.GetNameNoTierNoTooltip] and has driven off the local population. Refugees fleeing [peasant_leader.GetTitledFirstNameNoTooltip]'s conquest have been spreading malicious rumors of cannibalism, kidnapping, and worse.\n\nThis [peasant_leader.GetTitleTierName] has begun settling the Betrayed en masse on the surface, reclaiming what was once theirs. What was once #italic ours#!."
 ek_crisis_event.0001.option1: "[ROOT.GetCharacter.GetFaith.WarGodName] help us!"
 ek_crisis_event.0001.option2: "Look upon our long lost cousins and weep, for they have returned broken."
 ek_crisis_event.0001.option3: "Such creatures can hardly be called Mer anymore, what horrors did they suffer?"
 ek_crisis_event.0001.option4: "I guess they weren't just an old Nord myth after all."
 ek_crisis_event.0001.flavor: "The [peasant_leader.GetCulture.GetName] [culture|E] is considered [living_culture_short|E], and Betrayed may now appear as regular [crisis_factions|E] within [GetGeographicalRegion('mundus_tamriel_skyrim').GetName]."

 harm.1041.ek: "Cast a waterbreathing spell."

 ek_faith_events.0004.t: "Worm Cult in Disarray"
 ek_faith_events.0004.desc: "Without the worldly leadership of Lord [previous_worm_king.GetFirstName], the central authority of the Order of the Black Worm collapses, its high priesthood scattering. Their work is not ended however, as the command uttered in life remains in effect also beyond it:\n\n#italic Humiliate the priests of Arkay...\nLet all the nations of dead carry my banner and my banner alone..\nWait, as always, in the darkness...#!\n\nOnly a true master, a necromancer of near equal ability to the God of Worms himself, could ever hope to regain absolute religious authority over the Anchorites."
 ek_faith_events.0004.option: "We serve your bidding, forever!"
 ek_faith_events.0004.flavor: "A sufficiently powerful and pious [GetTrait('necromancer').GetName( GetNullCharacter )] of the [worm_cult.GetName] faith can claim leadership in the Order of the Black Worm, becoming its [head_of_faith|E]."

 ek_faith_events.0005.t: "A New [ROOT.Char.GetLadyLord|U] of Worms"
 ek_faith_events.0005.desc: "After the ascension of our [mannimarco.GetTitledFirstName] to divinity, the Order of the Black Worm collapsed with no clear authority to take the reins. But the Worm Cult survived, and all hoped that one day an heir to the King of Worms would rise to claim their rightful place as [ROOT.Char.GetLadyLord|U] of Necromancers.\n\nThat day has come, and as I look out across my gathered thralls I know this time things will be different. No mere personality cult for our God-King, this reformed Order will last the ages — and outlive death itself."
 ek_faith_events.0005.option1: "Hear me Anchorites, and obey!"
 ek_faith_events.0005.option2: "We will continue the Worm-God's work in secret."
 ek_faith_events.0005.flavor: "With the reformation of [worm_kingdom.GetName], the title will no longer be destroyed at the death of its [head_of_faith|E]."

 ek_faith_events.0006.t: "A New [new_worm_lord.GetLadyLord|U] of Worms"
 ek_faith_events.0006.desc: "After the ascension of our [mannimarco.GetTitledFirstName] to divinity, the Order of the Black Worm collapsed with no clear authority to take the reins. But the Worm Cult survived, and all hoped that one day an heir to the King of Worms would rise to claim their rightful place as [new_worm_lord.GetLadyLord|U] of Necromancers.\n\n[new_worm_lord.GetTitledFirstName] has become that person, and swears that this time things will be different. No mere personality cult for our God-King, this reformed Order will last the ages - and outlive death itself."
 ek_faith_events.0006.option: "Hail, [new_worm_lord.GetLadyLord|U] of Worms!"

 ek_travel_start_event.1000.t_hist_communion: "$activity_hist_communion$: Leaving Home"
 ek_travel_start_event.1000.desc_hist_communion: "To the Saxhleel, the Hist are not mere deities or spirits. In a sense they are #italic us#!, and we are them. As their roots connect all of Black Marsh, we too are connected to all of our kin. In seeking the Hist tree in [ROOT.Char.GetInvolvedActivity.GetCurrentPhase.GetLocation.GetCounty.GetTitle.GetNameNoTier] I may partake in this great community.\n\nWhile any travel across the marshes can be treacherous, our unity in mind and body with the land will preserve us."

