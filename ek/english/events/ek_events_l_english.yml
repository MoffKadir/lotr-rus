  ek_orphanage.0001.t: "Consider Adoption" 
 ek_orphanage.0001.tribal_desc: "When I enter their caretaker's abode, [caretaker.GetFirstName] welcomes me, visibly delighted and started talking about the children.\n\n[caretaker.GetSheHe|U] introduces me to older and younger orphans, all waiting for a new loving home. They were clearly dressed and tidied up for welcoming me to their foster home. I could see the anxiety in their eyes. One of them would become my heir, if everything worked out right for them.\n\nSuddenly, I saw a small figure hidden behind some furniture, staring at me. When I stared back, [special_option.GetSheHe] averted [special_option.GetHerHis] gaze, embarrassed. "Don't mind [special_option.GetHerHim]. That's [special_option.GetFirstName], our special resident. Lost [special_option.GetHerHis] hopes of being adopted a long time ago.""
 ek_orphanage.0001.desc: "When I enter the orphanage, [caretaker.GetFirstName], the caretaker, welcomes me, visibly delighted and started talking about the children.\n\n[caretaker.GetSheHe|U] introduces me to older and younger orphans, all waiting for a new loving home. They were clearly dressed and tidied up for welcoming me to the orphanage. I could see the anxiety in their eyes. One of them would become my heir, if everything worked out right for them.\n\nSuddenly, I saw a small figure hidden behind some furniture, staring at me. When I stared back, [special_option.GetSheHe] averted [special_option.GetHerHis] gaze, embarrassed. "Don't mind [special_option.GetHerHim]. That's [special_option.GetFirstName], our special resident. Lost [special_option.GetHerHis] hopes of being adopted a long time ago.""
 ek_orphanage.0001.baby: "I want [baby_option.GetFirstName], the smallest one."
 ek_orphanage.0001.child: "I want [child_option.GetFirstName], the child."
 ek_orphanage.0001.teen: "I want [teen_option.GetFirstName], the oldest one."
 ek_orphanage.0001.special: "[special_option.GetFirstName] is going home with me."
 ek_orphanage.0001.none: "I changed my mind."

 ek_orphanage.0002.t: "A New Home"
 ek_orphanage.0002.desc: "After sorting out some documents, the caretaker agreed to let me take [new_child.GetFirstName] home.\n\nI held [new_child.GetHerHis] hand as we entered home, because I could feel that [new_child.GetSheHe] was nervous.\n\nWhen we got to [new_child.GetHerHis] new accomodations, I noticed the huge smile on [new_child.GetHerHis] face. "Oh, wow! Are you... are you sure? You really wouldn't mind? This is... this is great! It's everything I could have asked for! I promise, I won't be any trouble at all! Thanks! Thank you so much, [ROOT.GetCharacter.Custom('GetMamaPapa')]!""
 ek_orphanage.0002.a: "No, thank you, #italic my [new_child.Custom('GetDaughterSon')]#!."

 ek_orphanage.0003.t: "Against All Odds"
 ek_orphanage.0003.desc: "After being asked again and again if I was sure, the caretaker finally agreed to let me take [new_child.GetFirstName] home.\n\nI held [new_child.GetHerHis] hand as we entered home, because I could feel that [new_child.GetSheHe] was nervous.\n\nWhen we got to [new_child.GetHerHis] new accomodations, I noticed the tears falling from [new_child.GetHerHis] eyes. "I was never an option. For anyone. This is... this is great! It's everything I could have asked for! Are you sure you didn't make a mistake? I'm... broken, you know.""
 ek_orphanage.0003.a: "Never say that about yourself again... #italic My [new_child.Custom('GetDaughterSon')]#!."

#Forgotten Gods conversion event 
 ek_forgor_event.0001.t: "A Cup of Tea"
 ek_forgor_event.0001.desc: "A boiling hot pot of water is ready to be served. For tonight's tea time, a special blend of locally sourced herbs has been prepared. While herbal tea is good for body and mind, this is not the purpose of tonight's concoction. In fact, the large cup of tea in front of me is neither about the brewing of tea itself, but rather the fertile soil which nourished the herbs, and the #italic water#! drawn from a clear mountain spring to brew it with.\n\nSoil and water, solid and liquid, body and spirit, Mundus and Aetherius - present and past. What #italic memories#! lay in this land's waters, and how are its secrets deep within us all unlocked?\n\nI stare deeply into the cup, taking in its pleasant aromas, and losing myself in the patterns formed by the floating leaves..."
 ek_forgor_event.0001.option1: "I #italic remember!#"
 ek_forgor_event.0001.option1.flavor: "Some deities almost seem to have been intentionally left by the wayside..."
 ek_forgor_event.0001.option2: "Ah, such a nostalgic smell."
 ek_forgor_event.0001.option2.flavor: "This reminds me of simpler times"
 ek_forgor_event.0001.option3: "Oh no, can't let the tea go cold!"
 ek_forgor_event.0001.option3.flavor: "#italic Sluuuuuurp!#!"
 ek_forgor_event.0001.option4: "Hm, what other applications could these herbs have?"
 ek_forgor_event.0001.option4.flavor: "Nevermind the tea, let's consult the herborium"

#Dremora Knowledge of Oblivion event
 ek_dremora_event.0002.t: "Knowledge of Oblivion"
 ek_dremora_event.0002.desc: "We of the Kyn - the Dremora - are not native to Mundus. Yet some of us make it our abode, and rule over its people, as is the natural order of things. While we may never truly make it our home, we can adapt to its peculiarities, strengthen our position in it and trample underfoot all resistance. As mortals have no proper sense of loyalty towards their obvious superiors, they must be made to do so.\n\nThrough the might, wealth and power of Oblivion, our knowledge of mortal affairs ever grows."
 ek_dremora_event.0002.option: "The Kyn will reign over the Arena!"
 ek_dremora_event.0002.option.flavor: "A random available innovation has been unlocked for Dremora culture, and will do so around every 20 years"

#Shadowscales events
 ek_shadowscale_event.0003.t: "The Shadowscale Request"
 ek_shadowscale_event.0003.desc: "As I wait for the Shadowscale representative to come for the Shadow-born of [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], including my own [shadowborn_hatchling.GetFirstName], I wonder what could have become of [shadowborn_hatchling.GetHerHim]. Would [shadowborn_hatchling.GetSheHe] be an accomplished leader? Or perhaps a wise sage, or brilliant warrior?\n\nBut, hatched under the Shadow, [shadowborn_hatchling.GetSheHe] does not get a choice. [shadowborn_hatchling.GetSheHe|U] will be a Shadowscale, an assassin trained by the Dark Brotherhood to serve the occluded King of Argonia — or [shadowborn_hatchling.GetSheHe] will die as part of their gruelling training program.\n\nThen the Tree-Minders of our tribe are greeting the Shadowscale procession. And, in an instant, the Shadowscale stands before me. "It is time, [ROOT.Char.GetFirstNameNoTooltip]." But is it? I could defy Sithis and the Hist. I could give up the honor of hatching a Shadowscale. I would have shame... but also my child."
 ek_shadowscale_event.0003.option1: "It is my duty, and an honor."
 ek_shadowscale_event.0003.option1.tooltip: "[shadowborn_hatchling.GetFullName] is taken from you forever, inducted into the Shadowscales."
 ek_shadowscale_event.0003.option2: "No, you will not take them!"
 ek_shadowscale_event.0003.option2.flavor: "The Shadowscales will not forget your refusal."
 ek_shadowscale_event.0004.t: "The Shadowscale Request"
 ek_shadowscale_event.0004.desc: "As I wait for the Shadowscale representative to come for the Shadow-born of [ROOT.Char.GetPrimaryTitle.GetNameNoTierNoTooltip], including my own, I wonder what could have become of them. Would they be accomplished leaders? Or perhaps wise sages, or brilliant warriors?\n\nBut, hatched under the Shadow, they do not get a choice. They will be Shadowscales, assassins trained by the Dark Brotherhood to serve the occluded King of Argonia — or they will die as part of their gruelling training program.\n\nThen the Tree-Minders of our tribe are greeting the Shadowscale procession. And, in an instant, the Shadowscale stands before me. "It is time, [ROOT.Char.GetFirstNameNoTooltip]." But is it? I could defy Sithis and the Hist. I could give up the honor of hatching a Shadowscale. I would have shame... but also my children. Or perhaps one of them?"
 ek_shadowscale_event.0004.option1: "It is my duty, and an honor."
 ek_shadowscale_event.0004.option1.tooltip: "Both hatchlings are taken from you forever, inducted into the Shadowscales."
 ek_shadowscale_event.0004.option2: "You may take the firstborn, but spare the second."
 ek_shadowscale_event.0004.option2.tooltip: "[shadowborn_hatchling.GetFullName] is taken from you forever, inducted into the Shadowscales."
 ek_shadowscale_event.0004.option2.flavor: "The Shadowscales will not forget your refusal, but they will remember you willingly gave up one."
 ek_shadowscale_event.0004.option3: "Take the secondborn, but leave me the first."
 ek_shadowscale_event.0004.option3.tooltip: "[shadowborn_hatchling_2.GetFullName] is taken from you forever, inducted into the Shadowscales."
 ek_shadowscale_event.0004.option3.flavor: "The Shadowscales will not forget your refusal, but they will remember you willingly gave up one."
 ek_shadowscale_event.0004.option4: "No, you will not take any of them!"
 ek_shadowscale_event.0004.option4.flavor: "The Shadowscales will not forget your refusal."

 ek_health_recovery_veneration_of_diseases: "I survived one disease to carry many more"
 ek_health_contraction_veneration_of_diseases: "Another gift from the figuring father"

 ek_health.0001.t: "[SCOPE.Custom('EventTitleDisease')]: Hunter's Ease"
 ek_health.0001.desc: "I am finally getting rid of that horrible drowsiness. Now I feel energic like I was before I encountered that cursed beast! Relief washes over me because I'm no more at risk of becoming a monster."
 ek_health.0001.a: "Not today, Hircine!"

 ek_health.0002.t: "[SCOPE.Custom('EventTitleDisease')]: Sunlight's Warmth"
 ek_health.0002.desc: "I am finally getting rid of that horrible thirst. Now I feel scents and tastes like I did before I encountered that cursed beast! Relief washes over me because I'm no more at risk of becoming a monster."
 ek_health.0002.a: "Time for a sunbath!"

 ek_health.0003.t: "[SCOPE.Custom('EventTitleDisease')]: Mind Reconquered"
 ek_health.0003.desc: "The magical fog that clouded my thoughts and damped my arcana is finally lifted. Now I feel the magicka pumping through my veins again. This strange affliction certainly left a mark on my mind, but in the end it was no match for me."
 ek_health.0003.a: "It's like awakening from a slumber!"

 ek_health.0004.t: "[SCOPE.Custom('EventTitleDisease')]: Death Escaped"
 ek_health.0004.desc: "The nausea that has been plaguing me for weeks was suddenly gone this morning. And the terrible cramps and fever attacks don't seem to be coming back either. I hardly dare to hope, but it looks as if Peryite's curse has finally been lifted from me and my soul will avoid the Pits, which are his realm."
 ek_health.0004.a: "You won't claim me, Peryite!"

 ek_health.1001.t: "[SCOPE.Custom('EventTitleDisease')]: Hircine's Curse"
 ek_health.1001.desc: "Ever since I encountered that accursed creature, I've been lethargic, drowsy, with no energy to go about my day anymore. All day, every day, I just want to lay down in my bed."
 ek_health.1001.court_physician.desc: "\n\n"Your symptoms indicate that you have contracted Sanies Lupinus, my [ROOT.Char.GetLadyLord]. Gladly, we discovered it early enough for us to be able to treat it with ease.""
 ek_health.1001.a: "All I want is to stay in bed..."

 ek_health.1002.t: "[SCOPE.Custom('EventTitleDisease')]: A Thirst for Blood"
 ek_health.1002.desc: "Ever since I encountered that accursed creature, I've been experiencing weakness during the day and acquired a peculiar thirst. All day, every day, my mouth is dry and food doesn't seem too appetizing anymore."
 ek_health.1002.court_physician.desc: "\n\n"Your symptoms indicate that you have contracted Sanguinare Vampiris, my [ROOT.Char.GetLadyLord]. Gladly, we discovered it early enough for us to be able to treat it with ease.""
 ek_health.1002.a: "All I want is to stay in bed..."

 ek_health.1003.t: "[SCOPE.Custom('EventTitleDisease')]: An Arcane Affliction"
 ek_health.1003.desc: "Something is going on with my mind. I have difficulty remembering even the most basic things, and I find myself increasingly unable to follow the conversations around me. Everything seems so... complicated. How was I able to keep up in the past? And why does it feel like the magicka is growing weaker everyday?"
 ek_health.1003.court_physician.desc: "\n\n"What a strange infection this is, my [ROOT.Char.GetLadyLord]! It seems to grow stronger the more magicka it consumes. We have to act quickly or the consequences could be dire.""
 ek_health.1003.a: "What is happening to me?"

 ek_health.1004.t: "[SCOPE.Custom('EventTitleDisease')]: Peryite's Embrace"
 ek_health.1004.desc: "It started with a slight fever and now suddenly I feel cramps shaking my whole body. Within seconds I'm vomiting the contents of my stomach all over the floor, and the fumes are like something out of Oblivion itself.\n\nThere is no doubt, this is more than a normal sickness hit, it is the work of Peryite himself."
 ek_health.1004.court_physician.desc: "\n\n"I am not sure if my abilites are enough to battle the Lord of Plagues my [ROOT.Char.GetLadyLord]. However, I wll try my best and maybe we are able to achieve a victory against this disease and it's creator.""
 ek_health.1004.a: "I feel nauseous again..."
 
 ek_health.2001.t: "A Strange Condition"
 ek_health.2001.desc: "For several nights now, I've been plagued with vivid nightmares about brutality, carnage and wild bloodlust. I wake up most days starving with strange injuries that I can't seem to recall how they came to be. My hair is also growing more quickly than before, and in stranger places than before.\n\nEvery time I wake up feeling satisfied and full, I hear several accounts of a big beast roaming through the land, killing and devouring every living thing that it comes across.\n\nCan it be? Can it be... Me?"
 ek_health.2001.a: "[ROOT.Char.GetFaith.HighGodName|U] have mercy on me!"

 ek_health.2002.t: "A Strange Condition"
 ek_health.2002.desc: "For several nights now, I've been plagued with vivid nightmares about wild bloodlust. I wake up most days with my mouth dry and a strange thirst that never goes away. All food lost its taste, except for very rare steaks.\n\nWhat have I become?"
 ek_health.2002.a: "[ROOT.Char.GetFaith.HighGodName|U] have mercy on me!"

 health.2101.chrondiasis_outbreak.desc: "A rare, yet concerning, disease has found its way into my court. Apparently, there is an infection of Chrondiasis."
 health.2101.chrondiasis_spreads.desc: "Another individual with magical abilities has fallen victim to Chrondiasis."

 health.2101.peryite_affliction_outbreak.desc: "Peryite's disease-ridden influence has reached my court, and the Prince's very own illness, called Peryite's Affliction, has sunk its clutches into the first victim."
 health.2101.peryite_affliction_spreads.desc: "The Plague Lords disease spreads even further and claims another member of my court."

 ek.health.risky_treatment_disruption.1.desc: "[physician.GetTitledFirstName] prepares a bunch of instruments I have never seen before, additionally [physician.GetSheHe] offers me a strange potion to drink. As it trickles down my throat, I can feel the effect immediately - this alchemical solution drains my body of all magicka. With a sudden shock I realise the purpose of those instruments: they are meant to perpetuate this state. [physician.GetFirstName|U] looks at me apologetically: "There is no other way my [ROOT.Char.GetLadyLord]. The sickness feeds on your magicka, so we have to permanently cut it of from it's source."

 convert_to_vampire_key: "Turn into Vampire"
 convert_to_vampire_interaction: "$convert_to_vampire_key$ #weak (Scheme)#!"
 convert_to_vampire_interaction_desc: "Attempt to turn [recipient.GetShortUINameNoTooltip] into a Vampire"
 convert_to_vampire_desc: "I will turn [SCHEME.GetTarget.GetShortUINameNoTooltip] into a Vampire and show [SCHEME.GetTarget.GetHerHim] the true extent of our power."
 convert_to_vampire_desc_general: "Turn a target into a vampire and show them the extent of this power."
 convert_to_vampire_action: "Turn"
 convert_to_vampire_interaction_notification: "Turn into Vampire"
 convert_to_vampire_scheme_invalidated_title: "@scheme_icon! Turn into Vampire Scheme Ends"
 convert_to_vampire_general_desc: "A scheme to turn a target into a vampire."

 ek_transformation.2001.t: "$convert_to_vampire$: The Time Has Come"
 ek_transformation.2001.start.desc: "I won't force [target.GetFirstName] to turn, but I have done all I can to open [target.GetHerHis] mind to it."
 ek_transformation.2001.secrecy.desc: "I hope that [target.GetFirstNameNoTooltip] has been convinced in our innocent conversations and the numerous suggestions I made."
 ek_transformation.2001.no_secrecy.desc: "I hope that [target.GetFirstNameNoTooltip] has been convinced in those long discussions and numerous advantages I listed to [target.GetHerHim]."
 ek_transformation.2001.end.desc: "\n\nNow I must go to [target.GetHerHim] and extend the invitation to become one with the night — or give up on this endeavor."
 ek_transformation.2001.a: "[target.GetSheHe|U] deserves to make up [target.GetHerHis] own mind."
 ek_transformation.2001.b1: "The risks are too great."
 ek_transformation.2001.b2: "[target.GetFirstNameNoTooltip] isn't ready."
 ek_transformation.2001.a.tt: "You go ahead with your plan to turn [target.GetShortUIName] into a Vampire"

 ek_transformation.2002.t: "A Creature of the Night"
 ek_transformation.2002.start.desc: "As I open my eyes in the dark, I am immediately overwhelmed by an ominous feeling. Is someone watching me?\n\n"Are you ready to embrace your true potential, [ROOT.Char.GetFirstNameNoTooltip]?""
 ek_transformation.2002.discovery.desc: "I would recognize that voice anywhere. It must be [owner.Custom2('MyCharacterIntroductionNoComma', ROOT.Char)]."
 ek_transformation.2002.no_discovery.desc: "I sit up, suddenly completely awake. I look around for the source of the unfamiliar [owner.GetWomanMan]'s voice, but there are only shadows."
 ek_transformation.2002.end.desc: "\n\n"I offer you my blood. Take it, and you will walk as a lion among sheep. Men will tremble at your approach, and you will never fear death again. Will you accept it?""
 ek_transformation.2002.a: "With all my heart!"
 ek_transformation.2002.b: "I want nothing to do with this. Begone, you monster!"
 ek_transformation.2002.c: "The world will know of your sin, [owner.GetFirstNameNoTooltip]!"

 ek_transformation.2003.t: "$convert_to_vampire$: Awake at Last"
 ek_transformation.2003.desc: "I watch the sleeping shape of [target.GetFirstName] while I think of the offer I'm about to make. While I'm considering all the possibilities, [target.GetSheHe] stirs, as if [target.GetHerHis] subconscious mind has waited for this moment.\n\nWhen I step out of the shadows and offer [target.GetFirstNameNoTooltip] my blessing, there is no fear or hesitation in [target.GetHerHis] eyes. No, [target.GetHerHis] acceptance is whole-hearted and hungry."

 ek_transformation.2003.a: "Awake at last, [target.Custom('SisterBrother')|U]."
 ek_transformation.2003.b: "Now I can finally show [target.GetHerHim] my true self."
 ek_transformation.2003.message: "I revealed my vampirism to [target.GetHerHim]."
 ek_transformation.2003.b.tt: "[target.GetShortUIName|U] must know of your [secret|E]."
 ek_transformation.2003.c: "[target.GetSheHe|U] must find [target.GetHerHis] own path."

 ek_transformation.2004.t: "$convert_to_vampire$: Closed Mind, Sunny Heart"
 ek_transformation.2004.start.desc: "[target.GetFirstName] stirs from sleep as I climb through [target.GetHerHis] window. "Who goes there?" [target.GetSheHe] demands with an unsteady voice.\n\n"My name is not relevant. I am here to offer you a most precious gift."\n\n"
 ek_transformation.2004.discovered.desc: "[target.GetFirstNameNoTooltip] squints. "[ROOT.Char.GetFirstNameNoTooltip], is that you? A precious gift? What is this nonsense?!"
 ek_transformation.2004.not_discovered.desc: "[target.GetFirstNameNoTooltip] scrambles out of bed, reaching for something on [target.GetHerHis] bedside table. Probably nothing good. "I want nothing to do with you or your lies! Begone, foul creature!" [target.GetFirstNameNoTooltip] shouts, and I am not slow to obey."
 ek_transformation.2004.a: "Wrong chamber, sorry!"

 ek_transformation.2005.end.desc: "[ROOT.Char.GetFirstNameNoTooltip], is that you? A precious gift? [target.GetLiege.Custom2('MyCharacterIntroduction', target)|U] will hear of this!""
 ek_transformation.2005.a: "Please, it is not what you think!"
 ek_transformation.2005.a.tt: "Actually, it might be #EMP exactly#! what [target.GetSheHe] thinks..."

 ek_transformation.2006.t: "$convert_to_vampire$: The Reveal"
 ek_transformation.2006.desc: "[target.Custom2('MyCharacterIntroduction', ROOT.Char)|U] is not in [target.GetHerHis] bed as I sneak through [target.GetHerHis] window on my mission to turn [target.GetHerHim]. Where would–\n\n"Who is that?!"\n\nI twist around to find [target.GetTitledFirstName] crouched over a drained body on the floor."
 ek_transformation.2006.a: "Oh, you were already...! Hello, [target.Custom('SisterBrother')|U]!"

 ek_transformation.2007.t: "Hidden Ally"
 ek_transformation.2007.desc: "I'm in the middle of a nightly snack when there's a sudden noise behind me. A burglar? A visitor? An assassin?!\n\nAs I twist around I find myself face to face with [owner.Custom2('MyCharacterIntroduction', ROOT.Char)], eyes glowing in the dark, bearing fangs – seeming ready to turn someone."
 ek_transformation.2007.a: "There's no need for that with me, #EMP [owner.Custom('SisterBrother')|U]#!!"

 ek_transformation.2010.t: "$convert_to_vampire_key$: Overheard"
 ek_transformation.talk.2010: "[target.GetFirstName] and I talk about my crimson blessing and our will for many hours. When the sky subtly shifts to blue at the horizon, we make our farewells."
 ek_transformation.leave.2010: "Once I have imparted the most essential of vampiric wisdom onto [target.GetFirstName], and given [target.GetHerHim] [target.GetHerHis] my gift, I take my leave."
 ek_transformation.end.2010: "\n\nAs I open the chamber door, I hear rapid footsteps disappearing down the corridor. Was someone listening?"
 ek_transformation.2010.a: "[ROOT.Char.GetFaith.HighGodName] be damned!"
 ek_transformation.2010.a.tt: "Someone knows your [secret|E]"
 ek_transformation.2010.message: "Secret Discovered"

