l_english:

 BattlePoIHistoricalNameMoesring: "The Battle of Moesring"
 BattlePoIHistoricalDescMoesring: "#emp Victor: High King of Skyrim\nDefeated: The Snowprince\nDate: [Glossary( 'Merethic Era', 'MERETHIC_GLOSS' )]#!\n#weak The Battle of the Moesring was the decisive confrontation between the Nords and Snow Elves in the Moesring Mountains of Solstheim. After being driven from Skyrim by Ysgramor and his heirs, the Snow Elves made their last stand on Solstheim. The Nords, wielding superior weaponry, dominated the battlefield, but the tide briefly turned with the arrival of the Snow Prince, a skilled warrior on a pale steed who cut through the Nordic ranks, killing many. However, his death at the hands of Finna, a grieving Nordic girl who avenged her mother by throwing a sword into his chest, shattered the morale of the Snow Elves. With their leader fallen, the Elves fled or were slaughtered.\n\nThis defeat sealed the fate of the Snow Elves, and the Nords cemented their dominance over Solstheim and Skyrim.#!" #AI starting with "The Nords, wielding..."
 
 BattlePoIHistoricalNameGlenumbraMoors: "The Battle of Glenumbra Moors"
 BattlePoIHistoricalDescGlenumbraMoors: "#emp Victors: [GetScriptedCharacterByHistoryID( 'direnni_3b1' ).GetTitledFirstName], [GetScriptedCharacterByHistoryID( 'dynar_1000' ).GetTitledFirstNameNicknamed]\nDefeated: [GetScriptedCharacterByHistoryID( 'alessian_105' ).GetTitledFirstName], [GetScriptedCharacterByHistoryID( 'kjoric_101' ).GetTitledFirstNameNicknamed]\nDate: 1 [era|E] 479#!\n#weak The final battle between the Alessian Empire and the Direnni Hegemony happened here. Imperial forces were supported by Nord warriors from Skyrim and allied Breton tribes. On the other side were Direnni elves, aided by the loyal Breton subjects and the Ayleid forces that fled Cyrodiil.\n\nThe Hegemony defeated Cyrodilic invaders and won the battle, but at a great cost; soon all of their Breton subjects would become free from the weakened Direnni clan.#!"

 BattlePoIHistoricalNameMountHattu: "The Battle of Mount Hattu"
 BattlePoIHistoricalDescMountHattu: "#emp Victors: [GetScriptedCharacterByHistoryID( 'hunding_2' ).GetTitledFirstName], [GetScriptedCharacterByHistoryID( 'hunding_3' ).GetTitledFirstNameNicknamed]\nDefeated: [GetScriptedCharacterByHistoryID( 'torn_2' ).GetTitledFirstNameNicknamed]\nDate: 1E 791#!\n#weak The Battle of Mount Hattu was one of the last battles fought before Pankratosword destroyed the continent. Emperor Hira’s forces met rebel forces led by Frandar Hunding. The rebels lured Hira’s army deep into the wilderness, where they managed to achieve a hard-fought victory against Yokudan forces, despite their numerical disadvantage.#!"

 BattlePoIHistoricalNameFirstOrsinium: "The Siege of First Orsinium"
 BattlePoIHistoricalDescFirstOrsinium: "#emp Victors: [GetScriptedCharacterByHistoryID( 'daguer_1003' ).GetTitledFirstNameNicknamed], [GetScriptedCharacterByHistoryID( 'shinji_1' ).GetTitledFirstNameNicknamed], the High King of Hammerfell\nDefeated: [GetScriptedCharacterByHistoryID( 'igrun_101' ).GetTitledFirstName]\nDate: 1E 980#!\n#weak The Siege of Orsinium was a 30-year campaign that saw an alliance of Breton and Yokudan forces destroy the Orcish kingdom of Orsinium. Initiated after King Golkarr of the Orcs sought control of the Bjoulsae River and its trade routes, the conflict united neighboring powers against Orsinium. King Joile of Daggerfall led the coalition with support from the Order of Diagna, Sentinel, and the Bjoulsae River Tribes.\nThe siege was marked by intense resistance from the Orcs and internal conflicts among the attackers. King Joile betrayed his allies by plotting against the Redguards and orchestrating the deaths of key leaders, including Gaiden Shinji of the Order of Diagna, as part of his preparations for a future invasion of Hammerfell. Efforts by Orcish diplomats to sow discord among the attackers further prolonged the siege.\nDespite these delays, the campaign ultimately culminated in the breaching and complete destruction of Orsinium.#!" #AI starting with "King Joile of Daggerfall led the coalition with support from the Order of Diagna..."

 BattlePoIHistoricalNameBangkoraiGarrison: "The Battle of Bangkorai Garrison"
 BattlePoIHistoricalDescBangkoraiGarrison: "#emp Victor: [GetScriptedCharacterByHistoryID( 'alessian_107' ).GetTitledFirstName]\nDefeated: [GetScriptedCharacterByHistoryID( 'graysk_100' ).GetTitledFirstName]\nDate: 1E 1029#!\n#weak The Battle of Bangkorai Garrison marked the end of the Gray Host, a dangerous army of vampires, lycanthropes, and the undead. The Gray Host, led by King Styriche, had previously conquered much of Hammerfell, including the city of Verkarth. Their relentless advance was halted when Empress Hestra of the Alessian Empire led her legions into western Hammerfell to confront them.\nAfter a bloody retreat, the Gray Host reached the Bangkorai Garrison, where they launched a brutal assault, overwhelming the gates and slaughtering soldiers. Amid the chaos, a humble beadle named St. Pelin made a sacrificial stand. He offered his own blood to the vampires, praying to Stendarr for strength. Miraculously, his prayer was answered, and he was filled with a divine ocean of blood, which drew the vampires into a frenzy. This allowed the defenders to push back, with reinforcements arriving to finish the fight.\nThe combined efforts of the Garrison and Empress Hestra’s forces led to the Gray Host's annihilation. Though the story of St. Pelin's divine intervention is debated among scholars, it remains a key part of the legend surrounding the battle.#!" #AI

 BattlePoIHistoricalNameRedEagle: "Red Eagles Last Stand"
 BattlePoIHistoricalDescRedEagle: "#emp Victor: [GetScriptedCharacterByHistoryID( 'alessian_107' ).GetTitledFirstName]\nDefeated: [GetScriptedCharacterByHistoryID( 'faolan' ).GetTitledFirstNameNicknamed]\nDate: 1E 1030#!\n#weak Faolan, also known as Red Eagle, was a warrior destined to unite the Reach. After being exiled for refusing to yield to the invading armies of Hestra, Faolan made a pact with a hagraven to become the first Briarheart, gaining supernatural power to avenge his people. He led a guerrilla campaign against the Imperials, rallying Reachmen to fight for freedom and nearly driving the invaders out.\n\nHowever, despite initial success, Faolan’s forces were eventually overwhelmed by a larger Imperial invasion. In a final, desperate act, Faolan faced the Imperial legions alone, fighting until his body was nearly destroyed. It is said that he killed a thousand soldiers before finally falling.#!" #AI
  
 BattlePoIHistoricalNameRedMountain: "The Battle of Red Mountain"
 BattlePoIHistoricalDescRedMountain: "#emp Victor: [GetScriptedCharacterByHistoryID( 'mora_109' ).GetFirstNameNicknamed]\nDefeated: [GetScriptedCharacterByHistoryID( 'duamaka_100' ).GetFirstNameNicknamed]\nDate: 1E 700#!\n#weak $BATTLE_RM_GLOSS$#!"
 
 BattlePoIHistoricalNamePalePass: "The Battle of Pale Pass"
 BattlePoIHistoricalDescPalePass: "#emp Victor: [GetScriptedCharacterByHistoryID( 'reman_100' ).GetTitledFirstName]\nDefeated: Commander Mishaxhi\nDate: 1E 2703#!\n#weak During the Akaviri invasion of Tamriel, Reman Cyrodiil rallied the remnants of the Alessian Empire to confront the invaders. The Akaviri were driven into the Jerall Mountains, taking refuge in the strategic Pale Pass. Reman was aided by Vivec, the God-King of Morrowind, who struck the Akaviri from the rear, severing their supply lines.\nWith dwindling resources the Akaviri position became untenable and Reman launched a decisive assault. According to legend, upon hearing his voice, the invaders laid down their arms and pledged loyalty to him as their new Emperor.#!" #AI

 BattlePoIHistoricalNameXiTsei: "Xi-Tsei Massacre"
 BattlePoIHistoricalDescXiTsei: "#emp Victor: Unknown\nDefeated: General Augurius Bucco\nDate: 1E 2920#!\n#weak The Xi-Tsei Massacre occurred during the Blackwater War when General Augurius Bucco and the Fourth Legion sought refuge in the abandoned Argonian temple of Xi-Tsei. They were ambushed and slaughtered by a large Argonian war party. While the full details remain unclear, it is believed that the Argonians killed most of the soldiers, while many others mysteriously disappeared without a trace.\n\nThe horrific event left the area steeped in local superstition, with many believing it to be cursed.#!"

 BattlePoIHistoricalNameBodrum: "The Battle of Bodrum"
 BattlePoIHistoricalDescBodrum: "#emp Victor: God-King Vivec\nDefeated: [GetScriptedCharacterByHistoryID( 'reman_104' ).GetTitledFirstName]\nDate: 1E 2920#!\n#weak The Battle of Bodrum in 2920 was a pivotal clash between the Imperial Army, led by Emperor Reman III, and the forces of Morrowind, commanded by Vivec. As the Imperials advanced near the Pryai River, Vivec exploited the terrain to devastating effect. From a bluff overlooking the battlefield, his forces rained down arrows and spells on the Imperial ranks. He then unleashed a flood by destroying a newly constructed dam, sweeping the Imperial troops into traps of spears downstream. Immobilized by mud and chaos, the remaining Imperial soldiers were overwhelmed, leading to a crushing defeat for the Empire.#!" #AI

 BattlePoIHistoricalNameAldMarak: "The Battle of Ald Marak"
 BattlePoIHistoricalDescAldMarak: "#emp Victors: [GetScriptedCharacterByHistoryID( 'reman_juilek_1' ).GetTitledFirstName], [GetScriptedCharacterByHistoryID( 'akavir_99' ).GetTitledFirstName]\nDefeated: God-King Vivec\nDate: 1E 2920#!\n#weak The Battle of Ald Marak in 2920 marked a significant victory for the Empire during its campaign against Morrowind. Prince Juilek's Imperial Army, aided by Potentate Versidue-Shaie, used a cunning strategy to outmaneuver Vivec's forces. While Vivec anticipated an attack across the straits of Lake Coronati, the Imperials employed alteration magic to breathe underwater, enabling their heavily armored soldiers to cross the lake undetected. This surprise maneuver allowed the Imperials to assault Ald Marak from its least fortified, waterbound western side, securing the well-defended fortress before Vivec could respond.\nDespite Vivec's attempts to rally his forces, Ald Marak's fall was a decisive blow.#!" #AI
 
 BattlePoIHistoricalNameSecondOrsinium: "The Sack of Second Orsinium"
 BattlePoIHistoricalDescSecondOrsinium: "#emp Victor: [GetScriptedCharacterByHistoryID( 'branquette_999' ).GetTitledFirstNameNicknamed]\nDefeated: [GetScriptedCharacterByHistoryID( 'yashnag_99' ).GetTitledFirstName]\nDate: 2E 431#!\n#weak Orsinium became a recognized province of the Second Empire during the reign of Akaviri Potentate Savirien-Chorak. However, after his assassination and the loss of Imperial protection, the nearby Bretons began attacking the Orcs. This led to the siege and sacking of Orsinium. Despite valiant resistance, the city was completely destroyed, and the Bretons seized control of the surrounding land, scattering the Orcs across northern Tamriel.#!" #AI
 