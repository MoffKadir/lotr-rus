l_english:
 ek_feast.0001.new_life.t: "A Night to Remember"
 ek_feast.0001.t: "$feast_header$ A Night to Remember"
 ek_feast.0001.desc: "What started as an ordinary feast became an exceptional one thanks to the presence of a mysterious guest, known only as Sam Guevenne!\n\nWe spoke all evening about all manner of subjects, and as the night went on, he made me a proposal: if I beat him in a drinking contest, he would give me a great boon. But, and this came with a chilling yet charming grin, if I were to lose, I would have to worship him for eternity.\n\nThat last part had to be a joke."
 ek_feast.0001.a: "A drinking contest? You don't stand a chance!"
 ek_feast.0001.b: "Maybe next time."
 ek_feast.0002.desc: ""Very well", said Guevenne. "I am able to acknowledge a true challenger when I'm faced with [ROOT.GetCharacter.GetHerHim]. So, what will it be?"\n\nWith my head spinning, I utter an answer the best way I can."
 ek_feast.0002.a: "I wish to have the power to seduce any mortal."
 ek_feast.0002.b: "I don't need any boon, I just need hard, cold drakes."
 ek_feast.0002.c: "My only wish is to serve you!"
 ek_feast.0002.c.tt: "You'll become Sanguine's Champion!"
 ek_feast.0003.desc: "I wasn't able to keep myself sober for much longer. I passed out hearing Sam's laughter getting deeper and distorted.\n\nWhen I woke up, Sam had turned into something out of a nightmare, with towering height and horrifying appearance. "Who are you?" I asked.\n"I am Sanguine, [Glossary( 'Daedric Prince', 'DAEDRA_GLOSS' )] of Debauchery! I know, I know, how could I lie to you? Well, how could I trust you until we've shared a few drinks? But it wasn't long before I realized you'd make a more interesting bearer of my blessings and curses."\n\nI was shocked, left without words, but he was unscathed in his intent. "So, what about that bet, huh? Ready to become a worshipper of the Prince of Debauchery?""
 ek_feast.0003.a: "As you wish... Master."
 ek_feast.0003.a.tt: "You'll become a Sanguine Worshipper in secret!"
 ek_feast.0003.b: "I will never serve the kinds of you!"
 ek_feast.0003.b.tt: "You'll invoke Sanguine's wrath!"

 ek_feast.0004.t: "Feast of the Dead"
 ek_feast.0004.desc: "The Nords have always been proud of the achievements of their ancestors and Ysgramor takes the highest place among the most revered. The people of Windhelm traditionally celebrate the Feast of the Dead in the city's seat of power, the Palace of Kings, but it is a holiday celebrated throughout Skyrim.\n\nThe feast is meant to celebrate Ysgramor's historical attack on Saarthal, the gathering of the Five Hundred Companions, and the elven defeat in Skyrim. During said feast, each of the names of Five Hundred Companions of Ysgramor are recited, along with cheers and toasts in their memories."
 ek_feast.0004.a: "All hail the Five Hundred Companions!"
 ek_feast.0004.b: "Such a respectful tradition!"
 ek_feast.0004.c: "I refuse to participate in such nonsense!"
 ek_feast.0004.nords: "Every Nord participant"

 refused_feast_of_the_dead_opinion: "Refused to participate on the Feast of the Dead"

 ek_feast.0005.t: "Spirits Away"
 ek_feast.0005.desc: "The grand feast was underway, with merriment filling the air, but a sudden gasp of dismay swept across the banquet hall. The finest shipment of [ROOT.Char.Custom('GetExpensiveDrink_Singular')] had taken an unexpected plunge into a nearby body of water, casting a shadow over the revelry. The mood remained buoyant, but the absence of such exquisite libations threatened to dampen the festivity."
 ek_feast.0005.a: "Bring out the fishing rods!"
 ek_feast.0005.a.success: "You successfully fish out the beverages"
 ek_feast.0005.a.failure: "You fail to catch anything"
 ek_feast.0005.a.crit_success: "You fish out something... Godly"
 ek_feast.0005.b: "There's no shortage of drinks!"
 ek_feast.0005.c: "Thankfully I've stashed some just in case."



