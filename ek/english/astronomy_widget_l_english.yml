 phase_new: "New Moon"
 phase_waning: "Waning"
 phase_waxing: "Waxing"
 #moon_phases: "Masser is [GetPlayer.Custom('MasserPhase')], Secunda is [GetPlayer.Custom('SecundaPhase')]\nActive Constellation is [GetPlayer.Custom('Constellation')]"
 game_concept_furstocks: "Khajiit Forms"
 game_concept_furstock: "Khajiit Form"
 game_concept_furstock_trait: "Khajiit Form Trait"
 game_concept_furstocks_desc: "The Khajiit are born as various forms, or "furstocks", depending on the phases of the moons, which can be tracked via the [astronomy] UI in the lower right HUD.\nElder Kings 2 currently includes the following Khajiit forms:\n$BULLET_WITH_TAB$ [GetTrait('furstock_ohmes').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_ohmes_raht').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_cathay').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_cathay_raht').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_suthay').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_suthay_raht').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_tojay').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_tojay_raht').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_dagi').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_dagi_raht').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_pahmar').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_pahmar_raht').GetName(GetNullCharacter)]\n$BULLET_WITH_TAB$ [GetTrait('furstock_mane').GetName(GetNullCharacter)]"
