 game_concept_star_sign_desc: "Every character is born under one of thirteen constellations. The constellations are divided into three groups each with a guardian and three charges, excepting [sign_serpent|E].\n\n[sign_mage|E] is the guardian of [sign_apprentice|E], [sign_atronach|E] and [sign_ritual|E].\n[sign_thief|E] is the guardian of [sign_lover|E], [sign_shadow|E] and [sign_tower|E].\n[sign_warrior|E] is the guardian of [sign_lady|E], [sign_lord|E] and [sign_steed|E]."
 game_concept_sign_serpent_desc: "The Serpent wanders the sky on a semi-predictable cycle and has no guardian.\n\n$trait_sign_serpent_desc$\n\nSee: [GetTrait('sign_serpent').GetName(GetNullCharacter)]"
 game_concept_sign_ritual_desc: "The Ritual is a charge of the Mage.\n\n$trait_sign_ritual_desc$\n\nSee: [GetTrait('sign_ritual').GetName(GetNullCharacter)]"
 game_concept_sign_lover_desc: "The Lover is a charge of the Thief.\n\n$trait_sign_lover_desc$\n\nSee: [GetTrait('sign_lover').GetName(GetNullCharacter)]"
 game_concept_sign_lord_desc: "The Lord is a charge of the Warrior.\n\n$trait_sign_lord_desc$\n\nSee: [GetTrait('sign_lord').GetName(GetNullCharacter)]"
 game_concept_sign_mage_desc: "The Mage is a guardian constellation with the Apprentice, Atronach and Ritual as its charges.\n\n$trait_sign_mage_desc$\n\nSee: [GetTrait('sign_mage').GetName(GetNullCharacter)]"
 game_concept_sign_shadow_desc: "The Shadow is a charge of the Thief.\n\n$trait_sign_shadow_desc$\n\nSee: [GetTrait('sign_shadow').GetName(GetNullCharacter)]"
 game_concept_sign_steed_desc: "The Steed is a charge of the Warrior.\n\n$trait_sign_steed_desc$\n\nSee: [GetTrait('sign_steed').GetName(GetNullCharacter)]"
 game_concept_sign_apprentice_desc: "The Apprentice is a charge of the Mage.\n\n$trait_sign_apprentice_desc$.\n\nSee: [GetTrait('sign_apprentice').GetName(GetNullCharacter)]"
 game_concept_sign_warrior_desc: "The Warrior is a guardian constellation with the Lady, Lord and Steed as its charges.\n\n$trait_sign_warrior_desc$\n\nSee: [GetTrait('sign_warrior').GetName(GetNullCharacter)]"
 game_concept_sign_lady_desc: "The Lady is a charge of the Warrior.\n\n$trait_sign_lady_desc$\n\nSee: [GetTrait('sign_lady').GetName(GetNullCharacter)]"
 game_concept_sign_tower_desc: "The Tower is a charge of the Thief.\n\n$trait_sign_tower_desc$\n\nSee: [GetTrait('sign_tower').GetName(GetNullCharacter)]"
 game_concept_sign_atronach_desc: "The Atronach is a charge of the Mage.\n\n$trait_sign_atronach_desc$\n\nSee: [GetTrait('sign_atronach').GetName(GetNullCharacter)]"
 game_concept_sign_thief_desc: "The Thief is a guardian constellation with the Lover, Shadow and Tower as its charges.\n\n$trait_sign_thief_desc$\n\nSee: [GetTrait('sign_thief').GetName(GetNullCharacter)]"
