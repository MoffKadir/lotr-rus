 building_type_ebonhall_01:0 "Ebonhall"
 building_type_ebonhall_01_desc:0 "Ebonheart stands proudly as the ancestral seat of the famous Ra'athim family, whose enduring influence and wealth stem from a longstanding tradition of mining.\n\nTo this day, their fortress, Ebonhall, remains a celebrated center for the most skilled artisans and blacksmiths. The weapons and armor crafted within its walls are esteemed for their unparalleled quality, a testament to the closely guarded expertise honed over centuries of unwavering dedication to their craft." #AI
 building_ebonhall_01:0 "$building_type_ebonhall_01$"
 building_ebonhall_01_desc:0 "$building_type_ebonhall_01_desc$"

 building_type_kragen_zel_01: "Kragen-Zel"
 building_type_kragen_zel_01_desc: "The Kragen, a particularly crafty and wily clan even among the Dwarves, were one of the lesser Houses comprising the lost House Dwemer. They rejected the rule of Indoril Nerevar and the law of the First Council, and left Morrowind for the frigid and barbarous north. This rusted-over ruin was once their capital, and though the Dunmer chose to forget its many brass blasphemies, there is still much to pilfer within its corpse."
 building_kragen_zel_01: "$building_type_kragen_zel_01$"
 building_kragen_zel_01_desc: "$building_type_kragen_zel_01_desc$"

 building_type_tear_slave_nexus_01: "Slave Nexus"
 building_type_tear_slave_nexus_01_desc: "Tear is the ugly beating heart of Tamrielic slave trade with the single largest slave market in the world. Every day, tens of thousands souls are sold and bought in the open air markets with cold efficiency, and taken away to grease the cogs of Morrowind with their blood.\n\nAny kind of slave for any kind of task can be found here. The countless slaver companies of House Dres pillage every sea, have cells in every major city, and will never shy away from raiding entire villages into slavery. As long as Tear stands, no outlander is really safe from becoming merchandise of some Dunmer lord."
 building_tear_slave_nexus_01: "$building_type_tear_slave_nexus_01$"
 building_tear_slave_nexus_01_desc: "$building_type_tear_slave_nexus_01_desc$"

 building_type_telvannis_undercity_01: "Telvannis Undercity"
 building_type_telvannis_undercity_01_desc: "There is no ground level in Port Telvannis. So ancient and numerous and large are the towers of Telvannis that the growing layers of their twisting roots choke and perforate the earth. In these hollows and tunnels is a lightless, sprawling place called the Undercity, and it's home to the common folk of the Telvanni capital.\n\nLawless, labyrinthine, often cramped, illuminated by fungus and magelight, the Undercity may be mistaken for a slum, and in many ways it is. However, it is also shockingly diverse: housing all the rejects of the world, from Altmer dissidents to failed Imperial pretender-kings; and shockingly productive. The locals have things and services in store that are either unthinkable or deeply illegal in the outside world."
 building_telvannis_undercity_01: "$building_type_telvannis_undercity_01$"
 building_telvannis_undercity_01_desc: "$building_type_telvannis_undercity_01_desc$"

 building_type_dust_adeptorium_01: "Dust Adeptorium"
 building_type_dust_adeptorium_01_desc: "There is a reason as to why the northern Telvanni Peninsula is sparsely inhabited, as only the hardiest people would stay in the dust-choked ashlands. The Hive Council braved these tormented lands, where ash storms choked even the stubbornest of life. Built on top of a sand-gashed mesa, the Dust Adeptorium studies the secrets of the roiling ash and the howling winds. Cloaked in heavy woven robes and carapace-masks, the Dust Adepts traverse through the ashlands with spells that preserves moisture and humidity. When a storm rages through the Hive Council, the Dust Adeptorium opens its gates for the hardiest students to brave into."
 building_dust_adeptorium_01: "$building_type_dust_adeptorium_01$"
 building_dust_adeptorium_01_desc: "$building_type_dust_adeptorium_01_desc$"

 building_type_kogoruhn_citadel_01: "Ashplagued Ruins"
 building_type_kogoruhn_citadel_01_desc: "Long ago, before there was a Council of Morrowind, the Houses built strongholds across Vvardenfell to defend against Nord incursions, but the protection of the Three Living Gods rendered these strongholds obsolete and they have fallen into disrepair. Kogoruhn was the ancient stronghold of the Sixth House, the House Unmourned, Great House Dagoth, scrubbed from memory and left to drown in the lone and level ash."
 building_kogoruhn_citadel_01: "$building_type_kogoruhn_citadel_01$"
 building_kogoruhn_citadel_01_desc: "$building_type_kogoruhn_citadel_01_desc$"

 building_type_kogoruhn_citadel_02: "Kogoruhn Citadel"
 building_type_kogoruhn_citadel_02_desc: "Blessed with Scarab Blood and blessed by Scarab Blood, Kogoruhn rises as it once did under the Dagoth banner, before the Foul Murder and the False Gods turned the Dunmer astray. The Sixth House and its allies may bide their time in this cloistered citadel until the Sleeper wakes and sets Morrowind free from its long, restless nightmare."
 building_kogoruhn_citadel_02: "$building_type_kogoruhn_citadel_02$"
 building_kogoruhn_citadel_02_desc: "$building_type_kogoruhn_citadel_02_desc$"

 building_type_mournhold_palace_01: "City of Mournhold"
 building_type_mournhold_palace_01_desc: "Mournhold, the capital of Morrowind, is home to Great Mother Almalexia and is the ancestral seat of House Indoril, staunch supporters of the Tribunal Temple. The immense bureaucratic burden of overseeing the lands of both the Temple and the Great Houses turns Mournhold into the only place in Morrowind where courthouses stand tall in the same height as the temples and the homes of nobles, where priests sing more verdicts than prayers, and where Ordinators wield quills more expertly than their swords."
 building_mournhold_palace_01: "$building_type_mournhold_palace_01$"
 building_mournhold_palace_01_desc: "$building_type_mournhold_palace_01_desc$"

 building_type_lichen_fields_01: "Lichen Fields"
 building_type_lichen_fields_01_desc: "Despite the name, the Lichen Fields grow mostly saltrice, but quantities that humble the rice paddies of the Niben. Even though the Lichen Fields have been cleared and planted only some hundred years ago, being entrusted with the Lichen Fields manor has become something of a vaunted honour House Dres enjoys bestowing upon its most ruthless and ambitious members. Perhaps the sad reason behind this lies in the unique workforce situation: the Lichen Fields owe their impressive output not only to the fertile Tearmarsh soil, but also to scores of Argonian and Khajiit slaves, who toil in the knee-deep bracken waters..."
 building_lichen_fields_01: "$building_type_lichen_fields_01$"
 building_lichen_fields_01_desc: "$building_type_lichen_fields_01_desc$"

 building_type_hlalkeep_01:0 "Hlalkeep"
 building_type_hlalkeep_01_desc:0 "Narsis may appear deceptively small for the seat of one of the Great Houses, but its significance should not be underestimated. It stands as one of the oldest Dunmer settlements, having been founded by the revered prophet Veloth himself. Originally named "Narsis-Where-All-Fervently-Praise-the-Prophet-Veloth," it still upholds this legacy to a certain extent.\n\nSituated by Lake Hlaalu, Narsis boasts a secure port where pilgrims and merchants converge to visit the town. Overlooking everything from a hill is Castle Hlakeep, which serves as the seat of power. Here, the heads of House Hlaalu reside, not only guiding Narsis future but also exerting their influence over Morrowind as a whole." #AI
 building_hlalkeep_01:0 "$building_type_hlalkeep_01$"
 building_hlalkeep_01_desc:0 "$building_type_hlalkeep_01_desc$"

 building_type_rootspire_01: "The Rootspire"
 building_type_rootspire_01_desc: "Massive even by the standards of the Great Houses, the council hall where House Redoran convenes resembles nothing more than a fortress, save perhaps a giant corkbulb rising against the ash-riddled skies. Immodest in its dimensions, it nevertheless remains a largely unadorned building in accord with the Gah-Julani architectural and moral standards, though some cannot help but point out that the Grand Council itself could be accomodated twice over in the Rootspire."
 building_rootspire_01: "$building_type_rootspire_01$"
 building_rootspire_01_desc: "$building_type_rootspire_01_desc$"

 building_type_plaza_brindisi_dorom_01:0 "Plaza Brindisi Dorom"
 building_type_plaza_brindisi_dorom_01_desc:0 "There's a reason why, among the many names associated with Morrowind's capital - City of Light and Magic, City of Gems, City of Love and Charity - Mournhold remains prominent. During the end of the First Era, Mehrunes Dagon himself was summoned to assail the city's ruler, Brindisi Dorom. Only through the combined efforts of Sotha Sil and Almalexia could he be banished, but not before the city and its inhabitants suffered brutal devastation.\n\nDespite the destruction, the defeat of Mehrunes Dagon is commemorated as a significant triumph. A portion of Mournhold is now dedicated to its fallen ruler, Brindisi Dorom, who perished in Dagon's assault - the Brindisi Dorom Plaza. This area has been transformed into a place of beauty and reflection, featuring well-tended parks and a colossal statue depicting Almalexia's decisive blow against the Daedric Prince." #Everything after two first sentence is AI
 building_plaza_brindisi_dorom_01:0 "$building_type_plaza_brindisi_dorom_01$"
 building_plaza_brindisi_dorom_01_desc:0 "$building_type_plaza_brindisi_dorom_01_desc$"

 building_type_almalexia_temple_01: "High Chapel of Almalexia"
 building_type_almalexia_temple_01_desc: "The High Chapel of Almalexia towers over every other building in the city of Mournhold, higher even than the Palace of the High Councillor and the Mansion of the Grandmaster. Almalexia's Hands, the Ordinator order sworn to the goddess personally, spend day and night shepherding the faithful pilgrims desperate for an audience with the merciful form of Mother Morrowind. The sick, the needy, the lost, all flock into the High Chapel looking for the life-giving embrace of Almalexia."
 building_almalexia_temple_01: "$building_type_almalexia_temple_01$"
 building_almalexia_temple_01_desc: "$building_type_almalexia_temple_01_desc$"

 building_type_clockwork_lake_01: "Clockwork Lake"
 building_type_clockwork_lake_01_desc: "The Clockwork City was once a bastion of industry and learning in the lands of Morrowind built by the god-king Sotha Sil, yet its disappearance has baffled even the most cunning of mages and scholars. Leaving a water-filled crater behind from the vanishing, the lake often shores up odd mechanical contraptions and misshapen creatures. The Temple advises that any pilgrims and faithful who approach to stay in the guarded paths and not linger too long on the lake's shores." 
 building_clockwork_lake_01: "$building_type_clockwork_lake_01$"
 building_clockwork_lake_01_desc: "$building_type_clockwork_lake_01_desc$"

 building_type_kemel_ze_01:0 "Clockwork Probabilis"
 building_type_kemel_ze_01_desc:0 "Built into the site of a great cliff and featuring a vast network of underwater facilities, Kemel-Ze stands as one of the most impressive ruins the Dwemer ever left before their mysterious disappearance. It is also well-preserved and extensively studied, as a portion of this city was granted to Sotha Sil by the Dwemer themselves while they still inhabited it.\n\nSotha Sil named his section of the city the Clockwork Probabilis, where he layed the foundation for what would later become his most ambitious project - the Clockwork City.\n\nThough the god and the Dwemer have long departed, Kemel-Ze still offers boundless opportunities for advanced research in every conceivable field and is visited by scholars from all over Tamriel."
 building_kemel_ze_01:0 "$building_type_kemel_ze_01$"
 building_kemel_ze_01_desc:0 "$building_type_kemel_ze_01_desc$"

 building_type_amaya_vineyard_01: "Amayan Fields"
 building_type_amaya_vineyard_01_desc:1 "Caressed by the tranquility of Lake Amaya's shores with tender care, this fertile ground blossoms, promising a prosperous future for this esteemed estate in Vvardenfell."
 building_amaya_vineyard_01: "Amayan Fields"
 building_amaya_vineyard_01_desc:1 "$building_type_amaya_vineyard_01_desc$"
