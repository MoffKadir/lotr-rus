 building_type_the_crimson_valley_01: "The Crimson Valley"
 building_type_the_crimson_valley_01_desc: "The Crimson Valley, a foreboding stronghold of Malahk Orcs, is drenched in blood from ritual sacrifices to their Daedric god-king Malahk. This land, both sacred and cursed, is stained deep red, with towering old fortresses looming over pools of blood.\n\nWith such a grim reputation, invaders seeking to purge this dark realm face fierce resistance, facing Orcs unrelenting fury in brutal defense of their sacrificial sanctuaries."
 building_the_crimson_valley_01: "$building_type_the_crimson_valley_01$"
 building_the_crimson_valley_01_desc: "$building_type_the_crimson_valley_01_desc$"

 building_type_subo_lathla_skyport_01: "Subo-Lathla Skyport"
 building_type_subo_lathla_skyport_01_desc: "Subo-Lathla is the greatest Sload skyport of the east and of all Tamriel; here, the Dunmer bargain freely and ruthlessly with the inhabitants of Thras. The #italic worms#! sell both their goods and secrets, over which the elf lords compete endlessly."
 building_subo_lathla_skyport_01: "$building_type_subo_lathla_skyport_01$"
 building_subo_lathla_skyport_01_desc: "$building_type_subo_lathla_skyport_01_desc$"

