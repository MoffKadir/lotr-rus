l_english:
 ### Dark Arts
 dark_arts_lifestyle_name: "Dark Arts"
 dark_arts_lifestyle_desc: "Focus on accumulating forbidden knowledge and power to achieve results that are considered far too dangerous to be taught by normal means."
 dark_arts_lifestyle_highlight_desc: "$dark_arts_lifestyle_highlight_necromancer_traits$$dark_arts_lifestyle_highlight_lichdom_traits$"
 dark_arts_lifestyle_highlight_necromancer_traits: "[GetPlayer.Custom('necromancer_trait_group_impact_dark_arts_lifestyle_experience')]"
 necromancer_trait_impact_dark_arts_lifestyle_experience: "Your #V $trait_necromancer$#! trait grants you #P +10%#! more [experience|E] in this Lifestyle."
 experimentalist_necromancer_trait_impact_dark_arts_lifestyle_experience: "Your #V $trait_experimentalist_necromancer$#! trait grants you #P +10%#! more [experience|E] in this Lifestyle."
 education_magic_trait_impact_dark_arts_lifestyle_experience: "Your #V $trait_education_magic_5$#! trait grants you #P +10%#! more [experience|E] in this Lifestyle."
 dark_arts_lifestyle_highlight_lichdom_traits: "[GetPlayer.Custom('lichdom_trait_group_impact_dark_arts_lifestyle_experience')]"
 lich_trait_impact_dark_arts_lifestyle_experience: "Your #V $trait_lich_character$#! trait grants you #P +20%#! more [experience|E] in this Lifestyle."
 # Mysticism
 dark_arts_mysticism_focus: "Mysticism Focus"
 dark_arts_mysticism_focus_modifier: "[GetFocus('dark_arts_mysticism_focus').GetName]"
 dark_arts_mysticism_focus_desc: "The body is merely a vessel for the real power that lies within souls and vestiges. To manipulate these is a way towards splendor and terror alike."
 dark_arts_mysticism_focus_effect_desc: "Focusing on Mysticism grants:" 
 # Daedric Succour
 dark_arts_daedric_succour_focus: "Daedric Succour Focus"
 dark_arts_daedric_succour_focus_modifier: "[GetFocus('dark_arts_daedric_succour_focus').GetName]"
 dark_arts_daedric_succour_focus_desc: "There is great and horrible knowledge sealed away in the planes of Oblivion. Seeking the counsel of the Princes will bestow a sliver upon you."
 dark_arts_daedric_succour_focus_effect_desc: "Focusing on Daedric Succour grants:"
 # Blood Magic
 dark_arts_blood_magic_focus: "Blood Magic Focus"
 dark_arts_blood_magic_focus_modifier: "[GetFocus('dark_arts_blood_magic_focus').GetName]"
 dark_arts_blood_magic_focus_desc: "Every step towards true power demands sacrifice. But those who are willing to pay the price are going to reap worthy rewards in the end."
 dark_arts_blood_magic_focus_effect_desc: "Focusing on Blood Magic grants:"

