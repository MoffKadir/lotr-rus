 # give some flavor events to the focuses
 magic_theory_focus: "Magical Theory Focus"
 magic_theory_focus_modifier: "[GetFocus('magic_theory_focus').GetName]"
 magic_theory_focus_desc: "Magic is nothing to be toyed with. There is centuries worth of experience in books, why repeat past mistakes?"
 magic_theory_focus_effect_desc: "Focusing on Magical Theory grants:"

 magic_practical_focus: "Practical Magic Focus"
 magic_practical_focus_modifier: "[GetFocus('magic_practical_focus').GetName]"
 magic_practical_focus_desc: "Experience is the best teacher, practice makes perfect. After all, Magic is a tool to be used like any other."
 magic_practical_focus_effect_desc: "Focusing on Practical Magic grants:"

 magic_thaumaturgic_focus: "Thaumaturgic Magic Focus"
