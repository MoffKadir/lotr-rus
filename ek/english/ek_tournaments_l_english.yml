 contest_magic_aptitude_value: "Arcane Clash Aptitude"

 # LIEGE REWARDS FOR LANDLESS KNIGHTS 
 tournament_arcane_clash_prize_log_title: "$tournament_phase_arcane_clash$ Prize"
