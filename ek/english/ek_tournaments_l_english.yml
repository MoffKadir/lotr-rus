 character_contest_type_aptitude_magic: "#T $character_contest_type_aptitude_start$ $tournament_contest_type_magic$ [contest_aptitude|E]: [Character.Custom('GetContestTypeMagicAptitude')]#![AddTextIf( Not( StringIsEmpty( Character.MakeScope.GetScriptValueDesc('contest_type_aptitude_magic') ) ), Concatenate( '\n', Character.MakeScope.GetScriptValueDesc('contest_type_aptitude_magic') ) )]"

 MAGIC_EXPERIENCE_REGULAR_TOOLTIP: "$tournament_contest_favoured_skill_tooltip$ $tourney_participant_magic$"
 MAGIC_EXPERIENCE_GREATER_TOOLTIP: "$tournament_contest_most_favoured_skill_tooltip$ $tourney_participant_magic$"

 ### PHASES 
 tournament_phase_arcane_clash: "Arcane Clash"
 tournament_phase_arcane_clash_desc: "A contest of arcane knowledge and magical strength, with the ultimate winner being the last remaining duelist.\n\n$tournament_contest_format_versus$\nNumber of [contest_rounds|e]: 3"
 
 ### Costs
 tournament_arcane_clashes_cost: "Arcane Clashes"

 # ARTIFACTS
 tournament_prize_desc_arcane_clash: "[newly_created_artifact.GetDesc] Awarded to [contest_winner.GetTitledFirstName] by [host.GetTitledFirstName] for winning an Arcane Clash."
