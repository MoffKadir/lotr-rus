 tournament_arcane_clash_winner_log_title: "$tournament_phase_arcane_clash$ Winner"
 tournament_arcane_clash_winner_log: "[CHARACTER.GetTitledFirstName] won the $tournament_phase_arcane_clash$"
 
#PTV Custom loc
 locale_window_widget_progress_to_victory_label_active_competing_arcane_clashes: "You are competing in an #bold Arcane Clash#!"

# Conclusions
 tournament_conclusion_winner_arcane_clash: "\n#BOL Arcane Clashes#! winner: [activity.MakeScope.Var('arcane_clash_winner').Char.GetFirstName]"
