l_english:
 unlocks_county_offer_vassalization_interaction: "Can use the [offer_vassalization_interaction|E] with characters of [count|E] rank"
 unlocks_duchy_offer_vassalization_interaction: "Can use the [offer_vassalization_interaction|E] with characters of [duke|E] rank"
 unlocks_kingdom_offer_vassalization_interaction: "Can use the [offer_vassalization_interaction|E] with characters of [king|E] rank"
 unlocks_bonus_offer_vassalization_interaction: "Increases the likelyhood of characters accepting an [offer_vassalization_interaction|E]"
 unlock_provincial_governor_contract: "Unlocks the #high $special_contract_provincial_governor_short$#! [vassal_contract]"
 ### Empire of Men
 # Military
 innovation_war_magic: "War Magic"
 innovation_war_magic_desc: "Raw energy pours into our world through the stars and the sun. By learning how to tap into this energy, and focus it to impact our world, we can train some of our soldiers to use it."
 unlock_academy_holding: "Unlocks the ability to build [academy|E] [holdings|E]"
 unlock_tribal_academy_buildings: "Unlocks all $culture_era_tribal$ Academy [buildings|E]"
 required_other_magical_innovations: "This [innovation|E] is required for all other magicka-related Military Innovations"
 innovation_basic_armor_forging: "Basic Armor Forging"
 innovation_basic_armor_forging_desc: "Basic materials and metals allow for light yet effective armor. Leather, Iron, and other simple materials can be widely used to outfit almost anyone."
 innovation_disorganized_military: "Disorganized Military"
 innovation_disorganized_military_desc: "While most cultures rely on elite soldiers and professional warriors, we rely on overwhelming numbers and vast armies. Our soldiers are cheap, numerous, and together we will flood the fields with our warriors!"
 cannot_research_men_at_arms_innovations: "#N Cannot research [innovations|E] unlocking new [men_at_arms|E], or increasing the size and raising the caps of [men_at_arms|E]#!"
 innovation_disorganized_military_can_be_reformed: "This innovation can be removed by a powerful [cultural_head|E] that is very well versed into the arts of war, by enacting the #V 'Reform the Military'#! [decision|E]"
 innovation_leather_armor: "Leather Armor"
 innovation_leather_armor_desc: "Sturdier than hide while still allowing more flexibility than metal, leather can be widely produced to fit our armies."
 unlock_maa_light_footmen: "Can recruit [GetMaA('light_footmen').GetName] as [men_at_arms|E]"
 innovation_sanded_wood: "Sanded Wood"
 innovation_sanded_wood_desc: "While standard bows and arrows have been used for centuries all throughout Tamriel, recent advancement in woodworking have made it possible to produce a lot of high-quality bows to fit entire regiments."
 unlock_maa_bowmen: "Can recruit [GetMaA('bowmen').GetName] as [men_at_arms|E]"
 innovation_steel_spearhead: "Steel Spearhead"
 innovation_steel_spearhead_desc: "Strong and sturdy spearheads which can easily produce will allow for regiments of pikemen, able to break a cavalry's charge."
 unlock_maa_pikemen_unit: "Can recruit [GetMaA('pikemen_unit').GetName] as [men_at_arms|E]"
 innovation_horse_breeding: "Horse Breeding"
 innovation_horse_breeding_desc: "Horses are expensive but allow for very powerful cavalry regiments. By selecting horses lineages which are easy to train and suited for warfare, we can field new regiments that can scout ahead and pursue the enemy."
 unlock_maa_light_horsemen: "Can recruit [GetMaA('light_horsemen').GetName] as [men_at_arms|E]"
 # Civic
 innovation_alchemy: "Alchemy"
 innovation_alchemy_desc: "The art of combining various ingredients to create potions and poisons, Alchemy, in its most basic form, was present in most if not all societies. But carefully studying each ingredient to determine what magical property each has requires a higher understanding of nature and the alchemichal processes themselves."
 innovation_master_field: "Master's Field"
 innovation_master_field_desc: "For most, education comes from personal tutorage with a local master. We should reserve small plots of land for such tutorage."
 innovation_might_makes_right: "Might Makes Right"
 innovation_might_makes_right_desc: "As the empires of old crumble, only the strongest will survive and thrive. We should take all that we can and oust the weak, so that our people and our family can prosper into this new age!"
 unlock_de_jure_war_mmr: "Unlocks [de_jure|E] wars at the following [prestige_level|E]:\n - County tier: [GetModifier( 'prestige_level_2' ).GetNameWithTooltip|L]\n - Duchy tier: [GetModifier( 'prestige_level_3' ).GetNameWithTooltip|L]\n - Kingdom tier: [GetModifier( 'prestige_level_4' ).GetNameWithTooltip|L]\n - Unrestricted tier: [GetModifier( 'prestige_level_5' ).GetNameWithTooltip|L]"
 mmr_tenets_change: "Some [core_tenets|E] and [doctrines|E] can change the requirements of [might_makes_right|E], by adding a potential [piety_level|E] requirement or reducing the [prestige_level|E] or [piety_level|E] required"
 # Regional
 innovation_moonstone_armor: "Moonstone Armor"
 innovation_moonstone_armor_desc: "A closely guarded secret in the heart of Alinor, the art of refining Moonstone Ore to craft light, but durable, armors has led some of the most beautiful armor Tamriel has ever seen."
 innovation_blood_price: "Blood Price"
 innovation_blood_price_desc: "We do not believe in mindless imprisonment. When one of your kin commits a crime, they are to pay in blood. The greater the crime, the more blood has to be spilt.\n\n#help Then pay with your blood!#!"
 unlocks_blood_price_punishment: "Unlocks the '$extract_blood_price_interaction$' [interaction|E] towards [prisoners|E], wounding them and releasing them afterwards."
 innovation_knightly_orders: "Knightly Orders"
 innovation_knightly_orders_desc: "The feudal structure of High Rock is best seen in focus on Knighthood. Ever since the liberation of High Rock from the Elven Direnni, prestigeous knights are held as heroes of the common people, and every child dreams of one day being ordained a knight by their liege."
 unlocks_high_diplomacy_gives_poet: "Characters with high [diplomacy|E] can become [GetTrait('lifestyle_poet').GetName(GetNullCharacter)]"
 unlocks_poet_guests: "Some [guests|E] of this culture can arrive as [GetTrait('lifestyle_poet').GetName(GetNullCharacter)]"
 innovation_war_facepaints: "War Facepainting"
 innovation_war_facepaints_desc: "Before a battle, our warriors will paint their face with sacred paints and recreate traditional motifs. Some might dismiss it as a baseless superstition, but the battlefield does not lie."
 characters_war_gear_facepaint: "Characters in war gear will receive war paints on their face"
 prestige_piety_gain_battle_bonus: "#P +25%#! [prestige|E], [prestige_experience|E], [piety|E] and [piety_experience|E] from Battles"
 innovation_minotaur_army: "Minotaur Army"
 innovation_minotaur_army_desc: "Considered savage beasts by many, this culture instead sees the Minotaurs as either a divine manifestation, or an old ally in a millenia-old struggle. No matter the reason, they have allied themselves with the Minotaurs, and the Bull-Men have agreed to lend their strength and resolve in exchange for land and safety."
 reduces_risk_minotaur_infestation: "Vastly reduces the risk of a Minotaur Infestation"
 innovation_minotaur_army_living_minotaur_army: "The [cultural_head|E] needs to command at least one Minotaur [regiment|E]"
 unlocks_county_conquest_cb_mmr: "Unlocks the #V County Conquest#! [casus_belli|E] for characters with a [prestige_level|E] equal or superior to [GetModifier( 'prestige_level_2' ).GetNameWithTooltip|L] #weak (follows the other [might_makes_right|E] mechanics)#!"
 innovation_black_marsh_natives: "Marsh-Steading"
 innovation_black_marsh_natives_desc: "Black Marsh is, to most people, inhospitable to the point of being a fetid hell. But still there are those who live here, those who have grown accustomed to the constant rot, who know what solid ground to trust, whose expectations are low and who use the eccentric and repulsive abundance of the bogs instead of civilisation as it can exist elsewhere, in less chaotic lands."
 innovation_automatically_given_natives_of_black_marsh: "This [innovation|E] is automatically given to any Culture that is [native|E] to any [nativity_region|E] in [GetGeographicalRegion('mundus_tamriel_black_marsh').GetName]"
### Pariah innovations
# Pariah Folk
 innovation_pariah_folk: "Pariah Folk"
 innovation_pariah_folk_desc: "Just because we are who we are, others view our lives as expendable, our existence as a blemish. In the hearts of the "civilized", our name invokes disgust, derision, scorn, persecution. For now, with our hearts and hides hardened to abuse, we endure, until one blessed day we cast off this cursed lot."
 innovation_pariah_folk_can_be_removed: "This [innovation|E] can be removed by a prestigious [cultural_head|E] that has proven their people to be equal to other races, by enacting the #V 'Cast off Pariah Status'#! [decision|E]"
 innovation_pariah_folk_cultural_acceptance: "Gains #p +20#! [cultural_acceptance|E] with [pariah|E] [cultures|E]"
 innovation_pariah_folk_marriage: "Characters of a culture with this [innovation|E] get reduced Marriage Acceptance with characters of non-[pariah|E] cultures"
 innovation_pariah_folk_revocation: "Characters of a culture with this [innovation|E] may be [imprisoned|E], [executed|E] or [revoked|E] from by non-[pariah|E] lieges without it being considered [tyranny|E], unless they are a [vassal|E] with the [GetSubjectContractType( 'cultural_rights' ).GetObligationName( 'cultural_rights_protected' )] [vassal_contract|E]"
 innovation_pariah_folk_persecution: "Characters of a culture with this [innovation|E] may be targeted using the $EXPEL_MONSTERS_DUCHY_NAME$ [casus_belli|E]"
 innovation_pariah_folk_title_revocation: "[recipient.GetShortUIName|U] is a [monster|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to revoke [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHis )] [titles|E] without being viewed as a [tyrant|E]"
 innovation_pariah_folk_vassal_revocation: "[recipient.GetShortUIName|U] is a [monster|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to revoke [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHis )] [vassals|E] without being viewed as a [tyrant|E]"
 innovation_pariah_folk_imprisonment: "[recipient.GetShortUIName|U] is a [monster|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to imprison [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHim )] without being viewed as a [tyrant|E]"
 innovation_pariah_folk_execution: "[recipient.GetShortUIName|U] is a [monster|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to execute [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHim )] without being viewed as a [tyrant|E]"
# Pariah Legacy
 innovation_pariah_legacy: "Pariah Legacy"
 innovation_pariah_legacy_desc: "Our people were once Pariahs, which has given us a unique perspective on those who remain "monsters". Though we are able to sit and break bread with the "civilised" races, our experience of ostracisation will help us remember the nature of the so-called beasts when we encounter those not yet redeemed."
 innovation_pariah_legacy_tolerant: "Characters of this culture do not discriminate against current [pariah|E] cultures"
 risks_restoring_pariah_status: "This culture, while not currently [pariah|E], risks regaining [pariah|E] status and the #V Pariah Folk#! [innovation|E]. This may happen if the culture is ever left without at least one [kingdom|E] tier [ruler|E] for an extended amount of time"
 innovation_former_pariah_folk_marriage: "Characters of a culture with this [innovation|E] also get reduced Marriage Acceptance with characters of non-[pariah|E] cultures, though reduced compared to current [pariah|E] cultures"
# Redeemed Pariah
 innovation_redeemed_pariahs: "Redeemed Pariahs"
 innovation_redeemed_pariahs_desc: "Our world abounds with monsters. Once, even we were Pariahs. But joining the ranks of the civilised has allowed us to recognise the monstrosity of the miscreated, and remembering what puts us above them will help us remain civilised forever."
 innovation_redeemed_pariahs_intolerant: "Characters of this culture may discriminate against current [pariah|E] cultures, just as if they never were a [pariah|E] culture themselves"
# Daedric Race
 innovation_daedric_race: "Daedric Race"
 innovation_daedric_race_desc: "Hailing from the Waters of Oblivion, these people have vestiges instead of souls. Many mortals consider [Glossary( 'Daedra', 'DAEDRA_GLOSS' )] dangerous interlopers that must be driven out at all costs. Once banished, they will go back to the Outer Realms or — in the worst case — the Void. To ensure their efforts are not wasted, they call forth kindred that succeed them upon banishment."
 innovation_daedric_race_innovations: "A random available [innovation|E] is unlocked for this culture every #V 20 years#!"
 innovation_daedric_race_persecution: "Characters of a culture with this [innovation|E] may be targeted using the $BANISH_DEMON_DUCHY_NAME$ [casus_belli|E], unless the attacker follows a [GetReligionFamily('rf_daedra').GetName] [faith|E]"
 innovation_daedric_race_revocation: "Characters of a culture with this [innovation|E] may be [imprisoned|E], [executed|E] or [revoked|E] from by non-[daedric_race|E] lieges without it being considered [tyranny|E], unless they are a [vassal|E] with the [GetSubjectContractType( 'cultural_rights' ).GetObligationName( 'cultural_rights_protected' )] [vassal_contract|E] or the liege follows a [GetReligionFamily('rf_daedra').GetName] [faith|E]"
 innovation_daedric_race_title_revocation: "[recipient.GetShortUIName|U] is a [demon_race|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to revoke [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHis )] [titles|E] without being viewed as a [tyrant|E]"
 innovation_daedric_race_vassal_revocation: "[recipient.GetShortUIName|U] is a [demon_race|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to revoke [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHis )] [vassals|E] without being viewed as a [tyrant|E]"
 innovation_daedric_race_imprisonment: "[recipient.GetShortUIName|U] is a [demon_race|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to imprison [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHim )] without being viewed as a [tyrant|E]"
 innovation_daedric_race_execution: "[recipient.GetShortUIName|U] is a [demon_race|E], allowing [Select_CString( actor.IsLocalPlayer, 'you', 'them' )] to execute [Select_CString( recipient.IsLocalPlayer, 'your', recipient.GetHerHim )] without being viewed as a [tyrant|E]"
 task_promote_culture_daedric_race: "We cannot use this task as we are [daedric_race|E], who are not native to the mortal realm and cannot maintain a stable population here. \n\nSee the #V $innovation_daedric_race$#! [innovation|E]."
 innovation_cannot_be_removed: "#N This innovation cannot be removed#!"

 ### Early Interregnum
 # Military
 innovation_magical_studies: "Codified Magical Studies"
 innovation_magical_studies_desc: "Following the founding of the Mages Guild in 2E 230, arcane knowledge has become more widely available. We can follow this model and organize an education system for our most promising magical talents."
 education_magic_available_1: "Children educated by a character with a #V $trait_arcana_good$#! [trait|E] will gain a #V $trait_education_magic$#! [trait|E], with the ability to cast [spells|E] and [magic_rituals|E]"
 unlock_early_medieval_academy_buildings: "Unlocks all $culture_era_early_medieval$ Era Academy [buildings|E]"
 unlocks_arcane_clash_tournament_phase: "Unlocks the Arcane Clash tournament phase"
 # Civic
 innovation_local_school: "Local Schools"
 innovation_local_school_desc: "Young pupils can be trained very efficiently, should they receive the care and education that they need. Setting up local schools will ensure that even those of lower class can receive a formal education, which would benefit our society as a whole."
 unlocks_duchy_conquest_cb_mmr: "Unlocks the #V Duchy Conquest#! [casus_belli|E] for characters with a [prestige_level|E] equal or superior to [GetModifier( 'prestige_level_3' ).GetNameWithTooltip|L] #weak (follows the other [might_makes_right|E] mechanics)#!"
 ### Time of the Pretenders
 # Military
 innovation_schools_of_magic: "Schools of Magic"
 innovation_schools_of_magic_desc: "Most of the effects of magicka can be classified into a handful of 'Schools', such as Restoration, Destruction, or Conjuration. Following these Schools will allow us to train new mages at an almost unprecedented pace, and will allow them to have a much deeper understanding of their power."
 education_magic_available_2: "Children educated by a character with a #V $trait_arcana_good$#! or #V $trait_education_magic$#! [trait|E] will gain a #V $trait_education_magic$#! [trait|E], with the ability to cast spells and rituals"
 unlock_high_medieval_academy_buildings: "Unlocks all $culture_era_high_medieval$ Era Academy [buildings|E]"
 innovation_restoration_squads: "Restoration Squads"
 innovation_restoration_squads_desc: "While requesting that some mages be left out of the battlefield may seem counter-intuitive, Restoration mages dedicated to taking care of the wounded in the army camps will ensure that soldiers who would be otherwise too wounded to fight can receive the care they need."
 # Civic
 innovation_provincial_governors: "Provincial Governors"
 innovation_provincial_governors_desc: "It is almost impossible to effectively rule several provinces at once. We should entrust loyal servants with keeping far-fetched provinces in line, and make them bend the knee should they rebel against our glorious empire."
 innovation_community_college: "Community Colleges"
 innovation_community_college_desc: "Most gifted students have to rely on patronage to further their studies and become master of their craft. This unfortunately forbids those whithout wealth to further their studies. They should be taken care of, and given the opportunity they deserve."
 unlocks_kingdom_conquest_cb_mmr: "Unlocks the #V Kingdom Conquest#! [casus_belli|E] for characters with a [prestige_level|E] equal or superior to [GetModifier( 'prestige_level_4' ).GetNameWithTooltip|L] #weak (follows the other [might_makes_right|E] mechanics)#!"
 ### Unification Wars
 # Military
 innovation_siege_magic: "Siege Magic"
 innovation_siege_magic_desc: "For centuries we tried to break fortifications with more and more complex siege weaponry. But as walls get taller and wider, specialised war mages could be used to destroy fortifications."
 innovation_lost_arcane_arts: "Lost Arcane Arts"
 innovation_lost_arcane_arts_desc: "Over the centuries, a lot of ancient arcane arts have been lost and forgotten. While not every mage could, or should, be a master of Auramancy, Flesh Magic, or Blood Magic, it is important that the fundamentals be preserved and studied."
 innovation_horse_armor: "Horse Armor"
 innovation_horse_armor_desc: "Tamriel is a dangerous place. Protect your horse from danger with this beautiful and resilient armor. Because you can't afford not to protect your horse."
 # Civic
 innovation_census_and_excise: "Census and Excise"
 innovation_census_and_excise_desc: "As the population of Tamriel's hegemonies and Empires grow, so does the need for an office dedicated to keeping an accurate headcount of citizens and inhabitants.\n\n#I Note: The monthly control growth is changed by +0.1 and not +0.#!"
 innovation_integrated_guilds: "Integrated Guilds"
 innovation_integrated_guilds_desc: "While they traditionally stayed outside of politics, it might be time to establish close ties between local rulers and the leaders of close guild chapters."
 unlock_late_medieval_academy_buildings: "Unlocks all $culture_era_late_medieval$ Era Academy [buildings|E]"
 unlocks_empire_conquest_cb_mmr: "Unlocks the #V High Kingdom Conquest#! [casus_belli|E] for characters with a [prestige_level|E] equal or superior to [GetModifier( 'prestige_level_5' ).GetNameWithTooltip|L] #weak (follows the other [might_makes_right|E] mechanics)#!"
 
 ### Special

 innovation_migratory_culture: "Migratory Culture"
 innovation_migratory_culture_desc: "When most people choose to settle in a single place, we travel throughout the world and bring our people with us."
 culture_parameter_culture_is_migratory: "This culture is considered [migratory|E]"

 innovation_dead_culture: "Dead Culture"
 innovation_dead_culture_desc: "While some individuals might claim to still follow the ancient and traditional ways, there is no significant community that shares this feeling. Rekindling this sentiment among the common folk might one day be possible, but for all intents and purposes our culture is considered extinct."
 no_county_culture_conversion: "#N This culture cannot be used to [promote_culture|E]#!"
 culture_can_be_revived: "This culture may in some cases be [culture_revived|E]"
 task_promote_culture_culture_within_heritage_alive: "We cannot use this task as there is no valid [culture|E] within our [heritage|E].\nAll these cultures, including our own, are considered #V Dead#! (see the #V $innovation_dead_culture$#! or #V $innovation_extinct_race$#! [innovations|E]) and cannot be used to convert a [county|E].\nThere is currently no way to revive a completely #V Dead#! or #V Extinct#! Heritage."
 culture_cannot_be_educated: "#N This culture cannot be passed on to [wards|E]#!"
 dead_culture_cannot_educate: "[guardian_possessive|E] [culture|E] must be considered a [living_culture|E]"

 innovation_extinct_race: "Extinct Race"
 innovation_extinct_race_desc: "This culture belongs to a race long gone, with no living relatives who could ever hope to reclaim their cultural practices and resettle their ancestral lands. While some long since disappeared peoples may hope for a revitalisation, this culture cannot ever again walk on Nirn."
 culture_cannot_be_revived: "#N This culture cannot be#! [culture_revived|E]"

 ## Regional MaA
 #innovation_war_mammoths: "War Mammoths"
 #innovation_war_mammoths_desc: "The huge beasts of the frozen land we live in can be trained for warfare. Their size and resilience give them a tremendous advantage in battle, especially in the cold. They are however less suited to mountainous or hotter terrain."
 
 innovation_giant_maa: "Tundrastriders"
 innovation_giant_maa_desc: "The nomads of the Skyrim tundra stand at twice the height of the typical Nord. At this great height, and the way of life that it encourages, they have few warriors — each capable of causing great damage."
 
 
 eligible_accolade_archmage_attribute_ACCOLADES_DLC: "[knights|E] of this [culture|E] become eligible for [GetAccoladeType('archmage_attribute').GetName] [accolades|E]"
 eligible_accolade_archmage_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_archmage_attribute_ACCOLADES_DLC')]"
 eligible_accolade_spellsword_attribute_ACCOLADES_DLC: "[knights|E] of this [culture|E] become eligible for [GetAccoladeType('spellsword_attribute').GetName] [accolades|E]"
 eligible_accolade_spellsword_attribute: "[AddLocalizationIf( HasDlcFeature( 'accolades' ), 'eligible_accolade_spellsword_attribute_ACCOLADES_DLC')]"