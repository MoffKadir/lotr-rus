 #Auri-El
 
 aedric: "Aedric"
 aedric_adj: "Aedric"
 aedric_adherent: "Aedric Faithful"
 aedric_adherent_plural: "Aedric Faithful"
 aedric_desc: "The High Elves of the Summerset Isles revere the ancient mythical past, seeking ever to emulate their ancestors, the greatest of whom make up their pantheon of gods. Through careful observation of proper ceremony and safekeeping of their divine lineages, known as following the [Concept('praxis','Path to Alaxon')|E], they strive to retain the ideals of lost [Glossary( 'Aldmeris', 'ALDMERIS_GLOSS' )] and stave off the curse of mortal existence."
 aedric_religious_head_title: "Scribe of Auri-El"
 aedric_religious_head_title_name: "Xarxean Priesthood"
 
  #Chantry Auri-El
 
 chantry_auriel: "Aedric Chantry"
 chantry_auriel_adj: "Aedric Chantry"
 chantry_auriel_adherent: "Chanter"
 chantry_auriel_adherent_plural: "Chanters"
 chantry_auriel_desc: "Hidden deep in secluded snowland valleys are found austere monasteries, forgotten chantries from which ancient songs of faith and devotion emerge. Less concerned with the purity of their ancestries than their kindred, the Falmer seek spiritual purification through ascetic living and great personal pilgrimages, giving praise to the hero-ancestors who became their gods."
 chantry_auriel_religious_head_title_name: "Chantry of Auri-El"
 
 #Adamantine Auri-El
 
 mainland_auriel: "Ada-Mantia"
 mainland_auriel_adj: "Ada-Mantia"
 mainland_auriel_adherent: "Adamantine"
 mainland_auriel_adherent_plural: "Adamantines"
 mainland_auriel_desc: "Diverging from the orthodoxy demanded by the [Concept('praxis','Path to Alaxon')|E], some High Elves of old left the Summerset Isles, founding colonies in today's High Rock. Less concerned with adherence to strict ritual than their cousins, their pragmatism allows for greater acceptance of foreign customs, and in turn greater influence upon their human subjects and neighbours."
 mainland_auriel_religious_head_title: "Grand Castellan"
 mainland_auriel_religious_head_title_name: "Tower Zero"
 
 #Malada
 
 malada: "Malada"
 malada_adj: "Maladaic"
 malada_adherent: "Malaburo"
 malada_adherent_plural: "Malaburo"
 malada_desc: "The Malada are the high gods of the ancient Ayleids; these Magna-Ge and Aedra light the shining path to feathered reascension. The Ayleid bloodlines were long struck from the starry skies by Ehlnada warmakers: the mortal gods, whose gift of death cajoled their former kinfolk into service. Thus began the endless religious war of ancient Cyrod against the Ehlnada Princes and mannish demons, still fought to this day with the bitter fervour of a people exiled." 
