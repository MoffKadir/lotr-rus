 #Ten Iron Oaths
 osh_ornim: "Ten Iron Oaths"
 osh_ornim_adj: "Iron Oaths"
 osh_ornim_adherent: "Iron Animist"
 osh_ornim_adherent_plural: "Iron Animist"
 osh_ornim_desc: "The Iron Orcish faith is preserved against attack and concealed from outsiders, based on the simple tenet that each Iron Orc practices: listening. The ‘loud spirits’ of Oblivion, and the skies, and the world around, are heard; but it is the ‘quiet spirits’ that the Iron Orcs revere. The spirits of the rocks and sands guide their listeners to their homes, small grains of metal that form the basis of all Iron Orcish activity."
