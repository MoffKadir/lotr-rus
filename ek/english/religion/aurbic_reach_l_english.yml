 druadach_cult: "Druadach Cult"
 druadach_cult_adj: "Druadach Cult"
 druadach_cult_adherent: "Druaid"
 druadach_cult_adherent_plural: "Druaids"
 druadach_cult_desc: "The Druadach Mountains are the home of every Reachman. But some see in Druadach not only a home, but also a divine father who led their ancestors to this land. Life in the Druadachs can be arduous, but the Druaid are sure that they are protected from the worst whims of Kyne."
 druadach_cult_religious_symbol: "earthen fetish"
 druadach_cult_religious_head_title: "Incarnation"
 druadach_cult_religious_head_title_name: "Druadach's Spirit"

 hircine_coven: "Hircine Coven"
 hircine_coven_adj: "Hircine Coven"
 hircine_coven_adherent: "Hircine Follower"
 hircine_coven_adherent_plural: "Hircine Followers"
 hircine_coven_desc: "While the so-called Old Gods of the Reach are many, some clans dedicate themselves to specific deities - such as Hircine, Lord of the Arena. Among these Reachmen lycantrophes are especially respected - not as gifted by the Spirit of the Hunt, but as one who self-sacrifice to better serve the clan."
 hircine_coven_religious_head_title: "Hircine Coven"
 hircine_coven_religious_head_title_name: "Hircine Coven"

 malacath_coven: "Malacath Coven"
 malacath_coven_adj: "Malacath Coven"
 malacath_coven_adherent: "Malacath Follower"
 malacath_coven_adherent_plural: "Malacath Followers"
 malacath_coven_desc: "Some Reachman clans dedicate themselves to Malacath, the Lord of Ash and Bone. In this they find kinship with both Orcs and Goblins, however these clans maintain that #italic they#! are Malacath's chosen race, and that the Goblinken merely serve to test and challenge the true children of the Pariah Prince."
 malacath_coven_religious_head_title_name: "Malacath Coven"
 malacath_coven_religious_head_title: "Malacath Coven"

 namira_coven: "Namira Coven"
 namira_coven_adj: "Namira Coven"
 namira_coven_adherent: "Namira Follower"
 namira_coven_adherent_plural: "Namira Followers"
 namira_coven_desc: "To the Reachmen, Namira is the Goddess of the Realm of Spirit. Beside Hircine, the God of the Realm of Flesh, she is among the most important of the Great Spirits. She is primal duality - life and death, beginnings and ends, and a giver and taker in equal measure. While her worship is varied, many of her followers practice ritual sacrifice."
 namira_coven_religious_head_title_name: "Namira Coven"
 namira_coven_religious_head_title: "Namira Coven"

 witchman_faith: "Witchman"
 witchman_faith_adj: "Witchman"
 witchman_faith_adherent: "Witchman"
 witchman_faith_adherent_plural: "Witchmen"
 witchman_faith_desc: "Western Reachmen worship a diverse pantheon of the gods, consisting of Elven Aedra inherited from their Direnni overlords, local spirits, and adopted foreign gods. At the head of the pantheon stands sorcerer-king Magnus, the architect of the world, the sovereign of the gods, and an exemplary ruler for the witch-kings."
 witchman_faith_religious_head_title: "High Priest"
 witchman_faith_religious_head_title_name: "Witchmen"