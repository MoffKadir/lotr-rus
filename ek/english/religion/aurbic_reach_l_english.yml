 old_gods: "Old Gods"
 old_gods_adj: "Old Gods"
 old_gods_adherent: "Old God Follower"
 old_gods_adherent_plural: "Old God Followers"
 old_gods_desc: "Much like their lineage, the faith of the Reachmen is a syncretic mixture derived from the many peoples who inhabit the Reach. The Reachmen have no defined pantheon, instead worshipping a variety of Daedra, Aedra, and totemic animal spirits. The most important of the 'Old Gods' are Hircine and Namira as lords of the World of Flesh and the World of Spirit. The worship of the Old Gods has few defined rituals or practices and most Reach clans have their own unique priest class, traditions, and beliefs. Hedge magick and sacrifice play a key role in many rituals, which led to the inhabitants of the Reach being derided as the 'Witchmen.'"
 
 dwemer_idolatry: "Dwemer Idolatry"
 dwemer_idolatry_adj: "Dwemer Idolatry"
 dwemer_idolatry_adherent: "Dwemer Idolatrist"
 dwemer_idolatry_adherent_plural: "Dwemer Idolatrists"
 dwemer_idolatry_desc: "An obscure folk belief found in some Reach tribes which settled in or around Dwemer ruins. Contrary to popular scholarship, they believe that the Dwemer were a beneficial precursor people who nurtured and guided the Reachmen in an ancient era. They value scholarship and wisdom, and believe that one day the Dwemer will return and lead them to a harmonious future."
