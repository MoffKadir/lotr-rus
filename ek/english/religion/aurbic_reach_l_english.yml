 minotaur_cult: "Minotaur Cult"
 minotaur_cult_adj: "Minotaur Cult"
 minotaur_cult_adherent: "Minotaur Cultist"
 minotaur_cult_adherent_plural: "Minotaur Cultists"
 minotaur_cult_desc: "Followed most prominently by the Dreadhorn Clan, the Minotaur Cult worships Hircine in his aspect as the Father of Manbeasts. They see minotaurs as a purer form of lycanthrope, one permanently suspended in that exalted space between man and beast."
