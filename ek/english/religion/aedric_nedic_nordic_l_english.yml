 #Nedic Sect
 nedic_cult: "Nedic Sect"
 nedic_cult_adj: "Nedic Sect"
 nedic_cult_adherent: "Nedic Sectarian"
 nedic_cult_adherent_plural: "Nedic Sectarians"
 nedic_cult_desc: "Nedes are the original humans who colonised Tamriel in ancient times, spreading across most of the continent and diverging widely in their culture and beliefs.\n\nThough only tiny holdouts remain today, the remaining Nedic folk, primarily in Black Marsh, worship a pantheon of [Glossary( 'Aedra', 'AEDRA_GLOSS' )] not too dissimilar to that of the Empire, but with a notable focus on Z'en and a threefold mother figure consisting of Dibella, Mara and Kynareth. Lorkh, their version of Shezarr, also feature prominently. Some scholars argue this faith could be considered close to a pre-Ayleid and pre-Alessian Nedic pantheon of Gods."
 nedic_cult_house_of_worship: "shrine"
 nedic_cult_house_of_worship_plural: "shrines"
 nedic_cult_religious_symbol: "divine totem"
 nedic_cult_religious_text: "legends"
 nedic_cult_religious_head_title: "Arch-Prelate"
 nedic_cult_religious_head_title_name: "Chapel of Black Marsh"
 nedic_cult_bishop: "wise one"
 nedic_cult_bishop_plural: "wise ones"

 #Cult of Heroes
 hero_cult: "Cult of Heroes"
 hero_cult_adj: "Cult of Heroes"
 hero_cult_adherent: "Hero Cultist"
 hero_cult_adherent_plural: "Hero Cultists"
 hero_cult_desc: "The people of Cyrodiil have many legendary heroes in their history, some of whom are venerated alongside the Eight Divines for their virtues and great deeds. Chief among them are Alessia the Slave-Queen, Pelinal Whitestrake and Morihaus Breath-of-Kyne who in the early [Glossary( 'First Era', 'FIRST_ERA_GLOSS' )] overthrew their Ayleid oppressors; founding the First Empire and modern Imperial religion in the process. Apart from these, local heroes, saints and champions of Cyrodiil are constantly added to this malleable and ever-growing mythos of Cyrodiil’s history which can vary wildly depending on the individual or region."
 hero_cult_religious_symbol: "red diamond"
 hero_cult_religious_text: "Alessia's Covenant"
 hero_cult_religious_head_title: "Diamond-Voice"
 hero_cult_religious_head_title_name: "Imperial Temple"
 hero_cult_devotee: "supplicant"
 hero_cult_devotee_plural: "supplicant"
 hero_cult_priest: "predicant"
 hero_cult_priest_plural: "predicants"
 hero_cult_priest_alternate_plural: "clergy"
 hero_cult_bishop: "sacerdote"
 hero_cult_bishop_plural: "sacerdotes"


 #Reman Mysteries
 reman_cult: "Reman Mysteries"
 reman_cult_adj: "Reman Mysteries"
 reman_cult_adherent: "Reman Cultist"
 reman_cult_adherent_plural: "Reman Cultists"
 reman_cult_desc: "The Reman Mysteries are an enigmatic series of fraternal cults dedicated to the Dragonborn God-Hero Reman 'Light of Man' Cyrodiil, who saved Tamriel from Akaviri invasion in the [Glossary( 'First Era', 'FIRST_ERA_GLOSS' )], conquered almost all of the continent, and founded the Second Empire. It is said that when the Akaviri army heard Reman's voice in battle they realised he was the Dragonborn they had come to find, and knelt before him, swearing their eternal loyalty. It is these Akaviri who would become the Dragonguards and Potentates of his new Empire, and who continue to hold him in reverence as they await another ruler of the Dragon Blood to arise and claim his birthright."
 reman_cult_religious_symbol: "red diamond"
 reman_cult_religious_text: "Remanada"
 reman_cult_religious_head_title: "Voice-of-Reman"
 reman_cult_religious_head_title_name: "Remanite Temple"
