 niben_cult_pantheon_term_has_have: "$pantheon_term_have$"
 niben_cult_desc: "In areas of the Niben Valley traditional religious beliefs dating to the original Nedes are still present, characterised by diversity and esotericism. With a more idiosyncratic pantheon, diverse esoteric beliefs characterise the Nibenese; including garish costumes, bizarre tapestries, tattoos, brandings, and elaborate ceremonies dedicated to specific [Glossary( 'Aedra', 'AEDRA_GLOSS' )], ancestors, heroes and god-animals."
