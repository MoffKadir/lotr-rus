 #Eight Divines
 imperial_cult: "Eight Divines"
 imperial_cult_adj: "Eight Divines"
 imperial_cult_adherent: "Divines Cultist"
 imperial_cult_adherent_plural: "Divines Cultists"
 imperial_cult_desc: "The worship of the Divines has changed since Alessia's rebellion, but the belief in the Eight and of the Covenant with Akatosh still shapes the beliefs of Cyrodiil. Local beliefs and Hero Gods can still be found throughout the province, and it is said that the Imperial City is home to a thousand cults..."
