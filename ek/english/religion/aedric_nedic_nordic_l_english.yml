 #Redguard Creed
 redguard_cult: "Redguard Creed"
 redguard_cult_adj: "Redguard Creed"
 redguard_cult_adherent: "Redguardite"
 redguard_cult_adherent_plural: "Redguardites"
 redguard_cult_desc: "With its beginnings in a mission to bring the ever-stubborn Redguards into line with Imperial doctrine, the so-called "Redguard Creed" offers a syncretism between the Imperial and Yoku gods.\n\nWhile some are horrified by the way that adherents look to the Imperial City rather than their own institutions in religious matters, the faithful insist that they retain their own ancestral traditions and still look to the same stars above, while acknowledging the shared nature of their pantheon."
