# Hist Faiths
 hist_religion: "Hist"
 hist_religion_adj: "Hist"
 hist_religion_adherent: "Hist Follower"
 hist_religion_adherent_plural: "Hist Followers"
 hist_religion_desc: "The Hist are a network of interconnected sentient trees revered by the Argonians, who rely on them to regulate their life cycle. They are believed to be one of the oldest races in Tamriel - originating from an Oblivion realm that was almost entirely destroyed in the ancient War of the Ehlnofey."
