 hermaeus_cult_desc: "Honouring the Demon of Knowledge, the followers of Hermaeus Mora are known to always try to solve the hidden mysteries of the world. There is no book, no scroll, no legend, that will be kept out of their grasp."

 woodland_man: "Woodland Man"
 woodland_man_adj: "Woodland Man"
 woodland_man_adherent: "Woodsman"
 woodland_man_adherent_plural: "Woodsmen"
 woodland_man_desc: "To the ancient Atmorans the Woodland Man, or Herma-Mora, was a fell foe. A testing god and a trickster, "that which speaks in the wastes" can from the dark woods be heard whispering, with promises of great power and secret knowledge. In one legend he nearly tricked the hero Ysgramor into becoming a long-eared Elf, before the timely intervention by Shor."

