 ek_char_interaction.0001.opening: "[recipient.Custom2('AppropriateGreeting', actor )]"
 ek_char_interaction.0001.desc: "I accept your offer of greater integration into Imperial law."

 ek_char_interaction.0002.desc: "The [recipient.GetCulture.GetName] do not need your Imperial laws and customs."
 ek_char_interaction.0002.a: "I shall have to explore other options..."
 
 ek_char_interaction.0003.opening: "[recipient.Custom2('AppropriateGreetingPositive', actor )]"
 ek_char_interaction.0003.desc: "[actor.GetFirstName], your offer to become a #italic proper#! Imperial subject has been granted. The Empire is Law!"
 ek_char_interaction.0003.a: "The Law is Sacred"

 ek_char_interaction.0004.desc: "While I appreciate your offer to become proper Imperial subjects, I must decline."
 ek_char_interaction.0004.a: "That's unfortunate."

