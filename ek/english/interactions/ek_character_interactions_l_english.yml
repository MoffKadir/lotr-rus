 ek_remove_cyrodiilic_subject: "Renounce Status as Imperial Subjects"
 ek_remove_cyrodiilic_subject_tooltip: "We are not mere subjects."
 ek_remove_cyrodiilic_subject_decision_desc: "Now that we are free of Imperial rule, it is high time we cast off the stain of being their subjects. We will not be pit against our brethren."
