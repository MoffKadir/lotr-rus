 NOT_ALREADY_HAS_AN_ALLIANCE_DEAL_BEASTFOLK_TARGET: "Target already has one Nonmarital [alliance|E] active"

 buy_writ_of_war_interaction: "Buy Writ of War"
 buy_writ_of_war_interaction_desc: "A [writ_of_war|E] is necessary to declare [war|E] upon rulers outside of [grand_council|E]."
 buy_writ_of_war_interaction_effect_tooltip: "Gain a [writ_of_war|E] usable upon rulers outside of Morrowind."
 buy_writ_of_war_interaction_cost: "You do not have enough [gold_i] to purchase a Writ of War!"
 writ_of_war_expended_tooltip: "Writ of War Expended due to War Declaration"

# Imperial Scion

 offer_cyrodiilic_subject_interaction: "Offer To Make [GetCultureTradition('tradition_cyrodiilic_subject').GetName|V]"
 offer_cyrodiilic_subject_interaction_desc: "The Cyrodiilic Empires have long traditions of ruling subject people by elevating a favored subset to rule over the rest."
 OFFER_CYRODIILIC_SUBJECT_INTERACTION_NOTIFICATION: "I would like to offer to institute Imperial culture and law in your territory"
 recipient_gains_imperial_scion_tradition: "[recipient.GetCulture.GetName] [culture|E] gains the [GetCultureTradition('tradition_cyrodiilic_subject').GetName|V] [tradition|E]"
 every_culture_county_ek_recent_imperialization: "Every [recipient.GetCulture.GetName] [county|E] gains the [GetModifier('ek_recent_imperialization').GetNameWithTooltip|L] modifier for 20 years"
 offer_cyrodiilic_subject_interaction_option_more_gold: "Offer funding"
 offer_cyrodiilic_subject_interaction_option_more_gold_desc: "The imposition of Imperial customs among the [recipient.GetCulture.GetCollectiveNoun] will not be without cost and difficulty. Offering additional funding will make our offer more attractive."
