 ## for Nonmarital Alliance
 beastfolk_alliance_interaction: "Propose Nonmarital Alliance"
 beastfolk_alliance_interaction_desc: "While our peoples cannot be united by marriage, we can pragmatically propose an alliance with [recipient.GetTitledFirstNameNoTooltip]."
 beastfolk_alliance__interaction_extra_icon: "$hook_extra_icon$"
 BEASTFOLK_NEGOTIATE_ALLIANCE_NOTIFICATION: "Despite our incompatibility for marriage, I believe we both stand to gain from an alliance. I propose that we join our forces and fight our foes together!"
 ALREADY_HAS_AN_ALLIANCE_DEAL_BEASTFOLK: "You can have one Nonmarital [alliance|E] active"
