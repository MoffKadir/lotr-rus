l_english:
 become_lich_decision: "Become a Lich"
 become_lich_decision_desc: "Every day, my flesh grows weaker and, every night, the dim glow of Arkay taunts me. No more! My understanding of unlife grows, and the chains that bind me to mortality can be eroded away by my will. I shall suspend my very soul in a liminal space where neither the dark waters of Oblivion nor the blinding light of Aetherius will be able to find it!\n\nI will have need of exotic matter from all across the Aurbis and plenty of sacrificial souls. This is fell work, and unless my faith accepts my aspirations, it will be that much more difficult."
 become_lich_decision_tooltip: "Undertake a religious ritual to transform into a lich."
 become_lich_decision_confirm: "I will not live. I will not die."
 become_lich_decision_effect: "You begin making preparations for a grand magical ritual"

 become_lich_decision_ai: "Become a Lich AI"
 become_lich_decision_ai_desc: "If you see this, please report it as a bug :)"
 become_lich_decision_ai_confirm: "I will not live. I will not die."
 
 become_necromancer_decision: "Become a Necromancer"
 become_necromancer_decision_desc: "There are things in this world that are, at large, considered to be unwise to partake in. Necromancy is one of such things. It is an ignoble science, it is the Darkest Art; this practice alone is enough to give Conjuration a stigma as a school of magic. Some of the worst people in Tamriel's history have been necromancers.\n\nThat being said... it is a science. It may not be a respected one, but it offers real solutions to practical problems and brings a new dimension to magical theory in the field of transplanar nymicomachy. Just how unethical can this be?"
 become_necromancer_decision_effect.desc: "Starts an event chain to obtain the necromancer trait."
 become_necromancer_decision_tooltip: "Try to take on the dark arts."
 become_necromancer_decision_confirm: "Let's delve into this path!"

 reveal_necromancy_decision: "Reveal Your Necromantic Powers"
 reveal_necromancy_decision_desc: "My true abilities have remained hidden for too long. I was forced to work in the shadows, lurking in the dark like an undead creature. However, this time has not been wasted. With each passing day, I grew stronger while unraveling more and more of the mysteries associated with life and death. Now, I am ready to show the world my true colors.\n\nBut rushing this decision would be unwise. Picking the right time is crucial here. I should be prepared to face any consequences that may result from this action."
 reveal_necromancy_decision_tooltip: "Show the people of Nirn what you are capable off."
 reveal_necromancy_decision_confirm: "They will fear me."

 doctrine_necromancy_accepted_custom_desc: "Your [faith|E] has the Necromancy [GetFaithDoctrine('doctrine_necromancy_accepted').GetBaseName] [doctrine|E]"
 doctrine_necromancy_shunned_custom_desc: "Your [faith|E] has the Necromancy [GetFaithDoctrine('doctrine_necromancy_shunned').GetBaseName] [doctrine|E]"
 doctrine_lichdom_accepted_custom_desc: "Your [faith|E] has the [GetFaithDoctrine('tenet_necromancy_worship').GetBaseName] or [GetFaithDoctrine('doctrine_pantheon_dragons').GetBaseName] [doctrines|E]"

 life_extension_decision: "Extend Lifespan"
 life_extension_decision_desc: "The prospect of living longer, accumulating wisdom and experience, and witnessing the unfolding of generations is both enticing and daunting."
 life_extension_decision_tooltip: "Take a step in the direction of immortality."
 life_extension_decision_confirm: "Just a bit longer..."
 life_extension_cooldown_0: "@warning_icon! #warning There is a 10 year cooldown before you may reattempt this [decision|E], even if you fail!#!\n"
 life_extension_cooldown_1: "@warning_icon! #warning There is a 20 year cooldown before you may reattempt this [decision|E], even if you fail!#!\n"
 life_extension_cooldown_2: "@warning_icon! #warning There is a 30 year cooldown before you may reattempt this [decision|E], even if you fail!#!\n"
 life_extension_cooldown_3: "@warning_icon! #warning There is a 40 year cooldown before you may reattempt this [decision|E], even if you fail!#!\n"
 life_extension_cooldown_4: "@warning_icon! #warning There is a 50 year cooldown before you may reattempt this [decision|E], even if you fail!#!\n"
 life_extension_cooldown_5: "@warning_icon! #warning There is a 60 year cooldown before you may reattempt this [decision|E], even if you fail!#!\n"
 life_extension_failure: "The spell is a failure"
 life_extension_decision_exhaustion: "Can not use this decision until [GetCurrentDateWithDiff( GetVarTimeRemaining( GetPlayer.MakeScope, 'attempted_extend_lifespan') )]"

 life_extension_decision_ai: "Extend Lifespan AI"
 life_extension_decision_ai_desc: "If you see this, please report it as a bug :)"
 life_extension_decision_ai_confirm: "Just a bit longer..."

 study_cloning_decision: "Study Self-Replication"
 study_cloning_decision_desc: "The art of [self_replication|E] is one of the most obscure and mysterious magical endeavours. Mages usually seek more practical methods of increasing their own power, such as lengthening their time on Nirn by extending their own lifespan.\n\nAs a result, creating a [GetTrait('clone').GetName( GetNullCharacter )] of oneself is a very rare pursuit. The details of the procedure are shrouded in mystery, as there is little written research into the topic and every aspiring master would have to come up with most of it by themselves"
 study_cloning_decision_tooltip: "Study the obscure magical art of [cloning|E]"
 study_cloning_decision_confirm: "And yet, the implications..."

 make_a_clone_decision: "Clone Myself"
 make_a_clone_decision_desc: "With my mastery of the mysterious art of [self_replication|E], or 'cloning' to the layman, I can focus my efforts on creating a copy of myself artificially. The process will take several months, during which I can make various tweaks and alterations.\n\nThe result, if successful, will be a perfect [GetTrait('clone').GetName( GetNullCharacter )] of myself, retaining my physical appearance and [congenital_traits|E]."
 make_a_clone_decision_insights_desc: "\n\nCurrent [cloning_insights|E]: #P [ROOT.Var('cl_cloning_insights').GetValue]#!"
 make_a_clone_decision_tooltip: "$start_a_clone_project_tt$"
 make_a_clone_decision_confirm: "Time to get to work."
 clone_project: "Cloning Project"
 start_a_clone_project_tt: "Start a new #V $clone_project$#!"
 study_cloning_decision_low_fertility: "You have very low fertility"
 start_a_clone_project_options_tt: "You will receive various opportunities to alter the resulting [GetTrait('clone').GetName( GetNullCharacter )]"
 start_a_clone_project_cloning_insights_tt: "May gain [cloning_insights|E]"
 cl_get_cloning_insight_tt: "You gain #P +1#! [cloning_insight|E]"
 cl_better_cloning_outcome_tt: "#P Increased#! #V $clone_project$#! Success Chance"
 cl_much_better_cloning_outcome_tt: "#P Significantly Increased#! #V $clone_project$#! Success Chance"
