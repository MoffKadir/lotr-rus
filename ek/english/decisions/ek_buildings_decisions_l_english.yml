l_english:
 # Destroy the Bridges of Leyawiin
 destroy_bridges_leyawiin_decision: "Destroy the Bridges of Leyawiin"
 destroy_bridges_leyawiin_decision_desc_vassal: "The Bridges of Leyawiin grant those who control the city the power to block any ship from passing from Topal Bay into Lake Rumare. If the banks of the Rumare are to truly flourish and prosper, the bridges must be destroyed - even if doing so risks tensions with the city’s rulers and residents."
 destroy_bridges_leyawiin_decision_desc_direct: "The Bridges of Leyawiin give us complete control over all ships attempting to cross from Topal Bay into Lake Rumare. While this dominance has certainly strengthened Leyawiin, it's also weakening Cyrodiil's economy and stirring up conflicts with our neighbors. It may ultimately be in our best interest to consider dismantling the bridges ourselves."
 destroy_bridges_leyawiin_decision_enables_buildings_imperial_isle_ct: "The [GetBuilding('imperial_city_harbor_01').GetName] and [GetBuilding('port_hestra_01').GetName] buildings will be re-enabled"
 destroy_bridges_leyawiin_decision_enables_port_buildings_rumare_ct: "The Tradeport building line will once again be accessible to coastal counties along the Rumare"
 destroy_bridges_leyawiin_decision_control.tt: "The [control|E] in Leyawiin has to be 75 or higher."
 destroy_bridges_leyawiin_decision_confirm: "Destroy the bridges!"
 destroy_bridges_leyawiin_decision_tooltip: "The stranglehold Leyawiin has over trade in the Rumare is unacceptable."

 # Summon Thurvokun
 summon_thurvokun_decision: "Raise Thurvokun"
 summon_thurvokun_decision_desc: "It is time to claim the biggest treasure that lies hidden in the depths of Fang Liar: the bones of the once mighty dragon Thurvokun.\n\nA mighty necromancer may be able to bring them under their control if they have sufficient magicka."
 summon_thurvokun_decision_effect: "Thurvokun will raise from the dead and join your forces."
 summon_thurvokun_decision_tooltip: "The Dragon stirs, let it rise under my command."
 summon_thurvokun_decision_confirm: "Prepare the Ritual!"
 cannot_summon_thurvokun: "Your faith forbids you to use the #V 'Raise Thurvokun'#! [decision|E]"

 # Summon the Hollow
 summon_hollow_decision: "Call the Hollow"
 summon_hollow_decision_desc: "War is upon us and the time is right to invoke the power of the Wilderkings Throne. Thanks to its power the Hollow are standing ready to fight under our command."
 summon_hollow_decision_tooltip: "Rely on the Hollow to aid you in the current war."
 summon_hollow_decision_confirm: "For the Wilderking!"

 # Undertake Trials of Alkosh
 trials_of_alkosh_decision: "Undertake the Trials of Alkosh"
 trials_of_alkosh_decision_desc: "Originally forged by the Pride of Alkosh order to temper their warrior monks, these trials now stand open to any valorous soul within my court, including myself, should I dare to partake. Yet, one must tread with caution, for only a single attempt is granted. Failure would cast a shadow of profound disgrace, but triumph would bestow honor and glory."
 trials_of_alkosh_decision_tooltip: "Face various trials to test your faith, strength, and acumen."
 trials_of_alkosh_decision_confirm: "I will prove my worth!"

 # Cut Sunspire Funding
 cut_sunspire_funding_decision: "Cease Sunspire Temple's Fundings"
 cut_sunspire_funding_decision_desc: "All greatness comes at a cost, and the expense of maintaining the great Sunspire Temple may now exceed its worth. Once a vital place of worship, the number of pilgrims and monks has steadily dwindled, since the Riddle'Thar took Alkosh's place as the highest deity in the Khajiiti pantheon.\n\nPerhaps it is time to accept its fate and refrain from further investments, even if that means this sacred site will gradually wither away, unable to sustain itself on donations alone."
 cut_sunspire_funding_decision_tooltip: "Send word about this to the monks"
 cut_sunspire_funding_decision_confirm: "My coffers will thank me"

 # Dragonguard Pirates. Arrr!
 turn_dragonguard_pirate_decision: "Turn Tideholm into a Pirate Hideout"
 turn_dragonguard_pirate_decision_desc: "Among the numerous assets left by the Dragonguard at Tideholm, the island itself stands as the most valuable. Each day, ships traverse the triangle formed by Senchal, Soulrest, and Leyawiin, laden with riches and ripe for plunder. The ancient fortress provides a formidable base of operations, with the hidden creek sheltering our ships from prying eyes and safeguarding us against any retaliatory strikes.\n\nWith only a few ingenious modifications, we can transform this structure into the ultimate pirate hideout, a sanctuary of terror from which we will dominate the sea."
 turn_dragonguard_pirate_decision_tooltip: "The Topal Sea will be at the mercy of your fleet"
 turn_dragonguard_pirate_decision_confirm: "Get to work, you landlubbers!"

 # Defile Hidden Moon Crypts
 defile_hidden_moon_crypts_decision: "Defile the Hidden Moon Crypts"
 defile_hidden_moon_crypts_decision_desc: "The Hidden Moon Crypts have stood vigil over the Ashen Scar and its buried dead for too long. Like the order that once inhabited them, they are now relics of the past, without purpose in a changing world.\n\nBut in my mercy, I could transform these crypts into a base for my necromancy, giving them a new function while profiting from the relics, knowledge, and corpses the monks left behind."
 defile_hidden_moon_crypts_decision_effect: "Destroying the protecting wards may have some unforeseen effects."
 defile_hidden_moon_crypts_decision_tooltip: "Soon enough, undead champions will rise from the ashen sands."
 defile_hidden_moon_crypts_decision_confirm: "Break the last seals!"

 # Defile Rimmen Necropolis
 defile_rimmen_necropolis_decision: "Defile the Rimmen Necropolis"
 defile_rimmen_necropolis_decision_desc: "The Golden Beast, Darloc Brae, left behind a vast empire and thousands of corpses scattered across the land. His greatest warriors rest in the Rimmen Necropolis, where proud Manes, choosing to be interred there as well, ensured a constant growth of the number of graves and burial chambers.\n\nNow, it may be time to pick up where the Golden Beast left off - revive those warriors and continue the conquest of new realms."
 defile_rimmen_necropolis_decision_tooltip: "Let Darloc Brae's army rise and fight over these lands once again."
 defile_rimmen_necropolis_decision_confirm: "Go forth and open the graves!"

 # Defile Deep Graves
 defile_deep_graves_decision: "Defile Deep Graves"
 defile_deep_graves_decision_desc: "The place known only as Deep Graves has served as a funeral site for as long as Argonians have existed in Black Marsh. For millennia, corpses have been handed over to the swamp, carefully pinned down with grave stakes to prevent them from drifting away and to ensure none rise again as bog blights.\n\nBut, like everything in these lands, corpses are a resource. Wouldn't it be a shame to let them simply rot away?"
 defile_deep_graves_decision_tooltip: "The swamp will open up and spew forth hundreds of undead warrior to bolster our ranks."
 defile_deep_graves_decision_confirm: "Rip out the grave stakes!"

 # Convert Chapel of Zenithar
 turn_zenithar_ch_khajiit_decision: "Convert Chapel of Zenithar"
 turn_zenithar_ch_khajiit_decision_desc: "The Chapel of Zenithar is a great temple dedicated to a god foreign to us. But with sufficient resources, we could convert it to the worship of Two Moons."
 turn_zenithar_ch_khajiit_decision_tooltip: "Convert Chapel of Zenithar"
 turn_zenithar_ch_khajiit_decision_confirm: "Praise Jone and Jode!"

 # Defile Bone Orchard
 defile_bone_orchard_decision: "Defile the Barrowbough"
 defile_bone_orchard_decision_desc: "The Barrowbough has stood as a silent sentinel over this hill since time immemorial. To have one's bones buried here, after the body is honored by the Green Pact, is a great honor. As a result, the hill has grown, just like the tree atop it. It is now filled with countless bones, which can be forced to walk and fight once more - if only the tree's protection is broken."
 defile_bone_orchard_decision_tooltip: "The roots are torn asunder, compelled to relinquish the bones they have safeguarded for ages."
 defile_bone_orchard_decision_confirm: "Unearth the dead!"

 # Awake Earth Bone
 awake_earth_bone_decision: "Awake Earth Bone"
 awake_earth_bone_decision_desc: "With the Barrowbough firmly under my dominion, the time has come to claim that which has long been concealed: the bones of an ancient Ehlnofey.\n\nThough buried deep beneath the roots, their very essence still reverberates through the land. With sufficient magicka, I shall harness that power and bend it to my will."
 awake_earth_bone_decision_effect: "A giant being of terrible strength will be brought under your control."
 awake_earth_bone_decision_tooltip: "Let an ancient Ehlnofey awake under your command."
 awake_earth_bone_decision_confirm: "Prepare the Ritual!"
 cannot_summon_earth_bone: "Your faith forbids you to use the  #V 'Awake Earth Bone'#! [decision|E]"

 # Defile Heart of Valenwood
 defile_heart_of_valenwood_decision: "Defile the Heart of Valenwood"
 defile_heart_of_valenwood_decision_desc: "The seals, once foolishly erected to contain the true power of the Heart of Valenwood, have been broken. This relic of the Dawn Era, a metaphor made manifest, holds potential that is both mysterious and incomprehensible to most. However, I understand its significance: changing the heart means to change the forest itself. And I intend to change it for my needs."
 defile_heart_of_valenwood_decision_effect: "This decision may have serious consequences for all of Valenwood"
 defile_heart_of_valenwood_decision_tooltip: "The tree will be filled with dark magic until it's very essence is altered."
 defile_heart_of_valenwood_decision_confirm: "Let the Forest be at my command!"

 # Defile Treehenge Resting Place
 defile_treehenge_resting_place_decision: "Defile Treehenge Resting Place"
 defile_treehenge_resting_place_decision_desc: "The Green Ladies have always protected these lands — ferocious in life, steadfast in death. At the Treehenge Resting Place, their bodies lie buried while their souls roam the woods, bestowing their strength upon worthy Bosmer. But if someone were to seize control of this sacred place, unearth their bodies, and capture their souls, they could wield their immense power. And I have the means to make that happen."
 defile_treehenge_resting_place_decision_tooltip: "The ancient souls of the Green Ladies will be captured and their hatred twisted against their own people."
 defile_treehenge_resting_place_decision_confirm: "Enslave those souls!"

 # Turn Cathedral of the Golden Path into Bosmer temple
 turn_golden_path_cathedral_decision: "Convert Cathedral of the Golden Path"
 turn_golden_path_cathedral_decision_desc: "The Cathedral of the Golden Path is dedicated to gods foreign to our lands, its towering stone walls daring to overshadow the nearby trees. It is time to reclaim this place and transform it into a space of worship for our own people."
 turn_golden_path_cathedral_decision_tooltip: "Convert Cathedral of the Golden Path"
 turn_golden_path_cathedral_decision_confirm: "Gather the Greenspeakers!"

 # Turn Woodheart Sewers into Smuggle Hideout
 turn_woodheart_pirate_decision: "Turn Woodheart Sewers into Smuggle Hideout"
 turn_woodheart_pirate_decision_desc: "The ancient sewers of Woodhearth are a haven for those who see opportunity where others see ruin. Let us claim this forgotten underworld and shape it into a hidden stronghold, where the relentless flow of goods and gold can thrive, far from prying eyes."
 turn_woodheart_pirate_decision_tooltip: "This will increase the profits to be made but comes at a cost of control"
 turn_woodheart_pirate_decision_confirm: "Let's move in the Skooma!"

 # Defile Sancre Tor
 defile_sancre_tor_decision: "Defile Sancre Tor"
 defile_sancre_tor_decision_desc: "Sancre Tor. There is no other place in Cyrodiil with a history like this one. From here, Empires were born — and crumbled into dust.\n\nNow, it is time to turn the tides of fate once more from within these very walls. Treasures lie buried here, ripe for the taking, and those who once guarded them will soon serve my will."
 defile_sancre_tor_decision_tooltip: "Turn this sacred place into an endless source of undead"
 defile_sancre_tor_decision_confirm: "Invade the Crypts!"

 # Defile Great Chapel of Arkay
 defile_great_chapel_of_arkay_decision: "Defile the Great Chapel of Arkay"
 defile_great_chapel_of_arkay_decision_desc: "Arkay - the eternal adversary. His priests remain a relentless thorn, and his rites bar us from the souls we seek. The Chapel at the heart of Cheydinhal stands as a monument to his influence, but the time has come to reveal to all of Tamriel that this god no longer holds the power to shield it from those who wield the true power of necromancy."
 defile_great_chapel_of_arkay_decision_tooltip: "Turn this hallowed sanctuary into a bastion of necromancy"
 defile_great_chapel_of_arkay_decision_confirm: "Desecrate these Altars!"

 # Sanctify Ontus Quarry
 sanctify_ontus_quarry_decision: "Sanctify the Ontus Quarry"
 sanctify_ontus_quarry_decision_desc: "Mining a mountain for its ore is already a sacrilege, yet one that is sadly necessary for our survival. But quarrying stone is vile desecration, stripping the mountain of its sacred flesh. We must destroy the quarry and build a shrine in its place - a symbol of repentance and a vow to take only what we truly need."
 sanctify_ontus_quarry_decision_tooltip: "Destroy the gantries, burn the tools, tear down every structure!"
 sanctify_ontus_quarry_decision_confirm: "Let the mountain heal"

 # Summon Bonewalker
 summon_bonewalker_decision: "PLACEHOLDER"
 summon_bonewalker_decision_confirm: "PLACEHOLDER"
