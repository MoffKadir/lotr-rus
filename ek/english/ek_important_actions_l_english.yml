 action_can_consume_label: "You Can Consume [recipient.GetShortUINameNoTooltip] @scheme_icon!"
 action_can_consume_combined_label: "[recipient.GetRelationToString( GetPlayer )], [recipient.GetShortUINameNoTooltip]"
 action_can_consume_click: "#I Click to consume [prisoner|E]#!"
 action_can_consume_HELP: "\n\n#help If a prisoner is a threat to you, such as a [rival|E], you might want to consume them first.#!"

 action_can_clone: "Skull of Corruption can be used"
 action_can_clone_combined_group_label: "You can use the Skull of Corruption @artifact_icon!"
 action_can_clone_combined_group_name: "$action_can_clone$"
 action_can_clone_desc: "You can use the Skull of Corruption on [recipient.GetShortUIName] and make [recipient.GetHerHim] battle a duplicate!"
 action_can_clone_combined_group_description: "You use the Skull of Corruption against a target!"
 action_can_clone_label: "You make [recipient.GetShortUINameNoTooltip] battle a duplicate @artifact_icon!"
 action_can_clone_combined_label: "[recipient.GetRelationToString( GetPlayer )], [recipient.GetShortUINameNoTooltip]"
 action_can_clone_click: "#I Click to use the Skull of Corruption#!"
 action_can_clone_HELP: "\n\n#help If someone is a threat to you, such as a [rival|E], you might want to make them battle a duplicate first.#!"

 action_can_hire_court_mage: "@spellbook_icon! Hire a $court_mage_court_position$"
