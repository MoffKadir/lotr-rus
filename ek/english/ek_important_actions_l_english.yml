 action_can_hire_court_mage_desc: "You are not employing a $court_mage_court_position$ as a [court_position|E], you should hire one."
 action_can_hire_court_mage_click: "#I Click to view#!"

 action_instruct_court_mage: "@spellbook_icon! Give Instructions to your $court_mage_court_position$"
