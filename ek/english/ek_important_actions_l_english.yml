 action_instruct_court_mage_desc: "Your court mage awaits your orders regarding their use of magicka."
 action_instruct_court_mage_click: "#I Click to view#!"

 action_can_use_writ_of_war: "Writ of War"
 action_can_use_writ_of_war_label: "You have an unspent [writ_of_war|E]"
 action_can_use_writ_of_war_desc: "You have an unspent [writ_of_war|E].\n\n#help A [writ_of_war|E] allows waging war against rulers outside Morrowind.\n\nIt is valid for another [GetGameTimeDifferenceForDiffDays( actor.MakeScope.VarRemaining( 'has_writ_of_war' ) )]."
 action_can_use_writ_of_war_click: "#I Click to view#!"

 action_fate_of_elsweyr: "The Fate of Elsweyr"
 action_fate_of_elsweyr_label: "The Elsweyr Confederacy is at risk of breaking!"
 action_fate_of_elsweyr_desc: "$elsweyr_dissolution.tt$\n\n#help You currently control #V [SCOPE.ScriptValue('counties_of_elsweyr_percent_value')]%#! of Elsweyr.#!" 
 action_fate_of_elsweyr_click: "#I Click to view#!"

 action_open_spellbook: "Cast a Spell"
 action_open_spellbook_label: "You can $do_a_magic_interaction$"
 action_open_spellbook_desc: "Open your Spellbook to cast a [spell|E] targeting yourself.\n\nTo target another [character|E], use the $do_a_magic_interaction$ [interaction|E] on them!\n\n#help This interaction is available because you are able to use [magic|E] or because you have employed a $court_mage_court_position$ who can cast Spells on your behalf.#!"
 action_open_spellbook_click: "#I Click to view#!"

 action_lifestyle_magic: "$action_can_spend_perk_point$"
